    <script>

        const POSTS = [{"is_my_post":true,"post_urn":"urn:li:activity:7475785970005463040","author_name":"Ravi Evani\n              \n                \n                   \n    \n      \n    \n    \n      \n    \n\n • You","author_profile_url":"https://www.linkedin.com/in/ravievani","author_headline":"Deploying enterprise agents in production / CTO / SWE Leader / GVP @ Publicis Sapient","posted_time":"2026-06-25","posted_hours_ago":7,"posted_time_raw":"7h","post_url":"https://www.linkedin.com/feed/update/urn:li:activity:7475785970005463040","author_profile_image_url":"https://media.licdn.com/dms/image/v2/C4E03AQGNeJRorEd2Nw/profile-displayphoto-shrink_100_100/profile-displayphoto-shrink_100_100/0/1569287114631?e=1784160000&v=beta&t=tJDZC7EXWnlgIIf8kF7fBCajhF-HEgzNXnz_IIkjqW8","post_text":"Here's how I keep my website in sync with my LinkedIn posts.\n\nNo infra to maintain. No backend, database. GitHub Pages hosts the site, while the browser performs the extraction.\n\nWorks around API limitations. Rather than requiring privileged LinkedIn API access, the extension reads the pages I already have permission to view within my authenticated session.\n\nAuthentic by design. My website reflects my real LinkedIn activity instead of becoming another profile that needs separate maintenance.\n\nFast deployment. Updating my site is as simple as running the extension and committing the generated data.\n\nExcellent performance. A static GitHub Pages site with a single data payload loads quickly, is inexpensive to host, and is easy for search engines to crawl.\n\nSo basically a browser-driven CMS with a \"one-click publishing workflow.\" .\n\nOne optimization I might do in the future is separating the data from the UI. Instead of regenerating a single index.html, perhaps publish a posts.json (or similar) alongside the static site. The UI stays unchanged while only the data file is updated. That makes future \"redesigns\" much easier and opens the door to making my site agent ready without changing the extraction pipeline.","post_image_url":"https://dms.licdn.com/playlist/vid/v2/D5605AQEo5Sja1GFUxw/mp4-720p-30fp-crf28/B56Z79Tn.cG8CA-/0/1782366260490?e=1783000800&v=beta&t=ocFsUZ5G9r72QHfp61b2-bc7mK5oAgBlfAfSwskRzqs","is_article":false,"article_url":null,"article_title":null,"article_description":null,"is_video":true,"video_url":"https://dms.licdn.com/playlist/vid/v2/D5605AQEo5Sja1GFUxw/mp4-720p-30fp-crf28/B56Z79Tn.cG8CA-/0/1782366260490?e=1783000800&v=beta&t=ocFsUZ5G9r72QHfp61b2-bc7mK5oAgBlfAfSwskRzqs","has_image":true,"reaction_count":5,"reaction_types":"LIKE, INTEREST","comment_count":1,"impression_count":409,"source":"activity"},{"is_my_post":true,"post_urn":"urn:li:activity:7475514669114368000","author_name":"Ravi Evani\n              \n                \n                   \n    \n      \n    \n    \n      \n    \n\n • You","author_profile_url":"https://www.linkedin.com/in/ravievani","author_headline":"Deploying enterprise agents in production / CTO / SWE Leader / GVP @ Publicis Sapient","posted_time":"2026-06-24","posted_hours_ago":24,"posted_time_raw":"1d","post_url":"https://www.linkedin.com/feed/update/urn:li:activity:7475514669114368000","author_profile_image_url":"https://media.licdn.com/dms/image/v2/C4E03AQGNeJRorEd2Nw/profile-displayphoto-shrink_100_100/profile-displayphoto-shrink_100_100/0/1569287114631?e=1784160000&v=beta&t=tJDZC7EXWnlgIIf8kF7fBCajhF-HEgzNXnz_IIkjqW8","post_text":"Deterministic enterprise software generated by ai and not vetted properly is arguably more dangerous than exposing users to an obviously probabilistic chatbot. Would you let customers or colleagues use it?\n\nWhen a probabilistic engine (an LLM) writes deterministic code (like Python, Java, or C++) and it is deployed without rigorous human vetting, you have now hardcoded the probabilistic risk.\n\nWhen users interact with an ai chatbot, their guard is up. They expect variance, look out for hallucinations, and generally apply a \"trust but verify\" mindset. Deterministic software, however, carries an implicit assumption of mathematical certainty. Because it compiles and runs, it gives developers and users a false sense of security.\n\nThink about that before your next PR.","post_image_url":null,"is_article":false,"article_url":null,"article_title":null,"article_description":null,"is_video":false,"video_url":null,"has_image":false,"reaction_count":12,"reaction_types":"LIKE, INTEREST","comment_count":1,"impression_count":763,"source":"activity"},{"is_my_post":true,"post_urn":"urn:li:activity:7474772913414635520","author_name":"Ravi Evani\n              \n                \n                   \n    \n      \n    \n    \n      \n    \n\n • You","author_profile_url":"https://www.linkedin.com/in/ravievani","author_headline":"Deploying enterprise agents in production / CTO / SWE Leader / GVP @ Publicis Sapient","posted_time":"2026-06-22","posted_hours_ago":72,"posted_time_raw":"3d","post_url":"https://www.linkedin.com/feed/update/urn:li:activity:7474772913414635520","author_profile_image_url":"https://media.licdn.com/dms/image/v2/C4E03AQGNeJRorEd2Nw/profile-displayphoto-shrink_100_100/profile-displayphoto-shrink_100_100/0/1569287114631?e=1784160000&v=beta&t=tJDZC7EXWnlgIIf8kF7fBCajhF-HEgzNXnz_IIkjqW8","post_text":"As a forward deployed engineer, you won't move an enterprise exec by talking about how \"clever\" your agents are.\n\nAs an FDE you should expect to be a part of meetings with enterprise execs. Here are a few tips to help you prepare, especially when the discussion involves AI agents.\n\n1. First, get out of your own product vocabulary.\n\nA CEO, SVP, or business leader is usually not looking for a tour of your platform, agent configuration, orchestration layer, workflow designer, or feature set.\n\nThat may matter later. But it is rarely where the conversation should start. You should first start with understanding your audience.\n\nBefore the meeting, study how that leader talks about their business. Look for interviews, earnings commentary, LinkedIn posts, podcasts, conference sessions, or articles. Pay attention to the actual words they use.\n\nWhat do they keep coming back to? Growth? Reliability? Speed? Scale? Execution Certainty? Regulatory pressure? Cost to serve? Operational resilience? Boil it down to the 5-10 phrases that seem to matter most to them.\n\nThen position your AI agent work in those terms. Not in terms of what the agent can technically do, but in terms of the business value they already care about. If you are not speaking on their page, they will not connect the dots for you.\n\n2. Second, do not bring ten features into the room.\n\nPick the one or two places where your solution truly shines. The strongest capability that you can connect to where they see value.\n\nFor example, not “our agent can summarize work orders.”\n\nInstead: “This brings all the context related to work orders in one place, so your field teams can troubleshoot faster and close out work more accurately”.\n\n3. Third, cast the value through their people.\n\nSenior leaders are not doing the day-to-day work themselves. They are thinking about how their teams operate, where decisions slow down, where handoffs break, and where execution quality varies.\n\nSo help them see the future state. What changes for their operators, engineers, service teams, or managers? Where does work get faster? Where does judgment improve? Where does rework reduce?\n\nThat is where the exec conversation starts to land.\n\nDon't try to prove how clever your agent is. Show that you understand the business well enough to apply AI where it can actually improve outcomes.","post_image_url":null,"is_article":false,"article_url":null,"article_title":null,"article_description":null,"is_video":false,"video_url":null,"has_image":false,"reaction_count":26,"reaction_types":"LIKE, INTEREST, EMPATHY","impression_count":1109,"source":"activity"},{"is_my_post":true,"post_urn":"urn:li:activity:7472956658495717377","author_name":"Ravi Evani\n              \n                \n                   \n    \n      \n    \n    \n      \n    \n\n • You","author_profile_url":"https://www.linkedin.com/in/ravievani","author_headline":"Deploying enterprise agents in production / CTO / SWE Leader / GVP @ Publicis Sapient","posted_time":"2026-06-18","posted_hours_ago":168,"posted_time_raw":"1w","post_url":"https://www.linkedin.com/feed/update/urn:li:activity:7472956658495717377","author_profile_image_url":"https://media.licdn.com/dms/image/v2/C4E03AQGNeJRorEd2Nw/profile-displayphoto-shrink_100_100/profile-displayphoto-shrink_100_100/0/1569287114631?e=1784160000&v=beta&t=tJDZC7EXWnlgIIf8kF7fBCajhF-HEgzNXnz_IIkjqW8","post_text":"We may be using the term “human-in-the-loop” too loosely.\n\nA lot of what is being called called Human-in-the-Loop today is really just a traditional application pattern with an LLM added to the interface.\n\nHere’s the common pattern:\n\nYou ask AI to generate a forecast. It produces an answer. You review it, spot an issue, and say, “Adjust the Q3 assumptions to account for X\". It regenerates the output.\n\nThat is useful. But it is not really Human-in-the-Loop. It is closer to Human-Over-the-Loop.\n\nThe human is still driving the workflow. The human holds the context. The human decides what happens next. The system produces an output and waits for the next instruction.\n\nThat is not fundamentally different from the old draft, review, edit model. The LLM may make the interaction more flexible, but the workflow is still human-orchestrated.\n\nTrue Human-in-the-Loop looks different.\n\nIn a true agentic workflow, the agent is executing a task, managing state, and moving through a plan. When it hits a point of uncertainty, missing context, policy constraint, or risk threshold, it does not guess. It pauses at that point and asks the human for the specific input needed to continue.\n\nFor example:\n\n“I’m calculating the forecast, but the European tariff variance is missing. Should I use the historical average, or do you have the updated figure?”\n\nThe human provides the missing context. The agent resumes the workflow.\n\nHuman-Over-the-Loop:\nThe human initiates, reviews, edits, and drives the next step.\n\nHuman-In-the-Loop:\nThe agent drives the workflow and pulls the human in only when judgment, context, approval, or exception handling is required.\n\nThis distinction matters because many teams think they are building agentic systems when they are really building better interfaces for traditional workflows.\n\nThere is nothing wrong with that. For many use cases, it may be exactly the right starting point.\n\nBut if we want to move from copilots to agentic workflows, we need to be clear about where the intelligence, orchestration, and state management actually live.","post_image_url":"https://media.licdn.com/dms/image/v2/D4E22AQEu4oX_cS3tuw/feedshare-shrink_800/B4EZ7VGeymJYAc-/0/1781691706810?e=1784160000&v=beta&t=nQsT3hIoQhAVUzPRfNf9FANU3OHsHJ3OKjrejQvpDos","is_article":false,"article_url":null,"article_title":null,"article_description":null,"is_video":false,"video_url":null,"has_image":true,"reaction_count":11,"reaction_types":"LIKE, INTEREST","impression_count":479,"source":"activity"},{"is_my_post":true,"post_urn":"urn:li:activity:7472839788732203008","author_name":"Ravi Evani\n              \n                \n                   \n    \n      \n    \n    \n      \n    \n\n • You","author_profile_url":"https://www.linkedin.com/in/ravievani","author_headline":"Deploying enterprise agents in production / CTO / SWE Leader / GVP @ Publicis Sapient","posted_time":"2026-06-18","posted_hours_ago":168,"posted_time_raw":"1w","post_url":"https://www.linkedin.com/feed/update/urn:li:activity:7472839788732203008","author_profile_image_url":"https://media.licdn.com/dms/image/v2/C4E03AQGNeJRorEd2Nw/profile-displayphoto-shrink_100_100/profile-displayphoto-shrink_100_100/0/1569287114631?e=1784160000&v=beta&t=tJDZC7EXWnlgIIf8kF7fBCajhF-HEgzNXnz_IIkjqW8","post_text":"ai got the budget. but better deterministic software was what delivered the value.\n\ni was chatting with an ex-client who is now a good friend, and they were really excited about using ai agents to drive operational decision-making.\n\nas we peeled back the layers, it became clear that most of the problems they were trying to solve weren’t actually agent problems. they were information problems.\n\na lot of their challenges could be addressed with better data, more deterministic workflows, and better user experiences for the people running operations. in perhaps 10% of cases, some traditional predictive ml could add value. but in none of the examples we discussed did we actually need agents making decisions on behalf of people.\n\nwhat operators really needed was the right information, presented at the right time, in the right context.\n\nand that is where ai can be very useful.\n\nuse ai for research and discovery. use it to dig through documents, conversations, tickets, policies, logs, and historical decisions. use it to uncover information that was always there, but buried under layers of systems, teams, and process.\n\nbut again, the goal is not always to have ai make the decision. often, the goal is to help people see what they couldn’t see before.\n\nanother interesting part of the discussion was that ai was also being used as part of the narrative to secure investment and executive attention. that’s completely understandable. organizations want to participate in the ai wave, and that often helps unlock funding for long-overdue modernization efforts.\n\nbut just because ai is the reason the investment gets approved doesn’t mean ai is the answer to every problem being solved.\n\nironically, getting to the desired outcome did require building a lot more software. historically, much of that work would have remained stuck in the backlog because teams simply didn’t have the capacity.\n\nthat’s where ai is incredibly valuable.\n\nuse ai to write the software. use ai to accelerate development. use ai to help teams tackle years of accumulated backlog and build experiences that would have been difficult to justify before.\n\nbut when it comes to operational decision-making, the bigger opportunity is often not replacing human judgment with agents. it’s giving people better tools, better context, and better information so they can make better decisions themselves.","post_image_url":null,"is_article":false,"article_url":null,"article_title":null,"article_description":null,"is_video":false,"video_url":null,"has_image":false,"reaction_count":16,"reaction_types":"LIKE","impression_count":1082,"source":"activity"},{"is_my_post":true,"post_urn":"urn:li:activity:7472670955916681216","author_name":"Ravi Evani\n              \n                \n                   \n    \n      \n    \n    \n      \n    \n\n • You","author_profile_url":"https://www.linkedin.com/in/ravievani","author_headline":"Deploying enterprise agents in production / CTO / SWE Leader / GVP @ Publicis Sapient","posted_time":"2026-06-18","posted_hours_ago":168,"posted_time_raw":"1w","post_url":"https://www.linkedin.com/feed/update/urn:li:activity:7472670955916681216","author_profile_image_url":"https://media.licdn.com/dms/image/v2/C4E03AQGNeJRorEd2Nw/profile-displayphoto-shrink_100_100/profile-displayphoto-shrink_100_100/0/1569287114631?e=1784160000&v=beta&t=tJDZC7EXWnlgIIf8kF7fBCajhF-HEgzNXnz_IIkjqW8","post_text":"I think I'm probably late figuring out that I don't need to reach for the delete key anymore while taking notes.","post_image_url":"https://media.licdn.com/dms/image/v2/D5622AQEUmNuzkNzO_Q/feedshare-shrink_800/B56Z7RCopyJQAc-/0/1781623589789?e=1784160000&v=beta&t=6uk4REd48uLrXJoF4z3-c6DT-ABQ-qbipMBG8SMv0iU","is_article":false,"article_url":null,"article_title":null,"article_description":null,"is_video":false,"video_url":null,"has_image":true,"reaction_count":5,"reaction_types":"LIKE, ENTERTAINMENT","impression_count":1058,"source":"activity"},{"is_my_post":true,"post_urn":"urn:li:activity:7470851423715614720","author_name":"Ravi Evani\n              \n                \n                   \n    \n      \n    \n    \n      \n    \n\n • You","author_profile_url":"https://www.linkedin.com/in/ravievani","author_headline":"Deploying enterprise agents in production / CTO / SWE Leader / GVP @ Publicis Sapient","posted_time":"2026-06-18","posted_hours_ago":168,"posted_time_raw":"1w","post_url":"https://www.linkedin.com/feed/update/urn:li:activity:7470851423715614720","author_profile_image_url":"https://media.licdn.com/dms/image/v2/C4E03AQGNeJRorEd2Nw/profile-displayphoto-shrink_100_100/profile-displayphoto-shrink_100_100/0/1569287114631?e=1784160000&v=beta&t=tJDZC7EXWnlgIIf8kF7fBCajhF-HEgzNXnz_IIkjqW8","post_text":"How did Publicis Sapient Bodhi Deep research engine beat gemini, openai, grok and perplexity to get to #1 on Hugging Face leaderboard?\n\nRecursive Multi-Phase Orchestration: The system utilizes a sophisticated four-phase model: Clarification, Planning, Execution, and Final Reporting—where an orchestrator repeatedly delegates complex tasks to specialized research agents in a continuous, multi-step loop.\n\nParallel Autonomous Sub-Flows: High-scale efficiency is achieved through an execution model that runs multiple research agent sub-flows in parallel, each operating with its own independent multi-turn tool loop to gather and analyze data.\n\nSeamless Enterprise Tool Integration: The architecture features a \"plug-and-play\" capability, granting research agents direct access to critical tools such as internal search, web search, and URL extraction to bridge information across diverse data sources.\n\nValidated Synthesis and Citation Accuracy: To ensure high-fidelity outputs, the system merges all intermediate findings and citation mappings from individual agents into a final, comprehensive report that anchors every insight to its original source.\n\nWhat Use cases is Bodhi Deep Research, especially great at?\n1/ Technical Due Diligence\n2/ Policy and Regulatory Tracking\n3/ Legal and Contract Analysis\n4/ Incident and Root-Cause Analysis\n5/ Healthcare and Clinical Guideline Synthesis\n6/ Security and Threat Intelligence\n\nWhat does this mean for enterprises?\n- Faster strategic analysis\n- Deeper competitive intelligence\n- Higher-quality research outputs\n- Reduced blind spots in decision-making\n- Reliable execution of complex instructions","post_image_url":"https://media.licdn.com/dms/image/v2/D4E22AQH-BX_Zw2hvdw/feedshare-shrink_800/B4EZ63LxwMIwAc-/0/1781189780053?e=1784160000&v=beta&t=PseyhimOviYA4Zw2WblnE1Qx5wXqtLMqvT_N06NfnzU","is_article":false,"article_url":null,"article_title":null,"article_description":null,"is_video":false,"video_url":null,"has_image":true,"reaction_count":642,"reaction_types":"LIKE, PRAISE, EMPATHY","comment_count":8,"repost_count":51,"impression_count":49170,"source":"activity"},{"is_my_post":true,"post_urn":"urn:li:activity:7470493130958745602","author_name":"Ravi Evani\n              \n                \n                   \n    \n      \n    \n    \n      \n    \n\n • You","author_profile_url":"https://www.linkedin.com/in/ravievani","author_headline":"Deploying enterprise agents in production / CTO / SWE Leader / GVP @ Publicis Sapient","posted_time":"2026-06-11","posted_hours_ago":336,"posted_time_raw":"2w","post_url":"https://www.linkedin.com/feed/update/urn:li:activity:7470493130958745602","author_profile_image_url":"https://media.licdn.com/dms/image/v2/C4E03AQGNeJRorEd2Nw/profile-displayphoto-shrink_100_100/profile-displayphoto-shrink_100_100/0/1569287114631?e=1784160000&v=beta&t=tJDZC7EXWnlgIIf8kF7fBCajhF-HEgzNXnz_IIkjqW8","post_text":"The idea of loop engineering expects a lot from the average SWE. While It sounds simple, It’s a drastic shift in skill required.\n\nLoop engineering advocates to move beyond prompting and start designing the feedback loops that help agents reason, act, evaluate, and improve.\n\nBut we've spent years breaking high level work into tiny, code-centric tasks: going from epics → features → stories → tasks → code.\n\nNow, with the concept of loop engineering, there's hype of pushing up the chain into higher-level constructs to steer agents.\n\nIt’s a very different skill.\n\nWhile a few niche teams and superstar developers may adapt to this, expecting enterprises to build this capability broadly across software development is not realistic. This will take years.\n\nAnd I’m not even sure this capability is needed at broad scale. Most enterprises do not need most developers to become loop engineers.\n\nGiven that prompt engineering is still messy, context engineering is still hard, and reliable outputs are still inconsistent. Expecting every enterprise developer to design autonomous loops feels premature.\n\nMost enterprises will need reusable patterns, guardrails, and workflows that deliver business value before they need to think about broad-scale loop engineering.","post_image_url":null,"is_article":false,"article_url":null,"article_title":null,"article_description":null,"is_video":false,"video_url":null,"has_image":false,"reaction_count":13,"reaction_types":"LIKE, APPRECIATION","impression_count":1105,"source":"activity"},{"is_my_post":true,"post_urn":"urn:li:activity:7470212373073559552","author_name":"Ravi Evani\n              \n                \n                   \n    \n      \n    \n    \n      \n    \n\n • You","author_profile_url":"https://www.linkedin.com/in/ravievani","author_headline":"Deploying enterprise agents in production / CTO / SWE Leader / GVP @ Publicis Sapient","posted_time":"2026-06-11","posted_hours_ago":336,"posted_time_raw":"2w","post_url":"https://www.linkedin.com/feed/update/urn:li:activity:7470212373073559552","author_profile_image_url":"https://media.licdn.com/dms/image/v2/C4E03AQGNeJRorEd2Nw/profile-displayphoto-shrink_100_100/profile-displayphoto-shrink_100_100/0/1569287114631?e=1784160000&v=beta&t=tJDZC7EXWnlgIIf8kF7fBCajhF-HEgzNXnz_IIkjqW8","post_text":"Prompt engineering? Still messy. Context engineering? Still hard. Reliable outputs? Still inconsistent. But sure, let’s move on to \"loop\" engineering.\n\nAI discourse has a wonderful habit of skipping directly to the hardest possible problem.\n\nLoop engineering is supposedly where AI not only produces the output, but also decides the inputs, creates the context, invokes other agents, and recursively improves itself.\n\nWhat could possibly go wrong?\n\nIs this the \"solution\" that our enterprises need?\n\nThe bottlenecks that enterprises need to solve are much simpler:\n1/ Can the agent produce the right output?\n2/ Can it use the right context?\n3/ Can the workflow be automated safely?\n4/ Can it create measurable business value?\n\nOnly after that should we get excited about AI determining its own inputs.\n\nWhen humans define the inputs, you can at least reason about the outcome.\n\nWhen AI defines the inputs, you are pretending you can engineer behavior. While that may be a worthy research problem. It is not where most enterprises should start.\n\nThe real opportunity is less glamorous:\nReduce cycle times.\nImprove decision quality.\nModernize legacy processes.\nHelp people get more done.\n\nThe industry keeps ratcheting the conversation upward before the previous level is delivering value.\n\nIgnore the noise.\n\nDeliver business value step by step.","post_image_url":"https://media.licdn.com/dms/image/v2/D4E22AQFZ6UZyqFPVLQ/feedshare-shrink_800/B4EZ6uGkR.IMAc-/0/1781037418110?e=1784160000&v=beta&t=Hu2xTy3gGu-4uf36rT-QCJ5U6H9vCiOshkjEvdeXzx0","is_article":false,"article_url":null,"article_title":null,"article_description":null,"is_video":false,"video_url":null,"has_image":true,"reaction_count":11,"reaction_types":"LIKE, INTEREST, ENTERTAINMENT","repost_count":1,"impression_count":1864,"source":"activity"},{"is_my_post":true,"post_urn":"urn:li:activity:7469374096452165633","author_name":"Ravi Evani\n              \n                \n                   \n    \n      \n    \n    \n      \n    \n\n • You","author_profile_url":"https://www.linkedin.com/in/ravievani","author_headline":"Deploying enterprise agents in production / CTO / SWE Leader / GVP @ Publicis Sapient","posted_time":"2026-06-11","posted_hours_ago":336,"posted_time_raw":"2w","post_url":"https://www.linkedin.com/feed/update/urn:li:activity:7469374096452165633","author_profile_image_url":"https://media.licdn.com/dms/image/v2/C4E03AQGNeJRorEd2Nw/profile-displayphoto-shrink_100_100/profile-displayphoto-shrink_100_100/0/1569287114631?e=1784160000&v=beta&t=tJDZC7EXWnlgIIf8kF7fBCajhF-HEgzNXnz_IIkjqW8","post_text":"My new website in 3 steps:\n1. Built a Chrome extension to export my LinkedIn posts into a clean static HTML page.\n2. Uploaded the HTML file to a GitHub repo and served it using GitHub Pages.\n3. Pointed my domain to the GitHub Pages site.","post_image_url":"https://media.licdn.com/dms/image/v2/D4E22AQHF8WiUa4PjJA/feedshare-shrink_800/B4EZ6iMJ95KMAg-/0/1780837557646?e=1784160000&v=beta&t=7HjJnEsbHUURyXcRq5TBKGVxbcL8F2ke6fK86GyVypQ","is_article":false,"article_url":null,"article_title":null,"article_description":null,"is_video":false,"video_url":null,"has_image":true,"reaction_count":59,"reaction_types":"LIKE, PRAISE","comment_count":1,"impression_count":3436,"source":"activity"},{"is_my_post":true,"post_urn":"urn:li:activity:7469027501563043840","author_name":"Ravi Evani\n              \n                \n                   \n    \n      \n    \n    \n      \n    \n\n • You","author_profile_url":"https://www.linkedin.com/in/ravievani","author_headline":"Deploying enterprise agents in production / CTO / SWE Leader / GVP @ Publicis Sapient","posted_time":"2026-06-11","posted_hours_ago":336,"posted_time_raw":"2w","post_url":"https://www.linkedin.com/feed/update/urn:li:activity:7469027501563043840","author_profile_image_url":"https://media.licdn.com/dms/image/v2/C4E03AQGNeJRorEd2Nw/profile-displayphoto-shrink_100_100/profile-displayphoto-shrink_100_100/0/1569287114631?e=1784160000&v=beta&t=tJDZC7EXWnlgIIf8kF7fBCajhF-HEgzNXnz_IIkjqW8","post_text":"Every developer knows the pain of the Figma handoff: you write the CSS, but the designer calls out a 10px alignment drift, mismatched paddings, or shifted margins.\n\nThis leads to tedious manual visual policing and endless correction loops. To solve this, we can give agents \"eyes\" by building a closed-loop self-healing pipeline: borrowing local Chrome tab sessions via CDP, comparing live-rendered DOM previews against Figma mockup references programmatically, and using Multimodal LLMs to auto-correct stylesheets.\n\nHere is a blueprint (w/ agent skill included!) for automating pixel-perfect visual verification.","post_image_url":"https://media.licdn.com/dms/image/v2/D4E12AQFnuUXyH6huoQ/article-cover_image-shrink_600_2000/B4EZ6dOHOMJ4AU-/0/1780754183506?e=1784160000&v=beta&t=-WyM9tSFF7pyUk238BPbKOtKPLXvT_JXrHwPOrtoaAY","is_article":true,"article_url":"https://www.linkedin.com/pulse/figma-to-code-fidelity-automating-pixel-perfect-visual-ravi-evani-oecge","article_title":"","article_description":"","is_video":false,"video_url":null,"has_image":true,"reaction_count":21,"reaction_types":"LIKE, EMPATHY","repost_count":1,"impression_count":2038,"source":"activity"},{"is_my_post":true,"post_urn":"urn:li:activity:7468292476269826050","author_name":"Ravi Evani\n              \n                \n                   \n    \n      \n    \n    \n      \n    \n\n • You","author_profile_url":"https://www.linkedin.com/in/ravievani","author_headline":"Deploying enterprise agents in production / CTO / SWE Leader / GVP @ Publicis Sapient","posted_time":"2026-06-04","posted_hours_ago":504,"posted_time_raw":"3w","post_url":"https://www.linkedin.com/feed/update/urn:li:activity:7468292476269826050","author_profile_image_url":"https://media.licdn.com/dms/image/v2/C4E03AQGNeJRorEd2Nw/profile-displayphoto-shrink_100_100/profile-displayphoto-shrink_100_100/0/1569287114631?e=1784160000&v=beta&t=tJDZC7EXWnlgIIf8kF7fBCajhF-HEgzNXnz_IIkjqW8","post_text":"AI coding agents are great at writing code. But ask them to troubleshoot a live bug, and they can get you stuck.\n\nWhy? Because standard agents lack runtime context. They don't see the live application state, browser consoles, or active database connections. Without this, they guess; which leads to hallucinated fixes, overwritten database rows, or destructive UI regressions.\n\nTo solve this, we built the Agentic Troubleshooting Pipeline >> a secure, self-healing architecture designed to diagnose and repair bugs autonomously, safely, and with full live context.\n\nHere is the system-design blueprint of how we stop AI from breaking things:\n\n1/ The Template-Instance Pattern (Isolation)\nParallel debugging tasks shouldn't pollute your main workspace. We separate core logic from local execution. Bugs are diagnosed in an isolated sandbox (the \"Instance\") that is hydrated only with the exact telemetry needed to hunt down the issue.\n\n2/ Zero-Copy Telemetry (The Sidecar)\nNo more manually copy-pasting terminal logs or Git diffs into a chat window. A background sidecar automatically captures active system logs, state changes, and DevTools output into a unified telemetry packet the moment a bug triggers.\n\n3/ Live Inspection via MCP Standard\nAgents can't \"see\" the UI. By integrating MCP servers (like chrome-devtools), our sandboxed sub-agent can actually interact with the live DOM, trace API bottlenecks, and verify selectors in real time.\n\n4/ Safe-by-Design Guardrails & Security\nAI needs boundaries. We enforce strict \"Safe Resolution Rules\" (e.g., zero data-loss tolerance). By isolating the source (the UI where the bug appears) from the sink (where the data lives), we ensure an agent fixing a layout bug won't accidentally compromise database schema contracts. Plus, zero file writes are executed without explicit human-in-the-loop permission.\n\n5/ The Skills Registry (Reusable Memory)\nThis is the key. Once a fix is verified, the system saves a local \"Skill\" (a reusable Markdown workflow). If that specific failure signature happens again next month, the codebase bypasses the heavy diagnostic loop and self-heals instantly. This builds systems that actively learn from their errors and compile their own local, self-healing manuals.","post_image_url":"https://media.licdn.com/dms/image/v2/D4E22AQFNmBpqna6XsQ/feedshare-shrink_800/B4EZ6S0bmhJMAo-/0/1780579679294?e=1784160000&v=beta&t=QF_czzi7lU1RY7ZwHH3dKSS6SVcQCFq_kGDo5_pRayA","is_article":false,"article_url":null,"article_title":null,"article_description":null,"is_video":false,"video_url":null,"has_image":true,"reaction_count":32,"reaction_types":"LIKE, EMPATHY","comment_count":1,"repost_count":1,"impression_count":1524,"source":"activity"},{"is_my_post":true,"post_urn":"urn:li:activity:7467561619762520065","author_name":"Ravi Evani\n              \n                \n                   \n    \n      \n    \n    \n      \n    \n\n • You","author_profile_url":"https://www.linkedin.com/in/ravievani","author_headline":"Deploying enterprise agents in production / CTO / SWE Leader / GVP @ Publicis Sapient","posted_time":"2026-06-04","posted_hours_ago":504,"posted_time_raw":"3w","post_url":"https://www.linkedin.com/feed/update/urn:li:activity:7467561619762520065","author_profile_image_url":"https://media.licdn.com/dms/image/v2/C4E03AQGNeJRorEd2Nw/profile-displayphoto-shrink_100_100/profile-displayphoto-shrink_100_100/0/1569287114631?e=1784160000&v=beta&t=tJDZC7EXWnlgIIf8kF7fBCajhF-HEgzNXnz_IIkjqW8","post_text":"A highly practical conversation about AI between McDonald's CEO Chris Kempczinski and Google CEO Sundar Pichai at the McDonald's worldwide convention.\n\nSundar made the point that we are still underestimating AI. A high school student can now create work that would have required a professional movie studio not long ago. That means the challenge for large companies is no longer whether they can find AI use cases. McDonald’s and Google can probably identify hundreds. But the right question is: which ones of those matter most?\n\nThat is where prioritization becomes critical. Sundar talked about Google’s discipline around setting ambitious quarterly objectives. The purpose of the objectives is to separate signal from noise, stay anchored to a true north, and remember that there is always a customer on the other side.\n\nThey also discussed the balance between innovation and consistency. In a business like McDonald’s, change cannot break the customer experience. In a business like Google, certain answers (like medical advice for a child) cannot be wrong. So the answer is not to slow everything down. The answer is to create sandboxes: test in controlled environments, learn quickly, and then scale what works.\n\nAnother important theme was leadership. Future leaders will need resilience, because change is now constant. They will also need to be decisive. Large organizations slow down when too many decisions wait for perfect alignment. A useful leadership question is: what ties did I break today?\n\nChris also emphasized clarity. In the AI era, generating content will be easy. The real skill will be organizing an argument, simplifying complexity, and helping people understand what matters.\n\nWhat stood out to me is the human lens they took throughout the discussion. McDonald’s may be operating at massive global scale, but the conversation kept coming back to people: customers, crew members, and employees. AI when used well can help people serve customers at a higher level, make better decisions, and spend more time on the work that requires human judgment.","post_image_url":"https://media.licdn.com/dms/image/v2/D4E22AQGwTJK3cAg1lQ/feedshare-shrink_800/B4EZ6IbuH_KIAc-/0/1780405429611?e=1784160000&v=beta&t=zHq6gcUtcrItEnjje-5S5lmS3ni6hnXpFe5Rpj5y6uo","is_article":false,"article_url":null,"article_title":null,"article_description":null,"is_video":false,"video_url":null,"has_image":true,"reaction_count":51,"reaction_types":"LIKE, EMPATHY","comment_count":2,"repost_count":1,"impression_count":3790,"source":"activity"},{"is_my_post":true,"post_urn":"urn:li:activity:7466990762052792320","author_name":"Ravi Evani\n              \n                \n                   \n    \n      \n    \n    \n      \n    \n\n • You","author_profile_url":"https://www.linkedin.com/in/ravievani","author_headline":"Deploying enterprise agents in production / CTO / SWE Leader / GVP @ Publicis Sapient","posted_time":"2026-06-04","posted_hours_ago":504,"posted_time_raw":"3w","post_url":"https://www.linkedin.com/feed/update/urn:li:activity:7466990762052792320","author_profile_image_url":"https://media.licdn.com/dms/image/v2/C4E03AQGNeJRorEd2Nw/profile-displayphoto-shrink_100_100/profile-displayphoto-shrink_100_100/0/1569287114631?e=1784160000&v=beta&t=tJDZC7EXWnlgIIf8kF7fBCajhF-HEgzNXnz_IIkjqW8","post_text":"We may be heading toward a time where, just like people are expected to complete their work within a 40-hour week, they might also be expected to stay within a weekly AI token allowance. At least, till token costs fall substantially and engineering techniques get better.\n\nAnything beyond that is no longer productivity. It’s token overtime, and someone might ask who approved it.","post_image_url":"https://media.licdn.com/dms/image/v2/D4E22AQFpz6s6ko1-Wg/feedshare-shrink_800/B4EZ6AUh57HQAc-/0/1780269326249?e=1784160000&v=beta&t=Ewe6HQFv01FfXK7xjb8PhCGFDtsaiDOGuu4ClxJNScs","is_article":false,"article_url":null,"article_title":null,"article_description":null,"is_video":false,"video_url":null,"has_image":true,"reaction_count":37,"reaction_types":"LIKE, ENTERTAINMENT","repost_count":1,"impression_count":3744,"source":"activity"},{"is_my_post":true,"post_urn":"urn:li:activity:7466470383467102208","author_name":"Ravi Evani\n              \n                \n                   \n    \n      \n    \n    \n      \n    \n\n • You","author_profile_url":"https://www.linkedin.com/in/ravievani","author_headline":"Deploying enterprise agents in production / CTO / SWE Leader / GVP @ Publicis Sapient","posted_time":"2026-06-04","posted_hours_ago":504,"posted_time_raw":"3w","post_url":"https://www.linkedin.com/feed/update/urn:li:activity:7466470383467102208","author_profile_image_url":"https://media.licdn.com/dms/image/v2/C4E03AQGNeJRorEd2Nw/profile-displayphoto-shrink_100_100/profile-displayphoto-shrink_100_100/0/1569287114631?e=1784160000&v=beta&t=tJDZC7EXWnlgIIf8kF7fBCajhF-HEgzNXnz_IIkjqW8","post_text":"weekend skill: to use ai recursively to write you better prompts for your agents.\n\nfirst, you need to determine the outcome: what exactly the agent must achieve. if you don’t have that clarity, you prompt ai to help define what a successful outcome looks like.\n\nonce the outcome is clear, you need to clarify the intent, i.e. the exact purpose of the agent’s action. if that’s vague, you prompt ai to refine the intent, i.e. what the agent should focus on.\n\nafter intent, you need guardrails, i.e. the boundaries or constraints. if you lack those, you prompt ai to establish what should or shouldn’t happen.\n\nby prompting in that sequence: outcome, then intent, then guardrails, you create a structured chain leading to a complete, actionable prompt.\n\nnow, if you lack context for the outcome, intent, or guardrails, you first prompt ai to help fill that gap.\n\n---\nbut to even do all that, you may need a broader understanding. so, you prompt ai for deeper research. asking questions to get context.\n\nif you even lack that context, then you start at the foundation: pulling from past conversations, notes, or initial sources to guide your research prompt.\n\nonce you gain that context at each step, you circle back and refine the original (outcome, then intent, then guardrails). In short, if context is missing, you prompt backward until you gather what’s needed, then move forward again.\n\n---\n\nthe skill to hone is orchestrating this type of prompt chain to to get to the prompt you finally give your agent to do your task.","post_image_url":null,"is_article":false,"article_url":null,"article_title":null,"article_description":null,"is_video":false,"video_url":null,"has_image":false,"reaction_count":18,"reaction_types":"LIKE","comment_count":2,"repost_count":2,"impression_count":1587,"source":"activity"},{"is_my_post":true,"post_urn":"urn:li:activity:7465574531605118976","author_name":"Ravi Evani\n              \n                \n                   \n    \n      \n    \n    \n      \n    \n\n • You","author_profile_url":"https://www.linkedin.com/in/ravievani","author_headline":"Deploying enterprise agents in production / CTO / SWE Leader / GVP @ Publicis Sapient","posted_time":"2026-05-28","posted_hours_ago":672,"posted_time_raw":"4w","post_url":"https://www.linkedin.com/feed/update/urn:li:activity:7465574531605118976","author_profile_image_url":"https://media.licdn.com/dms/image/v2/C4E03AQGNeJRorEd2Nw/profile-displayphoto-shrink_100_100/profile-displayphoto-shrink_100_100/0/1569287114631?e=1784160000&v=beta&t=tJDZC7EXWnlgIIf8kF7fBCajhF-HEgzNXnz_IIkjqW8","post_text":"Great answers by Publicis Sapient CEO Nigel Vaz in the panel on TIME 100 AI Summit in New York!\n\nWhen asked \"where do you think we would be with AI in 5 years from now\", this is what he said:\n\n\"I think we have not yet seen the conversation move to what is the Uber and the Airbnb of the AI era in the context of real transformation in business.\n\nWe're still focused today on the productivity gains, on the incremental value that we can create, which is perfectly fine given we're so early in this. But for me, I think the conversation, just like it moved from Cisco and infrastructure and browsers in the late 90s, I think we'll move away from talking about AI in the context of compute and models. Those will be assumptions.\n\nThe question will be, what is the business model shift we are enabling in health care, in retail, in transportation? And what are the definitive companies that exist today that will look for needed solutions that are materially different in the next few years or for new companies?\n\nJust like we saw in that comparison in the fact that the dot-com bubble burst in 1999 and 2000, but Airbnb and Uber hadn't been created. And Facebook was a nascent idea in a dorm room. And all of those shifts came after. And I think we're not yet in that. So I hope five years from now, we'll be talking about businesses like that.\"","post_image_url":"https://media.licdn.com/dms/image/v2/D4E22AQHNE7raQte98g/feedshare-shrink_800/B4EZ5sMeLFG0Ac-/0/1779931670241?e=1784160000&v=beta&t=Fa6-nVvI77w4ifKXcCUeWmJEJRYMLWCZF7Qe7WXt2vE","is_article":false,"article_url":null,"article_title":null,"article_description":null,"is_video":false,"video_url":null,"has_image":true,"reaction_count":140,"reaction_types":"LIKE, EMPATHY, PRAISE","repost_count":2,"impression_count":10126,"source":"activity"},{"is_my_post":true,"post_urn":"urn:li:activity:7465394588208517120","author_name":"Ravi Evani\n              \n                \n                   \n    \n      \n    \n    \n      \n    \n\n • You","author_profile_url":"https://www.linkedin.com/in/ravievani","author_headline":"Deploying enterprise agents in production / CTO / SWE Leader / GVP @ Publicis Sapient","posted_time":"2026-05-28","posted_hours_ago":672,"posted_time_raw":"4w","post_url":"https://www.linkedin.com/feed/update/urn:li:activity:7465394588208517120","author_profile_image_url":"https://media.licdn.com/dms/image/v2/C4E03AQGNeJRorEd2Nw/profile-displayphoto-shrink_100_100/profile-displayphoto-shrink_100_100/0/1569287114631?e=1784160000&v=beta&t=tJDZC7EXWnlgIIf8kF7fBCajhF-HEgzNXnz_IIkjqW8","post_text":"How can your hotel's chat bot be better than ChatGPT?\n\nGuests don’t just want conversation; they want execution. An AI that merely spits out a list of local tours is just a slow answering engine. Your agent must have a transactional mandate.\n\nIt shouldn’t just say: \"We recommend the sunset cruise\". It should say: \"There are exactly two spots left on the 5 PM sunset cruise. The weather is perfect. Shall I book it and charge it to your room?\"\n\nThe benefit, and the underlying work to get there is very different.\nArchitect your systems to prioritize workflow execution: querying live inventory, securing reservations, and finalizing logistics, over mere dialogue.\n\nActivities are one of the most emotional parts of the travel experience. In an agentic ecosystem, the experience layer is up for grabs. So build the infrastructure, deploy the agents, and start becoming the operating system for the trip.","post_image_url":null,"is_article":false,"article_url":null,"article_title":null,"article_description":null,"is_video":false,"video_url":null,"has_image":false,"reaction_count":13,"reaction_types":"LIKE","impression_count":800,"source":"activity"},{"is_my_post":true,"post_urn":"urn:li:activity:7464988030542598144","author_name":"Ravi Evani\n              \n                \n                   \n    \n      \n    \n    \n      \n    \n\n • You","author_profile_url":"https://www.linkedin.com/in/ravievani","author_headline":"Deploying enterprise agents in production / CTO / SWE Leader / GVP @ Publicis Sapient","posted_time":"2026-05-28","posted_hours_ago":672,"posted_time_raw":"4w","post_url":"https://www.linkedin.com/feed/update/urn:li:activity:7464988030542598144","author_profile_image_url":"https://media.licdn.com/dms/image/v2/C4E03AQGNeJRorEd2Nw/profile-displayphoto-shrink_100_100/profile-displayphoto-shrink_100_100/0/1569287114631?e=1784160000&v=beta&t=tJDZC7EXWnlgIIf8kF7fBCajhF-HEgzNXnz_IIkjqW8","post_text":"Uber might be onto a zero-CAC flywheel for hotel bookings.\n\nUber doesn't need to buy your attention on Google because they already live on your home screen.\n\nThey solved the \"low-frequency\" travel problem by anchoring its app to high-frequency daily habits. You might only book a hotel twice a year, but you use Uber or Uber Eats weekly to get a ride home, commute to work, or order dinner. That daily utility keeps the app permanently installed and top-of-mind.\n\nAnd for \"high-frequency\" travelers .. Uber doesn't have to wait for you to search for a hotel; they already possess high-intent data. If you schedule an Uber Reserve to the airport for next Friday, the app instantly knows you are traveling. It can dynamically serve you a personalized, highly relevant hotel offer precisely at the moment of need and you might bypass answering engines entirely.\n\nAnd because Uber doesn't have to spend $ on a Google click to get you to look at a hotel, they could pass that saved CAC directly to you or to OTAs (like Expedia that they partner with for hotel inventory), or even the hotels. And perhaps to all three!. Plus it might strengthen the customer lock-in with Uber One.\n\nIn a world where customer acquisition costs are squeezing margins across the travel economy, the winner might be a company that never has to buy the click in the first place. And that might be where Uber is heading to. And I wonder what Gooogle would do about this!","post_image_url":"https://media.licdn.com/dms/image/v2/D4E22AQF3mT5UicmNNg/feedshare-shrink_800/B4EZ5j3DgmHQAc-/0/1779791837512?e=1784160000&v=beta&t=SjpOEPA9Wso1VV3S5SvSb33-0tcagx5nem_8cuUxwm0","is_article":false,"article_url":null,"article_title":null,"article_description":null,"is_video":false,"video_url":null,"has_image":true,"reaction_count":15,"reaction_types":"LIKE, INTEREST, EMPATHY","impression_count":683,"source":"activity"},{"is_my_post":true,"post_urn":"urn:li:activity:7464926399489966081","author_name":"Ravi Evani\n              \n                \n                   \n    \n      \n    \n    \n      \n    \n\n • You","author_profile_url":"https://www.linkedin.com/in/ravievani","author_headline":"Deploying enterprise agents in production / CTO / SWE Leader / GVP @ Publicis Sapient","posted_time":"2026-05-28","posted_hours_ago":672,"posted_time_raw":"4w","post_url":"https://www.linkedin.com/feed/update/urn:li:activity:7464926399489966081","author_profile_image_url":"https://media.licdn.com/dms/image/v2/C4E03AQGNeJRorEd2Nw/profile-displayphoto-shrink_100_100/profile-displayphoto-shrink_100_100/0/1569287114631?e=1784160000&v=beta&t=tJDZC7EXWnlgIIf8kF7fBCajhF-HEgzNXnz_IIkjqW8","post_text":"\"Start change management earlier!\" is the worst advice you can get for deploying AI agents.\n\nThe problem isn't the timeline; it's the entire mental model.\n\nChange management implies your organization already has its sh*t together. It assumes your AI agents will perfectly work in the roles you intended for them. It assumes there a clear playbook just waiting for the people who will work with their agents.\n\nAgentic system development rarely works like that. You shuldn't pretend you have the workflow perfectly mapped out. You are throwing a dynamic agent and a human into the messy real world, and they have to figure out aspects of the new workflow together. In real-time.\n\nA person working with an AI agent might be more like riding a tandem bicycle together. The person and the agent get on the bike and figure out the messy real world together.\n\nThe agent adapts and leans; the person shifts their weight.\nThe person hits a bump; the agent adjusts its pedaling.\n\nYou can't \"manage\" that from the sidelines. The continuous, in-context co-evolution IS the process.\n\nThe work isn't done when the code is pushed. The person and their agent have to find their balance together.","post_image_url":"https://media.licdn.com/dms/image/v2/D4E05AQGRe3JRlTreAA/videocover-high/B4EZ5i.9ewHcBU-/0/1779777134991?e=1783000800&v=beta&t=MG0RDXPhgwbhOloQVUSi8VDyEJK_mOvpDYBqYDqw-FE","is_article":false,"article_url":null,"article_title":null,"article_description":null,"is_video":true,"video_url":"https://media.licdn.com/dms/image/v2/D4E05AQGRe3JRlTreAA/videocover-high/B4EZ5i.9ewHcBU-/0/1779777134991?e=1783000800&v=beta&t=MG0RDXPhgwbhOloQVUSi8VDyEJK_mOvpDYBqYDqw-FE","has_image":true,"reaction_count":14,"reaction_types":"LIKE","impression_count":567,"source":"activity"},{"is_my_post":true,"post_urn":"urn:li:activity:7464231232042627072","author_name":"Ravi Evani\n              \n                \n                   \n    \n      \n    \n    \n      \n    \n\n • You","author_profile_url":"https://www.linkedin.com/in/ravievani","author_headline":"Deploying enterprise agents in production / CTO / SWE Leader / GVP @ Publicis Sapient","posted_time":"2026-05-25","posted_hours_ago":720,"posted_time_raw":"1mo","post_url":"https://www.linkedin.com/feed/update/urn:li:activity:7464231232042627072","author_profile_image_url":"https://media.licdn.com/dms/image/v2/C4E03AQGNeJRorEd2Nw/profile-displayphoto-shrink_100_100/profile-displayphoto-shrink_100_100/0/1569287114631?e=1784160000&v=beta&t=tJDZC7EXWnlgIIf8kF7fBCajhF-HEgzNXnz_IIkjqW8","post_text":"Pragmatic Semantics: Why I have started to prefer maintaining ontologies in Python (over OWL) for agents.\n\nIn multi-agent Systems, agents require a shared semantic understanding of their environment (an ontology) to communicate, negotiate, and coordinate actions. Traditionally, ontologies are maintained in XML-based formats like RDF and OWL. While these work for formal description logic, they introduce significant friction into the live development and execution of agent swarms.\n\nHere is why maintaining ontologies in Python/Pydantic could work better for real-world production systems\n\n1. Unified Agent-Schema contracts: Modern software engineering has moved away from parsing raw schemas at runtime. Instead, we write neutral contracts (like Protobuf/gRPC, OpenAPI/Swagger, or GraphQL schemas) and compile them into native code bindings. Treating OWL as a design contract and translating it into Python Pydantic classes fits this model.\n\n2. Low Latency Swarm Coordination: In complex swarms, agents could dynamically negotiate and resolve conflicts in real time. Running description-logic reasoners on every agent decision could introduce unacceptable latency. Pythonic class execution is measured in milliseconds, preventing agent reasoning loops from stalling.\n\n3. Seamless agent state persistence & DB realities: While semantic graph databases are great for analytics, they are rarely used as the high-throughput, primary transactional databases for live applications. Agents must persist their internal states (goals, intentions, and memory) efficiently. Translating OWL concepts to Python classes makes it simple to map semantic concepts directly to standard SQL tables using ORM tools, keeping database transactions fast and simple while preserving semantic names.\n\nRule of Thumb\nUse OWL/RDF if your primary goal is knowledge integration across enterprise databases (e.g., merging flight data from Delta with airport data from the FAA where schemas differ significantly).\n\nConsider using Python/Pydantic if your primary goal is application logic, agent decision-making, and message contracts where type-safety and execution speed are important.","post_image_url":"https://media.licdn.com/dms/image/v2/D4E22AQFbKDWuvyWIAA/feedshare-shrink_800/B4EZ5XUWkiKMAc-/0/1779581413923?e=1784160000&v=beta&t=qDAKrnh4Rg5GKsmKW_AfPiXD0IWiD7XUr3Q5D0UKqoA","is_article":false,"article_url":null,"article_title":null,"article_description":null,"is_video":false,"video_url":null,"has_image":true,"reaction_count":21,"reaction_types":"LIKE, INTEREST","impression_count":1092,"source":"activity"},{"is_my_post":true,"post_urn":"urn:li:activity:7463266366871982080","author_name":"Ravi Evani\n              \n                \n                   \n    \n      \n    \n    \n      \n    \n\n • You","author_profile_url":"https://www.linkedin.com/in/ravievani","author_headline":"Deploying enterprise agents in production / CTO / SWE Leader / GVP @ Publicis Sapient","posted_time":"2026-05-25","posted_hours_ago":720,"posted_time_raw":"1mo","post_url":"https://www.linkedin.com/feed/update/urn:li:activity:7463266366871982080","author_profile_image_url":"https://media.licdn.com/dms/image/v2/C4E03AQGNeJRorEd2Nw/profile-displayphoto-shrink_100_100/profile-displayphoto-shrink_100_100/0/1569287114631?e=1784160000&v=beta&t=tJDZC7EXWnlgIIf8kF7fBCajhF-HEgzNXnz_IIkjqW8","post_text":"When a company concentrates \"super-ICs\" (e.g. Andrej Karpathy) who have reached the pinnacle of their fields, how do you \"manage\" them? Is management even the right term?\n\nHere are some things to consider for \"managers\" of elite ICs.\n\n1/ Dynamic Alignment: Interests change, especially in a fast-moving field like AI. A super-IC might be obsessed with an idea today and another next month. Constantly mapping those shifting interests to organizational goals keeps them engaged without requiring top-down commands.\n\n2/ Friction Shielding: Elite contributors might get exhausted by \"glue work\" (e.g. scheduling, coordination, political alignment) required to get things done in a large company. Taking this administrative burden off their plates is the ultimate form of support.\n\n3/ Targeting Core Drivers: Some super-ICs might want significance (being part of solving a gritty problem), while others might want growth (learning from other brilliant minds). Customizing their scope around these psychological drivers could be valuable to them.\n\n4/ Zero-Bureaucracy Engineering: Standard corporate practices like rigid sprint cycles or multi-layered approval chains might kill the velocity of a super-IC. Minimizing these guardrails gives them the runway to experiment rapidly.\n\nI wouldn't even call this \"management\"; it's about arranging the right ecosystem. It comes down to setting up personalized conditions that allow these super-ICs to do their best work, while subtly steering their efforts toward the broader mission.","post_image_url":null,"is_article":false,"article_url":null,"article_title":null,"article_description":null,"is_video":false,"video_url":null,"has_image":false,"reaction_count":10,"reaction_types":"LIKE, INTEREST","impression_count":848,"source":"activity"},{"is_my_post":true,"post_urn":"urn:li:activity:7463154501244530688","author_name":"Ravi Evani\n              \n                \n                   \n    \n      \n    \n    \n      \n    \n\n • You","author_profile_url":"https://www.linkedin.com/in/ravievani","author_headline":"Deploying enterprise agents in production / CTO / SWE Leader / GVP @ Publicis Sapient","posted_time":"2026-05-25","posted_hours_ago":720,"posted_time_raw":"1mo","post_url":"https://www.linkedin.com/feed/update/urn:li:activity:7463154501244530688","author_profile_image_url":"https://media.licdn.com/dms/image/v2/C4E03AQGNeJRorEd2Nw/profile-displayphoto-shrink_100_100/profile-displayphoto-shrink_100_100/0/1569287114631?e=1784160000&v=beta&t=tJDZC7EXWnlgIIf8kF7fBCajhF-HEgzNXnz_IIkjqW8","post_text":"Integrating hotels into Uber’s platform could be a big financial move, turning Uber's user base into a high-yield FinTech engine.\n\n1. Creating a large \"Float\" (Zero-Interest Working Capital)\n\nUber collects payment upfront when you book a ride and could do the same when you book a hotel. When they pay the hotel after the stay they can unlock a new massive stream of working capital. While a Uber ride would typically complete in an hour, the hotel booking could happen weeks in advance and Uber would hold the funds in the interim. And Uber could use this float to fund its autonomous vehicle investments without raising a single dollar of external capital.\n\n2. The Foreign Exchange (FX) Money Maker\n\nUber is already a global \"One App\"; you land in foreign countries and immediately open it to get a ride from the airport. By handling the hotel payment as well, Uber steps right into the currency conversion flow. Even adding a small markup on currency conversion fees could translate to millions in pure , high margin profit out of thin air.\n\n3. Unbeatable Customer Acquisition Costs (CAC)\n\nUber doesn't need to buy Google Ads to get you to book a hotel; they already have you opening the app to order food or get to the airport and know your travel patterns. Cross-selling a hotel room to a business traveler who rides with uber could drop the CAC to near-zero.\n\nUltimately, hotels on Uber strategy could end up being about deploying a proven FinTech infrastructure over an existing, highly engaged global user base. It transforms the app into a platform that monetizes time, currency, and orchestration just as much as it monetizes the actual room.","post_image_url":"https://media.licdn.com/dms/image/v2/D4E22AQFexWdcIniT7A/feedshare-shrink_800/B4EZ5JzeNZIIAc-/0/1779354690662?e=1784160000&v=beta&t=9jxuyWH8uWbLjLiwZBMKVypKrTxdU3vhBXN3Prchq5c","is_article":false,"article_url":null,"article_title":null,"article_description":null,"is_video":false,"video_url":null,"has_image":true,"reaction_count":24,"reaction_types":"LIKE, INTEREST","comment_count":1,"impression_count":1141,"source":"activity"},{"is_my_post":true,"post_urn":"urn:li:activity:7462724830849851392","author_name":"Ravi Evani\n              \n                \n                   \n    \n      \n    \n    \n      \n    \n\n • You","author_profile_url":"https://www.linkedin.com/in/ravievani","author_headline":"Deploying enterprise agents in production / CTO / SWE Leader / GVP @ Publicis Sapient","posted_time":"2026-05-25","posted_hours_ago":720,"posted_time_raw":"1mo","post_url":"https://www.linkedin.com/feed/update/urn:li:activity:7462724830849851392","author_profile_image_url":"https://media.licdn.com/dms/image/v2/C4E03AQGNeJRorEd2Nw/profile-displayphoto-shrink_100_100/profile-displayphoto-shrink_100_100/0/1569287114631?e=1784160000&v=beta&t=tJDZC7EXWnlgIIf8kF7fBCajhF-HEgzNXnz_IIkjqW8","post_text":"Who really owns your enterprise intelligence?","post_image_url":"https://media.licdn.com/dms/image/v2/D4E05AQGrH0ucfAQ69Q/videocover-high/B4EZ5DsjJCIwBU-/0/1779252229750?e=1783000800&v=beta&t=yvYIJEiAKlV-VeceLQ8PHHv5n7AbIyLlcxr-nepqDZY","is_article":false,"article_url":null,"article_title":null,"article_description":null,"is_video":true,"video_url":"https://media.licdn.com/dms/image/v2/D4E05AQGrH0ucfAQ69Q/videocover-high/B4EZ5DsjJCIwBU-/0/1779252229750?e=1783000800&v=beta&t=yvYIJEiAKlV-VeceLQ8PHHv5n7AbIyLlcxr-nepqDZY","has_image":true,"reaction_count":21,"reaction_types":"LIKE","impression_count":847,"source":"activity"},{"is_my_post":true,"post_urn":"urn:li:activity:7459577371340337152","author_name":"Ravi Evani\n              \n                \n                   \n    \n      \n    \n    \n      \n    \n\n • You","author_profile_url":"https://www.linkedin.com/in/ravievani","author_headline":"Deploying enterprise agents in production / CTO / SWE Leader / GVP @ Publicis Sapient","posted_time":"2026-05-25","posted_hours_ago":720,"posted_time_raw":"1mo","post_url":"https://www.linkedin.com/feed/update/urn:li:activity:7459577371340337152","author_profile_image_url":"https://media.licdn.com/dms/image/v2/C4E03AQGNeJRorEd2Nw/profile-displayphoto-shrink_100_100/profile-displayphoto-shrink_100_100/0/1569287114631?e=1784160000&v=beta&t=tJDZC7EXWnlgIIf8kF7fBCajhF-HEgzNXnz_IIkjqW8","post_text":"It is likely that agentic commerce will compress travel commissions.\n\nToday, OTAs like Expedia can charge 15% to 30% commissions because they influence discovery, plumbing and price.\n\nAgentic commerce starts to break that. Here is how that could play out.\n\n1. Travel becomes a loss leader for fintech agentic ecosystems\nIn the old model, travel platforms needed high commissions because booking travel was their core business. In the agentic commerce model, travel becomes a feature inside a much larger financial ecosystem.\n\nBanks, card networks, digital wallets, and fintech super-agents do not need to make 20% on a hotel room. They make money through interchange, annual fees, lending, loyalty economics, and consumer lock-in.\n\nSo a Chase, Amex, Apple, Capital One, or Revolut can treat travel as a retention product or an engagement hook. An agent can book the hotel via a financial institution, use the rewards, get a better net price and keep everything inside the consumer's wallet.\n\nThat changes the economics.\n\n2. Hotel inventory becomes agent consumable\n\nOTAs historically had an advantage. Inventory was fragmented. Property systems were messy. Aggregating supply at scale created a moat.\n\nAgentic commerce (e.g UCP)changes that by pushing the industry toward standardized inventory access. Once room availability, rates, restrictions, loyalty rules, and add-ons become accessible on the A2A layer, distribution becomes much easier.\n\nAt that point, many non-travel platforms can become booking surfaces. A conference app can package lodging. A creator can recommend and transact directly. A corporate travel assistant can negotiate inventory in real time.\n\nWith that, the OTA’s plumbing advantage could become less defensible.\n\n3. AI-to-AI negotiation weakens rate parity\n\nThe biggest shift may be pricing itself.\n\nToday, OTAs depend on visible retail rates and contractual rate parity. Hotels are often restricted from publicly offering lower prices elsewhere.\n\nAgentic commerce introduces a different model: private, machine-to-machine negotiation. Your personal AI agent may not simply compare prices on a screen. It may negotiate directly with hotel revenue management systems.\n\nFor example:\n“My traveler has $180 for tonight, prefers downtown, and will book in the next 60 seconds”.\n\nThe hotel’s pricing AI can respond:\n“If I sell this room through an OTA at $200 and pay a 20% commission, I net $160. If I accept the agent’s $180 private bid, I make more”.\n\nThat could be a real threat.\n\nStatic commissions might get replaced by dynamic bid-ask spreads. Public rate parity becomes less relevant when the transaction happens through private, API-based negotiation between agents.\n\nThe hotel does not need to publicly undercut Expedia. It only needs to accept a better net-revenue offer from a verified buyer’s agent.\n\nAs things the OTAs charged for become infrastructure, agentic commerce will begin to compress OTA commissions.","post_image_url":null,"is_article":false,"article_url":null,"article_title":null,"article_description":null,"is_video":false,"video_url":null,"has_image":false,"reaction_count":11,"reaction_types":"LIKE, INTEREST","comment_count":1,"impression_count":402,"source":"activity"},{"is_my_post":true,"post_urn":"urn:li:activity:7459234370281893888","author_name":"Ravi Evani\n              \n                \n                   \n    \n      \n    \n    \n      \n    \n\n • You","author_profile_url":"https://www.linkedin.com/in/ravievani","author_headline":"Deploying enterprise agents in production / CTO / SWE Leader / GVP @ Publicis Sapient","posted_time":"2026-05-25","posted_hours_ago":720,"posted_time_raw":"1mo","post_url":"https://www.linkedin.com/feed/update/urn:li:activity:7459234370281893888","author_profile_image_url":"https://media.licdn.com/dms/image/v2/C4E03AQGNeJRorEd2Nw/profile-displayphoto-shrink_100_100/profile-displayphoto-shrink_100_100/0/1569287114631?e=1784160000&v=beta&t=tJDZC7EXWnlgIIf8kF7fBCajhF-HEgzNXnz_IIkjqW8","post_text":"I see enterprises treating evaluation of agentic coding tools like SaaS. They are evaluating them via feature checklists, generalized vendor bake-offs and rooted in individual vs enterprise productivity.\n\nYou are not buying a discrete tool; you are integrating synthetic cognitive labor into an existing socio-technical enterprise workflow.\n\nRather than evaluating tools, I would suggest a heuristic of \"Thin Skills, Fat Harness\" versus \"Fat Skills, Thin Harness\". It correctly shifts the conversation from \"Which AI writes the best Java?\" to \"How do we engineer the control plane to fit our specific operational reality?\".\n\n1. \"Thin Skills, Fat Harness\" (The Orchestrator-Driven Model)\nIn this scenario, the enterprise needs strict control and standardizes \"how work gets done.\" The Fat Harness (a heavy, opinionated harness) absorbs the bulk of the behaviors.\n\nThe Dynamic: The organization takes all the \"common stuff\" (enterprise design patterns, security gates, testing protocols, compliance checklists, and workflow routing ) and bakes them directly into the harness.\n\nThe Thin Skills: Because the harness dictates the process, the \"skills\" required at the edge (whether from a human or LLM) are relatively thin. The dev doesn't need to figure out how to navigate the enterprise SDLC; they are simply handed a discrete, highly constrained task to execute within a predefined assembly line.\n\nWhere it Fits: This is the \"robust enterprise guardrails\" scenario. It could be vital for highly regulated environments, scaling mixed-maturity teams, or managing fragile legacy codebases. The organization relies on the harness to ensure that no standard is ever skipped.\n\n2. \"Fat Skills, Thin Harness\" (The Edge-Driven Model)\nIn this scenario, the orchestrator steps back. The Thin Harness provides nothing more than flexible scaffolding (perhaps LLM / repository access, environment provisioning, and a communication bus) but it does not dictate the \"how..\n\nThe Dynamic: The heavy lifting of tasks and behaviors is shifted to the edge. The Fat Skills (task decomposition, dynamic problem-solving, determining testing strategies, and applying deep domain expertise) are left entirely up to the devs and the skills they create / direct.\n\nWhere it Fits: This is useful for greenfield development, rapid prototyping, and elite senior engineering pods. In these environments, a heavy orchestrator would act as a bureaucratic bottleneck. The team needs the freedom to let their domain expertise drive emergent, highly customized behaviors.\n\nRandom tool proliferation will never deliver enterprise value because a new tool cannot fix a misaligned operating model. True value is unlocked only when leadership intentionally designs how the orchestration and the tasks interact to fit the reality of the work being done.","post_image_url":null,"is_article":false,"article_url":null,"article_title":null,"article_description":null,"is_video":false,"video_url":null,"has_image":false,"reaction_count":6,"reaction_types":"LIKE","impression_count":485,"source":"activity"},{"is_my_post":true,"post_urn":"urn:li:activity:7458836651902070784","author_name":"Ravi Evani\n              \n                \n                   \n    \n      \n    \n    \n      \n    \n\n • You","author_profile_url":"https://www.linkedin.com/in/ravievani","author_headline":"Deploying enterprise agents in production / CTO / SWE Leader / GVP @ Publicis Sapient","posted_time":"2026-05-25","posted_hours_ago":720,"posted_time_raw":"1mo","post_url":"https://www.linkedin.com/feed/update/urn:li:activity:7458836651902070784","author_profile_image_url":"https://media.licdn.com/dms/image/v2/C4E03AQGNeJRorEd2Nw/profile-displayphoto-shrink_100_100/profile-displayphoto-shrink_100_100/0/1569287114631?e=1784160000&v=beta&t=tJDZC7EXWnlgIIf8kF7fBCajhF-HEgzNXnz_IIkjqW8","post_text":"A team of people (and their DIY AI agents) moving fast in different directions creates more chaos than enterprise value.\n\nRight now, as people build DIY agents (or personal \"teams\" of agents), they are optimizing their specific node in the organizational network.\n\nBut enterprise value isn't created within isolated nodes; it is created in the links: the handoffs, the consensus building, and the collaborative execution.\n\nHere is where isolated \"agentic\" gains break down in real organizations:\n1/ The \"Integration Tax\"\nIf your personal agent drafts a proposal based on your local files, and a colleague's agent critiques it based on a biased set of instructions, you aren't actually collaborating. Your bots are just aggressively misaligned. You inevitably end up acting as the manual API between incompatible agents, spending more time untangling conflicting outputs than you saved through automation.\n\n2/ Contextual Fragmentation\nPersonal agents rely on \"local truth\" (e.g., a single user's inbox). Collaborative work requires shared context. Without it, individual agents operate in divergent alternate realities, leading to hallucinated disagreements over different interpretations of the same patterns.\n\n3/ Action Collisions\nA personal agent's prime directive is to please its user. However, enterprise collaboration constantly requires trade-offs. If your agent is instructed to fiercely protect your calendar for deep work, and my agent is instructed to aggressively schedule a sync to close a deal, the tools will actively work against each other.\n\nTrue enablement is about creating shared ways of working that scale across teams.\n\n1/ A Unified Cognitive Layer\nAgents cannot collaborate if they are using different playbooks. The enterprise requires a centralized knowledge architecture (like an Enterprise Context Graph). When an agent takes action, it must draw from the exact same living system of record as the rest of the org.\n\n2/ Standardized Handoffs\nEnterprise workflows must rely on agents that interact with each other using standardized data contracts. The focus shifts from how fast a task is done to how cleanly the output can be handed off to the next node in the chain.\n\n3/ Process Engineering\nPersonal agents automate stateless tasks (e.g., \"summarize this meeting\"). Shared workflows execute stateful processes (e.g., \"manage the contract from procurement to legal\"). A shared workflow has memory; it knows what happened yesterday, what is required for compliance tomorrow, and who holds the approval authority today.\n\n4/ Systemic Alignment & Governance\nGovernance must be baked into the agents themselves so they respect org boundaries. Their instructions should be aligned to broader business outcomes (e.g., \"optimize for budget\") rather than individual user quirks.","post_image_url":"https://media.licdn.com/dms/image/v2/D4E05AQEvPpBokfWgnQ/videocover-high/B4EZ4McXxYG8BQ-/0/1778325226789?e=1783000800&v=beta&t=npLcDf7zV1JXWItDoyFpDw3pqK2hnjgcwaCm8ZG_638","is_article":false,"article_url":null,"article_title":null,"article_description":null,"is_video":true,"video_url":"https://media.licdn.com/dms/image/v2/D4E05AQEvPpBokfWgnQ/videocover-high/B4EZ4McXxYG8BQ-/0/1778325226789?e=1783000800&v=beta&t=npLcDf7zV1JXWItDoyFpDw3pqK2hnjgcwaCm8ZG_638","has_image":true,"reaction_count":26,"reaction_types":"LIKE","comment_count":1,"impression_count":1057,"source":"activity"},{"is_my_post":true,"post_urn":"urn:li:activity:7458455308206714880","author_name":"Ravi Evani\n              \n                \n                   \n    \n      \n    \n    \n      \n    \n\n • You","author_profile_url":"https://www.linkedin.com/in/ravievani","author_headline":"Deploying enterprise agents in production / CTO / SWE Leader / GVP @ Publicis Sapient","posted_time":"2026-05-25","posted_hours_ago":720,"posted_time_raw":"1mo","post_url":"https://www.linkedin.com/feed/update/urn:li:activity:7458455308206714880","author_profile_image_url":"https://media.licdn.com/dms/image/v2/C4E03AQGNeJRorEd2Nw/profile-displayphoto-shrink_100_100/profile-displayphoto-shrink_100_100/0/1569287114631?e=1784160000&v=beta&t=tJDZC7EXWnlgIIf8kF7fBCajhF-HEgzNXnz_IIkjqW8","post_text":"Optimizing your repo structure for coding agents: How to Speed Up File Identification\n\nIf you’ve recently integrated AI coding agents into your workflow, you might have noticed a recurring issue: sometimes they execute a complex task flawlessly, and other times they wander aimlessly, modifying the wrong files or hallucinating completely new patterns.\n\nWhy does this happen? Because AI agents don't navigate codebases like humans do.\n\nHere’s how to make your codebase \"AI-Native.\"\n\n1. Ditch Layers for Feature-Based Modularity\nThe Problem: Traditional MVC (e.g., `/controllers`, `/models`, `/views`) forces agents to jump across distant directories, exhausting their context windows.\nThe Fix: Group code by feature. Keep `rebooking_api.py`, `rebooking_service.py`, and `rebooking_schema.py` in a single `features/flight_rebooking/` folder.\n\n2. High-Signal Naming\nThe Problem: An agent searching for \"flight rebooking\" will completely miss a file named `ticket_manager.py` or logic dumped in `utils.py`.\nThe Fix: Be painfully literal. Use names that a simple text search will instantly hit, like `error_telemetry.py` or `flight_rebooking.py`.\n\n3. Create a Root \"Map\" File\nThe Problem: Agents blindly guess where boundaries are.\nThe Fix: Maintain a high-level `WORKSPACE_INDEX.md` or `README.md` at the root that explicitly maps the architecture (e.g., *\"Frontend lives in `/web`, APIs in `/api`\"*).\n\n4. Colocate Your Tests\nThe Problem:* Buried tests (`/tests/unit/features/v2/`) get ignored by agents, leading to broken CI pipelines later.\nThe Fix: Place `test_rebooking.py` immediately next to `rebooking.py`. When an agent explores a feature, it instantly learns the testing pattern.\n\n5. Centralized Registries\nThe Problem: If UI components or API routes are registered across 10 different files, the agent won't know how to wire up its newly created feature.\nThe Fix: Use a single, predictable registry (e.g., `command_registry.py`). The agent sees exactly how existing items are imported and registered.\n\n6. Avoid \"God Objects\" and Deep Nesting\nThe Problem: A 5,000-line `app.py` or an 8-level deep path (`src/app/core/v1/...`) breaks shell commands and blows out context limits.\nThe Fix: Keep the directory tree flat. Break massive files into smaller, single-purpose modules so the agent only loads what it needs.\n\nPreparing for AI agents means returning to ruthless organization, extreme modularity, and literal naming. Structure your repository for `grep` and `glob`, and your agents will spend less time searching and more time shipping.\n\nTactically, you could use this post as a prompt to your agent; have this created as a skill and make sure that skill is invoked on the trigger of your choice.","post_image_url":"https://media.licdn.com/dms/image/v2/D4E22AQG48iauNLb2eA/feedshare-shrink_800/B4EZ4HBlGvH0Ac-/0/1778234315801?e=1784160000&v=beta&t=z1DOdcBQQAJROc1H_Uagd6H7DIoHSJsSAHj-BsIdXQY","is_article":false,"article_url":null,"article_title":null,"article_description":null,"is_video":false,"video_url":null,"has_image":true,"reaction_count":11,"reaction_types":"LIKE, INTEREST","comment_count":2,"impression_count":604,"source":"activity"},{"is_my_post":true,"post_urn":"urn:li:activity:7458437813122809857","author_name":"Ravi Evani\n              \n                \n                   \n    \n      \n    \n    \n      \n    \n\n • You","author_profile_url":"https://www.linkedin.com/in/ravievani","author_headline":"Deploying enterprise agents in production / CTO / SWE Leader / GVP @ Publicis Sapient","posted_time":"2026-05-25","posted_hours_ago":720,"posted_time_raw":"1mo","post_url":"https://www.linkedin.com/feed/update/urn:li:activity:7458437813122809857","author_profile_image_url":"https://media.licdn.com/dms/image/v2/C4E03AQGNeJRorEd2Nw/profile-displayphoto-shrink_100_100/profile-displayphoto-shrink_100_100/0/1569287114631?e=1784160000&v=beta&t=tJDZC7EXWnlgIIf8kF7fBCajhF-HEgzNXnz_IIkjqW8","post_text":"The fastest way to lose trust in an AI agent is to make it forget what the user already told it.\n\nIn customer experience, weak memory shows up as repetition. Customers have to explain the same issue multiple times. The AI may not remember prior interactions, unresolved problems, preferences, or account-specific context. This creates frustration and reduces trust.\n\nIn enterprise copilots, the issue is even bigger. A copilot may understand general knowledge, but it often lacks the company’s internal memory: how systems actually work, what decisions were made, which rules matter, who owns what, and what constraints govern the workflow. Without that institutional context, the AI may give answers that sound right but do not fit the company’s reality.\n\nFor long-running workflows, the biggest risk is drift. An agent may start with the right goal, rules, and constraints, but over time those details get compressed, summarized, or partially forgotten. The dangerous part is that the agent may continue operating confidently even after it has lost critical instructions. That creates risk in areas like compliance, customer handling, operations, software delivery, and decision automation.\n\nThis is one of the uncomfortable truths about enterprise AI: an agent that cannot remember reliably cannot be trusted to act reliably.","post_image_url":"https://media.licdn.com/dms/image/v2/D4D22AQEG6fguwZN_yA/feedshare-shrink_800/B4DZ4GxqvAGcAc-/0/1778230145041?e=1784160000&v=beta&t=-dBi-gTBd89Vq97qTnfWPdzB7F3uS6APDnsh56W10GQ","is_article":false,"article_url":null,"article_title":null,"article_description":null,"is_video":false,"video_url":null,"has_image":true,"reaction_count":9,"reaction_types":"LIKE","comment_count":1,"impression_count":695,"source":"activity"},{"is_my_post":true,"post_urn":"urn:li:activity:7457089341979435009","author_name":"Ravi Evani\n              \n                \n                   \n    \n      \n    \n    \n      \n    \n\n • You","author_profile_url":"https://www.linkedin.com/in/ravievani","author_headline":"Deploying enterprise agents in production / CTO / SWE Leader / GVP @ Publicis Sapient","posted_time":"2026-05-25","posted_hours_ago":720,"posted_time_raw":"1mo","post_url":"https://www.linkedin.com/feed/update/urn:li:activity:7457089341979435009","author_profile_image_url":"https://media.licdn.com/dms/image/v2/C4E03AQGNeJRorEd2Nw/profile-displayphoto-shrink_100_100/profile-displayphoto-shrink_100_100/0/1569287114631?e=1784160000&v=beta&t=tJDZC7EXWnlgIIf8kF7fBCajhF-HEgzNXnz_IIkjqW8","post_text":"Airline disruption recovery is one of the hardest operating problems in travel.\n\nA single delay c
