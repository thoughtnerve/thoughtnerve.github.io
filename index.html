ocover-low/B4DZnv_h9nIEBM-/0/1760668041964?e=1781233200&v=beta&t=1ZaFxm8vbDsdJGd0iA0uh8RDWOztVGCdff5NtmgfAGU"},{"article_description":"","article_title":"","article_url":"","author_headline":"TPM- Global Tech Platforms, Walmart I Strategic Program Leader | AI, Cloud, Resilience | Delivering Modernization at Scale","author_name":"Kavita Jammalamadaka","author_profile_image_url":"https://media.licdn.com/dms/image/v2/D5603AQHrB7-C6Mi5KA/profile-displayphoto-shrink_100_100/profile-displayphoto-shrink_100_100/0/1712545468804?e=1768435200&v=beta&t=jUH0oiVqQOZeliZK0lsoj0mRJmqROhQsaYrF36stW_s","author_profile_url":"https://www.linkedin.com/in/kavita-jammalamadaka","category":"#N/A","comment_count":0,"impression_count":0,"isDeleted":false,"is_article":false,"is_my_post":true,"is_video":false,"post_image_url":"https://media.licdn.com/dms/image/v2/D5622AQH4u14H594nqQ/feedshare-shrink_800/B56ZmjDtWOJ0Ag-/0/1759377286782?e=1768435200&v=beta&t=4zRRLJCx28uqQXGqfyfDSV6jqGJCh0rW1Ujhx7z7OXg","post_text":"Micro-reset, macro-impact.A surprise visit from my brother reminded me that balance matters. After dinner, we stopped at Pints of Joy (Sunnyvale) for ice cream—a small but joyful pause in a busy week. In our careers, celebrating small wins isn’t fluff; it’s fuel. What’s one small win you’ll celebrate this week?Ravi Evani Pints of Joy hashtag#Wellbeing hashtag#WorkLifeBalance hashtag#BayArea hashtag#Sunnyvale","post_url":"https://www.linkedin.com/feed/update/urn:li:activity:7379363670566318080","post_urn":"urn:li:activity:7379363670566318080","posted_time":"2025-10-29","reaction_count":0,"reaction_types":"","repost_count":0,"scrapedAt":"2025-12-29T13:50:26.118Z","source":"my-posts","video_url":""},{"is_my_post":true,"post_urn":"urn:li:activity:7387106722726703104","author_name":"Ravi Evani\n              \n                \n                   \n    \n      \n    \n    \n      \n    \n\n • You","author_profile_url":"https://www.linkedin.com/in/ravievani","author_headline":"Deploying enterprise agents in production / CTO / SWE Leader / GVP @ Publicis Sapient","posted_time":"2025-10-27","posted_hours_ago":5760,"posted_time_raw":"8mo","post_url":"https://www.linkedin.com/feed/update/urn:li:activity:7387106722726703104","author_profile_image_url":"https://media.licdn.com/dms/image/v2/C4E03AQGNeJRorEd2Nw/profile-displayphoto-shrink_100_100/profile-displayphoto-shrink_100_100/0/1569287114631?e=1784160000&v=beta&t=tJDZC7EXWnlgIIf8kF7fBCajhF-HEgzNXnz_IIkjqW8","post_text":"Don’t let ChatGPT decide which data fields to leverage from your travel products! Do it yourself with an intent catalog--a structured map from traveler intents to the exact product bundles, partner packages, and rules you want the AI agent to use.\n\nWhat’s an “intent catalog”?\n\nA machine‑readable list of traveler intents (e.g., Family City Break, Accessible Weekend, Bleisure with Workspace) published by a travel brand or distribution channel in order to differentiate its products to AI agents.\n\nEach each intent points to a set of data fields that a brand can package its travel products. It contains the :\n\n➜ Required attributes (must‑haves)\n➜ Preferred attributes (nice‑to‑haves + weights)\n➜ Disqualifiers (auto‑no)\n➜ Bundles (rooms + add‑ons + partner packages)\n➜ Rules (pricing fences, guarantees, refund windows)\n➜ Deep links (prefilled booking links for the exact setup)\n\nWhen both humans and AI see a single packaged answer, decision friction drops. Scattered “offers vs details vs packages” pages create churn—for people and agents.\n\nWhat this gives AI agents, answering engines and AI browsers:\n\n➜ Clarity: “Family City Break” returns a ready‑to‑book package, not 20 tabs.\n➜ Control: You set the rules and guarantees; the agent isn’t guessing which fields matter.\n➜ Speed: Deep links prefill dates/guests/rate codes; add‑ons are priced SKUs, not special requests.\n➜ Consistency: The same intent works across website, call center, OTA, and AI agent channels.\n\nBottom Line: Build an intent catalog, package your value at the intent level, and publish it as data. You’ll steer what AI agents promote—and make it easier for human advisors to sell the same, in one view.","post_image_url":"https://media.licdn.com/dms/image/v2/D4E05AQHd2pHcxwJiNQ/videocover-low/B4EZoRGTYiHcB8-/0/1761223468973?e=1783137600&v=beta&t=yFuQTxjfpIOXnDcMuwjMvnoSHwQNPD5v3b15ICb8BBo","is_article":false,"article_url":null,"article_title":null,"article_description":null,"is_video":true,"video_url":"https://media.licdn.com/dms/image/v2/D4E05AQHd2pHcxwJiNQ/videocover-low/B4EZoRGTYiHcB8-/0/1761223468973?e=1783137600&v=beta&t=yFuQTxjfpIOXnDcMuwjMvnoSHwQNPD5v3b15ICb8BBo","has_image":true,"reaction_count":33,"reaction_types":"LIKE","comment_count":2,"impression_count":2265,"source":"activity"},{"is_my_post":true,"post_urn":"urn:li:activity:7386730355589869568","author_name":"Ravi Evani\n              \n                \n                   \n    \n      \n    \n    \n      \n    \n\n • You","author_profile_url":"https://www.linkedin.com/in/ravievani","author_headline":"Deploying enterprise agents in production / CTO / SWE Leader / GVP @ Publicis Sapient","posted_time":"2025-10-27","posted_hours_ago":5760,"posted_time_raw":"8mo","post_url":"https://www.linkedin.com/feed/update/urn:li:activity:7386730355589869568","author_profile_image_url":"https://media.licdn.com/dms/image/v2/C4E03AQGNeJRorEd2Nw/profile-displayphoto-shrink_100_100/profile-displayphoto-shrink_100_100/0/1569287114631?e=1784160000&v=beta&t=tJDZC7EXWnlgIIf8kF7fBCajhF-HEgzNXnz_IIkjqW8","post_text":"hashtag#ChatGPT Atlas browser collapses the trip funnel into the page. Here’s what changes--and what hashtag#Travel and hashtag#Hospitality brands must do now.\n\nExample Guest Intent: \"Weekend in Lisbon, toddler-friendly hotel, walkable to trams, late checkout, EV charging, under €250/night\"\n\n① On-page answers (sidebar reads your page) → Make facts extractable\nWhat changes: Guests see EV chargers, crib policy, late-checkout—without leaving the hotel page.\nDo now: Encode policies in JSON-LD/OTA fields, not prose; keep one canonical facts block (fees, times, capacities); add a “Request crib / Late checkout” deep link the sidebar can draft to.\n\n② Agent mode for multi-step tasks → Treat your site like an API\nWhat changes: Atlas (agents) will start to open several hotels, check rates, compare inclusions, and start checkout for the guest.\nDo now: Ship deep links that prefill dates/guests/rate codes; make add-ons (crib, EV parking, late checkout) bookable SKUs; support rate holds, idempotent cart actions, and clear cancellation fields.\n\n③ Smarter search + tabbed results in one place → Win the compare view\nWhat changes: Users pivot links/images/news inside ChatGPT; weak pages get skipped.\nDo now: Tight titles/meta; machine-readable FAQs (FAQPage), stable IDs, canonical URLs; publish availability/price/policy via feeds so snippets stay accurate; avoid burying key facts behind PDFs or images.\n\n④ Maps & logistics in context → Publish location signals, not adjectives\nWhat changes: Sidebar summarizes walking times, tram proximity, neighborhood trade-offs.\nDo now: Expose lat/lng, nearest lines/stops, typical walk times, accessibility (stroller/step-free), parking rules, EV plugTypes/maxKW/fees. Keep these fields current in property pages and partner feeds.\n\n⑤ Autofill at checkout → Remove every ounce of friction\nWhat changes: Stored addresses, passkeys, and cards shrink form time.\nDo now: Support passkeys + guest checkout; minimize required fields; show full price early (taxes/fees); instant refunds/voids via API; graceful 3-D Secure; clear add-on pricing and inventory guarantees.\n\n⑥ Memory (opt-in) → Be easy to resume\nWhat changes: Atlas resurfaces last-viewed hotels and suggests next steps.\nDo now: Use stable property/room IDs and “resume quote” deep links; keep content consistent (names/images); expose a lightweight quote-state endpoint so sessions can be restored reliably.","post_image_url":"https://media.licdn.com/dms/image/v2/D4E05AQEi8H0oaAh7Jw/videocover-low/B4EZoLwB.VKkCA-/0/1761133748799?e=1783137600&v=beta&t=01MTEfbIivNslLiykOLmpQRoT5pJz3J5-Q6mAtXT9M4","is_article":false,"article_url":null,"article_title":null,"article_description":null,"is_video":true,"video_url":"https://media.licdn.com/dms/image/v2/D4E05AQEi8H0oaAh7Jw/videocover-low/B4EZoLwB.VKkCA-/0/1761133748799?e=1783137600&v=beta&t=01MTEfbIivNslLiykOLmpQRoT5pJz3J5-Q6mAtXT9M4","has_image":true,"reaction_count":11,"reaction_types":"LIKE","comment_count":1,"impression_count":1386,"source":"activity"},{"is_my_post":true,"post_urn":"urn:li:activity:7386148342617088000","author_name":"Ravi Evani\n              \n                \n                   \n    \n      \n    \n    \n      \n    \n\n • You","author_profile_url":"https://www.linkedin.com/in/ravievani","author_headline":"Deploying enterprise agents in production / CTO / SWE Leader / GVP @ Publicis Sapient","posted_time":"2025-10-27","posted_hours_ago":5760,"posted_time_raw":"8mo","post_url":"https://www.linkedin.com/feed/update/urn:li:activity:7386148342617088000","author_profile_image_url":"https://media.licdn.com/dms/image/v2/C4E03AQGNeJRorEd2Nw/profile-displayphoto-shrink_100_100/profile-displayphoto-shrink_100_100/0/1569287114631?e=1784160000&v=beta&t=tJDZC7EXWnlgIIf8kF7fBCajhF-HEgzNXnz_IIkjqW8","post_text":"Resilience is a product and operations choice. The cloud is just the tool.\n\nQuestions to ask your team this week:\n1. Which three user journeys must stay alive during an outage?\n2. What exactly happens (screen by screen) when our primary dependency is down?\n3. What metrics will we review after the next incident to learn, not blame?","post_image_url":null,"is_article":false,"article_url":null,"article_title":null,"article_description":null,"is_video":false,"video_url":null,"has_image":false,"reaction_count":6,"reaction_types":"LIKE","impression_count":832,"source":"activity"},{"is_my_post":true,"post_urn":"urn:li:activity:7385870797682286593","author_name":"Ravi Evani\n              \n                \n                   \n    \n      \n    \n    \n      \n    \n\n • You","author_profile_url":"https://www.linkedin.com/in/ravievani","author_headline":"Deploying enterprise agents in production / CTO / SWE Leader / GVP @ Publicis Sapient","posted_time":"2025-10-27","posted_hours_ago":5760,"posted_time_raw":"8mo","post_url":"https://www.linkedin.com/feed/update/urn:li:activity:7385870797682286593","author_profile_image_url":"https://media.licdn.com/dms/image/v2/C4E03AQGNeJRorEd2Nw/profile-displayphoto-shrink_100_100/profile-displayphoto-shrink_100_100/0/1569287114631?e=1784160000&v=beta&t=tJDZC7EXWnlgIIf8kF7fBCajhF-HEgzNXnz_IIkjqW8","post_text":"Glossy AI keynotes and demos don’t mean much for Travel & Hospitality operations systems. Only reliability matters. Here’s why.\n\nFor a moment, let’s put aside the hype and go straight into the engine room where startups, AI labs, and execs want AI agents to make systems semi-\"autonomous\".\n\nAutonomy isn’t a switch you flip; it’s earned through reliability proven in production, not in a boardroom.\n\nThink of it as the march of nines:\n90%, 99%, 99.9%, 99.99%, 99.999%.\n\nEach step gets exponentially harder because you stop solving common cases and start hunting the rare, ugly ones. Going from 99% to 99.9% means tracking down the one-in-a-thousand mix of a market spike, a stale feed, and a sensor glitch that only shows up when you least expect it.\n\nThat’s why a polished demo tells you very little. In controlled settings, everything works. But operations technology lives in the wild: midnight turnovers, flight diversions, PMS outages, temperature swings, and half-patched devices. The real measure isn’t how smooth the demo runs; it’s how the system holds up when things break.\n\nEarning those nines takes months and often years. Even with AI, that's unlikely to change in the foreseeable future.\n\nYou’ll need synthetic data for edge cases, large-scale simulation for stress, and clear fallbacks for every failure mode. You judge progress with production scorecards: decision accuracy, false action cost, human override rate, and time to safe state. Every “nine” is earned with evidence.\n\nSo yes, show the demo to start a conversation. But don’t mistake it for progress.\n\nIn operations AI, reliability is the product. Everything else is theater.","post_image_url":null,"is_article":false,"article_url":null,"article_title":null,"article_description":null,"is_video":false,"video_url":null,"has_image":false,"reaction_count":21,"reaction_types":"LIKE, EMPATHY","impression_count":1252,"source":"activity"},{"is_my_post":true,"post_urn":"urn:li:activity:7385237045293768704","author_name":"Ravi Evani\n              \n                \n                   \n    \n      \n    \n    \n      \n    \n\n • You","author_profile_url":"https://www.linkedin.com/in/ravievani","author_headline":"Deploying enterprise agents in production / CTO / SWE Leader / GVP @ Publicis Sapient","posted_time":"2025-10-27","posted_hours_ago":5760,"posted_time_raw":"8mo","post_url":"https://www.linkedin.com/feed/update/urn:li:activity:7385237045293768704","author_profile_image_url":"https://media.licdn.com/dms/image/v2/C4E03AQGNeJRorEd2Nw/profile-displayphoto-shrink_100_100/profile-displayphoto-shrink_100_100/0/1569287114631?e=1784160000&v=beta&t=tJDZC7EXWnlgIIf8kF7fBCajhF-HEgzNXnz_IIkjqW8","post_text":"How does a 3-star beat a 5-star hotel for a business traveler? Hint: It's not AI, It's this shower test:\n\nA well-lit shower.\nTaps you don’t need a scientist to figure out.\nStrong hot water pressure to wake you up.\nA non-slip mat so you can stand without fear.\nBig, legible labels on the dispensers to see through the mist.\nAnd a hook with easy access to a dry towel.\n\nDesign matters. Basics done right beat eloquent chatbots or AI concierges. They remove friction, save time, and add a spring to your step.\n\nSome have nailed this. Check the comment for my pick. Who else deserves a mention?","post_image_url":"https://media.licdn.com/dms/image/v2/D4E22AQHXauCs5ex8tA/feedshare-shrink_800/B4EZn2h7H8HgAg-/0/1760777721073?e=1784160000&v=beta&t=79RtmdWTywUT6Ool2QhZRXT6aqOB2e-l2SHuAT2nENA","is_article":false,"article_url":null,"article_title":null,"article_description":null,"is_video":false,"video_url":null,"has_image":true,"reaction_count":52,"reaction_types":"LIKE, EMPATHY, INTEREST","comment_count":17,"impression_count":16279,"source":"activity"},{"is_my_post":true,"post_urn":"urn:li:activity:7384126679687909376","author_name":"Ravi Evani\n              \n                \n                   \n    \n      \n    \n    \n      \n    \n\n • You","author_profile_url":"https://www.linkedin.com/in/ravievani","author_headline":"Deploying enterprise agents in production / CTO / SWE Leader / GVP @ Publicis Sapient","posted_time":"2025-10-27","posted_hours_ago":5760,"posted_time_raw":"8mo","post_url":"https://www.linkedin.com/feed/update/urn:li:activity:7384126679687909376","author_profile_image_url":"https://media.licdn.com/dms/image/v2/C4E03AQGNeJRorEd2Nw/profile-displayphoto-shrink_100_100/profile-displayphoto-shrink_100_100/0/1569287114631?e=1784160000&v=beta&t=tJDZC7EXWnlgIIf8kF7fBCajhF-HEgzNXnz_IIkjqW8","post_text":"\"Sit here if you've ever said what scared you\" was written on the big red chair at the hashtag#Learnfinity 3-day AI learning event at our Publicis Sapient Bengaluru office. Rakesh and I, of course, took the seat.\n\nFacing fear isn’t always about cliff-dives. Most days it’s smaller: speaking up in a group, doing that push-up, trying a new tool, or reaching out to someone unfamiliar.\n\nHere’s the paradox: in our comfort zone we feel more inertia and fear of change. In “survival mode,” the fear disappears because the brain prioritizes action. But living in survival mode isn’t sustainable--and it isn’t calm.\n\nSo what actually works? Doing the thing, and then doing a little more of the thing.\n\nMost everyday fear isn’t existential; it’s a mix of boredom, uncertainty, mild discomfort, or fear of disappointing ourselves. The antidote is motion. Take the smallest possible step, then let that step become your new baseline—your new comfort zone. Repeat.\n\nProgress works like this:\n\nStart tiny. One rep. One new prompt. Stand up and speak once.\nStabilize. Keep it there, repeat daily until it feels normal.\nRatchet. Nudge it up slightly; let that become the new normal.\nRepeat. Baselines rise; fear falls.\n\nWeek to week, it can feel like “not much is happening.” Over a couple of years, the compounding is obvious. The baseline you stand on keeps climbing, and what once felt scary becomes automatic.","post_image_url":"https://media.licdn.com/dms/image/v2/D4E22AQHoQbFQBOQyuA/feedshare-shrink_800/B4EZnmwFTIKcAg-/0/1760512989178?e=1784160000&v=beta&t=PFTWt5qqV6YhluZ5ZZdMlWRToij3NH1asgzp_bJp0KY","is_article":false,"article_url":null,"article_title":null,"article_description":null,"is_video":false,"video_url":null,"has_image":true,"reaction_count":221,"reaction_types":"LIKE, EMPATHY, INTEREST","comment_count":4,"repost_count":4,"impression_count":30232,"source":"activity"},{"is_my_post":true,"post_urn":"urn:li:activity:7383933171274260481","author_name":"Ravi Evani\n              \n                \n                   \n    \n      \n    \n    \n      \n    \n\n • You","author_profile_url":"https://www.linkedin.com/in/ravievani","author_headline":"Deploying enterprise agents in production / CTO / SWE Leader / GVP @ Publicis Sapient","posted_time":"2025-10-27","posted_hours_ago":5760,"posted_time_raw":"8mo","post_url":"https://www.linkedin.com/feed/update/urn:li:activity:7383933171274260481","author_profile_image_url":"https://media.licdn.com/dms/image/v2/C4E03AQGNeJRorEd2Nw/profile-displayphoto-shrink_100_100/profile-displayphoto-shrink_100_100/0/1569287114631?e=1784160000&v=beta&t=tJDZC7EXWnlgIIf8kF7fBCajhF-HEgzNXnz_IIkjqW8","post_text":"How Hoteliers Can Stand Out to AI Agents\n\nTL;DR: Humans love stories; but AI agents need data. So turn your brand promise into structured facts and publish them consistently.\n\nThe playbook (in 3 steps)\n① Codify your promise as fields\n② Replace adjectives with attributes (e.g., connectingRoomsGuaranteed: true).\n③ Publish everywhere machines look\n\nOne example: Family City Break\nWhat the guest asks an agent: “Two adults + two kids, under $200/night, near the aquarium, late checkout, EV charger.”\n\nTurn the brand differentiation into fields\n\nMust-haves (eligibility):\n➜ connectingRoomsGuaranteed: true or roomLayout in [\"1BR\",\"2BR\"]\ncribsAvailable: true • stepFreeAccess: true • poolLifeguardOnDuty: true\n\nNice-to-haves (boosts):\n➜ distanceToAttractionMeters \u003c= 1500 • wifiMinThroughputMbps >= 100\nquietRoomScore >= 8 • evChargers.count >= 2 • lateCheckoutGuaranteed: \"14:00\"\n\nMake your story legible to machines first--so you evantually reach the human who books. That's the new way.","post_image_url":"https://media.licdn.com/dms/image/v2/D4E05AQGwuQ3XCcrHLQ/videocover-low/B4EZnj___sKkCQ-/0/1760466841971?e=1783137600&v=beta&t=j2yWe4cJuArD-Aty7L_Wyg17onxWkkgI0Bet6B3rLmg","is_article":false,"article_url":null,"article_title":null,"article_description":null,"is_video":true,"video_url":"https://media.licdn.com/dms/image/v2/D4E05AQGwuQ3XCcrHLQ/videocover-low/B4EZnj___sKkCQ-/0/1760466841971?e=1783137600&v=beta&t=j2yWe4cJuArD-Aty7L_Wyg17onxWkkgI0Bet6B3rLmg","has_image":true,"reaction_count":54,"reaction_types":"LIKE, INTEREST","comment_count":4,"repost_count":2,"impression_count":3428,"source":"activity"},{"is_my_post":true,"post_urn":"urn:li:activity:7381841742548856832","author_name":"Ravi Evani\n              \n                \n                   \n    \n      \n    \n    \n      \n    \n\n • You","author_profile_url":"https://www.linkedin.com/in/ravievani","author_headline":"Deploying enterprise agents in production / CTO / SWE Leader / GVP @ Publicis Sapient","posted_time":"2025-10-27","posted_hours_ago":5760,"posted_time_raw":"8mo","post_url":"https://www.linkedin.com/feed/update/urn:li:activity:7381841742548856832","author_profile_image_url":"https://media.licdn.com/dms/image/v2/C4E03AQGNeJRorEd2Nw/profile-displayphoto-shrink_100_100/profile-displayphoto-shrink_100_100/0/1569287114631?e=1784160000&v=beta&t=tJDZC7EXWnlgIIf8kF7fBCajhF-HEgzNXnz_IIkjqW8","post_text":"Rethinking Travel & Hospitality (or any) Apps in the Age of Ambient AI Intelligence\n\nTraditionally, apps have been designed with their own little islands of persistence. They remember what you did last time, they store your settings, and they respond to explicit intents you set. But now, we’re moving into a paradigm where the app is living inside a larger, contextually rich intelligence layer, like a ChatGPT environment, that already knows a lot about you and your ongoing needs.\n\nExample: Booking Travel Within a Conversation\nImagine you’re casually discussing a vacation idea. You’re chatting away, exploring destinations, and then you just say, “Hey, book that.” If the app is merely a standalone tool, it will only know what you explicitly told it. But if it’s tapping into a broader intelligence that remembers the entire conversation history, your preferences, and even past trips, it can personalize that booking with minimal steps.\n\nPersonalization Through Larger Context\nThis is the real magic: personalization at scale. Instead of relying on a tiny slice of user data, you’re drawing on a much broader pool of context. The app can pull in (or get pushed) your travel history, your chat history, and even other apps’ insights to shape a seamless, context-rich experience. It’s about letting the intelligence flow like a river, allowing apps to communicate and share context naturally rather than forcing users to repeatedly input data.\n\nThe New Paradigm: Context Engineering and Beyond\nThis shift is about a whole new layer of engineering. We’ll need to think about how we engineer the context itself—how we build bridges between these pockets of intelligence and let apps seamlessly tap into them. It’s a design and engineering challenge, but it opens up possibilities that are fundamentally more fluid and personal than anything we’ve done before.","post_image_url":"https://media.licdn.com/dms/image/v2/D4E22AQF4hHYgA4TsQw/feedshare-shrink_800/B4EZnGR8VLKYAg-/0/1759968217554?e=1784160000&v=beta&t=2jGgoUmqy1zm4fQ6SOhYKyUMP1f7FpBjWqArSUk4M4g","is_article":false,"article_url":null,"article_title":null,"article_description":null,"is_video":false,"video_url":null,"has_image":true,"reaction_count":16,"reaction_types":"LIKE, INTEREST","comment_count":3,"impression_count":1751,"source":"activity"},{"is_my_post":true,"post_urn":"urn:li:activity:7381443030387417088","author_name":"Ravi Evani\n              \n                \n                   \n    \n      \n    \n    \n      \n    \n\n • You","author_profile_url":"https://www.linkedin.com/in/ravievani","author_headline":"Deploying enterprise agents in production / CTO / SWE Leader / GVP @ Publicis Sapient","posted_time":"2025-10-27","posted_hours_ago":5760,"posted_time_raw":"8mo","post_url":"https://www.linkedin.com/feed/update/urn:li:activity:7381443030387417088","author_profile_image_url":"https://media.licdn.com/dms/image/v2/C4E03AQGNeJRorEd2Nw/profile-displayphoto-shrink_100_100/profile-displayphoto-shrink_100_100/0/1569287114631?e=1784160000&v=beta&t=tJDZC7EXWnlgIIf8kF7fBCajhF-HEgzNXnz_IIkjqW8","post_text":"So OTA apps are moving inside \"Chat\". But hotel brands shouldn't simply follow suit and \"duplicate\" their apps inside ChatGPT. They should ship an agent surface, not a clone.\n\nWhere this is going:\n\n➜ Apps will live inside personal intelligence. Travel agents (the AI kind) will carry your context—budget, loyalty, trip purpose, companions—across apps and pre-filter results before you ask.\n\n➜ Shared context across apps. Calendar, flights, maps, and corporate policy inform the same session. The user’s intent flows; the app is just the surface.\nBeyond text. Voice, map overlays, and interactive components become the primary controls; text is auxiliary.\n\n➜ Shareable “intelligence objects.” Guests (or their corporate agents) can share dietary needs, accessibility preferences, and policy constraints once; every downstream app honors them.\n\nWhat hotels should do now:\n\n➜ Structure your inventory and claims. Amenities, walk times, room attributes, sustainability badges, F&B hours—all as verifiable, machine-readable data.\n\n➜ Expose instant booking and pricing APIs. Support real-time availability, hold/commit flows, and clear cancellation policies.\n\n➜ Publish preference and policy hooks. Accept guest/corporate profiles with consented attributes; return explanations aligned to those inputs.\n\n➜ Instrument for “time-to-shortlist.” Optimize for how fast a qualified guest reaches 3 viable options, not raw search volume.\n\n➜ Invest in agent UX. Build a lightweight agent that sits in this shared-intelligence layer: clarify trade-offs, justify recommendations, and complete the booking.\n\nThink broader than ChatGPT as another channel. Build for the agent layer first--then package that capability as your Chat app.","post_image_url":null,"is_article":false,"article_url":null,"article_title":null,"article_description":null,"is_video":false,"video_url":null,"has_image":false,"reaction_count":15,"reaction_types":"LIKE, INTEREST","comment_count":2,"repost_count":1,"impression_count":2253,"source":"activity"},{"is_my_post":true,"post_urn":"urn:li:activity:7381179624732540928","author_name":"Ravi Evani\n              \n                \n                   \n    \n      \n    \n    \n      \n    \n\n • You","author_profile_url":"https://www.linkedin.com/in/ravievani","author_headline":"Deploying enterprise agents in production / CTO / SWE Leader / GVP @ Publicis Sapient","posted_time":"2025-10-27","posted_hours_ago":5760,"posted_time_raw":"8mo","post_url":"https://www.linkedin.com/feed/update/urn:li:activity:7381179624732540928","author_profile_image_url":"https://media.licdn.com/dms/image/v2/C4E03AQGNeJRorEd2Nw/profile-displayphoto-shrink_100_100/profile-displayphoto-shrink_100_100/0/1569287114631?e=1784160000&v=beta&t=tJDZC7EXWnlgIIf8kF7fBCajhF-HEgzNXnz_IIkjqW8","post_text":"From apps with intelligence → apps inside your intelligence. I used the newly released ChatGPT Figma app to auto‑generate a non‑trivial system diagram.\n\nIt threw a few errors and needed cleanup, but it compressed 2–3 hours of work into ~10 minutes—good enough to iterate on.\n\nSome thoughts come to mind from this experience:\n\n1) High‑fidelity capture → faster creation: We can translate \"rough thoughts\" into \"real structures\" with much higher fidelity than before.\n2) Apps become personal: Because the system already knows your work and preferences, outputs take on your context, producing a more personal “feel”.\n3) From apps with intelligence → apps inside your intelligence: We’re moving from intelligence living inside individual apps to apps living inside a persistent layer of personal intelligence, enabling connected experiences across tools.\n4) Shared context across apps: Inter‑app communication inside ChatGPT means tools can understand the same thread and coordinate toward outcomes, not just features.\n5) Agents travel with you: Your agents persist across contexts and, at enterprise scale, operate within a shared intelligence layer that teams work inside.\n6) Beyond chat UX: Interaction isn’t just text; think interactive, multimodal experiences—voice, vision, and UI components—running on a common “LLM OS” layer.\n7) Apps for humans and agents: Some apps will target people, others will target agents—and we’ll be able to selectively share pieces of our intelligence with collaborators or their agents when needed.","post_image_url":"https://media.licdn.com/dms/image/v2/D4E05AQFWV8abu7eRjQ/videocover-low/B4EZm83gE0KoB4-/0/1759810345228?e=1783137600&v=beta&t=TnTFGYyTRkwQh6TP4632XrnTGxlhZstmLp0h3G-BHgE","is_article":false,"article_url":null,"article_title":null,"article_description":null,"is_video":true,"video_url":"https://media.licdn.com/dms/image/v2/D4E05AQFWV8abu7eRjQ/videocover-low/B4EZm83gE0KoB4-/0/1759810345228?e=1783137600&v=beta&t=TnTFGYyTRkwQh6TP4632XrnTGxlhZstmLp0h3G-BHgE","has_image":true,"reaction_count":19,"reaction_types":"LIKE","comment_count":1,"impression_count":1904,"source":"activity"},{"is_my_post":true,"post_urn":"urn:li:activity:7380631785594068992","author_name":"Ravi Evani\n              \n                \n                   \n    \n      \n    \n    \n      \n    \n\n • You","author_profile_url":"https://www.linkedin.com/in/ravievani","author_headline":"Deploying enterprise agents in production / CTO / SWE Leader / GVP @ Publicis Sapient","posted_time":"2025-10-27","posted_hours_ago":5760,"posted_time_raw":"8mo","post_url":"https://www.linkedin.com/feed/update/urn:li:activity:7380631785594068992","author_profile_image_url":"https://media.licdn.com/dms/image/v2/C4E03AQGNeJRorEd2Nw/profile-displayphoto-shrink_100_100/profile-displayphoto-shrink_100_100/0/1569287114631?e=1784160000&v=beta&t=tJDZC7EXWnlgIIf8kF7fBCajhF-HEgzNXnz_IIkjqW8","post_text":"Cult UI (https://pro.cult-ui.com/) is doing something interesting--selling copy-paste, full-stack “Blocks” that live in your repo. For travel and hospitality (T&H) teams building agentic user interfaces, that matters.\n\nWe’ve chased “LEGO for software” for years, but it never stuck in this industry. Every airline, hotel, and OTA claimed unicorn requirements—fare families, room types, ancillaries, loyalty tiers—which pushed teams to fork frameworks and rebuild. Old accelerators were either too opinionated or too thin, and the integration tax wiped out any speed you gained.\n\nBlocks + AI prompts change the equation. With contract-first components (clear props/DTOs, events, side-effects) you compose capability instead of forking code. Because blocks are copy-paste and in-repo, prompts can actually do the last-mile work: map intent to a catalog, generate the glue (routing, state, auth), scaffold tests and telemetry, and apply policy checks at compose time.\n\nSchema- and token-driven configs let the AI reshape UI and behavior without exploding variants, while provenance/SBOM and rollout guards keep upgrades predictable.\n\nYou can feel this in real T&H flows. A booking experience becomes a set of composable primitives—date grids, room/fare comparison, add-ons, bundle pricing—stitched to PMS/CRS/GDS and payments. Service recovery moves from bespoke workflows to reusable blocks that detect disruption, apply waivers or room moves, and coordinate guest comms. Loyalty and merchandising become configurable surfaces for points-and-cash, targeted upsell, and status perks. Ops UIs for associates and crew turn into agentic panels that prioritize work, trigger refunds/comp, and close the loop with messaging. Prompts assemble the blocks and drop in the connectors; engineers fine-tune where needed.\n\nThis also creates a new niche: component service providers that sell or rent verticalized blocks—booking cards, ancillaries, loyalty widgets, recovery flows—with SLAs, security attestations, and version support. Around them emerges BlockOps: usage metering, error analytics, assisted upgrades, and AI-tuning data. Expect “catalog curators” who certify compatibility with design systems and PMS/GDS adapters, and who operate prompt-to-assembly pipelines for brands that want speed without lock-in.\n\nIf you are an engineering leader, consider treating blocks as a product surface. Stand up a registry and contracts, wire a prompt library that maps intents to blocks, enforce compose-time policy and tests, and set an upgrade policy (canary, rollback, semver) from day one. Start with one high-leverage flow—service recovery or ancillaries--prove the path, then scale.","post_image_url":"https://media.licdn.com/dms/image/sync/v2/D5627AQFadGcELPAs8Q/articleshare-shrink_480/B56ZbOVetlHgAs-/0/1747218459882?e=1783137600&v=beta&t=vEhsO6Nw76_NY3m47eKL9XMAMog6-G-48lYQ4EJ367A","is_article":true,"article_url":"https://pro.cult-ui.com/blocks","article_title":"Shadcn Blocks – Full-Stack UI Components & Templates | Cult UI Pro","article_description":"Shadcn Blocks – Full-Stack UI Components & Templates | Cult UI Pro\npro.cult-ui.com","is_video":false,"video_url":null,"has_image":true,"reaction_count":20,"reaction_types":"LIKE, INTEREST","comment_count":1,"repost_count":1,"impression_count":2082,"source":"activity"},{"is_my_post":true,"post_urn":"urn:li:activity:7380295227124785153","author_name":"Ravi Evani\n              \n                \n                   \n    \n      \n    \n    \n      \n    \n\n • You","author_profile_url":"https://www.linkedin.com/in/ravievani","author_headline":"Deploying enterprise agents in production / CTO / SWE Leader / GVP @ Publicis Sapient","posted_time":"2025-10-27","posted_hours_ago":5760,"posted_time_raw":"8mo","post_url":"https://www.linkedin.com/feed/update/urn:li:activity:7380295227124785153","author_profile_image_url":"https://media.licdn.com/dms/image/v2/C4E03AQGNeJRorEd2Nw/profile-displayphoto-shrink_100_100/profile-displayphoto-shrink_100_100/0/1569287114631?e=1784160000&v=beta&t=tJDZC7EXWnlgIIf8kF7fBCajhF-HEgzNXnz_IIkjqW8","post_text":"AI answering engines and agents are on the path to transform travel commerce. When travelers ask these agents for recommendations, they are offloading most of their research to the machine--which returns back to them a highly curated shortlist to pick from.\n\nIn this new reality, brands need to resonate with these AI agents at the exact moment of intent: with structured data, verified claims, and instant booking capability.\n\nTo make this possible, travel and hospitality enterprises will need to build their own agents across booking, customer service, operations, and planning. But without a unified intelligence layer--an enterprise \"AI brain\"--these agents will operate as disconnected silos, wreaking havoc.\n\nThis enterprise AI brain must hold institutional knowledge and apply it consistently across every touchpoint. Brand standards, policies, operational data, and customer insights all need to flow through a central intelligence that can orchestrate actions and enable instant purchase at the moment of conversation.\n\nSolutions like Publicis Sapient Bodhi agentic platform are emerging to fill this role--learning business context, connecting it with broader market knowledge, and ensuring coherent decision-making at scale.\n\nThe question isn’t whether AI will reshape travel commerce (that’s inevitable). The real question is whether travel and hospitality enterprises will architect to capture intent at the moment of conversation—consistently and at scale.","post_image_url":"https://media.licdn.com/dms/image/v2/D4E05AQFemgmZlFdGfA/videocover-high/B4EZmwTQd3IkBw-/0/1759599492191?e=1783137600&v=beta&t=EJqwvjL07nLiAld5Rz6qHT1RK7oPRqRU3mbxQRtUbDE","is_article":false,"article_url":null,"article_title":null,"article_description":null,"is_video":true,"video_url":"https://media.licdn.com/dms/image/v2/D4E05AQFemgmZlFdGfA/videocover-high/B4EZmwTQd3IkBw-/0/1759599492191?e=1783137600&v=beta&t=EJqwvjL07nLiAld5Rz6qHT1RK7oPRqRU3mbxQRtUbDE","has_image":true,"reaction_count":61,"reaction_types":"LIKE, EMPATHY, PRAISE","repost_count":5,"impression_count":3342,"source":"activity"},{"is_my_post":true,"post_urn":"urn:li:activity:7378723943953625088","author_name":"Ravi Evani\n              \n                \n                   \n    \n      \n    \n    \n      \n    \n\n • You","author_profile_url":"https://www.linkedin.com/in/ravievani","author_headline":"Deploying enterprise agents in production / CTO / SWE Leader / GVP @ Publicis Sapient","posted_time":"2025-10-27","posted_hours_ago":5760,"posted_time_raw":"8mo","post_url":"https://www.linkedin.com/feed/update/urn:li:activity:7378723943953625088","author_profile_image_url":"https://media.licdn.com/dms/image/v2/C4E03AQGNeJRorEd2Nw/profile-displayphoto-shrink_100_100/profile-displayphoto-shrink_100_100/0/1569287114631?e=1784160000&v=beta&t=tJDZC7EXWnlgIIf8kF7fBCajhF-HEgzNXnz_IIkjqW8","post_text":"Engineers and PMs: traditional app dev is turning into a commodity. Your value is in building AI agents—not competing with them.\n\nShovel vs. excavator: don’t try to out-dig an excavator; design the excavator. As 2026 approaches, this means learning to design, evaluate, and ship agents that pursue goals, call tools, and improve over time. Be the person who builds the agents—the excavators of our field.\n\nWhy? Because:\n➜ Code is becoming cheap; but outcomes aren’t. Scaffolds, templates, and copilots collapse the cost of “just build the feature.” Business impact still needs brains.\n\n➜ Interfaces are moving up-stack. Agents operate on goals and tools, not screens and endpoints.\n\n➜ Ops are the new product. Reliability, evals, cost/latency budgets—this is where real engineering advantage shows.","post_image_url":"https://media.licdn.com/dms/image/v2/D4E05AQF-0ue51G5dbg/videocover-high/B4EZmZ.SMPHgB8-/0/1759224873762?e=1783137600&v=beta&t=Ba0-JGZreN3aDtW4G_c0koqh3_zLEhr_W0vHEF420I4","is_article":false,"article_url":null,"article_title":null,"article_description":null,"is_video":true,"video_url":"https://media.licdn.com/dms/image/v2/D4E05AQF-0ue51G5dbg/videocover-high/B4EZmZ.SMPHgB8-/0/1759224873762?e=1783137600&v=beta&t=Ba0-JGZreN3aDtW4G_c0koqh3_zLEhr_W0vHEF420I4","has_image":true,"reaction_count":51,"reaction_types":"LIKE, INTEREST, EMPATHY","comment_count":3,"repost_count":1,"impression_count":3148,"source":"activity"},{"article_description":"","article_title":"","article_url":"","author_headline":"Client Executive - Travel & Hospitality","author_name":"Shiladitya (Adi) Ghosh\n              \n                \n                   • 1st","author_profile_image_url":"https://media.licdn.com/dms/image/v2/D4E03AQGecA2459rq-w/profile-displayphoto-shrink_100_100/B4EZS_dzZ8GwAU-/0/1738379049698?e=1782345600&v=beta&t=O8zqOBqbaOCCjHGJByFi0sFluNdRbHRW3e7QbcnUTmc","author_profile_url":"https://www.linkedin.com/in/shiladitya-adi-ghosh-4b938714","category":"#N/A","comment_count":2,"impression_count":0,"isDeleted":false,"is_article":false,"is_my_post":true,"is_video":false,"post_image_url":"https://media.licdn.com/dms/image/v2/D4E22AQF3Bq3E9PFBeg/feedshare-shrink_800/B4EZmiDNIBKgAg-/0/1759360374670?e=1782345600&v=beta&t=vJRlxcZdwgO1iiqNYKwrCBpAnPQxK1_ZGGybEsYlht8","post_text":"What a phenomenal turn out at Destination.ai - I had the opportunity of attending last year as well - and the general sentiment was this one year has been truly transformative.\n\nNazpari Aydin and her team have done an outstanding job of getting the best minds in hospitality to engage and share their thoughts on the rapidly changing AI landscape.\n\nI had the privilege of introducing Ravi Evani's session around how agents sit between brands and guests and what organizations should do to start preparing. The call outs on the criticality of ingesting social and operational data were extremely insightful.\n\nThe Tony's chocolates were a hit, and it was great hanging out with Michele Meyers Jay Odum, PMP Nitin Sood Gopakumar Menon Stephanie Stewart, PMP, POPM, SP, SDP Lokesh Merupula\n\nShoutout to our team Natalie Marshall Michela Fiorentino Lucas and RJ Jain for helping with the prep work!!\n\nPublicis Sapient at Destination AI Forum","post_url":"https://www.linkedin.com/feed/update/urn:li:activity:7379330518275788800","post_urn":"urn:li:activity:7379330518275788800","posted_time":"2025-10-05","reaction_count":146,"reaction_types":"LIKE, PRAISE, EMPATHY","repost_count":2,"scrapedAt":"2026-06-05T02:46:48.196Z","source":"my-posts","video_url":""},{"article_description":"","article_title":"","article_url":"","author_headline":"People Strategy | Organizational Development | Talent & Leadership | Change Management | AI & Workforce Transformation | Technology Industry","author_name":"Laura Correal Orjuela\n              \n                \n                   \n    \n    \n\n • 1st","author_profile_image_url":"https://media.licdn.com/dms/image/v2/D4E03AQHPAhgNZYCvfw/profile-displayphoto-scale_100_100/B4EZmMlyRVKsAc-/0/1759000340495?e=1782345600&v=beta&t=HwpUXP59Qn0SiYDu70idjyX7lx7e5GijnrosnOnhEl4","author_profile_url":"https://www.linkedin.com/in/laura-correal-orjuela-89734439","category":"#N/A","comment_count":0,"impression_count":0,"isDeleted":false,"is_article":false,"is_my_post":true,"is_video":false,"post_image_url":"https://media.licdn.com/dms/image/v2/D4E22AQGELd8eLCK6xA/feedshare-shrink_800/B4EZmWOvSZIoAg-/0/1759162070820?e=1782345600&v=beta&t=T9ZW4cVxoLUEP6JUWBkmtp7Qu9NiD6mlE_7HlylathM","post_text":"A few weeks ago, we hosted our hashtag#PublicisSapient AI Caravan in Costa Rica with 130+ people from our tech community joining on a Saturday!\n\n💡Note: More to come in North America & in 2026 calendar in LATAM.\n\nAbout the event:\n- One of the highlights was having Ravi as our keynote speaker, inspiring us to keep pushing boundaries in AI.\n- We ran breakout rooms at different levels to ensure knowledge is truly democratized.\n\nProud to see how hashtag#PublicisSapient is leading the way in AI and creating spaces where everyone can learn, connect, and grow.\n\nThank you David Montero Maikol Zumbado Natalia Botero Penagos Daniela Cortés & Nicole Dodero for leading this major project for our Region! And thank you to all the engagers supporting the project Ian Stevens and others. Kudos to Jurgen Azofeifa Flores Mario Jose H. Mauricio Bustamante Saenz our speakers.\n\nhashtag#AICARAVAN hashtag#LearningMindset hashtag#PublicisSapient hashtag#GeneLatam hashtag#Transformation","post_url":"https://www.linkedin.com/feed/update/urn:li:activity:7378476326007054336","post_urn":"urn:li:activity:7378476326007054336","posted_time":"2025-10-05","reaction_count":78,"reaction_types":"LIKE, EMPATHY, PRAISE","repost_count":1,"scrapedAt":"2026-06-05T02:46:48.196Z","source":"my-posts","video_url":""},{"article_description":"","article_title":"","article_url":"","author_headline":"Executive Admin & Marketing Professional at Publicis Sapient","author_name":"Nicole Dodero","author_profile_image_url":"https://media.licdn.com/dms/image/v2/D4E03AQG0a8soA4l2nw/profile-displayphoto-shrink_100_100/profile-displayphoto-shrink_100_100/0/1718316862534?e=1769040000&v=beta&t=TJMG6KZblisYjL61f5hQ81JA7JJDvoxOKc7biWRvfTs","author_profile_url":"https://www.linkedin.com/in/nicoledodero","category":"#N/A","comment_count":0,"impression_count":0,"isDeleted":false,"is_article":false,"is_my_post":true,"is_video":false,"post_image_url":"https://media.licdn.com/dms/image/v2/D4E22AQH4X9KppZAA2A/feedshare-shrink_800/B4EZmI3c98GcAg-/0/1758937866405?e=1769040000&v=beta&t=nsv_zUny-9m7MYNzOUuejWiPYhh9QAxrL1OVNuD5SPE","post_text":"Last Saturday, we hosted our biggest AI workshop yet for Publicis Sapient LATAM with incredible speakers!\n\nSeeing months of effort come to life and create real impact here in Costa Rica is what makes our job so rewarding. :)\n\nGrateful to the amazing team that made it happen — and excited to keep the conversation on AI going! 💫","post_url":"https://www.linkedin.com/feed/update/urn:li:activity:7377754926526914560","post_urn":"urn:li:activity:7377754926526914560","posted_time":"2025-10-01","reaction_count":0,"reaction_types":"","repost_count":0,"scrapedAt":"2025-12-31T12:46:01.596Z","source":"my-posts","video_url":""},{"is_my_post":true,"post_urn":"urn:li:activity:7377081566415450112","author_name":"Ravi Evani\n              \n                \n                   \n    \n      \n    \n    \n      \n    \n\n • You","author_profile_url":"https://www.linkedin.com/in/ravievani","author_headline":"Deploying enterprise agents in production / CTO / SWE Leader / GVP @ Publicis Sapient","posted_time":"2025-09-27","posted_hours_ago":6480,"posted_time_raw":"9mo","post_url":"https://www.linkedin.com/feed/update/urn:li:activity:7377081566415450112","author_profile_image_url":"https://media.licdn.com/dms/image/v2/C4E03AQGNeJRorEd2Nw/profile-displayphoto-shrink_100_100/profile-displayphoto-shrink_100_100/0/1569287114631?e=1784160000&v=beta&t=tJDZC7EXWnlgIIf8kF7fBCajhF-HEgzNXnz_IIkjqW8","post_text":"🚀 Thrilled to be speaking at Destination AI 2025 Hospitality Summit on Sep 30 in Washington DC!\n\nAI agents are fast becoming the “gatekeepers” of travel — deciding which hotels, airlines, and experiences make it onto a traveler’s shortlist.\n\nIn my session, I’ll dive into how travel and hospitality brands can:\n\n✅ Stay visible to AI agents\n✅ Build trust so they get recommended\n✅ Capture demand in this new agent-led marketplace\n\nThe future of brand choice won’t just be about winning over people — it’s about winning over the AI agents making decisions for them. 🤖\n\nPublicis Sapient hashtag#DestinationAI (https://lnkd.in/etsCMmN8)","post_image_url":"https://media.licdn.com/dms/image/v2/D4E22AQFTu2t0aV9waA/feedshare-shrink_800/B4EZmCojyxKgAg-/0/1758833303631?e=1784160000&v=beta&t=Rkp56OdgfjJsRY9JdUjE1TqNvSBR2p8ax65oJ7F8K7M","is_article":false,"article_url":null,"article_title":null,"article_description":null,"is_video":false,"video_url":null,"has_image":true,"reaction_count":95,"reaction_types":"LIKE, PRAISE, EMPATHY","comment_count":2,"impression_count":3262,"source":"activity"},{"is_my_post":true,"post_urn":"urn:li:activity:7376778979409821696","author_name":"Ravi Evani\n              \n                \n                   \n    \n      \n    \n    \n      \n    \n\n • You","author_profile_url":"https://www.linkedin.com/in/ravievani","author_headline":"Deploying enterprise agents in production / CTO / SWE Leader / GVP @ Publicis Sapient","posted_time":"2025-09-27","posted_hours_ago":6480,"posted_time_raw":"9mo","post_url":"https://www.linkedin.com/feed/update/urn:li:activity:7376778979409821696","author_profile_image_url":"https://media.licdn.com/dms/image/v2/C4E03AQGNeJRorEd2Nw/profile-displayphoto-shrink_100_100/profile-displayphoto-shrink_100_100/0/1569287114631?e=1784160000&v=beta&t=tJDZC7EXWnlgIIf8kF7fBCajhF-HEgzNXnz_IIkjqW8","post_text":"Think of \"Bring Your Own (BYO) Agents\" as your Iron Man suit.\n\nYou bring your agent with you, and it makes you more powerful. Everywhere you go, it goes--lightening your load, sharpening decisions, and giving you time back.\n\nHonored to spend some time with the McDonald's DevSecOps COE this week. We discussed a build-your-own agent method for engineering leaders—one that could help you watch DevOps / engineering maturity across hundreds of programs and tell you where to focus next (quality, speed, value, ways of working) and how to go about it, before issues hit the roadmap.\n\nA quick playbook to build your first \"Engineering Management\" agent:\n\n➥ Pick one weekly decision. e.g., which teams need coaching, where to invest, which services are at risk.\n\n➥ Wire up 2–3 sources. Jira/ADO, CI/CD, incidents/observability. Start small.\n\n➥ Define 5–7 signals. Lead time, CFR, defect escape, build health, SLO drift, WIP, unplanned work.\n\n➥ Give the agent a job. “Rank by risk, explain why, propose the smallest action to move the metric.”\n\n➥ Set guardrails. Cost per run, latency budget, data scope, traceability of recommendations.\n\n➥ Close the loop weekly. Review → accept/adjust → the agent learns what “good” looks like.\n\nBest advice: start building. Pick one area, ship a v0, and you’ll quickly gain traction—and value.\n\nThanks to Swarnalakshmi Devarapalli and Matilda Jayakar for inviting Amit Sharma and myself to speak at their Offsite. Great to see leaders like them cross-pollinate knowledge into their teams!","post_image_url":"https://media.licdn.com/dms/image/v2/D4E05AQGCA2pyiYG4rQ/videocover-high/B4EZl.VXY2HoB8-/0/1758761157102?e=1783137600&v=beta&t=Ju1218ggkd7RFXRRXX2AfSImlOJhpkWq7IQo9BzuQLw","is_article":false,"article_url":null,"article_title":null,"article_description":null,"is_video":true,"video_url":"https://media.licdn.com/dms/image/v2/D4E05AQGCA2pyiYG4rQ/videocover-high/B4EZl.VXY2HoB8-/0/1758761157102?e=1783137600&v=beta&t=Ju1218ggkd7RFXRRXX2AfSImlOJhpkWq7IQo9BzuQLw","has_image":true,"reaction_count":75,"reaction_types":"LIKE, EMPATHY, INTEREST","comment_count":1,"repost_count":1,"impression_count":4581,"source":"activity"},{"is_my_post":true,"post_urn":"urn:li:activity:7375687168628858880","author_name":"Ravi Evani\n              \n                \n                   \n    \n      \n    \n    \n      \n    \n\n • You","author_profile_url":"https://www.linkedin.com/in/ravievani","author_headline":"Deploying enterprise agents in production / CTO / SWE Leader / GVP @ Publicis Sapient","posted_time":"2025-09-27","posted_hours_ago":6480,"posted_time_raw":"9mo","post_url":"https://www.linkedin.com/feed/update/urn:li:activity:7375687168628858880","author_profile_image_url":"https://media.licdn.com/dms/image/v2/C4E03AQGNeJRorEd2Nw/profile-displayphoto-shrink_100_100/profile-displayphoto-shrink_100_100/0/1569287114631?e=1784160000&v=beta&t=tJDZC7EXWnlgIIf8kF7fBCajhF-HEgzNXnz_IIkjqW8","post_text":"\"AI is moving fast. What should we be learning?\"\nIn a recent \"Ask Me Anything\" at Publicis Sapient LATAM w/Maikol, Natalia, Esteban, Karen and Daniela, we dug in to this question.\n\nThree takeaways:\n\n➜ Learn to manage AI.\nTreat AI like a junior teammate: set direction, provide context, give examples, and assess whether it’s on track. Course-correct early and often.\n\n➜ Clarity in ⇒ Clarity out.\nThe quality of the response mirrors the clarity of the request. Be explicit about goal, constraints, and the tone you want back.\n\n➜ Be the adult in the room.\nAI can be confident—and glib. Apply common sense. Verify claims, check sources, and decide what to keep, edit, or discard. Do NOT outsource your judgement to AI.\n\nAI raises the bar on leadership and communication. If we can steer well, communicate clearly, and judge wisely, we’ll get compounding value!","post_image_url":"https://media.licdn.com/dms/image/v2/D4E22AQFcw8wdGs402g/feedshare-shrink_800/B4EZlu0XlEHIAg-/0/1758500852137?e=1784160000&v=beta&t=vfojvhPkVHi6dH9qv8s_GD1kiS5VkTmuVx8QAIRL3AM","is_article":false,"article_url":null,"article_title":null,"article_description":null,"is_video":false,"video_url":null,"has_image":true,"reaction_count":157,"reaction_types":"LIKE, PRAISE, EMPATHY","comment_count":2,"repost_count":3,"impression_count":28167,"source":"activity"},{"is_my_post":true,"post_urn":"urn:li:activity:7371231767208292352","author_name":"Ravi Evani\n              \n                \n                   \n    \n      \n    \n    \n      \n    \n\n • You","author_profile_url":"https://www.linkedin.com/in/ravievani","author_headline":"Deploying enterprise agents in production / CTO / SWE Leader / GVP @ Publicis Sapient","posted_time":"2025-09-27","posted_hours_ago":6480,"posted_time_raw":"9mo","post_url":"https://www.linkedin.com/feed/update/urn:li:activity:7371231767208292352","author_profile_image_url":"https://media.licdn.com/dms/image/v2/C4E03AQGNeJRorEd2Nw/profile-displayphoto-shrink_100_100/profile-displayphoto-shrink_100_100/0/1569287114631?e=1784160000&v=beta&t=tJDZC7EXWnlgIIf8kF7fBCajhF-HEgzNXnz_IIkjqW8","post_text":"🚀 I’m excited to announce that I’ll be speaking at AI Caravan: Engineering Edition, hosted by Publicis Sapient in partnership with GDG Pura Vida in Costa Rica!\n\n📅 Saturday, September 20\n📍 Costa Rica Convention Center\n⏰ 8:30 AM – 2:30 PM\n✨ Don’t miss it — sign up here: https://lnkd.in/eZV8xESY\n\nI’ll be leading a session on our AI Products: Sapient Slingshot Bodhi, Sustain AI and Core AI. Most importantly, we’ll discuss the mindset we need to adopt to leverage our own technology and ride this AI wave that’s reshaping the world around us!\n\nAI Caravan is a dynamic learning experience designed to spark curiosity, build confidence, and turn AI into something truly useful in our day-to-day engineering work.\n\nJoin us to explore hands-on AI workshops, connect with peers, and discover how to put AI to work with purpose.","post_image_url":"https://media.licdn.com/dms/image/v2/D4E22AQGjQOZYeCv1CA/feedshare-shrink_800/B4EZkvgNVOKgAk-/0/1757438602513?e=1784160000&v=beta&t=QClsNfmCnYPMDzi0fasqJ_wFL9tFKdRcgewWOG51txE","is_article":false,"article_url":null,"article_title":null,"article_description":null,"is_video":false,"video_url":null,"has_image":true,"reaction_count":190,"reaction_types":"LIKE, PRAISE, EMPATHY","comment_count":1,"repost_count":11,"impression_count":6097,"source":"activity"},{"is_my_post":true,"post_urn":"urn:li:activity:7370271830143705088","author_name":"Ravi Evani\n              \n                \n                   \n    \n      \n    \n    \n      \n    \n\n • You","author_profile_url":"https://www.linkedin.com/in/ravievani","author_headline":"Deploying enterprise agents in production / CTO / SWE Leader / GVP @ Publicis Sapient","posted_time":"2025-09-27","posted_hours_ago":6480,"posted_time_raw":"9mo","post_url":"https://www.linkedin.com/feed/update/urn:li:activity:7370271830143705088","author_profile_image_url":"https://media.licdn.com/dms/image/v2/C4E03AQGNeJRorEd2Nw/profile-displayphoto-shrink_100_100/profile-displayphoto-shrink_100_100/0/1569287114631?e=1784160000&v=beta&t=tJDZC7EXWnlgIIf8kF7fBCajhF-HEgzNXnz_IIkjqW8","post_text":"What to pair with your LLMs to build always-on insights agents for Marketers\n\nLLMs are great conversational interfaces. But an always-on insights agent for Marketing needs more than clever text generation. It needs supporting models that detect, forecast, optimize, and retrieve information in real time.\n\nWhy Pairing Models Matters\nLLMs give you a friendly interface: summaries, answers, recommendations.\nThe supporting stack ensures the insights are always-on, reliable, and actionable for marketers:\n➜ Detection models spot change\n➜ Forecasting models see ahead\n➜ Optimization models suggest what to do\n➜ Retrieval models ground answers in facts\n\nWrap them with compliance guardrails and you move from “AI that talks” to AI that works as a marketing analyst on call, 24/7.\n\nHere’s a breakdown of the core agents marketers need, what they do, and the model types (with example HF models, links in comments) that bring them to life.\n\n1. Live Market and Customer Alerts\nAgent role: Continuously monitors signals like competitor moves, customer activity, or campaign anomalies, and turns them into alerts you can actually use.\n\nModel pairings:\n➜ Event & anomaly detection: flag sudden spikes or drops. Try AutonLab/MOMENT-1-large, a foundation model for time-series anomaly and forecasting.\n➜ Entity recognition/linking: identify brand, product, or competitor names in noisy text. Try dbmdz/bert-large-cased-finetuned-conll03-english.\n\n2. Trend Forecasting\nAgent role: Projects demand, engagement, or customer sentiment into the future — and separates real shifts from seasonal blips.\n\nModel pairings:\n➜ Time-series forecasting: predict what’s next. Try amazon/chronos-t5-large, built for flexible forecasting tasks.\n\n➜ Causal/seasonal decomposition: explain why a trend is happening, not just the curve. Often implemented with classical decomposition or causal ML libraries.\n\n3. Real-Time Tactic Recommendations\nAgent role: Monitors campaigns in flight and suggests changes: reallocating budget, adjusting bids, or shifting audience mix.\n\nModel pairings:\n➜ Contextual bandits: learn the best option in real time. Check the Decision Transformer family for reinforcement-learning style policies.\n\n➜ Uplift modeling: estimate the incremental impact of a tactic. Commonly built with EconML or custom LightGBM models.\n\n➜ Rule-based guardrails: ensure outputs respect compliance and brand rules.\n\n4. Competitive & Consumer Intelligence\nAgent role: Tracks competitors and consumer sentiment to guide message, positioning, and creative decisions.\n\nModel pairings:\n➜ Sentiment & emotion classification – detect tone across social streams. Try cardiffnlp/twitter-roberta-base-sentiment-latest.\n\n➜ Topic clustering: group discussions into themes. Use all-MiniLM-L6-v2 embeddings with clustering (e.g., k-means, HDBSCAN).\n\n➜ Trend forecasting – apply the same Chronos-T5 models to project where sentiment is heading.","post_image_url":null,"is_article":false,"article_url":null,"article_title":null,"article_description":null,"is_video":false,"video_url":null,"has_image":false,"reaction_count":23,"reaction_types":"LIKE, INTEREST, EMPATHY","comment_count":2,"impression_count":1725,"source":"activity"},{"is_my_post":true,"post_urn":"urn:li:activity:7364066847303901184","author_name":"Ravi Evani\n              \n                \n                   \n    \n      \n    \n    \n      \n    \n\n • You","author_profile_url":"https://www.linkedin.com/in/ravievani","author_headline":"Deploying enterprise agents in production / CTO / SWE Leader / GVP @ Publicis Sapient","posted_time":"2025-08-27","posted_hours_ago":7200,"posted_time_raw":"10mo","post_url":"https://www.linkedin.com/feed/update/urn:li:activity:7364066847303901184","author_profile_image_url":"https://media.licdn.com/dms/image/v2/C4E03AQGNeJRorEd2Nw/profile-displayphoto-shrink_100_100/profile-displayphoto-shrink_100_100/0/1569287114631?e=1784160000&v=beta&t=tJDZC7EXWnlgIIf8kF7fBCajhF-HEgzNXnz_IIkjqW8","post_text":"I’m hiring multiple Data Engineers proficient in Scala, who can leverage AI tools to build mission critical Scala applications. Location: India: BLR or Gurgaon. If that's you, pls. apply or refer if interested. Thank you!","post_image_url":"https://media.licdn.com/dms/image/v2/D4E05AQGrems7ajISfA/videocover-high/B4EZjJrpEqHICI-/0/1755730345436?e=1783137600&v=beta&t=5GWmvwMACHirg0qGgAGRTevQNzrZhDryupUCQXCU6pU","is_article":false,"article_url":null,"article_title":null,"article_description":null,"is_video":true,"video_url":"https://media.licdn.com/dms/image/v2/D4E05AQGrems7ajISfA/videocover-high/B4EZjJrpEqHICI-/0/1755730345436?e=1783137600&v=beta&t=5GWmvwMACHirg0qGgAGRTevQNzrZhDryupUCQXCU6pU","has_image":true,"reaction_count":45,"reaction_types":"LIKE, EMPATHY, APPRECIATION","comment_count":2,"repost_count":2,"impression_count":5158,"source":"activity"},{"is_my_post":true,"post_urn":"urn:li:activity:7362614641539043328","author_name":"Ravi Evani\n              \n                \n                   \n    \n      \n    \n    \n      \n    \n\n • You","author_profile_url":"https://www.linkedin.com/in/ravievani","author_headline":"Deploying enterprise agents in production / CTO / SWE Leader / GVP @ Publicis Sapient","posted_time":"2025-08-27","posted_hours_ago":7200,"posted_time_raw":"10mo","post_url":"https://www.linkedin.com/feed/update/urn:li:activity:7362614641539043328","author_profile_image_url":"https://media.licdn.com/dms/image/v2/C4E03AQGNeJRorEd2Nw/profile-displayphoto-shrink_100_100/profile-displayphoto-shrink_100_100/0/1569287114631?e=1784160000&v=beta&t=tJDZC7EXWnlgIIf8kF7fBCajhF-HEgzNXnz_IIkjqW8","post_text":"When people say: \"now anyone can build an app\", I think back to blogger: \"now anyone can publish\", or youtube: \"now anyone can make a movie\".\n\nContent multiplied, attention got scarce, and the real work shifted to curation--deciding what was worth reading or watching. Because ... well, not all content produced by \"anyone who can create\" is of great quality and fits the need of the audience.\n\nAI is on the same path. The next wave is app curation. With the volume and nuance of AI apps, feature-comparison spreadsheets won’t scale for enterprises.\n\nWhat changes for enterprises:\n➺ Decisions move from “buy on features” to prove fit in your environment.\n➺ Deployability and interoperability become first-class requirements.\n➺ Try → measure → keep or discard becomes the default motion, because there’s always another option.\n\nWhat enterprises (especially large ones) should build: an App Curation Factory:\n➺ Standard landing zones to deploy any app in hours/days: identity/SSO, data access, logging, secrets, networking.\n➺ Evaluation harness with KPIs: security posture, latency/throughput, accuracy, cost per transaction, supportability.\n➺ Lightweight procurement and a scoring rubric so teams can decide fast without chaos.\n➺ Internal marketplace to publish “approved, ready-to-run” apps with config templates.\n\nCuration metrics:\n• Time to Try (TTT)\n• Time to First Value (TTFV)\n• Cost to Try (CTT)\n• Integration debt (adapters, data workarounds)\n• Disposition rate (kept vs. discarded at 30/60/90 days)\n\nFor developers targeting the enterprise: building an app—or a SaaS isn’t enough. The advantage shifts to those who can deploy, evaluate, integrate, or walk away quickly and cheaply. Build the curation muscle, not just more apps.","post_image_url":null,"is_article":false,"article_url":null,"article_title":null,"article_description":null,"is_video":false,"video_url":null,"has_image":false,"reaction_count":42,"reaction_types":"LIKE, INTEREST, PRAISE","comment_count":3,"repost_count":1,"impression_count":3125,"source":"activity"},{"is_my_post":true,"post_urn":"urn:li:activity:7360983416101650432","author_name":"Ravi Evani\n              \n                \n                   \n    \n      \n    \n    \n      \n    \n\n • You","author_profile_url":"https://www.linkedin.com/in/ravievani","author_headline":"Deploying enterprise agents in production / CTO / SWE Leader / GVP @ Publicis Sapient","posted_time":"2025-08-27","posted_hours_ago":7200,"posted_time_raw":"10mo","post_url":"https://www.linkedin.com/feed/update/urn:li:activity:7360983416101650432","author_profile_image_url":"https://media.licdn.com/dms/image/v2/C4E03AQGNeJRorEd2Nw/profile-displayphoto-shrink_100_100/profile-displayphoto-shrink_100_100/0/1569287114631?e=1784160000&v=beta&t=tJDZC7EXWnlgIIf8kF7fBCajhF-HEgzNXnz_IIkjqW8","post_text":"Been experimenting with Chrome's new Prompt API gives the power of running and accessing on device models like Google Nano, right inside the browser.\n\nIt's honestly incredible what you can do with AI that runs entirely on your device. Instead of sending your questions or documents to some server, Gemini Nano processes everything locally on the computer. This means you can ask it to help with anything—summarize a confidential work document, draft a personal email, or answer questions about a webpage you're reading—without worrying about your data being stored or seen by anyone else.\n\nPretty cool shift from how we usually think about AI tools.","post_image_url":"https://media.licdn.com/dms/image/v2/D4D05AQFdzYXTifkKcg/videocover-high/B4DZid3XIdGQCU-/0/1754995200021?e=1783137600&v=beta&t=8ODqCi96fLAQlKNmS_xzdxyLzOmrgkROJ0DnhzWpXk0","is_article":false,"article_url":null,"article_title":null,"article_description":null,"is_video":true,"video_url":"https://media.licdn.com/dms/image/v2/D4D05AQFdzYXTifkKcg/videocover-high/B4DZid3XIdGQCU-/0/1754995200021?e=1783137600&v=beta&t=8ODqCi96fLAQlKNmS_xzdxyLzOmrgkROJ0DnhzWpXk0","has_image":true,"reaction_count":32,"reaction_types":"LIKE, INTEREST","comment_count":2,"impression_count":2050,"source":"activity"},{"is_my_post":true,"post_urn":"urn:li:activity:7360437792218173440","author_name":"Ravi Evani\n              \n                \n                   \n    \n      \n    \n    \n      \n    \n\n • You","author_profile_url":"https://www.linkedin.com/in/ravievani","author_headline":"Deploying enterprise agents in production / CTO / SWE Leader / GVP @ Publicis Sapient","posted_time":"2025-08-27","posted_hours_ago":7200,"posted_time_raw":"10mo","post_url":"https://www.linkedin.com/feed/update/urn:li:activity:7360437792218173440","author_profile_image_url":"https://media.licdn.com/dms/image/v2/C4E03AQGNeJRorEd2Nw/profile-displayphoto-shrink_100_100/profile-displayphoto-shrink_100_100/0/1569287114631?e=1784160000&v=beta&t=tJDZC7EXWnlgIIf8kF7fBCajhF-HEgzNXnz_IIkjqW8","post_text":"Plot twist: canceled },{"is_my_post":true,"post_urn":"urn:li:activity:7359032343921131520","author_name":"Ravi Evani\n              \n                \n                   \n    \n      \n    \n    \n      \n    \n\n • You","author_profile_url":"https://www.linkedin.com/in/ravievani","author_headline":"Deploying enterprise agents in production / CTO / SWE Leader / GVP @ Publicis Sapient","posted_time":"2025-08-27","posted_hours_ago":7200,"posted_time_raw":"10mo","post_url":"https://www.linkedin.com/feed/update/urn:li:activity:7359032343921131520","author_profile_image_url":"https://media.licdn.com/dms/image/v2/C4E03AQGNeJRorEd2Nw/profile-displayphoto-shrink_100_100/profile-displayphoto-shrink_100_100/0/1569287114631?e=1784160000&v=beta&t=tJDZC7EXWnlgIIf8kF7fBCajhF-HEgzNXnz_IIkjqW8","post_text":"My 9:25PM ORD→EWR flight just upgraded itself to an early 9:00 p.m. departure—25 minutes faster than physics allows. We are supposed to board in 15 mins but there’s no gate number. I even got a “flight is leaving early” text message. Congrats?\n\nNot AI hallucination, just a scheduling “technology issue”.\n\nLesson: whenever your systems start rewriting reality, add:\n1. Audit trails. Know who changed what and why.\n2. Sanity checks. Cross-verify with source data, not UI copy.\n3. Human in the loop. Let people catch the “unbelievable” before it reaches users.\n\nEven a smart board needs a reality check. I think it’s gonna be a long night.","post_image_url":"https://media.licdn.com/dms/image/v2/D4E22AQGlMTjdaB7UHQ/feedshare-shrink_800/B4EZiCI6odGUAg-/0/1754530033683?e=1784160000&v=beta&t=gQLTzukQbWacnCAIsY5yatgCzKdxc54ZuVLcMnvu0cQ","is_article":false,"article_url":null,"article_title":null,"article_description":null,"is_video":false,"video_url":null,"has_image":true,"reaction_count":59,"reaction_types":"LIKE, ENTERTAINMENT, INTEREST","comment_count":6,"impression_count":10838,"source":"activity"},{"is_my_post":true,"post_urn":"urn:li:activity:7358474392915386369","author_name":"Ravi Evani\n              \n                \n                   \n    \n      \n    \n    \n      \n    \n\n • You","author_profile_url":"https://www.linkedin.com/in/ravievani","author_headline":"Deploying enterprise agents in production / CTO / SWE Leader / GVP @ Publicis Sapient","posted_time":"2025-08-27","posted_hours_ago":7200,"posted_time_raw":"10mo","post_url":"https://www.linkedin.com/feed/update/urn:li:activity:7358474392915386369","author_profile_image_url":"https://media.licdn.com/dms/image/v2/C4E03AQGNeJRorEd2Nw/profile-displayphoto-shrink_100_100/profile-displayphoto-shrink_100_100/0/1569287114631?e=1784160000&v=beta&t=tJDZC7EXWnlgIIf8kF7fBCajhF-HEgzNXnz_IIkjqW8","post_text":"My Current AI Coding Workflow: The core method is Human thinker➜AI thinker➜AI maker➜AI checker➜Human Checker.\n\n1. Take a vision, feature, or functionality idea and ask a good thinking model to create a plan.\n2. Switch to another thinking model to review the plan, suggest bugs, point out edge cases, and add considerations.\n3. Switch to a good instruction following model to apply those changes to the plan, ask it to include testable milestones.\n4. Have the instruction following model turn the plan into a checklist, broken into phases.\n5. Use a thinking model to order the checklist by order of dependencies—starting with backend functionality, then moving to UX.\n6. Switch to a good instruction-following model to implement each checklist item, stopping when something is testable. I ask the model to check off the items in the plan as they are implemented.\n7. Switch to a thinking model review the plan against the code, find bugs, but not to make any fixes yet\n8. Ask the thinking model to find the root cause of the bugs and document them into the plan, but not to make any code changes\n9. Switch to a good instruction-following model to implement all fixes.\n10. Pick a fresh thinking model to run a security review acting as a security tester.\n11. Run a performance review with fresh thinking model to find latency, concurrency, and caching opportunities, then ask it to update the plan without making any code changes\n12. Use a good instruction-following model to implement all security and performance fixes.\n\nI repeat the process until the entire application, feature, or vision is complete.","post_image_url":null,"is_article":false,"article_url":null,"article_title":null,"article_description":null,"is_video":false,"video_url":null,"has_image":false,"reaction_count":30,"reaction_types":"LIKE, INTEREST","comment_count":8,"impression_count":2684,"source":"activity"},{"is_my_post":true,"post_urn":"urn:li:activity:7357809073578250240","author_name":"Ravi Evani\n              \n                \n                   \n    \n      \n    \n    \n      \n    \n\n • You","author_profile_url":"https://www.linkedin.com/in/ravievani","author_headline":"Deploying enterprise agents in production / CTO / SWE Leader / GVP @ Publicis Sapient","posted_time":"2025-08-27","posted_hours_ago":7200,"posted_time_raw":"10mo","post_url":"https://www.linkedin.com/feed/update/urn:li:activity:7357809073578250240","author_profile_image_url":"https://media.licdn.com/dms/image/v2/C4E03AQGNeJRorEd2Nw/profile-displayphoto-shrink_100_100/profile-displayphoto-shrink_100_100/0/1569287114631?e=1784160000&v=beta&t=tJDZC7EXWnlgIIf8kF7fBCajhF-HEgzNXnz_IIkjqW8","post_text":"How To Make Gemini's \"Thinking Budget\" Work for You\n\nIf you're working with Google's new Gemini models, you've probably heard about \"thinking budgets\"—a powerful feature that lets you control the model's reasoning process. But how do you move beyond the basics and use them effectively in a real-world application?\n\nA thinking budget is simply a parameter that controls how much internal reasoning the model can perform before giving an answer. Not leveraging the thinking budget for Gemini queries is inefficient. You don't want it to waste time and compute by reasoning over and over for a simple query. At the same time, you want it to take the compute and time it needs to satisfactorily resolve complex ones. A good approach is to leverage its thinking budget feature and dynamically match the model's reasoning power to the query's complexity.\n\nHere is a two-step LLM process we used to classify a natural language powered data analysis application and assign an appropriate thinking budget for the task at hand.\n\nThe Four Weight Classes of Queries\n\nFirst, define four categories for your tasks, each with a corresponding budget strategy.\n\n① Featherweight: For simple, factual lookups.\n➜ Budget: `0` (for Gemini Flash) or the lowest possible fixed value.\n\n② Lightweight: For straightforward queries that require minimal reasoning.\n➜ Budget: A low, fixed budget (e.g., `1024` tokens).\n\n③ Middleweight: The default for standard requests that need detailed responses.\n➜ Budget: A moderate, fixed budget (e.g., `4096` tokens).\n\n④ Heavyweight: For your most complex problems, multi-step tasks, or for handling user corrections.\n➜ Budget: An adaptive budget (`-1`) to allow for maximum reasoning.\n\nYour 3-Step Implementation Plan\n\nThis two-call method: a quick call to classify, followed by a well-resourced call to execute ensures you're always using the right amount of power for the job, creating a more responsive and cost-effective application.\n\nStep 1: Classify the Query with a Scoping Call: Make an initial, low-cost LLM call (e.g., to Gemini Flash Lite) with a specific prompt designed to classify the user's request into one of the four weight classes. The sole purpose of this call is to determine the complexity of the task ahead.\n\nStep 2: Assign the Budget: Based on the classification returned from the first call (e.g., \"Middleweight\"), select the corresponding thinking budget from your framework.\n\nStep 3: Execute the Main Task: Make the second, primary LLM call to your main model (e.g., Gemini Pro) using the user's original query and the dynamically assigned thinking budget.","post_image_url":"https://media.licdn.com/dms/image/v2/D4E05AQEdxIZEUx5M9g/videocover-high/B4EZhwwUq7GoCI-/0/1754238376375?e=1783137600&v=beta&t=KzQjNVgWJM-Dee9EByGQVXE_n-bYN4U5PkMPQaPoeI0","is_article":false,"article_url":null,"article_title":null,"article_description":null,"is_video":true,"video_url":"https://media.licdn.com/dms/image/v2/D4E05AQEdxIZEUx5M9g/videocover-high/B4EZhwwUq7GoCI-/0/1754238376375?e=1783137600&v=beta&t=KzQjNVgWJM-Dee9EByGQVXE_n-bYN4U5PkMPQaPoeI0","has_image":true,"reaction_count":12,"reaction_types":"LIKE, EMPATHY","comment_count":2,"impression_count":854,"source":"activity"},{"is_my_post":true,"post_urn":"urn:li:activity:7357045054944804864","author_name":"Ravi Evani\n              \n                \n                   \n    \n      \n    \n    \n      \n    \n\n • You","author_profile_url":"https://www.linkedin.com/in/ravievani","author_headline":"Deploying enterprise agents in production / CTO / SWE Leader / GVP @ Publicis Sapient","posted_time":"2025-08-27","posted_hours_ago":7200,"posted_time_raw":"10mo","post_url":"https://www.linkedin.com/feed/update/urn:li:activity:7357045054944804864","author_profile_image_url":"https://media.licdn.com/dms/image/v2/C4E03AQGNeJRorEd2Nw/profile-displayphoto-shrink_100_100/profile-displayphoto-shrink_100_100/0/1569287114631?e=1784160000&v=beta&t=tJDZC7EXWnlgIIf8kF7fBCajhF-HEgzNXnz_IIkjqW8","post_text":"Here's how to build context engineering into your content supply chain to generate high quality AI creative that consistently align to your brand standards:\n\nA good context-engineering system behaves like an orchestration layer between marketers and the model: it grabs exactly the right inputs, packages them cleanly, and learns from every interaction. Build these pieces, and your AI will deliver creative that’s on-brief, on-brand, and worth using.\n\nA strong context engineering system has the following capabilities:\n➥ Intent Parser: Captures the user’s intent, audience, format, and constraints so the rest of the content pipeline has a clear target.\n➥ Role & Tone Templates: Standard, reusable snippets that pin the model to your brand voice and creative purpose\n➥Dynamic Retrieval Layer: Pulls only the most relevant brand guidelines, product facts, past campaigns, and legal caveats—on demand, not in bulk.\n➥Context Ranking & Pruning: Scores each candidate snippet for relevance and compresses or drops anything that won’t move the needle, keeping the prompt within the context window.\n➥Structured Formatting: Presents information in labeled sections (e.g., “Brand Voice ↓”, “User Brief ↓”, “Past Examples ↓”), making it easy for the model to parse.\n➥Tool Hooks: Lets the model run quick look-ups (search, analytics, image generation) and feeds the results straight back into the same prompt cycle.\n➥Conversation Memory: Summarizes prior turns so the AI remembers key decisions without bloating the context.\n➥Compliance & Guardrails: Auto-checks for forbidden claims, regional regulations, and brand-safety filters before the prompt is sent.\n➥Evaluation Loop: Logs each run, captures user edits or rejections, and feeds that data into retraining or rule tweaks—closing the quality gap over time.\n➥Version Control & Testing: Treats prompt templates and retrieval logic like code: versioned, unit-tested, and easy to roll back if a change hurts output quality.","post_image_url":"https://media.licdn.com/dms/image/v2/D4E05AQFvCi-j76vTeQ/videocover-high/B4EZhl5H0lGcCc-/0/1754056205158?e=1783137600&v=beta&t=I-nZJpU67IMp-dReCJmAdxwhNbICrpidFkUtxTlx6qo","is_article":false,"article_url":null,"article_title":null,"article_description":null,"is_video":true,"video_url":"https://media.licdn.com/dms/image/v2/D4E05AQFvCi-j76vTeQ/videocover-high/B4EZhl5H0lGcCc-/0/1754056205158?e=1783137600&v=beta&t=I-nZJpU67IMp-dReCJmAdxwhNbICrpidFkUtxTlx6qo","has_image":true,"reaction_count":12,"reaction_types":"LIKE","comment_count":3,"impression_count":1289,"source":"activity"},{"is_my_post":true,"post_urn":"urn:li:activity:7356239191971667968","author_name":"Ravi Evani\n              \n                \n                   \n    \n      \n    \n    \n      \n    \n\n • You","author_profile_url":"https://www.linkedin.com/in/ravievani","author_headline":"Deploying enterprise agents in production / CTO / SWE Leader / GVP @ Publicis Sapient","posted_time":"2025-08-27","posted_hours_ago":7200,"posted_time_raw":"10mo","post_url":"https://www.linkedin.com/feed/update/urn:li:activity:7356239191971667968","author_profile_image_url":"https://media.licdn.com/dms/image/v2/C4E03AQGNeJRorEd2Nw/profile-displayphoto-shrink_100_100/profile-displayphoto-shrink_100_100/0/1569287114631?e=1784160000&v=beta&t=tJDZC7EXWnlgIIf8kF7fBCajhF-HEgzNXnz_IIkjqW8","post_text":"Don’t Just Summarize. Think.\n\nMy son and I were using Gemini to get a sense of his progress after a round of advanced tests by his tutor. It generated a clean topic-wise summary.\n\nBut something didn’t add up.\n\nIt showed zero scores on a couple of topics. But those topics weren’t even part of the test. Curious, I asked Gemini why it showed a zero. After a quick challenge, it corrected itself: there were no questions on those topics to begin with.\n\nThat moment was a good reminder: summarization is not trusted analysis. These tools are great at surfacing patterns, but it’s on us to apply the next layer of reasoning.\n\nIf I had just trusted the output at face value, I would have been unnecessarily concerned when he is making good progress.\n\nAI can accelerate insight—but only when paired with a human who’s willing to challenge it.\n\nAlways verify. Always think.","post_image_url":"https://media.licdn.com/dms/image/v2/D4E05AQE7mYRwsC4sEg/videocover-high/B4EZhacgLtGcCI-/0/1753864088998?e=1783137600&v=beta&t=W_iwnrGBVDKO0DhPyJeQENu5G4uyZc2e11UEvbui4bI","is_article":false,"article_url":null,"article_title":null,"article_description":null,"is_video":true,"video_url":"https://media.licdn.com/dms/image/v2/D4E05AQE7mYRwsC4sEg/videocover-high/B4EZhacgLtGcCI-/0/1753864088998?e=1783137600&v=beta&t=W_iwnrGBVDKO0DhPyJeQENu5G4uyZc2e11UEvbui4bI","has_image":true,"reaction_count":25,"reaction_types":"LIKE, INTEREST, EMPATHY","impression_count":2065,"source":"activity"},{"is_my_post":true,"post_urn":"urn:li:activity:7353719793532715008","author_name":"Ravi Evani\n              \n                \n                   \n    \n      \n    \n    \n      \n    \n\n • You","author_profile_url":"https://www.linkedin.com/in/ravievani","author_headline":"Deploying enterprise agents in production / CTO / SWE Leader / GVP @ Publicis Sapient","posted_time":"2025-07-27","posted_hours_ago":7920,"posted_time_raw":"11mo","post_url":"https://www.linkedin.com/feed/update/urn:li:activity:7353719793532715008","author_profile_image_url":"https://media.licdn.com/dms/image/v2/C4E03AQGNeJRorEd2Nw/profile-displayphoto-shrink_100_100/profile-displayphoto-shrink_100_100/0/1569287114631?e=1784160000&v=beta&t=tJDZC7EXWnlgIIf8kF7fBCajhF-HEgzNXnz_IIkjqW8","post_text":"How do you spot the difference between an AI idea that’ll ship fast… and one that’s going to drag out for months in production?\n\nAsk one key question: Will a human continue the process after the AI does its part, or is the AI expected to produce a final output on its own? This distinction is a handy rule-of-thumb for estimating project speed:\n\n➜ AI that assists humans: If the AI’s output goes to a human who will review or finish the task, it’s likely a faster ship. The AI is in a support role. For example, an AI code generator that suggests code which a developer then reviews and commits falls in this category. Since a person is catching errors or making judgment calls, the bar for the AI doesn’t have to be perfection. Organizations are already comfortably deploying AI helpers like code assistants with human oversight. These tend to roll out quickly because any AI hiccups can be caught and corrected by people.\n\n➜ AI that attempts to replace a human decision/action –
