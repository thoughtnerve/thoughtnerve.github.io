    <script>
        // Injected scraped posts
        const POSTS = [{"is_my_post":true,"post_urn":"urn:li:activity:7476462963756007424","author_name":"Ravi Evani\n              \n                \n                   \n    \n      \n    \n    \n      \n    \n\n • You","author_profile_url":"https://www.linkedin.com/in/ravievani","author_headline":"Deploying enterprise agents in production / CTO / SWE Leader / GVP @ Publicis Sapient","posted_time":"2026-06-27","posted_hours_ago":0.5,"posted_time_raw":"30m","post_url":"https://www.linkedin.com/feed/update/urn:li:activity:7476462963756007424","author_profile_image_url":"https://media.licdn.com/dms/image/v2/C4E03AQGNeJRorEd2Nw/profile-displayphoto-shrink_100_100/profile-displayphoto-shrink_100_100/0/1569287114631?e=1784160000&v=beta&t=tJDZC7EXWnlgIIf8kF7fBCajhF-HEgzNXnz_IIkjqW8","post_text":"As a Forward Deployed Engineer, when your client asks you for ai agents your job is NOT to start designing agents. It is to reduce ambiguity.\n\nA client may come in with a solution already in mind. They might come to you asking for an agentic workflow, or say that they need knowledge management or that they need an enterprise knowledge graph.\n\nBut those are starting points, not requirements. As an FDE, you have to slow the conversation down just enough to understand what your client is really trying to achieve.\n\nWhat outcome are they after? Who is the user? What workflow is breaking down today? What decision, answer, or action needs to happen faster? Where would AI actually create measurable value?\n\nYou can take the help of ai to figure out those answers. But you do need to answer those questions.\n\nFrom there, the work is not to get started picking a product, platform or architecture. It is to create solution options.\n\nMaybe the right answer is an enterprise knowledge layer. Maybe it is a narrow workflow assistant for the top 3 common workflows. Maybe it is better search, better routing, better content governance.\n\nThe important move is to generate multiple approaches before committing to one. That is how you solve a problem or reduce risk.\n\nInstead of trying to solve the entire problem, consider proving value for a specific audience, in a specific workflow, against a specific task.\n\nFor example:\nCan we help call center agents answer the highest-volume questions faster?\nCan we improve accuracy during live customer conversations?\nCan we reduce handle time, escalations, or training burden?\n\nAgain, you can use ai to help you with all this. but don't skip the steps to getting there. Only after that should the team decide whether the right architecture is agents, retrieval, context graphs, workflow automation, or something else.\n\nThis is where forward deployed engineering matters.\n\nThe job is not just technical implementation. It is translating an ambiguous client ask into a testable path to value.","post_image_url":"https://media.licdn.com/dms/image/v2/D5622AQGOm1FyWlfxOQ/feedshare-shrink_800/B56Z8G7cnDGgAc-/0/1782527675133?e=1784160000&v=beta&t=ZBekdYZvf74WaM6rbEiBDVANOfJSqH2PJrujWa9T70o","is_article":false,"article_url":null,"article_title":null,"article_description":null,"is_video":false,"video_url":null,"has_image":true,"reaction_count":1,"reaction_types":"LIKE","impression_count":39,"source":"activity"},{"is_my_post":true,"post_urn":"urn:li:activity:7476214537721917440","author_name":"Ravi Evani\n              \n                \n                   \n    \n      \n    \n    \n      \n    \n\n • You","author_profile_url":"https://www.linkedin.com/in/ravievani","author_headline":"Deploying enterprise agents in production / CTO / SWE Leader / GVP @ Publicis Sapient","posted_time":"2026-06-26","posted_hours_ago":16,"posted_time_raw":"16h","post_url":"https://www.linkedin.com/feed/update/urn:li:activity:7476214537721917440","author_profile_image_url":"https://media.licdn.com/dms/image/v2/C4E03AQGNeJRorEd2Nw/profile-displayphoto-shrink_100_100/profile-displayphoto-shrink_100_100/0/1569287114631?e=1784160000&v=beta&t=tJDZC7EXWnlgIIf8kF7fBCajhF-HEgzNXnz_IIkjqW8","post_text":"Why do you need a coding context graph?\n\nBecause an LLM doesn't understand your codebase. It doesn't know how your services are connected, which APIs call each other, where a business rule is implemented, or which documentation is still relevant.\n\nA coding context graph gives the agent that understanding. It connects your code, documentation, APIs, tests, dependencies, and architecture so the agent can reason about your system instead of just individual files.\n\nThe next question is: How do you know if your context graph is actually any good?\n\nThere are four simple questions I'd ask.\n\n1️⃣ Can it find the right information?\n\nIf I ask about an API, can it find the right code, documentation, tests, and related services?\n\n2️⃣ Can it connect the dots?\n\nFinding one file is easy.\n\nCan it follow the flow across controllers, services, repositories, message queues, and downstream systems?\n\n3️⃣ Is the information up to date?\n\nA context graph is only as good as the data inside it.\n\nIf it's indexing old documentation, deprecated APIs, or stale code, your agent will confidently generate the wrong answer.\n\n4️⃣ Does it help the agent do real work?\n\nCan the agent successfully add a feature, fix a bug, explain an architecture, or generate a sequence diagram using the context it retrieves?","post_image_url":"https://media.licdn.com/dms/image/v2/D5622AQE9Hotc4XlPbw/feedshare-image-high-res/B56Z8DZgZNHYAY-/0/1782468446012?e=1784160000&v=beta&t=tk2rtSnBlfrLVfn0RUSQR7d7imuvIlp443yxpCb_jGA","is_article":false,"article_url":null,"article_title":null,"article_description":null,"is_video":false,"video_url":null,"has_image":true,"reaction_count":4,"reaction_types":"LIKE","impression_count":420,"source":"activity"},{"is_my_post":true,"post_urn":"urn:li:activity:7475785970005463040","author_name":"Ravi Evani\n              \n                \n                   \n    \n      \n    \n    \n      \n    \n\n • You","author_profile_url":"https://www.linkedin.com/in/ravievani","author_headline":"Deploying enterprise agents in production / CTO / SWE Leader / GVP @ Publicis Sapient","posted_time":"2026-06-26","posted_hours_ago":24,"posted_time_raw":"1d","post_url":"https://www.linkedin.com/feed/update/urn:li:activity:7475785970005463040","author_profile_image_url":"https://media.licdn.com/dms/image/v2/C4E03AQGNeJRorEd2Nw/profile-displayphoto-shrink_100_100/profile-displayphoto-shrink_100_100/0/1569287114631?e=1784160000&v=beta&t=tJDZC7EXWnlgIIf8kF7fBCajhF-HEgzNXnz_IIkjqW8","post_text":"Here's how I keep my website in sync with my LinkedIn posts.\n\nNo infra to maintain. No backend, database. GitHub Pages hosts the site, while the browser performs the extraction.\n\nWorks around API limitations. Rather than requiring privileged LinkedIn API access, the extension reads the pages I already have permission to view within my authenticated session.\n\nAuthentic by design. My website reflects my real LinkedIn activity instead of becoming another profile that needs separate maintenance.\n\nFast deployment. Updating my site is as simple as running the extension and committing the generated data.\n\nExcellent performance. A static GitHub Pages site with a single data payload loads quickly, is inexpensive to host, and is easy for search engines to crawl.\n\nSo basically a browser-driven CMS with a \"one-click publishing workflow.\" .\n\nOne optimization I might do in the future is separating the data from the UI. Instead of regenerating a single index.html, perhaps publish a posts.json (or similar) alongside the static site. The UI stays unchanged while only the data file is updated. That makes future \"redesigns\" much easier and opens the door to making my site agent ready without changing the extraction pipeline.","post_image_url":"https://media.licdn.com/dms/image/v2/D5605AQEo5Sja1GFUxw/videocover-high/B56Z79Tn.cG8BQ-/0/1782366250560?e=1783137600&v=beta&t=wIUq42t2Xx08rOuf_LU8SrrsRdWlnJhQtSM0d-tJNm8","is_article":false,"article_url":null,"article_title":null,"article_description":null,"is_video":true,"video_url":"https://media.licdn.com/dms/image/v2/D5605AQEo5Sja1GFUxw/videocover-high/B56Z79Tn.cG8BQ-/0/1782366250560?e=1783137600&v=beta&t=wIUq42t2Xx08rOuf_LU8SrrsRdWlnJhQtSM0d-tJNm8","has_image":true,"reaction_count":9,"reaction_types":"LIKE, INTEREST","comment_count":1,"impression_count":869,"source":"activity"},{"is_my_post":true,"post_urn":"urn:li:activity:7475514669114368000","author_name":"Ravi Evani\n              \n                \n                   \n    \n      \n    \n    \n      \n    \n\n • You","author_profile_url":"https://www.linkedin.com/in/ravievani","author_headline":"Deploying enterprise agents in production / CTO / SWE Leader / GVP @ Publicis Sapient","posted_time":"2026-06-25","posted_hours_ago":48,"posted_time_raw":"2d","post_url":"https://www.linkedin.com/feed/update/urn:li:activity:7475514669114368000","author_profile_image_url":"https://media.licdn.com/dms/image/v2/C4E03AQGNeJRorEd2Nw/profile-displayphoto-shrink_100_100/profile-displayphoto-shrink_100_100/0/1569287114631?e=1784160000&v=beta&t=tJDZC7EXWnlgIIf8kF7fBCajhF-HEgzNXnz_IIkjqW8","post_text":"Deterministic enterprise software generated by ai and not vetted properly is arguably more dangerous than exposing users to an obviously probabilistic chatbot. Would you let customers or colleagues use it?\n\nWhen a probabilistic engine (an LLM) writes deterministic code (like Python, Java, or C++) and it is deployed without rigorous human vetting, you have now hardcoded the probabilistic risk.\n\nWhen users interact with an ai chatbot, their guard is up. They expect variance, look out for hallucinations, and generally apply a \"trust but verify\" mindset. Deterministic software, however, carries an implicit assumption of mathematical certainty. Because it compiles and runs, it gives developers and users a false sense of security.\n\nThink about that before your next PR.","post_image_url":null,"is_article":false,"article_url":null,"article_title":null,"article_description":null,"is_video":false,"video_url":null,"has_image":false,"reaction_count":14,"reaction_types":"LIKE, INTEREST","comment_count":1,"impression_count":1013,"source":"activity"},{"is_my_post":true,"post_urn":"urn:li:activity:7474772913414635520","author_name":"Ravi Evani\n              \n                \n                   \n    \n      \n    \n    \n      \n    \n\n • You","author_profile_url":"https://www.linkedin.com/in/ravievani","author_headline":"Deploying enterprise agents in production / CTO / SWE Leader / GVP @ Publicis Sapient","posted_time":"2026-06-23","posted_hours_ago":96,"posted_time_raw":"4d","post_url":"https://www.linkedin.com/feed/update/urn:li:activity:7474772913414635520","author_profile_image_url":"https://media.licdn.com/dms/image/v2/C4E03AQGNeJRorEd2Nw/profile-displayphoto-shrink_100_100/profile-displayphoto-shrink_100_100/0/1569287114631?e=1784160000&v=beta&t=tJDZC7EXWnlgIIf8kF7fBCajhF-HEgzNXnz_IIkjqW8","post_text":"As a forward deployed engineer, you won't move an enterprise exec by talking about how \"clever\" your agents are.\n\nAs an FDE you should expect to be a part of meetings with enterprise execs. Here are a few tips to help you prepare, especially when the discussion involves AI agents.\n\n1. First, get out of your own product vocabulary.\n\nA CEO, SVP, or business leader is usually not looking for a tour of your platform, agent configuration, orchestration layer, workflow designer, or feature set.\n\nThat may matter later. But it is rarely where the conversation should start. You should first start with understanding your audience.\n\nBefore the meeting, study how that leader talks about their business. Look for interviews, earnings commentary, LinkedIn posts, podcasts, conference sessions, or articles. Pay attention to the actual words they use.\n\nWhat do they keep coming back to? Growth? Reliability? Speed? Scale? Execution Certainty? Regulatory pressure? Cost to serve? Operational resilience? Boil it down to the 5-10 phrases that seem to matter most to them.\n\nThen position your AI agent work in those terms. Not in terms of what the agent can technically do, but in terms of the business value they already care about. If you are not speaking on their page, they will not connect the dots for you.\n\n2. Second, do not bring ten features into the room.\n\nPick the one or two places where your solution truly shines. The strongest capability that you can connect to where they see value.\n\nFor example, not “our agent can summarize work orders.”\n\nInstead: “This brings all the context related to work orders in one place, so your field teams can troubleshoot faster and close out work more accurately”.\n\n3. Third, cast the value through their people.\n\nSenior leaders are not doing the day-to-day work themselves. They are thinking about how their teams operate, where decisions slow down, where handoffs break, and where execution quality varies.\n\nSo help them see the future state. What changes for their operators, engineers, service teams, or managers? Where does work get faster? Where does judgment improve? Where does rework reduce?\n\nThat is where the exec conversation starts to land.\n\nDon't try to prove how clever your agent is. Show that you understand the business well enough to apply AI where it can actually improve outcomes.","post_image_url":null,"is_article":false,"article_url":null,"article_title":null,"article_description":null,"is_video":false,"video_url":null,"has_image":false,"reaction_count":28,"reaction_types":"LIKE, INTEREST, EMPATHY","impression_count":1264,"source":"activity"},{"is_my_post":true,"post_urn":"urn:li:activity:7472956658495717377","author_name":"Ravi Evani\n              \n                \n                   \n    \n      \n    \n    \n      \n    \n\n • You","author_profile_url":"https://www.linkedin.com/in/ravievani","author_headline":"Deploying enterprise agents in production / CTO / SWE Leader / GVP @ Publicis Sapient","posted_time":"2026-06-20","posted_hours_ago":168,"posted_time_raw":"1w","post_url":"https://www.linkedin.com/feed/update/urn:li:activity:7472956658495717377","author_profile_image_url":"https://media.licdn.com/dms/image/v2/C4E03AQGNeJRorEd2Nw/profile-displayphoto-shrink_100_100/profile-displayphoto-shrink_100_100/0/1569287114631?e=1784160000&v=beta&t=tJDZC7EXWnlgIIf8kF7fBCajhF-HEgzNXnz_IIkjqW8","post_text":"We may be using the term “human-in-the-loop” too loosely.\n\nA lot of what is being called called Human-in-the-Loop today is really just a traditional application pattern with an LLM added to the interface.\n\nHere’s the common pattern:\n\nYou ask AI to generate a forecast. It produces an answer. You review it, spot an issue, and say, “Adjust the Q3 assumptions to account for X\". It regenerates the output.\n\nThat is useful. But it is not really Human-in-the-Loop. It is closer to Human-Over-the-Loop.\n\nThe human is still driving the workflow. The human holds the context. The human decides what happens next. The system produces an output and waits for the next instruction.\n\nThat is not fundamentally different from the old draft, review, edit model. The LLM may make the interaction more flexible, but the workflow is still human-orchestrated.\n\nTrue Human-in-the-Loop looks different.\n\nIn a true agentic workflow, the agent is executing a task, managing state, and moving through a plan. When it hits a point of uncertainty, missing context, policy constraint, or risk threshold, it does not guess. It pauses at that point and asks the human for the specific input needed to continue.\n\nFor example:\n\n“I’m calculating the forecast, but the European tariff variance is missing. Should I use the historical average, or do you have the updated figure?”\n\nThe human provides the missing context. The agent resumes the workflow.\n\nHuman-Over-the-Loop:\nThe human initiates, reviews, edits, and drives the next step.\n\nHuman-In-the-Loop:\nThe agent drives the workflow and pulls the human in only when judgment, context, approval, or exception handling is required.\n\nThis distinction matters because many teams think they are building agentic systems when they are really building better interfaces for traditional workflows.\n\nThere is nothing wrong with that. For many use cases, it may be exactly the right starting point.\n\nBut if we want to move from copilots to agentic workflows, we need to be clear about where the intelligence, orchestration, and state management actually live.","post_image_url":"https://media.licdn.com/dms/image/v2/D4E22AQEu4oX_cS3tuw/feedshare-shrink_800/B4EZ7VGeymJYAc-/0/1781691706810?e=1784160000&v=beta&t=nQsT3hIoQhAVUzPRfNf9FANU3OHsHJ3OKjrejQvpDos","is_article":false,"article_url":null,"article_title":null,"article_description":null,"is_video":false,"video_url":null,"has_image":true,"reaction_count":11,"reaction_types":"LIKE, INTEREST","impression_count":503,"source":"activity"},{"is_my_post":true,"post_urn":"urn:li:activity:7472839788732203008","author_name":"Ravi Evani\n              \n                \n                   \n    \n      \n    \n    \n      \n    \n\n • You","author_profile_url":"https://www.linkedin.com/in/ravievani","author_headline":"Deploying enterprise agents in production / CTO / SWE Leader / GVP @ Publicis Sapient","posted_time":"2026-06-20","posted_hours_ago":168,"posted_time_raw":"1w","post_url":"https://www.linkedin.com/feed/update/urn:li:activity:7472839788732203008","author_profile_image_url":"https://media.licdn.com/dms/image/v2/C4E03AQGNeJRorEd2Nw/profile-displayphoto-shrink_100_100/profile-displayphoto-shrink_100_100/0/1569287114631?e=1784160000&v=beta&t=tJDZC7EXWnlgIIf8kF7fBCajhF-HEgzNXnz_IIkjqW8","post_text":"ai got the budget. but better deterministic software was what delivered the value.\n\ni was chatting with an ex-client who is now a good friend, and they were really excited about using ai agents to drive operational decision-making.\n\nas we peeled back the layers, it became clear that most of the problems they were trying to solve weren’t actually agent problems. they were information problems.\n\na lot of their challenges could be addressed with better data, more deterministic workflows, and better user experiences for the people running operations. in perhaps 10% of cases, some traditional predictive ml could add value. but in none of the examples we discussed did we actually need agents making decisions on behalf of people.\n\nwhat operators really needed was the right information, presented at the right time, in the right context.\n\nand that is where ai can be very useful.\n\nuse ai for research and discovery. use it to dig through documents, conversations, tickets, policies, logs, and historical decisions. use it to uncover information that was always there, but buried under layers of systems, teams, and process.\n\nbut again, the goal is not always to have ai make the decision. often, the goal is to help people see what they couldn’t see before.\n\nanother interesting part of the discussion was that ai was also being used as part of the narrative to secure investment and executive attention. that’s completely understandable. organizations want to participate in the ai wave, and that often helps unlock funding for long-overdue modernization efforts.\n\nbut just because ai is the reason the investment gets approved doesn’t mean ai is the answer to every problem being solved.\n\nironically, getting to the desired outcome did require building a lot more software. historically, much of that work would have remained stuck in the backlog because teams simply didn’t have the capacity.\n\nthat’s where ai is incredibly valuable.\n\nuse ai to write the software. use ai to accelerate development. use ai to help teams tackle years of accumulated backlog and build experiences that would have been difficult to justify before.\n\nbut when it comes to operational decision-making, the bigger opportunity is often not replacing human judgment with agents. it’s giving people better tools, better context, and better information so they can make better decisions themselves.","post_image_url":null,"is_article":false,"article_url":null,"article_title":null,"article_description":null,"is_video":false,"video_url":null,"has_image":false,"reaction_count":16,"reaction_types":"LIKE","impression_count":1102,"source":"activity"},{"is_my_post":true,"post_urn":"urn:li:activity:7470493130958745602","author_name":"Ravi Evani\n              \n                \n                   \n    \n      \n    \n    \n      \n    \n\n • You","author_profile_url":"https://www.linkedin.com/in/ravievani","author_headline":"Deploying enterprise agents in production / CTO / SWE Leader / GVP @ Publicis Sapient","posted_time":"2026-06-13","posted_hours_ago":336,"posted_time_raw":"2w","post_url":"https://www.linkedin.com/feed/update/urn:li:activity:7470493130958745602","author_profile_image_url":"https://media.licdn.com/dms/image/v2/C4E03AQGNeJRorEd2Nw/profile-displayphoto-shrink_100_100/profile-displayphoto-shrink_100_100/0/1569287114631?e=1784160000&v=beta&t=tJDZC7EXWnlgIIf8kF7fBCajhF-HEgzNXnz_IIkjqW8","post_text":"The idea of loop engineering expects a lot from the average SWE. While It sounds simple, It’s a drastic shift in skill required.\n\nLoop engineering advocates to move beyond prompting and start designing the feedback loops that help agents reason, act, evaluate, and improve.\n\nBut we've spent years breaking high level work into tiny, code-centric tasks: going from epics → features → stories → tasks → code.\n\nNow, with the concept of loop engineering, there's hype of pushing up the chain into higher-level constructs to steer agents.\n\nIt’s a very different skill.\n\nWhile a few niche teams and superstar developers may adapt to this, expecting enterprises to build this capability broadly across software development is not realistic. This will take years.\n\nAnd I’m not even sure this capability is needed at broad scale. Most enterprises do not need most developers to become loop engineers.\n\nGiven that prompt engineering is still messy, context engineering is still hard, and reliable outputs are still inconsistent. Expecting every enterprise developer to design autonomous loops feels premature.\n\nMost enterprises will need reusable patterns, guardrails, and workflows that deliver business value before they need to think about broad-scale loop engineering.","post_image_url":null,"is_article":false,"article_url":null,"article_title":null,"article_description":null,"is_video":false,"video_url":null,"has_image":false,"reaction_count":13,"reaction_types":"LIKE, APPRECIATION","comment_count":3,"impression_count":1165,"source":"activity"},{"is_my_post":true,"post_urn":"urn:li:activity:7470212373073559552","author_name":"Ravi Evani\n              \n                \n                   \n    \n      \n    \n    \n      \n    \n\n • You","author_profile_url":"https://www.linkedin.com/in/ravievani","author_headline":"Deploying enterprise agents in production / CTO / SWE Leader / GVP @ Publicis Sapient","posted_time":"2026-06-13","posted_hours_ago":336,"posted_time_raw":"2w","post_url":"https://www.linkedin.com/feed/update/urn:li:activity:7470212373073559552","author_profile_image_url":"https://media.licdn.com/dms/image/v2/C4E03AQGNeJRorEd2Nw/profile-displayphoto-shrink_100_100/profile-displayphoto-shrink_100_100/0/1569287114631?e=1784160000&v=beta&t=tJDZC7EXWnlgIIf8kF7fBCajhF-HEgzNXnz_IIkjqW8","post_text":"Prompt engineering? Still messy. Context engineering? Still hard. Reliable outputs? Still inconsistent. But sure, let’s move on to \"loop\" engineering.\n\nAI discourse has a wonderful habit of skipping directly to the hardest possible problem.\n\nLoop engineering is supposedly where AI not only produces the output, but also decides the inputs, creates the context, invokes other agents, and recursively improves itself.\n\nWhat could possibly go wrong?\n\nIs this the \"solution\" that our enterprises need?\n\nThe bottlenecks that enterprises need to solve are much simpler:\n1/ Can the agent produce the right output?\n2/ Can it use the right context?\n3/ Can the workflow be automated safely?\n4/ Can it create measurable business value?\n\nOnly after that should we get excited about AI determining its own inputs.\n\nWhen humans define the inputs, you can at least reason about the outcome.\n\nWhen AI defines the inputs, you are pretending you can engineer behavior. While that may be a worthy research problem. It is not where most enterprises should start.\n\nThe real opportunity is less glamorous:\nReduce cycle times.\nImprove decision quality.\nModernize legacy processes.\nHelp people get more done.\n\nThe industry keeps ratcheting the conversation upward before the previous level is delivering value.\n\nIgnore the noise.\n\nDeliver business value step by step.","post_image_url":"https://media.licdn.com/dms/image/v2/D4E22AQFZ6UZyqFPVLQ/feedshare-shrink_800/B4EZ6uGkR.IMAc-/0/1781037418110?e=1784160000&v=beta&t=Hu2xTy3gGu-4uf36rT-QCJ5U6H9vCiOshkjEvdeXzx0","is_article":false,"article_url":null,"article_title":null,"article_description":null,"is_video":false,"video_url":null,"has_image":true,"reaction_count":11,"reaction_types":"LIKE, INTEREST, ENTERTAINMENT","repost_count":1,"impression_count":1882,"source":"activity"},{"is_my_post":true,"post_urn":"urn:li:activity:7469374096452165633","author_name":"Ravi Evani\n              \n                \n                   \n    \n      \n    \n    \n      \n    \n\n • You","author_profile_url":"https://www.linkedin.com/in/ravievani","author_headline":"Deploying enterprise agents in production / CTO / SWE Leader / GVP @ Publicis Sapient","posted_time":"2026-06-13","posted_hours_ago":336,"posted_time_raw":"2w","post_url":"https://www.linkedin.com/feed/update/urn:li:activity:7469374096452165633","author_profile_image_url":"https://media.licdn.com/dms/image/v2/C4E03AQGNeJRorEd2Nw/profile-displayphoto-shrink_100_100/profile-displayphoto-shrink_100_100/0/1569287114631?e=1784160000&v=beta&t=tJDZC7EXWnlgIIf8kF7fBCajhF-HEgzNXnz_IIkjqW8","post_text":"My new website in 3 steps:\n1. Built a Chrome extension to export my LinkedIn posts into a clean static HTML page.\n2. Uploaded the HTML file to a GitHub repo and served it using GitHub Pages.\n3. Pointed my domain to the GitHub Pages site.","post_image_url":"https://media.licdn.com/dms/image/v2/D4E22AQHF8WiUa4PjJA/feedshare-shrink_800/B4EZ6iMJ95KMAg-/0/1780837557646?e=1784160000&v=beta&t=7HjJnEsbHUURyXcRq5TBKGVxbcL8F2ke6fK86GyVypQ","is_article":false,"article_url":null,"article_title":null,"article_description":null,"is_video":false,"video_url":null,"has_image":true,"reaction_count":59,"reaction_types":"LIKE, PRAISE","comment_count":1,"impression_count":3448,"source":"activity"},{"is_my_post":true,"post_urn":"urn:li:activity:7469027501563043840","author_name":"Ravi Evani\n              \n                \n                   \n    \n      \n    \n    \n      \n    \n\n • You","author_profile_url":"https://www.linkedin.com/in/ravievani","author_headline":"Deploying enterprise agents in production / CTO / SWE Leader / GVP @ Publicis Sapient","posted_time":"2026-06-13","posted_hours_ago":336,"posted_time_raw":"2w","post_url":"https://www.linkedin.com/feed/update/urn:li:activity:7469027501563043840","author_profile_image_url":"https://media.licdn.com/dms/image/v2/C4E03AQGNeJRorEd2Nw/profile-displayphoto-shrink_100_100/profile-displayphoto-shrink_100_100/0/1569287114631?e=1784160000&v=beta&t=tJDZC7EXWnlgIIf8kF7fBCajhF-HEgzNXnz_IIkjqW8","post_text":"Every developer knows the pain of the Figma handoff: you write the CSS, but the designer calls out a 10px alignment drift, mismatched paddings, or shifted margins.\n\nThis leads to tedious manual visual policing and endless correction loops. To solve this, we can give agents \"eyes\" by building a closed-loop self-healing pipeline: borrowing local Chrome tab sessions via CDP, comparing live-rendered DOM previews against Figma mockup references programmatically, and using Multimodal LLMs to auto-correct stylesheets.\n\nHere is a blueprint (w/ agent skill included!) for automating pixel-perfect visual verification.","post_image_url":"https://media.licdn.com/dms/image/v2/D4E12AQFnuUXyH6huoQ/article-cover_image-shrink_600_2000/B4EZ6dOHOMJ4AU-/0/1780754183506?e=1784160000&v=beta&t=-WyM9tSFF7pyUk238BPbKOtKPLXvT_JXrHwPOrtoaAY","is_article":true,"article_url":"https://www.linkedin.com/pulse/figma-to-code-fidelity-automating-pixel-perfect-visual-ravi-evani-oecge","article_title":"","article_description":"","is_video":false,"video_url":null,"has_image":true,"reaction_count":21,"reaction_types":"LIKE, EMPATHY","repost_count":1,"impression_count":2087,"source":"activity"},{"is_my_post":true,"post_urn":"urn:li:activity:7468292476269826050","author_name":"Ravi Evani\n              \n                \n                   \n    \n      \n    \n    \n      \n    \n\n • You","author_profile_url":"https://www.linkedin.com/in/ravievani","author_headline":"Deploying enterprise agents in production / CTO / SWE Leader / GVP @ Publicis Sapient","posted_time":"2026-06-06","posted_hours_ago":504,"posted_time_raw":"3w","post_url":"https://www.linkedin.com/feed/update/urn:li:activity:7468292476269826050","author_profile_image_url":"https://media.licdn.com/dms/image/v2/C4E03AQGNeJRorEd2Nw/profile-displayphoto-shrink_100_100/profile-displayphoto-shrink_100_100/0/1569287114631?e=1784160000&v=beta&t=tJDZC7EXWnlgIIf8kF7fBCajhF-HEgzNXnz_IIkjqW8","post_text":"AI coding agents are great at writing code. But ask them to troubleshoot a live bug, and they can get you stuck.\n\nWhy? Because standard agents lack runtime context. They don't see the live application state, browser consoles, or active database connections. Without this, they guess; which leads to hallucinated fixes, overwritten database rows, or destructive UI regressions.\n\nTo solve this, we built the Agentic Troubleshooting Pipeline >> a secure, self-healing architecture designed to diagnose and repair bugs autonomously, safely, and with full live context.\n\nHere is the system-design blueprint of how we stop AI from breaking things:\n\n1/ The Template-Instance Pattern (Isolation)\nParallel debugging tasks shouldn't pollute your main workspace. We separate core logic from local execution. Bugs are diagnosed in an isolated sandbox (the \"Instance\") that is hydrated only with the exact telemetry needed to hunt down the issue.\n\n2/ Zero-Copy Telemetry (The Sidecar)\nNo more manually copy-pasting terminal logs or Git diffs into a chat window. A background sidecar automatically captures active system logs, state changes, and DevTools output into a unified telemetry packet the moment a bug triggers.\n\n3/ Live Inspection via MCP Standard\nAgents can't \"see\" the UI. By integrating MCP servers (like chrome-devtools), our sandboxed sub-agent can actually interact with the live DOM, trace API bottlenecks, and verify selectors in real time.\n\n4/ Safe-by-Design Guardrails & Security\nAI needs boundaries. We enforce strict \"Safe Resolution Rules\" (e.g., zero data-loss tolerance). By isolating the source (the UI where the bug appears) from the sink (where the data lives), we ensure an agent fixing a layout bug won't accidentally compromise database schema contracts. Plus, zero file writes are executed without explicit human-in-the-loop permission.\n\n5/ The Skills Registry (Reusable Memory)\nThis is the key. Once a fix is verified, the system saves a local \"Skill\" (a reusable Markdown workflow). If that specific failure signature happens again next month, the codebase bypasses the heavy diagnostic loop and self-heals instantly. This builds systems that actively learn from their errors and compile their own local, self-healing manuals.","post_image_url":"https://media.licdn.com/dms/image/v2/D4E22AQFNmBpqna6XsQ/feedshare-shrink_800/B4EZ6S0bmhJMAo-/0/1780579679294?e=1784160000&v=beta&t=QF_czzi7lU1RY7ZwHH3dKSS6SVcQCFq_kGDo5_pRayA","is_article":false,"article_url":null,"article_title":null,"article_description":null,"is_video":false,"video_url":null,"has_image":true,"reaction_count":32,"reaction_types":"LIKE, EMPATHY","comment_count":1,"repost_count":1,"impression_count":1534,"source":"activity"},{"is_my_post":true,"post_urn":"urn:li:activity:7467561619762520065","author_name":"Ravi Evani\n              \n                \n                   \n    \n      \n    \n    \n      \n    \n\n • You","author_profile_url":"https://www.linkedin.com/in/ravievani","author_headline":"Deploying enterprise agents in production / CTO / SWE Leader / GVP @ Publicis Sapient","posted_time":"2026-06-06","posted_hours_ago":504,"posted_time_raw":"3w","post_url":"https://www.linkedin.com/feed/update/urn:li:activity:7467561619762520065","author_profile_image_url":"https://media.licdn.com/dms/image/v2/C4E03AQGNeJRorEd2Nw/profile-displayphoto-shrink_100_100/profile-displayphoto-shrink_100_100/0/1569287114631?e=1784160000&v=beta&t=tJDZC7EXWnlgIIf8kF7fBCajhF-HEgzNXnz_IIkjqW8","post_text":"A highly practical conversation about AI between McDonald's CEO Chris Kempczinski and Google CEO Sundar Pichai at the McDonald's worldwide convention.\n\nSundar made the point that we are still underestimating AI. A high school student can now create work that would have required a professional movie studio not long ago. That means the challenge for large companies is no longer whether they can find AI use cases. McDonald’s and Google can probably identify hundreds. But the right question is: which ones of those matter most?\n\nThat is where prioritization becomes critical. Sundar talked about Google’s discipline around setting ambitious quarterly objectives. The purpose of the objectives is to separate signal from noise, stay anchored to a true north, and remember that there is always a customer on the other side.\n\nThey also discussed the balance between innovation and consistency. In a business like McDonald’s, change cannot break the customer experience. In a business like Google, certain answers (like medical advice for a child) cannot be wrong. So the answer is not to slow everything down. The answer is to create sandboxes: test in controlled environments, learn quickly, and then scale what works.\n\nAnother important theme was leadership. Future leaders will need resilience, because change is now constant. They will also need to be decisive. Large organizations slow down when too many decisions wait for perfect alignment. A useful leadership question is: what ties did I break today?\n\nChris also emphasized clarity. In the AI era, generating content will be easy. The real skill will be organizing an argument, simplifying complexity, and helping people understand what matters.\n\nWhat stood out to me is the human lens they took throughout the discussion. McDonald’s may be operating at massive global scale, but the conversation kept coming back to people: customers, crew members, and employees. AI when used well can help people serve customers at a higher level, make better decisions, and spend more time on the work that requires human judgment.","post_image_url":"https://media.licdn.com/dms/image/v2/D4E22AQGwTJK3cAg1lQ/feedshare-shrink_800/B4EZ6IbuH_KIAc-/0/1780405429611?e=1784160000&v=beta&t=zHq6gcUtcrItEnjje-5S5lmS3ni6hnXpFe5Rpj5y6uo","is_article":false,"article_url":null,"article_title":null,"article_description":null,"is_video":false,"video_url":null,"has_image":true,"reaction_count":51,"reaction_types":"LIKE, EMPATHY","comment_count":2,"repost_count":1,"impression_count":3798,"source":"activity"},{"is_my_post":true,"post_urn":"urn:li:activity:7467274799766073344","author_name":"Ravi Evani\n              \n                \n                   \n    \n      \n    \n    \n      \n    \n\n • You","author_profile_url":"https://www.linkedin.com/in/ravievani","author_headline":"Deploying enterprise agents in production / CTO / SWE Leader / GVP @ Publicis Sapient","posted_time":"2026-06-06","posted_hours_ago":504,"posted_time_raw":"3w","post_url":"https://www.linkedin.com/feed/update/urn:li:activity:7467274799766073344","author_profile_image_url":"https://media.licdn.com/dms/image/v2/C4E03AQGNeJRorEd2Nw/profile-displayphoto-shrink_100_100/profile-displayphoto-shrink_100_100/0/1569287114631?e=1784160000&v=beta&t=tJDZC7EXWnlgIIf8kF7fBCajhF-HEgzNXnz_IIkjqW8","post_text":"Opening at McDonald's worldwide convention in Las Vegas was their CEO and also Google CEO showing how seriously McDonald’s is taking AI to help boost food quality, restaurants, customer experience and their people experience.\n\nWhen people talk about AI in restaurants, the conversation usually goes straight to automated drive-thrus, robotics, or replacing labor. But one of the most interesting applications of AI at McDonald’s is actually much simpler: helping crew members do their jobs more effectively.\n\nThink about equipment troubleshooting. A restaurant is filled with specialized equipment, and when something goes wrong, finding the right answer often means digging through manuals or tracking down someone with experience. With AI, a crew member can simply ask a question and receive immediate, step-by-step guidance right at the moment they need it.\n\nAnd then there’s equipment reliability. By combining sensor data with AI, restaurants can identify early signs of equipment issues and address them before they become operational disruptions. Preventing a breakdown is far less costly than dealing with one during the lunch rush.\n\nWhat stands out to me is that this is really a story about augmentation. The AI is handling prediction, analysis, and troubleshooting so that crew members can focus on the things humans do best: serving customers, working together as a team, and delivering a great restaurant experience.","post_image_url":"https://media.licdn.com/dms/image/v2/D5622AQFaRAlIOpdCLA/feedshare-shrink_800/B56Z6EW20AIcAg-/0/1780337046768?e=1784160000&v=beta&t=OlmuBC_NozAvv1boWdLItr9pm8Eis5Kd1ZSoLVFd-Lw","is_article":false,"article_url":null,"article_title":null,"article_description":null,"is_video":false,"video_url":null,"has_image":true,"reaction_count":78,"reaction_types":"LIKE, EMPATHY, PRAISE","impression_count":8351,"source":"activity"},{"is_my_post":true,"post_urn":"urn:li:activity:7466990762052792320","author_name":"Ravi Evani\n              \n                \n                   \n    \n      \n    \n    \n      \n    \n\n • You","author_profile_url":"https://www.linkedin.com/in/ravievani","author_headline":"Deploying enterprise agents in production / CTO / SWE Leader / GVP @ Publicis Sapient","posted_time":"2026-06-06","posted_hours_ago":504,"posted_time_raw":"3w","post_url":"https://www.linkedin.com/feed/update/urn:li:activity:7466990762052792320","author_profile_image_url":"https://media.licdn.com/dms/image/v2/C4E03AQGNeJRorEd2Nw/profile-displayphoto-shrink_100_100/profile-displayphoto-shrink_100_100/0/1569287114631?e=1784160000&v=beta&t=tJDZC7EXWnlgIIf8kF7fBCajhF-HEgzNXnz_IIkjqW8","post_text":"We may be heading toward a time where, just like people are expected to complete their work within a 40-hour week, they might also be expected to stay within a weekly AI token allowance. At least, till token costs fall substantially and engineering techniques get better.\n\nAnything beyond that is no longer productivity. It’s token overtime, and someone might ask who approved it.","post_image_url":"https://media.licdn.com/dms/image/v2/D4E22AQFpz6s6ko1-Wg/feedshare-shrink_800/B4EZ6AUh57HQAc-/0/1780269326249?e=1784160000&v=beta&t=Ewe6HQFv01FfXK7xjb8PhCGFDtsaiDOGuu4ClxJNScs","is_article":false,"article_url":null,"article_title":null,"article_description":null,"is_video":false,"video_url":null,"has_image":true,"reaction_count":37,"reaction_types":"LIKE, ENTERTAINMENT","repost_count":1,"impression_count":3762,"source":"activity"},{"is_my_post":true,"post_urn":"urn:li:activity:7466470383467102208","author_name":"Ravi Evani\n              \n                \n                   \n    \n      \n    \n    \n      \n    \n\n • You","author_profile_url":"https://www.linkedin.com/in/ravievani","author_headline":"Deploying enterprise agents in production / CTO / SWE Leader / GVP @ Publicis Sapient","posted_time":"2026-06-06","posted_hours_ago":504,"posted_time_raw":"3w","post_url":"https://www.linkedin.com/feed/update/urn:li:activity:7466470383467102208","author_profile_image_url":"https://media.licdn.com/dms/image/v2/C4E03AQGNeJRorEd2Nw/profile-displayphoto-shrink_100_100/profile-displayphoto-shrink_100_100/0/1569287114631?e=1784160000&v=beta&t=tJDZC7EXWnlgIIf8kF7fBCajhF-HEgzNXnz_IIkjqW8","post_text":"weekend skill: to use ai recursively to write you better prompts for your agents.\n\nfirst, you need to determine the outcome: what exactly the agent must achieve. if you don’t have that clarity, you prompt ai to help define what a successful outcome looks like.\n\nonce the outcome is clear, you need to clarify the intent, i.e. the exact purpose of the agent’s action. if that’s vague, you prompt ai to refine the intent, i.e. what the agent should focus on.\n\nafter intent, you need guardrails, i.e. the boundaries or constraints. if you lack those, you prompt ai to establish what should or shouldn’t happen.\n\nby prompting in that sequence: outcome, then intent, then guardrails, you create a structured chain leading to a complete, actionable prompt.\n\nnow, if you lack context for the outcome, intent, or guardrails, you first prompt ai to help fill that gap.\n\n---\nbut to even do all that, you may need a broader understanding. so, you prompt ai for deeper research. asking questions to get context.\n\nif you even lack that context, then you start at the foundation: pulling from past conversations, notes, or initial sources to guide your research prompt.\n\nonce you gain that context at each step, you circle back and refine the original (outcome, then intent, then guardrails). In short, if context is missing, you prompt backward until you gather what’s needed, then move forward again.\n\n---\n\nthe skill to hone is orchestrating this type of prompt chain to to get to the prompt you finally give your agent to do your task.","post_image_url":null,"is_article":false,"article_url":null,"article_title":null,"article_description":null,"is_video":false,"video_url":null,"has_image":false,"reaction_count":18,"reaction_types":"LIKE","comment_count":2,"repost_count":2,"impression_count":1613,"source":"activity"},{"is_my_post":true,"post_urn":"urn:li:activity:7465574531605118976","author_name":"Ravi Evani\n              \n                \n                   \n    \n      \n    \n    \n      \n    \n\n • You","author_profile_url":"https://www.linkedin.com/in/ravievani","author_headline":"Deploying enterprise agents in production / CTO / SWE Leader / GVP @ Publicis Sapient","posted_time":"2026-05-30","posted_hours_ago":672,"posted_time_raw":"4w","post_url":"https://www.linkedin.com/feed/update/urn:li:activity:7465574531605118976","author_profile_image_url":"https://media.licdn.com/dms/image/v2/C4E03AQGNeJRorEd2Nw/profile-displayphoto-shrink_100_100/profile-displayphoto-shrink_100_100/0/1569287114631?e=1784160000&v=beta&t=tJDZC7EXWnlgIIf8kF7fBCajhF-HEgzNXnz_IIkjqW8","post_text":"Great answers by Publicis Sapient CEO Nigel Vaz in the panel on TIME 100 AI Summit in New York!\n\nWhen asked \"where do you think we would be with AI in 5 years from now\", this is what he said:\n\n\"I think we have not yet seen the conversation move to what is the Uber and the Airbnb of the AI era in the context of real transformation in business.\n\nWe're still focused today on the productivity gains, on the incremental value that we can create, which is perfectly fine given we're so early in this. But for me, I think the conversation, just like it moved from Cisco and infrastructure and browsers in the late 90s, I think we'll move away from talking about AI in the context of compute and models. Those will be assumptions.\n\nThe question will be, what is the business model shift we are enabling in health care, in retail, in transportation? And what are the definitive companies that exist today that will look for needed solutions that are materially different in the next few years or for new companies?\n\nJust like we saw in that comparison in the fact that the dot-com bubble burst in 1999 and 2000, but Airbnb and Uber hadn't been created. And Facebook was a nascent idea in a dorm room. And all of those shifts came after. And I think we're not yet in that. So I hope five years from now, we'll be talking about businesses like that.\"","post_image_url":"https://media.licdn.com/dms/image/v2/D4E22AQHNE7raQte98g/feedshare-shrink_800/B4EZ5sMeLFG0Ac-/0/1779931670241?e=1784160000&v=beta&t=Fa6-nVvI77w4ifKXcCUeWmJEJRYMLWCZF7Qe7WXt2vE","is_article":false,"article_url":null,"article_title":null,"article_description":null,"is_video":false,"video_url":null,"has_image":true,"reaction_count":140,"reaction_types":"LIKE, EMPATHY, PRAISE","repost_count":2,"impression_count":10145,"source":"activity"},{"is_my_post":true,"post_urn":"urn:li:activity:7465394588208517120","author_name":"Ravi Evani\n              \n                \n                   \n    \n      \n    \n    \n      \n    \n\n • You","author_profile_url":"https://www.linkedin.com/in/ravievani","author_headline":"Deploying enterprise agents in production / CTO / SWE Leader / GVP @ Publicis Sapient","posted_time":"2026-05-30","posted_hours_ago":672,"posted_time_raw":"4w","post_url":"https://www.linkedin.com/feed/update/urn:li:activity:7465394588208517120","author_profile_image_url":"https://media.licdn.com/dms/image/v2/C4E03AQGNeJRorEd2Nw/profile-displayphoto-shrink_100_100/profile-displayphoto-shrink_100_100/0/1569287114631?e=1784160000&v=beta&t=tJDZC7EXWnlgIIf8kF7fBCajhF-HEgzNXnz_IIkjqW8","post_text":"How can your hotel's chat bot be better than ChatGPT?\n\nGuests don’t just want conversation; they want execution. An AI that merely spits out a list of local tours is just a slow answering engine. Your agent must have a transactional mandate.\n\nIt shouldn’t just say: \"We recommend the sunset cruise\". It should say: \"There are exactly two spots left on the 5 PM sunset cruise. The weather is perfect. Shall I book it and charge it to your room?\"\n\nThe benefit, and the underlying work to get there is very different.\nArchitect your systems to prioritize workflow execution: querying live inventory, securing reservations, and finalizing logistics, over mere dialogue.\n\nActivities are one of the most emotional parts of the travel experience. In an agentic ecosystem, the experience layer is up for grabs. So build the infrastructure, deploy the agents, and start becoming the operating system for the trip.","post_image_url":null,"is_article":false,"article_url":null,"article_title":null,"article_description":null,"is_video":false,"video_url":null,"has_image":false,"reaction_count":13,"reaction_types":"LIKE","impression_count":816,"source":"activity"},{"is_my_post":true,"post_urn":"urn:li:activity:7464988030542598144","author_name":"Ravi Evani\n              \n                \n                   \n    \n      \n    \n    \n      \n    \n\n • You","author_profile_url":"https://www.linkedin.com/in/ravievani","author_headline":"Deploying enterprise agents in production / CTO / SWE Leader / GVP @ Publicis Sapient","posted_time":"2026-05-27","posted_hours_ago":720,"posted_time_raw":"1mo","post_url":"https://www.linkedin.com/feed/update/urn:li:activity:7464988030542598144","author_profile_image_url":"https://media.licdn.com/dms/image/v2/C4E03AQGNeJRorEd2Nw/profile-displayphoto-shrink_100_100/profile-displayphoto-shrink_100_100/0/1569287114631?e=1784160000&v=beta&t=tJDZC7EXWnlgIIf8kF7fBCajhF-HEgzNXnz_IIkjqW8","post_text":"Uber might be onto a zero-CAC flywheel for hotel bookings.\n\nUber doesn't need to buy your attention on Google because they already live on your home screen.\n\nThey solved the \"low-frequency\" travel problem by anchoring its app to high-frequency daily habits. You might only book a hotel twice a year, but you use Uber or Uber Eats weekly to get a ride home, commute to work, or order dinner. That daily utility keeps the app permanently installed and top-of-mind.\n\nAnd for \"high-frequency\" travelers .. Uber doesn't have to wait for you to search for a hotel; they already possess high-intent data. If you schedule an Uber Reserve to the airport for next Friday, the app instantly knows you are traveling. It can dynamically serve you a personalized, highly relevant hotel offer precisely at the moment of need and you might bypass answering engines entirely.\n\nAnd because Uber doesn't have to spend $ on a Google click to get you to look at a hotel, they could pass that saved CAC directly to you or to OTAs (like Expedia that they partner with for hotel inventory), or even the hotels. And perhaps to all three!. Plus it might strengthen the customer lock-in with Uber One.\n\nIn a world where customer acquisition costs are squeezing margins across the travel economy, the winner might be a company that never has to buy the click in the first place. And that might be where Uber is heading to. And I wonder what Gooogle would do about this!","post_image_url":"https://media.licdn.com/dms/image/v2/D4E22AQF3mT5UicmNNg/feedshare-shrink_800/B4EZ5j3DgmHQAc-/0/1779791837512?e=1784160000&v=beta&t=SjpOEPA9Wso1VV3S5SvSb33-0tcagx5nem_8cuUxwm0","is_article":false,"article_url":null,"article_title":null,"article_description":null,"is_video":false,"video_url":null,"has_image":true,"reaction_count":15,"reaction_types":"LIKE, INTEREST, EMPATHY","impression_count":688,"source":"activity"},{"is_my_post":true,"post_urn":"urn:li:activity:7464926399489966081","author_name":"Ravi Evani\n              \n                \n                   \n    \n      \n    \n    \n      \n    \n\n • You","author_profile_url":"https://www.linkedin.com/in/ravievani","author_headline":"Deploying enterprise agents in production / CTO / SWE Leader / GVP @ Publicis Sapient","posted_time":"2026-05-27","posted_hours_ago":720,"posted_time_raw":"1mo","post_url":"https://www.linkedin.com/feed/update/urn:li:activity:7464926399489966081","author_profile_image_url":"https://media.licdn.com/dms/image/v2/C4E03AQGNeJRorEd2Nw/profile-displayphoto-shrink_100_100/profile-displayphoto-shrink_100_100/0/1569287114631?e=1784160000&v=beta&t=tJDZC7EXWnlgIIf8kF7fBCajhF-HEgzNXnz_IIkjqW8","post_text":"\"Start change management earlier!\" is the worst advice you can get for deploying AI agents.\n\nThe problem isn't the timeline; it's the entire mental model.\n\nChange management implies your organization already has its sh*t together. It assumes your AI agents will perfectly work in the roles you intended for them. It assumes there a clear playbook just waiting for the people who will work with their agents.\n\nAgentic system development rarely works like that. You shuldn't pretend you have the workflow perfectly mapped out. You are throwing a dynamic agent and a human into the messy real world, and they have to figure out aspects of the new workflow together. In real-time.\n\nA person working with an AI agent might be more like riding a tandem bicycle together. The person and the agent get on the bike and figure out the messy real world together.\n\nThe agent adapts and leans; the person shifts their weight.\nThe person hits a bump; the agent adjusts its pedaling.\n\nYou can't \"manage\" that from the sidelines. The continuous, in-context co-evolution IS the process.\n\nThe work isn't done when the code is pushed. The person and their agent have to find their balance together.","post_image_url":"https://media.licdn.com/dms/image/v2/D4E05AQGRe3JRlTreAA/videocover-high/B4EZ5i.9ewHcBU-/0/1779777134991?e=1783137600&v=beta&t=vquedBk3gV5oKb3Qp4g0VM_wzu7FZazVOEg86egAHf8","is_article":false,"article_url":null,"article_title":null,"article_description":null,"is_video":true,"video_url":"https://media.licdn.com/dms/image/v2/D4E05AQGRe3JRlTreAA/videocover-high/B4EZ5i.9ewHcBU-/0/1779777134991?e=1783137600&v=beta&t=vquedBk3gV5oKb3Qp4g0VM_wzu7FZazVOEg86egAHf8","has_image":true,"reaction_count":14,"reaction_types":"LIKE","impression_count":570,"source":"activity"},{"is_my_post":true,"post_urn":"urn:li:activity:7464231232042627072","author_name":"Ravi Evani\n              \n                \n                   \n    \n      \n    \n    \n      \n    \n\n • You","author_profile_url":"https://www.linkedin.com/in/ravievani","author_headline":"Deploying enterprise agents in production / CTO / SWE Leader / GVP @ Publicis Sapient","posted_time":"2026-05-27","posted_hours_ago":720,"posted_time_raw":"1mo","post_url":"https://www.linkedin.com/feed/update/urn:li:activity:7464231232042627072","author_profile_image_url":"https://media.licdn.com/dms/image/v2/C4E03AQGNeJRorEd2Nw/profile-displayphoto-shrink_100_100/profile-displayphoto-shrink_100_100/0/1569287114631?e=1784160000&v=beta&t=tJDZC7EXWnlgIIf8kF7fBCajhF-HEgzNXnz_IIkjqW8","post_text":"Pragmatic Semantics: Why I have started to prefer maintaining ontologies in Python (over OWL) for agents.\n\nIn multi-agent Systems, agents require a shared semantic understanding of their environment (an ontology) to communicate, negotiate, and coordinate actions. Traditionally, ontologies are maintained in XML-based formats like RDF and OWL. While these work for formal description logic, they introduce significant friction into the live development and execution of agent swarms.\n\nHere is why maintaining ontologies in Python/Pydantic could work better for real-world production systems\n\n1. Unified Agent-Schema contracts: Modern software engineering has moved away from parsing raw schemas at runtime. Instead, we write neutral contracts (like Protobuf/gRPC, OpenAPI/Swagger, or GraphQL schemas) and compile them into native code bindings. Treating OWL as a design contract and translating it into Python Pydantic classes fits this model.\n\n2. Low Latency Swarm Coordination: In complex swarms, agents could dynamically negotiate and resolve conflicts in real time. Running description-logic reasoners on every agent decision could introduce unacceptable latency. Pythonic class execution is measured in milliseconds, preventing agent reasoning loops from stalling.\n\n3. Seamless agent state persistence & DB realities: While semantic graph databases are great for analytics, they are rarely used as the high-throughput, primary transactional databases for live applications. Agents must persist their internal states (goals, intentions, and memory) efficiently. Translating OWL concepts to Python classes makes it simple to map semantic concepts directly to standard SQL tables using ORM tools, keeping database transactions fast and simple while preserving semantic names.\n\nRule of Thumb\nUse OWL/RDF if your primary goal is knowledge integration across enterprise databases (e.g., merging flight data from Delta with airport data from the FAA where schemas differ significantly).\n\nConsider using Python/Pydantic if your primary goal is application logic, agent decision-making, and message contracts where type-safety and execution speed are important.","post_image_url":"https://media.licdn.com/dms/image/v2/D4E22AQFbKDWuvyWIAA/feedshare-shrink_800/B4EZ5XUWkiKMAc-/0/1779581413923?e=1784160000&v=beta&t=qDAKrnh4Rg5GKsmKW_AfPiXD0IWiD7XUr3Q5D0UKqoA","is_article":false,"article_url":null,"article_title":null,"article_description":null,"is_video":false,"video_url":null,"has_image":true,"reaction_count":21,"reaction_types":"LIKE, INTEREST","impression_count":1099,"source":"activity"},{"is_my_post":true,"post_urn":"urn:li:activity:7462577275310469124","author_name":"Ravi Evani\n              \n                \n                   \n    \n      \n    \n    \n      \n    \n\n • You","author_profile_url":"https://www.linkedin.com/in/ravievani","author_headline":"Deploying enterprise agents in production / CTO / SWE Leader / GVP @ Publicis Sapient","posted_time":"2026-05-27","posted_hours_ago":720,"posted_time_raw":"1mo","post_url":"https://www.linkedin.com/feed/update/urn:li:activity:7462577275310469124","author_profile_image_url":"https://media.licdn.com/dms/image/v2/C4E03AQGNeJRorEd2Nw/profile-displayphoto-shrink_100_100/profile-displayphoto-shrink_100_100/0/1569287114631?e=1784160000&v=beta&t=tJDZC7EXWnlgIIf8kF7fBCajhF-HEgzNXnz_IIkjqW8","post_text":"Can't wait to be done with meetings so I can try this out. It's gonna be a long night.","post_image_url":"https://media.licdn.com/dms/image/v2/D4E22AQH6Jkv_eENsFA/feedshare-shrink_800/B4EZ5BmfTVHEAc-/0/1779217069566?e=1784160000&v=beta&t=iON4YAR5LduAi7cn72VAnob2RFROgwoMYoqqydjaqpY","is_article":false,"article_url":null,"article_title":null,"article_description":null,"is_video":false,"video_url":null,"has_image":true,"reaction_count":26,"reaction_types":"LIKE, EMPATHY, INTEREST","comment_count":2,"impression_count":1776,"source":"activity"},{"is_my_post":true,"post_urn":"urn:li:activity:7462437136668020737","author_name":"Ravi Evani\n              \n                \n                   \n    \n      \n    \n    \n      \n    \n\n • You","author_profile_url":"https://www.linkedin.com/in/ravievani","author_headline":"Deploying enterprise agents in production / CTO / SWE Leader / GVP @ Publicis Sapient","posted_time":"2026-05-27","posted_hours_ago":720,"posted_time_raw":"1mo","post_url":"https://www.linkedin.com/feed/update/urn:li:activity:7462437136668020737","author_profile_image_url":"https://media.licdn.com/dms/image/v2/C4E03AQGNeJRorEd2Nw/profile-displayphoto-shrink_100_100/profile-displayphoto-shrink_100_100/0/1569287114631?e=1784160000&v=beta&t=tJDZC7EXWnlgIIf8kF7fBCajhF-HEgzNXnz_IIkjqW8","post_text":"We got into this debate while prepping slides.\n\nI’d laid out all the deep thinking in high density, and the feedback was: “Keep it high level. Put all the technical details in the appendix because someone non-technical (like procurement) is going to get confused” .\n\nBut I wasn’t having that. My point was simple: if we strip the depth of thought and reasoning, we lose. The person just checking boxes won’t know what sets us apart because every summary looks the same. And frankly, no one’s obsessing over the fancy slide formatting that we are spending hours on: they’re feeding it into AI anyway.\n\nAI will parse the depth of thought. If we only offer abstraction, AI could do that too. What matters now is what AI (and the client) finds beneath the surface: the real reasoning, the unique perspective, the actual thought process. If we don’t deliver that, we’re offering the same empty summary everyone else does.\n\nSo, yes, we’ll keep a summary slide for the \"execs\". But we’re not hiding the real thinking. In this new reality, what stands out isn’t something that’s easy to skim, unless its a social media scroll. It’s the unique opinion, the depth of thought, and the personalized insight tailored to the context that will eventually win.","post_image_url":null,"is_article":false,"article_url":null,"article_title":null,"article_description":null,"is_video":false,"video_url":null,"has_image":false,"reaction_count":18,"reaction_types":"LIKE, APPRECIATION","comment_count":1,"impression_count":1116,"source":"activity"},{"is_my_post":true,"post_urn":"urn:li:activity:7462410255902109696","author_name":"Ravi Evani\n              \n                \n                   \n    \n      \n    \n    \n      \n    \n\n • You","author_profile_url":"https://www.linkedin.com/in/ravievani","author_headline":"Deploying enterprise agents in production / CTO / SWE Leader / GVP @ Publicis Sapient","posted_time":"2026-05-27","posted_hours_ago":720,"posted_time_raw":"1mo","post_url":"https://www.linkedin.com/feed/update/urn:li:activity:7462410255902109696","author_profile_image_url":"https://media.licdn.com/dms/image/v2/C4E03AQGNeJRorEd2Nw/profile-displayphoto-shrink_100_100/profile-displayphoto-shrink_100_100/0/1569287114631?e=1784160000&v=beta&t=tJDZC7EXWnlgIIf8kF7fBCajhF-HEgzNXnz_IIkjqW8","post_text":"A sovereign architecture is about owning the control points that determine your future leverage.\n\nSo no, you do not need to own the LLM to have a sovereign architecture.\n\nYou also do not need to build every part of the agent harness yourself.\n\nA vendor harness deployed in your environment can still be sovereign, as long as it is enterprise-controlled, not vendor-controlled.\n\nThat means you own the data, identity graph, context graph, policies, memory, telemetry, audit logs, evaluation rules, and workflow definitions.\n\nYou can inspect and govern how the harness reasons, acts, stores context, calls tools, and escalates decisions.\n\nAnd most importantly, you can switch models, change vendors, or replace the harness without losing institutional intelligence.\n\nSo the better distinction is not:\n\nVendor-built vs. enterprise-built.\n\nIt is:\n\nVendor-controlled vs. enterprise-controlled.\n\nThe LLM then becomes a replaceable inference engine inside that system.\n\nA lot of enterprises are accidentally confusing “using AI” with “building AI capability.” Those are very different things.\n\nIf your architecture looks like:\n\nEnterprise → Vendor Identity Graph → Vendor Agents → Vendor Memory → Vendor Workflows → Vendor Models\n\n…then the enterprise is effectively renting intelligence from someone else’s operating layer.\n\nBut if the architecture looks like:\n\nEnterprise Data + Identity + Context Graph + Policies + Workflows + Memory + Orchestration\n→ routed into whichever LLM or agent harness is best for the task\n\n…then the enterprise retains leverage.\n\nToday that may be Claude.\nTomorrow Gemini.\nThen an open-source reasoning model.\nThen a domain-specific model.\n\nThe key is that the intelligence substrate remains yours.\n\nThis is why the most important layer in enterprise AI may not be the model layer at all. It may be the context graph, orchestration fabric, agent runtime, evaluation harness, identity layer, and governance model.\n\nThe model is increasingly becoming interchangeable infrastructure.\n\nThe harness can be vendor-built. That is fine. In many cases, that is the practical answer.\n\nBut what the harness learns, how it acts, where memory compounds, and whether you can replace it … that is where sovereignty lives.","post_image_url":null,"is_article":false,"article_url":null,"article_title":null,"article_description":null,"is_video":false,"video_url":null,"has_image":false,"reaction_count":9,"reaction_types":"LIKE, APPRECIATION","comment_count":2,"impression_count":576,"source":"activity"},{"is_my_post":true,"post_urn":"urn:li:activity:7461816525935714304","author_name":"Ravi Evani\n              \n                \n                   \n    \n      \n    \n    \n      \n    \n\n • You","author_profile_url":"https://www.linkedin.com/in/ravievani","author_headline":"Deploying enterprise agents in production / CTO / SWE Leader / GVP @ Publicis Sapient","posted_time":"2026-05-27","posted_hours_ago":720,"posted_time_raw":"1mo","post_url":"https://www.linkedin.com/feed/update/urn:li:activity:7461816525935714304","author_profile_image_url":"https://media.licdn.com/dms/image/v2/C4E03AQGNeJRorEd2Nw/profile-displayphoto-shrink_100_100/profile-displayphoto-shrink_100_100/0/1569287114631?e=1784160000&v=beta&t=tJDZC7EXWnlgIIf8kF7fBCajhF-HEgzNXnz_IIkjqW8","post_text":"Planning Agentic AI programs needs a lot more than \"agile\".\n\nAn agentic program is planned around business scenarios rather than predefined features, with discovery and prototyping driving the shape of execution instead of a fixed upfront plan. The program begins by seeding a broad enterprise context graph and defining AI personas, then identifying a small set of high-value workflows (e.g., alert triage, maintenance). These scenarios become the primary planning unit, where each is explored through early prototypes to understand data needs, decision logic, and user interactions. This allows the team to progressively build clarity on what needs to be delivered rather than assuming it from the start.\n\nA critical part of planning is the explicit risk mitigation phase, where the team proactively addresses three dimensions: system capability, trust/adoption, and human-in-the-loop interaction. Instead of deferring these concerns, they are embedded into scenario walkthroughs and early designs—defining what the AI produces, what users need to see to trust it, and how they interact with it. This phase refines not just the solution, but the execution model itself, ensuring that delivery includes trust signals, validation loops, and adoption mechanisms alongside core functionality.\n\nExecution then proceeds as a scenario-driven, parallel build model, where each workflow is broken down into layered stories covering decision logic, agent behaviors, data (context graph expansion), orchestration, and user interaction. Multiple tracks—data, agents, UX, and orchestration—run concurrently, with continuous validation through prototypes, user feedback, and back-testing against historical data. As scenarios mature, reusable patterns emerge, allowing the program to scale systematically across additional workflows, evolving into a continuous, learning system rather than a one-time delivery effort.","post_image_url":"https://media.licdn.com/dms/image/v2/D4E22AQFH-NKGW-D9Iw/feedshare-shrink_800/B4EZ42ylrbKkAc-/0/1779035692018?e=1784160000&v=beta&t=-v-xWIPfJVA1949ysO9VSqEdxlS_y0VkxZ3-FmgYJoo","is_article":false,"article_url":null,"article_title":null,"article_description":null,"is_video":false,"video_url":null,"has_image":true,"reaction_count":20,"reaction_types":"LIKE","comment_count":1,"impression_count":1292,"source":"activity"},{"is_my_post":true,"post_urn":"urn:li:activity:7461789875558608896","author_name":"Ravi Evani\n              \n                \n                   \n    \n      \n    \n    \n      \n    \n\n • You","author_profile_url":"https://www.linkedin.com/in/ravievani","author_headline":"Deploying enterprise agents in production / CTO / SWE Leader / GVP @ Publicis Sapient","posted_time":"2026-05-27","posted_hours_ago":720,"posted_time_raw":"1mo","post_url":"https://www.linkedin.com/feed/update/urn:li:activity:7461789875558608896","author_profile_image_url":"https://media.licdn.com/dms/image/v2/C4E03AQGNeJRorEd2Nw/profile-displayphoto-shrink_100_100/profile-displayphoto-shrink_100_100/0/1569287114631?e=1784160000&v=beta&t=tJDZC7EXWnlgIIf8kF7fBCajhF-HEgzNXnz_IIkjqW8","post_text":"Devs of the pre-LLM era didn't have to worry about \"project costs\". Now they do.\n\nIn the world before LLMs, inefficient code usually meant a slight bump in latency or a marginally higher cloud hosting bill at the end of the month. In the age of \"autonomous agents\", an inefficient prompt, a bloated context window, or an agent caught in an infinite loop translates to direct, immediate financial bleed. Building a capable agent is now table stakes; building a profitable agent at scale is the true engineering challenge.\n\nWe are officially the era of AI FinOps.\n\nTo turn this \"boring\" necessity into an actionable company culture, teams need a practical framework for navigating the new Iron Triangle of AI: Speed vs. Quality vs. Cost.\n\n1. Matching cognitive load to compute: Engineers must unlearn the habit of defaulting to the most powerful (and expensive) frontier models for every task. Cost-aware engineering means building routers. Use blazing-fast, ultra-cheap models for triage, formatting, summarization, or intent classification. Only escalate to frontier models when deep reasoning, complex orchestration, or final synthesis is strictly necessary.\n\n2. The token diet: Just because a model can accept a 2-million token context window doesn't mean it should. Engineers must treat the context window like precious, limited RAM—not a cheap hard drive. Blindly stuffing the top 20 RAG search results into a prompt \"just in case\" is lazy engineering. Every unnecessary word in a system prompt is a recurring tax paid on every single invocation.\n\n3. Bounding agent autonomy: Giving an agent tools and an unbounded while(true) loop to \"figure it out\" is the equivalent of handing a script an open corporate credit card. Devs must implement \"Autonomy Budgets\"—strict limits on max_iterations, token ceilings per session, and deterministic off-ramps (e.g., \"If you fail 3 times, stop reasoning and trigger a Human-in-the-Loop fallback\").\n\n4. Semantic caching & batching: Why pay an LLM to generate an answer to a question it already solved? Semantic caching (using vector embeddings to detect highly similar queries) serves pre-computed answers instantly for practically zero cost. Furthermore, shifting non-urgent background tasks (like nightly log summarization) to Batch APIs can instantly cut token costs by 50%.\n\nUltimately, constraints breed creativity. Early programmers in the 1960s and 70s had to write incredibly elegant code because CPU cycles and memory were strictly limited. Today, tokens are the new finite resource. Be the devs whose agents can execute autonomously without bankrupting the business.","post_image_url":null,"is_article":false,"article_url":null,"article_title":null,"article_description":null,"is_video":false,"video_url":null,"has_image":false,"reaction_count":21,"reaction_types":"LIKE, EMPATHY","repost_count":1,"impression_count":1297,"source":"activity"},{"is_my_post":true,"post_urn":"urn:li:activity:7461399381112451072","author_name":"Ravi Evani\n              \n                \n                   \n    \n      \n    \n    \n      \n    \n\n • You","author_profile_url":"https://www.linkedin.com/in/ravievani","author_headline":"Deploying enterprise agents in production / CTO / SWE Leader / GVP @ Publicis Sapient","posted_time":"2026-05-27","posted_hours_ago":720,"posted_time_raw":"1mo","post_url":"https://www.linkedin.com/feed/update/urn:li:activity:7461399381112451072","author_profile_image_url":"https://media.licdn.com/dms/image/v2/C4E03AQGNeJRorEd2Nw/profile-displayphoto-shrink_100_100/profile-displayphoto-shrink_100_100/0/1569287114631?e=1784160000&v=beta&t=tJDZC7EXWnlgIIf8kF7fBCajhF-HEgzNXnz_IIkjqW8","post_text":"If companies shift to agent-to-agent transactions, the legal structure will need to evolve fast. Those agents, backed by cryptographic IDs, will be acting as digital proxies, so any misstep (whether it’s a faulty contract or financial error) will fall on the company. That means firms will need to set clear internal accountability, revoke agent access quickly when needed, and audit agent actions like they do employees. Expect new insurance markets to pop up (think agent malpractice coverage) because if agents act on behalf of the business, the business is on the hook.","post_image_url":"https://media.licdn.com/dms/image/v2/D4E05AQHgQt72TFHDGw/videocover-high/B4EZ4w3KmuH8BM-/0/1778936230450?e=1783137600&v=beta&t=fA_d37_wZk2uvI27obGhKVsNoKZoiYDwOieWETF0nCE","is_article":false,"article_url":null,"article_title":null,"article_description":null,"is_video":true,"video_url":"https://media.licdn.com/dms/image/v2/D4E05AQHgQt72TFHDGw/videocover-high/B4EZ4w3KmuH8BM-/0/1778936230450?e=1783137600&v=beta&t=fA_d37_wZk2uvI27obGhKVsNoKZoiYDwOieWETF0nCE","has_image":true,"reaction_count":9,"reaction_types":"LIKE, INTEREST","comment_count":1,"impression_count":533,"source":"activity"},{"is_my_post":true,"post_urn":"urn:li:activity:7461055042402316288","author_name":"Ravi Evani\n              \n                \n                   \n    \n      \n    \n    \n      \n    \n\n • You","author_profile_url":"https://www.linkedin.com/in/ravievani","author_headline":"Deploying enterprise agents in production / CTO / SWE Leader / GVP @ Publicis Sapient","posted_time":"2026-05-27","posted_hours_ago":720,"posted_time_raw":"1mo","post_url":"https://www.linkedin.com/feed/update/urn:li:activity:7461055042402316288","author_profile_image_url":"https://media.licdn.com/dms/image/v2/C4E03AQGNeJRorEd2Nw/profile-displayphoto-shrink_100_100/profile-displayphoto-shrink_100_100/0/1569287114631?e=1784160000&v=beta&t=tJDZC7EXWnlgIIf8kF7fBCajhF-HEgzNXnz_IIkjqW8","post_text":"Operational agents are not Gen AI sitting on top of enterprise systems.\n\nBuilding operational agents is not the same as building productivity agents. A productivity agent might influence how a document is written. An operational agent might influence how a turbine is serviced.\n\nIn operational environments, the agent should understand the operating context, connect live signals with historical knowledge, use the right type of intelligence for the job, explain why it made a recommendation, stay out of the failure path of critical systems, and escalate when a decision crosses a safety, labor, warranty, or compliance boundary.\n\nThis is where many AI architectures start to wobble. They treat operational AI like a GenAI layer sitting on top of enterprise systems. Add a model, connect a few data sources, sprinkle in some prompts, and call it an agent. That may work for a demo. It does not work when the decision affects uptime, safety, cost, or compliance.\n\nOperational decisions rarely come from one clean data source. They depend on structured data from systems like SAP, SCADA, asset platforms, telemetry feeds, and work management systems. They also depend on unstructured knowledge from manuals, inspection notes, engineering documents, incident history, field observations, and the kind of operational tribal knowledge that usually lives in someone’s head until they retire.\n\nThe hard part is turning all of it into a usable operational picture. That is why an Enterprise Context Graph matters. It gives the agent a working understanding of assets, sites, rules, relationships, constraints, prior events, and operating boundaries.\n\nThere is another trap: assuming every operational problem needs the same type of AI. It does not. Scheduling may need deterministic optimization. Forecasting may need probabilistic models. Technical document analysis may need generative reasoning. Anomaly detection may need machine learning. Workflow execution may need agentic orchestration.\n\nTrust matters as much as speed. Operators do not just need an answer. They need to know why the answer was recommended, what evidence supports it, what assumptions were made, what rule or model was used, what risk boundary was checked, and where human judgment is still required.\n\nThat is the difference between AI that generates output and AI that supports operational decisions.\n\nThe architecture matters too. Operational AI should not sit inside the failure path of critical systems. It should operate around systems like ERP, asset operations, communications, and control platforms, not destabilize them. The agentic layer should add intelligence, automation, and optimization without creating a new operational risk surface.\n\nLess magic trick. More mission control.","post_image_url":null,"is_article":false,"article_url":null,"article_title":null,"article_description":null,"is_video":false,"video_url":null,"has_image":false,"reaction_count":7,"reaction_types":"LIKE, INTEREST","impression_count":485,"source":"activity"},{"is_my_post":true,"post_urn":"urn:li:activity:7460442676090327040","author_name":"Ravi Evani\n              \n                \n                   \n    \n      \n    \n    \n      \n    \n\n • You","author_profile_url":"https://www.linkedin.com/in/ravievani","author_headline":"Deploying enterprise agents in production / CTO / SWE Leader / GVP @ Publicis Sapient","posted_time":"2026-05-27","posted_hours_ago":720,"posted_time_raw":"1mo","post_url":"https://www.linkedin.com/feed/update/urn:li:activity:7460442676090327040","author_profile_image_url":"https://media.licdn.com/dms/image/v2/C4E03AQGNeJRorEd2Nw/profile-displayphoto-shrink_100_100/profile-displayphoto-shrink_100_100/0/1569287114631?e=1784160000&v=beta&t=tJDZC7EXWnlgIIf8kF7fBCajhF-HEgzNXnz_IIkjqW8","post_text":"Here's my take from hashtag#googlenext2026 annoucements, based on this conversation with our Google expert David \"Mac\" McDaniel:\n\nGoogle is maturing fast in building the infra for the autonomous enterprise.\n\n1. Agents become a deeper part of the enterprise workforce\nThe combination of agent identity, registries, memory, and marketplaces means agents can start acting as authorized digital workers.\n\nA procurement agent could negotiate with a vendor’s sales agent. A finance agent could approve spend within policy.\n\nThat creates a very different question:\nNot “Can AI answer questions?”\nBut “What decisions are we comfortable allowing software to make on behalf of the company?”\n\nIf an agent commits to the wrong commercial terms or applies the wrong policy the company cannot simply blame the model.\n\nThe enterprise will need agent access controls, audit trails, revocation processes, approval thresholds, and probably even new liability models.\n\nAgents will increasingly need to be managed less like tools and more like digital employees.\n\n2. Google is trying to become the intelligence layer above every cloud\n\nCross-cloud lakehouse, Spanner Omni, Agentic Data Cloud, and Knowledge Catalog point to a bigger strategic move.\n\nGoogle is saying, “Keep your data where it is, but let Google become the brain that understands and acts on it\".\n\nThat matters because Cloud lock-in has historically been driven by data gravity. Once the data is in AWS, Azure, or Google Cloud, moving it becomes expensive and risky.\n\nBut if Google’s agents can read, reason across, and act on data sitting in different clouds, the lock-in shifts, the storage layer becomes less important and the orchestration and intelligence layer becomes more important.\n\n3. FinOps becomes an agentic control problem\n\nAutonomous agents do not sleep, and that has a very real cost impl
