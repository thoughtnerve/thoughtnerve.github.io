tion_types":"LIKE, EMPATHY, PRAISE","comment_count":4,"repost_count":1,"impression_count":4230,"source":"activity"},{"is_my_post":true,"post_urn":"urn:li:activity:7299572294710972416","author_name":"Ravi Evani\n              \n                \n                   \n    \n      \n    \n    \n      \n    \n\n • You","author_profile_url":"https://www.linkedin.com/in/ravievani","author_headline":"Deploying enterprise agents in production / CTO / SWE Leader / GVP @ Publicis Sapient","posted_time":"2025-06-27","posted_hours_ago":8760,"posted_time_raw":"1yr","post_url":"https://www.linkedin.com/feed/update/urn:li:activity:7299572294710972416","author_profile_image_url":"https://media.licdn.com/dms/image/v2/C4E03AQGNeJRorEd2Nw/profile-displayphoto-shrink_100_100/profile-displayphoto-shrink_100_100/0/1569287114631?e=1784160000&v=beta&t=tJDZC7EXWnlgIIf8kF7fBCajhF-HEgzNXnz_IIkjqW8","post_text":"One of the most impactful, cost-neutral opportunities in enterprise IT is leveraging AI to improve system reliability. This short clip shows how to apply it to one key area underpinning reliability: Testing.\n\n===\nToday, enterprises seem to be focusing their hashtag#ai efforts on flashy, forward-looking projects, but one of the most immediate and impactful use cases is to fortify the quality, stability and reliability of production-critical applications.\n\nThe thing is, AI can significantly help improve system reliability—not necessarily by rewriting code, but by transforming how codebases are validated. Two key areas where AI really shines in testing are it’s ability to simulating real world test cases and test data.\n\nYou can create not just a handful, but hundreds of thousands of unique test scenarios. Simulating real world user behavior on a scale no human team could ever dream of. AI tools can dive into your code, figure out its weak spots, and then bombard it with data. All kinds of data, even those weird edge cases that we human often miss, the ones that usually cause the biggest crashes.\n\nWhile for many, this might seem like an obvious evolution in software testing. But in reality, large enterprises are barely scratching the surface when it comes to capitalizing on this.\n\nThe best part? This can be brought to life in a cost-neutral way—without blowing up budgets or slowing down innovation.","post_image_url":"https://media.licdn.com/dms/image/v2/D4E05AQHaYCrKxMqCuw/videocover-high/B4EZU1KRi_G0Bs-/0/1740353647740?e=1783137600&v=beta&t=uq4-_YOEGLFTQMv4hf8oB5-xzwmhQhmW6T0-7o_2jAo","is_article":false,"article_url":null,"article_title":null,"article_description":null,"is_video":true,"video_url":"https://media.licdn.com/dms/image/v2/D4E05AQHaYCrKxMqCuw/videocover-high/B4EZU1KRi_G0Bs-/0/1740353647740?e=1783137600&v=beta&t=uq4-_YOEGLFTQMv4hf8oB5-xzwmhQhmW6T0-7o_2jAo","has_image":true,"reaction_count":10,"reaction_types":"LIKE, EMPATHY","impression_count":1275,"source":"activity"},{"is_my_post":true,"post_urn":"urn:li:activity:7298819998544777217","author_name":"Ravi Evani\n              \n                \n                   \n    \n      \n    \n    \n      \n    \n\n • You","author_profile_url":"https://www.linkedin.com/in/ravievani","author_headline":"Deploying enterprise agents in production / CTO / SWE Leader / GVP @ Publicis Sapient","posted_time":"2025-06-27","posted_hours_ago":8760,"posted_time_raw":"1yr","post_url":"https://www.linkedin.com/feed/update/urn:li:activity:7298819998544777217","author_profile_image_url":"https://media.licdn.com/dms/image/v2/C4E03AQGNeJRorEd2Nw/profile-displayphoto-shrink_100_100/profile-displayphoto-shrink_100_100/0/1569287114631?e=1784160000&v=beta&t=tJDZC7EXWnlgIIf8kF7fBCajhF-HEgzNXnz_IIkjqW8","post_text":"Publicis Sapient EngineeringNext 2024 set the bar high—can’t wait to see what’s in store for hashtag#ai @ EngineeringNext 2025!","post_image_url":"https://media.licdn.com/dms/image/v2/D4E05AQF96C0ehn7DXw/videocover-low/B4EZUqd4eFHcCM-/0/1740174244576?e=1783137600&v=beta&t=yAHWdVY1fj5ppVOz-HPNmU_zu5Vjg53APZpfeOBj0g4","is_article":false,"article_url":null,"article_title":null,"article_description":null,"is_video":true,"video_url":"https://media.licdn.com/dms/image/v2/D4E05AQF96C0ehn7DXw/videocover-low/B4EZUqd4eFHcCM-/0/1740174244576?e=1783137600&v=beta&t=yAHWdVY1fj5ppVOz-HPNmU_zu5Vjg53APZpfeOBj0g4","has_image":true,"reaction_count":46,"reaction_types":"LIKE, EMPATHY","repost_count":1,"impression_count":1612,"source":"activity"},{"is_my_post":true,"post_urn":"urn:li:activity:7297940506385240064","author_name":"Ravi Evani\n              \n                \n                   \n    \n      \n    \n    \n      \n    \n\n • You","author_profile_url":"https://www.linkedin.com/in/ravievani","author_headline":"Deploying enterprise agents in production / CTO / SWE Leader / GVP @ Publicis Sapient","posted_time":"2025-06-27","posted_hours_ago":8760,"posted_time_raw":"1yr","post_url":"https://www.linkedin.com/feed/update/urn:li:activity:7297940506385240064","author_profile_image_url":"https://media.licdn.com/dms/image/v2/C4E03AQGNeJRorEd2Nw/profile-displayphoto-shrink_100_100/profile-displayphoto-shrink_100_100/0/1569287114631?e=1784160000&v=beta&t=tJDZC7EXWnlgIIf8kF7fBCajhF-HEgzNXnz_IIkjqW8","post_text":"Recently, I had a great check-in @ Publicis Sapient India with our Financial Services Learning cohort— who are deep into an intense up-skilling journey to becoming AI Engineers.\n\nOne thought-provoking question came up: As AI models improve, the cost of each incremental gain is skyrocketing. Does this mean innovation will slow down? Should software engineers wait for the next big breakthrough?\n\nMy take: Regardless of what the future holds—there’s already a massive amount of value to unlock today. Instead of waiting, we should focus on catching up and capitalizing on what's already here. The way we code has already been disrupted—now it’s about leveraging what’s here to drive impact.\n\nAditya Yashwanth Rahul Sachin Vinod Manoj Uday Amzad Shweta Kapil Navneet Shashaank D prise agents in production / CTO / SWE Leader / GVP @ Publicis Sapient","posted_time":"2025-06-27","posted_hours_ago":8760,"posted_time_raw":"1yr","post_url":"https://www.linkedin.com/feed/update/urn:li:activity:7296118211480092672","author_profile_image_url":"https://media.licdn.com/dms/image/v2/C4E03AQGNeJRorEd2Nw/profile-displayphoto-shrink_100_100/profile-displayphoto-shrink_100_100/0/1569287114631?e=1784160000&v=beta&t=tJDZC7EXWnlgIIf8kF7fBCajhF-HEgzNXnz_IIkjqW8","post_text":"Ever wondered why hashtag#travel (flight, hotel, car) contact center agents sound like they're speaking in code? 🤖\n\nRemember when you were trying to change a hotel booking, and the agent is typing away like they're hacking the Matrix? That's because they literally are! Travel contact center agents have been stuck using these mainframe systems called Global Distribution Systems (GDS).\n\nThe wild part? Every time you say something simple like \"I need to change my King room to 2 Queen beds,\" they have to mentally translate that into cryptic commands. We're talking thousands of possible combinations.\n\nBut here's where it gets interesting...\n\nUsing Publicis Sapient hashtag#Slingshot AI platform, that contains built-in Travel & Hospitality context—we've created an API that turns regular human language into these ancient GDS commands instantly (see video). Think of it as a machine translator for travel-speak. No more mental gymnastics for agents!\n\nThis API can plug straight into CRM like hashtag#Salesforce, hashtag#Pega, etc, enabling CC agents to interact with cryptic systems more naturally.\n\nThis is how we're infusing hashtag#ai into hashtag#travel & hashtag#hospitality tech in 2025 – one decoded command at a time. Because let's be honest, nobody has time to learn Klingon just to book a vacation. 🚀","post_image_url":"https://media.licdn.com/dms/image/v2/D4E05AQHe0WGxieW2mQ/videocover-high/B4EZUEEztpGgBs-/0/1739530130034?e=1783137600&v=beta&t=VwkoRnh-d9YMM5DE4D1Zg-YB0s-gYgYU9RqhvG3C1S4","is_article":false,"article_url":null,"article_title":null,"article_description":null,"is_video":true,"video_url":"https://media.licdn.com/dms/image/v2/D4E05AQHe0WGxieW2mQ/videocover-high/B4EZUEEztpGgBs-/0/1739530130034?e=1783137600&v=beta&t=VwkoRnh-d9YMM5DE4D1Zg-YB0s-gYgYU9RqhvG3C1S4","has_image":true,"reaction_count":77,"reaction_types":"LIKE, PRAISE, EMPATHY","comment_count":3,"impression_count":7721,"source":"activity"},{"is_my_post":true,"post_urn":"urn:li:activity:7295047347665842176","author_name":"Ravi Evani\n              \n                \n                   \n    \n      \n    \n    \n      \n    \n\n • You","author_profile_url":"https://www.linkedin.com/in/ravievani","author_headline":"Deploying enterprise agents in production / CTO / SWE Leader / GVP @ Publicis Sapient","posted_time":"2025-06-27","posted_hours_ago":8760,"posted_time_raw":"1yr","post_url":"https://www.linkedin.com/feed/update/urn:li:activity:7295047347665842176","author_profile_image_url":"https://media.licdn.com/dms/image/v2/C4E03AQGNeJRorEd2Nw/profile-displayphoto-shrink_100_100/profile-displayphoto-shrink_100_100/0/1569287114631?e=1784160000&v=beta&t=tJDZC7EXWnlgIIf8kF7fBCajhF-HEgzNXnz_IIkjqW8","post_text":"Use this “mixture of models” approach created by one of my teams Jackson Heintz Thomas Hari Budihardjo Kevin Thomas to mass lift-and-shift on-prem apps to hashtag#AWS, with the help of hashtag#Google Gemini, hashtag#Azure Open AI and Publicis Sapient hashtag#Slingshot AI Assistant 🚀","post_image_url":"https://media.licdn.com/dms/image/v2/D4E05AQFS9dpj26PINQ/feedshare-thumbnail_720_1280/B4EZT02yNJHUA8-/0/1739274790321?e=1783137600&v=beta&t=NL2FokvVuEgIGfUTxdhIbKQJEIf2fOk92NTFmxQeV8w","is_article":false,"article_url":null,"article_title":null,"article_description":null,"is_video":true,"video_url":"https://media.licdn.com/dms/image/v2/D4E05AQFS9dpj26PINQ/feedshare-thumbnail_720_1280/B4EZT02yNJHUA8-/0/1739274790321?e=1783137600&v=beta&t=NL2FokvVuEgIGfUTxdhIbKQJEIf2fOk92NTFmxQeV8w","has_image":true,"reaction_count":44,"reaction_types":"LIKE, EMPATHY, PRAISE","comment_count":1,"repost_count":1,"impression_count":2437,"source":"activity"},{"is_my_post":true,"post_urn":"urn:li:activity:7291631486095482880","author_name":"Ravi Evani\n              \n                \n                   \n    \n      \n    \n    \n      \n    \n\n • You","author_profile_url":"https://www.linkedin.com/in/ravievani","author_headline":"Deploying enterprise agents in production / CTO / SWE Leader / GVP @ Publicis Sapient","posted_time":"2025-06-27","posted_hours_ago":8760,"posted_time_raw":"1yr","post_url":"https://www.linkedin.com/feed/update/urn:li:activity:7291631486095482880","author_profile_image_url":"https://media.licdn.com/dms/image/v2/C4E03AQGNeJRorEd2Nw/profile-displayphoto-shrink_100_100/profile-displayphoto-shrink_100_100/0/1569287114631?e=1784160000&v=beta&t=tJDZC7EXWnlgIIf8kF7fBCajhF-HEgzNXnz_IIkjqW8","post_text":"Example of an agentic flow for migrating an on-prem app to hashtag#AWS—powered by Publicis Sapient Slingshot AI platform, and a strategic mix of LLMs. 🚀","post_image_url":"https://media.licdn.com/dms/image/v2/D4E22AQEK2hKw73cw1A/feedshare-shrink_800/B4EZTEUMWfHMAg-/0/1738460417052?e=1784160000&v=beta&t=xedIZnRVxX5TlzU0HALlfZuOuzJw5fGx8-J6BLhs64w","is_article":false,"article_url":null,"article_title":null,"article_description":null,"is_video":false,"video_url":null,"has_image":true,"reaction_count":124,"reaction_types":"LIKE, INTEREST","comment_count":2,"repost_count":3,"impression_count":8129,"source":"activity"},{"is_my_post":true,"post_urn":"urn:li:activity:7289969035843125249","author_name":"Ravi Evani\n              \n                \n                   \n    \n      \n    \n    \n      \n    \n\n • You","author_profile_url":"https://www.linkedin.com/in/ravievani","author_headline":"Deploying enterprise agents in production / CTO / SWE Leader / GVP @ Publicis Sapient","posted_time":"2025-06-27","posted_hours_ago":8760,"posted_time_raw":"1yr","post_url":"https://www.linkedin.com/feed/update/urn:li:activity:7289969035843125249","author_profile_image_url":"https://media.licdn.com/dms/image/v2/C4E03AQGNeJRorEd2Nw/profile-displayphoto-shrink_100_100/profile-displayphoto-shrink_100_100/0/1569287114631?e=1784160000&v=beta&t=tJDZC7EXWnlgIIf8kF7fBCajhF-HEgzNXnz_IIkjqW8","post_text":"Great discussion with one of my teams at the Publicis Sapient Gurgaon, India office about how AI is transforming the software development lifecycle.\n\nOne of the key questions raised was: With AI now capable of writing code and generating solutions, what will be the role of engineers in the future? Here’s how we answered it:\n\n1. AI generates code, but It needs guidance:\nWhile AI can generate code, it often lacks the ability to ensure scalability, performance, maintainability, or even interpretability for future systems, including other AIs. Engineers will play a critical role in steering AI to produce the right architecture, abstractions, and implementations. To do this effectively, we’ll need to be more proficient than the AI itself, identifying and fixing issues AI introduces.\n\n2. The demand for software development will multiply:\nAI is like moving from using shovels to using excavators. The demand for software will explode as it becomes more disposable and purpose-built. Additionally, every piece of software can now be made more intelligent, opening opportunities to create a massive corpus of code for intelligent systems. Engineers will be essential in building these systems, especially as we move beyond legacy, deterministic codebases.\n\n3. Broadening skills is non-negotiable:\nEngineers who only take directions and implement requirements will be disrupted by AI. However, those who broaden their skill sets—solving business problems, playing multi-dimensional roles, and leveraging AI for code generation—will be in a stronger position. The ability to think holistically and creatively will be invaluable.\n\n4. Domain knowledge is key to be the human in the loop:\nTo effectively manage and steer AI output, deep domain knowledge and expertise are essential. This ties back to the earlier point about needing to be proficient enough to review and refine what AI produces.\n\n5. AI will be universal, but creativity will differentiate us:\nLike how Google and the internet democratized access to information, AI will become ubiquitous. But the outcomes will depend on how we use it, what we create with it, and the level of creativity and innovation we bring to the table.\n\n6. Human needs remain unchanged:\nDespite AI’s capabilities, our fundamental human needs—certainty, variety, connection, growth, and contribution—remain unchanged. AI might help us meet these needs at a higher level, but it’s up to us to define how we leverage it for meaningful impact to ourselves.","post_image_url":"https://media.licdn.com/dms/image/v2/D4E22AQEirLPqq_IgzQ/feedshare-shrink_800/B4EZSssC78HgAg-/0/1738064055666?e=1784160000&v=beta&t=ulRebt7wICfDIrnlP9tcDxXfN7BMi0DsVLyyp-iHFhQ","is_article":false,"article_url":null,"article_title":null,"article_description":null,"is_video":false,"video_url":null,"has_image":true,"reaction_count":621,"reaction_types":"LIKE, PRAISE, EMPATHY","comment_count":8,"repost_count":5,"impression_count":86520,"source":"activity"},{"is_my_post":true,"post_urn":"urn:li:activity:7289858553660493824","author_name":"Ravi Evani\n              \n                \n                   \n    \n      \n    \n    \n      \n    \n\n • You","author_profile_url":"https://www.linkedin.com/in/ravievani","author_headline":"Deploying enterprise agents in production / CTO / SWE Leader / GVP @ Publicis Sapient","posted_time":"2025-06-27","posted_hours_ago":8760,"posted_time_raw":"1yr","post_url":"https://www.linkedin.com/feed/update/urn:li:activity:7289858553660493824","author_profile_image_url":"https://media.licdn.com/dms/image/v2/C4E03AQGNeJRorEd2Nw/profile-displayphoto-shrink_100_100/profile-displayphoto-shrink_100_100/0/1569287114631?e=1784160000&v=beta&t=tJDZC7EXWnlgIIf8kF7fBCajhF-HEgzNXnz_IIkjqW8","post_text":"The fact that DeepSeek R1's multi-token reading capability processes text in chunks rather than word-by-word, with minimal accuracy loss, reinforces that the LCM architecture could work in production—especially if consider these text chunks as analogous to \"concepts\".\n\nAnyone from LCM team —would love your perspective on this: Loic Barrault, Paul-Ambroise Duquenne, Maha Elbayad","post_image_url":null,"is_article":true,"article_url":"https://lnkd.in/e5vMUtkN","article_title":"https://lnkd.in/e5vMUtkN","article_description":"","is_video":false,"video_url":null,"has_image":false,"reaction_count":1,"reaction_types":"INTEREST","impression_count":504,"source":"activity"},{"is_my_post":true,"post_urn":"urn:li:activity:7289604123228803072","author_name":"Ravi Evani\n              \n                \n                   \n    \n      \n    \n    \n      \n    \n\n • You","author_profile_url":"https://www.linkedin.com/in/ravievani","author_headline":"Deploying enterprise agents in production / CTO / SWE Leader / GVP @ Publicis Sapient","posted_time":"2025-06-27","posted_hours_ago":8760,"posted_time_raw":"1yr","post_url":"https://www.linkedin.com/feed/update/urn:li:activity:7289604123228803072","author_profile_image_url":"https://media.licdn.com/dms/image/v2/C4E03AQGNeJRorEd2Nw/profile-displayphoto-shrink_100_100/profile-displayphoto-shrink_100_100/0/1569287114631?e=1784160000&v=beta&t=tJDZC7EXWnlgIIf8kF7fBCajhF-HEgzNXnz_IIkjqW8","post_text":"While big tech buzzes about AI agents that do their own \"planning\", the reality is that enterprises operate on pre-existing playbooks, whether they're rigorously documented or woven into institutional knowledge.\n\nThe enterprise doesn't need AI agents that play visionary—it needs agents that play by the rules. This isn't a limitation; it's the key to unlocking real enterprise value.\n\nAn agent that understands its operational context and respects system guardrails isn't just more practical; it's way more powerful!","post_image_url":"https://media.licdn.com/dms/image/v2/D4D22AQFqRQcNWPCgIg/feedshare-shrink_800/B4DZSngUNCG4Ag-/0/1737977056243?e=1784160000&v=beta&t=WzzkUII1-mUvcJkDp97JK1QngN_R21RA6w4NyywVYxk","is_article":false,"article_url":null,"article_title":null,"article_description":null,"is_video":false,"video_url":null,"has_image":true,"reaction_count":17,"reaction_types":"LIKE","comment_count":1,"repost_count":1,"impression_count":1677,"source":"activity"},{"is_my_post":true,"post_urn":"urn:li:activity:7288472578879283200","author_name":"Ravi Evani\n              \n                \n                   \n    \n      \n    \n    \n      \n    \n\n • You","author_profile_url":"https://www.linkedin.com/in/ravievani","author_headline":"Deploying enterprise agents in production / CTO / SWE Leader / GVP @ Publicis Sapient","posted_time":"2025-06-27","posted_hours_ago":8760,"posted_time_raw":"1yr","post_url":"https://www.linkedin.com/feed/update/urn:li:activity:7288472578879283200","author_profile_image_url":"https://media.licdn.com/dms/image/v2/C4E03AQGNeJRorEd2Nw/profile-displayphoto-shrink_100_100/profile-displayphoto-shrink_100_100/0/1569287114631?e=1784160000&v=beta&t=tJDZC7EXWnlgIIf8kF7fBCajhF-HEgzNXnz_IIkjqW8","post_text":"The buzz around OpenAI's $500B “Stargate” project to create AGI brings to mind the story of Mahabharat from Indian mythology.\n\nBig tech players and AI enthusiasts resemble Arjuna, awestruck by Krishna in his cosmic form—eagerly anticipating the perpetually elusive AGI's divine revelation. Meanwhile, skeptics insist it will never come.\n\nYet just as Arjuna had to continue fighting his own battles even after seeing divinity, humans might find that whether AI is \"godlike\" or not, our core problems (and needs) remain stubbornly earthly. The ultimate irony is that we might actually be the Krishna in this story, steering AI while believing it’s the one taking over.","post_image_url":"https://media.licdn.com/dms/image/v2/D4E05AQHywN56e2V9Xw/videocover-high/B4EZSXbLCpGwBs-/0/1737707272835?e=1783137600&v=beta&t=V_QOh9oocOoQh2hkOB62AxNjQZAfXfYI-1XRBzbKRDU","is_article":false,"article_url":null,"article_title":null,"article_description":null,"is_video":true,"video_url":"https://media.licdn.com/dms/image/v2/D4E05AQHywN56e2V9Xw/videocover-high/B4EZSXbLCpGwBs-/0/1737707272835?e=1783137600&v=beta&t=V_QOh9oocOoQh2hkOB62AxNjQZAfXfYI-1XRBzbKRDU","has_image":true,"reaction_count":24,"reaction_types":"LIKE, INTEREST, EMPATHY","comment_count":2,"impression_count":3190,"source":"activity"},{"is_my_post":true,"post_urn":"urn:li:activity:7286537933782679552","author_name":"Ravi Evani\n              \n                \n                   \n    \n      \n    \n    \n      \n    \n\n • You","author_profile_url":"https://www.linkedin.com/in/ravievani","author_headline":"Deploying enterprise agents in production / CTO / SWE Leader / GVP @ Publicis Sapient","posted_time":"2025-06-27","posted_hours_ago":8760,"posted_time_raw":"1yr","post_url":"https://www.linkedin.com/feed/update/urn:li:activity:7286537933782679552","author_profile_image_url":"https://media.licdn.com/dms/image/v2/C4E03AQGNeJRorEd2Nw/profile-displayphoto-shrink_100_100/profile-displayphoto-shrink_100_100/0/1569287114631?e=1784160000&v=beta&t=tJDZC7EXWnlgIIf8kF7fBCajhF-HEgzNXnz_IIkjqW8","post_text":"As the Federal Reserve announces plans to upgrade its core trading system to FedTrade Plus, I can't help but reflect on the wild journey of building its predecessor: FedTrade.\n\nAlmost 2 decades ago, I was an engineer / architect in the pioneering team that built and launched FedTrade—a mission-critical system that would go on to power trillions in open market operations and shape two decades of U.S. monetary policy. 🏦\n\nThe memories are still vivid: crafting the technology, debugging marathons, the precision of the calculations, ensuring zero defects and 100% uptime. But what really sticks? That electric atmosphere when a team knows they're building something bigger than themselves. It was beyond writing code — we were engineering the backbone of America's monetary operations.\n\nShoutout to some of the the original team members: Vishnu, Suresh, Jem, Ravikumar, Karthik, Rohit, Dhawal, Saleem, Ron, James, Nelson, Sid whose brilliance and dedication created a system that stood rock-solid through bull markets, bear markets, and even a financial crisis.\n\nHere's to the next generation of architects taking this mission forward! 🚀","post_image_url":null,"is_article":true,"article_url":"https://www.newyorkfed.org/markets/opolicy/operating_policy_241113","article_title":"Statement Regarding New FedTrade Platform","article_description":"Statement Regarding New FedTrade Platform\nnewyorkfed.org","is_video":false,"video_url":null,"has_image":false,"reaction_count":51,"reaction_types":"LIKE, PRAISE","comment_count":2,"impression_count":5052,"source":"activity"},{"is_my_post":true,"post_urn":"urn:li:activity:7285968193548943360","author_name":"Ravi Evani\n              \n                \n                   \n    \n      \n    \n    \n      \n    \n\n • You","author_profile_url":"https://www.linkedin.com/in/ravievani","author_headline":"Deploying enterprise agents in production / CTO / SWE Leader / GVP @ Publicis Sapient","posted_time":"2025-06-27","posted_hours_ago":8760,"posted_time_raw":"1yr","post_url":"https://www.linkedin.com/feed/update/urn:li:activity:7285968193548943360","author_profile_image_url":"https://media.licdn.com/dms/image/v2/C4E03AQGNeJRorEd2Nw/profile-displayphoto-shrink_100_100/profile-displayphoto-shrink_100_100/0/1569287114631?e=1784160000&v=beta&t=tJDZC7EXWnlgIIf8kF7fBCajhF-HEgzNXnz_IIkjqW8","post_text":"There's plenty of confusion and delusion about what AI agents are, what they can do, what’s reliable today, and the challenges of deploying agents in real-world, messy enterprise environments.\nTo unlock the value of \"agentification\", focus on micro-tasks, see them through adoption, and then scale to larger workflows.","post_image_url":"https://media.licdn.com/dms/image/v2/D4E05AQHmDiPmoaWeWw/feedshare-thumbnail_720_1280/B4EZRz1WAnGcA8-/0/1737110152033?e=1783137600&v=beta&t=Ek74nW6X4k3RFXY_dN69ij_nGSZPBM53h-_TCcXvQ1M","is_article":false,"article_url":null,"article_title":null,"article_description":null,"is_video":true,"video_url":"https://media.licdn.com/dms/image/v2/D4E05AQHmDiPmoaWeWw/feedshare-thumbnail_720_1280/B4EZRz1WAnGcA8-/0/1737110152033?e=1783137600&v=beta&t=Ek74nW6X4k3RFXY_dN69ij_nGSZPBM53h-_TCcXvQ1M","has_image":true,"reaction_count":27,"reaction_types":"LIKE, EMPATHY, INTEREST","comment_count":5,"impression_count":2461,"source":"activity"},{"is_my_post":true,"post_urn":"urn:li:activity:7285330293115236355","author_name":"Ravi Evani\n              \n                \n                   \n    \n      \n    \n    \n      \n    \n\n • You","author_profile_url":"https://www.linkedin.com/in/ravievani","author_headline":"Deploying enterprise agents in production / CTO / SWE Leader / GVP @ Publicis Sapient","posted_time":"2025-06-27","posted_hours_ago":8760,"posted_time_raw":"1yr","post_url":"https://www.linkedin.com/feed/update/urn:li:activity:7285330293115236355","author_profile_image_url":"https://media.licdn.com/dms/image/v2/C4E03AQGNeJRorEd2Nw/profile-displayphoto-shrink_100_100/profile-displayphoto-shrink_100_100/0/1569287114631?e=1784160000&v=beta&t=tJDZC7EXWnlgIIf8kF7fBCajhF-HEgzNXnz_IIkjqW8","post_text":"Insightful AI-focused discussion among our North America Industry Engineering Leads at Publicis Sapient. We covered plenty of ground, including:\n\n🎯 The evolution of next-generation UIs, with a real healthcare / pharma example (thanks Nader)\n↳ Explored \"app-less\" paradigms for LLM-powered agentic UIs\n↳ Showcased demos of how content and services could be delivered within “channel-less” customer and employee experiences\n\n🎯 Foundational capabilities that enterprises need to maximize value out of LLMs, copilots and LLM backed functions\n↳ Discussed how we are developing sophisticated context management through ontologies and context chaining for our Slingshot AI SDLC platform\n↳ Explored flexible deployment options to make it easy for clients to benefit from our AI SDLC platform, tools and agents\n\n🎯 SaaS AI Ecosystem integration (thanks Brett and Ninad)\n↳ Discussed strategies and operating models we are developing as “the glue” to integrate our client technology systems with SaaS agents\n\nThanks to our leaders Chirag, Anuja, Thanu, Sushil, Brett Colbert, Alison, Toby Boudreaux, Nader Nakib, Ninad Patil for sharing your expertise and insights. Also to Brian, Tanja, Jacqui for helping us make the workshop highly productive and fun!","post_image_url":"https://media.licdn.com/dms/image/v2/D5622AQHRlpXlKB-dUg/feedshare-shrink_800/B56ZRqxQmCGoAg-/0/1736958091236?e=1784160000&v=beta&t=Bubsd4qd7jeCWJWxpr0TDZFZDg1OHpHXD_KiiHZlS4k","is_article":false,"article_url":null,"article_title":null,"article_description":null,"is_video":false,"video_url":null,"has_image":true,"reaction_count":137,"reaction_types":"LIKE, EMPATHY, INTEREST","repost_count":1,"impression_count":18695,"source":"activity"},{"is_my_post":true,"post_urn":"urn:li:activity:7284575695454830593","author_name":"Ravi Evani\n              \n                \n                   \n    \n      \n    \n    \n      \n    \n\n • You","author_profile_url":"https://www.linkedin.com/in/ravievani","author_headline":"Deploying enterprise agents in production / CTO / SWE Leader / GVP @ Publicis Sapient","posted_time":"2025-06-27","posted_hours_ago":8760,"posted_time_raw":"1yr","post_url":"https://www.linkedin.com/feed/update/urn:li:activity:7284575695454830593","author_profile_image_url":"https://media.licdn.com/dms/image/v2/C4E03AQGNeJRorEd2Nw/profile-displayphoto-shrink_100_100/profile-displayphoto-shrink_100_100/0/1569287114631?e=1784160000&v=beta&t=tJDZC7EXWnlgIIf8kF7fBCajhF-HEgzNXnz_IIkjqW8","post_text":"Regression tests failing due to stale test data? Here's an \"agentic\" way to fix that.\n\nhashtag#aiEngineering","post_image_url":"https://media.licdn.com/dms/image/v2/D4E05AQGNoK039EWhgA/feedshare-thumbnail_720_1280/B4EZRgC6_1HAA8-/0/1736778167571?e=1783137600&v=beta&t=uGNMGIs1wuGlW91WEMTAb7bJonsnoWlMefRp52raLrw","is_article":false,"article_url":null,"article_title":null,"article_description":null,"is_video":true,"video_url":"https://media.licdn.com/dms/image/v2/D4E05AQGNoK039EWhgA/feedshare-thumbnail_720_1280/B4EZRgC6_1HAA8-/0/1736778167571?e=1783137600&v=beta&t=uGNMGIs1wuGlW91WEMTAb7bJonsnoWlMefRp52raLrw","has_image":true,"reaction_count":22,"reaction_types":"LIKE, EMPATHY, INTEREST","comment_count":1,"impression_count":2089,"source":"activity"},{"is_my_post":true,"post_urn":"urn:li:activity:7283248717866926080","author_name":"Ravi Evani\n              \n                \n                   \n    \n      \n    \n    \n      \n    \n\n • You","author_profile_url":"https://www.linkedin.com/in/ravievani","author_headline":"Deploying enterprise agents in production / CTO / SWE Leader / GVP @ Publicis Sapient","posted_time":"2025-06-27","posted_hours_ago":8760,"posted_time_raw":"1yr","post_url":"https://www.linkedin.com/feed/update/urn:li:activity:7283248717866926080","author_profile_image_url":"https://media.licdn.com/dms/image/v2/C4E03AQGNeJRorEd2Nw/profile-displayphoto-shrink_100_100/profile-displayphoto-shrink_100_100/0/1569287114631?e=1784160000&v=beta&t=tJDZC7EXWnlgIIf8kF7fBCajhF-HEgzNXnz_IIkjqW8","post_text":"Insightful discussion with some of our Publicis Sapient New York Engineering Managers on their experiences using SDLC AI tools, as well as building AI-powered systems. Some notes from the field that I gathered:\n\n🎯 Delivering Real Results\n↳A recommendation engine built simply by leveraging vector search on Hugging Face sentence transformer-generated embeddings yielded higher relevance than a full-blown “personalization platform”, prompting our clients to reconsider their AI investments in SaaS.\n↳A team was able to deliver a complex retail marketplace integration between the timelines of Diwali and Thanksgiving using our Slingshot AI SDLC assistant.\n↳A financial services enterprise application was launched to production in two weeks.\n↳ OCR tasks have demonstrated significant accuracy improvements over applications developed in the past decade.\n↳An AI agent expedited SRE onboarding by processing wikis and SOPs, reducing the need for manual analysis.\n↳Even some basic RAG implementations showed clear business benefits.\n\n🎯 Applying AI to SDLC Processes\n↳Creating and maintaining shared prompt libraries is essential for achieving consistent results across teams.\n↳Curated context hierarchies that accompany prompt chains significantly enhance output accuracy.\n\n🎯 Measuring Efficiencies Gained Using AI SDLC Tools\n↳Teams maintain initial project estimates as reference points, keeping baselines unchanged until AI impact is clearly established.\n↳Comparisons of team velocity before and after deep AI assistance adoption serve as key efficiency indicators.\n↳Reduction in bugs, particularly in edge cases, is closely monitored.\n↳Strong story pointing and Scrum practices ensure accurate measurement of productivity improvements.\n\n🎯 Overcoming Field Challenges\n↳One AI system encountered issues with unexpected production data patterns\n↳Assumptions about data patterns can impact user experience when patterns shift\n↳AI systems still require significant human oversight\n\nThanks for your time: Roshan Jitender Rangaswamy Balaji Kevin Romy Nirav. Sharing your experiences help us develop a more grounded approach to AI implementation—focusing on practical benefits while being mindful of the challenges.","post_image_url":"https://media.licdn.com/dms/image/v2/D4E22AQEG6KRfE-yZTw/feedshare-shrink_800/B4EZRNMFDgHAAk-/0/1736461809076?e=1784160000&v=beta&t=2xf30h84lKhn-Ui5_F7GRpNm3LoNYHuOLfrgsQMmcv0","is_article": 7,"source":"activity"},{"is_my_post":true,"post_urn":"urn:li:activity:7270095301229662209","author_name":"Ravi Evani\n              \n                \n                   \n    \n      \n    \n    \n      \n    \n\n • You","author_profile_url":"https://www.linkedin.com/in/ravievani","author_headline":"Deploying enterprise agents in production / CTO / SWE Leader / GVP @ Publicis Sapient","posted_time":"2025-06-27","posted_hours_ago":8760,"posted_time_raw":"1yr","post_url":"https://www.linkedin.com/feed/update/urn:li:activity:7270095301229662209","author_profile_image_url":"https://media.licdn.com/dms/image/v2/C4E03AQGNeJRorEd2Nw/profile-displayphoto-shrink_100_100/profile-displayphoto-shrink_100_100/0/1569287114631?e=1784160000&v=beta&t=tJDZC7EXWnlgIIf8kF7fBCajhF-HEgzNXnz_IIkjqW8","post_text":"All the big players now have solid LLMs, just like they've had solid databases. So the value now comes from what's between the user and the engine. Same as it's always been.","post_image_url":"https://media.licdn.com/dms/image/sync/v2/D4E27AQEcFT6xaaKavg/articleshare-shrink_480/articleshare-shrink_480/0/1733249331812?e=1783137600&v=beta&t=4RW2ytCMmAv3YwBk9vTgu8j_2aJ_OcVtKCUg7Of2LeU","is_article":true,"article_url":"https://www.amazon.science/publications/the-amazon-nova-family-of-models-technical-report-and-model-card","article_title":"The Amazon Nova family of models: Technical report and model card","article_description":"The Amazon Nova family of models: Technical report and model card\namazon.science","is_video":false,"video_url":null,"has_image":true,"reaction_count":12,"reaction_types":"LIKE, EMPATHY","impression_count":1301,"source":"activity"},{"is_my_post":true,"post_urn":"urn:li:activity:7269388118976335875","author_name":"Ravi Evani\n              \n                \n                   \n    \n      \n    \n    \n      \n    \n\n • You","author_profile_url":"https://www.linkedin.com/in/ravievani","author_headline":"Deploying enterprise agents in production / CTO / SWE Leader / GVP @ Publicis Sapient","posted_time":"2025-06-27","posted_hours_ago":8760,"posted_time_raw":"1yr","post_url":"https://www.linkedin.com/feed/update/urn:li:activity:7269388118976335875","author_profile_image_url":"https://media.licdn.com/dms/image/v2/C4E03AQGNeJRorEd2Nw/profile-displayphoto-shrink_100_100/profile-displayphoto-shrink_100_100/0/1569287114631?e=1784160000&v=beta&t=tJDZC7EXWnlgIIf8kF7fBCajhF-HEgzNXnz_IIkjqW8","post_text":"Your PMs perfect backlogs. Designers craft pixel-polished screens. Devs write pristine code. Yet your AI still under-delivers. Why?\n\nYour team's spending 90% of time building scaffolding, while prompt engineering—the brain of your AI, gets table scraps.\n\nThe harsh truth about enterprise gen AI development is that the core of the solution that derives the \"intelligence\", i.e. prompt engineering gets a fraction of the time and effort it really should.\n\nWhy? Teams tend to gravitate toward their comfort zones—leaving the critical but squishy, uncharted territory of crafting, evaluating, and iterating on prompts underinvested. Yet, this uncharted territory is where the biggest gains in intelligence and value are unlocked.\n\nA well-designed prompt chain can unlock the model’s full potential, while settling for mediocrity leaves considerable value on the table.\n\nTime to flip the script. Here are your key moves to invest considerable time and effort in prompt engineering:\n① Go beyond \"It works\": Analyze model outputs closely.\n② Build resilience: Evaluate and refine for (the numerous) edge cases.\n③Track the logic: Understand the model's reasoning and adapt accordingly.\n④Context is king: Guide with semantically significant data.\n\nNail these, and you have a much better chance of delivering real enterprise value—not just demos that \"work\".\n\nhashtag#ai hashtag#aiEngineering","post_image_url":"https://media.licdn.com/dms/image/v2/D4E22AQE33upp7imM5w/feedshare-shrink_800/feedshare-shrink_800/0/1733157184514?e=17841600             searchQuery: '',

            initCols();
            initFilters();
            initModal();

            document.getElementById('load-more-btn').addEventListener('click', () => {

                const observer = new IntersectionObserver((entries) => {

                        render();
                    }

                avatarImg.alt = AUTHOR_NAME;
                avatarImg.classList.remove('hidden');
            } else {
                const initials = AUTHOR_NAME.split(' ').map(n => n[0]).join('').substring(0, 2).toUpperCase();
                initialsDiv.textContent = initials;
                initialsDiv.classList.remove('hidden');
            }

                avatarLink.style.cursor = 'default';
            }
        }

        // Theme Management
        function initTheme() {
            const html = document.documentElement;
            if (state.theme === 'dark') {
                html.classList.add('dark');
            } else {
                html.classList.remove('dark');
            }

            const btn = document.getElementById('theme-toggle-btn');
            btn.addEventListener('click', () => {
                state.theme = state.theme === 'dark' ? 'light' : 'dark';
                localStorage.setItem('portfolio-theme', state.theme);
                if (state.theme === 'dark') {
                    html.classList.add('dark');
                } else {
                    html.classList.remove('dark');
                }
            });
        }

        // Columns Grid Layout Configuration
        function initCols() {
            const colButtons = document.querySelectorAll('[data-cols]');
            
            function setCols(n) {
                state.cols = n;
                localStorage.setItem('portfolio-cols-v2', n);
                
                // Update buttons UI
                colButtons.forEach(btn => {
                    const btnCols = parseInt(btn.getAttribute('data-cols'));
                    if (btnCols === n) {
                        btn.classList.add('bg-white', 'dark:bg-neutral-800', 'shadow-sm', 'text-neutral-900', 'dark:text-white');
                        btn.classList.remove('text-neutral-500', 'dark:text-neutral-400');
                    } else {
                        btn.classList.remove('bg-white', 'dark:bg-neutral-800', 'shadow-sm', 'text-neutral-900', 'dark:text-white');
                        btn.classList.add('text-neutral-500', 'dark:text-neutral-400');
                    }
                });

                // Update Grid classes
                const grid = document.getElementById('posts-grid');
                grid.className = 'grid grid-cols-1 gap-6 transition-all duration-300';
                
                if (n === 1) {
                    grid.classList.add('max-w-3xl', 'mx-auto');
                } else if (n === 2) {
                    grid.classList.add('md:grid-cols-2');
                } else if (n === 3) {
                    grid.classList.add('md:grid-cols-2', 'lg:grid-cols-3');
                }
            }

            colButtons.forEach(btn => {
                btn.addEventListener('click', () => {
                    setCols(parseInt(btn.getAttribute('data-cols')));
                });
            });

            // Initialize correct columns class
            setCols(state.cols);
        }

        // Filters and Sorting Actions
        function initFilters() {
            const search = document.getElementById('search-input');
            const sort = document.getElementById('sort-select');
            const mediaButtons = document.querySelectorAll('[data-media]');

            // Real-time search handler
            let searchTimeout;
            search.addEventListener('input', (e) => {
                clearTimeout(searchTimeout);
                searchTimeout = setTimeout(() => {
                    state.searchQuery = e.target.value.toLowerCase().trim();
                    state.visibleCount = 12;
                    render();
                }, 200);
            });

            // Sort selector handler
            sort.addEventListener('change', (e) => {
                state.sortBy = e.target.value;
                state.visibleCount = 12;
                render();
            });

            // Media type button filter handlers
            mediaButtons.forEach(btn => {
                btn.addEventListener('click', () => {
                    const filter = btn.getAttribute('data-media');
                    state.mediaFilter = filter;
                    state.visibleCount = 12;

                    mediaButtons.forEach(b => {
                        if (b.getAttribute('data-media') === filter) {
                            b.classList.add('bg-white', 'dark:bg-neutral-800', 'shadow-sm', 'text-neutral-900', 'dark:text-white');
                            b.classList.remove('text-neutral-500', 'dark:text-neutral-400');
                        } else {
                            b.classList.remove('bg-white', 'dark:bg-neutral-800', 'shadow-sm', 'text-neutral-900', 'dark:text-white');
                            b.classList.add('text-neutral-500', 'dark:text-neutral-400');
                        }
                    });

                    render();
                });
            });
        }

        // Image Modal Setup
        function initModal() {
            const modal = document.getElementById('image-modal');
            const backdrop = document.getElementById('modal-backdrop');
            const content = document.getElementById('modal-content');
            const closeBtn = document.getElementById('close-modal-btn');
            const img = document.getElementById('modal-img');

            window.openImageModal = function(src) {
                img.src = src;
                modal.classList.remove('hidden');
                setTimeout(() => {
                    content.classList.remove('scale-95', 'opacity-0');
                    content.classList.add('scale-100', 'opacity-100');
                }, 10);
            }

            function closeModal() {
                content.classList.remove('scale-100', 'opacity-100');
                content.classList.add('scale-95', 'opacity-0');
                setTimeout(() => {
                    modal.classList.add('hidden');
                    img.src = '';
                }, 200);
            }

            backdrop.addEventListener('click', closeModal);
            closeBtn.addEventListener('click', closeModal);
            document.addEventListener('keydown', (e) => {
                if (e.key === 'Escape') closeModal();
            });
        }

        // Helper to get Lucide icons for all unique reaction types
        function getReactionIcons(reactionTypesStr) {
            if (!reactionTypesStr) return ['thumbs-up'];
            const types = reactionTypesStr.toUpperCase().split(/[\s,]+/);
            const icons = [];
            for (const type of types) {
                if (type.includes('LIKE')) {
                    icons.push('thumbs-up');
                } else if (type.includes('EMPATHY') || type.includes('LOVE')) {
                    icons.push('heart');
                } else if (type.includes('INTEREST') || type.includes('CURIOSITY') || type.includes('INSIGHTFUL')) {
                    icons.push('lightbulb');
                } else if (type.includes('PRAISE') || type.includes('APPRECIATION') || type.includes('CELEBRATE')) {
                    icons.push('party-popper');
                } else if (type.includes('ENTERTAINMENT') || type.includes('LAUGH') || type.includes('FUNNY')) {
                    icons.push('laugh');
                } else if (type.includes('SUPPORT')) {
                    icons.push('hand-heart');
                }
            }
            const uniqueIcons = [...new Set(icons)];
            return uniqueIcons.length > 0 ? uniqueIcons : ['thumbs-up'];
        }

        // Helper: Clean Headline of Duplications
        function cleanHeadline(text) {
            if (!text) return '';
            const lines = text.split(/[\n\r]+/);
            if (lines.length > 1) {
                const uniqueLines = [...new Set(lines.map(l => l.trim()))].filter(l => l.length > 0);
                if (uniqueLines.length === 1) {
                    return uniqueLines[0];
                }
            }
            if (text.length > 10 && text.length % 2 === 0) {
                const mid = text.length / 2;
                const first = text.substring(0, mid);
                const second = text.substring(mid);
                if (first === second) return first;
            }
            return text;
        }

        // Helper: Format Dates Beautifully
        function formatDate(dateStr) {
            if (!dateStr) return '';
            try {
                const options = { year: 'numeric', month: 'short', day: 'numeric' };
                const date = new Date(dateStr);
                if (isNaN(date.getTime())) return dateStr;
                return date.toLocaleDateString('en-US', options);
            } catch (e) {
                return dateStr;
            }
        }

        // Helper: Convert links and handle breaks
        function formatPostText(text) {
            if (!text) return '';
            let formatted = text
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;')
                .replace(/'/g, '&#039;');

            formatted = formatted.trim();

            const urlRegex = /(https?:\/\/[^\s]+)/gi;
            formatted = formatted.replace(urlRegex, (url) => {
                const cleanUrl = url.replace(/[.,;!?]$/, '');
                const punctuation = url.substring(cleanUrl.length);
                return `<a href="${cleanUrl}" target="_blank" rel="noopener noreferrer" class="text-blue-500 hover:underline inline-flex items-center gap-0.5">${cleanUrl}<i data-lucide="external-link" class="size-3 inline ml-0.5"></i></a>${punctuation}`;
            });

            return formatted.split('\n').map(p => p.trim() ? `<p class="mb-2.5">${p}</p>` : `<div class="h-2.5"></div>`).join('');
        }

        // Helper: Toggling long text see-more
        window.toggleText = function(btn, urn) {
            const container = document.getElementById('text-' + urn.replace(/:/g, '-'));
            const isTruncated = container.classList.contains('line-clamp-3');
            
            if (isTruncated) {
                container.classList.remove('line-clamp-3');
                container.classList.add('line-clamp-none');
                btn.textContent = 'See less';
            } else {
                container.classList.remove('line-clamp-none');
                container.classList.add('line-clamp-3');
                btn.textContent = 'See more';
                btn.closest('.post-card').scrollIntoView({ behavior: 'smooth', block: 'nearest' });
            }
        }

        // Helper: Update scroll fade indicators for overflow text
        window.updateTextScroll = function(el) {
            const isScrollable = el.scrollHeight > el.clientHeight + 4;
            const isAtBottom = el.scrollHeight - el.scrollTop <= el.clientHeight + 4;
            const fade = el.nextElementSibling;
            if (fade) {
                if (isScrollable && !isAtBottom) {
                    fade.classList.remove('opacity-0');
                    fade.classList.add('opacity-100');
                } else {
                    fade.classList.remove('opacity-100');
                    fade.classList.add('opacity-0');
                }
            }
        }

        // Render Cards Loop
        function render() {
            const grid = document.getElementById('posts-grid');
            const emptyState = document.getElementById('empty-state');
            const showingCount = document.getElementById('showing-count');
            const loadMoreContainer = document.getElementById('load-more-container');

            // 1. Filter Posts
            let filtered = POSTS.filter(post => {
                const matchQuery = !state.searchQuery || 
                    (post.post_text && post.post_text.toLowerCase().includes(state.searchQuery)) ||
                    (post.author_name && post.author_name.toLowerCase().includes(state.searchQuery)) ||
                    (post.author_headline && post.author_headline.toLowerCase().includes(state.searchQuery));

                let matchMedia = true;
                if (state.mediaFilter === 'images') {
                    matchMedia = post.has_image === true && !post.is_video;
                } else if (state.mediaFilter === 'videos') {
                    matchMedia = post.is_video === true;
                } else if (state.mediaFilter === 'text') {
                    matchMedia = !post.has_image && !post.is_video;
                }

                return matchQuery && matchMedia;
            });

            // 2. Sort Posts
            filtered.sort((a, b) => {
                if (state.sortBy === 'newest') {
                    return new Date(b.posted_time || 0) - new Date(a.posted_time || 0);
                } else if (state.sortBy === 'oldest') {
                    return new Date(a.posted_time || 0) - new Date(b.posted_time || 0);
                } else if (state.sortBy === 'likes') {
                    return (b.reaction_count || 0) - (a.reaction_count || 0);
                } else if (state.sortBy === 'impressions') {
                    return (b.impression_count || 0) - (a.impression_count || 0);
                }
                return 0;
            });

            showingCount.textContent = `Showing ${Math.min(filtered.length, state.visibleCount)} of ${filtered.length} posts`;

            if (filtered.length === 0) {
                grid.innerHTML = '';
                emptyState.classList.remove('hidden');
                loadMoreContainer.classList.add('hidden');
                return;
            }
            emptyState.classList.add('hidden');

            // Toggle Load More button visibility
            if (filtered.length <= state.visibleCount) {
                loadMoreContainer.classList.add('hidden');
            } else {
                loadMoreContainer.classList.remove('hidden');
            }

            const visiblePosts = filtered.slice(0, state.visibleCount);

            // 3. Generate Cards HTML
            grid.innerHTML = visiblePosts.map(post => {
                const urnSafe = post.post_urn ? post.post_urn.replace(/:/g, '-') : Math.random().toString(36).substring(2, 9);
                const hasLongText = post.post_text && post.post_text.length > 280;
                
                const cleanPostAuthor = (post.author_name || AUTHOR_NAME)
                    .replace(/\s+/g, ' ')
                    .replace(/ • You$/, '')
                    .trim();

                const authorInitials = cleanPostAuthor.split(' ').map(n => n[0]).join('').substring(0, 2).toUpperCase();
                const displayHeadline = cleanHeadline(post.author_headline || AUTHOR_HEADLINE || 'LinkedIn Member').replace(/\s+/g, ' ').trim();
                const profileImg = post.author_profile_image_url || AUTHOR_AVATAR;

                return `
                <article class="post-card bg-neutral-100/40 dark:bg-neutral-900/40 border border-neutral-200 dark:border-neutral-800 rounded-xl p-6 hover:bg-neutral-100/60 dark:hover:bg-neutral-900/60 hover:border-neutral-300 dark:hover:border-neutral-700 transition-all duration-300 group relative flex flex-col h-full shadow-sm dark:shadow-none">
                    
                    <!-- Card Header -->
                    <div class="flex items-start justify-between mb-4">
                        <div class="flex items-center gap-3">
                            <div class="relative flex-shrink-0">
                                ${profileImg ? `<img src="${profileImg}" alt="${cleanPostAuthor}" class="size-10 rounded-full border border-neutral-200 dark:border-neutral-700 object-cover bg-neutral-200" onerror="this.style.display='none'; this.nextElementSibling.style.display='flex';" referrerpolicy="no-referrer" loading="lazy">` : ''}
                                <div class="size-10 rounded-full bg-blue-600 dark:bg-blue-700 text-white font-semibold flex items-center justify-center text-sm" style="${profileImg ? 'display: none;' : ''}">
                                    ${authorInitials}
                                </div>
                                <!-- Platform Icon -->
                                <div class="absolute -bottom-1 -right-1 bg-blue-500 p-0.5 rounded-full border-2 border-neutral-50 dark:border-neutral-900 flex items-center justify-center">
                                    <i data-lucide="linkedin" class="size-2 text-white fill-current"></i>
                                </div>
                            </div>
                            <div>
                                <h3 class="text-sm font-medium text-neutral-800 dark:text-white line-clamp-1 break-all">
                                    <a href="${post.author_profile_url || '#'}" target="_blank" rel="noopener noreferrer" class="hover:text-blue-500 hover:underline">
                                        ${cleanPostAuthor}
                                    </a>
                                </h3>
                                <p class="text-xs text-neutral-500 dark:text-neutral-500 line-clamp-3 break-words">${displayHeadline}</p>
                            </div>
                        </div>

                        <!-- External Post Link -->
                        ${post.post_url ? `<a href="${post.post_url}" target="_blank" rel="noopener noreferrer" class="flex-shrink-0 p-1.5 rounded-lg text-[#0a66c2] dark:text-blue-400 bg-blue-50/50 dark:bg-blue-950/20 border border-blue-100/50 dark:border-blue-900/30 hover:bg-[#0a66c2] dark:hover:bg-[#0a66c2] hover:text-white dark:hover:text-white transition-all duration-300 hover:scale-110 flex items-center justify-center shadow-sm" title="View on LinkedIn"><i data-lucide="external-link" class="size-4"></i></a>` : ''}
                    </div>

                    <!-- Card Body -->
                    ${post.post_text ? (() => {
                        const hasMedia = post.post_image_url || post.has_image || post.is_video || post.is_article || post.article_url;
                        return `
                        <div class="relative mb-4">
                            <div class="post-card-text-part ${!hasMedia ? 'post-card-text-expanded' : ''} pr-1" onscroll="updateTextScroll(this)">
                                <div class="text-sm text-neutral-700 dark:text-neutral-300 leading-relaxed font-light break-words">
                                    ${formatPostText(post.post_text)}
                                </div>
                            </div>
                            <div class="scroll-fade-indicator absolute bottom-0 left-0 right-0 h-8 pointer-events-none transition-opacity duration-300 opacity-0 z-10"></div>
                        </div>
                        `;
                    })() : ''}

                    <!-- Post Media (Images, Videos, or Articles) -->
                    ${(post.is_article || post.article_url) ? `
                    <a href="${post.article_url}" target="_blank" rel="noopener noreferrer" class="block border border-neutral-200 dark:border-neutral-800 rounded-xl overflow-hidden bg-neutral-50 dark:bg-neutral-900/50 hover:bg-neutral-100 dark:hover:bg-neutral-900 transition-colors mb-4 group/article">
                        ${post.post_image_url ? `
                        <div class="h-48 overflow-hidden border-b border-neutral-200 dark:border-neutral-800">
                            <img src="${post.post_image_url}" class="w-full h-full object-cover group-hover/article:scale-105 transition-transform duration-300" loading="lazy" referrerpolicy="no-referrer">
                        </div>
                        ` : ''}
                        <div class="p-4">
                            <div class="flex items-center gap-1.5 text-xs text-neutral-500 dark:text-neutral-500 mb-1">
                                <i data-lucide="link" class="size-3"></i>
                                <span>${post.article_url ? new URL(post.article_url).hostname : 'External Link'}</span>
                            </div>
                            <h4 class="text-sm font-semibold text-neutral-800 dark:text-white line-clamp-2 mb-1 group-hover/article:text-blue-500 transition-colors">
                                ${post.article_title || 'View Article'}
                            </h4>
                            <p class="text-xs text-neutral-500 dark:text-neutral-500 line-clamp-2">
                                ${post.article_description || ''}
                            </p>
                        </div>
                    </a>
                    ` : (post.is_video && (post.video_url || post.post_image_url)) ? (() => {
                        const isVideoSrc = url => url && (url.includes('.mp4') || url.includes('.mov') || url.includes('.webm') || url.includes('/vid/') || url.includes('/playlist/vid/'));
                        const showVideoTag = isVideoSrc(post.post_image_url) || isVideoSrc(post.video_url);
                        const videoSrc = isVideoSrc(post.post_image_url) ? post.post_image_url : post.video_url;
                        return `
                        <div class="post-card-image-part mb-4" data-image-url="${post.video_url || post.post_image_url}" onclick="window.open('${post.post_url || '#'}', '_blank')">
                            ${showVideoTag ? `
                            <video class="w-full h-full object-cover max-h-[360px]" muted playsinline preload="metadata">
                                <source src="${videoSrc}" type="video/mp4">
                            </video>
                            ` : `
                            <img src="${post.post_image_url || ''}" alt="Post Media" loading="lazy" referrerpolicy="no-referrer">
                            `}
                            <div class="video-overlay">
                                <div class="play-button-icon">
                                    <i data-lucide="play" class="size-6 text-white fill-current"></i>
                                </div>
                                <div class="absolute bottom-2 right-2 bg-black/60 backdrop-blur-sm text-white text-[10px] px-1.5 py-0.5 rounded font-medium">VIDEO</div>
                            </div>
                        </div>
                        `;
                    })() : (post.has_image && post.post_image_url) ? `
                    <div class="post-card-image-part mb-4" data-image-url="${post.post_image_url}" onclick="openImageModal('${post.post_image_url}')">
                        <img src="${post.post_image_url}" alt="Post attachment image" class="max-w-full max-h-[360px] object-cover hover:scale-[1.02] transition-transform duration-300" loading="lazy">
                    </div>
                    ` : ''}

                    <!-- Card Footer (Interactions/Engagement metrics) -->
                    <div class="flex items-center justify-between border-t border-neutral-200 dark:border-neutral-800 pt-4 mt-auto">
                        <div class="flex items-center gap-4">
                            <!-- Impressions -->
                            ${post.impression_count > 0 ? `
                            <div class="flex items-center gap-1.5 text-xs text-neutral-500 dark:text-neutral-400" title="${post.impression_count} post impressions">
                                <i data-lucide="eye" class="size-3.5"></i>
                                <span>${post.impression_count.toLocaleString()}</span>
                            </div>
                            ` : ''}

                            <!-- Likes / Reactions -->
                            ${post.reaction_count > 0 ? `
                            <a href="${post.post_url || `https://www.linkedin.com/feed/update/${post.post_urn}`}" target="_blank" rel="noopener noreferrer" class="flex items-center gap-1.5 text-xs text-neutral-500 dark:text-neutral-400 hover:text-blue-500 transition-colors" title="Click here to go to the actual post to like it or express a reaction" onclick="event.stopPropagation();">
                                <div class="flex items-center -space-x-1">
                                    ${getReactionIcons(post.reaction_types).map(icon => `<i data-lucide="${icon}" class="size-3.5 bg-neutral-100 dark:bg-neutral-900 rounded-full p-0.5 box-content border border-white dark:border-neutral-950"></i>`).join('')}
                                </div>
                                <span>${post.reaction_count}</span>
                            </a>
                            ` : ''}
                            
                            <!-- Comments -->
                            ${post.comment_count > 0 ? `
                            <a href="${post.post_url || `https://www.linkedin.com/feed/update/${post.post_urn}`}#comments" target="_blank" rel="noopener noreferrer" class="flex items-center gap-1.5 text-xs text-neutral-500 dark:text-neutral-400 hover:text-blue-500 transition-colors" title="Click here to go to the actual post to view or enter comments" onclick="event.stopPropagation();">
                                <i data-lucide="message-square" class="size-3.5"></i>
                                <span>${post.comment_count}</span>
                            </a>
                            ` : ''}

                            <!-- Reposts -->
                            ${post.repost_count > 0 ? `
                            <div class="flex items-center gap-1.5 text-xs text-neutral-500 dark:text-neutral-400">
                                <i data-lucide="repeat" class="size-3.5"></i>
                                <span>${post.repost_count}</span>
                            </div>
                            ` : ''}
                        </div>
                        
                        <div class="flex items-center gap-3">
                            <span class="text-xs text-neutral-500">${post.posted_time_raw || formatDate(post.posted_time)}</span>
                        </div>
                    </div>

                </article>
                `;
            }).join('');

            lucide.createIcons();

            // Trigger check for overflow text scrollable indicators after rendering
            setTimeout(() => {
                document.querySelectorAll('.post-card-text-part').forEach(el => {
                    updateTextScroll(el);
                });
            }, 100);
        }
    </script>
</body>
</html>
