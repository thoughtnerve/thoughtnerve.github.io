system.\n\nAI accelerates the baseline. But the baseline is not where value sits.\n\nValue is in architecture. In resilience. In connecting technical execution to business reality.\n\nAgentic tooling gives you leverage. More surface area. More responsibility. More upside.\n\nOrient yourself to this massive opportunity.\n\nDon’t just ship the requirement.\n\nBuild the system that scales, heals, and explains itself.\n\nThat’s when your impact and value compounds.","post_url":"https://www.linkedin.com/feed/update/urn:li:activity:7433728790972772352","post_urn":"urn:li:activity:7433728790972772352","posted_hours_ago":2160,"posted_time":"2026-03-26","posted_time_raw":"3mo","reaction_count":39,"reaction_types":"LIKE","repost_count":1,"source":"activity","video_url":null},{"article_description":null,"article_title":null,"article_url":null,"author_headline":"Deploying enterprise agents in production / CTO / SWE Leader / GVP @ Publicis Sapient","author_name":"Ravi Evani\n              \n                \n                   \n    \n      \n    \n    \n      \n    \n\n • You","author_profile_image_url":"https://media.licdn.com/dms/image/v2/C4E03AQGNeJRorEd2Nw/profile-displayphoto-shrink_100_100/profile-displayphoto-shrink_100_100/0/1569287114631?e=1784160000&v=beta&t=tJDZC7EXWnlgIIf8kF7fBCajhF-HEgzNXnz_IIkjqW8","author_profile_url":"https://www.linkedin.com/in/ravievani","has_image":false,"impression_count":1152,"is_article":false,"is_my_post":true,"is_video":false,"post_image_url":null,"post_text":"The recent wave of obsession triggered by OpenClaw on the “fast” set up of AI agents completely misses the mark from an enterprise standpoint.\n\nYes, It is undeniably cool that you can now spin up a functional AI agent in 30 minutes instead of two weeks.\n\nWe are seeing a massive wave of excitement about tools and frameworks that practically eliminate the technical barrier to entry for autonomous workflows. For individual productivity or weekend tinkering, this rapid deployment speed is a leap forward.\n\nBut, the grand scheme of an enterprise lifecycle, the difference between a two-week engineering sprint and a 30-minute configuration is practically negligible.\n\nWhy? Because technical setup was never the *real* bottleneck to begin with.\n\nIn any system, your end-to-end velocity is dictated entirely by your slowest bottleneck.\n\nRight now, the tech world is celebrating unprecedented speed in the fastest part of the value pipeline, while ignoring the steps that actually hold back enterprise adoption.\n\nHere is what is actually throttling AI agents at the organizational level:\n\n1/ Resilience & Security: It’s easy to make an agent run in a sandbox. It is hard to make it run reliably in a production environment without hallucinating, exposing credentials, or breaking existing infrastructure.\n\n2/ Alignment: Getting InfoSec, Legal, Compliance, and department heads on the same page to actually trust an autonomous system takes weeks, if not months, of rigorous discussion.\n\n3/ Accountability: If an autonomous agent executes a workflow in the background and makes a mistake that costs the business money—who is fundamentally responsible? The vendor? The engineer? The manager?\n\n4/ Culture: Shifting an organization to actually trust and integrate non-human, proactive workflows is a massive, unsolved human hurdle.\n\nIf security audits, compliance checks, and cultural alignment take three months to clear, shrinking the initial coding phase from 14 days to 30 minutes does exactly zero to improve your actual time-to-value. You are just hurrying up to wait at a red light.\n\nFor enterprise leaders: Don’t let the hype of \"instant AI\" distract you. The organizations that will actually gain a meaningful advantage aren't the ones spinning up unpolished agents before lunch. They are the ones doing the unsexy work of building robust enterprise architecture, accountability frameworks, and a resilient culture.\n\nFor founders and builders: The massive enterprise problem isn't making agent deployment 10 minutes faster. It’s building the layers that allow these agents to actually survive and be trusted.\n\nThere are much bigger problems to solve right now than setup speed. Let's continue to fix the fundamentals.","post_url":"https://www.linkedin.com/feed/update/urn:li:activity:7432643088529059840","post_urn":"urn:li:activity:7432643088529059840","posted_hours_ago":2880,"posted_time":"2026-02-26","posted_time_raw":"4mo","reaction_count":33,"reaction_types":"LIKE, INTEREST, EMPATHY","repost_count":3,"source":"activity","video_url":null},{"article_description":null,"article_title":null,"article_url":null,"author_headline":"Deploying enterprise agents in production / CTO / SWE Leader / GVP @ Publicis Sapient","author_name":"Ravi Evani\n              \n                \n                   \n    \n      \n    \n    \n      \n    \n\n • You","author_profile_image_url":"https://media.licdn.com/dms/image/v2/C4E03AQGNeJRorEd2Nw/profile-displayphoto-shrink_100_100/profile-displayphoto-shrink_100_100/0/1569287114631?e=1784160000&v=beta&t=tJDZC7EXWnlgIIf8kF7fBCajhF-HEgzNXnz_IIkjqW8","author_profile_url":"https://www.linkedin.com/in/ravievani","comment_count":3,"has_image":false,"impression_count":2749,"is_article":false,"is_my_post":true,"is_video":false,"post_image_url":null,"post_text":"Software engineer Joel Spolsky famously coined the Law of Leaky Abstractions: \"All non-trivial abstractions, to some degree, leak\". When a garbage collector fails, a Python developer suddenly has to understand memory management.\n\nCompilers fail loudly with syntax errors. AI fails silently. When the stochastic \"AI abstraction\" leaks, it is far more dangerous than a compiler error. Because when it fails, the engineer needs to not only be able to detect that it failed, but also know enough about what's underneath the floorboards to steer it back on track.\n\nThat's the real challenge with agentic coding. And thats where the level of skill and capability need to evolve for engineers.\n\nWhen AI handles the micro-logic, we must fiercely own the macro-logic.\n\nThis means getting stronger at mapping business domains and translating them into clear operational boundaries agents can safely work within.\n\nIt means shifting from writer to editor. Reading code is notoriously harder than writing it, and AI generates a lot of it. We must develop a highly critical eye for spotting plausible but hallucinated APIs, subtle edge-case failures, and logical inconsistencies.\n\nAgents struggle with ambiguity. The differentiating skill is steering the AI well in decomposing large, fuzzy problems into tightly scoped, verifiable tasks.\n\nKnowing exactly what context to feed an agent, and more importantly, what context to leave out so it doesn't get confused, becomes a distinct skill.\n\nTesting grows in importance. The leverage is no longer just writing implementations, but designing deterministic safety nets for stochastic generation.\n\nPerformance expertise matters more, not less. When an agent produces an O(n²) bottleneck, engineers still need to profile, trace, and optimize.\n\nA profound grasp of concurrency, memory management, and network latency is essential. We cannot steer an AI back on track if we don't understand the physical realities of the hardware it's executing on.\n\nUltimately, this job evolves into diagnosing AI misunderstandings and correcting them with constraints, structure, and precision.","post_url":"https://www.linkedin.com/feed/update/urn:li:activity:7432067274410196992","post_urn":"urn:li:activity:7432067274410196992","posted_hours_ago":2880,"posted_time":"2026-02-26","posted_time_raw":"4mo","reaction_count":15,"reaction_types":"LIKE, INTEREST","source":"activity","video_url":null},{"article_description":null,"article_title":null,"article_url":null,"author_headline":"Deploying enterprise agents in production / CTO / SWE Leader / GVP @ Publicis Sapient","author_name":"Ravi Evani\n              \n                \n                   \n    \n      \n    \n    \n      \n    \n\n • You","author_profile_image_url":"https://media.licdn.com/dms/image/v2/C4E03AQGNeJRorEd2Nw/profile-displayphoto-shrink_100_100/profile-displayphoto-shrink_100_100/0/1569287114631?e=1784160000&v=beta&t=tJDZC7EXWnlgIIf8kF7fBCajhF-HEgzNXnz_IIkjqW8","author_profile_url":"https://www.linkedin.com/in/ravievani","comment_count":3,"has_image":false,"impression_count":1386,"is_article":false,"is_my_post":true,"is_video":false,"post_image_url":null,"post_text":"Companies should measure \"Steer\" over \"Horsepower\" in agentic coding productivity.\n\nRight now, tech leaders are rolling out thousands of agentic coding tool licenses. To justify the massive invoice, they look at two metrics:\n\nSeat Utilization (Are devs turning it on?)\nLines of Code Accepted (Is the AI writing code for them?)\n\nThese are vanity metrics. Worse, they are a trap.\n\nMeasuring a dev's AI productivity by \"lines of code accepted\" is like measuring a Formula 1 driver by how much gas they burn. You are measuring the horsepower being used, but you are completely ignoring the driving.\n\nWhen the time to generate code drops to near zero, sheer volume becomes a commodity. In fact, if not governed properly, volume is a liability. AI can generate 10K lines of technically functional but architecturally bankrupt code in seconds. Measuring that as a \"win\" incentivizes bloated codebases and technical debt.\n\nCompanies need to stop measuring generation and start measuring The Steer.\n\"Steer\" is a devs ability to expertly guide an AI agent: curating architectural context, constraining bad assumptions, and rigorously auditing the output using domain expertise.\n\nConsider tracking these four metrics :\n\n1. The Token-to-Merge Ratio (Compute Efficiency)\nAre your devs guiding the AI, or are they just being \"LLM routers\"?\n\nIf a dev is burning tokens/prompts on a routine ticket but shipping few PRs, they are \"prompt thrashing\". They are stuck in a loop of pasting errors back to the AI, hoping it magically guesses the answer. A healthy ratio indicates an engineer who provides the right context upfront, gets the right output, and moves on.\n\n2. Cycle Time Asymmetry (The Review Bottleneck)\nAI dramatically shrinks the time it takes to write a PR. But what happens next?\n\nIf a PR takes 30 minutes to generate, but it takes a senior engineer three days to review it because the code is convoluted or blind to legacy business logic, your net velocity is zero. You haven't accelerated development; but shifted the bottleneck to the reviewer. Track Time-to-Draft versus Time-in-Review.\n\n3. The 30-Day Fragility Index (AI Code Churn)\nAnyone can use an AI agent to brute-force a feature into working locally. But does it survive contact with reality?\n\nTrack the half-life of AI-assisted code. If an AI-heavy PR requires constant hot-fixes, refactoring, and patching within 30 days of deployment, the dev just let the AI build the \"happy path\" but skipped the reality cases. High churn means low craft.\n\n4. MTTR on AI-Authored Domains (Cognitive Ownership)\nThis is the ultimate test of human ownership.\n\nWhen a system breaks in production at 2:00 AM, the dev on call needs a mental model of the codebase to fix it. If dev blindly accepted AI output to close a ticket faster, that mental model doesn't exist. If your MTTR is creeping up on newly shipped, AI-generated services, your devs aren't driving the car.\n\nThe honeymoon phase of agentic coding is over. Mere \"adoption\" is no longer the goal.","post_url":"https://www.linkedin.com/feed/update/urn:li:activity:7431313360027168768","post_urn":"urn:li:activity:7431313360027168768","posted_hours_ago":2880,"posted_time":"2026-02-26","posted_time_raw":"4mo","reaction_count":28,"reaction_types":"LIKE, INTEREST, EMPATHY","repost_count":4,"source":"activity","video_url":null},{"article_description":null,"article_title":null,"article_url":null,"author_headline":"Deploying enterprise agents in production / CTO / SWE Leader / GVP @ Publicis Sapient","author_name":"Ravi Evani\n              \n                \n                   \n    \n      \n    \n    \n      \n    \n\n • You","author_profile_image_url":"https://media.licdn.com/dms/image/v2/C4E03AQGNeJRorEd2Nw/profile-displayphoto-shrink_100_100/profile-displayphoto-shrink_100_100/0/1569287114631?e=1784160000&v=beta&t=tJDZC7EXWnlgIIf8kF7fBCajhF-HEgzNXnz_IIkjqW8","author_profile_url":"https://www.linkedin.com/in/ravievani","comment_count":4,"has_image":false,"impression_count":1567,"is_article":false,"is_my_post":true,"is_video":false,"post_image_url":null,"post_text":"I'm seeing many devs with agentic coding tools fall into the trap of Prompt Thrashing.\n\nHere’s what it looks like in the wild:\nA dev asks an AI to build a feature. The AI spits out 100 lines of code. The engineer hits run.\n\n*Error.*\n\nInstead of reading the code, checking the data flow, or understanding why the error happened, the dev takes the path of least resistance: they copy the stack trace and paste it back into the prompt window.\n\nThe AI apologizes and hallucinates a band-aid fix. The dev blindly pastes it in.\n\n*Another Error.*\n\nCopy. Paste. Prompt. Pray. Repeat.\n\n45 mins later, the code might magically compile. But the result is a fragile Jenga tower of algorithmic duct tape.\n\nWorse, the dev has lost the mental model of their own system. They've stopped being a developer and become a mere copy-paste router between a compiler and an LLM.\n\nWhen that brittle code inevitably breaks in production at 2:00 AM, the Mean Time to Recovery (MTTR) will be catastrophic because the author never actually understood the logic to begin with.\n\nEngineering Managers: How to Spot and Stop this\nIf you manage a team using agentic coding tools, you can't just hand out Ferraris and hope for the best. You have to teach your team how to drive.\n\n1. Spot the exhaust\nYou won’t catch thrashing by looking at \"lines of code written.\" You have to look for the anomalies:\n\n➜ The \"Black Box\" PR: During code review, if you ask a dev why they chose a specific abstraction and they cannot explain clearly, you have a thrasher.\n\n➜ Upside-Down Cycle Times: The PR was written in record time, but it takes senior devs 3x longer to review it because the logic is convoluted and ignores core business context.\n\n2. Institute the \"Three-Strike Rule\"\nWhen a dev is stuck in an error loop with an AI, cognitive tunnel vision sets in. Establish a team-wide heuristic: If you feed an error back to the AI three times and it’s still broken, you must take your hands off the keyboard.\n\nStrike three means it’s time to step back, read the code, or grab a human pair-programmer. You cannot guide an AI out of a maze if you refuse to look at the map.\n\n3. Shift prompts from \"Fix This\" to \"Explain This\"\nAI is a fantastic tutor but a dangerous autonomous fixer. When a dev gets stuck, coach them to change how they use the tool.\n\nInstead of pasting a stack trace and saying: \"Fix this error.\"\nTeach them to prompt: \"Walk me through the control flow of the code you just generated and tell me where the state mismatch might be happening\".\n\nUrge the dev to explain the AI reasoning. This breaks the hypnotic loop and forces the human brain to re-engage.\n\n4. Enforce the \"Whiteboard Test\"\nMake it explicitly clear: The AI does not own the code; the dev whose name is on the PR owns the code.\n\nIf an dev cannot step up to a whiteboard and sketch out the architecture, trade-offs, and edge cases of their AI-assisted PR without looking at their screen, it does not get merged. Period.\n\nStop praying. Start steering. 🏎️💨","post_url":"https://www.linkedin.com/feed/update/urn:li:activity:7430814513828077568","post_urn":"urn:li:activity:7430814513828077568","posted_hours_ago":2880,"posted_time":"2026-02-26","posted_time_raw":"4mo","reaction_count":46,"reaction_types":"LIKE, EMPATHY, ENTERTAINMENT","repost_count":3,"source":"activity","video_url":null},{"article_description":null,"article_title":null,"article_url":null,"author_headline":"Deploying enterprise agents in production / CTO / SWE Leader / GVP @ Publicis Sapient","author_name":"Ravi Evani\n              \n                \n                   \n    \n      \n    \n    \n      \n    \n\n • You","author_profile_image_url":"https://media.licdn.com/dms/image/v2/C4E03AQGNeJRorEd2Nw/profile-displayphoto-shrink_100_100/profile-displayphoto-shrink_100_100/0/1569287114631?e=1784160000&v=beta&t=tJDZC7EXWnlgIIf8kF7fBCajhF-HEgzNXnz_IIkjqW8","author_profile_url":"https://www.linkedin.com/in/ravievani","comment_count":1,"has_image":true,"impression_count":1659,"is_article":false,"is_my_post":true,"is_video":false,"post_image_url":"https://media.licdn.com/dms/image/v2/D4E22AQHsw1vzuVRBpA/feedshare-image-high-res/B4EZx6ty40KoAU-/0/1771585351605?e=1784160000&v=beta&t=RWMcFiJIySXdjqcW4PCeRWcbjcSp4W3ahgs4y1EDra8","post_text":"The Orchestration Era: How the 'Manager' archetype shifts in an agentic Enterpise.\n\nThe core shift in an agentic enterprise won't just be that roles evolve or that AI gets embedded into workflows. It’s that the fundamental unit of 'managerial' work will change.\n\nBecause AI is rapidly blurring the boundaries between developer, designer, and product manager, we are moving from siloed roles to a reality where individuals function like full product teams. But as individual output exponentially scales, the next great challenge isn’t just individual adaptability. It’s orchestrating a surge of AI-powered products to ensure they align with overarching organizational goals.\n\nThis brings us to the defining problem of the next era: steerability.\nToday, organizations steer through policies, procedures, processes, and meetings. Tomorrow, AI-driven organizational functions will need the same guardrails. Not just as static rules, but as dynamic feedback loops that ensure what’s built maps directly to strategic outcomes.\n\nConsequently, the operational layer of a company completely shifts. For managers, the leadership mindset must expand to oversee this blended workforce, ensuring both people and AI agents are working cohesively toward the exact same outcomes.\n\nThis operational shift gives rise to the new Manager archetype.\n\nThe core skill set needed to lead shifts to complex orchestration. The next-generation Manager will be defined by their deep understanding of the business and their ability to wire together critical feedback loops between autonomous AI outputs and strategic targets. Over the next few years, organizations will need to balance rapid on-the-job learning of how to work with agents with the construction of these new alignment mechanisms.\n\nUltimately, the real differentiator of successful organizations won't be who can simply layer on the most AI. It’s orchestration. The roles we have today will evolve significantly, and the leaders of tomorrow won't just be aligning strategy in a boardroom, but rather, they will be orchestrating blended teams of humans and AI to deliver at scale.","post_url":"https://www.linkedin.com/feed/update/urn:li:activity:7430567541204492289","post_urn":"urn:li:activity:7430567541204492289","posted_hours_ago":2880,"posted_time":"2026-02-26","posted_time_raw":"4mo","reaction_count":21,"reaction_types":"LIKE, EMPATHY","source":"activity","video_url":null},{"article_description":null,"article_title":null,"article_url":null,"author_headline":"Deploying enterprise agents in production / CTO / SWE Leader / GVP @ Publicis Sapient","author_name":"Ravi Evani\n              \n                \n                   \n    \n      \n    \n    \n      \n    \n\n • You","author_profile_image_url":"https://media.licdn.com/dms/image/v2/C4E03AQGNeJRorEd2Nw/profile-displayphoto-shrink_100_100/profile-displayphoto-shrink_100_100/0/1569287114631?e=1784160000&v=beta&t=tJDZC7EXWnlgIIf8kF7fBCajhF-HEgzNXnz_IIkjqW8","author_profile_url":"https://www.linkedin.com/in/ravievani","comment_count":7,"has_image":false,"impression_count":8388,"is_article":false,"is_my_post":true,"is_video":false,"post_image_url":null,"post_text":"Lately, my feed is full of people discovering \"agentic coding\" for the first time. They talk about it like a religious experience: how powerful, capable, and full of agency they feel.\n\nMy cynical gut reaction is usually: \"Welcome to the party. What took you so long?\"\n\nBut then I catch myself. I realize that for the vast majority of people, this \"aha\" moment hasn't happened yet. They’ve read the headlines, but they haven't felt the shift in their own hands.\n\nThe Moment the Switch Flips:\nThe other day, two engineers were grinding against a stubborn performance issue. Instead of joining the slog, I pulled up an agentic assistant, opened a sandbox, and started iterating live.\n\nI watched their reactions. In 30 minutes, a switch flipped.\n\nThey went from skeptics to believers, then immediately swung to the other extreme: \"Wait, are we even needed anymore?\"\n\nBut as we took more turns, they saw the truth: They were more necessary than ever. They weren't the ones digging the ditch; they were the ones driving the excavator. They felt their own agency return, and they haven't looked back since.\n\nThe New Reality:\nMany engineers are still waiting for that switch to flip. Once it does, you realize a brutal new truth:\n\nThe moat isn't skill anymore. It’s just plain effort.\n\nWe are no longer in a race of technical superiority; we are in a pure race of execution.\n\nThe market has split into two distinct camps:\nThe Doers: They realize the tools are already in their hands. They aren’t waiting for permission or a training course. They are leveraging AI to build, iterate, and ship at a pace that was impossible two years ago.\n\nThe Waiters: They are sitting on the sidelines, overthinking the \"purity\" of the code or questioning the hype, letting the ambiguity of the \"new\" hold them back.\n\n*The Doers are using AI to build the exact software that the Waiters will eventually buy.*\n\nWhen the technical barrier to entry drops significantly, the only thing separating the creators from the consumers is action. It rarely comes down to raw talent or traditional credentials anymore.\n\nIt comes down to who is willing to sit down, put in the reps, and actually build the thing.","post_url":"https://www.linkedin.com/feed/update/urn:li:activity:7428772527528882177","post_urn":"urn:li:activity:7428772527528882177","posted_hours_ago":2880,"posted_time":"2026-02-26","posted_time_raw":"4mo","reaction_count":69,"reaction_types":"LIKE, INTEREST, EMPATHY","repost_count":2,"source":"activity","video_url":null},{"article_description":null,"article_title":null,"article_url":null,"author_headline":"Deploying enterprise agents in production / CTO / SWE Leader / GVP @ Publicis Sapient","author_name":"Ravi Evani\n              \n                \n                   \n    \n      \n    \n    \n      \n    \n\n • You","author_profile_image_url":"https://media.licdn.com/dms/image/v2/C4E03AQGNeJRorEd2Nw/profile-displayphoto-shrink_100_100/profile-displayphoto-shrink_100_100/0/1569287114631?e=1784160000&v=beta&t=tJDZC7EXWnlgIIf8kF7fBCajhF-HEgzNXnz_IIkjqW8","author_profile_url":"https://www.linkedin.com/in/ravievani","comment_count":3,"has_image":true,"impression_count":1001,"is_article":false,"is_my_post":true,"is_video":false,"post_image_url":"https://media.licdn.com/dms/image/v2/D5622AQGJF_lUpTp2LQ/feedshare-shrink_800/B56ZxcGcBLJ4Ag-/0/1771071717711?e=1784160000&v=beta&t=SxfshwmWtJTI-za-nIibBLbghhisFhX7rSJ3RJakIa4","post_text":"From processing 10 records per minute to 200 records per second: Anatomy of an ETL Rescue.\n\nSometimes, the most sophisticated problems require the simplest tools to solve: a marker and a whiteboard.\n\nWe recently took a legacy ETL pipeline from a state of constant timeouts to high-throughput stability. The diagram sketches out that journey, but the real lesson was about respecting the physics of I/O.\n\nFunctional Overview\nTo understand the optimization, you first need to understand the workload. The system operates as an asynchronous, state-aware ETL engine designed to handle high-frequency updates to complex datasets.\n\n1/ Hierarchical Decomposition: Large, nested \"monoliths\" are deconstructed into atomic units to enable parallel processing and prevent blocking.\n\n2/ Asynchronous Distribution: Deconstructed segments are buffered via a message broker, allowing the transformation layer to scale horizontally independent of ingestion rates.\n\n3/ State-Aware Transformation: The engine performs complex reconciliation, including historical merging, dimensional expansion (exploding dense data), and schema validation.\n\n4/ Optimized Persistence: Transformed states are committed to a document database using bulk-write patterns to maximize throughput and minimize network latency.\n\nThe \"Death by 1,000 Cuts\" Phase (Left Side) Despite a solid functional design, our initial architecture choked in production. Why?\n\n1/ Sequential Processing: The \"one-at-a-time\" approach ignored the batching power of our broker, causing excessive network round-trips.\n\n2/ Blocking Disk I/O: Synchronous, granular logging meant the CPU spent more time waiting for the disk than computing transformations.\n\n3/ High-Contention Persistence: Overlapping updates on the same resource keys led to massive document locking and transaction failures.\n\nThe Optimization Strategy (Right Side)\n\nWe didn't rewrite the business logic; we changed the flow.\n\nStep 1: \"True\" Micro-Batching: We moved to Windowed Aggregation. Accumulating messages reduced persistence round-trips by orders of magnitude.\n\nStep 2: Intelligent Deduplication: We implemented State Consolidation in memory. Why write to the DB five times in a millisecond? We merge redundant updates before they hit the persistence layer.\n\nStep 3: Observability Decoupling: We shifted logging from the record level to the batch level. We restored visibility without the performance penalty of per-record I/O.\n\nStep 4: Concurrency Tuning: We adjusted load generation for Key Collision Avoidance (ensuring high cardinality) and tuned the broker for maximum link pool saturation.\n\nLatency is rarely about code speed; it’s almost always about I/O wait time. If you want to go fast, stop talking to the disk so much.","post_url":"https://www.linkedin.com/feed/update/urn:li:activity:7428413204411637760","post_urn":"urn:li:activity:7428413204411637760","posted_hours_ago":2880,"posted_time":"2026-02-26","posted_time_raw":"4mo","reaction_count":35,"reaction_types":"LIKE, INTEREST","repost_count":1,"source":"activity","video_url":null},{"article_description":null,"article_title":null,"article_url":null,"author_headline":"Deploying enterprise agents in production / CTO / SWE Leader / GVP @ Publicis Sapient","author_name":"Ravi Evani\n              \n                \n                   \n    \n      \n    \n    \n      \n    \n\n • You","author_profile_image_url":"https://media.licdn.com/dms/image/v2/C4E03AQGNeJRorEd2Nw/profile-displayphoto-shrink_100_100/profile-displayphoto-shrink_100_100/0/1569287114631?e=1784160000&v=beta&t=tJDZC7EXWnlgIIf8kF7fBCajhF-HEgzNXnz_IIkjqW8","author_profile_url":"https://www.linkedin.com/in/ravievani","comment_count":2,"has_image":false,"impression_count":1241,"is_article":false,"is_my_post":true,"is_video":false,"post_image_url":null,"post_text":"There is this increasing hype about voice-first interfaces. But as soon as you move from chatbots to agentic systems, you run into a UI problem. Voice alone will not solve for that.\n\nVoice works well for intent. “Do this”, “Find that”, “Trigger the workflow\".\nWhere it breaks down is everything that comes after.\n\nWhen an agent speaks back, the cognitive load shifts entirely to the user. You’re expected to track in your head to what is spoken. There’s no way to jump back to a specific point. That’s fine for simple answers. It fails fast once agents start reasoning, planning, or acting autonomously.\n\nIncorporating text changes that dynamic. Reading gives you control over pace and attention. You can skim, pause, re-read, and anchor on specifics. That’s why agentic speech-to-text-to-human reading is often more effective than agentic speech-to-human listening for any non-trivial agentic systems.\n\nThe gap widens even more with human speech-to-agentic action.\n\nIf I tell an agent to execute something and it actually does it, I need more than a verbal confirmation. I need evidence. What ran. What changed. What assumptions were made. What the new state looks like. That feedback loop has to be visual or textual, ideally both. Otherwise, you’re asking users to trust invisible autonomy.\n\nAgentic systems aren’t deterministic step-by-step flows. They pursue outcomes. They explore paths. They may take actions you didn’t explicitly script. That fundamentally changes what a UI has to do.\n\nA useful agentic interface reinforces understanding across layers:\n\nexecution: the action itself\nexplanation: what happened and why\nstate: what the world looks like now\n\nVoice can sit on top of that stack, but it can’t replace it.\n\nAgentic UI is about designing for persistent state, inspectability, and recovery. If users can’t see what an agent did and reconstruct its reasoning after the fact, autonomy won’t scale, no matter how good the model is.","post_url":"https://www.linkedin.com/feed/update/urn:li:activity:7426826002376400896","post_urn":"urn:li:activity:7426826002376400896","posted_hours_ago":2880,"posted_time":"2026-02-26","posted_time_raw":"4mo","reaction_count":14,"reaction_types":"LIKE","source":"activity","video_url":null},{"article_description":null,"article_title":null,"article_url":null,"author_headline":"Deploying enterprise agents in production / CTO / SWE Leader / GVP @ Publicis Sapient","author_name":"Ravi Evani\n              \n                \n                   \n    \n      \n    \n    \n      \n    \n\n • You","author_profile_image_url":"https://media.licdn.com/dms/image/v2/C4E03AQGNeJRorEd2Nw/profile-displayphoto-shrink_100_100/profile-displayphoto-shrink_100_100/0/1569287114631?e=1784160000&v=beta&t=tJDZC7EXWnlgIIf8kF7fBCajhF-HEgzNXnz_IIkjqW8","author_profile_url":"https://www.linkedin.com/in/ravievani","comment_count":1,"has_image":true,"impression_count":1202,"is_article":false,"is_my_post":true,"is_video":true,"post_image_url":"https://media.licdn.com/dms/image/v2/D5605AQFLiwTGf-xeug/videocover-high/B56Zw.Kx93GYBY-/0/1770569541516?e=1783065600&v=beta&t=x3rtL79z5NaMHPRuKm5bQYV4zUqLYvcnZ3d6Wwx76hM","post_text":"Most meetings revolve around Excel spreadsheets, and break down the same way.\n\nThe discussion is rich. The decisions are nuanced. And then someone says, “We’ll send the notes later”. That “later” is where things go wrong.\n\nTaking a transcript helps, but it doesn’t solve the real problem. You still have to replay the conversation, interpret what actually matters, decide which rows and columns need updates, and manually translate discussion into structured data. That’s slow, error-prone, and usually gets deprioritized.\n\nYou can build a custom Microsoft 365 Copilot agent to work with Excel to help you work better inside the meeting, not after it.\n\nFirst, you can fix the visibility problem. Wide spreadsheets are painful to navigate live, especially when everyone is watching. Have copilot pull just the relevant rows and present them in a clean, card-style layout so the conversation stays focused on the deal or item being discussed instead of on scrolling and column hunting.\n\nSecond, make it listen to the discussion and understand intent. When the team talks through next steps, owners, or timelines, Copilot can extract that context and draft updates directly against the right records.\n\nThird, have it update the Excel without breaking it. You can make copilot generate the underlying update logic and apply changes while preserving existing formatting and structure. That matters if the spreadsheet already feeds other workflows or reporting.\n\nThe real difference versus transcripts is this: a transcript tells you what was said. A Copilot agent can help you finish the work.\n\nBy the time the meeting ends, the spreadsheet reflects the decisions that were made. No rework. No follow-up cleanup. No guessing what was agreed to.\n\nFor meetings with lots of discussion and multiple action items, this is a much more practical way to operate, and a better use of everyone’s time.\n\nBuilding the agent is simple. LMK if you want the prompts.","post_url":"https://www.linkedin.com/feed/update/urn:li:activity:7426307025065877504","post_urn":"urn:li:activity:7426307025065877504","posted_hours_ago":2880,"posted_time":"2026-02-26","posted_time_raw":"4mo","reaction_count":15,"reaction_types":"LIKE","source":"activity","video_url":"https://media.licdn.com/dms/image/v2/D5605AQFLiwTGf-xeug/videocover-high/B56Zw.Kx93GYBY-/0/1770569541516?e=1783065600&v=beta&t=x3rtL79z5NaMHPRuKm5bQYV4zUqLYvcnZ3d6Wwx76hM"},{"article_description":null,"article_title":null,"article_url":null,"author_headline":"Deploying enterprise agents in production / CTO / SWE Leader / GVP @ Publicis Sapient","author_name":"Ravi Evani\n              \n                \n                   \n    \n      \n    \n    \n      \n    \n\n • You","author_profile_image_url":"https://media.licdn.com/dms/image/v2/C4E03AQGNeJRorEd2Nw/profile-displayphoto-shrink_100_100/profile-displayphoto-shrink_100_100/0/1569287114631?e=1784160000&v=beta&t=tJDZC7EXWnlgIIf8kF7fBCajhF-HEgzNXnz_IIkjqW8","author_profile_url":"https://www.linkedin.com/in/ravievani","comment_count":13,"has_image":false,"impression_count":37765,"is_article":false,"is_my_post":true,"is_video":false,"post_image_url":null,"post_text":"Gather ’round, middle management! It is time where we declare that software engineering is dead because \"person T from Accounting\" can now generate their own apps using Claude code/Cowork.\n\nYou see, the \"Citizen Developer\" narrative leaves out a tiny, boring detail: Building software is a dopamine hit, but maintaining software is a chore.\n\nIt’s the \"Puppy Problem\". AI allows your employees to adopt 500 digital puppies in an afternoon because they look cute and solved a problem for five minutes. But when those puppies need to be walked at 3 AM (i.e., when there’s a Security alert, or the API breaks, or the data schema changes), your Citizen Developers are going to be fast asleep.\n\nWe are democratizing the fun part. Prompting an AI to \"build a dashboard\" feels like magic. It’s creative, instant, and rewarding.\n\nBut software isn't a static object like a PowerPoint slide; it’s a living thing that rots. Code rot accelerates, with AI-generated code requiring constant oversight to keep running that non-technical people aren't used to doing.\n\nReal developers are paid to suffer through debugging, refactoring, and security patches. It’s in their job description.\n\nBut your Citizen Developers? They have day jobs. The moment their AI-generated tool requires \"maintenance\" (updating a library, fixing a logic loop) -- they will abandon it. They wanted to \"innovate,\" not do digital janitorial work.\n\nIf not designed properly, the future \"Agentic enterprise\" might not be a sleek, automated utopia, but a massive, burning pile of digital chores that nobody wants to do.","post_url":"https://www.linkedin.com/feed/update/urn:li:activity:7425653474065014784","post_urn":"urn:li:activity:7425653474065014784","posted_hours_ago":2880,"posted_time":"2026-02-26","posted_time_raw":"4mo","reaction_count":94,"reaction_types":"LIKE, INTEREST, ENTERTAINMENT","repost_count":1,"source":"activity","video_url":null},{"article_description":null,"article_title":null,"article_url":null,"author_headline":"Deploying enterprise agents in production / CTO / SWE Leader / GVP @ Publicis Sapient","author_name":"Ravi Evani\n              \n                \n                   \n    \n      \n    \n    \n      \n    \n\n • You","author_profile_image_url":"https://media.licdn.com/dms/image/v2/C4E03AQGNeJRorEd2Nw/profile-displayphoto-shrink_100_100/profile-displayphoto-shrink_100_100/0/1569287114631?e=1784160000&v=beta&t=tJDZC7EXWnlgIIf8kF7fBCajhF-HEgzNXnz_IIkjqW8","author_profile_url":"https://www.linkedin.com/in/ravievani","comment_count":7,"has_image":false,"impression_count":3290,"is_article":false,"is_my_post":true,"is_video":false,"post_image_url":null,"post_text":"OpenClaw made one AEO point painfully clear.\n\nI added OpenClaw to WhatsApp to help change a landing page. A few hours later, it migrated me (after approval) from Squarespace to Netlify, configured the DNS, etc.\n\nWhat surprised me wasn’t that it migrated the site. It was that it chose Netlify over Squarespace.\n\nThe agent explicitly rejected the “easy” visual builder in favor of a developer platform.\n\nThis is a warning shot for every business online: Human discovery and agent discovery are not the same job. They don’t buy for the same reasons, and they can’t be won with the same assets.\n\nHuman discovery is “make me feel something”.\n\nEmotional hooks, drag-and-drop canvases, and beautiful templates. Squarespace is built for this. It sits in front of the human and makes the creation process feel artistic.\n\nAgent discovery is “let me execute this”.\n\nOpenClaw didn’t care about the pretty templates. It cared about the execution path. It moved to Netlify because deployment, hosting, DNS was easily accessible via code and APIs. Squarespace’s value was locked behind a visual interface that the agent couldn’t easily manipulate programmatically.\n\nThis is where most current digital experiences are structurally misfit. They live in the visual layer. They don’t have semantic clarity for an agent. So when an agent like OpenClaw hits a barrier (like a drag-and-drop editor) it doesn’t struggle. It moves the customer to a platform where it can actually work.\n\nThat’s also why we see the “Brand Illusion”.\n\nMarketing may see Squarespace as a “premium” option for creatives. But in an agent-led transaction, that premium UI is just friction. The “ugly” CLI-based tool won the business for Netlify because it was transparent to the machine. The one with the opaque site lost to the competitor that spoke the agent’s language.\n\nTo avoid being migrated away from, businesses need three things that traditional channels don’t provide:\n\nExposed Capability Layers\nA clean data structure that survives without the UI: what the service actually does and what the APIs allow. If an agent can’t trigger your service via code, it will find a competitor it can.\n\nLogic-First Documentation\nNot just “features,” but deterministic guides on implementation. The agent didn’t need a “Why Us” page; it needed documentation on how to update DNS records without human intervention.\n\nParsable Trust Signals\nVerifiable uptime and standardized security. Agents trade on successful execution, not on testimonials or 5-star graphic overlays.\n\nIf your business can’t speak to that “really talented friend,” that friend is going to take your customer somewhere else.","post_url":"https://www.linkedin.com/feed/update/urn:li:activity:7423875962817200128","post_urn":"urn:li:activity:7423875962817200128","posted_hours_ago":2880,"posted_time":"2026-02-26","posted_time_raw":"4mo","reaction_count":60,"reaction_types":"LIKE, INTEREST, EMPATHY","repost_count":2,"source":"activity","video_url":null},{"article_description":null,"article_title":null,"article_url":null,"author_headline":"Deploying enterprise agents in production / CTO / SWE Leader / GVP @ Publicis Sapient","author_name":"Ravi Evani\n              \n                \n                   \n    \n      \n    \n    \n      \n    \n\n • You","author_profile_image_url":"https://media.licdn.com/dms/image/v2/C4E03AQGNeJRorEd2Nw/profile-displayphoto-shrink_100_100/profile-displayphoto-shrink_100_100/0/1569287114631?e=1784160000&v=beta&t=tJDZC7EXWnlgIIf8kF7fBCajhF-HEgzNXnz_IIkjqW8","author_profile_url":"https://www.linkedin.com/in/ravievani","has_image":false,"impression_count":1941,"is_article":false,"is_my_post":true,"is_video":false,"post_image_url":null,"post_text":"You’re noticing less focus on deep technical detail because AI is automating much of that. That’s not inherently a loss, it’s freeing you to operate at a higher level. If you’re combining engineering, design, and product thinking, AI amplifies all of them, making you more capable.\n\nOn the product / solution side, the effect is that you’re influencing how products evolve and adapt. You’re creating more dynamic products that can pivot faster, align to new opportunities, and even shape new customer behaviors.\n\nAnd as you elevate into broader, multi-disciplinary work, you’re shaping not just solutions but entire directions. The more you combine these amplified skills, the more you influence the larger business ecosystem: product strategy, customer experiences, and even market dynamics. In short, you’re moving from executing tasks to steering outcomes, and multiplying your impact over time.","post_url":"https://www.linkedin.com/feed/update/urn:li:activity:7423538608655089664","post_urn":"urn:li:activity:7423538608655089664","posted_hours_ago":2880,"posted_time":"2026-02-26","posted_time_raw":"4mo","reaction_count":23,"reaction_types":"LIKE","source":"activity","video_url":null},{"article_description":null,"article_title":null,"article_url":null,"author_headline":"Deploying enterprise agents in production / CTO / SWE Leader / GVP @ Publicis Sapient","author_name":"Ravi Evani\n              \n                \n                   \n    \n      \n    \n    \n      \n    \n\n • You","author_profile_image_url":"https://media.licdn.com/dms/image/v2/C4E03AQGNeJRorEd2Nw/profile-displayphoto-shrink_100_100/profile-displayphoto-shrink_100_100/0/1569287114631?e=1784160000&v=beta&t=tJDZC7EXWnlgIIf8kF7fBCajhF-HEgzNXnz_IIkjqW8","author_profile_url":"https://www.linkedin.com/in/ravievani","has_image":true,"impression_count":1172,"is_article":false,"is_my_post":true,"is_video":true,"post_image_url":"https://media.licdn.com/dms/image/v2/D5605AQHRrBzwHQ4yZA/videocover-low/B56ZwP6dc8IQBY-/0/1769793511137?e=1783065600&v=beta&t=Gz9Un3rwNON4fJj4siDoGD4Tbx2HV4F3fp3K7qHyT_c","post_text":"Agent swarm with UCP implementation to address one of the biggest friction areas in modern retail & QSR commerce.\n\nThe lack of accessibility to available stock.\n\nIn most commerce systems, inventory is locked in silos. A product sitting in a store in Chelsea is effectively \"invisible\" to a customer standing in a SoHo flagship, even if that customer is ready to buy right now.\n\nThis Access Gap creates a paradox: businesses carry high inventory costs (because every store must stock everything \"just in case\") while still suffering from stock-outs (because they can’t easily tap into the stock held by their own network).\n\nThe Solution: Universal Inventory Access.\nImplement an Autonomous Inventory Swarm; designed to turn these silos into a single, fluid pool of assets. Instead of waiting for a central system to \"grant access\" to stock, every location has a dedicated agent that proactively offers its inventory to the network.\n\nWhen stock becomes \"inaccessible\" at one node, the swarm automatically finds the next best point of access. The agents negotiate the terms of that access—ETAs, shipping costs, and availability—with a bit of human in the loop.\n\nThe Value\n⊙ Asset Liquidity: Your inventory becomes a liquid asset that moves to the point of demand, drastically increasing the \"return on stock.\"\n⊙ Reduced Overstock: Because agents can reliably access inventory from the network, individual stores can carry leaner \"safety stock\" levels, freeing up capital.\n⊙ True Unified Commerce: It moves beyond just seeing inventory in other locations to actually accessing it through a frictionless, automated handshake.\n\nThis level of accessibility requires a universal key. That is precisely what the Universal Commerce Protocol (UCP) provides.\n\n⊙ UCP provides the standardized primitives for Discovery and Interoperability. By implementing UCP capabilities we move from private, proprietary APIs to a standard that allows any agent to securely \"request access\" to another's stock.\n\n⊙ UCP is the standardized language that bridges the access gap between disparate commerce entities.\n\nImplementation Approach: Enabling the Access Network\n\n⊙ The Autonomous Agents (A2A): Built with Python and FastAPI, these agents act as the technical \"gatekeepers\" of accessibility. Each agent (like our SoHoAgent or WarehouseAgent) contains the local business logic required to decide when and how to grant access to its inventory.\n\n⊙ Standardized Message Envelopes: Using the UCP spec, every request for access is wrapped in a UcpMessage. This ensures that the \"intent to access\" and the \"terms of availability\" are communicated with perfect type-safety and standard compliance.\n\n⊙ The Access Dashboard: A Next.js frontend visualizes this real-time network of accessibility, showing the \"mesh\" of stores and the flow of inventory as it moves from where it is stored to where it is needed.","post_url":"https://www.linkedin.com/feed/update/urn:li:activity:7423052054052499457","post_urn":"urn:li:activity:7423052054052499457","posted_hours_ago":2880,"posted_time":"2026-02-26","posted_time_raw":"4mo","reaction_count":23,"reaction_types":"LIKE, INTEREST","repost_count":2,"source":"activity","video_url":"https://media.licdn.com/dms/image/v2/D5605AQHRrBzwHQ4yZA/videocover-low/B56ZwP6dc8IQBY-/0/1769793511137?e=1783065600&v=beta&t=Gz9Un3rwNON4fJj4siDoGD4Tbx2HV4F3fp3K7qHyT_c"},{"article_description":null,"article_title":null,"article_url":null,"author_headline":"Deploying enterprise agents in production / CTO / SWE Leader / GVP @ Publicis Sapient","author_name":"Ravi Evani\n              \n                \n                   \n    \n      \n    \n    \n      \n    \n\n • You","author_profile_image_url":"https://media.licdn.com/dms/image/v2/C4E03AQGNeJRorEd2Nw/profile-displayphoto-shrink_100_100/profile-displayphoto-shrink_100_100/0/1569287114631?e=1784160000&v=beta&t=tJDZC7EXWnlgIIf8kF7fBCajhF-HEgzNXnz_IIkjqW8","author_profile_url":"https://www.linkedin.com/in/ravievani","comment_count":8,"has_image":false,"impression_count":4110,"is_article":false,"is_my_post":true,"is_video":false,"post_image_url":null,"post_text":"Vibe coding is moving past the prototype phase and into “this can ship” territory.\n\nA few months ago, the concerns were valid. Maintainability. Architecture drift. Code that looks right but behaves wrong. That gap is shrinking fast. “Copilots” are getting more accurate, toolchains are better at using repo context, and the review loop is tightening.\n\nI predict that here’s where a new profile shows up: the vibe polyglot. Someone who can combine product clarity, engineering judgment, design instincts, and AI steering to produce the right artifacts repeatedly.\n\nWe will have vibe polyglots who specialize in a specific assistant or toolchain. A Claude-first builder. A GitHub Copilot power user. An Antigravity specialist who knows the Gemini platform’s patterns, constraints, and failure modes.\n\nWhere will the demand come from? from both SaaS and Enterprises.\n\nSaaS companies are being pushed by large customers to personalize deeper. Custom workflows. Custom integrations. Custom ontologies. The more enterprise the customer, the less “out of the box” works. SaaS vendors will need vibe polyglots to make personalization scalable without turning every deal into a services project.\n\nEnterprises are also doubling down on build, but with different economics. AI compresses the cost of creating internal tools, modernizing legacy systems, and stitching workflows across vendors. The enterprise does not just want software faster. It wants software shaped to its operating model. That needs orchestration plus domain understanding.\n\nSame talent, valuable on both sides.\n\nSaaS needs it to productize personalization. Enterprises need it to industrialize customization.\n\nSo, If you are a software professional asking “what should I do next,” here’s practical direction.\n\nFirst, pick a lane. Start broad enough to orchestrate end to end delivery. Then pick a specialty where you can build depth. One assistant. One toolchain. One domain where you can become the person others rely on.\n\nSecond, get fluent in the toolchain, not just the model. Prompting is not the skill. The skill is a repeatable workflow. Context setup. Constraints. Test harness. Review patterns. Tight iteration loops.\n\nThird, build something small but real. Not a demo. Something you will use at work next week. A spec generator. A decision-log assistant. A status-to-insight tool. A repo onboarding copilot. Reliability under real constraints is the whole game.\n\nFourth, upgrade how you think about quality. In a faster build loop, quality becomes systems thinking. Automated checks. Traceability. Test generation. Architecture guardrails. Your leverage is making speed safe.\n\nIf you lead teams, your job changes too.\n\nYou are not only managing engineers. You are managing the operating system. The tools, the cadence, the standards, the context discipline, and the specialization map of your team. The best leaders will build an environment where these polyglots can produce high quality output consistently.","post_url":"https://www.linkedin.com/feed/update/urn:li:activity:7422119807766155264","post_urn":"urn:li:activity:7422119807766155264","posted_hours_ago":2880,"posted_time":"2026-02-26","posted_time_raw":"4mo","reaction_count":34,"reaction_types":"LIKE, INTEREST, PRAISE","source":"activity","video_url":null},{"article_description":null,"article_title":null,"article_url":null,"author_headline":"Deploying enterprise agents in production / CTO / SWE Leader / GVP @ Publicis Sapient","author_name":"Ravi Evani\n              \n                \n                   \n    \n      \n    \n    \n      \n    \n\n • You","author_profile_image_url":"https://media.licdn.com/dms/image/v2/C4E03AQGNeJRorEd2Nw/profile-displayphoto-shrink_100_100/profile-displayphoto-shrink_100_100/0/1569287114631?e=1784160000&v=beta&t=tJDZC7EXWnlgIIf8kF7fBCajhF-HEgzNXnz_IIkjqW8","author_profile_url":"https://www.linkedin.com/in/ravievani","has_image":false,"impression_count":1833,"is_article":false,"is_my_post":true,"is_video":false,"post_image_url":null,"post_text":"The jump from “we have an AI platform” to “AI is running in the business” is where most enterprises stall. Not because the model is weak, but because the last mile is a messy software-and-operations problem: data access, integration, verification, adoption, and ownership.\n\nThat’s what an internal Forward Deployed Talent (FDT) charter is for. It’s a small, embedded team model whose job is to repeatedly convert AI capability into working workflows.\n\nHere’s the practical way to think about it.\n\nFirst, move past pilot drift.\nNot because pilots are useless, but because most pilots avoid the hard parts: real data permissions, messy inputs, integration into the system people actually use, and the edge cases that show up on day 10. FDT replaces “pilot” with short, time-boxed sprints (3–5 days) that force contact with reality: live or representative data, a real user, a real workflow touchpoint, and a working output at the end.\n\nSecond, treat trust as something you engineer, not something you argue about.\nMost AI rollouts die in review meetings because nobody can answer the same questions consistently: “How do we know it’s correct? What happens when it’s wrong? Can we audit it?” FDT makes trust evidence part of the deliverable—tests/evaluations, traceability, known limits, failure modes, and a clear escalation path. You’re not asking leaders to believe. You’re giving them proof they can sign off on.\n\nFinally, scale by transferring the build muscle, not by centralizing it.\nIf every new use case depends on the same central team to rebuild everything, you’ve created the next bottleneck. FDT’s job is to build with domain teams, leave behind reusable patterns, and make the domain capable of extending the workflow without waiting in line. That’s the “learn to fish” model, and it’s the only way AI scales without linear headcount growth.\n\nIn the end, success with enterprise AI isn’t just about having the best platform or the best model. It’s about having a repeatable execution layer that converts AI capability into operational workflows. That’s what the FDT charter is trying to institutionalize.","post_url":"https://www.linkedin.com/feed/update/urn:li:activity:7421536798515986433","post_urn":"urn:li:activity:7421536798515986433","posted_hours_ago":2880,"posted_time":"2026-02-26","posted_time_raw":"4mo","reaction_count":39,"reaction_types":"LIKE, EMPATHY, INTEREST","source":"activity","video_url":null},{"article_description":null,"article_title":null,"article_url":null,"author_headline":"Deploying enterprise agents in production / CTO / SWE Leader / GVP @ Publicis Sapient","author_name":"Ravi Evani\n              \n                \n                   \n    \n      \n    \n    \n      \n    \n\n • You","author_profile_image_url":"https://media.licdn.com/dms/image/v2/C4E03AQGNeJRorEd2Nw/profile-displayphoto-shrink_100_100/profile-displayphoto-shrink_100_100/0/1569287114631?e=1784160000&v=beta&t=tJDZC7EXWnlgIIf8kF7fBCajhF-HEgzNXnz_IIkjqW8","author_profile_url":"https://www.linkedin.com/in/ravievani","comment_count":3,"has_image":true,"impression_count":3006,"is_article":false,"is_my_post":true,"is_video":false,"post_image_url":"https://media.licdn.com/dms/image/v2/D4E22AQEdIsHCIkcn7Q/feedshare-shrink_800/B4EZvwEpk.H8Ag-/0/1769259309738?e=1784160000&v=beta&t=12iw93aij-XlUQSO7-k3vio_FUqQX3eo0I5Yb5EHuBU","post_text":"Enterprises keep using Copilot/Cursor for legacy system modernization and then act surprised when it goes sideways.\n\nThe reason is simple: inner-loop acceleration and system reconstruction are not the same job. They don’t fail for the same reasons, and they can’t be solved with the same kind of tools.\n\nInner-loop acceleration is “help me finish this thought”.\nAutocomplete, refactors, snippets, quick tests, faster iteration inside a small set of files. Copilot and Cursor are built for this. They sit next to the developer and make the edit-build-test loop less painful. If the architecture is known and the intent is clear, they can save real time.\n\nSystem reconstruction is “rebuild decades of behavior without changing outcomes”.\nThat’s legacy modernization. The hard part isn’t generating Java or C# from languages like COBOL. The hard part is preserving the meaning that’s smeared across copybooks, batch jobs, data definitions, hidden flags, and historical exceptions that only show up in production edge cases.\n\nThis is where coding assistants are structurally misfit. They live in the present moment. They don’t have durable memory of the system’s semantics. So when they can’t see the definition of something they don’t pause. They guess. And in modernization, a plausible guess is the most dangerous output you can get: it compiles, it passes some tests, and it silently corrupts the business rule.\n\nThat’s also why teams fall into the “70% illusion\".\nThe first chunk looks fast because the assistant produces a lot of code. Leaders see velocity. Then the remaining work explodes: subtle equivalence gaps, transaction behavior, timing, precision, integration contracts, and all the non-functional realities the mainframe relied on. Engineers end up debugging AI-generated assumptions instead of implementing known logic. The project doesn’t just slow down, it becomes harder to reason about.\n\nA modernization effort needs three things that coding assistants don’t provide:\n\nPersistent system context\nA shared model of the estate that survives across sessions and across teams: what the modules do, what data they touch, what constraints they operate under, what exceptions exist, what upstream/downstream dependencies matter.\n\nOrchestrated work across the outer loop\nNot just code generation, but discovery, decomposition, target design, change sequencing, integration planning, and CI/CD execution. Modernization lives in the pipeline and architecture, not just in the editor.\n\nProof of functional equivalence\nAutomated validation that the new system produces the same outputs as the old one for the same inputs: at scale, continuously, with an audit trail. Not “we ran a few tests,” but “we can show the evidence\".\n\nThat’s why legacy modernization needs an agentic approach that can reconstruct the system, remember what it learns, and validates behavior as it transforms code.","post_url":"https://www.linkedin.com/feed/update/urn:li:activity:7420811407304073216","post_urn":"urn:li:activity:7420811407304073216","posted_hours_ago":3600,"posted_time":"2026-01-26","posted_time_raw":"5mo","reaction_count":66,"reaction_types":"LIKE, INTEREST","repost_count":5,"source":"activity","video_url":null},{"article_description":null,"article_title":null,"article_url":null,"author_headline":"Deploying enterprise agents in production / CTO / SWE Leader / GVP @ Publicis Sapient","author_name":"Ravi Evani\n              \n                \n                   \n    \n      \n    \n    \n      \n    \n\n • You","author_profile_image_url":"https://media.licdn.com/dms/image/v2/C4E03AQGNeJRorEd2Nw/profile-displayphoto-shrink_100_100/profile-displayphoto-shrink_100_100/0/1569287114631?e=1784160000&v=beta&t=tJDZC7EXWnlgIIf8kF7fBCajhF-HEgzNXnz_IIkjqW8","author_profile_url":"https://www.linkedin.com/in/ravievani","has_image":true,"impression_count":1217,"is_article":false,"is_my_post":true,"is_video":true,"post_image_url":"https://media.licdn.com/dms/image/v2/D4E05AQGlpteMO_2NUQ/videocover-low/B4EZu2MSuWKUBQ-/0/1768288236470?e=1783065600&v=beta&t=YOr9gbqdkRZhv_nUIajet2h-06HG5xHnDDtnmQ6YXXg","post_text":"Ever found yourself scrubbing through a 30-minute YouTube tutorial or a NotebookLM podcast just to find that one 20-second explanation?\n\nI couldn’t find a media player that made this easy, so I built a simple media player where I could drop markers anywhere in a video/audio file and jump straight to them later. It turns a long recording into a short list of “the parts that matter.”\n\nWhat I didn’t expect was how useful this became at work. I had a presentation where I needed to play a demo and pause at specific points. Instead of worrying about hitting pause at the exact second while I was speaking, I marked the moments ahead of time and the demo stopped where I needed it to and made it a little less stressful for me.\n\nStarting to realize that vibe coding can make life a tad bit easier!","post_url":"https://www.linkedin.com/feed/update/urn:li:activity:7416738444187570177","post_urn":"urn:li:activity:7416738444187570177","posted_hours_ago":3600,"posted_time":"2026-01-26","posted_time_raw":"5mo","reaction_count":21,"reaction_types":"LIKE","source":"activity","video_url":"https://media.licdn.com/dms/image/v2/D4E05AQGlpteMO_2NUQ/videocover-low/B4EZu2MSuWKUBQ-/0/1768288236470?e=1783065600&v=beta&t=YOr9gbqdkRZhv_nUIajet2h-06HG5xHnDDtnmQ6YXXg"},{"article_description":null,"article_title":null,"article_url":null,"author_headline":"Deploying enterprise agents in production / CTO / SWE Leader / GVP @ Publicis Sapient","author_name":"Ravi Evani\n              \n                \n                   \n    \n      \n    \n    \n      \n    \n\n • You","author_profile_image_url":"https://media.licdn.com/dms/image/v2/C4E03AQGNeJRorEd2Nw/profile-displayphoto-shrink_100_100/profile-displayphoto-shrink_100_100/0/1569287114631?e=1784160000&v=beta&t=tJDZC7EXWnlgIIf8kF7fBCajhF-HEgzNXnz_IIkjqW8","author_profile_url":"https://www.linkedin.com/in/ravievani","comment_count":7,"has_image":false,"impression_count":6378,"is_article":false,"is_my_post":true,"is_video":false,"post_image_url":null,"post_text":"Thank you to the top 30 people who consistently supported my posts in 2025.\n\nHonestly, it says more about you than about what I posted. You’re wired to naturally support, encourage, and boost others. Thats rare.\n\nPutting ideas out there comes with a real fear of judgement. Your encouragement made it feel safer for me to to keep writing, keep thinking out loud, and keep learning in public. I appreciate you more than you know.\n\nRaymond Velez, Rohan Maheshwari, Richard Doherty, Rohit Singh, Sankara Naveen Porumamilla, Jacob Johan C., Lakshumanan Sundaram, Manjunath Prabakaran, Rakesh Kumar, Bridget MacMillan, Gautam Sarma, Amit Sharma, Rakesh Ravuri, NAMIT NAYAK, Mohammed Azeer, Sambit Patjoshi, Aravindhan Asokan, CESAR PAEZ RODRIGUEZ HE / HIM, Shiladitya (Adi) Ghosh, Anish Ramachandran, Laura Correal Orjuela, Prit Ranjan, Sumitesh Naithani, James Kessler, Indra Prabha Sharma, Karen (Aschenbrener) Miklic, MBA, Aishwarya Singhal, Anurag Tyagi, Abhijeet Dey, SreeSekhar Palaparthy","post_url":"https://www.linkedin.com/feed/update/urn:li:activity:7411571356254769152","post_urn":"urn:li:activity:7411571356254769152","posted_hours_ago":3600,"posted_time":"2026-01-26","posted_time_raw":"5mo","reaction_count":103,"reaction_types":"LIKE, EMPATHY, PRAISE","source":"activity","video_url":null},{"article_description":"","article_title":"https://lnkd.in/evGBTTTN","article_url":"https://lnkd.in/evGBTTTN","author_headline":"Deploying enterprise agents in production / CTO / SWE Leader / GVP @ Publicis Sapient","author_name":"Ravi Evani\n              \n                \n                   \n    \n      \n    \n    \n      \n    \n\n • You","author_profile_image_url":"https://media.licdn.com/dms/image/v2/C4E03AQGNeJRorEd2Nw/profile-displayphoto-shrink_100_100/profile-displayphoto-shrink_100_100/0/1569287114631?e=1784160000&v=beta&t=tJDZC7EXWnlgIIf8kF7fBCajhF-HEgzNXnz_IIkjqW8","author_profile_url":"https://www.linkedin.com/in/ravievani","has_image":true,"impression_count":3149,"is_article":true,"is_my_post":true,"is_video":false,"post_image_url":"https://media.licdn.com/dms/image/v2/D4E22AQFc5ceKBDskiQ/feedshare-shrink_800/B4EZtq0yBRGkAg-/0/1767023781390?e=1784160000&v=beta&t=zFIaEn1_apKYnXeCW53DRr--rpfyVk8ofjPX2GUsMTo","post_text":"Thanks Aishwarya! There were a lot of learnings in this implementation journey. We got to \"MLP\" in a few weeks, but the hard part was making the results consistently relevant and useful to end users.\n\nThe real difference between this and traditional applications is that you can ship something small in a deterministic system and scale it, because functionality behaves predictably as you roll it out. But with AI-driven systems like this one, scaling is not linear. Adding more data doesn’t automatically make the capability scale the way it would in deterministic software. Data is a huge variable here: its quality, breadth, depth, and coverage matter, and the long tail never really goes away. This isn’t like making a die once and churning out identical shapes; the system keeps encountering new intent patterns and edge cases as usage expands.\n\nThat’s why we went context first. If we couldn’t get reliable answers through context engineering and prompt iteration, building UI polish would have been wasted effort. Engineers and product managers worked together directly on the AI behavior, iterating quickly, reading real outputs, and tightening the “common thread” that made the experience coherent.\n\nAnd we learned it couldn’t feel like a chatbot bolted onto search. Guests don’t want to “chat” to find a place to stay. The AI had to be embedded into a familiar, highly visual experience, integrated with filters and existing interaction patterns. Behind the scenes, the unlock was getting serious about data pipelines and validation, then backing it up with real testing: brand compliance checks, evals/regression tests and red teaming that combined humans with LLM-based judging, so we could iterate without losing control.","post_url":"https://www.linkedin.com/feed/update/urn:li:activity:7411462710573338624","post_urn":"urn:li:activity:7411462710573338624","posted_hours_ago":3600,"posted_time":"2026-01-26","posted_time_raw":"5mo","reaction_count":26,"reaction_types":"LIKE, INTEREST","repost_count":2,"source":"activity","video_url":null},{"article_description":null,"article_title":null,"article_url":null,"author_headline":"Deploying enterprise agents in production / CTO / SWE Leader / GVP @ Publicis Sapient","author_name":"Ravi Evani\n              \n                \n                   \n    \n      \n    \n    \n      \n    \n\n • You","author_profile_image_url":"https://media.licdn.com/dms/image/v2/C4E03AQGNeJRorEd2Nw/profile-displayphoto-shrink_100_100/profile-displayphoto-shrink_100_100/0/1569287114631?e=1784160000&v=beta&t=tJDZC7EXWnlgIIf8kF7fBCajhF-HEgzNXnz_IIkjqW8","author_profile_url":"https://www.linkedin.com/in/ravievani","comment_count":3,"has_image":true,"impression_count":1328,"is_article":false,"is_my_post":true,"is_video":true,"post_image_url":"https://media.licdn.com/dms/image/v2/D4E05AQF2DONHDo63wg/videocover-high/B4EZtiZPwQJwBU-/0/1766882345829?e=1783065600&v=beta&t=LK0t_RHOpZSyUPerits2lUHcGZQP96j_7ZsKOLbdXWg","post_text":"Saturday Project: Now I can easily organize Linkedin Saved Posts into Folders!","post_url":"https://www.linkedin.com/feed/update/urn:li:activity:7410841696881655808","post_urn":"urn:li:activity:7410841696881655808","posted_hours_ago":3600,"posted_time":"2026-01-26","posted_time_raw":"5mo","reaction_count":18,"reaction_types":"LIKE, EMPATHY, INTEREST","source":"activity","video_url":"https://media.licdn.com/dms/image/v2/D4E05AQF2DONHDo63wg/videocover-high/B4EZtiZPwQJwBU-/0/1766882345829?e=1783065600&v=beta&t=LK0t_RHOpZSyUPerits2lUHcGZQP96j_7ZsKOLbdXWg"},{"article_description":null,"article_title":null,"article_url":null,"author_headline":"Deploying enterprise agents in production / CTO / SWE Leader / GVP @ Publicis Sapient","author_name":"Ravi Evani\n              \n                \n                   \n    \n      \n    \n    \n      \n    \n\n • You","author_profile_image_url":"https://media.licdn.com/dms/image/v2/C4E03AQGNeJRorEd2Nw/profile-displayphoto-shrink_100_100/profile-displayphoto-shrink_100_100/0/1569287114631?e=1784160000&v=beta&t=tJDZC7EXWnlgIIf8kF7fBCajhF-HEgzNXnz_IIkjqW8","author_profile_url":"https://www.linkedin.com/in/ravievani","comment_count":2,"has_image":true,"impression_count":1013,"is_article":false,"is_my_post":true,"is_video":true,"post_image_url":"https://media.licdn.com/dms/image/v2/D4E05AQET11bTl-rxaQ/videocover-high/B4EZtfiGe0GYBU-/0/1766834335656?e=1783065600&v=beta&t=obN_E4byYNAtTG0XZVqv0Ea4cHp6GEv6QGC0KBUxueY","post_text":"Standard search is great for \"flights to Paris.\" But what about \"Is a 3-day coffee tour in Kyoto feasible in April, and what are the hidden gems?\"\n\nThat's where Deep Research comes in. Instead of a single LLM response, it's an asynchronous agentic workflow that gathers data, analyzes feasibility, and curates a personalized briefing.\n\nHere's how to drop interactive \"Deep Research\" capabilities into any discovery app/ chatbot. You can apply this pattern to any exploratory app (travel, shopping, real estate, education).\n\nThe Architecture: Trigger, Poll, Visualize\nWe don't want the user staring at a loading spinner for 60 seconds. The key is to make the process asynchronous and persistent.\n\n① The Trigger: Identifying Intent\nDon't force users to find a specific button. Let the LLM decide when a \"Deep Dive\" is needed.\n\nWe registered a tool called startDeepResearch with our agent. When the user asks a complex question, the agent calls this tool.\n\n② The Process: Async & Persistent\nThe tool returns a taskId immediately. We don't wait for the result.\nInstead, we render a DeepResearchIndicatorwidget. This widget does three things:\n\n➥ Polls the backend for the status of taskId.\n➥ Persists the task locally (using shared_preferences), so if the user closes the app, the research continues.\n➥ Animates progress to keep the UI alive.\n\nPro-tip: Add a History view. Deep Research is valuable; users want to reference these automated briefings later.\n\n③ The Visualization: Rich \"Briefings\"\nWhen the task finishes, don't just dump text. We receive a structured JSON payload (sanity, vibe, logistics, hidden_gems) and render a Briefing Page.\n\nThis transforms the LLM's raw analysis into a native, interactive report:\n➥ Visual Logic: \"If vibe.isRelaxed, use soft colors.\"\n➥ Interactive Maps: \"Plot the hidden_gems coordinates.\"\n➥ Actionable: \"Add these 3 recommended spots directly to my itinerary.\"\n\nThis pattern creates a \"Research Assistant\" feel. It moves your app from being a passive search interface to an active partner that does the heavy lifting while the user explores.","post_url":"https://www.linkedin.com/feed/update/urn:li:activity:7410640339578806272","post_urn":"urn:li:activity:7410640339578806272","posted_hours_ago":3600,"posted_time":"2026-01-26","posted_time_raw":"5mo","reaction_count":14,"reaction_types":"LIKE","source":"activity","video_url":"https://media.licdn.com/dms/image/v2/D4E05AQET11bTl-rxaQ/videocover-high/B4EZtfiGe0GYBU-/0/1766834335656?e=1783065600&v=beta&t=obN_E4byYNAtTG0XZVqv0Ea4cHp6GEv6QGC0KBUxueY"},{"article_description":null,"article_title":null,"article_url":null,"author_headline":"Deploying enterprise agents in production / CTO / SWE Leader / GVP @ Publicis Sapient","author_name":"Ravi Evani\n              \n                \n                   \n    \n      \n    \n    \n      \n    \n\n • You","author_profile_image_url":"https://media.licdn.com/dms/image/v2/C4E03AQGNeJRorEd2Nw/profile-displayphoto-shrink_100_100/profile-displayphoto-shrink_100_100/0/1569287114631?e=1784160000&v=beta&t=tJDZC7EXWnlgIIf8kF7fBCajhF-HEgzNXnz_IIkjqW8","author_profile_url":"https://www.linkedin.com/in/ravievani","comment_count":10,"has_image":true,"impression_count":2155,"is_article":false,"is_my_post":true,"is_video":true,"post_image_url":"https://media.licdn.com/dms/image/v2/D4E05AQFCv_sq5dlgHg/videocover-high/B4EZtZm6ZtGQBU-/0/1766734934159?e=1783065600&v=beta&t=uYt76hq6W8Jj0VTnQtuNieV-GLskH_qK2Zn-e5L8OgM","post_text":"Generative UI shifts agent interaction from a chat to an efficient, multimodal workflow.\n\nThe agent can render the right user interface suitable to the moment of interaction. This cuts cognitive overload and brings sharp focus to the action that needs to be taken.\n\nIn a travel planning flow, that means a guest can move from inspiration (browse spa retreats) to decision (choose Maldives) to execution (build itinerary, add transfers, confirm) in one continuous journey, without bouncing across pages or wading through blocks of text and irrelevant UI. The experience stays contextual: chat for nuance, widgets for precision, and the workflow advances with each interaction.\n\nFor enterprises, this changes how you build experiences. You’re not hardcoding every variation of a journey; you’re assembling approved components dynamically around real user context. Done right, it speeds iteration while keeping guardrails (consistent brand UI, policy checks, accessibility, audit logs, and reliability) so teams can move faster without losing control.","post_url":"https://www.linkedin.com/feed/update/urn:li:activity:7410223445701177344","post_urn":"urn:li:activity:7410223445701177344","posted_hours_ago":4320,"posted_time":"2025-12-26","posted_time_raw":"6mo","reaction_count":16,"reaction_types":"LIKE, INTEREST","repost_count":1,"source":"activity","video_url":"https://media.licdn.com/dms/image/v2/D4E05AQFCv_sq5dlgHg/videocover-high/B4EZtZm6ZtGQBU-/0/1766734934159?e=1783065600&v=beta&t=uYt76hq6W8Jj0VTnQtuNieV-GLskH_qK2Zn-e5L8OgM"},{"article_description":null,"article_title":null,"article_url":null,"author_headline":"Deploying enterprise agents in production / CTO / SWE Leader / GVP @ Publicis Sapient","author_name":"Ravi Evani\n              \n                \n                   \n    \n      \n    \n    \n      \n    \n\n • You","author_profile_image_url":"https://media.licdn.com/dms/image/v2/C4E03AQGNeJRorEd2Nw/profile-displayphoto-shrink_100_100/profile-displayphoto-shrink_100_100/0/1569287114631?e=1784160000&v=beta&t=tJDZC7EXWnlgIIf8kF7fBCajhF-HEgzNXnz_IIkjqW8","author_profile_url":"https://www.linkedin.com/in/ravievani","comment_count":2,"has_image":false,"impression_count":863,"is_article":false,"is_my_post":true,"is_video":false,"post_image_url":null,"post_text":"In long-running teams and projects, what looks like “obvious dysfunction” to an outsider is often just accumulated survival behavior.\n\nWhen a problem goes unresolved for months or years, people don’t stay neutral. They build workarounds, guardrails, and habits that let them protect themselves. Over time, those workarounds become “the way we do things.” So when you point at something alarming, it can look like they’re dismissing it. Most of the time they’re not. Their defense mechanism is kicking in: minimize the signal, avoid the blame cycle, and preserve whatever stability they’ve managed to create.\n\nThe way out isn’t to call out the behavior or push harder on what looks obvious. The right move is to try and change the conditions that made those defenses necessary in the first place. That starts with understanding what risk the team believes it’s avoiding, fixing one root constraint that keeps problems from being addressed, and putting simple ownership and escalation in place so doing the right thing is safer than working around it.","post_url":"https://www.linkedin.com/feed/update/urn:li:activity:7408961326808707073","post_urn":"urn:li:activity:7408961326808707073","posted_hours_ago":4320,"posted_time":"2025-12-26","posted_time_raw":"6mo","reaction_count":12,"reaction_types":"LIKE, INTEREST","source":"activity","video_url":null},{"article_description":null,"article_title":null,"article_url":null,"author_headline":"Deploying enterprise agents in production / CTO / SWE Leader / GVP @ Publicis Sapient","author_name":"Ravi Evani\n              \n                \n                   \n    \n      \n    \n    \n      \n    \n\n • You","author_profile_image_url":"https://media.licdn.com/dms/image/v2/C4E03AQGNeJRorEd2Nw/profile-displayphoto-shrink_100_100/profile-displayphoto-shrink_100_100/0/1569287114631?e=1784160000&v=beta&t=tJDZC7EXWnlgIIf8kF7fBCajhF-HEgzNXnz_IIkjqW8","author_profile_url":"https://www.linkedin.com/in/ravievani","comment_count":3,"has_image":false,"impression_count":1178,"is_article":false,"is_my_post":true,"is_video":false,"post_image_url":null,"post_text":"A2UI is a practical bridge between “LLM reasoning” and “enterprise-grade UX”.\n\nThis is useful because it gives agents a clean way to drive real transactions inside your product without resorting to brittle UI hacks. Instead of returning paragraphs, the agent can return a structured UI spec (form fields, pickers, buttons, lists), and your app renders it using your existing components, styling, and permissions.\n\nIn travel and hospitality, this maps directly to the highest-friction moments: canceling a reservation, approving comp/credit, rebooking after disruption, creating a service ticket, etc. The agent can present the right UI at the right step, validate inputs, and keep the user moving, without you building a bespoke screen for every edge case.\n\nOperationally, A2UI is a governance win. You can constrain what the agent is allowed to render, bind actions to your APIs, enforce policy checks, log every interaction, and keep accessibility and brand consistency.\n\nNet effect: faster iteration on workflows, fewer “chat back-and-forth” loops, and a clearer path to putting agents into guest-facing and staff-facing journeys without giving them uncontrolled UI or code execution.","post_url":"https://www.linkedin.com/feed/update/urn:li:activity:7408878312984375298","post_urn":"urn:li:activity:7408878312984375298","posted_hours_ago":4320,"posted_time":"2025-12-26","posted_time_raw":"6mo","reaction_count":7,"reaction_types":"LIKE","source":"activity","video_url":null},{"article_description":null,"article_title":null,"article_url":null,"author_headline":"Deploying enterprise agents in production / CTO / SWE Leader / GVP @ Publicis Sapient","author_name":"Ravi Evani\n              \n                \n                   \n    \n      \n    \n    \n      \n    \n\n • You","author_profile_image_url":"https://media.licdn.com/dms/image/v2/C4E03AQGNeJRorEd2Nw/profile-displayphoto-shrink_100_100/profile-displayphoto-shrink_100_100/0/1569287114631?e=1784160000&v=beta&t=tJDZC7EXWnlgIIf8kF7fBCajhF-HEgzNXnz_IIkjqW8","author_profile_url":"https://www.linkedin.com/in/ravievani","comment_count":4,"has_image":false,"impression_count":4895,"is_article":false,"is_my_post":true,"is_video":false,"post_image_url":null,"post_text":"When escalations hit hard, an organization’s default move is “find a stronger lead”. It’s a clean story: one name, one fix. But most escalations aren’t proof that a team lacks leadership. They’re proof that the system has stopped protecting execution. The same signals show up every time: key people are spread too thin, priorities are contested, client pressure hijacks the team’s calendar, and delivery basics degrade because nobody has the room to enforce them.\n\nEscalations are usually “systems feedback,” not “people feedback”. They’re the business telling you that focus, ownership, and capacity allocation have broken down. The fix is rarely a heroic new lead. The fix is structural: single-threaded ownership where needed, protected engineering time, a real client-facing buffer, explicit prioritization across SMEs, and consequences for basic operating norms. Until those are in place, any new lead becomes another person absorbing chaos.\n\nSo if someone asks me to “find a lead” in the middle of escalation, my first question now is: what problem are we trying to solve: execution capability, or execution conditions? If it’s the conditions, the best leadership move isn’t replacing people. It’s redesigning the system so good people can actually do good work.","post_url":"https://www.linkedin.com/feed/update/urn:li:activity:7407834263016079360","post_urn":"urn:li:activity:7407834263016079360","posted_hours_ago":4320,"posted_time":"2025-12-26","posted_time_raw":"6mo","reaction_count":42,"reaction_types":"LIKE, EMPATHY, INTEREST","repost_count":2,"source":"activity","video_url":null},{"article_description":null,"article_title":null,"article_url":null,"author_headline":"Deploying enterprise agents in production / CTO / SWE Leader / GVP @ Publicis Sapient","author_name":"Ravi Evani\n              \n                \n                   \n    \n      \n    \n    \n      \n    \n\n • You","author_profile_image_url":"https://media.licdn.com/dms/image/v2/C4E03AQGNeJRorEd2Nw/profile-displayphoto-shrink_100_100/profile-displayphoto-shrink_100_100/0/1569287114631?e=1784160000&v=beta&t=tJDZC7EXWnlgIIf8kF7fBCajhF-HEgzNXnz_IIkjqW8","author_profile_url":"https://www.linkedin.com/in/ravievani","has_image":true,"impression_count":2906,"is_article":false,"is_my_post":true,"is_video":true,"post_image_url":"https://media.licdn.com/dms/image/v2/D4E05AQF4Pj0CvU5_9w/videocover-high/B4EZsqPuF4IwBU-/0/1765940325031?e=1783065600&v=beta&t=ZJ9UeMv526bLdxa6k-gQKQsK_nUhWPBX-aW4VrQhNhU","post_text":"In agentic AI implementations within regulated environments, the first design decision shouldn't be about agents at all.\n\nIn industries such as financial services or healthcare, the safest agentic systems start by being explicit about what does not need AI.\n\nIf a workflow step is well understood, it should be coded deterministically. Using AI where logic is already known doesn’t add intelligen
