 to match the task at hand.\n\nWe tested Google hashtag#Gemini 2.5 to generate mindmaps from meeting discussions.\n\nWhen we set a thinking budget of 100, Pro (gemini-2.5-pro-preview-03-25) delivered a precise, outcome-focused mindmap in ~20 seconds.\n\nOn the other hand, even with the budget set to 0, Flash (gemini-2.5-flash-preview-04-17) gave us a faster, yet still sold mindmap in just 6 seconds.\n\nHonestly, the results were hard to objectively compare since there is no \"ground truth\" answer here. So quality is very much in the eyes of the beholder :)\n\nBased on my subjective assessment, I would recommend using Flash for fast, live \"whiteboarding\". Shift to Pro when you need depth and focus for deeper, targeted follow-ups afterward.\n\nThe combination of model selection and thinking budget lets you decide—speed or depth, on your terms.","post_url":"https://www.linkedin.com/feed/update/urn:li:activity:7322805996840542208","post_urn":"urn:li:activity:7322805996840542208","posted_hours_ago":8760,"posted_time":"2025-06-25","posted_time_raw":"1yr","reaction_count":8,"reaction_types":"LIKE, EMPATHY","source":"activity","video_url":"https://media.licdn.com/dms/image/v2/D4E05AQEJ4ymryAR3-Q/feedshare-thumbnail_720_1280/B4EZZ4s1YcHMAs-/0/1745781742174?e=1783008000&v=beta&t=gvacW5GM8kQJ-NH7htMJKfQZZg45m2FOMsYF11Zcavk"},{"article_description":null,"article_title":null,"article_url":null,"author_headline":"Deploying enterprise agents in production / CTO / SWE Leader / GVP @ Publicis Sapient","author_name":"Ravi Evani\n              \n                \n                   \n    \n      \n    \n    \n      \n    \n\n • You","author_profile_image_url":"https://media.licdn.com/dms/image/v2/C4E03AQGNeJRorEd2Nw/profile-displayphoto-shrink_100_100/profile-displayphoto-shrink_100_100/0/1569287114631?e=1784160000&v=beta&t=tJDZC7EXWnlgIIf8kF7fBCajhF-HEgzNXnz_IIkjqW8","author_profile_url":"https://www.linkedin.com/in/ravievani","comment_count":2,"has_image":true,"impression_count":2572,"is_article":false,"is_my_post":true,"is_video":false,"post_image_url":"https://media.licdn.com/dms/image/v2/D4E22AQGZKIjgmAJGOQ/feedshare-shrink_800/B4EZZ8uYxUGYAg-/0/1745849258854?e=1784160000&v=beta&t=qH2QIe9sFr9Ge4cla3tIZdb7bqza613m1eXzmtuYInk","post_text":"Here’s my current vibe coding workflow:\n\nI start with GPT-4.1 – because nothing yet beats its instruction-following.\n\nIf it gets it wrong twice, I bring in Gemini 2.5 Pro for a second opinion.\n\nIf they both agree but I’m still not convinced? I call on O3 for a final check or fresh angle.\n\nThen I take the best bits, remix, and feed it back to GPT-4.1.\n\nYes, it’s overkill. Yes, it works.\n\nWhat’s your coding workflow with AI?","post_url":"https://www.linkedin.com/feed/update/urn:li:activity:7322622534271606784","post_urn":"urn:li:activity:7322622534271606784","posted_hours_ago":8760,"posted_time":"2025-06-25","posted_time_raw":"1yr","reaction_count":24,"reaction_types":"LIKE, EMPATHY, INTEREST","repost_count":1,"source":"activity","video_url":null},{"article_description":null,"article_title":null,"article_url":null,"author_headline":"Deploying enterprise agents in production / CTO / SWE Leader / GVP @ Publicis Sapient","author_name":"Ravi Evani\n              \n                \n                   \n    \n      \n    \n    \n      \n    \n\n • You","author_profile_image_url":"https://media.licdn.com/dms/image/v2/C4E03AQGNeJRorEd2Nw/profile-displayphoto-shrink_100_100/profile-displayphoto-shrink_100_100/0/1569287114631?e=1784160000&v=beta&t=tJDZC7EXWnlgIIf8kF7fBCajhF-HEgzNXnz_IIkjqW8","author_profile_url":"https://www.linkedin.com/in/ravievani","comment_count":4,"has_image":true,"impression_count":3467,"is_article":false,"is_my_post":true,"is_video":true,"post_image_url":"https://media.licdn.com/dms/image/v2/D4E05AQHBJy-nWGWwBA/videocover-low/B4EZZyNblmHcCA-/0/1745672853586?e=1783008000&v=beta&t=p4Nb09bwhIIQTitHbBot8LSqFTe5hdA6HY-ZgLVOrJc","post_text":"Had a great fireside chat with David at Publicis Sapient GENE LATAM Fest ✨—shoutout to Laura and the crew for pulling it together!\n\nWe got into a simple idea: turning wasted meeting time into learning time.\n\nBefore committing your time to any meeting, ask yourself:\n\n🤔 What am I getting out of it?\n🤔 What am I giving to it?\n\nIf the answer to both is “not much”, skip it. Use that time to learn something new.\n\nAnd if someone really wants you in the room? Ask them the same two questions.\n\nProtect your time. Swap your wasted meeting time for learning time!","post_url":"https://www.linkedin.com/feed/update/urn:li:activity:7321882682974523392","post_urn":"urn:li:activity:7321882682974523392","posted_hours_ago":8760,"posted_time":"2025-06-25","posted_time_raw":"1yr","reaction_count":70,"reaction_types":"LIKE, PRAISE, EMPATHY","repost_count":4,"source":"activity","video_url":"https://media.licdn.com/dms/image/v2/D4E05AQHBJy-nWGWwBA/videocover-low/B4EZZyNblmHcCA-/0/1745672853586?e=1783008000&v=beta&t=p4Nb09bwhIIQTitHbBot8LSqFTe5hdA6HY-ZgLVOrJc"},{"article_description":null,"article_title":null,"article_url":null,"author_headline":"Deploying enterprise agents in production / CTO / SWE Leader / GVP @ Publicis Sapient","author_name":"Ravi Evani\n              \n                \n                   \n    \n      \n    \n    \n      \n    \n\n • You","author_profile_image_url":"https://media.licdn.com/dms/image/v2/C4E03AQGNeJRorEd2Nw/profile-displayphoto-shrink_100_100/profile-displayphoto-shrink_100_100/0/1569287114631?e=1784160000&v=beta&t=tJDZC7EXWnlgIIf8kF7fBCajhF-HEgzNXnz_IIkjqW8","author_profile_url":"https://www.linkedin.com/in/ravievani","comment_count":5,"has_image":true,"impression_count":4265,"is_article":false,"is_my_post":true,"is_video":true,"post_image_url":"https://media.licdn.com/dms/image/v2/D4E05AQFc1De9XaVMqg/videocover-high/B4EZZgH9KOHEBk-/0/1745369439499?e=1783008000&v=beta&t=N3f180jSoW8T4IlDIVkRtmTIwP6FoRqNIo9pZY_rhjA","post_text":"Yesterday, I was stuck at ATL with a 7-hour flight delay. Time for some vibe coding.\n\nI’ve always wanted to reverse-engineer cool apps—figure out their features and map their use cases.\n\nSo I fired up Publicis Sapient hashtag#Slingshot + Google hashtag#Gemini 2.5 Pro.\n\nWhat I built:\n🔹 A tool that takes a GitHub repo, URL or local filepath\n🔹 Analyzes the codebase\n🔹 Outputs use case diagram of what the app actually does\n\n2 hours of vibe coding, 4 hours of refactoring.\n\nKey learning:\nMake code deterministic wherever possible. Let the LLM focus only on what it must—in this case, extracting use cases. Diagram layout, shape creation, text alignment? Script it. Don’t leave it to chance.\n\nMinimal LLM. Maximum consistency.\n\nHappy vibe coding.","post_url":"https://www.linkedin.com/feed/update/urn:li:activity:7320610058441003008","post_urn":"urn:li:activity:7320610058441003008","posted_hours_ago":8760,"posted_time":"2025-06-25","posted_time_raw":"1yr","reaction_count":66,"reaction_types":"LIKE, PRAISE, EMPATHY","source":"activity","video_url":"https://media.licdn.com/dms/image/v2/D4E05AQFc1De9XaVMqg/videocover-high/B4EZZgH9KOHEBk-/0/1745369439499?e=1783008000&v=beta&t=N3f180jSoW8T4IlDIVkRtmTIwP6FoRqNIo9pZY_rhjA"},{"article_description":null,"article_title":null,"article_url":null,"author_headline":"Deploying enterprise agents in production / CTO / SWE Leader / GVP @ Publicis Sapient","author_name":"Ravi Evani\n              \n                \n                   \n    \n      \n    \n    \n      \n    \n\n • You","author_profile_image_url":"https://media.licdn.com/dms/image/v2/C4E03AQGNeJRorEd2Nw/profile-displayphoto-shrink_100_100/profile-displayphoto-shrink_100_100/0/1569287114631?e=1784160000&v=beta&t=tJDZC7EXWnlgIIf8kF7fBCajhF-HEgzNXnz_IIkjqW8","author_profile_url":"https://www.linkedin.com/in/ravievani","comment_count":3,"has_image":true,"impression_count":2020,"is_article":false,"is_my_post":true,"is_video":false,"post_image_url":"https://media.licdn.com/dms/image/v2/D4E22AQHUywAMnKeiSA/feedshare-shrink_800/B4EZZB94nJGYAg-/0/1744863466961?e=1784160000&v=beta&t=lRjRcb5HlF5VvaTGYj90vkFAnptYidkl6foSByOVBPw","post_text":"when your vibe coding agent does those numerous little extras way beyond the one thing you told it to do, remember that's a \"helpful\" upsell billed by the millisecond...","post_url":"https://www.linkedin.com/feed/update/urn:li:activity:7318487821361577984","post_urn":"urn:li:activity:7318487821361577984","posted_hours_ago":8760,"posted_time":"2025-06-25","posted_time_raw":"1yr","reaction_count":19,"reaction_types":"LIKE, ENTERTAINMENT","source":"activity","video_url":null},{"article_description":null,"article_title":null,"article_url":null,"author_headline":"Deploying enterprise agents in production / CTO / SWE Leader / GVP @ Publicis Sapient","author_name":"Ravi Evani\n              \n                \n                   \n    \n      \n    \n    \n      \n    \n\n • You","author_profile_image_url":"https://media.licdn.com/dms/image/v2/C4E03AQGNeJRorEd2Nw/profile-displayphoto-shrink_100_100/profile-displayphoto-shrink_100_100/0/1569287114631?e=1784160000&v=beta&t=tJDZC7EXWnlgIIf8kF7fBCajhF-HEgzNXnz_IIkjqW8","author_profile_url":"https://www.linkedin.com/in/ravievani","comment_count":1,"has_image":true,"impression_count":274,"is_article":false,"is_my_post":true,"is_video":false,"post_image_url":"https://media.licdn.com/dms/image/v2/D4E22AQFGIPTK2WMU9w/feedshare-shrink_800/feedshare-shrink_800/0/1728518677082?e=1784160000&v=beta&t=poXUOEnKL9vPIsLtMSKuama-5k1RrzbvcZgF_4fKixM","post_text":"I posed this question a few months ago when there were far fewer models in play. Now, with model “upsells” becoming the norm and our increasing reliance on vibe coding, this trade-off is more relevant than ever—especially for large enterprises.","post_url":"https://www.linkedin.com/feed/update/urn:li:activity:7318454409330319360","post_urn":"urn:li:activity:7318454409330319360","posted_hours_ago":8760,"posted_time":"2025-06-25","posted_time_raw":"1yr","reaction_count":2,"reaction_types":"LIKE","source":"activity","video_url":null},{"article_description":null,"article_title":null,"article_url":null,"author_headline":"Deploying enterprise agents in production / CTO / SWE Leader / GVP @ Publicis Sapient","author_name":"Ravi Evani\n              \n                \n                   \n    \n      \n    \n    \n      \n    \n\n • You","author_profile_image_url":"https://media.licdn.com/dms/image/v2/C4E03AQGNeJRorEd2Nw/profile-displayphoto-shrink_100_100/profile-displayphoto-shrink_100_100/0/1569287114631?e=1784160000&v=beta&t=tJDZC7EXWnlgIIf8kF7fBCajhF-HEgzNXnz_IIkjqW8","author_profile_url":"https://www.linkedin.com/in/ravievani","comment_count":1,"has_image":true,"impression_count":2818,"is_article":false,"is_my_post":true,"is_video":false,"post_image_url":"https://media.licdn.com/dms/image/v2/D4E22AQEYcno81K0krQ/feedshare-shrink_800/B4EZYrQGYiGgAk-/0/1744482363447?e=1784160000&v=beta&t=Zj5buWQ8r_HrnguZT_p3-iq4lc_8MSVv3RghvjMlLm0","post_text":"Now that hashtag#Google has launched ADK, I revisited the Airbnb hashtag#MCP use case from my earlier post https://lnkd.in/eisY5VDU, that showed how we used MCP to power a natural language property search.\n\nThis time, I explored what changes when you implement the same flow using ADK’s orchestration model.\n\nDifferent approaches. Same goal. Different trade-offs.\n\nHere’s a breakdown 👇\n\n🎯 Simple MCP Flow\n↳ LLM interprets the user query and chooses the tool\n↳ Script uses the MCP client to call the tool\n↳ Script sends the result back to the LLM for final response\n\n🎯 ADK MCP Flow\n↳ Agent Node (LLM + Toolbox) chooses the tool\n↳ ADK framework handles tool invocation (MCP under the hood)\n↳ Result flows through optional Format Node to final output\n\nMy take on the trade-offs:\n\nThe Simple MCP flow gives you full control. You’re handling the logic, tool orchestration, and logging directly through a Python script. It’s straightforward to prototype, easy to debug, and a great way to deeply understand how MCP sessions and tool calls work under the hood.\n\nBut that control comes at a cost. You’ll end up writing a lot of boilerplate — managing LLM prompts, interpreting responses, invoking tools, and stitching everything together manually. The orchestration logic is tightly coupled with your tool execution, and as workflows get more complex, maintaining that script becomes harder to scale.\n\nBy contrast, the ADK approach is more modular and scalable. The Agent Node combines LLM decision-making with a configured toolbox, while Format Nodes handle the response output. The orchestration is declarative — you connect nodes, and the framework handles the rest. It’s clean, reusable, and avoids the repetitive glue code.\n\nThat said, ADK introduces some abstraction. You don’t have line-by-line control over tool invocation — and the initial learning curve is higher. You’ll need to understand Pipelines, Nodes, and the framework’s mental model. But once you’re up and running, it’s far better suited for building complex, maintainable agentic applications.\n\nBottom line:\nSetting up an MCP integration is easy. Designing one that’s actually useful at scale is where it gets interesting. Start with a simple script to learn the flow. Move to ADK when you want modularity, reuse, and cleaner orchestration.","post_url":"https://www.linkedin.com/feed/update/urn:li:activity:7316889358379155456","post_urn":"urn:li:activity:7316889358379155456","posted_hours_ago":8760,"posted_time":"2025-06-25","posted_time_raw":"1yr","reaction_count":52,"reaction_types":"LIKE, INTEREST, EMPATHY","source":"activity","video_url":null},{"article_description":null,"article_title":null,"article_url":null,"author_headline":"Deploying enterprise agents in production / CTO / SWE Leader / GVP @ Publicis Sapient","author_name":"Ravi Evani\n              \n                \n                   \n    \n      \n    \n    \n      \n    \n\n • You","author_profile_image_url":"https://media.licdn.com/dms/image/v2/C4E03AQGNeJRorEd2Nw/profile-displayphoto-shrink_100_100/profile-displayphoto-shrink_100_100/0/1569287114631?e=1784160000&v=beta&t=tJDZC7EXWnlgIIf8kF7fBCajhF-HEgzNXnz_IIkjqW8","author_profile_url":"https://www.linkedin.com/in/ravievani","comment_count":3,"has_image":true,"impression_count":7560,"is_article":false,"is_my_post":true,"is_video":true,"post_image_url":"https://media.licdn.com/dms/image/v2/D4E05AQHiKvA-diWbnw/videocover-low/B4EZYfmWXnGYCU-/0/1744286926169?e=1783008000&v=beta&t=sa_J1912dN0Fnp51a06rYWOCUDGdZ0DYceF1PDc2f1E","post_text":"Publicis Sapient's Raghu Dubey gearing up for his big talk at Google Cloud Next '25 —spotlighting our Enterprise Agentic AI platform: Bodhi https://lnkd.in/eM--Wu6r.\n\nThe focus: Modernizing marketing with AI.\n\nWhat used to take several months can now be orchestrated and scaled in a fraction of the time—powered by Bodhi's modular and agentic orchestration capabilities.\n\nIn the marketing transformation space, Bodhi accelerates everything from Customer Engagement to Content Pipelines, to Multimodal compliance checks.\n\nNow, with hashtag#MCP and Google's Agentspace in the mix, we’re plugging Bodhi's enterprise agentic layer into a broader ecosystem of agents—unlocking disproportionate value for our customers.","post_url":"https://www.linkedin.com/feed/update/urn:li:activity:7316069692165480450","post_urn":"urn:li:activity:7316069692165480450","posted_hours_ago":8760,"posted_time":"2025-06-25","posted_time_raw":"1yr","reaction_count":182,"reaction_types":"LIKE, PRAISE, EMPATHY","source":"activity","video_url":"https://media.licdn.com/dms/image/v2/D4E05AQHiKvA-diWbnw/videocover-low/B4EZYfmWXnGYCU-/0/1744286926169?e=1783008000&v=beta&t=sa_J1912dN0Fnp51a06rYWOCUDGdZ0DYceF1PDc2f1E"},{"article_description":null,"article_title":null,"article_url":null,"author_headline":"Deploying enterprise agents in production / CTO / SWE Leader / GVP @ Publicis Sapient","author_name":"Ravi Evani\n              \n                \n                   \n    \n      \n    \n    \n      \n    \n\n • You","author_profile_image_url":"https://media.licdn.com/dms/image/v2/C4E03AQGNeJRorEd2Nw/profile-displayphoto-shrink_100_100/profile-displayphoto-shrink_100_100/0/1569287114631?e=1784160000&v=beta&t=tJDZC7EXWnlgIIf8kF7fBCajhF-HEgzNXnz_IIkjqW8","author_profile_url":"https://www.linkedin.com/in/ravievani","has_image":true,"impression_count":2413,"is_article":false,"is_my_post":true,"is_video":true,"post_image_url":"https://media.licdn.com/dms/image/v2/D4E05AQEem7N1LHe3GA/videocover-low/B4EZYSc3d9GgCM-/0/1744066304095?e=1783008000&v=beta&t=P6HeuAsgWPnbn-5m2rSfW-57rIi0lvH4P73sF4F7Ems","post_text":"If your app is going truly global, you will likely need a region and a language switcher to transact in that local region.\n\nHere we use Publicis Sapient hashtag#Slingshot AI SDLC platform to build a region and language switcher for a Mock Global Restaurant Android app.\n\nThe goal is simple: when a customer travels, they should be able to switch to the local region and language to view the correct menu and ordering options.\n\n↳ We start with mockup screens that we want to use to build this functionality. These screenshots are uploaded into Slingshot, along with functional instructions.\n↳ Slingshot interprets the visuals and prompts using our Enterprise Prompt Library, which includes standards for functionality, architecture, and non-functional requirements—like performance, localization, accessibility, security, privacy, and testing.\n↳ Slingshot starts generating code in Kotlin.\n↳ It sets up the project, adds dependencies, creates navigation fragments, and builds out the layouts—including all UI elements like text views, image views, and buttons.\n\nThen it generates:\n↳ A list of regions\n↳ View fragments\n↳ Adapters (like the menu adapter and region adapter)\n↳ Data classes for the region structure\n\n↳ Once that’s done, we verify all imports and dependencies, accept the changes, and save the files.\n\n↳ Next, we instruct Slingshot to generate unit and UI test cases. It adds the required testing dependencies, then generates the tests following our internal standards. We validate the tests, build the app, and run both the unit and UI tests—all of which pass successfully.\n\n↳ Finally, we validate the end-to-end functionality.\n\nThat’s it—we go from screenshots to a fully functional Android country and language switcher for a global mock restaurant app, delivered in under two hours by Devishankar Ramasamy using Slingshot.","post_url":"https://www.linkedin.com/feed/update/urn:li:activity:7315144379076083712","post_urn":"urn:li:activity:7315144379076083712","posted_hours_ago":8760,"posted_time":"2025-06-25","posted_time_raw":"1yr","reaction_count":49,"reaction_types":"LIKE, EMPATHY, PRAISE","source":"activity","video_url":"https://media.licdn.com/dms/image/v2/D4E05AQEem7N1LHe3GA/videocover-low/B4EZYSc3d9GgCM-/0/1744066304095?e=1783008000&v=beta&t=P6HeuAsgWPnbn-5m2rSfW-57rIi0lvH4P73sF4F7Ems"},{"article_description":null,"article_title":null,"article_url":null,"author_headline":"Deploying enterprise agents in production / CTO / SWE Leader / GVP @ Publicis Sapient","author_name":"Ravi Evani\n              \n                \n                   \n    \n      \n    \n    \n      \n    \n\n • You","author_profile_image_url":"https://media.licdn.com/dms/image/v2/C4E03AQGNeJRorEd2Nw/profile-displayphoto-shrink_100_100/profile-displayphoto-shrink_100_100/0/1569287114631?e=1784160000&v=beta&t=tJDZC7EXWnlgIIf8kF7fBCajhF-HEgzNXnz_IIkjqW8","author_profile_url":"https://www.linkedin.com/in/ravievani","comment_count":1,"has_image":true,"impression_count":1251,"is_article":false,"is_my_post":true,"is_video":true,"post_image_url":"https://media.licdn.com/dms/image/v2/D4E05AQG0dwsyQTrF0Q/videocover-high/B4EZYLE6NEHcBs-/0/1743942564269?e=1783008000&v=beta&t=oivFf3rxVrnRV24OmYUVBucsFWdzkZIjccv3AlL7ISY","post_text":"🦊🐢 Vibe Mode + Human Mode: Engage both sides of your coding brain!\n\nOne moves fast, driven by intuition, creativity, and prompts.\nThe other moves steady—grounded in structure, design, and experience.\n\nTogether? They ship code that works and lasts.\n\nWhether you’re riding on vibes or refining with intent, the magic happens when both modes get a seat at the table (or a pedal on the bike 🚲).\n\nWhich mode (aka mood) are you in today?","post_url":"https://www.linkedin.com/feed/update/urn:li:activity:7314625291455201281","post_urn":"urn:li:activity:7314625291455201281","posted_hours_ago":8760,"posted_time":"2025-06-25","posted_time_raw":"1yr","reaction_count":14,"reaction_types":"LIKE","source":"activity","video_url":"https://media.licdn.com/dms/image/v2/D4E05AQG0dwsyQTrF0Q/videocover-high/B4EZYLE6NEHcBs-/0/1743942564269?e=1783008000&v=beta&t=oivFf3rxVrnRV24OmYUVBucsFWdzkZIjccv3AlL7ISY"},{"article_description":null,"article_title":null,"article_url":null,"author_headline":"Deploying enterprise agents in production / CTO / SWE Leader / GVP @ Publicis Sapient","author_name":"Ravi Evani\n              \n                \n                   \n    \n      \n    \n    \n      \n    \n\n • You","author_profile_image_url":"https://media.licdn.com/dms/image/v2/C4E03AQGNeJRorEd2Nw/profile-displayphoto-shrink_100_100/profile-displayphoto-shrink_100_100/0/1569287114631?e=1784160000&v=beta&t=tJDZC7EXWnlgIIf8kF7fBCajhF-HEgzNXnz_IIkjqW8","author_profile_url":"https://www.linkedin.com/in/ravievani","comment_count":12,"has_image":true,"impression_count":18352,"is_article":false,"is_my_post":true,"is_video":true,"post_image_url":"https://media.licdn.com/dms/image/v2/D4E05AQH62BwR7KZUuw/videocover-low/B4EZYGScj.HMCM-/0/1743862229766?e=1783008000&v=beta&t=kJmF8-XsRNb9K5kpDcjtK-jPjez4y7uTA-ww-VbK3AQ","post_text":"We’re using Publicis Sapient Slingshot AI SDLC platform to build a goal-setting screen for the customer-facing iOS app of a mock investment bank.\n\nThe idea is simple: let customers set financial goals to support their planning.\n\nThis app is built in SwiftUI, and we’re starting with a Figma design of the screen. First, we upload the Figma file into Slingshot. Then, using Enterprise prompt libraries, context, and architectural patterns, Slingshot auto-generates the code.\n\n↳ Sets up the project structure\n↳ Defines the data model and sample data\n↳ Creates the network layer and repository for backend integration\n↳ Builds the view model\n↳ Generates the SwiftUI view\n↳ Adds mock and unit tests\n↳ And finally, the handling for asset loading for images and icons\n\nOnce the code is generated, we go file by file, do a quick sanity check, fix any major issues, and load it in Xcode.\n\nLive in Xcode, you’ll see:\n↳ The header appear\n↳ Buttons render\n↳ A carousel of suggested goals\n↳ Images load in\n↳ A list of all goals the user can select\n↳ And finally, UI icons and interactions get validated\n\n🎯 All in, we go from Figma to functional SwiftUI screen for a financial app — in just a few minutes.","post_url":"https://www.linkedin.com/feed/update/urn:li:activity:7314288378881978369","post_urn":"urn:li:activity:7314288378881978369","posted_hours_ago":8760,"posted_time":"2025-06-25","posted_time_raw":"1yr","reaction_count":210,"reaction_types":"LIKE, PRAISE, EMPATHY","repost_count":13,"source":"activity","video_url":"https://media.licdn.com/dms/image/v2/D4E05AQH62BwR7KZUuw/videocover-low/B4EZYGScj.HMCM-/0/1743862229766?e=1783008000&v=beta&t=kJmF8-XsRNb9K5kpDcjtK-jPjez4y7uTA-ww-VbK3AQ"},{"article_description":null,"article_title":null,"article_url":null,"author_headline":"Deploying enterprise agents in production / CTO / SWE Leader / GVP @ Publicis Sapient","author_name":"Ravi Evani\n              \n                \n                   \n    \n      \n    \n    \n      \n    \n\n • You","author_profile_image_url":"https://media.licdn.com/dms/image/v2/C4E03AQGNeJRorEd2Nw/profile-displayphoto-shrink_100_100/profile-displayphoto-shrink_100_100/0/1569287114631?e=1784160000&v=beta&t=tJDZC7EXWnlgIIf8kF7fBCajhF-HEgzNXnz_IIkjqW8","author_profile_url":"https://www.linkedin.com/in/ravievani","has_image":true,"impression_count":5261,"is_article":false,"is_my_post":true,"is_video":true,"post_image_url":"https://media.licdn.com/dms/image/v2/D4D05AQHr3gIOY73kQA/feedshare-thumbnail_720_1280/B4DZWTY67sG4BA-/0/1741934541716?e=1783008000&v=beta&t=QzQm_d76IPWlSsrAaYKckg3Cvpfgt9rJHF0ChyZUr_0","post_text":"Say goodbye to months of painful technical debt reduction.\n\nMurtaza Zaidi , Kevin Thomas and Caela Alexie Intertas \"generate\" a hashtag#LangGraph ai agent that converts an Angular app to React in 5 minutes flat.\n\nThis demo shows the conversion of an Airbnb clone—complete with image carousels, property listings, and backend connections. Everything worked well after conversion.\n\nWhat stood out to me was the ai-driven, human-assisted handling of the complex dependency graph mapping and iterative conversion process.\n\nThis sort of human/ai collaboration could help enterprises tackle technical debt at unprecedented speed while minimizing risk and freeing up developer resources for innovation.","post_url":"https://www.linkedin.com/feed/update/urn:li:activity:7306203459119161344","post_urn":"urn:li:activity:7306203459119161344","posted_hours_ago":8760,"posted_time":"2025-06-25","posted_time_raw":"1yr","reaction_count":77,"reaction_types":"LIKE, PRAISE","repost_count":7,"source":"activity","video_url":"https://media.licdn.com/dms/image/v2/D4D05AQHr3gIOY73kQA/feedshare-thumbnail_720_1280/B4DZWTY67sG4BA-/0/1741934541716?e=1783008000&v=beta&t=QzQm_d76IPWlSsrAaYKckg3Cvpfgt9rJHF0ChyZUr_0"},{"article_description":null,"article_title":null,"article_url":null,"author_headline":"Deploying enterprise agents in production / CTO / SWE Leader / GVP @ Publicis Sapient","author_name":"Ravi Evani\n              \n                \n                   \n    \n      \n    \n    \n      \n    \n\n • You","author_profile_image_url":"https://media.licdn.com/dms/image/v2/C4E03AQGNeJRorEd2Nw/profile-displayphoto-shrink_100_100/profile-displayphoto-shrink_100_100/0/1569287114631?e=1784160000&v=beta&t=tJDZC7EXWnlgIIf8kF7fBCajhF-HEgzNXnz_IIkjqW8","author_profile_url":"https://www.linkedin.com/in/ravievani","has_image":true,"impression_count":1845,"is_article":false,"is_my_post":true,"is_video":true,"post_image_url":"https://media.licdn.com/dms/image/v2/D4E05AQEOGsQzsH7Hfw/videocover-high/B4EZWE2kkwHgB8-/0/1741690656476?e=1783008000&v=beta&t=GHxP3f85oJyVlMZAUAG0130HGD_TCi32AWKocUYbK0k","post_text":"Cloud costs could get out of control fast. This \"generated\" hashtag#n8n agent, monitors spending in real-time, tracks cost spikes, and flags misconfigurations—before they blow your budget.","post_url":"https://www.linkedin.com/feed/update/urn:li:activity:7305180137703034881","post_urn":"urn:li:activity:7305180137703034881","posted_hours_ago":8760,"posted_time":"2025-06-25","posted_time_raw":"1yr","reaction_count":38,"reaction_types":"LIKE, INTEREST, PRAISE","source":"activity","video_url":"https://media.licdn.com/dms/image/v2/D4E05AQEOGsQzsH7Hfw/videocover-high/B4EZWE2kkwHgB8-/0/1741690656476?e=1783008000&v=beta&t=GHxP3f85oJyVlMZAUAG0130HGD_TCi32AWKocUYbK0k"},{"article_description":null,"article_title":null,"article_url":null,"author_headline":"Deploying enterprise agents in production / CTO / SWE Leader / GVP @ Publicis Sapient","author_name":"Ravi Evani\n              \n                \n                   \n    \n      \n    \n    \n      \n    \n\n • You","author_profile_image_url":"https://media.licdn.com/dms/image/v2/C4E03AQGNeJRorEd2Nw/profile-displayphoto-shrink_100_100/profile-displayphoto-shrink_100_100/0/1569287114631?e=1784160000&v=beta&t=tJDZC7EXWnlgIIf8kF7fBCajhF-HEgzNXnz_IIkjqW8","author_profile_url":"https://www.linkedin.com/in/ravievani","comment_count":1,"has_image":true,"impression_count":2419,"is_article":false,"is_my_post":true,"is_video":true,"post_image_url":"https://media.licdn.com/dms/image/v2/D4D05AQGX6j9twbCDoQ/videocover-high/B4DZVmIrYXHIBw-/0/1741175314093?e=1783008000&v=beta&t=j0voKypkq4ocCpBY8oRB7tmZ0RI3iSlIC8sqPg6NvrY","post_text":"Most default AI-generated code isn’t enterprise-ready—because it’s performance blind.\n\nWe ran a simple experiment where we had the same LLM converting a PL/pgSQL data analytics job to PySpark. We generated two versions of the Job in PySpark using slightly different approaches.\n\n① Job v1 codebase(Optimized): Generated with SME-engineered prompts + real enterprise context (record sizes, performance configs, resource limits, execution history).\n② Job v2 codebase(Non-Optimized): Generated with novice prompts (no SME guidance) or workload awareness.\n\nThe result?\n⚡ The SME prompt engineered, context-aware AI generated code (Job v1) ran ~5x faster and was ~3x more efficient—while the default AI-generated job wasted compute, inflated cloud costs, and slowed down execution.\n\n🤔 Now imagine this inefficiency at scale across your engineering teams.\n\nThe takeaway?\nEnterprises can’t rely on generic AI codegen tools alone. Without a system to capture SME expertise and real-world enterprise context, AI-generated code becomes a liability instead of an advantage:\n\n✘ Proliferation of inefficient, low-performing code\n✘ Soaring cloud & infrastructure costs\n✘ Stability and reliability risks at scale\n\nWhat’s needed instead?\n☑ A system to capture and operationalize SME-engineered prompts at scale\n☑ AI that binds code generation to real-world workload parameters\n☑ Built-in performance, maintainability, and cost efficiency\n\nWithout this, AI-powered coding at scale creates more problems than it solves for Enterprises.","post_url":"https://www.linkedin.com/feed/update/urn:li:activity:7303018623424499713","post_urn":"urn:li:activity:7303018623424499713","posted_hours_ago":8760,"posted_time":"2025-06-25","posted_time_raw":"1yr","reaction_count":39,"reaction_types":"LIKE, INTEREST, PRAISE","source":"activity","video_url":"https://media.licdn.com/dms/image/v2/D4D05AQGX6j9twbCDoQ/videocover-high/B4DZVmIrYXHIBw-/0/1741175314093?e=1783008000&v=beta&t=j0voKypkq4ocCpBY8oRB7tmZ0RI3iSlIC8sqPg6NvrY"},{"article_description":null,"article_title":null,"article_url":null,"author_headline":"Deploying enterprise agents in production / CTO / SWE Leader / GVP @ Publicis Sapient","author_name":"Ravi Evani\n              \n                \n                   \n    \n      \n    \n    \n      \n    \n\n • You","author_profile_image_url":"https://media.licdn.com/dms/image/v2/C4E03AQGNeJRorEd2Nw/profile-displayphoto-shrink_100_100/profile-displayphoto-shrink_100_100/0/1569287114631?e=1784160000&v=beta&t=tJDZC7EXWnlgIIf8kF7fBCajhF-HEgzNXnz_IIkjqW8","author_profile_url":"https://www.linkedin.com/in/ravievani","comment_count":4,"has_image":true,"impression_count":4227,"is_article":false,"is_my_post":true,"is_video":true,"post_image_url":"https://media.licdn.com/dms/image/v2/D4E05AQGBjoMkfkAV8Q/feedshare-thumbnail_720_1280/B4EZVb6CONG0A8-/0/1741003696342?e=1783008000&v=beta&t=z1PJ5ert33bM5iQd0xJpobQEq8ICJHGM3efUNQ2KBFk","post_text":"A key challenge in cloud infrastructure provisioning, especially with compute resources, is with getting the sizing right. If we undersize, we risk performance bottlenecks, slowdowns, and system failures. And if we oversize, and we waste resources and drive up unnecessary cloud costs.\n\nHere’s a hashtag#LangGraph agent built by one of our Publicis Sapient engineers Thomas Hari Budihardjo using our hashtag#Slingshot hashtag#AI SDLC platform, to provision hashtag#AWS cloud resources and deploy applications—intelligently.\n\nThis solution eliminates the guesswork in DevOps, making cloud provisioning more efficient, cost-effective, and performance-optimized—creating a feedback loop of continuous improvement that balances operational excellence and cost management.","post_url":"https://www.linkedin.com/feed/update/urn:li:activity:7302299116242436096","post_urn":"urn:li:activity:7302299116242436096","posted_hours_ago":8760,"posted_time":"2025-06-25","posted_time_raw":"1yr","reaction_count":59,"reaction_types":"LIKE, EMPATHY, PRAISE","repost_count":1,"source":"activity","video_url":"https://media.licdn.com/dms/image/v2/D4E05AQGBjoMkfkAV8Q/feedshare-thumbnail_720_1280/B4EZVb6CONG0A8-/0/1741003696342?e=1783008000&v=beta&t=z1PJ5ert33bM5iQd0xJpobQEq8ICJHGM3efUNQ2KBFk"},{"article_description":null,"article_title":null,"article_url":null,"author_headline":"Deploying enterprise agents in production / CTO / SWE Leader / GVP @ Publicis Sapient","author_name":"Ravi Evani\n              \n                \n                   \n    \n      \n    \n    \n      \n    \n\n • You","author_profile_image_url":"https://media.licdn.com/dms/image/v2/C4E03AQGNeJRorEd2Nw/profile-displayphoto-shrink_100_100/profile-displayphoto-shrink_100_100/0/1569287114631?e=1784160000&v=beta&t=tJDZC7EXWnlgIIf8kF7fBCajhF-HEgzNXnz_IIkjqW8","author_profile_url":"https://www.linkedin.com/in/ravievani","has_image":true,"impression_count":1272,"is_article":false,"is_my_post":true,"is_video":true,"post_image_url":"https://media.licdn.com/dms/image/v2/D4E05AQHaYCrKxMqCuw/videocover-high/B4EZU1KRi_G0Bs-/0/1740353647740?e=1783008000&v=beta&t=dq1VIZnizo1Se-MJyt9OzOUpz813VgsZVhMszSztz-8","post_text":"One of the most impactful, cost-neutral opportunities in enterprise IT is leveraging AI to improve system reliability. This short clip shows how to apply it to one key area underpinning reliability: Testing.\n\n===\nToday, enterprises seem to be focusing their hashtag#ai efforts on flashy, forward-looking projects, but one of the most immediate and impactful use cases is to fortify the quality, stability and reliability of production-critical applications.\n\nThe thing is, AI can significantly help improve system reliability—not necessarily by rewriting code, but by transforming how codebases are validated. Two key areas where AI really shines in testing are it’s ability to simulating real world test cases and test data.\n\nYou can create not just a handful, but hundreds of thousands of unique test scenarios. Simulating real world user behavior on a scale no human team could ever dream of. AI tools can dive into your code, figure out its weak spots, and then bombard it with data. All kinds of data, even those weird edge cases that we human often miss, the ones that usually cause the biggest crashes.\n\nWhile for many, this might seem like an obvious evolution in software testing. But in reality, large enterprises are barely scratching the surface when it comes to capitalizing on this.\n\nThe best part? This can be brought to life in a cost-neutral way—without blowing up budgets or slowing down innovation.","post_url":"https://www.linkedin.com/feed/update/urn:li:activity:7299572294710972416","post_urn":"urn:li:activity:7299572294710972416","posted_hours_ago":8760,"posted_time":"2025-06-25","posted_time_raw":"1yr","reaction_count":10,"reaction_types":"LIKE, EMPATHY","source":"activity","video_url":"https://media.licdn.com/dms/image/v2/D4E05AQHaYCrKxMqCuw/videocover-high/B4EZU1KRi_G0Bs-/0/1740353647740?e=1783008000&v=beta&t=dq1VIZnizo1Se-MJyt9OzOUpz813VgsZVhMszSztz-8"},{"article_description":null,"article_title":null,"article_url":null,"author_headline":"Deploying enterprise agents in production / CTO / SWE Leader / GVP @ Publicis Sapient","author_name":"Ravi Evani\n              \n                \n                   \n    \n      \n    \n    \n      \n    \n\n • You","author_profile_image_url":"https://media.licdn.com/dms/image/v2/C4E03AQGNeJRorEd2Nw/profile-displayphoto-shrink_100_100/profile-displayphoto-shrink_100_100/0/1569287114631?e=1784160000&v=beta&t=tJDZC7EXWnlgIIf8kF7fBCajhF-HEgzNXnz_IIkjqW8","author_profile_url":"https://www.linkedin.com/in/ravievani","has_image":true,"impression_count":1609,"is_article":false,"is_my_post":true,"is_video":true,"post_image_url":"https://media.licdn.com/dms/image/v2/D4E05AQF96C0ehn7DXw/videocover-low/B4EZUqd4eFHcCM-/0/1740174244576?e=1783008000&v=beta&t=z4WphaXBRzBhjeTr1OGxVAtmRm5eJCd4ZeXhHX6Q3yE","post_text":"Publicis Sapient EngineeringNext 2024 set the bar high—can’t wait to see what’s in store for hashtag#ai @ EngineeringNext 2025!","post_url":"https://www.linkedin.com/feed/update/urn:li:activity:7298819998544777217","post_urn":"urn:li:activity:7298819998544777217","posted_hours_ago":8760,"posted_time":"2025-06-25","posted_time_raw":"1yr","reaction_count":46,"reaction_types":"LIKE, EMPATHY","repost_count":1,"source":"activity","video_url":"https://media.licdn.com/dms/image/v2/D4E05AQF96C0ehn7DXw/videocover-low/B4EZUqd4eFHcCM-/0/1740174244576?e=1783008000&v=beta&t=z4WphaXBRzBhjeTr1OGxVAtmRm5eJCd4ZeXhHX6Q3yE"},{"article_description":null,"article_title":null,"article_url":null,"author_headline":"Deploying enterprise agents in production / CTO / SWE Leader / GVP @ Publicis Sapient","author_name":"Ravi Evani\n              \n                \n                   \n    \n      \n    \n    \n      \n    \n\n • You","author_profile_image_url":"https://media.licdn.com/dms/image/v2/C4E03AQGNeJRorEd2Nw/profile-displayphoto-shrink_100_100/profile-displayphoto-shrink_100_100/0/1569287114631?e=1784160000&v=beta&t=tJDZC7EXWnlgIIf8kF7fBCajhF-HEgzNXnz_IIkjqW8","author_profile_url":"https://www.linkedin.com/in/ravievani","comment_count":1,"has_image":true,"impression_count":5349,"is_article":false,"is_my_post":true,"is_video":true,"post_image_url":"https://media.licdn.com/dms/image/v2/D4E05AQEJK6cPIlHnIQ/videocover-high/B4EZUYckeBG0Bs-/0/1739872017279?e=1783008000&v=beta&t=ypCgG7pG--hPKteDQeqIsmFeQ1zVjcAToAAc3uHbZ0A","post_text":"Recently, I had a great check-in @ Publicis Sapient India with our Financial Services Learning cohort— who are deep into an intense up-skilling journey to becoming AI Engineers.\n\nOne thought-provoking question came up: As AI models improve, the cost of each incremental gain is skyrocketing. Does this mean innovation will slow down? Should software engineers wait for the next big breakthrough?\n\nMy take: Regardless of what the future holds—there’s already a massive amount of value to unlock today. Instead of waiting, we should focus on catching up and capitalizing on what's already here. The way we code has already been disrupted—now it’s about leveraging what’s here to drive impact.\n\nAditya Yashwanth Rahul Sachin Vinod Manoj Uday Amzad Shweta Kapil Navneet Shashaank Deepak naman Raghunathan Ravi Pranav Shobhit Chandrasekhar Gaurav Dhruwat Shipra devesh Rahul Mahendra Anuj Chitra Bhupendra Vikram Amandeep Deepansh Nishant Rashmi Sangeeta","post_url":"https://www.linkedin.com/feed/update/urn:li:activity:7297940506385240064","post_urn":"urn:li:activity:7297940506385240064","posted_hours_ago":8760,"posted_time":"2025-06-25","posted_time_raw":"1yr","reaction_count":86,"reaction_types":"LIKE, PRAISE, INTEREST","repost_count":2,"source":"activity","video_url":"https://media.licdn.com/dms/image/v2/D4E05AQEJK6cPIlHnIQ/videocover-high/B4EZUYckeBG0Bs-/0/1739872017279?e=1783008000&v=beta&t=ypCgG7pG--hPKteDQeqIsmFeQ1zVjcAToAAc3uHbZ0A"},{"article_description":null,"article_title":null,"article_url":null,"author_headline":"Deploying enterprise agents in production / CTO / SWE Leader / GVP @ Publicis Sapient","author_name":"Ravi Evani\n              \n                \n                   \n    \n      \n    \n    \n      \n    \n\n • You","author_profile_image_url":"https://media.licdn.com/dms/image/v2/C4E03AQGNeJRorEd2Nw/profile-displayphoto-shrink_100_100/profile-displayphoto-shrink_100_100/0/1569287114631?e=1784160000&v=beta&t=tJDZC7EXWnlgIIf8kF7fBCajhF-HEgzNXnz_IIkjqW8","author_profile_url":"https://www.linkedin.com/in/ravievani","has_image":false,"impression_count":3651,"is_article":false,"is_my_post":true,"is_video":false,"post_image_url":null,"post_text":"A question that came up in a discussion with one of my teams was: \"With AI now capable of writing code—what will be the role of engineers in the future?\" Here’s how we answered it.","post_url":"https://www.linkedin.com/feed/update/urn:li:activity:729720301609 ise agents in production / CTO / SWE Leader / GVP @ Publicis Sapient","author_name":"Ravi Evani\n              \n                \n                   \n    \n      \n    \n    \n      \n    \n\n • You","author_profile_image_url":"https://media.licdn.com/dms/image/v2/C4E03AQGNeJRorEd2Nw/profile-displayphoto-shrink_100_100/profile-displayphoto-shrink_100_100/0/1569287114631?e=1784160000&v=beta&t=tJDZC7EXWnlgIIf8kF7fBCajhF-HEgzNXnz_IIkjqW8","author_profile_url":"https://www.linkedin.com/in/ravievani","comment_count":3,"has_image":true,"impression_count":7719,"is_article":false,"is_my_post":true,"is_video":true,"post_image_url":"https://media.licdn.com/dms/image/v2/D4E05AQHe0WGxieW2mQ/videocover-high/B4EZUEEztpGgBs-/0/1739530130034?e=1783008000&v=beta&t=AvZDto841igeNhyrRnwNCSgJfkvd0OQoKYF2N3rzujg","post_text":"Ever wondered why hashtag#travel (flight, hotel, car) contact center agents sound like they're speaking in code? 🤖\n\nRemember when you were trying to change a hotel booking, and the agent is typing away like they're hacking the Matrix? That's because they literally are! Travel contact center agents have been stuck using these mainframe systems called Global Distribution Systems (GDS).\n\nThe wild part? Every time you say something simple like \"I need to change my King room to 2 Queen beds,\" they have to mentally translate that into cryptic commands. We're talking thousands of possible combinations.\n\nBut here's where it gets interesting...\n\nUsing Publicis Sapient hashtag#Slingshot AI platform, that contains built-in Travel & Hospitality context—we've created an API that turns regular human language into these ancient GDS commands instantly (see video). Think of it as a machine translator for travel-speak. No more mental gymnastics for agents!\n\nThis API can plug straight into CRM like hashtag#Salesforce, hashtag#Pega, etc, enabling CC agents to interact with cryptic systems more naturally.\n\nThis is how we're infusing hashtag#ai into hashtag#travel & hashtag#hospitality tech in 2025 – one decoded command at a time. Because let's be honest, nobody has time to learn Klingon just to book a vacation. 🚀","post_url":"https://www.linkedin.com/feed/update/urn:li:activity:7296118211480092672","post_urn":"urn:li:activity:7296118211480092672","posted_hours_ago":8760,"posted_time":"2025-06-25","posted_time_raw":"1yr","reaction_count":77,"reaction_types":"LIKE, PRAISE, EMPATHY","source":"activity","video_url":"https://media.licdn.com/dms/image/v2/D4E05AQHe0WGxieW2mQ/videocover-high/B4EZUEEztpGgBs-/0/1739530130034?e=1783008000&v=beta&t=AvZDto841igeNhyrRnwNCSgJfkvd0OQoKYF2N3rzujg"},{"article_description":null,"article_title":null,"article_url":null,"author_headline":"Deploying enterprise agents in production / CTO / SWE Leader / GVP @ Publicis Sapient","author_name":"Ravi Evani\n              \n                \n                   \n    \n      \n    \n    \n      \n    \n\n • You","author_profile_image_url":"https://media.licdn.com/dms/image/v2/C4E03AQGNeJRorEd2Nw/profile-displayphoto-shrink_100_100/profile-displayphoto-shrink_100_100/0/1569287114631?e=1784160000&v=beta&t=tJDZC7EXWnlgIIf8kF7fBCajhF-HEgzNXnz_IIkjqW8","author_profile_url":"https://www.linkedin.com/in/ravievani","comment_count":1,"has_image":true,"impression_count":2434,"is_article":false,"is_my_post":true,"is_video":true,"post_image_url":"https://media.licdn.com/dms/image/v2/D4E05AQFS9dpj26PINQ/feedshare-thumbnail_720_1280/B4EZT02yNJHUA8-/0/1739274790321?e=1783008000&v=beta&t=pgF390STvY-N99SfxNBFfa-9PDdhvjpF0E4nMP59eZs","post_text":"Use this “mixture of models” approach created by one of my teams Jackson Heintz Thomas Hari Budihardjo Kevin Thomas to mass lift-and-shift on-prem apps to hashtag#AWS, with the help of hashtag#Google Gemini, hashtag#Azure Open AI and Publicis Sapient hashtag#Slingshot AI Assistant 🚀","post_url":"https://www.linkedin.com/feed/update/urn:li:activity:7295047347665842176","post_urn":"urn:li:activity:7295047347665842176","posted_hours_ago":8760,"posted_time":"2025-06-25","posted_time_raw":"1yr","reaction_count":44,"reaction_types":"LIKE, EMPATHY, PRAISE","repost_count":1,"source":"activity","video_url":"https://media.licdn.com/dms/image/v2/D4E05AQFS9dpj26PINQ/feedshare-thumbnail_720_1280/B4EZT02yNJHUA8-/0/1739274790321?e=1783008000&v=beta&t=pgF390STvY-N99SfxNBFfa-9PDdhvjpF0E4nMP59eZs"},{"article_description":null,"article_title":null,"article_url":null,"author_headline":"Deploying enterprise agents in production / CTO / SWE Leader / GVP @ Publicis Sapient","author_name":"Ravi Evani\n              \n                \n                   \n    \n      \n    \n    \n      \n    \n\n • You","author_profile_image_url":"https://media.licdn.com/dms/image/v2/C4E03AQGNeJRorEd2Nw/profile-displayphoto-shrink_100_100/profile-displayphoto-shrink_100_100/0/1569287114631?e=1784160000&v=beta&t=tJDZC7EXWnlgIIf8kF7fBCajhF-HEgzNXnz_IIkjqW8","author_profile_url":"https://www.linkedin.com/in/ravievani","comment_count":2,"has_image":true,"impression_count":8126,"is_article":false,"is_my_post":true,"is_video":false,"post_image_url":"https://media.licdn.com/dms/image/v2/D4E22AQEK2hKw73cw1A/feedshare-shrink_800/B4EZTEUMWfHMAg-/0/1738460417052?e=1784160000&v=beta&t=xedIZnRVxX5TlzU0HALlfZuOuzJw5fGx8-J6BLhs64w","post_text":"Example of an agentic flow for migrating an on-prem app to hashtag#AWS—powered by Publicis Sapient Slingshot AI platform, and a strategic mix of LLMs. 🚀","post_url":"https://www.linkedin.com/feed/update/urn:li:activity:7291631486095482880","post_urn":"urn:li:activity:7291631486095482880","posted_hours_ago":8760,"posted_time":"2025-06-25","posted_time_raw":"1yr","reaction_count":124,"reaction_types":"LIKE, INTEREST","repost_count":3,"source":"activity","video_url":null},{"article_description":null,"article_title":null,"article_url":null,"author_headline":"Deploying enterprise agents in production / CTO / SWE Leader / GVP @ Publicis Sapient","author_name":"Ravi Evani\n              \n                \n                   \n    \n      \n    \n    \n      \n    \n\n • You","author_profile_image_url":"https://media.licdn.com/dms/image/v2/C4E03AQGNeJRorEd2Nw/profile-displayphoto-shrink_100_100/profile-displayphoto-shrink_100_100/0/1569287114631?e=1784160000&v=beta&t=tJDZC7EXWnlgIIf8kF7fBCajhF-HEgzNXnz_IIkjqW8","author_profile_url":"https://www.linkedin.com/in/ravievani","comment_count":8,"has_image":true,"impression_count":86517,"is_article":false,"is_my_post":true,"is_video":false,"post_image_url":"https://media.licdn.com/dms/image/v2/D4E22AQEirLPqq_IgzQ/feedshare-shrink_800/B4EZSssC78HgAg-/0/1738064055666?e=1784160000&v=beta&t=ulRebt7wICfDIrnlP9tcDxXfN7BMi0DsVLyyp-iHFhQ","post_text":"Great discussion with one of my teams at the Publicis Sapient Gurgaon, India office about how AI is transforming the software development lifecycle.\n\nOne of the key questions raised was: With AI now capable of writing code and generating solutions, what will be the role of engineers in the future? Here’s how we answered it:\n\n1. AI generates code, but It needs guidance:\nWhile AI can generate code, it often lacks the ability to ensure scalability, performance, maintainability, or even interpretability for future systems, including other AIs. Engineers will play a critical role in steering AI to produce the right architecture, abstractions, and implementations. To do this effectively, we’ll need to be more proficient than the AI itself, identifying and fixing issues AI introduces.\n\n2. The demand for software development will multiply:\nAI is like moving from using shovels to using excavators. The demand for software will explode as it becomes more disposable and purpose-built. Additionally, every piece of software can now be made more intelligent, opening opportunities to create a massive corpus of code for intelligent systems. Engineers will be essential in building these systems, especially as we move beyond legacy, deterministic codebases.\n\n3. Broadening skills is non-negotiable:\nEngineers who only take directions and implement requirements will be disrupted by AI. However, those who broaden their skill sets—solving business problems, playing multi-dimensional roles, and leveraging AI for code generation—will be in a stronger position. The ability to think holistically and creatively will be invaluable.\n\n4. Domain knowledge is key to be the human in the loop:\nTo effectively manage and steer AI output, deep domain knowledge and expertise are essential. This ties back to the earlier point about needing to be proficient enough to review and refine what AI produces.\n\n5. AI will be universal, but creativity will differentiate us:\nLike how Google and the internet democratized access to information, AI will become ubiquitous. But the outcomes will depend on how we use it, what we create with it, and the level of creativity and innovation we bring to the table.\n\n6. Human needs remain unchanged:\nDespite AI’s capabilities, our fundamental human needs—certainty, variety, connection, growth, and contribution—remain unchanged. AI might help us meet these needs at a higher level, but it’s up to us to define how we leverage it for meaningful impact to ourselves.","post_url":"https://www.linkedin.com/feed/update/urn:li:activity:7289969035843125249","post_urn":"urn:li:activity:7289969035843125249","posted_hours_ago":8760,"posted_time":"2025-06-25","posted_time_raw":"1yr","reaction_count":621,"reaction_types":"LIKE, PRAISE, EMPATHY","repost_count":5,"source":"activity","video_url":null},{"article_description":"","article_title":"https://lnkd.in/e5vMUtkN","article_url":"https://lnkd.in/e5vMUtkN","author_headline":"Deploying enterprise agents in production / CTO / SWE Leader / GVP @ Publicis Sapient","author_name":"Ravi Evani\n              \n                \n                   \n    \n      \n    \n    \n      \n    \n\n • You","author_profile_image_url":"https://media.licdn.com/dms/image/v2/C4E03AQGNeJRorEd2Nw/profile-displayphoto-shrink_100_100/profile-displayphoto-shrink_100_100/0/1569287114631?e=1784160000&v=beta&t=tJDZC7EXWnlgIIf8kF7fBCajhF-HEgzNXnz_IIkjqW8","author_profile_url":"https://www.linkedin.com/in/ravievani","has_image":false,"impression_count":502,"is_article":true,"is_my_post":true,"is_video":false,"post_image_url":null,"post_text":"The fact that DeepSeek R1's multi-token reading capability processes text in chunks rather than word-by-word, with minimal accuracy loss, reinforces that the LCM architecture could work in production—especially if consider these text chunks as analogous to \"concepts\".\n\nAnyone from LCM team —would love your perspective on this: Loic Barrault, Paul-Ambroise Duquenne, Maha Elbayad","post_url":"https://www.linkedin.com/feed/update/urn:li:activity:7289858553660493824","post_urn":"urn:li:activity:7289858553660493824","posted_hours_ago":8760,"posted_time":"2025-06-25","posted_time_raw":"1yr","reaction_count":1,"reaction_types":"INTEREST","source":"activity","video_url":null},{"article_description":null,"article_title":null,"article_url":null,"author_headline":"Deploying enterprise agents in production / CTO / SWE Leader / GVP @ Publicis Sapient","author_name":"Ravi Evani\n              \n                \n                   \n    \n      \n    \n    \n      \n    \n\n • You","author_profile_image_url":"https://media.licdn.com/dms/image/v2/C4E03AQGNeJRorEd2Nw/profile-displayphoto-shrink_100_100/profile-displayphoto-shrink_100_100/0/1569287114631?e=1784160000&v=beta&t=tJDZC7EXWnlgIIf8kF7fBCajhF-HEgzNXnz_IIkjqW8","author_profile_url":"https://www.linkedin.com/in/ravievani","comment_count":1,"has_image":true,"impression_count":1677,"is_article":false,"is_my_post":true,"is_video":false,"post_image_url":"https://media.licdn.com/dms/image/v2/D4D22AQFqRQcNWPCgIg/feedshare-shrink_800/B4DZSngUNCG4Ag-/0/1737977056243?e=1784160000&v=beta&t=WzzkUII1-mUvcJkDp97JK1QngN_R21RA6w4NyywVYxk","post_text":"While big tech buzzes about AI agents that do their own \"planning\", the reality is that enterprises operate on pre-existing playbooks, whether they're rigorously documented or woven into institutional knowledge.\n\nThe enterprise doesn't need AI agents that play visionary—it needs agents that play by the rules. This isn't a limitation; it's the key to unlocking real enterprise value.\n\nAn agent that understands its operational context and respects system guardrails isn't just more practical; it's way more powerful!","post_url":"https://www.linkedin.com/feed/update/urn:li:activity:7289604123228803072","post_urn":"urn:li:activity:7289604123228803072","posted_hours_ago":8760,"posted_time":"2025-06-25","posted_time_raw":"1yr","reaction_count":17,"reaction_types":"LIKE","repost_count":1,"source":"activity","video_url":null},{"article_description":null,"article_title":null,"article_url":null,"author_headline":"Deploying enterprise agents in production / CTO / SWE Leader / GVP @ Publicis Sapient","author_name":"Ravi Evani\n              \n                \n                   \n    \n      \n    \n    \n      \n    \n\n • You","author_profile_image_url":"https://media.licdn.com/dms/image/v2/C4E03AQGNeJRorEd2Nw/profile-displayphoto-shrink_100_100/profile-displayphoto-shrink_100_100/0/1569287114631?e=1784160000&v=beta&t=tJDZC7EXWnlgIIf8kF7fBCajhF-HEgzNXnz_IIkjqW8","author_profile_url":"https://www.linkedin.com/in/ravievani","comment_count":2,"has_image":true,"impression_count":3190,"is_article":false,"is_my_post":true,"is_video":true,"post_image_url":"https://media.licdn.com/dms/image/v2/D4E05AQHywN56e2V9Xw/videocover-high/B4EZSXbLCpGwBs-/0/1737707272835?e=1783008000&v=beta&t=3jZ-aIxwk4CMjqqMfLBIKzdmZROIcLZdDF3vwSOw1qI","post_text":"The buzz around OpenAI's $500B “Stargate” project to create AGI brings to mind the story of Mahabharat from Indian mythology.\n\nBig tech players and AI enthusiasts resemble Arjuna, awestruck by Krishna in his cosmic form—eagerly anticipating the perpetually elusive AGI's divine revelation. Meanwhile, skeptics insist it will never come.\n\nYet just as Arjuna had to continue fighting his own battles even after seeing divinity, humans might find that whether AI is \"godlike\" or not, our core problems (and needs) remain stubbornly earthly. The ultimate irony is that we might actually be the Krishna in this story, steering AI while believing it’s the one taking over.","post_url":"https://www.linkedin.com/feed/update/urn:li:activity:7288472578879283200","post_urn":"urn:li:activity:7288472578879283200","posted_hours_ago":8760,"posted_time":"2025-06-25","posted_time_raw":"1yr","reaction_count":24,"reaction_types":"LIKE, INTEREST, EMPATHY","source":"activity","video_url":"https://media.licdn.com/dms/image/v2/D4E05AQHywN56e2V9Xw/videocover-high/B4EZSXbLCpGwBs-/0/1737707272835?e=1783008000&v=beta&t=3jZ-aIxwk4CMjqqMfLBIKzdmZROIcLZdDF3vwSOw1qI"},{"article_description":null,"article_title":null,"article_url":null,"author_headline":"Deploying enterprise agents in production / CTO / SWE Leader / GVP @ Publicis Sapient","author_name":"Ravi Evani\n              \n                \n                   \n    \n      \n    \n    \n      \n    \n\n • You","author_profile_image_url":"https://media.licdn.com/dms/image/v2/C4E03AQGNeJRorEd2Nw/profile-displayphoto-shrink_100_100/profile-displayphoto-shrink_100_100/0/1569287114631?e=1784160000&v=beta&t=tJDZC7EXWnlgIIf8kF7fBCajhF-HEgzNXnz_IIkjqW8","author_profile_url":"https://www.linkedin.com/in/ravievani","has_image":true,"impression_count":18692,"is_article":false,"is_my_post":true,"is_video":false,"post_image_url":"https://media.licdn.com/dms/image/v2/D5622AQHRlpXlKB-dUg/feedshare-shrink_800/B56ZRqxQmCGoAg-/0/1736958091236?e=1784160000&v=beta&t=Bubsd4qd7jeCWJWxpr0TDZFZDg1OHpHXD_KiiHZlS4k","post_text":"Insightful AI-focused discussion among our North America Industry Engineering Leads at Publicis Sapient. We covered plenty of ground, including:\n\n🎯 The evolution of next-generation UIs, with a real healthcare / pharma example (thanks Nader)\n↳ Explored \"app-less\" paradigms for LLM-powered agentic UIs\n↳ Showcased demos of how content and services could be delivered within “channel-less” customer and employee experiences\n\n🎯 Foundational capabilities that enterprises need to maximize value out of LLMs, copilots and LLM backed functions\n↳ Discussed how we are developing sophisticated context management through ontologies and context chaining for our Slingshot AI SDLC platform\n↳ Explored flexible deployment options to make it easy for clients to benefit from our AI SDLC platform, tools and agents\n\n🎯 SaaS AI Ecosystem integration (thanks Brett and Ninad)\n↳ Discussed strategies and operating models we are developing as “the glue” to integrate our client technology systems with SaaS agents\n\nThanks to our leaders Chirag, Anuja, Thanu, Sushil, Brett Colbert, Alison, Toby Boudreaux, Nader Nakib, Ninad Patil for sharing your expertise and insights. Also to Brian, Tanja, Jacqui for helping us make the workshop highly productive and fun!","post_url":"https://www.linkedin.com/feed/update/urn:li:activity:7285330293115236355","post_urn":"urn:li:activity:7285330293115236355","posted_hours_ago":8760,"posted_time":"2025-06-25","posted_time_raw":"1yr","reaction_count":137,"reaction_types":"LIKE, EMPATHY, INTEREST","repost_count":1,"source":"activity","video_url":null},{"article_description":null,"article_title":null,"article_url":null,"author_headline":"Deploying enterprise agents in production / CTO / SWE Leader / GVP @ Publicis Sapient","author_name":"Ravi Evani\n              \n                \n                   \n    \n      \n    \n    \n      \n    \n\n • You","author_profile_image_url":"https://media.licdn.com/dms/image/v2/C4E03AQGNeJRorEd2Nw/profile-displayphoto-shrink_100_100/profile-displayphoto-shrink_100_100/0/1569287114631?e=1784160000&v=beta&t=tJDZC7EXWnlgIIf8kF7fBCajhF-HEgzNXnz_IIkjqW8","author_profile_url":"https://www.linkedin.com/in/ravievani","comment_count":1,"has_image":true,"impression_count":2085,"is_article":false,"is_my_post":true,"is_video":true,"post_image_url":"https://media.licdn.com/dms/image/v2/D4E05AQGNoK039EWhgA/feedshare-thumbnail_720_1280/B4EZRgC6_1HAA8-/0/1736778167571?e=1783008000&v=beta&t=azVMrLA7SZRKF1Adeo7Veq-4HfeoyjTTzOQvUDhQxkg","post_text":"Regression tests failing due to stale test data? Here's an \"agentic\" way to fix that.\n\nhashtag#aiEngineering","post_url":"https://www.linkedin.com/feed/update/urn:li:activity:7284575695454830593","post_urn":"urn:li:activity:7284575695454830593","posted_hours_ago":8760,"posted_time":"2025-06-25","posted_time_raw":"1yr","reaction_count":22,"reaction_types":"LIKE, EMPATHY, INTEREST","source":"activity","video_url":"https://media.licdn.com/dms/image/v2/D4E05AQGNoK039EWhgA/feedshare-thumbnail_720_1280/B4EZRgC6_1HAA8-/0/1736778167571?e=1783008000&v=beta&t=azVMrLA7SZRKF1Adeo7Veq-4HfeoyjTTzOQvUDhQxkg"},{"article_description":null,"article_title":null,"article_url":null,"author_headline":"Deploying enterprise agents in production / CTO / SWE Leader / GVP @ Publicis Sapient","author_name":"Ravi Evani\n              \n                \n                   \n    \n      \n    \n    \n      \n    \n\n • You","author_profile_image_url":"https://media.licdn.com/dms/image/v2/C4E03AQGNeJRorEd2Nw/profile-displayphoto-shrink_100_100/profile-displayphoto-shrink_100_100/0/1569287114631?e=1784160000&v=beta&t=tJDZC7EXWnlgIIf8kF7fBCajhF-HEgzNXnz_IIkjqW8","author_profile_url":"https://www.linkedin.com/in/ravievani","comment_count":4,"has_image":true,"impression_count":29398,"is_article":false,"is_my_post":true,"is_video":false,"post_image_url":"https://media.licdn.com/dms/image/v2/D4E22AQEG6KRfE-yZTw/feedshare-shrink_800/B4EZRNMFDgHAAk-/0/1736461809076?e=1784160000&v=beta&t=2xf30h84lKhn-Ui5_F7GRpNm3LoNYHuOLfrgsQMmcv0","post_text":"Insightful discussion with some of our Publicis Sapient New York Engineering Managers on their experiences using SDLC AI tools, as well as building AI-powered systems. Some notes from the field that I gathered:\n\n🎯 Delivering Real Results\n↳A recommendation engine built simply by leveraging vector search on Hugging Face sentence transformer-generated embeddings yielded higher relevance than a full-blown “personalization platform”, prompting our clients to reconsider their AI investments in SaaS.\n↳A team was able to deliver a complex retail marketplace integration between the timelines of Diwali and Thanksgiving using our Slingshot AI SDLC assistant.\n↳A financial services enterprise application was launched to production in two weeks.\n↳ OCR tasks have demonstrated significant accuracy improvements over applications developed in the past decade.\n↳An AI agent expedited SRE onboarding by processing wikis and SOPs, reducing the need for manual analysis.\n↳Even some basic RAG implementations showed clear business benefits.\n\n🎯 Applying AI to SDLC Processes\n↳Creating and maintaining shared prompt libraries is essential for achieving consistent results across teams.\n↳Curated context hierarchies that accompany prompt chains significantly enhance output accuracy.\n\n🎯 Measuring Efficiencies Gained Using AI SDLC Tools\n↳Teams maintain initial project estimates as reference points, keeping baselines unchanged until AI impact is clearly established.\n↳Comparisons of team velocity before and after deep AI assistance adoption serve as key efficiency indicators.\n↳Reduction in bugs, particularly in edge cases, is closely monitored.\n↳Strong story pointing and Scrum practices ensure accurate measurement of productivity improvements.\n\n🎯 Overcoming Field Challenges\n↳One AI system encountered issues with unexpected production data patterns\n↳Assumptions about data patterns can impact user experience when patterns shift\n↳AI systems still require significant human oversight\n\nThanks for your time: Roshan Jitender Rangaswamy Balaji Kevin Romy Nirav. Sharing your experiences help us develop a more grounded approach to AI implementation—focusing on practical benefits while being mindful of the challenges.","post_url":"https://www.linkedin.com/feed/update/urn:li:activity:7283248717866926080","post_urn":"urn:li:activity:7283248717866926080","posted_hours_ago":8760,"posted_time":"2025-06-25","posted_time_raw":"1yr","reaction_count":234,"reaction_types":"LIKE, EMPATHY, PRAISE","repost_count":2,"source":"activity","video_url":null},{"article_description":null,"article_title":null,"article_url":null,"author_headline":"Deploying enterprise agents in production / CTO / SWE Leader / GVP @ Publicis Sapient","author_name":"Ravi Evani\n              \n                \n                   \n    \n      \n    \n    \n      \n    \n\n • You","author_profile_image_url":"https://media.licdn.com/dms/image/v2/C4E03AQGNeJRorEd2Nw/profile-displayphoto-shrink_100_100/profile-displayphoto-shrink_100_100/0/1569287114631?e=1784160000&v=beta&t=tJDZC7EXWnlgIIf8kF7fBCajhF-HEgzNXnz_IIkjqW8","author_profile_url":"https://www.linkedin.com/in/ravievani","comment_count":1,"has_image":true,"impression_count":2882,"is_article":false,"is_my_post":true,"is_video":true,"post_image_url":"https://media.licdn.com/dms/image/v2/D4E05AQHOt5GyuO-16g/feedshare-thumbnail_720_1280/B4EZQ2AE_LHkA8-/0/1736072778695?e=1783008000&v=beta&t=dwIYiLM1pdQ50tmmfdG0uQlHtp-5GR0aq3URo2R75N8","post_text":"Do Agile teams act on tribal knowledge? Rakesh Ravuri highlights the hidden patterns shaping team dynamics and explores how AI can simplify the process of uncovering and leveraging them.\n\n▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬\nhashtag#ai @ Publicis Sapient","post_url":"https://www.linkedin.com/feed/update/urn:li:activity:7282984175177981953","post_urn":"urn:li:activity:7282984175177981953","posted_hours_ago":8760,"posted_time":"2025-06-25","posted_time_raw":"1yr","reaction_count":24,"reaction_types":"LIKE, EMPATHY","repost_count":2,"source":"activity","video_url":"https://media.licdn.com/dms/image/v2/D4E05AQHOt5GyuO-16g/feedshare-thumbnail_720_1280/B4EZQ2AE_LHkA8-/0/1736072778695?e=1783008000&v=beta&t=dwIYiLM1pdQ50tmmfdG0uQlHtp-5GR0aq3URo2R75N8"},{"article_description":null,"article_title":null,"article_url":null,"author_headline":"Deploying enterprise agents in production / CTO / SWE Leader / GVP @ Publicis Sapient","author_name":"Ravi Evani\n              \n                \n                   \n    \n      \n    \n    \n      \n    \n\n • You","author_profile_image_url":"https://media.licdn.com/dms/image/v2/C4E03AQGNeJRorEd2Nw/profile-displayphoto-shrink_100_100/profile-displayphoto-shrink_100_100/0/1569287114631?e=1784160000&v=beta&t=tJDZC7EXWnlgIIf8kF7fBCajhF-HEgzNXnz_IIkjqW8","author_profile_url":"https://www.linkedin.com/in/ravievani","comment_count":4,"has_image":true,"impression_count":2290,"is_article":false,"is_my_post":true,"is_video":true,"post_image_url":"https://media.licdn.com/dms/image/v2/D4E05AQEg5icl8nnCbg/videocover-high/B4EZQ.I1xQHEBw-/0/1736209317227?e=1783008000&v=beta&t=b5Ie1Wb_GZD-fJGRZuz8mRXGsGMs1R4TwnQ7SI9MZMQ","post_text":"Crafting the perfect context for an LLM is a delicate balance. Too much dilutes precision, and too little invites hallucinations. In my conversation with Rakesh Ravuri, we dive into how we @ Publicis Sapient fine-tune context for our hashtag#AI codegen models, enabling them to deliver high-quality outputs across diverse codebases and industry verticals.","post_url":"https://www.linkedin.com/feed/update/urn:li:activity:7282189834977259520","post_urn":"urn:li:activity:7282189834977259520","posted_hours_ago":8760,"posted_time":"2025-06-25","posted_time_raw":"1yr","reaction_count":34,"reaction_types":"LIKE, INTEREST, ENTERTAINMENT","source":"activity","video_url":"https://media.licdn.com/dms/image/v2/D4E05AQEg5icl8nnCbg/videocover-high/B4EZQ.I1xQHEBw-/0/1736209317227?e=1783008000&v=beta&t=b5Ie1Wb_GZD-fJGRZuz8mRXGsGMs1R4TwnQ7SI9MZMQ"},{"article_description":null,"article_title":null,"article_url":null,"author_headline":"Deploying enterprise agents in production / CTO / SWE Leader / GVP @ Publicis Sapient","author_name":"Ravi Evani\n              \n                \n                   \n    \n      \n    \n    \n      \n    \n\n • You","author_profile_image_url":"https://media.licdn.com/dms/image/v2/C4E03AQGNeJRorEd2Nw/profile-displayphoto-shrink_100_100/profile-displayphoto-shrink_100_100/0/1569287114631?e=1784160000&v=beta&t=tJDZC7EXWnlgIIf8kF7fBCajhF-HEgzNXnz_IIkjqW8","author_profile_url":"https://www.linkedin.com/in/ravievani","comment_count":3,"has_image":true,"impression_count":14707,"is_article":false,"is_my_post":true,"is_video":true,"post_image_url":"https://media.licdn.com/dms/image/v2/D4E05AQG5f37-5EIH8Q/feedshare-thumbnail_720_1280/B4EZQ13sqwGcBA-/0/1736070581702?e=1783008000&v=beta&t=GlW84Hmfd7XHfS4Y4WFi0TvDJ9LtiHVyAzNBRcRuvco","post_text":"Connected AI ⇛ better SDLC. In my conversation with Rakesh Ravuri, he sheds light on the disconnected nature of AI tools and how enterprises should solve the leaky bucket problem to unlock true SDLC transformation.\n▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬\nhashtag#ai @ Publicis Sapient","post_url":"https://www.linkedin.com/feed/update/urn:li:activity:7281617409067683840","post_urn":"urn:li:activity:7281617409067683840","posted_hours_ago":8760,"posted_time":"2025-06-25","posted_time_raw":"1yr","reaction_count":92,"reaction_types":"LIKE, EMPATHY, INTEREST","repost_count":2,"source":"activity","video_url":"https://media.licdn.com/dms/image/v2/D4E05AQG5f37-5EIH8Q/feedshare-thumbnail_720_1280/B4EZQ13sqwGcBA-/0/1736070581702?e=1783008000&v=beta&t=GlW84Hmfd7XHfS4Y4WFi0TvDJ9LtiHVyAzNBRcRuvco"},{"article_description":null,"article_title":null,"article_url":null,"author_headline":"Deploying enterprise agents in production / CTO / SWE Leader / GVP @ Publicis Sapient","author_name":"Ravi Evani\n              \n                \n                   \n    \n      \n    \n    \n      \n    \n\n • You","author_profile_image_url":"https://media.licdn.com/dms/image/v2/C4E03AQGNeJRorEd2Nw/profile-displayphoto-shrink_100_100/profile-displayphoto-shrink_100_100/0/1569287114631?e=1784160000&v=beta&t=tJDZC7EXWnlgIIf8kF7fBCajhF-HEgzNXnz_IIkjqW8","author_profile_url":"https://www.linkedin.com/in/ravievani","has_image":true,"impression_count":1594,"is_article":false,"is_my_post":true,"is_video":true,"post_image_url":"https://media.licdn.com/dms/image/v2/D4E05AQFM9OYjhrhc4A/feedshare-thumbnail_720_1280/B4EZQrSTJfHsA8-/0/1735893006558?e=1783008000&v=beta&t=qRxcIvg9vWcdE4QOj8mUuuHT0B9sRlrhps0hIrzrVOE","post_text":"People are acquiring skills from everywhere. Laura, Rachit and I discuss that while structured AI training paths are essential for all career stages—we should also be building pathways to give our people credit for the AI skills they have learnt outside the context of a formal curriculum.\n\nhashtag#ai @ Publicis Sapient","post_url":"https://www.linkedin.com/feed/update/urn:li:activity:7280863218028228608","post_urn":"urn:li:activity:7280863218028228608","posted_hours_ago":8760,"posted_time":"2025-06-25","posted_time_raw":"1yr","reaction_count":13,"reaction_types":"LIKE, EMPATHY, PRAISE","source":"activity","video_url":"https://media.licdn.com/dms/image/v2/D4E05AQFM9OYjhrhc4A/feedshare-thumbnail_720_1280/B4EZQrSTJfHsA8-/0/1735893006558?e=1783008000&v=beta&t=qRxcIvg9vWcdE4QOj8mUuuHT0B9sRlrhps0hIrzrVOE"},{"article_description":null,"article_title":null,"article_url":null,"author_headline":"Deploying enterprise agents in production / CTO / SWE Leader / GVP @ Publicis Sapient","author_name":"Ravi Evani\n              \n                \n                   \n    \n      \n    \n    \n      \n    \n\n • You","author_profile_image_url":"https://media.licdn.com/dms/image/v2/C4E03AQGNeJRorEd2Nw/profile-displayphoto-shrink_100_100/profile-displayphoto-shrink_100_100/0/1569287114631?e=1784160000&v=beta&t=tJDZC7EXWnlgIIf8kF7fBCajhF-HEgzNXnz_IIkjqW8","author_profile_url":"https://www.linkedin.com/in/ravievani","has_image":true,"impression_count":1405,"is_article":false,"is_my_post":true,"is_video":true,"post_image_url":"https://media.licdn.com/dms/image/v2/D4E05AQGlMgyYIITZ9w/feedshare-thumbnail_720_1280/B4EZQm831kGYA8-/0/1735820280680?e=1783008000&v=beta&t=CizLHNjN3PPY-EkA5YVE_l7fm8lpAIYURlopQEXp0CE","post_text":"How you debug software is changing! AI coding agents are demanding faster higher-level thinking from developers, especially for debugging and troubleshooting problems.\n\nWe're noticing that assistants, like cursor’s composer agent mode, which iteratively write, run, and debug code—push us to troubleshoot at a higher level and focus on the chunks of logic behind the code rather than the lines of code itself. They also fix basic errors so quickly that we lose the buffer of time to step through and internalize each line like we used to (see clip).\n\nThis means we now have to make bigger-picture logical decisions faster, which is a new challenge. Here’s why:\n\nSpecification Clarity Over Syntax:\nWhen you delegate coding tasks to an agent, ambiguity in your low level requirements becomes the real bug. Fixes center on tightening your specs and instructions, rather than tweaking individual lines.\n\nThinking in Systems:\nWith routine errors handled, you need to step back and consider input conditions and edge cases that the AI did not. The “code” is easy; defining the right context and coverage is the challenge.\n\nAccelerated Focus:\nIt’s now about translating problems into unambiguous instructions and validating assumptions. You still debug, but in larger chunks, at an accelerated level—ensuring your logic aligns with the intended outcomes.\n\nGiven this shift, developers should refocus their efforts on learning to clarify specifications, anticipating edge cases, and making rapid, high-level decisions while AI handles the details.\n===\n\nhashtag#ai hashtag#aiEngineering\nP.S.: Clip of an ai agent executing, debugging, troubleshooting, fixing and repeating the cycle.","post_url":"https://www.linkedin.com/feed/update/urn:li:activity:7280558082496069633","post_urn":"urn:li:activity:7280558082496069633","posted_hours_ago":8760,"posted_time":"2025-06-25","posted_time_raw":"1yr","reaction_count":11,"reaction_types":"LIKE, INTEREST","source":"activity","video_url":"https://media.licdn.com/dms/image/v2/D4E05AQGlMgyYIITZ9w/feedshare-thumbnail_720_1280/B4EZQm831kGYA8-/0/1735820280680?e=1783008000&v=beta&t=CizLHNjN3PPY-EkA5YVE_l7fm8lpAIYURlopQEXp0CE"},{"article_description":null,"article_title":null,"article_url":null,"author_headline":"Deploying enterprise agents in production / CTO / SWE Leader / GVP @ Publicis Sapient","author_name":"Ravi Evani\n              \n                \n                   \n    \n      \n    \n    \n      \n    \n\n • You","author_profile_image_url":"https://media.licdn.com/dms/image/v2/C4E03AQGNeJRorEd2Nw/profile-displayphoto-shrink_100_100/profile-displayphoto-shrink_100_100/0/1569287114631?e=1784160000&v=beta&t=tJDZC7EXWnlgIIf8kF7fBCajhF-HEgzNXnz_IIkjqW8","author_profile_url":"https://www.linkedin.com/in/ravievani","comment_count":4,"has_image":true,"impression_count":1867,"is_article":false,"is_my_post":true,"is_video":false,"post_image_url":"https://media.licdn.com/dms/image/v2/D4E22AQG9K87Vc_RreA/feedshare-shrink_800/B4EZQeNzokHAAg-/0/1735673725496?e=1784160000&v=beta&t=O-N15Ft-9nFMQvV3-Jh-VlyX1dKcwVgXVECSUsWrUoU","post_text":"Date/time handling has always been messy in code, so I'm letting Claude handle the chaos of parsing freeform scheduling requests and turning them into structured JSON. Did I cover most ways dates and times are mentioned when people schedule meetings?","post_url":"https://www.linkedin.com/feed/update/urn:li:activity:7279943255222325248","post_urn":"urn:li:activity:7279943255222325248","posted_hours_ago":8760,"posted_time":"2025-06-25","posted_time_raw":"1yr","reaction_count":8,"reaction_types":"LIKE","source":"activity","video_url":null},{"article_description":null,"article_title":null,"article_url":null,"author_headline":"Deploying enterprise agents in production / CTO / SWE Leader / GVP @ Publicis Sapient","author_nam _100_100/profile-displayphoto-shrink_100_100/0/1569287114631?e=1784160000&v=beta&t=tJDZC7EXWnlgIIf8kF7fBCajhF-HEgzNXnz_IIkjqW8","author_profile_url":"https://www.linkedin.com/in/ravievani","has_image":true,"impression_count":228,"is_article":false,"is_my_post":true,"is_video":true,"post_image_url":"https://media.licdn.com/dms/image/v2/D4E05AQHOuVwmnmssyA/feedshare-thumbnail_720_1280/feedshare-thumbnail_720_1280/0/1705282774171?e=1783008000&v=beta&t=7lBDO9pMxqJznIcHjeLkuVib1ojP2tN_Kigvp2Y2pN4","post_text":"Called this a year ago 👀! Meta research recently published the \"LCM architecture\" https://lnkd.in/e5vMUtkN which operates on a *concept* vs *token* as the base unit of prediction.\n\nBack then, to me it was more of an intuition rather than a scientifically-backed theory, but Meta's research team might now validate this approach empirically.\n\nNow the next progression is for a piece of \"programming logic\" to be treated as a \"concept\". That would enable the prediction of subsequent \"logic\" sequences—which could be the pathway to better AI reasoning, because programming logic follows human thinking.\n\nBased on this, I would go as far as saying that the answer to Type 2/ System 2 thinking for AI will come from crawling codebases. Training the LCM architecture on code could help bridge the gap between AI's current capabilities and more systematic reasoning approaches.\n\nMy original post on this: https://lnkd.in/ee_hukrx","post_url":"https://www.linkedin.com/feed/update/urn:li:activity:7279530695423606784","post_urn":"urn:li:activity:7279530695423606784","posted_hours_ago":8760,"posted_time":"2025-06-25","posted_time_raw":"1yr","reaction_count":3,"reaction_types":"LIKE","repost_count":1,"source":"activity","video_url":"https://media.licdn.com/dms/image/v2/D4E05AQHOuVwmnmssyA/feedshare-thumbnail_720_1280/feedshare-thumbnail_720_1280/0/1705282774171?e=1783008000&v=beta&t=7lBDO9pMxqJznIcHjeLkuVib1ojP2tN_Kigvp2Y2pN4"},{"article_description":null,"article_title":nu impression_count":1300,"is_article":true,"is_my_post":true,"is_video":false,"post_image_url":"https://media.licdn.com/dms/image/sync/v2/D4E27AQEcFT6xaaKavg/articleshare-shrink_480/articleshare-shrink_480/0/1733249331812?e=1783008000&v=beta&t=XesjzzCLIj1kTq8ysFzn8YkqcLwpTPRe6OHVm8D_YV0","post_text":"All the big players now have solid LLMs, just like they've had solid databases. So the value now comes from what's between the user and the engine. Same as it's always been.","post_url":"https://www.linkedin.com/feed/update/urn:li:activity:7270095301229662209","post_urn":"urn:li:activity:7270095301229662209","posted_hours_ago":8760,"posted_time":"2025-06-25","posted_time_raw":"1yr","reaction_count":12,"reaction_types":"LIKE, EMPATHY","source":"activity","video_url":null},{"article_description":null,"article_title":null,"article_url":null,"author_headline":"Deploying enterprise agents in production / CTO / SWE Leader / GVP @ Publicis Sapient","author_name":"Ravi Evani\n              \n                \n                   \n    \n      \n    \n    \n      \n    \n\n • You","author_profile_image_url":"https://media.licdn.com/dms/image/v2/C4E03AQGNeJRorEd2Nw/profile-displayphoto-shrink_100_100/profile-displayphoto-shrink_100_100/0/1569287114631?e=1784160000&v=beta&t=tJDZC7EXWnlgIIf8kF7fBCajhF-HEgzNXnz_IIkjqW8","author_profile_url":"https://www.linkedin.com/in/ravievani","comment_count":1,"has_image":true,"impression_count":1212,"is_article":false,"is_my_post":true,"is_video":false,"post_image_url":"https://media.licdn.com/dms/image/v2/D4E22AQE33upp7imM5w/feedshare-shrink_800/feedshare-shrink_800/0/1733157184514?e=1784160000&v=beta&t=VR_ckBOx4FRhv57rlOD4SeuNuFMOz-phU9KR23yERDQ","post_text":"Your PMs perfect backlogs. Designers craft pixel-polished screens. Devs write pristine code. Yet your AI still under-delivers. Why?\n\nYour team's spending 90% of time building scaffolding, while prompt engineering—the brain of your AI, gets table scraps.\n\nThe harsh truth about enterprise gen AI development is that the core of the solution that derives the \"intelligence\", i.e. prompt engineering gets a fraction of the time and effort it really should.\n\nWhy? Teams tend to gravitate toward their comfort zones—leaving the critical but squishy, uncharted territory of crafting, evaluating, and iterating on prompts underinvested. Yet, this uncharted territory is where the biggest gains in intelligence and value are unlocked.\n\nA well-designed prompt chain can unlock the model’s full potential, while settling for mediocrity leaves considerable value on the table.\n\nTime to flip the script. Here are your key moves to invest considerable time and effort in prompt engineering:\n① Go beyond \"It works\": Analyze model outputs closely.\n② Build resilience: Evaluate and refine for (the numerous) edge cases.\n③Track the logic: Understand the model's reasoning and adapt accordingly.\n④Context is king: Guide with semantically significant data.\n\nNail these, and you have a much better chance of delivering real enterprise value—not just demos that \"work\".\n\nhashtag#ai hashtag#aiEngineering","post_url":"https://www.linkedin.com/feed/update/urn:li:activity:7269388118976335875","post_urn":"urn:li:activity:7269388118976335875","posted_hours_ago":8760,"posted_time":"2025-06-25","posted_time_raw":"1yr","reaction_count":16,"reaction_types":"LIKE, EMPATHY","repost_count":1,"source":"activity","video_url":null},{"article_description":null,"article_title":null,"article_url":null,"author_headline":"Deploying enterprise agents in production / CTO / SWE Leader / GVP @ Publicis Sapient","author_name":"Ravi Evani\n              \n                \n                   \n    \n      \n    \n    \n      \n    \n\n • You","author_profile_image_url":"https://media.licdn.com/dms/image/v2/C4E03AQGNeJRorEd2Nw/profile-displayphoto-shrink_100_100/profile-displayphoto-shrink_100_100/0/1569287114631?e=1784160000&v=beta&t=tJDZC7EXWnlgIIf8kF7fBCajhF-HEgzNXnz_IIkjqW8","author_profile_url
