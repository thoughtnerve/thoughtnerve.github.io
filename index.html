e":"2025-06-27","posted_hours_ago":8760,"posted_time_raw":"1yr","post_url":"https://www.linkedin.com/feed/update/urn:li:activity:7331314328383455232","author_profile_image_url":"https://media.licdn.com/dms/image/v2/C4E03AQGNeJRorEd2Nw/profile-displayphoto-shrink_100_100/profile-displayphoto-shrink_100_100/0/1569287114631?e=1784160000&v=beta&t=tJDZC7EXWnlgIIf8kF7fBCajhF-HEgzNXnz_IIkjqW8","post_text":"Bigger isn't always better when it comes to Vision Language AI models.\n\nLast weekend, we built an LLM inference app using Sapient Slingshot to run some practical tests on local, on-device multimodal AI models to count vehicles in restaurant drive-thrus. The vehicle density at a drive-thru could be an important metric for optimizing staffing in a restaurant and reducing customer wait times.\n\nThe prompt was straightforward: \"How many vehicles do you see in the drive-thru?\"\n\nI tested this on a few open-source models running locally on the edge, which in this case, was my laptop.\n\nInterestingly, the Google Gemma 12 billion parameter model quickly reported the correct count—three vehicles. But then it surprised me. It commented that that this was a “surprisingly eclectic collection of vehicles” and noted the scene had “a slightly unusual, almost staged feel.”\n\nAnd it was exactly right.\n\nThe scene wasn’t a real one, but was AI-generated using Google Flow scene builder, using the VEO2 model, prompted to create sports cars lined up in a chick-fila like drive-thru.\n\nThe lower weight fine tuned Gemma model not only provided accurate data, but also picked up on the subtle, artificial context.\n\nNext, I tested the heavyweight Gemma 27 billion parameter model. It was slower, correctly counted three vehicles, but entirely missed the staged aspect.\n\nThe takeaway:\nBigger models aren’t automatically superior. Smaller models can be sharper, especially when tuned for specific scenarios.","post_image_url":"https://media.licdn.com/dms/image/v2/D4E05AQFQsMJhnAGw8w/videocover-high/B4EZb4PdRTGQBg-/0/1747921532850?e=1783137600&v=beta&t=KUW0rzWBL5Fs6Sr8ZBUCnS-BpbmyTKHlfQ7jM_DYC78","is_article":false,"article_url":null,"article_title":null,"article_description":null,"is_video":true,"video_url":"https://media.licdn.com/dms/image/v2/D4E05AQFQsMJhnAGw8w/videocover-high/B4EZb4PdRTGQBg-/0/1747921532850?e=1783137600&v=beta&t=KUW0rzWBL5Fs6Sr8ZBUCnS-BpbmyTKHlfQ7jM_DYC78","has_image":true,"reaction_count":18,"reaction_types":"LIKE, ENTERTAINMENT","comment_count":4,"impression_count":2683,"source":"activity"},{"is_my_post":true,"post_urn":"urn:li:activity:7330955602753384453","author_name":"Ravi Evani\n              \n                \n                   \n    \n      \n    \n    \n      \n    \n\n • You","author_profile_url":"https://www.linkedin.com/in/ravievani","author_headline":"Deploying enterprise agents in production / CTO / SWE Leader / GVP @ Publicis Sapient","posted_time":"2025-06-27","posted_hours_ago":8760,"posted_time_raw":"1yr","post_url":"https://www.linkedin.com/feed/update/urn:li:activity:7330955602753384453","author_profile_image_url":"https://media.licdn.com/dms/image/v2/C4E03AQGNeJRorEd2Nw/profile-displayphoto-shrink_100_100/profile-displayphoto-shrink_100_100/0/1569287114631?e=1784160000&v=beta&t=tJDZC7EXWnlgIIf8kF7fBCajhF-HEgzNXnz_IIkjqW8","post_text":"Great meetup with our engineering leads in Toronto, where we unpacked five core mental models for engineers to master when working with AI ⤵\n\n1) Words are your interface to intelligence.\nThe way you phrase a request directly shapes the outcome. Express with clarity, precision, intent, and context. Whether you’re prompting an AI or giving it feedback, your language becomes the control surface for what gets built.\n\n2) Confidence is not the same as correctness.\nLLMs can be confidently wrong, just like eloquent humans. Don’t prompt and hope—critically co-create. Question assumptions, look for what’s missing, and stay engaged in the reasoning. Good outputs come from sharp interrogation and thoughtful back-and-forth.\n\n3) Better context beats bigger models.\nToo much context leads to confusion. Too little leads to hallucination. Be intentional about what you include. The quality of an AI’s output depends on the context density of your input—feed it the most relevant information, using the fewest possible tokens.\n\n4) Decomposition before delegation isn’t optional.\nThe granularity of human tasks doesn’t translate directly to AI. What feels intuitive to us may be vague or overloaded for the model. Modular design is your friend, so plan for what, how much, and in what order you delegate—as if assigning tasks to a junior teammate.\n\n5) Go beyond the dominant signal.\nLLMs follow the average pattern, the most likely continuation. But what’s common isn’t always what matters. Master the margins. Surface exceptions, spot what’s missing or misunderstood, and look for the outliers. That’s where real insight—and your impact—comes from.\n\nThanks to our Publicis Sapient Toronto engineering leaders who spent two days in SEAL (Strategic Engineering Academy for Leaders) training w/ Sapient Slingshot to level up their AI skills and drive impact for our clients and teams. And shoutout to Thanu, Amit, Laura, Joy, and Mohammed for designing and delivering a strong program through thoughtful coaching, organization, and curriculum.\n\nDustin, Pankaj, Debprotim, Amit, Arnab, Mrudul, Mohan, Jithin, Ramya, David, Rajesh, Milind, Gaytri, Jayakar, Maurizio, Sreeman, Vishal, Trivendra, Rajesh, Rohit, Pankaj, Huzefa, Jayesh, Jithin, irshad, Mridul","post_image_url":"https://media.licdn.com/dms/image/v2/D4E22AQGZKPXansQtoQ/feedshare-shrink_800/B4EZbzJQfUHYAk-/0/1747836016717?e=1784160000&v=beta&t=cRnFA0erRiocIjd_fIlJUd3MqrxLxUYV4TENAOI56gs","is_article":false,"article_url":null,"article_title":null,"article_description":null,"is_video":false,"video_url":null,"has_image":true,"reaction_count":177,"reaction_types":"LIKE, EMPATHY, PRAISE","comment_count":6,"repost_count":2,"impression_count":11465,"source":"activity"},{"is_my_post":true,"post_urn":"urn:li:activity:7330201134457880577","author_name":"Ravi Evani\n              \n                \n                   \n    \n      \n    \n    \n      \n    \n\n • You","author_profile_url":"https://www.linkedin.com/in/ravievani","author_headline":"Deploying enterprise agents in production / CTO / SWE Leader / GVP @ Publicis Sapient","posted_time":"2025-06-27","posted_hours_ago":8760,"posted_time_raw":"1yr","post_url":"https://www.linkedin.com/feed/update/urn:li:activity:7330201134457880577","author_profile_image_url":"https://media.licdn.com/dms/image/v2/C4E03AQGNeJRorEd2Nw/profile-displayphoto-shrink_100_100/profile-displayphoto-shrink_100_100/0/1569287114631?e=1784160000&v=beta&t=tJDZC7EXWnlgIIf8kF7fBCajhF-HEgzNXnz_IIkjqW8","post_text":"If you want to become a world-class AI engineer, there are some painful lessons you don’t need to learn the hard way➜I already did.\n\nHere are 7 mistakes I’ve made that I’d avoid at all costs if I were starting again:\n\n1. Waiting to “feel ready”\nAI moves fast. If you’re waiting to be an expert before you contribute, you’ll always be behind. Start before you’re comfortable. Experiment, ship, and learn in public. The best way to level up is by doing.\n\n2. Thinking your value is in code alone\nBeing great at Python or prompt engineering is not enough. The real value lies in connecting AI to business impact➜whether that’s accelerating a workflow, improving UX, or cutting costs. Learn to translate tech into outcomes.\n\n3. Ignoring the system around the model\nA good model in a broken pipeline is still a broken system. AI engineering isn’t just about the model➜it’s also about data quality, APIs, human feedback loops, testing, and deployment. Own the whole lifecycle.\n\n4. Not learning how to collaborate with AI\nTreating AI like a magic box limits its potential. The best engineers treat it like a teammate➜one that needs direction, context, and review. Know what it’s good at, what it’s bad at, and how to manage it like a junior dev.\n\n5. Avoiding ambiguity\nAI often lives in the gray areas: noisy data, unclear specs, messy orgs. If you’re only comfortable with perfect instructions and clean problems, you’ll struggle. The best AI engineers lean into uncertainty and reduce it systematically.\n\n6. Over-engineering for edge cases\nTrying to make AI perfect on Day 1 is a trap. Focus on dominant use cases, ship quickly, then tighten the loop with feedback. Let the real-world data shape your iterations.\n\n7. Not tying your work to results\nIt’s easy to get caught up in models, benchmarks, and novelty. But none of that matters if it doesn’t move a KPI. Be ruthless about measuring the impact of your work. Code is only valuable if it drives value.\n\nThese are the lessons I live by now➜and I keep learning.\nIf you’re serious about mastering AI engineering, don’t just build models. Build systems. Build impact.","post_image_url":"https://media.licdn.com/dms/image/v2/D4E05AQF-pXSpemyPfQ/videocover-high/B4EZboa78.GcBw-/0/1747656127434?e=1783137600&v=beta&t=CJrSqV9WZY9jyXaN41gIT-NfTzczn_ToLA7EIv-FMuM","is_article":false,"article_url":null,"article_title":null,"article_description":null,"is_video":true,"video_url":"https://media.licdn.com/dms/image/v2/D4E05AQF-pXSpemyPfQ/videocover-high/B4EZboa78.GcBw-/0/1747656127434?e=1783137600&v=beta&t=CJrSqV9WZY9jyXaN41gIT-NfTzczn_ToLA7EIv-FMuM","has_image":true,"reaction_count":37,"reaction_types":"LIKE, EMPATHY, INTEREST","comment_count":4,"impression_count":3086,"source":"activity"},{"is_my_post":true,"post_urn":"urn:li:activity:7329679241397088256","author_name":"Ravi Evani\n              \n                \n                   \n    \n      \n    \n    \n      \n    \n\n • You","author_profile_url":"https://www.linkedin.com/in/ravievani","author_headline":"Deploying enterprise agents in production / CTO / SWE Leader / GVP @ Publicis Sapient","posted_time":"2025-06-27","posted_hours_ago":8760,"posted_time_raw":"1yr","post_url":"https://www.linkedin.com/feed/update/urn:li:activity:7329679241397088256","author_profile_image_url":"https://media.licdn.com/dms/image/v2/C4E03AQGNeJRorEd2Nw/profile-displayphoto-shrink_100_100/profile-displayphoto-shrink_100_100/0/1569287114631?e=1784160000&v=beta&t=tJDZC7EXWnlgIIf8kF7fBCajhF-HEgzNXnz_IIkjqW8","post_text":"Dissecting the \"AI\" in the currently trending ai-hedge-fund Github project 📈:\n\nI recently dove into this educational GitHub project https://lnkd.in/eH54Wv_x (kudos to Virattt and contributors!) to find out how AI is being used.\n\nSo, where’s the Logic? Deterministic vs. AI\n\n⚙️ The Deterministic Engine:\n➜Data Collection & Prep: Fetching financial data, market stats – all standard code.\n➜Heuristic Scoring: Initial calculations within analyst agents (e.g., \"Is revenue growth > X%?\") are rule-based.\n➜Workflow Orchestration: The sequence of agent operations is programmatically defined (using LangGraph in this case).\n➜Risk Management (Primarily): Applying rules for position sizing, exposure limits based on inputs.\n\n🤖 The AI (LLMs) at Work:\n➜Analyst Personas (e.g., \"Bill Ackman Agent\"): After deterministic code crunches numbers (financial metrics, heuristic scores), an LLM steps in. Prompted with a specific investor persona and the pre-calculated data, it crafts an investment thesis, generates a signal (bullish/bearish), confidence score, and reasoning – aiming to mimic that investor's style.\n\n➜Portfolio Manager Agent: Given signals from all analyst agents, risk parameters, portfolio state, and trading rules via a detailed prompt, an LLM makes the final call: what to buy/sell/hold for each stock, in what quantity, and why. This synthesizes diverse inputs into actionable decisions.\n\n⚠️ The \"Gotchas\" of Assessing the AI's True Value\nThis architecture allows for sophisticated AI contributions, but how good are they really?\n➜Backtesting is Key: The project includes a backtester. Real-world simulated performance (P&L, Sharpe ratio) is the ultimate first-pass test.\n➜Reasoning Quality: The --show-reasoning flag is crucial. Is the AI's explanation logical, coherent with its persona, and insightful, or just rephrasing inputs? This needs human review.\n➜Prompt Sensitivity & Robustness: Small prompt changes or different LLM models can lead to varied outcomes. The quality of the prompts themselves is paramount.\n\nKey Takeaway for Humans Relying on AI Agents Like This:\n➜The Prompts: Understand exactly what the AI is being asked, what data it's given, what constraints or personas it's meant to adopt, and how its output is structured.\n➜Deterministic Pre-processing: What data is the AI actually seeing? How is it filtered, scored, or structured before the LLM gets it?\n➜Evaluation & Fallback Mechanisms: How is the AI's output being validated? What happens if it fails or gives nonsensical answers?\nBacktesting & Performance Metrics: How is success defined and measured?\n\nThis ai-hedge-fund project is a great educational tool for seeing this hybrid approach in action. It highlights both the potential of AI in complex domains and the continued need for human oversight and critical evaluation.","post_image_url":"https://media.licdn.com/dms/image/v2/D4E22AQFfAHVtdC5RHA/feedshare-shrink_800/B4EZbhAbfnHIAk-/0/1747531709413?e=1784160000&v=beta&t=pYMjoffiLiMraoSwspSWUnRKImEHG9qearlEpfq_vNs","is_article":false,"article_url":null,"article_title":null,"article_description":null,"is_video":false,"video_url":null,"has_image":true,"reaction_count":16,"reaction_types":"LIKE, EMPATHY","impression_count":835,"source":"activity"},{"is_my_post":true,"post_urn":"urn:li:activity:7328555093337731074","author_name":"Ravi Evani\n              \n                \n                   \n    \n      \n    \n    \n      \n    \n\n • You","author_profile_url":"https://www.linkedin.com/in/ravievani","author_headline":"Deploying enterprise agents in production / CTO / SWE Leader / GVP @ Publicis Sapient","posted_time":"2025-06-27","posted_hours_ago":8760,"posted_time_raw":"1yr","post_url":"https://www.linkedin.com/feed/update/urn:li:activity:7328555093337731074","author_profile_image_url":"https://media.licdn.com/dms/image/v2/C4E03AQGNeJRorEd2Nw/profile-displayphoto-shrink_100_100/profile-displayphoto-shrink_100_100/0/1569287114631?e=1784160000&v=beta&t=tJDZC7EXWnlgIIf8kF7fBCajhF-HEgzNXnz_IIkjqW8","post_text":"Real-time object detection on the edge!\n\nJason Steiner and I @ Philadephia's Walnut Street Cafe https://lnkd.in/eGwmfitz testing out the Multimodal llama.cpp on Apple silicon, thanks to https://lnkd.in/eWWJ-4ET personalized using Publicis Sapient hashtag#Slingshot w/the LLM running locally on my macbook pro.\n\nSee the response text on the right panel displaying object detection in real-time.","post_image_url":"https://media.licdn.com/dms/image/v2/D4E05AQFZnmRl8OrFEg/videocover-low/B4EZbRBqXMHABs-/0/1747263686997?e=1783137600&v=beta&t=GeYHsAxgmuEHTMp7lzX86foDVDg6HWVXHk-6JH0iXU0","is_article":false,"article_url":null,"article_title":null,"article_description":null,"is_video":true,"video_url":"https://media.licdn.com/dms/image/v2/D4E05AQFZnmRl8OrFEg/videocover-low/B4EZbRBqXMHABs-/0/1747263686997?e=1783137600&v=beta&t=GeYHsAxgmuEHTMp7lzX86foDVDg6HWVXHk-6JH0iXU0","has_image":true,"reaction_count":66,"reaction_types":"LIKE, EMPATHY, PRAISE","comment_count":2,"impression_count":4218,"source":"activity"},{"is_my_post":true,"post_urn":"urn:li:activity:7328312666538610689","author_name":"Ravi Evani\n              \n                \n                   \n    \n      \n    \n    \n      \n    \n\n • You","author_profile_url":"https://www.linkedin.com/in/ravievani","author_headline":"Deploying enterprise agents in production / CTO / SWE Leader / GVP @ Publicis Sapient","posted_time":"2025-06-27","posted_hours_ago":8760,"posted_time_raw":"1yr","post_url":"https://www.linkedin.com/feed/update/urn:li:activity:7328312666538610689","author_profile_image_url":"https://media.licdn.com/dms/image/v2/C4E03AQGNeJRorEd2Nw/profile-displayphoto-shrink_100_100/profile-displayphoto-shrink_100_100/0/1569287114631?e=1784160000&v=beta&t=tJDZC7EXWnlgIIf8kF7fBCajhF-HEgzNXnz_IIkjqW8","post_text":"If Transformers are built to focus on what matters most (“attention is all you need”), then our job is to get better at what they ignore.\n\nLLMs are optimized for the average pattern, the dominant signal, the most likely continuation.\n\nBut the edges are where perception, judgment, and experience lead.\n\nWe are the ones who bring context, intuition, and the ability to reason through unfamiliar situations.\n\nWe can connect dots across domains, infer intent, and spot when something “feels off” even if we’ve never seen it before.\n\nSo our real leverage is not in racing AI to the center, but in steering it with our mastery of the margins:\n➜ What’s missing?\n➜ What’s misclassified?\n➜ What’s misunderstood?\n\nThat’s where we focus, and hone in our value.","post_image_url":"https://media.licdn.com/dms/image/v2/D4E22AQGilUcQ0YOddw/feedshare-shrink_800/B4EZbNlh8kHcAk-/0/1747205891916?e=1784160000&v=beta&t=jMFRYVTWT1gDAVZPSAFbhEP_UnTyF_4hF9sz9zXjm30","is_article":false,"article_url":null,"article_title":null,"article_description":null,"is_video":false,"video_url":null,"has_image":true,"reaction_count":9,"reaction_types":"LIKE","comment_count":2,"impression_count":626,"source":"activity"},{"is_my_post":true,"post_urn":"urn:li:activity:7327766301366448128","author_name":"Ravi Evani\n              \n                \n                   \n    \n      \n    \n    \n      \n    \n\n • You","author_profile_url":"https://www.linkedin.com/in/ravievani","author_headline":"Deploying enterprise agents in production / CTO / SWE Leader / GVP @ Publicis Sapient","posted_time":"2025-06-27","posted_hours_ago":8760,"posted_time_raw":"1yr","post_url":"https://www.linkedin.com/feed/update/urn:li:activity:7327766301366448128","author_profile_image_url":"https://media.licdn.com/dms/image/v2/C4E03AQGNeJRorEd2Nw/profile-displayphoto-shrink_100_100/profile-displayphoto-shrink_100_100/0/1569287114631?e=1784160000&v=beta&t=tJDZC7EXWnlgIIf8kF7fBCajhF-HEgzNXnz_IIkjqW8","post_text":"Demystifying the logic that powers vibecoding in your favorite AI copilot:\n\nThe functionality that enables vibecoding is the “agent mode” built into IDEs like Cursor, Windsurf, Zed, Cline, and others.\n\nThe interesting thing is most of the logic in the agent mode (except the LLM) is deterministic.\n\nHere’s the general idea of what happens under the hood, when you send a message like: “Refactor this function.” into your IDE agent prompt input box. This is based on Zed IDE source code https://lnkd.in/eJXe58UE","post_image_url":"https://media.licdn.com/dms/image/v2/D4E05AQFgvL-fPMrNuQ/videocover-low/B4EZbF0j87HwBw-/0/1747075618962?e=1783137600&v=beta&t=Am48xjLUPNZ10x1znwjTEDO6iU5O80j4lGajmbnw5ZQ","is_article":false,"article_url":null,"article_title":null,"article_description":null,"is_video":true,"video_url":"https://media.licdn.com/dms/image/v2/D4E05AQFgvL-fPMrNuQ/videocover-low/B4EZbF0j87HwBw-/0/1747075618962?e=1783137600&v=beta&t=Am48xjLUPNZ10x1znwjTEDO6iU5O80j4lGajmbnw5ZQ","has_image":true,"reaction_count":6,"reaction_types":"LIKE","impression_count":603,"source":"activity"},{"is_my_post":true,"post_urn":"urn:li:activity:7327676818818232320","author_name":"Ravi Evani\n              \n                \n                   \n    \n      \n    \n    \n      \n    \n\n • You","author_profile_url":"https://www.linkedin.com/in/ravievani","author_headline":"Deploying enterprise agents in production / CTO / SWE Leader / GVP @ Publicis Sapient","posted_time":"2025-06-27","posted_hours_ago":8760,"posted_time_raw":"1yr","post_url":"https://www.linkedin.com/feed/update/urn:li:activity:7327676818818232320","author_profile_image_url":"https://media.licdn.com/dms/image/v2/C4E03AQGNeJRorEd2Nw/profile-displayphoto-shrink_100_100/profile-displayphoto-shrink_100_100/0/1569287114631?e=1784160000&v=beta&t=tJDZC7EXWnlgIIf8kF7fBCajhF-HEgzNXnz_IIkjqW8","post_text":"Demystifying the logic that powers vibecoding in your favorite AI copilot:\n\nThe functionality that enables vibecoding is the “agent mode” built into IDEs like Cursor, Windsurf, Zed, Cline, and others.\n\nThe interesting thing is most of the logic in the agent mode (except the LLM) is deterministic.\n\nHere’s the general idea of what happens under the hood, when you send a message like: “Refactor this function.” into your IDE agent prompt input box. This is based on Zed IDE source code https://lnkd.in/eJXe58UE\n\n→ First the IDE system spins up an active thread that creates a message object for the prompt. It calls the context system to fetch anything relevant—files, symbols, previous chats, rules, etc. relevant to the user intent.\n\n→ Next, as part of the context gathering, a Context Picker selects what to include – this can be user driven or auto-selected. A Context Store loads data from available sources and the result is a rich, structured context data sent along with your prompt\n\n→ Then comes the LLM request, where a model selector picks the right LLM for the job. The IDE sends both prompt + context to the LLM for processing.\nAt this point the LLM could determine if a tool call is needed, such as reading a file, accessing the terminal, editing the file and so on.\n\n→ The IDE then invokes the right tool (e.g., EditFileTool). The tool executes and returns results, which are routed back to the LLM to continue reasoning. And this cycle may repeat until the task is complete, in which case the LLM might return a response such as the source code and a text explanation.\n\n→ This response is shown in the IDE. If diffs are involved (like code edits), tools like Code Diff or Terminal Codegen render and apply them.\n\n→ The user reviews the output and decides to continue the thread, edit the prompt, or start fresh.\n\n☆ So that’s it: It’s not just an “AI chatbot”, but rather, a fully orchestrated system with tons of deterministic code that manages context, models, tools, and interaction flow.","post_image_url":"https://media.licdn.com/dms/image/v2/D4E05AQGRFDAXbDg2Mw/videocover-low/B4EZa.fX2uHwBw-/0/1746952631294?e=1783137600&v=beta&t=jLTA2mZT1jt4aeoyHr5HlFzSrSX3GrZ4IcLsTmxaVbs","is_article":false,"article_url":null,"article_title":null,"article_description":null,"is_video":true,"video_url":"https://media.licdn.com/dms/image/v2/D4E05AQGRFDAXbDg2Mw/videocover-low/B4EZa.fX2uHwBw-/0/1746952631294?e=1783137600&v=beta&t=jLTA2mZT1jt4aeoyHr5HlFzSrSX3GrZ4IcLsTmxaVbs","has_image":true,"reaction_count":14,"reaction_types":"LIKE, INTEREST","comment_count":3,"impression_count":1114,"source":"activity"},{"is_my_post":true,"post_urn":"urn:li:activity:7326926997899603968","author_name":"Ravi Evani\n              \n                \n                   \n    \n      \n    \n    \n      \n    \n\n • You","author_profile_url":"https://www.linkedin.com/in/ravievani","author_headline":"Deploying enterprise agents in production / CTO / SWE Leader / GVP @ Publicis Sapient","posted_time":"2025-06-27","posted_hours_ago":8760,"posted_time_raw":"1yr","post_url":"https://www.linkedin.com/feed/update/urn:li:activity:7326926997899603968","author_profile_image_url":"https://media.licdn.com/dms/image/v2/C4E03AQGNeJRorEd2Nw/profile-displayphoto-shrink_100_100/profile-displayphoto-shrink_100_100/0/1569287114631?e=1784160000&v=beta&t=tJDZC7EXWnlgIIf8kF7fBCajhF-HEgzNXnz_IIkjqW8","post_text":"Figuring out \"who said what\" just got better with NVIDIA NeMo’s recent updates. Adobe Premiere Pro, I love your tools, but your transcription feature needs this, yesterday.\n\nMulti-speaker content is everywhere. Figuring out who said what shouldn’t be messy in a transcript!\n\nHere’s how NeMo handles it: https://lnkd.in/e7cMYCWG\n\n☆ Step 1: Voice Activity Detection (VAD)\n→ Finds only the parts of audio that contain actual speech—skipping silence and noise.\n\n☆ Step 2: Speaker Embedding + Clustering\n→ Breaks speech into segments, generates voice fingerprints, and clusters them into speakers.\n→This is the heart of the \"diarization\"—grouping voices by identity without needing names.\n\n☆ Step 3: Refinement\n→ Applies smoothing (e.g., MSDD) to polish boundaries and speaker shifts.\n→ Output: “who spoke when” in RTTM or similar formats.\n\n☆ Step 4: ASR Integration\n→ Run speech-to-text on each speaker segment.\n→ Final output: timestamped, speaker-tagged transcription.\n\nThis feels production-grade. Time for popular content & collaboration tools to level up!","post_image_url":"https://media.licdn.com/dms/image/v2/D4E22AQFjlPWLXH4ibQ/feedshare-shrink_800/B4EZa55RgYHwAg-/0/1746875522596?e=1784160000&v=beta&t=JtdgEd5JaF8km5nwEA-P6msJutHdCqELKJ0E0-axpJI","is_article":false,"article_url":null,"article_title":null,"article_description":null,"is_video":false,"video_url":null,"has_image":true,"reaction_count":8,"reaction_types":"LIKE, INTEREST, PRAISE","impression_count":851,"source":"activity"},{"is_my_post":true,"post_urn":"urn:li:activity:7326591660274892804","author_name":"Ravi Evani\n              \n                \n                   \n    \n      \n    \n    \n      \n    \n\n • You","author_profile_url":"https://www.linkedin.com/in/ravievani","author_headline":"Deploying enterprise agents in production / CTO / SWE Leader / GVP @ Publicis Sapient","posted_time":"2025-06-27","posted_hours_ago":8760,"posted_time_raw":"1yr","post_url":"https://www.linkedin.com/feed/update/urn:li:activity:7326591660274892804","author_profile_image_url":"https://media.licdn.com/dms/image/v2/C4E03AQGNeJRorEd2Nw/profile-displayphoto-shrink_100_100/profile-displayphoto-shrink_100_100/0/1569287114631?e=1784160000&v=beta&t=tJDZC7EXWnlgIIf8kF7fBCajhF-HEgzNXnz_IIkjqW8","post_text":"Here’s how to implement a two-tier RAG setup for integrating with your personal knowledge base. Inspired by Surf Sense, https://lnkd.in/etAbJzCP, the currently trending OSS alternative to NotebookLM.\n\n☆ Overview\nYou’re building a RAG system that:\n↳Leverages hierarchical retrieval (summaries first, then details)\n↳Uses hybrid search (semantic + keyword) with Reciprocal Rank Fusion (RRF)\nIs exposed as a RAG-as-a-Service API\n\n☆ System Flow\n↳User submits query → hits the RAGaaS API\n↳Tier 1: Hybrid Search + RRF on summaries → identify relevant documents\n↳Tier 2: Hybrid Search + RRF on chunks from top documents → fetch detailed context\n↳Augmentation: Combine original query + retrieved chunks → feed to LLM\nLLM generates → final response is returned to the user\n\n☆ Tier 1: Summary-Level Retrieval\nGoal: Narrow down the search space by retrieving high-level document summaries or section overviews.\n\nIndexing: Create a Tier 1 vector index of document-level or section-level summaries.\nSearch: Use both:\n↳Semantic Search (e.g., OpenAI embeddings + FAISS)\n↳Full-Text Search (e.g., Elasticsearch or BM25)\n\nFusion: Combine ranked lists using Reciprocal Rank Fusion (RRF) to balance precision and recall.\nOutput: Top N summaries or document IDs passed to Tier 2.\n\n☆ Tier 2: Detailed Chunk Retrieval\nGoal: Retrieve fine-grained, contextually rich chunks from within the top summaries identified in Tier 1.\n\nIndexing: Break full documents into small semantic chunks (e.g., 100–300 tokens), each tagged with its parent document ID.\nSearch: Again use hybrid search (semantic + BM25).\nFusion: Apply RRF again on the chunk-level results.\nOutput: Return the most relevant chunks for grounding the LLM.\n\n☆ RAG-as-a-Service (API Layer)\nThis backend handles:\n↳Receiving the user’s query\n↳Orchestrating Tier 1 and Tier 2 retrievals\n↳Passing the query + retrieved context into an LLM (e.g., OpenAI, Azure OpenAI, Ollama)\n↳Returning the generated answer\n\n☆Tech Stack (Example)\nSemantic Search➜OpenAI Embeddings + FAISS\nFull-Text Search➜Elasticsearch or Weaviate\nRRF➜Custom Python (or built into some retrieval libraries)\nLLM➜OpenAI, Ollama, or Azure OpenAI\nAPI Layer➜FastAPI or Express.js\nStorage➜Postgres / S3 for source docs + metadata","post_image_url":"https://media.licdn.com/dms/image/v2/D4E22AQH3JdRi_KOz_A/feedshare-shrink_800/B4EZa1ISZwHoAs-/0/1746795571956?e=1784160000&v=beta&t=y5eKl4tUHN0WLNXFWKVzZQE3xfgIrJ7-LWWZQf0yP24","is_article":false,"article_url":null,"article_title":null,"article_description":null,"is_video":false,"video_url":null,"has_image":true,"reaction_count":17,"reaction_types":"LIKE, INTEREST","comment_count":3,"impression_count":1205,"source":"activity"},{"is_my_post":true,"post_urn":"urn:li:activity:7326212718527397890","author_name":"Ravi Evani\n              \n                \n                   \n    \n      \n    \n    \n      \n    \n\n • You","author_profile_url":"https://www.linkedin.com/in/ravievani","author_headline":"Deploying enterprise agents in production / CTO / SWE Leader / GVP @ Publicis Sapient","posted_time":"2025-06-27","posted_hours_ago":8760,"posted_time_raw":"1yr","post_url":"https://www.linkedin.com/feed/update/urn:li:activity:7326212718527397890","author_profile_image_url":"https://media.licdn.com/dms/image/v2/C4E03AQGNeJRorEd2Nw/profile-displayphoto-shrink_100_100/profile-displayphoto-shrink_100_100/0/1569287114631?e=1784160000&v=beta&t=tJDZC7EXWnlgIIf8kF7fBCajhF-HEgzNXnz_IIkjqW8","post_text":"hashtag#AWS Agent Squad https://lnkd.in/e-xpXtDX is trending at #2 on GitHub today. Here’s what happens under the hood when it orchestrates a travel use case like: “Book my flight to Paris”:\n\n↳The user enters their request via a client app (web chat, mobile, etc.).\n↳The request goes to the Agent Squad Orchestrator, which manages conversation flow.\n↳It sends the query + conversation history to a Classifier (e.g., BedrockClassifier).\n↳The classifier identifies the intent as a travel request and routes it to \"TravelAgentLex\".\n↳TravelAgentLex passes the request to Amazon Lex, which handles slot filling—asks for travel dates, destination, number of travelers, etc.\n↳Once all info is collected, Lex calls a fulfillment function (e.g., Lambda or external booking API).\n↳Booking confirmation is passed back through the chain and finally shown to the user as: “Your flight to Paris is booked!”\n\nEach step is modular, API-driven, and cleanly orchestrated by the Agent Squad orchestration pattern.","post_image_url":"https://media.licdn.com/dms/image/v2/D4E22AQHL1-2iJ8OfVQ/feedshare-shrink_800/B4EZavvpG2GQAg-/0/1746705224903?e=1784160000&v=beta&t=OA6FYv01c2M0S5MR9l3qrklVR0IKeDUzE8NAzZqU7V0","is_article":false,"article_url":null,"article_title":null,"article_description":null,"is_video":false,"video_url":null,"has_image":true,"reaction_count":25,"reaction_types":"LIKE","comment_count":1,"impression_count":2115,"source":"activity"},{"is_my_post":true,"post_urn":"urn:li:activity:7325903699795468288","author_name":"Ravi Evani\n              \n                \n                   \n    \n      \n    \n    \n      \n    \n\n • You","author_profile_url":"https://www.linkedin.com/in/ravievani","author_headline":"Deploying enterprise agents in production / CTO / SWE Leader / GVP @ Publicis Sapient","posted_time":"2025-06-27","posted_hours_ago":8760,"posted_time_raw":"1yr","post_url":"https://www.linkedin.com/feed/update/urn:li:activity:7325903699795468288","author_profile_image_url":"https://media.licdn.com/dms/image/v2/C4E03AQGNeJRorEd2Nw/profile-displayphoto-shrink_100_100/profile-displayphoto-shrink_100_100/0/1569287114631?e=1784160000&v=beta&t=tJDZC7EXWnlgIIf8kF7fBCajhF-HEgzNXnz_IIkjqW8","post_text":"Sharing a couple of tips on how to become your AI copilot's manager. Happy coding!","post_image_url":"https://media.licdn.com/dms/image/v2/D4E05AQEOGpJDV_5jBw/videocover-high/B4EZarWUtHHoBc-/0/1746631527725?e=1783137600&v=beta&t=gQ-I_qjBrKtdqZbgPsSj2DO5B86feZkZbGn0_qrJAtM","is_article":false,"article_url":null,"article_title":null,"article_description":null,"is_video":true,"video_url":"https://media.licdn.com/dms/image/v2/D4E05AQEOGpJDV_5jBw/videocover-high/B4EZarWUtHHoBc-/0/1746631527725?e=1783137600&v=beta&t=gQ-I_qjBrKtdqZbgPsSj2DO5B86feZkZbGn0_qrJAtM","has_image":true,"reaction_count":121,"reaction_types":"LIKE, EMPATHY, INTEREST","comment_count":4,"repost_count":1,"impression_count":18445,"source":"activity"},{"is_my_post":true,"post_urn":"urn:li:activity:7325795048627789824","author_name":"Ravi Evani\n              \n                \n                   \n    \n      \n    \n    \n      \n    \n\n • You","author_profile_url":"https://www.linkedin.com/in/ravievani","author_headline":"Deploying enterprise agents in production / CTO / SWE Leader / GVP @ Publicis Sapient","posted_time":"2025-06-27","posted_hours_ago":8760,"posted_time_raw":"1yr","post_url":"https://www.linkedin.com/feed/update/urn:li:activity:7325795048627789824","author_profile_image_url":"https://media.licdn.com/dms/image/v2/C4E03AQGNeJRorEd2Nw/profile-displayphoto-shrink_100_100/profile-displayphoto-shrink_100_100/0/1569287114631?e=1784160000&v=beta&t=tJDZC7EXWnlgIIf8kF7fBCajhF-HEgzNXnz_IIkjqW8","post_text":"Google Cloud AI powered kubernetes assistant: kubectl-ai https://lnkd.in/ez9xQNTM is trending #1 on GitHub today. How does this ai work?\n\n🔹 You ask:\n“Show me all pods in the default namespace”\n\nHere’s what happens behind the scenes:\n↳The kubectl-ai CLI sends your query to an AI Agent.\n↳The AI Agent uses a large language model (like Gemini) to translate your natural language into a real kubectl command.\n↳It figures out: kubectl get pods -n default\n↳This command is passed to the kubectl tool executor, which runs it against the Kubernetes API server.\n↳The server returns the live pod data.\n↳The AI agent can (optionally) run another LLM pass to explain the output.\n↳You see both the raw result and an explanation—right in your terminal.\n\n🔹 You ask:\n“Create a new deployment for nginx image with 3 replicas”\n\nHere’s how kubectl-ai handles it behind the scenes:\n↳Your input goes through the kubectl-ai CLI and reaches the AI Agent.\n↳The agent builds a prompt using your request and the schema of the kubectl tool.\n↳A large language model (like Gemini) interprets your intent and determines the appropriate command:\n↳kubectl create deployment nginx --image=nginx --replicas=3\n↳The command is parsed, arguments are extracted, and the tool executor runs it against the Kubernetes API.\n↳The API server validates the configuration and applies it.\n↳Once complete, the server returns a status—success or error.\n↳The AI agent formats the output and returns a clear, human-readable summary to your terminal.\n\nNo memorizing commands. Just tell it what you want.","post_image_url":null,"is_article":false,"article_url":null,"article_title":null,"article_description":null,"is_video":false,"video_url":null,"has_image":false,"reaction_count":13,"reaction_types":"LIKE","comment_count":1,"impression_count":1677,"source":"activity"},{"is_my_post":true,"post_urn":"urn:li:activity:7324607244648554496","author_name":"Ravi Evani\n              \n                \n                   \n    \n      \n    \n    \n      \n    \n\n • You","author_profile_url":"https://www.linkedin.com/in/ravievani","author_headline":"Deploying enterprise agents in production / CTO / SWE Leader / GVP @ Publicis Sapient","posted_time":"2025-06-27","posted_hours_ago":8760,"posted_time_raw":"1yr","post_url":"https://www.linkedin.com/feed/update/urn:li:activity:7324607244648554496","author_profile_image_url":"https://media.licdn.com/dms/image/v2/C4E03AQGNeJRorEd2Nw/profile-displayphoto-shrink_100_100/profile-displayphoto-shrink_100_100/0/1569287114631?e=1784160000&v=beta&t=tJDZC7EXWnlgIIf8kF7fBCajhF-HEgzNXnz_IIkjqW8","post_text":"The moment it clicked was the day I stopped treating AI like a mystery—and started acting like its engineering manager.\n\nThat shift didn’t happen by accident. It came from following a real engineering framework for how to work with AI.\n\nHere’s what that looks like in practice:\n\n⇥ Start with mindset\n\nIt’s a team: you + AI.\nTreat it like a junior dev.\nKnow what AI is good at (and what it’s not).\nYou’re still the architect. Delegate with intent.\n\n⇥ Work in a real SDLC\n\nPlan incrementally. Define one concrete task at a time.\nProvide context before asking for output.\nCo-create, critique, and refine. Don’t just prompt and hope.\n\n⇥ Learn alongside the build\n\nResearch like you would normally.\nLet AI clarify and explain, but don’t outsource your thinking.\n\n⇥ Code like a team\n\nBreak work into stories.\nStart with test cases.\nGive clear instructions and examples.\nReview its code. Fill the gaps. Iterate.\n\n⇥Test. Validate. Review.\n\nTests aren’t a checkbox—they’re checkpoints.\nDebug together.\nDon’t ship until it’s solid.\n\n⇥ Don’t skip quality\n\nUse documented coding rules.\nStick to design patterns.\nLeave the codebase better than you found it.\n\n🧠 And above all—learn to communicate well with AI\n\nGive clean, relevant context.\nTrim the fat. Use new chats.\nAsk it to ask you better questions.\nUse real code examples.\nRefine prompts like you’d refactor code.\n\nThis is what it means to engineer with AI.\nNot one-off prompting. Not wizardry.\nNot magic. Not mystery.\nJust a repeatable, high-leverage way to build—with a new kind of teammate.","post_image_url":null,"is_article":false,"article_url":null,"article_title":null,"article_description":null,"is_video":false,"video_url":null,"has_image":false,"reaction_count":14,"reaction_types":"LIKE, INTEREST","comment_count":2,"impression_count":2039,"source":"activity"},{"is_my_post":true,"post_urn":"urn:li:activity:7323660512192335872","author_name":"Ravi Evani\n              \n                \n                   \n    \n      \n    \n    \n      \n    \n\n • You","author_profile_url":"https://www.linkedin.com/in/ravievani","author_headline":"Deploying enterprise agents in production / CTO / SWE Leader / GVP @ Publicis Sapient","posted_time":"2025-06-27","posted_hours_ago":8760,"posted_time_raw":"1yr","post_url":"https://www.linkedin.com/feed/update/urn:li:activity:7323660512192335872","author_profile_image_url":"https://media.licdn.com/dms/image/v2/C4E03AQGNeJRorEd2Nw/profile-displayphoto-shrink_100_100/profile-displayphoto-shrink_100_100/0/1569287114631?e=1784160000&v=beta&t=tJDZC7EXWnlgIIf8kF7fBCajhF-HEgzNXnz_IIkjqW8","post_text":"Are you still debating AI while others are using it to outpace you?\n\nAs software engineers, we often overthink. We sit in rooms debating strategy—Should we use AI? Which model? Is it mature enough?\nMeanwhile, the technology moves forward—indifferent to our hesitation.\n\nThat’s always been the case with tech. But now it’s more extreme.\n\nSoftware development has fundamentally changed in the past year.\n\nThe old focal points—latest Java updates, specializing in front-end vs back-end, arguing over testing tools—don’t matter as much anymore.\n\nAI coding agents flipped the script. The new game is rapid adaptation and high-leverage problem solving.\n\nAnd it’s only accelerating.\n\nDevelopers who use AI tools are delivering at a level that traditional workflows can’t match.\nThe more they use them, the better the models get. The better the models get, the bigger the gap between adopters and holdouts.\n\nSo no, it’s not about waiting for the tech to mature. It’s about what you’re doing with it right now.\n\nThe point is: act.\n\nAI isn’t waiting. Neither should you.","post_image_url":"https://media.licdn.com/dms/image/v2/D4E05AQGEHEqd3LVXYw/videocover-high/B4EZaLd3ylHkBk-/0/1746096718792?e=1783137600&v=beta&t=0-uE5r8TdoJnZhyKxZIQQ6ybl2CfuuGf6a9ccXDC_Dg","is_article":false,"article_url":null,"article_title":null,"article_description":null,"is_video":true,"video_url":"https://media.licdn.com/dms/image/v2/D4E05AQGEHEqd3LVXYw/videocover-high/B4EZaLd3ylHkBk-/0/1746096718792?e=1783137600&v=beta&t=0-uE5r8TdoJnZhyKxZIQQ6ybl2CfuuGf6a9ccXDC_Dg","has_image":true,"reaction_count":55,"reaction_types":"LIKE, EMPATHY","comment_count":2,"impression_count":6338,"source":"activity"},{"is_my_post":true,"post_urn":"urn:li:activity:7323150575473201152","author_name":"Ravi Evani\n              \n                \n                   \n    \n      \n    \n    \n      \n    \n\n • You","author_profile_url":"https://www.linkedin.com/in/ravievani","author_headline":"Deploying enterprise agents in production / CTO / SWE Leader / GVP @ Publicis Sapient","posted_time":"2025-06-27","posted_hours_ago":8760,"posted_time_raw":"1yr","post_url":"https://www.linkedin.com/feed/update/urn:li:activity:7323150575473201152","author_profile_image_url":"https://media.licdn.com/dms/image/v2/C4E03AQGNeJRorEd2Nw/profile-displayphoto-shrink_100_100/profile-displayphoto-shrink_100_100/0/1569287114631?e=1784160000&v=beta&t=tJDZC7EXWnlgIIf8kF7fBCajhF-HEgzNXnz_IIkjqW8","post_text":"Deep-Live-Cam https://lnkd.in/eeWKNt2P is trending #1 on GitHub today. Here’s a quick breakdown of how it pulls off real-time face swaps—from capturing your live video to generating the swapped output in milliseconds.\n\nThe application wires up a clean, four-step pipeline: you pick a source face and target stream, capturer.py grabs each frame, then core.py runs face-analyser to pinpoint faces and face-swapper to swap them via an ONNX model. Optional GFPGAN cleanup sharpens details, predicter sends work to CPU or GPU, and ui.py streams the result live (or FFMPEG saves it). All controls live in a simple UI/CLI toggle setup.","post_image_url":null,"is_article":false,"article_url":null,"article_title":null,"article_description":null,"is_video":false,"video_url":null,"has_image":false,"reaction_count":8,"reaction_types":"LIKE, INTEREST","impression_count":1204,"source":"activity"},{"is_my_post":true,"post_urn":"urn:li:activity:7322805996840542208","author_name":"Ravi Evani\n              \n                \n                   \n    \n      \n    \n    \n      \n    \n\n • You","author_profile_url":"https://www.linkedin.com/in/ravievani","author_headline":"Deploying enterprise agents in production / CTO / SWE Leader / GVP @ Publicis Sapient","posted_time":"2025-06-27","posted_hours_ago":8760,"posted_time_raw":"1yr","post_url":"https://www.linkedin.com/feed/update/urn:li:activity:7322805996840542208","author_profile_image_url":"https://media.licdn.com/dms/image/v2/C4E03AQGNeJRorEd2Nw/profile-displayphoto-shrink_100_100/profile-displayphoto-shrink_100_100/0/1569287114631?e=1784160000&v=beta&t=tJDZC7EXWnlgIIf8kF7fBCajhF-HEgzNXnz_IIkjqW8","post_text":"Gemini 2.5 allows you to shift between speed and power, to match the task at hand.\n\nWe tested Google hashtag#Gemini 2.5 to generate mindmaps from meeting discussions.\n\nWhen we set a thinking budget of 100, Pro (gemini-2.5-pro-preview-03-25) delivered a precise, outcome-focused mindmap in ~20 seconds.\n\nOn the other hand, even with the budget set to 0, Flash (gemini-2.5-flash-preview-04-17) gave us a faster, yet still sold mindmap in just 6 seconds.\n\nHonestly, the results were hard to objectively compare since there is no \"ground truth\" answer here. So quality is very much in the eyes of the beholder :)\n\nBased on my subjective assessment, I would recommend using Flash for fast, live \"whiteboarding\". Shift to Pro when you need depth and focus for deeper, targeted follow-ups afterward.\n\nThe combination of model selection and thinking budget lets you decide—speed or depth, on your terms.","post_image_url":"https://media.licdn.com/dms/image/v2/D4E05AQEJ4ymryAR3-Q/feedshare-thumbnail_720_1280/B4EZZ4s1YcHMAs-/0/1745781742174?e=1783137600&v=beta&t=y9CEyCrp2SUt3XdZnA6_IDtGsfaHygmXOMeOuWhbgwo","is_article":false,"article_url":null,"article_title":null,"article_description":null,"is_video":true,"video_url":"https://media.licdn.com/dms/image/v2/D4E05AQEJ4ymryAR3-Q/feedshare-thumbnail_720_1280/B4EZZ4s1YcHMAs-/0/1745781742174?e=1783137600&v=beta&t=y9CEyCrp2SUt3XdZnA6_IDtGsfaHygmXOMeOuWhbgwo","has_image":true,"reaction_count":8,"reaction_types":"LIKE, EMPATHY","impression_count":1037,"source":"activity"},{"is_my_post":true,"post_urn":"urn:li:activity:7322622534271606784","author_name":"Ravi Evani\n              \n                \n                   \n    \n      \n    \n    \n      \n    \n\n • You","author_profile_url":"https://www.linkedin.com/in/ravievani","author_headline":"Deploying enterprise agents in production / CTO / SWE Leader / GVP @ Publicis Sapient","posted_time":"2025-06-27","posted_hours_ago":8760,"posted_time_raw":"1yr","post_url":"https://www.linkedin.com/feed/update/urn:li:activity:7322622534271606784","author_profile_image_url":"https://media.licdn.com/dms/image/v2/C4E03AQGNeJRorEd2Nw/profile-displayphoto-shrink_100_100/profile-displayphoto-shrink_100_100/0/1569287114631?e=1784160000&v=beta&t=tJDZC7EXWnlgIIf8kF7fBCajhF-HEgzNXnz_IIkjqW8","post_text":"Here’s my current vibe coding workflow:\n\nI start with GPT-4.1 – because nothing yet beats its instruction-following.\n\nIf it gets it wrong twice, I bring in Gemini 2.5 Pro for a second opinion.\n\nIf they both agree but I’m still not convinced? I call on O3 for a final check or fresh angle.\n\nThen I take the best bits, remix, and feed it back to GPT-4.1.\n\nYes, it’s overkill. Yes, it works.\n\nWhat’s your coding workflow with AI?","post_image_url":"https://media.licdn.com/dms/image/v2/D4E22AQGZKIjgmAJGOQ/feedshare-shrink_800/B4EZZ8uYxUGYAg-/0/1745849258854?e=1784160000&v=beta&t=qH2QIe9sFr9Ge4cla3tIZdb7bqza613m1eXzmtuYInk","is_article":false,"article_url":null,"article_title":null,"article_description":null,"is_video":false,"video_url":null,"has_image":true,"reaction_count":24,"reaction_types":"LIKE, EMPATHY, INTEREST","comment_count":2,"repost_count":1,"impression_count":2572,"source":"activity"},{"is_my_post":true,"post_urn":"urn:li:activity:7321882682974523392","author_name":"Ravi Evani\n              \n                \n                   \n    \n      \n    \n    \n      \n    \n\n • You","author_profile_url":"https://www.linkedin.com/in/ravievani","author_headline":"Deploying enterprise agents in production / CTO / SWE Leader / GVP @ Publicis Sapient","posted_time":"2025-06-27","posted_hours_ago":8760,"posted_time_raw":"1yr","post_url":"https://www.linkedin.com/feed/update/urn:li:activity:7321882682974523392","author_profile_image_url":"https://media.licdn.com/dms/image/v2/C4E03AQGNeJRorEd2Nw/profile-displayphoto-shrink_100_100/profile-displayphoto-shrink_100_100/0/1569287114631?e=1784160000&v=beta&t=tJDZC7EXWnlgIIf8kF7fBCajhF-HEgzNXnz_IIkjqW8","post_text":"Had a great fireside chat with David at Publicis Sapient GENE LATAM Fest ✨—shoutout to Laura and the crew for pulling it together!\n\nWe got into a simple idea: turning wasted meeting time into learning time.\n\nBefore committing your time to any meeting, ask yourself:\n\n🤔 What am I getting out of it?\n🤔 What am I giving to it?\n\nIf the answer to both is “not much”, skip it. Use that time to learn something new.\n\nAnd if someone really wants you in the room? Ask them the same two questions.\n\nProtect your time. Swap your wasted meeting time for learning time!","post_image_url":"https://media.licdn.com/dms/image/v2/D4E05AQHBJy-nWGWwBA/videocover-low/B4EZZyNblmHcCA-/0/1745672853586?e=1783137600&v=beta&t=DVsU7TWxwPYgMRovYrdc3yvsHVVqTvAxt8FCGRFjQms","is_article":false,"article_url":null,"article_title":null,"article_description":null,"is_video":true,"video_url":"https://media.licdn.com/dms/image/v2/D4E05AQHBJy-nWGWwBA/videocover-low/B4EZZyNblmHcCA-/0/1745672853586?e=1783137600&v=beta&t=DVsU7TWxwPYgMRovYrdc3yvsHVVqTvAxt8FCGRFjQms","has_image":true,"reaction_count":70,"reaction_types":"LIKE, PRAISE, EMPATHY","comment_count":4,"repost_count":4,"impression_count":3470,"source":"activity"},{"is_my_post":true,"post_urn":"urn:li:activity:7320610058441003008","author_name":"Ravi Evani\n              \n                \n                   \n    \n      \n    \n    \n      \n    \n\n • You","author_profile_url":"https://www.linkedin.com/in/ravievani","author_headline":"Deploying enterprise agents in production / CTO / SWE Leader / GVP @ Publicis Sapient","posted_time":"2025-06-27","posted_hours_ago":8760,"posted_time_raw":"1yr","post_url":"https://www.linkedin.com/feed/update/urn:li:activity:7320610058441003008","author_profile_image_url":"https://media.licdn.com/dms/image/v2/C4E03AQGNeJRorEd2Nw/profile-displayphoto-shrink_100_100/profile-displayphoto-shrink_100_100/0/1569287114631?e=1784160000&v=beta&t=tJDZC7EXWnlgIIf8kF7fBCajhF-HEgzNXnz_IIkjqW8","post_text":"Yesterday, I was stuck at ATL with a 7-hour flight delay. Time for some vibe coding.\n\nI’ve always wanted to reverse-engineer cool apps—figure out their features and map their use cases.\n\nSo I fired up Publicis Sapient hashtag#Slingshot + Google hashtag#Gemini 2.5 Pro.\n\nWhat I built:\n🔹 A tool that takes a GitHub repo, URL or local filepath\n🔹 Analyzes the codebase\n🔹 Outputs use case diagram of what the app actually does\n\n2 hours of vibe coding, 4 hours of refactoring.\n\nKey learning:\nMake code deterministic wherever possible. Let the LLM focus only on what it must—in this case, extracting use cases. Diagram layout, shape creation, text alignment? Script it. Don’t leave it to chance.\n\nMinimal LLM. Maximum consistency.\n\nHappy vibe coding.","post_image_url":"https://media.licdn.com/dms/image/v2/D4E05AQFc1De9XaVMqg/videocover-high/B4EZZgH9KOHEBk-/0/1745369439499?e=1783137600&v=beta&t=lmA7ZwCmcnrjpYgaLuhSot--chzSRUZlfIwdWN6M7mY","is_article":false,"article_url":null,"article_title":null,"article_description":null,"is_video":true,"video_url":"https://media.licdn.com/dms/image/v2/D4E05AQFc1De9XaVMqg/videocover-high/B4EZZgH9KOHEBk-/0/1745369439499?e=1783137600&v=beta&t=lmA7ZwCmcnrjpYgaLuhSot--chzSRUZlfIwdWN6M7mY","has_image":true,"reaction_count":66,"reaction_types":"LIKE, PRAISE, EMPATHY","comment_count":5,"impression_count":4269,"source":"activity"},{"is_my_post":true,"post_urn":"urn:li:activity:7318487821361577984","author_name":"Ravi Evani\n              \n                \n                   \n    \n      \n    \n    \n      \n    \n\n • You","author_profile_url":"https://www.linkedin.com/in/ravievani","author_headline":"Deploying enterprise agents in production / CTO / SWE Leader / GVP @ Publicis Sapient","posted_time":"2025-06-27","posted_hours_ago":8760,"posted_time_raw":"1yr","post_url":"https://www.linkedin.com/feed/update/urn:li:activity:7318487821361577984","author_profile_image_url":"https://media.licdn.com/dms/image/v2/C4E03AQGNeJRorEd2Nw/profile-displayphoto-shrink_100_100/profile-displayphoto-shrink_100_100/0/1569287114631?e=1784160000&v=beta&t=tJDZC7EXWnlgIIf8kF7fBCajhF-HEgzNXnz_IIkjqW8","post_text":"when your vibe coding agent does those numerous little extras way beyond the one thing you told it to do, remember that's a \"helpful\" upsell billed by the millisecond...","post_image_url":"https://media.licdn.com/dms/image/v2/D4E22AQHUywAMnKeiSA/feedshare-shrink_800/B4EZZB94nJGYAg-/0/1744863466961?e=1784160000&v=beta&t=lRjRcb5HlF5VvaTGYj90vkFAnptYidkl6foSByOVBPw","is_article":false,"article_url":null,"article_title":null,"article_description":null,"is_video":false,"video_url":null,"has_image":true,"reaction_count":19,"reaction_types":"LIKE, ENTERTAINMENT","comment_count":3,"impression_count":2022,"source":"activity"},{"is_my_post":true,"post_urn":"urn:li:activity:7318454409330319360","author_name":"Ravi Evani\n              \n                \n                   \n    \n      \n    \n    \n      \n    \n\n • You","author_profile_url":"https://www.linkedin.com/in/ravievani","author_headline":"Deploying enterprise agents in production / CTO / SWE Leader / GVP @ Publicis Sapient","posted_time":"2025-06-27","posted_hours_ago":8760,"posted_time_raw":"1yr","post_url":"https://www.linkedin.com/feed/update/urn:li:activity:7318454409330319360","author_profile_image_url":"https://media.licdn.com/dms/image/v2/C4E03AQGNeJRorEd2Nw/profile-displayphoto-shrink_100_100/profile-displayphoto-shrink_100_100/0/1569287114631?e=1784160000&v=beta&t=tJDZC7EXWnlgIIf8kF7fBCajhF-HEgzNXnz_IIkjqW8","post_text":"I posed this question a few months ago when there were far fewer models in play. Now, with model “upsells” becoming the norm and our increasing reliance on vibe coding, this trade-off is more relevant than ever—especially for large enterprises.","post_image_url":"https://media.licdn.com/dms/image/v2/D4E22AQFGIPTK2WMU9w/feedshare-shrink_800/feedshare-shrink_800/0/1728518677082?e=1784160000&v=beta&t=poXUOEnKL9vPIsLtMSKuama-5k1RrzbvcZgF_4fKixM","is_article":false,"article_url":null,"article_title":null,"article_description":null,"is_video":false,"video_url":null,"has_image":true,"reaction_count":2,"reaction_types":"LIKE","comment_count":1,"impression_count":275,"source":"activity"},{"is_my_post":true,"post_urn":"urn:li:activity:7316889358379155456","author_name":"Ravi Evani\n              \n                \n                   \n    \n      \n    \n    \n      \n    \n\n • You","author_profile_url":"https://www.linkedin.com/in/ravievani","author_headline":"Deploying enterprise agents in production / CTO / SWE Leader / GVP @ Publicis Sapient","posted_time":"2025-06-27","posted_hours_ago":8760,"posted_time_raw":"1yr","post_url":"https://www.linkedin.com/feed/update/urn:li:activity:7316889358379155456","author_profile_image_url":"https://media.licdn.com/dms/image/v2/C4E03AQGNeJRorEd2Nw/profile-displayphoto-shrink_100_100/profile-displayphoto-shrink_100_100/0/1569287114631?e=1784160000&v=beta&t=tJDZC7EXWnlgIIf8kF7fBCajhF-HEgzNXnz_IIkjqW8","post_text":"Now that hashtag#Google has launched ADK, I revisited the Airbnb hashtag#MCP use case from my earlier post https://lnkd.in/eisY5VDU, that showed how we used MCP to power a natural language property search.\n\nThis time, I explored what changes when you implement the same flow using ADK’s orchestration model.\n\nDifferent approaches. Same goal. Different trade-offs.\n\nHere’s a breakdown 👇\n\n🎯 Simple MCP Flow\n↳ LLM interprets the user query and chooses the tool\n↳ Script uses the MCP client to call the tool\n↳ Script sends the result back to the LLM for final response\n\n🎯 ADK MCP Flow\n↳ Agent Node (LLM + Toolbox) chooses the tool\n↳ ADK framework handles tool invocation (MCP under the hood)\n↳ Result flows through optional Format Node to final output\n\nMy take on the trade-offs:\n\nThe Simple MCP flow gives you full control. You’re handling the logic, tool orchestration, and logging directly through a Python script. It’s straightforward to prototype, easy to debug, and a great way to deeply understand how MCP sessions and tool calls work under the hood.\n\nBut that control comes at a cost. You’ll end up writing a lot of boilerplate — managing LLM prompts, interpreting responses, invoking tools, and stitching everything together manually. The orchestration logic is tightly coupled with your tool execution, and as workflows get more complex, maintaining that script becomes harder to scale.\n\nBy contrast, the ADK approach is more modular and scalable. The Agent Node combines LLM decision-making with a configured toolbox, while Format Nodes handle the response output. The orchestration is declarative — you connect nodes, and the framework handles the rest. It’s clean, reusable, and avoids the repetitive glue code.\n\nThat said, ADK introduces some abstraction. You don’t have line-by-line control over tool invocation — and the initial learning curve is higher. You’ll need to understand Pipelines, Nodes, and the framework’s mental model. But once you’re up and running, it’s far better suited for building complex, maintainable agentic applications.\n\nBottom line:\nSetting up an MCP integration is easy. Designing one that’s actually useful at scale is where it gets interesting. Start with a simple script to learn the flow. Move to ADK when you want modularity, reuse, and cleaner orchestration.","post_image_url":"https://media.licdn.com/dms/image/v2/D4E22AQEYcno81K0krQ/feedshare-shrink_800/B4EZYrQGYiGgAk-/0/1744482363447?e=1784160000&v=beta&t=Zj5buWQ8r_HrnguZT_p3-iq4lc_8MSVv3RghvjMlLm0","is_article":false,"article_url":null,"article_title":null,"article_description":null,"is_video":false,"video_url":null,"has_image":true,"reaction_count":52,"reaction_types":"LIKE, INTEREST, EMPATHY","comment_count":1,"impression_count":2820,"source":"activity"},{"is_my_post":true,"post_urn":"urn:li:activity:7316069692165480450","author_name":"Ravi Evani\n              \n                \n                   \n    \n      \n    \n    \n      \n    \n\n • You","author_profile_url":"https://www.linkedin.com/in/ravievani","author_headline":"Deploying enterprise agents in production / CTO / SWE Leader / GVP @ Publicis Sapient","posted_time":"2025-06-27","posted_hours_ago":8760,"posted_time_raw":"1yr","post_url":"https://www.linkedin.com/feed/update/urn:li:activity:7316069692165480450","author_profile_image_url":"https://media.licdn.com/dms/image/v2/C4E03AQGNeJRorEd2Nw/profile-displayphoto-shrink_100_100/profile-displayphoto-shrink_100_100/0/1569287114631?e=1784160000&v=beta&t=tJDZC7EXWnlgIIf8kF7fBCajhF-HEgzNXnz_IIkjqW8","post_text":"Publicis Sapient's Raghu Dubey gearing up for his big talk at Google Cloud Next '25 —spotlighting our Enterprise Agentic AI platform: Bodhi https://lnkd.in/eM--Wu6r.\n\nThe focus: Modernizing marketing with AI.\n\nWhat used to take several months can now be orchestrated and scaled in a fraction of the time—powered by Bodhi's modular and agentic orchestration capabilities.\n\nIn the marketing transformation space, Bodhi accelerates everything from Customer Engagement to Content Pipelines, to Multimodal compliance checks.\n\nNow, with hashtag#MCP and Google's Agentspace in the mix, we’re plugging Bodhi's enterprise agentic layer into a broader ecosystem of agents—unlocking disproportionate value for our customers.","post_image_url":"https://media.licdn.com/dms/image/v2/D4E05AQHiKvA-diWbnw/videocover-low/B4EZYfmWXnGYCU-/0/1744286926169?e=1783137600&v=beta&t=7lu6zbVSGDcWubScoqaxUvPl9ube3dsFq7aqO_2ECEI","is_article":false,"article_url":null,"article_title":null,"article_description":null,"is_video":true,"video_url":"https://media.licdn.com/dms/image/v2/D4E05AQHiKvA-diWbnw/videocover-low/B4EZYfmWXnGYCU-/0/1744286926169?e=1783137600&v=beta&t=7lu6zbVSGDcWubScoqaxUvPl9ube3dsFq7aqO_2ECEI","has_image":true,"reaction_count":182,"reaction_types":"LIKE, PRAISE, EMPATHY","comment_count":3,"impression_count":7571,"source":"activity"},{"is_my_post":true,"post_urn":"urn:li:activity:7315144379076083712","author_name":"Ravi Evani\n              \n                \n                   \n    \n      \n    \n    \n      \n    \n\n • You","author_profile_url":"https://www.linkedin.com/in/ravievani","author_headline":"Deploying enterprise agents in production / CTO / SWE Leader / GVP @ Publicis Sapient","posted_time":"2025-06-27","posted_hours_ago":8760,"posted_time_raw":"1yr","post_url":"https://www.linkedin.com/feed/update/urn:li:activity:7315144379076083712","author_profile_image_url":"https://media.licdn.com/dms/image/v2/C4E03AQGNeJRorEd2Nw/profile-displayphoto-shrink_100_100/profile-displayphoto-shrink_100_100/0/1569287114631?e=1784160000&v=beta&t=tJDZC7EXWnlgIIf8kF7fBCajhF-HEgzNXnz_IIkjqW8","post_text":"If your app is going truly global, you will likely need a region and a language switcher to transact in that local region.\n\nHere we use Publicis Sapient hashtag#Slingshot AI SDLC platform to build a region and language switcher for a Mock Global Restaurant Android app.\n\nThe goal is simple: when a customer travels, they should be able to switch to the local region and language to view the correct menu and ordering options.\n\n↳ We start with mockup screens that we want to use to build this functionality. These screenshots are uploaded into Slingshot, along with functional instructions.\n↳ Slingshot interprets the visuals and prompts using our Enterprise Prompt Library, which includes standards for functionality, architecture, and non-functional requirements—like performance, localization, accessibility, security, privacy, and testing.\n↳ Slingshot starts generating code in Kotlin.\n↳ It sets up the project, adds dependencies, creates navigation fragments, and builds out the layouts—including all UI elements like text views, image views, and buttons.\n\nThen it generates:\n↳ A list of regions\n↳ View fragments\n↳ Adapters (like the menu adapter and region adapter)\n↳ Data classes for the region structure\n\n↳ Once that’s done, we verify all imports and dependencies, accept the changes, and save the files.\n\n↳ Next, we instruct Slingshot to generate unit and UI test cases. It adds the required testing dependencies, then generates the tests following our internal standards. We validate the tests, build the app, and run both the unit and UI tests—all of which pass successfully.\n\n↳ Finally, we validate the end-to-end functionality.\n\nThat’s it—we go from screenshots to a fully functional Android country and language switcher for a global mock restaurant app, delivered in under two hours by Devishankar Ramasamy using Slingshot.","post_image_url":"https://media.licdn.com/dms/image/v2/D4E05AQEem7N1LHe3GA/videocover-low/B4EZYSc3d9GgCM-/0/1744066304095?e=1783137600&v=beta&t=J6brdbAhhcUyLuxOGkEv5GOyvH2C_6Fk2Y9C8KayqYc","is_article":false,"article_url":null,"article_title":null,"article_description":null,"is_video":true,"video_url":"https://media.licdn.com/dms/image/v2/D4E05AQEem7N1LHe3GA/videocover-low/B4EZYSc3d9GgCM-/0/1744066304095?e=1783137600&v=beta&t=J6brdbAhhcUyLuxOGkEv5GOyvH2C_6Fk2Y9C8KayqYc","has_image":true,"reaction_count":49,"reaction_types":"LIKE, EMPATHY, PRAISE","impression_count":2415,"source":"activity"},{"is_my_post":true,"post_urn":"urn:li:activity:7314625291455201281","author_name":"Ravi Evani\n              \n                \n                   \n    \n      \n    \n    \n      \n    \n\n • You","author_profile_url":"https://www.linkedin.com/in/ravievani","author_headline":"Deploying enterprise agents in production / CTO / SWE Leader / GVP @ Publicis Sapient","posted_time":"2025-06-27","posted_hours_ago":8760,"posted_time_raw":"1yr","post_url":"https://www.linkedin.com/feed/update/urn:li:activity:7314625291455201281","author_profile_image_url":"https://media.licdn.com/dms/image/v2/C4E03AQGNeJRorEd2Nw/profile-displayphoto-shrink_100_100/profile-displayphoto-shrink_100_100/0/1569287114631?e=1784160000&v=beta&t=tJDZC7EXWnlgIIf8kF7fBCajhF-HEgzNXnz_IIkjqW8","post_text":"🦊🐢 Vibe Mode + Human Mode: Engage both sides of your coding brain!\n\nOne moves fast, driven by intuition, creativity, and prompts.\nThe other moves steady—grounded in structure, design, and experience.\n\nTogether? They ship code that works and lasts.\n\nWhether you’re riding on vibes or refining with intent, the magic happens when both modes get a seat at the table (or a pedal on the bike 🚲).\n\nWhich mode (aka mood) are you in today?","post_image_url":"https://media.licdn.com/dms/image/v2/D4E05AQG0dwsyQTrF0Q/videocover-high/B4EZYLE6NEHcBs-/0/1743942564269?e=1783137600&v=beta&t=S6AstwTEgFSIrl4tXkuDPysr5kgMFxI9ip_KAGsRyCg","is_article":false,"article_url":null,"article_title":null,"article_description":null,"is_video":true,"video_url":"https://media.licdn.com/dms/image/v2/D4E05AQG0dwsyQTrF0Q/videocover-high/B4EZYLE6NEHcBs-/0/1743942564269?e=1783137600&v=beta&t=S6AstwTEgFSIrl4tXkuDPysr5kgMFxI9ip_KAGsRyCg","has_image":true,"reaction_count":14,"reaction_types":"LIKE","comment_count":1,"impression_count":1253,"source":"activity"},{"is_my_post":true,"post_urn":"urn:li:activity:7314288378881978369","author_name":"Ravi Evani\n              \n                \n                   \n    \n      \n    \n    \n      \n    \n\n • You","author_profile_url":"https://www.linkedin.com/in/ravievani","author_headline":"Deploying enterprise agents in production / CTO / SWE Leader / GVP @ Publicis Sapient","posted_time":"2025-06-27","posted_hours_ago":8760,"posted_time_raw":"1yr","post_url":"https://www.linkedin.com/feed/update/urn:li:activity:7314288378881978369","author_profile_image_url":"https://media.licdn.com/dms/image/v2/C4E03AQGNeJRorEd2Nw/profile-displayphoto-shrink_100_100/profile-displayphoto-shrink_100_100/0/1569287114631?e=1784160000&v=beta&t=tJDZC7EXWnlgIIf8kF7fBCajhF-HEgzNXnz_IIkjqW8","post_text":"We’re using Publicis Sapient Slingshot AI SDLC platform to build a goal-setting screen for the customer-facing iOS app of a mock investment bank.\n\nThe idea is simple: let customers set financial goals to support their planning.\n\nThis app is built in SwiftUI, and we’re starting with a Figma design of the screen. First, we upload the Figma file into Slingshot. Then, using Enterprise prompt libraries, context, and architectural patterns, Slingshot auto-generates the code.\n\n↳ Sets up the project structure\n↳ Defines the data model and sample data\n↳ Creates the network layer and repository for backend integration\n↳ Builds the view model\n↳ Generates the SwiftUI view\n↳ Adds mock and unit tests\n↳ And finally, the handling for asset loading for images and icons\n\nOnce the code is generated, we go file by file, do a quick sanity check, fix any major issues, and load it in Xcode.\n\nLive in Xcode, you’ll see:\n↳ The header appear\n↳ Buttons render\n↳ A carousel of suggested goals\n↳ Images load in\n↳ A list of all goals the user can select\n↳ And finally, UI icons and interactions get validated\n\n🎯 All in, we go from Figma to functional SwiftUI screen for a financial app — in just a few minutes.","post_image_url":"https://media.licdn.com/dms/image/v2/D4E05AQH62BwR7KZUuw/videocover-low/B4EZYGScj.HMCM-/0/1743862229766?e=1783137600&v=beta&t=q6VUuugDyE89DKOz5HeS6J_Tv6GmJsDkdXRdanc7bPU","is_article":false,"article_url":null,"article_title":null,"article_description":null,"is_video":true,"video_url":"https://media.licdn.com/dms/image/v2/D4E05AQH62BwR7KZUuw/videocover-low/B4EZYGScj.HMCM-/0/1743862229766?e=1783137600&v=beta&t=q6VUuugDyE89DKOz5HeS6J_Tv6GmJsDkdXRdanc7bPU","has_image":true,"reaction_count":210,"reaction_types":"LIKE, PRAISE, EMPATHY","comment_count":12,"repost_count":13,"impression_count":18353,"source":"activity"},{"is_my_post":true,"post_urn":"urn:li:activity:7313917838958723072","author_name":"Ravi Evani\n              \n                \n                   \n    \n      \n    \n    \n      \n    \n\n • You","author_profile_url":"https://www.linkedin.com/in/ravievani","author_headline":"Deploying enterprise agents in production / CTO / SWE Leader / GVP @ Publicis Sapient","posted_time":"2025-06-27","posted_hours_ago":8760,"posted_time_raw":"1yr","post_url":"https://www.linkedin.com/feed/update/urn:li:activity:7313917838958723072","author_profile_image_url":"https://media.licdn.com/dms/image/v2/C4E03AQGNeJRorEd2Nw/profile-displayphoto-shrink_100_100/profile-displayphoto-shrink_100_100/0/1569287114631?e=1784160000&v=beta&t=tJDZC7EXWnlgIIf8kF7fBCajhF-HEgzNXnz_IIkjqW8","post_text":"Customer support isn’t where you cut your teeth on agentic AI—it’s where you double down on being human.","post_image_url":"https://media.licdn.com/dms/image/v2/D4D22AQGnSF09EW3-ag/feedshare-shrink_800/B4DZYBBhNvG4Ag-/0/1743773898311?e=1784160000&v=beta&t=f0Mgg_RP1sFmbcC7dpyaG1verUL5d6ZmlPqX54gmwDE","is_article":false,"article_url":null,"article_title":null,"article_description":null,"is_video":false,"video_url":null,"has_image":true,"reaction_count":10,"reaction_types":"LIKE","impression_count":811,"source":"activity"},{"is_my_post":true,"post_urn":"urn:li:activity:7307329652304273408","author_name":"Ravi Evani\n              \n                \n                   \n    \n      \n    \n    \n      \n    \n\n • You","author_profile_url":"https://www.linkedin.com/in/ravievani","author_headline":"Deploying enterprise agents in production / CTO / SWE Leader / GVP @ Publicis Sapient","posted_time":"2025-06-27","posted_hours_ago":8760,"posted_time_raw":"1yr","post_url":"https://www.linkedin.com/feed/update/urn:li:activity:7307329652304273408","author_profile_image_url":"https://media.licdn.com/dms/image/v2/C4E03AQGNeJRorEd2Nw/profile-displayphoto-shrink_100_100/profile-displayphoto-shrink_100_100/0/1569287114631?e=1784160000&v=beta&t=tJDZC7EXWnlgIIf8kF7fBCajhF-HEgzNXnz_IIkjqW8","post_text":"Most AI tools today focus on individual productivity—but enterprise software development is a team sport. It’s messy, full of legacy code, shifting requirements, business constraints, and trade-offs that demand human judgment.\n\nWith Publicis Sapient hashtag#Slingshot, we took a different approach than the usual copilots. Instead of treating Gen AI as a plugin or an isolated tool, we mapped out every phase of the SDLC and built a platform—a foundational layer that supports IDE integrations, web interfaces, and workflow-based agents.\n\nThe result? A holistic Gen AI-driven ecosystem that enhances 70-80% of our processes, improving productivity, quality, and value—not just for individuals, but for entire teams.\n\nPunit, Laura, and I discuss the vision behind Slingshot and why it’s been such a successful AI Assisted SDLC platform for our teams and our clients.","post_image_url":"https://media.licdn.com/dms/image/v2/D4E05AQEl9ud3CySgTQ/videocover-high/B4EZWjY5LqG0Bw-/0/1742203130966?e=1783137600&v=beta&t=ccT5_-ncqP0icbUrkHt-YClMRj5bV_8dKSjgf1itObU","is_article":false,"article_url":null,"article_title":null,"article_description":null,"is_video":true,"video_url":"https://media.licdn.com/dms/image/v2/D4E05AQEl9ud3CySgTQ/videocover-high/B4EZWjY5LqG0Bw-/0/1742203130966?e=1783137600&v=beta&t=ccT5_-ncqP0icbUrkHt-YClMRj5bV_8dKSjgf1itObU","has_image":true,"reaction_count":80,"reaction_types":"LIKE, PRAISE, EMPATHY","repost_count":5,"impression_count":5699,"source":"activity"},{"is_my_post":true,"post_urn":"urn:li:activity:7306676262054359040","author_name":"Ravi Evani\n              \n                \n                   \n    \n      \n    \n    \n      \n    \n\n • You","author_profile_url":"https://www.linkedin.com/in/ravievani","author_headline":"Deploying enterprise agents in production / CTO / SWE Leader / GVP @ Publicis Sapient","posted_time":"2025-06-27","posted_hours_ago":8760,"posted_time_raw":"1yr","post_url":"https://www.linkedin.com/feed/update/urn:li:activity:7306676262054359040","author_profile_image_url":"https://media.licdn.com/dms/image/v2/C4E03AQGNeJRorEd2Nw/profile-displayphoto-shrink_100_100/profile-displayphoto-shrink_100_100/0/1569287114631?e=1784160000&v=beta&t=tJDZC7EXWnlgIIf8kF7fBCajhF-HEgzNXnz_IIkjqW8","post_text":"Swapped my usual Saturday morning TV for something better—watching AI build my weekend project while enjoying delicious Maggi (courtesy of my wife). Way more entertaining than I expected!","post_image_url":"https://media.licdn.com/dms/image/v2/D4E05AQF3_3wbEHDZ7g/videocover-high/B4EZWaHLWxHMBs-/0/1742047356836?e=1783137600&v=beta&t=JBcQFeBVUdKLlA2H5hCVPUAliWgd0QUAwWUOMwIkup4","is_article":false,"article_url":null,"article_title":null,"article_description":null,"is_video":true,"video_url":"https://media.licdn.com/dms/image/v2/D4E05AQF3_3wbEHDZ7g/videocover-high/B4EZWaHLWxHMBs-/0/1742047356836?e=1783137600&v=beta&t=JBcQFeBVUdKLlA2H5hCVPUAliWgd0QUAwWUOMwIkup4","has_image":true,"reaction_count":26,"reaction_types":"LIKE","comment_count":1,"impression_count":2019,"source":"activity"},{"is_my_post":true,"post_urn":"urn:li:activity:7306203459119161344","author_name":"Ravi Evani\n              \n                \n                   \n    \n      \n    \n    \n      \n    \n\n • You","author_profile_url":"https://www.linkedin.com/in/ravievani","author_headline":"Deploying enterprise agents in production / CTO / SWE Leader / GVP @ Publicis Sapient","posted_time":"2025-06-27","posted_hours_ago":8760,"posted_time_raw":"1yr","post_url":"https://www.linkedin.com/feed/update/urn:li:activity:7306203459119161344","author_profile_image_url":"https://media.licdn.com/dms/image/v2/C4E03AQGNeJRorEd2Nw/profile-displayphoto-shrink_100_100/profile-displayphoto-shrink_100_100/0/1569287114631?e=1784160000&v=beta&t=tJDZC7EXWnlgIIf8kF7fBCajhF-HEgzNXnz_IIkjqW8","post_text":"Say goodbye to months of painful technical debt reduction.\n\nMurtaza Zaidi , Kevin Thomas and Caela Alexie Intertas \"generate\" a hashtag#LangGraph ai agent that converts an Angular app to React in 5 minutes flat.\n\nThis demo shows the conversion of an Airbnb clone—complete with image carousels, property listings, and backend connections. Everything worked well after conversion.\n\nWhat stood out to me was the ai-driven, human-assisted handling of the complex dependency graph mapping and iterative conversion process.\n\nThis sort of human/ai collaboration could help enterprises tackle technical debt at unprecedented speed while minimizing risk and freeing up developer resources for innovation.","post_image_url":"https://media.licdn.com/dms/image/v2/D4D05AQHr3gIOY73kQA/feedshare-thumbnail_720_1280/B4DZWTY67sG4BA-/0/1741934541716?e=1783137600&v=beta&t=lh8Yup28d5wMklQks389kdKgG0EcuZOogMklcHzdezc","is_article":false,"article_url":null,"article_title":null,"article_description":null,"is_video":true,"video_url":"https://media.licdn.com/dms/image/v2/D4D05AQHr3gIOY73kQA/feedshare-thumbnail_720_1280/B4DZWTY67sG4BA-/0/1741934541716?e=1783137600&v=beta&t=lh8Yup28d5wMklQks389kdKgG0EcuZOogMklcHzdezc","has_image":true,"reaction_count":77,"reaction_types":"LIKE, PRAISE","repost_count":7,"impression_count":5265,"source":"activity"},{"is_my_post":true,"post_urn":"urn:li:activity:7305180137703034881","author_name":"Ravi Evani\n              \n                \n                   \n    \n      \n    \n    \n      \n    \n\n • You","author_profile_url":"https://www.linkedin.com/in/ravievani","author_headline":"Deploying enterprise agents in production / CTO / SWE Leader / GVP @ Publicis Sapient","posted_time":"2025-06-27","posted_hours_ago":8760,"posted_time_raw":"1yr","post_url":"https://www.linkedin.com/feed/update/urn:li:activity:7305180137703034881","author_profile_image_url":"https://media.licdn.com/dms/image/v2/C4E03AQGNeJRorEd2Nw/profile-displayphoto-shrink_100_100/profile-displayphoto-shrink_100_100/0/1569287114631?e=1784160000&v=beta&t=tJDZC7EXWnlgIIf8kF7fBCajhF-HEgzNXnz_IIkjqW8","post_text":"Cloud costs could get out of control fast. This \"generated\" hashtag#n8n agent, monitors spending in real-time, tracks cost spikes, and flags misconfigurations—before they blow your budget.","post_image_url":"https://media.licdn.com/dms/image/v2/D4E05AQEOGsQzsH7Hfw/videocover-high/B4EZWE2kkwHgB8-/0/1741690656476?e=1783137600&v=beta&t=i-927XbMqi_CZqDXiwNsF0L4jvMJoriz-v59POVzwR0","is_article":false,"article_url":null,"article_title":null,"article_description":null,"is_video":true,"video_url":"https://media.licdn.com/dms/image/v2/D4E05AQEOGsQzsH7Hfw/videocover-high/B4EZWE2kkwHgB8-/0/1741690656476?e=1783137600&v=beta&t=i-927XbMqi_CZqDXiwNsF0L4jvMJoriz-v59POVzwR0","has_image":true,"reaction_count":38,"reaction_types":"LIKE, INTEREST, PRAISE","impression_count":1849,"source":"activity"},{"is_my_post":true,"post_urn":"urn:li:activity:7303018623424499713","author_name":"Ravi Evani\n              \n                \n                   \n    \n      \n    \n    \n      \n    \n\n • You","author_profile_url":"https://www.linkedin.com/in/ravievani","author_headline":"Deploying enterprise agents in production / CTO / SWE Leader / GVP @ Publicis Sapient","posted_time":"2025-06-27","posted_hours_ago":8760,"posted_time_raw":"1yr","post_url":"https://www.linkedin.com/feed/update/urn:li:activity:7303018623424499713","author_profile_image_url":"https://media.licdn.com/dms/image/v2/C4E03AQGNeJRorEd2Nw/profile-displayphoto-shrink_100_100/profile-displayphoto-shrink_100_100/0/1569287114631?e=1784160000&v=beta&t=tJDZC7EXWnlgIIf8kF7fBCajhF-HEgzNXnz_IIkjqW8","post_text":"Most default AI-generated code isn’t enterprise-ready—because it’s performance blind.\n\nWe ran a simple experiment where we had the same LLM converting a PL/pgSQL data analytics job to PySpark. We generated two versions of the Job in PySpark using slightly different approaches.\n\n① Job v1 codebase(Optimized): Generated with SME-engineered prompts + real enterprise context (record sizes, performance configs, resource limits, execution history).\n② Job v2 codebase(Non-Optimized): Generated with novice prompts (no SME guidance) or workload awareness.\n\nThe result?\n⚡ The SME prompt engineered, context-aware AI generated code (Job v1) ran ~5x faster and was ~3x more efficient—while the default AI-generated job wasted compute, inflated cloud costs, and slowed down execution.\n\n🤔 Now imagine this inefficiency at scale across your engineering teams.\n\nThe takeaway?\nEnterprises can’t rely on generic AI codegen tools alone. Without a system to capture SME expertise and real-world enterprise context, AI-generated code becomes a liability instead of an advantage:\n\n✘ Proliferation of inefficient, low-performing code\n✘ Soaring cloud & infrastructure costs\n✘ Stability and reliability risks at scale\n\nWhat’s needed instead?\n☑ A system to capture and operationalize SME-engineered prompts at scale\n☑ AI that binds code generation to real-world workload parameters\n☑ Built-in performance, maintainability, and cost efficiency\n\nWithout this, AI-powered coding at scale creates more problems than it solves for Enterprises.","post_image_url":"https://media.licdn.com/dms/image/v2/D4D05AQGX6j9twbCDoQ/videocover-high/B4DZVmIrYXHIBw-/0/1741175314093?e=1783137600&v=beta&t=cWIZi15cYjmUGCGc0k9cdQFmIfg8V0Jz0uE_Umkg1aw","is_article":false,"article_url":null,"article_title":null,"article_description":null,"is_video":true,"video_url":"https://media.licdn.com/dms/image/v2/D4D05AQGX6j9twbCDoQ/videocover-high/B4DZVmIrYXHIBw-/0/1741175314093?e=1783137600&v=beta&t=cWIZi15cYjmUGCGc0k9cdQFmIfg8V0Jz0uE_Umkg1aw","has_image":true,"reaction_count":39,"reaction_types":"LIKE, INTEREST, PRAISE","comment_count":1,"impression_count":2421,"source":"activity"},{"is_my_post":true,"post_urn":"urn:li:activity:7302299116242436096","author_name":"Ravi Evani\n              \n                \n                   \n    \n      \n    \n    \n      \n    \n\n • You","author_profile_url":"https://www.linkedin.com/in/ravievani","author_headline":"Deploying enterprise agents in production / CTO / SWE Leader / GVP @ Publicis Sapient","posted_time":"2025-06-27","posted_hours_ago":8760,"posted_time_raw":"1yr","post_url":"https://www.linkedin.com/feed/update/urn:li:activity:7302299116242436096","author_profile_image_url":"https://media.licdn.com/dms/image/v2/C4E03AQGNeJRorEd2Nw/profile-displayphoto-shrink_100_100/profile-displayphoto-shrink_100_100/0/1569287114631?e=1784160000&v=beta&t=tJDZC7EXWnlgIIf8kF7fBCajhF-HEgzNXnz_IIkjqW8","post_text":"A key challenge in cloud infrastructure provisioning, especially with compute resources, is with getting the sizing right. If we undersize, we risk performance bottlenecks, slowdowns, and system failures. And if we oversize, and we waste resources and drive up unnecessary cloud costs.\n\nHere’s a hashtag#LangGraph agent built by one of our Publicis Sapient engineers Thomas Hari Budihardjo using our hashtag#Slingshot hashtag#AI SDLC platform, to provision hashtag#AWS cloud resources and deploy applications—intelligently.\n\nThis solution eliminates the guesswork in DevOps, making cloud provisioning more efficient, cost-effective, and performance-optimized—creating a feedback loop of continuous improvement that balances operational excellence and cost management.","post_image_url":"https://media.licdn.com/dms/image/v2/D4E05AQGBjoMkfkAV8Q/feedshare-thumbnail_720_1280/B4EZVb6CONG0A8-/0/1741003696342?e=1783137600&v=beta&t=0SSN2CUgese-CJ-xhBfoYAqhF8Q4-9r8LiJHdLWolLM","is_article":false,"article_url":null,"article_title":null,"article_description":null,"is_video":true,"video_url":"https://media.licdn.com/dms/image/v2/D4E05AQGBjoMkfkAV8Q/feedshare-thumbnail_720_1280/B4EZVb6CONG0A8-/0/1741003696342?e=1783137600&v=beta&t=0SSN2CUgese-CJ-xhBfoYAqhF8Q4-9r8LiJHdLWolLM","has_image":true,"reaction_count":59,"reac
