er, like a ChatGPT environment, that already knows a lot about you and your ongoing needs.\n\nExample: Booking Travel Within a Conversation\nImagine you’re casually discussing a vacation idea. You’re chatting away, exploring destinations, and then you just say, “Hey, book that.” If the app is merely a standalone tool, it will only know what you explicitly told it. But if it’s tapping into a broader intelligence that remembers the entire conversation history, your preferences, and even past trips, it can personalize that booking with minimal steps.\n\nPersonalization Through Larger Context\nThis is the real magic: personalization at scale. Instead of relying on a tiny slice of user data, you’re drawing on a much broader pool of context. The app can pull in (or get pushed) your travel history, your chat history, and even other apps’ insights to shape a seamless, context-rich experience. It’s about letting the intelligence flow like a river, allowing apps to communicate and share context naturally rather than forcing users to repeatedly input data.\n\nThe New Paradigm: Context Engineering and Beyond\nThis shift is about a whole new layer of engineering. We’ll need to think about how we engineer the context itself—how we build bridges between these pockets of intelligence and let apps seamlessly tap into them. It’s a design and engineering challenge, but it opens up possibilities that are fundamentally more fluid and personal than anything we’ve done before.","post_url":"https://www.linkedin.com/feed/update/urn:li:activity:7381841742548856832","post_urn":"urn:li:activity:7381841742548856832","posted_hours_ago":5760,"posted_time":"2025-10-25","posted_time_raw":"8mo","reaction_count":16,"reaction_types":"LIKE, INTEREST","source":"activity","video_url":null},{"article_description":null,"article_title":null,"article_url":null,"author_headline":"Deploying enterprise agents in production / CTO / SWE Leader / GVP @ Publicis Sapient","author_name":"Ravi Evani\n              \n                \n                   \n    \n      \n    \n    \n      \n    \n\n • You","author_profile_image_url":"https://media.licdn.com/dms/image/v2/C4E03AQGNeJRorEd2Nw/profile-displayphoto-shrink_100_100/profile-displayphoto-shrink_100_100/0/1569287114631?e=1784160000&v=beta&t=tJDZC7EXWnlgIIf8kF7fBCajhF-HEgzNXnz_IIkjqW8","author_profile_url":"https://www.linkedin.com/in/ravievani","comment_count":2,"has_image":false,"impression_count":2251,"is_article":false,"is_my_post":true,"is_video":false,"post_image_url":null,"post_text":"So OTA apps are moving inside \"Chat\". But hotel brands shouldn't simply follow suit and \"duplicate\" their apps inside ChatGPT. They should ship an agent surface, not a clone.\n\nWhere this is going:\n\n➜ Apps will live inside personal intelligence. Travel agents (the AI kind) will carry your context—budget, loyalty, trip purpose, companions—across apps and pre-filter results before you ask.\n\n➜ Shared context across apps. Calendar, flights, maps, and corporate policy inform the same session. The user’s intent flows; the app is just the surface.\nBeyond text. Voice, map overlays, and interactive components become the primary controls; text is auxiliary.\n\n➜ Shareable “intelligence objects.” Guests (or their corporate agents) can share dietary needs, accessibility preferences, and policy constraints once; every downstream app honors them.\n\nWhat hotels should do now:\n\n➜ Structure your inventory and claims. Amenities, walk times, room attributes, sustainability badges, F&B hours—all as verifiable, machine-readable data.\n\n➜ Expose instant booking and pricing APIs. Support real-time availability, hold/commit flows, and clear cancellation policies.\n\n➜ Publish preference and policy hooks. Accept guest/corporate profiles with consented attributes; return explanations aligned to those inputs.\n\n➜ Instrument for “time-to-shortlist.” Optimize for how fast a qualified guest reaches 3 viable options, not raw search volume.\n\n➜ Invest in agent UX. Build a lightweight agent that sits in this shared-intelligence layer: clarify trade-offs, justify recommendations, and complete the booking.\n\nThink broader than ChatGPT as another channel. Build for the agent layer first--then package that capability as your Chat app.","post_url":"https://www.linkedin.com/feed/update/urn:li:activity:7381443030387417088","post_urn":"urn:li:activity:7381443030387417088","posted_hours_ago":5760,"posted_time":"2025-10-25","posted_time_raw":"8mo","reaction_count":15,"reaction_types":"LIKE, INTEREST","repost_count":1,"source":"activity","video_url":null},{"article_description":null,"article_title":null,"article_url":null,"author_headline":"Deploying enterprise agents in production / CTO / SWE Leader / GVP @ Publicis Sapient","author_name":"Ravi Evani\n              \n                \n                   \n    \n      \n    \n    \n      \n    \n\n • You","author_profile_image_url":"https://media.licdn.com/dms/image/v2/C4E03AQGNeJRorEd2Nw/profile-displayphoto-shrink_100_100/profile-displayphoto-shrink_100_100/0/1569287114631?e=1784160000&v=beta&t=tJDZC7EXWnlgIIf8kF7fBCajhF-HEgzNXnz_IIkjqW8","author_profile_url":"https://www.linkedin.com/in/ravievani","comment_count":1,"has_image":true,"impression_count":1900,"is_article":false,"is_my_post":true,"is_video":true,"post_image_url":"https://media.licdn.com/dms/image/v2/D4E05AQFWV8abu7eRjQ/videocover-low/B4EZm83gE0KoB4-/0/1759810345228?e=1783008000&v=beta&t=vsrtv2yBZCmgHG2IKDxrBeINzGW3ieFE1JTXUvZqIb4","post_text":"From apps with intelligence → apps inside your intelligence. I used the newly released ChatGPT Figma app to auto‑generate a non‑trivial system diagram.\n\nIt threw a few errors and needed cleanup, but it compressed 2–3 hours of work into ~10 minutes—good enough to iterate on.\n\nSome thoughts come to mind from this experience:\n\n1) High‑fidelity capture → faster creation: We can translate \"rough thoughts\" into \"real structures\" with much higher fidelity than before.\n2) Apps become personal: Because the system already knows your work and preferences, outputs take on your context, producing a more personal “feel”.\n3) From apps with intelligence → apps inside your intelligence: We’re moving from intelligence living inside individual apps to apps living inside a persistent layer of personal intelligence, enabling connected experiences across tools.\n4) Shared context across apps: Inter‑app communication inside ChatGPT means tools can understand the same thread and coordinate toward outcomes, not just features.\n5) Agents travel with you: Your agents persist across contexts and, at enterprise scale, operate within a shared intelligence layer that teams work inside.\n6) Beyond chat UX: Interaction isn’t just text; think interactive, multimodal experiences—voice, vision, and UI components—running on a common “LLM OS” layer.\n7) Apps for humans and agents: Some apps will target people, others will target agents—and we’ll be able to selectively share pieces of our intelligence with collaborators or their agents when needed.","post_url":"https://www.linkedin.com/feed/update/urn:li:activity:7381179624732540928","post_urn":"urn:li:activity:7381179624732540928","posted_hours_ago":5760,"posted_time":"2025-10-25","posted_time_raw":"8mo","reaction_count":19,"reaction_types":"LIKE","source":"activity","video_url":"https://media.licdn.com/dms/image/v2/D4E05AQFWV8abu7eRjQ/videocover-low/B4EZm83gE0KoB4-/0/1759810345228?e=1783008000&v=beta&t=vsrtv2yBZCmgHG2IKDxrBeINzGW3ieFE1JTXUvZqIb4"},{"article_description":"Shadcn Blocks – Full-Stack UI Components & Templates | Cult UI Pro\npro.cult-ui.com","article_title":"Shadcn Blocks – Full-Stack UI Components & Templates | Cult UI Pro","article_url":"https://pro.cult-ui.com/blocks","author_headline":"Deploying enterprise agents in production / CTO / SWE Leader / GVP @ Publicis Sapient","author_name":"Ravi Evani\n              \n                \n                   \n    \n      \n    \n    \n      \n    \n\n • You","author_profile_image_url":"https://media.licdn.com/dms/image/v2/C4E03AQGNeJRorEd2Nw/profile-displayphoto-shrink_100_100/profile-displayphoto-shrink_100_100/0/1569287114631?e=1784160000&v=beta&t=tJDZC7EXWnlgIIf8kF7fBCajhF-HEgzNXnz_IIkjqW8","author_profile_url":"https://www.linkedin.com/in/ravievani","comment_count":1,"has_image":true,"impression_count":2079,"is_article":true,"is_my_post":true,"is_video":false,"post_image_url":"https://media.licdn.com/dms/image/sync/v2/D5627AQFadGcELPAs8Q/articleshare-shrink_480/B56ZbOVetlHgAs-/0/1747218459882?e=1783008000&v=beta&t=3iNa9PovZK_yfzQ4w8wCXo70KY0VY6jAelYnmjD2MuE","post_text":"Cult UI (https://pro.cult-ui.com/) is doing something interesting--selling copy-paste, full-stack “Blocks” that live in your repo. For travel and hospitality (T&H) teams building agentic user interfaces, that matters.\n\nWe’ve chased “LEGO for software” for years, but it never stuck in this industry. Every airline, hotel, and OTA claimed unicorn requirements—fare families, room types, ancillaries, loyalty tiers—which pushed teams to fork frameworks and rebuild. Old accelerators were either too opinionated or too thin, and the integration tax wiped out any speed you gained.\n\nBlocks + AI prompts change the equation. With contract-first components (clear props/DTOs, events, side-effects) you compose capability instead of forking code. Because blocks are copy-paste and in-repo, prompts can actually do the last-mile work: map intent to a catalog, generate the glue (routing, state, auth), scaffold tests and telemetry, and apply policy checks at compose time.\n\nSchema- and token-driven configs let the AI reshape UI and behavior without exploding variants, while provenance/SBOM and rollout guards keep upgrades predictable.\n\nYou can feel this in real T&H flows. A booking experience becomes a set of composable primitives—date grids, room/fare comparison, add-ons, bundle pricing—stitched to PMS/CRS/GDS and payments. Service recovery moves from bespoke workflows to reusable blocks that detect disruption, apply waivers or room moves, and coordinate guest comms. Loyalty and merchandising become configurable surfaces for points-and-cash, targeted upsell, and status perks. Ops UIs for associates and crew turn into agentic panels that prioritize work, trigger refunds/comp, and close the loop with messaging. Prompts assemble the blocks and drop in the connectors; engineers fine-tune where needed.\n\nThis also creates a new niche: component service providers that sell or rent verticalized blocks—booking cards, ancillaries, loyalty widgets, recovery flows—with SLAs, security attestations, and version support. Around them emerges BlockOps: usage metering, error analytics, assisted upgrades, and AI-tuning data. Expect “catalog curators” who certify compatibility with design systems and PMS/GDS adapters, and who operate prompt-to-assembly pipelines for brands that want speed without lock-in.\n\nIf you are an engineering leader, consider treating blocks as a product surface. Stand up a registry and contracts, wire a prompt library that maps intents to blocks, enforce compose-time policy and tests, and set an upgrade policy (canary, rollback, semver) from day one. Start with one high-leverage flow—service recovery or ancillaries--prove the path, then scale.","post_url":"https://www.linkedin.com/feed/update/urn:li:activity:7380631785594068992","post_urn":"urn:li:activity:7380631785594068992","posted_hours_ago":5760,"posted_time":"2025-10-25","posted_time_raw":"8mo","reaction_count":20,"reaction_types":"LIKE, INTEREST","repost_count":1,"source":"activity","video_url":null},{"article_description":null,"article_title":null,"article_url":null,"author_headline":"Deploying enterprise agents in production / CTO / SWE Leader / GVP @ Publicis Sapient","author_name":"Ravi Evani\n              \n                \n                   \n    \n      \n    \n    \n      \n    \n\n • You","author_profile_image_url":"https://media.licdn.com/dms/image/v2/C4E03AQGNeJRorEd2Nw/profile-displayphoto-shrink_100_100/profile-displayphoto-shrink_100_100/0/1569287114631?e=1784160000&v=beta&t=tJDZC7EXWnlgIIf8kF7fBCajhF-HEgzNXnz_IIkjqW8","author_profile_url":"https://www.linkedin.com/in/ravievani","has_image":true,"impression_count":3338,"is_article":false,"is_my_post":true,"is_video":true,"post_image_url":"https://media.licdn.com/dms/image/v2/D4E05AQFemgmZlFdGfA/videocover-high/B4EZmwTQd3IkBw-/0/1759599492191?e=1783008000&v=beta&t=r6YBxai_B1idNtOPh35I5SEDVVDCP2zI35gAQpUPwA4","post_text":"AI answering engines and agents are on the path to transform travel commerce. When travelers ask these agents for recommendations, they are offloading most of their research to the machine--which returns back to them a highly curated shortlist to pick from.\n\nIn this new reality, brands need to resonate with these AI agents at the exact moment of intent: with structured data, verified claims, and instant booking capability.\n\nTo make this possible, travel and hospitality enterprises will need to build their own agents across booking, customer service, operations, and planning. But without a unified intelligence layer--an enterprise \"AI brain\"--these agents will operate as disconnected silos, wreaking havoc.\n\nThis enterprise AI brain must hold institutional knowledge and apply it consistently across every touchpoint. Brand standards, policies, operational data, and customer insights all need to flow through a central intelligence that can orchestrate actions and enable instant purchase at the moment of conversation.\n\nSolutions like Publicis Sapient Bodhi agentic platform are emerging to fill this role--learning business context, connecting it with broader market knowledge, and ensuring coherent decision-making at scale.\n\nThe question isn’t whether AI will reshape travel commerce (that’s inevitable). The real question is whether travel and hospitality enterprises will architect to capture intent at the moment of conversation—consistently and at scale.","post_url":"https://www.linkedin.com/feed/update/urn:li:activity:7380295227124785153","post_urn":"urn:li:activity:7380295227124785153","posted_hours_ago":5760,"posted_time":"2025-10-25","posted_time_raw":"8mo","reaction_count":61,"reaction_types":"LIKE, EMPATHY, PRAISE","repost_count":5,"source":"activity","video_url":"https://media.licdn.com/dms/image/v2/D4E05AQFemgmZlFdGfA/videocover-high/B4EZmwTQd3IkBw-/0/1759599492191?e=1783008000&v=beta&t=r6YBxai_B1idNtOPh35I5SEDVVDCP2zI35gAQpUPwA4"},{"article_description":null,"article_title":null,"article_url":null,"author_headline":"Deploying enterprise agents in production / CTO / SWE Leader / GVP @ Publicis Sapient","author_name":"Ravi Evani\n              \n                \n                   \n    \n      \n    \n    \n      \n    \n\n • You","author_profile_image_url":"https://media.licdn.com/dms/image/v2/C4E03AQGNeJRorEd2Nw/profile-displayphoto-shrink_100_100/profile-displayphoto-shrink_100_100/0/1569287114631?e=1784160000&v=beta&t=tJDZC7EXWnlgIIf8kF7fBCajhF-HEgzNXnz_IIkjqW8","author_profile_url":"https://www.linkedin.com/in/ravievani","comment_count":2,"has_image":true,"impression_count":3260,"is_article":false,"is_my_post":true,"is_video":false,"post_image_url":"https://media.licdn.com/dms/image/v2/D4E22AQFTu2t0aV9waA/feedshare-shrink_800/B4EZmCojyxKgAg-/0/1758833303631?e=1784160000&v=beta&t=Rkp56OdgfjJsRY9JdUjE1TqNvSBR2p8ax65oJ7F8K7M","post_text":"🚀 Thrilled to be speaking at Destination AI 2025 Hospitality Summit on Sep 30 in Washington DC!\n\nAI agents are fast becoming the “gatekeepers” of travel — deciding which hotels, airlines, and experiences make it onto a traveler’s shortlist.\n\nIn my session, I’ll dive into how travel and hospitality brands can:\n\n✅ Stay visible to AI agents\n✅ Build trust so they get recommended\n✅ Capture demand in this new agent-led marketplace\n\nThe future of brand choice won’t just be about winning over people — it’s about winning over the AI agents making decisions for them. 🤖\n\nPublicis Sapient hashtag#DestinationAI (https://lnkd.in/etsCMmN8)","post_url":"https://www.linkedin.com/feed/update/urn:li:activity:7377081566415450112","post_urn":"urn:li:activity:7377081566415450112","posted_hours_ago":5760,"posted_time":"2025-10-25","posted_time_raw":"8mo","reaction_count":95,"reaction_types":"LIKE, PRAISE, EMPATHY","source":"activity","video_url":null},{"article_description":null,"article_title":null,"article_url":null,"author_headline":"Deploying enterprise agents in production / CTO / SWE Leader / GVP @ Publicis Sapient","author_name":"Ravi Evani\n              \n                \n                   \n    \n      \n    \n    \n      \n    \n\n • You","author_profile_image_url":"https://media.licdn.com/dms/image/v2/C4E03AQGNeJRorEd2Nw/profile-displayphoto-shrink_100_100/profile-displayphoto-shrink_100_100/0/1569287114631?e=1784160000&v=beta&t=tJDZC7EXWnlgIIf8kF7fBCajhF-HEgzNXnz_IIkjqW8","author_profile_url":"https://www.linkedin.com/in/ravievani","comment_count":1,"has_image":true,"impression_count":4580,"is_article":false,"is_my_post":true,"is_video":true,"post_image_url":"https://media.licdn.com/dms/image/v2/D4E05AQGCA2pyiYG4rQ/videocover-high/B4EZl.VXY2HoB8-/0/1758761157102?e=1783008000&v=beta&t=Piq5W07idsGLuwJt0d-d3qZSTTaloM2xoD_qsUeAefo","post_text":"Think of \"Bring Your Own (BYO) Agents\" as your Iron Man suit.\n\nYou bring your agent with you, and it makes you more powerful. Everywhere you go, it goes--lightening your load, sharpening decisions, and giving you time back.\n\nHonored to spend some time with the McDonald's DevSecOps COE this week. We discussed a build-your-own agent method for engineering leaders—one that could help you watch DevOps / engineering maturity across hundreds of programs and tell you where to focus next (quality, speed, value, ways of working) and how to go about it, before issues hit the roadmap.\n\nA quick playbook to build your first \"Engineering Management\" agent:\n\n➥ Pick one weekly decision. e.g., which teams need coaching, where to invest, which services are at risk.\n\n➥ Wire up 2–3 sources. Jira/ADO, CI/CD, incidents/observability. Start small.\n\n➥ Define 5–7 signals. Lead time, CFR, defect escape, build health, SLO drift, WIP, unplanned work.\n\n➥ Give the agent a job. “Rank by risk, explain why, propose the smallest action to move the metric.”\n\n➥ Set guardrails. Cost per run, latency budget, data scope, traceability of recommendations.\n\n➥ Close the loop weekly. Review → accept/adjust → the agent learns what “good” looks like.\n\nBest advice: start building. Pick one area, ship a v0, and you’ll quickly gain traction—and value.\n\nThanks to Swarnalakshmi Devarapalli and Matilda Jayakar for inviting Amit Sharma and myself to speak at their Offsite. Great to see leaders like them cross-pollinate knowledge into their teams!","post_url":"https://www.linkedin.com/feed/update/urn:li:activity:7376778979409821696","post_urn":"urn:li:activity:7376778979409821696","posted_hours_ago":6480,"posted_time":"2025-09-25","posted_time_raw":"9mo","reaction_count":75,"reaction_types":"LIKE, EMPATHY, INTEREST","repost_count":1,"source":"activity","video_url":"https://media.licdn.com/dms/image/v2/D4E05AQGCA2pyiYG4rQ/videocover-high/B4EZl.VXY2HoB8-/0/1758761157102?e=1783008000&v=beta&t=Piq5W07idsGLuwJt0d-d3qZSTTaloM2xoD_qsUeAefo"},{"article_description":null,"article_title":null,"article_url":null,"author_headline":"Deploying enterprise agents in production / CTO / SWE Leader / GVP @ Publicis Sapient","author_name":"Ravi Evani\n              \n                \n                   \n    \n      \n    \n    \n      \n    \n\n • You","author_profile_image_url":"https://media.licdn.com/dms/image/v2/C4E03AQGNeJRorEd2Nw/profile-displayphoto-shrink_100_100/profile-displayphoto-shrink_100_100/0/1569287114631?e=1784160000&v=beta&t=tJDZC7EXWnlgIIf8kF7fBCajhF-HEgzNXnz_IIkjqW8","author_profile_url":"https://www.linkedin.com/in/ravievani","comment_count":2,"has_image":true,"impression_count":28166,"is_article":false,"is_my_post":true,"is_video":false,"post_image_url":"https://media.licdn.com/dms/image/v2/D4E22AQFcw8wdGs402g/feedshare-shrink_800/B4EZlu0XlEHIAg-/0/1758500852137?e=1784160000&v=beta&t=vfojvhPkVHi6dH9qv8s_GD1kiS5VkTmuVx8QAIRL3AM","post_text":"\"AI is moving fast. What should we be learning?\"\nIn a recent \"Ask Me Anything\" at Publicis Sapient LATAM w/Maikol, Natalia, Esteban, Karen and Daniela, we dug in to this question.\n\nThree takeaways:\n\n➜ Learn to manage AI.\nTreat AI like a junior teammate: set direction, provide context, give examples, and assess whether it’s on track. Course-correct early and often.\n\n➜ Clarity in ⇒ Clarity out.\nThe quality of the response mirrors the clarity of the request. Be explicit about goal, constraints, and the tone you want back.\n\n➜ Be the adult in the room.\nAI can be confident—and glib. Apply common sense. Verify claims, check sources, and decide what to keep, edit, or discard. Do NOT outsource your judgement to AI.\n\nAI raises the bar on leadership and communication. If we can steer well, communicate clearly, and judge wisely, we’ll get compounding value!","post_url":"https://www.linkedin.com/feed/update/urn:li:activity:7375687168628858880","post_urn":"urn:li:activity:7375687168628858880","posted_hours_ago":6480,"posted_time":"2025-09-25","posted_time_raw":"9mo","reaction_count":157,"reaction_types":"LIKE, PRAISE, EMPATHY","repost_count":3,"source":"activity","video_url":null},{"article_description":null,"article_title":null,"article_url":null,"author_headline":"Deploying enterprise agents in production / CTO / SWE Leader / GVP @ Publicis Sapient","author_name":"Ravi Evani\n              \n                \n                   \n    \n      \n    \n    \n      \n    \n\n • You","author_profile_image_url":"https://media.licdn.com/dms/image/v2/C4E03AQGNeJRorEd2Nw/profile-displayphoto-shrink_100_100/profile-displayphoto-shrink_100_100/0/1569287114631?e=1784160000&v=beta&t=tJDZC7EXWnlgIIf8kF7fBCajhF-HEgzNXnz_IIkjqW8","author_profile_url":"https://www.linkedin.com/in/ravievani","comment_count":1,"has_image":true,"impression_count":6100,"is_article":false,"is_my_post":true,"is_video":false,"post_image_url":"https://media.licdn.com/dms/image/v2/D4E22AQGjQOZYeCv1CA/feedshare-shrink_800/B4EZkvgNVOKgAk-/0/1757438602513?e=1784160000&v=beta&t=QClsNfmCnYPMDzi0fasqJ_wFL9tFKdRcgewWOG51txE","post_text":"🚀 I’m excited to announce that I’ll be speaking at AI Caravan: Engineering Edition, hosted by Publicis Sapient in partnership with GDG Pura Vida in Costa Rica!\n\n📅 Saturday, September 20\n📍 Costa Rica Convention Center\n⏰ 8:30 AM – 2:30 PM\n✨ Don’t miss it — sign up here: https://lnkd.in/eZV8xESY\n\nI’ll be leading a session on our AI Products: Sapient Slingshot Bodhi, Sustain AI and Core AI. Most importantly, we’ll discuss the mindset we need to adopt to leverage our own technology and ride this AI wave that’s reshaping the world around us!\n\nAI Caravan is a dynamic learning experience designed to spark curiosity, build confidence, and turn AI into something truly useful in our day-to-day engineering work.\n\nJoin us to explore hands-on AI workshops, connect with peers, and discover how to put AI to work with purpose.","post_url":"https://www.linkedin.com/feed/update/urn:li:activity:7371231767208292352","post_urn":"urn:li:activity:7371231767208292352","posted_hours_ago":6480,"posted_time":"2025-09-25","posted_time_raw":"9mo","reaction_count":190,"reaction_types":"LIKE, PRAISE, EMPATHY","repost_count":11,"source":"activity","video_url":null},{"article_description":null,"article_title":null,"article_url":null,"author_headline":"Deploying enterprise agents in production / CTO / SWE Leader / GVP @ Publicis Sapient","author_name":"Ravi Evani\n              \n                \n                   \n    \n      \n    \n    \n      \n    \n\n • You","author_profile_image_url":"https://media.licdn.com/dms/image/v2/C4E03AQGNeJRorEd2Nw/profile-displayphoto-shrink_100_100/profile-displayphoto-shrink_100_100/0/1569287114631?e=1784160000&v=beta&t=tJDZC7EXWnlgIIf8kF7fBCajhF-HEgzNXnz_IIkjqW8","author_profile_url":"https://www.linkedin.com/in/ravievani","comment_count":2,"has_image":false,"impression_count":1726,"is_article":false,"is_my_post":true,"is_video":false,"post_image_url":null,"post_text":"What to pair with your LLMs to build always-on insights agents for Marketers\n\nLLMs are great conversational interfaces. But an always-on insights agent for Marketing needs more than clever text generation. It needs supporting models that detect, forecast, optimize, and retrieve information in real time.\n\nWhy Pairing Models Matters\nLLMs give you a friendly interface: summaries, answers, recommendations.\nThe supporting stack ensures the insights are always-on, reliable, and actionable for marketers:\n➜ Detection models spot change\n➜ Forecasting models see ahead\n➜ Optimization models suggest what to do\n➜ Retrieval models ground answers in facts\n\nWrap them with compliance guardrails and you move from “AI that talks” to AI that works as a marketing analyst on call, 24/7.\n\nHere’s a breakdown of the core agents marketers need, what they do, and the model types (with example HF models, links in comments) that bring them to life.\n\n1. Live Market and Customer Alerts\nAgent role: Continuously monitors signals like competitor moves, customer activity, or campaign anomalies, and turns them into alerts you can actually use.\n\nModel pairings:\n➜ Event & anomaly detection: flag sudden spikes or drops. Try AutonLab/MOMENT-1-large, a foundation model for time-series anomaly and forecasting.\n➜ Entity recognition/linking: identify brand, product, or competitor names in noisy text. Try dbmdz/bert-large-cased-finetuned-conll03-english.\n\n2. Trend Forecasting\nAgent role: Projects demand, engagement, or customer sentiment into the future — and separates real shifts from seasonal blips.\n\nModel pairings:\n➜ Time-series forecasting: predict what’s next. Try amazon/chronos-t5-large, built for flexible forecasting tasks.\n\n➜ Causal/seasonal decomposition: explain why a trend is happening, not just the curve. Often implemented with classical decomposition or causal ML libraries.\n\n3. Real-Time Tactic Recommendations\nAgent role: Monitors campaigns in flight and suggests changes: reallocating budget, adjusting bids, or shifting audience mix.\n\nModel pairings:\n➜ Contextual bandits: learn the best option in real time. Check the Decision Transformer family for reinforcement-learning style policies.\n\n➜ Uplift modeling: estimate the incremental impact of a tactic. Commonly built with EconML or custom LightGBM models.\n\n➜ Rule-based guardrails: ensure outputs respect compliance and brand rules.\n\n4. Competitive & Consumer Intelligence\nAgent role: Tracks competitors and consumer sentiment to guide message, positioning, and creative decisions.\n\nModel pairings:\n➜ Sentiment & emotion classification – detect tone across social streams. Try cardiffnlp/twitter-roberta-base-sentiment-latest.\n\n➜ Topic clustering: group discussions into themes. Use all-MiniLM-L6-v2 embeddings with clustering (e.g., k-means, HDBSCAN).\n\n➜ Trend forecasting – apply the same Chronos-T5 models to project where sentiment is heading.","post_url":"https://www.linkedin.com/feed/update/urn:li:activity:7370271830143705088","post_urn":"urn:li:activity:7370271830143705088","posted_hours_ago":6480,"posted_time":"2025-09-25","posted_time_raw":"9mo","reaction_count":23,"reaction_types":"LIKE, INTEREST, EMPATHY","source":"activity","video_url":null},{"article_description":null,"article_title":null,"article_url":null,"author_headline":"Deploying enterprise agents in production / CTO / SWE Leader / GVP @ Publicis Sapient","author_name":"Ravi Evani\n              \n                \n                   \n    \n      \n    \n    \n      \n    \n\n • You","author_profile_image_url":"https://media.licdn.com/dms/image/v2/C4E03AQGNeJRorEd2Nw/profile-displayphoto-shrink_100_100/profile-displayphoto-shrink_100_100/0/1569287114631?e=1784160000&v=beta&t=tJDZC7EXWnlgIIf8kF7fBCajhF-HEgzNXnz_IIkjqW8","author_profile_url":"https://www.linkedin.com/in/ravievani","comment_count":2,"has_image":true,"impression_count":5159,"is_article":false,"is_my_post":true,"is_video":true,"post_image_url":"https://media.licdn.com/dms/image/v2/D4E05AQGrems7ajISfA/videocover-high/B4EZjJrpEqHICI-/0/1755730345436?e=1783008000&v=beta&t=vLNGivWa8Do3M63j22QC4VZnEVplQ27UeqMHkGLHPZc","post_text":"I’m hiring multiple Data Engineers proficient in Scala, who can leverage AI tools to build mission critical Scala applications. Location: India: BLR or Gurgaon. If that's you, pls. apply or refer if interested. Thank you!","post_url":"https://www.linkedin.com/feed/update/urn:li:activity:7364066847303901184","post_urn":"urn:li:activity:7364066847303901184","posted_hours_ago":7200,"posted_time":"2025-08-25","posted_time_raw":"10mo","reaction_count":45,"reaction_types":"LIKE, EMPATHY, APPRECIATION","repost_count":2,"source":"activity","video_url":"https://media.licdn.com/dms/image/v2/D4E05AQGrems7ajISfA/videocover-high/B4EZjJrpEqHICI-/0/1755730345436?e=1783008000&v=beta&t=vLNGivWa8Do3M63j22QC4VZnEVplQ27UeqMHkGLHPZc"},{"article_description":null,"article_title":null,"article_url":null,"author_headline":"Deploying enterprise agents in production / CTO / SWE Leader / GVP @ Publicis Sapient","author_name":"Ravi Evani\n              \n                \n                   \n    \n      \n    \n    \n      \n    \n\n • You","author_profile_image_url":"https://media.licdn.com/dms/image/v2/C4E03AQGNeJRorEd2Nw/profile-displayphoto-shrink_100_100/profile-displayphoto-shrink_100_100/0/1569287114631?e=1784160000&v=beta&t=tJDZC7EXWnlgIIf8kF7fBCajhF-HEgzNXnz_IIkjqW8","author_profile_url":"https://www.linkedin.com/in/ravievani","comment_count":3,"has_image":false,"impression_count":3128,"is_article":false,"is_my_post":true,"is_video":false,"post_image_url":null,"post_text":"When people say: \"now anyone can build an app\", I think back to blogger: \"now anyone can publish\", or youtube: \"now anyone can make a movie\".\n\nContent multiplied, attention got scarce, and the real work shifted to curation--deciding what was worth reading or watching. Because ... well, not all content produced by \"anyone who can create\" is of great quality and fits the need of the audience.\n\nAI is on the same path. The next wave is app curation. With the volume and nuance of AI apps, feature-comparison spreadsheets won’t scale for enterprises.\n\nWhat changes for enterprises:\n➺ Decisions move from “buy on features” to prove fit in your environment.\n➺ Deployability and interoperability become first-class requirements.\n➺ Try → measure → keep or discard becomes the default motion, because there’s always another option.\n\nWhat enterprises (especially large ones) should build: an App Curation Factory:\n➺ Standard landing zones to deploy any app in hours/days: identity/SSO, data access, logging, secrets, networking.\n➺ Evaluation harness with KPIs: security posture, latency/throughput, accuracy, cost per transaction, supportability.\n➺ Lightweight procurement and a scoring rubric so teams can decide fast without chaos.\n➺ Internal marketplace to publish “approved, ready-to-run” apps with config templates.\n\nCuration metrics:\n• Time to Try (TTT)\n• Time to First Value (TTFV)\n• Cost to Try (CTT)\n• Integration debt (adapters, data workarounds)\n• Disposition rate (kept vs. discarded at 30/60/90 days)\n\nFor developers targeting the enterprise: building an app—or a SaaS isn’t enough. The advantage shifts to those who can deploy, evaluate, integrate, or walk away quickly and cheaply. Build the curation muscle, not just more apps.","post_url":"https://www.linkedin.com/feed/update/urn:li:activity:7362614641539043328","post_urn":"urn:li:activity:7362614641539043328","posted_hours_ago":7200,"posted_time":"2025-08-25","posted_time_raw":"10mo","reaction_count":42,"reaction_types":"LIKE, INTEREST, PRAISE","repost_count":1,"source":"activity","video_url":null},{"article_description":null,"article_title":null,"article_url":null,"author_headline":"Deploying enterprise agents in production / CTO / SWE Leader / GVP @ Publicis Sapient","author_name":"Ravi Evani\n              \n                \n                   \n    \n      \n    \n    \n      \n    \n\n • You","author_profile_image_url":"https://media.licdn.com/dms/image/v2/C4E03AQGNeJRorEd2Nw/profile-displayphoto-shrink_100_100/profile-displayphoto-shrink_100_100/0/1569287114631?e=1784160000&v=beta&t=tJDZC7EXWnlgIIf8kF7fBCajhF-HEgzNXnz_IIkjqW8","author_profile_url":"https://www.linkedin.com/in/ravievani","comment_count":2,"has_image":true,"impression_count":2050,"is_article":false,"is_my_post":true,"is_video":true,"post_image_url":"https://media.licdn.com/dms/image/v2/D4D05AQFdzYXTifkKcg/videocover-high/B4DZid3XIdGQCU-/0/1754995200021?e=1783008000&v=beta&t=3KifdaeIZpkR-GKekx3s_U9qRdivo_zyergE70Zohm0","post_text":"Been experimenting with Chrome's new Prompt API gives the power of running and accessing on device models like Google Nano, right inside the browser.\n\nIt's honestly incredible what you can do with AI that runs entirely on your device. Instead of sending your questions or documents to some server, Gemini Nano processes everything locally on the computer. This means you can ask it to help with anything—summarize a confidential work document, draft a personal email, or answer questions about a webpage you're reading—without worrying about your data being stored or seen by anyone else.\n\nPretty cool shift from how we usually think about AI tools.","post_url":"https://www.linkedin.com/feed/update/urn:li:activity:7360983416101650432","post_urn":"urn:li:activity:7360983416101650432","posted_hours_ago":7200,"posted_time":"2025-08-25","posted_time_raw":"10mo","reaction_count":32,"reaction_types":"LIKE, INTEREST","source":"activity","video_url":"https://media.licdn.com/dms/image/v2/D4D05AQFdzYXTifkKcg/videocover-high/B4DZid3XIdGQCU-/0/1754995200021?e=1783008000&v=beta&t=3KifdaeIZpkR-GKekx3s_U9qRdivo_zyergE70Zohm0"},{"article_description":null,"article_title":null,"article_url":null,"author_headline":"Deploying enterprise agents in production / CTO / SWE Leader / GVP @ Publicis Sapient","author_name":"Ravi Evani\n              \n                \n                   \n    \n      \n    \n    \n      \n    \n\n • You","author_profile_image_url":"https://media.licdn.com/dms/image/v2/C4E03AQGNeJRorEd2Nw/profile-displayphoto-shrink_100_100/profile-displayphoto-shrink_100_100/0/1569287114631?e=1784160000&v=beta&t=tJDZC7EXWnlgIIf8kF7fBCajhF-HEgzNXnz_IIkjqW8","author_profile_url":"https://www.linkedin.com/in/ravievani","comment_count":6,"has_image":true,"impression_count":2809,"is_article":false,"is_my_post":true,"is_video":false,"post_image_url":"https://media.licdn.com/dms/image/v2/D4E22AQEnEXej7FlzVA/feedshare-image-high-res/B4EZiWHK4LGoAs-/0/1754865119439?e=1784160000&v=beta&t=st1MN5wL1Ovj8w5qx-RgYjsyXR6cU7Ycr9U-NTB9U3A","post_text":"Plot twist: canceled Apple TV, Paramount, HBO Max, and Cable. Subscribed to ChatGPT‑5 Pro.","post_url":"https://www.linkedin.com/feed/update/urn:li:activity:7360437792218173440","post_urn":"urn:li:activity:7360437792218173440","posted_hours_ago":7200,"posted_time":"2025-08-25","posted_time_raw":"10mo","reaction_count":19,"reaction_types":"LIKE, INTEREST, ENTERTAINMENT","source":"activity","video_url":null},{"article_description":null,"article_title":null,"article_url":null,"author_headline":"Deploying enterprise agents in production / CTO / SWE Leader / GVP @ Publicis Sapient","author_name":"Ravi Evani\n              \n                \n                   \n    \n      \n    \n    \n      \n    \n\n • You","author_profile_image_url":"https://media.licdn.com/dms/image/v2/C4E03AQGNeJRorEd2Nw/profile-displayphoto-shrink_100_100/profile-displayphoto-shrink_100_100/0/1569287114631?e=1784160000&v=beta&t=tJDZC7EXWnlgIIf8kF7fBCajhF-HEgzNXnz_IIkjqW8","author_profile_url":"https://www.linkedin.com/in/ravievani","comment_count":8,"has_image":true,"impression_count":3271,"is_article":false,"is_my_post":true,"is_video":false,"post_image_url":"https://media.licdn.com/dms/image/v2/D4E22AQHuWkvD3OpqTQ/feedshare-image-high-res/B4EZiGI_hEGUAs-/0/1754597177172?e=1784160000&v=beta&t=wehYQD1O0dHPe6RzwaA-MnAml4m3DuXc8kwVduZJYLc","post_text":"I was in flight thinking with ChatGPT, ready to take off, when it suddenly said, “Model not found”. I thought that was kind of funny, so I restarted it… and then it came back, evolved.\n\nGonna be a fun flight back home.","post_url":"https://www.linkedin.com/feed/update/urn:li:activity:7359313964083605505","post_urn":"urn:li:activity:7359313964083605505","posted_hours_ago":7200,"posted_time":"2025-08-25","posted_time_raw":"10mo","reaction_count":22,"reaction_types":"LIKE, ENTERTAINMENT","source":"activity","video_url":null},{"article_description":null,"article_title":null,"article_url":null,"author_headline":"Deploying enterprise agents in production / CTO / SWE Leader / GVP @ Publicis Sapient","author_name":"Ravi Evani\n              \n                \n                   \n    \n      \n    \n    \n      \n    \n\n • You","author_profile_image_url":"https://media.licdn.com/dms/image/v2/C4E03AQGNeJRorEd2Nw/profile-displayphoto-shrink_100_100/profile-displayphoto-shrink_100_100/0/1569287114631?e=1784160000&v=beta&t=tJDZC7EXWnlgIIf8kF7fBCajhF-HEgzNXnz_IIkjqW8","author_profile_url":"https://www.linkedin.com/in/ravievani","comment_count":6,"has_image":true,"impression_count":10835,"is_article":false,"is_my_post":true,"is_video":false,"post_image_url":"https://media.licdn.com/dms/image/v2/D4E22AQGlMTjdaB7UHQ/feedshare-shrink_800/B4EZiCI6odGUAg-/0/1754530033683?e=1784160000&v=beta&t=gQLTzukQbWacnCAIsY5yatgCzKdxc54ZuVLcMnvu0cQ","post_text":"My 9:25PM ORD→EWR flight just upgraded itself to an early 9:00 p.m. departure—25 minutes faster than physics allows. We are supposed to board in 15 mins but there’s no gate number. I even got a “flight is leaving early” text message. Congrats?\n\nNot AI hallucination, just a scheduling “technology issue”.\n\nLesson: whenever your systems start rewriting reality, add:\n1. Audit trails. Know who changed what and why.\n2. Sanity checks. Cross-verify with source data, not UI copy.\n3. Human in the loop. Let people catch the “unbelievable” before it reaches users.\n\nEven a smart board needs a reality check. I think it’s gonna be a long night.","post_url":"https://www.linkedin.com/feed/update/urn:li:activity:7359032343921131520","post_urn":"urn:li:activity:7359032343921131520","posted_hours_ago":7200,"posted_time":"2025-08-25","posted_time_raw":"10mo","reaction_count":59,"reaction_types":"LIKE, ENTERTAINMENT, INTEREST","source":"activity","video_url":null},{"article_description":null,"article_title":null,"article_url":null,"author_headline":"Deploying enterprise agents in production / CTO / SWE Leader / GVP @ Publicis Sapient","author_name":"Ravi Evani\n              \n                \n                   \n    \n      \n    \n    \n      \n    \n\n • You","author_profile_image_url":"https://media.licdn.com/dms/image/v2/C4E03AQGNeJRorEd2Nw/profile-displayphoto-shrink_100_100/profile-displayphoto-shrink_100_100/0/1569287114631?e=1784160000&v=beta&t=tJDZC7EXWnlgIIf8kF7fBCajhF-HEgzNXnz_IIkjqW8","author_profile_url":"https://www.linkedin.com/in/ravievani","comment_count":8,"has_image":false,"impression_count":2680,"is_article":false,"is_my_post":true,"is_video":false,"post_image_url":null,"post_text":"My Current AI Coding Workflow: The core method is Human thinker➜AI thinker➜AI maker➜AI checker➜Human Checker.\n\n1. Take a vision, feature, or functionality idea and ask a good thinking model to create a plan.\n2. Switch to another thinking model to review the plan, suggest bugs, point out edge cases, and add considerations.\n3. Switch to a good instruction following model to apply those changes to the plan, ask it to include testable milestones.\n4. Have the instruction following model turn the plan into a checklist, broken into phases.\n5. Use a thinking model to order the checklist by order of dependencies—starting with backend functionality, then moving to UX.\n6. Switch to a good instruction-following model to implement each checklist item, stopping when something is testable. I ask the model to check off the items in the plan as they are implemented.\n7. Switch to a thinking model review the plan against the code, find bugs, but not to make any fixes yet\n8. Ask the thinking model to find the root cause of the bugs and document them into the plan, but not to make any code changes\n9. Switch to a good instruction-following model to implement all fixes.\n10. Pick a fresh thinking model to run a security review acting as a security tester.\n11. Run a performance review with fresh thinking model to find latency, concurrency, and caching opportunities, then ask it to update the plan without making any code changes\n12. Use a good instruction-following model to implement all security and performance fixes.\n\nI repeat the process until the entire application, feature, or vision is complete.","post_url":"https://www.linkedin.com/feed/update/urn:li:activity:7358474392915386369","post_urn":"urn:li:activity:7358474392915386369","posted_hours_ago":7200,"posted_time":"2025-08-25","posted_time_raw":"10mo","reaction_count":30,"reaction_types":"LIKE, INTEREST","source":"activity","video_url":null},{"article_description":null,"article_title":null,"article_url":null,"author_headline":"Deploying enterprise agents in production / CTO / SWE Leader / GVP @ Publicis Sapient","author_name":"Ravi Evani\n              \n                \n                   \n    \n      \n    \n    \n      \n    \n\n • You","author_profile_image_url":"https://media.licdn.com/dms/image/v2/C4E03AQGNeJRorEd2Nw/profile-displayphoto-shrink_100_100/profile-displayphoto-shrink_100_100/0/1569287114631?e=1784160000&v=beta&t=tJDZC7EXWnlgIIf8kF7fBCajhF-HEgzNXnz_IIkjqW8","author_profile_url":"https://www.linkedin.com/in/ravievani","comment_count":2,"has_image":true,"impression_count":854,"is_article":false,"is_my_post":true,"is_video":true,"post_image_url":"https://media.licdn.com/dms/image/v2/D4E05AQEdxIZEUx5M9g/videocover-high/B4EZhwwUq7GoCI-/0/1754238376375?e=1783008000&v=beta&t=grtsptnyclX5FYs-ax8-j0Cx-VpHcate8cUc8HmuOug","post_text":"How To Make Gemini's \"Thinking Budget\" Work for You\n\nIf you're working with Google's new Gemini models, you've probably heard about \"thinking budgets\"—a powerful feature that lets you control the model's reasoning process. But how do you move beyond the basics and use them effectively in a real-world application?\n\nA thinking budget is simply a parameter that controls how much internal reasoning the model can perform before giving an answer. Not leveraging the thinking budget for Gemini queries is inefficient. You don't want it to waste time and compute by reasoning over and over for a simple query. At the same time, you want it to take the compute and time it needs to satisfactorily resolve complex ones. A good approach is to leverage its thinking budget feature and dynamically match the model's reasoning power to the query's complexity.\n\nHere is a two-step LLM process we used to classify a natural language powered data analysis application and assign an appropriate thinking budget for the task at hand.\n\nThe Four Weight Classes of Queries\n\nFirst, define four categories for your tasks, each with a corresponding budget strategy.\n\n① Featherweight: For simple, factual lookups.\n➜ Budget: `0` (for Gemini Flash) or the lowest possible fixed value.\n\n② Lightweight: For straightforward queries that require minimal reasoning.\n➜ Budget: A low, fixed budget (e.g., `1024` tokens).\n\n③ Middleweight: The default for standard requests that need detailed responses.\n➜ Budget: A moderate, fixed budget (e.g., `4096` tokens).\n\n④ Heavyweight: For your most complex problems, multi-step tasks, or for handling user corrections.\n➜ Budget: An adaptive budget (`-1`) to allow for maximum reasoning.\n\nYour 3-Step Implementation Plan\n\nThis two-call method: a quick call to classify, followed by a well-resourced call to execute ensures you're always using the right amount of power for the job, creating a more responsive and cost-effective application.\n\nStep 1: Classify the Query with a Scoping Call: Make an initial, low-cost LLM call (e.g., to Gemini Flash Lite) with a specific prompt designed to classify the user's request into one of the four weight classes. The sole purpose of this call is to determine the complexity of the task ahead.\n\nStep 2: Assign the Budget: Based on the classification returned from the first call (e.g., \"Middleweight\"), select the corresponding thinking budget from your framework.\n\nStep 3: Execute the Main Task: Make the second, primary LLM call to your main model (e.g., Gemini Pro) using the user's original query and the dynamically assigned thinking budget.","post_url":"https://www.linkedin.com/feed/update/urn:li:activity:7357809073578250240","post_urn":"urn:li:activity:7357809073578250240","posted_hours_ago":7200,"posted_time":"2025-08-25","posted_time_raw":"10mo","reaction_count":12,"reaction_types":"LIKE, EMPATHY","source":"activity","video_url":"https://media.licdn.com/dms/image/v2/D4E05AQEdxIZEUx5M9g/videocover-high/B4EZhwwUq7GoCI-/0/1754238376375?e=1783008000&v=beta&t=grtsptnyclX5FYs-ax8-j0Cx-VpHcate8cUc8HmuOug"},{"article_description":null,"article_title":null,"article_url":null,"author_headline":"Deploying enterprise agents in production / CTO / SWE Leader / GVP @ Publicis Sapient","author_name":"Ravi Evani\n              \n                \n                   \n    \n      \n    \n    \n      \n    \n\n • You","author_profile_image_url":"https://media.licdn.com/dms/image/v2/C4E03AQGNeJRorEd2Nw/profile-displayphoto-shrink_100_100/profile-displayphoto-shrink_100_100/0/1569287114631?e=1784160000&v=beta&t=tJDZC7EXWnlgIIf8kF7fBCajhF-HEgzNXnz_IIkjqW8","author_profile_url":"https://www.linkedin.com/in/ravievani","comment_count":3,"has_image":true,"impression_count":1289,"is_article":false,"is_my_post":true,"is_video":true,"post_image_url":"https://media.licdn.com/dms/image/v2/D4E05AQFvCi-j76vTeQ/videocover-high/B4EZhl5H0lGcCc-/0/1754056205158?e=1783008000&v=beta&t=rUgPfUbs4fCt-GfTxPNWH8Ak4xIDZJaUgwD4KEQac0A","post_text":"Here's how to build context engineering into your content supply chain to generate high quality AI creative that consistently align to your brand standards:\n\nA good context-engineering system behaves like an orchestration layer between marketers and the model: it grabs exactly the right inputs, packages them cleanly, and learns from every interaction. Build these pieces, and your AI will deliver creative that’s on-brief, on-brand, and worth using.\n\nA strong context engineering system has the following capabilities:\n➥ Intent Parser: Captures the user’s intent, audience, format, and constraints so the rest of the content pipeline has a clear target.\n➥ Role & Tone Templates: Standard, reusable snippets that pin the model to your brand voice and creative purpose\n➥Dynamic Retrieval Layer: Pulls only the most relevant brand guidelines, product facts, past campaigns, and legal caveats—on demand, not in bulk.\n➥Context Ranking & Pruning: Scores each candidate snippet for relevance and compresses or drops anything that won’t move the needle, keeping the prompt within the context window.\n➥Structured Formatting: Presents information in labeled sections (e.g., “Brand Voice ↓”, “User Brief ↓”, “Past Examples ↓”), making it easy for the model to parse.\n➥Tool Hooks: Lets the model run quick look-ups (search, analytics, image generation) and feeds the results straight back into the same prompt cycle.\n➥Conversation Memory: Summarizes prior turns so the AI remembers key decisions without bloating the context.\n➥Compliance & Guardrails: Auto-checks for forbidden claims, regional regulations, and brand-safety filters before the prompt is sent.\n➥Evaluation Loop: Logs each run, captures user edits or rejections, and feeds that data into retraining or rule tweaks—closing the quality gap over time.\n➥Version Control & Testing: Treats prompt templates and retrieval logic like code: versioned, unit-tested, and easy to roll back if a change hurts output quality.","post_url":"https://www.linkedin.com/feed/update/urn:li:activity:7357045054944804864","post_urn":"urn:li:activity:7357045054944804864","posted_hours_ago":7200,"posted_time":"2025-08-25","posted_time_raw":"10mo","reaction_count":12,"reaction_types":"LIKE","source":"activity","video_url":"https://media.licdn.com/dms/image/v2/D4E05AQFvCi-j76vTeQ/videocover-high/B4EZhl5H0lGcCc-/0/1754056205158?e=1783008000&v=beta&t=rUgPfUbs4fCt-GfTxPNWH8Ak4xIDZJaUgwD4KEQac0A"},{"article_description":null,"article_title":null,"article_url":null,"author_headline":"Deploying enterprise agents in production / CTO / SWE Leader / GVP @ Publicis Sapient","author_name":"Ravi Evani\n              \n                \n                   \n    \n      \n    \n    \n      \n    \n\n • You","author_profile_image_url":"https://media.licdn.com/dms/image/v2/C4E03AQGNeJRorEd2Nw/profile-displayphoto-shrink_100_100/profile-displayphoto-shrink_100_100/0/1569287114631?e=1784160000&v=beta&t=tJDZC7EXWnlgIIf8kF7fBCajhF-HEgzNXnz_IIkjqW8","author_profile_url":"https://www.linkedin.com/in/ravievani","has_image":true,"impression_count":2065,"is_article":false,"is_my_post":true,"is_video":true,"post_image_url":"https://media.licdn.com/dms/image/v2/D4E05AQE7mYRwsC4sEg/videocover-high/B4EZhacgLtGcCI-/0/1753864088998?e=1783008000&v=beta&t=237_82qeM8Nfbxiuucyu7xC4BuhWrfiStRI5GLoM4RI","post_text":"Don’t Just Summarize. Think.\n\nMy son and I were using Gemini to get a sense of his progress after a round of advanced tests by his tutor. It generated a clean topic-wise summary.\n\nBut something didn’t add up.\n\nIt showed zero scores on a couple of topics. But those topics weren’t even part of the test. Curious, I asked Gemini why it showed a zero. After a quick challenge, it corrected itself: there were no questions on those topics to begin with.\n\nThat moment was a good reminder: summarization is not trusted analysis. These tools are great at surfacing patterns, but it’s on us to apply the next layer of reasoning.\n\nIf I had just trusted the output at face value, I would have been unnecessarily concerned when he is making good progress.\n\nAI can accelerate insight—but only when paired with a human who’s willing to challenge it.\n\nAlways verify. Always think.","post_url":"https://www.linkedin.com/feed/update/urn:li:activity:7356239191971667968","post_urn":"urn:li:activity:7356239191971667968","posted_hours_ago":7200,"posted_time":"2025-08-25","posted_time_raw":"10mo","reaction_count":25,"reaction_types":"LIKE, INTEREST, EMPATHY","source":"activity","video_url":"https://media.licdn.com/dms/image/v2/D4E05AQE7mYRwsC4sEg/videocover-high/B4EZhacgLtGcCI-/0/1753864088998?e=1783008000&v=beta&t=237_82qeM8Nfbxiuucyu7xC4BuhWrfiStRI5GLoM4RI"},{"article_description":null,"article_title":null,"article_url":null,"author_headline":"Deploying enterprise agents in production / CTO / SWE Leader / GVP @ Publicis Sapient","author_name":"Ravi Evani\n              \n                \n                   \n    \n      \n    \n    \n      \n    \n\n • You","author_profile_image_url":"https://media.licdn.com/dms/image/v2/C4E03AQGNeJRorEd2Nw/profile-displayphoto-shrink_100_100/profile-displayphoto-shrink_100_100/0/1569287114631?e=1784160000&v=beta&t=tJDZC7EXWnlgIIf8kF7fBCajhF-HEgzNXnz_IIkjqW8","author_profile_url":"https://www.linkedin.com/in/ravievani","comment_count":3,"has_image":true,"impression_count":20605,"is_article":false,"is_my_post":true,"is_video":false,"post_image_url":"https://media.licdn.com/dms/image/v2/D4D22AQFnoE5hjkqEyg/feedshare-shrink_800/B4DZgLT_reH8Ag-/0/1752536459103?e=1784160000&v=beta&t=04U4qsAPKEqYEz0LIRqtZ7DrE7W97WRPUIuptwO8h5U","post_text":"Exciting times at the Agent Bootcamp at Publicis Sapient Gurgaon office. We went into working examples built with Sapient Slingshot, discovering several patterns.\n\nHere are some strategies we discussed for building Enterprise grade agentic systems that can reason, self-correct, and execute complex tasks.\n\n① Build a Toolbox of Specialized Services\nKeep tools narrow. Modular APIs make each tool simpler to test and evolve, and let you add new skills without touching existing code. A “generate-SQL” service should write code only; a separate “explain-code” service should translate that SQL into plain English.\n\n➜Tip: Expose each tool as a stateless function (or endpoint) with a single, well-named responsibility. Register those functions in a dictionary so the orchestrator can call them by key.\n\n② Route by Intent\nBefore you call any heavy LLM, classify the request: “analysis,” “report,” “troubleshoot,” etc. A small model or simple rule set can do this routing in milliseconds, then hand off to the right tool. This keeps latency low and avoids bloated, one-shot prompts.\n\n➜Tip: Store the mapping in a config file so non-devs can add new intents without redeploying code.\n\n③ Add Self-Correction Loop(s)\nWhen a tool fails (syntax error, timeout, bad data), feed the error, the last plan, and the original goal back into the model. A single “reflect-then-retry” step can raise task success rates sharply.\n\n➜Tip: Cap retries (e.g., three attempts) and store every error/patch pair in long term memory. This becomes context for subsequent troubleshooting, so the power of error resolution is compounded with each solve.\n\n④ Go Beyond Basic Chat History with Structured Memory\nSuccessful agents remember what worked. Cache finished plans alongside the parameters that produced them; next time a similar request arrives, start from that plan instead of rebuilding. A lightweight graph or key-value store is enough for many use cases and scales better than stuffing everything back into the prompt.\n\n➜Tip: Index memory entries by a hashed task signature (“generate-sales-forecast-Q3”), not raw text, to avoid collisions and reduce PII risk.\n\n⑤ Compose Prompts Dynamically and Defensively\n\nConstruct the final prompt at runtime: merging task instructions, schema snippets, recent memory, and user overrides. This keeps context fresh while staying within token limits and reduces hallucinations.\n\n➜Tip: Sanitize every user-supplied instruction before it reaches the model. Prompt-injection attacks are now a top-ranked OWASP risk for AI systems; monitor and strip suspicious tokens as part of your composer pipeline.\n\nAdopting these strategies helps create LLM-driven applications that become genuine agents capable of complex reasoning, learning, and task execution.\n\nThanks to Sriram Komanduri, Vibhor Kumar & Pravesh Balhara for leading this workshop!","post_url":"https://www.linkedin.com/feed/update/urn:li:activity:7350670688812257281","post_urn":"urn:li:activity:7350670688812257281","posted_hours_ago":7920,"posted_time":"2025-07-25","posted_time_raw":"11mo","reaction_count":307,"reaction_types":"LIKE, PRAISE, EMPATHY","repost_count":2,"source":"activity","video_url":null},{"article_description":null,"article_title":null,"article_url":null,"author_headline":"Deploying enterprise agents in production / CTO / SWE Leader / GVP @ Publicis Sapient","author_name":"Ravi Evani\n              \n                \n                   \n    \n      \n    \n    \n      \n    \n\n • You","author_profile_image_url":"https://media.licdn.com/dms/image/v2/C4E03AQGNeJRorEd2Nw/profile-displayphoto-shrink_100_100/profile-displayphoto-shrink_100_100/0/1569287114631?e=1784160000&v=beta&t=tJDZC7EXWnlgIIf8kF7fBCajhF-HEgzNXnz_IIkjqW8","author_profile_url":"https://www.linkedin.com/in/ravievani","comment_count":5,"has_image":true,"impression_count":1687,"is_article":false,"is_my_post":true,"is_video":true,"post_image_url":"https://media.licdn.com/dms/image/v2/D4E05AQHdLwubl39T3Q/videocover-low/B4EZgFd.UDG4CI-/0/1752438415946?e=1783008000&v=beta&t=OIuuCdp5_bkqRB0hmoEOaHuKcfcN3LiNCX7oyOlWzcA","post_text":"How to Build Adaptive UIs to democratize Enterprise Data.\n\nImagine an interface that doesn’t just show data, but understands what users need and delivers it in the most meaningful form. That’s the value of an Adaptive User Interface, powered by an AI agent that turns natural language questions into clear, personalized visualizations.\n\nInstead of navigating complex dashboards, users can simply ask:\n“Which areas need the most improvement?”\n“Show me trends over the last quarter.”\n“Which categories improved the most?”\n\nYour system then identifies the right data, selects the best visualization, and presents it clearly. No manual configuration required.\n\nHere’s how to build that system.\n\nThe Intelligence Behind Adaptive Charting: A Three-Step Agentic Workflow\n\nThe core of an Adaptive UI is an AI agent that can reason and take action. You can implement this as a workflow within your backend service:\n\n1. Code Generation for Analysis: First, build your agent to understand the user's question and the structure of their data. The agent should then generate and execute a script to perform the correct analysis. This step moves beyond simple Q&A and produces a structured data table containing the answer.\n\n2. Expert Visualization Choice: This is the critical step that makes the UI \"adaptive.\" Instead of defaulting to a table, train your agent to make an expert decision on the best way to visualize the resulting data. You can achieve this by creating a detailed *system prompt* that instructs the LLM to act as a visualization expert. This prompt should guide the LLM to choose between bar charts for comparisons, line charts for trends, etc., and then generate a structured **JSON configuration** that defines the entire chart. This JSON should specify the chart type, axes, colors, and even human-readable metadata like a title and key insights.\n\n3. Dynamic Frontend Rendering: Finally, design your frontend to be a dynamic rendering engine, not a static dashboard. Create a component (e.g., in React) that can accept the JSON configuration from your agent. This component will read the spec and render the prescribed chart on the fly. If your agent decides a bar chart is best, the user sees a bar chart. If a line chart tells a clearer story, a line chart appears instantly.\n\n**The Result: An Empowered, Data-Driven User**\n\nBy implementing this agentic workflow, you create a system that is far more valuable than a traditional BI tool. You democratize data access, eliminate the need for specialized training, and allow everyone, from executives to managers to get critical insights instantly. The interface adapts to the user's intent, not the other way around, leading to faster, better-informed decisions.","post_url":"https://www.linkedin.com/feed/update/urn:li:activity:7350259490627149824","post_urn":"urn:li:activity:7350259490627149824","posted_hours_ago":7920,"posted_time":"2025-07-25","posted_time_raw":"11mo","reaction_count":30,"reaction_types":"LIKE, EMPATHY","repost_count":1,"source":"activity","video_url":"https://media.licdn.com/dms/image/v2/D4E05AQHdLwubl39T3Q/videocover-low/B4EZgFd.UDG4CI-/0/1752438415946?e=1783008000&v=beta&t=OIuuCdp5_bkqRB0hmoEOaHuKcfcN3LiNCX7oyOlWzcA"},{"article_description":null,"article_title":null,"article_url":null,"author_headline":"Deploying enterprise agents in production / CTO / SWE Leader / GVP @ Publicis Sapient","author_name":"Ravi Evani\n              \n                \n                   \n    \n      \n    \n    \n      \n    \n\n • You","author_profile_image_url":"https://media.licdn.com/dms/image/v2/C4E03AQGNeJRorEd2Nw/profile-displayphoto-shrink_100_100/profile-displayphoto-shrink_100_100/0/1569287114631?e=1784160000&v=beta&t=tJDZC7EXWnlgIIf8kF7fBCajhF-HEgzNXnz_IIkjqW8","author_profile_url":"https://www.linkedin.com/in/ravievani","comment_count":9,"has_image":true,"impression_count":6562,"is_article":false,"is_my_post":true,"is_video":false,"post_image_url":"https://media.licdn.com/dms/image/v2/D4E22AQHU0HjGZHsPjA/feedshare-shrink_800/B4EZf6cURFHgAk-/0/1752253418971?e=1784160000&v=beta&t=3zhs-z0YqehlyMyhh_cFdIbEpiY7oxcsLggXaCyLuAU","post_text":"How to Build an AI Agent for Data Analysis: A Blueprint\n\nAn \"agent\" is more than just a chatbot. It’s a system designed to understand a goal, create a plan, and use tools to actively accomplish that goal. You can build your own powerful agent for data analysis, transforming how users interact with their data. This blueprint outlines the core components required to turn simple questions into actionable insights.\n\nAn agentic system is built on three foundational concepts: an LLM for reasoning, a set of tools for taking action, and a sophisticated memory for learning and context.\n\n1. The LLM: Your Agent's Reasoning Core\nAt the heart of any data analysis agent is its reasoning core: a Large Language Model (LLM) like OpenAI's GPT or Google's Gemini. To build this, create a central orchestrator service (e.g., a Chat Service). This service shouldn't just pass the user's question to the LLM. Instead, it should enrich the prompt with context from the agent's memory. The LLM's role is not merely to respond, but to create a step-by-step plan and generate the precise Python code needed to perform the analysis.\n\n2. Tools: Give Your Agent Hands-on Capabilities\nAn agent is only as good as the tools it can use. For a data analysis agent, the primary tool is the ability to execute code. After the LLM generates an analysis script, your orchestrator service must run it against the relevant dataset. This is the most critical agentic step: it moves the system from simply planning to actively doing. You can equip your agent with other tools, such as services for data loading, chart generation, or even calling external APIs, allowing it to handle a wide variety of analytical tasks.\n\n3. Memory: Enable Context and Learning\nTo elevate your agent from a one-shot tool to an intelligent partner, you need to implement memory. A robust approach is to use a graph database like Neo4j to manage two distinct types:\n➜ Short-Term Memory: Implement a mechanism to track the current conversation history for each user session. This allows your agent to understand follow-up questions (\"now show me that by region\") and maintain context, just like a human analyst would.\n➜ Long-Term Memory: This is where your agent can learn. Every time it successfully executes an analysis, store the user's query and the generated code as a \"solution.\" By creating a vector embedding of the query, you can enable semantic search. When a new question comes in, the agent can first search its long-term memory for a similar problem it has already solved, allowing it to deliver accurate results faster and more efficiently over time.\n\nBy integrating these three components, your application will function as a true AI agent. Your central orchestrator service will drive the powerful loop of Memory -> Reasoning -> Action, creating a system that doesn't just answer questions, but actively solves them.","post_url":"https://www.linkedin.com/feed/update/urn:li:activity:7349483527769362433","post_urn":"urn:li:activity:7349483527769362433","posted_hours_ago":7920,"posted_time":"2025-07-25","posted_time_raw":"11mo","reaction_count":123,"reaction_types":"LIKE, INTEREST, PRAISE","repost_count":4,"source":"activity","video_url":null},{"article_description":null,"article_title":null,"article_url":null,"author_headline":"Deploying enterprise agents in production / CTO / SWE Leader / GVP @ Publicis Sapient","author_name":"Ravi Evani\n              \n                \n                   \n    \n      \n    \n    \n      \n    \n\n • You","author_profile_image_url":"https://media.licdn.com/dms/image/v2/C4E03AQGNeJRorEd2Nw/profile-displayphoto-shrink_100_100/profile-displayphoto-shrink_100_100/0/1569287114631?e=1784160000&v=beta&t=tJDZC7EXWnlgIIf8kF7fBCajhF-HEgzNXnz_IIkjqW8","author_profile_url":"https://www.linkedin.com/in/ravievani","comment_count":1,"has_image":true,"impression_count":1157,"is_article":false,"is_my_post":true,"is_video":true,"post_image_url":"https://media.licdn.com/dms/image/v2/D4E05AQHBZVGSVnnxKw/videocover-high/B4EZfsdNGHHYCI-/0/1752018770515?e=1783008000&v=beta&t=Lzlp_7xnKdk6wQt5BraCWQAXjGCgGvpbKcpTXU-Z4-g","post_text":"When your AI asks, \"Do you approve?\" but immediately moves on to change your code without waiting for your response — it's more than just a funny scenario. It's a glimpse into the future of knowledge work.\n\nThis highlights a fundamental shift in human-machine collaboration. Unlike traditional automation that follows rigid rules, AI makes contextual judgments. It's not just a tool, it's more like working with a junior developer who sometimes reads the room wrong.\n\nThe psychological tension is real: we want to be consulted even when we're willing to delegate. We crave agency and control, yet we also want the productivity gains that come from AI autonomy.\n\nThis dynamic extends far beyond code. It's the same tension when AI drafts your emails, suggests design changes, or analyzes your data. We're all learning to navigate this new form of collaboration.\n\nHere's what teams should consider as AI becomes more autonomous:\n⇥ Context matters more than speed. When AI suggests refactoring critical processing logic - that requires explicit approval. When it's updating variable names for consistency, maybe not.\n\n⇥ Teach AI to read your organization's risk tolerance. High-stakes decisions (database changes, customer-facing changes) should always pause for human input. Low-stakes improvements can proceed with post-hoc review.\n\n⇥ Build in failure recovery, not just prevention. What happens when AI misreads team conventions or business context? Design workflows that can quickly roll back and learn from mistakes.\n\nAI can dramatically increase productivity, but the goal isn't to keep it on a leash, it's to teach it to read the room. The teams that master this balance will define the future of collaborative work.","post_url":"https://www.linkedin.com/feed/update/urn:li:activity:7348499345157087232","post_urn":"urn:li:activity:7348499345157087232","posted_hours_ago":7920,"posted_time":"2025-07-25","posted_time_raw":"11mo","reaction_count":12,"reaction_types":"LIKE, EMPATHY","source":"activity","video_url":"https://media.licdn.com/dms/image/v2/D4E05AQHBZVGSVnnxKw/videocover-high/B4EZfsdNGHHYCI-/0/1752018770515?e=1783008000&v=beta&t=Lzlp_7xnKdk6wQt5BraCWQAXjGCgGvpbKcpTXU-Z4-g"},{"article_description":null,"article_title":null,"article_url":null,"author_headline":"Deploying enterprise agents in production / CTO / SWE Leader / GVP @ Publicis Sapient","author_name":"Ravi Evani\n              \n                \n                   \n    \n      \n    \n    \n      \n    \n\n • You","author_profile_image_url":"https://media.licdn.com/dms/image/v2/C4E03AQGNeJRorEd2Nw/profile-displayphoto-shrink_100_100/profile-displayphoto-shrink_100_100/0/1569287114631?e=1784160000&v=beta&t=tJDZC7EXWnlgIIf8kF7fBCajhF-HEgzNXnz_IIkjqW8","author_profile_url":"https://www.linkedin.com/in/ravievani","has_image":true,"impression_count":1014,"is_article":false,"is_my_post":true,"is_video":true,"post_image_url":"https://media.licdn.com/dms/image/v2/D4E05AQG0xRimWKqgUg/videocover-high/B4EZflAymvHwCI-/0/1751893883178?e=1783008000&v=beta&t=frUsuIdjYrxHgHrYtPK0_B6vliThJqBKk9Y6H-MUTBY","post_text":"6 take-aways to sharpen your UX thinking for AI-driven Enterprise Dashboards :\n\n① Make confidence a first-class output. Display data quality scores or completeness percentages next to results, so leaders can gauge risk before acting.\n\n② Surface the “why” with the “what.” Pair every metric with an inline explanation of the key filters, joins, or assumptions the model used. Users gain context without hunting for it.\n\n③ Let users poke holes fast. One-click drill-downs (e.g., “see calculation steps”) invite scrutiny and build trust without derailing flow.\n\n④ Cache visual states for iteration. Allow users to bookmark a specific query + visualization. That speeds decision cycles.\n\n⑤ Use smart autocomplete as a thinking aid. Guide users with predictive query suggestions that reflect their data model and past behavior. Done well, this shortens learning curves and nudges users toward better questions.\n\n⑥ Design for the gray area. Flag partial answers—when data gaps prevent a definitive result, rather than forcing a yes/no or number. Transparency beats false precision.\n\nBuild these mechanics in from day one; retrofitting trust and traceability is expensive and rarely done well.","post_url":"https://www.linkedin.com/feed/update/urn:li:activity:7347975560037384193","post_urn":"urn:li:activity:7347975560037384193","posted_hours_ago":7920,"posted_time":"2025-07-25","posted_time_raw":"11mo","reaction_count":14,"reaction_types":"LIKE","source":"activity","video_url":"https://media.licdn.com/dms/image/v2/D4E05AQG0xRimWKqgUg/videocover-high/B4EZflAymvHwCI-/0/1751893883178?e=1783008000&v=beta&t=frUsuIdjYrxHgHrYtPK0_B6vliThJqBKk9Y6H-MUTBY"},{"article_description":null,"article_title":null,"article_url":null,"author_headline":"Deploying enterprise agents in production / CTO / SWE Leader / GVP @ Publicis Sapient","author_name":"Ravi Evani\n              \n                \n                   \n    \n      \n    \n    \n      \n    \n\n • You","author_profile_image_url":"https://media.licdn.com/dms/image/v2/C4E03AQGNeJRorEd2Nw/profile-displayphoto-shrink_100_100/profile-displayphoto-shrink_100_100/0/1569287114631?e=1784160000&v=beta&t=tJDZC7EXWnlgIIf8kF7fBCajhF-HEgzNXnz_IIkjqW8","author_profile_url":"https://www.linkedin.com/in/ravievani","comment_count":2,"has_image":true,"impression_count":1327,"is_article":false,"is_my_post":true,"is_video":true,"post_image_url":"https://media.licdn.com/dms/image/v2/D4E05AQFU7zNof9nHsA/feedshare-thumbnail_720_1280/B4EZe8jG2_GwA0-/0/1751215010535?e=1783008000&v=beta&t=aqxnuJBFa9EOmOmfZmjunyJDeSteZRX2vcNknqkkj_8","post_text":"Achieving 3x-25x Performance Gains for High-Quality, AI-Powered Data Analysis\n\nAsking complex data questions in plain English and getting precise answers feels like magic, but it’s technically challenging.\n\nOne of my jobs is analyzing the health of numerous programs. To make that easier we are building an AI app with Sapient Slingshot that answers natural language queries by generating and executing code on project/program health data.\n\nThe challenge is that this process needs to be both fast and reliable.\n\nWe started with gemini-2.5-pro, but 50+ second response times and inconsistent results made it unsuitable for interactive use.\n\nOur goal: reduce latency without sacrificing accuracy.\n\nThe New Bottleneck: Tuning \"Think Time\"\n\nTraditional optimization targets code execution, but in AI apps, the real bottleneck is LLM \"think time\", i.e. the delay in generating correct code on the fly.\n\nHere are some techniques we used to cut think time while maintaining output quality:\n\n① Context-Rich Prompts\nAccuracy starts with context. We dynamically create prompts for each query:\n\n➜ Pre-Processing Logic: We pre-generate any code that doesn't need \"intelligence\" so that LLM doesn't have to\n➜ Dynamic Data-Awareness: Prompts include full schema, sample data, and value stats to give the model a full view.\n➜ Domain Templates: We tailor prompts for specific ontology like \"Client satisfaction\" or \"Cycle Time\" or \"Quality\".\n\nThis reduces errors and latency, improving codegen quality from the first try.\n\n② Structured Code Generation\nEven with great context, LLMs can output messy code. We guide query structure explicitly:\n\n➜ Simple queries: Direct the LLM to generate a single line chained pandas expression.\n➜ Complex queries : Direct the LLM to generate two lines, one for processing, one for the final result\n\nClear patterns ensure clean, reliable output.\n\n③ Two-Tiered Caching for Speed\nOnce accuracy was reliable, we tackled speed with intelligent caching:\n\n➜ Tier 1: Helper Cache – 3x Faster\n\n⊙ Find a semantically similar past query\n⊙ Use a faster model (e.g. gemini-2.5-flash)\n⊙ Include the past query and code as a one-shot prompt\n\nThis cut response times from 50+s to \u003c15s while maintaining accuracy.\n\n➜ Tier 2: Lightning Cache – 25x Faster\n\n⊙ Detect duplicates for exact or near matches\n⊙ Reuse validated code\n⊙ Execute instantly, skipping the LLM\n\nThis brought response times to ~2 seconds for repeated queries.\n\n④ Advanced Memory Architecture\n\n➜ Graph Memory (Neo4j via Graphiti): Stores query history, code, and relationships for fast, structured retrieval.\n➜ High-Quality Embeddings: We use BAAI/bge-large-en-v1.5 to match queries by true meaning.\n➜ Conversational Context: Full session history is stored, so prompts reflect recent interactions, enabling seamless follow-ups.\n\nBy combining rich context, structured code, caching, and smart memory, we can build AI systems that deliver natural language querying with the speed and reliability that we, as users, expect of it.","post_url":"https://www.linkedin.com/feed/update/urn:li:activity:7345128790353690624","post_urn":"urn:li:activity:7345128790353690624","posted_hours_ago":7920,"posted_time":"2025-07-25","posted_time_raw":"11mo","reaction_count":25,"reaction_types":"LIKE, INTEREST, PRAISE","source":"activity","video_url":"https://media.licdn.com/dms/image/v2/D4E05AQFU7zNof9nHsA/feedshare-thumbnail_720_1280/B4EZe8jG2_GwA0-/0/1751215010535?e=1783008000&v=beta&t=aqxnuJBFa9EOmOmfZmjunyJDeSteZRX2vcNknqkkj_8"},{"article_description":null,"article_title":null,"article_url":null,"author_headline":"Deploying enterprise agents in production / CTO / SWE Leader / GVP @ Publicis Sapient","author_name":"Ravi Evani\n              \n                \n                   \n    \n      \n    \n    \n      \n    \n\n • You","author_profile_image_url":"https://media.licdn.com/dms/image/v2/C4E03AQGNeJRorEd2Nw/profile-displayphoto-shrink_100_100/profile-displayphoto-shrink_100_100/0/1569287114631?e=1784160000&v=beta&t=tJDZC7EXWnlgIIf8kF7fBCajhF-HEgzNXnz_IIkjqW8","author_profile_url":"https://www.linkedin.com/in/ravievani","comment_count":4,"has_image":true,"impression_count":4935,"is_article":false,"is_my_post":true,"is_video":true,"post_image_url":"https://media.licdn.com/dms/image/v2/D4E05AQHRecFPXx98OA/videocover-low/B4EZexBEeVHYCI-/0/1751021546786?e=1783008000&v=beta&t=8cvuYlm6a7qFf1U9f4hFJCUfiwN7D10Xzfs8AQXCJOs","post_text":"Just wrapped up an amazing discussion with 30 brilliant Publicis Sapient engineering interns about many questions on their mind, including the future of product development.\n\nThe old way: Linear handoffs User need → PM specs → Design → Engineering → Build\n\nThe new reality: Fluid collaboration from day one\n\nHere's what's happening:\n➜ Engineers can now prototype before waiting for \"requirements\"\n➜ PMs can build functional demos without needing a \"team\"\n➜ Anyone can champion a product idea and drive it forward\n\nThe \"handshake\" between disciplines is becoming dynamic, not sequential\n\nWe're moving from story handoffs to collaborative product evolution. Instead of asking \"whose sprint is this?\" we're asking \"how can we accelerate value?\"\n\nBut here's the crucial part: expertise still matters more than ever.\n\nWhen an engineer asks Sapient Slingshot to build a page with offers, the UX person asks: \"How do we know users will even scroll this far?\"\n\nWhen a PM vibe codes a feature, the engineer questions: \"How fast will this data load without breaking the page?\"\n\nBottom line is that collaboration will happen no more in documents and drawings, it will happen on top of something that is real from day one, with each discipline contributing their unique lens throughout the process.\n\nThank you, interns, for the depth and thoughtfulness of your questions. You weren’t just focused on tools or tech stacks, you were trying to understand how teams operate, how to grow within your roles, and how to contribute meaningfully.\n\nYou asked about real-world collaboration between product and engineering, how to handle rejected ideas, and how success is measured from both personal and client perspectives.\n\nYou were curious about how agile adapts to different clients, how to navigate unclear project briefs, and how engineers influence adoption.\n\nYou even dug into how to ramp up quickly on new tech and contribute beyond your role.\n\nIt’s clear you’re already thinking with a professional mindset. Keep experimenting in the open and sharpening together—that’s how you’ll define the next decade of products for our clients and their customers!","post_url":"https://www.linkedin.com/feed/update/urn:li:activity:7344316720137822210","post_urn":"urn:li:activity:7344316720137822210","posted_hours_ago":7920,"posted_time":"2025-07-25","posted_time_raw":"11mo","reaction_count":67,"reaction_types":"LIKE, PRAISE, EMPATHY","repost_count":5,"source":"activity","video_url":"https://media.licdn.com/dms/image/v2/D4E05AQHRecFPXx98OA/videocover-low/B4EZexBEeVHYCI-/0/1751021546786?e=1783008000&v=beta&t=8cvuYlm6a7qFf1U9f4hFJCUfiwN7D10Xzfs8AQXCJOs"},{"article_description":null,"article_title":null,"article_url":null,"author_headline":"Deploying enterprise agents in production / CTO / SWE Leader / GVP @ Publicis Sapient","author_name":"Ravi Evani\n              \n                \n                   \n    \n      \n    \n    \n      \n    \n\n • You","author_profile_image_url":"https://media.licdn.com/dms/image/v2/C4E03AQGNeJRorEd2Nw/profile-displayphoto-shrink_100_100/profile-displayphoto-shrink_100_100/0/1569287114631?e=1784160000&v=beta&t=tJDZC7EXWnlgIIf8kF7fBCajhF-HEgzNXnz_IIkjqW8","author_profile_url":"https://www.linkedin.com/in/ravievani","comment_count":2,"has_image":true,"impression_count":3567,"is_article":false,"is_my_post":true,"is_video":true,"post_image_url":"https://media.licdn.com/dms/image/v2/D4D05AQGuHh2bHU4KDw/videocover-high/B4DZedBGooGsB8-/0/1750686023613?e=1783008000&v=beta&t=Z4ifKCNPFEhixuos55ABXmWCW6sKGLn_WU1UAfDSCXI","post_text":"Fun times at hashtag#VivaTech2025 w/ Marzana and Vikash\n\nPeople ask me why we are building Sapient Slingshot, our own SDLC platform.\n\nOne of the key reasons is this:\n\nFragmentation kills velocity.\n\nIn a typical enterprise release, work hops across 7-10 hand-offs—product, design, architecture, security, compliance, test, ops. Internal timing studies show each hand-off burns 8-15 % of the schedule through context-switching and re-work. Compound that loss and half the calendar is gone before code hits production.\n\nThree deeper problems hide inside those hand-offs:\n\n➜ Context decay – Specs drift, tribal knowledge never makes it into tickets, and by the time code is reviewed the original “why” is blurred.\n➜ Invisible queues – Work waits in inboxes and backlogs longer than it takes to execute, masking true bottlenecks.\n➜ Misaligned incentives – Each function optimizes its own metric (story points, test coverage, uptime) instead of the end-to-end outcome.\n\nSlingshot attacks all three.\n\nUnified context graph: AI agents ingest requirements, architecture decisions, data lineage, and risk controls into one shared model that stays with the work item from idea to production. No more context-hunting.\n\nCompound leverage: Automations at every stage (PRD analysis, architecture scaffolding, code generation, risk scanning, release notes) deliver 2-3x time savings per step, and the gains stack instead of resetting at the next hand-off.\n\nOutcome-based guardrails: The platform measures flow time, defect escape rate, and business impact continuously, so teams steer by real results, not loc
