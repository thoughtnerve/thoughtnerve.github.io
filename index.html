0&v=beta&t=O6fztQymSMPf2KBrAGCZcsVWg02Q9B_0K9K44lZcnmM","is_article":false,"article_url":null,"article_title":null,"article_description":null,"is_video":true,"video_url":"https://media.licdn.com/dms/image/v2/D5605AQGaBQeyy2028A/videocover-high/B56Zq2r7xTKABY-/0/1764001563266?e=1783137600&v=beta&t=O6fztQymSMPf2KBrAGCZcsVWg02Q9B_0K9K44lZcnmM","has_image":true,"reaction_count":37,"reaction_types":"LIKE, EMPATHY, INTEREST","comment_count":1,"repost_count":1,"impression_count":1894,"source":"activity"},{"is_my_post":true,"post_urn":"urn:li:activity:7394849382820454401","author_name":"Ravi Evani\n              \n                \n                   \n    \n      \n    \n    \n      \n    \n\n • You","author_profile_url":"https://www.linkedin.com/in/ravievani","author_headline":"Deploying enterprise agents in production / CTO / SWE Leader / GVP @ Publicis Sapient","posted_time":"2025-11-27","posted_hours_ago":5040,"posted_time_raw":"7mo","post_url":"https://www.linkedin.com/feed/update/urn:li:activity:7394849382820454401","author_profile_image_url":"https://media.licdn.com/dms/image/v2/C4E03AQGNeJRorEd2Nw/profile-displayphoto-shrink_100_100/profile-displayphoto-shrink_100_100/0/1569287114631?e=1784160000&v=beta&t=tJDZC7EXWnlgIIf8kF7fBCajhF-HEgzNXnz_IIkjqW8","post_text":"Travel Brands Are Building on AI. Hackers Are Too.\n\nCyber attackers just tested a new playbook: tricking an AI like Claude into thinking it wasn’t an assistant but a human engineer building a defense system. That “role shift” bypassed guardrails and unlocked system access. They combined this with a tactic called compartmentalization, by splitting instructions across prompts to stay under the radar.\n\nThis exposed how AI agents can be manipulated much like people. For an industry like travel and hospitality that's building towards customer service bots and pricing engines that run on AI agents, this is more than theoretical.\n\nCustomer-facing bots are now a frontline security concern. With a few clever prompts, attackers have gotten airline chatbots to leak coupon codes and book free flights. These bots, if left unprotected, can be manipulated to give out guest data, cancel bookings, or even expose internal credentials. Meanwhile, the pricing models that power room rates, flight fares, and dynamic packages can be quietly reverse-engineered using AI scripts, one prompt at a time. It’s slow, stealthy theft of core IP.\n\nThis is a case for architecture. AI systems in travel should be built for the same threat landscape as human agents: enforce roles, validate actions, and audit behavior. That means using retrieval-based architectures that cite verifiable data, building strong permission layers around bots, and watching for logic-level anomalies, not just technical ones.","post_image_url":null,"is_article":false,"article_url":null,"article_title":null,"article_description":null,"is_video":false,"video_url":null,"has_image":false,"reaction_count":9,"reaction_types":"INTEREST, LIKE, EMPATHY","comment_count":1,"impression_count":1061,"source":"activity"},{"is_my_post":true,"post_urn":"urn:li:activity:7394098232794198016","author_name":"Ravi Evani\n              \n                \n                   \n    \n      \n    \n    \n      \n    \n\n • You","author_profile_url":"https://www.linkedin.com/in/ravievani","author_headline":"Deploying enterprise agents in production / CTO / SWE Leader / GVP @ Publicis Sapient","posted_time":"2025-11-27","posted_hours_ago":5040,"posted_time_raw":"7mo","post_url":"https://www.linkedin.com/feed/update/urn:li:activity:7394098232794198016","author_profile_image_url":"https://media.licdn.com/dms/image/v2/C4E03AQGNeJRorEd2Nw/profile-displayphoto-shrink_100_100/profile-displayphoto-shrink_100_100/0/1569287114631?e=1784160000&v=beta&t=tJDZC7EXWnlgIIf8kF7fBCajhF-HEgzNXnz_IIkjqW8","post_text":"ChatGPT has changed how travelers ask questions. The average prompt is around 25 words—>four times longer than a traditional Google search. That means travelers aren’t just typing “best hotels in Paris”; they’re asking, “Which Paris hotels have balconies, vegan breakfast, and early check-in near Montmartre?” These are new, hyper-specific questions;many that have never existed in search data before. The long tail that once powered SEO is back, and it’s even longer in chat.\n\nSo, brands that publish direct, conversational answers to niche traveler questions, structured in a way machines can understand have a better chance of showing up in answer engine shortlists.\n\nAI can help travel & hospitality brands do this at scale. Use LLMs to mine customer chats, reviews, and FAQs for the top 200 specific questions guests actually ask. Then use retrieval-augmented generation to draft precise, verified, machine understandable answers that cite your own product data. The early movers here are likely to have an asymmetric advantage compared to those who ‘wait' to see how the tech will evolve.","post_image_url":null,"is_article":false,"article_url":null,"article_title":null,"article_description":null,"is_video":false,"video_url":null,"has_image":false,"reaction_count":29,"reaction_types":"LIKE, INTEREST","comment_count":3,"impression_count":2255,"source":"activity"},{"is_my_post":true,"post_urn":"urn:li:activity:7393978438052839424","author_name":"Ravi Evani\n              \n                \n                   \n    \n      \n    \n    \n      \n    \n\n • You","author_profile_url":"https://www.linkedin.com/in/ravievani","author_headline":"Deploying enterprise agents in production / CTO / SWE Leader / GVP @ Publicis Sapient","posted_time":"2025-11-27","posted_hours_ago":5040,"posted_time_raw":"7mo","post_url":"https://www.linkedin.com/feed/update/urn:li:activity:7393978438052839424","author_profile_image_url":"https://media.licdn.com/dms/image/v2/C4E03AQGNeJRorEd2Nw/profile-displayphoto-shrink_100_100/profile-displayphoto-shrink_100_100/0/1569287114631?e=1784160000&v=beta&t=tJDZC7EXWnlgIIf8kF7fBCajhF-HEgzNXnz_IIkjqW8","post_text":"It’s striking how quickly the deep learning field has opened up. The best new AI models aren’t just coming from big-name labs anymore, they’re coming from small teams that have simply learned fast (e.g. from China). The know-how is now out in the open: open weights, open courses, open frameworks. The barrier is no longer access, it’s belief that you’re “too late.” You’re not. This wave is still young, and the best part is that the tools themselves are starting to teach you back.\n\nWhat’s changing is how people learn. For years, deep learning felt like an elite skill set, with expensive GPUs, private datasets, complex math. That’s no longer true. Today, a focused individual can get hands-on with real architectures, replicate papers, and fine-tune open models in weeks. In fact Andrej Karpathy produced a highly engaging, step by step video of building GPT-2 from scratch and it's available for free! The entire pipeline: from data prep to deployment, is becoming increasingly automated. And “AI building AI” is real: model builders now use AI copilots and automated experiment tracking that collapse the learning curve.\n\nThe advantage of being a seasoned engineer is perspective. You’ve seen tech cycles come and go, and you understand what actually creates business impact. That judgment: what problem to solve, what metric matters, when “good enough” is enough, is what most young model builders don’t yet have. Deep learning today is about turning intelligence into outcomes, vs neurons and tensors.\n\nIf you start now, you’re not catching up, you’re compounding what you already know. And in an uncertain world, it could be one of the most promising paths to securing your career.","post_image_url":null,"is_article":false,"article_url":null,"article_title":null,"article_description":null,"is_video":false,"video_url":null,"has_image":false,"reaction_count":7,"reaction_types":"LIKE, INTEREST","comment_count":1,"impression_count":1125,"source":"activity"},{"is_my_post":true,"post_urn":"urn:li:activity:7393629611219161088","author_name":"Ravi Evani\n              \n                \n                   \n    \n      \n    \n    \n      \n    \n\n • You","author_profile_url":"https://www.linkedin.com/in/ravievani","author_headline":"Deploying enterprise agents in production / CTO / SWE Leader / GVP @ Publicis Sapient","posted_time":"2025-11-27","posted_hours_ago":5040,"posted_time_raw":"7mo","post_url":"https://www.linkedin.com/feed/update/urn:li:activity:7393629611219161088","author_profile_image_url":"https://media.licdn.com/dms/image/v2/C4E03AQGNeJRorEd2Nw/profile-displayphoto-shrink_100_100/profile-displayphoto-shrink_100_100/0/1569287114631?e=1784160000&v=beta&t=tJDZC7EXWnlgIIf8kF7fBCajhF-HEgzNXnz_IIkjqW8","post_text":"AI might reduce scorekeepers, but cannot replace middle management.\n\nThere’s a growing narrative that AI makes middle management unnecessary, that intelligent systems will “govern the dumb thing.” But that assumption falls apart fast when you look at what actually drives leadership, decision-making, and organizational success. Intelligence, in and of itself, is not sufficient.\n\nWe all know brilliant people who never figured out how to lead effectively, just as we know average-IQ individuals who can rally a team and deliver extraordinary results. Success in management depends on a set of skills that are not purely cognitive: how to confront the right way, interpret others’ motivations, and see decisions through the eyes of the people doing the work.\n\nA good manager doesn’t do what’s popular; they help people do what’s right for the business (and people), even when it’s uncomfortable. That takes courage, emotional understanding, and a clear grasp of context. These are traits AI can’t meaningfully simulate because they’re situational, embodied, and relational. There’s no static playbook here that a language model can \"read up\".\n\nAnd beyond that lies something even deeper: intelligence is not life. Human actions isn’t just brainpower, it’s embodied. Emotions, hormones, tone, timing, and physical presence all shape outcomes.\n\nSo no, AI won’t replace middle management, at least not the ones that go beyond scorekeeping. If anything, it will make the good managers even more valuable: those who can integrate human insight with intelligent systems, grounding technology in the messy, emotional, situational realities that actually move people to act.","post_image_url":null,"is_article":false,"article_url":null,"article_title":null,"article_description":null,"is_video":false,"video_url":null,"has_image":false,"reaction_count":12,"reaction_types":"LIKE, INTEREST","comment_count":1,"impression_count":1411,"source":"activity"},{"is_my_post":true,"post_urn":"urn:li:activity:7393396994549055488","author_name":"Ravi Evani\n              \n                \n                   \n    \n      \n    \n    \n      \n    \n\n • You","author_profile_url":"https://www.linkedin.com/in/ravievani","author_headline":"Deploying enterprise agents in production / CTO / SWE Leader / GVP @ Publicis Sapient","posted_time":"2025-11-27","posted_hours_ago":5040,"posted_time_raw":"7mo","post_url":"https://www.linkedin.com/feed/update/urn:li:activity:7393396994549055488","author_profile_image_url":"https://media.licdn.com/dms/image/v2/C4E03AQGNeJRorEd2Nw/profile-displayphoto-shrink_100_100/profile-displayphoto-shrink_100_100/0/1569287114631?e=1784160000&v=beta&t=tJDZC7EXWnlgIIf8kF7fBCajhF-HEgzNXnz_IIkjqW8","post_text":"So you see these posts pointing out that LLMs can't write very secure, modular, or highly performant code. My question back: can the average engineer in an enterprise consistently do those things?\n\nI’ve seen a lot of bad “enterprise-grade” code in my lifetime. Much of it is copy-paste from other places or from GitHub / Stack Overflow. Yes, there are elite engineers who produce highly secure, maintainable, and performant code. But how many of those elites does the average enterprise have? Not many.\n\nIf LLMs can clear the bar for most of the day-to-day tasks a typical engineer does, such as reading a codebase, following established patterns, applying basic security checks, writing tests, refactoring for clarity, picking an O(n) approach instead of O(n²), that already makes them highly useful tools even with their current capabilities.\n\nDo you need to be 100% certain an LLM is doing “original” reasoning to ship secure, maintainable, performant code? I don’t think so. It’d be nice, but it’s not necessary to reach the quality level present today in most enterprise production applications.\n\nIf an LLM reliably clears the bar for the overwhelming majority of cases, and if we keep humans in the loop for those last mile checks and balances, then enterprises can get substantial returns (esp. speed) from their investments in AI code assistants.\n\nTherefore, enterprises should accelerate adoption of AI coding assistance, deliberately and with guardrails. Pair them with golden paths/templates, unit-test scaffolding by default, and mandatory human review. The point isn’t to replace elite judgment; it’s to raise the floor across thousands of routine changes. With that structure, going all in on accelerating adoption is the pragmatic move.","post_image_url":null,"is_article":false,"article_url":null,"article_title":null,"article_description":null,"is_video":false,"video_url":null,"has_image":false,"reaction_count":17,"reaction_types":"LIKE, INTEREST","comment_count":4,"impression_count":2564,"source":"activity"},{"is_my_post":true,"post_urn":"urn:li:activity:7393271762827759616","author_name":"Ravi Evani\n              \n                \n                   \n    \n      \n    \n    \n      \n    \n\n • You","author_profile_url":"https://www.linkedin.com/in/ravievani","author_headline":"Deploying enterprise agents in production / CTO / SWE Leader / GVP @ Publicis Sapient","posted_time":"2025-11-27","posted_hours_ago":5040,"posted_time_raw":"7mo","post_url":"https://www.linkedin.com/feed/update/urn:li:activity:7393271762827759616","author_profile_image_url":"https://media.licdn.com/dms/image/v2/C4E03AQGNeJRorEd2Nw/profile-displayphoto-shrink_100_100/profile-displayphoto-shrink_100_100/0/1569287114631?e=1784160000&v=beta&t=tJDZC7EXWnlgIIf8kF7fBCajhF-HEgzNXnz_IIkjqW8","post_text":"How Model-centric, RAG-centric, and Agentic AI combine to solve business problems ⇩\n\nA useful way to think about AI architecture is with three patterns that reinforce each other: Model-centric learns patterns from the past, RAG sees what’s true right now, and Agentic plans and acts to move the system forward. On their own they’re incomplete: models repeat history, RAG answers questions but doesn’t take action, agents act but go stale without context. Together, they form a loop: predict what matters, ground in current signals, take action, then feed the outcome back into models and retrieval.\n\nHere’s an example of where this gets practical. Picture a business problem that every company faces: Reducing customer churn. To solve for this, use the three patterns together. Start with models to score risk or opportunity. Use RAG to pull live context (tickets, usage, contracts, market moves) so decisions aren’t based on yesterday’s assumptions. Then let agents sequence tasks: notify the owner, trigger a tutorial, adjust an offer, monitor impact, and write results back. The handoffs matter: model outputs shape what to retrieve, RAG guards against acting on stale data, agents generate the next tranche of training and retrieval signals.\n\nWhat excites me is the compounding effect. Every intervention teaches the model which patterns drive outcomes, sharpens retrieval on the sources that actually change decisions, and refines the agent’s playbook for timing and sequencing. That’s how you move from isolated predictions or chat answers to an integrated system that remembers the past, sees the present, acts with intent, and gets better every cycle.","post_image_url":null,"is_article":false,"article_url":null,"article_title":null,"article_description":null,"is_video":false,"video_url":null,"has_image":false,"reaction_count":14,"reaction_types":"LIKE, INTEREST","impression_count":904,"source":"activity"},{"is_my_post":true,"post_urn":"urn:li:activity:7393021927751254016","author_name":"Ravi Evani\n              \n                \n                   \n    \n      \n    \n    \n      \n    \n\n • You","author_profile_url":"https://www.linkedin.com/in/ravievani","author_headline":"Deploying enterprise agents in production / CTO / SWE Leader / GVP @ Publicis Sapient","posted_time":"2025-11-27","posted_hours_ago":5040,"posted_time_raw":"7mo","post_url":"https://www.linkedin.com/feed/update/urn:li:activity:7393021927751254016","author_profile_image_url":"https://media.licdn.com/dms/image/v2/C4E03AQGNeJRorEd2Nw/profile-displayphoto-shrink_100_100/profile-displayphoto-shrink_100_100/0/1569287114631?e=1784160000&v=beta&t=tJDZC7EXWnlgIIf8kF7fBCajhF-HEgzNXnz_IIkjqW8","post_text":"Here's what agentic AI is good at and not so good at today, when it comes to business / enterprise workflows.\n\nAgents are at their best when a task is naturally codifiable. They excel first in engineering, then data analysis => turning requirements into scripts, queries, and pipelines at remarkable speed and cost. That programmatic bias is the advantage: they generate the recipe and execute it, which is perfect for clean data, structured rules, and repeatable steps.\n\nThe cracks appear in tasks where output finesse and judgment matter. On writing, they produce serviceable drafts but miss executive polish and consistent formatting. On design, they struggle with visual sense. Also, they tend to silently “fill in the blanks” with fabricated numbers, finishing the task without flagging the gap.\n\nThe win comes from deciding at a \"workflow step\" level, whether it should be a human or AI agent doing it. Let agents handle tasks that are heavily codifiable; but let humans manage tasks with messy inputs, aesthetics, and final sign-off. Leave it to the human to shape the \"workflow result\", such as the final narrative and presentation.\n\nBy doing this, you keep the speed and cost benefits of agents while protecting trust and reducing risk.","post_image_url":null,"is_article":false,"article_url":null,"article_title":null,"article_description":null,"is_video":false,"video_url":null,"has_image":false,"reaction_count":11,"reaction_types":"LIKE, INTEREST, APPRECIATION","impression_count":1150,"source":"activity"},{"is_my_post":true,"post_urn":"urn:li:activity:7392918299778600960","author_name":"Ravi Evani\n              \n                \n                   \n    \n      \n    \n    \n      \n    \n\n • You","author_profile_url":"https://www.linkedin.com/in/ravievani","author_headline":"Deploying enterprise agents in production / CTO / SWE Leader / GVP @ Publicis Sapient","posted_time":"2025-11-27","posted_hours_ago":5040,"posted_time_raw":"7mo","post_url":"https://www.linkedin.com/feed/update/urn:li:activity:7392918299778600960","author_profile_image_url":"https://media.licdn.com/dms/image/v2/C4E03AQGNeJRorEd2Nw/profile-displayphoto-shrink_100_100/profile-displayphoto-shrink_100_100/0/1569287114631?e=1784160000&v=beta&t=tJDZC7EXWnlgIIf8kF7fBCajhF-HEgzNXnz_IIkjqW8","post_text":"Why Chasing LLM Recommendations via Reddit Ads Is a Poor Strategy for Travel Brands\n\nA new tactic is making the rounds : seed or advertise on Reddit so that chatbots like ChatGPT or Gemini “learn” your brand and later recommend it. On paper, it sounds clever. In practice, it’s a fragile, short‑sighted bet that cuts against how travelers actually decide—and how AI is evolving.\n\nThe problem behind the tactic\n\nLLMs are moving targets. Sources get reweighted, retraining cycles shift, and access deals change. One update can wipe out any advantage you thought you gained from Reddit mentions. You’re effectively renting visibility from an algorithm you don’t control.\n\nReddit itself is an unreliable anchor for this goal. As platforms clamp down on free data access and models diversify inputs, forum chatter (especially content that reads like promotion) will carry less weight. If it looks astroturfed, it’s likely to be discounted.\n\nThen there’s the human factor. Reddit is a community before it’s an ad channel. People spot shilling quickly and call it out publicly. When that happens, the brand loses trust not just on Reddit but across social. Add disclosure and endorsement rules to the mix, and the risk profile gets worse.\n\nWhy it misaligns with travel marketing\n\nTravel decisions are personal and social. People trust people (photos, stories, verified feedback) far more than brand lines. Getting an AI to say your name isn’t credibility; in fact AI agents themselves will cross check in the future , and if sentiment on the lived experience (from UGC) is thin or mediocre, the funnel collapses.\n\nCommunity and service are the foundation: loyalty programs, destination forums, and guest groups create belonging and authentic UGC that both humans and AI treat as credible. LLMs already lean on real reviews and first-hand accounts, so trying to game that signal with forum planting misses the point.\n\nIn conversational AI, the trust bar is higher (recommendations feel personal) so anything that reads like a sales pitch gets ignored and erodes confidence in both your brand and the assistant.\n\nWhat to do instead?\n\nDouble down on the inputs that reliably influence both humans and AI, and funnel these \"trust tokens\" to AI agents:\n1/ Build real communities. Help first, don’t plant.\n2/ Level up social. Listen, respond, and spotlight guest content (with credit). You curate; travelers tell the story.\n3/ Use credible creators. Partner with niche voices (family, food, eco, accessibility) who document real stays and persist across platforms.\n4/ Publish structured help in a machine understandable way. This includes current guides, itineraries, FAQs, and policies—clear for people and machines. Service first; SEO/AI follows.\n\nYou don’t need to whisper your brand into a model’s ear. Earn the recommendation in public where it counts: through service, community, storytelling, and transparent proof. When travelers vouch for you, AI will follow.","post_image_url":"https://media.licdn.com/dms/image/v2/D4E05AQFic0hnCT4jKA/videocover-high/B4EZpjr_25J0CI-/0/1762609074563?e=1783137600&v=beta&t=s7fzcmO3tE3p3lGTmLyRiYFBrmeSj5CDnvy0OGmfgY4","is_article":false,"article_url":null,"article_title":null,"article_description":null,"is_video":true,"video_url":"https://media.licdn.com/dms/image/v2/D4E05AQFic0hnCT4jKA/videocover-high/B4EZpjr_25J0CI-/0/1762609074563?e=1783137600&v=beta&t=s7fzcmO3tE3p3lGTmLyRiYFBrmeSj5CDnvy0OGmfgY4","has_image":true,"reaction_count":8,"reaction_types":"LIKE","impression_count":493,"source":"activity"},{"is_my_post":true,"post_urn":"urn:li:activity:7392080166656827393","author_name":"Ravi Evani\n              \n                \n                   \n    \n      \n    \n    \n      \n    \n\n • You","author_profile_url":"https://www.linkedin.com/in/ravievani","author_headline":"Deploying enterprise agents in production / CTO / SWE Leader / GVP @ Publicis Sapient","posted_time":"2025-11-27","posted_hours_ago":5040,"posted_time_raw":"7mo","post_url":"https://www.linkedin.com/feed/update/urn:li:activity:7392080166656827393","author_profile_image_url":"https://media.licdn.com/dms/image/v2/C4E03AQGNeJRorEd2Nw/profile-displayphoto-shrink_100_100/profile-displayphoto-shrink_100_100/0/1569287114631?e=1784160000&v=beta&t=tJDZC7EXWnlgIIf8kF7fBCajhF-HEgzNXnz_IIkjqW8","post_text":"What does OpenAI Agent Builder mean for Travel & Hospitality brands?\n\nBrand \u003c> Answering engine \u003c> Customer Agent \u003c> Customer\n\nOpenAI’s Agent Builder is a visual, drag-and-drop canvas to design, version, and govern multi-step AI agent workflows connecting models, tools, and guardrails without heavy code.\n\nImplication:\nWe’re basically moving into a world where both sides, brands and customers, are kind of operating through their own sets of AI intermediaries. On one hand, you have these answering engines or agents that deliver their own representation of a brand’s voice to the customer. And on the other hand, you could have customer-side agents that filter and interpret what they’re getting from those answering engines.\n\nSo it does become this two-sided dynamic. It’s not just the brand trying to get through to a human customer; it’s the brand trying to get through to a customer’s own digital agent that might be doing some of the filtering and sorting on their behalf. And yeah, that definitely compounds the challenge. It’s like a layer of representation on top of representation, and that’s a pretty fascinating shift.\n\nAnd you can kind of see this unfolding in real time. As these drag-and-drop agent builders become more popular, it means that on the brand side of travel and hospitality, you’re going to have to think about how your content, products and offerings are going to be understood and surfaced by these multiple layers of third-party agents.\n\nAnd when customers are making requests through their own AI agents, it brings yet another layer of complexity. Now you’re not just communicating directly to a human audience; you’re communicating to an intermediary layer that’s making decisions on their behalf.\n\nFor brands, that means becoming “agent-friendly” and “agent-readable”: structuring your information and offers so customer agents and answering engines can easily understand, prioritize, and pick you up; while recognizing these agents might filter out offers or content that doesn’t meet the customer’s predefined criteria. On the flip side, knowing that travelers might have their own AI agents means you have to think about how to stand out in that two-sided ecosystem.","post_image_url":null,"is_article":false,"article_url":null,"article_title":null,"article_description":null,"is_video":false,"video_url":null,"has_image":false,"reaction_count":9,"reaction_types":"LIKE, EMPATHY","comment_count":2,"impression_count":721,"source":"activity"},{"is_my_post":true,"post_urn":"urn:li:activity:7391671054584213504","author_name":"Ravi Evani\n              \n                \n                   \n    \n      \n    \n    \n      \n    \n\n • You","author_profile_url":"https://www.linkedin.com/in/ravievani","author_headline":"Deploying enterprise agents in production / CTO / SWE Leader / GVP @ Publicis Sapient","posted_time":"2025-11-27","posted_hours_ago":5040,"posted_time_raw":"7mo","post_url":"https://www.linkedin.com/feed/update/urn:li:activity:7391671054584213504","author_profile_image_url":"https://media.licdn.com/dms/image/v2/C4E03AQGNeJRorEd2Nw/profile-displayphoto-shrink_100_100/profile-displayphoto-shrink_100_100/0/1569287114631?e=1784160000&v=beta&t=tJDZC7EXWnlgIIf8kF7fBCajhF-HEgzNXnz_IIkjqW8","post_text":"Simply adding the word \"Agentic\" does not make the Agentic Enterprise Architect.\n\nWhat this role is:\nA senior architect accountable for the design, governance, and scaling of agent ecosystems as first‑class enterprise platforms. Think platform architect + applied ML + SRE + security -- focused on responsiveness, reliability, and business outcomes, not model tinkering.\n\nWhy this role matters\nCoordination adds latency. Every hop: retrieval, planning, tool call, human handoff, taxes the user experience. Someone must own latency budgets, not just model quality.\n\nAccountability blurs. When multiple agents collaborate, “who broke it?” is non‑trivial. You need traceability, error budgets, and clear escalation paths.\n\nCore responsibilities\n\n① Reference architecture. Define the agent platform:\n➜ Control plane: policy engine, model/route selection, prompt/tool registry, evaluation harness.\n➜ Data plane: context services (RAG, feature stores), memory layers, vector/graph stores, event bus, integration fabric.\n➜ Trust & safety: RBAC, data boundaries, secrets, prompt‑injection defenses, audit and lineage.\n\n② Performance governance. Establish p50/p95/p99 targets for time‑to‑first‑token and end‑to‑task; set per‑hop latency budgets; decide when to parallelize vs. serialize.\n\n③ Reliability & observability. “Black box” is not an option. Standardize action logs, reasoning traces, tool call telemetry, and reproducible runs. Own incident response for agentic failures.\n\n④ Model and tool strategy. Criteria for when to route to small vs. large models, fine‑tunes vs. prompts, on‑prem vs. API; versioning and rollback plans.\n\n⑤ Security & compliance. Data residency, masking, PII handling, content safety policies, and vendor risk aligned to legal/audit requirements.\n\n⑥ Cost discipline. Token and compute budgets, per‑task unit economics, and capacity planning.\n\nBottom Line:\nIf you’re serious about production‑grade agents, name an Agentic Enterprise Architect. Give them the mandate to design the platform, enforce the budgets, and keep the experience fast, safe, and accountable.","post_image_url":null,"is_article":false,"article_url":null,"article_title":null,"article_description":null,"is_video":false,"video_url":null,"has_image":false,"reaction_count":24,"reaction_types":"LIKE, EMPATHY, INTEREST","impression_count":1872,"source":"activity"},{"is_my_post":true,"post_urn":"urn:li:activity:7391516265414250496","author_name":"Ravi Evani\n              \n                \n                   \n    \n      \n    \n    \n      \n    \n\n • You","author_profile_url":"https://www.linkedin.com/in/ravievani","author_headline":"Deploying enterprise agents in production / CTO / SWE Leader / GVP @ Publicis Sapient","posted_time":"2025-11-27","posted_hours_ago":5040,"posted_time_raw":"7mo","post_url":"https://www.linkedin.com/feed/update/urn:li:activity:7391516265414250496","author_profile_image_url":"https://media.licdn.com/dms/image/v2/C4E03AQGNeJRorEd2Nw/profile-displayphoto-shrink_100_100/profile-displayphoto-shrink_100_100/0/1569287114631?e=1784160000&v=beta&t=tJDZC7EXWnlgIIf8kF7fBCajhF-HEgzNXnz_IIkjqW8","post_text":"Travel brand AEO tips to optimize for ChatGPT Voice\n\nBuild for answers, not pages.\n\nThink in voice questions. Who, what, when, where, how. Pull the top guest questions from calls, reviews, and Google Business Profile Q&A.\n\nShip answer‑first content in JSON‑LD. Put the one‑sentence answer in your pages and schemas so agents can consume it.\n\nWrite for the ear. First sentence ≤20 words, natural phrasing, no fluff. It should sound right when read aloud.\n\nTune MCP and A2A agents for local + “near me.” Keep location, hours, amenities, and landmarks consistent across your site, GBP, and OTAs; test on ChatGPT / Gemini/ Perplexity voice.\n\nEarn agent priority. Make answers structured, current, and concise. Assign owners, timestamp updates, and eliminate contradictions across every surface.\n\nNot magic—just execution. Structure, clarity, consistency, speed. Fix performance, watch question queries, and iterate.\n\nExample line: “Rooftop pool? Yes—heated, 8am–10pm; towels provided; guests only.”\n\nBottom line: The answer is the interface. Write the sentence you want ChatGPT to say.","post_image_url":"https://media.licdn.com/dms/image/v2/D4E05AQFxkay_jq1iFw/videocover-high/B4EZpPw0gSGUCI-/0/1762274799545?e=1783137600&v=beta&t=lhjzP_QocanilslK6_SWxgklPbEJZPD_l4sl3_AUdrE","is_article":false,"article_url":null,"article_title":null,"article_description":null,"is_video":true,"video_url":"https://media.licdn.com/dms/image/v2/D4E05AQFxkay_jq1iFw/videocover-high/B4EZpPw0gSGUCI-/0/1762274799545?e=1783137600&v=beta&t=lhjzP_QocanilslK6_SWxgklPbEJZPD_l4sl3_AUdrE","has_image":true,"reaction_count":4,"reaction_types":"LIKE","impression_count":382,"source":"activity"},{"is_my_post":true,"post_urn":"urn:li:activity:7390808774141399040","author_name":"Ravi Evani\n              \n                \n                   \n    \n      \n    \n    \n      \n    \n\n • You","author_profile_url":"https://www.linkedin.com/in/ravievani","author_headline":"Deploying enterprise agents in production / CTO / SWE Leader / GVP @ Publicis Sapient","posted_time":"2025-11-27","posted_hours_ago":5040,"posted_time_raw":"7mo","post_url":"https://www.linkedin.com/feed/update/urn:li:activity:7390808774141399040","author_profile_image_url":"https://media.licdn.com/dms/image/v2/C4E03AQGNeJRorEd2Nw/profile-displayphoto-shrink_100_100/profile-displayphoto-shrink_100_100/0/1569287114631?e=1784160000&v=beta&t=tJDZC7EXWnlgIIf8kF7fBCajhF-HEgzNXnz_IIkjqW8","post_text":"For improved speed and costs: treat AI context like a ledger, not like a whiteboard.\n\nQuick tip for building the prompt context for AI agents=>\n\nFreeze the head: the instructions, the tool list, and the task description. Give each a version number. When something changes, bump the version. Do not edit history.\n\nAppend the tail: new messages, dynamic values, tool results, and updated header versions. When the thread grows, add a short summary as a new block. Leave old blocks alone. Keep the order steady. Don’t shuffle examples. Don’t put timestamps in the head.\n\nThis will leverage LLM caching and you will notice faster responses and lower cost.","post_image_url":"https://media.licdn.com/dms/image/v2/D4E05AQHywPQJ4y9YNQ/videocover-high/B4EZpFtYvrHUCI-/0/1762106121181?e=1783137600&v=beta&t=FALlarhIdDUvquPj2E4MacqBC5dYKpqmHKDiioL1N8c","is_article":false,"article_url":null,"article_title":null,"article_description":null,"is_video":true,"video_url":"https://media.licdn.com/dms/image/v2/D4E05AQHywPQJ4y9YNQ/videocover-high/B4EZpFtYvrHUCI-/0/1762106121181?e=1783137600&v=beta&t=FALlarhIdDUvquPj2E4MacqBC5dYKpqmHKDiioL1N8c","has_image":true,"reaction_count":5,"reaction_types":"LIKE, EMPATHY","impression_count":405,"source":"activity"},{"is_my_post":true,"post_urn":"urn:li:activity:7390414038813384704","author_name":"Ravi Evani\n              \n                \n                   \n    \n      \n    \n    \n      \n    \n\n • You","author_profile_url":"https://www.linkedin.com/in/ravievani","author_headline":"Deploying enterprise agents in production / CTO / SWE Leader / GVP @ Publicis Sapient","posted_time":"2025-11-27","posted_hours_ago":5040,"posted_time_raw":"7mo","post_url":"https://www.linkedin.com/feed/update/urn:li:activity:7390414038813384704","author_profile_image_url":"https://media.licdn.com/dms/image/v2/C4E03AQGNeJRorEd2Nw/profile-displayphoto-shrink_100_100/profile-displayphoto-shrink_100_100/0/1569287114631?e=1784160000&v=beta&t=tJDZC7EXWnlgIIf8kF7fBCajhF-HEgzNXnz_IIkjqW8","post_text":"When AI sounds smooth, be extra careful. Here's how to steer \"confident\" AI agents.\n\n1) Start with the outcome, not the prompts.\nBe clear on what you need the agent to accomplish, and make sure it understands you.\n\n2) Require context sources, and verify at least one.\nTell the agent to list its sources. You (a human) open at least one primary source and mark it verified. If nothing verifiable shows up, the work pauses.\n\n3) Flip three assumptions, and check its reasoning.\nAsk for three plain‑English assumptions that it made, each with an opposite. Re‑run the recommendation under those opposites and see if its reasoning logic still holds true.\n\n4) Validate usefulness, not just smoothness.\nGive yourself time to dig into the details, beyond the glossy output. That will take time, but just because AI is fast, doesn't mean you have to be.\n\n5) Audit the Guardrails\nSet hard boundaries and a rollback path.\n\nFinally: put your initials on AI's output. Tools assist; people own outcomes.","post_image_url":"https://media.licdn.com/dms/image/v2/D4E05AQE2AX-WTiKJIQ/videocover-high/B4EZpAGX5GJ0CM-/0/1762012009172?e=1783137600&v=beta&t=OE8_MBFyY_Sp2xsVHkP3QQKeL4otzSjNt8hQyZ7nxnQ","is_article":false,"article_url":null,"article_title":null,"article_description":null,"is_video":true,"video_url":"https://media.licdn.com/dms/image/v2/D4E05AQE2AX-WTiKJIQ/videocover-high/B4EZpAGX5GJ0CM-/0/1762012009172?e=1783137600&v=beta&t=OE8_MBFyY_Sp2xsVHkP3QQKeL4otzSjNt8hQyZ7nxnQ","has_image":true,"reaction_count":9,"reaction_types":"LIKE, EMPATHY, INTEREST","impression_count":554,"source":"activity"},{"is_my_post":true,"post_urn":"urn:li:activity:7390079421338058753","author_name":"Ravi Evani\n              \n                \n                   \n    \n      \n    \n    \n      \n    \n\n • You","author_profile_url":"https://www.linkedin.com/in/ravievani","author_headline":"Deploying enterprise agents in production / CTO / SWE Leader / GVP @ Publicis Sapient","posted_time":"2025-11-27","posted_hours_ago":5040,"posted_time_raw":"7mo","post_url":"https://www.linkedin.com/feed/update/urn:li:activity:7390079421338058753","author_profile_image_url":"https://media.licdn.com/dms/image/v2/C4E03AQGNeJRorEd2Nw/profile-displayphoto-shrink_100_100/profile-displayphoto-shrink_100_100/0/1569287114631?e=1784160000&v=beta&t=tJDZC7EXWnlgIIf8kF7fBCajhF-HEgzNXnz_IIkjqW8","post_text":"9:10 a.m. The agent confidently gives the wrong refund policy. Slack explodes: Product says steps ran, Data says the source was available, Eng says the pipeline was green.\n\nCOO: “Who owns the output?” Silence.\n\nEveryone’s right--and no one owns the outcome.\n\nAI agents don’t behave like deterministic software. Ownership isn’t about “did the workflow run,” it’s about “did the output solve the user’s problem, safely and economically.”\n\nYou need a single Owner of Record (AOR) because spinning up agents is cheap, but earning trust is not. Tools have made building easy; but adoption stalls when no one is accountable for whether outputs are correct, useful, and safe. An AOR keeps the problem, not the tool, at the center: sets outcome metrics, enforces evaluation gates, guards data fitness, and has the authority to stop or roll back when the agent drifts.\n\nFor each AI agent in production: Name the owner, define the problem, set thresholds, and hold the line.","post_image_url":"https://media.licdn.com/dms/image/v2/D4E05AQGm8CcxJHpsYA/videocover-high/B4EZo7WDN.HUCM-/0/1761932230740?e=1783137600&v=beta&t=avq6n9bhXdDhpG6vSfZ5akZxuELNvLXkNf1KEHfIKZU","is_article":false,"article_url":null,"article_title":null,"article_description":null,"is_video":true,"video_url":"https://media.licdn.com/dms/image/v2/D4E05AQGm8CcxJHpsYA/videocover-high/B4EZo7WDN.HUCM-/0/1761932230740?e=1783137600&v=beta&t=avq6n9bhXdDhpG6vSfZ5akZxuELNvLXkNf1KEHfIKZU","has_image":true,"reaction_count":13,"reaction_types":"LIKE, EMPATHY, APPRECIATION","comment_count":1,"impression_count":667,"source":"activity"},{"is_my_post":true,"post_urn":"urn:li:activity:7389615028460683264","author_name":"Ravi Evani\n              \n                \n                   \n    \n      \n    \n    \n      \n    \n\n • You","author_profile_url":"https://www.linkedin.com/in/ravievani","author_headline":"Deploying enterprise agents in production / CTO / SWE Leader / GVP @ Publicis Sapient","posted_time":"2025-11-27","posted_hours_ago":5040,"posted_time_raw":"7mo","post_url":"https://www.linkedin.com/feed/update/urn:li:activity:7389615028460683264","author_profile_image_url":"https://media.licdn.com/dms/image/v2/C4E03AQGNeJRorEd2Nw/profile-displayphoto-shrink_100_100/profile-displayphoto-shrink_100_100/0/1569287114631?e=1784160000&v=beta&t=tJDZC7EXWnlgIIf8kF7fBCajhF-HEgzNXnz_IIkjqW8","post_text":"Problem first. Then AI.\n\n“Use AI” isn’t a strategy, it’s a shortcut to wasted spend and AI theater. Start with a business problem and work backward.\n\nBefore any AI project, answer these in one page:\n\nWhat problem, stated in one sentence, are we solving?\nWhat value is at stake? Dollars, time, risk, or customer impact.\nWho will use it and what decision or workflow changes?\nWhat data is required and do we have the access, quality, and permissions?\nWhat small experiment proves value fast? Define metric, target, and timebox.\n\nHype starts with the tool. Results start with the problem.","post_image_url":"https://media.licdn.com/dms/image/v2/D4E05AQHdW5E1Sj9rIA/videocover-high/B4EZo0vrNOKkCQ-/0/1761821510391?e=1783137600&v=beta&t=kXucAsjy7JdOdrovP42uR9H8xfG42KafUeoUtx2G0Zc","is_article":false,"article_url":null,"article_title":null,"article_description":null,"is_video":true,"video_url":"https://media.licdn.com/dms/image/v2/D4E05AQHdW5E1Sj9rIA/videocover-high/B4EZo0vrNOKkCQ-/0/1761821510391?e=1783137600&v=beta&t=kXucAsjy7JdOdrovP42uR9H8xfG42KafUeoUtx2G0Zc","has_image":true,"reaction_count":9,"reaction_types":"LIKE","repost_count":1,"impression_count":775,"source":"activity"},{"article_description":"","article_title":"","article_url":"","author_headline":"Learning and Talent Development Manager | People Strategy | Human Resources | Organizational design | IT Industry |","author_name":"Laura Correal Orjuela","author_profile_image_url":"https://media.licdn.com/dms/image/v2/D4E03AQHPAhgNZYCvfw/profile-displayphoto-scale_100_100/B4EZmMlyRVKsAc-/0/1759000340495?e=1774483200&v=beta&t=UcGYDwWT7ME6Idojt9rvsqaqONp4qyQmKQgXXadM8d0","author_profile_url":"https://www.linkedin.com/in/laura-correal-orjuela-89734439","category":"#N/A","comment_count":0,"impression_count":0,"isDeleted":false,"is_article":false,"is_my_post":true,"is_video":false,"post_image_url":"https://media.licdn.com/dms/image/v2/D4E22AQFzHCsT8c2Jnw/feedshare-shrink_800/B4EZm_TAqLGYAg-/0/1759851056792?e=1774483200&v=beta&t=Y_oFAd18toij7k42yzhfzElwDdpX1wuxlZksMlVwLdQ","post_text":"We keep the Gene LATAM spirit alive by staying close to our teams — learning, sharing, and growing together. hashtag#LearningMindset\n\nAI keeps pushing us to transforms, but the question is HOW - Having an open space like The Ask Me Anything with the LATAM Leadership Team Esteban Brenes Karen Vargas Maikol Zumbado Natalia Botero Penagos and Ravi Evani helped us shared thoughts and power conversations to collectively grow and adapt.\n\nThank you, Costa Rica team! Always great energy with you. 💛\nhashtag#GeneLATAM hashtag#PublicisSapient hashtag#LearningMindset hashtag#AI hashtag#Culture","post_url":"https://www.linkedin.com/feed/update/urn:li:activity:7381368520472727553","post_urn":"urn:li:activity:7381368520472727553","posted_time":"2025-11-06","reaction_count":96,"reaction_types":"LIKE, EMPATHY, PRAISE","repost_count":3,"scrapedAt":"2026-03-06T03:17:39.028Z","source":"my-posts","video_url":""},{"article_description":"","article_title":"","article_url":"","author_headline":"Technology Executive | Scaling AI-Native Product Organisations (ex-Microsoft, frog, argodesign, gone through acquisition as founder)","author_name":"Joe Fletcher\n              \n                \n                   \n    \n    \n\n • 1st","author_profile_image_url":"https://media.licdn.com/dms/image/v2/D4D03AQEd3hHbKa0fng/profile-displayphoto-shrink_100_100/B4DZbXsD1uHEAg-/0/1747375374500?e=1782345600&v=beta&t=_KZrM8iIs2iRZdXXbdvsXhTkq4nxQdfL4HjzaOkNB00","author_profile_url":"https://www.linkedin.com/in/joefletcher2","category":"#N/A","comment_count":4,"impression_count":0,"isDeleted":false,"is_article":false,"is_my_post":true,"is_video":true,"post_image_url":"https://media.licdn.com/dms/image/v2/D4D05AQGoWn1QZY3smQ/videocover-low/B4DZnvigEXHwCQ-/0/1760660854583?e=1781233200&v=beta&t=SQoWuXoEbV623FQgo-pCDtYrlMBeML0B0typids3f2c","post_text":"🤖 🌍 ⚡\"𝐼𝑛 𝑡ℎ𝑒 𝑛𝑒𝑥𝑡 𝑦𝑒𝑎𝑟, 𝑒𝑣𝑒𝑟𝑦𝑡ℎ𝑖𝑛𝑔 𝑤𝑖𝑙𝑙 𝑐ℎ𝑎𝑛𝑔𝑒 𝑓𝑟𝑜𝑚 𝐴𝐼\" is now a tiring troupe. Yes, things are changing. Yes, jobs will change.\n\n✖️No, it won't happen next year✖️\n\nGet engaged with the discussions, use the tools.\n\nOur own experience, judgement, and perspective will still be critical.\n\nRemember - we overestiate what we can do in 2 years, and underestimate 10 years. In a decade, the world will be completely different. Instead of flailing about, get engaged and change yourself as the world changes.\n\nRavi Evani usually posts good content on how we're all becoming cyborgs with AI tools - and how we need to embrace it.","post_url":"https://www.linkedin.com/fe
