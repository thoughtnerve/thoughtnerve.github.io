an quickly turn into missed connections, stranded passengers, crew conflicts, gate congestion, and customer service overload.\n\nI’m hosting a LinkedIn Live session where I’ll walk through an Agentic IROPS Recovery Simulation => showing how a multi-agent system can help airlines detect disruption risk earlier, evaluate recovery options faster, and keep humans in control of critical decisions.\n\nIf you work in aviation, travel operations, customer experience, or enterprise AI, I’d love to have you join.","post_image_url":null,"is_article":false,"article_url":null,"article_title":null,"article_description":null,"is_video":true,"video_url":null,"has_image":false,"reaction_count":20,"reaction_types":"LIKE","comment_count":4,"impression_count":1240,"source":"activity"},{"is_my_post":true,"post_urn":"urn:li:activity:7455248473907691520","author_name":"Ravi Evani\n              \n                \n                   \n    \n      \n    \n    \n      \n    \n\n • You","author_profile_url":"https://www.linkedin.com/in/ravievani","author_headline":"Deploying enterprise agents in production / CTO / SWE Leader / GVP @ Publicis Sapient","posted_time":"2026-05-25","posted_hours_ago":720,"posted_time_raw":"1mo","post_url":"https://www.linkedin.com/feed/update/urn:li:activity:7455248473907691520","author_profile_image_url":"https://media.licdn.com/dms/image/v2/C4E03AQGNeJRorEd2Nw/profile-displayphoto-shrink_100_100/profile-displayphoto-shrink_100_100/0/1569287114631?e=1784160000&v=beta&t=tJDZC7EXWnlgIIf8kF7fBCajhF-HEgzNXnz_IIkjqW8","post_text":"I’m seeing AI speed up product development tasks, but in a large enterprise each stakeholder is prompting AI differently based on their own focus, so the real bottleneck is shifting to alignment.\n\nAlignment has to happen across constituents: product, engineering, business, finance, enterprise architecture, security, and compliance for ideas to become real. While individuals might execute “quickly” in isolation, conflicts in alignment (which will happen) slow everything down.\n\nUntil teams adopt a shared operating model and execute in sync, any gains in speed won’t show up. But the op model itself isn’t predefined, and it wont be a single document for people to \"read\". It has to emerge organically through teams actually executing, learning in real situations, and coaching each other. It’s something that gets built by living it, not documenting it, and then scales over time as those practices spread.\n\nEach organization will have its own path, so don’t assume what works in a startup will translate directly to an enterprise. Every organization will shape its own model through experience.\n\nAt the same time, senior leaders can’t sit back and wait for this to sort itself out. They have to lean in. While the model evolves, leadership needs to own it ... starting with pilot projects that push end-to-end execution, capture real learnings, and turn those into repeatable patterns. Incentives need to support building and refining that op model, scaling it across projects, and iterating as you go. Some efforts will follow it, some won’t, and results will be mixed. But, just being a spectator is the worst option. And if that's the case; the enterprise can have all the AI tools, but growth from it will remain elusive.","post_image_url":null,"is_article":false,"article_url":null,"article_title":null,"article_description":null,"is_video":false,"video_url":null,"has_image":false,"reaction_count":8,"reaction_types":"LIKE","comment_count":2,"impression_count":809,"source":"activity"},{"is_my_post":true,"post_urn":"urn:li:activity:7454978487288795136","author_name":"Ravi Evani\n              \n                \n                   \n    \n      \n    \n    \n      \n    \n\n • You","author_profile_url":"https://www.linkedin.com/in/ravievani","author_headline":"Deploying enterprise agents in production / CTO / SWE Leader / GVP @ Publicis Sapient","posted_time":"2026-05-25","posted_hours_ago":720,"posted_time_raw":"1mo","post_url":"https://www.linkedin.com/feed/update/urn:li:activity:7454978487288795136","author_profile_image_url":"https://media.licdn.com/dms/image/v2/C4E03AQGNeJRorEd2Nw/profile-displayphoto-shrink_100_100/profile-displayphoto-shrink_100_100/0/1569287114631?e=1784160000&v=beta&t=tJDZC7EXWnlgIIf8kF7fBCajhF-HEgzNXnz_IIkjqW8","post_text":"Even with AI readily available, why are mainframe/legacy modernization programs not succeeding? Link to full video in first comment.","post_image_url":"https://media.licdn.com/dms/image/v2/D5605AQF3mx1Etfslog/videocover-high/B56Z3VjqvbIsBY-/0/1777404393761?e=1783000800&v=beta&t=Hw0j1b7R0_TpqLenaLmkxvusVoQOSB8lMp94u_g4qTE","is_article":false,"article_url":null,"article_title":null,"article_description":null,"is_video":true,"video_url":"https://media.licdn.com/dms/image/v2/D5605AQF3mx1Etfslog/videocover-high/B56Z3VjqvbIsBY-/0/1777404393761?e=1783000800&v=beta&t=Hw0j1b7R0_TpqLenaLmkxvusVoQOSB8lMp94u_g4qTE","has_image":true,"reaction_count":23,"reaction_types":"LIKE, PRAISE","comment_count":1,"impression_count":1381,"source":"activity"},{"is_my_post":true,"post_urn":"urn:li:activity:7454473475844481024","author_name":"Ravi Evani\n              \n                \n                   \n    \n      \n    \n    \n      \n    \n\n • You","author_profile_url":"https://www.linkedin.com/in/ravievani","author_headline":"Deploying enterprise agents in production / CTO / SWE Leader / GVP @ Publicis Sapient","posted_time":"2026-05-25","posted_hours_ago":720,"posted_time_raw":"1mo","post_url":"https://www.linkedin.com/feed/update/urn:li:activity:7454473475844481024","author_profile_image_url":"https://media.licdn.com/dms/image/v2/C4E03AQGNeJRorEd2Nw/profile-displayphoto-shrink_100_100/profile-displayphoto-shrink_100_100/0/1569287114631?e=1784160000&v=beta&t=tJDZC7EXWnlgIIf8kF7fBCajhF-HEgzNXnz_IIkjqW8","post_text":"The Agentic Engineering Maturity Curve\n\nStage 1: Rely on the Raw Model\nAction: Chat window copy-pasting & prompt tweaking.\nThe Trap: Treat the LLM as the entire agent. Users blame \"bad runs\" and inevitable failures on the model itself, not on the lack of engineering around it.\n\nStage 2: Attach Durable State\nAction: Filesystem workspaces & git integration.\nMethod: Gives the model a persistent workspace to offload intermediate work outside its limited context window. The model can now \"save\" its progress, which is critical for long-horizon tasks.\n\nStage 3: Enable General Execution\nAction: Bash terminals & ephemeral sandboxing.\nMethod: This is a crucial step! It involves providing the agent with a secure, general-purpose shell (as you pointed out) to dynamically build and run its own tools. It creates an insulated \"sandbox\" where the agent can safely experiment and execute commands without compromising the host system.\n\nStage 4: Install the Enforcement Ratchet\nAction: Lifecycle hooks & strict rulebooks.\nMethod: This is how you begin to scale. Every agent mistake is analyzed and codified into a hard rule. Success becomes silent; failures trigger a loop back to the agent with explicit, verbose error messages. You are engineering reliability through systematic constraint.\n\nStage 5: Enforce Context Hygiene\nAction: Compaction, tool offloading, & progressive disclosure.\nMethod: Battling \"context rot.\" You develop systems to automatically compact long conversation histories, intelligently hide tools and massive logs until specifically needed, and generally keep the agent focused on only the most relevant information.\n\nStage 6: Decompose Long-Horizon Work\nAction: RALPH loops, plan files, & context resets.\nMethod: Tearing down bloated agent sessions. Instead of one continuous session, work is broken into smaller chunks. The agent creates plan files and can \"context reset,\" starting completely fresh from a saved state on disk to avoid the performance degradation of long conversations.\n\nStage 7: Split Generation & Evaluation\nAction: Multi-agent orchestration & sprint contracts.\nThe Insight: Models tend to be overly optimistic when grading themselves. This stage stops letting them grade their own homework. Instead, you orchestrate one agent to generate and another separate agent (perhaps another model entirely) to act as an objective evaluator, leading to much higher quality and trustworthy output.\n\nStage 8: Shift to Harness-as-a-Service\nAction: Dynamic scaffolding & model-harness co-evolution.\nThe Peak: The engineered \"harness\" becomes the primary organizational asset, not the specific LLM. As base models advance (shifting the \"model ceiling\"), the mature engineering scaffolding dynamically adapts, allowing the organization to easily swap models and co-evolve with AI technology. The focus is now on the system, not just the model.\n\n(Inspired by learning from @Addy Osmani)","post_image_url":"https://media.licdn.com/dms/image/v2/D5622AQH5_02lv4jewA/feedshare-shrink_800/B56Z3OcH0tG0Ac-/0/1777284972065?e=1784160000&v=beta&t=iDaNC99NxOFBdFeWaVUkV7WnG7Lq-sM33xkctTvzao0","is_article":false,"article_url":null,"article_title":null,"article_description":null,"is_video":false,"video_url":null,"has_image":true,"reaction_count":11,"reaction_types":"LIKE, INTEREST","comment_count":1,"impression_count":729,"source":"activity"},{"is_my_post":true,"post_urn":"urn:li:activity:7454124585387679744","author_name":"Ravi Evani\n              \n                \n                   \n    \n      \n    \n    \n      \n    \n\n • You","author_profile_url":"https://www.linkedin.com/in/ravievani","author_headline":"Deploying enterprise agents in production / CTO / SWE Leader / GVP @ Publicis Sapient","posted_time":"2026-05-25","posted_hours_ago":720,"posted_time_raw":"1mo","post_url":"https://www.linkedin.com/feed/update/urn:li:activity:7454124585387679744","author_profile_image_url":"https://media.licdn.com/dms/image/v2/C4E03AQGNeJRorEd2Nw/profile-displayphoto-shrink_100_100/profile-displayphoto-shrink_100_100/0/1569287114631?e=1784160000&v=beta&t=tJDZC7EXWnlgIIf8kF7fBCajhF-HEgzNXnz_IIkjqW8","post_text":"Of late I'm starting to value leaders who are \"finishers\" a lot more than \"beginners\".\n\nEarly momentum is easy because new beginnings, fresh ideas and new funding naturally attract attention. Starting energy is cheap because it hasn't been tested by friction yet. It’s driven by novelty, untapped potential, and the excitement of a blank slate where no mistakes have been made.\n\nBut when the novelty wears off, you enter the phase where the real work happens. There are delays, difficult conversations, resource constraints, and tough decisions. But that’s also when some of the original crowd moves on to chase the next shiny thing.\n\nFinishing is expensive. It requires an entirely different, much rarer psychological toolkit. Leaders who are finishers don't just escalate or make noise. They are the ones who stick through the grind when excitement fades and challenges pile up. It’s that perseverance: staying behind the team when others get distracted that sets them apart. They carry the team over the line, and drive the project home.\n\nAn organization full of starters without finishers is ultimately just a graveyard of half-built bridges.","post_image_url":null,"is_article":false,"article_url":null,"article_title":null,"article_description":null,"is_video":false,"video_url":null,"has_image":false,"reaction_count":50,"reaction_types":"LIKE, INTEREST, PRAISE","comment_count":1,"impression_count":2060,"source":"activity"},{"is_my_post":true,"post_urn":"urn:li:activity:7453519184745013248","author_name":"Ravi Evani\n              \n                \n                   \n    \n      \n    \n    \n      \n    \n\n • You","author_profile_url":"https://www.linkedin.com/in/ravievani","author_headline":"Deploying enterprise agents in production / CTO / SWE Leader / GVP @ Publicis Sapient","posted_time":"2026-04-25","posted_hours_ago":1440,"posted_time_raw":"2mo","post_url":"https://www.linkedin.com/feed/update/urn:li:activity:7453519184745013248","author_profile_image_url":"https://media.licdn.com/dms/image/v2/C4E03AQGNeJRorEd2Nw/profile-displayphoto-shrink_100_100/profile-displayphoto-shrink_100_100/0/1569287114631?e=1784160000&v=beta&t=tJDZC7EXWnlgIIf8kF7fBCajhF-HEgzNXnz_IIkjqW8","post_text":"Not every AI-enabled workflow needs heavyweight cloud orchestration.\n\nThe practical question is not whether everything AI should run in the cloud or everything should run locally. The question is: where is the sweet spot between output quality, latency, cost, and machine performance?\n\nFor example, for some of the model training outputs(e.g. forecasting or anomaly detection weights) we are generating are very small files — sometimes as small as 2 KB. These are not massive inference workloads. They can run on a local machine and still produce reliable results.\n\nSome tasks are lightweight, repeatable, and context-bound enough to run locally with good quality. The key is knowing which workloads belong where.\n\nThe real design question becomes:\n\nCan we get reliable enough results locally without overloading the machine or compromising quality?\n\nThat is the sweet spot we should measure. Not just “can it run”, but:\n\nDoes the result meet the quality bar?\nIs the performance acceptable on a normal user machine?\nIs the latency better than a cloud round trip?\nIs the cost materially lower?\nIs the task safe and governed enough to run locally?\n\nTherefore, one could consider going local-first where the task is small, bounded, constrained, repeatable; and cloud-first where the task needs scale, deeper reasoning, enterprise context, or shared governance.","post_image_url":"https://media.licdn.com/dms/image/v2/D5605AQGswPLlSgNivQ/videocover-high/B56Z3A4KECHkBU-/0/1777057443482?e=1783000800&v=beta&t=qHkwYrwIcqHZLLLW272_RSMW6oitPGYvTtl-hkQsUak","is_article":false,"article_url":null,"article_title":null,"article_description":null,"is_video":true,"video_url":"https://media.licdn.com/dms/image/v2/D5605AQGswPLlSgNivQ/videocover-high/B56Z3A4KECHkBU-/0/1777057443482?e=1783000800&v=beta&t=qHkwYrwIcqHZLLLW272_RSMW6oitPGYvTtl-hkQsUak","has_image":true,"reaction_count":21,"reaction_types":"LIKE","impression_count":915,"source":"activity"},{"is_my_post":true,"post_urn":"urn:li:activity:7453126121828618241","author_name":"Ravi Evani\n              \n                \n                   \n    \n      \n    \n    \n      \n    \n\n • You","author_profile_url":"https://www.linkedin.com/in/ravievani","author_headline":"Deploying enterprise agents in production / CTO / SWE Leader / GVP @ Publicis Sapient","posted_time":"2026-04-25","posted_hours_ago":1440,"posted_time_raw":"2mo","post_url":"https://www.linkedin.com/feed/update/urn:li:activity:7453126121828618241","author_profile_image_url":"https://media.licdn.com/dms/image/v2/C4E03AQGNeJRorEd2Nw/profile-displayphoto-shrink_100_100/profile-displayphoto-shrink_100_100/0/1569287114631?e=1784160000&v=beta&t=tJDZC7EXWnlgIIf8kF7fBCajhF-HEgzNXnz_IIkjqW8","post_text":"It was exciting to host a fireside chat Google Cloud Next '26 with Rajeev Perera on what real-world agentic AI looks like in hospitality, where reliable and repeatable operations matter more than the hype.\n\nThe discussion stayed grounded in the hard part: not whether agents can do interesting things, but whether they can deliver ROI in live operational environments. We talked about AI learning from real user workflows, the role of multi-disciplinary agent personas that combine business and technical judgment, and how recorded business interactions can become material for deeper iteration and learning over time.\n\nWe also got into the practical questions that matter in enterprise settings: on-prem vs. cloud models, how to drive more deterministic behavior from non deterministic agents, and what it takes to make agentic AI dependable enough for operational use. This is where the real work is now. Not in imagining what agents could do, but in making them useful, repeatable, and worth the investment.\n\nThanks to our clients for their thoughtful questions and enriching discussion!","post_image_url":"https://media.licdn.com/dms/image/v2/D5622AQEieaHW0PSUjQ/feedshare-shrink_800/B56Z27St.KKkAg-/0/1776963739887?e=1784160000&v=beta&t=hoBJr6CoGwzFLmEwol7WMw2cYoG32MTv0OHX0-PzDeY","is_article":false,"article_url":null,"article_title":null,"article_description":null,"is_video":false,"video_url":null,"has_image":true,"reaction_count":71,"reaction_types":"LIKE, EMPATHY, PRAISE","comment_count":1,"repost_count":3,"impression_count":2843,"source":"activity"},{"is_my_post":true,"post_urn":"urn:li:activity:7451978805952299009","author_name":"Ravi Evani\n              \n                \n                   \n    \n      \n    \n    \n      \n    \n\n • You","author_profile_url":"https://www.linkedin.com/in/ravievani","author_headline":"Deploying enterprise agents in production / CTO / SWE Leader / GVP @ Publicis Sapient","posted_time":"2026-04-25","posted_hours_ago":1440,"posted_time_raw":"2mo","post_url":"https://www.linkedin.com/feed/update/urn:li:activity:7451978805952299009","author_profile_image_url":"https://media.licdn.com/dms/image/v2/C4E03AQGNeJRorEd2Nw/profile-displayphoto-shrink_100_100/profile-displayphoto-shrink_100_100/0/1569287114631?e=1784160000&v=beta&t=tJDZC7EXWnlgIIf8kF7fBCajhF-HEgzNXnz_IIkjqW8","post_text":"Sometimes agentic coding feels like...","post_image_url":"https://media.licdn.com/dms/image/v2/D5605AQE76VrVaFktDw/videocover-high/B56Z2q_Nl4HgBY-/0/1776690192613?e=1783000800&v=beta&t=JTBJ4PfDZQ98mU9r_JaDH2Sdus3wp9xz3Lp-ovK_m7s","is_article":false,"article_url":null,"article_title":null,"article_description":null,"is_video":true,"video_url":"https://media.licdn.com/dms/image/v2/D5605AQE76VrVaFktDw/videocover-high/B56Z2q_Nl4HgBY-/0/1776690192613?e=1783000800&v=beta&t=JTBJ4PfDZQ98mU9r_JaDH2Sdus3wp9xz3Lp-ovK_m7s","has_image":true,"reaction_count":16,"reaction_types":"LIKE","comment_count":3,"impression_count":766,"source":"activity"},{"is_my_post":true,"post_urn":"urn:li:activity:7445099143565369345","author_name":"Ravi Evani\n              \n                \n                   \n    \n      \n    \n    \n      \n    \n\n • You","author_profile_url":"https://www.linkedin.com/in/ravievani","author_headline":"Deploying enterprise agents in production / CTO / SWE Leader / GVP @ Publicis Sapient","posted_time":"2026-04-25","posted_hours_ago":1440,"posted_time_raw":"2mo","post_url":"https://www.linkedin.com/feed/update/urn:li:activity:7445099143565369345","author_profile_image_url":"https://media.licdn.com/dms/image/v2/C4E03AQGNeJRorEd2Nw/profile-displayphoto-shrink_100_100/profile-displayphoto-shrink_100_100/0/1569287114631?e=1784160000&v=beta&t=tJDZC7EXWnlgIIf8kF7fBCajhF-HEgzNXnz_IIkjqW8","post_text":"Some might call the Lufthansa 747-400 cabin “old”. I’d call it a reminder of when flying still felt a little more special. Nothing beats the 4-window view from the quiet upper deck. Hope they don’t “modernize” the cabin into cubicles.","post_image_url":"https://media.licdn.com/dms/image/v2/D4E22AQHaaRhuRIAp3A/feedshare-shrink_800/B4EZ1JONCPIUAc-/0/1775049956269?e=1784160000&v=beta&t=MEMJo_lKyPScElfBS99Mujl9n8aKBJbth9__4FCj39U","is_article":false,"article_url":null,"article_title":null,"article_description":null,"is_video":false,"video_url":null,"has_image":true,"reaction_count":29,"reaction_types":"LIKE, EMPATHY","comment_count":2,"impression_count":3885,"source":"activity"},{"is_my_post":true,"post_urn":"urn:li:activity:7445015384459563008","author_name":"Ravi Evani\n              \n                \n                   \n    \n      \n    \n    \n      \n    \n\n • You","author_profile_url":"https://www.linkedin.com/in/ravievani","author_headline":"Deploying enterprise agents in production / CTO / SWE Leader / GVP @ Publicis Sapient","posted_time":"2026-04-25","posted_hours_ago":1440,"posted_time_raw":"2mo","post_url":"https://www.linkedin.com/feed/update/urn:li:activity:7445015384459563008","author_profile_image_url":"https://media.licdn.com/dms/image/v2/C4E03AQGNeJRorEd2Nw/profile-displayphoto-shrink_100_100/profile-displayphoto-shrink_100_100/0/1569287114631?e=1784160000&v=beta&t=tJDZC7EXWnlgIIf8kF7fBCajhF-HEgzNXnz_IIkjqW8","post_text":"Excel is the ultimate \"low floor, infinite ceiling\" tool. Anyone can type numbers into a grid and use =SUM(), which tricks people into thinking they \"know Excel.\" But there is a universe of difference between a beginner making a budget and a master building a dynamic, automated enterprise financial model using Power Query, relational data models, and VBA. An expert knows Excel can do almost anything if you structure the data and logic correctly.\n\nAgentic coding has entered this same territory. The tools are now more than capable. The only gap is your skill. And that now spans way beyond prompting.\n\n- context\n- tools\n- rules\n- skills\n- workflows\n- sub agents\n\nClosing this skill gap can make you 10x more productive vs simply writing prompts.\n\nBut you already knew that. So what’s stopping you?","post_image_url":null,"is_article":false,"article_url":null,"article_title":null,"article_description":null,"is_video":false,"video_url":null,"has_image":false,"reaction_count":7,"reaction_types":"LIKE","repost_count":1,"impression_count":821,"source":"activity"},{"is_my_post":true,"post_urn":"urn:li:activity:7444384924708585472","author_name":"Ravi Evani\n              \n                \n                   \n    \n      \n    \n    \n      \n    \n\n • You","author_profile_url":"https://www.linkedin.com/in/ravievani","author_headline":"Deploying enterprise agents in production / CTO / SWE Leader / GVP @ Publicis Sapient","posted_time":"2026-04-25","posted_hours_ago":1440,"posted_time_raw":"2mo","post_url":"https://www.linkedin.com/feed/update/urn:li:activity:7444384924708585472","author_profile_image_url":"https://media.licdn.com/dms/image/v2/C4E03AQGNeJRorEd2Nw/profile-displayphoto-shrink_100_100/profile-displayphoto-shrink_100_100/0/1569287114631?e=1784160000&v=beta&t=tJDZC7EXWnlgIIf8kF7fBCajhF-HEgzNXnz_IIkjqW8","post_text":"I sat through a well-designed \"estimation review\" presentation recently, where the team sized up the resources, cost and timeline for a project.\n\nIt had clean slides and a thoughtful structure. A lot of effort clearly went into the preparation.\n\nBut the problem was none of it was usable beyond that moment.\n\nThe estimate was presented, discussed, and even agreed upon. But it wasn’t reproducible. It wasn’t codified. And it definitely wasn’t something an agent could pick up and run with.\n\nThat’s the gap most enterprises are still stuck in.\n\nWe continue to optimize for human consumption: PowerPoint decks, visuals, narratives. But we’re not structuring the underlying data / decisioning in a way that supports repeatability, automation, or agent-driven workflows.\n\nAn estimate shouldn’t just be numbers on a slide. It should be the output of clearly defined dimensions, assumptions, and facts that can be captured, reused, and reasoned over. That’s what allows you to scale it. That’s what allows an agent to generate it again, consistently, without starting from scratch.\n\nRight now, we’re putting energy into presentation instead of production.\n\nThe shift is simple, but not easy: It is to separate the two concerns.\n\nOne path for humans: to influence, align, and communicate.\nAnother path for machines: structured, explicit, and reusable.\n\nAnd the two need to stay in sync.\n\nUntil that happens, we’ll keep producing great-looking outputs that don’t actually move the system forward.\n\nThe question is not whether an estimate looks good. It’s whether it can be leveraged again to solve the next problem.","post_image_url":null,"is_article":false,"article_url":null,"article_title":null,"article_description":null,"is_video":false,"video_url":null,"has_image":false,"reaction_count":11,"reaction_types":"LIKE","impression_count":914,"source":"activity"},{"is_my_post":true,"post_urn":"urn:li:activity:7444021540758716416","author_name":"Ravi Evani\n              \n                \n                   \n    \n      \n    \n    \n      \n    \n\n • You","author_profile_url":"https://www.linkedin.com/in/ravievani","author_headline":"Deploying enterprise agents in production / CTO / SWE Leader / GVP @ Publicis Sapient","posted_time":"2026-04-25","posted_hours_ago":1440,"posted_time_raw":"2mo","post_url":"https://www.linkedin.com/feed/update/urn:li:activity:7444021540758716416","author_profile_image_url":"https://media.licdn.com/dms/image/v2/C4E03AQGNeJRorEd2Nw/profile-displayphoto-shrink_100_100/profile-displayphoto-shrink_100_100/0/1569287114631?e=1784160000&v=beta&t=tJDZC7EXWnlgIIf8kF7fBCajhF-HEgzNXnz_IIkjqW8","post_text":"Why \"Vibe Coding\" is the catalyst for a software engineering renaissance\n\nRight now, there is a consensus that vibe coding is inherently bad. The criticism is that it replaces software craftsmanship with \"AI slop\": bloated, buggy, and unmaintainable code generated by users who are merely \"vibing\" rather than engineering.\n\nBut blaming vibe coding for bad software misses the mark entirely. Vibe coding simply exposes and amplifies the truth about how good or bad a person, team, or enterprise actually is at building systems.\n\n1. A reflection of internal reality: Your architecture & context are your \"DNA\"\nIf vibe coding is filling your repositories with brittle slop, it is because the underlying engineering DNA was already sloppy. Agents work within the boundaries and the context window you give them. So if the output is tangled, fragile, and monolithic, it is often reflecting a codebase where those patterns were already accepted. Garbage in, garbage out. In a clean, modular environment, the AI is far more likely to generate better code. The slop is a mirror of the habits, standards, and architectural discipline already present in the person and organization using it.\n\n2. Accountability over blame: The guardrail crisis\nIt has become fashionable for engineering leaders to blame hallucinating AI when bad code causes issues. That is a cop-out. AI can write bad code, just like humans can. If that slop reaches production, the real failure is not the AI. It is the lack of engineering guardrails: weak tests, weak CI/CD, and weak review discipline.\n\n3. Public record of character: Velocity exposes fragility\nBefore AI, bad system design could stay hidden behind the slow pace of manual development. Because humans wrote code slowly, structural rot built up slowly too, buried inside individual IDEs and stretched across long sprint cycles. Vibe coding removes that buffer. When developers can generate thousands of lines in an afternoon, it becomes a stress test that exposes the bottlenecks, weak automation, tight coupling, and other architectural sins that were always there.\n\nThe Path to Acceptance: An Engineering Renaissance\nThe \"AI slop\" era is terrifying for technical leaders, but it is ultimately a required step forward for the industry. Vibe coding should force enterprises to confront the uncomfortable truth about their fragile systems. By amplifying these flaws, AI will eventually push the industry toward a renaissance in systems architecture and platform engineering. Organizations will realize that in the age of AI, writing syntax is cheap, but rigorous system design, automated testing, and clear domain boundaries are priceless. To survive, they will be forced to build foundational platforms where the \"right way\" to write code is the only way the AI can write it.\n\nVibe coding lays bare the underlying competence of the organization. It’s time to stop blaming the magnifying glass and start fixing the system it's reflecting.","post_image_url":null,"is_article":false,"article_url":null,"article_title":null,"article_description":null,"is_video":false,"video_url":null,"has_image":false,"reaction_count":13,"reaction_types":"LIKE","impression_count":679,"source":"activity"},{"is_my_post":true,"post_urn":"urn:li:activity:7443853366549430272","author_name":"Ravi Evani\n              \n                \n                   \n    \n      \n    \n    \n      \n    \n\n • You","author_profile_url":"https://www.linkedin.com/in/ravievani","author_headline":"Deploying enterprise agents in production / CTO / SWE Leader / GVP @ Publicis Sapient","posted_time":"2026-04-25","posted_hours_ago":1440,"posted_time_raw":"2mo","post_url":"https://www.linkedin.com/feed/update/urn:li:activity:7443853366549430272","author_profile_image_url":"https://media.licdn.com/dms/image/v2/C4E03AQGNeJRorEd2Nw/profile-displayphoto-shrink_100_100/profile-displayphoto-shrink_100_100/0/1569287114631?e=1784160000&v=beta&t=tJDZC7EXWnlgIIf8kF7fBCajhF-HEgzNXnz_IIkjqW8","post_text":"Have you ever built an AI assistant...say, a helpful concierge for a restaurant app...only to have it suddenly turn around and ask *you* for a recommendation?\n\nIf so, you’ve experienced *Persona Drifting*, just like I did this weekend.\n\nWhat is it?\n\nPersona Drifting occurs when an AI model loses track of its assigned identity during a conversation and adopts a different role, often mirroring the user or adopting a generic, unhelpful conversational stance.\n\nInstead of remaining the authoritative \"Assistant,\" the AI drifts into becoming a \"Customer,\" a \"Co-worker,\" or simply a confused participant asking the user open-ended questions when it was supposed to be the one giving recommendations.\n\nWhy Does It Happen?\n\nAI models, especially highly capable conversational models, are trained on vast amounts of human-to-human dialogue. In typical human conversation, roles are fluid. If I give you a list of options, it’s natural for me to ask, \"Which of these do you prefer?\"\n\nWhen we use APIs to create multi-turn interactions (like the Gemini Interactions API or Live API), we are often stitching together separate requests. Persona drifting typically happens due to:\n\n1. Inconsistent System Instructions Across Turns:\nIn Turn 1, you might tell the AI: \"You are a specialized Restaurant AI Assistant.\"\nIn Turn 2 (e.g., summarizing tool results), you might simplify the instruction to: \"Summarize these results.\"\n\nBecause the strong persona anchor from Turn 1 is missing in Turn 2, the model relies on the immediate context. It sees a list of food items and defaults to its conversational training, asking, \"What would you like to do with these?\", and leaving you puzzled.\n\n2. Lack of Negative Constraints:\nModels are eager to keep the conversation going. Unless explicitly told *not* to ask follow-up questions, they often will. They view ending a turn with a question as engaging and helpful.\n\n3. Context Window Imbalance:\nAs the conversation grows, the initial system prompt gets further away in the context window, while the immediate back-and-forth dominates the model's attention. The model starts mimicking the user's conversational style.\n\nHow to Fix It?\n\nThe solution requires disciplined prompt engineering and state management, particularly when chaining API calls:\n\n1/ The \"Anchor\" Strategy: Never dilute the system instruction. Every single turn or API call in a flow must reiterate the core persona.\n\n2/ Explicit Negative Constraints: Borrow a technique from Google's own reference projects. Explicitly tell the model: \"Do not ask for additional info or follow-up questions; make your best judgment based on the available data.\"\n\n3/ Role Enforcement: Clearly define the boundary. \"You are the Assistant. The human is the Customer. You provide answers; you do not ask for suggestions.\"\n\nBy managing system instructions consistently across every turn, we can keep our AI concierges behind the counter where they belong: serving answers, not asking us for fries.","post_image_url":"https://media.licdn.com/dms/image/v2/D4E22AQG2raIXwbKOMQ/feedshare-shrink_1280/B4EZ03hMPyIUAM-/0/1774752941322?e=1784160000&v=beta&t=5nFq8xT7_Bkq-etkzpSw4SuMglXyCoSsdzp1k-LS4NY","is_article":false,"article_url":null,"article_title":null,"article_description":null,"is_video":false,"video_url":null,"has_image":true,"reaction_count":11,"reaction_types":"LIKE","impression_count":417,"source":"activity"},{"is_my_post":true,"post_urn":"urn:li:activity:7443631742399299584","author_name":"Ravi Evani\n              \n                \n                   \n    \n      \n    \n    \n      \n    \n\n • You","author_profile_url":"https://www.linkedin.com/in/ravievani","author_headline":"Deploying enterprise agents in production / CTO / SWE Leader / GVP @ Publicis Sapient","posted_time":"2026-04-25","posted_hours_ago":1440,"posted_time_raw":"2mo","post_url":"https://www.linkedin.com/feed/update/urn:li:activity:7443631742399299584","author_profile_image_url":"https://media.licdn.com/dms/image/v2/C4E03AQGNeJRorEd2Nw/profile-displayphoto-shrink_100_100/profile-displayphoto-shrink_100_100/0/1569287114631?e=1784160000&v=beta&t=tJDZC7EXWnlgIIf8kF7fBCajhF-HEgzNXnz_IIkjqW8","post_text":"Enterprise Math\n2016: Once we get on Cloud, we’ll get speed to market.\n2026: Once we get on AI, we’ll get speed to market.\n\nUnfortunately in both cases, the bottleneck just moves somewhere else.","post_image_url":null,"is_article":false,"article_url":null,"article_title":null,"article_description":null,"is_video":false,"video_url":null,"has_image":false,"reaction_count":18,"reaction_types":"LIKE","comment_count":2,"impression_count":1007,"source":"activity"},{"is_my_post":true,"post_urn":"urn:li:activity:7443283818029039616","author_name":"Ravi Evani\n              \n                \n                   \n    \n      \n    \n    \n      \n    \n\n • You","author_profile_url":"https://www.linkedin.com/in/ravievani","author_headline":"Deploying enterprise agents in production / CTO / SWE Leader / GVP @ Publicis Sapient","posted_time":"2026-04-25","posted_hours_ago":1440,"posted_time_raw":"2mo","post_url":"https://www.linkedin.com/feed/update/urn:li:activity:7443283818029039616","author_profile_image_url":"https://media.licdn.com/dms/image/v2/C4E03AQGNeJRorEd2Nw/profile-displayphoto-shrink_100_100/profile-displayphoto-shrink_100_100/0/1569287114631?e=1784160000&v=beta&t=tJDZC7EXWnlgIIf8kF7fBCajhF-HEgzNXnz_IIkjqW8","post_text":"I’m already feeling the impact of Jevon’s paradox. As AI lowers the time, cost, and friction of writing code, I’m demanding more from myself. More small tools. More automation. More things built faster to make my life easier.\n\nIt looks like Jevon’s paradox going to reshape how most developers work in three ways:\n\n1. From writing code to orchestrating work\nWe’ve been trained to work linearly: pick a ticket, solve it, move on.\nNow you’re managing (or will be expected to manage) multiple threads at once: different agents generating, testing, iterating in parallel. The job shifts from “build this” to “run a system that builds many things at once.” If you stay sequential, you’ll just bottleneck yourself.\n\n2. Deciding what actually needs a human\nYou won’t be able to review everything. There will be too much output. So the skill becomes judgment: where do I step in, and where do I trust the system?\nArchitecture decisions, risk-heavy changes, anything with downstream impac might be where you need to focus. Everything else, you let run. Most devs aren’t used to thinking this way yet.\n\n3. Taste becomes your differentiator\nIf code is cheap, experience is not. Anything customer-facing: UI, flows, interactions, can’t just be “correct.” It has to feel right. That requires taste.\nSo now you’re not just an engineer, you’re a filter. You’re deciding what ships based on how it lands with real users, not just whether it works.","post_image_url":"https://media.licdn.com/dms/image/v2/D4E22AQEc2bJvB2HKaA/feedshare-shrink_800/B4EZ0vbMKZJcAc-/0/1774617150505?e=1784160000&v=beta&t=rgHWRvTAN-20Z-qxI3ynY7kJ9u-cxc5hUGFOLLl2ar8","is_article":false,"article_url":null,"article_title":null,"article_description":null,"is_video":false,"video_url":null,"has_image":true,"reaction_count":10,"reaction_types":"LIKE, EMPATHY","comment_count":2,"repost_count":2,"impression_count":833,"source":"activity"},{"is_my_post":true,"post_urn":"urn:li:activity:7390808774141399040","author_name":"Ravi Evani\n              \n                \n                   \n    \n      \n    \n    \n      \n    \n\n • You","author_profile_url":"https://www.linkedin.com/in/ravievani","author_headline":"Deploying enterprise agents in production / CTO / SWE Leader / GVP @ Publicis Sapient","posted_time":"2025-11-25","posted_hours_ago":5040,"posted_time_raw":"7mo","post_url":"https://www.linkedin.com/feed/update/urn:li:activity:7390808774141399040","author_profile_image_url":"https://media.licdn.com/dms/image/v2/C4E03AQGNeJRorEd2Nw/profile-displayphoto-shrink_100_100/profile-displayphoto-shrink_100_100/0/1569287114631?e=1784160000&v=beta&t=tJDZC7EXWnlgIIf8kF7fBCajhF-HEgzNXnz_IIkjqW8","post_text":"For improved speed and costs: treat AI context like a ledger, not like a whiteboard.\n\nQuick tip for building the prompt context for AI agents=>\n\nFreeze the head: the instructions, the tool list, and the task description. Give each a version number. When something changes, bump the version. Do not edit history.\n\nAppend the tail: new messages, dynamic values, tool results, and updated header versions. When the thread grows, add a short summary as a new block. Leave old blocks alone. Keep the order steady. Don’t shuffle examples. Don’t put timestamps in the head.\n\nThis will leverage LLM caching and you will notice faster responses and lower cost.","post_image_url":"https://media.licdn.com/dms/image/v2/D4E05AQHywPQJ4y9YNQ/videocover-high/B4EZpFtYvrHUCI-/0/1762106121181?e=1783000800&v=beta&t=p4FGeKDD1QRNeF94iF8WlsTSCK1R-8O4RccHUhMxr18","is_article":false,"article_url":null,"article_title":null,"article_description":null,"is_video":true,"video_url":"https://media.licdn.com/dms/image/v2/D4E05AQHywPQJ4y9YNQ/videocover-high/B4EZpFtYvrHUCI-/0/1762106121181?e=1783000800&v=beta&t=p4FGeKDD1QRNeF94iF8WlsTSCK1R-8O4RccHUhMxr18","has_image":true,"reaction_count":5,"reaction_types":"LIKE, EMPATHY","impression_count":402,"source":"activity"},{"is_my_post":true,"post_urn":"urn:li:activity:7390414038813384704","author_name":"Ravi Evani\n              \n                \n                   \n    \n      \n    \n    \n      \n    \n\n • You","author_profile_url":"https://www.linkedin.com/in/ravievani","author_headline":"Deploying enterprise agents in production / CTO / SWE Leader / GVP @ Publicis Sapient","posted_time":"2025-11-25","posted_hours_ago":5040,"posted_time_raw":"7mo","post_url":"https://www.linkedin.com/feed/update/urn:li:activity:7390414038813384704","author_profile_image_url":"https://media.licdn.com/dms/image/v2/C4E03AQGNeJRorEd2Nw/profile-displayphoto-shrink_100_100/profile-displayphoto-shrink_100_100/0/1569287114631?e=1784160000&v=beta&t=tJDZC7EXWnlgIIf8kF7fBCajhF-HEgzNXnz_IIkjqW8","post_text":"When AI sounds smooth, be extra careful. Here's how to steer \"confident\" AI agents.\n\n1) Start with the outcome, not the prompts.\nBe clear on what you need the agent to accomplish, and make sure it understands you.\n\n2) Require context sources, and verify at least one.\nTell the agent to list its sources. You (a human) open at least one primary source and mark it verified. If nothing verifiable shows up, the work pauses.\n\n3) Flip three assumptions, and check its reasoning.\nAsk for three plain‑English assumptions that it made, each with an opposite. Re‑run the recommendation under those opposites and see if its reasoning logic still holds true.\n\n4) Validate usefulness, not just smoothness.\nGive yourself time to dig into the details, beyond the glossy output. That will take time, but just because AI is fast, doesn't mean you have to be.\n\n5) Audit the Guardrails\nSet hard boundaries and a rollback path.\n\nFinally: put your initials on AI's output. Tools assist; people own outcomes.","post_image_url":"https://media.licdn.com/dms/image/v2/D4E05AQE2AX-WTiKJIQ/videocover-high/B4EZpAGX5GJ0CM-/0/1762012009172?e=1783000800&v=beta&t=GXJ6F98fLzNAS_TjVLuLtU2phhe2MOE12LGRZPUgYKA","is_article":false,"article_url":null,"article_title":null,"article_description":null,"is_video":true,"video_url":"https://media.licdn.com/dms/image/v2/D4E05AQE2AX-WTiKJIQ/videocover-high/B4EZpAGX5GJ0CM-/0/1762012009172?e=1783000800&v=beta&t=GXJ6F98fLzNAS_TjVLuLtU2phhe2MOE12LGRZPUgYKA","has_image":true,"reaction_count":9,"reaction_types":"LIKE, EMPATHY, INTEREST","impression_count":550,"source":"activity"},{"is_my_post":true,"post_urn":"urn:li:activity:7390079421338058753","author_name":"Ravi Evani\n              \n                \n                   \n    \n      \n    \n    \n      \n    \n\n • You","author_profile_url":"https://www.linkedin.com/in/ravievani","author_headline":"Deploying enterprise agents in production / CTO / SWE Leader / GVP @ Publicis Sapient","posted_time":"2025-11-25","posted_hours_ago":5040,"posted_time_raw":"7mo","post_url":"https://www.linkedin.com/feed/update/urn:li:activity:7390079421338058753","author_profile_image_url":"https://media.licdn.com/dms/image/v2/C4E03AQGNeJRorEd2Nw/profile-displayphoto-shrink_100_100/profile-displayphoto-shrink_100_100/0/1569287114631?e=1784160000&v=beta&t=tJDZC7EXWnlgIIf8kF7fBCajhF-HEgzNXnz_IIkjqW8","post_text":"9:10 a.m. The agent confidently gives the wrong refund policy. Slack explodes: Product says steps ran, Data says the source was available, Eng says the pipeline was green.\n\nCOO: “Who owns the output?” Silence.\n\nEveryone’s right--and no one owns the outcome.\n\nAI agents don’t behave like deterministic software. Ownership isn’t about “did the workflow run,” it’s about “did the output solve the user’s problem, safely and economically.”\n\nYou need a single Owner of Record (AOR) because spinning up agents is cheap, but earning trust is not. Tools have made building easy; but adoption stalls when no one is accountable for whether outputs are correct, useful, and safe. An AOR keeps the problem, not the tool, at the center: sets outcome metrics, enforces evaluation gates, guards data fitness, and has the authority to stop or roll back when the agent drifts.\n\nFor each AI agent in production: Name the owner, define the problem, set thresholds, and hold the line.","post_image_url":"https://media.licdn.com/dms/image/v2/D4E05AQGm8CcxJHpsYA/videocover-high/B4EZo7WDN.HUCM-/0/1761932230740?e=1783000800&v=beta&t=Tjos_BL171gxVwfOjGIyUAXpk3h3Gij1ZOPwY-Gvxdc","is_article":false,"article_url":null,"article_title":null,"article_description":null,"is_video":true,"video_url":"https://media.licdn.com/dms/image/v2/D4E05AQGm8CcxJHpsYA/videocover-high/B4EZo7WDN.HUCM-/0/1761932230740?e=1783000800&v=beta&t=Tjos_BL171gxVwfOjGIyUAXpk3h3Gij1ZOPwY-Gvxdc","has_image":true,"reaction_count":13,"reaction_types":"LIKE, EMPATHY, APPRECIATION","comment_count":1,"impression_count":665,"source":"activity"},{"is_my_post":true,"post_urn":"urn:li:activity:7389615028460683264","author_name":"Ravi Evani\n              \n                \n                   \n    \n      \n    \n    \n      \n    \n\n • You","author_profile_url":"https://www.linkedin.com/in/ravievani","author_headline":"Deploying enterprise agents in production / CTO / SWE Leader / GVP @ Publicis Sapient","posted_time":"2025-11-25","posted_hours_ago":5040,"posted_time_raw":"7mo","post_url":"https://www.linkedin.com/feed/update/urn:li:activity:7389615028460683264","author_profile_image_url":"https://media.licdn.com/dms/image/v2/C4E03AQGNeJRorEd2Nw/profile-displayphoto-shrink_100_100/profile-displayphoto-shrink_100_100/0/1569287114631?e=1784160000&v=beta&t=tJDZC7EXWnlgIIf8kF7fBCajhF-HEgzNXnz_IIkjqW8","post_text":"Problem first. Then AI.\n\n“Use AI” isn’t a strategy, it’s a shortcut to wasted spend and AI theater. Start with a business problem and work backward.\n\nBefore any AI project, answer these in one page:\n\nWhat problem, stated in one sentence, are we solving?\nWhat value is at stake? Dollars, time, risk, or customer impact.\nWho will use it and what decision or workflow changes?\nWhat data is required and do we have the access, quality, and permissions?\nWhat small experiment proves value fast? Define metric, target, and timebox.\n\nHype starts with the tool. Results start with the problem.","post_image_url":"https://media.licdn.com/dms/image/v2/D4E05AQHdW5E1Sj9rIA/videocover-high/B4EZo0vrNOKkCQ-/0/1761821510391?e=1783000800&v=beta&t=CBRCyPsjQjyrsbKZ8YcVD5yMYTifFGsGvpi1MQkEMGA","is_article":false,"article_url":null,"article_title":null,"article_description":null,"is_video":true,"video_url":"https://media.licdn.com/dms/image/v2/D4E05AQHdW5E1Sj9rIA/videocover-high/B4EZo0vrNOKkCQ-/0/1761821510391?e=1783000800&v=beta&t=CBRCyPsjQjyrsbKZ8YcVD5yMYTifFGsGvpi1MQkEMGA","has_image":true,"reaction_count":9,"reaction_types":"LIKE","repost_count":1,"impression_count":774,"source":"activity"},{"is_my_post":true,"post_urn":"urn:li:activity:7389349055690141696","author_name":"Ravi Evani\n              \n                \n                   \n    \n      \n    \n    \n      \n    \n\n • You","author_profile_url":"https://www.linkedin.com/in/ravievani","author_headline":"Deploying enterprise agents in production / CTO / SWE Leader / GVP @ Publicis Sapient","posted_time":"2025-11-25","posted_hours_ago":5040,"posted_time_raw":"7mo","post_url":"https://www.linkedin.com/feed/update/urn:li:activity:7389349055690141696","author_profile_image_url":"https://media.licdn.com/dms/image/v2/C4E03AQGNeJRorEd2Nw/profile-displayphoto-shrink_100_100/profile-displayphoto-shrink_100_100/0/1569287114631?e=1784160000&v=beta&t=tJDZC7EXWnlgIIf8kF7fBCajhF-HEgzNXnz_IIkjqW8","post_text":"Zomato’s MCP launch: what it signals for US QSR—and what they should do next\n\nWhat happened (https://lnkd.in/eyQPRzmq ):\nZomato published an MCP server that lets AI assistants perform the full ordering flow—discover restaurants, read menus, build carts, apply offers, and hand off a QR/pay link—all inside chat. The repo also whitelists chatgpt.com for OAuth, which means ChatGPT can connect where enabled.\n\nClaude already works with MCP servers; guides show end‑to‑end orders with automatic coupon application and a single checkout link. Meanwhile, ChatGPT added MCP support in Developer Mode, and OpenAI’s Agents SDK documents MCP directly—so the “order via chat” pattern is coming to U.S. users as tooling spreads.\n\nWhy US QSR marketers should care\n\nA new “agent” channel appears. Customers will type “Lunch for 6, half veg, under $12/head, 25‑min prep” and receive ready‑to‑checkout options—without opening your app or a marketplace UI. Your rank will depend on machine‑readable facts, not creative.\n\nAggregators will be the default surface at first. As soon as an aggregator exposes MCP endpoints, assistants will route there by default. If your data in those catalogs is incomplete, you’ll be invisible in agent shortlists.\nDirect can play too. With ChatGPT/Claude supporting MCP, brands can expose their own MCP server or connect via their POS/ordering stack—no marketplace required.\n\nWhat to do now:\n\n① Make your menu agent‑readable\n\n② Make offers machine‑actionable\n\n③ Tag dietary preferences consistently\n\n④ Ship group scenarios as one‑click bundles\n\n⑤ Publish store‑level fulfillment facts\n\n⑥ Wire your stack for the agent channel\n\nOrdering is moving from apps to AI assistants. The brands that expose clean data, bundles, and rules will win the agent’s shortlist—on aggregators and direct. Start by making your catalog intent‑ready, your promos machine‑actionable, and your fulfillment facts trustworthy.","post_image_url":"https://media.licdn.com/dms/image/sync/v2/D4D27AQFbfbxyVAyOFw/articleshare-shrink_480/articleshare-shrink_480/0/1726519575445?e=1783000800&v=beta&t=dSWcbfUHW4VsO7oK6iXLhzjebEhTa-8I_Z_rh60tDsQ","is_article":true,"article_url":"http://chatgpt.com/","article_title":"ChatGPT","article_description":"ChatGPT\nchatgpt.com","is_video":false,"video_url":null,"has_image":true,"reaction_count":21,"reaction_types":"LIKE, INTEREST","comment_count":2,"repost_count":1,"impression_count":2438,"source":"activity"},{"is_my_post":true,"post_urn":"urn:li:activity:7389237863063715840","author_name":"Ravi Evani\n              \n                \n                   \n    \n      \n    \n    \n      \n    \n\n • You","author_profile_url":"https://www.linkedin.com/in/ravievani","author_headline":"Deploying enterprise agents in production / CTO / SWE Leader / GVP @ Publicis Sapient","posted_time":"2025-11-25","posted_hours_ago":5040,"posted_time_raw":"7mo","post_url":"https://www.linkedin.com/feed/update/urn:li:activity:7389237863063715840","author_profile_image_url":"https://media.licdn.com/dms/image/v2/C4E03AQGNeJRorEd2Nw/profile-displayphoto-shrink_100_100/profile-displayphoto-shrink_100_100/0/1569287114631?e=1784160000&v=beta&t=tJDZC7EXWnlgIIf8kF7fBCajhF-HEgzNXnz_IIkjqW8","post_text":"I had a wonderful time @ Publicis Sapient Chicago, meeting our team led by Amit, Rohan, Andre, that's doing cutting-edge work for our Hospitality clients.\n\nWe discussed how software professionals today are falling into three clear groups:\n\n① Those building AI and agents that solve real enterprise problems -- and using AI tools well to build them.\n② Those building traditional applications, but using AI tools well to build them faster, better, and cheaper.\n③ Those still building traditional applications, using AI tools poorly, or not at all.\n\nThe biggest gains, in skill, influence, and opportunity will come to those moving towards the first group. Proud that this team is firmly getting there!","post_image_url":"https://media.licdn.com/dms/image/v2/D4E22AQERHbcT-5VTsw/feedshare-shrink_800/B4EZovYqNDKYAg-/0/1761731590009?e=1784160000&v=beta&t=WGXirlmOLAbWJAhe3NQKIxUR6AwF7Iz0tUDcnKJ5uHg","is_article":false,"article_url":null,"article_title":null,"article_description":null,"is_video":false,"video_url":null,"has_image":true,"reaction_count":197,"reaction_types":"LIKE, EMPATHY, PRAISE","comment_count":2,"repost_count":2,"impression_count":14142,"source":"activity"},{"is_my_post":true,"post_urn":"urn:li:activity:7388584375761920000","author_name":"Ravi Evani\n              \n                \n                   \n    \n      \n    \n    \n      \n    \n\n • You","author_profile_url":"https://www.linkedin.com/in/ravievani","author_headline":"Deploying enterprise agents in production / CTO / SWE Leader / GVP @ Publicis Sapient","posted_time":"2025-11-25","posted_hours_ago":5040,"posted_time_raw":"7mo","post_url":"https://www.linkedin.com/feed/update/urn:li:activity:7388584375761920000","author_profile_image_url":"https://media.licdn.com/dms/image/v2/C4E03AQGNeJRorEd2Nw/profile-displayphoto-shrink_100_100/profile-displayphoto-shrink_100_100/0/1569287114631?e=1784160000&v=beta&t=tJDZC7EXWnlgIIf8kF7fBCajhF-HEgzNXnz_IIkjqW8","post_text":"Why does your enterprise AI not work so well? The answer is in your Context Graph.\n\nYou might already know this: providing high density, relevant context is key to getting high quality outputs from AI; whether you are building agents for your business, marketing, ops or software development.\n\nThe good news is: you probably already have tons of enterprise data.\nWhat’s missing is context--the business meaning SMEs built over years. That context is scattered in code and app screens, Excel and BI reports, Teams threads and wikis, cryptic schema fields, policy tables, and the relationships no one writes down.\n\nWithout the right context, AI agents and analytics answer generically. The fix is a context graph: a living map of your entities, relationships, definitions, and rules—so every team and agent can reason with the same truth through a Context API or MCP. With a context graph knowledge such as policies, rate fences, entitlements, SLAs, and data lineage become executable constraints, not tribal knowledge.\n\nA context graph is represented as a semantic layer over your systems that links:\n➜ Entities (customers, products, orders, assets, vendors)\n➜ Attributes and relationships (who connects to what and why)\n➜ Policies, SOP and business rules (how things are allowed to work)\n➜ Sources and lineage (where truth comes from)\n\nHow to build it (a journey, not a switch):\n① Inventory & seed: List top 50–100 entities, canonical terms, and must‑have policies. Pull from catalogs, schemas, reports, and SOPs.\n\n② Ingest & index: Connect data stores and documents. Parse and chunk unstructured content. Create embeddings for retrieval.\n\n③ Extract with LLMs: Use LLMs to propose entities, synonyms, relationships, and rules from structured and unstructured sources. Capture confidence scores.\n\n④ Curate with SMEs (human‑in‑the‑loop): Review suggestions in a lightweight UI. Approve, merge, or correct. Encode SME heuristics as labeling functions and policies.\n\n⑤ Model the graph: Store nodes, edges, and rules in a graph/metadata store. Keep permissions, lineage, and freshness metadata attached.\n\n⑥ Serve it: Expose a Context API/MCP so apps, workflows, and agents can resolve terms, fetch relationships, validate policies, and cite sources.\n\n⑦ Use a Graph schema: Combine vector retrieval with graph traversal. Let agents ground answers in documents and graph structure—better reasoning, fewer guesses.\n\n⑧ Operate & improve: Track coverage (% assets with terms), answer correctness with citations, time‑to‑find, and change freshness. Retrain prompts and rules from feedback.\n\nBuild the graph, expose it once, and let every system and agent think with your business context. Leverage the context graph via MCP / APIs across your business, decision support, software development, marketing & sales workflows.\n\nLooking for a shortcut? Try Publicis Sapient\nhashtag#Bodhi https://lnkd.in/etrtCpqm which comes with a built-in capability to create and manage context graphs for enterprises.","post_image_url":"https://media.licdn.com/dms/image/v2/D4E05AQHezh4ls6LPjQ/videocover-high/B4EZomGDPvJgB8-/0/1761575758560?e=1783000800&v=beta&t=MYvweGVEI_aPdfmhDvpjMz69T9S-6p7fzt3TlvCwG4w","is_article":false,"article_url":null,"article_title":null,"article_description":null,"is_video":true,"video_url":"https://media.licdn.com/dms/image/v2/D4E05AQHezh4ls6LPjQ/videocover-high/B4EZomGDPvJgB8-/0/1761575758560?e=1783000800&v=beta&t=MYvweGVEI_aPdfmhDvpjMz69T9S-6p7fzt3TlvCwG4w","has_image":true,"reaction_count":25,"reaction_types":"LIKE","impression_count":2385,"source":"activity"},{"is_my_post":true,"post_urn":"urn:li:activity:7387450044741894144","author_name":"Ravi Evani\n              \n                \n                   \n    \n      \n    \n    \n      \n    \n\n • You","author_profile_url":"https://www.linkedin.com/in/ravievani","author_headline":"Deploying enterprise agents in production / CTO / SWE Leader / GVP @ Publicis Sapient","posted_time":"2025-10-25","posted_hours_ago":5760,"posted_time_raw":"8mo","post_url":"https://www.linkedin.com/feed/update/urn:li:activity:7387450044741894144","author_profile_image_url":"https://media.licdn.com/dms/image/v2/C4E03AQGNeJRorEd2Nw/profile-displayphoto-shrink_100_100/profile-displayphoto-shrink_100_100/0/1569287114631?e=1784160000&v=beta&t=tJDZC7EXWnlgIIf8kF7fBCajhF-HEgzNXnz_IIkjqW8","post_text":"The \"autonomy slider\" is a way to formalize how trust between humans and AI agents can be developed step by step -- by ensuring the human stays in control until reliability is proven.\n\nHere is how the autonomy slider can be implemented in hashtag#Hospitality (e.g. restaurant) Operations technology\n\nStage one: Assist\nHere, the agent is basically a really smart dashboard. Information only. It pulls together unified telemetry, flags anomalies passively, maybe drafts a potential diagnostic report or a response email. In restaurants, that could mean consolidating POS, Kitchen Display system, fryer sensors, walk‑in cooler temps, HVAC load, and labor data into one view. But critically, the human operator makes 100% of the decisions and takes 100% of the actions. The agent suggests, the human decides, and acts.\n\nStage two: Recommend\nNow the agent starts driving the workflow a bit more. It proactively suggests the optimal move. So it crunches data on equipment wear, energy market prices, weather forecasts, and says, “Okay, the best time to schedule maintenance on Fryer 7 to minimize cost and disruption is next Tuesday at 2 PM.” But the human still has the final say. Absolutely key. The human gets the recommendation, the rationale, and has explicit approval or veto power. They are the required bridge between the AI suggestion and any physical action.\n\nStage three: Constrained Execute\nThis is the highest level of earned trust for a specific task. Here, the agent is allowed to take certain actions autonomously. Things like running a known diagnostic script on a piece of kitchen equipment (e.g., a combi oven or walk‑in cooler controller). But, and this is crucial, only within pre‑approved, very strictly defined guardrails.\n\nAnd if things go wrong, the system monitors execution constantly. If the situation deviates even slightly from the expected parameters—if a sensor reading goes out of bounds during the script—boom, the autonomy slider instantly defaults back to recommend or even assist.\n\nThe human is the mandatory safety net, the circuit breaker, preventing unchecked autonomous action when reality doesn’t match the playbook.","post_image_url":"https://media.licdn.com/dms/image/v2/D4E05AQHdpeol8A-dFw/videocover-high/B4EZoSb5SiGcB8-/0/1761245898053?e=1783000800&v=beta&t=3KJGA99Rhq-pQP0xz2HKmG_oiJTro825eqk7wHA0thY","is_article":false,"article_url":null,"article_title":null,"article_description":null,"is_video":true,"video_url":"https://media.licdn.com/dms/image/v2/D4E05AQHdpeol8A-dFw/videocover-high/B4EZoSb5SiGcB8-/0/1761245898053?e=1783000800&v=beta&t=3KJGA99Rhq-pQP0xz2HKmG_oiJTro825eqk7wHA0thY","has_image":true,"reaction_count":6,"reaction_types":"ENTERTAINMENT, LIKE, EMPATHY","impression_count":883,"source":"activity"},{"article_description":null,"article_title":null,"article_url":null,"author_headline":"Deploying enterprise agents in production / CTO / SWE Leader / GVP @ Publicis Sapient","author_name":"Ravi Evani\n              \n                \n                   \n    \n      \n    \n    \n      \n    \n\n • You","author_profile_image_url":"https://media.licdn.com/dms/image/v2/C4E03AQGNeJRorEd2Nw/profile-displayphoto-shrink_100_100/profile-displayphoto-shrink_100_100/0/1569287114631?e=1784160000&v=beta&t=tJDZC7EXWnlgIIf8kF7fBCajhF-HEgzNXnz_IIkjqW8","author_profile_url":"https://www.linkedin.com/in/ravievani","comment_count":17,"has_image":true,"impression_count":16274,"is_article":false,"is_my_post":true,"is_video":false,"post_image_url":"https://media.licdn.com/dms/image/v2/D4E22AQHXauCs5ex8tA/feedshare-shrink_800/B4EZn2h7H8HgAg-/0/1760777721073?e=1784160000&v=beta&t=79RtmdWTywUT6Ool2QhZRXT6aqOB2e-l2SHuAT2nENA","post_text":"How does a 3-star beat a 5-star hotel for a business traveler? Hint: It's not AI, It's this shower test:\n\nA well-lit shower.\nTaps you don’t need a scientist to figure out.\nStrong hot water pressure to wake you up.\nA non-slip mat so you can stand without fear.\nBig, legible labels on the dispensers to see through the mist.\nAnd a hook with easy access to a dry towel.\n\nDesign matters. Basics done right beat eloquent chatbots or AI concierges. They remove friction, save time, and add a spring to your step.\n\nSome have nailed this. Check the comment for my pick. Who else deserves a mention?","post_url":"https://www.linkedin.com/feed/update/urn:li:activity:7385237045293768704","post_urn":"urn:li:activity:7385237045293768704","posted_hours_ago":5760,"posted_time":"2025-10-24","posted_time_raw":"8mo","reaction_count":52,"reaction_types":"LIKE, EMPATHY, INTEREST","source":"activity","video_url":null},{"article_description":null,"article_title":null,"article_url":null,"author_headline":"Deploying enterprise agents in production / CTO / SWE Leader / GVP @ Publicis Sapient","author_name":"Ravi Evani\n              \n                \n                   \n    \n      \n    \n    \n      \n    \n\n • You","author_profile_image_url":"https://media.licdn.com/dms/image/v2/C4E03AQGNeJRorEd2Nw/profile-displayphoto-shrink_100_100/profile-displayphoto-shrink_100_100/0/1569287114631?e=1784160000&v=beta&t=tJDZC7EXWnlgIIf8kF7fBCajhF-HEgzNXnz_IIkjqW8","author_profile_url":"https://www.linkedin.com/in/ravievani","comment_count":4,"has_image":true,"impression_count":30222,"is_article":false,"is_my_post":true,"is_video":false,"post_image_url":"https://media.licdn.com/dms/image/v2/D4E22AQHoQbFQBOQyuA/feedshare-shrink_800/B4EZnmwFTIKcAg-/0/1760512989178?e=1784160000&v=beta&t=PFTWt5qqV6YhluZ5ZZdMlWRToij3NH1asgzp_bJp0KY","post_text":"\"Sit here if you've ever said what scared you\" was written on the big red chair at the hashtag#Learnfinity 3-day AI learning event at our Publicis Sapient Bengaluru office. Rakesh and I, of course, took the seat.\n\nFacing fear isn’t always about cliff-dives. Most days it’s smaller: speaking up in a group, doing that push-up, trying a new tool, or reaching out to someone unfamiliar.\n\nHere’s the paradox: in our comfort zone we feel more inertia and fear of change. In “survival mode,” the fear disappears because the brain prioritizes action. But living in survival mode isn’t sustainable--and it isn’t calm.\n\nSo what actually works? Doing the thing, and then doing a little more of the thing.\n\nMost everyday fear isn’t existential; it’s a mix of boredom, uncertainty, mild discomfort, or fear of disappointing ourselves. The antidote is motion. Take the smallest possible step, then let that step become your new baseline—your new comfort zone. Repeat.\n\nProgress works like this:\n\nStart tiny. One rep. One new prompt. Stand up and speak once.\nStabilize. Keep it there, repeat daily until it feels normal.\nRatchet. Nudge it up slightly; let that become the new normal.\nRepeat. Baselines rise; fear falls.\n\nWeek to week, it can feel like “not much is happening.” Over a couple of years, the compounding is obvious. The baseline you stand on keeps climbing, and what once felt scary becomes automatic.","post_url":"https://www.linkedin.com/feed/update/urn:li:activity:7384126679687909376","post_urn":"urn:li:activity:7384126679687909376","posted_hours_ago":5760,"posted_time":"2025-10-24","posted_time_raw":"8mo","reaction_count":221,"reaction_types":"LIKE, EMPATHY, INTEREST","repost_count":4,"source":"activity","video_url":null},{"article_description":null,"article_title":null,"article_url":null,"author_headline":"Deploying enterprise agents in production / CTO / SWE Leader / GVP @ Publicis Sapient","author_name":"Ravi Evani\n              \n                \n                   \n    \n      \n    \n    \n      \n    \n\n • You","author_profile_image_url":"https://media.licdn.com/dms/image/v2/C4E03AQGNeJRorEd2Nw/profile-displayphoto-shrink_100_100/profile-displayphoto-shrink_100_100/0/1569287114631?e=1784160000&v=beta&t=tJDZC7EXWnlgIIf8kF7fBCajhF-HEgzNXnz_IIkjqW8","author_profile_url":"https://www.linkedin.com/in/ravievani","comment_count":4,"has_image":true,"impression_count":3424,"is_article":false,"is_my_post":true,"is_video":true,"post_image_url":"https://media.licdn.com/dms/image/v2/D4E05AQGwuQ3XCcrHLQ/videocover-low/B4EZnj___sKkCQ-/0/1760466841971?e=1782932400&v=beta&t=4qkFClvfuedSSjXgKw3vIUg3SVsM_Gz_h5HMxnNmhAk","post_text":"How Hoteliers Can Stand Out to AI Agents\n\nTL;DR: Humans love stories; but AI agents need data. So turn your brand promise into structured facts and publish them consistently.\n\nThe playbook (in 3 steps)\n① Codify your promise as fields\n② Replace adjectives with attributes (e.g., connectingRoomsGuaranteed: true).\n③ Publish everywhere machines look\n\nOne example: Family City Break\nWhat the guest asks an agent: “Two adults + two kids, under $200/night, near the aquarium, late checkout, EV charger.”\n\nTurn the brand differentiation into fields\n\nMust-haves (eligibility):\n➜ connectingRoomsGuaranteed: true or roomLayout in [\"1BR\",\"2BR\"]\ncribsAvailable: true • stepFreeAccess: true • poolLifeguardOnDuty: true\n\nNice-to-haves (boosts):\n➜ distanceToAttractionMeters \u003c= 1500 • wifiMinThroughputMbps >= 100\nquietRoomScore >= 8 • evChargers.count >= 2 • lateCheckoutGuaranteed: \"14:00\"\n\nMake your story legible to machines first--so you evantually reach the human who books. That's the new way.","post_url":"https://www.linkedin.com/feed/update/urn:li:activity:7383933171274260481","post_urn":"urn:li:activity:7383933171274260481","posted_hours_ago":5760,"posted_time":"2025-10-24","posted_time_raw":"8mo","reaction_count":54,"reaction_types":"LIKE, INTEREST","repost_count":2,"source":"activity","video_url":"https://media.licdn.com/dms/image/v2/D4E05AQGwuQ3XCcrHLQ/videocover-low/B4EZnj___sKkCQ-/0/1760466841971?e=1782932400&v=beta&t=4qkFClvfuedSSjXgKw3vIUg3SVsM_Gz_h5HMxnNmhAk"},{"article_description":null,"article_title":null,"article_url":null,"author_headline":"Deploying enterprise agents in production / CTO / SWE Leader / GVP @ Publicis Sapient","author_name":"Ravi Evani\n              \n                \n                   \n    \n      \n    \n    \n      \n    \n\n • You","author_profile_image_url":"https://media.licdn.com/dms/image/v2/C4E03AQGNeJRorEd2Nw/profile-displayphoto-shrink_100_100/profile-displayphoto-shrink_100_100/0/1569287114631?e=1784160000&v=beta&t=tJDZC7EXWnlgIIf8kF7fBCajhF-HEgzNXnz_IIkjqW8","author_profile_url":"https://www.linkedin.com/in/ravievani","comment_count":3,"has_image":true,"impression_count":1748,"is_article":false,"is_my_post":true,"is_video":false,"post_image_url":"https://media.licdn.com/dms/image/v2/D4E22AQF4hHYgA4TsQw/feedshare-shrink_800/B4EZnGR8VLKYAg-/0/1759968217554?e=1784160000&v=beta&t=2jGgoUmqy1zm4fQ6SOhYKyUMP1f7FpBjWqArSUk4M4g","post_text":"Rethinking Travel & Hospitality (or any) Apps in the Age of Ambient AI Intelligence\n\nTraditionally, apps have been designed with their own little islands of persistence. They remember what you did last time, they store your settings, and they respond to explicit intents you set. But now, we’re moving into a paradigm where the app is living inside a larger, contextually rich intelligence layer, like a ChatGPT environment, that already knows a lot about you and your ongoing needs.\n\nExample: Booking Travel Within a Conversation\nImagine you’re casually discussing a vacation idea. You’re chatting away, exploring destinations, and then you just say, “Hey, book that.” If the app is merely a standalone tool, it will only know what you explicitly told it. But if it’s tapping into a broader intelligence that remembers the entire conversation history, your preferences, and even past trips, it can personalize that booking with minimal steps.\n\nPersonalization Through Larger Context\nThis is the real magic: personalization at scale. Instead of relying on a tiny slice of user data, you’re drawing on a much broader pool of context. The app can pull in (or get pushed) your travel history, your chat history, and even other apps’ insights to shape a seamless, context-rich experience. It’s about letting the intelligence flow like a river, allowing apps to communicate and share context naturally rather than forcing users to repeatedly input data.\n\nThe New Paradigm: Context Engineering and Beyond\nThis shift is about a whole new layer of engineering. We’ll need to think about how we engineer the context itself—how we build bridges between these pockets of intelligence and let apps seamlessly tap into them. It’s a design and engineering challenge, but it opens up possibilities that are fundamentally more fluid and personal than anything we’ve done before.","post_url":"https://www.linkedin.com/feed/update/urn:li:activity:7381841742548856832","post_urn":"urn:li:activity:7381841742548856832","posted_hours_ago":5760,"posted_time":"2025-10-24","posted_time_raw":"8mo","reaction_count":16,"reaction_types":"LIKE, INTEREST","source":"activity","video_url":null},{"article_description":null,"article_title":null,"article_url":null,"author_headline":"Deploying enterprise agents in production / CTO / SWE Leader / GVP @ Publicis Sapient","author_name":"Ravi Evani\n              \n                \n                   \n    \n      \n    \n    \n      \n    \n\n • You","author_profile_image_url":"https://media.licdn.com/dms/image/v2/C4E03AQGNeJRorEd2Nw/profile-displayphoto-shrink_100_100/profile-displayphoto-shrink_100_100/0/1569287114631?e=1784160000&v=beta&t=tJDZC7EXWnlgIIf8kF7fBCajhF-HEgzNXnz_IIkjqW8","author_profile_url":"https://www.linkedin.com/in/ravievani","comment_count":2,"has_image":false,"impression_count":2251,"is_article":false,"is_my_post":true,"is_video":false,"post_image_url":null,"post_text":"So OTA apps are moving inside \"Chat\". But hotel brands shouldn't simply follow suit and \"duplicate\" their apps inside ChatGPT. They should ship an agent surface, not a clone.\n\nWhere this is going:\n\n➜ Apps will live inside personal intelligence. Travel agents (the AI kind) will carry your context—budget, loyalty, trip purpose, companions—across apps and pre-filter results before you ask.\n\n➜ Shared context across apps. Calendar, flights, maps, and corporate policy inform the same session. The user’s intent flows; the app is just the surface.\nBeyond text. Voice, map overlays, and interactive components become the primary controls; text is auxiliary.\n\n➜ Shareable “intelligence objects.” Guests (or their corporate agents) can share dietary needs, accessibility preferences, and policy constraints once; every downstream app honors them.\n\nWhat hotels should do now:\n\n➜ Structure your inventory and claims. Amenities, walk times, room attributes, sustainability badges, F&B hours—all as verifiable, machine-readable data.\n\n➜ Expose instant booking and pricing APIs. Support real-time availability, hold/commit flows, and clear cancellation policies.\n\n➜ Publish preference and policy hooks. Accept guest/corporate profiles with consented attributes; return explanations aligned to those inputs.\n\n➜ Instrument for “time-to-shortlist.” Optimize for how fast a qualified guest reaches 3 viable options, not raw search volume.\n\n➜ Invest in agent UX. Build a lightweight agent that sits in this shared-intelligence layer: clarify trade-offs, justify recommendations, and complete the booking.\n\nThink broader than ChatGPT as another channel. Build for the agent layer first--then package that capability as your Chat app.","post_url":"https://www.linkedin.com/feed/update/urn:li:activity:7381443030387417088","post_urn":"urn:li:activity:7381443030387417088","posted_hours_ago":5760,"posted_time":"2025-10-24","posted_time_raw":"8mo","reaction_count":15,"reaction_types":"LIKE, INTEREST","repost_count":1,"source":"activity","video_url":null},{"article_description":null,"article_title":null,"article_url":null,"author_headline":"Deploying enterprise agents in production / CTO / SWE Leader / GVP @ Publicis Sapient","author_name":"Ravi Evani\n              \n                \n                   \n    \n      \n    \n    \n      \n    \n\n • You","author_profile_image_url":"https://media.licdn.com/dms/image/v2/C4E03AQGNeJRorEd2Nw/profile-displayphoto-shrink_100_100/profile-displayphoto-shrink_100_100/0/1569287114631?e=1784160000&v=beta&t=tJDZC7EXWnlgIIf8kF7fBCajhF-HEgzNXnz_IIkjqW8","author_profile_url":"https://www.linkedin.com/in/ravievani","comment_count":1,"has_image":true,"impression_count":1900,"is_article":false,"is_my_post":true,"is_video":true,"post_image_url":"https://media.licdn.com/dms/image/v2/D4E05AQFWV8abu7eRjQ/videocover-low/B4EZm83gE0KoB4-/0/1759810345228?e=1782932400&v=beta&t=FJdjs750CeAIgtVljvESBfHCl889BLghavI6rXzuLdw","post_text":"From apps with intelligence → apps inside your intelligence. I used the newly released ChatGPT Figma app to auto‑generate a non‑trivial system diagram.\n\nIt threw a few errors and needed cleanup, but it compressed 2–3 hours of work into ~10 minutes—good enough to iterate on.\n\nSome thoughts come to mind from this experience:\n\n1) High‑fidelity capture → faster creation: We can translate \"rough thoughts\" into \"real structures\" with much higher fidelity than before.\n2) Apps become personal: Because the system already knows your work and preferences, outputs take on your context, producing a more personal “feel”.\n3) From apps with intelligence → apps inside your intelligence: We’re moving from intelligence living inside individual apps to apps living inside a persistent layer of personal intelligence, enabling connected experiences across tools.\n4) Shared context across apps: Inter‑app communication inside ChatGPT means tools can understand the same thread and coordinate toward outcomes, not just features.\n5) Agents travel with you: Your agents persist across contexts and, at enterprise scale, operate within a shared intelligence layer that teams work inside.\n6) Beyond chat UX: Interaction isn’t just text; think interactive, multimodal experiences—voice, vision, and UI components—running on a common “LLM OS” layer.\n7) Apps for humans and agents: Some apps will target people, others will target agents—and we’ll be able to selectively share pieces of our intelligence with collaborators or their agents when needed.","post_url":"https://www.linkedin.com/feed/update/urn:li:activity:7381179624732540928","post_urn":"urn:li:activity:7381179624732540928","posted_hours_ago":5760,"posted_time":"2025-10-24","posted_time_raw":"8mo","reaction_count":19,"reaction_types":"LIKE","source":"activity","video_url":"https://media.licdn.com/dms/image/v2/D4E05AQFWV8abu7eRjQ/videocover-low/B4EZm83gE0KoB4-/0/1759810345228?e=1782932400&v=beta&t=FJdjs750CeAIgtVljvESBfHCl889BLghavI6rXzuLdw"},{"article_description":"Shadcn Blocks – Full-Stack UI Components & Templates | Cult UI Pro\npro.cult-ui.com","article_title":"Shadcn Blocks – Full-Stack UI Components & Templates | Cult UI Pro","article_url":"https://pro.cult-ui.com/blocks","author_headline":"Deploying enterprise agents in production / CTO / SWE Leader / GVP @ Publicis Sapient","author_name":"Ravi Evani\n              \n                \n                   \n    \n      \n    \n    \n      \n    \n\n • You","author_profile_image_url":"https://media.licdn.com/dms/image/v2/C4E03AQGNeJRorEd2Nw/profile-displayphoto-shrink_100_100/profile-displayphoto-shrink_100_100/0/1569287114631?e=1784160000&v=beta&t=tJDZC7EXWnlgIIf8kF7fBCajhF-HEgzNXnz_IIkjqW8","author_profile_url":"https://www.linkedin.com/in/ravievani","comment_count":1,"has_image":true,"impression_count":2080,"is_article":true,"is_my_post":true,"is_video":false,"post_image_url":"https://media.licdn.com/dms/image/sync/v2/D5627AQFadGcELPAs8Q/articleshare-shrink_480/B56ZbOVetlHgAs-/0/1747218459882?e=1782932400&v=beta&t=dVPSFnxnsmLn8KXXlLSLRy7D0cd8_LO5Z5CTuapQ39U","post_text":"Cult UI (https://pro.cult-ui.com/) is doing something interesting--selling copy-paste, full-stack “Blocks” that live in your repo. For travel and hospitality (T&H) teams building agentic user interfaces, that matters.\n\nWe’ve chased “LEGO for software” for years, but it never stuck in this industry. Every airline, hotel, and OTA claimed unicorn requirements—fare families, room types, ancillaries, loyalty tiers—which pushed teams to fork frameworks and rebuild. Old accelerators were either too opinionated or too thin, and the integration tax wiped out any speed you gained.\n\nBlocks + AI prompts change the equation. With contract-first components (clear props/DTOs, events, side-effects) you compose capability instead of forking code. Because blocks are copy-paste and in-repo, prompts can actually do the last-mile work: map intent to a catalog, generate the glue (routing, state, auth), scaffold tests and telemetry, and apply policy checks at compose time.\n\nSchema- and token-driven configs let the AI reshape UI and behavior without exploding variants, while provenance/SBOM and rollout guards keep upgrades predictable.\n\nYou can feel this in real T&H flows. A booking experience becomes a set of composable primitives—date grids, room/fare comparison, add-ons, bundle pricing—stitched to PMS/CRS/GDS and payments. Service recovery moves from bespoke workflows to reusable blocks that detect disruption, apply waivers or room moves, and coordinate guest comms. Loyalty and merchandising become configurable surfaces for points-and-cash, targeted upsell, and status perks. Ops UIs for associates and crew turn into agentic panels that prioritize work, trigger refunds/comp, and close the loop with messaging. Prompts assemble the blocks and drop in the connectors; engineers fine-tune where needed.\n\nThis also creates a new niche: component service providers that sell or rent verticalized blocks—booking cards, ancillaries, loyalty widgets, recovery flows—with SLAs, security attestations, and version support. Around them emerges BlockOps: usage metering, error analytics, assisted upgrades, and AI-tuning data. Expect “catalog curators” who certify compatibility with design systems and PMS/GDS adapters, and who operate prompt-to-assembly pipelines for brands that want speed without lock-in.\n\nIf you are an engineering leader, consider treating blocks as a product surface. Stand up a registry and contracts, wire a prompt library that maps intents to blocks, enforce compose-time policy and tests, and set an upgrade policy (canary, rollback, semver) from day one. Start with one high-leverage flow—service recovery or ancillaries--prove the path, then scale.","post_url":"https://www.linkedin.com/feed/update/urn:li:activity:7380631785594068992","post_urn":"urn:li:activity:7380631785594068992","posted_hours_ago":5760,"posted_time":"2025-10-24","posted_time_raw":"8mo","reaction_count":20,"reaction_types":"LIKE, INTEREST","repost_count":1,"source":"activity","video_url":null},{"article_description":null,"article_title":null,"article_url":null,"author_headline":"Deploying enterprise agents in production / CTO / SWE Leader / GVP @ Publicis Sapient","author_name":"Ravi Evani\n              \n                \n                   \n    \n      \n    \n    \n      \n    \n\n • You","author_profile_image_url":"https://media.licdn.com/dms/image/v2/C4E03AQGNeJRorEd2Nw/profile-displayphoto-shrink_100_100/profile-displayphoto-shrink_100_100/0/1569287114631?e=1784160000&v=beta&t=tJDZC7EXWnlgIIf8kF7fBCajhF-HEgzNXnz_IIkjqW8","author_profile_url":"https://www.linkedin.com/in/ravievani","has_image":true,"impression_count":3338,"is_article":false,"is_my_post":true,"is_video":true,"post_image_url":"https://media.licdn.com/dms/image/v2/D4E05AQFemgmZlFdGfA/videocover-high/B4EZmwTQd3IkBw-/0/1759599492191?e=1782932400&v=beta&t=2ovhW8l3XIf06U2WNuk-b2R_SbOyTtf-i5t5L2FnJC8","post_text":"AI answering engines and agents are on the path to transform travel commerce. When travelers ask these agents for recommendations, they are offloading most of their research to the machine--which returns back to them a highly curated shortlist to pick from.\n\nIn this new reality, brands need to resonate with these AI agents at the exact moment of intent: with structured data, verified claims, and instant booking capability.\n\nTo make this possible, travel and hospitality enterprises will need to build their own agents across booking, customer service, operations, and planning. But without a unified intelligence layer--an enterprise \"AI brain\"--these agents will operate as disconnected silos, wreaking havoc.\n\nThis enterprise AI brain must hold institutional knowledge and apply it consistently across every touchpoint. Brand standards, policies, operational data, and customer insights all need to flow through a central intelligence that can orchestrate actions and enable instant purchase at the moment of convers
