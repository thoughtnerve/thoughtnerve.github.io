he human role using something called the autonomy slider. We're moving from a human approving every single action to more higher level supervision. And the key metric here, it's the override rate. Basically, how often a human supervisor rejects an agent's recommendation. You need to get that rate way down, usually below 10% before you can safely let the agents run.\n\nFinally, how do you make all this affordable at scale? That's where the agentic mesh could help. Think of it like an internet of agents. The solution is a model garden strategy. A smart router looks at a task and if it's simple, it sends it to a fast, cheap, small model. The really powerful, expensive models, they're saved only for the complex strategic jobs.\n\nIn the end, success in this new agentic era isn't just about having the best model. It's about architecting for a large, safe, and cost-effective autonomous scale.","post_image_url":"https://media.licdn.com/dms/image/v2/D4E22AQGFzmZtf2pBKw/feedshare-shrink_800/B4EZuC4Cb8GkAg-/0/1767427293422?e=1784160000&v=beta&t=oTRfOVeTjA9sYa-TmZooCCsYA632Fp48RdCSfAMVqTE","is_article":false,"article_url":null,"article_title":null,"article_description":null,"is_video":false,"video_url":null,"has_image":true,"reaction_count":46,"reaction_types":"LIKE, INTEREST, EMPATHY","comment_count":2,"repost_count":2,"impression_count":2970,"source":"activity"},{"is_my_post":true,"post_urn":"urn:li:activity:7412860715830554624","author_name":"Ravi Evani\n              \n                \n                   \n    \n      \n    \n    \n      \n    \n\n • You","author_profile_url":"https://www.linkedin.com/in/ravievani","author_headline":"Deploying enterprise agents in production / CTO / SWE Leader / GVP @ Publicis Sapient","posted_time":"2026-01-27","posted_hours_ago":3600,"posted_time_raw":"5mo","post_url":"https://www.linkedin.com/feed/update/urn:li:activity:7412860715830554624","author_profile_image_url":"https://media.licdn.com/dms/image/v2/C4E03AQGNeJRorEd2Nw/profile-displayphoto-shrink_100_100/profile-displayphoto-shrink_100_100/0/1569287114631?e=1784160000&v=beta&t=tJDZC7EXWnlgIIf8kF7fBCajhF-HEgzNXnz_IIkjqW8","post_text":"The most meaningful gains with AI often come after you push past the first acceptable answer.\n\nAn engineer had a dashboard that loaded user posts, which was painfully slow.\n\nThis wasn't some high-tech system. It was built on a Google Sheets backbone.\n\nSo the first prompt to optimize was super simple: “What are some patterns we can explore to load the posts quickly?”.\n\nThat kicked off the first phase of divergent exploration. The AI just threw out a bunch of ideas. In this case, four different architectural patterns, each with its own trade-offs.\n\nYou had stuff like showing the user old data instantly while you fetch the new stuff in the background. It also suggested virtualization which is complex. And then simpler things like pagination and optimized fetching.\n\nAI recommended the caching solution because it was the highest impact for the lowest amount of code. An easy win.\n\nAnd that seems like the end of the story. You solve 80% of the problem. You move on.\n\nBut that's not what happened. The engineer didn't just accept it.\n\nThe engineer saw the big flaw: the cold start problem. That first time load before anything is cached, it would still be horribly slow.\n\nSo they went into the challenge phase. And pushed back: \"Okay, this is great, but that initial cold start still kills the user experience. How do we fix that?\"\n\nAnd that one question was the pivot point.\n\nThe moment the human smartly challenges the AI, you move out of just getting answers and into true synthesis.\n\nSo the AI didn't just give a fifth option. It created a sophisticated design by combining the best ideas into something it called the “speed pack”, with three main parts.\n\nFirst, it kept the original suggestion of the local cache. Because for any returning user, it gives that instant load.\n\nBut what about the cold start problem?\n\nAnd that's component two: “parallel fetching”. It's a way to cut that initial network time in about half by grabbing all the data components at the same time instead of one after the other.\n\nBut here's a third part which I think is maybe the most clever: The skeleton UI.\n\nAnd this wasn't about making it faster -- but a psychological optimization.\n\nSo you click the button and instantly these gray boxes (skeletons) pop up. So it feels responsive. It gives visual feedback that something is happening, which makes that multi-second weight feel like almost nothing.\n\nAnd that hybrid approach solved for returning users, for the cold start, and for perception. That's something neither the human nor the AI came up with on their own at the start. It was born from the challenge.\n\nSo really what this all comes down to is true optimization, the real breakthroughs happen when you stop just accepting the first right answer.\n\nYou're not just getting information. You have to challenge the constraints. You're pushing the model to integrate ideas in a much more sophisticated way.\n\nWhere else could this synergy loop strategy unlock something new in your own work?","post_image_url":"https://media.licdn.com/dms/image/v2/D4E22AQEEi-bTQehDtw/feedshare-shrink_800/B4EZt_Fhl_IUAk-/0/1767363717279?e=1784160000&v=beta&t=_88irqEWmQqV5qxrzNbmr4bHf_NSMu7Rs0zNK7Xfc_8","is_article":false,"article_url":null,"article_title":null,"article_description":null,"is_video":false,"video_url":null,"has_image":true,"reaction_count":26,"reaction_types":"LIKE","impression_count":1005,"source":"activity"},{"is_my_post":true,"post_urn":"urn:li:activity:7412532682959556608","author_name":"Ravi Evani\n              \n                \n                   \n    \n      \n    \n    \n      \n    \n\n • You","author_profile_url":"https://www.linkedin.com/in/ravievani","author_headline":"Deploying enterprise agents in production / CTO / SWE Leader / GVP @ Publicis Sapient","posted_time":"2026-01-27","posted_hours_ago":3600,"posted_time_raw":"5mo","post_url":"https://www.linkedin.com/feed/update/urn:li:activity:7412532682959556608","author_profile_image_url":"https://media.licdn.com/dms/image/v2/C4E03AQGNeJRorEd2Nw/profile-displayphoto-shrink_100_100/profile-displayphoto-shrink_100_100/0/1569287114631?e=1784160000&v=beta&t=tJDZC7EXWnlgIIf8kF7fBCajhF-HEgzNXnz_IIkjqW8","post_text":"Ever wonder why hotels overbook? Overbooking isn’t a hotel trying to be clever. It’s a high-stakes game of predicting who’s actually gonna show up.\n\nThe goal is simple: minimize losses from empty rooms. But if you’re thinking about revenue management, the real unlock is this: don’t treat cancellations as a single number. Treat it as uncertainty you can work with, and have a \"Cancelation Risk Agent\" that keeps that \"probability picture\" fresh as bookings come in.\n\nThe Science: Bayesian Analysis\nThe paper “Bayesian Analysis of Hotel Booking Cancellations” (link in comments) uses some pretty cool statistical methods to get a handle on this chaos.\n\nBayesian Analysis is about incorporating prior knowledge and dealing with uncertainty. It’s not just crunching numbers; it helps hotel managers bring in real-world understanding of how the hotel industry works. Most importantly, it gives probabilities, not just point estimates. That’s key for making decisions when there’s risk involved.\n\nIn this example, Bayesian analysis determines three major factors that influence cancelation risk:\n\n1/ Lead Time: The longer people book in advance, the more likely they are to cancel. It's a huge risk factor.\n\n2/ Special Requests: These are commitment signals. If a guest asks for something specific, they're visualizing their stay.\n\n3/ Parking: This is a strong commitment signal. It implies they have confirmed travel plans (like a rental car or road trip).\n\nThe results also showed that City hotels have way higher cancellation rates than Resort hotels, meaning a \"one-size-fits-all\" policy just doesn't work.\n\nSo, how does a cancelation risk agent help hotel managers?\nIt takes those simple variables: historical cancellations, lead time, special requests, parking—and turns them into a continuously updated view of “who’s likely to ditch their reservation?”.\n\nIt recommends different overbooking strategies for city vs. resort hotels.\nIt pushes practical actions: encourage special requests and parking reservations, because those are strong signals of commitment.\n\nThe agent gives hotel managers a nuanced understanding of human behavior, and the hotel manager uses that nuance to make smarter, more profitable decisions in the face of uncertainty.","post_image_url":"https://media.licdn.com/dms/image/v2/D4E05AQE65R09S_1LPA/videocover-high/B4EZt6bKyRKMBY-/0/1767285503741?e=1783137600&v=beta&t=dR7bMBvGgcWbTBy1QivJzVWic5Y4ZuGx08MC7OOFmJA","is_article":false,"article_url":null,"article_title":null,"article_description":null,"is_video":true,"video_url":"https://media.licdn.com/dms/image/v2/D4E05AQE65R09S_1LPA/videocover-high/B4EZt6bKyRKMBY-/0/1767285503741?e=1783137600&v=beta&t=dR7bMBvGgcWbTBy1QivJzVWic5Y4ZuGx08MC7OOFmJA","has_image":true,"reaction_count":24,"reaction_types":"LIKE, INTEREST","comment_count":5,"impression_count":1364,"source":"activity"},{"is_my_post":true,"post_urn":"urn:li:activity:7411571356254769152","author_name":"Ravi Evani\n              \n                \n                   \n    \n      \n    \n    \n      \n    \n\n • You","author_profile_url":"https://www.linkedin.com/in/ravievani","author_headline":"Deploying enterprise agents in production / CTO / SWE Leader / GVP @ Publicis Sapient","posted_time":"2026-01-27","posted_hours_ago":3600,"posted_time_raw":"5mo","post_url":"https://www.linkedin.com/feed/update/urn:li:activity:7411571356254769152","author_profile_image_url":"https://media.licdn.com/dms/image/v2/C4E03AQGNeJRorEd2Nw/profile-displayphoto-shrink_100_100/profile-displayphoto-shrink_100_100/0/1569287114631?e=1784160000&v=beta&t=tJDZC7EXWnlgIIf8kF7fBCajhF-HEgzNXnz_IIkjqW8","post_text":"Thank you to the top 30 people who consistently supported my posts in 2025.\n\nHonestly, it says more about you than about what I posted. You’re wired to naturally support, encourage, and boost others. Thats rare.\n\nPutting ideas out there comes with a real fear of judgement. Your encouragement made it feel safer for me to to keep writing, keep thinking out loud, and keep learning in public. I appreciate you more than you know.\n\nRaymond Velez, Rohan Maheshwari, Richard Doherty, Rohit Singh, Sankara Naveen Porumamilla, Jacob Johan C., Lakshumanan Sundaram, Manjunath Prabakaran, Rakesh Kumar, Bridget MacMillan, Gautam Sarma, Amit Sharma, Rakesh Ravuri, NAMIT NAYAK, Mohammed Azeer, Sambit Patjoshi, Aravindhan Asokan, CESAR PAEZ RODRIGUEZ HE / HIM, Shiladitya (Adi) Ghosh, Anish Ramachandran, Laura Correal Orjuela, Prit Ranjan, Sumitesh Naithani, James Kessler, Indra Prabha Sharma, Karen (Aschenbrener) Miklic, MBA, Aishwarya Singhal, Anurag Tyagi, Abhijeet Dey, SreeSekhar Palaparthy","post_image_url":null,"is_article":false,"article_url":null,"article_title":null,"article_description":null,"is_video":false,"video_url":null,"has_image":false,"reaction_count":103,"reaction_types":"LIKE, EMPATHY, PRAISE","comment_count":7,"impression_count":6382,"source":"activity"},{"is_my_post":true,"post_urn":"urn:li:activity:7411462710573338624","author_name":"Ravi Evani\n              \n                \n                   \n    \n      \n    \n    \n      \n    \n\n • You","author_profile_url":"https://www.linkedin.com/in/ravievani","author_headline":"Deploying enterprise agents in production / CTO / SWE Leader / GVP @ Publicis Sapient","posted_time":"2026-01-27","posted_hours_ago":3600,"posted_time_raw":"5mo","post_url":"https://www.linkedin.com/feed/update/urn:li:activity:7411462710573338624","author_profile_image_url":"https://media.licdn.com/dms/image/v2/C4E03AQGNeJRorEd2Nw/profile-displayphoto-shrink_100_100/profile-displayphoto-shrink_100_100/0/1569287114631?e=1784160000&v=beta&t=tJDZC7EXWnlgIIf8kF7fBCajhF-HEgzNXnz_IIkjqW8","post_text":"Thanks Aishwarya! There were a lot of learnings in this implementation journey. We got to \"MLP\" in a few weeks, but the hard part was making the results consistently relevant and useful to end users.\n\nThe real difference between this and traditional applications is that you can ship something small in a deterministic system and scale it, because functionality behaves predictably as you roll it out. But with AI-driven systems like this one, scaling is not linear. Adding more data doesn’t automatically make the capability scale the way it would in deterministic software. Data is a huge variable here: its quality, breadth, depth, and coverage matter, and the long tail never really goes away. This isn’t like making a die once and churning out identical shapes; the system keeps encountering new intent patterns and edge cases as usage expands.\n\nThat’s why we went context first. If we couldn’t get reliable answers through context engineering and prompt iteration, building UI polish would have been wasted effort. Engineers and product managers worked together directly on the AI behavior, iterating quickly, reading real outputs, and tightening the “common thread” that made the experience coherent.\n\nAnd we learned it couldn’t feel like a chatbot bolted onto search. Guests don’t want to “chat” to find a place to stay. The AI had to be embedded into a familiar, highly visual experience, integrated with filters and existing interaction patterns. Behind the scenes, the unlock was getting serious about data pipelines and validation, then backing it up with real testing: brand compliance checks, evals/regression tests and red teaming that combined humans with LLM-based judging, so we could iterate without losing control.","post_image_url":"https://media.licdn.com/dms/image/v2/D4E22AQFc5ceKBDskiQ/feedshare-shrink_800/B4EZtq0yBRGkAg-/0/1767023781390?e=1784160000&v=beta&t=zFIaEn1_apKYnXeCW53DRr--rpfyVk8ofjPX2GUsMTo","is_article":true,"article_url":"https://lnkd.in/evGBTTTN","article_title":"https://lnkd.in/evGBTTTN","article_description":"","is_video":false,"video_url":null,"has_image":true,"reaction_count":26,"reaction_types":"LIKE, INTEREST","repost_count":2,"impression_count":3154,"source":"activity"},{"is_my_post":true,"post_urn":"urn:li:activity:7410841696881655808","author_name":"Ravi Evani\n              \n                \n                   \n    \n      \n    \n    \n      \n    \n\n • You","author_profile_url":"https://www.linkedin.com/in/ravievani","author_headline":"Deploying enterprise agents in production / CTO / SWE Leader / GVP @ Publicis Sapient","posted_time":"2026-01-27","posted_hours_ago":3600,"posted_time_raw":"5mo","post_url":"https://www.linkedin.com/feed/update/urn:li:activity:7410841696881655808","author_profile_image_url":"https://media.licdn.com/dms/image/v2/C4E03AQGNeJRorEd2Nw/profile-displayphoto-shrink_100_100/profile-displayphoto-shrink_100_100/0/1569287114631?e=1784160000&v=beta&t=tJDZC7EXWnlgIIf8kF7fBCajhF-HEgzNXnz_IIkjqW8","post_text":"Saturday Project: Now I can easily organize Linkedin Saved Posts into Folders!","post_image_url":"https://media.licdn.com/dms/image/v2/D4E05AQF2DONHDo63wg/videocover-high/B4EZtiZPwQJwBU-/0/1766882345829?e=1783137600&v=beta&t=Si7NLRWGqcOIkD91Qgs68uQvbh0rXMgUgQKqAZguyWw","is_article":false,"article_url":null,"article_title":null,"article_description":null,"is_video":true,"video_url":"https://media.licdn.com/dms/image/v2/D4E05AQF2DONHDo63wg/videocover-high/B4EZtiZPwQJwBU-/0/1766882345829?e=1783137600&v=beta&t=Si7NLRWGqcOIkD91Qgs68uQvbh0rXMgUgQKqAZguyWw","has_image":true,"reaction_count":18,"reaction_types":"LIKE, EMPATHY, INTEREST","comment_count":3,"impression_count":1331,"source":"activity"},{"is_my_post":true,"post_urn":"urn:li:activity:7410640339578806272","author_name":"Ravi Evani\n              \n                \n                   \n    \n      \n    \n    \n      \n    \n\n • You","author_profile_url":"https://www.linkedin.com/in/ravievani","author_headline":"Deploying enterprise agents in production / CTO / SWE Leader / GVP @ Publicis Sapient","posted_time":"2026-01-27","posted_hours_ago":3600,"posted_time_raw":"5mo","post_url":"https://www.linkedin.com/feed/update/urn:li:activity:7410640339578806272","author_profile_image_url":"https://media.licdn.com/dms/image/v2/C4E03AQGNeJRorEd2Nw/profile-displayphoto-shrink_100_100/profile-displayphoto-shrink_100_100/0/1569287114631?e=1784160000&v=beta&t=tJDZC7EXWnlgIIf8kF7fBCajhF-HEgzNXnz_IIkjqW8","post_text":"Standard search is great for \"flights to Paris.\" But what about \"Is a 3-day coffee tour in Kyoto feasible in April, and what are the hidden gems?\"\n\nThat's where Deep Research comes in. Instead of a single LLM response, it's an asynchronous agentic workflow that gathers data, analyzes feasibility, and curates a personalized briefing.\n\nHere's how to drop interactive \"Deep Research\" capabilities into any discovery app/ chatbot. You can apply this pattern to any exploratory app (travel, shopping, real estate, education).\n\nThe Architecture: Trigger, Poll, Visualize\nWe don't want the user staring at a loading spinner for 60 seconds. The key is to make the process asynchronous and persistent.\n\n① The Trigger: Identifying Intent\nDon't force users to find a specific button. Let the LLM decide when a \"Deep Dive\" is needed.\n\nWe registered a tool called startDeepResearch with our agent. When the user asks a complex question, the agent calls this tool.\n\n② The Process: Async & Persistent\nThe tool returns a taskId immediately. We don't wait for the result.\nInstead, we render a DeepResearchIndicatorwidget. This widget does three things:\n\n➥ Polls the backend for the status of taskId.\n➥ Persists the task locally (using shared_preferences), so if the user closes the app, the research continues.\n➥ Animates progress to keep the UI alive.\n\nPro-tip: Add a History view. Deep Research is valuable; users want to reference these automated briefings later.\n\n③ The Visualization: Rich \"Briefings\"\nWhen the task finishes, don't just dump text. We receive a structured JSON payload (sanity, vibe, logistics, hidden_gems) and render a Briefing Page.\n\nThis transforms the LLM's raw analysis into a native, interactive report:\n➥ Visual Logic: \"If vibe.isRelaxed, use soft colors.\"\n➥ Interactive Maps: \"Plot the hidden_gems coordinates.\"\n➥ Actionable: \"Add these 3 recommended spots directly to my itinerary.\"\n\nThis pattern creates a \"Research Assistant\" feel. It moves your app from being a passive search interface to an active partner that does the heavy lifting while the user explores.","post_image_url":"https://media.licdn.com/dms/image/v2/D4E05AQET11bTl-rxaQ/videocover-high/B4EZtfiGe0GYBU-/0/1766834335656?e=1783137600&v=beta&t=ebn1hSoqKRWFrVW2ZsGZeB3YMTc7I9DoxKWTxQp4HdA","is_article":false,"article_url":null,"article_title":null,"article_description":null,"is_video":true,"video_url":"https://media.licdn.com/dms/image/v2/D4E05AQET11bTl-rxaQ/videocover-high/B4EZtfiGe0GYBU-/0/1766834335656?e=1783137600&v=beta&t=ebn1hSoqKRWFrVW2ZsGZeB3YMTc7I9DoxKWTxQp4HdA","has_image":true,"reaction_count":14,"reaction_types":"LIKE","comment_count":2,"impression_count":1016,"source":"activity"},{"article_description":"","article_title":"","article_url":"","author_headline":"AI@Nebius | Co-founder@TheGenAcademy | Most Followed Indian Woman in AI | Global Keynote Speaker (150+ talks)| EB1-A Recipient | 1M+ followers across platforms | Startup AI Advisor + Investor","author_name":"Aishwarya Srinivasan\n              \n                \n                   \n      \n     • 1st","author_profile_image_url":"https://media.licdn.com/dms/image/v2/D4E35AQEWbeMbMQtqdQ/profile-framedphoto-shrink_100_100/B4EZ0G2_nyG0As-/0/1773936573233?e=1781233200&v=beta&t=Lk0XF3iH6kaUWHqW_TmE0Wr-81ZVlqWd_Nm5-UMcZts","author_profile_url":"https://www.linkedin.com/in/aishwarya-srinivasan","category":"#N/A","comment_count":12,"impression_count":0,"isDeleted":false,"is_article":false,"is_my_post":true,"is_video":true,"post_image_url":"https://media.licdn.com/dms/image/v2/D4E05AQFTqr_W0cxqMQ/videocover-low/B4EZsbDG1rKMBQ-/0/1765685405339?e=1781233200&v=beta&t=OOv5sQDGuvh3ndAOABbCew2tGX3bTby6ssMREpqgxl0","post_text":"I had a conversation with Ravi Evani, GVP and CTO of Engineering at Publicis Sapient, and it reminded me why real enterprise AI work rarely looks like the glossy demos we see online. It’s slow, it’s meticulous, and it forces you to respect the structure and context of the business before you ever touch a model.\n\n✦ Ravi talked about agentic systems the way seasoned engineers do: start with meaning before mechanics. If your data doesn’t have shared semantics, if your workflows don’t have clear boundaries, no agent is going to behave reliably. Ontologies and context graphs aren’t academic artifacts, they’re what let AI operate in the real enterprise, not just in a polished demo. They’re the difference between “sounds right” and “is right.”\n\n✦ The Lending Manager example made that real. Everyone loves the headline of cutting loan processing time in half. But the actual win came from decomposing the workflow into what should be coded, what should be modeled, and what genuinely benefits from generative reasoning. When you separate those layers correctly, the system becomes predictable in a domain that tolerates exactly zero surprises. That’s what delivery looks like, not experimentation.\n\n✦ Ravi said something I wish more AI teams internalized: deterministic logic deserves code, probabilistic tasks deserve ML, and only the interpretive, repetitive moments deserve GenAI. That mental model protects you from the accidental chaos GenAI can introduce in regulated environments packed with PII and fairness constraints. It’s a reminder that enterprise AI isn’t about bigger models, it’s about the right architecture for the outcome you need\n\n✦ And adoption is never magic. You start by removing the friction points that experts have quietly tolerated for decades. You earn trust by improving their day-to-day reality, not by promising transformation in a slide deck.","post_url":"https://www.linkedin.com/feed/update/urn:li:activity:7408889706467315713","post_urn":"urn:li:activity:7408889706467315713","posted_time":"2026-01-05","reaction_count":254,"reaction_types":"LIKE, INTEREST, PRAISE","repost_count":8,"scrapedAt":"2026-06-05T02:45:32.371Z","source":"my-posts","video_url":"https://media.licdn.com/dms/image/v2/D4E05AQFTqr_W0cxqMQ/videocover-low/B4EZsbDG1rKMBQ-/0/1765685405339?e=1781233200&v=beta&t=OOv5sQDGuvh3ndAOABbCew2tGX3bTby6ssMREpqgxl0"},{"article_description":"","article_title":"","article_url":"","author_headline":"965,523 followers","author_name":"Publicis Sapient","author_profile_image_url":"https://media.licdn.com/dms/image/v2/D4E0BAQFFzEm8Vg3Lwg/company-logo_100_100/B4EZqics_9KMAU-/0/1763662025177?e=1782345600&v=beta&t=SUx_oR0KdYYh-ejm-N31OJ9n4jWUROrRymG4OrIEAuM","author_profile_url":"https://www.linkedin.com/company/publicissapient/posts","category":"#N/A","comment_count":2,"impression_count":0,"isDeleted":false,"is_article":false,"is_my_post":true,"is_video":true,"post_image_url":"https://media.licdn.com/dms/image/v2/D4E05AQFTqr_W0cxqMQ/videocover-low/B4EZsbDG1rKMBQ-/0/1765685405339?e=1781233200&v=beta&t=OOv5sQDGuvh3ndAOABbCew2tGX3bTby6ssMREpqgxl0","post_text":"Ravi’s point is simple. If your AI cannot respect your data boundaries it will fail.\n\nThe only AI that delivers in the enterprise is the kind grounded in context, structure and the rules your business runs on.\n\nThank you, Aishwarya for the sharp questions around Sapient Slingshot and hashtag#SapientBodhi that brought this to the surface. 🤝\n\nExplore AI platforms that help enterprises modernize 75% faster: https://lnkd.in/eWD_2Uz","post_url":"https://www.linkedin.com/feed/update/urn:li:activity:7407161959873298432","post_urn":"urn:li:activity:7407161959873298432","posted_time":"2026-01-05","reaction_count":43,"reaction_types":"LIKE, EMPATHY, INTEREST","repost_count":3,"scrapedAt":"2026-06-05T02:45:32.371Z","source":"my-posts","video_url":"https://media.licdn.com/dms/image/v2/D4E05AQFTqr_W0cxqMQ/videocover-low/B4EZsbDG1rKMBQ-/0/1765685405339?e=1781233200&v=beta&t=OOv5sQDGuvh3ndAOABbCew2tGX3bTby6ssMREpqgxl0"},{"article_description":"","article_title":"","article_url":"","author_headline":"Head of Communications | Strategic Storytelling | Innovation & Business Transformation","author_name":"Daniela Cortés Medina\n              \n                \n                   \n    \n    \n\n • 1st","author_profile_image_url":"https://media.licdn.com/dms/image/v2/D4E03AQGJ6HGaSoLFag/profile-displayphoto-scale_100_100/B4EZm3QShkGcAc-/0/1759716125473?e=1782345600&v=beta&t=j-er5ilNSG2qerMn4qqJ-rBiN5EMhAxJ5I7kZWzN48E","author_profile_url":"https://www.linkedin.com/in/danielacortesmedina","category":"#N/A","comment_count":1,"impression_count":0,"isDeleted":false,"is_article":false,"is_my_post":true,"is_video":true,"post_image_url":"https://media.licdn.com/dms/image/v2/D4E05AQFOpUzxUadz6g/videocover-low/B4EZsjAXaSKkBQ-/0/1765818859802?e=1781233200&v=beta&t=KDI84f45Y17vEu9LZ9sDR6lhCfG-R5_xFj7-GVkXpZc","post_text":"This year, we didn’t launch another AI initiative.\nWe built AI Caravan.\n\nNot just an event.\nNot another talk about trends.\n\nBut a traveling learning experience designed to explore AI from every angle: engineering, product, business, culture, leadership — and most importantly, people.\n\nWe started with one belief: Transformation doesn’t happen to us. Transformation happens because of us.\n\nBorned in LATAM from the energy and curiosity of our teams at Publicis Sapient, AI Caravan traveled across North America — connecting cities, teams, and perspectives around a shared goal: turning AI potential into real impact.\n\nOur mission? Make AI practical, human, and real in everyday work.\nBridge vision and execution.\nCreate spaces where builders, engineers, and thinkers don’t just listen — they ask better questions, share sharper ideas, and build smarter solutions together.\n\nWhat began as a regional idea became a cross-region journey — proving that when knowledge moves, impact scales. Next year, we’re taking it further: more cities, more voices, more ideas.\n\nBecause the future of AI isn’t about technology alone. It’s about people leading the change.\n\nLaura Correal Orjuela Camila Riaño Mora Ian Stevens Ravi Evani Nicole Lambiase, PMP Amit Sharma Sheldon Monteiro","post_url":"https://www.linkedin.com/feed/update/urn:li:activity:7406535504566910976","post_urn":"urn:li:activity:7406535504566910976","posted_time":"2026-01-05","reaction_count":49,"reaction_types":"LIKE, PRAISE, EMPATHY","repost_count":7,"scrapedAt":"2026-06-05T02:45:32.372Z","source":"my-posts","video_url":"https://media.licdn.com/dms/image/v2/D4E05AQFOpUzxUadz6g/videocover-low/B4EZsjAXaSKkBQ-/0/1765818859802?e=1781233200&v=beta&t=KDI84f45Y17vEu9LZ9sDR6lhCfG-R5_xFj7-GVkXpZc"},{"is_my_post":true,"post_urn":"urn:li:activity:7410223445701177344","author_name":"Ravi Evani\n              \n                \n                   \n    \n      \n    \n    \n      \n    \n\n • You","author_profile_url":"https://www.linkedin.com/in/ravievani","author_headline":"Deploying enterprise agents in production / CTO / SWE Leader / GVP @ Publicis Sapient","posted_time":"2025-12-27","posted_hours_ago":4320,"posted_time_raw":"6mo","post_url":"https://www.linkedin.com/feed/update/urn:li:activity:7410223445701177344","author_profile_image_url":"https://media.licdn.com/dms/image/v2/C4E03AQGNeJRorEd2Nw/profile-displayphoto-shrink_100_100/profile-displayphoto-shrink_100_100/0/1569287114631?e=1784160000&v=beta&t=tJDZC7EXWnlgIIf8kF7fBCajhF-HEgzNXnz_IIkjqW8","post_text":"Generative UI shifts agent interaction from a chat to an efficient, multimodal workflow.\n\nThe agent can render the right user interface suitable to the moment of interaction. This cuts cognitive overload and brings sharp focus to the action that needs to be taken.\n\nIn a travel planning flow, that means a guest can move from inspiration (browse spa retreats) to decision (choose Maldives) to execution (build itinerary, add transfers, confirm) in one continuous journey, without bouncing across pages or wading through blocks of text and irrelevant UI. The experience stays contextual: chat for nuance, widgets for precision, and the workflow advances with each interaction.\n\nFor enterprises, this changes how you build experiences. You’re not hardcoding every variation of a journey; you’re assembling approved components dynamically around real user context. Done right, it speeds iteration while keeping guardrails (consistent brand UI, policy checks, accessibility, audit logs, and reliability) so teams can move faster without losing control.","post_image_url":"https://media.licdn.com/dms/image/v2/D4E05AQFCv_sq5dlgHg/videocover-high/B4EZtZm6ZtGQBU-/0/1766734934159?e=1783137600&v=beta&t=GKoxz1b7c77s3jrtqHoOp70CohpCvAhsVOygt1Dkt6o","is_article":false,"article_url":null,"article_title":null,"article_description":null,"is_video":true,"video_url":"https://media.licdn.com/dms/image/v2/D4E05AQFCv_sq5dlgHg/videocover-high/B4EZtZm6ZtGQBU-/0/1766734934159?e=1783137600&v=beta&t=GKoxz1b7c77s3jrtqHoOp70CohpCvAhsVOygt1Dkt6o","has_image":true,"reaction_count":16,"reaction_types":"LIKE, INTEREST","comment_count":10,"repost_count":1,"impression_count":2157,"source":"activity"},{"is_my_post":true,"post_urn":"urn:li:activity:7408961326808707073","author_name":"Ravi Evani\n              \n                \n                   \n    \n      \n    \n    \n      \n    \n\n • You","author_profile_url":"https://www.linkedin.com/in/ravievani","author_headline":"Deploying enterprise agents in production / CTO / SWE Leader / GVP @ Publicis Sapient","posted_time":"2025-12-27","posted_hours_ago":4320,"posted_time_raw":"6mo","post_url":"https://www.linkedin.com/feed/update/urn:li:activity:7408961326808707073","author_profile_image_url":"https://media.licdn.com/dms/image/v2/C4E03AQGNeJRorEd2Nw/profile-displayphoto-shrink_100_100/profile-displayphoto-shrink_100_100/0/1569287114631?e=1784160000&v=beta&t=tJDZC7EXWnlgIIf8kF7fBCajhF-HEgzNXnz_IIkjqW8","post_text":"In long-running teams and projects, what looks like “obvious dysfunction” to an outsider is often just accumulated survival behavior.\n\nWhen a problem goes unresolved for months or years, people don’t stay neutral. They build workarounds, guardrails, and habits that let them protect themselves. Over time, those workarounds become “the way we do things.” So when you point at something alarming, it can look like they’re dismissing it. Most of the time they’re not. Their defense mechanism is kicking in: minimize the signal, avoid the blame cycle, and preserve whatever stability they’ve managed to create.\n\nThe way out isn’t to call out the behavior or push harder on what looks obvious. The right move is to try and change the conditions that made those defenses necessary in the first place. That starts with understanding what risk the team believes it’s avoiding, fixing one root constraint that keeps problems from being addressed, and putting simple ownership and escalation in place so doing the right thing is safer than working around it.","post_image_url":null,"is_article":false,"article_url":null,"article_title":null,"article_description":null,"is_video":false,"video_url":null,"has_image":false,"reaction_count":12,"reaction_types":"LIKE, INTEREST","comment_count":2,"impression_count":865,"source":"activity"},{"is_my_post":true,"post_urn":"urn:li:activity:7408878312984375298","author_name":"Ravi Evani\n              \n                \n                   \n    \n      \n    \n    \n      \n    \n\n • You","author_profile_url":"https://www.linkedin.com/in/ravievani","author_headline":"Deploying enterprise agents in production / CTO / SWE Leader / GVP @ Publicis Sapient","posted_time":"2025-12-27","posted_hours_ago":4320,"posted_time_raw":"6mo","post_url":"https://www.linkedin.com/feed/update/urn:li:activity:7408878312984375298","author_profile_image_url":"https://media.licdn.com/dms/image/v2/C4E03AQGNeJRorEd2Nw/profile-displayphoto-shrink_100_100/profile-displayphoto-shrink_100_100/0/1569287114631?e=1784160000&v=beta&t=tJDZC7EXWnlgIIf8kF7fBCajhF-HEgzNXnz_IIkjqW8","post_text":"A2UI is a practical bridge between “LLM reasoning” and “enterprise-grade UX”.\n\nThis is useful because it gives agents a clean way to drive real transactions inside your product without resorting to brittle UI hacks. Instead of returning paragraphs, the agent can return a structured UI spec (form fields, pickers, buttons, lists), and your app renders it using your existing components, styling, and permissions.\n\nIn travel and hospitality, this maps directly to the highest-friction moments: canceling a reservation, approving comp/credit, rebooking after disruption, creating a service ticket, etc. The agent can present the right UI at the right step, validate inputs, and keep the user moving, without you building a bespoke screen for every edge case.\n\nOperationally, A2UI is a governance win. You can constrain what the agent is allowed to render, bind actions to your APIs, enforce policy checks, log every interaction, and keep accessibility and brand consistency.\n\nNet effect: faster iteration on workflows, fewer “chat back-and-forth” loops, and a clearer path to putting agents into guest-facing and staff-facing journeys without giving them uncontrolled UI or code execution.","post_image_url":null,"is_article":false,"article_url":null,"article_title":null,"article_description":null,"is_video":false,"video_url":null,"has_image":false,"reaction_count":7,"reaction_types":"LIKE","comment_count":3,"impression_count":1180,"source":"activity"},{"is_my_post":true,"post_urn":"urn:li:activity:7407834263016079360","author_name":"Ravi Evani\n              \n                \n                   \n    \n      \n    \n    \n      \n    \n\n • You","author_profile_url":"https://www.linkedin.com/in/ravievani","author_headline":"Deploying enterprise agents in production / CTO / SWE Leader / GVP @ Publicis Sapient","posted_time":"2025-12-27","posted_hours_ago":4320,"posted_time_raw":"6mo","post_url":"https://www.linkedin.com/feed/update/urn:li:activity:7407834263016079360","author_profile_image_url":"https://media.licdn.com/dms/image/v2/C4E03AQGNeJRorEd2Nw/profile-displayphoto-shrink_100_100/profile-displayphoto-shrink_100_100/0/1569287114631?e=1784160000&v=beta&t=tJDZC7EXWnlgIIf8kF7fBCajhF-HEgzNXnz_IIkjqW8","post_text":"When escalations hit hard, an organization’s default move is “find a stronger lead”. It’s a clean story: one name, one fix. But most escalations aren’t proof that a team lacks leadership. They’re proof that the system has stopped protecting execution. The same signals show up every time: key people are spread too thin, priorities are contested, client pressure hijacks the team’s calendar, and delivery basics degrade because nobody has the room to enforce them.\n\nEscalations are usually “systems feedback,” not “people feedback”. They’re the business telling you that focus, ownership, and capacity allocation have broken down. The fix is rarely a heroic new lead. The fix is structural: single-threaded ownership where needed, protected engineering time, a real client-facing buffer, explicit prioritization across SMEs, and consequences for basic operating norms. Until those are in place, any new lead becomes another person absorbing chaos.\n\nSo if someone asks me to “find a lead” in the middle of escalation, my first question now is: what problem are we trying to solve: execution capability, or execution conditions? If it’s the conditions, the best leadership move isn’t replacing people. It’s redesigning the system so good people can actually do good work.","post_image_url":null,"is_article":false,"article_url":null,"article_title":null,"article_description":null,"is_video":false,"video_url":null,"has_image":false,"reaction_count":42,"reaction_types":"LIKE, EMPATHY, INTEREST","comment_count":4,"repost_count":2,"impression_count":4898,"source":"activity"},{"is_my_post":true,"post_urn":"urn:li:activity:7407041998274338816","author_name":"Ravi Evani\n              \n                \n                   \n    \n      \n    \n    \n      \n    \n\n • You","author_profile_url":"https://www.linkedin.com/in/ravievani","author_headline":"Deploying enterprise agents in production / CTO / SWE Leader / GVP @ Publicis Sapient","posted_time":"2025-12-27","posted_hours_ago":4320,"posted_time_raw":"6mo","post_url":"https://www.linkedin.com/feed/update/urn:li:activity:7407041998274338816","author_profile_image_url":"https://media.licdn.com/dms/image/v2/C4E03AQGNeJRorEd2Nw/profile-displayphoto-shrink_100_100/profile-displayphoto-shrink_100_100/0/1569287114631?e=1784160000&v=beta&t=tJDZC7EXWnlgIIf8kF7fBCajhF-HEgzNXnz_IIkjqW8","post_text":"In agentic AI implementations within regulated environments, the first design decision shouldn't be about agents at all.\n\nIn industries such as financial services or healthcare, the safest agentic systems start by being explicit about what does not need AI.\n\nIf a workflow step is well understood, it should be coded deterministically. Using AI where logic is already known doesn’t add intelligence; it adds risk, audit complexity, and bias surface area.\n\nStrong agentic pipelines are built by cleanly separating deterministic logic, classical ML, and generative reasoning. Deterministic code handles validation, routing, and policy enforcement. Classical ML handles scoring and prediction where behavior must be stable and testable. Generative agents are reserved for narrow slices where ambiguity exists and human-like reasoning genuinely helps.\n\nThis is why agentic pipelines can’t be treated as a pure engineering exercise. You need domain experts, risk, legal, and operations involved early to decide what decisions are allowed, what data can be touched, and where human judgment must remain in the loop. Engineers can build the scaffolding, but only the business can define the meaning of a “correct” outcome. Without that shared understanding, no amount of model tuning will make the system trustworthy.","post_image_url":"https://media.licdn.com/dms/image/v2/D4E05AQF4Pj0CvU5_9w/videocover-high/B4EZsqPuF4IwBU-/0/1765940325031?e=1783137600&v=beta&t=XV7cOUVwIhoNVCdzIPZgCLkF_t-_PvEITlDVn8t3QeU","is_article":false,"article_url":null,"article_title":null,"article_description":null,"is_video":true,"video_url":"https://media.licdn.com/dms/image/v2/D4E05AQF4Pj0CvU5_9w/videocover-high/B4EZsqPuF4IwBU-/0/1765940325031?e=1783137600&v=beta&t=XV7cOUVwIhoNVCdzIPZgCLkF_t-_PvEITlDVn8t3QeU","has_image":true,"reaction_count":27,"reaction_types":"LIKE, EMPATHY","impression_count":2908,"source":"activity"},{"is_my_post":true,"post_urn":"urn:li:activity:7406665250399260672","author_name":"Ravi Evani\n              \n                \n                   \n    \n      \n    \n    \n      \n    \n\n • You","author_profile_url":"https://www.linkedin.com/in/ravievani","author_headline":"Deploying enterprise agents in production / CTO / SWE Leader / GVP @ Publicis Sapient","posted_time":"2025-12-27","posted_hours_ago":4320,"posted_time_raw":"6mo","post_url":"https://www.linkedin.com/feed/update/urn:li:activity:7406665250399260672","author_profile_image_url":"https://media.licdn.com/dms/image/v2/C4E03AQGNeJRorEd2Nw/profile-displayphoto-shrink_100_100/profile-displayphoto-shrink_100_100/0/1569287114631?e=1784160000&v=beta&t=tJDZC7EXWnlgIIf8kF7fBCajhF-HEgzNXnz_IIkjqW8","post_text":"It was fun talking with Aishwarya Srinivasan and engaging with her thoughtful, customer-centric questions. She’s clearly focused on creating real value for people, and I enjoyed the time we spent discussing how she meets audiences at different levels of expertise to help them build understanding and confidence on AI.\n\nThere is a significant part of enterprise AI work that rarely makes it into demos: progress comes from respecting structure, not bypassing it. In real organizations, outcomes don’t improve because a model is impressive; they improve when the system understands how the business actually works. That means shared semantics, explicit boundaries, and clarity on what the AI should decide versus what it must not. Without that, you get systems that sound confident but behave unpredictably; which is unacceptable in any regulated or customer-critical domain.\n\nSeparation of concerns is key in any complex system design, and it's no different for systems involving agents. Many parts of a workflow should remain deterministic and coded. Some parts could benefit from classical ML. A much smaller slice truly benefits from generative reasoning. When teams blur those lines, risk and cost spike fast. When they separate them cleanly, systems become faster, more reliable, and easier to govern. That’s where architecture matters more than model choice, and where most AI programs quietly succeed or fail.\n\nAdoption follows the same logic. Trust isn’t earned through ambition; it’s earned by removing friction experts have lived with for years. When AI reduces rework, speeds up decisions, and makes the day-to-day easier (without breaking rules or introducing surprises) teams lean in.\n\nThat’s how enterprise AI scales: not as a big reveal, but as a series of practical improvements that compound over time.","post_image_url":"https://media.licdn.com/dms/image/v2/D4E05AQFTqr_W0cxqMQ/videocover-low/B4EZsbDG1rKMBQ-/0/1765685405339?e=1783137600&v=beta&t=O6TU8JZYfgTcTdqgA6KKLfDSWSNZ07Ahm8mki-eIJko","is_article":false,"article_url":null,"article_title":null,"article_description":null,"is_video":true,"video_url":"https://media.licdn.com/dms/image/v2/D4E05AQFTqr_W0cxqMQ/videocover-low/B4EZsbDG1rKMBQ-/0/1765685405339?e=1783137600&v=beta&t=O6TU8JZYfgTcTdqgA6KKLfDSWSNZ07Ahm8mki-eIJko","has_image":true,"reaction_count":14,"reaction_types":"LIKE, EMPATHY, INTEREST","impression_count":1045,"source":"activity"},{"is_my_post":true,"post_urn":"urn:li:activity:7406472068168429569","author_name":"Ravi Evani\n              \n                \n                   \n    \n      \n    \n    \n      \n    \n\n • You","author_profile_url":"https://www.linkedin.com/in/ravievani","author_headline":"Deploying enterprise agents in production / CTO / SWE Leader / GVP @ Publicis Sapient","posted_time":"2025-12-27","posted_hours_ago":4320,"posted_time_raw":"6mo","post_url":"https://www.linkedin.com/feed/update/urn:li:activity:7406472068168429569","author_profile_image_url":"https://media.licdn.com/dms/image/v2/C4E03AQGNeJRorEd2Nw/profile-displayphoto-shrink_100_100/profile-displayphoto-shrink_100_100/0/1569287114631?e=1784160000&v=beta&t=tJDZC7EXWnlgIIf8kF7fBCajhF-HEgzNXnz_IIkjqW8","post_text":"For hospitality, the AI adoption curve is already playing out, and it favors individuals and small operators first.\n\nIndependent owners can deploy agents with a credit card and a few weeks and suddenly run booking, pricing, guest messaging, reviews, and ops at a level that used to require corporate teams. This isn’t because large brands don’t understand AI; it’s because they can’t absorb it quickly. Rules, standards, legacy systems, and risk processes slow everything down. Meanwhile, the performance gap between a well-run independent and a branded property is shrinking fast.\n\nPractically, this shifts where competitive pressure comes from. Agents are collapsing the value of scale. A 20-room property can now offer instant responses, personalized service, dynamic pricing, and proactive recovery; without a substantial call center, revenue team, or marketing department. Direct booking becomes viable again. Guest experience becomes more local and more personal.\n\nFor large hospitality companies, the response isn’t to block or slow this down; that just pushes owners outside the ecosystem. The winning move is to internalize it. Provide franchisees and operators with a safe, branded agent stack that plugs into your systems, enforces standards, and still lets them move fast. Open the right APIs, separate fast experimentation from guest-critical controls, and make loyalty and data advantages available to agents. If you don’t, owners will still adopt agents -- just not yours.","post_image_url":null,"is_article":false,"article_url":null,"article_title":null,"article_description":null,"is_video":false,"video_url":null,"has_image":false,"reaction_count":15,"reaction_types":"LIKE, EMPATHY, APPRECIATION","comment_count":2,"impression_count":871,"source":"activity"},{"is_my_post":true,"post_urn":"urn:li:activity:7405976298797416448","author_name":"Ravi Evani\n              \n                \n                   \n    \n      \n    \n    \n      \n    \n\n • You","author_profile_url":"https://www.linkedin.com/in/ravievani","author_headline":"Deploying enterprise agents in production / CTO / SWE Leader / GVP @ Publicis Sapient","posted_time":"2025-12-27","posted_hours_ago":4320,"posted_time_raw":"6mo","post_url":"https://www.linkedin.com/feed/update/urn:li:activity:7405976298797416448","author_profile_image_url":"https://media.licdn.com/dms/image/v2/C4E03AQGNeJRorEd2Nw/profile-displayphoto-shrink_100_100/profile-displayphoto-shrink_100_100/0/1569287114631?e=1784160000&v=beta&t=tJDZC7EXWnlgIIf8kF7fBCajhF-HEgzNXnz_IIkjqW8","post_text":"For IT Leaders in Travel & Hospitality, the real job isn’t picking the “right” AI models. It’s deciding where different levels of intelligence belong across the journey. Trip planning, pricing, and personalization need deep reasoning and shared context. Gate operations, kiosks, room access, and in-hotel controls don’t. Treating them the same is why costs spike, latency creeps in, and reliability suffers. An AI pyramid forces the right trade-offs early.\n\nPractically, that means three decisions. First, invest in a strong core: identity, consent, trip state, loyalty, policies, inventory, and event streams that power high-value reasoning use cases. Without that foundation, your smartest models won’t deliver consistent answers. Second, standardize the middle layer: clear patterns for copilots in apps, call centers, and ops teams—shared tooling, retrieval rules, observability, and guardrails so teams don’t reinvent or break things. Third, be ruthless at the edge: define what must run locally, what latency is acceptable, what happens offline, and how devices are secured and updated.\n\nIT leaders who approach AI this way start scaling capability. They run AI like a portfolio: big models where thinking matters, smaller models where speed and focus matter, and embedded intelligence where reliability matters most. That’s how AI quietly improves the entire travel experience without becoming fragile, expensive, or chaotic.","post_image_url":"https://media.licdn.com/dms/image/v2/D4E05AQEVQ56AT4jXYg/videocover-low/B4EZsdQLPuJgBU-/0/1765722341235?e=1783137600&v=beta&t=wPTMViY2IZi8zVSgEEFQpUp4IYtC8s3JufgajFvyuPM","is_article":false,"article_url":null,"article_title":null,"article_description":null,"is_video":true,"video_url":"https://media.licdn.com/dms/image/v2/D4E05AQEVQ56AT4jXYg/videocover-low/B4EZsdQLPuJgBU-/0/1765722341235?e=1783137600&v=beta&t=wPTMViY2IZi8zVSgEEFQpUp4IYtC8s3JufgajFvyuPM","has_image":true,"reaction_count":24,"reaction_types":"LIKE","comment_count":1,"impression_count":1142,"source":"activity"},{"is_my_post":true,"post_urn":"urn:li:activity:7403771297035595776","author_name":"Ravi Evani\n              \n                \n                   \n    \n      \n    \n    \n      \n    \n\n • You","author_profile_url":"https://www.linkedin.com/in/ravievani","author_headline":"Deploying enterprise agents in production / CTO / SWE Leader / GVP @ Publicis Sapient","posted_time":"2025-12-27","posted_hours_ago":4320,"posted_time_raw":"6mo","post_url":"https://www.linkedin.com/feed/update/urn:li:activity:7403771297035595776","author_profile_image_url":"https://media.licdn.com/dms/image/v2/C4E03AQGNeJRorEd2Nw/profile-displayphoto-shrink_100_100/profile-displayphoto-shrink_100_100/0/1569287114631?e=1784160000&v=beta&t=tJDZC7EXWnlgIIf8kF7fBCajhF-HEgzNXnz_IIkjqW8","post_text":"My talk title: “AI-powered loyalty, next-gen guest journeys for premium hotels.”\n\nReality this morning: me and a leaky hotel iron.","post_image_url":"https://media.licdn.com/dms/image/v2/D4E22AQFgO0C226fbSw/feedshare-shrink_800/B4EZr96uY4GoAg-/0/1765196630417?e=1784160000&v=beta&t=jFqfr_07s2E4re0HlwYKAf0LZFprTI2wkuzVV5SkS04","is_article":false,"article_url":null,"article_title":null,"article_description":null,"is_video":false,"video_url":null,"has_image":true,"reaction_count":32,"reaction_types":"ENTERTAINMENT, LIKE","comment_count":1,"impression_count":3529,"source":"activity"},{"article_description":null,"article_title":null,"article_url":null,"author_headline":"Deploying enterprise agents in production / CTO / SWE Leader / GVP @ Publicis Sapient","author_name":"Ravi Evani\n              \n                \n                   \n    \n      \n    \n    \n      \n    \n\n • You","author_profile_image_url":"https://media.licdn.com/dms/image/v2/C4E03AQGNeJRorEd2Nw/profile-displayphoto-shrink_100_100/profile-displayphoto-shrink_100_100/0/1569287114631?e=1784160000&v=beta&t=tJDZC7EXWnlgIIf8kF7fBCajhF-HEgzNXnz_IIkjqW8","author_profile_url":"https://www.linkedin.com/in/ravievani","has_image":true,"impression_count":0,"is_article":false,"is_my_post":true,"is_video":false,"post_image_url":"https://media.licdn.com/dms/image/v2/D4E22AQHcSWQPDgNPeg/feedshare-shrink_800/B4EZrpMmbUGUAg-/0/1764848987211?e=1784160000&v=beta&t=QxIVf_t9LxzFSp7h6I_uDDvkWO47Ye5BZS2L0MwGNHs","post_text":"AEO (unlike SEO) is a CIO challenge. Here are 5 Agents that Travel & Hospitality brands need to deploy to win.\n\n1/ AEO Monitoring Agent: Gives continuous visibility of how your products and information show up in AI Engines.\n\n2/ Question Miner Agent: Turns raw customer chatter into a ranked list of high-value questions that your company must “own” to differentiate your brand & products.\n\n3/ Answer Generation Agent: Turns complex operational policies and technical documents into structured, machine-readable answers that AI agents can understand and recommend.\n\n4/ Content & Risk Compliance Agent: Enables your company to publish authoritative machine-readable content without exposing internal systems, sensitive data, or operational vulnerabilities.\n\n5/ Product Facing Agent: Turns complex availability and pricing logic and policy framework into an agentic executable asset.\n\nThank you AWS T&H leaders Clare Ward (AWS Worldwide Tech Leader) & Tedd Evers (AWS Global Partner Leader) for joining me in a great Publicis Sapient & Amazon Web Services (AWS) panel discussion AWS re:Invent for our customers.","post_url":"https://www.linkedin.com/feed/update/urn:li:activity:7403751671509565440","post_urn":"urn:li:activity:7403751671509565440","posted_hours_ago":4320,"posted_time":"2025-12-27","posted_time_raw":"6mo","reaction_count":52,"reaction_types":"LIKE, EMPATHY, INTEREST","repost_count":1,"source":"activity","video_url":null},{"is_my_post":true,"post_urn":"urn:li:activity:7402702284838621184","author_name":"Ravi Evani\n              \n                \n                   \n    \n      \n    \n    \n      \n    \n\n • You","author_profile_url":"https://www.linkedin.com/in/ravievani","author_headline":"Deploying enterprise agents in production / CTO / SWE Leader / GVP @ Publicis Sapient","posted_time":"2025-12-27","posted_hours_ago":4320,"posted_time_raw":"6mo","post_url":"https://www.linkedin.com/feed/update/urn:li:activity:7402702284838621184","author_profile_image_url":"https://media.licdn.com/dms/image/v2/C4E03AQGNeJRorEd2Nw/profile-displayphoto-shrink_100_100/profile-displayphoto-shrink_100_100/0/1569287114631?e=1784160000&v=beta&t=tJDZC7EXWnlgIIf8kF7fBCajhF-HEgzNXnz_IIkjqW8","post_text":"Useful reading for MCP vibe coders who like to understand the foundations of what they are building.","post_image_url":"https://media.licdn.com/dms/image/sync/v2/D5627AQGlic9GdUFKzg/articleshare-shrink_480/B56ZrtnrtqH8As-/0/1764923195597?e=1783137600&v=beta&t=tkeny7z2O82YpcFu2KX-S8COKvqifcRLYP0lIJLWg10","is_article":true,"article_url":"https://medium.com/@amitsriv99/streamable-http-server-sent-events-a02f2fba242f","article_title":"Streamable Http — Server-Sent Events","article_description":"Streamable Http — Server-Sent Events\nmedium.com","is_video":false,"video_url":null,"has_image":true,"reaction_count":7,"reaction_types":"LIKE","comment_count":1,"impression_count":940,"source":"activity"},{"is_my_post":true,"post_urn":"urn:li:activity:7402658217593577473","author_name":"Ravi Evani\n              \n                \n                   \n    \n      \n    \n    \n      \n    \n\n • You","author_profile_url":"https://www.linkedin.com/in/ravievani","author_headline":"Deploying enterprise agents in production / CTO / SWE Leader / GVP @ Publicis Sapient","posted_time":"2025-12-27","posted_hours_ago":4320,"posted_time_raw":"6mo","post_url":"https://www.linkedin.com/feed/update/urn:li:activity:7402658217593577473","author_profile_image_url":"https://media.licdn.com/dms/image/v2/C4E03AQGNeJRorEd2Nw/profile-displayphoto-shrink_100_100/profile-displayphoto-shrink_100_100/0/1569287114631?e=1784160000&v=beta&t=tJDZC7EXWnlgIIf8kF7fBCajhF-HEgzNXnz_IIkjqW8","post_text":"Lower stakes emails:\n1/ ChatGPT composes\n2/ I edit\n3/ Done\n\nHigher Stakes emails:\n1/ I provide key ideas\n2/ ChatGPT composes (Thinking mode)\n3/ I edit\n4/ ChatGPT tweaks (Auto mode)\n5/ I cherry pick the tweaks\n6/ Done","post_image_url":null,"is_article":false,"article_url":null,"article_title":null,"article_description":null,"is_video":false,"video_url":null,"has_image":false,"reaction_count":9,"reaction_types":"LIKE","comment_count":2,"impression_count":2514,"source":"activity"},{"is_my_post":true,"post_urn":"urn:li:activity:7402313169622368256","author_name":"Ravi Evani\n              \n                \n                   \n    \n      \n    \n    \n      \n    \n\n • You","author_profile_url":"https://www.linkedin.com/in/ravievani","author_headline":"Deploying enterprise agents in production / CTO / SWE Leader / GVP @ Publicis Sapient","posted_time":"2025-12-27","posted_hours_ago":4320,"posted_time_raw":"6mo","post_url":"https://www.linkedin.com/feed/update/urn:li:activity:7402313169622368256","author_profile_image_url":"https://media.licdn.com/dms/image/v2/C4E03AQGNeJRorEd2Nw/profile-displayphoto-shrink_100_100/profile-displayphoto-shrink_100_100/0/1569287114631?e=1784160000&v=beta&t=tJDZC7EXWnlgIIf8kF7fBCajhF-HEgzNXnz_IIkjqW8","post_text":"AEO (unlike SEO) is a CIO challenge. Here are 5 Agents that Travel & Hospitality brands need to deploy to win.\n\n1/ AEO Monitoring Agent: Gives continuous visibility of how your products and information show up in AI Engines.\n\n2/ Question Miner Agent: Turns raw customer chatter into a ranked list of high-value questions that your company must “own” to differentiate your brand & products.\n\n3/ Answer Generation Agent: Turns complex operational policies and technical documents into structured, machine-readable answers that AI agents can understand and recommend.\n\n4/ Content & Risk Compliance Agent: Enables your company to publish authoritative machine-readable content without exposing internal systems, sensitive data, or operational vulnerabilities.\n\n5/ Product Facing Agent: Turns complex availability and pricing logic and policy framework into an agentic executable asset.\n\nThank you AWS T&H leaders Clare Ward (AWS Worldwide Tech Leader) & Tedd Evers (AWS Global Partner Leader) for joining me in a great Publicis Sapient & Amazon Web Services (AWS) panel discussion AWS re:Invent for our customers.","post_image_url":"https://media.licdn.com/dms/image/v2/D4E22AQHcSWQPDgNPeg/feedshare-shrink_800/B4EZrpMmbUGUAg-/0/1764848987211?e=1784160000&v=beta&t=QxIVf_t9LxzFSp7h6I_uDDvkWO47Ye5BZS2L0MwGNHs","is_article":false,"article_url":null,"article_title":null,"article_description":null,"is_video":false,"video_url":null,"has_image":true,"reaction_count":52,"reaction_types":"LIKE, EMPATHY, INTEREST","repost_count":1,"impression_count":3256,"source":"activity"},{"is_my_post":true,"post_urn":"urn:li:activity:7400570947419664384","author_name":"Ravi Evani\n              \n                \n                   \n    \n      \n    \n    \n      \n    \n\n • You","author_profile_url":"https://www.linkedin.com/in/ravievani","author_headline":"Deploying enterprise agents in production / CTO / SWE Leader / GVP @ Publicis Sapient","posted_time":"2025-12-27","posted_hours_ago":4320,"posted_time_raw":"6mo","post_url":"https://www.linkedin.com/feed/update/urn:li:activity:7400570947419664384","author_profile_image_url":"https://media.licdn.com/dms/image/v2/C4E03AQGNeJRorEd2Nw/profile-displayphoto-shrink_100_100/profile-displayphoto-shrink_100_100/0/1569287114631?e=1784160000&v=beta&t=tJDZC7EXWnlgIIf8kF7fBCajhF-HEgzNXnz_IIkjqW8","post_text":"Why Airlines Need a AEO Monitoring & Compliance Agent\n\nAs AI agents and answering engines becomes the first stop for travelers and corporate buyers, airlines face a new problem: you have no idea how these systems are describing you. ChatGPT, Google’s AI Overviews, Perplexity, and travel bots generate answers based on your public content, but you can’t see what they’re saying, whether you’re being cited, or whether a competitor has suddenly taken your place. Worse, you can’t tell if outdated language or sensitive internal details have slipped into public content during the rush to scale AEO.\n\nA Monitoring & Compliance Agent gives your airline a visibility layer you simply don’t have today. It routinely queries the major AI engines with your must-win questions and logs everything: where you appear, what’s said about you, how often you’re cited, and how your share of voice changes over time. It’s an early-warning system for competitive shifts, misinterpretations, and outdated descriptions: something every CIO and VP of Data needs if they expect to manage AEO with any confidence.\n\nOn the compliance side, it acts as the CISO’s safeguard. The agent checks for internal system names, deprecated endpoints, contract specifics, and any trace of sensitive data within AI engine outputs. It detects accidental exposure and gives airlines a controlled way to scale AEO.","post_image_url":"https://media.licdn.com/dms/image/v2/D4E22AQHa1EvD_44Mbw/feedshare-shrink_800/B4EZrQcDKfJgAg-/0/1764433608771?e=1784160000&v=beta&t=oiCSBr5_qAJu5KiswUcxIm3ZemMM0Is7hXGGUfnFaJM","is_article":false,"article_url":null,"article_title":null,"article_description":null,"is_video":false,"video_url":null,"has_image":true,"reaction_count":7,"reaction_types":"LIKE, INTEREST, APPRECIATION","impression_count":439,"source":"activity"},{"is_my_post":true,"post_urn":"urn:li:activity:7400273027407507456","author_name":"Ravi Evani\n              \n                \n                   \n    \n      \n    \n    \n      \n    \n\n • You","author_profile_url":"https://www.linkedin.com/in/ravievani","author_headline":"Deploying enterprise agents in production / CTO / SWE Leader / GVP @ Publicis Sapient","posted_time":"2025-12-27","posted_hours_ago":4320,"posted_time_raw":"6mo","post_url":"https://www.linkedin.com/feed/update/urn:li:activity:7400273027407507456","author_profile_image_url":"https://media.licdn.com/dms/image/v2/C4E03AQGNeJRorEd2Nw/profile-displayphoto-shrink_100_100/profile-displayphoto-shrink_100_100/0/1569287114631?e=1784160000&v=beta&t=tJDZC7EXWnlgIIf8kF7fBCajhF-HEgzNXnz_IIkjqW8","post_text":"AEO for an Airline brand is not just a CMO job. Here is why IT should care:\n\n1/ Because AI is already begun to influence your revenue.\nHigh-intent travellers and corporate buyers are getting answers from AI first, then clicking through. If your brand isn’t in those AI answers, you’re invisible at the exact moment of choice.\n\n2/ Because the traffic you keep is worth 3–6x more.\nAEO doesn’t chase volume; it shapes who lands on your site. AI-referred visitors arrive pre-qualified, policy-aware and closer to booking or integrating.\n\n3/ Because your help centre and tech docs are now front-line sales assets.\nLLMs read policy pages, disruption rules, API docs and security statements more than your homepage. If those aren’t structured and current, the AI can’t confidently recommend you.\n\n4/ Because if you don’t define your story, the model will.\nAEO is how you “program” AI to describe your airline's safety, resilience, NDC capability, loyalty value and carbon posture. If you don’t supply that detail, it will infer it from others.\n\n5/ For the VP of Data & AI: this is your use case for first-party data.\nAEO gives you a direct way to monetise your operational and policy data by exposing it, safely, as authoritative answers that AI systems favour.\n\n6/ For the CIO & Chief Solution Architect: this is core architecture, not content marketing.\nAEO forces you to rationalise docs, help centres, CMS, APIs and schema. The same work that helps AI answer questions also reduces integration friction and support load.\n\n7/ For the CISO: AEO is a new exfiltration path unless you own it.\nLLMs will crawl whatever they can reach. Without a governed AEO program and content risk checks, you risk leaking internal terminology, deprecated endpoints or sensitive patterns.\n\n8/ Because this is one of the few levers you still control in the AI ecosystem.\nYou don’t control the models, but you do control the structured, governed, first-party content they rely on. AEO is how you use that control to protect and grow revenue.","post_image_url":"https://media.licdn.com/dms/image/v2/D4E22AQFt4EDNf-qHOg/feedshare-shrink_800/B4EZrMNGBWIIAg-/0/1764362578849?e=1784160000&v=beta&t=nrjj9tB3oz_OJfhfbAPe91j4rnO9cCnnc9GxAlIVtx8","is_article":false,"article_url":null,"article_title":null,"article_description":null,"is_video":false,"video_url":null,"has_image":true,"reaction_count":21,"reaction_types":"LIKE, APPRECIATION","comment_count":1,"impression_count":1181,"source":"activity"},{"is_my_post":true,"post_urn":"urn:li:activity:7399773896268484610","author_name":"Ravi Evani\n              \n                \n                   \n    \n      \n    \n    \n      \n    \n\n • You","author_profile_url":"https://www.linkedin.com/in/ravievani","author_headline":"Deploying enterprise agents in production / CTO / SWE Leader / GVP @ Publicis Sapient","posted_time":"2025-12-27","posted_hours_ago":4320,"posted_time_raw":"6mo","post_url":"https://www.linkedin.com/feed/update/urn:li:activity:7399773896268484610","author_profile_image_url":"https://media.licdn.com/dms/image/v2/C4E03AQGNeJRorEd2Nw/profile-displayphoto-shrink_100_100/profile-displayphoto-shrink_100_100/0/1569287114631?e=1784160000&v=beta&t=tJDZC7EXWnlgIIf8kF7fBCajhF-HEgzNXnz_IIkjqW8","post_text":"Software engineers need to focus on elevating their thought process to a higher level.","post_image_url":"https://media.licdn.com/dms/image/v2/D4E22AQF80LSwfmR3Qg/feedshare-shrink_800/B4EZrFHI2nKUAk-/0/1764243577379?e=1784160000&v=beta&t=qUx5nJR6xJOfhf5Fg-L-izta-yLPCfBiXC1ZaSlwk-U","is_article":false,"article_url":null,"article_title":null,"article_description":null,"is_video":false,"video_url":null,"has_image":true,"reaction_count":11,"reaction_types":"LIKE, INTEREST","comment_count":3,"impression_count":854,"source":"activity"},{"article_description":"","article_title":"","article_url":"","author_headline":"948,584 followers","author_name":"Publicis Sapient","author_profile_image_url":"https://media.licdn.com/dms/image/v2/D4E0BAQFFzEm8Vg3Lwg/company-logo_100_100/B4EZqics_9KMAU-/0/1763662025177?e=1774483200&v=beta&t=JyblRGrJJfQEdlFpXcwigaJThJU21XdvpkpaPPlYAGk","author_profile_url":"https://www.linkedin.com/company/publicissapient/posts","category":"#N/A","comment_count":0,"impression_count":0,"isDeleted":false,"is_article":false,"is_my_post":true,"is_video":false,"post_image_url":"","post_text":"AI is changing how every business works and we’re watching it happen in real time at hashtag#AWSreInvent.\n\nWe hosted our sessions with Amazon Web Services (AWS) and Spinnaker SCA | A company of Publicis Sapient, where we showed how brands and supply chains are using AI and cloud tools to fix old problems and move a whole lot faster.\n\nAlso yes we brought the demos and they were packed.\n\nGVP, Regional Engineering lead, Ravi Evani and VP of Engineering, Thanu Sundaresan walked everyone through our two flagship AI products, Sapient Slingshot and Sapient Bodhi, and how they help enterprises clear out tech debt and start building real autonomous systems.\n\nMissed us today? Here’s where we’ll be for the rest of the week: https://lnkd.in/gAxPYmFd","post_url":"https://www.linkedin.com/feed/update/urn:li:activity:7401824350942838784","post_urn":"urn:li:activity:7401824350942838784","posted_time":"2025-12-06","reaction_count":140,"reaction_types":"LIKE, EMPATHY, PRAISE","repost_count":4,"scrapedAt":"2026-03-06T03:17:12.495Z","source":"my-posts","video_url":""},{"article_description":"","article_title":"","article_url":"","author_headline":"UX Executive Leadership - Building Organisations, Product Strategy, Product Delivery, Entrepreneur (ex-Microsoft, frog, argodesign)","author_name":"Joe Fletcher","author_profile_image_url":"https://media.licdn.com/dms/image/v2/D4D03AQEd3hHbKa0fng/profile-displayphoto-shrink_100_100/B4DZbXsD1uHEAg-/0/1747375374500?e=1774483200&v=beta&t=ORK6IYSHakPKxijxdvuCMvUplfgXSOUp68n2AH3Sa6Q","author_profile_url":"https://www.linkedin.com/in/joefletcher2","category":"#N/A","comment_count":0,"impression_count":0,"isDeleted":false,"is_article":false,"is_my_post":true,"is_video":false,"post_image_url":"https://media.licdn.com/dms/image/v2/D4D05AQEwY7oD-MsTUA/videocover-low/B4DZrX24APIgBQ-/0/1764558085206?e=1773374400&v=beta&t=iRqmHBcwlD3A1UvVSiINn4bUX_ZCQSpP_f4ApX1W0HU","post_text":"🎧🎙️ 𝗗𝗲𝗯𝗮𝘁𝗲 𝗺𝗲: Services companies struggle to build products. But why?\nConversations with Robert Zikry around what I'm seeing at Sapient as we transition to a products company, and what we must shift in our thinking to be successful.\n\nThis is what Ravi and I are working to overcome daily to be successful.","post_url":"https://www.linkedin.com/feed/update/urn:li:activity:7401824232697135104","post_urn":"urn:li:activity:7401824232697135104","posted_time":"2025-12-06","reaction_count":6,"reaction_types":"LIKE, EMPATHY","repost_count":1,"scrapedAt":"2026-03-06T03:17:12.495Z","source":"my-posts","video_url":""},{"article_description":"","article_title":"","article_url":"","author_headline":"CEO Publicis Sapient | Directoire+ Member (Executive Board), Publicis Groupe | Bestselling Author | Speaker | Investor | Board Member","author_name":"Nigel Vaz\n              \n                \n                   \n    \n      \n    \n    \n      \n    \n\n • 1st","author_profile_image_url":"https://media.licdn.com/dms/image/v2/D4E03AQGn8DOld_G8CQ/profile-displayphoto-shrink_100_100/profile-displayphoto-shrink_100_100/0/1675870706173?e=1782345600&v=beta&t=c1kSzYMmspFifR9UFc0pzSoN4g4-AUrSQ8NGDjbvHz4","author_profile_url":"https://www.linkedin.com/in/nvaz","category":"#N/A","comment_count":22,"impression_count":0,"isDeleted":false,"is_article":false,"is_my_post":true,"is_video":true,"post_image_url":"https://media.licdn.com/dms/image/v2/D4E05AQHq5a-VTBOZ1Q/videocover-low/B4EZrpp4kfIIBQ-/0/1764856670823?e=1781233200&v=beta&t=ct4jT-IZqOo_3R4nnOgJ_YWi2D2CFXLADJ5mhQFWF6E","post_text":"As Publicis Groupe releases this year’s Wishes film – a tradition that has outlasted wars, reinventions, and entire technological eras – I find myself reflecting on what it means to enter a new century together.\n\nFrom a small creative hot shop in Montmartre in 1926 to the most comprehensive transformation partner in our industry today, Publicis Groupe has spent 100 years embracing change. Reinvention isn’t something we talk about – it’s something that has repeatedly defined us.\n\nThis year’s film is a powerful tribute to that spirit – it doesn’t just tell the story of our past. It signals what our future will demand: creativity elevated by technology, and technology made meaningful by human imagination.\n\nFor me, that intersection has always been where Publicis Sapient lives. When we joined Publicis Groupe, it was because we believed that together we would fundamentally reshape businesses, industries and customer expectations. Today, as we enter a second century, AI is accelerating that transformation faster than ever – and our role has never been clearer.\n\nPublicis Sapient exists to help our clients thrive in moments exactly like this. Moments where new technologies require new models, new capabilities and new ways of thinking. Moments that demand the courage to lead, not follow. As part of the Power of One, we bring the engineering, data and AI depth that helps turn Groupe’s ambition into reality – for our clients, for society and for the next generation of talent.\n\nThis film reminds us that a lion never gives up. But it also reminds us why. Because reinvention, resilience and the willingness to anticipate the future rather than react to it, are the qualities that have carried Publicis through its first century, and the qualities that will define its next.\n\nProud of our teams, proud of Publicis Groupe and proud of the role Publicis Sapient will continue to play as we build the future together.\n\nHere’s to our next 100 years. hashtag#newcenturynewwishes","post_url":"https://www.linkedin.com/feed/update/urn:li:activity:7402356456542330882","post_urn":"urn:li:activity:7402356456542330882","posted_time":"2025-12-05","reaction_count":1,"reaction_types":"LIKE, EMPATHY, PRAISE","repost_count":84,"scrapedAt":"2026-06-05T02:45:32.372Z","source":"my-posts","video_url":"https://media.licdn.com/dms/image/v2/D4E05AQHq5a-VTBOZ1Q/videocover-low/B4EZrpp4kfIIBQ-/0/1764856670823?e=1781233200&v=beta&t=ct4jT-IZqOo_3R4nnOgJ_YWi2D2CFXLADJ5mhQFWF6E"},{"is_my_post":true,"post_urn":"urn:li:activity:7399540367940927489","author_name":"Ravi Evani\n              \n                \n                   \n    \n      \n    \n    \n      \n    \n\n • You","author_profile_url":"https://www.linkedin.com/in/ravievani","author_headline":"Deploying enterprise agents in production / CTO / SWE Leader / GVP @ Publicis Sapient","posted_time":"2025-11-27","posted_hours_ago":5040,"posted_time_raw":"7mo","post_url":"https://www.linkedin.com/feed/update/urn:li:activity:7399540367940927489","author_profile_image_url":"https://media.licdn.com/dms/image/v2/C4E03AQGNeJRorEd2Nw/profile-displayphoto-shrink_100_100/profile-displayphoto-shrink_100_100/0/1569287114631?e=1784160000&v=beta&t=tJDZC7EXWnlgIIf8kF7fBCajhF-HEgzNXnz_IIkjqW8","post_text":"AEO is not a content project anymore: four execs now make or break your visibility in AI answering engines.\n\nSEO was something the CMO could mostly own. AEO isn’t. To show up in AI answers and agent shortlists, four execs have to move in lockstep:\n\nCDO/VP Data & AI: Turn sales calls, support tickets, and product docs into a governed “question backlog” and structured answers that LLMs can reliably quote.\n\nCTO/ Chief Solution Architect: Redesign the content and API stack so every policy, rule, and integration guide is hyper-chunked, schema-rich, and fast enough for real-time retrieval.\n\nCISO: Put a governance firewall in front of all AEO-bound content, stripping internal endpoints, PII, and sensitive config while keeping it machine-readable.\n\nCIO: Break down siloed help centers and dev docs, unify them under the main domain, and make AEO a first-class requirement for CMS, CRM, and knowledge platforms.\n\nAEO is now an enterprise architecture, data, and security challenge that just happens to show up in marketing KPIs.","post_image_url":"https://media.licdn.com/dms/image/v2/D4E22AQEMrYbvTSf5BQ/feedshare-shrink_800/B4EZrByvFuHoAg-/0/1764187898449?e=1784160000&v=beta&t=SRx_pzVXqRr8asc10LjNpyco-XPNXVinb7U88tRv9mA","is_article":false,"article_url":null,"article_title":null,"article_description":null,"is_video":false,"video_url":null,"has_image":true,"reaction_count":20,"reaction_types":"LIKE, INTEREST, APPRECIATION","comment_count":6,"impression_count":1506,"source":"activity"},{"is_my_post":true,"post_urn":"urn:li:activity:7399431772645638144","author_name":"Ravi Evani\n              \n                \n                   \n    \n      \n    \n    \n      \n    \n\n • You","author_profile_url":"https://www.linkedin.com/in/ravievani","author_headline":"Deploying enterprise agents in production / CTO / SWE Leader / GVP @ Publicis Sapient","posted_time":"2025-11-27","posted_hours_ago":5040,"posted_time_raw":"7mo","post_url":"https://www.linkedin.com/feed/update/urn:li:activity:7399431772645638144","author_profile_image_url":"https://media.licdn.com/dms/image/v2/C4E03AQGNeJRorEd2Nw/profile-displayphoto-shrink_100_100/profile-displayphoto-shrink_100_100/0/1569287114631?e=1784160000&v=beta&t=tJDZC7EXWnlgIIf8kF7fBCajhF-HEgzNXnz_IIkjqW8","post_text":"Writing code is getting faster. Trusting code is getting harder.\n\nIt was fun presenting at the Publicis Sapient AI Caravan in NYC last week, walking through real client work and how our AI products (Sapient Slingshot and Bodhi) are changing the way we build.\n\nThe best part was the conversation during the social after: engineers, designers, and PMs comparing how their day-to-day is already shifting. The consistent theme is that work doesn’t get “easier”; it gets more strategic. Everyone is spending more time shaping how AI should do the task, and not just executing tasks themselves.\n\nPeople were saying that the flow of work changes once we delegate the initial analysis of a user story to AI. Agents can read a spec, map it to the codebase, spot hidden dependencies, and highlight ambiguities, but our job becomes more about validating what matters, correcting what’s off, and grounding estimates in real constraints.\n\nPrioritization, sequencing, tradeoffs, and long-term direction still sit firmly with people. Agents can propose options, but they are usually bad at \"estimates\" -- so those only become plans when they’ve been filtered through individual and team judgment.\n\nWe’re also seeing more time going into patterns, architectures, and quality. Less debates on what frameworks to use, and more space to explore alternative designs and to focus on improving the actual user experience instead of just trying to get functionality “done.”\n\nA lot of effort now going into reading AI output and clarifying intent. Its a new muscle we are developing, since the act of reading someone else's (AI) is not that fun.\n\nSimilar to the \"checklists\" of the past -- teams are starting to increasingly formalize patterns, guardrails, and conventions in markdown so agents have something common to anchor to.\n\nDuring code merges, AI reviews catch issues, but that final \"merge\" decision is taking a lot more thought, not less.\n\nNet net, teams are steadily moving up the ladder of abstraction. Less time being spent on translation and more on thought. Its good to see the work becoming much more about shaping the user and operational experience of the systems rather than just building to \"requirements\".\n\nThanks to the organizers and co-presenters for a great event: Laura Daniela Laurie Naveen Rajwinder","post_image_url":"https://media.licdn.com/dms/image/v2/D4E22AQGlAPDbST8p3Q/feedshare-shrink_800/B4EZrABPWuIQAk-/0/1764158146542?e=1784160000&v=beta&t=GnAWq0vyWZmeSSaT3bl4HlfUdypneN2MGsRJmuSSLrg","is_article":false,"article_url":null,"article_title":null,"article_description":null,"is_video":false,"video_url":null,"has_image":true,"reaction_count":82,"reaction_types":"LIKE, PRAISE, EMPATHY","comment_count":1,"impression_count":4119,"source":"activity"},{"is_my_post":true,"post_urn":"urn:li:activity:7398758819893305344","author_name":"Ravi Evani\n              \n                \n                   \n    \n      \n    \n    \n      \n    \n\n • You","author_profile_url":"https://www.linkedin.com/in/ravievani","author_headline":"Deploying enterprise agents in production / CTO / SWE Leader / GVP @ Publicis Sapient","posted_time":"2025-11-27","posted_hours_ago":5040,"posted_time_raw":"7mo","post_url":"https://www.linkedin.com/feed/update/urn:li:activity:7398758819893305344","author_profile_image_url":"https://media.licdn.com/dms/image/v2/C4E03AQGNeJRorEd2Nw/profile-displayphoto-shrink_100_100/profile-displayphoto-shrink_100_100/0/1569287114631?e=1784160000&v=beta&t=tJDZC7EXWnlgIIf8kF7fBCajhF-HEgzNXnz_IIkjqW8","post_text":"Agentic workflow to build a knowledge graph for your travel / hospitality brand.\n\nTravel brands can’t rely on filters and static attributes anymore. If AI agents are becoming the new trip planners, then brands need a foundation where products are organized around why someone is traveling, not just what they’re booking. That’s where intent-based personalization comes in, and it only works if you have the right data backbone behind it.\n\nHere’s a simple knowledge graph workflow we’re building with Sapient Slingshot UI builder. It’s a self-improving agentic system that ingests raw product data, extracts meaningful attributes, maps them to high-level intents, and writes them into a graph, with guardrails.\n\n1. Product Ingestion\n\nAgent: ProductIngestionAgent\nPulls raw hotel and flight data directly from source feeds. No manual hand-offs. It calls the travel data MCP, holds everything in working memory, and sets the stage for the rest of the workflow.\n\n2. Attribute Extraction\n\nAgent: AttributeExtractorAgent\nTurns unstructured descriptions into clean, structured attributes.\nIf the product mentions “cribs,” “kids menu,” “EV chargers,” or “step-free access,” the agent normalizes all of it into boolean flags. This is the raw material intent engines need.\n\n3. Guardrails and Validation\n\nNodes: Guardrail + If-Else\nBefore anything expensive happens, the workflow checks whether the product meets minimum schema requirements. Valid data moves forward. Invalid data gets stopped or routed for human review. This keeps the graph clean.\n\n4. Intent Tagging\n\nAgent: IntentTaggingAgent\nThis is where low-level attributes become high-level value.\nFor example:\ncribs + kids menu → toddler_friendly\nEV_charging + parking_on_site → EV_ready\n\nThe agent uses semantic memory tied to a persistent Intent Catalog so the mapping stays consistent across properties, brands, and geographies.\n\n5. Graph Construction\n\nAgent: GraphBuilderAgent\nBuilds nodes and edges that represent the product and its intents.\n“Hotel X” becomes a product node.\n“Toddler Friendly” becomes an intent node.\n\nThe agent understands the graph schema and writes updates through the travel-KG MCP.\n\n6. Verification & Reporting\n\nAgent: VerificationAgent\nRuns a QA pass to confirm the graph was updated correctly.\nIt logs outcomes through the reporting MCP, and writes a short episodic record so we have an audit trail of every run.\n\nThis workflow does more than store information, it understands it.\nIt becomes the foundation for intent-based travel search, itinerary assembly, flight-hotel bundling, and agentic trip planning.\n\nWhen a guest says, “Weekend trip to Lisbon with my toddler, EV charging, under €250/night,” an AI agent can match their intent directly to products in the graph—because the system already mapped each product to the right intents.\n\nThis is how travel brands stay visible in an AI-first world: make their products legible to machines, verifiable by agents, and easily discoverable through true intent.","post_image_url":"https://media.licdn.com/dms/image/v2/D5605AQGaBQeyy2028A/videocover-high/B56Zq2r7xTKABY-/0/1764001563266?e=178313760
