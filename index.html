 If the AI’s output is the final decision or action, expect a longer road to production. Here the AI isn’t just assisting – it’s acting instead of a human. Think of an AI that automatically places a customer’s order or approves a loan without human intervention. The stakes are higher, so the solution needs to be rock-solid before you let it loose. It’s no surprise that the more ambitious, “let the AI do it all” projects often stay in pilot mode much longer.\n\nWhy Evaluation (Not Coding) Is the Real Bottleneck\nIt turns out the slow part of an AI project usually isn’t writing the code or hooking up an API – it’s evaluating and validating the AI’s output. Building a demo or prototype for an AI solution can be relatively quick. Pre-trained models have made it easier than ever to stand up a working proof-of-concept. The real challenge is making sure the AI reliably does what it’s supposed to do in all the messy real-world scenarios.\n\nWhen an AI is assisting a human, you can tolerate imperfections. The human in the loop provides a safety net, catching the weird errors or edge cases. This means you can push the product out faster and improve it on the fly.\n\nBut if an AI is running on its own, you need a lot more confidence in its accuracy, fairness, and safety upfront. That means extensive testing, feedback cycles, and sometimes regulatory compliance checks – all of which take time. In essence, you’re not spending months building the app; you’re spending months proving the app is trustworthy. In short, evaluation and risk mitigation are the bottlenecks that slow down fully autonomous AI projects.\n\nIn a world full of AI opportunities, this rule-of-thumb lets you spot the quick shippers versus the slow burners – and plan accordingly for both .","post_image_url":"https://media.licdn.com/dms/image/v2/D4E05AQEy9WE8XogIKA/feedshare-thumbnail_720_1280/B4EZg2ozeSGYA0-/0/1753263331989?e=1783137600&v=beta&t=uaKv2f6UL8ZHvPMce9BV7Q7wMuy-5fLKgkgmyqfzdkY","is_article":false,"article_url":null,"article_title":null,"article_description":null,"is_video":true,"video_url":"https://media.licdn.com/dms/image/v2/D4E05AQEy9WE8XogIKA/feedshare-thumbnail_720_1280/B4EZg2ozeSGYA0-/0/1753263331989?e=1783137600&v=beta&t=uaKv2f6UL8ZHvPMce9BV7Q7wMuy-5fLKgkgmyqfzdkY","has_image":true,"reaction_count":36,"reaction_types":"LIKE, INTEREST","comment_count":3,"impression_count":2516,"source":"activity"},{"is_my_post":true,"post_urn":"urn:li:activity:7352437355451928577","author_name":"Ravi Evani\n              \n                \n                   \n    \n      \n    \n    \n      \n    \n\n • You","author_profile_url":"https://www.linkedin.com/in/ravievani","author_headline":"Deploying enterprise agents in production / CTO / SWE Leader / GVP @ Publicis Sapient","posted_time":"2025-07-27","posted_hours_ago":7920,"posted_time_raw":"11mo","post_url":"https://www.linkedin.com/feed/update/urn:li:activity:7352437355451928577","author_profile_image_url":"https://media.licdn.com/dms/image/v2/C4E03AQGNeJRorEd2Nw/profile-displayphoto-shrink_100_100/profile-displayphoto-shrink_100_100/0/1569287114631?e=1784160000&v=beta&t=tJDZC7EXWnlgIIf8kF7fBCajhF-HEgzNXnz_IIkjqW8","post_text":"After burning through $40 worth of Gemini coding tokens, I finally got it working.\n\nI’ve been trying to get AI to not just answer a user’s enterprise data question, but to also pick the right visualization to explain it. AND for it to then justify that choice in plain English.\n\nHere's a breakdown of how it works:\n\nThe Core Idea: An AI Data Visualization Expert\n\nThink of the system's AI as a data visualization expert. It's been trained not just on language, but on the principles of good data visualization. This is achieved through two core strategies: giving the AI specialized knowledge and forcing it to explain its reasoning.\n\n---\n\n1. How It Chooses the Right Chart\n\nThe AI's smart selection comes from a combination of context and a specialized \"rulebook\" it must follow.\n\na. The Rulebook: The AI is given an internal guide on data visualization. This guide details every chart the system can create, explaining the ideal use case for each one. For instance, it instructs the AI that line charts are best for showing trends over time, while bar charts are ideal for comparing distinct categories.\n\nb. The Context: When a user asks a question, the system bundles up the user's goal, a sample of the relevant data, and this \"rulebook.\" This package gives the AI everything it needs to make an informed decision.\n\nc. The Decision: Armed with this context, the AI matches the user's goal and the data's structure against its rulebook to select the most effective chart type. It then generates the precise configuration needed to display that chart.\n\n---\n\n2. How It Explains Its Thought Process\n\nMaking the AI's thinking visible is key to building user trust. The system does this in two ways: by showing the final rationale and by revealing the live thought process.\n\na. The Rationale: The AI is required to include a simple, human-readable `rationale` with every chart it creates. This is a direct explanation of its choice, such as, \"A bar chart was chosen to clearly compare values across different categories.\" This rationale is displayed to the user, turning a black box into a transparent partner.\n\nb. Live Thinking Stream: The system can also ask the AI to \"think out loud\" as it works. As the AI analyzes the request, it sends a real-time stream of its internal monologue—like \"Okay, I see time-series data, so a line chart is appropriate.\" The application can display this live feed, giving the user a behind-the-scenes look at the AI's reasoning as it happens.\n\nBy combining this expert knowledge with a requirement for self-explanation, the system transforms a simple request into an insightful and trustworthy data visualization.","post_image_url":"https://media.licdn.com/dms/image/v2/D4E05AQGPwWcbQEQb8g/videocover-high/B4EZgkauMZGUCI-/0/1752957662258?e=1783137600&v=beta&t=zBRtZeFqc5xVePUeS8_QiVjP8-zBLKVk72ykmlG_wmQ","is_article":false,"article_url":null,"article_title":null,"article_description":null,"is_video":true,"video_url":"https://media.licdn.com/dms/image/v2/D4E05AQGPwWcbQEQb8g/videocover-high/B4EZgkauMZGUCI-/0/1752957662258?e=1783137600&v=beta&t=zBRtZeFqc5xVePUeS8_QiVjP8-zBLKVk72ykmlG_wmQ","has_image":true,"reaction_count":48,"reaction_types":"LIKE, EMPATHY, INTEREST","comment_count":3,"repost_count":1,"impression_count":2182,"source":"activity"},{"is_my_post":true,"post_urn":"urn:li:activity:7350670688812257281","author_name":"Ravi Evani\n              \n                \n                   \n    \n      \n    \n    \n      \n    \n\n • You","author_profile_url":"https://www.linkedin.com/in/ravievani","author_headline":"Deploying enterprise agents in production / CTO / SWE Leader / GVP @ Publicis Sapient","posted_time":"2025-07-27","posted_hours_ago":7920,"posted_time_raw":"11mo","post_url":"https://www.linkedin.com/feed/update/urn:li:activity:7350670688812257281","author_profile_image_url":"https://media.licdn.com/dms/image/v2/C4E03AQGNeJRorEd2Nw/profile-displayphoto-shrink_100_100/profile-displayphoto-shrink_100_100/0/1569287114631?e=1784160000&v=beta&t=tJDZC7EXWnlgIIf8kF7fBCajhF-HEgzNXnz_IIkjqW8","post_text":"Exciting times at the Agent Bootcamp at Publicis Sapient Gurgaon office. We went into working examples built with Sapient Slingshot, discovering several patterns.\n\nHere are some strategies we discussed for building Enterprise grade agentic systems that can reason, self-correct, and execute complex tasks.\n\n① Build a Toolbox of Specialized Services\nKeep tools narrow. Modular APIs make each tool simpler to test and evolve, and let you add new skills without touching existing code. A “generate-SQL” service should write code only; a separate “explain-code” service should translate that SQL into plain English.\n\n➜Tip: Expose each tool as a stateless function (or endpoint) with a single, well-named responsibility. Register those functions in a dictionary so the orchestrator can call them by key.\n\n② Route by Intent\nBefore you call any heavy LLM, classify the request: “analysis,” “report,” “troubleshoot,” etc. A small model or simple rule set can do this routing in milliseconds, then hand off to the right tool. This keeps latency low and avoids bloated, one-shot prompts.\n\n➜Tip: Store the mapping in a config file so non-devs can add new intents without redeploying code.\n\n③ Add Self-Correction Loop(s)\nWhen a tool fails (syntax error, timeout, bad data), feed the error, the last plan, and the original goal back into the model. A single “reflect-then-retry” step can raise task success rates sharply.\n\n➜Tip: Cap retries (e.g., three attempts) and store every error/patch pair in long term memory. This becomes context for subsequent troubleshooting, so the power of error resolution is compounded with each solve.\n\n④ Go Beyond Basic Chat History with Structured Memory\nSuccessful agents remember what worked. Cache finished plans alongside the parameters that produced them; next time a similar request arrives, start from that plan instead of rebuilding. A lightweight graph or key-value store is enough for many use cases and scales better than stuffing everything back into the prompt.\n\n➜Tip: Index memory entries by a hashed task signature (“generate-sales-forecast-Q3”), not raw text, to avoid collisions and reduce PII risk.\n\n⑤ Compose Prompts Dynamically and Defensively\n\nConstruct the final prompt at runtime: merging task instructions, schema snippets, recent memory, and user overrides. This keeps context fresh while staying within token limits and reduces hallucinations.\n\n➜Tip: Sanitize every user-supplied instruction before it reaches the model. Prompt-injection attacks are now a top-ranked OWASP risk for AI systems; monitor and strip suspicious tokens as part of your composer pipeline.\n\nAdopting these strategies helps create LLM-driven applications that become genuine agents capable of complex reasoning, learning, and task execution.\n\nThanks to Sriram Komanduri, Vibhor Kumar & Pravesh Balhara for leading this workshop!","post_image_url":"https://media.licdn.com/dms/image/v2/D4D22AQFnoE5hjkqEyg/feedshare-shrink_800/B4DZgLT_reH8Ag-/0/1752536459103?e=1784160000&v=beta&t=04U4qsAPKEqYEz0LIRqtZ7DrE7W97WRPUIuptwO8h5U","is_article":false,"article_url":null,"article_title":null,"article_description":null,"is_video":false,"video_url":null,"has_image":true,"reaction_count":307,"reaction_types":"LIKE, PRAISE, EMPATHY","comment_count":3,"repost_count":2,"impression_count":20607,"source":"activity"},{"is_my_post":true,"post_urn":"urn:li:activity:7350259490627149824","author_name":"Ravi Evani\n              \n                \n                   \n    \n      \n    \n    \n      \n    \n\n • You","author_profile_url":"https://www.linkedin.com/in/ravievani","author_headline":"Deploying enterprise agents in production / CTO / SWE Leader / GVP @ Publicis Sapient","posted_time":"2025-07-27","posted_hours_ago":7920,"posted_time_raw":"11mo","post_url":"https://www.linkedin.com/feed/update/urn:li:activity:7350259490627149824","author_profile_image_url":"https://media.licdn.com/dms/image/v2/C4E03AQGNeJRorEd2Nw/profile-displayphoto-shrink_100_100/profile-displayphoto-shrink_100_100/0/1569287114631?e=1784160000&v=beta&t=tJDZC7EXWnlgIIf8kF7fBCajhF-HEgzNXnz_IIkjqW8","post_text":"How to Build Adaptive UIs to democratize Enterprise Data.\n\nImagine an interface that doesn’t just show data, but understands what users need and delivers it in the most meaningful form. That’s the value of an Adaptive User Interface, powered by an AI agent that turns natural language questions into clear, personalized visualizations.\n\nInstead of navigating complex dashboards, users can simply ask:\n“Which areas need the most improvement?”\n“Show me trends over the last quarter.”\n“Which categories improved the most?”\n\nYour system then identifies the right data, selects the best visualization, and presents it clearly. No manual configuration required.\n\nHere’s how to build that system.\n\nThe Intelligence Behind Adaptive Charting: A Three-Step Agentic Workflow\n\nThe core of an Adaptive UI is an AI agent that can reason and take action. You can implement this as a workflow within your backend service:\n\n1. Code Generation for Analysis: First, build your agent to understand the user's question and the structure of their data. The agent should then generate and execute a script to perform the correct analysis. This step moves beyond simple Q&A and produces a structured data table containing the answer.\n\n2. Expert Visualization Choice: This is the critical step that makes the UI \"adaptive.\" Instead of defaulting to a table, train your agent to make an expert decision on the best way to visualize the resulting data. You can achieve this by creating a detailed *system prompt* that instructs the LLM to act as a visualization expert. This prompt should guide the LLM to choose between bar charts for comparisons, line charts for trends, etc., and then generate a structured **JSON configuration** that defines the entire chart. This JSON should specify the chart type, axes, colors, and even human-readable metadata like a title and key insights.\n\n3. Dynamic Frontend Rendering: Finally, design your frontend to be a dynamic rendering engine, not a static dashboard. Create a component (e.g., in React) that can accept the JSON configuration from your agent. This component will read the spec and render the prescribed chart on the fly. If your agent decides a bar chart is best, the user sees a bar chart. If a line chart tells a clearer story, a line chart appears instantly.\n\n**The Result: An Empowered, Data-Driven User**\n\nBy implementing this agentic workflow, you create a system that is far more valuable than a traditional BI tool. You democratize data access, eliminate the need for specialized training, and allow everyone, from executives to managers to get critical insights instantly. The interface adapts to the user's intent, not the other way around, leading to faster, better-informed decisions.","post_image_url":"https://media.licdn.com/dms/image/v2/D4E05AQHdLwubl39T3Q/videocover-low/B4EZgFd.UDG4CI-/0/1752438415946?e=1783137600&v=beta&t=3jO8Iaro_-87-y9ziVXWCCw0bzScWUl3IYIan_yARCc","is_article":false,"article_url":null,"article_title":null,"article_description":null,"is_video":true,"video_url":"https://media.licdn.com/dms/image/v2/D4E05AQHdLwubl39T3Q/videocover-low/B4EZgFd.UDG4CI-/0/1752438415946?e=1783137600&v=beta&t=3jO8Iaro_-87-y9ziVXWCCw0bzScWUl3IYIan_yARCc","has_image":true,"reaction_count":30,"reaction_types":"LIKE, EMPATHY","comment_count":5,"repost_count":1,"impression_count":1689,"source":"activity"},{"is_my_post":true,"post_urn":"urn:li:activity:7349483527769362433","author_name":"Ravi Evani\n              \n                \n                   \n    \n      \n    \n    \n      \n    \n\n • You","author_profile_url":"https://www.linkedin.com/in/ravievani","author_headline":"Deploying enterprise agents in production / CTO / SWE Leader / GVP @ Publicis Sapient","posted_time":"2025-07-27","posted_hours_ago":7920,"posted_time_raw":"11mo","post_url":"https://www.linkedin.com/feed/update/urn:li:activity:7349483527769362433","author_profile_image_url":"https://media.licdn.com/dms/image/v2/C4E03AQGNeJRorEd2Nw/profile-displayphoto-shrink_100_100/profile-displayphoto-shrink_100_100/0/1569287114631?e=1784160000&v=beta&t=tJDZC7EXWnlgIIf8kF7fBCajhF-HEgzNXnz_IIkjqW8","post_text":"How to Build an AI Agent for Data Analysis: A Blueprint\n\nAn \"agent\" is more than just a chatbot. It’s a system designed to understand a goal, create a plan, and use tools to actively accomplish that goal. You can build your own powerful agent for data analysis, transforming how users interact with their data. This blueprint outlines the core components required to turn simple questions into actionable insights.\n\nAn agentic system is built on three foundational concepts: an LLM for reasoning, a set of tools for taking action, and a sophisticated memory for learning and context.\n\n1. The LLM: Your Agent's Reasoning Core\nAt the heart of any data analysis agent is its reasoning core: a Large Language Model (LLM) like OpenAI's GPT or Google's Gemini. To build this, create a central orchestrator service (e.g., a Chat Service). This service shouldn't just pass the user's question to the LLM. Instead, it should enrich the prompt with context from the agent's memory. The LLM's role is not merely to respond, but to create a step-by-step plan and generate the precise Python code needed to perform the analysis.\n\n2. Tools: Give Your Agent Hands-on Capabilities\nAn agent is only as good as the tools it can use. For a data analysis agent, the primary tool is the ability to execute code. After the LLM generates an analysis script, your orchestrator service must run it against the relevant dataset. This is the most critical agentic step: it moves the system from simply planning to actively doing. You can equip your agent with other tools, such as services for data loading, chart generation, or even calling external APIs, allowing it to handle a wide variety of analytical tasks.\n\n3. Memory: Enable Context and Learning\nTo elevate your agent from a one-shot tool to an intelligent partner, you need to implement memory. A robust approach is to use a graph database like Neo4j to manage two distinct types:\n➜ Short-Term Memory: Implement a mechanism to track the current conversation history for each user session. This allows your agent to understand follow-up questions (\"now show me that by region\") and maintain context, just like a human analyst would.\n➜ Long-Term Memory: This is where your agent can learn. Every time it successfully executes an analysis, store the user's query and the generated code as a \"solution.\" By creating a vector embedding of the query, you can enable semantic search. When a new question comes in, the agent can first search its long-term memory for a similar problem it has already solved, allowing it to deliver accurate results faster and more efficiently over time.\n\nBy integrating these three components, your application will function as a true AI agent. Your central orchestrator service will drive the powerful loop of Memory -> Reasoning -> Action, creating a system that doesn't just answer questions, but actively solves them.","post_image_url":"https://media.licdn.com/dms/image/v2/D4E22AQHU0HjGZHsPjA/feedshare-shrink_800/B4EZf6cURFHgAk-/0/1752253418971?e=1784160000&v=beta&t=3zhs-z0YqehlyMyhh_cFdIbEpiY7oxcsLggXaCyLuAU","is_article":false,"article_url":null,"article_title":null,"article_description":null,"is_video":false,"video_url":null,"has_image":true,"reaction_count":123,"reaction_types":"LIKE, INTEREST, PRAISE","comment_count":9,"repost_count":4,"impression_count":6565,"source":"activity"},{"is_my_post":true,"post_urn":"urn:li:activity:7348499345157087232","author_name":"Ravi Evani\n              \n                \n                   \n    \n      \n    \n    \n      \n    \n\n • You","author_profile_url":"https://www.linkedin.com/in/ravievani","author_headline":"Deploying enterprise agents in production / CTO / SWE Leader / GVP @ Publicis Sapient","posted_time":"2025-07-27","posted_hours_ago":7920,"posted_time_raw":"11mo","post_url":"https://www.linkedin.com/feed/update/urn:li:activity:7348499345157087232","author_profile_image_url":"https://media.licdn.com/dms/image/v2/C4E03AQGNeJRorEd2Nw/profile-displayphoto-shrink_100_100/profile-displayphoto-shrink_100_100/0/1569287114631?e=1784160000&v=beta&t=tJDZC7EXWnlgIIf8kF7fBCajhF-HEgzNXnz_IIkjqW8","post_text":"When your AI asks, \"Do you approve?\" but immediately moves on to change your code without waiting for your response — it's more than just a funny scenario. It's a glimpse into the future of knowledge work.\n\nThis highlights a fundamental shift in human-machine collaboration. Unlike traditional automation that follows rigid rules, AI makes contextual judgments. It's not just a tool, it's more like working with a junior developer who sometimes reads the room wrong.\n\nThe psychological tension is real: we want to be consulted even when we're willing to delegate. We crave agency and control, yet we also want the productivity gains that come from AI autonomy.\n\nThis dynamic extends far beyond code. It's the same tension when AI drafts your emails, suggests design changes, or analyzes your data. We're all learning to navigate this new form of collaboration.\n\nHere's what teams should consider as AI becomes more autonomous:\n⇥ Context matters more than speed. When AI suggests refactoring critical processing logic - that requires explicit approval. When it's updating variable names for consistency, maybe not.\n\n⇥ Teach AI to read your organization's risk tolerance. High-stakes decisions (database changes, customer-facing changes) should always pause for human input. Low-stakes improvements can proceed with post-hoc review.\n\n⇥ Build in failure recovery, not just prevention. What happens when AI misreads team conventions or business context? Design workflows that can quickly roll back and learn from mistakes.\n\nAI can dramatically increase productivity, but the goal isn't to keep it on a leash, it's to teach it to read the room. The teams that master this balance will define the future of collaborative work.","post_image_url":"https://media.licdn.com/dms/image/v2/D4E05AQHBZVGSVnnxKw/videocover-high/B4EZfsdNGHHYCI-/0/1752018770515?e=1783137600&v=beta&t=JxNLwALzhYOdbcWVCmTrnmb72Djv4-6118kuJ1aPbR4","is_article":false,"article_url":null,"article_title":null,"article_description":null,"is_video":true,"video_url":"https://media.licdn.com/dms/image/v2/D4E05AQHBZVGSVnnxKw/videocover-high/B4EZfsdNGHHYCI-/0/1752018770515?e=1783137600&v=beta&t=JxNLwALzhYOdbcWVCmTrnmb72Djv4-6118kuJ1aPbR4","has_image":true,"reaction_count":12,"reaction_types":"LIKE, EMPATHY","comment_count":1,"impression_count":1159,"source":"activity"},{"is_my_post":true,"post_urn":"urn:li:activity:7347975560037384193","author_name":"Ravi Evani\n              \n                \n                   \n    \n      \n    \n    \n      \n    \n\n • You","author_profile_url":"https://www.linkedin.com/in/ravievani","author_headline":"Deploying enterprise agents in production / CTO / SWE Leader / GVP @ Publicis Sapient","posted_time":"2025-07-27","posted_hours_ago":7920,"posted_time_raw":"11mo","post_url":"https://www.linkedin.com/feed/update/urn:li:activity:7347975560037384193","author_profile_image_url":"https://media.licdn.com/dms/image/v2/C4E03AQGNeJRorEd2Nw/profile-displayphoto-shrink_100_100/profile-displayphoto-shrink_100_100/0/1569287114631?e=1784160000&v=beta&t=tJDZC7EXWnlgIIf8kF7fBCajhF-HEgzNXnz_IIkjqW8","post_text":"6 take-aways to sharpen your UX thinking for AI-driven Enterprise Dashboards :\n\n① Make confidence a first-class output. Display data quality scores or completeness percentages next to results, so leaders can gauge risk before acting.\n\n② Surface the “why” with the “what.” Pair every metric with an inline explanation of the key filters, joins, or assumptions the model used. Users gain context without hunting for it.\n\n③ Let users poke holes fast. One-click drill-downs (e.g., “see calculation steps”) invite scrutiny and build trust without derailing flow.\n\n④ Cache visual states for iteration. Allow users to bookmark a specific query + visualization. That speeds decision cycles.\n\n⑤ Use smart autocomplete as a thinking aid. Guide users with predictive query suggestions that reflect their data model and past behavior. Done well, this shortens learning curves and nudges users toward better questions.\n\n⑥ Design for the gray area. Flag partial answers—when data gaps prevent a definitive result, rather than forcing a yes/no or number. Transparency beats false precision.\n\nBuild these mechanics in from day one; retrofitting trust and traceability is expensive and rarely done well.","post_image_url":"https://media.licdn.com/dms/image/v2/D4E05AQG0xRimWKqgUg/videocover-high/B4EZflAymvHwCI-/0/1751893883178?e=1783137600&v=beta&t=nINkffDFlmjpadPtbsYAjXRjPSvaZc_fz7JQ7UEUkdU","is_article":false,"article_url":null,"article_title":null,"article_description":null,"is_video":true,"video_url":"https://media.licdn.com/dms/image/v2/D4E05AQG0xRimWKqgUg/videocover-high/B4EZflAymvHwCI-/0/1751893883178?e=1783137600&v=beta&t=nINkffDFlmjpadPtbsYAjXRjPSvaZc_fz7JQ7UEUkdU","has_image":true,"reaction_count":14,"reaction_types":"LIKE","impression_count":1016,"source":"activity"},{"is_my_post":true,"post_urn":"urn:li:activity:7345128790353690624","author_name":"Ravi Evani\n              \n                \n                   \n    \n      \n    \n    \n      \n    \n\n • You","author_profile_url":"https://www.linkedin.com/in/ravievani","author_headline":"Deploying enterprise agents in production / CTO / SWE Leader / GVP @ Publicis Sapient","posted_time":"2025-07-27","posted_hours_ago":7920,"posted_time_raw":"11mo","post_url":"https://www.linkedin.com/feed/update/urn:li:activity:7345128790353690624","author_profile_image_url":"https://media.licdn.com/dms/image/v2/C4E03AQGNeJRorEd2Nw/profile-displayphoto-shrink_100_100/profile-displayphoto-shrink_100_100/0/1569287114631?e=1784160000&v=beta&t=tJDZC7EXWnlgIIf8kF7fBCajhF-HEgzNXnz_IIkjqW8","post_text":"Achieving 3x-25x Performance Gains for High-Quality, AI-Powered Data Analysis\n\nAsking complex data questions in plain English and getting precise answers feels like magic, but it’s technically challenging.\n\nOne of my jobs is analyzing the health of numerous programs. To make that easier we are building an AI app with Sapient Slingshot that answers natural language queries by generating and executing code on project/program health data.\n\nThe challenge is that this process needs to be both fast and reliable.\n\nWe started with gemini-2.5-pro, but 50+ second response times and inconsistent results made it unsuitable for interactive use.\n\nOur goal: reduce latency without sacrificing accuracy.\n\nThe New Bottleneck: Tuning \"Think Time\"\n\nTraditional optimization targets code execution, but in AI apps, the real bottleneck is LLM \"think time\", i.e. the delay in generating correct code on the fly.\n\nHere are some techniques we used to cut think time while maintaining output quality:\n\n① Context-Rich Prompts\nAccuracy starts with context. We dynamically create prompts for each query:\n\n➜ Pre-Processing Logic: We pre-generate any code that doesn't need \"intelligence\" so that LLM doesn't have to\n➜ Dynamic Data-Awareness: Prompts include full schema, sample data, and value stats to give the model a full view.\n➜ Domain Templates: We tailor prompts for specific ontology like \"Client satisfaction\" or \"Cycle Time\" or \"Quality\".\n\nThis reduces errors and latency, improving codegen quality from the first try.\n\n② Structured Code Generation\nEven with great context, LLMs can output messy code. We guide query structure explicitly:\n\n➜ Simple queries: Direct the LLM to generate a single line chained pandas expression.\n➜ Complex queries : Direct the LLM to generate two lines, one for processing, one for the final result\n\nClear patterns ensure clean, reliable output.\n\n③ Two-Tiered Caching for Speed\nOnce accuracy was reliable, we tackled speed with intelligent caching:\n\n➜ Tier 1: Helper Cache – 3x Faster\n\n⊙ Find a semantically similar past query\n⊙ Use a faster model (e.g. gemini-2.5-flash)\n⊙ Include the past query and code as a one-shot prompt\n\nThis cut response times from 50+s to \u003c15s while maintaining accuracy.\n\n➜ Tier 2: Lightning Cache – 25x Faster\n\n⊙ Detect duplicates for exact or near matches\n⊙ Reuse validated code\n⊙ Execute instantly, skipping the LLM\n\nThis brought response times to ~2 seconds for repeated queries.\n\n④ Advanced Memory Architecture\n\n➜ Graph Memory (Neo4j via Graphiti): Stores query history, code, and relationships for fast, structured retrieval.\n➜ High-Quality Embeddings: We use BAAI/bge-large-en-v1.5 to match queries by true meaning.\n➜ Conversational Context: Full session history is stored, so prompts reflect recent interactions, enabling seamless follow-ups.\n\nBy combining rich context, structured code, caching, and smart memory, we can build AI systems that deliver natural language querying with the speed and reliability that we, as users, expect of it.","post_image_url":"https://media.licdn.com/dms/image/v2/D4E05AQFU7zNof9nHsA/feedshare-thumbnail_720_1280/B4EZe8jG2_GwA0-/0/1751215010535?e=1783137600&v=beta&t=eWVgw9uy6ggYV4jM5kQyeoYZODS-BvPz5oabB3NbG80","is_article":false,"article_url":null,"article_title":null,"article_description":null,"is_video":true,"video_url":"https://media.licdn.com/dms/image/v2/D4E05AQFU7zNof9nHsA/feedshare-thumbnail_720_1280/B4EZe8jG2_GwA0-/0/1751215010535?e=1783137600&v=beta&t=eWVgw9uy6ggYV4jM5kQyeoYZODS-BvPz5oabB3NbG80","has_image":true,"reaction_count":25,"reaction_types":"LIKE, INTEREST, PRAISE","comment_count":2,"impression_count":1329,"source":"activity"},{"is_my_post":true,"post_urn":"urn:li:activity:7344316720137822210","author_name":"Ravi Evani\n              \n                \n                   \n    \n      \n    \n    \n      \n    \n\n • You","author_profile_url":"https://www.linkedin.com/in/ravievani","author_headline":"Deploying enterprise agents in production / CTO / SWE Leader / GVP @ Publicis Sapient","posted_time":"2025-07-27","posted_hours_ago":7920,"posted_time_raw":"11mo","post_url":"https://www.linkedin.com/feed/update/urn:li:activity:7344316720137822210","author_profile_image_url":"https://media.licdn.com/dms/image/v2/C4E03AQGNeJRorEd2Nw/profile-displayphoto-shrink_100_100/profile-displayphoto-shrink_100_100/0/1569287114631?e=1784160000&v=beta&t=tJDZC7EXWnlgIIf8kF7fBCajhF-HEgzNXnz_IIkjqW8","post_text":"Just wrapped up an amazing discussion with 30 brilliant Publicis Sapient engineering interns about many questions on their mind, including the future of product development.\n\nThe old way: Linear handoffs User need → PM specs → Design → Engineering → Build\n\nThe new reality: Fluid collaboration from day one\n\nHere's what's happening:\n➜ Engineers can now prototype before waiting for \"requirements\"\n➜ PMs can build functional demos without needing a \"team\"\n➜ Anyone can champion a product idea and drive it forward\n\nThe \"handshake\" between disciplines is becoming dynamic, not sequential\n\nWe're moving from story handoffs to collaborative product evolution. Instead of asking \"whose sprint is this?\" we're asking \"how can we accelerate value?\"\n\nBut here's the crucial part: expertise still matters more than ever.\n\nWhen an engineer asks Sapient Slingshot to build a page with offers, the UX person asks: \"How do we know users will even scroll this far?\"\n\nWhen a PM vibe codes a feature, the engineer questions: \"How fast will this data load without breaking the page?\"\n\nBottom line is that collaboration will happen no more in documents and drawings, it will happen on top of something that is real from day one, with each discipline contributing their unique lens throughout the process.\n\nThank you, interns, for the depth and thoughtfulness of your questions. You weren’t just focused on tools or tech stacks, you were trying to understand how teams operate, how to grow within your roles, and how to contribute meaningfully.\n\nYou asked about real-world collaboration between product and engineering, how to handle rejected ideas, and how success is measured from both personal and client perspectives.\n\nYou were curious about how agile adapts to different clients, how to navigate unclear project briefs, and how engineers influence adoption.\n\nYou even dug into how to ramp up quickly on new tech and contribute beyond your role.\n\nIt’s clear you’re already thinking with a professional mindset. Keep experimenting in the open and sharpening together—that’s how you’ll define the next decade of products for our clients and their customers!","post_image_url":"https://media.licdn.com/dms/image/v2/D4E05AQHRecFPXx98OA/videocover-low/B4EZexBEeVHYCI-/0/1751021546786?e=1783137600&v=beta&t=bKuR1_ONKCs4ke8Ng99GL-WxY1Wg6BFETqg-npsWmH8","is_article":false,"article_url":null,"article_title":null,"article_description":null,"is_video":true,"video_url":"https://media.licdn.com/dms/image/v2/D4E05AQHRecFPXx98OA/videocover-low/B4EZexBEeVHYCI-/0/1751021546786?e=1783137600&v=beta&t=bKuR1_ONKCs4ke8Ng99GL-WxY1Wg6BFETqg-npsWmH8","has_image":true,"reaction_count":67,"reaction_types":"LIKE, PRAISE, EMPATHY","comment_count":4,"repost_count":5,"impression_count":4935,"source":"activity"},{"is_my_post":true,"post_urn":"urn:li:activity:7342909422035173379","author_name":"Ravi Evani\n              \n                \n                   \n    \n      \n    \n    \n      \n    \n\n • You","author_profile_url":"https://www.linkedin.com/in/ravievani","author_headline":"Deploying enterprise agents in production / CTO / SWE Leader / GVP @ Publicis Sapient","posted_time":"2025-06-27","posted_hours_ago":8760,"posted_time_raw":"1yr","post_url":"https://www.linkedin.com/feed/update/urn:li:activity:7342909422035173379","author_profile_image_url":"https://media.licdn.com/dms/image/v2/C4E03AQGNeJRorEd2Nw/profile-displayphoto-shrink_100_100/profile-displayphoto-shrink_100_100/0/1569287114631?e=1784160000&v=beta&t=tJDZC7EXWnlgIIf8kF7fBCajhF-HEgzNXnz_IIkjqW8","post_text":"Fun times at hashtag#VivaTech2025 w/ Marzana and Vikash\n\nPeople ask me why we are building Sapient Slingshot, our own SDLC platform.\n\nOne of the key reasons is this:\n\nFragmentation kills velocity.\n\nIn a typical enterprise release, work hops across 7-10 hand-offs—product, design, architecture, security, compliance, test, ops. Internal timing studies show each hand-off burns 8-15 % of the schedule through context-switching and re-work. Compound that loss and half the calendar is gone before code hits production.\n\nThree deeper problems hide inside those hand-offs:\n\n➜ Context decay – Specs drift, tribal knowledge never makes it into tickets, and by the time code is reviewed the original “why” is blurred.\n➜ Invisible queues – Work waits in inboxes and backlogs longer than it takes to execute, masking true bottlenecks.\n➜ Misaligned incentives – Each function optimizes its own metric (story points, test coverage, uptime) instead of the end-to-end outcome.\n\nSlingshot attacks all three.\n\nUnified context graph: AI agents ingest requirements, architecture decisions, data lineage, and risk controls into one shared model that stays with the work item from idea to production. No more context-hunting.\n\nCompound leverage: Automations at every stage (PRD analysis, architecture scaffolding, code generation, risk scanning, release notes) deliver 2-3x time savings per step, and the gains stack instead of resetting at the next hand-off.\n\nOutcome-based guardrails: The platform measures flow time, defect escape rate, and business impact continuously, so teams steer by real results, not local proxies.\n\nThe effect: teams that once supported $20-50 M in project throughput can handle $200 M+ without ballooning headcount, because the drag is engineered out of the system.\n\nSlingshot gives teams the power to own the full stack—not just technically, but operationally and strategically. That’s what it takes to move fast and build right.","post_image_url":"https://media.licdn.com/dms/image/v2/D4D05AQGuHh2bHU4KDw/videocover-high/B4DZedBGooGsB8-/0/1750686023613?e=1783137600&v=beta&t=tkrCI_-LdEh1btrsa1fvtgImDtBfpd_xJw-M1HNmZHs","is_article":false,"article_url":null,"article_title":null,"article_description":null,"is_video":true,"video_url":"https://media.licdn.com/dms/image/v2/D4D05AQGuHh2bHU4KDw/videocover-high/B4DZedBGooGsB8-/0/1750686023613?e=1783137600&v=beta&t=tkrCI_-LdEh1btrsa1fvtgImDtBfpd_xJw-M1HNmZHs","has_image":true,"reaction_count":66,"reaction_types":"LIKE, EMPATHY, PRAISE","comment_count":2,"impression_count":3568,"source":"activity"},{"is_my_post":true,"post_urn":"urn:li:activity:7341371277212880896","author_name":"Ravi Evani\n              \n                \n                   \n    \n      \n    \n    \n      \n    \n\n • You","author_profile_url":"https://www.linkedin.com/in/ravievani","author_headline":"Deploying enterprise agents in production / CTO / SWE Leader / GVP @ Publicis Sapient","posted_time":"2025-06-27","posted_hours_ago":8760,"posted_time_raw":"1yr","post_url":"https://www.linkedin.com/feed/update/urn:li:activity:7341371277212880896","author_profile_image_url":"https://media.licdn.com/dms/image/v2/C4E03AQGNeJRorEd2Nw/profile-displayphoto-shrink_100_100/profile-displayphoto-shrink_100_100/0/1569287114631?e=1784160000&v=beta&t=tJDZC7EXWnlgIIf8kF7fBCajhF-HEgzNXnz_IIkjqW8","post_text":"Two Quick Tips for Extracting Structured Data from Emails Using AI\n\nIf you're working on extracting structured data from messy, unstructured emails using AI, here are two simple but effective tips. In this example, built using Sapient Slingshot we processed a batch of event accommodation requests sent via email to a hospitality provider, and used an LLM to extract booking details.\n\n1. Choose the Right Model Variant\nIn our case, Gemini Pro and Gemini Flash returned similar outputs, but Flash ran faster. That makes it a good default if you're optimizing for performance and cost. On the other hand, Flash Lite was faster still—but missed key fields, like room count. The takeaway: test a few model variants before locking in, rather than defaulting to the biggest or most popular one.\n\n2. Add Traceability with ContextGem https://lnkd.in/dg49y_MF\nWhen extracting data, it helps to trace each value back to its source. ContextGem, a GitHub project, does exactly that. It tags each extracted value and shows where it came from in the original document. That visibility makes it easier for humans to review, trust, and validate the output.\n\nThese two practices can quickly raise the reliability of your AI-powered data extraction workflows.","post_image_url":"https://media.licdn.com/dms/image/v2/D4D05AQFnoXBLgepqtQ/videocover-low/B4DZeHKNw8GYB0-/0/1750319297579?e=1783137600&v=beta&t=H6kt9wKDfDTaXGdDRDik5-eFg5mhoi6Qr5l8HCeqFj0","is_article":false,"article_url":null,"article_title":null,"article_description":null,"is_video":true,"video_url":"https://media.licdn.com/dms/image/v2/D4D05AQFnoXBLgepqtQ/videocover-low/B4DZeHKNw8GYB0-/0/1750319297579?e=1783137600&v=beta&t=H6kt9wKDfDTaXGdDRDik5-eFg5mhoi6Qr5l8HCeqFj0","has_image":true,"reaction_count":20,"reaction_types":"LIKE","comment_count":4,"impression_count":1570,"source":"activity"},{"is_my_post":true,"post_urn":"urn:li:activity:7340444039592177667","author_name":"Ravi Evani\n              \n                \n                   \n    \n      \n    \n    \n      \n    \n\n • You","author_profile_url":"https://www.linkedin.com/in/ravievani","author_headline":"Deploying enterprise agents in production / CTO / SWE Leader / GVP @ Publicis Sapient","posted_time":"2025-06-27","posted_hours_ago":8760,"posted_time_raw":"1yr","post_url":"https://www.linkedin.com/feed/update/urn:li:activity:7340444039592177667","author_profile_image_url":"https://media.licdn.com/dms/image/v2/C4E03AQGNeJRorEd2Nw/profile-displayphoto-shrink_100_100/profile-displayphoto-shrink_100_100/0/1569287114631?e=1784160000&v=beta&t=tJDZC7EXWnlgIIf8kF7fBCajhF-HEgzNXnz_IIkjqW8","post_text":"Hospitality Leaders: Here’s how AI can streamline your B2B event booking request data\n\nYour corporate event bookings arrive in countless formats:\n→ Emails with 15-page attachments\n→ Event management platform submissions\n→ Phone calls requesting quick quotes\n→ Direct booking APIs\n→ Third-party aggregator feeds\n→ Excel spreadsheets forwarded multiple times\n\nThe result? Your team spends 60% of their time copying, pasting, and reformatting instead of booking events.\n\nImagine AI handling each request format, delivering clean, structured data within 30 seconds:\n\n★ PDF attachments → Structured booking details\n★ Phone calls → Automatic transcription and data extraction\n★ Email chaos → Clearly organized event requirements\n★ Any format → Standardized data ready for your PMS\n\nThe outcomes:\n• High accuracy in data extraction\n• Significant reduction in manual processing\n• Response times reduced from days to hours\n\nYour revenue team gets actionable data, your sales team responds faster, and your operations run smoother.\n\nHospitality’s future is intelligent systems empowering your team to focus on creating exceptional experiences.\n\nWhat’s your biggest hospitality data challenge?\n\nhashtag#Hospitality hashtag#EventBooking hashtag#AI\n\nP.S. Architecture diagram (Pg 4) generated with the help of Sapient Slingshot","post_image_url":null,"is_article":false,"article_url":null,"article_title":null,"article_description":null,"is_video":false,"video_url":null,"has_image":false,"reaction_count":22,"reaction_types":"LIKE, INTEREST","impression_count":1456,"source":"activity"},{"is_my_post":true,"post_urn":"urn:li:activity:7339284422602510336","author_name":"Ravi Evani\n              \n                \n                   \n    \n      \n    \n    \n      \n    \n\n • You","author_profile_url":"https://www.linkedin.com/in/ravievani","author_headline":"Deploying enterprise agents in production / CTO / SWE Leader / GVP @ Publicis Sapient","posted_time":"2025-06-27","posted_hours_ago":8760,"posted_time_raw":"1yr","post_url":"https://www.linkedin.com/feed/update/urn:li:activity:7339284422602510336","author_profile_image_url":"https://media.licdn.com/dms/image/v2/C4E03AQGNeJRorEd2Nw/profile-displayphoto-shrink_100_100/profile-displayphoto-shrink_100_100/0/1569287114631?e=1784160000&v=beta&t=tJDZC7EXWnlgIIf8kF7fBCajhF-HEgzNXnz_IIkjqW8","post_text":"Great run at hashtag#VivaTech2025, showcasing Sapient Slingshot to numerous clients and sharing practical examples of how to leverage AI to solve the long persistent enterprise delivery challenges.\n\nWhile there are point solutions everywhere, such as AI coding tools to boost individual productivity, they still miss the core problem—which is that at team, project and program levels, the outcomes of speed, quality and value remain hard to achieve.\n\nWe discussed some key strategies with real examples, to address the following challenges:\n\n① Team velocity vs. individual speed\nYour developers get a lift from Copilot-style tools-but how do you translate that into predictable, program-level gains in speed, quality, and value? How do you raise bar for all developers, not just seniors. How would you ensure juniors get better starting points and seniors get leverage?\n\n② Context density\nAI output is only as good as the prompts and enterprise context you feed it. Who owns your prompt library and how does your context graph get built and democratized? How does your prompt library and context graph evolve with each new application functionality, compliance shift, or domain-specific edge case?\n\n③ Consistency at scale\nIf engineers are left to leverage AI SDLC tools in isolation , how do you avoid style drift, architecture misalignment, or “house-of-cards” code that doesn’t hold up during integration?\n\n④ The two-steps-back loop\nWhen AI fixes one issue but breaks two others, do you have the right guardrails, lineage visibility, and policy context to guide the next prompt-or are teams going in circles chasing bugs?\n\nIt was fun to bring clarity to these conversations by showing how Slingshot addresses these with SME-curated prompt libraries, shared enterprise memory and context, and built-in guardrails—so that AI gains compound instead of fragment; and everyone in the enterprise moves faster and safely.","post_image_url":"https://media.licdn.com/dms/image/v2/D4E05AQGGcuRchZksNQ/feedshare-thumbnail_720_1280/B4EZdpeW7HHsAs-/0/1749821278139?e=1783137600&v=beta&t=sqNv5fOGpDFjRpJ15nkGQ6IK39uDvTuGlROFgIzX99w","is_article":false,"article_url":null,"article_title":null,"article_description":null,"is_video":true,"video_url":"https://media.licdn.com/dms/image/v2/D4E05AQGGcuRchZksNQ/feedshare-thumbnail_720_1280/B4EZdpeW7HHsAs-/0/1749821278139?e=1783137600&v=beta&t=sqNv5fOGpDFjRpJ15nkGQ6IK39uDvTuGlROFgIzX99w","has_image":true,"reaction_count":110,"reaction_types":"LIKE, PRAISE, EMPATHY","comment_count":4,"repost_count":2,"impression_count":5317,"source":"activity"},{"is_my_post":true,"post_urn":"urn:li:activity:7338784422382493698","author_name":"Ravi Evani\n              \n                \n                   \n    \n      \n    \n    \n      \n    \n\n • You","author_profile_url":"https://www.linkedin.com/in/ravievani","author_headline":"Deploying enterprise agents in production / CTO / SWE Leader / GVP @ Publicis Sapient","posted_time":"2025-06-27","posted_hours_ago":8760,"posted_time_raw":"1yr","post_url":"https://www.linkedin.com/feed/update/urn:li:activity:7338784422382493698","author_profile_image_url":"https://media.licdn.com/dms/image/v2/C4E03AQGNeJRorEd2Nw/profile-displayphoto-shrink_100_100/profile-displayphoto-shrink_100_100/0/1569287114631?e=1784160000&v=beta&t=tJDZC7EXWnlgIIf8kF7fBCajhF-HEgzNXnz_IIkjqW8","post_text":"Up to 40% of software delays come from misalignment between business goals and delivery realities. AI can help you spot those gaps before they turn into rework.\n\nIt’s clear there’s no shortage of innovation at hashtag#vivatech. AI agents, robotics, ambient computing… the tech is here. But the real challenge for business leaders isn’t spotting cool demos—it’s making this stuff actually work inside their orgs.\n\nAccording to Google’s Gemini Deep research, nearly 40% of software development delays happen because the high-level goals defined by business and product teams don’t match what’s realistically achievable within delivery timelines.\n\nWhen it’s time to build, the friction shows up: missing capabilities, partner dependencies, compliance hurdles, unavailable data. And by that point, shifting direction is painful—delays, budget overruns, and compromised outcomes.\n\nThis is where AI can be practical, not theoretical. With the right agents, you can simulate what it takes to bring a product or strategy to life. The agent can take your value pool, analyze enterprise context, internal architecture, and external constraints—and forecast what’s actually feasible.\n\nThat early clarity allows teams to adjust before timelines and expectations are locked in. You avoid waste. You reduce downstream rework. You move smarter.\n\nUse it not just for automation, but for alignment. That’s where some of the real leverage could be.","post_image_url":"https://media.licdn.com/dms/image/v2/D4E05AQF4q88NbEy1YA/feedshare-thumbnail_720_1280/B4EZdiYZz8HsAs-/0/1749702258068?e=1783137600&v=beta&t=8V1I9_xrKlRPGfq7DYCAeM0U8iuHAa88BYL2CDecmE4","is_article":false,"article_url":null,"article_title":null,"article_description":null,"is_video":true,"video_url":"https://media.licdn.com/dms/image/v2/D4E05AQF4q88NbEy1YA/feedshare-thumbnail_720_1280/B4EZdiYZz8HsAs-/0/1749702258068?e=1783137600&v=beta&t=8V1I9_xrKlRPGfq7DYCAeM0U8iuHAa88BYL2CDecmE4","has_image":true,"reaction_count":70,"reaction_types":"LIKE, INTEREST, EMPATHY","comment_count":2,"repost_count":1,"impression_count":5173,"source":"activity"},{"is_my_post":true,"post_urn":"urn:li:activity:7337810777086590977","author_name":"Ravi Evani\n              \n                \n                   \n    \n      \n    \n    \n      \n    \n\n • You","author_profile_url":"https://www.linkedin.com/in/ravievani","author_headline":"Deploying enterprise agents in production / CTO / SWE Leader / GVP @ Publicis Sapient","posted_time":"2025-06-27","posted_hours_ago":8760,"posted_time_raw":"1yr","post_url":"https://www.linkedin.com/feed/update/urn:li:activity:7337810777086590977","author_profile_image_url":"https://media.licdn.com/dms/image/v2/C4E03AQGNeJRorEd2Nw/profile-displayphoto-shrink_100_100/profile-displayphoto-shrink_100_100/0/1569287114631?e=1784160000&v=beta&t=tJDZC7EXWnlgIIf8kF7fBCajhF-HEgzNXnz_IIkjqW8","post_text":"The best managers I know recognize patterns. They spot trends in team dynamics, anticipate needs, and turn successful one-offs into repeatable systems. Here's how I use AI to help me with that through a simple loop: Spot patterns → Use patterns → Create patterns.\n\n1. Spot patterns quickly:\nI feed team data into my favorite AI—even basic stuff works. One-on-one notes in a Word doc, team feedback themes, or meeting transcripts. Instead of generic prompts, I use role-playing. For example, when I want to assess whether people are collaborating inclusively or developing a learning mindset, my prompt is: \"Act as an experienced people manager. Analyze these sprint retrospective transcripts and identify the top 3 barriers to inclusive collaboration and learning mindset.\"\n\nIt sometimes surfaces patterns I hadn't connected with, such as: \"[This] problem areas keep resurfacing\" or \"[These] people dominate team discussions.\"\n\nStart small: Even analyzing something like your last 5 meeting transcripts can reveal surprising patterns about core values like engagement and openness.\n\n2. Use patterns to drive action:\nWhen AI spots recurring patterns such as engagement gaps, I create bite-sized solutions: pair quieter team members with seasoned colleagues who have strong relationships across teams. When patterns show people avoiding difficult conversations, I address it directly with the Managers or bring it up in one-on-ones to understand what's holding people back.\n\nThe key: AI suggests the what, but I decide the how based on my team's personality and needs.\n\n3. Create patterns for scale:\nWhen something works repeatedly, like mentorship pairings that boost confidence in client interactions; I use AI to help document it. I ask: \"Turn this approach into a step-by-step guide for developing client partnership skills in junior managers\".\n\nNow every new team member can benefit from our collective learning about building confidence and collaboration skills, not just the lucky ones who got the full attention.\n\nThis Spot → Use → Create loop is more than a linear process. It produces consistent data that helps spot deeper patterns the next time around.\n\nReality check: This doesn't work for every team dynamic, and AI suggestions sometimes miss cultural context. Crucially, never use confidential team data in public AI models, use your company's enterprise tools. I use Sapient Slingshot.\n\nhashtag#LIPostingDayJune","post_image_url":"https://media.licdn.com/dms/image/v2/D4E22AQHHBtrpZNgN6Q/feedshare-shrink_800/B4EZdT6mm4HQAk-/0/1749459561528?e=1784160000&v=beta&t=Fve3MgH8yZn1TBZBNdW1bSSOEKtgGKu0KxDHiMtVpdE","is_article":false,"article_url":null,"article_title":null,"article_description":null,"is_video":false,"video_url":null,"has_image":true,"reaction_count":21,"reaction_types":"LIKE, EMPATHY","comment_count":1,"impression_count":872,"source":"activity"},{"is_my_post":true,"post_urn":"urn:li:activity:7335998777519996929","author_name":"Ravi Evani\n              \n                \n                   \n    \n      \n    \n    \n      \n    \n\n • You","author_profile_url":"https://www.linkedin.com/in/ravievani","author_headline":"Deploying enterprise agents in production / CTO / SWE Leader / GVP @ Publicis Sapient","posted_time":"2025-06-27","posted_hours_ago":8760,"posted_time_raw":"1yr","post_url":"https://www.linkedin.com/feed/update/urn:li:activity:7335998777519996929","author_profile_image_url":"https://media.licdn.com/dms/image/v2/C4E03AQGNeJRorEd2Nw/profile-displayphoto-shrink_100_100/profile-displayphoto-shrink_100_100/0/1569287114631?e=1784160000&v=beta&t=tJDZC7EXWnlgIIf8kF7fBCajhF-HEgzNXnz_IIkjqW8","post_text":"If you’re rolling out AI tools but not seeing meaningful impact across your teams, this might help you understand why. Hint: It's not the tools or skills, it's the environment.\n\nA lot of your people are likely experimenting with AI. Playing with prompts. Automating small things. But they’re not sharing what they’re doing.\n\nWhy?\n\nBecause even a small “win” can backfire. You show something that works, and suddenly people expect it to be repeatable, scalable, and production-ready. And if it’s not? Now you’re under a microscope.\n\nThat kind of pressure makes people go quiet. And that’s a huge missed opportunity. Because when those experiments stay private, people reinvent the wheel, teams miss patterns, and orgs lose valuable context on what’s actually working.\n\nHere’s what I've learned:\n🔹 Make space for the messy stuff. Share experiments in retros or 1:1s—don’t wait for dramatic results.\n🔹 Celebrate process stories, not just outcomes. “Here’s what I tried and where it broke” is incredibly useful.\n🔹 Track AI time like any other project work. If we treat it like an extracurricular, it’ll stay one.\n\nWhen AI adopters share in the open, everyone benefits. Their experiments turn into playbooks. Their failures save others time, and their wins raise the floor for everyone else.\n\n—\nP.S. Snapped this just before a relaxed dinner with a client at Casi Cielo in Atlanta. Sunshine didn’t hurt either.!","post_image_url":"https://media.licdn.com/dms/image/v2/D4E05AQHALTAx6gDW8g/feedshare-thumbnail_720_1280/B4EZc6C4IhHgAs-/0/1749025525087?e=1783137600&v=beta&t=s5srKDw1-aq4lO-S7VJr7rctXISIImt6qF7xl8gk8SE","is_article":false,"article_url":null,"article_title":null,"article_description":null,"is_video":true,"video_url":"https://media.licdn.com/dms/image/v2/D4E05AQHALTAx6gDW8g/feedshare-thumbnail_720_1280/B4EZc6C4IhHgAs-/0/1749025525087?e=1783137600&v=beta&t=s5srKDw1-aq4lO-S7VJr7rctXISIImt6qF7xl8gk8SE","has_image":true,"reaction_count":41,"reaction_types":"LIKE, EMPATHY, PRAISE","comment_count":2,"impression_count":2491,"source":"activity"},{"is_my_post":true,"post_urn":"urn:li:activity:7332108546853015557","author_name":"Ravi Evani\n              \n                \n                   \n    \n      \n    \n    \n      \n    \n\n • You","author_profile_url":"https://www.linkedin.com/in/ravievani","author_headline":"Deploying enterprise agents in production / CTO / SWE Leader / GVP @ Publicis Sapient","posted_time":"2025-06-27","posted_hours_ago":8760,"posted_time_raw":"1yr","post_url":"https://www.linkedin.com/feed/update/urn:li:activity:7332108546853015557","author_profile_image_url":"https://media.licdn.com/dms/image/v2/C4E03AQGNeJRorEd2Nw/profile-displayphoto-shrink_100_100/profile-displayphoto-shrink_100_100/0/1569287114631?e=1784160000&v=beta&t=tJDZC7EXWnlgIIf8kF7fBCajhF-HEgzNXnz_IIkjqW8","post_text":"This Memorial Day, we’re going deep on designing AI-first interfaces that do the heavy lifting. Join me live to break down how to architect a system where your website initiates intelligent, context-aware conversations—handling advice, upsell, and decision-making—while integrating seamless human fallback via video. We’ll cover system design, AI orchestration, and practical trade-offs.","post_image_url":null,"is_article":false,"article_url":null,"article_title":null,"article_description":null,"is_video":true,"video_url":null,"has_image":false,"reaction_count":73,"reaction_types":"LIKE, EMPATHY, PRAISE","comment_count":15,"repost_count":4,"impression_count":11973,"source":"activity"},{"is_my_post":true,"post_urn":"urn:li:activity:7331314328383455232","author_name":"Ravi Evani\n              \n                \n                   \n    \n      \n    \n    \n      \n    \n\n • You","author_profile_url":"https://www.linkedin.com/in/ravievani","author_headline":"Deploying enterprise agents in production / CTO / SWE Leader / GVP @ Publicis Sapient","posted_time":"2025-06-27","posted_hours_ago":8760,"posted_time_raw":"1yr","post_url":"https://www.linkedin.com/feed/update/urn:li:activity:7331314328383455232","author_profile_image_url":"https://media.licdn.com/dms/image/v2/C4E03AQGNeJRorEd2Nw/profile-displayphoto-shrink_100_100/profile-displayphoto-shrink_100_100/0/1569287114631?e=1784160000&v=beta&t=tJDZC7EXWnlgIIf8kF7fBCajhF-HEgzNXnz_IIkjqW8","post_text":"Bigger isn't always better when it comes to Vision Language AI models.\n\nLast weekend, we built an LLM inference app using Sapient Slingshot to run some practical tests on local, on-device multimodal AI models to count vehicles in restaurant drive-thrus. The vehicle density at a drive-thru could be an important metric for optimizing staffing in a restaurant and reducing customer wait times.\n\nThe prompt was straightforward: \"How many vehicles do you see in the drive-thru?\"\n\nI tested this on a few open-source models running locally on the edge, which in this case, was my laptop.\n\nInterestingly, the Google Gemma 12 billion parameter model quickly reported the correct count—three vehicles. But then it surprised me. It commented that that this was a “surprisingly eclectic collection of vehicles” and noted the scene had “a slightly unusual, almost staged feel.”\n\nAnd it was exactly right.\n\nThe scene wasn’t a real one, but was AI-generated using Google Flow scene builder, using the VEO2 model, prompted to create sports cars lined up in a chick-fila like drive-thru.\n\nThe lower weight fine tuned Gemma model not only provided accurate data, but also picked up on the subtle, artificial context.\n\nNext, I tested the heavyweight Gemma 27 billion parameter model. It was slower, correctly counted three vehicles, but entirely missed the staged aspect.\n\nThe takeaway:\nBigger models aren’t automatically superior. Smaller models can be sharper, especially when tuned for specific scenarios.","post_image_url":"https://media.licdn.com/dms/image/v2/D4E05AQFQsMJhnAGw8w/videocover-high/B4EZb4PdRTGQBg-/0/1747921532850?e=1783137600&v=beta&t=KUW0rzWBL5Fs6Sr8ZBUCnS-BpbmyTKHlfQ7jM_DYC78","is_article":false,"article_url":null,"article_title":null,"article_description":null,"is_video":true,"video_url":"https://media.licdn.com/dms/image/v2/D4E05AQFQsMJhnAGw8w/videocover-high/B4EZb4PdRTGQBg-/0/1747921532850?e=1783137600&v=beta&t=KUW0rzWBL5Fs6Sr8ZBUCnS-BpbmyTKHlfQ7jM_DYC78","has_image":true,"reaction_count":18,"reaction_types":"LIKE, ENTERTAINMENT","comment_count":4,"impression_count":2683,"source":"activity"},{"is_my_post":true,"post_urn":"urn:li:activity:7330955602753384453","author_name":"Ravi Evani\n              \n                \n                   \n    \n      \n    \n    \n      \n    \n\n • You","author_profile_url":"https://www.linkedin.com/in/ravievani","author_headline":"Deploying enterprise agents in production / CTO / SWE Leader / GVP @ Publicis Sapient","posted_time":"2025-06-27","posted_hours_ago":8760,"posted_time_raw":"1yr","post_url":"https://www.linkedin.com/feed/update/urn:li:activity:7330955602753384453","author_profile_image_url":"https://media.licdn.com/dms/image/v2/C4E03AQGNeJRorEd2Nw/profile-displayphoto-shrink_100_100/profile-displayphoto-shrink_100_100/0/1569287114631?e=1784160000&v=beta&t=tJDZC7EXWnlgIIf8kF7fBCajhF-HEgzNXnz_IIkjqW8","post_text":"Great meetup with our engineering leads in Toronto, where we unpacked five core mental models for engineers to master when working with AI ⤵\n\n1) Words are your interface to intelligence.\nThe way you phrase a request directly shapes the outcome. Express with clarity, precision, intent, and context. Whether you’re prompting an AI or giving it feedback, your language becomes the control surface for what gets built.\n\n2) Confidence is not the same as correctness.\nLLMs can be confidently wrong, just like eloquent humans. Don’t prompt and hope—critically co-create. Question assumptions, look for what’s missing, and stay engaged in the reasoning. Good outputs come from sharp interrogation and thoughtful back-and-forth.\n\n3) Better context beats bigger models.\nToo much context leads to confusion. Too little leads to hallucination. Be intentional about what you include. The quality of an AI’s output depends on the context density of your input—feed it the most relevant information, using the fewest possible tokens.\n\n4) Decomposition before delegation isn’t optional.\nThe granularity of human tasks doesn’t translate directly to AI. What feels intuitive to us may be vague or overloaded for the model. Modular design is your friend, so plan for what, how much, and in what order you delegate—as if assigning tasks to a junior teammate.\n\n5) Go beyond the dominant signal.\nLLMs follow the average pattern, the most likely continuation. But what’s common isn’t always what matters. Master the margins. Surface exceptions, spot what’s missing or misunderstood, and look for the outliers. That’s where real insight—and your impact—comes from.\n\nThanks to our Publicis Sapient Toronto engineering leaders who spent two days in SEAL (Strategic Engineering Academy for Leaders) training w/ Sapient Slingshot to level up their AI skills and drive impact for our clients and teams. And shoutout to Thanu, Amit, Laura, Joy, and Mohammed for designing and delivering a strong program through thoughtful coaching, organization, and curriculum.\n\nDustin, Pankaj, Debprotim, Amit, Arnab, Mrudul, Mohan, Jithin, Ramya, David, Rajesh, Milind, Gaytri, Jayakar, Maurizio, Sreeman, Vishal, Trivendra, Rajesh, Rohit, Pankaj, Huzefa, Jayesh, Jithin, irshad, Mridul","post_image_url":"https://media.licdn.com/dms/image/v2/D4E22AQGZKPXansQtoQ/feedshare-shrink_800/B4EZbzJQfUHYAk-/0/1747836016717?e=1784160000&v=beta&t=cRnFA0erRiocIjd_fIlJUd3MqrxLxUYV4TENAOI56gs","is_article":false,"article_url":null,"article_title":null,"article_description":null,"is_video":false,"video_url":null,"has_image":true,"reaction_count":177,"reaction_types":"LIKE, EMPATHY, PRAISE","comment_count":6,"repost_count":2,"impression_count":11466,"source":"activity"},{"is_my_post":true,"post_urn":"urn:li:activity:7330201134457880577","author_name":"Ravi Evani\n              \n                \n                   \n    \n      \n    \n    \n      \n    \n\n • You","author_profile_url":"https://www.linkedin.com/in/ravievani","author_headline":"Deploying enterprise agents in production / CTO / SWE Leader / GVP @ Publicis Sapient","posted_time":"2025-06-27","posted_hours_ago":8760,"posted_time_raw":"1yr","post_url":"https://www.linkedin.com/feed/update/urn:li:activity:7330201134457880577","author_profile_image_url":"https://media.licdn.com/dms/image/v2/C4E03AQGNeJRorEd2Nw/profile-displayphoto-shrink_100_100/profile-displayphoto-shrink_100_100/0/1569287114631?e=1784160000&v=beta&t=tJDZC7EXWnlgIIf8kF7fBCajhF-HEgzNXnz_IIkjqW8","post_text":"If you want to become a world-class AI engineer, there are some painful lessons you don’t need to learn the hard way➜I already did.\n\nHere are 7 mistakes I’ve made that I’d avoid at all costs if I were starting again:\n\n1. Waiting to “feel ready”\nAI moves fast. If you’re waiting to be an expert before you contribute, you’ll always be behind. Start before you’re comfortable. Experiment, ship, and learn in public. The best way to level up is by doing.\n\n2. Thinking your value is in code alone\nBeing great at Python or prompt engineering is not enough. The real value lies in connecting AI to business impact➜whether that’s accelerating a workflow, improving UX, or cutting costs. Learn to translate tech into outcomes.\n\n3. Ignoring the system around the model\nA good model in a broken pipeline is still a broken system. AI engineering isn’t just about the model➜it’s also about data quality, APIs, human feedback loops, testing, and deployment. Own the whole lifecycle.\n\n4. Not learning how to collaborate with AI\nTreating AI like a magic box limits its potential. The best engineers treat it like a teammate➜one that needs direction, context, and review. Know what it’s good at, what it’s bad at, and how to manage it like a junior dev.\n\n5. Avoiding ambiguity\nAI often lives in the gray areas: noisy data, unclear specs, messy orgs. If you’re only comfortable with perfect instructions and clean problems, you’ll struggle. The best AI engineers lean into uncertainty and reduce it systematically.\n\n6. Over-engineering for edge cases\nTrying to make AI perfect on Day 1 is a trap. Focus on dominant use cases, ship quickly, then tighten the loop with feedback. Let the real-world data shape your iterations.\n\n7. Not tying your work to results\nIt’s easy to get caught up in models, benchmarks, and novelty. But none of that matters if it doesn’t move a KPI. Be ruthless about measuring the impact of your work. Code is only valuable if it drives value.\n\nThese are the lessons I live by now➜and I keep learning.\nIf you’re serious about mastering AI engineering, don’t just build models. Build systems. Build impact.","post_image_url":"https://media.licdn.com/dms/image/v2/D4E05AQF-pXSpemyPfQ/videocover-high/B4EZboa78.GcBw-/0/1747656127434?e=1783137600&v=beta&t=CJrSqV9WZY9jyXaN41gIT-NfTzczn_ToLA7EIv-FMuM","is_article":false,"article_url":null,"article_title":null,"article_description":null,"is_video":true,"video_url":"https://media.licdn.com/dms/image/v2/D4E05AQF-pXSpemyPfQ/videocover-high/B4EZboa78.GcBw-/0/1747656127434?e=1783137600&v=beta&t=CJrSqV9WZY9jyXaN41gIT-NfTzczn_ToLA7EIv-FMuM","has_image":true,"reaction_count":37,"reaction_types":"LIKE, EMPATHY, INTEREST","comment_count":4,"impression_count":3087,"source":"activity"},{"is_my_post":true,"post_urn":"urn:li:activity:7329679241397088256","author_name":"Ravi Evani\n              \n                \n                   \n    \n      \n    \n    \n      \n    \n\n • You","author_profile_url":"https://www.linkedin.com/in/ravievani","author_headline":"Deploying enterprise agents in production / CTO / SWE Leader / GVP @ Publicis Sapient","posted_time":"2025-06-27","posted_hours_ago":8760,"posted_time_raw":"1yr","post_url":"https://www.linkedin.com/feed/update/urn:li:activity:7329679241397088256","author_profile_image_url":"https://media.licdn.com/dms/image/v2/C4E03AQGNeJRorEd2Nw/profile-displayphoto-shrink_100_100/profile-displayphoto-shrink_100_100/0/1569287114631?e=1784160000&v=beta&t=tJDZC7EXWnlgIIf8kF7fBCajhF-HEgzNXnz_IIkjqW8","post_text":"Dissecting the \"AI\" in the currently trending ai-hedge-fund Github project 📈:\n\nI recently dove into this educational GitHub project https://lnkd.in/eH54Wv_x (kudos to Virattt and contributors!) to find out how AI is being used.\n\nSo, where’s the Logic? Deterministic vs. AI\n\n⚙️ The Deterministic Engine:\n➜Data Collection & Prep: Fetching financial data, market stats – all standard code.\n➜Heuristic Scoring: Initial calculations within analyst agents (e.g., \"Is revenue growth > X%?\") are rule-based.\n➜Workflow Orchestration: The sequence of agent operations is programmatically defined (using LangGraph in this case).\n➜Risk Management (Primarily): Applying rules for position sizing, exposure limits based on inputs.\n\n🤖 The AI (LLMs) at Work:\n➜Analyst Personas (e.g., \"Bill Ackman Agent\"): After deterministic code crunches numbers (financial metrics, heuristic scores), an LLM steps in. Prompted with a specific investor persona and the pre-calculated data, it crafts an investment thesis, generates a signal (bullish/bearish), confidence score, and reasoning – aiming to mimic that investor's style.\n\n➜Portfolio Manager Agent: Given signals from all analyst agents, risk parameters, portfolio state, and trading rules via a detailed prompt, an LLM makes the final call: what to buy/sell/hold for each stock, in what quantity, and why. This synthesizes diverse inputs into actionable decisions.\n\n⚠️ The \"Gotchas\" of Assessing the AI's True Value\nThis architecture allows for sophisticated AI contributions, but how good are they really?\n➜Backtesting is Key: The project includes a backtester. Real-world simulated performance (P&L, Sharpe ratio) is the ultimate first-pass test.\n➜Reasoning Quality: The --show-reasoning flag is crucial. Is the AI's explanation logical, coherent with its persona, and insightful, or just rephrasing inputs? This needs human review.\n➜Prompt Sensitivity & Robustness: Small prompt changes or different LLM models can lead to varied outcomes. The quality of the prompts themselves is paramount.\n\nKey Takeaway for Humans Relying on AI Agents Like This:\n➜The Prompts: Understand exactly what the AI is being asked, what data it's given, what constraints or personas it's meant to adopt, and how its output is structured.\n➜Deterministic Pre-processing: What data is the AI actually seeing? How is it filtered, scored, or structured before the LLM gets it?\n➜Evaluation & Fallback Mechanisms: How is the AI's output being validated? What happens if it fails or gives nonsensical answers?\nBacktesting & Performance Metrics: How is success defined and measured?\n\nThis ai-hedge-fund project is a great educational tool for seeing this hybrid approach in action. It highlights both the potential of AI in complex domains and the continued need for human oversight and critical evaluation.","post_image_url":"https://media.licdn.com/dms/image/v2/D4E22AQFfAHVtdC5RHA/feedshare-shrink_800/B4EZbhAbfnHIAk-/0/1747531709413?e=1784160000&v=beta&t=pYMjoffiLiMraoSwspSWUnRKImEHG9qearlEpfq_vNs","is_article":false,"article_url":null,"article_title":null,"article_description":null,"is_video":false,"video_url":null,"has_image":true,"reaction_count":16,"reaction_types":"LIKE, EMPATHY","impression_count":836,"source":"activity"},{"is_my_post":true,"post_urn":"urn:li:activity:7328555093337731074","author_name":"Ravi Evani\n              \n                \n                   \n    \n      \n    \n    \n      \n    \n\n • You","author_profile_url":"https://www.linkedin.com/in/ravievani","author_headline":"Deploying enterprise agents in production / CTO / SWE Leader / GVP @ Publicis Sapient","posted_time":"2025-06-27","posted_hours_ago":8760,"posted_time_raw":"1yr","post_url":"https://www.linkedin.com/feed/update/urn:li:activity:7328555093337731074","author_profile_image_url":"https://media.licdn.com/dms/image/v2/C4E03AQGNeJRorEd2Nw/profile-displayphoto-shrink_100_100/profile-displayphoto-shrink_100_100/0/1569287114631?e=1784160000&v=beta&t=tJDZC7EXWnlgIIf8kF7fBCajhF-HEgzNXnz_IIkjqW8","post_text":"Real-time object detection on the edge!\n\nJason Steiner and I @ Philadephia's Walnut Street Cafe https://lnkd.in/eGwmfitz testing out the Multimodal llama.cpp on Apple silicon, thanks to https://lnkd.in/eWWJ-4ET personalized using Publicis Sapient hashtag#Slingshot w/the LLM running locally on my macbook pro.\n\nSee the response text on the right panel displaying object detection in real-time.","post_image_url":"https://media.licdn.com/dms/image/v2/D4E05AQFZnmRl8OrFEg/videocover-low/B4EZbRBqXMHABs-/0/1747263686997?e=1783137600&v=beta&t=GeYHsAxgmuEHTMp7lzX86foDVDg6HWVXHk-6JH0iXU0","is_article":false,"article_url":null,"article_title":null,"article_description":null,"is_video":true,"video_url":"https://media.licdn.com/dms/image/v2/D4E05AQFZnmRl8OrFEg/videocover-low/B4EZbRBqXMHABs-/0/1747263686997?e=1783137600&v=beta&t=GeYHsAxgmuEHTMp7lzX86foDVDg6HWVXHk-6JH0iXU0","has_image":true,"reaction_count":66,"reaction_types":"LIKE, EMPATHY, PRAISE","comment_count":2,"impression_count":4218,"source":"activity"},{"is_my_post":true,"post_urn":"urn:li:activity:7328312666538610689","author_name":"Ravi Evani\n              \n                \n                   \n    \n      \n    \n    \n      \n    \n\n • You","author_profile_url":"https://www.linkedin.com/in/ravievani","author_headline":"Deploying enterprise agents in production / CTO / SWE Leader / GVP @ Publicis Sapient","posted_time":"2025-06-27","posted_hours_ago":8760,"posted_time_raw":"1yr","post_url":"https://www.linkedin.com/feed/update/urn:li:activity:7328312666538610689","author_profile_image_url":"https://media.licdn.com/dms/image/v2/C4E03AQGNeJRorEd2Nw/profile-displayphoto-shrink_100_100/profile-displayphoto-shrink_100_100/0/1569287114631?e=1784160000&v=beta&t=tJDZC7EXWnlgIIf8kF7fBCajhF-HEgzNXnz_IIkjqW8","post_text":"If Transformers are built to focus on what matters most (“attention is all you need”), then our job is to get better at what they ignore.\n\nLLMs are optimized for the average pattern, the dominant signal, the most likely continuation.\n\nBut the edges are where perception, judgment, and experience lead.\n\nWe are the ones who bring context, intuition, and the ability to reason through unfamiliar situations.\n\nWe can connect dots across domains, infer intent, and spot when something “feels off” even if we’ve never seen it before.\n\nSo our real leverage is not in racing AI to the center, but in steering it with our mastery of the margins:\n➜ What’s missing?\n➜ What’s misclassified?\n➜ What’s misunderstood?\n\nThat’s where we focus, and hone in our value.","post_image_url":"https://media.licdn.com/dms/image/v2/D4E22AQGilUcQ0YOddw/feedshare-shrink_800/B4EZbNlh8kHcAk-/0/1747205891916?e=1784160000&v=beta&t=jMFRYVTWT1gDAVZPSAFbhEP_UnTyF_4hF9sz9zXjm30","is_article":false,"article_url":null,"article_title":null,"article_description":null,"is_video":false,"video_url":null,"has_image":true,"reaction_count":9,"reaction_types":"LIKE","comment_count":2,"impression_count":626,"source":"activity"},{"is_my_post":true,"post_urn":"urn:li:activity:7327766301366448128","author_name":"Ravi Evani\n              \n                \n                   \n    \n      \n    \n    \n      \n    \n\n • You","author_profile_url":"https://www.linkedin.com/in/ravievani","author_headline":"Deploying enterprise agents in production / CTO / SWE Leader / GVP @ Publicis Sapient","posted_time":"2025-06-27","posted_hours_ago":8760,"posted_time_raw":"1yr","post_url":"https://www.linkedin.com/feed/update/urn:li:activity:7327766301366448128","author_profile_image_url":"https://media.licdn.com/dms/image/v2/C4E03AQGNeJRorEd2Nw/profile-displayphoto-shrink_100_100/profile-displayphoto-shrink_100_100/0/1569287114631?e=1784160000&v=beta&t=tJDZC7EXWnlgIIf8kF7fBCajhF-HEgzNXnz_IIkjqW8","post_text":"Demystifying the logic that powers vibecoding in your favorite AI copilot:\n\nThe functionality that enables vibecoding is the “agent mode” built into IDEs like Cursor, Windsurf, Zed, Cline, and others.\n\nThe interesting thing is most of the logic in the agent mode (except the LLM) is deterministic.\n\nHere’s the general idea of what happens under the hood, when you send a message like: “Refactor this function.” into your IDE agent prompt input box. This is based on Zed IDE source code https://lnkd.in/eJXe58UE","post_image_url":"https://media.licdn.com/dms/image/v2/D4E05AQFgvL-fPMrNuQ/videocover-low/B4EZbF0j87HwBw-/0/1747075618962?e=1783137600&v=beta&t=Am48xjLUPNZ10x1znwjTEDO6iU5O80j4lGajmbnw5ZQ","is_article":false,"article_url":null,"article_title":null,"article_description":null,"is_video":true,"video_url":"https://media.licdn.com/dms/image/v2/D4E05AQFgvL-fPMrNuQ/videocover-low/B4EZbF0j87HwBw-/0/1747075618962?e=1783137600&v=beta&t=Am48xjLUPNZ10x1znwjTEDO6iU5O80j4lGajmbnw5ZQ","has_image":true,"reaction_count":6,"reaction_types":"LIKE","impression_count":603,"source":"activity"},{"is_my_post":true,"post_urn":"urn:li:activity:7327676818818232320","author_name":"Ravi Evani\n              \n                \n                   \n    \n      \n    \n    \n      \n    \n\n • You","author_profile_url":"https://www.linkedin.com/in/ravievani","author_headline":"Deploying enterprise agents in production / CTO / SWE Leader / GVP @ Publicis Sapient","posted_time":"2025-06-27","posted_hours_ago":8760,"posted_time_raw":"1yr","post_url":"https://www.linkedin.com/feed/update/urn:li:activity:7327676818818232320","author_profile_image_url":"https://media.licdn.com/dms/image/v2/C4E03AQGNeJRorEd2Nw/profile-displayphoto-shrink_100_100/profile-displayphoto-shrink_100_100/0/1569287114631?e=1784160000&v=beta&t=tJDZC7EXWnlgIIf8kF7fBCajhF-HEgzNXnz_IIkjqW8","post_text":"Demystifying the logic that powers vibecoding in your favorite AI copilot:\n\nThe functionality that enables vibecoding is the “agent mode” built into IDEs like Cursor, Windsurf, Zed, Cline, and others.\n\nThe interesting thing is most of the logic in the agent mode (except the LLM) is deterministic.\n\nHere’s the general idea of what happens under the hood, when you send a message like: “Refactor this function.” into your IDE agent prompt input box. This is based on Zed IDE source code https://lnkd.in/eJXe58UE\n\n→ First the IDE system spins up an active thread that creates a message object for the prompt. It calls the context system to fetch anything relevant—files, symbols, previous chats, rules, etc. relevant to the user intent.\n\n→ Next, as part of the context gathering, a Context Picker selects what to include – this can be user driven or auto-selected. A Context Store loads data from available sources and the result is a rich, structured context data sent along with your prompt\n\n→ Then comes the LLM request, where a model selector picks the right LLM for the job. The IDE sends both prompt + context to the LLM for processing.\nAt this point the LLM could determine if a tool call is needed, such as reading a file, accessing the terminal, editing the file and so on.\n\n→ The IDE then invokes the right tool (e.g., EditFileTool). The tool executes and returns results, which are routed back to the LLM to continue reasoning. And this cycle may repeat until the task is complete, in which case the LLM might return a response such as the source code and a text explanation.\n\n→ This response is shown in the IDE. If diffs are involved (like code edits), tools like Code Diff or Terminal Codegen render and apply them.\n\n→ The user reviews the output and decides to continue the thread, edit the prompt, or start fresh.\n\n☆ So that’s it: It’s not just an “AI chatbot”, but rather, a fully orchestrated system with tons of deterministic code that manages context, models, tools, and interaction flow.","post_image_url":"https://media.licdn.com/dms/image/v2/D4E05AQGRFDAXbDg2Mw/videocover-low/B4EZa.fX2uHwBw-/0/1746952631294?e=1783137600&v=beta&t=jLTA2mZT1jt4aeoyHr5HlFzSrSX3GrZ4IcLsTmxaVbs","is_article":false,"article_url":null,"article_title":null,"article_description":null,"is_video":true,"video_url":"https://media.licdn.com/dms/image/v2/D4E05AQGRFDAXbDg2Mw/videocover-low/B4EZa.fX2uHwBw-/0/1746952631294?e=1783137600&v=beta&t=jLTA2mZT1jt4aeoyHr5HlFzSrSX3GrZ4IcLsTmxaVbs","has_image":true,"reaction_count":14,"reaction_types":"LIKE, INTEREST","comment_count":3,"impression_count":1114,"source":"activity"},{"is_my_post":true,"post_urn":"urn:li:activity:7326926997899603968","author_name":"Ravi Evani\n              \n                \n                   \n    \n      \n    \n    \n      \n    \n\n • You","author_profile_url":"https://www.linkedin.com/in/ravievani","author_headline":"Deploying enterprise agents in production / CTO / SWE Leader / GVP @ Publicis Sapient","posted_time":"2025-06-27","posted_hours_ago":8760,"posted_time_raw":"1yr","post_url":"https://www.linkedin.com/feed/update/urn:li:activity:7326926997899603968","author_profile_image_url":"https://media.licdn.com/dms/image/v2/C4E03AQGNeJRorEd2Nw/profile-displayphoto-shrink_100_100/profile-displayphoto-shrink_100_100/0/1569287114631?e=1784160000&v=beta&t=tJDZC7EXWnlgIIf8kF7fBCajhF-HEgzNXnz_IIkjqW8","post_text":"Figuring out \"who said what\" just got better with NVIDIA NeMo’s recent updates. Adobe Premiere Pro, I love your tools, but your transcription feature needs this, yesterday.\n\nMulti-speaker content is everywhere. Figuring out who said what shouldn’t be messy in a transcript!\n\nHere’s how NeMo handles it: https://lnkd.in/e7cMYCWG\n\n☆ Step 1: Voice Activity Detection (VAD)\n→ Finds only the parts of audio that contain actual speech—skipping silence and noise.\n\n☆ Step 2: Speaker Embedding + Clustering\n→ Breaks speech into segments, generates voice fingerprints, and clusters them into speakers.\n→This is the heart of the \"diarization\"—grouping voices by i
