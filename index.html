PATHY, PRAISE","comment_count":1,"repost_count":1,"impression_count":2437,"source":"activity"},{"is_my_post":true,"post_urn":"urn:li:activity:7291631486095482880","author_name":"Ravi Evani\n              \n                \n                   \n    \n      \n    \n    \n      \n    \n\n • You","author_profile_url":"https://www.linkedin.com/in/ravievani","author_headline":"Deploying enterprise agents in production / CTO / SWE Leader / GVP @ Publicis Sapient","posted_time":"2025-06-27","posted_hours_ago":8760,"posted_time_raw":"1yr","post_url":"https://www.linkedin.com/feed/update/urn:li:activity:7291631486095482880","author_profile_image_url":"https://media.licdn.com/dms/image/v2/C4E03AQGNeJRorEd2Nw/profile-displayphoto-shrink_100_100/profile-displayphoto-shrink_100_100/0/1569287114631?e=1784160000&v=beta&t=tJDZC7EXWnlgIIf8kF7fBCajhF-HEgzNXnz_IIkjqW8","post_text":"Example of an agentic flow for migrating an on-prem app to hashtag#AWS—powered by Publicis Sapient Slingshot AI platform, and a strategic mix of LLMs. 🚀","post_image_url":"https://media.licdn.com/dms/image/v2/D4E22AQEK2hKw73cw1A/feedshare-shrink_800/B4EZTEUMWfHMAg-/0/1738460417052?e=1784160000&v=beta&t=xedIZnRVxX5TlzU0HALlfZuOuzJw5fGx8-J6BLhs64w","is_article":false,"article_url":null,"article_title":null,"article_description":null,"is_video":false,"video_url":null,"has_image":true,"reaction_count":124,"reaction_types":"LIKE, INTEREST","comment_count":2,"repost_count":3,"impression_count":8130,"source":"activity"},{"is_my_post":true,"post_urn":"urn:li:activity:7289969035843125249","author_name":"Ravi Evani\n              \n                \n                   \n    \n      \n    \n    \n      \n    \n\n • You","author_profile_url":"https://www.linkedin.com/in/ravievani","author_headline":"Deploying enterprise agents in production / CTO / SWE Leader / GVP @ Publicis Sapient","posted_time":"2025-06-27","posted_hours_ago":8760,"posted_time_raw":"1yr","post_url":"https://www.linkedin.com/feed/update/urn:li:activity:7289969035843125249","author_profile_image_url":"https://media.licdn.com/dms/image/v2/C4E03AQGNeJRorEd2Nw/profile-displayphoto-shrink_100_100/profile-displayphoto-shrink_100_100/0/1569287114631?e=1784160000&v=beta&t=tJDZC7EXWnlgIIf8kF7fBCajhF-HEgzNXnz_IIkjqW8","post_text":"Great discussion with one of my teams at the Publicis Sapient Gurgaon, India office about how AI is transforming the software development lifecycle.\n\nOne of the key questions raised was: With AI now capable of writing code and generating solutions, what will be the role of engineers in the future? Here’s how we answered it:\n\n1. AI generates code, but It needs guidance:\nWhile AI can generate code, it often lacks the ability to ensure scalability, performance, maintainability, or even interpretability for future systems, including other AIs. Engineers will play a critical role in steering AI to produce the right architecture, abstractions, and implementations. To do this effectively, we’ll need to be more proficient than the AI itself, identifying and fixing issues AI introduces.\n\n2. The demand for software development will multiply:\nAI is like moving from using shovels to using excavators. The demand for software will explode as it becomes more disposable and purpose-built. Additionally, every piece of software can now be made more intelligent, opening opportunities to create a massive corpus of code for intelligent systems. Engineers will be essential in building these systems, especially as we move beyond legacy, deterministic codebases.\n\n3. Broadening skills is non-negotiable:\nEngineers who only take directions and implement requirements will be disrupted by AI. However, those who broaden their skill sets—solving business problems, playing multi-dimensional roles, and leveraging AI for code generation—will be in a stronger position. The ability to think holistically and creatively will be invaluable.\n\n4. Domain knowledge is key to be the human in the loop:\nTo effectively manage and steer AI output, deep domain knowledge and expertise are essential. This ties back to the earlier point about needing to be proficient enough to review and refine what AI produces.\n\n5. AI will be universal, but creativity will differentiate us:\nLike how Google and the internet democratized access to information, AI will become ubiquitous. But the outcomes will depend on how we use it, what we create with it, and the level of creativity and innovation we bring to the table.\n\n6. Human needs remain unchanged:\nDespite AI’s capabilities, our fundamental human needs—certainty, variety, connection, growth, and contribution—remain unchanged. AI might help us meet these needs at a higher level, but it’s up to us to define how we leverage it for meaningful impact to ourselves.","post_image_url":"https://media.licdn.com/dms/image/v2/D4E22AQEirLPqq_IgzQ/feedshare-shrink_800/B4EZSssC78HgAg-/0/1738064055666?e=1784160000&v=beta&t=ulRebt7wICfDIrnlP9tcDxXfN7BMi0DsVLyyp-iHFhQ","is_article":false,"article_url":null,"article_title":null,"article_description":null,"is_video":false,"video_url":null,"has_image":true,"reaction_count":621,"reaction_types":"LIKE, PRAISE, EMPATHY","comment_count":8,"repost_count":5,"impression_count":86521,"source":"activity"},{"is_my_post":true,"post_urn":"urn:li:activity:7289858553660493824","author_name":"Ravi Evani\n              \n                \n                   \n    \n      \n    \n    \n      \n    \n\n • You","author_profile_url":"https://www.linkedin.com/in/ravievani","author_headline":"Deploying enterprise agents in production / CTO / SWE Leader / GVP @ Publicis Sapient","posted_time":"2025-06-27","posted_hours_ago":8760,"posted_time_raw":"1yr","post_url":"https://www.linkedin.com/feed/update/urn:li:activity:7289858553660493824","author_profile_image_url":"https://media.licdn.com/dms/image/v2/C4E03AQGNeJRorEd2Nw/profile-displayphoto-shrink_100_100/profile-displayphoto-shrink_100_100/0/1569287114631?e=1784160000&v=beta&t=tJDZC7EXWnlgIIf8kF7fBCajhF-HEgzNXnz_IIkjqW8","post_text":"The fact that DeepSeek R1's multi-token reading capability processes text in chunks rather than word-by-word, with minimal accuracy loss, reinforces that the LCM architecture could work in production—especially if consider these text chunks as analogous to \"concepts\".\n\nAnyone from LCM team —would love your perspective on this: Loic Barrault, Paul-Ambroise Duquenne, Maha Elbayad","post_image_url":null,"is_article":true,"article_url":"https://lnkd.in/e5vMUtkN","article_title":"https://lnkd.in/e5vMUtkN","article_description":"","is_video":false,"video_url":null,"has_image":false,"reaction_count":1,"reaction_types":"INTEREST","impression_count":504,"source":"activity"},{"is_my_post":true,"post_urn":"urn:li:activity:7286537933782679552","author_name":"Ravi Evani\n              \n                \n                   \n    \n      \n    \n    \n      \n    \n\n • You","author_profile_url":"https://www.linkedin.com/in/ravievani","author_headline":"Deploying enterprise agents in production / CTO / SWE Leader / GVP @ Publicis Sapient","posted_time":"2025-06-27","posted_hours_ago":8760,"posted_time_raw":"1yr","post_url":"https://www.linkedin.com/feed/update/urn:li:activity:7286537933782679552","author_profile_image_url":"https://media.licdn.com/dms/image/v2/C4E03AQGNeJRorEd2Nw/profile-displayphoto-shrink_100_100/profile-displayphoto-shrink_100_100/0/1569287114631?e=1784160000&v=beta&t=tJDZC7EXWnlgIIf8kF7fBCajhF-HEgzNXnz_IIkjqW8","post_text":"As the Federal Reserve announces plans to upgrade its core trading system to FedTrade Plus, I can't help but reflect on the wild journey of building its predecessor: FedTrade.\n\nAlmost 2 decades ago, I was an engineer / architect in the pioneering team that built and launched FedTrade—a mission-critical system that would go on to power trillions in open market operations and shape two decades of U.S. monetary policy. 🏦\n\nThe memories are still vivid: crafting the technology, debugging marathons, the precision of the calculations, ensuring zero defects and 100% uptime. But what really sticks? That electric atmosphere when a team knows they're building something bigger than themselves. It was beyond writing code — we were engineering the backbone of America's monetary operations.\n\nShoutout to some of the the original team members: Vishnu, Suresh, Jem, Ravikumar, Karthik, Rohit, Dhawal, Saleem, Ron, James, Nelson, Sid whose brilliance and dedication created a system that stood rock-solid through bull markets, bear markets, and even a financial crisis.\n\nHere's to the next generation of architects taking this mission forward! 🚀","post_image_url":null,"is_article":true,"article_url":"https://www.newyorkfed.org/markets/opolicy/operating_policy_241113","article_title":"Statement Regarding New FedTrade Platform","article_description":"Statement Regarding New FedTrade Platform\nnewyorkfed.org","is_video":false,"video_url":null,"has_image":false,"reaction_count":51,"reaction_types":"LIKE, PRAISE","comment_count":2,"impression_count":5052,"source":"activity"},{"is_my_post":true,"post_urn":"urn:li:activity:7285968193548943360","author_name":"Ravi Evani\n              \n                \n                   \n    \n      \n    \n    \n      \n    \n\n • You","author_profile_url":"https://www.linkedin.com/in/ravievani","author_headline":"Deploying enterprise agents in production / CTO / SWE Leader / GVP @ Publicis Sapient","posted_time":"2025-06-27","posted_hours_ago":8760,"posted_time_raw":"1yr","post_url":"https://www.linkedin.com/feed/update/urn:li:activity:7285968193548943360","author_profile_image_url":"https://media.licdn.com/dms/image/v2/C4E03AQGNeJRorEd2Nw/profile-displayphoto-shrink_100_100/profile-displayphoto-shrink_100_100/0/1569287114631?e=1784160000&v=beta&t=tJDZC7EXWnlgIIf8kF7fBCajhF-HEgzNXnz_IIkjqW8","post_text":"There's plenty of confusion and delusion about what AI agents are, what they can do, what’s reliable today, and the challenges of deploying agents in real-world, messy enterprise environments.\nTo unlock the value of \"agentification\", focus on micro-tasks, see them through adoption, and then scale to larger workflows.","post_image_url":"https://media.licdn.com/dms/image/v2/D4E05AQHmDiPmoaWeWw/feedshare-thumbnail_720_1280/B4EZRz1WAnGcA8-/0/1737110152033?e=1783137600&v=beta&t=Ek74nW6X4k3RFXY_dN69ij_nGSZPBM53h-_TCcXvQ1M","is_article":false,"article_url":null,"article_title":null,"article_description":null,"is_video":true,"video_url":"https://media.licdn.com/dms/image/v2/D4E05AQHmDiPmoaWeWw/feedshare-thumbnail_720_1280/B4EZRz1WAnGcA8-/0/1737110152033?e=1783137600&v=beta&t=Ek74nW6X4k3RFXY_dN69ij_nGSZPBM53h-_TCcXvQ1M","has_image":true,"reaction_count":27,"reaction_types":"LIKE, EMPATHY, INTEREST","comment_count":5,"impression_count":2461,"source":"activity"},{"is_my_post":true,"post_urn":"urn:li:activity:7285330293115236355","author_name":"Ravi Evani\n              \n                \n                   \n    \n      \n    \n    \n      \n    \n\n • You","author_profile_url":"https://www.linkedin.com/in/ravievani","author_headline":"Deploying enterprise agents in production / CTO / SWE Leader / GVP @ Publicis Sapient","posted_time":"2025-06-27","posted_hours_ago":8760,"posted_time_raw":"1yr","post_url":"https://www.linkedin.com/feed/update/urn:li:activity:7285330293115236355","author_profile_image_url":"https://media.licdn.com/dms/image/v2/C4E03AQGNeJRorEd2Nw/profile-displayphoto-shrink_100_100/profile-displayphoto-shrink_100_100/0/1569287114631?e=1784160000&v=beta&t=tJDZC7EXWnlgIIf8kF7fBCajhF-HEgzNXnz_IIkjqW8","post_text":"Insightful AI-focused discussion among our North America Industry Engineering Leads at Publicis Sapient. We covered plenty of ground, including:\n\n🎯 The evolution of next-generation UIs, with a real healthcare / pharma example (thanks Nader)\n↳ Explored \"app-less\" paradigms for LLM-powered agentic UIs\n↳ Showcased demos of how content and services could be delivered within “channel-less” customer and employee experiences\n\n🎯 Foundational capabilities that enterprises need to maximize value out of LLMs, copilots and LLM backed functions\n↳ Discussed how we are developing sophisticated context management through ontologies and context chaining for our Slingshot AI SDLC platform\n↳ Explored flexible deployment options to make it easy for clients to benefit from our AI SDLC platform, tools and agents\n\n🎯 SaaS AI Ecosystem integration (thanks Brett and Ninad)\n↳ Discussed strategies and operating models we are developing as “the glue” to integrate our client technology systems with SaaS agents\n\nThanks to our leaders Chirag, Anuja, Thanu, Sushil, Brett Colbert, Alison, Toby Boudreaux, Nader Nakib, Ninad Patil for sharing your expertise and insights. Also to Brian, Tanja, Jacqui for helping us make the workshop highly productive and fun!","post_image_url":"https://media.licdn.com/dms/image/v2/D5622AQHRlpXlKB-dUg/feedshare-shrink_800/B56ZRqxQmCGoAg-/0/1736958091236?e=1784160000&v=beta&t=Bubsd4qd7jeCWJWxpr0TDZFZDg1OHpHXD_KiiHZlS4k","is_article":false,"article_url":null,"article_title":null,"article_description":null,"is_video":false,"video_url":null,"has_image":true,"reaction_count":137,"reaction_types":"LIKE, EMPATHY, INTEREST","repost_count":1,"impression_count":18695,"source":"activity"},{"is_my_post":true,"post_urn":"urn:li:activity:7284575695454830593","author_name":"Ravi Evani\n              \n                \n                   \n    \n      \n    \n    \n      \n    \n\n • You","author_profile_url":"https://www.linkedin.com/in/ravievani","author_headline":"Deploying enterprise agents in production / CTO / SWE Leader / GVP @ Publicis Sapient","posted_time":"2025-06-27","posted_hours_ago":8760,"posted_time_raw":"1yr","post_url":"https://www.linkedin.com/feed/update/urn:li:activity:7284575695454830593","author_profile_image_url":"https://media.licdn.com/dms/image/v2/C4E03AQGNeJRorEd2Nw/profile-displayphoto-shrink_100_100/profile-displayphoto-shrink_100_100/0/1569287114631?e=1784160000&v=beta&t=tJDZC7EXWnlgIIf8kF7fBCajhF-HEgzNXnz_IIkjqW8","post_text":"Regression tests failing due to stale test data? Here's an \"agentic\" way to fix that.\n\nhashtag#aiEngineering","post_image_url":"https://media.licdn.com/dms/image/v2/D4E05AQGNoK039EWhgA/feedshare-thumbnail_720_1280/B4EZRgC6_1HAA8-/0/1736778167571?e=1783137600&v=beta&t=uGNMGIs1wuGlW91WEMTAb7bJonsnoWlMefRp52raLrw","is_article":false,"article_url":null,"article_title":null,"article_description":null,"is_video":true,"video_url":"https://media.licdn.com/dms/image/v2/D4E05AQGNoK039EWhgA/feedshare-thumbnail_720_1280/B4EZRgC6_1HAA8-/0/1736778167571?e=1783137600&v=beta&t=uGNMGIs1wuGlW91WEMTAb7bJonsnoWlMefRp52raLrw","has_image":true,"reaction_count":22,"reaction_types":"LIKE, EMPATHY, INTEREST","comment_count":1,"impression_count":2089,"source":"activity"},{"is_my_post":true,"post_urn":"urn:li:activity:7283248717866926080","author_name":"Ravi Evani\n              \n                \n                   \n    \n      \n    \n    \n      \n    \n\n • You","author_profile_url":"https://www.linkedin.com/in/ravievani","author_headline":"Deploying enterprise agents in production / CTO / SWE Leader / GVP @ Publicis Sapient","posted_time":"2025-06-27","posted_hours_ago":8760,"posted_time_raw":"1yr","post_url":"https://www.linkedin.com/feed/update/urn:li:activity:7283248717866926080","author_profile_image_url":"https://media.licdn.com/dms/image/v2/C4E03AQGNeJRorEd2Nw/profile-displayphoto-shrink_100_100/profile-displayphoto-shrink_100_100/0/1569287114631?e=1784160000&v=beta&t=tJDZC7EXWnlgIIf8kF7fBCajhF-HEgzNXnz_IIkjqW8","post_text":"Insightful discussion with some of our Publicis Sapient New York Engineering Managers on their experiences using SDLC AI tools, as well as building AI-powered systems. Some notes from the field that I gathered:\n\n🎯 Delivering Real Results\n↳A recommendation engine built simply by leveraging vector search on Hugging Face sentence transformer-generated embeddings yielded higher relevance than a full-blown “personalization platform”, prompting our clients to reconsider their AI investments in SaaS.\n↳A team was able to deliver a complex retail marketplace integration between the timelines of Diwali and Thanksgiving using our Slingshot AI SDLC assistant.\n↳A financial services enterprise application was launched to production in two weeks.\n↳ OCR tasks have demonstrated significant accuracy improvements over applications developed in the past decade.\n↳An AI agent expedited SRE onboarding by processing wikis and SOPs, reducing the need for manual analysis.\n↳Even some basic RAG implementations showed clear business benefits.\n\n🎯 Applying AI to SDLC Processes\n↳Creating and maintaining shared prompt libraries is essential for achieving consistent results across teams.\n↳Curated context hierarchies that accompany prompt chains significantly enhance output accuracy.\n\n🎯 Measuring Efficiencies Gained Using AI SDLC Tools\n↳Teams maintain initial project estimates as reference points, keeping baselines unchanged until AI impact is clearly established.\n↳Comparisons of team velocity before and after deep AI assistance adoption serve as key efficiency indicators.\n↳Reduction in bugs, particularly in edge cases, is closely monitored.\n↳Strong story pointing and Scrum practices ensure accurate measurement of productivity improvements.\n\n🎯 Overcoming Field Challenges\n↳One AI system encountered issues with unexpected production data patterns\n↳Assumptions about data patterns can impact user experience when patterns shift\n↳AI systems still require significant human oversight\n\nThanks for your time: Roshan Jitender Rangaswamy Balaji Kevin Romy Nirav. Sharing your experiences help us develop a more grounded approach to AI implementation—focusing on practical benefits while being mindful of the challenges.","post_image_url":"https://media.licdn.com/dms/image/v2/D4E22AQEG6KRfE-yZTw/feedshare-shrink_800/B4EZRNMFDgHAAk-/0/1736461809076?e=1784160000&v=beta&t=2xf30h84lKhn-Ui5_F7GRpNm3LoNYHuOLfrgsQMmcv0","is_article":false,"article_url":null,"article_title":null,"article_description":null,"is_video":false,"video_url":null,"has_image":true,"reaction_count":234,"reaction_types":"LIKE, EMPATHY, PRAISE","comment_count":4,"repost_count":2,"impression_count":29401,"source":"activity"},{"is_my_post":true,"post_urn":"urn:li:activity:7282984175177981953","author_name":"Ravi Evani\n              \n                \n                   \n    \n      \n    \n    \n      \n    \n\n • You","author_profile_url":"https://www.linkedin.com/in/ravievani","author_headline":"Deploying enterprise agents in production / CTO / SWE Leader / GVP @ Publicis Sapient","posted_time":"2025-06-27","posted_hours_ago":8760,"posted_time_raw":"1yr","post_url":"https://www.linkedin.com/feed/update/urn:li:activity:7282984175177981953","author_profile_image_url":"https://media.licdn.com/dms/image/v2/C4E03AQGNeJRorEd2Nw/profile-displayphoto-shrink_100_100/profile-displayphoto-shrink_100_100/0/1569287114631?e=1784160000&v=beta&t=tJDZC7EXWnlgIIf8kF7fBCajhF-HEgzNXnz_IIkjqW8","post_text":"Do Agile teams act on tribal knowledge? Rakesh Ravuri highlights the hidden patterns shaping team dynamics and explores how AI can simplify the process of uncovering and leveraging them.\n\n▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬\nhashtag#ai @ Publicis Sapient","post_image_url":"https://media.licdn.com/dms/image/v2/D4E05AQHOt5GyuO-16g/feedshare-thumbnail_720_1280/B4EZQ2AE_LHkA8-/0/1736072778695?e=1783137600&v=beta&t=BTOYYRqaHtAvaHpGm9GJlEyLvpDiMwWQlgd4uV4iU3Y","is_article":false,"article_url":null,"article_title":null,"article_description":null,"is_video":true,"video_url":"https://media.licdn.com/dms/image/v2/D4E05AQHOt5GyuO-16g/feedshare-thumbnail_720_1280/B4EZQ2AE_LHkA8-/0/1736072778695?e=1783137600&v=beta&t=BTOYYRqaHtAvaHpGm9GJlEyLvpDiMwWQlgd4uV4iU3Y","has_image":true,"reaction_count":24,"reaction_types":"LIKE, EMPATHY","comment_count":1,"repost_c n    \n\n • You","author_profile_url":"https://www.linkedin.com/in/ravievani","author_headline":"Deploying enterprise agents in production / CTO / SWE Leader / GVP @ Publicis Sapient","posted_time":"2025-06-27","posted_hours_ago":8760,"posted_time_raw":"1yr","post_url":"https://www.linkedin.com/feed/update/urn:li:activity:7281617409067683840","author_profile_image_url":"https://media.licdn.com/dms/image/v2/C4E03AQGNeJRorEd2Nw/profile-displayphoto-shrink_100_100/profile-displayphoto-shrink_100_100/0/1569287114631?e=1784160000&v=beta&t=tJDZC7EXWnlgIIf8kF7fBCajhF-HEgzNXnz_IIkjqW8","post_text":"Connected AI ⇛ better SDLC. In my conversation with Rakesh Ravuri, he sheds light on the disconnected nature of AI tools and how enterprises should solve the leaky bucket problem to unlock true SDLC transformation.\n▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬\nhashtag#ai @ Publicis Sapient","post_image_url":"https://media.licdn.com/dms/image/v2/D4E05AQG5f37-5EIH8Q/feedshare-thumbnail_720_1280/B4EZQ13sqwGcBA-/0/1736070581702?e=1783137600&v=beta&t=30pO-xdN_587VmgVixIAYlUHwtm37nVLyMCzVo3DYPg","is_article":false,"article_url":null,"article_title":null,"article_description":null,"is_video":true,"video_url":"https://media.licdn.com/dms/image/v2/D4E05AQG5f37-5EIH8Q/feedshare-thumbnail_720_1280/B4EZQ13sqwGcBA-/0/1736070581702?e=1783137600&v=beta&t=30pO-xdN_587VmgVixIAYlUHwtm37nVLyMCzVo3DYPg","has_image":true,"reaction_count":92,"reaction_types":"LIKE, EMPATHY, INTEREST","comment_count":3,"repost_count":2,"impression_count":14709,"source":"activity"},{"is_my_post":true,"post_urn":"urn:li:activity:7280863218028228608","author_name":"Ravi Evani\n              \n                \n                   \n    \n      \n    \n    \n      \n    \n\n • You","author_profile_url":"https://www.linkedin.com/in/ravievani","author_headline":"Deploying enterprise agents in production / CTO / SWE Leader / GVP @ Publicis Sapient","posted_time":"2025-06-27","posted_hours_ago":8760,"posted_time_raw":"1yr","post_url":"https://www.linkedin.com/feed/update/urn:li:activity:7280863218028228608","author_profile_image_url":"https://media.licdn.com/dms/image/v2/C4E03AQGNeJRorEd2Nw/profile-displayphoto-shrink_100_100/profile-displayphoto-shrink_100_100/0/1569287114631?e=1784160000&v=beta&t=tJDZC7EXWnlgIIf8kF7fBCajhF-HEgzNXnz_IIkjqW8","post_text":"People are acquiring skills from everywhere. Laura, Rachit and I discuss that while structured AI training paths are essential for all career stages—we should also be building pathways to give our people credit for the AI skills they have learnt outside the context of a formal curriculum.\n\nhashtag#ai @ Publicis Sapient","post_image_url":"https://media.licdn.com/dms/image/v2/D4E05AQFM9OYjhrhc4A/feedshare-thumbnail_720_1280/B4EZQrSTJfHsA8-/0/1735893006558?e=1783137600&v=beta&t=yOpyDSTQbGdNLBzuIbznln6EN1tvQABlMz1D59cQWLM","is_article":false,"article_url":null,"article_title":null,"article_description":null,"is_video":true,"video_url":"https://media.licdn.com/dms/image/v2/D4E05AQFM9OYjhrhc4A/feedshare-thumbnail_720_1280/B4EZQrSTJfHsA8-/0/1735893006558?e=1783137600&v=beta&t=yOpyDSTQbGdNLBzuIbznln6EN1tvQABlMz1D59cQWLM","has_image":true,"reaction_count":13,"reaction_types":"LIKE, EMPATHY, PRAISE","impression_count":1594,"source":"activity"},{"is_my_post":true,"post_urn":"urn:li:activity:7280558082496069633","author_name":"Ravi Evani\n              \n                \n                   \n    \n      \n    \n    \n      \n    \n\n • You","author_profile_url":"https://www.linkedin.com/in/ravievani","author_headline":"Deploying enterprise agents in production / CTO / SWE Leader / GVP @ Publicis Sapient","posted_time":"2025-06-27","posted_hours_ago":8760,"posted_time_raw":"1yr","post_url":"https://www.linkedin.com/feed/update/urn:li:activity:7280558082496069633","author_profile_image_url":"https://media.licdn.com/dms/image/v2/C4E03AQGNeJRorEd2Nw/profile-displayphoto-shrink_100_100/profile-displayphoto-shrink_100_100/0/1569287114631?e=1784160000&v=beta&t=tJDZC7EXWnlgIIf8kF7fBCajhF-HEgzNXnz_IIkjqW8","post_text":"How you debug software is changing! AI coding agents are demanding faster higher-level thinking from developers, especially for debugging and troubleshooting problems.\n\nWe're noticing that assistants, like cursor’s composer agent mode, which iteratively write, run, and debug code—push us to troubleshoot at a higher level and focus on the chunks of logic behind the code rather than the lines of code itself. They also fix basic errors so quickly that we lose the buffer of time to step through and internalize each line like we used to (see clip).\n\nThis means we now have to make bigger-picture logical decisions faster, which is a new challenge. Here’s why:\n\nSpecification Clarity Over Syntax:\nWhen you delegate coding tasks to an agent, ambiguity in your low level requirements becomes the real bug. Fixes center on tightening your specs and instructions, rather than tweaking individual lines.\n\nThinking in Systems:\nWith routine errors handled, you need to step back and consider input conditions and edge cases that the AI did not. The “code” is easy; defining the right context and coverage is the challenge.\n\nAccelerated Focus:\nIt’s now about translating problems into unambiguous instructions and validating assumptions. You still debug, but in larger chunks, at an accelerated level—ensuring your logic aligns with the intended outcomes.\n\nGiven this shift, developers should refocus their efforts on learning to clarify specifications, anticipating edge cases, and making rapid, high-level decisions while AI handles the details.\n===\n\nhashtag#ai hashtag#aiEngineering\nP.S.: Clip of an ai agent executing, debugging, troubleshooting, fixing and repeating the cycle.","post_image_url":"https://media.licdn.com/dms/image/v2/D4E05AQGlMgyYIITZ9w/feedshare-thumbnail_720_1280/B4EZQm831kGYA8-/0/1735820280680?e=1783137600&v=beta&t=Lu8V4DsFYBd5JGbwPU7P-yA9EiVU_aHknLN6YKxObPk","is_article":false,"article_url":null,"article_title":null,"article_description":null,"is_video":true,"video_url":"https://media.licdn.com/dms/image/v2/D4E05AQGlMgyYIITZ9w/feedshare-thumbnail_720_1280/B4EZQm831kGYA8-/0/1735820280680?e=1783137600&v=beta&t=Lu8V4DsFYBd5JGbwPU7P-yA9EiVU_aHknLN6YKxObPk","has_image":true,"reaction_count":11,"reaction_types":"LIKE, INTEREST","impression_count":1406,"source":"activity"},{"is_my_post":true,"post_urn":"urn:li:activity:7279943255222325248","author_name":"Ravi Evani\n              \n                \n                   \n    \n      \n    \n    \n      \n    \n\n • You","author_profile_url":"https://www.linkedin.com/in/ravievani","author_headline":"Deploying enterprise agents in production / CTO / SWE Leader / GVP @ Publicis Sapient","posted_time":"2025-06-27","posted_hours_ago":8760,"posted_time_raw":"1yr","post_url":"https://www.linkedin.com/feed/update/urn:li:activity:7279943255222325248","author_profile_image_url":"https://media.licdn.com/dms/image/v2/C4E03AQGNeJRorEd2Nw/profile-displayphoto-shrink_100_100/profile-displayphoto-shrink_100_100/0/1569287114631?e=1784160000&v=beta&t=tJDZC7EXWnlgIIf8kF7fBCajhF-HEgzNXnz_IIkjqW8","post_text":"Date/time handling has always been messy in code, so I'm letting Claude handle the chaos of parsing freeform scheduling requests and turning them into structured JSON. Did I cover most ways dates and times are mentioned when people schedule meetings?","post_image_url":"https://media.licdn.com/dms/image/v2/D4E22AQG9K87Vc_RreA/feedshare-shrink_800/B4EZQeNzokHAAg-/0/1735673725496?e=1784160000&v=beta&t=O-N15Ft-9nFMQvV3-Jh-VlyX1dKcwVgXVECSUsWrUoU","is_article":false,"article_url":null,"article_title":null,"article_description":null,"is_video":false,"video_url":null,"has_image":true,"reaction_count":8,"reaction_types":"LIKE","comment_count":4,"impression_count":1867,"source":"activity"},{"is_my_post":true,"post_urn":"urn:li:activity:7279754046851219456","author_name":"Ravi Evani\n              \n                \n                   \n    \n      \n    \n    \n      \n    \n\n • You","author_profile_url":"https://www.linkedin.com/in/ravievani","author_headline":"Deploying enterprise agents in production / CTO / SWE Leader / GVP @ Publicis Sapient","posted_time":"2025-06-27","posted_hours_ago":8760,"posted_time_raw":"1yr","post_url":"https://www.linkedin.com/feed/update/urn:li:activity:7279754046851219456","author_profile_image_url":"https://media.licdn.com/dms/image/v2/C4E03AQGNeJRorEd2Nw/profile-displayphoto-shrink_100_100/profile-displayphoto-shrink_100_100/0/1569287114631?e=1784160000&v=beta&t=tJDZC7EXWnlgIIf8kF7fBCajhF-HEgzNXnz_IIkjqW8","post_text":"Writing and executing comprehensive unit tests doesn't have to be a tedious grind anymore. Here is the demo of a unit testing ai agent for an Azure function—it auto-generates a complete test harness, runs the tests, and even delivers an Excel report with the results.\n\nhashtag#ai hashtag#aiEngineering\nP.S Here is a link to the prompts.md https://lnkd.in/eekVFqk9","post_image_url":"https://media.licdn.com/dms/image/v2/D4E05AQEJwvMb0_-DMQ/feedshare-thumbnail_720_1280/B4EZQbhauSHgA8-/0/1735628535115?e=1783137600&v=beta&t=mG-4ZDT-NiZ8xGkpEls6jh09Yst9VDQgVughVfruTwo","is_article":false,"article_url":null,"article_title":null,"article_description":null,"is_video":true,"video_url":"https://media.licdn.com/dms/image/v2/D4E05AQEJwvMb0_-DMQ/feedshare-thumbnail_720_1280/B4EZQbhauSHgA8-/0/1735628535115?e=1783137600&v=beta&t=mG-4ZDT-NiZ8xGkpEls6jh09Yst9VDQgVughVfruTwo","has_image":true,"reaction_count":17,"reaction_types":"LIKE, EMPATHY","impression_count":1699,"source":"activity"},{"is_my_post":true,"post_urn":"urn:li:activity:7279530695423606784","author_name":"Ravi Evani\n              \n                \n                   \n    \n      \n    \n    \n      \n    \n\n • You","author_profile_url":"https://www.linkedin.com/in/ravievani","author_headline":"Deploying enterprise agents in production / CTO / SWE Leader / GVP @ Publicis Sapient","posted_time":"2025-06-27","posted_hours_ago":8760,"posted_time_raw":"1yr","post_url":"https://www.linkedin.com/feed/update/urn:li:activity:7279530695423606784","author_profile_image_url":"https://media.licdn.com/dms/image/v2/C4E03AQGNeJRorEd2Nw/profile-displayphoto-shrink_100_100/profile-displayphoto-shrink_100_100/0/1569287114631?e=1784160000&v=beta&t=tJDZC7EXWnlgIIf8kF7fBCajhF-HEgzNXnz_IIkjqW8","post_text":"Called this a year ago 👀! Meta research recently published the \"LCM architecture\" https://lnkd.in/e5vMUtkN which operates on a *concept* vs *token* as the base unit of prediction.\n\nBack then, to me it was more of an intuition rather than a scientifically-backed theory, but Meta's research team might now validate this approach empirically.\n\nNow the next progression is for a piece of \"programming logic\" to be treated as a \"concept\". That would enable the prediction of subsequent \"logic\" sequences—which could be the pathway to better AI reasoning, because programming logic follows human thinking.\n\nBased on this, I would go as far as saying that the answer to Type 2/ System 2 thinking for AI will come from crawling codebases. Training the LCM architecture on code could help bridge the gap between AI's current capabilities and more systematic reasoning approaches.\n\nMy original post on this: https://lnkd.in/ee_hukrx","post_image_url":"https://media.licdn.com/dms/image/v2/D4E05AQHOuVwmnmssyA/feedshare-thumbnail_720_1280/feedshare-thumbnail_720_1280/0/1705282774171?e=1783137600&v=beta&t=O26eFPWyo3KQ1u145lpFbOlFr3oKvunI_mcyjHIaNgY","is_article":false,"article_url":null,"article_title":null,"article_description":null,"is_video":true,"video_url":"https://media.licdn.com/dms/image/v2/D4E05AQHOuVwmnmssyA/feedshare-thumbnail_720_1280/feedshare-thumbnail_720_1280/0/1705282774171?e=1783137600&v=beta&t=O26eFPWyo3KQ1u145lpFbOlFr3oKvunI_mcyjHIaNgY","has_image":true,"reaction_count":3,"reaction_types":"LIKE","repost_count":1,"impression_count":229,"source":"activity"},{"is_my_post":true,"post_urn is Sapient","posted_time":"2025-06-27","posted_hours_ago":8760,"posted_time_raw":"1yr","post_url":"https://www.linkedin.com/feed/update/urn:li:activity:7269388118976335875","author_profile_image_url":"https://media.licdn.com/dms/image/v2/C4E03AQGNeJRorEd2Nw/profile-displayphoto-shrink_100_100/profile-displayphoto-shrink_100_100/0/1569287114631?e=1784160000&v=beta&t=tJDZC7EXWnlgIIf8kF7fBCajhF-HEgzNXnz_IIkjqW8","post_text":"Your PMs perfect backlogs. Designers craft pixel-polished screens. Devs write pristine code. Yet your AI still under-delivers. Why?\n\nYour team's spending 90% of time building scaffolding, while prompt engineering—the brain of your AI, gets table scraps.\n\nThe harsh truth about enterprise gen AI development is that the core of the solution that derives the \"intelligence\", i.e. prompt engineering gets a fraction of the time and effort it really should.\n\nWhy? Teams tend to gravitate toward their comfort zones—leaving the critical but squishy, uncharted territory of crafting, evaluating, and iterating on prompts underinvested. Yet, this uncharted territory is where the biggest gains in intelligence and value are unlocked.\n\nA well-designed prompt chain can unlock the model’s full potential, while settling for mediocrity leaves considerable value on the table.\n\nTime to flip the script. Here are your key moves to invest considerable time and effort in prompt engineering:\n① Go beyond \"It works\": Analyze model outputs closely.\n② Build resilience: Evaluate and refine for (the numerous) edge cases.\n③Track the logic: Understand the model's reasoning and adapt accordingly.\n④Context is king: Guide with semantically significant data.\n\nNail these, and you have a much better chance of delivering real enterprise value—not just demos that \"work\".\n\nhashtag#ai hashtag#aiEngineering","post_image_url":"https://media.licdn.com/dms/image/v2/D4E22AQE33upp7imM5w/feedshare-shrink_800/feedshare-shrink_800/0/1733157184514?e=1784160000&v=beta&t=VR_ckBOx4FR tware development.\n▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬","post_image_url":"https://media.licdn.com/dms/image/v2/D4E05AQHD8j5jVpq81g/feedshare-thumbnail_720_1280/feedshare-thumbnail_720_1280/0/1732369220493?e=1783137600&v=beta&t=HGqI5--IE4LBWOsQPeHBSxROYnqQfWQUPwsHAxut3rw","is_article":false,"article_url":null,"article_title":null,"article_description":null,"is_video":true,"video_url":"https://media.licdn.com/dms/image/v2/D4E05AQHD8j5jVpq81g/feedshare-thumbnail_720_1280/feedshare-thumbnail_720_1280/0/1732369220493?e=1783137600&v=beta&t=HGqI5--IE4LBWOsQPeHBSxROYnqQfWQUPwsHAxut3rw","has_image":true,"reaction_count":128,"reaction_types":"LIKE, EMPATHY, PRAISE","comment_count":7,"repost_count":11,"impression_count":4051,"source":"activity"},{"is_my_post":true,"post_urn":"urn:li:activity:7265400384523833346","author_name":"Ravi Evani\n              \n                \n                   \n    \n      \n    \n    \n      \n    \n\n • You","author_profile_url":"https://www.linkedin.com/in/ravievani","author_headline":"Deploying enterprise agents in production / CTO / SWE Leader / GVP @ Publicis Sapient","posted_time":"2025-06-27","posted_hours_ago":8760,"posted_time_raw":"1yr","post_url":"https://www.linkedin.com/feed/update/urn:li:activity:7265400384523833346","author_profile_image_url":"https://media.licdn.com/dms/image/v2/C4E03AQGNeJRorEd2Nw/profile-displayphoto-shrink_100_100/profile-displayphoto-shrink_100_100/0/1569287114631?e=1784160000&v=beta&t=tJDZC7EXWnlgIIf8kF7fBCajhF-HEgzNXnz_IIkjqW8","post_text":"AI Engineering + Curiosity + Laughter: The Perfect Stack!\n\n28 of our NA Engineering leaders flew into Boston to crush it with code, curiosity, and camaraderie. An epic day watching them dive into agent development. Because when leaders roll up their sleeves and go hands-on, our teams soar and our clients win! 🌟🚀\n\nhashtag#ai hashtag#aiEngineering Publicis Sapient\nRachit Amit Thanu Jibi Avnish Bryan Malini Ashutosh 🌐Saurabh Nirav Hansraj Gopal Michael Keemti Deepak Anshul Utsav Silas Deepak Joe Reid Mihir Manpreet Balaji Pratyush Laura Gigi Sarah","post_image_url":"https://media.licdn.com/dms/image/v2/D4E22AQEeJ8ffk1HNjA/feedshare-shrink_800/feedshare-shrink_800/0/1732206434792?e=1784160000&v=beta&t=pTkEo14V5QXMdrU1kcD1Cle5zzhn-YQGOzdPsmdpxSk","is_article":false,"article_url":null,"article_title":null,"article_description":null,"is_video":false,"video_url":null,"has_image":true,"reaction_count":274,"reaction_types":"LIKE, PRAISE, EMPATHY","comment_count":2,"repost_count":4,"impression_count":19789,"source":"activity"},{"is_my_post":true,"post_urn":"urn:li:activity:7264624655573958657","author_name":"Ravi Evani\n              \n                \n                   \n    \n      \n    \n    \n      \n    \n\n • You","author_profile_url":"https://www.linkedin.com/in/ravievani","author_headline":"Deploying enterprise agents in production / CTO / SWE Leader / GVP @ Publicis Sapient","posted_time":"2025-06-27","posted_hours_ago":8760,"posted_time_raw":"1yr","post_url":"https://www.linkedin.com/feed/update/urn:li:activity:7264624655573958657","author_profile_image_url":"https://media.licdn.com/dms/image/v2/C4E03AQGNeJRorEd2Nw/profile-displayphoto-shrink_100_100/profile-displayphoto-shrink_100_100/0/1569287114631?e=1784160000&v=beta&t=tJDZC7EXWnlgIIf8kF7fBCajhF-HEgzNXnz_IIkjqW8","post_text":"Open AI's function calling approach is risky for non-trivial enterprise AI agents. Here is how to bring in your own safety net.\n\nUsing OpenAI’s approach (https://lnkd.in/eRA2XjU6) and letting the LLM decide which function to call and with what arguments can lead to serious issues—like persisting incorrect data in your systems.\n\nHere’s a safer approach:\n① LLM Suggests, You Validate: Have the LLM provide structured output with suggested function calls, arguments, and reasoning for its choices.\n② Your App Decides: Your app evaluates the LLM’s reasoning, deterministically deciding if the function call and arguments make sense given the context.\n③ Fallback for Edge Cases: If your app is unable to deterministically decide for certain conditions, either:\n↳ Do nothing (no-op) and inform the user / client,\n↳ Prompt the LLM for more clarity, or\n↳ Proceed with the LLM’s suggestion if the risk is acceptable.\n\nThis ensures that for most anticipated scenarios, you reduce inappropriate function calls and arguments while maintaining control.\n\nDeterministic validation is the key to safer, smarter agentic AI.","post_image_url":"https://media.licdn.com/dms/image/v2/D4E22AQEgPvBaU_TTGw/feedshare-shrink_800/feedshare-shrink_800/0/1732021487463?e=1784160000&v=beta&t=nsa2-5T435DIM8aa37PuM_UvjMeOrC9jBAsieEOqeQA","is_article":false,"article_url":null,"article_title":null,"article_description":null,"is_video":false,"video_url":null,"has_image":true,"reaction_count":29,"reaction_types":"LIKE, APPRECIATION","comment_count":2,"impression_count":1898,"source":"activity"},{"is_my_post":true,"post_urn":"urn:li:activity:7262557996608622593","author_name":"Ravi Evani\n              \n                \n                   \n    \n      \n    \n    \n      \n    \n\n • You","author_profile_url":"https://www.linkedin.com/in/ravievani","author_headline":"Deploying enterprise agents in production / CTO / SWE Leader / GVP @ Publicis Sapient","posted_time":"2025-06-27","posted_hours_ago":8760,"posted_time_raw":"1yr","post_url":"https://www.linkedin.com/feed/update/urn:li:activity:7262557996608622593","author_profile_image_url":"https://media.licdn.com/dms/image/v2/C4E03AQGNeJRorEd2Nw/profile-displayphoto-shrink_100_100/profile-displayphoto-shrink_100_100/0/1569287114631?e=1784160000&v=beta&t=tJDZC7EXWnlgIIf8kF7fBCajhF-HEgzNXnz_IIkjqW8","post_text":"Where serious ai engineering meets serious fun: Challenge accepted!\n\nOur engineering leaders didn't fly in to Chicago just to talk AI Agents - they upskilled themselves hands-on! Nothing like watching brilliant minds hit refresh and create magic together 🚀✨\n\nhashtag#ai hashtag#aiEngineering Publicis Sapient\n\nSushil Amit Naveen Brian Darshit Neelesh Sudip Harsha Ajeet Sachin Roshan Ben Hariharan Anil Shabuddin Rohit Laura Saurabh Sarah Gigi Rylee","post_image_url":"https://media.licdn.com/dms/image/v2/D4E22AQHbMaNbZBwFhw/feedshare-shrink_800/feedshare-shrink_800/0/1731528757158?e=1784160000&v=beta&t=HeyoCuxNZvzImXtIhEnQz8PvUhrKIwfI1_OscW4XQLA","is_article":false,"article_url":null,"article_title":null,"article_description":null,"is_video":false,"video_url":null,"has_image":true,"reaction_count":346,"reaction_types":"LIKE, EMPATHY, PRAISE","comment_count":4,"impression_count":33098,"source":"activity"},{"is_my_post":true,"post_urn":"urn:li:activity:7261179953709215744","author_name":"Ravi Evani\n              \n                \n                   \n    \n      \n    \n    \n      \n    \n\n • You","author_profile_url":"https://www.linkedin.com/in/ravievani","author_headline":"Deploying enterprise agents in production / CTO / SWE Leader / GVP @ Publicis Sapient","posted_time":"2025-06-27","posted_hours_ago":8760,"posted_time_raw":"1yr","post_url":"https://www.linkedin.com/feed/update/urn:li:activity:7261179953709215744","author_profile_image_url":"https://media.licdn.com/dms/image/v2/C4E03AQGNeJRorEd2Nw/profile-displayphoto-shrink_100_100/profile-displayphoto-shrink_100_100/0/1569287114631?e=1784160000&v=beta&t=tJDZC7EXWnlgIIf8kF7fBCajhF-HEgzNXnz_IIkjqW8","post_text":"A throwback to Indian mythology, exploring the evolving bond between software engineers and AI codebots.\n\nhashtag#ai hashtag#EngineeringNext hashtag#YouandAI Publicis Sapient\n\n==\nP.S: If you want to move from AI hype to reality—take a look at my perspective on where to direct your AI focus in 2025: https://lnkd.in/eHmx-PqB","post_image_url":"https://media.licdn.com/dms/image/v2/D4E05AQGk2UOWxcAPRQ/videocover-high/videocover-high/0/1731200118307?e=1783137600&v=beta&t=QswH5vG7W790iLADArqCXv2psDsPoKVi-dtXNpT_Bvg","is_article":false,"article_url":null,"article_title":null,"article_description":null,"is_video":true,"video_url":"https://media.licdn.com/dms/image/v2/D4E05AQGk2UOWxcAPRQ/videocover-high/videocover-high/0/1731200118307?e=1783137600&v=beta&t=QswH5vG7W790iLADArqCXv2psDsPoKVi-dtXNpT_Bvg","has_image":true,"reaction_count":133,"reaction_types":"LIKE, EMPATHY, INTEREST","comment_count":9,"repost_count":5,"impression_count":22719,"source":"activity"},{"is_my_post":true,"post_urn":"urn:li:activity:7256837275022512128","author_name":"Ravi Evani\n              \n                \n                   \n    \n      \n    \n    \n      \n    \n\n • You","author_profile_url":"https://www.linkedin.com/in/ravievani","author_headline":"Deploying enterprise agents in production / CTO / SWE Leader / GVP @ Publicis Sapient","posted_time":"2025-06-27","posted_hours_ago":8760,"posted_time_raw":"1yr","post_url":"https://www.linkedin.com/feed/update/urn:li:activity:7256837275022512128","author_profile_image_url":"https://media.licdn.com/dms/image/v2/C4E03AQGNeJRorEd2Nw/profile-displayphoto-shrink_100_100/profile-displayphoto-shrink_100_100/0/1569287114631?e=1784160000&v=beta&t=tJDZC7EXWnlgIIf8kF7fBCajhF-HEgzNXnz_IIkjqW8","post_text":"Starting your first AI/LLM project? Get ready for the Impedance Mismatch!\n\nShifting from traditional software to AI Engineering requires a mindset change, and can be unsettling to engineers grappling with the stochastic nature of LLMs:\n\n↳ Logic Structure: In traditional software, same input means same output. LLMs are more unpredictable—the same input can give different results every time.\n\n↳ Testing Approach: Unit tests in software give pass/fail results. With LLMs, you need repeated \"evals\" to validate outputs.\n\n↳ Design and Requirements: Software logic is set upfront. In AI, prompts and model behavior evolve through trial, error, and feedback.\n\n↳ Debugging Process: Troubleshooting is linear—trace the issue & fix the code. In AI, troubleshooting could mean refining prompts, adjusting parameters or context data, or instruction-tuning the model.\n\n↳ Version Control: Software is version controlled via code and config changes. In AI, you need to version and manage prompts, instructions, and outputs just as carefully.\n\n↳ Reusability: With code—functions and modules get reused. With AI, you build and share prompt libraries and response patterns to not reinvent the wheel.\n\n↳ Lifecycle of Development: In Agile, \"stories\" is often considered “done” once it ships. AI systems need ongoing attention, with prompts and settings tweaked as things evolve.\n\n↳ Performance Monitoring: Software performance is tracked with clear metrics like response time or error rate. In AI, monitoring is also meant to catch drift in output from when the AI system was deployed.\n\nThis new way of working will feel unfamiliar at first—but lean into those changes to unlock AI's potential!\n\nhashtag#ai hashtag#aiEngineering","post_image_url":"https://media.licdn.com/dms/image/v2/D4E22AQGB6c8ux4EL6A/feedshare-shrink_800/feedshare-shrink_800/0/1730164831117?e=1784160000&v=beta&t=GSzhUzjVVXelT62x4EbA6zYw4qJnmBv3nOhDVRQUeZg","is_article":false,"article_url":null,"article_title":null,"article_description":null,"is_video":false,"video_url":null,"has_image":true,"reaction_count":24,"reaction_types":"LIKE","impression_count":1290,"source":"activity"},{"is_my_post":true,"post_urn":"urn:li:activity:7256279792516231169","author_name":"Ravi Evani\n              \n                \n                   \n    \n      \n    \n    \n      \n    \n\n • You","author_profile_url":"https://www.linkedin.com/in/ravievani","author_headline":"Deploying enterprise agents in production / CTO / SWE Leader / GVP @ Publicis Sapient","posted_time":"2025-06-27","posted_hours_ago":8760,"posted_time_raw":"1yr","post_url":"https://www.linkedin.com/feed/update/urn:li:activity:7256279792516231169","author_profile_image_url":"https://media.licdn.com/dms/image/v2/C4E03AQGNeJRorEd2Nw/profile-displayphoto-shrink_100_100/profile-displayphoto-shrink_100_100/0/1569287114631?e=1784160000&v=beta&t=tJDZC7EXWnlgIIf8kF7fBCajhF-HEgzNXnz_IIkjqW8","post_text":"\"Two AI Roadmaps\" Strategy for IT Managers:\nThere are two distinct paths to consider in your 2025 AI strategy—each will mature at its own pace:\n\n1. AI-Enabled Application Development: Use AI to accelerate how your teams build software. Think automation of code generation, testing, prototyping, and maintenance. By 2025, expect to move from the early “crawl” phase, where AI assists in small tasks, to “walk,” where it becomes an essential part of daily development. By 2026-2027, AI will be fully integrated, enabling your teams to “run” with highly efficient workflows and minimal manual intervention.\n\n2. AI-Enabled End-User Applications: Build products with AI embedded directly into the user experience. Today, most orgs are still in the “crawl” stage, experimenting with initial use cases. By 2026, the shift will move to “walk” as more reliable AI-powered features become standard in user-facing applications. By 2027, those who master this path will “run,” delivering seamless AI-driven experiences as a core part of their products.\n\nThe Reality Check\n↳ Focus on what creates leverage: Pick your battles. Not everything needs AI—focus where it moves the needle. Use this: https://lnkd.in/eK_UGMzA as a mental model.\n\n↳ Timing matters: Not everything moves at the same pace. Your dev teams will adopt AI faster than your users – plan accordingly.\n\n↳ Aim for adaptability: Treat your AI roadmaps as living frameworks, not rigid playbooks. The same goes for your Enterprise AI Stack: https://lnkd.in/eaHPSGFF. This space will evolve —your strategy/stack must too.\n\nThis dual approach ensures you can capture value at both the back-end (development) and front-end (products). Balancing both roadmaps will position you to lead, not follow, as AI becomes an integral part of every business operation.\n\nhashtag#ai hashtag#aiengineering","post_image_url":"https://media.licdn.com/dms/image/v2/D4E22AQGhamcgnIJU4Q/feedshare-shrink_800/feedshare-shrink_800/0/1730031917036?e=1784160000&v=beta&t=JDq1zkUszb6GENZsJ5UOLDq0EY0hvBNxhta4fQjMr0s","is_article":false,"article_url":null,"article_title":null,"article_description":null,"is_video":false,"video_url":null,"has_image":true,"reaction_count":31,"reaction_types":"LIKE, EMPATHY","impression_count":2297,"source":"activity"},{"is_my_post":true,"post_urn":"urn:li:activity:7255575339559481344","author_name":"Ravi Evani\n              \n                \n                   \n    \n      \n    \n    \n      \n    \n\n • You","author_profile_url":"https://www.linkedin.com/in/ravievani","author_headline":"Deploying enterprise agents in production / CTO / SWE Leader / GVP @ Publicis Sapient","posted_time":"2025-06-27","posted_hours_ago":8760,"posted_time_raw":"1yr","post_url":"https://www.linkedin.com/feed/update/urn:li:activity:7255575339559481344","author_profile_image_url":"https://media.licdn.com/dms/image/v2/C4E03AQGNeJRorEd2Nw/profile-displayphoto-shrink_100_100/profile-displayphoto-shrink_100_100/0/1569287114631?e=1784160000&v=beta&t=tJDZC7EXWnlgIIf8kF7fBCajhF-HEgzNXnz_IIkjqW8","post_text":"Planning to standardize your enterprise AI stack in 2025 to fill that need for 'certainty'?\n\nClaude just got computer hands and IBM just open-sourced Granite.\n\nYour rigid playbook might be outdated before the ink dries.\n\nWhile all LLMs might communicate through \"language\"—switching the LLM your applications use is less like swapping an API, and more like changing the OS or the database providers they rely on. It’s way more complex than one would think.\n\nSo, what should you be doing instead of standardizing your AI stack?\n\nThe answer is to lean in on classic architectural patterns and design towards a composable AI stack. Have components with clear boundaries, well defined abstractions, interfaces and adapters to make upgrades and swaps as painless as possible.\n\nDesign your AI stack to be adaptable to better models as they emerge. When a 2X better model or vector DB drops (and it will) your applications should be able to take advantage of them without your architecture turning into technical debt.\n\nhashtag#ai hashtag#aiengineering hashtag#EnterpriseArchitecture","post_image_url":null,"is_article":false,"article_url":null,"article_title":null,"article_description":null,"is_video":false,"video_url":null,"has_image":false,"reaction_count":14,"reaction_types":"LIKE, EMPATHY","impression_count":1181,"source":"activity"},{"is_my_post":true,"post_urn":"urn:li:activity:7255002564197289985","author_name":"Ravi Evani\n              \n                \n                   \n    \n      \n    \n    \n      \n    \n\n • You","author_profile_url":"https://www.linkedin.com/in/ravievani","author_headline":"Deploying enterprise agents in production / CTO / SWE Leader / GVP @ Publicis Sapient","posted_time":"2025-06-27","posted_hours_ago":8760,"posted_time_raw":"1yr","post_url":"https://www.linkedin.com/feed/update/urn:li:activity:7255002564197289985","author_profile_image_url":"https://media.licdn.com/dms/image/v2/C4E03AQGNeJRorEd2Nw/profile-displayphoto-shrink_100_100/profile-displayphoto-shrink_100_100/0/1569287114631?e=1784160000&v=beta&t=tJDZC7EXWnlgIIf8kF7fBCajhF-HEgzNXnz_IIkjqW8","post_text":"The big AI players want you to transform everything—but as an IT Manager, here is where you should focus your AI investments in 2025.\n\n----\n——\n\nP.S:Here is my \"Two Roadmaps\" AI strategy for IT Managers: https://lnkd.in/eiBRf9Qx\n\nP.P.S: Two Clarifications, for those technically inclined:\n1. When I say \"AI Agents\", I mean the term loosely—mainly referring to coded, deterministic workflows that invoke AI models, with very limited cases where the AI models themselves make nondeterministic decisions to control the flow. Some examples here: https://lnkd.in/ejCUSivr and here: https://lnkd.in/eMq9Jv_5\n2. When I say \"fine-tuned models,\" I’m referring broadly to domain-specific optimizations, and not just one technique. This encompasses methods like RAG, instruction-based tuning, synthetic data, and more.\n\nhashtag#ai hashtag#aiengineering","post_image_url":"https://media.licdn.com/dms/image/v2/D4D05AQFJjgJ6c8wXNw/feedshare-thumbnail_720_1280/feedshare-thumbnail_720_1280/0/1729727343597?e=1783137600&v=beta&t=Ppgli9vwdJUqc4FY8MGN9dHDIeJA_bwYLnOeKZprN8A","is_article":false,"article_url":null,"article_title":null,"article_description":null,"is_video":true,"video_url":"https://media.licdn.com/dms/image/v2/D4D05AQFJjgJ6c8wXNw/feedshare-thumbnail_720_1280/feedshare-thumbnail_720_1280/0/1729727343597?e=1783137600&v=beta&t=Ppgli9vwdJUqc4FY8MGN9dHDIeJA_bwYLnOeKZprN8A","has_image":true,"reaction_count":110,"reaction_types":"LIKE, EMPATHY, INTEREST","comment_count":7,"impression_count":12430,"source":"activity"},{"is_my_post":true,"post_urn":"urn:li:activity:7254681248290291712","author_name":"Ravi Evani\n              \n                \n                   \n    \n      \n    \n    \n      \n    \n\n • You","author_profile_url":"https://www.linkedin.com/in/ravievani","author_headline":"Deploying enterprise agents in production / CTO / SWE Leader / GVP @ Publicis Sapient","posted_time":"2025-06-27","posted_hours_ago":8760,"posted_time_raw":"1yr","post_url":"https://www.linkedin.com/feed/update/urn:li:activity:7254681248290291712","author_profile_image_url":"https://media.licdn.com/dms/image/v2/C4E03AQGNeJRorEd2Nw/profile-displayphoto-shrink_100_100/profile-displayphoto-shrink_100_100/0/1569287114631?e=1784160000&v=beta&t=tJDZC7EXWnlgIIf8kF7fBCajhF-HEgzNXnz_IIkjqW8","post_text":"Gone might be the days of watching hotel staff play keyboard Olympics. Here is how hotel check-ins could change —with Claude (AI) using the computer (https://lnkd.in/e4-2QZXa) and juggling through the myriad of apps that hotel associates grapple with today.\n\n=======================================\n[BEGIN Scene: Upscale hotel lobby. Evening.]\n\nSARAH (Front Desk Associate): Welcome to Palmer Hotel!\n\nGUEST: Hi, checking in - James Martinez.\n\nCLAUDE (listening via microphone and speaking to Sarah via earpiece): Found. 5 nights, king suite. Repeat guest from Seattle. Gold member.\n\nSARAH (maintaining eye contact): Wonderful to have you, Mr. Martinez. Your king suite is ready.\n\nGUEST (surprised): That was fast - didn't even see you check a computer!\n\nCLAUDE (via earpiece into Sarah's ear): Room 1542 assigned. Digital key generated. Restaurant has salmon special - matches guest's previous room service.\n\nSARAH: We aim for effortless here. (smiling) By the way, our chef has an amazing salmon special tonight. As a Gold member, I can get you a preferred seating.\n\nGUEST: How did you know I like salmon? (impressed) Yes, please!\n\nCLAUDE (via earpiece, only Sarah hears): Booking dinner, 7:30 PM. Sending welcome package to room.\n\nSARAH: Perfect - you're set for dinner at 7:30, and your room key is ready on your phone. Room 1542 has a lovely sunset view you can catch if you head up now.\n\nGUEST (heading to elevator): Best check-in ever. Thanks!\n\nCLAUDE (to Sarah): Check-in complete. Next guest: Anniversary couple, 2 minutes out.\n\nSARAH (quietly): Thanks, Claude.\n\n[END]\n\n=======================================\n\nThe future of hospitality isn't about replacing humans – it's about letting us be more human.\n\nhashtag#genAI hashtag#Travel hashtag#Hospitality","post_image_url":"https://media.licdn.com/dms/image/v2/D4E22AQETG4Xs5-QPnA/feedshare-shrink_800/feedshare-shrink_800/0/1729650793587?e=1784160000&v=beta&t=AttUEiadg-aGfKuXtZLOMm6rEr-G3JiSVoHx1TjERX0","is_article":false,"article_url":null,"article_title":null,"article_description":null,"is_video":false,"video_url":null,"has_image":true,"reaction_count":34,"reaction_types":"LIKE, EMPATHY, PRAISE","comment_count":3,"impression_count":1730,"source":"activity"},{"is_my_post":true,"post_urn":"urn:li:activity:7254339211149955072","author_name":"Ravi Evani\n              \n                \n                   \n    \n      \n    \n    \n      \n    \n\n • You","author_profile_url":"https://www.linkedin.com/in/ravievani","author_headline":"Deploying enterprise agents in production / CTO / SWE Leader / GVP @ Publicis Sapient","posted_time":"2025-06-27","posted_hours_ago":8760,"posted_time_raw":"1yr","post_url":"https://www.linkedin.com/feed/update/urn:li:activity:7254339211149955072","author_profile_image_url":"https://media.licdn.com/dms/image/v2/C4E03AQGNeJRorEd2Nw/profile-displayphoto-shrink_100_100/profile-displayphoto-shrink_100_100/0/1569287114631?e=1784160000&v=beta&t=tJDZC7EXWnlgIIf8kF7fBCajhF-HEgzNXnz_IIkjqW8","post_text":"2025 Prediction: Travel, Dining & Hospitality Enterprise AI Agents will NOT automate entire workflows, tasks, or subtasks. But those atomic steps? That's where the magic could likely happen.\n\nRestaurant:\nQ: \"Will AI Agents automate our kitchen quality control?\"\nA: \"Think smaller, but useful - it'll scan Yelp reviews and auto-flag exactly which dishes are getting complaints about taste. Not the whole prep workflow, just that one specific quality check step.\"\n\nHotel:\nQ: \"Will AI Agents automate our room availability updates?\"\nA: \"Think smaller, but useful - it'll monitor incoming guest messages and auto-detect which 'early check-in' requests can actually be accommodated based on real-time room turnover data. Just that one decision point, not the whole check-in process.\"\n\nAirline:\nQ: \"Will AI Agents automate our delay compensation process?\"\nA: \"Think smaller, but useful - when a flight is delayed, it'll automatically calculate optimal meal voucher amounts based on delay time and passenger class. Just that specific calculation step, not the whole rebooking process.\"\n\nhashtag#ai hashtag#Travel hashtag#Hospitaity hashtag#Dining","post_image_url":"https://media.licdn.com/dms/image/v2/D4E05AQFh7MneKKXlnw/videocover-high/videocover-high/0/1729569229596?e=1783137600&v=beta&t=RemEQyI3PW0ZpgcRa8Ou6h09c_Rs0gQS4IC9Gy59JEg","is_article":false,"article_url":null,"article_title":null,"article_description":null,"is_video":true,"video_url":"https://media.licdn.com/dms/image/v2/D4E05AQFh7MneKKXlnw/videocover-high/videocover-high/0/1729569229596?e=1783137600&v=beta&t=RemEQyI3PW0ZpgcRa8Ou6h09c_Rs0gQS4IC9Gy59JEg","has_image":true,"reaction_count":27,"reaction_types":"LIKE, EMPATHY, PRAISE","impression_count":1776,"source":"activity"},{"is_my_post":true,"post_urn":"urn:li:activity:7253516750426632193","author_name":"Ravi Evani\n              \n                \n                   \n    \n      \n    \n    \n      \n    \n\n • You","author_profile_url":"https://www.linkedin.com/in/ravievani","author_headline":"Deploying enterprise agents in production / CTO / SWE Leader / GVP @ Publicis Sapient","posted_time":"2025-06-27","posted_hours_ago":8760,"posted_time_raw":"1yr","post_url":"https://www.linkedin.com/feed/update/urn:li:activity:7253516750426632193","author_profile_image_url":"https://media.licdn.com/dms/image/v2/C4E03AQGNeJRorEd2Nw/profile-displayphoto-shrink_100_100/profile-displayphoto-shrink_100_100/0/1569287114631?e=1784160000&v=beta&t=tJDZC7EXWnlgIIf8kF7fBCajhF-HEgzNXnz_IIkjqW8","post_text":"Demo of creating a Data Product on Google Cloud using Slingshot, our AI-assisted SDLC platform.\n\nIn this Data Product, we're combining customer profiles, transaction data, and behavior insights to power personalized marketing across owned and paid channels. See how quickly it all comes together!\n\nAbhishek Kapoor Sameer Arora Violette dos Santos\n\nPublicis Sapient hashtag#genAI hashtag#AAA","post_image_url":"https://media.licdn.com/dms/image/v2/D4E05AQE3Af5FTzcmng/videocover-high/videocover-high/0/1729373069054?e=1783137600&v=beta&t=lHnEBYZUwZYXz06_p0MJzJknK9RCsWBsO31xXspYguk","is_article":false,"article_url":null,"article_title":null,"article_description":null,"is_video":true,"video_url":"https://media.licdn.com/dms/image/v2/D4E05AQE3Af5FTzcmng/videocover-high/videocover-high/0/1729373069054?e=1783137600&v=beta&t=lHnEBYZUwZYXz06_p0MJzJknK9RCsWBsO31xXspYguk","has_image":true,"reaction_count":85,"reaction_types":"LIKE, EMPATHY, PRAISE","comment_count":2,"repost_count":8,"impression_count":6637,"source":"activity"},{"is_my_post":true,"post_urn":"urn:li:activity:7251889911056711681","author_name":"Ravi Evani\n              \n                \n                   \n    \n      \n    \n    \n      \n    \n\n • You","author_profile_url":"https://www.linkedin.com/in/ravievani","author_headline":"Deploying enterprise agents in production / CTO / SWE Leader / GVP @ Publicis Sapient","posted_time":"2025-06-27","posted_hours_ago":8760,"posted_time_raw":"1yr","post_url":"https://www.linkedin.com/feed/update/urn:li:activity:7251889911056711681","author_profile_image_url":"https://media.licdn.com/dms/image/v2/C4E03AQGNeJRorEd2Nw/profile-displayphoto-shrink_100_100/profile-displayphoto-shrink_100_100/0/1569287114631?e=1784160000&v=beta&t=tJDZC7EXWnlgIIf8kF7fBCajhF-HEgzNXnz_IIkjqW8","post_text":"Yes, we have AI – but let’s also make sure we’re using the right tool for the job.\n\nHere is a mental model I have found useful for real world business applications:\n\n➜ If a task can be predetermined, then stick with traditional programming. It's predictable, reliable and less likely to land you in trouble.\n\n➜ If a task can be predetermined, but AI gets you there faster and efficiently with human judgment as quality control, then go with AI+Human.\n\n➜ If a task cannot be predetermined, then go with AI+Human, or Human only.\n\nWhat do you think?\n\nhashtag#ai hashtag#genai","post_image_url":"https://media.licdn.com/dms/image/v2/D4E22AQGBFSvXRGG_hQ/feedshare-shrink_800/feedshare-shrink_800/0/1728985287673?e=1784160000&v=beta&t=iYhfSbf6DaQq1zRYqksyh1XuUye2o8Wnf4WeEa2jWus","is_article":false,"article_url":null,"article_title":null,"article_description":null,"is_video":false,"video_url":null,"has_image":true,"reaction_count":39,"reaction_types":"LIKE, INTEREST, EMPATHY","impression_count":2319,"source":"activity"},{"is_my_post":true,"post_urn":"urn:li:activity:7251597258247274496","author_name":"Ravi Evani\n              \n                \n                   \n    \n      \n    \n    \n      \n    \n\n • You","author_profile_url":"https://www.linkedin.com/in/ravievani","author_headline":"Deploying enterprise agents in production / CTO / SWE Leader / GVP @ Publicis Sapient","posted_time":"2025-06-27","posted_hours_ago":8760,"posted_time_raw":"1yr","post_url":"https://www.linkedin.com/feed/update/urn:li:activity:7251597258247274496","author_profile_image_url":"https://media.licdn.com/dms/image/v2/C4E03AQGNeJRorEd2Nw/profile-displayphoto-shrink_100_100/profile-displayphoto-shrink_100_100/0/1569287114631?e=1784160000&v=beta&t=tJDZC7EXWnlgIIf8kF7fBCajhF-HEgzNXnz_IIkjqW8","post_text":"As AI continues to be integrated into travel and hospitality systems, two clear approaches emerge for handling situations where the model doesn't fully understand what the user wants. These can be thought of as \"pre\" and \"post\" strategies.\n\nThe \"pre\" strategy involves asking the user for more details up front, like saying, \"I’m not sure how to handle this part of your request—could you clarify?\" The \"post\" strategy involves providing several possible results (with reasoning) based on uncertainty in the query, and letting the user easily select the most appropriate ones.\n\nAI Engineers need to seamlessly incorporate these strategies into User Interfaces of these \"intelligent systems\". Generating random or irrelevant outputs when intent is unclear, and leaving users to struggle with them, is not an acceptable standard.\n\nhashtag#genAI hashtag#Travel hashtag#Hospitality","post_image_url":null,"is_article":false,"article_url":null,"article_title":null,"article_description":null,"is_video":false,"video_url":null,"has_image":false,"reaction_count":35,"reaction_types":"LIKE, EMPATHY, INTEREST","comment_count":1,"impression_count":1785,"source":"activity"},{"is_my_post":true,"post_urn":"urn:li:activity:7249932806988951552","author_name":"Ravi Evani\n              \n                \n                   \n    \n      \n    \n    \n      \n    \n\n • You","author_profile_url":"https://www.linkedin.com/in/ravievani","author_headline":"Deploying enterprise agents in production / CTO / SWE Leader / GVP @ Publicis Sapient","posted_time":"2025-06-27","posted_hours_ago":8760,"posted_time_raw":"1yr","post_url":"https://www.linkedin.com/feed/update/urn:li:activity:7249932806988951552","author_profile_image_url":"https://media.licdn.com/dms/image/v2/C4E03AQGNeJRorEd2Nw/profile-displayphoto-shrink_100_100/profile-displayphoto-shrink_100_100/0/1569287114631?e=1784160000&v=beta&t=tJDZC7EXWnlgIIf8kF7fBCajhF-HEgzNXnz_IIkjqW8","post_text":"Bugs vs. Bucks: If your AI codebot charged more for higher quality code—would you want max quality? lowest cost? somewhere in the middle?","post_image_url":"https://media.licdn.com/dms/image/v2/D4E22AQFGIPTK2WMU9w/feedshare-shrink_800/feedshare-shrink_800/0/1728518677082?e=1784160000&v=beta&t=poXUOEnKL9vPIsLtMSKuama-5k1RrzbvcZgF_4fKixM","is_article":false,"article_url":null,"article_title":null,"article_description":null,"is_video":false,"video_url":null,"has_image":true,"reaction_count":12,"reaction_types":"LIKE, INTEREST, PRAISE","repost_count":1,"impression_count":908,"source":"activity"},{"is_my_post":true,"post_urn":"urn:li:activity:7249017489165053952","author_name":"Ravi Evani\n              \n                \n                   \n    \n      \n    \n    \n      \n    \n\n • You","author_profile_url":"https://www.linkedin.com/in/ravievani","author_headline":"Deploying enterprise agents in production / CTO / SWE Leader / GVP @ Publicis Sapient","posted_time":"2025-06-27","posted_hours_ago":8760,"posted_time_raw":"1yr","post_url":"https://www.linkedin.com/feed/update/urn:li:activity:7249017489165053952","author_profile_image_url":"https://media.licdn.com/dms/image/v2/C4E03AQGNeJRorEd2Nw/profile-displayphoto-shrink_100_100/profile-displayphoto-shrink_100_100/0/1569287114631?e=1784160000&v=beta&t=tJDZC7EXWnlgIIf8kF7fBCajhF-HEgzNXnz_IIkjqW8","post_text":"Still buzzing from an exciting two days at hashtag#EngineeringNext.\n\nKey points from my talk on \"Supercharged Engineering\":\n- We are moving from using coding \"shovels\" to AI \"excavators\"\n- Skills engineers need going forward are very different from the past\n- Mastering the skill/art of steering AI is your key to becoming a supercharged engineer\n- Our Slingshot AI SDLC assistant + supercharged engineers => solution for the most daunting challenges (e.g. legacy modernization) that large enterprises face today\n- AI Assisted Agile teams build software at the speed of creativity\n- Collaboration is becoming a new AI modality\n- The question is not whether you will join our AI powered future -- but how fast are you going to get there. Are you ready?\n\nTilak Doddapaneni Rakesh Ravuri Ravi Shankar Mandira Sharma Nigel Vaz Diksha Sharma (She/Her)\n\nPublicis Sapient hashtag#YouAndAI","post_image_url":"https://media.licdn.com/dms/image/v2/D4E22AQFLjav6_DPwJA/feedshare-shrink_800/feedshare-shrink_800/0/1728300431100?e=1784160000&v=beta&t=LT7ERfeHVzZyrKpdsyD6DNXOtQt51g7xQUB5wlqET5g","is_article":false,"article_url":null,"article_title":null,"article_description":null,"is_video":false,"video_url":null,"has_image":true,"reaction_count":152,"reaction_types":"LIKE, PRAISE, EMPATHY","comment_count":3,"impression_count":3311,"source":"activity"},{"is_my_post":true,"post_urn":"urn:li:activity:7242747888466825216","author_name":"Ravi Evani\n              \n                \n                   \n    \n      \n    \n    \n      \n    \n\n • You","author_profile_url":"https://www.linkedin.com/in/ravievani","author_headline":"Deploying enterprise agents in production / CTO / SWE Leader / GVP @ Publicis Sapient","posted_time":"2025-06-27","posted_hours_ago":8760,"posted_time_raw":"1yr","post_ur l evolve together\n3. Data adapts alongside the product\n4. Requirements are expected to organically emerge\n5. Collaboration is parallel, and feedback is continuous\n\nhashtag#YouAndAI hashtag#EngineeringNext Publicis Sapient","post_image_url":"https://media.licdn.com/dms/image/v2/D4E05AQEr3vLQagh1dQ/videocover-high/videocover-high/0/1726459105191?e=1783137600&v=beta&t=4ekYRwd8ejRG3rhYhSQyPxYRXbeB9-IoyeaEUUGn9Js","is_article":false,"article_url":null,"article_title":null,"article_description":null,"is_video":true,"video_url":"https://media.licdn.com/dms/image/v2/D4E05AQEr3vLQagh1dQ/videocover-high/videocover-high/0/1726459105191?e=1783137600&v=beta&t=4ekYRwd8ejRG3rhYhSQyPxYRXbeB9-IoyeaEUUGn9Js","has_image":true,"reaction_count":54,"reaction_types":"LIKE, INTEREST, EMPATHY","comment_count":2,"repost_count":1,"impression_count":3537,"source":"activity"},{"is_my_post":true,"post_urn":"urn:li:activity:7240469333880049664","author_name":"Ravi Evani\n              \n                \n                   \n    \n      \n    \n    \n      \n    \n\n • You","author_profile_url":"https://www.linkedin.com/in/ravievani","author_headline":"Deploying enterprise agents in production / CTO / SWE Leader / GVP @ Publicis Sapient","posted_time":"2025-06-27","posted_hours_ago":8760,"posted_time_raw":"1yr","post_url":"https://www.linkedin.com/feed/update/urn:li:activity:7240469333880049664","author_profile_image_url":"https://media.licdn.com/dms/image/v2/C4E03AQGNeJRorEd2Nw/profile-displayphoto-shrink_100_100/profile-displayphoto-shrink_100_100/0/1569287114631?e=1784160000&v=beta&t=tJDZC7EXWnlgIIf8kF7fBCajhF-HEgzNXnz_IIkjqW8","post_text":"Does your AI generated code follow your project, enterprise and brand standards? Teach your codebot to be on-brand!\n\nhashtag#YouAndAI hashtag#EngineeringNext Publicis Sapient","post_image_url":"https://media.licdn.com/dms/image/v2/D4E05AQFtSyu4Ot6V8A/videocover-high/videocover-high/0/1726262364000?e=1783137600&v=beta&t=dQk1zvsCUUvS8lCtNUTgD28ylRex9OKz2VcUXp9NWBU","is_article":false,"article_url":null,"article_title":null,"article_description":null,"is_video":true,"video_url":"https://media.licdn.com/dms/image/v2/D4E05AQFtSyu4Ot6V8A/videocover-high/videocover-high/0/1726262364000?e=1783137600&v=beta&t=dQk1zvsCUUvS8lCtNUTgD28ylRex9OKz2VcUXp9NWBU","has_image":true,"reaction_count":17,"reaction_types":"LIKE","impression_count":1142,"source":"activity"},{"is_my_post":true,"post_urn":"urn:li:activity:7228936316426567680","author_name":"Ravi Evani\n              \n                \n                   \n    \n      \n    \n    \n      \n    \n\n • You","author_profile_url":"https://www.linkedin.com/in/ravievani","author_headline":"Deploying enterprise agents in production / CTO / SWE Leader / GVP @ Publicis Sapient","posted_time":"2025-06-27","posted_hours_ago":8760,"posted_time_raw":"1yr","post_url":"https://www.linkedin.com/feed/update/urn:li:activity:7228936316426567680","author_profile_image_url":"https://media.licdn.com/dms/image/v2/C4E03AQGNeJRorEd2Nw/profile-displayphoto-shrink_100_100/profile-displayphoto-shrink_100_100/0/1569287114631?e=1784160000&v=beta&t=tJDZC7EXWnlgIIf8kF7fBCajhF-HEgzNXnz_IIkjqW8","post_text":"So, LLMs spin up fake text—and now \"agents\" spin up faulty actions?\n\nEnterprise apps—let's pause on the \"autopilots\", for the time being.\n\nHuman steering, still essential.\n\nhashtag#genai hashtag#llm","post_image_url":"https://media.licdn.com/dms/image/v2/D4D22AQHWCqmOJRDB2Q/feedshare-shrink_800/feedshare-shrink_800/0/1723512723962?e=1784160000&v=beta&t=If6JWi6JDidX3K6R_CIVciPZeZ5LR0OySZuRUJMgJ4M","is_article":false,"article_url":null,"article_title":null,"article_description":null,"is_video":false,"video_url":null,"has_image":true,"reaction_count":27,"reaction_types":"LIKE","impression_count":1540,"source":"activity"},{"is_my_post":true,"post_urn":"urn:li:activity:7223722692976226304","author_name":"Ravi Evani\n              \n                \n                   \n    \n      \n    \n    \n      \n    \n\n • You","author_profile_url":"https://www.linkedin.com/in/ravievani","author_headline":"Deploying enterprise agents in production / CTO / SWE Leader / GVP @ Publicis Sapient","posted_time":"2025-06-27","posted_hours_ago":8760,"posted_time_raw":"1yr","post_url":"https://www.linkedin.com/feed/update/urn:li:activity:7223722692976226304","author_profile_image_url":"https://media.licdn.com/dms/image/v2/C4E03AQGNeJRorEd2Nw/profile-displayphoto-shrink_100_100/profile-displayphoto-shrink_100_100/0/1569287114631?e=1784160000&v=beta&t=tJDZC7EXWnlgIIf8kF7fBCajhF-HEgzNXnz_IIkjqW8","post_text":"\"Just use RAG\" -- an AI 'evangelist' told me. Reality check incoming...\n\nBuilding an AI-driven hospitality experience that’s truly useful isn't as simple as it sounds. Sure, RAG seems straightforward: chunk data, create embeddings, pop them in a vector DB, run a similarity search, and feed it to an LLM. Easy, right?\n\nWell, it \"worked\"... technically. But the results? Let's just say they left much to be desired. Turns out, the old adage holds true even in AI: garbage in, garbage out.\n\nThe real challenge? Curating high-quality, location-specific data. We're talking points of interest, cultural nuggets, and local gems. This required building intricate data pipelines - a task that comes way before any kind of RAG (naive/recursive/graphRAG, etc) even begins.\n\nThere's a clear disconnect between AI hype and execution reality. Those in the trenches know the truth: AI is powerful, no doubt. But to make it truly useful—is far from easy.\n\nhashtag#AIEngineering hashtag#genAi","post_image_url":null,"is_article":false,"article_url":null,"article_title":null,"article_description":null,"is_video":false,"video_url":null,"has_image":false,"reaction_count":84,"reaction_types":"LIKE, EMPATHY, INTEREST","comment_count":2,"repost_count":2,"impression_count":5006,"source":"activity"},{"is_my_post":true,"post_urn":"urn:li:activity:7221782383971172352","author_name":"Ravi Evani\n              \n                \n                   \n    \n      \n    \n    \n      \n    \n\n • You","author_profile_url":"https://www.linkedin.com/in/ravievani","author_headline":"Deploying enterprise agents in production / CTO / SWE Leader / GVP @ Publicis Sapient","posted_time":"2025-06-27","posted_hours_ago":8760,"posted_time_raw":"1yr","post_url":"https://www.linkedin.com/feed/update/urn:li:activity:7221782383971172352","author_profile_image_url":"https://media.licdn.com/dms/image/v2/C4E03AQGNeJRorEd2Nw/profile-displayphoto-shrink_100_100/profile-displayphoto-shrink_100_100/0/1569287114631?e=1784160000&v=beta&t=tJDZC7EXWnlgIIf8kF7fBCajhF-HEgzNXnz_IIkjqW8","post_text":"hashtag#llama is now 3.1 — so what?\n\nAI's evolving faster than a chameleon in a rainbow factory. But the real question isn't about the tech—it's about YOU and YOUR organization.\n\nHow can you wrangle these AI beasts to solve your unique problems; and within the complexity of your own organizational context?\n\nA key to that is to develop a strong competency of AI Engineering talent.\n\nSee my latest post https://lnkd.in/d4MWnXPs to know more about what that means and how to begin transforming your own engineering workforce.\n\nhashtag#genAI Publicis Sapient Fast Company Executive Board","post_image_url":"https://media.licdn.com/dms/image/v2/D4D05AQFJEamco1MD-w/feedshare-thumbnail_720_1280/feedshare-thumbnail_720_1280/0/1721807033646?e=1783137600&v=beta&t=rD5co69_kE7lTqH44BYtEyIhThLrIKDRdq9PA8VvFAU","is_article":false,"article_url":null,"article_title":null,"article_description":null,"is_video":true,"video_url":"https://media.licdn.com/dms/image/v2/D4D05AQFJEamco1MD-w/feedshare-thumbnail_720_1280/feedshare-thumbnail_720_1280/0/1721807033646?e=1783137600&v=beta&t=rD5co69_kE7lTqH44BYtEyIhThLrIKDRdq9PA8VvFAU","has_image":true,"reaction_count":79,"reaction_types":"LIKE, EMPATHY, PRAISE","comment_count":2,"impression_count":4579,"source":"activity"},{"is_my_post":true,"post_urn":"urn:li:activity:7217
