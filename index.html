7jsqUcvrSpYDBTSkzM0LJfH0"},{"article_description":"Streamable Http — Server-Sent Events\nmedium.com","article_title":"Streamable Http — Server-Sent Events","article_url":"https://medium.com/@amitsriv99/streamable-http-server-sent-events-a02f2fba242f","author_headline":"Deploying enterprise agents in production / CTO / SWE Leader / GVP @ Publicis Sapient","author_name":"Ravi Evani\n              \n                \n                   \n    \n      \n    \n    \n      \n    \n\n • You","author_profile_image_url":"https://media.licdn.com/dms/image/v2/C4E03AQGNeJRorEd2Nw/profile-displayphoto-shrink_100_100/profile-displayphoto-shrink_100_100/0/1569287114631?e=1784160000&v=beta&t=tJDZC7EXWnlgIIf8kF7fBCajhF-HEgzNXnz_IIkjqW8","author_profile_url":"https://www.linkedin.com/in/ravievani","comment_count":1,"has_image":true,"impression_count":936,"is_article":true,"is_my_post":true,"is_video":false,"post_image_url":"https://media.licdn.com/dms/image/sync/v2/D5627AQGlic9GdUFKzg/articleshare-shrink_480/B56ZrtnrtqH8As-/0/1764923195597?e=1783008000&v=beta&t=5ZtVqAig0p9j49YzBiccmUuoOSKdVgJjHSemmvDLLeA","post_text":"Useful reading for MCP vibe coders who like to understand the foundations of what they are building.","post_url":"https://www.linkedin.com/feed/update/urn:li:activity:7402702284838621184","post_urn":"urn:li:activity:7402702284838621184","posted_hours_ago":4320,"posted_time":"2025-12-25","posted_time_raw":"6mo","reaction_count":7,"reaction_types":"LIKE","source":"activity","video_url":null},{"article_description":null,"article_title":null,"article_url":null,"author_headline":"Deploying enterprise agents in production / CTO / SWE Leader / GVP @ Publicis Sapient","author_name":"Ravi Evani\n              \n                \n                   \n    \n      \n    \n    \n      \n    \n\n • You","author_profile_image_url":"https://media.licdn.com/dms/image/v2/C4E03AQGNeJRorEd2Nw/profile-displayphoto-shrink_100_100/profile-displayphoto-shrink_100_100/0/1569287114631?e=1784160000&v=beta&t=tJDZC7EXWnlgIIf8kF7fBCajhF-HEgzNXnz_IIkjqW8","author_profile_url":"https://www.linkedin.com/in/ravievani","comment_count":2,"has_image":false,"impression_count":2511,"is_article":false,"is_my_post":true,"is_video":false,"post_image_url":null,"post_text":"Lower stakes emails:\n1/ ChatGPT composes\n2/ I edit\n3/ Done\n\nHigher Stakes emails:\n1/ I provide key ideas\n2/ ChatGPT composes (Thinking mode)\n3/ I edit\n4/ ChatGPT tweaks (Auto mode)\n5/ I cherry pick the tweaks\n6/ Done","post_url":"https://www.linkedin.com/feed/update/urn:li:activity:7402658217593577473","post_urn":"urn:li:activity:7402658217593577473","posted_hours_ago":4320,"posted_time":"2025-12-25","posted_time_raw":"6mo","reaction_count":9,"reaction_types":"LIKE","source":"activity","video_url":null},{"article_description":null,"article_title":null,"article_url":null,"author_headline":"Deploying enterprise agents in production / CTO / SWE Leader / GVP @ Publicis Sapient","author_name":"Ravi Evani\n              \n                \n                   \n    \n      \n    \n    \n      \n    \n\n • You","author_profile_image_url":"https://media.licdn.com/dms/image/v2/C4E03AQGNeJRorEd2Nw/profile-displayphoto-shrink_100_100/profile-displayphoto-shrink_100_100/0/1569287114631?e=1784160000&v=beta&t=tJDZC7EXWnlgIIf8kF7fBCajhF-HEgzNXnz_IIkjqW8","author_profile_url":"https://www.linkedin.com/in/ravievani","has_image":true,"impression_count":3251,"is_article":false,"is_my_post":true,"is_video":false,"post_image_url":"https://media.licdn.com/dms/image/v2/D4E22AQHcSWQPDgNPeg/feedshare-shrink_800/B4EZrpMmbUGUAg-/0/1764848987211?e=1784160000&v=beta&t=QxIVf_t9LxzFSp7h6I_uDDvkWO47Ye5BZS2L0MwGNHs","post_text":"AEO (unlike SEO) is a CIO challenge. Here are 5 Agents that Travel & Hospitality brands need to deploy to win.\n\n1/ AEO Monitoring Agent: Gives continuous visibility of how your products and information show up in AI Engines.\n\n2/ Question Miner Agent: Turns raw customer chatter into a ranked list of high-value questions that your company must “own” to differentiate your brand & products.\n\n3/ Answer Generation Agent: Turns complex operational policies and technical documents into structured, machine-readable answers that AI agents can understand and recommend.\n\n4/ Content & Risk Compliance Agent: Enables your company to publish authoritative machine-readable content without exposing internal systems, sensitive data, or operational vulnerabilities.\n\n5/ Product Facing Agent: Turns complex availability and pricing logic and policy framework into an agentic executable asset.\n\nThank you AWS T&H leaders Clare Ward (AWS Worldwide Tech Leader) & Tedd Evers (AWS Global Partner Leader) for joining me in a great Publicis Sapient & Amazon Web Services (AWS) panel discussion AWS re:Invent for our customers.","post_url":"https://www.linkedin.com/feed/update/urn:li:activity:7402313169622368256","post_urn":"urn:li:activity:7402313169622368256","posted_hours_ago":4320,"posted_time":"2025-12-25","posted_time_raw":"6mo","reaction_count":52,"reaction_types":"LIKE, EMPATHY, INTEREST","repost_count":1,"source":"activity","video_url":null},{"article_description":null,"article_title":null,"article_url":null,"author_headline":"Deploying enterprise agents in production / CTO / SWE Leader / GVP @ Publicis Sapient","author_name":"Ravi Evani\n              \n                \n                   \n    \n      \n    \n    \n      \n    \n\n • You","author_profile_image_url":"https://media.licdn.com/dms/image/v2/C4E03AQGNeJRorEd2Nw/profile-displayphoto-shrink_100_100/profile-displayphoto-shrink_100_100/0/1569287114631?e=1784160000&v=beta&t=tJDZC7EXWnlgIIf8kF7fBCajhF-HEgzNXnz_IIkjqW8","author_profile_url":"https://www.linkedin.com/in/ravievani","has_image":true,"impression_count":437,"is_article":false,"is_my_post":true,"is_video":false,"post_image_url":"https://media.licdn.com/dms/image/v2/D4E22AQHa1EvD_44Mbw/feedshare-shrink_800/B4EZrQcDKfJgAg-/0/1764433608771?e=1784160000&v=beta&t=oiCSBr5_qAJu5KiswUcxIm3ZemMM0Is7hXGGUfnFaJM","post_text":"Why Airlines Need a AEO Monitoring & Compliance Agent\n\nAs AI agents and answering engines becomes the first stop for travelers and corporate buyers, airlines face a new problem: you have no idea how these systems are describing you. ChatGPT, Google’s AI Overviews, Perplexity, and travel bots generate answers based on your public content, but you can’t see what they’re saying, whether you’re being cited, or whether a competitor has suddenly taken your place. Worse, you can’t tell if outdated language or sensitive internal details have slipped into public content during the rush to scale AEO.\n\nA Monitoring & Compliance Agent gives your airline a visibility layer you simply don’t have today. It routinely queries the major AI engines with your must-win questions and logs everything: where you appear, what’s said about you, how often you’re cited, and how your share of voice changes over time. It’s an early-warning system for competitive shifts, misinterpretations, and outdated descriptions: something every CIO and VP of Data needs if they expect to manage AEO with any confidence.\n\nOn the compliance side, it acts as the CISO’s safeguard. The agent checks for internal system names, deprecated endpoints, contract specifics, and any trace of sensitive data within AI engine outputs. It detects accidental exposure and gives airlines a controlled way to scale AEO.","post_url":"https://www.linkedin.com/feed/update/urn:li:activity:7400570947419664384","post_urn":"urn:li:activity:7400570947419664384","posted_hours_ago":4320,"posted_time":"2025-12-25","posted_time_raw":"6mo","reaction_count":7,"reaction_types":"LIKE, INTEREST, APPRECIATION","source":"activity","video_url":null},{"article_description":null,"article_title":null,"article_url":null,"author_headline":"Deploying enterprise agents in production / CTO / SWE Leader / GVP @ Publicis Sapient","author_name":"Ravi Evani\n              \n                \n                   \n    \n      \n    \n    \n      \n    \n\n • You","author_profile_image_url":"https://media.licdn.com/dms/image/v2/C4E03AQGNeJRorEd2Nw/profile-displayphoto-shrink_100_100/profile-displayphoto-shrink_100_100/0/1569287114631?e=1784160000&v=beta&t=tJDZC7EXWnlgIIf8kF7fBCajhF-HEgzNXnz_IIkjqW8","author_profile_url":"https://www.linkedin.com/in/ravievani","comment_count":1,"has_image":true,"impression_count":1179,"is_article":false,"is_my_post":true,"is_video":false,"post_image_url":"https://media.licdn.com/dms/image/v2/D4E22AQFt4EDNf-qHOg/feedshare-shrink_800/B4EZrMNGBWIIAg-/0/1764362578849?e=1784160000&v=beta&t=nrjj9tB3oz_OJfhfbAPe91j4rnO9cCnnc9GxAlIVtx8","post_text":"AEO for an Airline brand is not just a CMO job. Here is why IT should care:\n\n1/ Because AI is already begun to influence your revenue.\nHigh-intent travellers and corporate buyers are getting answers from AI first, then clicking through. If your brand isn’t in those AI answers, you’re invisible at the exact moment of choice.\n\n2/ Because the traffic you keep is worth 3–6x more.\nAEO doesn’t chase volume; it shapes who lands on your site. AI-referred visitors arrive pre-qualified, policy-aware and closer to booking or integrating.\n\n3/ Because your help centre and tech docs are now front-line sales assets.\nLLMs read policy pages, disruption rules, API docs and security statements more than your homepage. If those aren’t structured and current, the AI can’t confidently recommend you.\n\n4/ Because if you don’t define your story, the model will.\nAEO is how you “program” AI to describe your airline's safety, resilience, NDC capability, loyalty value and carbon posture. If you don’t supply that detail, it will infer it from others.\n\n5/ For the VP of Data & AI: this is your use case for first-party data.\nAEO gives you a direct way to monetise your operational and policy data by exposing it, safely, as authoritative answers that AI systems favour.\n\n6/ For the CIO & Chief Solution Architect: this is core architecture, not content marketing.\nAEO forces you to rationalise docs, help centres, CMS, APIs and schema. The same work that helps AI answer questions also reduces integration friction and support load.\n\n7/ For the CISO: AEO is a new exfiltration path unless you own it.\nLLMs will crawl whatever they can reach. Without a governed AEO program and content risk checks, you risk leaking internal terminology, deprecated endpoints or sensitive patterns.\n\n8/ Because this is one of the few levers you still control in the AI ecosystem.\nYou don’t control the models, but you do control the structured, governed, first-party content they rely on. AEO is how you use that control to protect and grow revenue.","post_url":"https://www.linkedin.com/feed/update/urn:li:activity:7400273027407507456","post_urn":"urn:li:activity:7400273027407507456","posted_hours_ago":4320,"posted_time":"2025-12-25","posted_time_raw":"6mo","reaction_count":21,"reaction_types":"LIKE, APPRECIATION","source":"activity","video_url":null},{"article_description":null,"article_title":null,"article_url":null,"author_headline":"Deploying enterprise agents in production / CTO / SWE Leader / GVP @ Publicis Sapient","author_name":"Ravi Evani\n              \n                \n                   \n    \n      \n    \n    \n      \n    \n\n • You","author_profile_image_url":"https://media.licdn.com/dms/image/v2/C4E03AQGNeJRorEd2Nw/profile-displayphoto-shrink_100_100/profile-displayphoto-shrink_100_100/0/1569287114631?e=1784160000&v=beta&t=tJDZC7EXWnlgIIf8kF7fBCajhF-HEgzNXnz_IIkjqW8","author_profile_url":"https://www.linkedin.com/in/ravievani","comment_count":3,"has_image":true,"impression_count":852,"is_article":false,"is_my_post":true,"is_video":false,"post_image_url":"https://media.licdn.com/dms/image/v2/D4E22AQF80LSwfmR3Qg/feedshare-shrink_800/B4EZrFHI2nKUAk-/0/1764243577379?e=1784160000&v=beta&t=qUx5nJR6xJOfhf5Fg-L-izta-yLPCfBiXC1ZaSlwk-U","post_text":"Software engineers need to focus on elevating their thought process to a higher level.","post_url":"https://www.linkedin.com/feed/update/urn:li:activity:7399773896268484610","post_urn":"urn:li:activity:7399773896268484610","posted_hours_ago":4320,"posted_time":"2025-12-25","posted_time_raw":"6mo","reaction_count":11,"reaction_types":"LIKE, INTEREST","source":"activity","video_url":null},{"article_description":null,"article_title":null,"article_url":null,"author_headline":"Deploying enterprise agents in production / CTO / SWE Leader / GVP @ Publicis Sapient","author_name":"Ravi Evani\n              \n                \n                   \n    \n      \n    \n    \n      \n    \n\n • You","author_profile_image_url":"https://media.licdn.com/dms/image/v2/C4E03AQGNeJRorEd2Nw/profile-displayphoto-shrink_100_100/profile-displayphoto-shrink_100_100/0/1569287114631?e=1784160000&v=beta&t=tJDZC7EXWnlgIIf8kF7fBCajhF-HEgzNXnz_IIkjqW8","author_profile_url":"https://www.linkedin.com/in/ravievani","comment_count":6,"has_image":true,"impression_count":1503,"is_article":false,"is_my_post":true,"is_video":false,"post_image_url":"https://media.licdn.com/dms/image/v2/D4E22AQEMrYbvTSf5BQ/feedshare-shrink_800/B4EZrByvFuHoAg-/0/1764187898449?e=1784160000&v=beta&t=SRx_pzVXqRr8asc10LjNpyco-XPNXVinb7U88tRv9mA","post_text":"AEO is not a content project anymore: four execs now make or break your visibility in AI answering engines.\n\nSEO was something the CMO could mostly own. AEO isn’t. To show up in AI answers and agent shortlists, four execs have to move in lockstep:\n\nCDO/VP Data & AI: Turn sales calls, support tickets, and product docs into a governed “question backlog” and structured answers that LLMs can reliably quote.\n\nCTO/ Chief Solution Architect: Redesign the content and API stack so every policy, rule, and integration guide is hyper-chunked, schema-rich, and fast enough for real-time retrieval.\n\nCISO: Put a governance firewall in front of all AEO-bound content, stripping internal endpoints, PII, and sensitive config while keeping it machine-readable.\n\nCIO: Break down siloed help centers and dev docs, unify them under the main domain, and make AEO a first-class requirement for CMS, CRM, and knowledge platforms.\n\nAEO is now an enterprise architecture, data, and security challenge that just happens to show up in marketing KPIs.","post_url":"https://www.linkedin.com/feed/update/urn:li:activity:7399540367940927489","post_urn":"urn:li:activity:7399540367940927489","posted_hours_ago":4320,"posted_time":"2025-12-25","posted_time_raw":"6mo","reaction_count":20,"reaction_types":"LIKE, INTEREST, APPRECIATION","source":"activity","video_url":null},{"article_description":null,"article_title":null,"article_url":null,"author_headline":"Deploying enterprise agents in production / CTO / SWE Leader / GVP @ Publicis Sapient","author_name":"Ravi Evani\n              \n                \n                   \n    \n      \n    \n    \n      \n    \n\n • You","author_profile_image_url":"https://media.licdn.com/dms/image/v2/C4E03AQGNeJRorEd2Nw/profile-displayphoto-shrink_100_100/profile-displayphoto-shrink_100_100/0/1569287114631?e=1784160000&v=beta&t=tJDZC7EXWnlgIIf8kF7fBCajhF-HEgzNXnz_IIkjqW8","author_profile_url":"https://www.linkedin.com/in/ravievani","comment_count":1,"has_image":true,"impression_count":4118,"is_article":false,"is_my_post":true,"is_video":false,"post_image_url":"https://media.licdn.com/dms/image/v2/D4E22AQGlAPDbST8p3Q/feedshare-shrink_800/B4EZrABPWuIQAk-/0/1764158146542?e=1784160000&v=beta&t=GnAWq0vyWZmeSSaT3bl4HlfUdypneN2MGsRJmuSSLrg","post_text":"Writing code is getting faster. Trusting code is getting harder.\n\nIt was fun presenting at the Publicis Sapient AI Caravan in NYC last week, walking through real client work and how our AI products (Sapient Slingshot and Bodhi) are changing the way we build.\n\nThe best part was the conversation during the social after: engineers, designers, and PMs comparing how their day-to-day is already shifting. The consistent theme is that work doesn’t get “easier”; it gets more strategic. Everyone is spending more time shaping how AI should do the task, and not just executing tasks themselves.\n\nPeople were saying that the flow of work changes once we delegate the initial analysis of a user story to AI. Agents can read a spec, map it to the codebase, spot hidden dependencies, and highlight ambiguities, but our job becomes more about validating what matters, correcting what’s off, and grounding estimates in real constraints.\n\nPrioritization, sequencing, tradeoffs, and long-term direction still sit firmly with people. Agents can propose options, but they are usually bad at \"estimates\" -- so those only become plans when they’ve been filtered through individual and team judgment.\n\nWe’re also seeing more time going into patterns, architectures, and quality. Less debates on what frameworks to use, and more space to explore alternative designs and to focus on improving the actual user experience instead of just trying to get functionality “done.”\n\nA lot of effort now going into reading AI output and clarifying intent. Its a new muscle we are developing, since the act of reading someone else's (AI) is not that fun.\n\nSimilar to the \"checklists\" of the past -- teams are starting to increasingly formalize patterns, guardrails, and conventions in markdown so agents have something common to anchor to.\n\nDuring code merges, AI reviews catch issues, but that final \"merge\" decision is taking a lot more thought, not less.\n\nNet net, teams are steadily moving up the ladder of abstraction. Less time being spent on translation and more on thought. Its good to see the work becoming much more about shaping the user and operational experience of the systems rather than just building to \"requirements\".\n\nThanks to the organizers and co-presenters for a great event: Laura Daniela Laurie Naveen Rajwinder","post_url":"https://www.linkedin.com/feed/update/urn:li:activity:7399431772645638144","post_urn":"urn:li:activity:7399431772645638144","posted_hours_ago":4320,"posted_time":"2025-12-25","posted_time_raw":"6mo","reaction_count":82,"reaction_types":"LIKE, PRAISE, EMPATHY","source":"activity","video_url":null},{"article_description":null,"article_title":null,"article_url":null,"author_headline":"Deploying enterprise agents in production / CTO / SWE Leader / GVP @ Publicis Sapient","author_name":"Ravi Evani\n              \n                \n                   \n    \n      \n    \n    \n      \n    \n\n • You","author_profile_image_url":"https://media.licdn.com/dms/image/v2/C4E03AQGNeJRorEd2Nw/profile-displayphoto-shrink_100_100/profile-displayphoto-shrink_100_100/0/1569287114631?e=1784160000&v=beta&t=tJDZC7EXWnlgIIf8kF7fBCajhF-HEgzNXnz_IIkjqW8","author_profile_url":"https://www.linkedin.com/in/ravievani","comment_count":1,"has_image":true,"impression_count":1895,"is_article":false,"is_my_post":true,"is_video":true,"post_image_url":"https://media.licdn.com/dms/image/v2/D5605AQGaBQeyy2028A/videocover-high/B56Zq2r7xTKABY-/0/1764001563266?e=1783008000&v=beta&t=CZsp9TzgN-dKaogYG4IhXlS_qwPrE_mYeeUKXRgSiVk","post_text":"Agentic workflow to build a knowledge graph for your travel / hospitality brand.\n\nTravel brands can’t rely on filters and static attributes anymore. If AI agents are becoming the new trip planners, then brands need a foundation where products are organized around why someone is traveling, not just what they’re booking. That’s where intent-based personalization comes in, and it only works if you have the right data backbone behind it.\n\nHere’s a simple knowledge graph workflow we’re building with Sapient Slingshot UI builder. It’s a self-improving agentic system that ingests raw product data, extracts meaningful attributes, maps them to high-level intents, and writes them into a graph, with guardrails.\n\n1. Product Ingestion\n\nAgent: ProductIngestionAgent\nPulls raw hotel and flight data directly from source feeds. No manual hand-offs. It calls the travel data MCP, holds everything in working memory, and sets the stage for the rest of the workflow.\n\n2. Attribute Extraction\n\nAgent: AttributeExtractorAgent\nTurns unstructured descriptions into clean, structured attributes.\nIf the product mentions “cribs,” “kids menu,” “EV chargers,” or “step-free access,” the agent normalizes all of it into boolean flags. This is the raw material intent engines need.\n\n3. Guardrails and Validation\n\nNodes: Guardrail + If-Else\nBefore anything expensive happens, the workflow checks whether the product meets minimum schema requirements. Valid data moves forward. Invalid data gets stopped or routed for human review. This keeps the graph clean.\n\n4. Intent Tagging\n\nAgent: IntentTaggingAgent\nThis is where low-level attributes become high-level value.\nFor example:\ncribs + kids menu → toddler_friendly\nEV_charging + parking_on_site → EV_ready\n\nThe agent uses semantic memory tied to a persistent Intent Catalog so the mapping stays consistent across properties, brands, and geographies.\n\n5. Graph Construction\n\nAgent: GraphBuilderAgent\nBuilds nodes and edges that represent the product and its intents.\n“Hotel X” becomes a product node.\n“Toddler Friendly” becomes an intent node.\n\nThe agent understands the graph schema and writes updates through the travel-KG MCP.\n\n6. Verification & Reporting\n\nAgent: VerificationAgent\nRuns a QA pass to confirm the graph was updated correctly.\nIt logs outcomes through the reporting MCP, and writes a short episodic record so we have an audit trail of every run.\n\nThis workflow does more than store information, it understands it.\nIt becomes the foundation for intent-based travel search, itinerary assembly, flight-hotel bundling, and agentic trip planning.\n\nWhen a guest says, “Weekend trip to Lisbon with my toddler, EV charging, under €250/night,” an AI agent can match their intent directly to products in the graph—because the system already mapped each product to the right intents.\n\nThis is how travel brands stay visible in an AI-first world: make their products legible to machines, verifiable by agents, and easily discoverable through true intent.","post_url":"https://www.linkedin.com/feed/update/urn:li:activity:7398758819893305344","post_urn":"urn:li:activity:7398758819893305344","posted_hours_ago":5040,"posted_time":"2025-11-25","posted_time_raw":"7mo","reaction_count":37,"reaction_types":"LIKE, EMPATHY, INTEREST","repost_count":1,"source":"activity","video_url":"https://media.licdn.com/dms/image/v2/D5605AQGaBQeyy2028A/videocover-high/B56Zq2r7xTKABY-/0/1764001563266?e=1783008000&v=beta&t=CZsp9TzgN-dKaogYG4IhXlS_qwPrE_mYeeUKXRgSiVk"},{"article_description":null,"article_title":null,"article_url":null,"author_headline":"Deploying enterprise agents in production / CTO / SWE Leader / GVP @ Publicis Sapient","author_name":"Ravi Evani\n              \n                \n                   \n    \n      \n    \n    \n      \n    \n\n • You","author_profile_image_url":"https://media.licdn.com/dms/image/v2/C4E03AQGNeJRorEd2Nw/profile-displayphoto-shrink_100_100/profile-displayphoto-shrink_100_100/0/1569287114631?e=1784160000&v=beta&t=tJDZC7EXWnlgIIf8kF7fBCajhF-HEgzNXnz_IIkjqW8","author_profile_url":"https://www.linkedin.com/in/ravievani","comment_count":1,"has_image":false,"impression_count":1121,"is_article":false,"is_my_post":true,"is_video":false,"post_image_url":null,"post_text":"It’s striking how quickly the deep learning field has opened up. The best new AI models aren’t just coming from big-name labs anymore, they’re coming from small teams that have simply learned fast (e.g. from China). The know-how is now out in the open: open weights, open courses, open frameworks. The barrier is no longer access, it’s belief that you’re “too late.” You’re not. This wave is still young, and the best part is that the tools themselves are starting to teach you back.\n\nWhat’s changing is how people learn. For years, deep learning felt like an elite skill set, with expensive GPUs, private datasets, complex math. That’s no longer true. Today, a focused individual can get hands-on with real architectures, replicate papers, and fine-tune open models in weeks. In fact Andrej Karpathy produced a highly engaging, step by step video of building GPT-2 from scratch and it's available for free! The entire pipeline: from data prep to deployment, is becoming increasingly automated. And “AI building AI” is real: model builders now use AI copilots and automated experiment tracking that collapse the learning curve.\n\nThe advantage of being a seasoned engineer is perspective. You’ve seen tech cycles come and go, and you understand what actually creates business impact. That judgment: what problem to solve, what metric matters, when “good enough” is enough, is what most young model builders don’t yet have. Deep learning today is about turning intelligence into outcomes, vs neurons and tensors.\n\nIf you start now, you’re not catching up, you’re compounding what you already know. And in an uncertain world, it could be one of the most promising paths to securing your career.","post_url":"https://www.linkedin.com/feed/update/urn:li:activity:7393978438052839424","post_urn":"urn:li:activity:7393978438052839424","posted_hours_ago":5040,"posted_time":"2025-11-25","posted_time_raw":"7mo","reaction_count":7,"reaction_types":"LIKE, INTEREST","source":"activity","video_url":null},{"article_description":null,"article_title":null,"article_url":null,"author_headline":"Deploying enterprise agents in production / CTO / SWE Leader / GVP @ Publicis Sapient","author_name":"Ravi Evani\n              \n                \n                   \n    \n      \n    \n    \n      \n    \n\n • You","author_profile_image_url":"https://media.licdn.com/dms/image/v2/C4E03AQGNeJRorEd2Nw/profile-displayphoto-shrink_100_100/profile-displayphoto-shrink_100_100/0/1569287114631?e=1784160000&v=beta&t=tJDZC7EXWnlgIIf8kF7fBCajhF-HEgzNXnz_IIkjqW8","author_profile_url":"https://www.linkedin.com/in/ravievani","comment_count":1,"has_image":false,"impression_count":1405,"is_article":false,"is_my_post":true,"is_video":false,"post_image_url":null,"post_text":"AI might reduce scorekeepers, but cannot replace middle management.\n\nThere’s a growing narrative that AI makes middle management unnecessary, that intelligent systems will “govern the dumb thing.” But that assumption falls apart fast when you look at what actually drives leadership, decision-making, and organizational success. Intelligence, in and of itself, is not sufficient.\n\nWe all know brilliant people who never figured out how to lead effectively, just as we know average-IQ individuals who can rally a team and deliver extraordinary results. Success in management depends on a set of skills that are not purely cognitive: how to confront the right way, interpret others’ motivations, and see decisions through the eyes of the people doing the work.\n\nA good manager doesn’t do what’s popular; they help people do what’s right for the business (and people), even when it’s uncomfortable. That takes courage, emotional understanding, and a clear grasp of context. These are traits AI can’t meaningfully simulate because they’re situational, embodied, and relational. There’s no static playbook here that a language model can \"read up\".\n\nAnd beyond that lies something even deeper: intelligence is not life. Human actions isn’t just brainpower, it’s embodied. Emotions, hormones, tone, timing, and physical presence all shape outcomes.\n\nSo no, AI won’t replace middle management, at least not the ones that go beyond scorekeeping. If anything, it will make the good managers even more valuable: those who can integrate human insight with intelligent systems, grounding technology in the messy, emotional, situational realities that actually move people to act.","post_url":"https://www.linkedin.com/feed/update/urn:li:activity:7393629611219161088","post_urn":"urn:li:activity:7393629611219161088","posted_hours_ago":5040,"posted_time":"2025-11-25","posted_time_raw":"7mo","reaction_count":12,"reaction_types":"LIKE, INTEREST","source":"activity","video_url":null},{"article_description":null,"article_title":null,"article_url":null,"author_headline":"Deploying enterprise agents in production / CTO / SWE Leader / GVP @ Publicis Sapient","author_name":"Ravi Evani\n              \n                \n                   \n    \n      \n    \n    \n      \n    \n\n • You","author_profile_image_url":"https://media.licdn.com/dms/image/v2/C4E03AQGNeJRorEd2Nw/profile-displayphoto-shrink_100_100/profile-displayphoto-shrink_100_100/0/1569287114631?e=1784160000&v=beta&t=tJDZC7EXWnlgIIf8kF7fBCajhF-HEgzNXnz_IIkjqW8","author_profile_url":"https://www.linkedin.com/in/ravievani","comment_count":4,"has_image":false,"impression_count":2558,"is_article":false,"is_my_post":true,"is_video":false,"post_image_url":null,"post_text":"So you see these posts pointing out that LLMs can't write very secure, modular, or highly performant code. My question back: can the average engineer in an enterprise consistently do those things?\n\nI’ve seen a lot of bad “enterprise-grade” code in my lifetime. Much of it is copy-paste from other places or from GitHub / Stack Overflow. Yes, there are elite engineers who produce highly secure, maintainable, and performant code. But how many of those elites does the average enterprise have? Not many.\n\nIf LLMs can clear the bar for most of the day-to-day tasks a typical engineer does, such as reading a codebase, following established patterns, applying basic security checks, writing tests, refactoring for clarity, picking an O(n) approach instead of O(n²), that already makes them highly useful tools even with their current capabilities.\n\nDo you need to be 100% certain an LLM is doing “original” reasoning to ship secure, maintainable, performant code? I don’t think so. It’d be nice, but it’s not necessary to reach the quality level present today in most enterprise production applications.\n\nIf an LLM reliably clears the bar for the overwhelming majority of cases, and if we keep humans in the loop for those last mile checks and balances, then enterprises can get substantial returns (esp. speed) from their investments in AI code assistants.\n\nTherefore, enterprises should accelerate adoption of AI coding assistance, deliberately and with guardrails. Pair them with golden paths/templates, unit-test scaffolding by default, and mandatory human review. The point isn’t to replace elite judgment; it’s to raise the floor across thousands of routine changes. With that structure, going all in on accelerating adoption is the pragmatic move.","post_url":"https://www.linkedin.com/feed/update/urn:li:activity:7393396994549055488","post_urn":"urn:li:activity:7393396994549055488","posted_hours_ago":5040,"posted_time":"2025-11-25","posted_time_raw":"7mo","reaction_count":17,"reaction_types":"LIKE, INTEREST","source":"activity","video_url":null},{"article_description":null,"article_title":null,"article_url":null,"author_headline":"Deploying enterprise agents in production / CTO / SWE Leader / GVP @ Publicis Sapient","author_name":"Ravi Evani\n              \n                \n                   \n    \n      \n    \n    \n      \n    \n\n • You","author_profile_image_url":"https://media.licdn.com/dms/image/v2/C4E03AQGNeJRorEd2Nw/profile-displayphoto-shrink_100_100/profile-displayphoto-shrink_100_100/0/1569287114631?e=1784160000&v=beta&t=tJDZC7EXWnlgIIf8kF7fBCajhF-HEgzNXnz_IIkjqW8","author_profile_url":"https://www.linkedin.com/in/ravievani","has_image":false,"impression_count":901,"is_article":false,"is_my_post":true,"is_video":false,"post_image_url":null,"post_text":"How Model-centric, RAG-centric, and Agentic AI combine to solve business problems ⇩\n\nA useful way to think about AI architecture is with three patterns that reinforce each other: Model-centric learns patterns from the past, RAG sees what’s true right now, and Agentic plans and acts to move the system forward. On their own they’re incomplete: models repeat history, RAG answers questions but doesn’t take action, agents act but go stale without context. Together, they form a loop: predict what matters, ground in current signals, take action, then feed the outcome back into models and retrieval.\n\nHere’s an example of where this gets practical. Picture a business problem that every company faces: Reducing customer churn. To solve for this, use the three patterns together. Start with models to score risk or opportunity. Use RAG to pull live context (tickets, usage, contracts, market moves) so decisions aren’t based on yesterday’s assumptions. Then let agents sequence tasks: notify the owner, trigger a tutorial, adjust an offer, monitor impact, and write results back. The handoffs matter: model outputs shape what to retrieve, RAG guards against acting on stale data, agents generate the next tranche of training and retrieval signals.\n\nWhat excites me is the compounding effect. Every intervention teaches the model which patterns drive outcomes, sharpens retrieval on the sources that actually change decisions, and refines the agent’s playbook for timing and sequencing. That’s how you move from isolated predictions or chat answers to an integrated system that remembers the past, sees the present, acts with intent, and gets better every cycle.","post_url":"https://www.linkedin.com/feed/update/urn:li:activity:7393271762827759616","post_urn":"urn:li:activity:7393271762827759616","posted_hours_ago":5040,"posted_time":"2025-11-25","posted_time_raw":"7mo","reaction_count":14,"reaction_types":"LIKE, INTEREST","source":"activity","video_url":null},{"article_description":null,"article_title":null,"article_url":null,"author_headline":"Deploying enterprise agents in production / CTO / SWE Leader / GVP @ Publicis Sapient","author_name":"Ravi Evani\n              \n                \n                   \n    \n      \n    \n    \n      \n    \n\n • You","author_profile_image_url":"https://media.licdn.com/dms/image/v2/C4E03AQGNeJRorEd2Nw/profile-displayphoto-shrink_100_100/profile-displayphoto-shrink_100_100/0/1569287114631?e=1784160000&v=beta&t=tJDZC7EXWnlgIIf8kF7fBCajhF-HEgzNXnz_IIkjqW8","author_profile_url":"https://www.linkedin.com/in/ravievani","has_image":false,"impression_count":1148,"is_article":false,"is_my_post":true,"is_video":false,"post_image_url":null,"post_text":"Here's what agentic AI is good at and not so good at today, when it comes to business / enterprise workflows.\n\nAgents are at their best when a task is naturally codifiable. They excel first in engineering, then data analysis => turning requirements into scripts, queries, and pipelines at remarkable speed and cost. That programmatic bias is the advantage: they generate the recipe and execute it, which is perfect for clean data, structured rules, and repeatable steps.\n\nThe cracks appear in tasks where output finesse and judgment matter. On writing, they produce serviceable drafts but miss executive polish and consistent formatting. On design, they struggle with visual sense. Also, they tend to silently “fill in the blanks” with fabricated numbers, finishing the task without flagging the gap.\n\nThe win comes from deciding at a \"workflow step\" level, whether it should be a human or AI agent doing it. Let agents handle tasks that are heavily codifiable; but let humans manage tasks with messy inputs, aesthetics, and final sign-off. Leave it to the human to shape the \"workflow result\", such as the final narrative and presentation.\n\nBy doing this, you keep the speed and cost benefits of agents while protecting trust and reducing risk.","post_url":"https://www.linkedin.com/feed/update/urn:li:activity:7393021927751254016","post_urn":"urn:li:activity:7393021927751254016","posted_hours_ago":5040,"posted_time":"2025-11-25","posted_time_raw":"7mo","reaction_count":11,"reaction_types":"LIKE, INTEREST, APPRECIATION","source":"activity","video_url":null},{"article_description":null,"article_title":null,"article_url":null,"author_headline":"Deploying enterprise agents in production / CTO / SWE Leader / GVP @ Publicis Sapient","author_name":"Ravi Evani\n              \n                \n                   \n    \n      \n    \n    \n      \n    \n\n • You","author_profile_image_url":"https://media.licdn.com/dms/image/v2/C4E03AQGNeJRorEd2Nw/profile-displayphoto-shrink_100_100/profile-displayphoto-shrink_100_100/0/1569287114631?e=1784160000&v=beta&t=tJDZC7EXWnlgIIf8kF7fBCajhF-HEgzNXnz_IIkjqW8","author_profile_url":"https://www.linkedin.com/in/ravievani","has_image":true,"impression_count":491,"is_article":false,"is_my_post":true,"is_video":true,"post_image_url":"https://media.licdn.com/dms/image/v2/D4E05AQFic0hnCT4jKA/videocover-high/B4EZpjr_25J0CI-/0/1762609074563?e=1783008000&v=beta&t=J_smZ2sUPnu7Akoh8VYibPu4ea3wv-VUt-GOXcQUtrc","post_text":"Why Chasing LLM Recommendations via Reddit Ads Is a Poor Strategy for Travel Brands\n\nA new tactic is making the rounds : seed or advertise on Reddit so that chatbots like ChatGPT or Gemini “learn” your brand and later recommend it. On paper, it sounds clever. In practice, it’s a fragile, short‑sighted bet that cuts against how travelers actually decide—and how AI is evolving.\n\nThe problem behind the tactic\n\nLLMs are moving targets. Sources get reweighted, retraining cycles shift, and access deals change. One update can wipe out any advantage you thought you gained from Reddit mentions. You’re effectively renting visibility from an algorithm you don’t control.\n\nReddit itself is an unreliable anchor for this goal. As platforms clamp down on free data access and models diversify inputs, forum chatter (especially content that reads like promotion) will carry less weight. If it looks astroturfed, it’s likely to be discounted.\n\nThen there’s the human factor. Reddit is a community before it’s an ad channel. People spot shilling quickly and call it out publicly. When that happens, the brand loses trust not just on Reddit but across social. Add disclosure and endorsement rules to the mix, and the risk profile gets worse.\n\nWhy it misaligns with travel marketing\n\nTravel decisions are personal and social. People trust people (photos, stories, verified feedback) far more than brand lines. Getting an AI to say your name isn’t credibility; in fact AI agents themselves will cross check in the future , and if sentiment on the lived experience (from UGC) is thin or mediocre, the funnel collapses.\n\nCommunity and service are the foundation: loyalty programs, destination forums, and guest groups create belonging and authentic UGC that both humans and AI treat as credible. LLMs already lean on real reviews and first-hand accounts, so trying to game that signal with forum planting misses the point.\n\nIn conversational AI, the trust bar is higher (recommendations feel personal) so anything that reads like a sales pitch gets ignored and erodes confidence in both your brand and the assistant.\n\nWhat to do instead?\n\nDouble down on the inputs that reliably influence both humans and AI, and funnel these \"trust tokens\" to AI agents:\n1/ Build real communities. Help first, don’t plant.\n2/ Level up social. Listen, respond, and spotlight guest content (with credit). You curate; travelers tell the story.\n3/ Use credible creators. Partner with niche voices (family, food, eco, accessibility) who document real stays and persist across platforms.\n4/ Publish structured help in a machine understandable way. This includes current guides, itineraries, FAQs, and policies—clear for people and machines. Service first; SEO/AI follows.\n\nYou don’t need to whisper your brand into a model’s ear. Earn the recommendation in public where it counts: through service, community, storytelling, and transparent proof. When travelers vouch for you, AI will follow.","post_url":"https://www.linkedin.com/feed/update/urn:li:activity:7392918299778600960","post_urn":"urn:li:activity:7392918299778600960","posted_hours_ago":5040,"posted_time":"2025-11-25","posted_time_raw":"7mo","reaction_count":8,"reaction_types":"LIKE","source":"activity","video_url":"https://media.licdn.com/dms/image/v2/D4E05AQFic0hnCT4jKA/videocover-high/B4EZpjr_25J0CI-/0/1762609074563?e=1783008000&v=beta&t=J_smZ2sUPnu7Akoh8VYibPu4ea3wv-VUt-GOXcQUtrc"},{"article_description":null,"article_title":null,"article_url":null,"author_headline":"Deploying enterprise agents in production / CTO / SWE Leader / GVP @ Publicis Sapient","author_name":"Ravi Evani\n              \n                \n                   \n    \n      \n    \n    \n      \n    \n\n • You","author_profile_image_url":"https://media.licdn.com/dms/image/v2/C4E03AQGNeJRorEd2Nw/profile-displayphoto-shrink_100_100/profile-displayphoto-shrink_100_100/0/1569287114631?e=1784160000&v=beta&t=tJDZC7EXWnlgIIf8kF7fBCajhF-HEgzNXnz_IIkjqW8","author_profile_url":"https://www.linkedin.com/in/ravievani","comment_count":2,"has_image":false,"impression_count":719,"is_article":false,"is_my_post":true,"is_video":false,"post_image_url":null,"post_text":"What does OpenAI Agent Builder mean for Travel & Hospitality brands?\n\nBrand \u003c> Answering engine \u003c> Customer Agent \u003c> Customer\n\nOpenAI’s Agent Builder is a visual, drag-and-drop canvas to design, version, and govern multi-step AI agent workflows connecting models, tools, and guardrails without heavy code.\n\nImplication:\nWe’re basically moving into a world where both sides, brands and customers, are kind of operating through their own sets of AI intermediaries. On one hand, you have these answering engines or agents that deliver their own representation of a brand’s voice to the customer. And on the other hand, you could have customer-side agents that filter and interpret what they’re getting from those answering engines.\n\nSo it does become this two-sided dynamic. It’s not just the brand trying to get through to a human customer; it’s the brand trying to get through to a customer’s own digital agent that might be doing some of the filtering and sorting on their behalf. And yeah, that definitely compounds the challenge. It’s like a layer of representation on top of representation, and that’s a pretty fascinating shift.\n\nAnd you can kind of see this unfolding in real time. As these drag-and-drop agent builders become more popular, it means that on the brand side of travel and hospitality, you’re going to have to think about how your content, products and offerings are going to be understood and surfaced by these multiple layers of third-party agents.\n\nAnd when customers are making requests through their own AI agents, it brings yet another layer of complexity. Now you’re not just communicating directly to a human audience; you’re communicating to an intermediary layer that’s making decisions on their behalf.\n\nFor brands, that means becoming “agent-friendly” and “agent-readable”: structuring your information and offers so customer agents and answering engines can easily understand, prioritize, and pick you up; while recognizing these agents might filter out offers or content that doesn’t meet the customer’s predefined criteria. On the flip side, knowing that travelers might have their own AI agents means you have to think about how to stand out in that two-sided ecosystem.","post_url":"https://www.linkedin.com/feed/update/urn:li:activity:7392080166656827393","post_urn":"urn:li:activity:7392080166656827393","posted_hours_ago":5040,"posted_time":"2025-11-25","posted_time_raw":"7mo","reaction_count":9,"reaction_types":"LIKE, EMPATHY","source":"activity","video_url":null},{"article_description":null,"article_title":null,"article_url":null,"author_headline":"Deploying enterprise agents in production / CTO / SWE Leader / GVP @ Publicis Sapient","author_name":"Ravi Evani\n              \n                \n                   \n    \n      \n    \n    \n      \n    \n\n • You","author_profile_image_url":"https://media.licdn.com/dms/image/v2/C4E03AQGNeJRorEd2Nw/profile-displayphoto-shrink_100_100/profile-displayphoto-shrink_100_100/0/1569287114631?e=1784160000&v=beta&t=tJDZC7EXWnlgIIf8kF7fBCajhF-HEgzNXnz_IIkjqW8","author_profile_url":"https://www.linkedin.com/in/ravievani","has_image":false,"impression_count":1870,"is_article":false,"is_my_post":true,"is_video":false,"post_image_url":null,"post_text":"Simply adding the word \"Agentic\" does not make the Agentic Enterprise Architect.\n\nWhat this role is:\nA senior architect accountable for the design, governance, and scaling of agent ecosystems as first‑class enterprise platforms. Think platform architect + applied ML + SRE + security -- focused on responsiveness, reliability, and business outcomes, not model tinkering.\n\nWhy this role matters\nCoordination adds latency. Every hop: retrieval, planning, tool call, human handoff, taxes the user experience. Someone must own latency budgets, not just model quality.\n\nAccountability blurs. When multiple agents collaborate, “who broke it?” is non‑trivial. You need traceability, error budgets, and clear escalation paths.\n\nCore responsibilities\n\n① Reference architecture. Define the agent platform:\n➜ Control plane: policy engine, model/route selection, prompt/tool registry, evaluation harness.\n➜ Data plane: context services (RAG, feature stores), memory layers, vector/graph stores, event bus, integration fabric.\n➜ Trust & safety: RBAC, data boundaries, secrets, prompt‑injection defenses, audit and lineage.\n\n② Performance governance. Establish p50/p95/p99 targets for time‑to‑first‑token and end‑to‑task; set per‑hop latency budgets; decide when to parallelize vs. serialize.\n\n③ Reliability & observability. “Black box” is not an option. Standardize action logs, reasoning traces, tool call telemetry, and reproducible runs. Own incident response for agentic failures.\n\n④ Model and tool strategy. Criteria for when to route to small vs. large models, fine‑tunes vs. prompts, on‑prem vs. API; versioning and rollback plans.\n\n⑤ Security & compliance. Data residency, masking, PII handling, content safety policies, and vendor risk aligned to legal/audit requirements.\n\n⑥ Cost discipline. Token and compute budgets, per‑task unit economics, and capacity planning.\n\nBottom Line:\nIf you’re serious about production‑grade agents, name an Agentic Enterprise Architect. Give them the mandate to design the platform, enforce the budgets, and keep the experience fast, safe, and accountable.","post_url":"https://www.linkedin.com/feed/update/urn:li:activity:7391671054584213504","post_urn":"urn:li:activity:7391671054584213504","posted_hours_ago":5040,"posted_time":"2025-11-25","posted_time_raw":"7mo","reaction_count":24,"reaction_types":"LIKE, EMPATHY, INTEREST","source":"activity","video_url":null},{"article_description":null,"article_title":null,"article_url":null,"author_headline":"Deploying enterprise agents in production / CTO / SWE Leader / GVP @ Publicis Sapient","author_name":"Ravi Evani\n              \n                \n                   \n    \n      \n    \n    \n      \n    \n\n • You","author_profile_image_url":"https://media.licdn.com/dms/image/v2/C4E03AQGNeJRorEd2Nw/profile-displayphoto-shrink_100_100/profile-displayphoto-shrink_100_100/0/1569287114631?e=1784160000&v=beta&t=tJDZC7EXWnlgIIf8kF7fBCajhF-HEgzNXnz_IIkjqW8","author_profile_url":"https://www.linkedin.com/in/ravievani","has_image":true,"impression_count":380,"is_article":false,"is_my_post":true,"is_video":true,"post_image_url":"https://media.licdn.com/dms/image/v2/D4E05AQFxkay_jq1iFw/videocover-high/B4EZpPw0gSGUCI-/0/1762274799545?e=1783008000&v=beta&t=3roYFbd3c1IUXrTmkIZmVUcxlM2b_3CdLi33Br7A4Ww","post_text":"Travel brand AEO tips to optimize for ChatGPT Voice\n\nBuild for answers, not pages.\n\nThink in voice questions. Who, what, when, where, how. Pull the top guest questions from calls, reviews, and Google Business Profile Q&A.\n\nShip answer‑first content in JSON‑LD. Put the one‑sentence answer in your pages and schemas so agents can consume it.\n\nWrite for the ear. First sentence ≤20 words, natural phrasing, no fluff. It should sound right when read aloud.\n\nTune MCP and A2A agents for local + “near me.” Keep location, hours, amenities, and landmarks consistent across your site, GBP, and OTAs; test on ChatGPT / Gemini/ Perplexity voice.\n\nEarn agent priority. Make answers structured, current, and concise. Assign owners, timestamp updates, and eliminate contradictions across every surface.\n\nNot magic—just execution. Structure, clarity, consistency, speed. Fix performance, watch question queries, and iterate.\n\nExample line: “Rooftop pool? Yes—heated, 8am–10pm; towels provided; guests only.”\n\nBottom line: The answer is the interface. Write the sentence you want ChatGPT to say.","post_url":"https://www.linkedin.com/feed/update/urn:li:activity:7391516265414250496","post_urn":"urn:li:activity:7391516265414250496","posted_hours_ago":5040,"posted_time":"2025-11-25","posted_time_raw":"7mo","reaction_count":4,"reaction_types":"LIKE","source":"activity","video_url":"https://media.licdn.com/dms/image/v2/D4E05AQFxkay_jq1iFw/videocover-high/B4EZpPw0gSGUCI-/0/1762274799545?e=1783008000&v=beta&t=3roYFbd3c1IUXrTmkIZmVUcxlM2b_3CdLi33Br7A4Ww"},{"article_description":null,"article_title":null,"article_url":null,"author_headline":"Deploying enterprise agents in production / CTO / SWE Leader / GVP @ Publicis Sapient","author_name":"Ravi Evani\n              \n                \n                   \n    \n      \n    \n    \n      \n    \n\n • You","author_profile_image_url":"https://media.licdn.com/dms/image/v2/C4E03AQGNeJRorEd2Nw/profile-displayphoto-shrink_100_100/profile-displayphoto-shrink_100_100/0/1569287114631?e=1784160000&v=beta&t=tJDZC7EXWnlgIIf8kF7fBCajhF-HEgzNXnz_IIkjqW8","author_profile_url":"https://www.linkedin.com/in/ravievani","has_image":true,"impression_count":403,"is_article":false,"is_my_post":true,"is_video":true,"post_image_url":"https://media.licdn.com/dms/image/v2/D4E05AQHywPQJ4y9YNQ/videocover-high/B4EZpFtYvrHUCI-/0/1762106121181?e=1783008000&v=beta&t=R4zTBshn5JCTziKS2fO-wABLb15rHYIoxkln29kvj08","post_text":"For improved speed and costs: treat AI context like a ledger, not like a whiteboard.\n\nQuick tip for building the prompt context for AI agents=>\n\nFreeze the head: the instructions, the tool list, and the task description. Give each a version number. When something changes, bump the version. Do not edit history.\n\nAppend the tail: new messages, dynamic values, tool results, and updated header versions. When the thread grows, add a short summary as a new block. Leave old blocks alone. Keep the order steady. Don’t shuffle examples. Don’t put timestamps in the head.\n\nThis will leverage LLM caching and you will notice faster responses and lower cost.","post_url":"https://www.linkedin.com/feed/update/urn:li:activity:7390808774141399040","post_urn":"urn:li:activity:7390808774141399040","posted_hours_ago":5040,"posted_time":"2025-11-25","posted_time_raw":"7mo","reaction_count":5,"reaction_types":"LIKE, EMPATHY","source":"activity","video_url":"https://media.licdn.com/dms/image/v2/D4E05AQHywPQJ4y9YNQ/videocover-high/B4EZpFtYvrHUCI-/0/1762106121181?e=1783008000&v=beta&t=R4zTBshn5JCTziKS2fO-wABLb15rHYIoxkln29kvj08"},{"article_description":null,"article_title":null,"article_url":null,"author_headline":"Deploying enterprise agents in production / CTO / SWE Leader / GVP @ Publicis Sapient","author_name":"Ravi Evani\n              \n                \n                   \n    \n      \n    \n    \n      \n    \n\n • You","author_profile_image_url":"https://media.licdn.com/dms/image/v2/C4E03AQGNeJRorEd2Nw/profile-displayphoto-shrink_100_100/profile-displayphoto-shrink_100_100/0/1569287114631?e=1784160000&v=beta&t=tJDZC7EXWnlgIIf8kF7fBCajhF-HEgzNXnz_IIkjqW8","author_profile_url":"https://www.linkedin.com/in/ravievani","has_image":true,"impression_count":551,"is_article":false,"is_my_post":true,"is_video":true,"post_image_url":"https://media.licdn.com/dms/image/v2/D4E05AQE2AX-WTiKJIQ/videocover-high/B4EZpAGX5GJ0CM-/0/1762012009172?e=1783008000&v=beta&t=2r-Rezko-q02HyIb1jD9Vz55FJBvBdd2bT6O96jTpxE","post_text":"When AI sounds smooth, be extra careful. Here's how to steer \"confident\" AI agents.\n\n1) Start with the outcome, not the prompts.\nBe clear on what you need the agent to accomplish, and make sure it understands you.\n\n2) Require context sources, and verify at least one.\nTell the agent to list its sources. You (a human) open at least one primary source and mark it verified. If nothing verifiable shows up, the work pauses.\n\n3) Flip three assumptions, and check its reasoning.\nAsk for three plain‑English assumptions that it made, each with an opposite. Re‑run the recommendation under those opposites and see if its reasoning logic still holds true.\n\n4) Validate usefulness, not just smoothness.\nGive yourself time to dig into the details, beyond the glossy output. That will take time, but just because AI is fast, doesn't mean you have to be.\n\n5) Audit the Guardrails\nSet hard boundaries and a rollback path.\n\nFinally: put your initials on AI's output. Tools assist; people own outcomes.","post_url":"https://www.linkedin.com/feed/update/urn:li:activity:7390414038813384704","post_urn":"urn:li:activity:7390414038813384704","posted_hours_ago":5040,"posted_time":"2025-11-25","posted_time_raw":"7mo","reaction_count":9,"reaction_types":"LIKE, EMPATHY, INTEREST","source":"activity","video_url":"https://media.licdn.com/dms/image/v2/D4E05AQE2AX-WTiKJIQ/videocover-high/B4EZpAGX5GJ0CM-/0/1762012009172?e=1783008000&v=beta&t=2r-Rezko-q02HyIb1jD9Vz55FJBvBdd2bT6O96jTpxE"},{"article_description":null,"article_title":null,"article_url":null,"author_headline":"Deploying enterprise agents in production / CTO / SWE Leader / GVP @ Publicis Sapient","author_name":"Ravi Evani\n              \n                \n                   \n    \n      \n    \n    \n      \n    \n\n • You","author_profile_image_url":"https://media.licdn.com/dms/image/v2/C4E03AQGNeJRorEd2Nw/profile-displayphoto-shrink_100_100/profile-displayphoto-shrink_100_100/0/1569287114631?e=1784160000&v=beta&t=tJDZC7EXWnlgIIf8kF7fBCajhF-HEgzNXnz_IIkjqW8","author_profile_url":"https://www.linkedin.com/in/ravievani","comment_count":1,"has_image":true,"impression_count":665,"is_article":false,"is_my_post":true,"is_video":true,"post_image_url":"https://media.licdn.com/dms/image/v2/D4E05AQGm8CcxJHpsYA/videocover-high/B4EZo7WDN.HUCM-/0/1761932230740?e=1783008000&v=beta&t=sQcIKNBM7Pt3t0ihAkPzapzudco6rEw3a-ZbDDRNDms","post_text":"9:10 a.m. The agent confidently gives the wrong refund policy. Slack explodes: Product says steps ran, Data says the source was available, Eng says the pipeline was green.\n\nCOO: “Who owns the output?” Silence.\n\nEveryone’s right--and no one owns the outcome.\n\nAI agents don’t behave like deterministic software. Ownership isn’t about “did the workflow run,” it’s about “did the output solve the user’s problem, safely and economically.”\n\nYou need a single Owner of Record (AOR) because spinning up agents is cheap, but earning trust is not. Tools have made building easy; but adoption stalls when no one is accountable for whether outputs are correct, useful, and safe. An AOR keeps the problem, not the tool, at the center: sets outcome metrics, enforces evaluation gates, guards data fitness, and has the authority to stop or roll back when the agent drifts.\n\nFor each AI agent in production: Name the owner, define the problem, set thresholds, and hold the line.","post_url":"https://www.linkedin.com/feed/update/urn:li:activity:7390079421338058753","post_urn":"urn:li:activity:7390079421338058753","posted_hours_ago":5040,"posted_time":"2025-11-25","posted_time_raw":"7mo","reaction_count":13,"reaction_types":"LIKE, EMPATHY, APPRECIATION","source":"activity","video_url":"https://media.licdn.com/dms/image/v2/D4E05AQGm8CcxJHpsYA/videocover-high/B4EZo7WDN.HUCM-/0/1761932230740?e=1783008000&v=beta&t=sQcIKNBM7Pt3t0ihAkPzapzudco6rEw3a-ZbDDRNDms"},{"article_description":null,"article_title":null,"article_url":null,"author_headline":"Deploying enterprise agents in production / CTO / SWE Leader / GVP @ Publicis Sapient","author_name":"Ravi Evani\n              \n                \n                   \n    \n      \n    \n    \n      \n    \n\n • You","author_profile_image_url":"https://media.licdn.com/dms/image/v2/C4E03AQGNeJRorEd2Nw/profile-displayphoto-shrink_100_100/profile-displayphoto-shrink_100_100/0/1569287114631?e=1784160000&v=beta&t=tJDZC7EXWnlgIIf8kF7fBCajhF-HEgzNXnz_IIkjqW8","author_profile_url":"https://www.linkedin.com/in/ravievani","has_image":true,"impression_count":774,"is_article":false,"is_my_post":true,"is_video":true,"post_image_url":"https://media.licdn.com/dms/image/v2/D4E05AQHdW5E1Sj9rIA/videocover-high/B4EZo0vrNOKkCQ-/0/1761821510391?e=1783008000&v=beta&t=38sf4nbodY7RpWVhcspB0u74_MX2avbzrp0WBvOkte4","post_text":"Problem first. Then AI.\n\n“Use AI” isn’t a strategy, it’s a shortcut to wasted spend and AI theater. Start with a business problem and work backward.\n\nBefore any AI project, answer these in one page:\n\nWhat problem, stated in one sentence, are we solving?\nWhat value is at stake? Dollars, time, risk, or customer impact.\nWho will use it and what decision or workflow changes?\nWhat data is required and do we have the access, quality, and permissions?\nWhat small experiment proves value fast? Define metric, target, and timebox.\n\nHype starts with the tool. Results start with the problem.","post_url":"https://www.linkedin.com/feed/update/urn:li:activity:7389615028460683264","post_urn":"urn:li:activity:7389615028460683264","posted_hours_ago":5040,"posted_time":"2025-11-25","posted_time_raw":"7mo","reaction_count":9,"reaction_types":"LIKE","repost_count":1,"source":"activity","video_url":"https://media.licdn.com/dms/image/v2/D4E05AQHdW5E1Sj9rIA/videocover-high/B4EZo0vrNOKkCQ-/0/1761821510391?e=1783008000&v=beta&t=38sf4nbodY7RpWVhcspB0u74_MX2avbzrp0WBvOkte4"},{"article_description":"ChatGPT\nchatgpt.com","article_title":"ChatGPT","article_url":"http://chatgpt.com/","author_headline":"Deploying enterprise agents in production / CTO / SWE Leader / GVP @ Publicis Sapient","author_name":"Ravi Evani\n              \n                \n                   \n    \n      \n    \n    \n      \n    \n\n • You","author_profile_image_url":"https://media.licdn.com/dms/image/v2/C4E03AQGNeJRorEd2Nw/profile-displayphoto-shrink_100_100/profile-displayphoto-shrink_100_100/0/1569287114631?e=1784160000&v=beta&t=tJDZC7EXWnlgIIf8kF7fBCajhF-HEgzNXnz_IIkjqW8","author_profile_url":"https://www.linkedin.com/in/ravievani","comment_count":2,"has_image":true,"impression_count":2438,"is_article":true,"is_my_post":true,"is_video":false,"post_image_url":"https://media.licdn.com/dms/image/sync/v2/D4D27AQFbfbxyVAyOFw/articleshare-shrink_480/articleshare-shrink_480/0/1726519575445?e=1783008000&v=beta&t=Ma1zdGQNw6mO54Lx-LqXYJPWcray6Y8tI1hjbSFbnog","post_text":"Zomato’s MCP launch: what it signals for US QSR—and what they should do next\n\nWhat happened (https://lnkd.in/eyQPRzmq ):\nZomato published an MCP server that lets AI assistants perform the full ordering flow—discover restaurants, read menus, build carts, apply offers, and hand off a QR/pay link—all inside chat. The repo also whitelists chatgpt.com for OAuth, which means ChatGPT can connect where enabled.\n\nClaude already works with MCP servers; guides show end‑to‑end orders with automatic coupon application and a single checkout link. Meanwhile, ChatGPT added MCP support in Developer Mode, and OpenAI’s Agents SDK documents MCP directly—so the “order via chat” pattern is coming to U.S. users as tooling spreads.\n\nWhy US QSR marketers should care\n\nA new “agent” channel appears. Customers will type “Lunch for 6, half veg, under $12/head, 25‑min prep” and receive ready‑to‑checkout options—without opening your app or a marketplace UI. Your rank will depend on machine‑readable facts, not creative.\n\nAggregators will be the default surface at first. As soon as an aggregator exposes MCP endpoints, assistants will route there by default. If your data in those catalogs is incomplete, you’ll be invisible in agent shortlists.\nDirect can play too. With ChatGPT/Claude supporting MCP, brands can expose their own MCP server or connect via their POS/ordering stack—no marketplace required.\n\nWhat to do now:\n\n① Make your menu agent‑readable\n\n② Make offers machine‑actionable\n\n③ Tag dietary preferences consistently\n\n④ Ship group scenarios as one‑click bundles\n\n⑤ Publish store‑level fulfillment facts\n\n⑥ Wire your stack for the agent channel\n\nOrdering is moving from apps to AI assistants. The brands that expose clean data, bundles, and rules will win the agent’s shortlist—on aggregators and direct. Start by making your catalog intent‑ready, your promos machine‑actionable, and your fulfillment facts trustworthy.","post_url":"https://www.linkedin.com/feed/update/urn:li:activity:7389349055690141696","post_urn":"urn:li:activity:7389349055690141696","posted_hours_ago":5040,"posted_time":"2025-11-25","posted_time_raw":"7mo","reaction_count":21,"reaction_types":"LIKE, INTEREST","repost_count":1,"source":"activity","video_url":null},{"article_description":null,"article_title":null,"article_url":null,"author_headline":"Deploying enterprise agents in production / CTO / SWE Leader / GVP @ Publicis Sapient","author_name":"Ravi Evani\n              \n                \n                   \n    \n      \n    \n    \n      \n    \n\n • You","author_profile_image_url":"https://media.licdn.com/dms/image/v2/C4E03AQGNeJRorEd2Nw/profile-displayphoto-shrink_100_100/profile-displayphoto-shrink_100_100/0/1569287114631?e=1784160000&v=beta&t=tJDZC7EXWnlgIIf8kF7fBCajhF-HEgzNXnz_IIkjqW8","author_profile_url":"https://www.linkedin.com/in/ravievani","comment_count":2,"has_image":true,"impression_count":14140,"is_article":false,"is_my_post":true,"is_video":false,"post_image_url":"https://media.licdn.com/dms/image/v2/D4E22AQERHbcT-5VTsw/feedshare-shrink_800/B4EZovYqNDKYAg-/0/1761731590009?e=1784160000&v=beta&t=WGXirlmOLAbWJAhe3NQKIxUR6AwF7Iz0tUDcnKJ5uHg","post_text":"I had a wonderful time @ Publicis Sapient Chicago, meeting our team led by Amit, Rohan, Andre, that's doing cutting-edge work for our Hospitality clients.\n\nWe discussed how software professionals today are falling into three clear groups:\n\n① Those building AI and agents that solve real enterprise problems -- and using AI tools well to build them.\n② Those building traditional applications, but using AI tools well to build them faster, better, and cheaper.\n③ Those still building traditional applications, using AI tools poorly, or not at all.\n\nThe biggest gains, in skill, influence, and opportunity will come to those moving towards the first group. Proud that this team is firmly getting there!","post_url":"https://www.linkedin.com/feed/update/urn:li:activity:7389237863063715840","post_urn":"urn:li:activity:7389237863063715840","posted_hours_ago":5040,"posted_time":"2025-11-25","posted_time_raw":"7mo","reaction_count":197,"reaction_types":"LIKE, EMPATHY, PRAISE","repost_count":2,"source":"activity","video_url":null},{"article_description":null,"article_title":null,"article_url":null,"author_headline":"Deploying enterprise agents in production / CTO / SWE Leader / GVP @ Publicis Sapient","author_name":"Ravi Evani\n              \n                \n                   \n    \n      \n    \n    \n      \n    \n\n • You","author_profile_image_url":"https://media.licdn.com/dms/image/v2/C4E03AQGNeJRorEd2Nw/profile-displayphoto-shrink_100_100/profile-displayphoto-shrink_100_100/0/1569287114631?e=1784160000&v=beta&t=tJDZC7EXWnlgIIf8kF7fBCajhF-HEgzNXnz_IIkjqW8","author_profile_url":"https://www.linkedin.com/in/ravievani","has_image":true,"impression_count":2385,"is_article":false,"is_my_post":true,"is_video":true,"post_image_url":"https://media.licdn.com/dms/image/v2/D4E05AQHezh4ls6LPjQ/videocover-high/B4EZomGDPvJgB8-/0/1761575758560?e=1783008000&v=beta&t=2N73EJLhEhLcbvCG4QnE9kwOscHvMf1qPo2BsVY7xow","post_text":"Why does your enterprise AI not work so well? The answer is in your Context Graph.\n\nYou might already know this: providing high density, relevant context is key to getting high quality outputs from AI; whether you are building agents for your business, marketing, ops or software development.\n\nThe good news is: you probably already have tons of enterprise data.\nWhat’s missing is context--the business meaning SMEs built over years. That context is scattered in code and app screens, Excel and BI reports, Teams threads and wikis, cryptic schema fields, policy tables, and the relationships no one writes down.\n\nWithout the right context, AI agents and analytics answer generically. The fix is a context graph: a living map of your entities, relationships, definitions, and rules—so every team and agent can reason with the same truth through a Context API or MCP. With a context graph knowledge such as policies, rate fences, entitlements, SLAs, and data lineage become executable constraints, not tribal knowledge.\n\nA context graph is represented as a semantic layer over your systems that links:\n➜ Entities (customers, products, orders, assets, vendors)\n➜ Attributes and relationships (who connects to what and why)\n➜ Policies, SOP and business rules (how things are allowed to work)\n➜ Sources and lineage (where truth comes from)\n\nHow to build it (a journey, not a switch):\n① Inventory & seed: List top 50–100 entities, canonical terms, and must‑have policies. Pull from catalogs, schemas, reports, and SOPs.\n\n② Ingest & index: Connect data stores and documents. Parse and chunk unstructured content. Create embeddings for retrieval.\n\n③ Extract with LLMs: Use LLMs to propose entities, synonyms, relationships, and rules from structured and unstructured sources. Capture confidence scores.\n\n④ Curate with SMEs (human‑in‑the‑loop): Review suggestions in a lightweight UI. Approve, merge, or correct. Encode SME heuristics as labeling functions and policies.\n\n⑤ Model the graph: Store nodes, edges, and rules in a graph/metadata store. Keep permissions, lineage, and freshness metadata attached.\n\n⑥ Serve it: Expose a Context API/MCP so apps, workflows, and agents can resolve terms, fetch relationships, validate policies, and cite sources.\n\n⑦ Use a Graph schema: Combine vector retrieval with graph traversal. Let agents ground answers in documents and graph structure—better reasoning, fewer guesses.\n\n⑧ Operate & improve: Track coverage (% assets with terms), answer correctness with citations, time‑to‑find, and change freshness. Retrain prompts and rules from feedback.\n\nBuild the graph, expose it once, and let every system and agent think with your business context. Leverage the context graph via MCP / APIs across your business, decision support, software development, marketing & sales workflows.\n\nLooking for a shortcut? Try Publicis Sapient\nhashtag#Bodhi https://lnkd.in/etrtCpqm which comes with a built-in capability to create and manage context graphs for enterprises.","post_url":"https://www.linkedin.com/feed/update/urn:li:activity:7388584375761920000","post_urn":"urn:li:activity:7388584375761920000","posted_hours_ago":5040,"posted_time":"2025-11-25","posted_time_raw":"7mo","reaction_count":25,"reaction_types":"LIKE","source":"activity","video_url":"https://media.licdn.com/dms/image/v2/D4E05AQHezh4ls6LPjQ/videocover-high/B4EZomGDPvJgB8-/0/1761575758560?e=1783008000&v=beta&t=2N73EJLhEhLcbvCG4QnE9kwOscHvMf1qPo2BsVY7xow"},{"article_description":null,"article_title":null,"article_url":null,"author_headline":"Deploying enterprise agents in production / CTO / SWE Leader / GVP @ Publicis Sapient","author_name":"Ravi Evani\n              \n                \n                   \n    \n      \n    \n    \n      \n    \n\n • You","author_profile_image_url":"https://media.licdn.com/dms/image/v2/C4E03AQGNeJRorEd2Nw/profile-displayphoto-shrink_100_100/profile-displayphoto-shrink_100_100/0/1569287114631?e=1784160000&v=beta&t=tJDZC7EXWnlgIIf8kF7fBCajhF-HEgzNXnz_IIkjqW8","author_profile_url":"https://www.linkedin.com/in/ravievani","has_image":false,"impression_count":827,"is_article":false,"is_my_post":true,"is_video":false,"post_image_url":null,"post_text":"Resilience is a product and operations choice. The cloud is just the tool.\n\nQuestions to ask your team this week:\n1. Which three user journeys must stay alive during an outage?\n2. What exactly happens (screen by screen) when our primary dependency is down?\n3. What metrics will we review after the next incident to learn, not blame?","post_url":"https://www.linkedin.com/feed/update/urn:li:activity:7386148342617088000","post_urn":"urn:li:activity:7386148342617088000","posted_hours_ago":5760,"posted_time":"2025-10-25","posted_time_raw":"8mo","reaction_count":6,"reaction_types":"LIKE","source":"activity","video_url":null},{"article_description":null,"article_title":null,"article_url":null,"author_headline":"Deploying enterprise agents in production / CTO / SWE Leader / GVP @ Publicis Sapient","author_name":"Ravi Evani\n              \n                \n                   \n    \n      \n    \n    \n      \n    \n\n • You","author_profile_image_url":"https://media.licdn.com/dms/image/v2/C4E03AQGNeJRorEd2Nw/profile-displayphoto-shrink_100_100/profile-displayphoto-shrink_100_100/0/1569287114631?e=1784160000&v=beta&t=tJDZC7EXWnlgIIf8kF7fBCajhF-HEgzNXnz_IIkjqW8","author_profile_url":"https://www.linkedin.com/in/ravievani","has_image":false,"impression_count":1248,"is_article":false,"is_my_post":true,"is_video":false,"post_image_url":null,"post_text":"Glossy AI keynotes and demos don’t mean much for Travel & Hospitality operations systems. Only reliability matters. Here’s why.\n\nFor a moment, let’s put aside the hype and go straight into the engine room where startups, AI labs, and execs want AI agents to make systems semi-\"autonomous\".\n\nAutonomy isn’t a switch you flip; it’s earned through reliability proven in production, not in a boardroom.\n\nThink of it as the march of nines:\n90%, 99%, 99.9%, 99.99%, 99.999%.\n\nEach step gets exponentially harder because you stop solving common cases and start hunting the rare, ugly ones. Going from 99% to 99.9% means tracking down the one-in-a-thousand mix of a market spike, a stale feed, and a sensor glitch that only shows up when you least expect it.\n\nThat’s why a polished demo tells you very little. In controlled settings, everything works. But operations technology lives in the wild: midnight turnovers, flight diversions, PMS outages, temperature swings, and half-patched devices. The real measure isn’t how smooth the demo runs; it’s how the system holds up when things break.\n\nEarning those nines takes months and often years. Even with AI, that's unlikely to change in the foreseeable future.\n\nYou’ll need synthetic data for edge cases, large-scale simulation for stress, and clear fallbacks for every failure mode. You judge progress with production scorecards: decision accuracy, false action cost, human override rate, and time to safe state. Every “nine” is earned with evidence.\n\nSo yes, show the demo to start a conversation. But don’t mistake it for progress.\n\nIn operations AI, reliability is the product. Everything else is theater.","post_url":"https://www.linkedin.com/feed/update/urn:li:activity:7385870797682286593","post_urn":"urn:li:activity:7385870797682286593","posted_hours_ago":5760,"posted_time":"2025-10-25","posted_time_raw":"8mo","reaction_count":21,"reaction_types":"LIKE, EMPATHY","source":"activity","video_url":null},{"article_description":null,"article_title":null,"article_url":null,"author_headline":"Deploying enterprise agents in production / CTO / SWE Leader / GVP @ Publicis Sapient","author_name":"Ravi Evani\n              \n                \n                   \n    \n      \n    \n    \n      \n    \n\n • You","author_profile_image_url":"https://media.licdn.com/dms/image/v2/C4E03AQGNeJRorEd2Nw/profile-displayphoto-shrink_100_100/profile-displayphoto-shrink_100_100/0/1569287114631?e=1784160000&v=beta&t=tJDZC7EXWnlgIIf8kF7fBCajhF-HEgzNXnz_IIkjqW8","author_profile_url":"https://www.linkedin.com/in/ravievani","comment_count":17,"has_image":true,"impression_count":16275,"is_article":false,"is_my_post":true,"is_video":false,"post_image_url":"https://media.licdn.com/dms/image/v2/D4E22AQHXauCs5ex8tA/feedshare-shrink_800/B4EZn2h7H8HgAg-/0/1760777721073?e=1784160000&v=beta&t=79RtmdWTywUT6Ool2QhZRXT6aqOB2e-l2SHuAT2nENA","post_text":"How does a 3-star beat a 5-star hotel for a business traveler? Hint: It's not AI, It's this shower test:\n\nA well-lit shower.\nTaps you don’t need a scientist to figure out.\nStrong hot water pressure to wake you up.\nA non-slip mat so you can stand without fear.\nBig, legible labels on the dispensers to see through the mist.\nAnd a hook with easy access to a dry towel.\n\nDesign matters. Basics done right beat eloquent chatbots or AI concierges. They remove friction, save time, and add a spring to your step.\n\nSome have nailed this. Check the comment for my pick. Who else deserves a mention?","post_url":"https://www.linkedin.com/feed/update/urn:li:activity:7385237045293768704","post_urn":"urn:li:activity:7385237045293768704","posted_hours_ago":5760,"posted_time":"2025-10-25","posted_time_raw":"8mo","reaction_count":52,"reaction_types":"LIKE, EMPATHY, INTEREST","source":"activity","video_url":null},{"article_description":null,"article_title":null,"article_url":null,"author_headline":"Deploying enterprise agents in production / CTO / SWE Leader / GVP @ Publicis Sapient","author_name":"Ravi Evani\n              \n                \n                   \n    \n      \n    \n    \n      \n    \n\n • You","author_profile_image_url":"https://media.licdn.com/dms/image/v2/C4E03AQGNeJRorEd2Nw/profile-displayphoto-shrink_100_100/profile-displayphoto-shrink_100_100/0/1569287114631?e=1784160000&v=beta&t=tJDZC7EXWnlgIIf8kF7fBCajhF-HEgzNXnz_IIkjqW8","author_profile_url":"https://www.linkedin.com/in/ravievani","comment_count":4,"has_image":true,"impression_count":30228,"is_article":false,"is_my_post":true,"is_video":false,"post_image_url":"https://media.licdn.com/dms/image/v2/D4E22AQHoQbFQBOQyuA/feedshare-shrink_800/B4EZnmwFTIKcAg-/0/1760512989178?e=1784160000&v=beta&t=PFTWt5qqV6YhluZ5ZZdMlWRToij3NH1asgzp_bJp0KY","post_text":"\"Sit here if you've ever said what scared you\" was written on the big red chair at the hashtag#Learnfinity 3-day AI learning event at our Publicis Sapient Bengaluru office. Rakesh and I, of course, took the seat.\n\nFacing fear isn’t always about cliff-dives. Most days it’s smaller: speaking up in a group, doing that push-up, trying a new tool, or reaching out to someone unfamiliar.\n\nHere’s the paradox: in our comfort zone we feel more inertia and fear of change. In “survival mode,” the fear disappears because the brain prioritizes action. But living in survival mode isn’t sustainable--and it isn’t calm.\n\nSo what actually works? Doing the thing, and then doing a little more of the thing.\n\nMost everyday fear isn’t existential; it’s a mix of boredom, uncertainty, mild discomfort, or fear of disappointing ourselves. The antidote is motion. Take the smallest possible step, then let that step become your new baseline—your new comfort zone. Repeat.\n\nProgress works like this:\n\nStart tiny. One rep. One new prompt. Stand up and speak once.\nStabilize. Keep it there, repeat daily until it feels normal.\nRatchet. Nudge it up slightly; let that become the new normal.\nRepeat. Baselines rise; fear falls.\n\nWeek to week, it can feel like “not much is happening.” Over a couple of years, the compounding is obvious. The baseline you stand on keeps climbing, and what once felt scary becomes automatic.","post_url":"https://www.linkedin.com/feed/update/urn:li:activity:7384126679687909376","post_urn":"urn:li:activity:7384126679687909376","posted_hours_ago":5760,"posted_time":"2025-10-25","posted_time_raw":"8mo","reaction_count":221,"reaction_types":"LIKE, EMPATHY, INTEREST","repost_count":4,"source":"activity","video_url":null},{"article_description":null,"article_title":null,"article_url":null,"author_headline":"Deploying enterprise agents in production / CTO / SWE Leader / GVP @ Publicis Sapient","author_name":"Ravi Evani\n              \n                \n                   \n    \n      \n    \n    \n      \n    \n\n • You","author_profile_image_url":"https://media.licdn.com/dms/image/v2/C4E03AQGNeJRorEd2Nw/profile-displayphoto-shrink_100_100/profile-displayphoto-shrink_100_100/0/1569287114631?e=1784160000&v=beta&t=tJDZC7EXWnlgIIf8kF7fBCajhF-HEgzNXnz_IIkjqW8","author_profile_url":"https://www.linkedin.com/in/ravievani","comment_count":4,"has_image":true,"impression_count":3424,"is_article":false,"is_my_post":true,"is_video":true,"post_image_url":"https://media.licdn.com/dms/image/v2/D4E05AQGwuQ3XCcrHLQ/videocover-low/B4EZnj___sKkCQ-/0/1760466841971?e=1783008000&v=beta&t=U0BKgiPd7U6Mwsv9EbqK7NzVh0mWUnsmczlSMji5rQ8","post_text":"How Hoteliers Can Stand Out to AI Agents\n\nTL;DR: Humans love stories; but AI agents need data. So turn your brand promise into structured facts and publish them consistently.\n\nThe playbook (in 3 steps)\n① Codify your promise as fields\n② Replace adjectives with attributes (e.g., connectingRoomsGuaranteed: true).\n③ Publish everywhere machines look\n\nOne example: Family City Break\nWhat the guest asks an agent: “Two adults + two kids, under $200/night, near the aquarium, late checkout, EV charger.”\n\nTurn the brand differentiation into fields\n\nMust-haves (eligibility):\n➜ connectingRoomsGuaranteed: true or roomLayout in [\"1BR\",\"2BR\"]\ncribsAvailable: true • stepFreeAccess: true • poolLifeguardOnDuty: true\n\nNice-to-haves (boosts):\n➜ distanceToAttractionMeters \u003c= 1500 • wifiMinThroughputMbps >= 100\nquietRoomScore >= 8 • evChargers.count >= 2 • lateCheckoutGuaranteed: \"14:00\"\n\nMake your story legible to machines first--so you evantually reach the human who books. That's the new way.","post_url":"https://www.linkedin.com/feed/update/urn:li:activity:7383933171274260481","post_urn":"urn:li:activity:7383933171274260481","posted_hours_ago":5760,"posted_time":"2025-10-25","posted_time_raw":"8mo","reaction_count":54,"reaction_types":"LIKE, INTEREST","repost_count":2,"source":"activity","video_url":"https://media.licdn.com/dms/image/v2/D4E05AQGwuQ3XCcrHLQ/videocover-low/B4EZnj___sKkCQ-/0/1760466841971?e=1783008000&v=beta&t=U0BKgiPd7U6Mwsv9EbqK7NzVh0mWUnsmczlSMji5rQ8"},{"article_description":null,"article_title":null,"article_url":null,"author_headline":"Deploying enterprise agents in production / CTO / SWE Leader / GVP @ Publicis Sapient","author_name":"Ravi Evani\n              \n                \n                   \n    \n      \n    \n    \n      \n    \n\n • You","author_profile_image_url":"https://media.licdn.com/dms/image/v2/C4E03AQGNeJRorEd2Nw/profile-displayphoto-shrink_100_100/profile-displayphoto-shrink_100_100/0/1569287114631?e=1784160000&v=beta&t=tJDZC7EXWnlgIIf8kF7fBCajhF-HEgzNXnz_IIkjqW8","author_profile_url":"https://www.linkedin.com/in/ravievani","comment_count":3,"has_image":true,"impression_count":1746,"is_article":false,"is_my_post":true,"is_video":false,"post_image_url":"https://media.licdn.com/dms/image/v2/D4E22AQF4hHYgA4TsQw/feedshare-shrink_800/B4EZnGR8VLKYAg-/0/1759968217554?e=1784160000&v=beta&t=2jGgoUmqy1zm4fQ6SOhYKyUMP1f7FpBjWqArSUk4M4g","post_text":"Rethinking Travel & Hospitality (or any) Apps in the Age of Ambient AI Intelligence\n\nTraditionally, apps have been designed with their own little islands of persistence. They remember what you did last time, they store your settings, and they respond to explicit intents you set. But now, we’re moving into a paradigm where the app is living inside a larger, contextually rich intelligence lay
