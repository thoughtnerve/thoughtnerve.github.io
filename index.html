ily tap into the stock held by their own network).\n\nThe Solution: Universal Inventory Access.\nImplement an Autonomous Inventory Swarm; designed to turn these silos into a single, fluid pool of assets. Instead of waiting for a central system to \"grant access\" to stock, every location has a dedicated agent that proactively offers its inventory to the network.\n\nWhen stock becomes \"inaccessible\" at one node, the swarm automatically finds the next best point of access. The agents negotiate the terms of that access—ETAs, shipping costs, and availability—with a bit of human in the loop.\n\nThe Value\n⊙ Asset Liquidity: Your inventory becomes a liquid asset that moves to the point of demand, drastically increasing the \"return on stock.\"\n⊙ Reduced Overstock: Because agents can reliably access inventory from the network, individual stores can carry leaner \"safety stock\" levels, freeing up capital.\n⊙ True Unified Commerce: It moves beyond just seeing inventory in other locations to actually accessing it through a frictionless, automated handshake.\n\nThis level of accessibility requires a universal key. That is precisely what the Universal Commerce Protocol (UCP) provides.\n\n⊙ UCP provides the standardized primitives for Discovery and Interoperability. By implementing UCP capabilities we move from private, proprietary APIs to a standard that allows any agent to securely \"request access\" to another's stock.\n\n⊙ UCP is the standardized language that bridges the access gap between disparate commerce entities.\n\nImplementation Approach: Enabling the Access Network\n\n⊙ The Autonomous Agents (A2A): Built with Python and FastAPI, these agents act as the technical \"gatekeepers\" of accessibility. Each agent (like our SoHoAgent or WarehouseAgent) contains the local business logic required to decide when and how to grant access to its inventory.\n\n⊙ Standardized Message Envelopes: Using the UCP spec, every request for access is wrapped in a UcpMessage. This ensures that the \"intent to access\" and the \"terms of availability\" are communicated with perfect type-safety and standard compliance.\n\n⊙ The Access Dashboard: A Next.js frontend visualizes this real-time network of accessibility, showing the \"mesh\" of stores and the flow of inventory as it moves from where it is stored to where it is needed.","post_url":"https://www.linkedin.com/feed/update/urn:li:activity:7423052054052499457","post_urn":"urn:li:activity:7423052054052499457","posted_hours_ago":2880,"posted_time":"2026-02-25","posted_time_raw":"4mo","reaction_count":23,"reaction_types":"LIKE, INTEREST","repost_count":2,"source":"activity","video_url":"https://media.licdn.com/dms/image/v2/D5605AQHRrBzwHQ4yZA/videocover-low/B56ZwP6dc8IQBY-/0/1769793511137?e=1783008000&v=beta&t=uW52lRq7WKnVC1Smcojt-yOKKOfoPnUW9VrJyIJ19Dg"},{"article_description":null,"article_title":null,"article_url":null,"author_headline":"Deploying enterprise agents in production / CTO / SWE Leader / GVP @ Publicis Sapient","author_name":"Ravi Evani\n              \n                \n                   \n    \n      \n    \n    \n      \n    \n\n • You","author_profile_image_url":"https://media.licdn.com/dms/image/v2/C4E03AQGNeJRorEd2Nw/profile-displayphoto-shrink_100_100/profile-displayphoto-shrink_100_100/0/1569287114631?e=1784160000&v=beta&t=tJDZC7EXWnlgIIf8kF7fBCajhF-HEgzNXnz_IIkjqW8","author_profile_url":"https://www.linkedin.com/in/ravievani","comment_count":8,"has_image":false,"impression_count":4110,"is_article":false,"is_my_post":true,"is_video":false,"post_image_url":null,"post_text":"Vibe coding is moving past the prototype phase and into “this can ship” territory.\n\nA few months ago, the concerns were valid. Maintainability. Architecture drift. Code that looks right but behaves wrong. That gap is shrinking fast. “Copilots” are getting more accurate, toolchains are better at using repo context, and the review loop is tightening.\n\nI predict that here’s where a new profile shows up: the vibe polyglot. Someone who can combine product clarity, engineering judgment, design instincts, and AI steering to produce the right artifacts repeatedly.\n\nWe will have vibe polyglots who specialize in a specific assistant or toolchain. A Claude-first builder. A GitHub Copilot power user. An Antigravity specialist who knows the Gemini platform’s patterns, constraints, and failure modes.\n\nWhere will the demand come from? from both SaaS and Enterprises.\n\nSaaS companies are being pushed by large customers to personalize deeper. Custom workflows. Custom integrations. Custom ontologies. The more enterprise the customer, the less “out of the box” works. SaaS vendors will need vibe polyglots to make personalization scalable without turning every deal into a services project.\n\nEnterprises are also doubling down on build, but with different economics. AI compresses the cost of creating internal tools, modernizing legacy systems, and stitching workflows across vendors. The enterprise does not just want software faster. It wants software shaped to its operating model. That needs orchestration plus domain understanding.\n\nSame talent, valuable on both sides.\n\nSaaS needs it to productize personalization. Enterprises need it to industrialize customization.\n\nSo, If you are a software professional asking “what should I do next,” here’s practical direction.\n\nFirst, pick a lane. Start broad enough to orchestrate end to end delivery. Then pick a specialty where you can build depth. One assistant. One toolchain. One domain where you can become the person others rely on.\n\nSecond, get fluent in the toolchain, not just the model. Prompting is not the skill. The skill is a repeatable workflow. Context setup. Constraints. Test harness. Review patterns. Tight iteration loops.\n\nThird, build something small but real. Not a demo. Something you will use at work next week. A spec generator. A decision-log assistant. A status-to-insight tool. A repo onboarding copilot. Reliability under real constraints is the whole game.\n\nFourth, upgrade how you think about quality. In a faster build loop, quality becomes systems thinking. Automated checks. Traceability. Test generation. Architecture guardrails. Your leverage is making speed safe.\n\nIf you lead teams, your job changes too.\n\nYou are not only managing engineers. You are managing the operating system. The tools, the cadence, the standards, the context discipline, and the specialization map of your team. The best leaders will build an environment where these polyglots can produce high quality output consistently.","post_url":"https://www.linkedin.com/feed/update/urn:li:activity:7422119807766155264","post_urn":"urn:li:activity:7422119807766155264","posted_hours_ago":2880,"posted_time":"2026-02-25","posted_time_raw":"4mo","reaction_count":34,"reaction_types":"LIKE, INTEREST, PRAISE","source":"activity","video_url":null},{"article_description":null,"article_title":null,"article_url":null,"author_headline":"Deploying enterprise agents in production / CTO / SWE Leader / GVP @ Publicis Sapient","author_name":"Ravi Evani\n              \n                \n                   \n    \n      \n    \n    \n      \n    \n\n • You","author_profile_image_url":"https://media.licdn.com/dms/image/v2/C4E03AQGNeJRorEd2Nw/profile-displayphoto-shrink_100_100/profile-displayphoto-shrink_100_100/0/1569287114631?e=1784160000&v=beta&t=tJDZC7EXWnlgIIf8kF7fBCajhF-HEgzNXnz_IIkjqW8","author_profile_url":"https://www.linkedin.com/in/ravievani","has_image":false,"impression_count":1832,"is_article":false,"is_my_post":true,"is_video":false,"post_image_url":null,"post_text":"The jump from “we have an AI platform” to “AI is running in the business” is where most enterprises stall. Not because the model is weak, but because the last mile is a messy software-and-operations problem: data access, integration, verification, adoption, and ownership.\n\nThat’s what an internal Forward Deployed Talent (FDT) charter is for. It’s a small, embedded team model whose job is to repeatedly convert AI capability into working workflows.\n\nHere’s the practical way to think about it.\n\nFirst, move past pilot drift.\nNot because pilots are useless, but because most pilots avoid the hard parts: real data permissions, messy inputs, integration into the system people actually use, and the edge cases that show up on day 10. FDT replaces “pilot” with short, time-boxed sprints (3–5 days) that force contact with reality: live or representative data, a real user, a real workflow touchpoint, and a working output at the end.\n\nSecond, treat trust as something you engineer, not something you argue about.\nMost AI rollouts die in review meetings because nobody can answer the same questions consistently: “How do we know it’s correct? What happens when it’s wrong? Can we audit it?” FDT makes trust evidence part of the deliverable—tests/evaluations, traceability, known limits, failure modes, and a clear escalation path. You’re not asking leaders to believe. You’re giving them proof they can sign off on.\n\nFinally, scale by transferring the build muscle, not by centralizing it.\nIf every new use case depends on the same central team to rebuild everything, you’ve created the next bottleneck. FDT’s job is to build with domain teams, leave behind reusable patterns, and make the domain capable of extending the workflow without waiting in line. That’s the “learn to fish” model, and it’s the only way AI scales without linear headcount growth.\n\nIn the end, success with enterprise AI isn’t just about having the best platform or the best model. It’s about having a repeatable execution layer that converts AI capability into operational workflows. That’s what the FDT charter is trying to institutionalize.","post_url":"https://www.linkedin.com/feed/update/urn:li:activity:7421536798515986433","post_urn":"urn:li:activity:7421536798515986433","posted_hours_ago":2880,"posted_time":"2026-02-25","posted_time_raw":"4mo","reaction_count":39,"reaction_types":"LIKE, EMPATHY, INTEREST","source":"activity","video_url":null},{"article_description":null,"article_title":null,"article_url":null,"author_headline":"Deploying enterprise agents in production / CTO / SWE Leader / GVP @ Publicis Sapient","author_name":"Ravi Evani\n              \n                \n                   \n    \n      \n    \n    \n      \n    \n\n • You","author_profile_image_url":"https://media.licdn.com/dms/image/v2/C4E03AQGNeJRorEd2Nw/profile-displayphoto-shrink_100_100/profile-displayphoto-shrink_100_100/0/1569287114631?e=1784160000&v=beta&t=tJDZC7EXWnlgIIf8kF7fBCajhF-HEgzNXnz_IIkjqW8","author_profile_url":"https://www.linkedin.com/in/ravievani","comment_count":3,"has_image":true,"impression_count":3004,"is_article":false,"is_my_post":true,"is_video":false,"post_image_url":"https://media.licdn.com/dms/image/v2/D4E22AQEdIsHCIkcn7Q/feedshare-shrink_800/B4EZvwEpk.H8Ag-/0/1769259309738?e=1784160000&v=beta&t=12iw93aij-XlUQSO7-k3vio_FUqQX3eo0I5Yb5EHuBU","post_text":"Enterprises keep using Copilot/Cursor for legacy system modernization and then act surprised when it goes sideways.\n\nThe reason is simple: inner-loop acceleration and system reconstruction are not the same job. They don’t fail for the same reasons, and they can’t be solved with the same kind of tools.\n\nInner-loop acceleration is “help me finish this thought”.\nAutocomplete, refactors, snippets, quick tests, faster iteration inside a small set of files. Copilot and Cursor are built for this. They sit next to the developer and make the edit-build-test loop less painful. If the architecture is known and the intent is clear, they can save real time.\n\nSystem reconstruction is “rebuild decades of behavior without changing outcomes”.\nThat’s legacy modernization. The hard part isn’t generating Java or C# from languages like COBOL. The hard part is preserving the meaning that’s smeared across copybooks, batch jobs, data definitions, hidden flags, and historical exceptions that only show up in production edge cases.\n\nThis is where coding assistants are structurally misfit. They live in the present moment. They don’t have durable memory of the system’s semantics. So when they can’t see the definition of something they don’t pause. They guess. And in modernization, a plausible guess is the most dangerous output you can get: it compiles, it passes some tests, and it silently corrupts the business rule.\n\nThat’s also why teams fall into the “70% illusion\".\nThe first chunk looks fast because the assistant produces a lot of code. Leaders see velocity. Then the remaining work explodes: subtle equivalence gaps, transaction behavior, timing, precision, integration contracts, and all the non-functional realities the mainframe relied on. Engineers end up debugging AI-generated assumptions instead of implementing known logic. The project doesn’t just slow down, it becomes harder to reason about.\n\nA modernization effort needs three things that coding assistants don’t provide:\n\nPersistent system context\nA shared model of the estate that survives across sessions and across teams: what the modules do, what data they touch, what constraints they operate under, what exceptions exist, what upstream/downstream dependencies matter.\n\nOrchestrated work across the outer loop\nNot just code generation, but discovery, decomposition, target design, change sequencing, integration planning, and CI/CD execution. Modernization lives in the pipeline and architecture, not just in the editor.\n\nProof of functional equivalence\nAutomated validation that the new system produces the same outputs as the old one for the same inputs: at scale, continuously, with an audit trail. Not “we ran a few tests,” but “we can show the evidence\".\n\nThat’s why legacy modernization needs an agentic approach that can reconstruct the system, remember what it learns, and validates behavior as it transforms code.","post_url":"https://www.linkedin.com/feed/update/urn:li:activity:7420811407304073216","post_urn":"urn:li:activity:7420811407304073216","posted_hours_ago":3600,"posted_time":"2026-01-25","posted_time_raw":"5mo","reaction_count":66,"reaction_types":"LIKE, INTEREST","repost_count":5,"source":"activity","video_url":null},{"article_description":null,"article_title":null,"article_url":null,"author_headline":"Deploying enterprise agents in production / CTO / SWE Leader / GVP @ Publicis Sapient","author_name":"Ravi Evani\n              \n                \n                   \n    \n      \n    \n    \n      \n    \n\n • You","author_profile_image_url":"https://media.licdn.com/dms/image/v2/C4E03AQGNeJRorEd2Nw/profile-displayphoto-shrink_100_100/profile-displayphoto-shrink_100_100/0/1569287114631?e=1784160000&v=beta&t=tJDZC7EXWnlgIIf8kF7fBCajhF-HEgzNXnz_IIkjqW8","author_profile_url":"https://www.linkedin.com/in/ravievani","has_image":true,"impression_count":1217,"is_article":false,"is_my_post":true,"is_video":true,"post_image_url":"https://media.licdn.com/dms/image/v2/D4E05AQGlpteMO_2NUQ/videocover-low/B4EZu2MSuWKUBQ-/0/1768288236470?e=1783008000&v=beta&t=i64v0-1IOcLzEJZFV1_OIIGW_l67FGy_pDeXFx_-_Qc","post_text":"Ever found yourself scrubbing through a 30-minute YouTube tutorial or a NotebookLM podcast just to find that one 20-second explanation?\n\nI couldn’t find a media player that made this easy, so I built a simple media player where I could drop markers anywhere in a video/audio file and jump straight to them later. It turns a long recording into a short list of “the parts that matter.”\n\nWhat I didn’t expect was how useful this became at work. I had a presentation where I needed to play a demo and pause at specific points. Instead of worrying about hitting pause at the exact second while I was speaking, I marked the moments ahead of time and the demo stopped where I needed it to and made it a little less stressful for me.\n\nStarting to realize that vibe coding can make life a tad bit easier!","post_url":"https://www.linkedin.com/feed/update/urn:li:activity:7416738444187570177","post_urn":"urn:li:activity:7416738444187570177","posted_hours_ago":3600,"posted_time":"2026-01-25","posted_time_raw":"5mo","reaction_count":21,"reaction_types":"LIKE","source":"activity","video_url":"https://media.licdn.com/dms/image/v2/D4E05AQGlpteMO_2NUQ/videocover-low/B4EZu2MSuWKUBQ-/0/1768288236470?e=1783008000&v=beta&t=i64v0-1IOcLzEJZFV1_OIIGW_l67FGy_pDeXFx_-_Qc"},{"article_description":null,"article_title":null,"article_url":null,"author_headline":"Deploying enterprise agents in production / CTO / SWE Leader / GVP @ Publicis Sapient","author_name":"Ravi Evani\n              \n                \n                   \n    \n      \n    \n    \n      \n    \n\n • You","author_profile_image_url":"https://media.licdn.com/dms/image/v2/C4E03AQGNeJRorEd2Nw/profile-displayphoto-shrink_100_100/profile-displayphoto-shrink_100_100/0/1569287114631?e=1784160000&v=beta&t=tJDZC7EXWnlgIIf8kF7fBCajhF-HEgzNXnz_IIkjqW8","author_profile_url":"https://www.linkedin.com/in/ravievani","comment_count":3,"has_image":false,"impression_count":3615,"is_article":false,"is_my_post":true,"is_video":false,"post_image_url":null,"post_text":"Two camps are forming in AI-assisted coding, and it’s forcing a real leadership choice.\n\nThe first camp is craft-first engineering. People here care about maintainability, clean architecture, and systems that don’t turn into a liability six months after launch. When AI starts producing huge volumes of code, the discomfort isn’t “AI is bad.” It’s that the shape of control changes. If you’re accountable for uptime, security, audits, and long-term cost, “more code faster” can feel like faster chaos.\n\nThe second camp is value-first shipping. People here optimize for user impact and speed to learning. They’re not trying to build junk, but they are allergic to perfection work that doesn’t move a customer metric. For them, AI is a multiplier: compress the cycle time, get feedback sooner, and don’t mistake internal elegance for external value.\n\nThe mistake is treating this like a culture war. Enterprises don’t get to pick one. They need both, and they need them to converge into a single operating system.\n\nSo, what might convergence look like? Perhaps something like this:\n\n➜ Control moves upstream. We stop debating code style after the fact, but become ruthless about clarity in intent: specs, constraints, invariants, acceptance criteria.\n\n➜ Speed is allowed, but it’s bounded. Interfaces, data contracts, security policies, and test gates become the rails that keep AI output from becoming entropy.\n\n➜ Quality becomes a system, not a hero move. Reviews shift from “did you write this perfectly” to “is this traceable, testable, safe, and observable.”\n\n➜ Engineering is measured by outcomes and durability. Shipping without reliability is debt. Reliability without impact is internal theater.\n\nThis is where leadership matters. Not in taking sides, but in designing the conditions where both instincts can win at the same time.\n\nIn the AI coding era, enterprises will win by shipping fast with provable reliability.","post_url":"https://www.linkedin.com/feed/update/urn:li:activity:7416509969270984704","post_urn":"urn:li:activity:7416509969270984704","posted_hours_ago":3600,"posted_time":"2026-01-25","posted_time_raw":"5mo","reaction_count":41,"reaction_types":"LIKE, INTEREST","repost_count":1,"source":"activity","video_url":null},{"article_description":null,"article_title":null,"article_url":null,"author_headline":"Deploying enterprise agents in production / CTO / SWE Leader / GVP @ Publicis Sapient","author_name":"Ravi Evani\n              \n                \n                   \n    \n      \n    \n    \n      \n    \n\n • You","author_profile_image_url":"https://media.licdn.com/dms/image/v2/C4E03AQGNeJRorEd2Nw/profile-displayphoto-shrink_100_100/profile-displayphoto-shrink_100_100/0/1569287114631?e=1784160000&v=beta&t=tJDZC7EXWnlgIIf8kF7fBCajhF-HEgzNXnz_IIkjqW8","author_profile_url":"https://www.linkedin.com/in/ravievani","comment_count":14,"has_image":true,"impression_count":3950,"is_article":false,"is_my_post":true,"is_video":false,"post_image_url":"https://media.licdn.com/dms/image/v2/D4E22AQGxX7wG0fjqGg/feedshare-shrink_800/B4EZuisGIGLwAg-/0/1767961029219?e=1784160000&v=beta&t=sq79DcWK6ozB_Z6qDX6lG_-W_9tm-SDWT8-UX8f4KFc","post_text":"The biggest upgrade I made to LinkedIn was how I consumed it.\n\nThe feed is great at pulling attention and terrible at helping you retain anything. You open the app, get swept into whatever it serves, and 30 minutes later you’ve read a lot you didn’t choose and can’t recall. I realized the problem is not me. Feeds are built for engagement, not retention, and that’s a mismatch if you’re there to learn.\n\nSo I stopped trying to “use LinkedIn better” and just changed the setup.\nI built a small Chrome extension that pulls the stuff I actually care about: saved posts, my own posts, and a few high-signal feed items, into Google Sheets. Once it’s out of the feed, it becomes usable. I can search it, tag it, and come back to it when I actually have time.\n\nI also put some basic guardrails in place: filters to drop the usual clutter (promoted posts, anniversaries, reshared event fluff). And then folders, so I’m not relying on memory later.\n\nThe part that surprised me was the automation. I let the tool autosync every 30 minutes, and now I don’t really “do” anything. The content just shows up in my \"dashboard\". When I’ve got 10 minutes, I open the dashboard, skim what came in, file a couple things, and I’m done. I’m not hanging out in the feed anymore.\n\nI added \"AI categorization\" as an experiment and it ended up sticking. I gave Gemini my folder names and a few examples, and it sorts new posts with confidence scores. If it’s not confident, it leaves them alone.\n\nNet: LinkedIn still gives me signal, but on my schedule. I’m not “scrolling to stay informed.” I’m just capturing good inputs and coming back to them when I can actually use them.","post_url":"https://www.linkedin.com/feed/update/urn:li:activity:7415366021735481345","post_urn":"urn:li:activity:7415366021735481345","posted_hours_ago":3600,"posted_time":"2026-01-25","posted_time_raw":"5mo","reaction_count":51,"reaction_types":"LIKE, EMPATHY, INTEREST","source":"activity","video_url":null},{"article_description":null,"article_title":null,"article_url":null,"author_headline":"Deploying enterprise agents in production / CTO / SWE Leader / GVP @ Publicis Sapient","author_name":"Ravi Evani\n              \n                \n                   \n    \n      \n    \n    \n      \n    \n\n • You","author_profile_image_url":"https://media.licdn.com/dms/image/v2/C4E03AQGNeJRorEd2Nw/profile-displayphoto-shrink_100_100/profile-displayphoto-shrink_100_100/0/1569287114631?e=1784160000&v=beta&t=tJDZC7EXWnlgIIf8kF7fBCajhF-HEgzNXnz_IIkjqW8","author_profile_url":"https://www.linkedin.com/in/ravievani","comment_count":7,"has_image":false,"impression_count":5134,"is_article":false,"is_my_post":true,"is_video":false,"post_image_url":null,"post_text":"Career growth is not just about talent, but also about who is interpreting your talent.\n\nPut the same high-performing person under two different managers and you’ll often see two completely different trajectories. Under one manager, their impact is obvious, their judgment is trusted, and their growth accelerates. Under another, the same work gets questioned, deprioritized, or reframed as “not quite what we need.” Nothing changed about the employee. The lens changed.\n\nThat lens is values. What does the manager truly reward: speed or certainty, autonomy or control, craft or optics, challenging ideas or smooth execution, directness or diplomacy? If your values line up, the feedback is usable, the expectations are coherent, and you spend your energy building outcomes. If they don’t, you spend your energy translating yourself. That’s when growth stalls, because the work becomes less about impact and more about surviving someone else’s definition of “good.”\n\nThis problem gets worse the more senior you get. There are fewer alternative paths, fewer managers to move to, and more of your success depends on sponsorship and trust. Misalignment at that level doesn’t just slow you down, it quietly caps you.\n\nThe mistake many make is treating a manager assignment like it’s fixed. Like it’s something you get handed, and your job is to “make it work.” Don’t do that. If the pairing is wrong, be open to changing your manager. Not in a dramatic way, just in a deliberate way.\n\nI’ve done this in the past, even in a senior role. The interesting part is what happens after: the relationship with your ex-manager doesn’t have to get worse. In my case, it actually got stronger. We were better off once we parted ways, because the work stopped being a constant negotiation of values and became a clean professional relationship again. Sometimes the most mature move you can make is admitting the fit isn’t right. And doing something about it.\n\nOn the other hand, don’t just react when it’s bad. Be proactive when it’s good. I’ve also intentionally sought out a leader I wanted to work for because our values aligned. I went after that relationship, brought them into my trusted circle, and built momentum faster because the interpretation layer was already aligned. Most people think their growth is about “more skills.” A lot of the time, it’s about choosing the right lens.","post_url":"https://www.linkedin.com/feed/update/urn:li:activity:7415030575125946368","post_urn":"urn:li:activity:7415030575125946368","posted_hours_ago":3600,"posted_time":"2026-01-25","posted_time_raw":"5mo","reaction_count":87,"reaction_types":"LIKE, EMPATHY, APPRECIATION","source":"activity","video_url":null},{"article_description":null,"article_title":null,"article_url":null,"author_headline":"Deploying enterprise agents in production / CTO / SWE Leader / GVP @ Publicis Sapient","author_name":"Ravi Evani\n              \n                \n                   \n    \n      \n    \n    \n      \n    \n\n • You","author_profile_image_url":"https://media.licdn.com/dms/image/v2/C4E03AQGNeJRorEd2Nw/profile-displayphoto-shrink_100_100/profile-displayphoto-shrink_100_100/0/1569287114631?e=1784160000&v=beta&t=tJDZC7EXWnlgIIf8kF7fBCajhF-HEgzNXnz_IIkjqW8","author_profile_url":"https://www.linkedin.com/in/ravievani","comment_count":2,"has_image":false,"impression_count":7561,"is_article":false,"is_my_post":true,"is_video":false,"post_image_url":null,"post_text":"Software is splitting into two tracks, and they’re going to demand two different kinds of leadership.\n\nThe first track is what we’ve been building for the last decade: mobile apps, cloud platforms, data systems, enterprise workflows. These aren’t going away. What’s changing is the cost curve. With AI in the toolchain, building “traditional” software gets easier, faster, and cheaper. The real constraint stops being engineering capacity and starts becoming operating capacity: how teams plan, estimate, review, ship, and learn when the build loop accelerates.\n\nThat’s why the 'Project Manager' role shifts in a very practical way. It’s less about managing the backlog and more about enabling the machine that builds the backlog. Can your team actually use AI tools in a consistent way? Do you have a repeatable pattern for quality, reviews, documentation, and decision logs when the pace goes up? Most organizations have the narrative. Very few have the working system.\n\nThe second track is agentic systems. These are non-deterministic by design: intelligence-native products like search, shopping, supply chain copilots, and multi-step workflows that adapt in real time. This is still version zero engineering. It’s messy, it’s not standardized, and it’s not fully funded across enterprises yet. But it’s coming. And the people who learn how to break down that complexity early will have leverage when demand catches up.\n\nThis is why “Product Manager vs Project Manager” becomes a weaker question over time. The lines blur when the work becomes co-creation: humans + AI building systems, and humans + AI operating systems. You don’t just manage people anymore. You manage the tools, the workflows, and the shape of decisions. Titles matter less than where you sit at the intersection of what you’re good at, what the market needs, and where the opportunities are opening up.\n\nThe fastest way to build that advantage is not another course. It’s building something small for your own job. A personal portfolio risk assistant. A status-to-insight workflow. A quick org analysis tool. Anything that you’ll actually use next week. The point isn’t the app, it’s the muscle: turning vague work into structured inputs, letting AI do the heavy lifting, and tightening the loop until it’s reliable.\n\nAnd if you ever find yourself with “downtime,” treat it like paid runway. When you’re staffed, you think about the project. When you’re not, you can think about your craft. If you already have both engineering instincts and product instincts, you’re in a rare spot. Use the time to build capability, not just consume information. That’s what separates you over the next 12–24 months.","post_url":"https://www.linkedin.com/feed/update/urn:li:activity:7414738521485111297","post_urn":"urn:li:activity:7414738521485111297","posted_hours_ago":3600,"posted_time":"2026-01-25","posted_time_raw":"5mo","reaction_count":86,"reaction_types":"LIKE, INTEREST, EMPATHY","repost_count":2,"source":"activity","video_url":null},{"article_description":null,"article_title":null,"article_url":null,"author_headline":"Deploying enterprise agents in production / CTO / SWE Leader / GVP @ Publicis Sapient","author_name":"Ravi Evani\n              \n                \n                   \n    \n      \n    \n    \n      \n    \n\n • You","author_profile_image_url":"https://media.licdn.com/dms/image/v2/C4E03AQGNeJRorEd2Nw/profile-displayphoto-shrink_100_100/profile-displayphoto-shrink_100_100/0/1569287114631?e=1784160000&v=beta&t=tJDZC7EXWnlgIIf8kF7fBCajhF-HEgzNXnz_IIkjqW8","author_profile_url":"https://www.linkedin.com/in/ravievani","comment_count":3,"has_image":true,"impression_count":1154,"is_article":false,"is_my_post":true,"is_video":false,"post_image_url":"https://media.licdn.com/dms/image/v2/D4E22AQGQP41Cfip3Wg/feedshare-shrink_800/B4EZuQCZWKKUAk-/0/1767648106415?e=1784160000&v=beta&t=T-K2hNl13FL3Rw0oiRybJjEINxa7jYFbLT8sp_VgRNY","post_text":"Agentic RAG + RL > Agentic RAG > Naive RAG for deep knowledge reasoning & retrieval.\n\nSay a guest asks: “Can you book me a 3-night stay in Paris near the Eiffel Tower, but I need a hotel that has (1) adjoining rooms, (2) guaranteed early check-in, and (3) is eligible for my corporate rate. Also, what’s the cancellation policy?” That’s a classic multi-step reasoning problem. It’s not one fact. It’s connecting multiple constraints across different sources: inventory, room configuration, rate rules, and policies.\n\nThis is exactly where single-shot systems fail. Standard chunk-based RAG often “gets one shot to retrieve the right facts.” It might pull a general hotel description, miss the corporate rate eligibility rules, or confuse “early check-in request” with “guaranteed early check-in.” If it pulls the wrong thing initially, the answer is wrong. Period.\nWith Graph R1, the multi-turn strategy is what saves it.\n\nTurn 1: thinking step: the agent looks at the query and asks itself: “Do I know enough to answer this yet?” It identifies a crucial knowledge gap: I need the corporate rate rules, the early check-in guarantee policy, and which hotels have adjoining rooms. It only has the destination and general preferences.\n\nQuery generation step 1: it formulates a very specific retrieval query designed only to address that one gap:\n“Which Paris hotels near Eiffel Tower have adjoining rooms?”\n\nThen it does graph retrieval and pulls the relevant hyperedges—dense policy-like facts, not scattered chunks.\n\nTurn 2: thinking step: it internalizes what it retrieved and says: “Okay, I have a shortlist with adjoining rooms, but I still don’t know corporate rate eligibility and early check-in guarantee.” New knowledge gap.\n\nQuery generation step 2:\n“For these hotels, what rate plans are eligible for corporate rate XYZ, and do any offer guaranteed early check-in?”\n\nAgain: surgical. Not broad search. Focused on the missing piece.\n\nTurn 3: thinking step: now it might say: “I have hotel options and rate eligibility, but I still need cancellation policy details for the selected rate.” Another specific gap.\n\nQuery generation step 3:\n“For Hotel A / Rate Plan B, what is the cancellation policy and deadline?”\nOnly after those targeted retrieval turns does it move to the answering step, where it returns something an enterprise can stand behind: a specific hotel + room configuration + rate eligibility + early check-in terms + cancellation deadline, all grounded in the retrieved facts.\n\nAnd here’s why the reinforcement learning part is the key: the agent is being taught that the only way to get rewarded is to follow the structure. The reward system is “outcome directed,” but the answer reward is only granted if it followed the think → query → retrieve blueprint perfectly. So it learns not to guess, not to “fill in the gaps,” and not to stop early. It learns to “persevere until the knowledge gap is fully closed.”","post_url":"https://www.linkedin.com/feed/update/urn:li:activity:7414289116504342528","post_urn":"urn:li:activity:7414289116504342528","posted_hours_ago":3600,"posted_time":"2026-01-25","posted_time_raw":"5mo","reaction_count":23,"reaction_types":"LIKE, INTEREST, APPRECIATION","source":"activity","video_url":null},{"article_description":null,"article_title":null,"article_url":null,"author_headline":"Deploying enterprise agents in production / CTO / SWE Leader / GVP @ Publicis Sapient","author_name":"Ravi Evani\n              \n                \n                   \n    \n      \n    \n    \n      \n    \n\n • You","author_profile_image_url":"https://media.licdn.com/dms/image/v2/C4E03AQGNeJRorEd2Nw/profile-displayphoto-shrink_100_100/profile-displayphoto-shrink_100_100/0/1569287114631?e=1784160000&v=beta&t=tJDZC7EXWnlgIIf8kF7fBCajhF-HEgzNXnz_IIkjqW8","author_profile_url":"https://www.linkedin.com/in/ravievani","comment_count":1,"has_image":true,"impression_count":993,"is_article":false,"is_my_post":true,"is_video":false,"post_image_url":"https://media.licdn.com/dms/image/v2/D4E22AQEAhLO02Aph9Q/feedshare-shrink_800/B4EZuE4okTHcAg-/0/1767460998252?e=1784160000&v=beta&t=eXnQAdteffiMx5RY3Ae5G51HCbdX1ZR_nrqpGCzTcdY","post_text":"Agentic systems don’t “scale” in a straight line. They change shape.\n\nAt the \"Node\" stage, it’s basically one capable agent doing useful work. A tight reason + act loop, direct prompts, direct API calls, and humans reviewing outputs because that’s still the cheapest way to manage risk. The success metric is simple: did it answer correctly, and did it respond fast enough to be usable.\n\nThen you hit the \"Squad\" stage and the physics change. One agent starts tripping over its own scope. You introduce multiple agents, role boundaries, and a central orchestrator to keep the system from turning into spaghetti. Memory shifts from “single session” to “state across sessions.” Handoffs stop being conversational and become structured. Humans move from “review everything” to “approve plans and handle exceptions.” At this point, you’re not shipping an AI feature. You’re running an operational system. Resolution rate and override rate become more honest than accuracy.\n\nThe \"Mesh\" stage is where most teams underestimate what they’re signing up for. It’s no longer an agent. It’s a network. Routing becomes event-driven. Agents coordinate with each other. You stop pretending chat history is memory and invest in a durable knowledge layer. Data access becomes standardized interfaces and data products because ad-hoc integrations don’t survive at scale. Humans become governors: setting policy, auditing behavior, and designing kill switches. The key metric shifts again (return on autonomy and cost per outcome) because now the question is whether autonomy is economically justified.\n\nThis is why “agent pilots” are often misleading. They’re built like Nodes and judged like Meshes. And the hard part isn’t picking a model. It’s deciding what stage you’re truly designing for, then aligning architecture, experience, governance, and ownership around that reality.","post_url":"https://www.linkedin.com/feed/update/urn:li:activity:7413923496562499585","post_urn":"urn:li:activity:7413923496562499585","posted_hours_ago":3600,"posted_time":"2026-01-25","posted_time_raw":"5mo","reaction_count":20,"reaction_types":"LIKE, INTEREST","source":"activity","video_url":null},{"article_description":null,"article_title":null,"article_url":null,"author_headline":"Deploying enterprise agents in production / CTO / SWE Leader / GVP @ Publicis Sapient","author_name":"Ravi Evani\n              \n                \n                   \n    \n      \n    \n    \n      \n    \n\n • You","author_profile_image_url":"https://media.licdn.com/dms/image/v2/C4E03AQGNeJRorEd2Nw/profile-displayphoto-shrink_100_100/profile-displayphoto-shrink_100_100/0/1569287114631?e=1784160000&v=beta&t=tJDZC7EXWnlgIIf8kF7fBCajhF-HEgzNXnz_IIkjqW8","author_profile_url":"https://www.linkedin.com/in/ravievani","has_image":true,"impression_count":791,"is_article":false,"is_my_post":true,"is_video":false,"post_image_url":"https://media.licdn.com/dms/image/v2/D4E22AQEUsRYCaJT0-w/feedshare-shrink_800/B4EZuIjLIcKUAg-/0/1767522482521?e=1784160000&v=beta&t=Dg65LTvucsOQpm8oaNn3sQlmzlTBYCds-9zlhlN5iPk","post_text":"The Death of the Design “Handoff” in Agentic AI\n\nIn traditional software, a designer can design an “ideal flow” and expect engineering to implement it pretty closely.\n\nIn agentic systems, “ideal flow” is a guess until it runs.\n\nBecause there are too many variables you can’t fully reason about on a canvas:\n\nthe prompt (and how it composes across steps)\nthe context (what gets retrieved, what gets dropped, what’s stale)\nthe model (behavior shifts across versions and settings)\nlatency and tool timing (agents don’t respond like deterministic APIs)\nmulti-agent integration (your agent + other agents don’t behave like clean Lego blocks until they’re actually wired and operating)\n\nThat’s where handoffs fail:\nA mock assumes the agent will “just do the thing.”\nImplementation reveals the agent sometimes does it, sometimes doesn’t, and occasionally does something you didn’t anticipate.\n\nNow you’re in a slow loop: redesign, re-implement, re-test, re-align, repeat.\nThe problem isn’t bad design or bad engineering. It’s that you can’t design agent behavior purely upfront. A lot of design decisions only become clear during implementation.\n\nHow our team overcame this challenge while building an agentic system\n\nDesigner and engineer stayed in the same loop. We stated what we wanted in plain language, an AI coding agent helped make the change, then we ran the system and watched real agent behavior: traces, tool calls, timing, UI states, and failure modes.\n\nAnd because the human-in-the-loop interface is also non-deterministic (it depends on what the agent “thinks” is happening), we treated the UI as something that evolves collaboratively too—confirmation states, explanations, fallbacks, and “what happens when the agent is unsure” all got shaped in the moment.\n\nOur iteration loop was:\nintent → prompt/context/tool change → code change → run it → agent behavior shows up → adjust the design → repeat\n\nThat’s why we could do multiple pivots quickly. Each pivot wasn’t a debate. It was a response to real behavior.\n\nThe “death of the design handoff” in agentic AI isn’t a process trend. It’s a practical response to non-determinism and integration complexity.\n\nWhen the system’s behavior can’t be fully predicted upfront, the only honest design process is:\n\nimplement early\nobserve behavior (not assumptions)\nadapt prompts, context, guardrails, and UI together\npolish fast\n\nOur AI platform Sapient Slingshot made this viable because it connected context across the ADLC. It let the designer and engineer stay in one continuous loop, operating on the live product, while the AI acted as connective tissue turning intent into working changes.\n\nIn building agentic systems, design isn’t a document. It’s what survives contact with real runtime behavior.","post_url":"https://www.linkedin.com/feed/update/urn:li:activity:7413573113285849088","post_urn":"urn:li:activity:7413573113285849088","posted_hours_ago":3600,"posted_time":"2026-01-25","posted_time_raw":"5mo","reaction_count":20,"reaction_types":"LIKE, EMPATHY, PRAISE","repost_count":1,"source":"activity","video_url":null},{"article_description":null,"article_title":null,"article_url":null,"author_headline":"Deploying enterprise agents in production / CTO / SWE Leader / GVP @ Publicis Sapient","author_name":"Ravi Evani\n              \n                \n                   \n    \n      \n    \n    \n      \n    \n\n • You","author_profile_image_url":"https://media.licdn.com/dms/image/v2/C4E03AQGNeJRorEd2Nw/profile-displayphoto-shrink_100_100/profile-displayphoto-shrink_100_100/0/1569287114631?e=1784160000&v=beta&t=tJDZC7EXWnlgIIf8kF7fBCajhF-HEgzNXnz_IIkjqW8","author_profile_url":"https://www.linkedin.com/in/ravievani","comment_count":2,"has_image":true,"impression_count":2970,"is_article":false,"is_my_post":true,"is_video":false,"post_image_url":"https://media.licdn.com/dms/image/v2/D4E22AQGFzmZtf2pBKw/feedshare-shrink_800/B4EZuC4Cb8GkAg-/0/1767427293422?e=1784160000&v=beta&t=oTRfOVeTjA9sYa-TmZooCCsYA632Fp48RdCSfAMVqTE","post_text":"The journey from a single LLM to a production-ready Agentic Mesh is the fastest path to realizing you’ve traded a machine learning problem for a massive, distributed software engineering one.\n\nThe moment you move past the \"Pilot\" stage and start building a Multi-Agent Squad, the architecture stops being about model capability and starts being about infrastructure. Suddenly, you're not just prompting; you are managing an ecosystem that requires a full Agentic Systems Layer >> the runtime for digital workers.\n\nAgentic AI is a whole different beast from generative AI. It autonomously pursues outcomes. But taking that from a small pilot to a massive enterprise scale, is a huge challenge. And it really comes down to a three-stage architectural progression.\n\nFirst up, you've got to move past those simple single agent setups. That “Reason and Act” pattern is just too error prone.\n\nInstead, you build specialized multi-agent squads. It's kind of like swapping out old monolithic code for microservices. So, in the case of a software development agentic workflow -- you might have a software squad where one agent is the product owner, another writes the code and a third one acts as QA. This creates a kind of digital peer review and it boosts accuracy. A similar pattern applies to any business workflow.\n\nSecond, we have to rethink the human role using something called the autonomy slider. We're moving from a human approving every single action to more higher level supervision. And the key metric here, it's the override rate. Basically, how often a human supervisor rejects an agent's recommendation. You need to get that rate way down, usually below 10% before you can safely let the agents run.\n\nFinally, how do you make all this affordable at scale? That's where the agentic mesh could help. Think of it like an internet of agents. The solution is a model garden strategy. A smart router looks at a task and if it's simple, it sends it to a fast, cheap, small model. The really powerful, expensive models, they're saved only for the complex strategic jobs.\n\nIn the end, success in this new agentic era isn't just about having the best model. It's about architecting for a large, safe, and cost-effective autonomous scale.","post_url":"https://www.linkedin.com/feed/update/urn:li:activity:7413127372608151552","post_urn":"urn:li:activity:7413127372608151552","posted_hours_ago":3600,"posted_time":"2026-01-25","posted_time_raw":"5mo","reaction_count":46,"reaction_types":"LIKE, INTEREST, EMPATHY","repost_count":2,"source":"activity","video_url":null},{"article_description":null,"article_title":null,"article_url":null,"author_headline":"Deploying enterprise agents in production / CTO / SWE Leader / GVP @ Publicis Sapient","author_name":"Ravi Evani\n              \n                \n                   \n    \n      \n    \n    \n      \n    \n\n • You","author_profile_image_url":"https://media.licdn.com/dms/image/v2/C4E03AQGNeJRorEd2Nw/profile-displayphoto-shrink_100_100/profile-displayphoto-shrink_100_100/0/1569287114631?e=1784160000&v=beta&t=tJDZC7EXWnlgIIf8kF7fBCajhF-HEgzNXnz_IIkjqW8","author_profile_url":"https://www.linkedin.com/in/ravievani","has_image":true,"impression_count":1003,"is_article":false,"is_my_post":true,"is_video":false,"post_image_url":"https://media.licdn.com/dms/image/v2/D4E22AQEEi-bTQehDtw/feedshare-shrink_800/B4EZt_Fhl_IUAk-/0/1767363717279?e=1784160000&v=beta&t=_88irqEWmQqV5qxrzNbmr4bHf_NSMu7Rs0zNK7Xfc_8","post_text":"The most meaningful gains with AI often come after you push past the first acceptable answer.\n\nAn engineer had a dashboard that loaded user posts, which was painfully slow.\n\nThis wasn't some high-tech system. It was built on a Google Sheets backbone.\n\nSo the first prompt to optimize was super simple: “What are some patterns we can explore to load the posts quickly?”.\n\nThat kicked off the first phase of divergent exploration. The AI just threw out a bunch of ideas. In this case, four different architectural patterns, each with its own trade-offs.\n\nYou had stuff like showing the user old data instantly while you fetch the new stuff in the background. It also suggested virtualization which is complex. And then simpler things like pagination and optimized fetching.\n\nAI recommended the caching solution because it was the highest impact for the lowest amount of code. An easy win.\n\nAnd that seems like the end of the story. You solve 80% of the problem. You move on.\n\nBut that's not what happened. The engineer didn't just accept it.\n\nThe engineer saw the big flaw: the cold start problem. That first time load before anything is cached, it would still be horribly slow.\n\nSo they went into the challenge phase. And pushed back: \"Okay, this is great, but that initial cold start still kills the user experience. How do we fix that?\"\n\nAnd that one question was the pivot point.\n\nThe moment the human smartly challenges the AI, you move out of just getting answers and into true synthesis.\n\nSo the AI didn't just give a fifth option. It created a sophisticated design by combining the best ideas into something it called the “speed pack”, with three main parts.\n\nFirst, it kept the original suggestion of the local cache. Because for any returning user, it gives that instant load.\n\nBut what about the cold start problem?\n\nAnd that's component two: “parallel fetching”. It's a way to cut that initial network time in about half by grabbing all the data components at the same time instead of one after the other.\n\nBut here's a third part which I think is maybe the most clever: The skeleton UI.\n\nAnd this wasn't about making it faster -- but a psychological optimization.\n\nSo you click the button and instantly these gray boxes (skeletons) pop up. So it feels responsive. It gives visual feedback that something is happening, which makes that multi-second weight feel like almost nothing.\n\nAnd that hybrid approach solved for returning users, for the cold start, and for perception. That's something neither the human nor the AI came up with on their own at the start. It was born from the challenge.\n\nSo really what this all comes down to is true optimization, the real breakthroughs happen when you stop just accepting the first right answer.\n\nYou're not just getting information. You have to challenge the constraints. You're pushing the model to integrate ideas in a much more sophisticated way.\n\nWhere else could this synergy loop strategy unlock something new in your own work?","post_url":"https://www.linkedin.com/feed/update/urn:li:activity:7412860715830554624","post_urn":"urn:li:activity:7412860715830554624","posted_hours_ago":3600,"posted_time":"2026-01-25","posted_time_raw":"5mo","reaction_count":26,"reaction_types":"LIKE","source":"activity","video_url":null},{"article_description":null,"article_title":null,"article_url":null,"author_headline":"Deploying enterprise agents in production / CTO / SWE Leader / GVP @ Publicis Sapient","author_name":"Ravi Evani\n              \n                \n                   \n    \n      \n    \n    \n      \n    \n\n • You","author_profile_image_url":"https://media.licdn.com/dms/image/v2/C4E03AQGNeJRorEd2Nw/profile-displayphoto-shrink_100_100/profile-displayphoto-shrink_100_100/0/1569287114631?e=1784160000&v=beta&t=tJDZC7EXWnlgIIf8kF7fBCajhF-HEgzNXnz_IIkjqW8","author_profile_url":"https://www.linkedin.com/in/ravievani","comment_count":5,"has_image":true,"impression_count":1361,"is_article":false,"is_my_post":true,"is_video":true,"post_image_url":"https://media.licdn.com/dms/image/v2/D4E05AQE65R09S_1LPA/videocover-high/B4EZt6bKyRKMBY-/0/1767285503741?e=1783008000&v=beta&t=ZSoUBKjkmFL638ioc5O5fshtRB--0lrhfvpt2pcgEPs","post_text":"Ever wonder why hotels overbook? Overbooking isn’t a hotel trying to be clever. It’s a high-stakes game of predicting who’s actually gonna show up.\n\nThe goal is simple: minimize losses from empty rooms. But if you’re thinking about revenue management, the real unlock is this: don’t treat cancellations as a single number. Treat it as uncertainty you can work with, and have a \"Cancelation Risk Agent\" that keeps that \"probability picture\" fresh as bookings come in.\n\nThe Science: Bayesian Analysis\nThe paper “Bayesian Analysis of Hotel Booking Cancellations” (link in comments) uses some pretty cool statistical methods to get a handle on this chaos.\n\nBayesian Analysis is about incorporating prior knowledge and dealing with uncertainty. It’s not just crunching numbers; it helps hotel managers bring in real-world understanding of how the hotel industry works. Most importantly, it gives probabilities, not just point estimates. That’s key for making decisions when there’s risk involved.\n\nIn this example, Bayesian analysis determines three major factors that influence cancelation risk:\n\n1/ Lead Time: The longer people book in advance, the more likely they are to cancel. It's a huge risk factor.\n\n2/ Special Requests: These are commitment signals. If a guest asks for something specific, they're visualizing their stay.\n\n3/ Parking: This is a strong commitment signal. It implies they have confirmed travel plans (like a rental car or road trip).\n\nThe results also showed that City hotels have way higher cancellation rates than Resort hotels, meaning a \"one-size-fits-all\" policy just doesn't work.\n\nSo, how does a cancelation risk agent help hotel managers?\nIt takes those simple variables: historical cancellations, lead time, special requests, parking—and turns them into a continuously updated view of “who’s likely to ditch their reservation?”.\n\nIt recommends different overbooking strategies for city vs. resort hotels.\nIt pushes practical actions: encourage special requests and parking reservations, because those are strong signals of commitment.\n\nThe agent gives hotel managers a nuanced understanding of human behavior, and the hotel manager uses that nuance to make smarter, more profitable decisions in the face of uncertainty.","post_url":"https://www.linkedin.com/feed/update/urn:li:activity:7412532682959556608","post_urn":"urn:li:activity:7412532682959556608","posted_hours_ago":3600,"posted_time":"2026-01-25","posted_time_raw":"5mo","reaction_count":24,"reaction_types":"LIKE, INTEREST","source":"activity","video_url":"https://media.licdn.com/dms/image/v2/D4E05AQE65R09S_1LPA/videocover-high/B4EZt6bKyRKMBY-/0/1767285503741?e=1783008000&v=beta&t=ZSoUBKjkmFL638ioc5O5fshtRB--0lrhfvpt2pcgEPs"},{"article_description":null,"article_title":null,"article_url":null,"author_headline":"Deploying enterprise agents in production / CTO / SWE Leader / GVP @ Publicis Sapient","author_name":"Ravi Evani\n              \n                \n                   \n    \n      \n    \n    \n      \n    \n\n • You","author_profile_image_url":"https://media.licdn.com/dms/image/v2/C4E03AQGNeJRorEd2Nw/profile-displayphoto-shrink_100_100/profile-displayphoto-shrink_100_100/0/1569287114631?e=1784160000&v=beta&t=tJDZC7EXWnlgIIf8kF7fBCajhF-HEgzNXnz_IIkjqW8","author_profile_url":"https://www.linkedin.com/in/ravievani","comment_count":3,"has_image":true,"impression_count":1326,"is_article":false,"is_my_post":true,"is_video":true,"post_image_url":"https://media.licdn.com/dms/image/v2/D4E05AQF2DONHDo63wg/videocover-high/B4EZtiZPwQJwBU-/0/1766882345829?e=1783008000&v=beta&t=WPApATrMIhmAGVQWU3U7epsKB8ZFhh1AK31a3L2DNDY","post_text":"Saturday Project: Now I can easily organize Linkedin Saved Posts into Folders!","post_url":"https://www.linkedin.com/feed/update/urn:li:activity:7410841696881655808","post_urn":"urn:li:activity:7410841696881655808","posted_hours_ago":3600,"posted_time":"2026-01-25","posted_time_raw":"5mo","reaction_count":18,"reaction_types":"LIKE, EMPATHY, INTEREST","source":"activity","video_url":"https://media.licdn.com/dms/image/v2/D4E05AQF2DONHDo63wg/videocover-high/B4EZtiZPwQJwBU-/0/1766882345829?e=1783008000&v=beta&t=WPApATrMIhmAGVQWU3U7epsKB8ZFhh1AK31a3L2DNDY"},{"article_description":null,"article_title":null,"article_url":null,"author_headline":"Deploying enterprise agents in production / CTO / SWE Leader / GVP @ Publicis Sapient","author_name":"Ravi Evani\n              \n                \n                   \n    \n      \n    \n    \n      \n    \n\n • You","author_profile_image_url":"https://media.licdn.com/dms/image/v2/C4E03AQGNeJRorEd2Nw/profile-displayphoto-shrink_100_100/profile-displayphoto-shrink_100_100/0/1569287114631?e=1784160000&v=beta&t=tJDZC7EXWnlgIIf8kF7fBCajhF-HEgzNXnz_IIkjqW8","author_profile_url":"https://www.linkedin.com/in/ravievani","comment_count":2,"has_image":true,"impression_count":1012,"is_article":false,"is_my_post":true,"is_video":true,"post_image_url":"https://media.licdn.com/dms/image/v2/D4E05AQET11bTl-rxaQ/videocover-high/B4EZtfiGe0GYBU-/0/1766834335656?e=1783008000&v=beta&t=7Bvt6zk5kgCJ6zJ4OLvQchyH-7zBJOyVEPX1VElPCc8","post_text":"Standard search is great for \"flights to Paris.\" But what about \"Is a 3-day coffee tour in Kyoto feasible in April, and what are the hidden gems?\"\n\nThat's where Deep Research comes in. Instead of a single LLM response, it's an asynchronous agentic workflow that gathers data, analyzes feasibility, and curates a personalized briefing.\n\nHere's how to drop interactive \"Deep Research\" capabilities into any discovery app/ chatbot. You can apply this pattern to any exploratory app (travel, shopping, real estate, education).\n\nThe Architecture: Trigger, Poll, Visualize\nWe don't want the user staring at a loading spinner for 60 seconds. The key is to make the process asynchronous and persistent.\n\n① The Trigger: Identifying Intent\nDon't force users to find a specific button. Let the LLM decide when a \"Deep Dive\" is needed.\n\nWe registered a tool called startDeepResearch with our agent. When the user asks a complex question, the agent calls this tool.\n\n② The Process: Async & Persistent\nThe tool returns a taskId immediately. We don't wait for the result.\nInstead, we render a DeepResearchIndicatorwidget. This widget does three things:\n\n➥ Polls the backend for the status of taskId.\n➥ Persists the task locally (using shared_preferences), so if the user closes the app, the research continues.\n➥ Animates progress to keep the UI alive.\n\nPro-tip: Add a History view. Deep Research is valuable; users want to reference these automated briefings later.\n\n③ The Visualization: Rich \"Briefings\"\nWhen the task finishes, don't just dump text. We receive a structured JSON payload (sanity, vibe, logistics, hidden_gems) and render a Briefing Page.\n\nThis transforms the LLM's raw analysis into a native, interactive report:\n➥ Visual Logic: \"If vibe.isRelaxed, use soft colors.\"\n➥ Interactive Maps: \"Plot the hidden_gems coordinates.\"\n➥ Actionable: \"Add these 3 recommended spots directly to my itinerary.\"\n\nThis pattern creates a \"Research Assistant\" feel. It moves your app from being a passive search interface to an active partner that does the heavy lifting while the user explores.","post_url":"https://www.linkedin.com/feed/update/urn:li:activity:7410640339578806272","post_urn":"urn:li:activity:7410640339578806272","posted_hours_ago":3600,"posted_time":"2026-01-25","posted_time_raw":"5mo","reaction_count":14,"reaction_types":"LIKE","source":"activity","video_url":"https://media.licdn.com/dms/image/v2/D4E05AQET11bTl-rxaQ/videocover-high/B4EZtfiGe0GYBU-/0/1766834335656?e=1783008000&v=beta&t=7Bvt6zk5kgCJ6zJ4OLvQchyH-7zBJOyVEPX1VElPCc8"},{"article_description":null,"article_title":null,"article_url":null,"author_headline":"Deploying enterprise agents in production / CTO / SWE Leader / GVP @ Publicis Sapient","author_name":"Ravi Evani\n              \n                \n                   \n    \n      \n    \n    \n      \n    \n\n • You","author_profile_image_url":"https://media.licdn.com/dms/image/v2/C4E03AQGNeJRorEd2Nw/profile-displayphoto-shrink_100_100/profile-displayphoto-shrink_100_100/0/1569287114631?e=1784160000&v=beta&t=tJDZC7EXWnlgIIf8kF7fBCajhF-HEgzNXnz_IIkjqW8","author_profile_url":"https://www.linkedin.com/in/ravievani","comment_count":10,"has_image":true,"impression_count":2154,"is_article":false,"is_my_post":true,"is_video":true,"post_image_url":"https://media.licdn.com/dms/image/v2/D4E05AQFCv_sq5dlgHg/videocover-high/B4EZtZm6ZtGQBU-/0/1766734934159?e=1783008000&v=beta&t=Bdvuq7kHHBb07PpcYSN6GK-QpGTGNHFld6PUiS3ilYA","post_text":"Generative UI shifts agent interaction from a chat to an efficient, multimodal workflow.\n\nThe agent can render the right user interface suitable to the moment of interaction. This cuts cognitive overload and brings sharp focus to the action that needs to be taken.\n\nIn a travel planning flow, that means a guest can move from inspiration (browse spa retreats) to decision (choose Maldives) to execution (build itinerary, add transfers, confirm) in one continuous journey, without bouncing across pages or wading through blocks of text and irrelevant UI. The experience stays contextual: chat for nuance, widgets for precision, and the workflow advances with each interaction.\n\nFor enterprises, this changes how you build experiences. You’re not hardcoding every variation of a journey; you’re assembling approved components dynamically around real user context. Done right, it speeds iteration while keeping guardrails (consistent brand UI, policy checks, accessibility, audit logs, and reliability) so teams can move faster without losing control.","post_url":"https://www.linkedin.com/feed/update/urn:li:activity:7410223445701177344","post_urn":"urn:li:activity:7410223445701177344","posted_hours_ago":3600,"posted_time":"2026-01-25","posted_time_raw":"5mo","reaction_count":16,"reaction_types":"LIKE, INTEREST","repost_count":1,"source":"activity","video_url":"https://media.licdn.com/dms/image/v2/D4E05AQFCv_sq5dlgHg/videocover-high/B4EZtZm6ZtGQBU-/0/1766734934159?e=1783008000&v=beta&t=Bdvuq7kHHBb07PpcYSN6GK-QpGTGNHFld6PUiS3ilYA"},{"article_description":null,"article_title":null,"article_url":null,"author_headline":"Deploying enterprise agents in production / CTO / SWE Leader / GVP @ Publicis Sapient","author_name":"Ravi Evani\n              \n                \n                   \n    \n      \n    \n    \n      \n    \n\n • You","author_profile_image_url":"https://media.licdn.com/dms/image/v2/C4E03AQGNeJRorEd2Nw/profile-displayphoto-shrink_100_100/profile-displayphoto-shrink_100_100/0/1569287114631?e=1784160000&v=beta&t=tJDZC7EXWnlgIIf8kF7fBCajhF-HEgzNXnz_IIkjqW8","author_profile_url":"https://www.linkedin.com/in/ravievani","comment_count":2,"has_image":false,"impression_count":863,"is_article":false,"is_my_post":true,"is_video":false,"post_image_url":null,"post_text":"In long-running teams and projects, what looks like “obvious dysfunction” to an outsider is often just accumulated survival behavior.\n\nWhen a problem goes unresolved for months or years, people don’t stay neutral. They build workarounds, guardrails, and habits that let them protect themselves. Over time, those workarounds become “the way we do things.” So when you point at something alarming, it can look like they’re dismissing it. Most of the time they’re not. Their defense mechanism is kicking in: minimize the signal, avoid the blame cycle, and preserve whatever stability they’ve managed to create.\n\nThe way out isn’t to call out the behavior or push harder on what looks obvious. The right move is to try and change the conditions that made those defenses necessary in the first place. That starts with understanding what risk the team believes it’s avoiding, fixing one root constraint that keeps problems from being addressed, and putting simple ownership and escalation in place so doing the right thing is safer than working around it.","post_url":"https://www.linkedin.com/feed/update/urn:li:activity:7408961326808707073","post_urn":"urn:li:activity:7408961326808707073","posted_hours_ago":4320,"posted_time":"2025-12-25","posted_time_raw":"6mo","reaction_count":12,"reaction_types":"LIKE, INTEREST","source":"activity","video_url":null},{"article_description":null,"article_title":null,"article_url":null,"author_headline":"Deploying enterprise agents in production / CTO / SWE Leader / GVP @ Publicis Sapient","author_name":"Ravi Evani\n              \n                \n                   \n    \n      \n    \n    \n      \n    \n\n • You","author_profile_image_url":"https://media.licdn.com/dms/image/v2/C4E03AQGNeJRorEd2Nw/profile-displayphoto-shrink_100_100/profile-displayphoto-shrink_100_100/0/1569287114631?e=1784160000&v=beta&t=tJDZC7EXWnlgIIf8kF7fBCajhF-HEgzNXnz_IIkjqW8","author_profile_url":"https://www.linkedin.com/in/ravievani","comment_count":3,"has_image":false,"impression_count":1178,"is_article":false,"is_my_post":true,"is_video":false,"post_image_url":null,"post_text":"A2UI is a practical bridge between “LLM reasoning” and “enterprise-grade UX”.\n\nThis is useful because it gives agents a clean way to drive real transactions inside your product without resorting to brittle UI hacks. Instead of returning paragraphs, the agent can return a structured UI spec (form fields, pickers, buttons, lists), and your app renders it using your existing components, styling, and permissions.\n\nIn travel and hospitality, this maps directly to the highest-friction moments: canceling a reservation, approving comp/credit, rebooking after disruption, creating a service ticket, etc. The agent can present the right UI at the right step, validate inputs, and keep the user moving, without you building a bespoke screen for every edge case.\n\nOperationally, A2UI is a governance win. You can constrain what the agent is allowed to render, bind actions to your APIs, enforce policy checks, log every interaction, and keep accessibility and brand consistency.\n\nNet effect: faster iteration on workflows, fewer “chat back-and-forth” loops, and a clearer path to putting agents into guest-facing and staff-facing journeys without giving them uncontrolled UI or code execution.","post_url":"https://www.linkedin.com/feed/update/urn:li:activity:7408878312984375298","post_urn":"urn:li:activity:7408878312984375298","posted_hours_ago":4320,"posted_time":"2025-12-25","posted_time_raw":"6mo","reaction_count":7,"reaction_types":"LIKE","source":"activity","video_url":null},{"article_description":null,"article_title":null,"article_url":null,"author_headline":"Deploying enterprise agents in production / CTO / SWE Leader / GVP @ Publicis Sapient","author_name":"Ravi Evani\n              \n                \n                   \n    \n      \n    \n    \n      \n    \n\n • You","author_profile_image_url":"https://media.licdn.com/dms/image/v2/C4E03AQGNeJRorEd2Nw/profile-displayphoto-shrink_100_100/profile-displayphoto-shrink_100_100/0/1569287114631?e=1784160000&v=beta&t=tJDZC7EXWnlgIIf8kF7fBCajhF-HEgzNXnz_IIkjqW8","author_profile_url":"https://www.linkedin.com/in/ravievani","comment_count":4,"has_image":false,"impression_count":4895,"is_article":false,"is_my_post":true,"is_video":false,"post_image_url":null,"post_text":"When escalations hit hard, an organization’s default move is “find a stronger lead”. It’s a clean story: one name, one fix. But most escalations aren’t proof that a team lacks leadership. They’re proof that the system has stopped protecting execution. The same signals show up every time: key people are spread too thin, priorities are contested, client pressure hijacks the team’s calendar, and delivery basics degrade because nobody has the room to enforce them.\n\nEscalations are usually “systems feedback,” not “people feedback”. They’re the business telling you that focus, ownership, and capacity allocation have broken down. The fix is rarely a heroic new lead. The fix is structural: single-threaded ownership where needed, protected engineering time, a real client-facing buffer, explicit prioritization across SMEs, and consequences for basic operating norms. Until those are in place, any new lead becomes another person absorbing chaos.\n\nSo if someone asks me to “find a lead” in the middle of escalation, my first question now is: what problem are we trying to solve: execution capability, or execution conditions? If it’s the conditions, the best leadership move isn’t replacing people. It’s redesigning the system so good people can actually do good work.","post_url":"https://www.linkedin.com/feed/update/urn:li:activity:7407834263016079360","post_urn":"urn:li:activity:7407834263016079360","posted_hours_ago":4320,"posted_time":"2025-12-25","posted_time_raw":"6mo","reaction_count":42,"reaction_types":"LIKE, EMPATHY, INTEREST","repost_count":2,"source":"activity","video_url":null},{"article_description":null,"article_title":null,"article_url":null,"author_headline":"Deploying enterprise agents in production / CTO / SWE Leader / GVP @ Publicis Sapient","author_name":"Ravi Evani\n              \n                \n                   \n    \n      \n    \n    \n      \n    \n\n • You","author_profile_image_url":"https://media.licdn.com/dms/image/v2/C4E03AQGNeJRorEd2Nw/profile-displayphoto-shrink_100_100/profile-displayphoto-shrink_100_100/0/1569287114631?e=1784160000&v=beta&t=tJDZC7EXWnlgIIf8kF7fBCajhF-HEgzNXnz_IIkjqW8","author_profile_url":"https://www.linkedin.com/in/ravievani","has_image":true,"impression_count":2903,"is_article":false,"is_my_post":true,"is_video":true,"post_image_url":"https://media.licdn.com/dms/image/v2/D4E05AQF4Pj0CvU5_9w/videocover-high/B4EZsqPuF4IwBU-/0/1765940325031?e=1783008000&v=beta&t=AjfaA5TFeZyHPbEu6qT5ic8_t8fVVaQlUOiVuOOeHUE","post_text":"In agentic AI implementations within regulated environments, the first design decision shouldn't be about agents at all.\n\nIn industries such as financial services or healthcare, the safest agentic systems start by being explicit about what does not need AI.\n\nIf a workflow step is well understood, it should be coded deterministically. Using AI where logic is already known doesn’t add intelligence; it adds risk, audit complexity, and bias surface area.\n\nStrong agentic pipelines are built by cleanly separating deterministic logic, classical ML, and generative reasoning. Deterministic code handles validation, routing, and policy enforcement. Classical ML handles scoring and prediction where behavior must be stable and testable. Generative agents are reserved for narrow slices where ambiguity exists and human-like reasoning genuinely helps.\n\nThis is why agentic pipelines can’t be treated as a pure engineering exercise. You need domain experts, risk, legal, and operations involved early to decide what decisions are allowed, what data can be touched, and where human judgment must remain in the loop. Engineers can build the scaffolding, but only the business can define the meaning of a “correct” outcome. Without that shared understanding, no amount of model tuning will make the system trustworthy.","post_url":"https://www.linkedin.com/feed/update/urn:li:activity:7407041998274338816","post_urn":"urn:li:activity:7407041998274338816","posted_hours_ago":4320,"posted_time":"2025-12-25","posted_time_raw":"6mo","reaction_count":27,"reaction_types":"LIKE, EMPATHY","source":"activity","video_url":"https://media.licdn.com/dms/image/v2/D4E05AQF4Pj0CvU5_9w/videocover-high/B4EZsqPuF4IwBU-/0/1765940325031?e=1783008000&v=beta&t=AjfaA5TFeZyHPbEu6qT5ic8_t8fVVaQlUOiVuOOeHUE"},{"article_description":null,"article_title":null,"article_url":null,"author_headline":"Deploying enterprise agents in production / CTO / SWE Leader / GVP @ Publicis Sapient","author_name":"Ravi Evani\n              \n                \n                   \n    \n      \n    \n    \n      \n    \n\n • You","author_profile_image_url":"https://media.licdn.com/dms/image/v2/C4E03AQGNeJRorEd2Nw/profile-displayphoto-shrink_100_100/profile-displayphoto-shrink_100_100/0/1569287114631?e=1784160000&v=beta&t=tJDZC7EXWnlgIIf8kF7fBCajhF-HEgzNXnz_IIkjqW8","author_profile_url":"https://www.linkedin.com/in/ravievani","has_image":true,"impression_count":1043,"is_article":false,"is_my_post":true,"is_video":true,"post_image_url":"https://media.licdn.com/dms/image/v2/D4E05AQFTqr_W0cxqMQ/videocover-low/B4EZsbDG1rKMBQ-/0/1765685405339?e=1783008000&v=beta&t=grTKZKGKz5OxmnhNBGMeRm-Wvn2NIUgF8tbeMRmPc6Q","post_text":"It was fun talking with Aishwarya Srinivasan and engaging with her thoughtful, customer-centric questions. She’s clearly focused on creating real value for people, and I enjoyed the time we spent discussing how she meets audiences at different levels of expertise to help them build understanding and confidence on AI.\n\nThere is a significant part of enterprise AI work that rarely makes it into demos: progress comes from respecting structure, not bypassing it. In real organizations, outcomes don’t improve because a model is impressive; they improve when the system understands how the business actually works. That means shared semantics, explicit boundaries, and clarity on what the AI should decide versus what it must not. Without that, you get systems that sound confident but behave unpredictably; which is unacceptable in any regulated or customer-critical domain.\n\nSeparation of concerns is key in any complex system design, and it's no different for systems involving agents. Many parts of a workflow should remain deterministic and coded. Some parts could benefit from classical ML. A much smaller slice truly benefits from generative reasoning. When teams blur those lines, risk and cost spike fast. When they separate them cleanly, systems become faster, more reliable, and easier to govern. That’s where architecture matters more than model choice, and where most AI programs quietly succeed or fail.\n\nAdoption follows the same logic. Trust isn’t earned through ambition; it’s earned by removing friction experts have lived with for years. When AI reduces rework, speeds up decisions, and makes the day-to-day easier (without breaking rules or introducing surprises) teams lean in.\n\nThat’s how enterprise AI scales: not as a big reveal, but as a series of practical improvements that compound over time.","post_url":"https://www.linkedin.com/feed/update/urn:li:activity:7406665250399260672","post_urn":"urn:li:activity:7406665250399260672","posted_hours_ago":4320,"posted_time":"2025-12-25","posted_time_raw":"6mo","reaction_count":14,"reaction_types":"LIKE, EMPATHY, INTEREST","source":"activity","video_url":"https://media.licdn.com/dms/image/v2/D4E05AQFTqr_W0cxqMQ/videocover-low/B4EZsbDG1rKMBQ-/0/1765685405339?e=1783008000&v=beta&t=grTKZKGKz5OxmnhNBGMeRm-Wvn2NIUgF8tbeMRmPc6Q"},{"article_description":null,"article_title":null,"article_url":null,"author_headline":"Deploying enterprise agents in production / CTO / SWE Leader / GVP @ Publicis Sapient","author_name":"Ravi Evani\n              \n                \n                   \n    \n      \n    \n    \n      \n    \n\n • You","author_profile_image_url":"https://media.licdn.com/dms/image/v2/C4E03AQGNeJRorEd2Nw/profile-displayphoto-shrink_100_100/profile-displayphoto-shrink_100_100/0/1569287114631?e=1784160000&v=beta&t=tJDZC7EXWnlgIIf8kF7fBCajhF-HEgzNXnz_IIkjqW8","author_profile_url":"https://www.linkedin.com/in/ravievani","comment_count":2,"has_image":false,"impression_count":871,"is_article":false,"is_my_post":true,"is_video":false,"post_image_url":null,"post_text":"For hospitality, the AI adoption curve is already playing out, and it favors individuals and small operators first.\n\nIndependent owners can deploy agents with a credit card and a few weeks and suddenly run booking, pricing, guest messaging, reviews, and ops at a level that used to require corporate teams. This isn’t because large brands don’t understand AI; it’s because they can’t absorb it quickly. Rules, standards, legacy systems, and risk processes slow everything down. Meanwhile, the performance gap between a well-run independent and a branded property is shrinking fast.\n\nPractically, this shifts where competitive pressure comes from. Agents are collapsing the value of scale. A 20-room property can now offer instant responses, personalized service, dynamic pricing, and proactive recovery; without a substantial call center, revenue team, or marketing department. Direct booking becomes viable again. Guest experience becomes more local and more personal.\n\nFor large hospitality companies, the response isn’t to block or slow this down; that just pushes owners outside the ecosystem. The winning move is to internalize it. Provide franchisees and operators with a safe, branded agent stack that plugs into your systems, enforces standards, and still lets them move fast. Open the right APIs, separate fast experimentation from guest-critical controls, and make loyalty and data advantages available to agents. If you don’t, owners will still adopt agents -- just not yours.","post_url":"https://www.linkedin.com/feed/update/urn:li:activity:7406472068168429569","post_urn":"urn:li:activity:7406472068168429569","posted_hours_ago":4320,"posted_time":"2025-12-25","posted_time_raw":"6mo","reaction_count":15,"reaction_types":"LIKE, EMPATHY, APPRECIATION","source":"activity","video_url":null},{"article_description":null,"article_title":null,"article_url":null,"author_headline":"Deploying enterprise agents in production / CTO / SWE Leader / GVP @ Publicis Sapient","author_name":"Ravi Evani\n              \n                \n                   \n    \n      \n    \n    \n      \n    \n\n • You","author_profile_image_url":"https://media.licdn.com/dms/image/v2/C4E03AQGNeJRorEd2Nw/profile-displayphoto-shrink_100_100/profile-displayphoto-shrink_100_100/0/1569287114631?e=1784160000&v=beta&t=tJDZC7EXWnlgIIf8kF7fBCajhF-HEgzNXnz_IIkjqW8","author_profile_url":"https://www.linkedin.com/in/ravievani","comment_count":1,"has_image":true,"impression_count":1143,"is_article":false,"is_my_post":true,"is_video":true,"post_image_url":"https://media.licdn.com/dms/image/v2/D4E05AQEVQ56AT4jXYg/videocover-low/B4EZsdQLPuJgBU-/0/1765722341235?e=1783008000&v=beta&t=YBziz-XXfUsTq538GCkOkQNsAeSLY0UiZVpCHvxAjK8","post_text":"For IT Leaders in Travel & Hospitality, the real job isn’t picking the “right” AI models. It’s deciding where different levels of intelligence belong across the journey. Trip planning, pricing, and personalization need deep reasoning and shared context. Gate operations, kiosks, room access, and in-hotel controls don’t. Treating them the same is why costs spike, latency creeps in, and reliability suffers. An AI pyramid forces the right trade-offs early.\n\nPractically, that means three decisions. First, invest in a strong core: identity, consent, trip state, loyalty, policies, inventory, and event streams that power high-value reasoning use cases. Without that foundation, your smartest models won’t deliver consistent answers. Second, standardize the middle layer: clear patterns for copilots in apps, call centers, and ops teams—shared tooling, retrieval rules, observability, and guardrails so teams don’t reinvent or break things. Third, be ruthless at the edge: define what must run locally, what latency is acceptable, what happens offline, and how devices are secured and updated.\n\nIT leaders who approach AI this way start scaling capability. They run AI like a portfolio: big models where thinking matters, smaller models where speed and focus matter, and embedded intelligence where reliability matters most. That’s how AI quietly improves the entire travel experience without becoming fragile, expensive, or chaotic.","post_url":"https://www.linkedin.com/feed/update/urn:li:activity:7405976298797416448","post_urn":"urn:li:activity:7405976298797416448","posted_hours_ago":4320,"posted_time":"2025-12-25","posted_time_raw":"6mo","reaction_count":24,"reaction_types":"LIKE","source":"activity","video_url":"https://media.licdn.com/dms/image/v2/D4E05AQEVQ56AT4jXYg/videocover-low/B4EZsdQLPuJgBU-/0/1765722341235?e=1783008000&v=beta&t=YBziz-XXfUsTq538GCkOkQNsAeSLY0UiZVpCHvxAjK8"},{"article_description":null,"article_title":null,"article_url":null,"author_headline":"Deploying enterprise agents in production / CTO / SWE Leader / GVP @ Publicis Sapient","author_name":"Ravi Evani\n              \n                \n                   \n    \n      \n    \n    \n      \n    \n\n • You","author_profile_image_url":"https://media.licdn.com/dms/image/v2/C4E03AQGNeJRorEd2Nw/profile-displayphoto-shrink_100_100/profile-displayphoto-shrink_100_100/0/1569287114631?e=1784160000&v=beta&t=tJDZC7EXWnlgIIf8kF7fBCajhF-HEgzNXnz_IIkjqW8","author_profile_url":"https://www.linkedin.com/in/ravievani","has_image":true,"impression_count":720,"is_article":false,"is_my_post":true,"is_video":true,"post_image_url":"https://media.licdn.com/dms/image/v2/D4E05AQGs-eWbdFIAiA/videocover-high/B4EZsb3j2kKgBU-/0/1765699111192?e=1783008000&v=beta&t=RCJmj3w1uVHyDWJYPU_7jsqUcvrSpYDBTSkzM0LJfH0","post_text":"Can engineers use AI to design better interfaces?\n\nI like replaying specific parts of YouTube videos on a loop, so I built a small tool: Ytloop.\n\nThe first (desktop) version was classic builder behavior: too many knobs, too much screen real estate, and a UI that assumed the user already understood the product.\n\nSo I asked Gemini3-High to launch the app in the browser, understand the source code, and generate iOS UI options for an iPhone 15 Pro Max. I picked one, and it immediately reframed the product: fewer controls, clearer hierarchy, and a layout that actually feels native on mobile.\n\nThen I asked it to render the design as a clickable prototype. Watching it respond as I shrink the viewport from desktop to mobile was the real moment.\n\nSo, can engineers use AI to design better first drafts? I think the answer is Yes.","post_url":"https://www.linkedin.com/feed/update/urn:li:activity:7405878868722749440","post_urn":"urn:li:activity:7405878868722749440","posted_hours_ago":4320,"posted_time":"2025-12-25","posted_time_raw":"6mo","reaction_count":4,"reaction_types":"LIKE","source":"activity","video_url":"https://media.licdn.com/dms/image/v2/D4E05AQGs-eWbdFIAiA/videocover-high/B4EZsb3j2kKgBU-/0/1765699111192?e=1783008000&v=beta&t=RCJmj3w1uVHyDWJYPU_
