ication.\n\nA human analyst may run a few queries, but an agent may decide to run thousands of queries, analyze alternatives, and keep optimizing long after the business value has flattened.\n\nWhen cloud platforms combine per-second billing, elastic scale, and multi-cloud access, cost risk changes.\n\nYou are managing machine-generated demand, which means FinOps cannot remain a monthly reporting function.\n\nEnterprises will need financial circuit breakers. Otherwise, the company may not find the problem until the bill arrives.\n\n4. Cybersecurity moves from perimeter defense to cognitive defense\nThe security problem also changes. Shadow IT was one thing, but Shadow AI is more dangerous.\n\nAn employee spinning up an unauthorized agent may be creating a system that can reason, act, remember context, and connect to other tools.\nThat creates a new kind of enterprise risk.\n\nSecurity teams will need visibility into every model, agent, workflow, tool call, memory store, and data dependency.\n\nThe AI BOM becomes important because companies will need to know exactly what intelligence is operating inside the enterprise.\n\nInteresting times ahead!","post_image_url":"https://media.licdn.com/dms/image/v2/D4E05AQEmyLNIFlq2YA/videocover-high/B4EZ4jQwTPIABU-/0/1778708071860?e=1783137600&v=beta&t=jYcNkbmiT1sGvBvTAj0Y7cjQpmGxeL0nySZ3UIvBbKA","is_article":false,"article_url":null,"article_title":null,"article_description":null,"is_video":true,"video_url":"https://media.licdn.com/dms/image/v2/D4E05AQEmyLNIFlq2YA/videocover-high/B4EZ4jQwTPIABU-/0/1778708071860?e=1783137600&v=beta&t=jYcNkbmiT1sGvBvTAj0Y7cjQpmGxeL0nySZ3UIvBbKA","has_image":true,"reaction_count":21,"reaction_types":"LIKE, INTEREST","repost_count":1,"impression_count":1117,"source":"activity"},{"is_my_post":true,"post_urn":"urn:li:activity:7459826625132519424","author_name":"Ravi Evani\n              \n                \n                   \n    \n      \n    \n    \n      \n    \n\n • You","author_profile_url":"https://www.linkedin.com/in/ravievani","author_headline":"Deploying enterprise agents in production / CTO / SWE Leader / GVP @ Publicis Sapient","posted_time":"2026-05-27","posted_hours_ago":720,"posted_time_raw":"1mo","post_url":"https://www.linkedin.com/feed/update/urn:li:activity:7459826625132519424","author_profile_image_url":"https://media.licdn.com/dms/image/v2/C4E03AQGNeJRorEd2Nw/profile-displayphoto-shrink_100_100/profile-displayphoto-shrink_100_100/0/1569287114631?e=1784160000&v=beta&t=tJDZC7EXWnlgIIf8kF7fBCajhF-HEgzNXnz_IIkjqW8","post_text":"Why do so many mainframe modernization projects end in stalled deployments?\n\nBecause we keep confusing Functional Equivalence with Behavioral Equivalence.\n\nTranslating legacy COBOL to Java line-by-line (Functional Equivalence) might get the code to compile, but it completely misses the “tribal knowledge” ... the undocumented patches, the 1998 edge cases, and the decades-old \"bugs\" that downstream systems now rely on as features.\n\nTo bring modernization risk down to absolute zero, you need Behavioral Equivalence: the mathematical guarantee that the new system is dynamically and operationally indistinguishable from the old one.\n\nSo, how do you actually ensure it? By augmenting probabilistic AI translation with deterministic, closed-loop validation:\n\n1/ Capture real, historical data flows directly from the live production environment. These immutable \"replica packets\" become your ultimate source of truth.\n\n2/ Build an \"Environment-in-the-Loop.\" Code translation doesn't happen in a vacuum. Construct a drift-free execution sandbox that perfectly mimics the intricate operational realities of your target cloud infrastructure.\n\n3/ Deploy Multi-Agent AI Feedback Loops. Replace single-pass LLM prompts with an autonomous triad of AI agents:\na) The Migration Agents hypothesize the modernized code.\nb) The Environment Agents configure and stabilize the testing sandbox\nc) The Testsuite Agents execute the new code using the historical data packets\n\n4/ Demand \"Bug-for-Bug\" Parity via Shadow Execution. If the modernized output deviates by even a fraction of a decimal point, the Testsuite Agents flag the discrepancy, feed the contextual traces back into the loop, and force the Migration Agent to regenerate. This continuous loop repeats until 100% mathematical parity is achieved.\n\nMainframe modernization isn't just a text-translation exercise; it’s the empirical replication of your business reality.","post_image_url":"https://media.licdn.com/dms/image/v2/D4E05AQFyYN1WIFkx-A/videocover-high/B4EZ4OfdUwJ4BQ-/0/1778359590557?e=1783137600&v=beta&t=z2fyKvuguhKgN8JvmUmNnPt5p1m42kaXYDRrGgcWfqg","is_article":false,"article_url":null,"article_title":null,"article_description":null,"is_video":true,"video_url":"https://media.licdn.com/dms/image/v2/D4E05AQFyYN1WIFkx-A/videocover-high/B4EZ4OfdUwJ4BQ-/0/1778359590557?e=1783137600&v=beta&t=z2fyKvuguhKgN8JvmUmNnPt5p1m42kaXYDRrGgcWfqg","has_image":true,"reaction_count":49,"reaction_types":"LIKE, EMPATHY, PRAISE","comment_count":2,"impression_count":1506,"source":"activity"},{"is_my_post":true,"post_urn":"urn:li:activity:7459577371340337152","author_name":"Ravi Evani\n              \n                \n                   \n    \n      \n    \n    \n      \n    \n\n • You","author_profile_url":"https://www.linkedin.com/in/ravievani","author_headline":"Deploying enterprise agents in production / CTO / SWE Leader / GVP @ Publicis Sapient","posted_time":"2026-05-27","posted_hours_ago":720,"posted_time_raw":"1mo","post_url":"https://www.linkedin.com/feed/update/urn:li:activity:7459577371340337152","author_profile_image_url":"https://media.licdn.com/dms/image/v2/C4E03AQGNeJRorEd2Nw/profile-displayphoto-shrink_100_100/profile-displayphoto-shrink_100_100/0/1569287114631?e=1784160000&v=beta&t=tJDZC7EXWnlgIIf8kF7fBCajhF-HEgzNXnz_IIkjqW8","post_text":"It is likely that agentic commerce will compress travel commissions.\n\nToday, OTAs like Expedia can charge 15% to 30% commissions because they influence discovery, plumbing and price.\n\nAgentic commerce starts to break that. Here is how that could play out.\n\n1. Travel becomes a loss leader for fintech agentic ecosystems\nIn the old model, travel platforms needed high commissions because booking travel was their core business. In the agentic commerce model, travel becomes a feature inside a much larger financial ecosystem.\n\nBanks, card networks, digital wallets, and fintech super-agents do not need to make 20% on a hotel room. They make money through interchange, annual fees, lending, loyalty economics, and consumer lock-in.\n\nSo a Chase, Amex, Apple, Capital One, or Revolut can treat travel as a retention product or an engagement hook. An agent can book the hotel via a financial institution, use the rewards, get a better net price and keep everything inside the consumer's wallet.\n\nThat changes the economics.\n\n2. Hotel inventory becomes agent consumable\n\nOTAs historically had an advantage. Inventory was fragmented. Property systems were messy. Aggregating supply at scale created a moat.\n\nAgentic commerce (e.g UCP)changes that by pushing the industry toward standardized inventory access. Once room availability, rates, restrictions, loyalty rules, and add-ons become accessible on the A2A layer, distribution becomes much easier.\n\nAt that point, many non-travel platforms can become booking surfaces. A conference app can package lodging. A creator can recommend and transact directly. A corporate travel assistant can negotiate inventory in real time.\n\nWith that, the OTA’s plumbing advantage could become less defensible.\n\n3. AI-to-AI negotiation weakens rate parity\n\nThe biggest shift may be pricing itself.\n\nToday, OTAs depend on visible retail rates and contractual rate parity. Hotels are often restricted from publicly offering lower prices elsewhere.\n\nAgentic commerce introduces a different model: private, machine-to-machine negotiation. Your personal AI agent may not simply compare prices on a screen. It may negotiate directly with hotel revenue management systems.\n\nFor example:\n“My traveler has $180 for tonight, prefers downtown, and will book in the next 60 seconds”.\n\nThe hotel’s pricing AI can respond:\n“If I sell this room through an OTA at $200 and pay a 20% commission, I net $160. If I accept the agent’s $180 private bid, I make more”.\n\nThat could be a real threat.\n\nStatic commissions might get replaced by dynamic bid-ask spreads. Public rate parity becomes less relevant when the transaction happens through private, API-based negotiation between agents.\n\nThe hotel does not need to publicly undercut Expedia. It only needs to accept a better net-revenue offer from a verified buyer’s agent.\n\nAs things the OTAs charged for become infrastructure, agentic commerce will begin to compress OTA commissions.","post_image_url":null,"is_article":false,"article_url":null,"article_title":null,"article_description":null,"is_video":false,"video_url":null,"has_image":false,"reaction_count":11,"reaction_types":"LIKE, INTEREST","comment_count":1,"impression_count":405,"source":"activity"},{"is_my_post":true,"post_urn":"urn:li:activity:7459234370281893888","author_name":"Ravi Evani\n              \n                \n                   \n    \n      \n    \n    \n      \n    \n\n • You","author_profile_url":"https://www.linkedin.com/in/ravievani","author_headline":"Deploying enterprise agents in production / CTO / SWE Leader / GVP @ Publicis Sapient","posted_time":"2026-05-27","posted_hours_ago":720,"posted_time_raw":"1mo","post_url":"https://www.linkedin.com/feed/update/urn:li:activity:7459234370281893888","author_profile_image_url":"https://media.licdn.com/dms/image/v2/C4E03AQGNeJRorEd2Nw/profile-displayphoto-shrink_100_100/profile-displayphoto-shrink_100_100/0/1569287114631?e=1784160000&v=beta&t=tJDZC7EXWnlgIIf8kF7fBCajhF-HEgzNXnz_IIkjqW8","post_text":"I see enterprises treating evaluation of agentic coding tools like SaaS. They are evaluating them via feature checklists, generalized vendor bake-offs and rooted in individual vs enterprise productivity.\n\nYou are not buying a discrete tool; you are integrating synthetic cognitive labor into an existing socio-technical enterprise workflow.\n\nRather than evaluating tools, I would suggest a heuristic of \"Thin Skills, Fat Harness\" versus \"Fat Skills, Thin Harness\". It correctly shifts the conversation from \"Which AI writes the best Java?\" to \"How do we engineer the control plane to fit our specific operational reality?\".\n\n1. \"Thin Skills, Fat Harness\" (The Orchestrator-Driven Model)\nIn this scenario, the enterprise needs strict control and standardizes \"how work gets done.\" The Fat Harness (a heavy, opinionated harness) absorbs the bulk of the behaviors.\n\nThe Dynamic: The organization takes all the \"common stuff\" (enterprise design patterns, security gates, testing protocols, compliance checklists, and workflow routing ) and bakes them directly into the harness.\n\nThe Thin Skills: Because the harness dictates the process, the \"skills\" required at the edge (whether from a human or LLM) are relatively thin. The dev doesn't need to figure out how to navigate the enterprise SDLC; they are simply handed a discrete, highly constrained task to execute within a predefined assembly line.\n\nWhere it Fits: This is the \"robust enterprise guardrails\" scenario. It could be vital for highly regulated environments, scaling mixed-maturity teams, or managing fragile legacy codebases. The organization relies on the harness to ensure that no standard is ever skipped.\n\n2. \"Fat Skills, Thin Harness\" (The Edge-Driven Model)\nIn this scenario, the orchestrator steps back. The Thin Harness provides nothing more than flexible scaffolding (perhaps LLM / repository access, environment provisioning, and a communication bus) but it does not dictate the \"how..\n\nThe Dynamic: The heavy lifting of tasks and behaviors is shifted to the edge. The Fat Skills (task decomposition, dynamic problem-solving, determining testing strategies, and applying deep domain expertise) are left entirely up to the devs and the skills they create / direct.\n\nWhere it Fits: This is useful for greenfield development, rapid prototyping, and elite senior engineering pods. In these environments, a heavy orchestrator would act as a bureaucratic bottleneck. The team needs the freedom to let their domain expertise drive emergent, highly customized behaviors.\n\nRandom tool proliferation will never deliver enterprise value because a new tool cannot fix a misaligned operating model. True value is unlocked only when leadership intentionally designs how the orchestration and the tasks interact to fit the reality of the work being done.","post_image_url":null,"is_article":false,"article_url":null,"article_title":null,"article_description":null,"is_video":false,"video_url":null,"has_image":false,"reaction_count":6,"reaction_types":"LIKE","impression_count":502,"source":"activity"},{"is_my_post":true,"post_urn":"urn:li:activity:7458836651902070784","author_name":"Ravi Evani\n              \n                \n                   \n    \n      \n    \n    \n      \n    \n\n • You","author_profile_url":"https://www.linkedin.com/in/ravievani","author_headline":"Deploying enterprise agents in production / CTO / SWE Leader / GVP @ Publicis Sapient","posted_time":"2026-05-27","posted_hours_ago":720,"posted_time_raw":"1mo","post_url":"https://www.linkedin.com/feed/update/urn:li:activity:7458836651902070784","author_profile_image_url":"https://media.licdn.com/dms/image/v2/C4E03AQGNeJRorEd2Nw/profile-displayphoto-shrink_100_100/profile-displayphoto-shrink_100_100/0/1569287114631?e=1784160000&v=beta&t=tJDZC7EXWnlgIIf8kF7fBCajhF-HEgzNXnz_IIkjqW8","post_text":"A team of people (and their DIY AI agents) moving fast in different directions creates more chaos than enterprise value.\n\nRight now, as people build DIY agents (or personal \"teams\" of agents), they are optimizing their specific node in the organizational network.\n\nBut enterprise value isn't created within isolated nodes; it is created in the links: the handoffs, the consensus building, and the collaborative execution.\n\nHere is where isolated \"agentic\" gains break down in real organizations:\n1/ The \"Integration Tax\"\nIf your personal agent drafts a proposal based on your local files, and a colleague's agent critiques it based on a biased set of instructions, you aren't actually collaborating. Your bots are just aggressively misaligned. You inevitably end up acting as the manual API between incompatible agents, spending more time untangling conflicting outputs than you saved through automation.\n\n2/ Contextual Fragmentation\nPersonal agents rely on \"local truth\" (e.g., a single user's inbox). Collaborative work requires shared context. Without it, individual agents operate in divergent alternate realities, leading to hallucinated disagreements over different interpretations of the same patterns.\n\n3/ Action Collisions\nA personal agent's prime directive is to please its user. However, enterprise collaboration constantly requires trade-offs. If your agent is instructed to fiercely protect your calendar for deep work, and my agent is instructed to aggressively schedule a sync to close a deal, the tools will actively work against each other.\n\nTrue enablement is about creating shared ways of working that scale across teams.\n\n1/ A Unified Cognitive Layer\nAgents cannot collaborate if they are using different playbooks. The enterprise requires a centralized knowledge architecture (like an Enterprise Context Graph). When an agent takes action, it must draw from the exact same living system of record as the rest of the org.\n\n2/ Standardized Handoffs\nEnterprise workflows must rely on agents that interact with each other using standardized data contracts. The focus shifts from how fast a task is done to how cleanly the output can be handed off to the next node in the chain.\n\n3/ Process Engineering\nPersonal agents automate stateless tasks (e.g., \"summarize this meeting\"). Shared workflows execute stateful processes (e.g., \"manage the contract from procurement to legal\"). A shared workflow has memory; it knows what happened yesterday, what is required for compliance tomorrow, and who holds the approval authority today.\n\n4/ Systemic Alignment & Governance\nGovernance must be baked into the agents themselves so they respect org boundaries. Their instructions should be aligned to broader business outcomes (e.g., \"optimize for budget\") rather than individual user quirks.","post_image_url":"https://media.licdn.com/dms/image/v2/D4E05AQEvPpBokfWgnQ/videocover-high/B4EZ4McXxYG8BQ-/0/1778325226789?e=1783137600&v=beta&t=mypuRD9laRoNHGn0FV8WEwklCbnfINuc8u9m2NU1vTA","is_article":false,"article_url":null,"article_title":null,"article_description":null,"is_video":true,"video_url":"https://media.licdn.com/dms/image/v2/D4E05AQEvPpBokfWgnQ/videocover-high/B4EZ4McXxYG8BQ-/0/1778325226789?e=1783137600&v=beta&t=mypuRD9laRoNHGn0FV8WEwklCbnfINuc8u9m2NU1vTA","has_image":true,"reaction_count":26,"reaction_types":"LIKE","comment_count":1,"impression_count":1066,"source":"activity"},{"is_my_post":true,"post_urn":"urn:li:activity:7458455308206714880","author_name":"Ravi Evani\n              \n                \n                   \n    \n      \n    \n    \n      \n    \n\n • You","author_profile_url":"https://www.linkedin.com/in/ravievani","author_headline":"Deploying enterprise agents in production / CTO / SWE Leader / GVP @ Publicis Sapient","posted_time":"2026-05-27","posted_hours_ago":720,"posted_time_raw":"1mo","post_url":"https://www.linkedin.com/feed/update/urn:li:activity:7458455308206714880","author_profile_image_url":"https://media.licdn.com/dms/image/v2/C4E03AQGNeJRorEd2Nw/profile-displayphoto-shrink_100_100/profile-displayphoto-shrink_100_100/0/1569287114631?e=1784160000&v=beta&t=tJDZC7EXWnlgIIf8kF7fBCajhF-HEgzNXnz_IIkjqW8","post_text":"Optimizing your repo structure for coding agents: How to Speed Up File Identification\n\nIf you’ve recently integrated AI coding agents into your workflow, you might have noticed a recurring issue: sometimes they execute a complex task flawlessly, and other times they wander aimlessly, modifying the wrong files or hallucinating completely new patterns.\n\nWhy does this happen? Because AI agents don't navigate codebases like humans do.\n\nHere’s how to make your codebase \"AI-Native.\"\n\n1. Ditch Layers for Feature-Based Modularity\nThe Problem: Traditional MVC (e.g., `/controllers`, `/models`, `/views`) forces agents to jump across distant directories, exhausting their context windows.\nThe Fix: Group code by feature. Keep `rebooking_api.py`, `rebooking_service.py`, and `rebooking_schema.py` in a single `features/flight_rebooking/` folder.\n\n2. High-Signal Naming\nThe Problem: An agent searching for \"flight rebooking\" will completely miss a file named `ticket_manager.py` or logic dumped in `utils.py`.\nThe Fix: Be painfully literal. Use names that a simple text search will instantly hit, like `error_telemetry.py` or `flight_rebooking.py`.\n\n3. Create a Root \"Map\" File\nThe Problem: Agents blindly guess where boundaries are.\nThe Fix: Maintain a high-level `WORKSPACE_INDEX.md` or `README.md` at the root that explicitly maps the architecture (e.g., *\"Frontend lives in `/web`, APIs in `/api`\"*).\n\n4. Colocate Your Tests\nThe Problem:* Buried tests (`/tests/unit/features/v2/`) get ignored by agents, leading to broken CI pipelines later.\nThe Fix: Place `test_rebooking.py` immediately next to `rebooking.py`. When an agent explores a feature, it instantly learns the testing pattern.\n\n5. Centralized Registries\nThe Problem: If UI components or API routes are registered across 10 different files, the agent won't know how to wire up its newly created feature.\nThe Fix: Use a single, predictable registry (e.g., `command_registry.py`). The agent sees exactly how existing items are imported and registered.\n\n6. Avoid \"God Objects\" and Deep Nesting\nThe Problem: A 5,000-line `app.py` or an 8-level deep path (`src/app/core/v1/...`) breaks shell commands and blows out context limits.\nThe Fix: Keep the directory tree flat. Break massive files into smaller, single-purpose modules so the agent only loads what it needs.\n\nPreparing for AI agents means returning to ruthless organization, extreme modularity, and literal naming. Structure your repository for `grep` and `glob`, and your agents will spend less time searching and more time shipping.\n\nTactically, you could use this post as a prompt to your agent; have this created as a skill and make sure that skill is invoked on the trigger of your choice.","post_image_url":"https://media.licdn.com/dms/image/v2/D4E22AQG48iauNLb2eA/feedshare-shrink_800/B4EZ4HBlGvH0Ac-/0/1778234315801?e=1784160000&v=beta&t=z1DOdcBQQAJROc1H_Uagd6H7DIoHSJsSAHj-BsIdXQY","is_article":false,"article_url":null,"article_title":null,"article_description":null,"is_video":false,"video_url":null,"has_image":true,"reaction_count":11,"reaction_types":"LIKE, INTEREST","comment_count":2,"impression_count":617,"source":"activity"},{"is_my_post":true,"post_urn":"urn:li:activity:7458437813122809857","author_name":"Ravi Evani\n              \n                \n                   \n    \n      \n    \n    \n      \n    \n\n • You","author_profile_url":"https://www.linkedin.com/in/ravievani","author_headline":"Deploying enterprise agents in production / CTO / SWE Leader / GVP @ Publicis Sapient","posted_time":"2026-05-27","posted_hours_ago":720,"posted_time_raw":"1mo","post_url":"https://www.linkedin.com/feed/update/urn:li:activity:7458437813122809857","author_profile_image_url":"https://media.licdn.com/dms/image/v2/C4E03AQGNeJRorEd2Nw/profile-displayphoto-shrink_100_100/profile-displayphoto-shrink_100_100/0/1569287114631?e=1784160000&v=beta&t=tJDZC7EXWnlgIIf8kF7fBCajhF-HEgzNXnz_IIkjqW8","post_text":"The fastest way to lose trust in an AI agent is to make it forget what the user already told it.\n\nIn customer experience, weak memory shows up as repetition. Customers have to explain the same issue multiple times. The AI may not remember prior interactions, unresolved problems, preferences, or account-specific context. This creates frustration and reduces trust.\n\nIn enterprise copilots, the issue is even bigger. A copilot may understand general knowledge, but it often lacks the company’s internal memory: how systems actually work, what decisions were made, which rules matter, who owns what, and what constraints govern the workflow. Without that institutional context, the AI may give answers that sound right but do not fit the company’s reality.\n\nFor long-running workflows, the biggest risk is drift. An agent may start with the right goal, rules, and constraints, but over time those details get compressed, summarized, or partially forgotten. The dangerous part is that the agent may continue operating confidently even after it has lost critical instructions. That creates risk in areas like compliance, customer handling, operations, software delivery, and decision automation.\n\nThis is one of the uncomfortable truths about enterprise AI: an agent that cannot remember reliably cannot be trusted to act reliably.","post_image_url":"https://media.licdn.com/dms/image/v2/D4D22AQEG6fguwZN_yA/feedshare-shrink_800/B4DZ4GxqvAGcAc-/0/1778230145041?e=1784160000&v=beta&t=-dBi-gTBd89Vq97qTnfWPdzB7F3uS6APDnsh56W10GQ","is_article":false,"article_url":null,"article_title":null,"article_description":null,"is_video":false,"video_url":null,"has_image":true,"reaction_count":9,"reaction_types":"LIKE","comment_count":1,"impression_count":701,"source":"activity"},{"is_my_post":true,"post_urn":"urn:li:activity:7457752466709979136","author_name":"Ravi Evani\n              \n                \n                   \n    \n      \n    \n    \n      \n    \n\n • You","author_profile_url":"https://www.linkedin.com/in/ravievani","author_headline":"Deploying enterprise agents in production / CTO / SWE Leader / GVP @ Publicis Sapient","posted_time":"2026-05-27","posted_hours_ago":720,"posted_time_raw":"1mo","post_url":"https://www.linkedin.com/feed/update/urn:li:activity:7457752466709979136","author_profile_image_url":"https://media.licdn.com/dms/image/v2/C4E03AQGNeJRorEd2Nw/profile-displayphoto-shrink_100_100/profile-displayphoto-shrink_100_100/0/1569287114631?e=1784160000&v=beta&t=tJDZC7EXWnlgIIf8kF7fBCajhF-HEgzNXnz_IIkjqW8","post_text":"I’m starting to realize that I use fewer tokens when I think more, and a lot more tokens when I think less. The biggest token saver might be clarity of thought.","post_image_url":null,"is_article":false,"article_url":null,"article_title":null,"article_description":null,"is_video":false,"video_url":null,"has_image":false,"reaction_count":42,"reaction_types":"LIKE, EMPATHY, INTEREST","comment_count":6,"impression_count":1797,"source":"activity"},{"is_my_post":true,"post_urn":"urn:li:activity:7457089341979435009","author_name":"Ravi Evani\n              \n                \n                   \n    \n      \n    \n    \n      \n    \n\n • You","author_profile_url":"https://www.linkedin.com/in/ravievani","author_headline":"Deploying enterprise agents in production / CTO / SWE Leader / GVP @ Publicis Sapient","posted_time":"2026-05-27","posted_hours_ago":720,"posted_time_raw":"1mo","post_url":"https://www.linkedin.com/feed/update/urn:li:activity:7457089341979435009","author_profile_image_url":"https://media.licdn.com/dms/image/v2/C4E03AQGNeJRorEd2Nw/profile-displayphoto-shrink_100_100/profile-displayphoto-shrink_100_100/0/1569287114631?e=1784160000&v=beta&t=tJDZC7EXWnlgIIf8kF7fBCajhF-HEgzNXnz_IIkjqW8","post_text":"Airline disruption recovery is one of the hardest operating problems in travel.\n\nA single delay can quickly turn into missed connections, stranded passengers, crew conflicts, gate congestion, and customer service overload.\n\nI’m hosting a LinkedIn Live session where I’ll walk through an Agentic IROPS Recovery Simulation => showing how a multi-agent system can help airlines detect disruption risk earlier, evaluate recovery options faster, and keep humans in control of critical decisions.\n\nIf you work in aviation, travel operations, customer experience, or enterprise AI, I’d love to have you join.","post_image_url":null,"is_article":false,"article_url":null,"article_title":null,"article_description":null,"is_video":true,"video_url":null,"has_image":false,"reaction_count":20,"reaction_types":"LIKE","comment_count":4,"impression_count":1244,"source":"activity"},{"is_my_post":true,"post_urn":"urn:li:activity:7457043896242565120","author_name":"Ravi Evani\n              \n                \n                   \n    \n      \n    \n    \n      \n    \n\n • You","author_profile_url":"https://www.linkedin.com/in/ravievani","author_headline":"Deploying enterprise agents in production / CTO / SWE Leader / GVP @ Publicis Sapient","posted_time":"2026-05-27","posted_hours_ago":720,"posted_time_raw":"1mo","post_url":"https://www.linkedin.com/feed/update/urn:li:activity:7457043896242565120","author_profile_image_url":"https://media.licdn.com/dms/image/v2/C4E03AQGNeJRorEd2Nw/profile-displayphoto-shrink_100_100/profile-displayphoto-shrink_100_100/0/1569287114631?e=1784160000&v=beta&t=tJDZC7EXWnlgIIf8kF7fBCajhF-HEgzNXnz_IIkjqW8","post_text":"Before, Uber was merely a kinetic transit pipe (moving you and your food). By adding lodging, Uber has captured the final, most crucial data point in travel logistics: the guest’s travel address.\n\nThis boils down to three implications.\n\nFirst, by controlling lodging, Uber turns lodging (hotels today, perhaps Airbnb tomorrow) into fixed logistical anchors for guests. The AI knows exactly where and when you are. It means no friction on delivery and an implicit “approval” to be your concierge.\n\nSecond, with advanced booking data, Uber can move from reacting to anticipating demand. It can position vehicles and food ahead of time based on where guests will stay.\n\nThird, it’s chaining logistics like API calls. The AI can sequence a coffee pickup, then the ride, then the check-in, all in one flow.\n\nIt seems as if Uber is not just trying to enter hotels, but rather, becoming the orchestration layer for travel movement.","post_image_url":"https://media.licdn.com/dms/image/v2/D4E22AQERGs2PZBJ1Qw/feedshare-shrink_800/B4EZ3voOvhJMAg-/0/1777841795081?e=1784160000&v=beta&t=hoG_zN8dD3CSruPEdZ7XAQtCCQMv6rofm2ka6FGPOeg","is_article":false,"article_url":null,"article_title":null,"article_description":null,"is_video":false,"video_url":null,"has_image":true,"reaction_count":8,"reaction_types":"LIKE, INTEREST","impression_count":796,"source":"activity"},{"is_my_post":true,"post_urn":"urn:li:activity:7456637576431554560","author_name":"Ravi Evani\n              \n                \n                   \n    \n      \n    \n    \n      \n    \n\n • You","author_profile_url":"https://www.linkedin.com/in/ravievani","author_headline":"Deploying enterprise agents in production / CTO / SWE Leader / GVP @ Publicis Sapient","posted_time":"2026-05-27","posted_hours_ago":720,"posted_time_raw":"1mo","post_url":"https://www.linkedin.com/feed/update/urn:li:activity:7456637576431554560","author_profile_image_url":"https://media.licdn.com/dms/image/v2/C4E03AQGNeJRorEd2Nw/profile-displayphoto-shrink_100_100/profile-displayphoto-shrink_100_100/0/1569287114631?e=1784160000&v=beta&t=tJDZC7EXWnlgIIf8kF7fBCajhF-HEgzNXnz_IIkjqW8","post_text":"My Spec-Driven Development (SDD) Setup to go from spec to task to code.\n\n1/ Why is this needed?\nThe SDD setup is assembled to solve three fundamental limitations of AI agents:\n\na. The Context Limit (Amnesia): AI agents forget things between sessions. SDD solves this by externalizing the agent's memory into permanent, version-controlled files that the agent is forced to read automatically at the start of every session.\n\nb. The Hallucination Limit (Unpredictability): Agents tend to guess or invent patterns. SDD solves this by providing rigid markdown templates and strict architectural rules, acting as non-negotiable guardrails.\n\nc. The Execution Bias (Action over Design): Agents want to write code immediately without thinking about edge cases. SDD solves this by trapping the agent in a strict \"State Machine\" using workflows (Specify → Plan → Implement), ensuring code is only written *after* the design is approved.\n\n2/ Core Architecture & Components\nThis setup divides responsibilities between *Global State* (things the agent must always know) and *Local State* (things the agent looks up on demand to avoid context overflow).\n\nHere is the anatomy of this SDD directory structure:\n\na. The Agent's Brain (Global Context & Workflows)\nb. The Framework Law (Memory & Templates)\nc. The Output (Local State)\n\n3/ How It Works in Practice (The Loop)\nBecause of the hardcoded *SDD Mandate*, the AI is legally bound by these system rules:\n\na. *Interception:* If I ask the agent to \"build a new dashboard view,\" it will *refuse* to write production code immediately.\nb. *Specification:* It will automatically trigger the `/speckit.specify` workflow, asking me for requirements and generating a `spec.md`.\n3. *Planning:* It will then generate a technical `plan.md` and check it against my `constitution.md` for violations.\n4. *Implementation & Traceability:* Once I approve the plan, it breaks it down into `tasks.md` and writes the code. Crucially, it leaves lightweight tags (like `// @spec: US1-T003`) directly in the source code so that every line of logic traces back to the original specification document.","post_image_url":"https://media.licdn.com/dms/image/v2/D5622AQFD3-teSuXzIw/feedshare-shrink_800/B56Z3tMXQ2J0Ac-/0/1777800934932?e=1784160000&v=beta&t=mCAn_lFv1oneJ4dIhgTgvC1niheOJURGsvd4YCXgezs","is_article":false,"article_url":null,"article_title":null,"article_description":null,"is_video":false,"video_url":null,"has_image":true,"reaction_count":77,"reaction_types":"LIKE, INTEREST, EMPATHY","comment_count":2,"impression_count":4708,"source":"activity"},{"is_my_post":true,"post_urn":"urn:li:activity:7456436780804886528","author_name":"Ravi Evani\n              \n                \n                   \n    \n      \n    \n    \n      \n    \n\n • You","author_profile_url":"https://www.linkedin.com/in/ravievani","author_headline":"Deploying enterprise agents in production / CTO / SWE Leader / GVP @ Publicis Sapient","posted_time":"2026-05-27","posted_hours_ago":720,"posted_time_raw":"1mo","post_url":"https://www.linkedin.com/feed/update/urn:li:activity:7456436780804886528","author_profile_image_url":"https://media.licdn.com/dms/image/v2/C4E03AQGNeJRorEd2Nw/profile-displayphoto-shrink_100_100/profile-displayphoto-shrink_100_100/0/1569287114631?e=1784160000&v=beta&t=tJDZC7EXWnlgIIf8kF7fBCajhF-HEgzNXnz_IIkjqW8","post_text":"Should hotels compete or collaborate with Uber? Here is the full video to my answer and reasoning: https://lnkd.in/g-WdHkUG","post_image_url":"https://media.licdn.com/dms/image/v2/D5605AQF-BiG3y6ROxQ/videocover-high/B56Z3qVqjtIUBU-/0/1777753046415?e=1783137600&v=beta&t=8Oy7B0KcC9R304KhduvDQZDHwCEZe6v2KQiCzLa-5Ho","is_article":false,"article_url":null,"article_title":null,"article_description":null,"is_video":true,"video_url":"https://media.licdn.com/dms/image/v2/D5605AQF-BiG3y6ROxQ/videocover-high/B56Z3qVqjtIUBU-/0/1777753046415?e=1783137600&v=beta&t=8Oy7B0KcC9R304KhduvDQZDHwCEZe6v2KQiCzLa-5Ho","has_image":true,"reaction_count":18,"reaction_types":"LIKE, INTEREST","comment_count":1,"impression_count":1154,"source":"activity"},{"is_my_post":true,"post_urn":"urn:li:activity:7456080369730093056","author_name":"Ravi Evani\n              \n                \n                   \n    \n      \n    \n    \n      \n    \n\n • You","author_profile_url":"https://www.linkedin.com/in/ravievani","author_headline":"Deploying enterprise agents in production / CTO / SWE Leader / GVP @ Publicis Sapient","posted_time":"2026-05-27","posted_hours_ago":720,"posted_time_raw":"1mo","post_url":"https://www.linkedin.com/feed/update/urn:li:activity:7456080369730093056","author_profile_image_url":"https://media.licdn.com/dms/image/v2/C4E03AQGNeJRorEd2Nw/profile-displayphoto-shrink_100_100/profile-displayphoto-shrink_100_100/0/1569287114631?e=1784160000&v=beta&t=tJDZC7EXWnlgIIf8kF7fBCajhF-HEgzNXnz_IIkjqW8","post_text":"Uber’s hotel pricing strategy, e.g. 20% off hotels plus 10% back in ecosystem credits is a well engineered algorithmic incentive.\n\nWhen you or your (future) AI agent makes the first transaction (the hotel), the \"gravity well\" activates.\n\nNow because the agent has now secured Uber credits, it holds a \"sunk asset\" on its ledger. Now you or your AI agent could assume a (logically obvious) fiduciary duty to minimize your out-of-pocket spend. Therefore, when you land at the airport and tell your AI, \"Get me a ride to the hotel,\" the agent won't even ping Lyft's API to check prices.\n\nLet's say Uber Hotel for 2 nights: $400 - 20% discount = $320\nUber One Credit Yield: 10% of $320 back in credits = -$32 applied to the rides/food.\n\nWhen you or your AI uses the initial $32 credit to pay for the friday night airport ride, the transaction doesn't end there. Because it is executing within the Uber One ecosystem, a specific $35 ride generates its own new cash-back yield (e.g., 6% back in Uber Cash).\n\nNow your AI holds a new $2.10 balance. When it uses that $2.10 toward an Uber Eats breakfast on Saturday morning, that food order generates another fractional credit. To an AI with a strict fiduciary duty to leave absolutely zero liquid capital on the table, the ledger never cleanly hits zero. It creates an algorithmic version of Zeno’s Paradox: an infinite, cascading loop of fractional micro-credits that perpetually forces your AI to choose Uber over a competitor for the next transaction, just to liquidate the lingering balance.\n\nUber is using the hotel discount as an algorithmic loss leader. By subsidizing the highest-ticket item (the hotel), Uber effectively influences you or your AI into establishing an exclusive, localized monopoly over your ground transport and food for the entire duration of the trip.","post_image_url":null,"is_article":false,"article_url":null,"article_title":null,"article_description":null,"is_video":false,"video_url":null,"has_image":false,"reaction_count":18,"reaction_types":"LIKE, INTEREST","comment_count":1,"impression_count":1430,"source":"activity"},{"is_my_post":true,"post_urn":"urn:li:activity:7455739736935165952","author_name":"Ravi Evani\n              \n                \n                   \n    \n      \n    \n    \n      \n    \n\n • You","author_profile_url":"https://www.linkedin.com/in/ravievani","author_headline":"Deploying enterprise agents in production / CTO / SWE Leader / GVP @ Publicis Sapient","posted_time":"2026-05-27","posted_hours_ago":720,"posted_time_raw":"1mo","post_url":"https://www.linkedin.com/feed/update/urn:li:activity:7455739736935165952","author_profile_image_url":"https://media.licdn.com/dms/image/v2/C4E03AQGNeJRorEd2Nw/profile-displayphoto-shrink_100_100/profile-displayphoto-shrink_100_100/0/1569287114631?e=1784160000&v=beta&t=tJDZC7EXWnlgIIf8kF7fBCajhF-HEgzNXnz_IIkjqW8","post_text":"The travel and hospitality web might shift from a billboard of information into a high-frequency trading floor.\n\nWith Google’s \"AI Max\" and Uber’s expansion into hotels, we are seeing the groundwork for an agentic transaction web. In the near future, when a traveler asks an AI to book a weekend trip, the agent won't just scrape the web for options. It will run a real-time arbitrage simulation. If a closed ecosystem like Uber returns a bundled offer that mathematically beats piecemeal options on the open web, the AI’s logic defaults to the bundle. On paper, the independent hotel loses.\n\nBut Google holds real-time consumer intent. It knows exactly when an independent hotel is losing the algorithm's math by a few dollars.\n\nInstead of that hotel spending its acquisition budget on traditional banner ads or sponsored search, its marketing systems could soon authorize a direct, real-time subsidy into the AI’s decision flow. By dynamically deploying a micro-discount to instantly close the price gap, the independent trip becomes mathematically cheaper. The AI reroutes the booking back to the open web.\nThe customer never sees an ad. The \"ad\" was simply a microsecond financial incentive paid in the dark to win the machine's logic.\n\nAs demand routing becomes heavily AI-mediated, hospitality companies face a stark reality. Either they build the infrastructure to become algorithmically compliant and win the math in the dark, or they build a brand so culturally resonant that the human explicitly overrides the math.","post_image_url":"https://media.licdn.com/dms/image/v2/D5622AQH6k9wzgcUzHw/feedshare-image-high-res/B56Z3gbyCXI8AY-/0/1777586872709?e=1784160000&v=beta&t=U6dl7uLzfY-6QsKpSeXfJAhWX8IPm1MjNHm3O9tExhY","is_article":false,"article_url":null,"article_title":null,"article_description":null,"is_video":false,"video_url":null,"has_image":true,"reaction_count":9,"reaction_types":"LIKE, INTEREST","impression_count":737,"source":"activity"},{"is_my_post":true,"post_urn":"urn:li:activity:7455582389403238400","author_name":"Ravi Evani\n              \n                \n                   \n    \n      \n    \n    \n      \n    \n\n • You","author_profile_url":"https://www.linkedin.com/in/ravievani","author_headline":"Deploying enterprise agents in production / CTO / SWE Leader / GVP @ Publicis Sapient","posted_time":"2026-05-27","posted_hours_ago":720,"posted_time_raw":"1mo","post_url":"https://www.linkedin.com/feed/update/urn:li:activity:7455582389403238400","author_profile_image_url":"https://media.licdn.com/dms/image/v2/C4E03AQGNeJRorEd2Nw/profile-displayphoto-shrink_100_100/profile-displayphoto-shrink_100_100/0/1569287114631?e=1784160000&v=beta&t=tJDZC7EXWnlgIIf8kF7fBCajhF-HEgzNXnz_IIkjqW8","post_text":"Here’s what could be the bigger idea behind Uber Hotels.\n\nFor the last 20 years, the internet was built around human attention.\n\nCompanies won by getting us to open their app, remember their brand, save our card, and keep coming back because switching felt inconvenient.\n\nThat world starts to change when AI agents become the interface.\n\nIn the future, you may not open five apps to plan a trip. You may just say, “Book me a cost-effective weekend in Chicago and handle the logistics.”\n\nAt that point, the battle is no longer for your attention.\n\nIt is for the algorithm’s decision.\n\nAnd AI agents do not care about brand loyalty. They do not care that your credit card is already saved. They do not get tired of comparison shopping.\n\nThey will compare options across hotels, rides, food, and timing in milliseconds.\n\nThat creates a real risk for Uber.\n\nIf Uber is only a ride-hailing API, it becomes a commodity. The AI can compare Uber against Lyft, Waymo, taxis, or public transit, and pick the cheapest reliable option.\n\nSo Uber has to avoid becoming a dumb pipe.\n\nThat is why the hotel move is interesting.\n\nUber is not just trying to sell hotel rooms. It is trying to change the math.\n\nIf Uber can bundle hotel discounts, airport rides, Uber Eats, and Uber One credits, the AI is no longer comparing one ride against another ride.\n\nIt is optimizing the total trip.\n\nA standalone competitor may beat Uber on one piece.\n\nBut Uber can win across the whole journey.\n\nUber is preparing for a world where machines make more buying decisions, and the math, not the logo, decides who wins.","post_image_url":"https://media.licdn.com/dms/image/v2/D5605AQF43o5VCkhThA/videocover-high/B56Z3bsvDoIQBU-/0/1777507434950?e=1783137600&v=beta&t=ou_nDLMHvJF8Yb6Ygivsnj7xp06hkxCzxmwBXHwDJ4c","is_article":false,"article_url":null,"article_title":null,"article_description":null,"is_video":true,"video_url":"https://media.licdn.com/dms/image/v2/D5605AQF43o5VCkhThA/videocover-high/B56Z3bsvDoIQBU-/0/1777507434950?e=1783137600&v=beta&t=ou_nDLMHvJF8Yb6Ygivsnj7xp06hkxCzxmwBXHwDJ4c","has_image":true,"reaction_count":22,"reaction_types":"LIKE, INTEREST","comment_count":1,"impression_count":1216,"source":"activity"},{"is_my_post":true,"post_urn":"urn:li:activity:7455282657787138048","author_name":"Ravi Evani\n              \n                \n                   \n    \n      \n    \n    \n      \n    \n\n • You","author_profile_url":"https://www.linkedin.com/in/ravievani","author_headline":"Deploying enterprise agents in production / CTO / SWE Leader / GVP @ Publicis Sapient","posted_time":"2026-05-27","posted_hours_ago":720,"posted_time_raw":"1mo","post_url":"https://www.linkedin.com/feed/update/urn:li:activity:7455282657787138048","author_profile_image_url":"https://media.licdn.com/dms/image/v2/C4E03AQGNeJRorEd2Nw/profile-displayphoto-shrink_100_100/profile-displayphoto-shrink_100_100/0/1569287114631?e=1784160000&v=beta&t=tJDZC7EXWnlgIIf8kF7fBCajhF-HEgzNXnz_IIkjqW8","post_text":"Uber seems to be preparing for a world where they must win algorithmic bidding wars, not just human attention.\n\nThe Launch of hotels announcement specifically highlights \"20% off... and an additional 10% back in Uber One Credits [to cover] rides and meals.\" While this copy is designed to appeal to human consumers today, it is actually the perfect bait for autonomous agents tomorrow.\n\nAI agents (armed with deterministic tools) will become rational, cost-optimizing calculators. When you eventually tell your personal AI to \"find the best value for a weekend in Chicago,\" the agent will run the math. By heavily subsidizing hotel prices and tying them to ecosystem credits (which then subsidize the rides and food for the rest of the trip), Uber creates an economic gravity well. The AI's logic will mathematically default to choosing Uber’s bundled platform over piecemealing the trip via traditional Online Travel Agencies (OTAs).\n\nAlso, it looks like Uber is laying the infrastructure to be the primary execution layer for autonomous AI travel agents, while simultaneously defending itself against AI disintermediation. By centralizing rides, food delivery, groceries, and now lodging into a single ecosystem, Uber is creating a cohesive \"action layer.\" In the future, a generalized AI agent won't need to string together four different services; it can simply hand off the entire ground logistics and lodging itinerary to Uber in one seamless execution. Uber might be positioning itself to be the premier \"fulfillment API\" for the physical world.","post_image_url":"https://media.licdn.com/dms/image/v2/D5622AQH0dU-obGJUUg/feedshare-image-high-res/B56Z3Z8EpTH4AU-/0/1777477897014?e=1784160000&v=beta&t=tiNtDH9vAeoqKAla2Pc-t_Z26rJ3Zgw7yEomqfSU9bs","is_article":false,"article_url":null,"article_title":null,"article_description":null,"is_video":false,"video_url":null,"has_image":true,"reaction_count":138,"reaction_types":"LIKE, INTEREST, EMPATHY","comment_count":2,"repost_count":2,"impression_count":29128,"source":"activity"},{"is_my_post":true,"post_urn":"urn:li:activity:7455248473907691520","author_name":"Ravi Evani\n              \n                \n                   \n    \n      \n    \n    \n      \n    \n\n • You","author_profile_url":"https://www.linkedin.com/in/ravievani","author_headline":"Deploying enterprise agents in production / CTO / SWE Leader / GVP @ Publicis Sapient","posted_time":"2026-05-27","posted_hours_ago":720,"posted_time_raw":"1mo","post_url":"https://www.linkedin.com/feed/update/urn:li:activity:7455248473907691520","author_profile_image_url":"https://media.licdn.com/dms/image/v2/C4E03AQGNeJRorEd2Nw/profile-displayphoto-shrink_100_100/profile-displayphoto-shrink_100_100/0/1569287114631?e=1784160000&v=beta&t=tJDZC7EXWnlgIIf8kF7fBCajhF-HEgzNXnz_IIkjqW8","post_text":"I’m seeing AI speed up product development tasks, but in a large enterprise each stakeholder is prompting AI differently based on their own focus, so the real bottleneck is shifting to alignment.\n\nAlignment has to happen across constituents: product, engineering, business, finance, enterprise architecture, security, and compliance for ideas to become real. While individuals might execute “quickly” in isolation, conflicts in alignment (which will happen) slow everything down.\n\nUntil teams adopt a shared operating model and execute in sync, any gains in speed won’t show up. But the op model itself isn’t predefined, and it wont be a single document for people to \"read\". It has to emerge organically through teams actually executing, learning in real situations, and coaching each other. It’s something that gets built by living it, not documenting it, and then scales over time as those practices spread.\n\nEach organization will have its own path, so don’t assume what works in a startup will translate directly to an enterprise. Every organization will shape its own model through experience.\n\nAt the same time, senior leaders can’t sit back and wait for this to sort itself out. They have to lean in. While the model evolves, leadership needs to own it ... starting with pilot projects that push end-to-end execution, capture real learnings, and turn those into repeatable patterns. Incentives need to support building and refining that op model, scaling it across projects, and iterating as you go. Some efforts will follow it, some won’t, and results will be mixed. But, just being a spectator is the worst option. And if that's the case; the enterprise can have all the AI tools, but growth from it will remain elusive.","post_image_url":null,"is_article":false,"article_url":null,"article_title":null,"article_description":null,"is_video":false,"video_url":null,"has_image":false,"reaction_count":8,"reaction_types":"LIKE","comment_count":2,"impression_count":812,"source":"activity"},{"is_my_post":true,"post_urn":"urn:li:activity:7454978487288795136","author_name":"Ravi Evani\n              \n                \n                   \n    \n      \n    \n    \n      \n    \n\n • You","author_profile_url":"https://www.linkedin.com/in/ravievani","author_headline":"Deploying enterprise agents in production / CTO / SWE Leader / GVP @ Publicis Sapient","posted_time":"2026-05-27","posted_hours_ago":720,"posted_time_raw":"1mo","post_url":"https://www.linkedin.com/feed/update/urn:li:activity:7454978487288795136","author_profile_image_url":"https://media.licdn.com/dms/image/v2/C4E03AQGNeJRorEd2Nw/profile-displayphoto-shrink_100_100/profile-displayphoto-shrink_100_100/0/1569287114631?e=1784160000&v=beta&t=tJDZC7EXWnlgIIf8kF7fBCajhF-HEgzNXnz_IIkjqW8","post_text":"Even with AI readily available, why are mainframe/legacy modernization programs not succeeding? Link to full video in first comment.","post_image_url":"https://media.licdn.com/dms/image/v2/D5605AQF3mx1Etfslog/videocover-high/B56Z3VjqvbIsBY-/0/1777404393761?e=1783137600&v=beta&t=RRSoAtkbIWRg-1i_A6OTjR02ESFYEBjIxL2IpzPFsmg","is_article":false,"article_url":null,"article_title":null,"article_description":null,"is_video":true,"video_url":"https://media.licdn.com/dms/image/v2/D5605AQF3mx1Etfslog/videocover-high/B56Z3VjqvbIsBY-/0/1777404393761?e=1783137600&v=beta&t=RRSoAtkbIWRg-1i_A6OTjR02ESFYEBjIxL2IpzPFsmg","has_image":true,"reaction_count":23,"reaction_types":"LIKE, PRAISE","comment_count":1,"impression_count":1384,"source":"activity"},{"is_my_post":true,"post_urn":"urn:li:activity:7454473475844481024","author_name":"Ravi Evani\n              \n                \n                   \n    \n      \n    \n    \n      \n    \n\n • You","author_profile_url":"https://www.linkedin.com/in/ravievani","author_headline":"Deploying enterprise agents in production / CTO / SWE Leader / GVP @ Publicis Sapient","posted_time":"2026-05-27","posted_hours_ago":720,"posted_time_raw":"1mo","post_url":"https://www.linkedin.com/feed/update/urn:li:activity:7454473475844481024","author_profile_image_url":"https://media.licdn.com/dms/image/v2/C4E03AQGNeJRorEd2Nw/profile-displayphoto-shrink_100_100/profile-displayphoto-shrink_100_100/0/1569287114631?e=1784160000&v=beta&t=tJDZC7EXWnlgIIf8kF7fBCajhF-HEgzNXnz_IIkjqW8","post_text":"The Agentic Engineering Maturity Curve\n\nStage 1: Rely on the Raw Model\nAction: Chat window copy-pasting & prompt tweaking.\nThe Trap: Treat the LLM as the entire agent. Users blame \"bad runs\" and inevitable failures on the model itself, not on the lack of engineering around it.\n\nStage 2: Attach Durable State\nAction: Filesystem workspaces & git integration.\nMethod: Gives the model a persistent workspace to offload intermediate work outside its limited context window. The model can now \"save\" its progress, which is critical for long-horizon tasks.\n\nStage 3: Enable General Execution\nAction: Bash terminals & ephemeral sandboxing.\nMethod: This is a crucial step! It involves providing the agent with a secure, general-purpose shell (as you pointed out) to dynamically build and run its own tools. It creates an insulated \"sandbox\" where the agent can safely experiment and execute commands without compromising the host system.\n\nStage 4: Install the Enforcement Ratchet\nAction: Lifecycle hooks & strict rulebooks.\nMethod: This is how you begin to scale. Every agent mistake is analyzed and codified into a hard rule. Success becomes silent; failures trigger a loop back to the agent with explicit, verbose error messages. You are engineering reliability through systematic constraint.\n\nStage 5: Enforce Context Hygiene\nAction: Compaction, tool offloading, & progressive disclosure.\nMethod: Battling \"context rot.\" You develop systems to automatically compact long conversation histories, intelligently hide tools and massive logs until specifically needed, and generally keep the agent focused on only the most relevant information.\n\nStage 6: Decompose Long-Horizon Work\nAction: RALPH loops, plan files, & context resets.\nMethod: Tearing down bloated agent sessions. Instead of one continuous session, work is broken into smaller chunks. The agent creates plan files and can \"context reset,\" starting completely fresh from a saved state on disk to avoid the performance degradation of long conversations.\n\nStage 7: Split Generation & Evaluation\nAction: Multi-agent orchestration & sprint contracts.\nThe Insight: Models tend to be overly optimistic when grading themselves. This stage stops letting them grade their own homework. Instead, you orchestrate one agent to generate and another separate agent (perhaps another model entirely) to act as an objective evaluator, leading to much higher quality and trustworthy output.\n\nStage 8: Shift to Harness-as-a-Service\nAction: Dynamic scaffolding & model-harness co-evolution.\nThe Peak: The engineered \"harness\" becomes the primary organizational asset, not the specific LLM. As base models advance (shifting the \"model ceiling\"), the mature engineering scaffolding dynamically adapts, allowing the organization to easily swap models and co-evolve with AI technology. The focus is now on the system, not just the model.\n\n(Inspired by learning from @Addy Osmani)","post_image_url":"https://media.licdn.com/dms/image/v2/D5622AQH5_02lv4jewA/feedshare-shrink_800/B56Z3OcH0tG0Ac-/0/1777284972065?e=1784160000&v=beta&t=iDaNC99NxOFBdFeWaVUkV7WnG7Lq-sM33xkctTvzao0","is_article":false,"article_url":null,"article_title":null,"article_description":null,"is_video":false,"video_url":null,"has_image":true,"reaction_count":11,"reaction_types":"LIKE, INTEREST","comment_count":1,"impression_count":730,"source":"activity"},{"is_my_post":true,"post_urn":"urn:li:activity:7454124585387679744","author_name":"Ravi Evani\n              \n                \n                   \n    \n      \n    \n    \n      \n    \n\n • You","author_profile_url":"https://www.linkedin.com/in/ravievani","author_headline":"Deploying enterprise agents in production / CTO / SWE Leader / GVP @ Publicis Sapient","posted_time":"2026-04-27","posted_hours_ago":1440,"posted_time_raw":"2mo","post_url":"https://www.linkedin.com/feed/update/urn:li:activity:7454124585387679744","author_profile_image_url":"https://media.licdn.com/dms/image/v2/C4E03AQGNeJRorEd2Nw/profile-displayphoto-shrink_100_100/profile-displayphoto-shrink_100_100/0/1569287114631?e=1784160000&v=beta&t=tJDZC7EXWnlgIIf8kF7fBCajhF-HEgzNXnz_IIkjqW8","post_text":"Of late I'm starting to value leaders who are \"finishers\" a lot more than \"beginners\".\n\nEarly momentum is easy because new beginnings, fresh ideas and new funding naturally attract attention. Starting energy is cheap because it hasn't been tested by friction yet. It’s driven by novelty, untapped potential, and the excitement of a blank slate where no mistakes have been made.\n\nBut when the novelty wears off, you enter the phase where the real work happens. There are delays, difficult conversations, resource constraints, and tough decisions. But that’s also when some of the original crowd moves on to chase the next shiny thing.\n\nFinishing is expensive. It requires an entirely different, much rarer psychological toolkit. Leaders who are finishers don't just escalate or make noise. They are the ones who stick through the grind when excitement fades and challenges pile up. It’s that perseverance: staying behind the team when others get distracted that sets them apart. They carry the team over the line, and drive the project home.\n\nAn organization full of starters without finishers is ultimately just a graveyard of half-built bridges.","post_image_url":null,"is_article":false,"article_url":null,"article_title":null,"article_description":null,"is_video":false,"video_url":null,"has_image":false,"reaction_count":50,"reaction_types":"LIKE, INTEREST, PRAISE","comment_count":1,"impression_count":2062,"source":"activity"},{"is_my_post":true,"post_urn":"urn:li:activity:7453519184745013248","author_name":"Ravi Evani\n              \n                \n                   \n    \n      \n    \n    \n      \n    \n\n • You","author_profile_url":"https://www.linkedin.com/in/ravievani","author_headline":"Deploying enterprise agents in production / CTO / SWE Leader / GVP @ Publicis Sapient","posted_time":"2026-04-27","posted_hours_ago":1440,"posted_time_raw":"2mo","post_url":"https://www.linkedin.com/feed/update/urn:li:activity:7453519184745013248","author_profile_image_url":"https://media.licdn.com/dms/image/v2/C4E03AQGNeJRorEd2Nw/profile-displayphoto-shrink_100_100/profile-displayphoto-shrink_100_100/0/1569287114631?e=1784160000&v=beta&t=tJDZC7EXWnlgIIf8kF7fBCajhF-HEgzNXnz_IIkjqW8","post_text":"Not every AI-enabled workflow needs heavyweight cloud orchestration.\n\nThe practical question is not whether everything AI should run in the cloud or everything should run locally. The question is: where is the sweet spot between output quality, latency, cost, and machine performance?\n\nFor example, for some of the model training outputs(e.g. forecasting or anomaly detection weights) we are generating are very small files — sometimes as small as 2 KB. These are not massive inference workloads. They can run on a local machine and still produce reliable results.\n\nSome tasks are lightweight, repeatable, and context-bound enough to run locally with good quality. The key is knowing which workloads belong where.\n\nThe real design question becomes:\n\nCan we get reliable enough results locally without overloading the machine or compromising quality?\n\nThat is the sweet spot we should measure. Not just “can it run”, but:\n\nDoes the result meet the quality bar?\nIs the performance acceptable on a normal user machine?\nIs the latency better than a cloud round trip?\nIs the cost materially lower?\nIs the task safe and governed enough to run locally?\n\nTherefore, one could consider going local-first where the task is small, bounded, constrained, repeatable; and cloud-first where the task needs scale, deeper reasoning, enterprise context, or shared governance.","post_image_url":"https://media.licdn.com/dms/image/v2/D5605AQGswPLlSgNivQ/videocover-high/B56Z3A4KECHkBU-/0/1777057443482?e=1783137600&v=beta&t=knLDqtsEFqD56wKxfb2mi7EfM-uiugkRhn0ZFiBtbec","is_article":false,"article_url":null,"article_title":null,"article_description":null,"is_video":true,"video_url":"https://media.licdn.com/dms/image/v2/D5605AQGswPLlSgNivQ/videocover-high/B56Z3A4KECHkBU-/0/1777057443482?e=1783137600&v=beta&t=knLDqtsEFqD56wKxfb2mi7EfM-uiugkRhn0ZFiBtbec","has_image":true,"reaction_count":21,"reaction_types":"LIKE","impression_count":918,"source":"activity"},{"is_my_post":true,"post_urn":"urn:li:activity:7453126121828618241","author_name":"Ravi Evani\n              \n                \n                   \n    \n      \n    \n    \n      \n    \n\n • You","author_profile_url":"https://www.linkedin.com/in/ravievani","author_headline":"Deploying enterprise agents in production / CTO / SWE Leader / GVP @ Publicis Sapient","posted_time":"2026-04-27","posted_hours_ago":1440,"posted_time_raw":"2mo","post_url":"https://www.linkedin.com/feed/update/urn:li:activity:7453126121828618241","author_profile_image_url":"https://media.licdn.com/dms/image/v2/C4E03AQGNeJRorEd2Nw/profile-displayphoto-shrink_100_100/profile-displayphoto-shrink_100_100/0/1569287114631?e=1784160000&v=beta&t=tJDZC7EXWnlgIIf8kF7fBCajhF-HEgzNXnz_IIkjqW8","post_text":"It was exciting to host a fireside chat Google Cloud Next '26 with Rajeev Perera on what real-world agentic AI looks like in hospitality, where reliable and repeatable operations matter more than the hype.\n\nThe discussion stayed grounded in the hard part: not whether agents can do interesting things, but whether they can deliver ROI in live operational environments. We talked about AI learning from real user workflows, the role of multi-disciplinary agent personas that combine business and technical judgment, and how recorded business interactions can become material for deeper iteration and learning over time.\n\nWe also got into the practical questions that matter in enterprise settings: on-prem vs. cloud models, how to drive more deterministic behavior from non deterministic agents, and what it takes to make agentic AI dependable enough for operational use. This is where the real work is now. Not in imagining what agents could do, but in making them useful, repeatable, and worth the investment.\n\nThanks to our clients for their thoughtful questions and enriching discussion!","post_image_url":"https://media.licdn.com/dms/image/v2/D5622AQEieaHW0PSUjQ/feedshare-shrink_800/B56Z27St.KKkAg-/0/1776963739887?e=1784160000&v=beta&t=hoBJr6CoGwzFLmEwol7WMw2cYoG32MTv0OHX0-PzDeY","is_article":false,"article_url":null,"article_title":null,"article_description":null,"is_video":false,"video_url":null,"has_image":true,"reaction_count":71,"reaction_types":"LIKE, EMPATHY, PRAISE","comment_count":1,"repost_count":3,"impression_count":2852,"source":"activity"},{"is_my_post":true,"post_urn":"urn:li:activity:7451978805952299009","author_name":"Ravi Evani\n              \n                \n                   \n    \n      \n    \n    \n      \n    \n\n • You","author_profile_url":"https://www.linkedin.com/in/ravievani","author_headline":"Deploying enterprise agents in production / CTO / SWE Leader / GVP @ Publicis Sapient","posted_time":"2026-04-27","posted_hours_ago":1440,"posted_time_raw":"2mo","post_url":"https://www.linkedin.com/feed/update/urn:li:activity:7451978805952299009","author_profile_image_url":"https://media.licdn.com/dms/image/v2/C4E03AQGNeJRorEd2Nw/profile-displayphoto-shrink_100_100/profile-displayphoto-shrink_100_100/0/1569287114631?e=1784160000&v=beta&t=tJDZC7EXWnlgIIf8kF7fBCajhF-HEgzNXnz_IIkjqW8","post_text":"Sometimes agentic coding feels like...","post_image_url":"https://media.licdn.com/dms/image/v2/D5605AQE76VrVaFktDw/videocover-high/B56Z2q_Nl4HgBY-/0/1776690192613?e=1783137600&v=beta&t=rxvqSsNxWwGk1bOqqlNcVip_eANiUFiKyAD1hzhEYkQ","is_article":false,"article_url":null,"article_title":null,"article_description":null,"is_video":true,"video_url":"https://media.licdn.com/dms/image/v2/D5605AQE76VrVaFktDw/videocover-high/B56Z2q_Nl4HgBY-/0/1776690192613?e=1783137600&v=beta&t=rxvqSsNxWwGk1bOqqlNcVip_eANiUFiKyAD1hzhEYkQ","has_image":true,"reaction_count":16,"reaction_types":"LIKE","comment_count":3,"impression_count":774,"source":"activity"},{"is_my_post":true,"post_urn":"urn:li:activity:7451731083257229312","author_name":"Ravi Evani\n              \n                \n                   \n    \n      \n    \n    \n      \n    \n\n • You","author_profile_url":"https://www.linkedin.com/in/ravievani","author_headline":"Deploying enterprise agents in production / CTO / SWE Leader / GVP @ Publicis Sapient","posted_time":"2026-04-27","posted_hours_ago":1440,"posted_time_raw":"2mo","post_url":"https://www.linkedin.com/feed/update/urn:li:activity:7451731083257229312","author_profile_image_url":"https://media.licdn.com/dms/image/v2/C4E03AQGNeJRorEd2Nw/profile-displayphoto-shrink_100_100/profile-displayphoto-shrink_100_100/0/1569287114631?e=1784160000&v=beta&t=tJDZC7EXWnlgIIf8kF7fBCajhF-HEgzNXnz_IIkjqW8","post_text":"Could this \"monitoring view\" have just been a log file? Of course. But now that Sapient Slingshot makes design easier, why not indulge a little operational vanity.","post_image_url":"https://media.licdn.com/dms/image/v2/D5605AQGG08XHdSRVLg/videocover-high/B56Z2nd6a_GsBY-/0/1776631130918?e=1783137600&v=beta&t=Liy6EBNvtR4NQnkJV37KsYFa3gVX0SvyE0slj7Yplgs","is_article":false,"article_url":null,"article_title":null,"article_description":null,"is_video":true,"video_url":"https://media.licdn.com/dms/image/v2/D5605AQGG08XHdSRVLg/videocover-high/B56Z2nd6a_GsBY-/0/1776631130918?e=1783137600&v=beta&t=Liy6EBNvtR4NQnkJV37KsYFa3gVX0SvyE0slj7Yplgs","has_image":true,"reaction_count":12,"reaction_types":"LIKE","impression_count":711,"source":"activity"},{"is_my_post":true,"post_urn":"urn:li:activity:7451645799979044864","author_name":"Ravi Evani\n              \n                \n                   \n    \n      \n    \n    \n      \n    \n\n • You","author_profile_url":"https://www.linkedin.com/in/ravievani","author_headline":"Deploying enterprise agents in production / CTO / SWE Leader / GVP @ Publicis Sapient","posted_time":"2026-04-27","posted_hours_ago":1440,"posted_time_raw":"2mo","post_url":"https://www.linkedin.com/feed/update/urn:li:activity:7451645799979044864","author_profile_image_url":"https://media.licdn.com/dms/image/v2/C4E03AQGNeJRorEd2Nw/profile-displayphoto-shrink_100_100/profile-displayphoto-shrink_100_100/0/1569287114631?e=1784160000&v=beta&t=tJDZC7EXWnlgIIf8kF7fBCajhF-HEgzNXnz_IIkjqW8","post_text":"Ever since \"Claude Code\", I've only seen coding work shoot up. Now with \"Claude Design\", the amount of design work will shoot up too. More capability means more things actually get built. So congrats to my fellow designers. Happy building!","post_image_url":null,"is_article":false,"article_url":null,"article_title":null,"article_description":null,"is_video":false,"video_url":null,"has_image":false,"reaction_count":39,"reaction_types":"LIKE, EMPATHY, INTEREST","comment_count":2,"impression_count":2347,"source":"activity"},{"is_my_post":true,"post_urn":"urn:li:activity:7450548744451756032","author_name":"Ravi Evani\n              \n                \n                   \n    \n      \n    \n    \n      \n    \n\n • You","author_profile_url":"https://www.linkedin.com/in/ravievani","author_headline":"Deploying enterprise agents in production / CTO / SWE Leader / GVP @ Publicis Sapient","posted_time":"2026-04-27","posted_hours_ago":1440,"posted_time_raw":"2mo","post_url":"https://www.linkedin.com/feed/update/urn:li:activity:7450548744451756032","author_profile_image_url":"https://media.licdn.com/dms/image/v2/C4E03AQGNeJRorEd2Nw/profile-displayphoto-shrink_100_100/profile-displayphoto-shrink_100_100/0/1569287114631?e=1784160000&v=beta&t=tJDZC7EXWnlgIIf8kF7fBCajhF-HEgzNXnz_IIkjqW8","post_text":"Excited to join Rajeev Perera in a fireside chat at Google Cloud Next '26! Join me there. Registration link via Publicis Sapient in first comment.","post_image_url":"https://media.licdn.com/dms/image/v2/D5622AQHPXCbMcE8HCw/feedshare-shrink_800/B56Z2TUxvWKoAk-/0/1776293190887?e=1784160000&v=beta&t=yRaR_k5yh38mnR3zqe2yxMmIGAij8pGJatRWOKgsRKA","is_article":false,"article_url":null,"article_title":null,"article_description":null,"is_video":false,"video_url":null,"has_image":true,"reaction_count":46,"reaction_types":"LIKE, EMPATHY, PRAISE","comment_count":3,"repost_count":6,"impression_count":1956,"source":"activity"},{"is_my_post":true,"post_urn":"urn:li:activity:7450456815047450624","author_name":"Ravi Evani\n              \n                \n                   \n    \n      \n    \n    \n      \n    \n\n • You","author_profile_url":"https://www.linkedin.com/in/ravievani","author_headline":"Deploying enterprise agents in production / CTO / SWE Leader / GVP @ Publicis Sapient","posted_time":"2026-04-27","posted_hours_ago":1440,"posted_time_raw":"2mo","post_url":"https://www.linkedin.com/feed/update/urn:li:activity:7450456815047450624","author_profile_image_url":"https://media.licdn.com/dms/image/v2/C4E03AQGNeJRorEd2Nw/profile-displayphoto-shrink_100_100/profile-displayphoto-shrink_100_100/0/1569287114631?e=1784160000&v=beta&t=tJDZC7EXWnlgIIf8kF7fBCajhF-HEgzNXnz_IIkjqW8","post_text":"Traditional project management: Greater scope requires more people.\nAI-native project management: Greater scope requires more system orchestration.\n\nThe mistake I continue to see is applying old staffing patterns to AI-native projects. In traditional projects, you ramp a large team fast. That breaks down with agentic coding. If you throw people and agents in together without structure, you get chaos: “vibe coding” with no guardrails.\n\nInstead, regardless of a project's scope, start with the smallest disciplined team that will execute in a way that will lay the foundation for how people and agents will collaborate. They set the operational rhythm and guardrails.\n\nThis will prevent amplification of missteps before they scale. Only once that baseline is solid, you should add people one at a time, ensuring each new addition fits the stable architecture.\n\nPrioritize scaling coherent systems, not headcount. That’s how you avoid exponential misalignment in an agentic world.","post_image_url":null,"is_article":false,"article_url":null,"article_title":null,"article_description":null,"is_video":false,"video_url":null,"has_image":false,"reaction_count":19,"reaction_types":"LIKE, INTEREST","comment_count":2,"impression_count":1051,"source":"activity"},{"is_my_post":true,"post_urn":"urn:li:activity:7450132703150223360","author_name":"Ravi Evani\n              \n                \n                   \n    \n      \n    \n    \n      \n    \n\n • You","author_profile_url":"https://www.linkedin.com/in/ravievani","author_headline":"Deploying enterprise agents in production / CTO / SWE Leader / GVP @ Publicis Sapient","posted_time":"2026-04-27","posted_hours_ago":1440,"posted_time_raw":"2mo","post_url":"https://www.linkedin.com/feed/update/urn:li:activity:7450132703150223360","author_profile_image_url":"https://media.licdn.com/dms/image/v2/C4E03AQGNeJRorEd2Nw/profile-displayphoto-shrink_100_100/profile-displayphoto-shrink_100_100/0/1569287114631?e=1784160000&v=beta&t=tJDZC7EXWnlgIIf8kF7fBCajhF-HEgzNXnz_IIkjqW8","post_text":"Join my session @ Google Cloud Next '26 on how multi-agent systems can support operational technology in high-velocity, high-pressure environments where continuous, reliable operations are critical.\n\nI'll be showcasing practical examples of agentic workflows that help improve speed of service, prevent operational disruptions, and strengthen on-premise guest experience.\n\nThe conversation will center on how agentic AI can help enterprises respond faster, operate more consistently, and make better decisions in moments where execution matters most.\n\nWe’ll cover:\n1/ How AI agents can support operational performance in QSR and hospitality environments\n2/ Where multi-agent systems can help in high-intensity scenarios requiring speed, coordination, and resilience\n3/ Practical examples of applying agentic AI to improve service, reduce operational friction, and protect guest experience\n4/ What it takes to build these capabilities in an enterprise-grade way so they are secure, scalable, and built to last\n\nRegistration link via Publicis Sapient in first comment.","post_image_url":"https://media.licdn.com/dms/image/v2/D5622AQFtkv7g4-ScEw/feedshare-shrink_800/B56Z2QwNn5GwAc-/0/1776250052062?e=1784160000&v=beta&t=uX63YEfvk9VZjjFpCEpbanwxxu2FcFqHuQ5fJibKYlg","is_article":false,"article_url":null,"article_title":null,"article_description":null,"is_video":false,"video_url":null,"has_image":true,"reaction_count":119,"reaction_types":"LIKE, PRAISE, EMPATHY","comment_count":1,"repost_count":5,"impression_count":4391,"source":"activity"},{"is_my_post":true,"post_urn":"urn:li:activity:7450131223902859264","author_name":"Ravi Evani\n              \n                \n                   \n    \n      \n    \n    \n      \n    \n\n • You","author_profile_url":"https://www.linkedin.com/in/ravievani","author_headline":"Deploying enterprise agents in production / CTO / SWE Leader / GVP @ Publicis Sapient","posted_time":"2026-04-27","posted_hours_ago":1440,"posted_time_raw":"2mo","post_url":"https://www.linkedin.com/feed/update/urn:li:activity:7450131223902859264","author_profile_image_url":"https://media.licdn.com/dms/image/v2/C4E03AQGNeJRorEd2Nw/profile-displayphoto-shrink_100_100/profile-displayphoto-shrink_100_100/0/1569287114631?e=1784160000&v=beta&t=tJDZC7EXWnlgIIf8kF7fBCajhF-HEgzNXnz_IIkjqW8","post_text":"Not dumb, just lazy.","post_image_url":"https://media.licdn.com/dms/image/v2/D5622AQEQoscJjA4OmQ/feedshare-shrink_800/B56Z2Qu3onIAAc-/0/1776249699427?e=1784160000&v=beta&t=MDLqhjSgvxOfKM_Eh6oodZsgcfIW23-UFjuF-FsnsOo","is_article":false,"article_url":null,"article_title":null,"article_description":null,"is_video":false,"video_url":null,"has_image":true,"reaction_count":24,"reaction_types":"LIKE, ENTERTAINMENT, PRAISE","impression_count":2317,"source":"activity"},{"is_my_post":true,"post_urn":"urn:li:activity:7449426269034811392","author_name":"Ravi Evani\n              \n                \n                   \n    \n      \n    \n    \n      \n    \n\n • You","author_profile_url":"https://www.linkedin.com/in/ravievani","author_headline":"Deploying enterprise agents in production / CTO / SWE Leader / GVP @ Publicis Sapient","posted_time":"2026-04-27","posted_hours_ago":1440,"posted_time_raw":"2mo","post_url":"https://www.linkedin.com/feed/update/urn:li:activity:7449426269034811392","author_profile_image_url":"https://media.licdn.com/dms/image/v2/C4E03AQGNeJRorEd2Nw/profile-displayphoto-shrink_100_100/profile-displayphoto-shrink_100_100/0/1569287114631?e=1784160000&v=beta&t=tJDZC7EXWnlgIIf8kF7fBCajhF-HEgzNXnz_IIkjqW8","post_text":"Agent personas must go beyond your org chart.\n\nRight now, the standard approach to building multi-agent AI systems is basically skeuomorphic design. We spin up a \"Developer Agent\", a \"QA Agent\", and a \"Product Manager Agent\", and prompt them to talk to each other.\n\nBut why are we digitally recreating corporate silos, communication friction, and department politics?\n\nThe unexplored superpower of AI isn't mimicking individual human roles. It’s creating Cross-Disciplinary Agent Personas—synthetic polymaths that blend entirely different domains together.\n\nIn the real workforce, finding someone with deep, dual-domain expertise is incredibly rare and expensive. But with LLMs, blending disparate knowledge bases into a single entity is a native feature.\n\nWhen an agent holds opposing constraints simultaneously, you eliminate the \"translation penalty\" between departments, drastically shorten feedback loops, and assess complex trade-offs in a single thought process.\n\nHere is what that could look like in practice:\n\nThe Operator-Builder (Operations Manager + Software Engineer)\nEngineers usually build for the \"happy path\" from a quiet desk. This hybrid agent bridges technical capability and physical reality. It doesn't just ask, \"Does this button work?\" It asks, \"Can a server navigate this POS hierarchy with greasy hands while listening to three different conversations during a dinner rush?\"\n\nThe Fiscal-Architect (Solutions Architect + CFO)\nArchitects want perfect, endlessly scalable systems. CFOs want strict budget control. Instead of two separate agents fighting over trade-offs and burning compute to reach a compromise, a hybrid agent internalizes the dialectic. It looks at a proposed cloud architecture and instantly calculates whether the long-term unit economics justify the short-term engineering CapEx.\n\nThe Ethnographic-QA (User Researcher + QA Tester)\nTraditional QA is binary: Did the app crash? This hybrid agent elevates testing to an anthropological study. It tests for cognitive load, ensuring the software molds to the human's actual real-world workflow, rather than forcing the human to change their behavior.\n\nThe first wave of AI agents is about doing standard human jobs faster.\nThe next wave could be about combining perspectives to do jobs that are unrealistic for one person to hold.","post_image_url":"https://media.licdn.com/dms/image/v2/D4E22AQEOjGZFrJ500A/feedshare-image-high-res/B4EZ1.Yvv2GkAU-/0/1775941909831?e=1784160000&v=beta&t=BNV_8_jecTdrGYtBtilUF2iWni8MJV1xY3a1uLQlvjM","is_article":false,"article_url":null,"article_title":null,"article_description":null,"is_video":false,"video_url":null,"has_image":true,"reaction_count":12,"reaction_types":"LIKE","comment_count":1,"impression_count":399,"source":"activity"},{"is_my_post":true,"post_urn":"urn:li:activity:7448941617476104192","author_name":"Ravi Evani\n              \n                \n                   \n    \n      \n    \n    \n      \n    \n\n • You","author_profile_url":"https://www.linkedin.com/in/ravievani","author_headline":"Deploying enterprise agents in production / CTO / SWE Leader / GVP @ Publicis Sapient","posted_time":"2026-04-27","posted_hours_ago":1440,"posted_time_raw":"2mo","post_url":"https://www.linkedin.com/feed/update/urn:li:activity:7448941617476104192","author_profile_image_url":"https://media.licdn.com/dms/image/v2/C4E03AQGNeJRorEd2Nw/profile-displayphoto-shrink_100_100/profile-displayphoto-shrink_100_100/0/1569287114631?e=1784160000&v=beta&t=tJDZC7EXWnlgIIf8kF7fBCajhF-HEgzNXnz_IIkjqW8","post_text":"So from the leak, people are finding that Claude Code is way more deterministic than just a magical Claude LLM.\n\nWe might also end up finding that the Claude LLM itself isn’t purely a transformer, but also an exponentially growing deterministic codebase being derived from large volumes of prior coding interactions.\n\nHeck, that probably could be the case with Codex and others as well.\n\nAnd, with all the moneybags behind it, today’s “LLM” might just end up being a massive deterministic codebase of if-thens and regexes + a massive system prompt + 200 lines of transformer code. 😝","post_image_url":null,"is_article":false,"article_url":null,"article_title":null,"article_description":null,"is_video":false,"video_url":null,"has_image":false,"reaction_count":27,"reaction_types":"LIKE, ENTERTAINMENT","impression_count":3086,"source":"activity"},{"is_my_post":true,"post_urn":"urn:li:activity:7448696153279250433","author_name":"Ravi Evani\n              \n                \n                   \n    \n      \n    \n    \n      \n    \n\n • You","author_profile_url":"https://www.linkedin.com/in/ravievani","author_headline":"Deploying enterprise agents in production / CTO / SWE Leader / GVP @ Publicis Sapient","posted_time":"2026-04-27","posted_hours_ago":1440,"posted_time_raw":"2mo","post_url":"https://www.linkedin.com/feed/update/urn:li:activity:7448696153279250433","author_profile_image_url":"https://media.licdn.com/dms/image/v2/C4E03AQGNeJRorEd2Nw/profile-displayphoto-shrink_100_100/profile-displayphoto-shrink_100_100/0/1569287114631?e=1784160000&v=beta&t=tJDZC7EXWnlgIIf8kF7fBCajhF-HEgzNXnz_IIkjqW8","post_text":"If you apply hyper-drive to a single gear in a rusty machine, you don't go faster. You just strip the gears.","post_image_url":"https://media.licdn.com/dms/image/v2/D4E22AQFdOknbliSz7Q/feedshare-shrink_800/B4EZ18VrhFIgAc-/0/1775907551587?e=1784160000&v=beta&t=5rVdKfBm-ZlqiPF3HNhH20d8ABfAULzfI8DOfLfKfQU","is_article":false,"article_url":null,"article_title":null,"article_description":null,"is_video":false,"video_url":null,"has_image":true,"reaction_count":15,"reaction_types":"LIKE, EMPATHY","comment_count":1,"impression_count":666,"source":"activity"},{"is_my_post":true,"post_urn":"urn:li:activity:7448184447042019328","author_name":"Ravi Evani\n              \n                \n                   \n    \n      \n    \n    \n      \n    \n\n • You","author_profile_url":"https://www.linkedin.com/in/ravievani","author_headline":"Deploying enterprise agents in production / CTO / SWE Leader / GVP @ Publicis Sapient","posted_time":"2026-04-27","posted_hours_ago":1440,"posted_time_raw":"2mo","post_url":"https://www.linkedin.com/feed/update/urn:li:activity:7448184447042019328","author_profile_image_url":"https://media.licdn.com/dms/image/v2/C4E03AQGNeJRorEd2Nw/profile-displayphoto-shrink_100_100/profile-displayphoto-shrink_100_100/0/1569287114631?e=1784160000&v=beta&t=tJDZC7EXWnlgIIf8kF7fBCajhF-HEgzNXnz_IIkjqW8","post_text":"We see a lot of posts about managing “multiple” agents. Most can’t manage 2 yet, and that’s okay. Don’t get FOMO from the hype. There are levels to this, and it will take time.","post_image_url":"https://media.licdn.com/dms/image/v2/D4E22AQEfmP4WsUP5kw/feedshare-image-high-res/B4EZ11ESZeIMAY-/0/1775785551759?e=1784160000&v=b
