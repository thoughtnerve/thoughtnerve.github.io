eta&t=A3VDcs2Lr5in_d6-ByuYsQckTATqqcinflz_vCAMpFI","is_article":false,"article_url":null,"article_title":null,"article_description":null,"is_video":false,"video_url":null,"has_image":true,"reaction_count":20,"reaction_types":"LIKE, INTEREST, EMPATHY","comment_count":4,"repost_count":1,"impression_count":1160,"source":"activity"},{"is_my_post":true,"post_urn":"urn:li:activity:7447914605101744128","author_name":"Ravi Evani\n              \n                \n                   \n    \n      \n    \n    \n      \n    \n\n • You","author_profile_url":"https://www.linkedin.com/in/ravievani","author_headline":"Deploying enterprise agents in production / CTO / SWE Leader / GVP @ Publicis Sapient","posted_time":"2026-04-27","posted_hours_ago":1440,"posted_time_raw":"2mo","post_url":"https://www.linkedin.com/feed/update/urn:li:activity:7447914605101744128","author_profile_image_url":"https://media.licdn.com/dms/image/v2/C4E03AQGNeJRorEd2Nw/profile-displayphoto-shrink_100_100/profile-displayphoto-shrink_100_100/0/1569287114631?e=1784160000&v=beta&t=tJDZC7EXWnlgIIf8kF7fBCajhF-HEgzNXnz_IIkjqW8","post_text":"Managing agents in parallel might sound heroic, but the reality is intense. Each agent forking into multiple paths means you’re juggling significant complexity, not unlike managing a team that keeps branching into more sub-tasks. If two are on track and three are off, suddenly you’re tracking even more threads. In compressed timeframes (especially when agents generate massive output) the bottleneck shifts. Unless you are able to keep realigning everything toward a coherent goal with quality, you could end up at a level of complexity that few are capable to managing.\n\nIn practice, you won’t have most people managing at this scale anytime soon. It’s more like a niche capability. You might have a few standout individuals or small teams that can orchestrate this level of agent-driven work. For the rest, reaching that level of maturity will take years. The key is not buying into the hype, but progressively aligning your teams toward a model where more autonomy is managed over time.","post_image_url":null,"is_article":false,"article_url":null,"article_title":null,"article_description":null,"is_video":false,"video_url":null,"has_image":false,"reaction_count":12,"reaction_types":"LIKE","comment_count":1,"impression_count":675,"source":"activity"},{"is_my_post":true,"post_urn":"urn:li:activity:7447108391358849024","author_name":"Ravi Evani\n              \n                \n                   \n    \n      \n    \n    \n      \n    \n\n • You","author_profile_url":"https://www.linkedin.com/in/ravievani","author_headline":"Deploying enterprise agents in production / CTO / SWE Leader / GVP @ Publicis Sapient","posted_time":"2026-04-27","posted_hours_ago":1440,"posted_time_raw":"2mo","post_url":"https://www.linkedin.com/feed/update/urn:li:activity:7447108391358849024","author_profile_image_url":"https://media.licdn.com/dms/image/v2/C4E03AQGNeJRorEd2Nw/profile-displayphoto-shrink_100_100/profile-displayphoto-shrink_100_100/0/1569287114631?e=1784160000&v=beta&t=tJDZC7EXWnlgIIf8kF7fBCajhF-HEgzNXnz_IIkjqW8","post_text":"So now that we have AI agents, our meeting scheduling problems will be solved, right? ...\n\nNot so fast.\n\nFor decades, we’ve had tools for scheduling. We’ve had calendars, we've had scheduling software that connects all our calendars together, we've had schedulers that scan across multiple people’s calendars to find open time slots. We continue to have layers and layers of automation. Heck, some of the lucky ones even have secretaries who use this automation to get meetings scheduled!\n\nAnd yet the problem of \"scheduling\" still remains. Why?\n\nBecause the real problem of scheduling was never just finding the time. Yes, AI could make that part faster. But that was always the smaller problem.\n\nThe real scheduling problem is this: will the person actually show up? or worse: will the person actually be \"present\"?\n\nThat has nothing to do with calendar automation. It has to do with human behavior. Are they going to make it? Are they going to be on time? Do they care enough about the meeting? Do they have enough reason to be there? Will they be able to give the meeting their full attention?\n\nNone of that gets solved by an \"AI scheduler\".\n\nSo even in something as simple as scheduling a meeting, AI just ends up exposing the real bottleneck. The main source of friction is never really the tool. The friction is in the human behind it.\n\nBecause, at the end of the day, if meeting really matters to a person, they will make it in body and mind. If it does not, then no amount of AI fixes that.\n\nSo is there some value using AI here? ofc. That smaller part of scheduling gets a little better. But the bigger part, the human part, is still unsolved.\n\nAnd that, can only be solved, by the human.","post_image_url":null,"is_article":false,"article_url":null,"article_title":null,"article_description":null,"is_video":false,"video_url":null,"has_image":false,"reaction_count":17,"reaction_types":"LIKE","comment_count":4,"impression_count":1033,"source":"activity"},{"is_my_post":true,"post_urn":"urn:li:activity:7446746003757494272","author_name":"Ravi Evani\n              \n                \n                   \n    \n      \n    \n    \n      \n    \n\n • You","author_profile_url":"https://www.linkedin.com/in/ravievani","author_headline":"Deploying enterprise agents in production / CTO / SWE Leader / GVP @ Publicis Sapient","posted_time":"2026-04-27","posted_hours_ago":1440,"posted_time_raw":"2mo","post_url":"https://www.linkedin.com/feed/update/urn:li:activity:7446746003757494272","author_profile_image_url":"https://media.licdn.com/dms/image/v2/C4E03AQGNeJRorEd2Nw/profile-displayphoto-shrink_100_100/profile-displayphoto-shrink_100_100/0/1569287114631?e=1784160000&v=beta&t=tJDZC7EXWnlgIIf8kF7fBCajhF-HEgzNXnz_IIkjqW8","post_text":"*indominus rex growls*\n\nMasrani:\"can she see us?\"\nClaire: \"they say it can sense thermal radiations., like snakes\"\nMasrani: \"I thought there were two of them\"\nClaire: \"there was a sibling incase this one didn't survive infancy\"\nMasrani: \"where's the sibling?\"\nClaire: \"she ate it\"","post_image_url":"https://media.licdn.com/dms/image/v2/D4E22AQE4TC0UQqle8A/feedshare-shrink_800/B4EZ1fyBTPG8Ac-/0/1775428441914?e=1784160000&v=beta&t=LWH71v6kJ22o2bSw5PIAE7-8Z5ML_wXX9XSTgUyXiKo","is_article":false,"article_url":null,"article_title":null,"article_description":null,"is_video":false,"video_url":null,"has_image":true,"reaction_count":15,"reaction_types":"LIKE, ENTERTAINMENT","impression_count":1098,"source":"activity"},{"is_my_post":true,"post_urn":"urn:li:activity:7446526282273558528","author_name":"Ravi Evani\n              \n                \n                   \n    \n      \n    \n    \n      \n    \n\n • You","author_profile_url":"https://www.linkedin.com/in/ravievani","author_headline":"Deploying enterprise agents in production / CTO / SWE Leader / GVP @ Publicis Sapient","posted_time":"2026-04-27","posted_hours_ago":1440,"posted_time_raw":"2mo","post_url":"https://www.linkedin.com/feed/update/urn:li:activity:7446526282273558528","author_profile_image_url":"https://media.licdn.com/dms/image/v2/C4E03AQGNeJRorEd2Nw/profile-displayphoto-shrink_100_100/profile-displayphoto-shrink_100_100/0/1569287114631?e=1784160000&v=beta&t=tJDZC7EXWnlgIIf8kF7fBCajhF-HEgzNXnz_IIkjqW8","post_text":"What happened with Claude code is what enterprises are terrified of. Not just that the code was exposed, but what it contained.\n\nWhen it comes to driving fast or driving safe, most will choose the latter. We will now begin to see a very defensive Anthropic, and those who are experienced masters of defensive acceleration will take the lead. And that’s a good thing for the ecosystem.","post_image_url":null,"is_article":false,"article_url":null,"article_title":null,"article_description":null,"is_video":false,"video_url":null,"has_image":false,"reaction_count":20,"reaction_types":"LIKE, INTEREST","impression_count":1365,"source":"activity"},{"is_my_post":true,"post_urn":"urn:li:activity:7446298378520563712","author_name":"Ravi Evani\n              \n                \n                   \n    \n      \n    \n    \n      \n    \n\n • You","author_profile_url":"https://www.linkedin.com/in/ravievani","author_headline":"Deploying enterprise agents in production / CTO / SWE Leader / GVP @ Publicis Sapient","posted_time":"2026-04-27","posted_hours_ago":1440,"posted_time_raw":"2mo","post_url":"https://www.linkedin.com/feed/update/urn:li:activity:7446298378520563712","author_profile_image_url":"https://media.licdn.com/dms/image/v2/C4E03AQGNeJRorEd2Nw/profile-displayphoto-shrink_100_100/profile-displayphoto-shrink_100_100/0/1569287114631?e=1784160000&v=beta&t=tJDZC7EXWnlgIIf8kF7fBCajhF-HEgzNXnz_IIkjqW8","post_text":"If you want to see a masterclass in high-pressure operational orchestration, don't look at a Wall Street trading floor. Look at a QSR's Shift Manager during a Friday rush!\n\nWhile building an agentic systems for QSR managers, I’ve gained a massive appreciation for what it takes to run a high-velocity kitchen. It's a multi-variable micro-manufacturing plant running on a ruthless 120-second clock. ⏱️\n\nHere are a few of the high-pressure realities QSR managers face every single shift:\n\n1/ The Tyranny of the Clock (OEPE & KVS): Today’s managers are fighting a war on two fronts. The physical drive-thru line is one thing, but the \"Invisible Rush\" (a sudden, unpredicted convergence of UberEats couriers, Mobile App orders, and geofenced arrivals) could flood the Kitchen Video System (KVS) in milliseconds.\nWhen the screens turn red, human instinct takes over. The manager abandons their macro-view at the Observation Post and dives onto the line to flip burgers or bag fries!\n\n2/ The Rule of Three (Danger Zones): A bottleneck can cascade into a disaster in minutes. Managers must constantly scan for immediate danger signals:\n3+ cars queued at the Drive-Thru speaker\n3+ customers waiting at the front counter\n3+ pending orders on any Kitchen Video System (KVS) Once a danger zone hits, they have to instantly flex the crew to relieve the pressure.\n\n3/ The \"Runager\" Trap: It’s tempting for a manager to jump on the grill when things get crazy. But if they do, they lose visibility of the whole floor!\n\n4/ \"Aces in Their Places\": Moving a crew member costs valuable time. They want your fastest people at the chokepoints (like the Drive-Thru Window or Expediting). But flexing an employee to help somewhere else is a high-stakes calculation: Will solving this bottleneck just create a new one?\n\nThis is a cognitive overload problem. And restaurant managers don’t need another generic dashboard telling them they are behind: they need a real-time agentic Copilot!","post_image_url":"https://media.licdn.com/dms/image/v2/D4E05AQGMIrR1sAyVBQ/videocover-low/B4EZ1aQ5X7GcBY-/0/1775335873446?e=1783137600&v=beta&t=7-idNXHMlvl5BXARi8K8RwLvO7EnGW7IWxcEOy8aXmQ","is_article":false,"article_url":null,"article_title":null,"article_description":null,"is_video":true,"video_url":"https://media.licdn.com/dms/image/v2/D4E05AQGMIrR1sAyVBQ/videocover-low/B4EZ1aQ5X7GcBY-/0/1775335873446?e=1783137600&v=beta&t=7-idNXHMlvl5BXARi8K8RwLvO7EnGW7IWxcEOy8aXmQ","has_image":true,"reaction_count":27,"reaction_types":"LIKE","impression_count":1118,"source":"activity"},{"is_my_post":true,"post_urn":"urn:li:activity:7445481350360592384","author_name":"Ravi Evani\n              \n                \n                   \n    \n      \n    \n    \n      \n    \n\n • You","author_profile_url":"https://www.linkedin.com/in/ravievani","author_headline":"Deploying enterprise agents in production / CTO / SWE Leader / GVP @ Publicis Sapient","posted_time":"2026-04-27","posted_hours_ago":1440,"posted_time_raw":"2mo","post_url":"https://www.linkedin.com/feed/update/urn:li:activity:7445481350360592384","author_profile_image_url":"https://media.licdn.com/dms/image/v2/C4E03AQGNeJRorEd2Nw/profile-displayphoto-shrink_100_100/profile-displayphoto-shrink_100_100/0/1569287114631?e=1784160000&v=beta&t=tJDZC7EXWnlgIIf8kF7fBCajhF-HEgzNXnz_IIkjqW8","post_text":"Building a winning product is going to get much harder.\n\nAs the barrier to building drops, consumer expectations will skyrocket.\n\nA pixel-perfect UI that works flawlessly today is no longer a competitive advantage. It's just the baseline.\n\nIf your app looks beautiful but takes 15 steps to complete a workflow, your users aren't going to praise your design. They’re going to ask: \"Why didn't this take 2 steps?\"\n\nThe best app for an enterprise workflow might actually be no app -- where the task gets done automatically, behind the scenes, with zero friction.\n\nThe bar is shifting. If you aren't figuring out how to get your user's 15-step process down to zero, your \"quickly built\" product won't be able to retain them or continue to drive value for your business.","post_image_url":"https://media.licdn.com/dms/image/v2/D4E05AQHGyr97yMft7Q/videocover-high/B4EZ1OpwObIEBY-/0/1775141067756?e=1783137600&v=beta&t=vei9a9V2bpB0j7VKejVP1N-kGwthfYJtifiNFex6EM0","is_article":false,"article_url":null,"article_title":null,"article_description":null,"is_video":true,"video_url":"https://media.licdn.com/dms/image/v2/D4E05AQHGyr97yMft7Q/videocover-high/B4EZ1OpwObIEBY-/0/1775141067756?e=1783137600&v=beta&t=vei9a9V2bpB0j7VKejVP1N-kGwthfYJtifiNFex6EM0","has_image":true,"reaction_count":21,"reaction_types":"LIKE","impression_count":1648,"source":"activity"},{"is_my_post":true,"post_urn":"urn:li:activity:7445099143565369345","author_name":"Ravi Evani\n              \n                \n                   \n    \n      \n    \n    \n      \n    \n\n • You","author_profile_url":"https://www.linkedin.com/in/ravievani","author_headline":"Deploying enterprise agents in production / CTO / SWE Leader / GVP @ Publicis Sapient","posted_time":"2026-04-27","posted_hours_ago":1440,"posted_time_raw":"2mo","post_url":"https://www.linkedin.com/feed/update/urn:li:activity:7445099143565369345","author_profile_image_url":"https://media.licdn.com/dms/image/v2/C4E03AQGNeJRorEd2Nw/profile-displayphoto-shrink_100_100/profile-displayphoto-shrink_100_100/0/1569287114631?e=1784160000&v=beta&t=tJDZC7EXWnlgIIf8kF7fBCajhF-HEgzNXnz_IIkjqW8","post_text":"Some might call the Lufthansa 747-400 cabin “old”. I’d call it a reminder of when flying still felt a little more special. Nothing beats the 4-window view from the quiet upper deck. Hope they don’t “modernize” the cabin into cubicles.","post_image_url":"https://media.licdn.com/dms/image/v2/D4E22AQHaaRhuRIAp3A/feedshare-shrink_800/B4EZ1JONCPIUAc-/0/1775049956269?e=1784160000&v=beta&t=MEMJo_lKyPScElfBS99Mujl9n8aKBJbth9__4FCj39U","is_article":false,"article_url":null,"article_title":null,"article_description":null,"is_video":false,"video_url":null,"has_image":true,"reaction_count":29,"reaction_types":"LIKE, EMPATHY","comment_count":2,"impression_count":3886,"source":"activity"},{"is_my_post":true,"post_urn":"urn:li:activity:7445015384459563008","author_name":"Ravi Evani\n              \n                \n                   \n    \n      \n    \n    \n      \n    \n\n • You","author_profile_url":"https://www.linkedin.com/in/ravievani","author_headline":"Deploying enterprise agents in production / CTO / SWE Leader / GVP @ Publicis Sapient","posted_time":"2026-04-27","posted_hours_ago":1440,"posted_time_raw":"2mo","post_url":"https://www.linkedin.com/feed/update/urn:li:activity:7445015384459563008","author_profile_image_url":"https://media.licdn.com/dms/image/v2/C4E03AQGNeJRorEd2Nw/profile-displayphoto-shrink_100_100/profile-displayphoto-shrink_100_100/0/1569287114631?e=1784160000&v=beta&t=tJDZC7EXWnlgIIf8kF7fBCajhF-HEgzNXnz_IIkjqW8","post_text":"Excel is the ultimate \"low floor, infinite ceiling\" tool. Anyone can type numbers into a grid and use =SUM(), which tricks people into thinking they \"know Excel.\" But there is a universe of difference between a beginner making a budget and a master building a dynamic, automated enterprise financial model using Power Query, relational data models, and VBA. An expert knows Excel can do almost anything if you structure the data and logic correctly.\n\nAgentic coding has entered this same territory. The tools are now more than capable. The only gap is your skill. And that now spans way beyond prompting.\n\n- context\n- tools\n- rules\n- skills\n- workflows\n- sub agents\n\nClosing this skill gap can make you 10x more productive vs simply writing prompts.\n\nBut you already knew that. So what’s stopping you?","post_image_url":null,"is_article":false,"article_url":null,"article_title":null,"article_description":null,"is_video":false,"video_url":null,"has_image":false,"reaction_count":7,"reaction_types":"LIKE","repost_count":1,"impression_count":826,"source":"activity"},{"is_my_post":true,"post_urn":"urn:li:activity:7444384924708585472","author_name":"Ravi Evani\n              \n                \n                   \n    \n      \n    \n    \n      \n    \n\n • You","author_profile_url":"https://www.linkedin.com/in/ravievani","author_headline":"Deploying enterprise agents in production / CTO / SWE Leader / GVP @ Publicis Sapient","posted_time":"2026-04-27","posted_hours_ago":1440,"posted_time_raw":"2mo","post_url":"https://www.linkedin.com/feed/update/urn:li:activity:7444384924708585472","author_profile_image_url":"https://media.licdn.com/dms/image/v2/C4E03AQGNeJRorEd2Nw/profile-displayphoto-shrink_100_100/profile-displayphoto-shrink_100_100/0/1569287114631?e=1784160000&v=beta&t=tJDZC7EXWnlgIIf8kF7fBCajhF-HEgzNXnz_IIkjqW8","post_text":"I sat through a well-designed \"estimation review\" presentation recently, where the team sized up the resources, cost and timeline for a project.\n\nIt had clean slides and a thoughtful structure. A lot of effort clearly went into the preparation.\n\nBut the problem was none of it was usable beyond that moment.\n\nThe estimate was presented, discussed, and even agreed upon. But it wasn’t reproducible. It wasn’t codified. And it definitely wasn’t something an agent could pick up and run with.\n\nThat’s the gap most enterprises are still stuck in.\n\nWe continue to optimize for human consumption: PowerPoint decks, visuals, narratives. But we’re not structuring the underlying data / decisioning in a way that supports repeatability, automation, or agent-driven workflows.\n\nAn estimate shouldn’t just be numbers on a slide. It should be the output of clearly defined dimensions, assumptions, and facts that can be captured, reused, and reasoned over. That’s what allows you to scale it. That’s what allows an agent to generate it again, consistently, without starting from scratch.\n\nRight now, we’re putting energy into presentation instead of production.\n\nThe shift is simple, but not easy: It is to separate the two concerns.\n\nOne path for humans: to influence, align, and communicate.\nAnother path for machines: structured, explicit, and reusable.\n\nAnd the two need to stay in sync.\n\nUntil that happens, we’ll keep producing great-looking outputs that don’t actually move the system forward.\n\nThe question is not whether an estimate looks good. It’s whether it can be leveraged again to solve the next problem.","post_image_url":null,"is_article":false,"article_url":null,"article_title":null,"article_description":null,"is_video":false,"video_url":null,"has_image":false,"reaction_count":11,"reaction_types":"LIKE","impression_count":920,"source":"activity"},{"is_my_post":true,"post_urn":"urn:li:activity:7444021540758716416","author_name":"Ravi Evani\n              \n                \n                   \n    \n      \n    \n    \n      \n    \n\n • You","author_profile_url":"https://www.linkedin.com/in/ravievani","author_headline":"Deploying enterprise agents in production / CTO / SWE Leader / GVP @ Publicis Sapient","posted_time":"2026-04-27","posted_hours_ago":1440,"posted_time_raw":"2mo","post_url":"https://www.linkedin.com/feed/update/urn:li:activity:7444021540758716416","author_profile_image_url":"https://media.licdn.com/dms/image/v2/C4E03AQGNeJRorEd2Nw/profile-displayphoto-shrink_100_100/profile-displayphoto-shrink_100_100/0/1569287114631?e=1784160000&v=beta&t=tJDZC7EXWnlgIIf8kF7fBCajhF-HEgzNXnz_IIkjqW8","post_text":"Why \"Vibe Coding\" is the catalyst for a software engineering renaissance\n\nRight now, there is a consensus that vibe coding is inherently bad. The criticism is that it replaces software craftsmanship with \"AI slop\": bloated, buggy, and unmaintainable code generated by users who are merely \"vibing\" rather than engineering.\n\nBut blaming vibe coding for bad software misses the mark entirely. Vibe coding simply exposes and amplifies the truth about how good or bad a person, team, or enterprise actually is at building systems.\n\n1. A reflection of internal reality: Your architecture & context are your \"DNA\"\nIf vibe coding is filling your repositories with brittle slop, it is because the underlying engineering DNA was already sloppy. Agents work within the boundaries and the context window you give them. So if the output is tangled, fragile, and monolithic, it is often reflecting a codebase where those patterns were already accepted. Garbage in, garbage out. In a clean, modular environment, the AI is far more likely to generate better code. The slop is a mirror of the habits, standards, and architectural discipline already present in the person and organization using it.\n\n2. Accountability over blame: The guardrail crisis\nIt has become fashionable for engineering leaders to blame hallucinating AI when bad code causes issues. That is a cop-out. AI can write bad code, just like humans can. If that slop reaches production, the real failure is not the AI. It is the lack of engineering guardrails: weak tests, weak CI/CD, and weak review discipline.\n\n3. Public record of character: Velocity exposes fragility\nBefore AI, bad system design could stay hidden behind the slow pace of manual development. Because humans wrote code slowly, structural rot built up slowly too, buried inside individual IDEs and stretched across long sprint cycles. Vibe coding removes that buffer. When developers can generate thousands of lines in an afternoon, it becomes a stress test that exposes the bottlenecks, weak automation, tight coupling, and other architectural sins that were always there.\n\nThe Path to Acceptance: An Engineering Renaissance\nThe \"AI slop\" era is terrifying for technical leaders, but it is ultimately a required step forward for the industry. Vibe coding should force enterprises to confront the uncomfortable truth about their fragile systems. By amplifying these flaws, AI will eventually push the industry toward a renaissance in systems architecture and platform engineering. Organizations will realize that in the age of AI, writing syntax is cheap, but rigorous system design, automated testing, and clear domain boundaries are priceless. To survive, they will be forced to build foundational platforms where the \"right way\" to write code is the only way the AI can write it.\n\nVibe coding lays bare the underlying competence of the organization. It’s time to stop blaming the magnifying glass and start fixing the system it's reflecting.","post_image_url":null,"is_article":false,"article_url":null,"article_title":null,"article_description":null,"is_video":false,"video_url":null,"has_image":false,"reaction_count":13,"reaction_types":"LIKE","impression_count":685,"source":"activity"},{"is_my_post":true,"post_urn":"urn:li:activity:7443853366549430272","author_name":"Ravi Evani\n              \n                \n                   \n    \n      \n    \n    \n      \n    \n\n • You","author_profile_url":"https://www.linkedin.com/in/ravievani","author_headline":"Deploying enterprise agents in production / CTO / SWE Leader / GVP @ Publicis Sapient","posted_time":"2026-04-27","posted_hours_ago":1440,"posted_time_raw":"2mo","post_url":"https://www.linkedin.com/feed/update/urn:li:activity:7443853366549430272","author_profile_image_url":"https://media.licdn.com/dms/image/v2/C4E03AQGNeJRorEd2Nw/profile-displayphoto-shrink_100_100/profile-displayphoto-shrink_100_100/0/1569287114631?e=1784160000&v=beta&t=tJDZC7EXWnlgIIf8kF7fBCajhF-HEgzNXnz_IIkjqW8","post_text":"Have you ever built an AI assistant...say, a helpful concierge for a restaurant app...only to have it suddenly turn around and ask *you* for a recommendation?\n\nIf so, you’ve experienced *Persona Drifting*, just like I did this weekend.\n\nWhat is it?\n\nPersona Drifting occurs when an AI model loses track of its assigned identity during a conversation and adopts a different role, often mirroring the user or adopting a generic, unhelpful conversational stance.\n\nInstead of remaining the authoritative \"Assistant,\" the AI drifts into becoming a \"Customer,\" a \"Co-worker,\" or simply a confused participant asking the user open-ended questions when it was supposed to be the one giving recommendations.\n\nWhy Does It Happen?\n\nAI models, especially highly capable conversational models, are trained on vast amounts of human-to-human dialogue. In typical human conversation, roles are fluid. If I give you a list of options, it’s natural for me to ask, \"Which of these do you prefer?\"\n\nWhen we use APIs to create multi-turn interactions (like the Gemini Interactions API or Live API), we are often stitching together separate requests. Persona drifting typically happens due to:\n\n1. Inconsistent System Instructions Across Turns:\nIn Turn 1, you might tell the AI: \"You are a specialized Restaurant AI Assistant.\"\nIn Turn 2 (e.g., summarizing tool results), you might simplify the instruction to: \"Summarize these results.\"\n\nBecause the strong persona anchor from Turn 1 is missing in Turn 2, the model relies on the immediate context. It sees a list of food items and defaults to its conversational training, asking, \"What would you like to do with these?\", and leaving you puzzled.\n\n2. Lack of Negative Constraints:\nModels are eager to keep the conversation going. Unless explicitly told *not* to ask follow-up questions, they often will. They view ending a turn with a question as engaging and helpful.\n\n3. Context Window Imbalance:\nAs the conversation grows, the initial system prompt gets further away in the context window, while the immediate back-and-forth dominates the model's attention. The model starts mimicking the user's conversational style.\n\nHow to Fix It?\n\nThe solution requires disciplined prompt engineering and state management, particularly when chaining API calls:\n\n1/ The \"Anchor\" Strategy: Never dilute the system instruction. Every single turn or API call in a flow must reiterate the core persona.\n\n2/ Explicit Negative Constraints: Borrow a technique from Google's own reference projects. Explicitly tell the model: \"Do not ask for additional info or follow-up questions; make your best judgment based on the available data.\"\n\n3/ Role Enforcement: Clearly define the boundary. \"You are the Assistant. The human is the Customer. You provide answers; you do not ask for suggestions.\"\n\nBy managing system instructions consistently across every turn, we can keep our AI concierges behind the counter where they belong: serving answers, not asking us for fries.","post_image_url":"https://media.licdn.com/dms/image/v2/D4E22AQG2raIXwbKOMQ/feedshare-shrink_1280/B4EZ03hMPyIUAM-/0/1774752941322?e=1784160000&v=beta&t=5nFq8xT7_Bkq-etkzpSw4SuMglXyCoSsdzp1k-LS4NY","is_article":false,"article_url":null,"article_title":null,"article_description":null,"is_video":false,"video_url":null,"has_image":true,"reaction_count":11,"reaction_types":"LIKE","impression_count":421,"source":"activity"},{"is_my_post":true,"post_urn":"urn:li:activity:7443631742399299584","author_name":"Ravi Evani\n              \n                \n                   \n    \n      \n    \n    \n      \n    \n\n • You","author_profile_url":"https://www.linkedin.com/in/ravievani","author_headline":"Deploying enterprise agents in production / CTO / SWE Leader / GVP @ Publicis Sapient","posted_time":"2026-04-27","posted_hours_ago":1440,"posted_time_raw":"2mo","post_url":"https://www.linkedin.com/feed/update/urn:li:activity:7443631742399299584","author_profile_image_url":"https://media.licdn.com/dms/image/v2/C4E03AQGNeJRorEd2Nw/profile-displayphoto-shrink_100_100/profile-displayphoto-shrink_100_100/0/1569287114631?e=1784160000&v=beta&t=tJDZC7EXWnlgIIf8kF7fBCajhF-HEgzNXnz_IIkjqW8","post_text":"Enterprise Math\n2016: Once we get on Cloud, we’ll get speed to market.\n2026: Once we get on AI, we’ll get speed to market.\n\nUnfortunately in both cases, the bottleneck just moves somewhere else.","post_image_url":null,"is_article":false,"article_url":null,"article_title":null,"article_description":null,"is_video":false,"video_url":null,"has_image":false,"reaction_count":18,"reaction_types":"LIKE","comment_count":2,"impression_count":1009,"source":"activity"},{"is_my_post":true,"post_urn":"urn:li:activity:7443283818029039616","author_name":"Ravi Evani\n              \n                \n                   \n    \n      \n    \n    \n      \n    \n\n • You","author_profile_url":"https://www.linkedin.com/in/ravievani","author_headline":"Deploying enterprise agents in production / CTO / SWE Leader / GVP @ Publicis Sapient","posted_time":"2026-04-27","posted_hours_ago":1440,"posted_time_raw":"2mo","post_url":"https://www.linkedin.com/feed/update/urn:li:activity:7443283818029039616","author_profile_image_url":"https://media.licdn.com/dms/image/v2/C4E03AQGNeJRorEd2Nw/profile-displayphoto-shrink_100_100/profile-displayphoto-shrink_100_100/0/1569287114631?e=1784160000&v=beta&t=tJDZC7EXWnlgIIf8kF7fBCajhF-HEgzNXnz_IIkjqW8","post_text":"I’m already feeling the impact of Jevon’s paradox. As AI lowers the time, cost, and friction of writing code, I’m demanding more from myself. More small tools. More automation. More things built faster to make my life easier.\n\nIt looks like Jevon’s paradox going to reshape how most developers work in three ways:\n\n1. From writing code to orchestrating work\nWe’ve been trained to work linearly: pick a ticket, solve it, move on.\nNow you’re managing (or will be expected to manage) multiple threads at once: different agents generating, testing, iterating in parallel. The job shifts from “build this” to “run a system that builds many things at once.” If you stay sequential, you’ll just bottleneck yourself.\n\n2. Deciding what actually needs a human\nYou won’t be able to review everything. There will be too much output. So the skill becomes judgment: where do I step in, and where do I trust the system?\nArchitecture decisions, risk-heavy changes, anything with downstream impac might be where you need to focus. Everything else, you let run. Most devs aren’t used to thinking this way yet.\n\n3. Taste becomes your differentiator\nIf code is cheap, experience is not. Anything customer-facing: UI, flows, interactions, can’t just be “correct.” It has to feel right. That requires taste.\nSo now you’re not just an engineer, you’re a filter. You’re deciding what ships based on how it lands with real users, not just whether it works.","post_image_url":"https://media.licdn.com/dms/image/v2/D4E22AQEc2bJvB2HKaA/feedshare-shrink_800/B4EZ0vbMKZJcAc-/0/1774617150505?e=1784160000&v=beta&t=rgHWRvTAN-20Z-qxI3ynY7kJ9u-cxc5hUGFOLLl2ar8","is_article":false,"article_url":null,"article_title":null,"article_description":null,"is_video":false,"video_url":null,"has_image":true,"reaction_count":10,"reaction_types":"LIKE, EMPATHY","comment_count":2,"repost_count":2,"impression_count":837,"source":"activity"},{"is_my_post":true,"post_urn":"urn:li:activity:7413127372608151552","author_name":"Ravi Evani\n              \n                \n                   \n    \n      \n    \n    \n      \n    \n\n • You","author_profile_url":"https://www.linkedin.com/in/ravievani","author_headline":"Deploying enterprise agents in production / CTO / SWE Leader / GVP @ Publicis Sapient","posted_time":"2026-01-27","posted_hours_ago":3600,"posted_time_raw":"5mo","post_url":"https://www.linkedin.com/feed/update/urn:li:activity:7413127372608151552","author_profile_image_url":"https://media.licdn.com/dms/image/v2/C4E03AQGNeJRorEd2Nw/profile-displayphoto-shrink_100_100/profile-displayphoto-shrink_100_100/0/1569287114631?e=1784160000&v=beta&t=tJDZC7EXWnlgIIf8kF7fBCajhF-HEgzNXnz_IIkjqW8","post_text":"The journey from a single LLM to a production-ready Agentic Mesh is the fastest path to realizing you’ve traded a machine learning problem for a massive, distributed software engineering one.\n\nThe moment you move past the \"Pilot\" stage and start building a Multi-Agent Squad, the architecture stops being about model capability and starts being about infrastructure. Suddenly, you're not just prompting; you are managing an ecosystem that requires a full Agentic Systems Layer >> the runtime for digital workers.\n\nAgentic AI is a whole different beast from generative AI. It autonomously pursues outcomes. But taking that from a small pilot to a massive enterprise scale, is a huge challenge. And it really comes down to a three-stage architectural progression.\n\nFirst up, you've got to move past those simple single agent setups. That “Reason and Act” pattern is just too error prone.\n\nInstead, you build specialized multi-agent squads. It's kind of like swapping out old monolithic code for microservices. So, in the case of a software development agentic workflow -- you might have a software squad where one agent is the product owner, another writes the code and a third one acts as QA. This creates a kind of digital peer review and it boosts accuracy. A similar pattern applies to any business workflow.\n\nSecond, we have to rethink the human role using something called the autonomy slider. We're moving from a human approving every single action to more higher level supervision. And the key metric here, it's the override rate. Basically, how often a human supervisor rejects an agent's recommendation. You need to get that rate way down, usually below 10% before you can safely let the agents run.\n\nFinally, how do you make all this affordable at scale? That's where the agentic mesh could help. Think of it like an internet of agents. The solution is a model garden strategy. A smart router looks at a task and if it's simple, it sends it to a fast, cheap, small model. The really powerful, expensive models, they're saved only for the complex strategic jobs.\n\nIn the end, success in this new agentic era isn't just about having the best model. It's about architecting for a large, safe, and cost-effective autonomous scale.","post_image_url":"https://media.licdn.com/dms/image/v2/D4E22AQGFzmZtf2pBKw/feedshare-shrink_800/B4EZuC4Cb8GkAg-/0/1767427293422?e=1784160000&v=beta&t=oTRfOVeTjA9sYa-TmZooCCsYA632Fp48RdCSfAMVqTE","is_article":false,"article_url":null,"article_title":null,"article_description":null,"is_video":false,"video_url":null,"has_image":true,"reaction_count":46,"reaction_types":"LIKE, INTEREST, EMPATHY","comment_count":2,"repost_count":2,"impression_count":2970,"source":"activity"},{"is_my_post":true,"post_urn":"urn:li:activity:7412860715830554624","author_name":"Ravi Evani\n              \n                \n                   \n    \n      \n    \n    \n      \n    \n\n • You","author_profile_url":"https://www.linkedin.com/in/ravievani","author_headline":"Deploying enterprise agents in production / CTO / SWE Leader / GVP @ Publicis Sapient","posted_time":"2026-01-27","posted_hours_ago":3600,"posted_time_raw":"5mo","post_url":"https://www.linkedin.com/feed/update/urn:li:activity:7412860715830554624","author_profile_image_url":"https://media.licdn.com/dms/image/v2/C4E03AQGNeJRorEd2Nw/profile-displayphoto-shrink_100_100/profile-displayphoto-shrink_100_100/0/1569287114631?e=1784160000&v=beta&t=tJDZC7EXWnlgIIf8kF7fBCajhF-HEgzNXnz_IIkjqW8","post_text":"The most meaningful gains with AI often come after you push past the first acceptable answer.\n\nAn engineer had a dashboard that loaded user posts, which was painfully slow.\n\nThis wasn't some high-tech system. It was built on a Google Sheets backbone.\n\nSo the first prompt to optimize was super simple: “What are some patterns we can explore to load the posts quickly?”.\n\nThat kicked off the first phase of divergent exploration. The AI just threw out a bunch of ideas. In this case, four different architectural patterns, each with its own trade-offs.\n\nYou had stuff like showing the user old data instantly while you fetch the new stuff in the background. It also suggested virtualization which is complex. And then simpler things like pagination and optimized fetching.\n\nAI recommended the caching solution because it was the highest impact for the lowest amount of code. An easy win.\n\nAnd that seems like the end of the story. You solve 80% of the problem. You move on.\n\nBut that's not what happened. The engineer didn't just accept it.\n\nThe engineer saw the big flaw: the cold start problem. That first time load before anything is cached, it would still be horribly slow.\n\nSo they went into the challenge phase. And pushed back: \"Okay, this is great, but that initial cold start still kills the user experience. How do we fix that?\"\n\nAnd that one question was the pivot point.\n\nThe moment the human smartly challenges the AI, you move out of just getting answers and into true synthesis.\n\nSo the AI didn't just give a fifth option. It created a sophisticated design by combining the best ideas into something it called the “speed pack”, with three main parts.\n\nFirst, it kept the original suggestion of the local cache. Because for any returning user, it gives that instant load.\n\nBut what about the cold start problem?\n\nAnd that's component two: “parallel fetching”. It's a way to cut that initial network time in about half by grabbing all the data components at the same time instead of one after the other.\n\nBut here's a third part which I think is maybe the most clever: The skeleton UI.\n\nAnd this wasn't about making it faster -- but a psychological optimization.\n\nSo you click the button and instantly these gray boxes (skeletons) pop up. So it feels responsive. It gives visual feedback that something is happening, which makes that multi-second weight feel like almost nothing.\n\nAnd that hybrid approach solved for returning users, for the cold start, and for perception. That's something neither the human nor the AI came up with on their own at the start. It was born from the challenge.\n\nSo really what this all comes down to is true optimization, the real breakthroughs happen when you stop just accepting the first right answer.\n\nYou're not just getting information. You have to challenge the constraints. You're pushing the model to integrate ideas in a much more sophisticated way.\n\nWhere else could this synergy loop strategy unlock something new in your own work?","post_image_url":"https://media.licdn.com/dms/image/v2/D4E22AQEEi-bTQehDtw/feedshare-shrink_800/B4EZt_Fhl_IUAk-/0/1767363717279?e=1784160000&v=beta&t=_88irqEWmQqV5qxrzNbmr4bHf_NSMu7Rs0zNK7Xfc_8","is_article":false,"article_url":null,"article_title":null,"article_description":null,"is_video":false,"video_url":null,"has_image":true,"reaction_count":26,"reaction_types":"LIKE","impression_count":1004,"source":"activity"},{"is_my_post":true,"post_urn":"urn:li:activity:7412532682959556608","author_name":"Ravi Evani\n              \n                \n                   \n    \n      \n    \n    \n      \n    \n\n • You","author_profile_url":"https://www.linkedin.com/in/ravievani","author_headline":"Deploying enterprise agents in production / CTO / SWE Leader / GVP @ Publicis Sapient","posted_time":"2026-01-27","posted_hours_ago":3600,"posted_time_raw":"5mo","post_url":"https://www.linkedin.com/feed/update/urn:li:activity:7412532682959556608","author_profile_image_url":"https://media.licdn.com/dms/image/v2/C4E03AQGNeJRorEd2Nw/profile-displayphoto-shrink_100_100/profile-displayphoto-shrink_100_100/0/1569287114631?e=1784160000&v=beta&t=tJDZC7EXWnlgIIf8kF7fBCajhF-HEgzNXnz_IIkjqW8","post_text":"Ever wonder why hotels overbook? Overbooking isn’t a hotel trying to be clever. It’s a high-stakes game of predicting who’s actually gonna show up.\n\nThe goal is simple: minimize losses from empty rooms. But if you’re thinking about revenue management, the real unlock is this: don’t treat cancellations as a single number. Treat it as uncertainty you can work with, and have a \"Cancelation Risk Agent\" that keeps that \"probability picture\" fresh as bookings come in.\n\nThe Science: Bayesian Analysis\nThe paper “Bayesian Analysis of Hotel Booking Cancellations” (link in comments) uses some pretty cool statistical methods to get a handle on this chaos.\n\nBayesian Analysis is about incorporating prior knowledge and dealing with uncertainty. It’s not just crunching numbers; it helps hotel managers bring in real-world understanding of how the hotel industry works. Most importantly, it gives probabilities, not just point estimates. That’s key for making decisions when there’s risk involved.\n\nIn this example, Bayesian analysis determines three major factors that influence cancelation risk:\n\n1/ Lead Time: The longer people book in advance, the more likely they are to cancel. It's a huge risk factor.\n\n2/ Special Requests: These are commitment signals. If a guest asks for something specific, they're visualizing their stay.\n\n3/ Parking: This is a strong commitment signal. It implies they have confirmed travel plans (like a rental car or road trip).\n\nThe results also showed that City hotels have way higher cancellation rates than Resort hotels, meaning a \"one-size-fits-all\" policy just doesn't work.\n\nSo, how does a cancelation risk agent help hotel managers?\nIt takes those simple variables: historical cancellations, lead time, special requests, parking—and turns them into a continuously updated view of “who’s likely to ditch their reservation?”.\n\nIt recommends different overbooking strategies for city vs. resort hotels.\nIt pushes practical actions: encourage special requests and parking reservations, because those are strong signals of commitment.\n\nThe agent gives hotel managers a nuanced understanding of human behavior, and the hotel manager uses that nuance to make smarter, more profitable decisions in the face of uncertainty.","post_image_url":"https://media.licdn.com/dms/image/v2/D4E05AQE65R09S_1LPA/videocover-high/B4EZt6bKyRKMBY-/0/1767285503741?e=1783137600&v=beta&t=dR7bMBvGgcWbTBy1QivJzVWic5Y4ZuGx08MC7OOFmJA","is_article":false,"article_url":null,"article_title":null,"article_description":null,"is_video":true,"video_url":"https://media.licdn.com/dms/image/v2/D4E05AQE65R09S_1LPA/videocover-high/B4EZt6bKyRKMBY-/0/1767285503741?e=1783137600&v=beta&t=dR7bMBvGgcWbTBy1QivJzVWic5Y4ZuGx08MC7OOFmJA","has_image":true,"reaction_count":24,"reaction_types":"LIKE, INTEREST","comment_count":5,"impression_count":1363,"source":"activity"},{"is_my_post":true,"post_urn":"urn:li:activity:7411571356254769152","author_name":"Ravi Evani\n              \n                \n                   \n    \n      \n    \n    \n      \n    \n\n • You","author_profile_url":"https://www.linkedin.com/in/ravievani","author_headline":"Deploying enterprise agents in production / CTO / SWE Leader / GVP @ Publicis Sapient","posted_time":"2026-01-27","posted_hours_ago":3600,"posted_time_raw":"5mo","post_url":"https://www.linkedin.com/feed/update/urn:li:activity:7411571356254769152","author_profile_image_url":"https://media.licdn.com/dms/image/v2/C4E03AQGNeJRorEd2Nw/profile-displayphoto-shrink_100_100/profile-displayphoto-shrink_100_100/0/1569287114631?e=1784160000&v=beta&t=tJDZC7EXWnlgIIf8kF7fBCajhF-HEgzNXnz_IIkjqW8","post_text":"Thank you to the top 30 people who consistently supported my posts in 2025.\n\nHonestly, it says more about you than about what I posted. You’re wired to naturally support, encourage, and boost others. Thats rare.\n\nPutting ideas out there comes with a real fear of judgement. Your encouragement made it feel safer for me to to keep writing, keep thinking out loud, and keep learning in public. I appreciate you more than you know.\n\nRaymond Velez, Rohan Maheshwari, Richard Doherty, Rohit Singh, Sankara Naveen Porumamilla, Jacob Johan C., Lakshumanan Sundaram, Manjunath Prabakaran, Rakesh Kumar, Bridget MacMillan, Gautam Sarma, Amit Sharma, Rakesh Ravuri, NAMIT NAYAK, Mohammed Azeer, Sambit Patjoshi, Aravindhan Asokan, CESAR PAEZ RODRIGUEZ HE / HIM, Shiladitya (Adi) Ghosh, Anish Ramachandran, Laura Correal Orjuela, Prit Ranjan, Sumitesh Naithani, James Kessler, Indra Prabha Sharma, Karen (Aschenbrener) Miklic, MBA, Aishwarya Singhal, Anurag Tyagi, Abhijeet Dey, SreeSekhar Palaparthy","post_image_url":null,"is_article":false,"article_url":null,"article_title":null,"article_description":null,"is_video":false,"video_url":null,"has_image":false,"reaction_count":103,"reaction_types":"LIKE, EMPATHY, PRAISE","comment_count":7,"impression_count":6381,"source":"activity"},{"is_my_post":true,"post_urn":"urn:li:activity:7411462710573338624","author_name":"Ravi Evani\n              \n                \n                   \n    \n      \n    \n    \n      \n    \n\n • You","author_profile_url":"https://www.linkedin.com/in/ravievani","author_headline":"Deploying enterprise agents in production / CTO / SWE Leader / GVP @ Publicis Sapient","posted_time":"2026-01-27","posted_hours_ago":3600,"posted_time_raw":"5mo","post_url":"https://www.linkedin.com/feed/update/urn:li:activity:7411462710573338624","author_profile_image_url":"https://media.licdn.com/dms/image/v2/C4E03AQGNeJRorEd2Nw/profile-displayphoto-shrink_100_100/profile-displayphoto-shrink_100_100/0/1569287114631?e=1784160000&v=beta&t=tJDZC7EXWnlgIIf8kF7fBCajhF-HEgzNXnz_IIkjqW8","post_text":"Thanks Aishwarya! There were a lot of learnings in this implementation journey. We got to \"MLP\" in a few weeks, but the hard part was making the results consistently relevant and useful to end users.\n\nThe real difference between this and traditional applications is that you can ship something small in a deterministic system and scale it, because functionality behaves predictably as you roll it out. But with AI-driven systems like this one, scaling is not linear. Adding more data doesn’t automatically make the capability scale the way it would in deterministic software. Data is a huge variable here: its quality, breadth, depth, and coverage matter, and the long tail never really goes away. This isn’t like making a die once and churning out identical shapes; the system keeps encountering new intent patterns and edge cases as usage expands.\n\nThat’s why we went context first. If we couldn’t get reliable answers through context engineering and prompt iteration, building UI polish would have been wasted effort. Engineers and product managers worked together directly on the AI behavior, iterating quickly, reading real outputs, and tightening the “common thread” that made the experience coherent.\n\nAnd we learned it couldn’t feel like a chatbot bolted onto search. Guests don’t want to “chat” to find a place to stay. The AI had to be embedded into a familiar, highly visual experience, integrated with filters and existing interaction patterns. Behind the scenes, the unlock was getting serious about data pipelines and validation, then backing it up with real testing: brand compliance checks, evals/regression tests and red teaming that combined humans with LLM-based judging, so we could iterate without losing control.","post_image_url":"https://media.licdn.com/dms/image/v2/D4E22AQFc5ceKBDskiQ/feedshare-shrink_800/B4EZtq0yBRGkAg-/0/1767023781390?e=1784160000&v=beta&t=zFIaEn1_apKYnXeCW53DRr--rpfyVk8ofjPX2GUsMTo","is_article":true,"article_url":"https://lnkd.in/evGBTTTN","article_title":"https://lnkd.in/evGBTTTN","article_description":"","is_video":false,"video_url":null,"has_image":true,"reaction_count":26,"reaction_types":"LIKE, INTEREST","repost_count":2,"impression_count":3152,"source":"activity"},{"is_my_post":true,"post_urn":"urn:li:activity:7410841696881655808","author_name":"Ravi Evani\n              \n                \n                   \n    \n      \n    \n    \n      \n    \n\n • You","author_profile_url":"https://www.linkedin.com/in/ravievani","author_headline":"Deploying enterprise agents in production / CTO / SWE Leader / GVP @ Publicis Sapient","posted_time":"2026-01-27","posted_hours_ago":3600,"posted_time_raw":"5mo","post_url":"https://www.linkedin.com/feed/update/urn:li:activity:7410841696881655808","author_profile_image_url":"https://media.licdn.com/dms/image/v2/C4E03AQGNeJRorEd2Nw/profile-displayphoto-shrink_100_100/profile-displayphoto-shrink_100_100/0/1569287114631?e=1784160000&v=beta&t=tJDZC7EXWnlgIIf8kF7fBCajhF-HEgzNXnz_IIkjqW8","post_text":"Saturday Project: Now I can easily organize Linkedin Saved Posts into Folders!","post_image_url":"https://media.licdn.com/dms/image/v2/D4E05AQF2DONHDo63wg/videocover-high/B4EZtiZPwQJwBU-/0/1766882345829?e=1783137600&v=beta&t=Si7NLRWGqcOIkD91Qgs68uQvbh0rXMgUgQKqAZguyWw","is_article":false,"article_url":null,"article_title":null,"article_description":null,"is_video":true,"video_url":"https://media.licdn.com/dms/image/v2/D4E05AQF2DONHDo63wg/videocover-high/B4EZtiZPwQJwBU-/0/1766882345829?e=1783137600&v=beta&t=Si7NLRWGqcOIkD91Qgs68uQvbh0rXMgUgQKqAZguyWw","has_image":true,"reaction_count":18,"reaction_types":"LIKE, EMPATHY, INTEREST","comment_count":3,"impression_count":1329,"source":"activity"},{"is_my_post":true,"post_urn":"urn:li:activity:7410640339578806272","author_name":"Ravi Evani\n              \n                \n                   \n    \n      \n    \n    \n      \n    \n\n • You","author_profile_url":"https://www.linkedin.com/in/ravievani","author_headline":"Deploying enterprise agents in production / CTO / SWE Leader / GVP @ Publicis Sapient","posted_time":"2026-01-27","posted_hours_ago":3600,"posted_time_raw":"5mo","post_url":"https://www.linkedin.com/feed/update/urn:li:activity:7410640339578806272","author_profile_image_url":"https://media.licdn.com/dms/image/v2/C4E03AQGNeJRorEd2Nw/profile-displayphoto-shrink_100_100/profile-displayphoto-shrink_100_100/0/1569287114631?e=1784160000&v=beta&t=tJDZC7EXWnlgIIf8kF7fBCajhF-HEgzNXnz_IIkjqW8","post_text":"Standard search is great for \"flights to Paris.\" But what about \"Is a 3-day coffee tour in Kyoto feasible in April, and what are the hidden gems?\"\n\nThat's where Deep Research comes in. Instead of a single LLM response, it's an asynchronous agentic workflow that gathers data, analyzes feasibility, and curates a personalized briefing.\n\nHere's how to drop interactive \"Deep Research\" capabilities into any discovery app/ chatbot. You can apply this pattern to any exploratory app (travel, shopping, real estate, education).\n\nThe Architecture: Trigger, Poll, Visualize\nWe don't want the user staring at a loading spinner for 60 seconds. The key is to make the process asynchronous and persistent.\n\n① The Trigger: Identifying Intent\nDon't force users to find a specific button. Let the LLM decide when a \"Deep Dive\" is needed.\n\nWe registered a tool called startDeepResearch with our agent. When the user asks a complex question, the agent calls this tool.\n\n② The Process: Async & Persistent\nThe tool returns a taskId immediately. We don't wait for the result.\nInstead, we render a DeepResearchIndicatorwidget. This widget does three things:\n\n➥ Polls the backend for the status of taskId.\n➥ Persists the task locally (using shared_preferences), so if the user closes the app, the research continues.\n➥ Animates progress to keep the UI alive.\n\nPro-tip: Add a History view. Deep Research is valuable; users want to reference these automated briefings later.\n\n③ The Visualization: Rich \"Briefings\"\nWhen the task finishes, don't just dump text. We receive a structured JSON payload (sanity, vibe, logistics, hidden_gems) and render a Briefing Page.\n\nThis transforms the LLM's raw analysis into a native, interactive report:\n➥ Visual Logic: \"If vibe.isRelaxed, use soft colors.\"\n➥ Interactive Maps: \"Plot the hidden_gems coordinates.\"\n➥ Actionable: \"Add these 3 recommended spots directly to my itinerary.\"\n\nThis pattern creates a \"Research Assistant\" feel. It moves your app from being a passive search interface to an active partner that does the heavy lifting while the user explores.","post_image_url":"https://media.licdn.com/dms/image/v2/D4E05AQET11bTl-rxaQ/videocover-high/B4EZtfiGe0GYBU-/0/1766834335656?e=1783137600&v=beta&t=ebn1hSoqKRWFrVW2ZsGZeB3YMTc7I9DoxKWTxQp4HdA","is_article":false,"article_url":null,"article_title":null,"article_description":null,"is_video":true,"video_url":"https://media.licdn.com/dms/image/v2/D4E05AQET11bTl-rxaQ/videocover-high/B4EZtfiGe0GYBU-/0/1766834335656?e=1783137600&v=beta&t=ebn1hSoqKRWFrVW2ZsGZeB3YMTc7I9DoxKWTxQp4HdA","has_image":true,"reaction_count":14,"reaction_types":"LIKE","comment_count":2,"impression_count":1014,"source":"activity"},{"is_my_post":true,"post_urn":"urn:li:activity:7410223445701177344","author_name":"Ravi Evani\n              \n                \n                   \n    \n      \n    \n    \n      \n    \n\n • You","author_profile_url":"https://www.linkedin.com/in/ravievani","author_headline":"Deploying enterprise agents in production / CTO / SWE Leader / GVP @ Publicis Sapient","posted_time":"2025-12-27","posted_hours_ago":4320,"posted_time_raw":"6mo","post_url":"https://www.linkedin.com/feed/update/urn:li:activity:7410223445701177344","author_profile_image_url":"https://media.licdn.com/dms/image/v2/C4E03AQGNeJRorEd2Nw/profile-displayphoto-shrink_100_100/profile-displayphoto-shrink_100_100/0/1569287114631?e=1784160000&v=beta&t=tJDZC7EXWnlgIIf8kF7fBCajhF-HEgzNXnz_IIkjqW8","post_text":"Generative UI shifts agent interaction from a chat to an efficient, multimodal workflow.\n\nThe agent can render the right user interface suitable to the moment of interaction. This cuts cognitive overload and brings sharp focus to the action that needs to be taken.\n\nIn a travel planning flow, that means a guest can move from inspiration (browse spa retreats) to decision (choose Maldives) to execution (build itinerary, add transfers, confirm) in one continuous journey, without bouncing across pages or wading through blocks of text and irrelevant UI. The experience stays contextual: chat for nuance, widgets for precision, and the workflow advances with each interaction.\n\nFor enterprises, this changes how you build experiences. You’re not hardcoding every variation of a journey; you’re assembling approved components dynamically around real user context. Done right, it speeds iteration while keeping guardrails (consistent brand UI, policy checks, accessibility, audit logs, and reliability) so teams can move faster without losing control.","post_image_url":"https://media.licdn.com/dms/image/v2/D4E05AQFCv_sq5dlgHg/videocover-high/B4EZtZm6ZtGQBU-/0/1766734934159?e=1783137600&v=beta&t=GKoxz1b7c77s3jrtqHoOp70CohpCvAhsVOygt1Dkt6o","is_article":false,"article_url":null,"article_title":null,"article_description":null,"is_video":true,"video_url":"https://media.licdn.com/dms/image/v2/D4E05AQFCv_sq5dlgHg/videocover-high/B4EZtZm6ZtGQBU-/0/1766734934159?e=1783137600&v=beta&t=GKoxz1b7c77s3jrtqHoOp70CohpCvAhsVOygt1Dkt6o","has_image":true,"reaction_count":16,"reaction_types":"LIKE, INTEREST","comment_count":10,"repost_count":1,"impression_count":2156,"source":"activity"},{"is_my_post":true,"post_urn":"urn:li:activity:7380631785594068992","author_name":"Ravi Evani\n              \n                \n                   \n    \n      \n    \n    \n      \n    \n\n • You","author_profile_url":"https://www.linkedin.com/in/ravievani","author_headline":"Deploying enterprise agents in production / CTO / SWE Leader / GVP @ Publicis Sapient","posted_time":"2025-10-27","posted_hours_ago":5760,"posted_time_raw":"8mo","post_url":"https://www.linkedin.com/feed/update/urn:li:activity:7380631785594068992","author_profile_image_url":"https://media.licdn.com/dms/image/v2/C4E03AQGNeJRorEd2Nw/profile-displayphoto-shrink_100_100/profile-displayphoto-shrink_100_100/0/1569287114631?e=1784160000&v=beta&t=tJDZC7EXWnlgIIf8kF7fBCajhF-HEgzNXnz_IIkjqW8","post_text":"Cult UI (https://pro.cult-ui.com/) is doing something interesting--selling copy-paste, full-stack “Blocks” that live in your repo. For travel and hospitality (T&H) teams building agentic user interfaces, that matters.\n\nWe’ve chased “LEGO for software” for years, but it never stuck in this industry. Every airline, hotel, and OTA claimed unicorn requirements—fare families, room types, ancillaries, loyalty tiers—which pushed teams to fork frameworks and rebuild. Old accelerators were either too opinionated or too thin, and the integration tax wiped out any speed you gained.\n\nBlocks + AI prompts change the equation. With contract-first components (clear props/DTOs, events, side-effects) you compose capability instead of forking code. Because blocks are copy-paste and in-repo, prompts can actually do the last-mile work: map intent to a catalog, generate the glue (routing, state, auth), scaffold tests and telemetry, and apply policy checks at compose time.\n\nSchema- and token-driven configs let the AI reshape UI and behavior without exploding variants, while provenance/SBOM and rollout guards keep upgrades predictable.\n\nYou can feel this in real T&H flows. A booking experience becomes a set of composable primitives—date grids, room/fare comparison, add-ons, bundle pricing—stitched to PMS/CRS/GDS and payments. Service recovery moves from bespoke workflows to reusable blocks that detect disruption, apply waivers or room moves, and coordinate guest comms. Loyalty and merchandising become configurable surfaces for points-and-cash, targeted upsell, and status perks. Ops UIs for associates and crew turn into agentic panels that prioritize work, trigger refunds/comp, and close the loop with messaging. Prompts assemble the blocks and drop in the connectors; engineers fine-tune where needed.\n\nThis also creates a new niche: component service providers that sell or rent verticalized blocks—booking cards, ancillaries, loyalty widgets, recovery flows—with SLAs, security attestations, and version support. Around them emerges BlockOps: usage metering, error analytics, assisted upgrades, and AI-tuning data. Expect “catalog curators” who certify compatibility with design systems and PMS/GDS adapters, and who operate prompt-to-assembly pipelines for brands that want speed without lock-in.\n\nIf you are an engineering leader, consider treating blocks as a product surface. Stand up a registry and contracts, wire a prompt library that maps intents to blocks, enforce compose-time policy and tests, and set an upgrade policy (canary, rollback, semver) from day one. Start with one high-leverage flow—service recovery or ancillaries--prove the path, then scale.","post_image_url":"https://media.licdn.com/dms/image/sync/v2/D5627AQFadGcELPAs8Q/articleshare-shrink_480/B56ZbOVetlHgAs-/0/1747218459882?e=1783137600&v=beta&t=vEhsO6Nw76_NY3m47eKL9XMAMog6-G-48lYQ4EJ367A","is_article":true,"article_url":"https://pro.cult-ui.com/blocks","article_title":"Shadcn Blocks – Full-Stack UI Components & Templates | Cult UI Pro","article_description":"Shadcn Blocks – Full-Stack UI Components & Templates | Cult UI Pro\npro.cult-ui.com","is_video":false,"video_url":null,"has_image":true,"reaction_count":20,"reaction_types":"LIKE, INTEREST","comment_count":1,"repost_count":1,"impression_count":2082,"source":"activity"},{"is_my_post":true,"post_urn":"urn:li:activity:7380295227124785153","author_name":"Ravi Evani\n              \n                \n                   \n    \n      \n    \n    \n      \n    \n\n • You","author_profile_url":"https://www.linkedin.com/in/ravievani","author_headline":"Deploying enterprise agents in production / CTO / SWE Leader / GVP @ Publicis Sapient","posted_time":"2025-10-27","posted_hours_ago":5760,"posted_time_raw":"8mo","post_url":"https://www.linkedin.com/feed/update/urn:li:activity:7380295227124785153","author_profile_image_url":"https://media.licdn.com/dms/image/v2/C4E03AQGNeJRorEd2Nw/profile-displayphoto-shrink_100_100/profile-displayphoto-shrink_100_100/0/1569287114631?e=1784160000&v=beta&t=tJDZC7EXWnlgIIf8kF7fBCajhF-HEgzNXnz_IIkjqW8","post_text":"AI answering engines and agents are on the path to transform travel commerce. When travelers ask these agents for recommendations, they are offloading most of their research to the machine--which returns back to them a highly curated shortlist to pick from.\n\nIn this new reality, brands need to resonate with these AI agents at the exact moment of intent: with structured data, verified claims, and instant booking capability.\n\nTo make this possible, travel and hospitality enterprises will need to build their own agents across booking, customer service, operations, and planning. But without a unified intelligence layer--an enterprise \"AI brain\"--these agents will operate as disconnected silos, wreaking havoc.\n\nThis enterprise AI brain must hold institutional knowledge and apply it consistently across every touchpoint. Brand standards, policies, operational data, and customer insights all need to flow through a central intelligence that can orchestrate actions and enable instant purchase at the moment of conversation.\n\nSolutions like Publicis Sapient Bodhi agentic platform are emerging to fill this role--learning business context, connecting it with broader market knowledge, and ensuring coherent decision-making at scale.\n\nThe question isn’t whether AI will reshape travel commerce (that’s inevitable). The real question is whether travel and hospitality enterprises will architect to capture intent at the moment of conversation—consistently and at scale.","post_image_url":"https://media.licdn.com/dms/image/v2/D4E05AQFemgmZlFdGfA/videocover-high/B4EZmwTQd3IkBw-/0/1759599492191?e=1783137600&v=beta&t=EJqwvjL07nLiAld5Rz6qHT1RK7oPRqRU3mbxQRtUbDE","is_article":false,"article_url":null,"article_title":null,"article_description":null,"is_video":true,"video_url":"https://media.licdn.com/dms/image/v2/D4E05AQFemgmZlFdGfA/videocover-high/B4EZmwTQd3IkBw-/0/1759599492191?e=1783137600&v=beta&t=EJqwvjL07nLiAld5Rz6qHT1RK7oPRqRU3mbxQRtUbDE","has_image":true,"reaction_count":61,"reaction_types":"LIKE, EMPATHY, PRAISE","repost_count":5,"impression_count":3341,"source":"activity"},{"is_my_post":true,"post_urn":"urn:li:activity:7379018737405935616","author_name":"Ravi Evani\n              \n                \n                   \n    \n      \n    \n    \n      \n    \n\n • You","author_profile_url":"https://www.linkedin.com/in/ravievani","author_headline":"Deploying enterprise agents in production / CTO / SWE Leader / GVP @ Publicis Sapient","posted_time":"2025-10-27","posted_hours_ago":5760,"posted_time_raw":"8mo","post_url":"https://www.linkedin.com/feed/update/urn:li:activity:7379018737405935616","author_profile_image_url":"https://media.licdn.com/dms/image/v2/C4E03AQGNeJRorEd2Nw/profile-displayphoto-shrink_100_100/profile-displayphoto-shrink_100_100/0/1569287114631?e=1784160000&v=beta&t=tJDZC7EXWnlgIIf8kF7fBCajhF-HEgzNXnz_IIkjqW8","post_text":"AI trip planners are becoming the default concierge. Unlike humans, they don’t “browse” your site; they rank machine-readable facts, availability, policies, and proof. If your differentiation isn’t legible to machines, you won’t make the shortlist--no matter how good the brand film is.\n\nHere’s a compact playbook for Travel & Hospitality leaders to win that agent-led demand, from my talk @Destination AI on \"Winning Brand Choice When AI Agents Do the Picking\":\n\n① Make your brand machine-visible\n➜ Publish a consistent “digital twin” of every property/room/amenity. Use structured data (JSON-LD, OTA/Lodging) across pages, feeds, and partner MCPs so agents can parse and reason about you.\n\n② Turn positioning into fields, not adjectives\n➜ “Family-friendly” becomes attributes: connectingRoomsGuaranteed=True, cribsAvailable=True, kidsMenuHours=True.\n➜ “Remote-work ready” becomes wifiMinThroughputMbps=150, inRoomDesk=True, quietHours=\"22:00 to 07:00\".\n\nEncode your promise--don’t just describe it.\n\n③ Build at the intent layer\nMap traveler intents to bundles and rules:\n➜ Family city break → interconnecting rooms + late checkout + stroller access + attraction tickets\n➜ Expose these via MCPs / A2A so agents can assemble itineraries with confidence.\n\n④ Publish verifiable claims to agents\n➜ Real Wi-Fi speeds, check-in wait times, refund SLAs, sustainability and safety certifications. Signed, time-stamped facts reduce perceived risk and lift shortlist share.\n\n⑤ Syndicate reviews and Q&A.\n➜ Answer common questions in machine-readable form. Be active on social (such as reddit, as LLMs feed off those too!) Bundle with partners to power cross-brand, intent-ready offers.\n\nYour goal in an agentic AI world: To make your differentiation legible to machines, verifiable to agents and irresistible to humans.\n\nP.S. Credit goes to the thinkers at Publicis Sapient who came up with these ideas and their execution. I just presented these in a Travel & Hospitality context.","post_image_url":"https://media.licdn.com/dms/image/v2/D4E05AQGikst4crvpkA/videocover-high/B4EZmeKTJOIIB8-/0/1759295138309?e=1783137600&v=beta&t=7lQun1MfqcFcnbsnkB-gV2rz-kREoFH86NvNeNP8tsU","is_article":false,"article_url":null,"article_title":null,"article_description":null,"is_video":true,"video_url":"https://media.licdn.com/dms/image/v2/D4E05AQGikst4crvpkA/videocover-high/B4EZmeKTJOIIB8-/0/1759295138309?e=1783137600&v=beta&t=7lQun1MfqcFcnbsnkB-gV2rz-kREoFH86NvNeNP8tsU","has_image":true,"reaction_count":29,"reaction_types":"LIKE, EMPATHY, PRAISE","comment_count":3,"repost_count":1,"impression_count":1569,"source":"activity"},{"is_my_post":true,"post_urn":"urn:li:activity:7378723943953625088","author_name":"Ravi Evani\n              \n                \n                   \n    \n      \n    \n    \n      \n    \n\n • You","author_profile_url":"https://www.linkedin.com/in/ravievani","author_headline":"Deploying enterprise agents in production / CTO / SWE Leader / GVP @ Publicis Sapient","posted_time":"2025-10-27","posted_hours_ago":5760,"posted_time_raw":"8mo","post_url":"https://www.linkedin.com/feed/update/urn:li:activity:7378723943953625088","author_profile_image_url":"https://media.licdn.com/dms/image/v2/C4E03AQGNeJRorEd2Nw/profile-displayphoto-shrink_100_100/profile-displayphoto-shrink_100_100/0/1569287114631?e=1784160000&v=beta&t=tJDZC7EXWnlgIIf8kF7fBCajhF-HEgzNXnz_IIkjqW8","post_text":"Engineers and PMs: traditional app dev is turning into a commodity. Your value is in building AI agents—not competing with them.\n\nShovel vs. excavator: don’t try to out-dig an excavator; design the excavator. As 2026 approaches, this means learning to design, evaluate, and ship agents that pursue goals, call tools, and improve over time. Be the person who builds the agents—the excavators of our field.\n\nWhy? Because:\n➜ Code is becoming cheap; but outcomes aren’t. Scaffolds, templates, and copilots collapse the cost of “just build the feature.” Business impact still needs brains.\n\n➜ Interfaces are moving up-stack. Agents operate on goals and tools, not screens and endpoints.\n\n➜ Ops are the new product. Reliability, evals, cost/latency budgets—this is where real engineering advantage shows.","post_image_url":"https://media.licdn.com/dms/image/v2/D4E05AQF-0ue51G5dbg/videocover-high/B4EZmZ.SMPHgB8-/0/1759224873762?e=1783137600&v=beta&t=Ba0-JGZreN3aDtW4G_c0koqh3_zLEhr_W0vHEF420I4","is_article":false,"article_url":null,"article_title":null,"article_description":null,"is_video":true,"video_url":"https://media.licdn.com/dms/image/v2/D4E05AQF-0ue51G5dbg/videocover-high/B4EZmZ.SMPHgB8-/0/1759224873762?e=1783137600&v=beta&t=Ba0-JGZreN3aDtW4G_c0koqh3_zLEhr_W0vHEF420I4","has_image":true,"reaction_count":51,"reaction_types":"LIKE, INTEREST, EMPATHY","comment_count":3,"repost_count":1,"impression_count":3148,"source":"activity"},{"is_my_post":true,"post_urn":"urn:li:activity:7334338846244982785","author_name":"Ravi Evani\n              \n                \n                   \n    \n      \n    \n    \n      \n    \n\n • You","author_profile_url":"https://www.linkedin.com/in/ravievani","author_headline":"Deploying enterprise agents in production / CTO / SWE Leader / GVP @ Publicis Sapient","posted_time":"2025-06-27","posted_hours_ago":8760,"posted_time_raw":"1yr","post_url":"https://www.linkedin.com/feed/update/urn:li:activity:7334338846244982785","author_profile_image_url":"https://media.licdn.com/dms/image/v2/C4E03AQGNeJRorEd2Nw/profile-displayphoto-shrink_100_100/profile-displayphoto-shrink_100_100/0/1569287114631?e=1784160000&v=beta&t=tJDZC7EXWnlgIIf8kF7fBCajhF-HEgzNXnz_IIkjqW8","post_text":"Restaurant Technologists: Here’s a real in-restaurant use case where today's AI can drive impact without needing to overhaul your tech stack.\n\n*Problem Statement*\nLunch-rush drive-thru throughput swings by ±25 %. Cars stack, guests bail, and you bleed revenue.\n\nAssume your stores already have:\n⇥ Two security-grade cameras on the lane\n⇥ A kitchen display system (KDS)\n⇥ A dated POS orders feed that drops into an on-prem SQL box every 15 minutes\n\nNone of that is “AI-ready,” yet it’s enough.\n\n*The AI play*\n\n1. Perception layer: A lightweight vision model runs at the edge, counting cars and classifying order size from the existing cameras. The \"Car counter\" could run on-prem/edge, like in this example: https://bit.ly/43zZY7O\n\n2. Prediction layer: A small LLM-plus-tabular model fuses the live car count with POS history to forecast queue time, cooking load, and when a second lane should open; updated every 60 seconds.\n\n3. Action layer: The model pushes three micro-prompts:\n\n⇥ Crew headsets: “Open lane 2 now: projected wait hits 4 min in 90 sec.”\n⇥ KDS: Re-sequence grill tickets so the long-cook items start 45 sec earlier.\n⇥ Digital menu board: Auto-feature quicker items (e.g., nuggets) to shave cook time.\n\nIn a few weeks this AI-driven system could increase cars served per hour by 20% and cut order abandonment in half—without new hardware or major systems changes.\n\nWhy this is realistic:\n\n⇥ No pristine data lake required. Vision + POS delta files are messy but good enough.\n⇥ Keeps people in the loop. Managers still decide; AI just flags the window.\n⇥ Scales fast. One containerized edge package pushes to every store overnight.\n\nAnd all of this can be accomplished today with lightweight open source models on Hugging Face!\n\nThat’s profitable AI—built on the chaos you already have, driving enterprise-level results without a big lift.","post_image_url":"https://media.licdn.com/dms/image/v2/D4E22AQF0sl85U7Lpzw/feedshare-shrink_800/B4EZcjOUCtHcAo-/0/1748642645458?e=1784160000&v=beta&t=B3A9FW-JeZxyuTIZC-W0NGvYesySjZyeLSihGdwKzh4","is_article":false,"article_url":null,"article_title":null,"article_description":null,"is_video":false,"video_url":null,"has_image":true,"reaction_count":16,"reaction_types":"LIKE","comment_count":2,"impression_count":1187,"source":"activity"},{"is_my_post":true,"post_urn":"urn:li:activity:7333845641040691200","author_name":"Ravi Evani\n              \n                \n                   \n    \n      \n    \n    \n      \n    \n\n • You","author_profile_url":"https://www.linkedin.com/in/ravievani","author_headline":"Deploying enterprise agents in production / CTO / SWE Leader / GVP @ Publicis Sapient","posted_time":"2025-06-27","posted_hours_ago":8760,"posted_time_raw":"1yr","post_url":"https://www.linkedin.com/feed/update/urn:li:activity:7333845641040691200","author_profile_image_url":"https://media.licdn.com/dms/image/v2/C4E03AQGNeJRorEd2Nw/profile-displayphoto-shrink_100_100/profile-displayphoto-shrink_100_100/0/1569287114631?e=1784160000&v=beta&t=tJDZC7EXWnlgIIf8kF7fBCajhF-HEgzNXnz_IIkjqW8","post_text":"How to Spot When AI Is Confidently Wrong ⇓\n\nLLMs are fluent. Sometimes dangerously so. They can be confidently wrong, just like smart, eloquent humans.\n\nHere’s what I’ve learned about navigating that risk:\nDon’t prompt and hope. Critically co-create. And that means staying in the loop, asking the right questions, and knowing when to challenge what sounds “about right.”\n\nHere’s what that looks like in practice:\n\n↛ Interrogate confidence.\nWhen an AI (or a person) sounds too smooth, I ask:\nWhat might we be missing?\nWhat’s this assuming?\nWhat would break this logic?\n\n↛ Check alignment, not just output.\nDoes the response answer the right question? Or just the one it was easiest to answer confidently?\n\n↛ Make “pause and probe” a team habit.\nIn a recent AI Engineering training we did, this was a recurring theme. We walked through examples of AI confidently hallucinating details in system designs, and it was the engineer who asked “are we providing it the full context?” who unlocked the real insight.\n\nThis kind of thinking isn’t just nice to have anymore. It’s a new literacy for better outcomes with AI.","post_image_url":"https://media.licdn.com/dms/image/v2/D4E05AQGAp3xA37uHqQ/feedshare-thumbnail_720_1280/B4EZccNqa2HIAs-/0/1748525034595?e=1783137600&v=beta&t=sOuGM08MXiPw65-8vFLK7cZhHa4ugjkVHNmI6llgN4Q","is_article":false,"article_url":null,"article_title":null,"article_description":null,"is_video":true,"video_url":"https://media.licdn.com/dms/image/v2/D4E05AQGAp3xA37uHqQ/feedshare-thumbnail_720_1280/B4EZccNqa2HIAs-/0/1748525034595?e=1783137600&v=beta&t=sOuGM08MXiPw65-8vFLK7cZhHa4ugjkVHNmI6llgN4Q","has_image":true,"reaction_count":31,"reaction_types":"LIKE, EMPATHY","comment_count":1,"impression_count":3871,"source":"activity"},{"is_my_post":true,"post_urn":"urn:li:activity:7333175184247382016","author_name":"Ravi Evani\n              \n                \n                   \n    \n      \n    \n    \n      \n    \n\n • You","author_profile_url":"https://www.linkedin.com/in/ravievani","author_headline":"Deploying enterprise agents in production / CTO / SWE Leader / GVP @ Publicis Sapient","posted_time":"2025-06-27","posted_hours_ago":8760,"posted_time_raw":"1yr","post_url":"https://www.linkedin.com/feed/update/urn:li:activity:7333175184247382016","author_profile_image_url":"https://media.licdn.com/dms/image/v2/C4E03AQGNeJRorEd2Nw/profile-displayphoto-shrink_100_100/profile-displayphoto-shrink_100_100/0/1569287114631?e=1784160000&v=beta&t=tJDZC7EXWnlgIIf8kF7fBCajhF-HEgzNXnz_IIkjqW8","post_text":"Most people in large enterprises aren’t motivated by executive statements about “performance gains” or “cost savings” with AI. ⇓\n\nEnterprise leaders might feel they are doing their part by unleashing AI “copilots” to their people. But that's far from enough.\n\nSimply rolling out tools is like bringing excavators to people who’ve always dug with shovels. http://bit.ly/44QHdiN.\n\nThe value isn’t in *having* an AI—it’s in how *persistently* and *effectively* your people are using it, which means that this is a transformation of habits, not just skills.\n\nHere is what I have learned:\n\n👉 1. Leaders must be hands-on practitioners\nTeams take their cue from what leaders *do*, not what they say. If you’re not actively using AI in your own work, whether it’s drafting, reviewing, exploring, or simplifying tasks, it’s hard for your people to see where the real value lies.\n\nFrame the ability to steer AI as a leadership capability, not a tech skill. Build enough firsthand experience to guide others with credibility. Share what you’re learning, and make AI part of how you work—not just how you talk about work. Also, this should be genuine, not polished showcases.\n\n👉 2. Make grass-roots efforts visible, even when it’s messy\nMany are experimenting with AI privately. But people are hesitant to share early wins—worried it’ll lead to more work, added pressure, unrealistic expectations, or scrutiny if results can’t be repeated.\n\nTo surface quiet wins, you need to lower the stakes of sharing. Use familiar forums: sprint retros, town halls, 1:1s—where people can talk about what they’ve tried, not just what worked. Highlight process stories internally so people know that learning counts, even when outcomes aren’t remarkable or consistent.\n\n👉 3. Codify what works. Scale it.\nAI workflows usually start small and scattered, but without structure, those insights don’t spread. Teams might solve the same problems repeatedly, missing chances to build on each other’s progress.\n\nTo scale grassroots wins, capture the essence of what’s working and turn it into easily accessible resources; e.g., build a centralized “prompt library” portal where people can share their prompts. Establish lightweight methods, such as tagging prompts and AI solutions by tech stack, use case, or outcome, so they become discoverable and reusable across teams.\n\n👉 4. Train your people for clarity, not just capability\nThe inherent challenge of AI is that it gives unlimited choices—so the skill that matters now is knowing how to frame the right questions, cut through ambiguity, and converge quickly.\n\nFocus training on clarity: logical thinking, structured reasoning, and precise communication. Use prompts for planning and design, not just to execute. Teach teams to question AI outputs and weigh options before choosing. The goal is to transition from memorization of how to use AI tools to building minds that can direct them with precision.\n\n--\n\nWhat’s helping your people make the shift?\n\nhashtag#LIPostingDayMay","post_image_url":null,"is_article":false,"article_url":null,"article_title":null,"article_description":null,"is_video":false,"video_url":null,"has_image":false,"reaction_count":28,"reaction_types":"LIKE, EMPATHY, PRAISE","comment_count":1,"impression_count":1557,"source":"activity"},{"is_my_post":true,"post_urn":"urn:li:activity:7332108546853015557","author_name":"Ravi Evani\n              \n                \n                   \n    \n      \n    \n    \n      \n    \n\n • You","author_profile_url":"https://www.linkedin.com/in/ravievani","author_headline":"Deploying enterprise agents in production / CTO / SWE Leader / GVP @ Publicis Sapient","posted_time":"2025-06-27","posted_hours_ago":8760,"posted_time_raw":"1yr","post_url":"https://www.linkedin.com/feed/update/urn:li:activity:7332108546853015557","author_profile_image_url":"https://media.licdn.com/dms/image/v2/C4E03AQGNeJRorEd2Nw/profile-displayphoto-shrink_100_100/profile-displayphoto-shrink_100_100/0/1569287114631?e=1784160000&v=beta&t=tJDZC7EXWnlgIIf8kF7fBCajhF-HEgzNXnz_IIkjqW8","post_text":"This Memorial Day, we’re going deep on designing AI-first interfaces that do the heavy lifting. Join me live to break down how to architect a system where your website initiates intelligent, context-aware conversations—handling advice, upsell, and decision-making—while integrating seamless human fallback via video. We’ll cover system design, AI orchestration, and practical trade-offs.","post_image_url":null,"is_article":false,"article_url":null,"article_title":null,"article_description":null,"is_video":true,"video_url":null,"has_image":false,"reaction_count":73,"reaction_types":"LIKE, EMPATHY, PRAISE","comment_count":15,"repost_count":4,"impression_count":11973,"source":"activity"},{"is_my_post":true,"post_urn":"urn:li:activity:7331314328383455232","author_name":"Ravi Evani\n              \n                \n                   \n    \n      \n    \n    \n      \n    \n\n • You","author_profile_url":"https://www.linkedin.com/in/ravievani","author_headline":"Deploying enterprise agents in production / CTO / SWE Leader / GVP @ Publicis Sapient","posted_tim
