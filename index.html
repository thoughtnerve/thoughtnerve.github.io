/C4E03AQGNeJRorEd2Nw/profile-displayphoto-shrink_100_100/profile-displayphoto-shrink_100_100/0/1569287114631?e=1784160000&v=beta&t=tJDZC7EXWnlgIIf8kF7fBCajhF-HEgzNXnz_IIkjqW8","author_profile_url":"https://www.linkedin.com/in/ravievani","comment_count":1,"has_image":true,"impression_count":2542,"is_article":false,"is_my_post":true,"is_video":true,"post_image_url":"https://media.licdn.com/dms/image/v2/D4E05AQHs6EYKBKO21A/feedshare-thumbnail_720_1280/B4EZUKkda3G0A8-/0/1739639085562?e=1782932400&v=beta&t=uX9CMP90tBG51LiKAosia2dgkcI0TEwLEnuvo_n3WhE","post_text":"\"AI automation\" to mass lift-and-shift on-premise back office apps to\nGoogle Cloud, with the help of hashtag#Google Gemini, hashtag#Azure Open AI and Publicis Sapient hashtag#Slingshot AI Assistant 🚀","post_url":"https://www.linkedin.com/feed/update/urn:li:activity:7296575360308047873","post_urn":"urn:li:activity:7296575360308047873","posted_hours_ago":8760,"posted_time":"2025-06-24","posted_time_raw":"1yr","reaction_count":37,"reaction_types":"LIKE, EMPATHY, PRAISE","repost_count":2,"source":"activity","video_url":"https://media.licdn.com/dms/image/v2/D4E05AQHs6EYKBKO21A/feedshare-thumbnail_720_1280/B4EZUKkda3G0A8-/0/1739639085562?e=1782932400&v=beta&t=uX9CMP90tBG51LiKAosia2dgkcI0TEwLEnuvo_n3WhE"},{"article_description":null,"article_title":null,"article_url":null,"author_headline":"Deploying enterprise agents in production / CTO / SWE Leader / GVP @ Publicis Sapient","author_name":"Ravi Evani\n              \n                \n                   \n    \n      \n    \n    \n      \n    \n\n • You","author_profile_image_url":"https://media.licdn.com/dms/image/v2/C4E03AQGNeJRorEd2Nw/profile-displayphoto-shrink_100_100/profile-displayphoto-shrink_100_100/0/1569287114631?e=1784160000&v=beta&t=tJDZC7EXWnlgIIf8kF7fBCajhF-HEgzNXnz_IIkjqW8","author_profile_url":"https://www.linkedin.com/in/ravievani","comment_count":3,"has_image":true,"impression_count":7718,"is_article":false,"is_my_post":true,"is_video":true,"post_image_url":"https://media.licdn.com/dms/image/v2/D4E05AQHe0WGxieW2mQ/videocover-high/B4EZUEEztpGgBs-/0/1739530130034?e=1782932400&v=beta&t=i-qVvS-tDV5i69IBcrILoCPjhAnXV5rVNIJQxkPbFno","post_text":"Ever wondered why hashtag#travel (flight, hotel, car) contact center agents sound like they're speaking in code? 🤖\n\nRemember when you were trying to change a hotel booking, and the agent is typing away like they're hacking the Matrix? That's because they literally are! Travel contact center agents have been stuck using these mainframe systems called Global Distribution Systems (GDS).\n\nThe wild part? Every time you say something simple like \"I need to change my King room to 2 Queen beds,\" they have to mentally translate that into cryptic commands. We're talking thousands of possible combinations.\n\nBut here's where it gets interesting...\n\nUsing Publicis Sapient hashtag#Slingshot AI platform, that contains built-in Travel & Hospitality context—we've created an API that turns regular human language into these ancient GDS commands instantly (see video). Think of it as a machine translator for travel-speak. No more mental gymnastics for agents!\n\nThis API can plug straight into CRM like hashtag#Salesforce, hashtag#Pega, etc, enabling CC agents to interact with cryptic systems more naturally.\n\nThis is how we're infusing hashtag#ai into hashtag#travel & hashtag#hospitality tech in 2025 – one decoded command at a time. Because let's be honest, nobody has time to learn Klingon just to book a vacation. 🚀","post_url":"https://www.linkedin.com/feed/update/urn:li:activity:7296118211480092672","post_urn":"urn:li:activity:7296118211480092672","posted_hours_ago":8760,"posted_time":"2025-06-24","posted_time_raw":"1yr","reaction_count":77,"reaction_types":"LIKE, PRAISE, EMPATHY","source":"activity","video_url":"https://media.licdn.com/dms/image/v2/D4E05AQHe0WGxieW2mQ/videocover-high/B4EZUEEztpGgBs-/0/1739530130034?e=1782932400&v=beta&t=i-qVvS-tDV5i69IBcrILoCPjhAnXV5rVNIJQxkPbFno"},{"article_description":null,"article_title":null,"article_url":null,"author_headline":"Deploying enterprise agents in production / CTO / SWE Leader / GVP @ Publicis Sapient","author_name":"Ravi Evani\n              \n                \n                   \n    \n      \n    \n    \n      \n    \n\n • You","author_profile_image_url":"https://media.licdn.com/dms/image/v2/C4E03AQGNeJRorEd2Nw/profile-displayphoto-shrink_100_100/profile-displayphoto-shrink_100_100/0/1569287114631?e=1784160000&v=beta&t=tJDZC7EXWnlgIIf8kF7fBCajhF-HEgzNXnz_IIkjqW8","author_profile_url":"https://www.linkedin.com/in/ravievani","comment_count":1,"has_image":true,"impression_count":2433,"is_article":false,"is_my_post":true,"is_video":true,"post_image_url":"https://media.licdn.com/dms/image/v2/D4E05AQFS9dpj26PINQ/feedshare-thumbnail_720_1280/B4EZT02yNJHUA8-/0/1739274790321?e=1782932400&v=beta&t=UXXs6cCpVVs0NtKATmgHqY19VAxyb4BydUflX4uIK6M","post_text":"Use this “mixture of models” approach created by one of my teams Jackson Heintz Thomas Hari Budihardjo Kevin Thomas to mass lift-and-shift on-prem apps to hashtag#AWS, with the help of hashtag#Google Gemini, hashtag#Azure Open AI and Publicis Sapient hashtag#Slingshot AI Assistant 🚀","post_url":"https://www.linkedin.com/feed/update/urn:li:activity:7295047347665842176","post_urn":"urn:li:activity:7295047347665842176","posted_hours_ago":8760,"posted_time":"2025-06-24","posted_time_raw":"1yr","reaction_count":44,"reaction_types":"LIKE, EMPATHY, PRAISE","repost_count":1,"source":"activity","video_url":"https://media.licdn.com/dms/image/v2/D4E05AQFS9dpj26PINQ/feedshare-thumbnail_720_1280/B4EZT02yNJHUA8-/0/1739274790321?e=1782932400&v=beta&t=UXXs6cCpVVs0NtKATmgHqY19VAxyb4BydUflX4uIK6M"},{"article_description":null,"article_title":null,"article_url":null,"author_headline":"Deploying enterprise agents in production / CTO / SWE Leader / GVP @ Publicis Sapient","author_name":"Ravi Evani\n              \n                \n                   \n    \n      \n    \n    \n      \n    \n\n • You","author_profile_image_url":"https://media.licdn.com/dms/image/v2/C4E03AQGNeJRorEd2Nw/profile-displayphoto-shrink_100_100/profile-displayphoto-shrink_100_100/0/1569287114631?e=1784160000&v=beta&t=tJDZC7EXWnlgIIf8kF7fBCajhF-HEgzNXnz_IIkjqW8","author_profile_url":"https://www.linkedin.com/in/ravievani","comment_count":2,"has_image":true,"impression_count":8125,"is_article":false,"is_my_post":true,"is_video":false,"post_image_url":"https://media.licdn.com/dms/image/v2/D4E22AQEK2hKw73cw1A/feedshare-shrink_800/B4EZTEUMWfHMAg-/0/1738460417052?e=1784160000&v=beta&t=xedIZnRVxX5TlzU0HALlfZuOuzJw5fGx8-J6BLhs64w","post_text":"Example of an agentic flow for migrating an on-prem app to hashtag#AWS—powered by Publicis Sapient Slingshot AI platform, and a strategic mix of LLMs. 🚀","post_url":"https://www.linkedin.com/feed/update/urn:li:activity:7291631486095482880","post_urn":"urn:li:activity:7291631486095482880","posted_hours_ago":8760,"posted_time":"2025-06-24","posted_time_raw":"1yr","reaction_count":124,"reaction_types":"LIKE, INTEREST","repost_count":3,"source":"activity","video_url":null},{"article_description":null,"article_title":null,"article_url":null,"author_headline":"Deploying enterprise agents in production / CTO / SWE Leader / GVP @ Publicis Sapient","author_name":"Ravi Evani\n              \n                \n                   \n    \n      \n    \n    \n      \n    \n\n • You","author_profile_image_url":"https://media.licdn.com/dms/image/v2/C4E03AQGNeJRorEd2Nw/profile-displayphoto-shrink_100_100/profile-displayphoto-shrink_100_100/0/1569287114631?e=1784160000&v=beta&t=tJDZC7EXWnlgIIf8kF7fBCajhF-HEgzNXnz_IIkjqW8","author_profile_url":"https://www.linkedin.com/in/ravievani","comment_count":8,"has_image":true,"impression_count":86515,"is_article":false,"is_my_post":true,"is_video":false,"post_image_url":"https://media.licdn.com/dms/image/v2/D4E22AQEirLPqq_IgzQ/feedshare-shrink_800/B4EZSssC78HgAg-/0/1738064055666?e=1784160000&v=beta&t=ulRebt7wICfDIrnlP9tcDxXfN7BMi0DsVLyyp-iHFhQ","post_text":"Great discussion with one of my teams at the Publicis Sapient Gurgaon, India office about how AI is transforming the software development lifecycle.\n\nOne of the key questions raised was: With AI now capable of writing code and generating solutions, what will be the role of engineers in the future? Here’s how we answered it:\n\n1. AI generates code, but It needs guidance:\nWhile AI can generate code, it often lacks the ability to ensure scalability, performance, maintainability, or even interpretability for future systems, including other AIs. Engineers will play a critical role in steering AI to produce the right architecture, abstractions, and implementations. To do this effectively, we’ll need to be more proficient than the AI itself, identifying and fixing issues AI introduces.\n\n2. The demand for software development will multiply:\nAI is like moving from using shovels to using excavators. The demand for software will explode as it becomes more disposable and purpose-built. Additionally, every piece of software can now be made more intelligent, opening opportunities to create a massive corpus of code for intelligent systems. Engineers will be essential in building these systems, especially as we move beyond legacy, deterministic codebases.\n\n3. Broadening skills is non-negotiable:\nEngineers who only take directions and implement requirements will be disrupted by AI. However, those who broaden their skill sets—solving business problems, playing multi-dimensional roles, and leveraging AI for code generation—will be in a stronger position. The ability to think holistically and creatively will be invaluable.\n\n4. Domain knowledge is key to be the human in the loop:\nTo effectively manage and steer AI output, deep domain knowledge and expertise are essential. This ties back to the earlier point about needing to be proficient enough to review and refine what AI produces.\n\n5. AI will be universal, but creativity will differentiate us:\nLike how Google and the internet democratized access to information, AI will become ubiquitous. But the outcomes will depend on how we use it, what we create with it, and the level of creativity and innovation we bring to the table.\n\n6. Human needs remain unchanged:\nDespite AI’s capabilities, our fundamental human needs—certainty, variety, connection, growth, and contribution—remain unchanged. AI might help us meet these needs at a higher level, but it’s up to us to define how we leverage it for meaningful impact to ourselves.","post_url":"https://www.linkedin.com/feed/update/urn:li:activity:7289969035843125249","post_urn":"urn:li:activity:7289969035843125249","posted_hours_ago":8760,"posted_time":"2025-06-24","posted_time_raw":"1yr","reaction_count":621,"reaction_types":"LIKE, PRAISE, EMPATHY","repost_count":5,"source":"activity","video_url":null},{"article_description":"","article_title":"https://lnkd.in/e5vMUtkN","article_url":"https://lnkd.in/e5vMUtkN","author_headline":"Deploying enterprise agents in production / CTO / SWE Leader / GVP @ Publicis Sapient","author_name":"Ravi Evani\n              \n                \n                   \n    \n      \n    \n    \n      \n    \n\n • You","author_profile_image_url":"https://media.licdn.com/dms/image/v2/C4E03AQGNeJRorEd2Nw/profile-displayphoto-shrink_100_100/profile-displayphoto-shrink_100_100/0/1569287114631?e=1784160000&v=beta&t=tJDZC7EXWnlgIIf8kF7fBCajhF-HEgzNXnz_IIkjqW8","author_profile_url":"https://www.linkedin.com/in/ravievani","has_image":false,"impression_count":501,"is_article":true,"is_my_post":true,"is_video":false,"post_image_url":null,"post_text":"The fact that DeepSeek R1's multi-token reading capability processes text in chunks rather than word-by-word, with minimal accuracy loss, reinforces that the LCM architecture could work in production—especially if consider these text chunks as analogous to \"concepts\".\n\nAnyone from LCM team —would love your perspective on this: Loic Barrault, Paul-Ambroise Duquenne, Maha Elbayad","post_url":"https://www.linkedin.com/feed/update/urn:li:activity:7289858553660493824","post_urn":"urn:li:activity:7289858553660493824","posted_hours_ago":8760,"posted_time":"2025-06-24","posted_time_raw":"1yr","reaction_count":1,"reaction_types":"INTEREST","source":"activity","video_url":null},{"article_description":null,"article_title":null,"article_url":null,"author_headline":"Deploying enterprise agents in production / CTO / SWE Leader / GVP @ Publicis Sapient","author_name":"Ravi Evani\n              \n                \n                   \n    \n      \n    \n    \n      \n    \n\n • You","author_profile_image_url":"https://media.licdn.com/dms/image/v2/C4E03AQGNeJRorEd2Nw/profile-displayphoto-shrink_100_100/profile-displayphoto-shrink_100_100/0/1569287114631?e=1784160000&v=beta&t=tJDZC7EXWnlgIIf8kF7fBCajhF-HEgzNXnz_IIkjqW8","author_profile_url":"https://www.linkedin.com/in/ravievani","comment_count":1,"has_image":true,"impression_count":1677,"is_article":false,"is_my_post":true,"is_video":false,"post_image_url":"https://media.licdn.com/dms/image/v2/D4D22AQFqRQcNWPCgIg/feedshare-shrink_800/B4DZSngUNCG4Ag-/0/1737977056243?e=1784160000&v=beta&t=WzzkUII1-mUvcJkDp97JK1QngN_R21RA6w4NyywVYxk","post_text":"While big tech buzzes about AI agents that do their own \"planning\", the reality is that enterprises operate on pre-existing playbooks, whether they're rigorously documented or woven into institutional knowledge.\n\nThe enterprise doesn't need AI agents that play visionary—it needs agents that play by the rules. This isn't a limitation; it's the key to unlocking real enterprise value.\n\nAn agent that understands its operational context and respects system guardrails isn't just more practical; it's way more powerful!","post_url":"https://www.linkedin.com/feed/update/urn:li:activity:7289604123228803072","post_urn":"urn:li:activity:7289604123228803072","posted_hours_ago":8760,"posted_time":"2025-06-24","posted_time_raw":"1yr","reaction_count":17,"reaction_types":"LIKE","repost_count":1,"source":"activity","video_url":null},{"article_description":null,"article_title":null,"article_url":null,"author_headline":"Deploying enterprise agents in production / CTO / SWE Leader / GVP @ Publicis Sapient","author_name":"Ravi Evani\n              \n                \n                   \n    \n      \n    \n    \n      \n    \n\n • You","author_profile_image_url":"https://media.licdn.com/dms/image/v2/C4E03AQGNeJRorEd2Nw/profile-displayphoto-shrink_100_100/profile-displayphoto-shrink_100_100/0/1569287114631?e=1784160000&v=beta&t=tJDZC7EXWnlgIIf8kF7fBCajhF-HEgzNXnz_IIkjqW8","author_profile_url":"https://www.linkedin.com/in/ravievani","comment_count":2,"has_image":true,"impression_count":3190,"is_article":false,"is_my_post":true,"is_video":true,"post_image_url":"https://media.licdn.com/dms/image/v2/D4E05AQHywN56e2V9Xw/videocover-high/B4EZSXbLCpGwBs-/0/1737707272835?e=1782932400&v=beta&t=GdSIqUiT5DE-c1hcaA4IMEMMBV08XRelj2WEPU6AA08","post_text":"The buzz around OpenAI's $500B “Stargate” project to create AGI brings to mind the story of Mahabharat from Indian mythology.\n\nBig tech players and AI enthusiasts resemble Arjuna, awestruck by Krishna in his cosmic form—eagerly anticipating the perpetually elusive AGI's divine revelation. Meanwhile, skeptics insist it will never come.\n\nYet just as Arjuna had to continue fighting his own battles even after seeing divinity, humans might find that whether AI is \"godlike\" or not, our core problems (and needs) remain stubbornly earthly. The ultimate irony is that we might actually be the Krishna in this story, steering AI while believing it’s the one taking over.","post_url":"https://www.linkedin.com/feed/update/urn:li:activity:7288472578879283200","post_urn":"urn:li:activity:7288472578879283200","posted_hours_ago":8760,"posted_time":"2025-06-24","posted_time_raw":"1yr","reaction_count":24,"reaction_types":"LIKE, INTEREST, EMPATHY","source":"activity","video_url":"https://media.licdn.com/dms/image/v2/D4E05AQHywN56e2V9Xw/videocover-high/B4EZSXbLCpGwBs-/0/1737707272835?e=1782932400&v=beta&t=GdSIqUiT5DE-c1hcaA4IMEMMBV08XRelj2WEPU6AA08"},{"article_description":null,"article_title":null,"article_url":null,"author_headline":"Deploying enterprise agents in production / CTO / SWE Leader / GVP @ Publicis Sapient","author_name":"Ravi Evani\n              \n                \n                   \n    \n      \n    \n    \n      \n    \n\n • You","author_profile_image_url":"https://media.licdn.com/dms/image/v2/C4E03AQGNeJRorEd2Nw/profile-displayphoto-shrink_100_100/profile-displayphoto-shrink_100_100/0/1569287114631?e=1784160000&v=beta&t=tJDZC7EXWnlgIIf8kF7fBCajhF-HEgzNXnz_IIkjqW8","author_profile_url":"https://www.linkedin.com/in/ravievani","comment_count":4,"has_image":true,"impression_count":29397,"is_article":false,"is_my_post":true,"is_video":false,"post_image_url":"https://media.licdn.com/dms/image/v2/D4E22AQEG6KRfE-yZTw/feedshare-shrink_800/B4EZRNMFDgHAAk-/0/1736461809076?e=1784160000&v=beta&t=2xf30h84lKhn-Ui5_F7GRpNm3LoNYHuOLfrgsQMmcv0","post_text":"Insightful discussion with some of our Publicis Sapient New York Engineering Managers on their experiences using SDLC AI tools, as well as building AI-powered systems. Some notes from the field that I gathered:\n\n🎯 Delivering Real Results\n↳A recommendation engine built simply by leveraging vector search on Hugging Face sentence transformer-generated embeddings yielded higher relevance than a full-blown “personalization platform”, prompting our clients to reconsider their AI investments in SaaS.\n↳A team was able to deliver a complex retail marketplace integration between the timelines of Diwali and Thanksgiving using our Slingshot AI SDLC assistant.\n↳A financial services enterprise application was launched to production in two weeks.\n↳ OCR tasks have demonstrated significant accuracy improvements over applications developed in the past decade.\n↳An AI agent expedited SRE onboarding by processing wikis and SOPs, reducing the need for manual analysis.\n↳Even some basic RAG implementations showed clear business benefits.\n\n🎯 Applying AI to SDLC Processes\n↳Creating and maintaining shared prompt libraries is essential for achieving consistent results across teams.\n↳Curated context hierarchies that accompany prompt chains significantly enhance output accuracy.\n\n🎯 Measuring Efficiencies Gained Using AI SDLC Tools\n↳Teams maintain initial project estimates as reference points, keeping baselines unchanged until AI impact is clearly established.\n↳Comparisons of team velocity before and after deep AI assistance adoption serve as key efficiency indicators.\n↳Reduction in bugs, particularly in edge cases, is closely monitored.\n↳Strong story pointing and Scrum practices ensure accurate measurement of productivity improvements.\n\n🎯 Overcoming Field Challenges\n↳One AI system encountered issues with unexpected production data patterns\n↳Assumptions about data patterns can impact user experience when patterns shift\n↳AI systems still require significant human oversight\n\nThanks for your time: Roshan Jitender Rangaswamy Balaji Kevin Romy Nirav. Sharing your experiences help us develop a more grounded approach to AI implementation—focusing on practical benefits while being mindful of the challenges.","post_url":"https://www.linkedin.com/feed/update/urn:li:activity:7283248717866926080","post_urn":"urn:li:activity:7283248717866926080","posted_hours_ago":8760,"posted_time":"2025-06-24","posted_time_raw":"1yr","reaction_count":234,"reaction_types":"LIKE, EMPATHY, PRAISE","repost_count":2,"source":"activity","video_url":null},{"article_description":null,"article_title":null,"article_url":null,"author_headline":"Deploying enterprise agents in production / CTO / SWE Leader / GVP @ Publicis Sapient","author_name":"Ravi Evani\n              \n                \n                   \n    \n      \n    \n    \n      \n    \n\n • You","author 2932400&v=beta&t=tnAYh0yamu_YxoxGU0fg9IoGEticLofw1hgsH3nq-wI","post_text":"Connected AI ⇛ better SDLC. In my conversation with Rakesh Ravuri, he sheds light on the disconnected nature of AI tools and how enterprises should solve the leaky bucket problem to unlock true SDLC transformation.\n▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬\nhashtag#ai @ Publicis Sapient","post_url":"https://www.linkedin.com/feed/update/urn:li:activity:7281617409067683840","post_urn":"urn:li:activity:7281617409067683840","posted_hours_ago":8760,"posted_time":"2025-06-24","posted_time_raw":"1yr","reaction_count":92,"reaction_types":"LIKE, EMPATHY, INTEREST","repost_count":2,"source":"activity","video_url":"https://media.licdn.com/dms/image/v2/D4E05AQG5f37-5EIH8Q/feedshare-thumbnail_720_1280/B4EZQ13sqwGcBA-/0/1736070581702?e=1782932400&v=beta&t=tnAYh0yamu_YxoxGU0fg9IoGEticLofw1hgsH3nq-wI"},{"article_description":null,"article_title":null,"article_url":null,"author_headline":"Deploying enterprise agents in production / CTO / SWE Leader / GVP @ Publicis Sapient","author_name":"Ravi Evani\n              \n                \n                   \n    \n      \n    \n    \n      \n    \n\n • You","author_profile_image_url":"https://media.licdn.com/dms/image/v2/C4E03AQGNeJRorEd2Nw/profile-displayphoto-shrink_100_100/profile-displayphoto-shrink_100_100/0/1569287114631?e=1784160000&v=beta&t=tJDZC7EXWnlgIIf8kF7fBCajhF-HEgzNXnz_IIkjqW8","author_profile_url":"https://www.linkedin.com/in/ravievani","has_image":true,"impression_count":1594,"is_article":false,"is_my_post":true,"is_video":true,"post_image_url":"https://media.licdn.com/dms/image/v2/D4E05AQFM9OYjhrhc4A/feedshare-thumbnail_720_1280/B4EZQrSTJfHsA8-/0/1735893006558?e=1782932400&v=beta&t=Fhv5OyJVxqSTMOAw7VXmrkyB05DdYZit0AEBqpLkgv4","post_text":"People are acquiring skills from everywhere. Laura, Rachit and I discuss that while structured AI training paths are essential for all career stages—we should also be building pathways to give our people credit for the AI skills they have learnt outside the context of a formal curriculum.\n\nhashtag#ai @ Publicis Sapient","post_url":"https://www.linkedin.com/feed/update/urn:li:activity:7280863218028228608","post_urn":"urn:li:activity:7280863218028228608","posted_hours_ago":8760,"posted_time":"2025-06-24","posted_time_raw":"1yr","reaction_count":13,"reaction_types":"LIKE, EMPATHY, PRAISE","source":"activity","video_url":"https://media.licdn.com/dms/image/v2/D4E05AQFM9OYjhrhc4A/feedshare-thumbnail_720_1280/B4EZQrSTJfHsA8-/0/1735893006558?e=1782932400&v=beta&t=Fhv5OyJVxqSTMOAw7VXmrkyB05DdYZit0AEBqpLkgv4"},{"article_description":null,"article_title":null,"article_url":null,"author_headline":"Deploying enterprise agents in production / CTO / SWE Leader / GVP @ Publicis Sapient","author_name":"Ravi Evani\n              \n                \n                   \n    \n      \n    \n    \n      \n    \n\n • You","author_profile_image_url":"https://media.licdn.com/dms/image/v2/C4E03AQGNeJRorEd2Nw/profile-displayphoto-shrink_100_100/profile-displayphoto-shrink_100_100/0/1569287114631?e=1784160000&v=beta&t=tJDZC7EXWnlgIIf8kF7fBCajhF-HEgzNXnz_IIkjqW8","author_profile_url":"https://www.linkedin.com/in/ravievani","has_image":true,"impression_count":1405,"is_article":false,"is_my_post":true,"is_video":true,"post_image_url":"https://media.licdn.com/dms/image/v2/D4E05AQGlMgyYIITZ9w/feedshare-thumbnail_720_1280/B4EZQm831kGYA8-/0/1735820280680?e=1782932400&v=beta&t=wkPb0HssUetMy7R16c0X-x475970-F6veKcEtBnsvfg","post_text":"How you debug software is changing! AI coding agents are demanding faster higher-level thinking from developers, especially for debugging and troubleshooting problems.\n\nWe're noticing that assistants, like cursor’s composer agent mode, which iteratively write, run, and debug code—push us to troubleshoot at a higher level and focus on the chunks of logic behind the code rather than the lines of code itself. They also fix basic errors so quickly that we lose the buffer of time to step through and internalize each line like we used to (see clip).\n\nThis means we now have to make bigger-picture logical decisions faster, which is a new challenge. Here’s why:\n\nSpecification Clarity Over Syntax:\nWhen you delegate coding tasks to an agent, ambiguity in your low level requirements becomes the real bug. Fixes center on tightening your specs and instructions, rather than tweaking individual lines.\n\nThinking in Systems:\nWith routine errors handled, you need to step back and consider input conditions and edge cases that the AI did not. The “code” is easy; defining the right context and coverage is the challenge.\n\nAccelerated Focus:\nIt’s now about translating problems into unambiguous instructions and validating assumptions. You still debug, but in larger chunks, at an accelerated level—ensuring your logic aligns with the intended outcomes.\n\nGiven this shift, developers should refocus their efforts on learning to clarify specifications, anticipating edge cases, and making rapid, high-level decisions while AI handles the details.\n===\n\nhashtag#ai hashtag#aiEngineering\nP.S.: Clip of an ai agent executing, debugging, troubleshooting, fixing and repeating the cycle.","post_url":"https://www.linkedin.com/feed/update/urn:li:activity:7280558082496069633","post_urn":"urn:li:activity:7280558082496069633","posted_hours_ago":8760,"posted_time":"2025-06-24","posted_time_raw":"1yr","reaction_count":11,"reaction_types":"LIKE, INTEREST","source":"activity","video_url":"https://media.licdn.com/dms/image/v2/D4E05AQGlMgyYIITZ9w/feedshare-thumbnail_720_1280/B4EZQm831kGYA8-/0/1735820280680?e=1782932400&v=beta&t=wkPb0HssUetMy7R16c0X-x475970-F6veKcEtBnsvfg"},{"article_description":null,"article_title":null,"article_url":null,"author_headline":"Deploying enterprise agents in production / CTO / SWE Leader / GVP @ Publicis Sapient","author_name":"Ravi Evani\n              \n                \n                   \n    \n      \n    \n    \n      \n    \n\n • You","author_pr t our vibrant Publicis Sapient booth to hear his take on how both new and seasoned professionals can adapt to this transformative shift.","post_url":"https://www.linkedin.com/feed/update/urn:li:activity:7270869745610981376","post_urn":"urn:li:activity:7270869745610981376","posted_hours_ago":8760,"posted_time":"2025-06-24","posted_time_raw":"1yr","reaction_count":137,"reaction_types":"LIKE, EMPATHY, PRAISE","repost_count":2,"source":"activity","video_url":"https://media.licdn.com/dms/image/v2/D4E05AQEg9Nk2IzRHlQ/videocover-low/videocover-low/0/1733510389020?e=1782932400&v=beta&t=s6Y_aWlNiGO6_9_aFK8xMftEL5Y5oVKj2GN4jAdLc8E"},{"article_description":"The Amazon Nova family of models: Technical report and model card\namazon.science","article_title":"The Amazon Nova family of models: Technical report and model card","article_url":"https://www.amazon.science/publications/the-amazon-nova-family-of-models-technical-report-and-model-card","author_headline":"Deploying enterprise agents in production / CTO / SWE Leader / GVP @ Publicis Sapient","author_name":"Ravi Evani\n              \n                \n                   \n    \n      \n    \n    \n      \n    \n\n • You","author_profile_image_url":"https://media.licdn.com/dms/image/v2/C4E03AQGNeJRorEd2Nw/profile-displayphoto-shrink_100_100/profile-displayphoto-shrink_100_100/0/1569287114631?e=1784160000&v=beta&t=tJDZC7EXWnlgIIf8kF7fBCajhF-HEgzNXnz_IIkjqW8","author_profile_url":"https://www.linkedin.com/in/ravievani","has_image":true,"impression_count":1299,"is_article":true,"is_my_post":true,"is_video":false,"post_image_url":"https://media.licdn.com/dms/image/sync/v2/D4E27AQEcFT6xaaKavg/articleshare-shrink_480/articleshare-shrink_480/0/1733249331812?e=1782932400&v=beta&t=ByEaoZ0wofmDOVm2Z0k0vZ4CikstBD5twJdPq5PpTR0","post_text":"All the big players now have solid LLMs, just like they've had solid databases. So the value now comes from what's between the user and the engine. Same as it's always been.","post_url":"https://www.linkedin.com/feed/update/urn:li:activity:7270095301229662209","post_urn":"urn:li:activity:7270095301229662209","posted_hours_ago":8760,"posted_time":"2025-06-24","posted_time_raw":"1yr","reaction_count":12,"reaction_types":"LIKE, EMPATHY","source":"activity","video_url":null},{"article_description":null,"article_title":null,"article_url":null,"author_headline":"Deploying enterprise agents in production / CTO / SWE Leader / GVP @ Publicis Sapient","author_name":"Ravi Evani\n              \n                \n                   \n    \n      \n    \n    \n      \n    \n\n • You","author_profile_image_url":"https://media.licdn.com/dms/image/v2/C4E03AQGNeJRorEd2Nw/profile-displayphoto-shrink_100_100/profile-displayphoto-shrink_100_100/0/1569287114631?e=1784160000&v=beta&t=tJDZC7EXWnlgIIf8kF7fBCajhF-HEgzNXnz_IIkjqW8","author_profile_url":"https://www.linkedin.com/in/ravievani","comment_count":1,"has_image":true,"impression_count":1211,"is_article":false,"is_my_post":true,"is_video":false,"post_image_url":"https://media.licdn.com/dms/image/v2/D4E22AQE33upp7imM5w/feedshare-shrink_800/feedshare-shrink_800/0/1733157184514?e=1784160000&v=beta&t=VR_ckBOx4FRhv57rlOD4SeuNuFMOz-phU9KR23yERDQ","post_text":"Your PMs perfect backlogs. Designers craft pixel-polished screens. Devs write pristine code. Yet your AI still under-delivers. Why?\n\nYour team's spending 90% of time building scaffolding, while prompt engineering—the brain of your AI, gets table scraps.\n\nThe harsh truth about enterprise gen AI development is that the core of the solution that derives the \"intelligence\", i.e. prompt engineering gets a fraction of the time and effort it really should.\n\nWhy? Teams tend to gravitate toward their comfort zones—leaving the critical but squishy, uncharted territory of crafting, evaluating, and iterating on prompts underinvested. Yet, this uncharted territory is where the biggest gains in intelligence and value are unlocked.\n\nA well-designed prompt chain can unlock the model’s full potential, while settling for mediocrity leaves considerable value on the table.\n\nTime to flip the script. Here are your key moves to invest considerable time and effort in prompt engineering:\n① Go beyond \"It works\": Analyze model outputs closely.\n② Build resilience: Evaluate and refine for (the numerous) edge cases.\n③Track the logic: Understand the model's reasoning and adapt accordingly.\n④Context is king: Guide with semantically significant data.\n\nNail these, and you have a much better chance of delivering real enterprise value—not just demos that \"work\".\n\nhashtag#ai hashtag#aiEngineering","post_url":"https://www.linkedin.com/feed/update/urn:li:activity:7269388118976335875","post_urn":"urn:li:activity:7269388118976335875","posted_hours_ago":8760,"posted_time":"2025-06-24","posted_time_raw":"1yr","reaction_count":16,"reaction_types":"LIKE, EMPATHY","repost_count":1,"source":"activity","video_url":null},{"article_description":null,"article_title":null,"article_url":null,"author_headline":"Deploying enterprise agents in production / CTO / SWE Leader / GVP @ Publicis Sapient","author_name":"Ravi Evani\n              \n                \n                   \n    \n      \n    \n    \n      \n    \n\n • You","author_profile_image_url":"https://media.licdn.com/dms/image/v2/C4E03AQGNeJRorEd2Nw/profile-displayphoto-shrink_100_100/profile-displayphoto-shrink_100_100/0/1569287114631?e=1784160000&v=beta&t=tJDZC7EXWnlgIIf8kF7fBCajhF-HEgzNXnz_IIkjqW8","author_profile_url":"https://www.linkedin.com/in/ravievani","comment_count":1,"has_image":true,"impression_count":2667,"is_article":false,"is_my_post":true,"is_video":true,"post_image_url":"https://media.licdn.com/dms/image/v2/D4E05AQGBshw-p4YXAQ/videocover-high/videocover-high/0/1732831613218?e=1782932400&v=beta&t=tALhHbEmQhrZrSUZtiyH-nKvnFJ_72Rvmir95t1LGSo","post_text":"The Key to AI Upskilling: Make it part of the work—not extra work!\n▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬\nHere's a clip from a discussion led by ,"has_image":true,"impression_count":19786,"is_article":false,"is_my_post":true,"is_video":false,"post_image_url":"https://media.licdn.com/dms/image/v2/D4E22AQEeJ8ffk1HNjA/feedshare-shrink_800/feedshare-shrink_800/0/1732206434792?e=1784160000&v=beta&t=pTkEo14V5QXMdrU1kcD1Cle5zzhn-YQGOzdPsmdpxSk","post_text":"AI Engineering + Curiosity + Laughter: The Perfect Stack!\n\n28 of our NA Engineering leaders flew into Boston to crush it with code, curiosity, and camaraderie. An epic day watching them dive into agent development. Because when leaders roll up their sleeves and go hands-on, our teams soar and our clients win! 🌟🚀\n\nhashtag#ai hashtag#aiEngineering Publicis Sapient\nRachit Amit Thanu Jibi Avnish Bryan Malini Ashutosh 🌐Saurabh Nirav Hansraj Gopal Michael Keemti Deepak Anshul Utsav Silas Deepak Joe Reid Mihir Manpreet Balaji Pratyush Laura Gigi Sarah","post_url":"https://www.linkedin.com/feed/update/urn:li:activity:7265400384523833346","post_urn":"urn:li:activity:7265400384523833346","posted_hours_ago":8760,"posted_time":"2025-06-24","posted_time_raw":"1yr","reaction_count":274,"reaction_types":"LIKE, PRAISE, EMPATHY","repost_count":4,"source":"activity","video_url":null},{"article_description":null,"article_title":null,"article_url":null,"author_headline":"Deploying enterprise agents in production / CTO / SWE Leader / GVP @ Publicis Sapient","author_name":"Ravi Evani\n              \n                \n                   \n    \n      \n    \n    \n      \n    \n\n • You","author_profile_image_url":"https://media.licdn.com/dms/image/v2/C4E03AQGNeJRorEd2Nw/profile-displayphoto-shrink_100_100/profile-displayphoto-shrink_100_100/0/1569287114631?e=1784160000&v=beta&t=tJDZC7EXWnlgIIf8kF7fBCajhF-HEgzNXnz_IIkjqW8","author_profile_url":"https://www.linkedin.com/in/ravievani","comment_count":2,"has_image":true,"impression_count":1895,"is_article":false,"is_my_post":true,"is_video":false,"post_image_url":"https://media.licdn.com/dms/image/v2/D4E22AQEgPvBaU_TTGw/feedshare-shrink_800/feedshare-shrink_800/0/1732021487463?e=1784160000&v=beta&t=nsa2-5T435DIM8aa37PuM_UvjMeOrC9jBAsieEOqeQA","post_text":"Open AI's function calling approach is risky for non-trivial enterprise AI agents. Here is how to bring in your own safety net.\n\nUsing OpenAI’s approach (https://lnkd.in/eRA2XjU6) and letting the LLM decide which function to call and with what arguments can lead to serious issues—like persisting incorrect data in your systems.\n\nHere’s a safer approach:\n① LLM Suggests, You Validate: Have the LLM provide structured output with suggested function calls, arguments, and reasoning for its choices.\n② Your App Decides: Your app evaluates the LLM’s reasoning, deterministically deciding if the function call and arguments make sense given the context.\n③ Fallback for Edge Cases: If your app is unable to deterministically decide for certain conditions, either:\n↳ Do nothing (no-op) and inform the user / client,\n↳ Prompt the LLM for more clarity, or\n↳ Proceed with the LLM’s suggestion if the risk is acceptable.\n\nThis ensures that for most anticipated scenarios, you reduce inappropriate function calls and arguments while maintaining control.\n\nDeterministic validation is the key to safer, smarter agentic AI.","post_url":"https://www.linkedin.com/feed/update/urn:li:activity:7264624655573958657","post_urn":"urn:li:activity:7264624655573958657","posted_hours_ago":8760,"posted_time":"2025-06-24","posted_time_raw":"1yr","reaction_count":29,"reaction_types":"LIKE, APPRECIATION","source":"activity","video_url":null},{"article_description":null,"article_title":null,"article_url":null,"author_headline":"Deploying enterprise agents in production / CTO / SWE Leader / GVP @ Publicis Sapient","author_name":"Ravi Evani\n              \n                \n                   \n    \n      \n    \n    \n      \n    \n\n • You","author_profile_image_url":"https://media.licdn.com/dms/image/v2/C4E03AQGNeJRorEd2Nw/profile-displayphoto-shrink_100_100/profile-displayp s://media.licdn.com/dms/image/v2/D4E05AQGk2UOWxcAPRQ/videocover-high/videocover-high/0/1731200118307?e=1782932400&v=beta&t=rfDEu0KH-CmuP-GIASIpO_JX5OYdTry7-No4erHpofQ","post_text":"A throwback to Indian mythology, exploring the evolving bond between software engineers and AI codebots.\n\nhashtag#ai hashtag#EngineeringNext hashtag#YouandAI Publicis Sapient\n\n==\nP.S: If you want to move from AI hype to reality—take a look at my perspective on where to direct your AI focus in 2025: https://lnkd.in/eHmx-PqB","post_url":"https://www.linkedin.com/feed/update/urn:li:activity:7261179953709215744","post_urn":"urn:li:activity:7261179953709215744","posted_hours_ago":8760,"posted_time":"2025-06-24","posted_time_raw":"1yr","reaction_count":133,"reaction_types":"LIKE, EMPATHY, INTEREST","repost_count":5,"source":"activity","video_url":"https://media.licdn.com/dms/image/v2/D4E05AQGk2UOWxcAPRQ/videocover-high/videocover-high/0/1731200118307?e=1782932400&v=beta&t=rfDEu0KH-CmuP-GIASIpO_JX5OYdTry7-No4erHpofQ"},{"article_description":null,"article_title":null,"article_url":null,"author_headline":"Deploying enterprise agents in production / CTO / SWE Leader / GVP @ Publicis Sapient","author_name":"Ravi Evani\n              \n                \n                   \n    \n      \n    \n    \n      \n    \n\n • You","author_profile_image_url":"https://media.licdn.com/dms/image/v2/C4E03AQGNeJRorEd2Nw/profile-displayphoto-shrink_100_100/profile-displayphoto-shrink_100_100/0/1569287114631?e=1784160000&v=beta&t=tJDZC7EXWnlgIIf8kF7fBCajhF-HEgzNXnz_IIkjqW8","author_profile_url":"https://www.linkedin.com/in/ravievani","comment_count":3,"has_image":true,"impression_count":1728,"is_article":false,"is_my_post":true,"is_video":false,"post_image_url":"https://media.licdn.com/dms/image/v2/D4E22AQETG4Xs5-QPnA/feedshare-shrink_800/feedshare-shrink_800/0/1729650793587?e=1784160000&v=beta&t=AttUEiadg-aGfKuXtZLOMm6rEr-G3JiSVoHx1TjERX0","post_text":"Gone might be the days of watching hotel staff play keyboard Olympics. Here is how hotel check-ins could change —with Claude (AI) using the computer (https://lnkd.in/e4-2QZXa) and juggling through the myriad of apps that hotel associates grapple with today.\n\n=======================================\n[BEGIN Scene: Upscale hotel lobby. Evening.]\n\nSARAH (Front Desk Associate): Welcome to Palmer Hotel!\n\nGUEST: Hi, checking in - James Martinez.\n\nCLAUDE (listening via microphone and speaking to Sarah via earpiece): Found. 5 nights, king suite. Repeat guest from Seattle. Gold member.\n\nSARAH (maintaining eye contact): Wonderful to have you, Mr. Martinez. Your king suite is ready.\n\nGUEST (surprised): That was fast - didn't even see you check a computer!\n\nCLAUDE (via earpiece into Sarah's ear): Room 1542 assigned. Digital key generated. Restaurant has salmon special - matches guest's previous room service.\n\nSARAH: We aim for effortless here. (smiling) By the way, our chef has an amazing salmon special tonight. As a Gold member, I can get you a preferred seating.\n\nGUEST: How did you know I like salmon? (impressed) Yes, please!\n\nCLAUDE (via earpiece, only Sarah hears): Booking dinner, 7:30 PM. Sending welcome package to room.\n\nSARAH: Perfect - you're set for dinner at 7:30, and your room key is ready on your phone. Room 1542 has a lovely sunset view you can catch if you head up now.\n\nGUEST (heading to elevator): Best check-in ever. Thanks!\n\nCLAUDE (to Sarah): Check-in complete. Next guest: Anniversary couple, 2 minutes out.\n\nSARAH (quietly): Thanks, Claude.\n\n[END]\n\n=======================================\n\nThe future of hospitality isn't about replacing humans – it's about letting us be more human.\n\nhashtag#genAI hashtag#Travel hashtag#Hospitality","post_url":"https://www.linkedin.com/feed/update/urn:li:activity:7254681248290291712","post_urn":"urn:li:activity:7254681248290291712","posted_hours_ago":8760,"posted_time":"2025-06-24","posted_time_raw":"1yr","reaction_count":34,"reaction_types":"LIKE, EMPATHY, PRAISE","source":"activity","video_url":null},{"article_description":null,"article_title":null,"article_url":null,"author_headline":"Deploying enterprise agents in production / CTO / SWE Leader / GVP @ Publicis Sapient","author_name":"Ravi Evani\n              \n                \n                   \n    \n      \n    \n    \n      \n    \n\n • You","author_profile_image_url":"https://media.licdn.com/dms/image/v2/C4E03AQGNeJRorEd2Nw/profile-displayphoto-shrink_100_100/profile-displayphoto-shrink_100_100/0/1569287114631?e=1784160000&v=beta&t=tJDZC7EXWnlgIIf8kF7fBCajhF-HEgzNXnz_IIkjqW8","author_profile_url":"https://www.linkedin.com/in/ravievani","has_image":true,"impression_count":1774,"is_article":false,"is_my_post":true,"is_video":true,"post_image_url":"https://media.licdn.com/dms/image/v2/D4E05AQFh7MneKKXlnw/videocover-high/videocover-high/0/1729569229596?e=1782932400&v=beta&t=O2COCV5U8z54tGdnD7gwxK31XP0dwvaRayf-E4PToX0","post_text":"2025 Prediction: Travel, Dining & Hospitality Enterprise AI Agents will NOT automate entire workflows, tasks, or subtasks. But those atomic steps? That's where the magic could likely happen.\n\nRestaurant:\nQ: \"Will AI Agents automate our kitchen quality control?\"\nA: \"Think smaller, but useful - it'll scan Yelp reviews and auto-flag exactly which dishes are getting complaints about taste. Not the whole prep workflow, just that one specific quality check step.\"\n\nHotel:\nQ: \"Will AI Agents automate our room availability updates?\"\nA: \"Think smaller, but useful - it'll monitor incoming guest messages and auto-detect which 'early check-in' requests can actually be accommodated based on real-time room turnover data. Just that one decision point, not the whole check-in process.\"\n\nAirline:\nQ: \"Will AI Agents automate our delay compensation process?\"\nA: \"Think smaller, but useful - when a flight is delayed, it'll automatically calculate optimal meal voucher amounts based on delay time and passenger class. Just that specific calculation step, not the whole rebooking process.\"\n\nhashtag#ai hashtag#Travel hashtag#Hospitaity hashtag#Dining","post_url":"https://www.linkedin.com/feed/update/urn:li:activity:7254339211149955072","post_urn":"urn:li:activity:7254339211149955072","posted_hours_ago":8760,"posted_time":"2025-06-24","posted_time_raw":"1yr","reaction_count":27,"reaction_types":"LIKE, EMPATHY, PRAISE","source":"activity","video_url":"https://media.licdn.com/dms/image/v2/D4E05AQFh7MneKKXlnw/videocover-high/videocover-high/0/1729569229596?e=1782932400&v=beta&t=O2COCV5U8z54tGdnD7gwxK31XP0dwvaRayf-E4PToX0"},{"article_description":null,"article_title":null,"article_url":null,"author_headline":"Deploying enterprise agents in production / CTO / SWE Leader / GVP @ Publicis Sapient","author_name":"Ravi Evani\n              \n                \n                   \n    \n      \n    \n    \n      \n    \n\n • You","author_profile_image_url":"https://media.licdn.com/dms/image/v2/C4E03AQGNeJRorEd2Nw/profile-displayphoto-shrink_100_100/profile-displayphoto-shrink_100_100/0/1569287114631?e=1784160000&v=beta&t=tJDZC7EXWnlgIIf8kF7fBCajhF-HEgzNXnz_IIkjqW8","author_profile_url":"https://www.linkedin.com/in/ravievani","comment_count":2,"has_image":true,"impression_count":6634,"is_article":false,"is_my_post":true,"is_video":true,"post_image_url":"https://media.licdn.com/dms/image/v2/D4E05AQE3Af5FTzcmng/videocover-high/videocover-high/0/1729373069054?e=1782932400&v=beta&t=LZYQZGlilHl9H5ecfKI9bpfIxfHtZQzploYlLiStS_0","post_text":"Demo of creating a Data Product on Google Cloud using Slingshot, our AI-assisted SDLC platform.\n\nIn this Data Product, we're combining customer profiles, transaction data, and behavior insights to power personalized marketing across owned and paid channels. See how quickly it all comes together!\n\nAbhishek Kapoor Sameer Arora Violette dos Santos\n\nPublicis Sapient hashtag#genAI hashtag#AAA","post_url":"https://www.linkedin.com/feed/update/urn:li:activity:7253516750426632193","post_urn":"urn:li:activity:7253516750426632193","posted_hours_ago":8760,"posted_time":"2025-06-24","posted_time_raw":"1yr","reaction_count":85,"reaction_types":"LIKE, EMPATHY, PRAISE","repost_count":8,"source":"activity","video_url":"https://media.licdn.com/dms/image/v2/D4E05AQE3Af5FTzcmng/videocover-high/videocover-high/0/1729373069054?e=1782932400&v=beta&t=LZYQZGlilHl9H5ecfKI9bpfIxfHtZQzploYlLiStS_0"},{"article_description":null,"article_title":null,"article_url":null,"author_headline":"Deploying enterprise agents in production / CTO / SWE Leader / GVP @ Publicis Sapient","author_name":"Ravi Evani\n              \n                \n                   \n    \n      \n    \n    \n      \n    \n\n • You","author_profile_image_url":"https://media.licdn.com/dms/image/v2/C4E03AQGNeJRorEd2Nw/profile-displayphoto-shrink_100_100/profile-displayphoto-shrink_100_100/0/1569287114631?e=1784160000&v=beta&t=tJDZC7EXWnlgIIf8kF7fBCajhF-HEgzNXnz_IIkjqW8","author_profile_url":"https://www.linkedin.com/in/ravievani","has_image":true,"impression_count":2317,"is_article":false,"is_my_post":true,"is_video":false,"post_image_url":"https://media.licdn.com/dms/image/v2/D4E22AQGBFSvXRGG_hQ/feedshare-shrink_800/feedshare-shrink_800/0/1728985287673?e=1784160000&v=beta&t=iYhfSbf6DaQq1zRYqksyh1XuUye2o8Wnf4WeEa2jWus","post_text":"Yes, we have AI – but let’s also make sure we’re using the right tool for the job.\n\nHere is a mental model I have found useful for real world business applications:\n\n➜ If a task can be predetermined, then stick with traditional programming. It's predictable, reliable and less likely to land you in trouble.\n\n➜ If a task can be predetermined, but AI gets you there faster and efficiently with human judgment as quality control, then go with AI+Human.\n\n➜ If a task cannot be predetermined, then go with AI+Human, or Human only.\n\nWhat do you think?\n\nhashtag#ai hashtag#genai","post_url":"https://www.linkedin.com/feed/update/urn:li:activity:7251889911056711681","post_urn":"urn:li:activity:7251889911056711681","posted_hours_ago":8760,"posted_time":"2025-06-24","posted_time_raw":"1yr","reaction_count":39,"reaction_types":"LIKE, INTEREST, EMPATHY","source":"activity","video_url":null},{"article_description":null,"article_title":null,"article_url":null,"author_headline":"Deploying enterprise agents in production / CTO / SWE Leader / GVP @ Publicis Sapient","author_name":"Ravi Evani\n              \n                \n                   \n    \n      \n    \n    \n      \n    \n\n • You","author_profile_image_url":"https://media.licdn.com/dms/image/v2/C4E03AQGNeJRorEd2Nw/profile-displayphoto-shrink_100_100/profile-displayphoto-shrink_100_100/0/1569287114631?e=1784160000&v=beta&t=tJDZC7EXWnlgIIf8kF7fBCajhF-HEgzNXnz_IIkjqW8","author_profile_url":"https://www.linkedin.com/in/ravievani","comment_count":1,"has_image":false,"impression_count":1782,"is_article":false,"is_my_post":true,"is_video":false,"post_image_url":null,"post_text":"As AI continues to be integrated into travel and hospitality systems, two clear approaches emerge for handling situations where the model doesn't fully understand what the user wants. These can be thought of as \"pre\" and \"post\" strategies.\n\nThe \"pre\" strategy involves asking the user for more details up front, like saying, \"I’m not sure how to handle this part of your request—could you clarify?\" The \"post\" strategy involves providing several possible results (with reasoning) based on uncertainty in the query, and letting the user easily select the most appropriate ones.\n\nAI Engineers need to seamlessly incorporate these strategies into User Interfaces of these \"intelligent systems\". Generating random or irrelevant outputs when intent is unclear, and leaving users to struggle with them, is not an acceptable standard.\n\nhashtag#genAI hashtag#Travel hashtag#Hospitality","post_url":"https://www.linkedin.com/feed/update/urn:li:activity:7251597258247274496","post_urn":"urn:li:activity:7251597258247274496","posted_hours_ago":8760,"posted_time":"2025-06-24","posted_time_raw":"1yr","reaction_count":35,"reaction_types":"LIKE, EMPATHY, INTEREST","source":"activity","video_url":null},{"article_description":null,"article_title":null,"article_url":null,"author_headline":"Deploying enterprise agents in production / CTO / SWE Leader / GVP @ Publicis Sapient","author_name":"Ravi Evani\n              \n                \n                   \n    \n      \n    \n    \n      \n    \n\n • You","author_profile_image_url":"https://media.licdn.com/dms/image/v2/C4E03AQGNeJRorEd2Nw/profile-displayphoto-shrink_100_100/profile-displayphoto-shrink_100_100/0/1569287114631?e=1784160000&v=beta&t=tJDZC7EXWnlgIIf8kF7fBCajhF-HEgzNXnz_IIkjqW8","author_profile_url":"https://www.linkedin.com/in/ravievani","has_image":true,"impression_count":905,"is_article":false,"is_my_post":true,"is_video":false,"post_image_url":"https://media.licdn.com/dms/image/v2/D4E22AQFGIPTK2WMU9w/feedshare-shrink_800/feedshare-shrink_800/0/1728518677082?e=1784160000&v=beta&t=poXUOEnKL9vPIsLtMSKuama-5k1RrzbvcZgF_4fKixM","post_text":"Bugs vs. Bucks: If your AI codebot charged more for higher quality code—would you want max quality? lowest cost? somewhere in the middle?","post_url":"https://www.linkedin.com/feed/update/urn:li:activity:7249932806988951552","post_urn":"urn:li:activity:7249932806988951552","posted_hours_ago":8760,"posted_time":"2025-06-24","posted_time_raw":"1yr","reaction_count":12,"reaction_types":"LIKE, INTEREST, PRAISE","repost_count":1,"source":"activity","video_url":null},{"article_description":null,"article_title":null,"article_url":null,"author_headline":"Deploying enterprise agents in production / CTO / SWE Leader / GVP @ Publicis Sapient","author_name":"Ravi Evani\n              \n                \n                   \n    \n      \n    \n    \n      \n    \n\n • You","author_profile_image_url":"https://media.licdn.com/dms/image/v2/C4E03AQGNeJRorEd2Nw/profile-displayphoto-shrink_100_100/pro
