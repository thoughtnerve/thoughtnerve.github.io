s ai-hedge-fund project is a great educational tool for seeing this hybrid approach in action. It highlights both the potential of AI in complex domains and the continued need for human oversight and critical evaluation.","post_url":"https://www.linkedin.com/feed/update/urn:li:activity:7329679241397088256","post_urn":"urn:li:activity:7329679241397088256","posted_hours_ago":8760,"posted_time":"2025-06-25","posted_time_raw":"1yr","reaction_count":16,"reaction_types":"LIKE, EMPATHY","source":"activity","video_url":null},{"article_description":null,"article_title":null,"article_url":null,"author_headline":"Deploying enterprise agents in production / CTO / SWE Leader / GVP @ Publicis Sapient","author_name":"Ravi Evani\n              \n                \n                   \n    \n      \n    \n    \n      \n    \n\n • You","author_profile_image_url":"https://media.licdn.com/dms/image/v2/C4E03AQGNeJRorEd2Nw/profile-displayphoto-shrink_100_100/profile-displayphoto-shrink_100_100/0/1569287114631?e=1784160000&v=beta&t=tJDZC7EXWnlgIIf8kF7fBCajhF-HEgzNXnz_IIkjqW8","author_profile_url":"https://www.linkedin.com/in/ravievani","comment_count":2,"has_image":true,"impression_count":4216,"is_article":false,"is_my_post":true,"is_video":true,"post_image_url":"https://media.licdn.com/dms/image/v2/D4E05AQFZnmRl8OrFEg/videocover-low/B4EZbRBqXMHABs-/0/1747263686997?e=1782975600&v=beta&t=tpvcMvMfFJSSoK3io_ifl-W84xLR62-B-CBB44GiMls","post_text":"Real-time object detection on the edge!\n\nJason Steiner and I @ Philadephia's Walnut Street Cafe https://lnkd.in/eGwmfitz testing out the Multimodal llama.cpp on Apple silicon, thanks to https://lnkd.in/eWWJ-4ET personalized using Publicis Sapient hashtag#Slingshot w/the LLM running locally on my macbook pro.\n\nSee the response text on the right panel displaying object detection in real-time.","post_url":"https://www.linkedin.com/feed/update/urn:li:activity:7328555093337731074","post_urn":"urn:li:activity:7328555093337731074","posted_hours_ago":8760,"posted_time":"2025-06-25","posted_time_raw":"1yr","reaction_count":66,"reaction_types":"LIKE, EMPATHY, PRAISE","source":"activity","video_url":"https://media.licdn.com/dms/image/v2/D4E05AQFZnmRl8OrFEg/videocover-low/B4EZbRBqXMHABs-/0/1747263686997?e=1782975600&v=beta&t=tpvcMvMfFJSSoK3io_ifl-W84xLR62-B-CBB44GiMls"},{"article_description":null,"article_title":null,"article_url":null,"author_headline":"Deploying enterprise agents in production / CTO / SWE Leader / GVP @ Publicis Sapient","author_name":"Ravi Evani\n              \n                \n                   \n    \n      \n    \n    \n      \n    \n\n • You","author_profile_image_url":"https://media.licdn.com/dms/image/v2/C4E03AQGNeJRorEd2Nw/profile-displayphoto-shrink_100_100/profile-displayphoto-shrink_100_100/0/1569287114631?e=1784160000&v=beta&t=tJDZC7EXWnlgIIf8kF7fBCajhF-HEgzNXnz_IIkjqW8","author_profile_url":"https://www.linkedin.com/in/ravievani","comment_count":2,"has_image":true,"impression_count":624,"is_article":false,"is_my_post":true,"is_video":false,"post_image_url":"https://media.licdn.com/dms/image/v2/D4E22AQGilUcQ0YOddw/feedshare-shrink_800/B4EZbNlh8kHcAk-/0/1747205891916?e=1784160000&v=beta&t=jMFRYVTWT1gDAVZPSAFbhEP_UnTyF_4hF9sz9zXjm30","post_text":"If Transformers are built to focus on what matters most (“attention is all you need”), then our job is to get better at what they ignore.\n\nLLMs are optimized for the average pattern, the dominant signal, the most likely continuation.\n\nBut the edges are where perception, judgment, and experience lead.\n\nWe are the ones who bring context, intuition, and the ability to reason through unfamiliar situations.\n\nWe can connect dots across domains, infer intent, and spot when something “feels off” even if we’ve never seen it before.\n\nSo our real leverage is not in racing AI to the center, but in steering it with our mastery of the margins:\n➜ What’s missing?\n➜ What’s misclassified?\n➜ What’s misunderstood?\n\nThat’s where we focus, and hone in our value.","post_url":"https://www.linkedin.com/feed/update/urn:li:activity:7328312666538610689","post_urn":"urn:li:activity:7328312666538610689","posted_hours_ago":8760,"posted_time":"2025-06-25","posted_time_raw":"1yr","reaction_count":9,"reaction_types":"LIKE","source":"activity","video_url":null},{"article_description":null,"article_title":null,"article_url":null,"author_headline":"Deploying enterprise agents in production / CTO / SWE Leader / GVP @ Publicis Sapient","author_name":"Ravi Evani\n              \n                \n                   \n    \n      \n    \n    \n      \n    \n\n • You","author_profile_image_url":"https://media.licdn.com/dms/image/v2/C4E03AQGNeJRorEd2Nw/profile-displayphoto-shrink_100_100/profile-displayphoto-shrink_100_100/0/1569287114631?e=1784160000&v=beta&t=tJDZC7EXWnlgIIf8kF7fBCajhF-HEgzNXnz_IIkjqW8","author_profile_url":"https://www.linkedin.com/in/ravievani","has_image":true,"impression_count":601,"is_article":false,"is_my_post":true,"is_video":true,"post_image_url":"https://media.licdn.com/dms/image/v2/D4E05AQFgvL-fPMrNuQ/videocover-low/B4EZbF0j87HwBw-/0/1747075618962?e=1782975600&v=beta&t=4txBNnsKDQh3Idz8HD67VgCt12vbkIkJ6bqfEGvecXU","post_text":"Demystifying the logic that powers vibecoding in your favorite AI copilot:\n\nThe functionality that enables vibecoding is the “agent mode” built into IDEs like Cursor, Windsurf, Zed, Cline, and others.\n\nThe interesting thing is most of the logic in the agent mode (except the LLM) is deterministic.\n\nHere’s the general idea of what happens under the hood, when you send a message like: “Refactor this function.” into your IDE agent prompt input box. This is based on Zed IDE source code https://lnkd.in/eJXe58UE","post_url":"https://www.linkedin.com/feed/update/urn:li:activity:7327766301366448128","post_urn":"urn:li:activity:7327766301366448128","posted_hours_ago":8760,"posted_time":"2025-06-25","posted_time_raw":"1yr","reaction_count":6,"reaction_types":"LIKE","source":"activity","video_url":"https://media.licdn.com/dms/image/v2/D4E05AQFgvL-fPMrNuQ/videocover-low/B4EZbF0j87HwBw-/0/1747075618962?e=1782975600&v=beta&t=4txBNnsKDQh3Idz8HD67VgCt12vbkIkJ6bqfEGvecXU"},{"article_description":null,"article_title":null,"article_url":null,"author_headline":"Deploying enterprise agents in production / CTO / SWE Leader / GVP @ Publicis Sapient","author_name":"Ravi Evani\n              \n                \n                   \n    \n      \n    \n    \n      \n    \n\n • You","author_profile_image_url":"https://media.licdn.com/dms/image/v2/C4E03AQGNeJRorEd2Nw/profile-displayphoto-shrink_100_100/profile-displayphoto-shrink_100_100/0/1569287114631?e=1784160000&v=beta&t=tJDZC7EXWnlgIIf8kF7fBCajhF-HEgzNXnz_IIkjqW8","author_profile_url":"https://www.linkedin.com/in/ravievani","comment_count":3,"has_image":true,"impression_count":1113,"is_article":false,"is_my_post":true,"is_video":true,"post_image_url":"https://media.licdn.com/dms/image/v2/D4E05AQGRFDAXbDg2Mw/videocover-low/B4EZa.fX2uHwBw-/0/1746952631294?e=1782975600&v=beta&t=OhOErp4yMwabdQSBY7wwF6s5-FWpT4whyU01WFL1EOg","post_text":"Demystifying the logic that powers vibecoding in your favorite AI copilot:\n\nThe functionality that enables vibecoding is the “agent mode” built into IDEs like Cursor, Windsurf, Zed, Cline, and others.\n\nThe interesting thing is most of the logic in the agent mode (except the LLM) is deterministic.\n\nHere’s the general idea of what happens under the hood, when you send a message like: “Refactor this function.” into your IDE agent prompt input box. This is based on Zed IDE source code https://lnkd.in/eJXe58UE\n\n→ First the IDE system spins up an active thread that creates a message object for the prompt. It calls the context system to fetch anything relevant—files, symbols, previous chats, rules, etc. relevant to the user intent.\n\n→ Next, as part of the context gathering, a Context Picker selects what to include – this can be user driven or auto-selected. A Context Store loads data from available sources and the result is a rich, structured context data sent along with your prompt\n\n→ Then comes the LLM request, where a model selector picks the right LLM for the job. The IDE sends both prompt + context to the LLM for processing.\nAt this point the LLM could determine if a tool call is needed, such as reading a file, accessing the terminal, editing the file and so on.\n\n→ The IDE then invokes the right tool (e.g., EditFileTool). The tool executes and returns results, which are routed back to the LLM to continue reasoning. And this cycle may repeat until the task is complete, in which case the LLM might return a response such as the source code and a text explanation.\n\n→ This response is shown in the IDE. If diffs are involved (like code edits), tools like Code Diff or Terminal Codegen render and apply them.\n\n→ The user reviews the output and decides to continue the thread, edit the prompt, or start fresh.\n\n☆ So that’s it: It’s not just an “AI chatbot”, but rather, a fully orchestrated system with tons of deterministic code that manages context, models, tools, and interaction flow.","post_url":"https://www.linkedin.com/feed/update/urn:li:activity:7327676818818232320","post_urn":"urn:li:activity:7327676818818232320","posted_hours_ago":8760,"posted_time":"2025-06-25","posted_time_raw":"1yr","reaction_count":14,"reaction_types":"LIKE, INTEREST","source":"activity","video_url":"https://media.licdn.com/dms/image/v2/D4E05AQGRFDAXbDg2Mw/videocover-low/B4EZa.fX2uHwBw-/0/1746952631294?e=1782975600&v=beta&t=OhOErp4yMwabdQSBY7wwF6s5-FWpT4whyU01WFL1EOg"},{"article_description":null,"article_title":null,"article_url":null,"author_headline":"Deploying enterprise agents in production / CTO / SWE Leader / GVP @ Publicis Sapient","author_name":"Ravi Evani\n              \n                \n                   \n    \n      \n    \n    \n      \n    \n\n • You","author_profile_image_url":"https://media.licdn.com/dms/image/v2/C4E03AQGNeJRorEd2Nw/profile-displayphoto-shrink_100_100/profile-displayphoto-shrink_100_100/0/1569287114631?e=1784160000&v=beta&t=tJDZC7EXWnlgIIf8kF7fBCajhF-HEgzNXnz_IIkjqW8","author_profile_url":"https://www.linkedin.com/in/ravievani","has_image":true,"impression_count":851,"is_article":false,"is_my_post":true,"is_video":false,"post_image_url":"https://media.licdn.com/dms/image/v2/D4E22AQFjlPWLXH4ibQ/feedshare-shrink_800/B4EZa55RgYHwAg-/0/1746875522596?e=1784160000&v=beta&t=JtdgEd5JaF8km5nwEA-P6msJutHdCqELKJ0E0-axpJI","post_text":"Figuring out \"who said what\" just got better with NVIDIA NeMo’s recent updates. Adobe Premiere Pro, I love your tools, but your transcription feature needs this, yesterday.\n\nMulti-speaker content is everywhere. Figuring out who said what shouldn’t be messy in a transcript!\n\nHere’s how NeMo handles it: https://lnkd.in/e7cMYCWG\n\n☆ Step 1: Voice Activity Detection (VAD)\n→ Finds only the parts of audio that contain actual speech—skipping silence and noise.\n\n☆ Step 2: Speaker Embedding + Clustering\n→ Breaks speech into segments, generates voice fingerprints, and clusters them into speakers.\n→This is the heart of the \"diarization\"—grouping voices by identity without needing names.\n\n☆ Step 3: Refinement\n→ Applies smoothing (e.g., MSDD) to polish boundaries and speaker shifts.\n→ Output: “who spoke when” in RTTM or similar formats.\n\n☆ Step 4: ASR Integration\n→ Run speech-to-text on each speaker segment.\n→ Final output: timestamped, speaker-tagged transcription.\n\nThis feels production-grade. Time for popular content & collaboration tools to level up!","post_url":"https://www.linkedin.com/feed/update/urn:li:activity:7326926997899603968","post_urn":"urn:li:activity:7326926997899603968","posted_hours_ago":8760,"posted_time":"2025-06-25","posted_time_raw":"1yr","reaction_count":8,"reaction_types":"LIKE, INTEREST, PRAISE","source":"activity","video_url":null},{"article_description":null,"article_title":null,"article_url":null,"author_headline":"Deploying enterprise agents in production / CTO / SWE Leader / GVP @ Publicis Sapient","author_name":"Ravi Evani\n              \n                \n                   \n    \n      \n    \n    \n      \n    \n\n • You","author_profile_image_url":"https://media.licdn.com/dms/image/v2/C4E03AQGNeJRorEd2Nw/profile-displayphoto-shrink_100_100/profile-displayphoto-shrink_100_100/0/1569287114631?e=1784160000&v=beta&t=tJDZC7EXWnlgIIf8kF7fBCajhF-HEgzNXnz_IIkjqW8","author_profile_url":"https://www.linkedin.com/in/ravievani","comment_count":3,"has_image":true,"impression_count":1204,"is_article":false,"is_my_post":true,"is_video":false,"post_image_url":"https://media.licdn.com/dms/image/v2/D4E22AQH3JdRi_KOz_A/feedshare-shrink_800/B4EZa1ISZwHoAs-/0/1746795571956?e=1784160000&v=beta&t=y5eKl4tUHN0WLNXFWKVzZQE3xfgIrJ7-LWWZQf0yP24","post_text":"Here’s how to implement a two-tier RAG setup for integrating with your personal knowledge base. Inspired by Surf Sense, https://lnkd.in/etAbJzCP, the currently trending OSS alternative to NotebookLM.\n\n☆ Overview\nYou’re building a RAG system that:\n↳Leverages hierarchical retrieval (summaries first, then details)\n↳Uses hybrid search (semantic + keyword) with Reciprocal Rank Fusion (RRF)\nIs exposed as a RAG-as-a-Service API\n\n☆ System Flow\n↳User submits query → hits the RAGaaS API\n↳Tier 1: Hybrid Search + RRF on summaries → identify relevant documents\n↳Tier 2: Hybrid Search + RRF on chunks from top documents → fetch detailed context\n↳Augmentation: Combine original query + retrieved chunks → feed to LLM\nLLM generates → final response is returned to the user\n\n☆ Tier 1: Summary-Level Retrieval\nGoal: Narrow down the search space by retrieving high-level document summaries or section overviews.\n\nIndexing: Create a Tier 1 vector index of document-level or section-level summaries.\nSearch: Use both:\n↳Semantic Search (e.g., OpenAI embeddings + FAISS)\n↳Full-Text Search (e.g., Elasticsearch or BM25)\n\nFusion: Combine ranked lists using Reciprocal Rank Fusion (RRF) to balance precision and recall.\nOutput: Top N summaries or document IDs passed to Tier 2.\n\n☆ Tier 2: Detailed Chunk Retrieval\nGoal: Retrieve fine-grained, contextually rich chunks from within the top summaries identified in Tier 1.\n\nIndexing: Break full documents into small semantic chunks (e.g., 100–300 tokens), each tagged with its parent document ID.\nSearch: Again use hybrid search (semantic + BM25).\nFusion: Apply RRF again on the chunk-level results.\nOutput: Return the most relevant chunks for grounding the LLM.\n\n☆ RAG-as-a-Service (API Layer)\nThis backend handles:\n↳Receiving the user’s query\n↳Orchestrating Tier 1 and Tier 2 retrievals\n↳Passing the query + retrieved context into an LLM (e.g., OpenAI, Azure OpenAI, Ollama)\n↳Returning the generated answer\n\n☆Tech Stack (Example)\nSemantic Search➜OpenAI Embeddings + FAISS\nFull-Text Search➜Elasticsearch or Weaviate\nRRF➜Custom Python (or built into some retrieval libraries)\nLLM➜OpenAI, Ollama, or Azure OpenAI\nAPI Layer➜FastAPI or Express.js\nStorage➜Postgres / S3 for source docs + metadata","post_url":"https://www.linkedin.com/feed/update/urn:li:activity:7326591660274892804","post_urn":"urn:li:activity:7326591660274892804","posted_hours_ago":8760,"posted_time":"2025-06-25","posted_time_raw":"1yr","reaction_count":17,"reaction_types":"LIKE, INTEREST","source":"activity","video_url":null},{"article_description":null,"article_title":null,"article_url":null,"author_headline":"Deploying enterprise agents in production / CTO / SWE Leader / GVP @ Publicis Sapient","author_name":"Ravi Evani\n              \n                \n                   \n    \n      \n    \n    \n      \n    \n\n • You","author_profile_image_url":"https://media.licdn.com/dms/image/v2/C4E03AQGNeJRorEd2Nw/profile-displayphoto-shrink_100_100/profile-displayphoto-shrink_100_100/0/1569287114631?e=1784160000&v=beta&t=tJDZC7EXWnlgIIf8kF7fBCajhF-HEgzNXnz_IIkjqW8","author_profile_url":"https://www.linkedin.com/in/ravievani","comment_count":4,"has_image":true,"impression_count":3466,"is_article":false,"is_my_post":true,"is_video":true,"post_image_url":"https://media.licdn.com/dms/image/v2/D4E05AQHBJy-nWGWwBA/videocover-low/B4EZZyNblmHcCA-/0/1745672853586?e=1782975600&v=beta&t=kZv9T7iHVQ90TWdECuAVp8oNIr5jzGksGb8Ok7Hazlg","post_text":"Had a great fireside chat with David at Publicis Sapient GENE LATAM Fest ✨—shoutout to Laura and the crew for pulling it together!\n\nWe got into a simple idea: turning wasted meeting time into learning time.\n\nBefore committing your time to any meeting, ask yourself:\n\n🤔 What am I getting out of it?\n🤔 What am I giving to it?\n\nIf the answer to both is “not much”, skip it. Use that time to learn something new.\n\nAnd if someone really wants you in the room? Ask them the same two questions.\n\nProtect your time. Swap your wasted meeting time for learning time!","post_url":"https://www.linkedin.com/feed/update/urn:li:activity:7321882682974523392","post_urn":"urn:li:activity:7321882682974523392","posted_hours_ago":8760,"posted_time":"2025-06-25","posted_time_raw":"1yr","reaction_count":70,"reaction_types":"LIKE, PRAISE, EMPATHY","repost_count":4,"source":"activity","video_url":"https://media.licdn.com/dms/image/v2/D4E05AQHBJy-nWGWwBA/videocover-low/B4EZZyNblmHcCA-/0/1745672853586?e=1782975600&v=beta&t=kZv9T7iHVQ90TWdECuAVp8oNIr5jzGksGb8Ok7Hazlg"},{"article_description":null,"article_title":null,"article_url":null,"author_headline":"Deploying enterprise agents in production / CTO / SWE Leader / GVP @ Publicis Sapient","author_name":"Ravi Evani\n              \n                \n                   \n    \n      \n    \n    \n      \n    \n\n • You","author_profile_image_url":"https://media.licdn.com/dms/image/v2/C4E03AQGNeJRorEd2Nw/profile-displayphoto-shrink_100_100/profile-displayphoto-shrink_100_100/0/1569287114631?e=1784160000&v=beta&t=tJDZC7EXWnlgIIf8kF7fBCajhF-HEgzNXnz_IIkjqW8","author_profile_url":"https://www.linkedin.com/in/ravievani","comment_count":5,"has_image":true,"impression_count":4265,"is_article":false,"is_my_post":true,"is_video":true,"post_image_url":"https://media.licdn.com/dms/image/v2/D4E05AQFc1De9XaVMqg/videocover-high/B4EZZgH9KOHEBk-/0/1745369439499?e=1782975600&v=beta&t=EkKE8bdHr3HMTxs_guIdK3UELGbHouIcsHT_pKjKlTw","post_text":"Yesterday, I was stuck at ATL with a 7-hour flight delay. Time for some vibe coding.\n\nI’ve always wanted to reverse-engineer cool apps—figure out their features and map their use cases.\n\nSo I fired up Publicis Sapient hashtag#Slingshot + Google hashtag#Gemini 2.5 Pro.\n\nWhat I built:\n🔹 A tool that takes a GitHub repo, URL or local filepath\n🔹 Analyzes the codebase\n🔹 Outputs use case diagram of what the app actually does\n\n2 hours of vibe coding, 4 hours of refactoring.\n\nKey learning:\nMake code deterministic wherever possible. Let the LLM focus only on what it must—in this case, extracting use cases. Diagram layout, shape creation, text alignment? Script it. Don’t leave it to chance.\n\nMinimal LLM. Maximum consistency.\n\nHappy vibe coding.","post_url":"https://www.linkedin.com/feed/update/urn:li:activity:7320610058441003008","post_urn":"urn:li:activity:7320610058441003008","posted_hours_ago":8760,"posted_time":"2025-06-25","posted_time_raw":"1yr","reaction_count":66,"reaction_types":"LIKE, PRAISE, EMPATHY","source":"activity","video_url":"https://media.licdn.com/dms/image/v2/D4E05AQFc1De9XaVMqg/videocover-high/B4EZZgH9KOHEBk-/0/1745369439499?e=1782975600&v=beta&t=EkKE8bdHr3HMTxs_guIdK3UELGbHouIcsHT_pKjKlTw"},{"article_description":null,"article_title":null,"article_url":null,"author_headline":"Deploying enterprise agents in production / CTO / SWE Leader / GVP @ Publicis Sapient","author_name":"Ravi Evani\n              \n                \n                   \n    \n      \n    \n    \n      \n    \n\n • You","author_profile_image_url":"https://media.licdn.com/dms/image/v2/C4E03AQGNeJRorEd2Nw/profile-displayphoto-shrink_100_100/profile-displayphoto-shrink_100_100/0/1569287114631?e=1784160000&v=beta&t=tJDZC7EXWnlgIIf8kF7fBCajhF-HEgzNXnz_IIkjqW8","author_profile_url":"https://www.linkedin.com/in/ravievani","comment_count":3,"has_image":true,"impression_count":2020,"is_article":false,"is_my_post":true,"is_video":false,"post_image_url":"https://media.licdn.com/dms/image/v2/D4E22AQHUywAMnKeiSA/feedshare-shrink_800/B4EZZB94nJGYAg-/0/1744863466961?e=1784160000&v=beta&t=lRjRcb5HlF5VvaTGYj90vkFAnptYidkl6foSByOVBPw","post_text":"when your vibe coding agent does those numerous little extras way beyond the one thing you told it to do, remember that's a \"helpful\" upsell billed by the millisecond...","post_url":"https://www.linkedin.com/feed/update/urn:li:activity:7318487821361577984","post_urn":"urn:li:activity:7318487821361577984","posted_hours_ago":8760,"posted_time":"2025-06-25","posted_time_raw":"1yr","reaction_count":19,"reaction_types":"LIKE, ENTERTAINMENT","source":"activity","video_url":null},{"article_description":null,"article_title":null,"article_url":null,"author_headline":"Deploying enterprise agents in production / CTO / SWE Leader / GVP @ Publicis Sapient","author_name":"Ravi Evani\n              \n                \n                   \n    \n      \n    \n    \n      \n    \n\n • You","author_profile_image_url":"https://media.licdn.com/dms/image/v2/C4E03AQGNeJRorEd2Nw/profile-displayphoto-shrink_100_100/profile-displayphoto-shrink_100_100/0/1569287114631?e=1784160000&v=beta&t=tJDZC7EXWnlgIIf8kF7fBCajhF-HEgzNXnz_IIkjqW8","author_profile_url":"https://www.linkedin.com/in/ravievani","comment_count":1,"has_image":true,"impression_count":274,"is_article":false,"is_my_post":true,"is_video":false,"post_image_url":"https://media.licdn.com/dms/image/v2/D4E22AQFGIPTK2WMU9w/feedshare-shrink_800/feedshare-shrink_800/0/1728518677082?e=1784160000&v=beta&t=poXUOEnKL9vPIsLtMSKuama-5k1RrzbvcZgF_4fKixM","post_text":"I posed this question a few months ago when there were far fewer models in play. Now, with model “upsells” becoming the norm and our increasing reliance on vibe coding, this trade-off is more relevant than ever—especially for large enterprises.","post_url":"https://www.linkedin.com/feed/update/urn:li:activity:7318454409330319360","post_urn":"urn:li:activity:7318454409330319360","posted_hours_ago":8760,"posted_time":"2025-06-25","posted_time_raw":"1yr","reaction_count":2,"reaction_types":"LIKE","source":"activity","video_url":null},{"article_description":null,"article_title":null,"article_url":null,"author_headline":"Deploying enterprise agents in production / CTO / SWE Leader / GVP @ Publicis Sapient","author_name":"Ravi Evani\n              \n                \n                   \n    \n      \n    \n    \n      \n    \n\n • You","author_profile_image_url":"https://media.licdn.com/dms/image/v2/C4E03AQGNeJRorEd2Nw/profile-displayphoto-shrink_100_100/profile-displayphoto-shrink_100_100/0/1569287114631?e=1784160000&v=beta&t=tJDZC7EXWnlgIIf8kF7fBCajhF-HEgzNXnz_IIkjqW8","author_profile_url":"https://www.linkedin.com/in/ravievani","comment_count":1,"has_image":true,"impression_count":2115,"is_article":false,"is_my_post":true,"is_video":false,"post_image_url":"https://media.licdn.com/dms/image/v2/D4E22AQHL1-2iJ8OfVQ/feedshare-shrink_800/B4EZavvpG2GQAg-/0/1746705224903?e=1784160000&v=beta&t=OA6FYv01c2M0S5MR9l3qrklVR0IKeDUzE8NAzZqU7V0","post_text":"hashtag#AWS Agent Squad https://lnkd.in/e-xpXtDX is trending at #2 on GitHub today. Here’s what happens under the hood when it orchestrates a travel use case like: “Book my flight to Paris”:\n\n↳The user enters their request via a client app (web chat, mobile, etc.).\n↳The request goes to the Agent Squad Orchestrator, which manages conversation flow.\n↳It sends the query + conversation history to a Classifier (e.g., BedrockClassifier).\n↳The classifier identifies the intent as a travel request and routes it to \"TravelAgentLex\".\n↳TravelAgentLex passes the request to Amazon Lex, which handles slot filling—asks for travel dates, destination, number of travelers, etc.\n↳Once all info is collected, Lex calls a fulfillment function (e.g., Lambda or external booking API).\n↳Booking confirmation is passed back through the chain and finally shown to the user as: “Your flight to Paris is booked!”\n\nEach step is modular, API-driven, and cleanly orchestrated by the Agent Squad orchestration pattern.","post_url":"https://www.linkedin.com/feed/update/urn:li:activity:7326212718527397890","post_urn":"urn:li:activity:7326212718527397890","posted_hours_ago":8760,"posted_time":"2025-06-24","posted_time_raw":"1yr","reaction_count":25,"reaction_types":"LIKE","source":"activity","video_url":null},{"article_description":null,"article_title":null,"article_url":null,"author_headline":"Deploying enterprise agents in production / CTO / SWE Leader / GVP @ Publicis Sapient","author_name":"Ravi Evani\n              \n                \n                   \n    \n      \n    \n    \n      \n    \n\n • You","author_profile_image_url":"https://media.licdn.com/dms/image/v2/C4E03AQGNeJRorEd2Nw/profile-displayphoto-shrink_100_100/profile-displayphoto-shrink_100_100/0/1569287114631?e=1784160000&v=beta&t=tJDZC7EXWnlgIIf8kF7fBCajhF-HEgzNXnz_IIkjqW8","author_profile_url":"https://www.linkedin.com/in/ravievani","comment_count":4,"has_image":true,"impression_count":18442,"is_article":false,"is_my_post":true,"is_video":true,"post_image_url":"https://media.licdn.com/dms/image/v2/D4E05AQEOGpJDV_5jBw/videocover-high/B4EZarWUtHHoBc-/0/1746631527725?e=1782932400&v=beta&t=5VZoEKnNzrgUpqh_n6bmqZ8iXkkLPhDh-IsI2IDGv0Y","post_text":"Sharing a couple of tips on how to become your AI copilot's manager. Happy coding!","post_url":"https://www.linkedin.com/feed/update/urn:li:activity:7325903699795468288","post_urn":"urn:li:activity:7325903699795468288","posted_hours_ago":8760,"posted_time":"2025-06-24","posted_time_raw":"1yr","reaction_count":121,"reaction_types":"LIKE, EMPATHY, INTEREST","repost_count":1,"source":"activity","video_url":"https://media.licdn.com/dms/image/v2/D4E05AQEOGpJDV_5jBw/videocover-high/B4EZarWUtHHoBc-/0/1746631527725?e=1782932400&v=beta&t=5VZoEKnNzrgUpqh_n6bmqZ8iXkkLPhDh-IsI2IDGv0Y"},{"article_description":null,"article_title":null,"article_url":null,"author_headline":"Deploying enterprise agents in production / CTO / SWE Leader / GVP @ Publicis Sapient","author_name":"Ravi Evani\n              \n                \n                   \n    \n      \n    \n    \n      \n    \n\n • You","author_profile_image_url":"https://media.licdn.com/dms/image/v2/C4E03AQGNeJRorEd2Nw/profile-displayphoto-shrink_100_100/profile-displayphoto-shrink_100_100/0/1569287114631?e=1784160000&v=beta&t=tJDZC7EXWnlgIIf8kF7fBCajhF-HEgzNXnz_IIkjqW8","author_profile_url":"https://www.linkedin.com/in/ravievani","comment_count":1,"has_image":false,"impression_count":1673,"is_article":false,"is_my_post":true,"is_video":false,"post_image_url":null,"post_text":"Google Cloud AI powered kubernetes assistant: kubectl-ai https://lnkd.in/ez9xQNTM is trending #1 on GitHub today. How does this ai work?\n\n🔹 You ask:\n“Show me all pods in the default namespace”\n\nHere’s what happens behind the scenes:\n↳The kubectl-ai CLI sends your query to an AI Agent.\n↳The AI Agent uses a large language model (like Gemini) to translate your natural language into a real kubectl command.\n↳It figures out: kubectl get pods -n default\n↳This command is passed to the kubectl tool executor, which runs it against the Kubernetes API server.\n↳The server returns the live pod data.\n↳The AI agent can (optionally) run another LLM pass to explain the output.\n↳You see both the raw result and an explanation—right in your terminal.\n\n🔹 You ask:\n“Create a new deployment for nginx image with 3 replicas”\n\nHere’s how kubectl-ai handles it behind the scenes:\n↳Your input goes through the kubectl-ai CLI and reaches the AI Agent.\n↳The agent builds a prompt using your request and the schema of the kubectl tool.\n↳A large language model (like Gemini) interprets your intent and determines the appropriate command:\n↳kubectl create deployment nginx --image=nginx --replicas=3\n↳The command is parsed, arguments are extracted, and the tool executor runs it against the Kubernetes API.\n↳The API server validates the configuration and applies it.\n↳Once complete, the server returns a status—success or error.\n↳The AI agent formats the output and returns a clear, human-readable summary to your terminal.\n\nNo memorizing commands. Just tell it what you want.","post_url":"https://www.linkedin.com/feed/update/urn:li:activity:7325795048627789824","post_urn":"urn:li:activity:7325795048627789824","posted_hours_ago":8760,"posted_time":"2025-06-24","posted_time_raw":"1yr","reaction_count":13,"reaction_types":"LIKE","source":"activity","video_url":null},{"article_description":null,"article_title":null,"article_url":null,"author_headline":"Deploying enterprise agents in production / CTO / SWE Leader / GVP @ Publicis Sapient","author_name":"Ravi Evani\n              \n                \n                   \n    \n      \n    \n    \n      \n    \n\n • You","author_profile_image_url":"https://media.licdn.com/dms/image/v2/C4E03AQGNeJRorEd2Nw/profile-displayphoto-shrink_100_100/profile-displayphoto-shrink_100_100/0/1569287114631?e=1784160000&v=beta&t=tJDZC7EXWnlgIIf8kF7fBCajhF-HEgzNXnz_IIkjqW8","author_profile_url":"https://www.linkedin.com/in/ravievani","comment_count":2,"has_image":false,"impression_count":2039,"is_article":false,"is_my_post":true,"is_video":false,"post_image_url":null,"post_text":"The moment it clicked was the day I stopped treating AI like a mystery—and started acting like its engineering manager.\n\nThat shift didn’t happen by accident. It came from following a real engineering framework for how to work with AI.\n\nHere’s what that looks like in practice:\n\n⇥ Start with mindset\n\nIt’s a team: you + AI.\nTreat it like a junior dev.\nKnow what AI is good at (and what it’s not).\nYou’re still the architect. Delegate with intent.\n\n⇥ Work in a real SDLC\n\nPlan incrementally. Define one concrete task at a time.\nProvide context before asking for output.\nCo-create, critique, and refine. Don’t just prompt and hope.\n\n⇥ Learn alongside the build\n\nResearch like you would normally.\nLet AI clarify and explain, but don’t outsource your thinking.\n\n⇥ Code like a team\n\nBreak work into stories.\nStart with test cases.\nGive clear instructions and examples.\nReview its code. Fill the gaps. Iterate.\n\n⇥Test. Validate. Review.\n\nTests aren’t a checkbox—they’re checkpoints.\nDebug together.\nDon’t ship until it’s solid.\n\n⇥ Don’t skip quality\n\nUse documented coding rules.\nStick to design patterns.\nLeave the codebase better than you found it.\n\n🧠 And above all—learn to communicate well with AI\n\nGive clean, relevant context.\nTrim the fat. Use new chats.\nAsk it to ask you better questions.\nUse real code examples.\nRefine prompts like you’d refactor code.\n\nThis is what it means to engineer with AI.\nNot one-off prompting. Not wizardry.\nNot magic. Not mystery.\nJust a repeatable, high-leverage way to build—with a new kind of teammate.","post_url":"https://www.linkedin.com/feed/update/urn:li:activity:7324607244648554496","post_urn":"urn:li:activity:7324607244648554496","posted_hours_ago":8760,"posted_time":"2025-06-24","posted_time_raw":"1yr","reaction_count":14,"reaction_types":"LIKE, INTEREST","source":"activity","video_url":null},{"article_description":null,"article_title":null,"article_url":null,"author_headline":"Deploying enterprise agents in production / CTO / SWE Leader / GVP @ Publicis Sapient","author_name":"Ravi Evani\n              \n                \n                   \n    \n      \n    \n    \n      \n    \n\n • You","author_profile_image_url":"https://media.licdn.com/dms/image/v2/C4E03AQGNeJRorEd2Nw/profile-displayphoto-shrink_100_100/profile-displayphoto-shrink_100_100/0/1569287114631?e=1784160000&v=beta&t=tJDZC7EXWnlgIIf8kF7fBCajhF-HEgzNXnz_IIkjqW8","author_profile_url":"https://www.linkedin.com/in/ravievani","comment_count":2,"has_image":true,"impression_count":6338,"is_article":false,"is_my_post":true,"is_video":true,"post_image_url":"https://media.licdn.com/dms/image/v2/D4E05AQGEHEqd3LVXYw/videocover-high/B4EZaLd3ylHkBk-/0/1746096718792?e=1782932400&v=beta&t=jX2JHXgIeDUd6K6fM9EVRrl1DRc5MvZPMo9dYDaX41c","post_text":"Are you still debating AI while others are using it to outpace you?\n\nAs software engineers, we often overthink. We sit in rooms debating strategy—Should we use AI? Which model? Is it mature enough?\nMeanwhile, the technology moves forward—indifferent to our hesitation.\n\nThat’s always been the case with tech. But now it’s more extreme.\n\nSoftware development has fundamentally changed in the past year.\n\nThe old focal points—latest Java updates, specializing in front-end vs back-end, arguing over testing tools—don’t matter as much anymore.\n\nAI coding agents flipped the script. The new game is rapid adaptation and high-leverage problem solving.\n\nAnd it’s only accelerating.\n\nDevelopers who use AI tools are delivering at a level that traditional workflows can’t match.\nThe more they use them, the better the models get. The better the models get, the bigger the gap between adopters and holdouts.\n\nSo no, it’s not about waiting for the tech to mature. It’s about what you’re doing with it right now.\n\nThe point is: act.\n\nAI isn’t waiting. Neither should you.","post_url":"https://www.linkedin.com/feed/update/urn:li:activity:7323660512192335872","post_urn":"urn:li:activity:7323660512192335872","posted_hours_ago":8760,"posted_time":"2025-06-24","posted_time_raw":"1yr","reaction_count":55,"reaction_types":"LIKE, EMPATHY","source":"activity","video_url":"https://media.licdn.com/dms/image/v2/D4E05AQGEHEqd3LVXYw/videocover-high/B4EZaLd3ylHkBk-/0/1746096718792?e=1782932400&v=beta&t=jX2JHXgIeDUd6K6fM9EVRrl1DRc5MvZPMo9dYDaX41c"},{"article_description":null,"article_title":null,"article_url":null,"author_headline":"Deploying enterprise agents in production / CTO / SWE Leader / GVP @ Publicis Sapient","author_name":"Ravi Evani\n              \n                \n                   \n    \n      \n    \n    \n      \n    \n\n • You","author_profile_image_url":"https://media.licdn.com/dms/image/v2/C4E03AQGNeJRorEd2Nw/profile-displayphoto-shrink_100_100/profile-displayphoto-shrink_100_100/0/1569287114631?e=1784160000&v=beta&t=tJDZC7EXWnlgIIf8kF7fBCajhF-HEgzNXnz_IIkjqW8","author_profile_url":"https://www.linkedin.com/in/ravievani","comment_count":1,"has_image":true,"impression_count":2817,"is_article":false,"is_my_post":true,"is_video":false,"post_image_url":"https://media.licdn.com/dms/image/v2/D4E22AQEYcno81K0krQ/feedshare-shrink_800/B4EZYrQGYiGgAk-/0/1744482363447?e=1784160000&v=beta&t=Zj5buWQ8r_HrnguZT_p3-iq4lc_8MSVv3RghvjMlLm0","post_text":"Now that hashtag#Google has launched ADK, I revisited the Airbnb hashtag#MCP use case from my earlier post https://lnkd.in/eisY5VDU, that showed how we used MCP to power a natural language property search.\n\nThis time, I explored what changes when you implement the same flow using ADK’s orchestration model.\n\nDifferent approaches. Same goal. Different trade-offs.\n\nHere’s a breakdown 👇\n\n🎯 Simple MCP Flow\n↳ LLM interprets the user query and chooses the tool\n↳ Script uses the MCP client to call the tool\n↳ Script sends the result back to the LLM for final response\n\n🎯 ADK MCP Flow\n↳ Agent Node (LLM + Toolbox) chooses the tool\n↳ ADK framework handles tool invocation (MCP under the hood)\n↳ Result flows through optional Format Node to final output\n\nMy take on the trade-offs:\n\nThe Simple MCP flow gives you full control. You’re handling the logic, tool orchestration, and logging directly through a Python script. It’s straightforward to prototype, easy to debug, and a great way to deeply understand how MCP sessions and tool calls work under the hood.\n\nBut that control comes at a cost. You’ll end up writing a lot of boilerplate — managing LLM prompts, interpreting responses, invoking tools, and stitching everything together manually. The orchestration logic is tightly coupled with your tool execution, and as workflows get more complex, maintaining that script becomes harder to scale.\n\nBy contrast, the ADK approach is more modular and scalable. The Agent Node combines LLM decision-making with a configured toolbox, while Format Nodes handle the response output. The orchestration is declarative — you connect nodes, and the framework handles the rest. It’s clean, reusable, and avoids the repetitive glue code.\n\nThat said, ADK introduces some abstraction. You don’t have line-by-line control over tool invocation — and the initial learning curve is higher. You’ll need to understand Pipelines, Nodes, and the framework’s mental model. But once you’re up and running, it’s far better suited for building complex, maintainable agentic applications.\n\nBottom line:\nSetting up an MCP integration is easy. Designing one that’s actually useful at scale is where it gets interesting. Start with a simple script to learn the flow. Move to ADK when you want modularity, reuse, and cleaner orchestration.","post_url":"https://www.linkedin.com/feed/update/urn:li:activity:7316889358379155456","post_urn":"urn:li:activity:7316889358379155456","posted_hours_ago":8760,"posted_time":"2025-06-24","posted_time_raw":"1yr","reaction_count":52,"reaction_types":"LIKE, INTEREST, EMPATHY","source":"activity","video_url":null},{"article_description":null,"article_title":null,"article_url":null,"author_headline":"Deploying enterprise agents in production / CTO / SWE Leader / GVP @ Publicis Sapient","author_name":"Ravi Evani\n              \n                \n                   \n    \n      \n    \n    \n      \n    \n\n • You","author_profile_image_url":"https://media.licdn.com/dms/image/v2/C4E03AQGNeJRorEd2Nw/profile-displayphoto-shrink_100_100/profile-displayphoto-shrink_100_100/0/1569287114631?e=1784160000&v=beta&t=tJDZC7EXWnlgIIf8kF7fBCajhF-HEgzNXnz_IIkjqW8","author_profile_url":"https://www.linkedin.com/in/ravievani","comment_count":3,"has_image":true,"impression_count":7560,"is_article":false,"is_my_post":true,"is_video":true,"post_image_url":"https://media.licdn.com/dms/image/v2/D4E05AQHiKvA-diWbnw/videocover-low/B4EZYfmWXnGYCU-/0/1744286926169?e=1782932400&v=beta&t=JwC5KtxMwpFAHxazK5uDVQRpGaB6_GewaA7n3774Cbs","post_text":"Publicis Sapient's Raghu Dubey gearing up for his big talk at Google Cloud Next '25 —spotlighting our Enterprise Agentic AI platform: Bodhi https://lnkd.in/eM--Wu6r.\n\nThe focus: Modernizing marketing with AI.\n\nWhat used to take several months can now be orchestrated and scaled in a fraction of the time—powered by Bodhi's modular and agentic orchestration capabilities.\n\nIn the marketing transformation space, Bodhi accelerates everything from Customer Engagement to Content Pipelines, to Multimodal compliance checks.\n\nNow, with hashtag#MCP and Google's Agentspace in the mix, we’re plugging Bodhi's enterprise agentic layer into a broader ecosystem of agents—unlocking disproportionate value for our customers.","post_url":"https://www.linkedin.com/feed/update/urn:li:activity:7316069692165480450","post_urn":"urn:li:activity:7316069692165480450","posted_hours_ago":8760,"posted_time":"2025-06-24","posted_time_raw":"1yr","reaction_count":182,"reaction_types":"LIKE, PRAISE, EMPATHY","source":"activity","video_url":"https://media.licdn.com/dms/image/v2/D4E05AQHiKvA-diWbnw/videocover-low/B4EZYfmWXnGYCU-/0/1744286926169?e=1782932400&v=beta&t=JwC5KtxMwpFAHxazK5uDVQRpGaB6_GewaA7n3774Cbs"},{"article_description":null,"article_title":null,"article_url":null,"author_headline":"Deploying enterprise agents in production / CTO / SWE Leader / GVP @ Publicis Sapient","author_name":"Ravi Evani\n              \n                \n                   \n    \n      \n    \n    \n      \n    \n\n • You","author_profile_image_url":"https://media.licdn.com/dms/image/v2/C4E03AQGNeJRorEd2Nw/profile-displayphoto-shrink_100_100/profile-displayphoto-shrink_100_100/0/1569287114631?e=1784160000&v=beta&t=tJDZC7EXWnlgIIf8kF7fBCajhF-HEgzNXnz_IIkjqW8","author_profile_url":"https://www.linkedin.com/in/ravievani","has_image":true,"impression_count":2412,"is_article":false,"is_my_post":true,"is_video":true,"post_image_url":"https://media.licdn.com/dms/image/v2/D4E05AQEem7N1LHe3GA/videocover-low/B4EZYSc3d9GgCM-/0/1744066304095?e=1782932400&v=beta&t=eGszoTvIKWH9ww5gn4-W53DDCS-ASdrxlVoW7vASLpE","post_text":"If your app is going truly global, you will likely need a region and a language switcher to transact in that local region.\n\nHere we use Publicis Sapient hashtag#Slingshot AI SDLC platform to build a region and language switcher for a Mock Global Restaurant Android app.\n\nThe goal is simple: when a customer travels, they should be able to switch to the local region and language to view the correct menu and ordering options.\n\n↳ We start with mockup screens that we want to use to build this functionality. These screenshots are uploaded into Slingshot, along with functional instructions.\n↳ Slingshot interprets the visuals and prompts using our Enterprise Prompt Library, which includes standards for functionality, architecture, and non-functional requirements—like performance, localization, accessibility, security, privacy, and testing.\n↳ Slingshot starts generating code in Kotlin.\n↳ It sets up the project, adds dependencies, creates navigation fragments, and builds out the layouts—including all UI elements like text views, image views, and buttons.\n\nThen it generates:\n↳ A list of regions\n↳ View fragments\n↳ Adapters (like the menu adapter and region adapter)\n↳ Data classes for the region structure\n\n↳ Once that’s done, we verify all imports and dependencies, accept the changes, and save the files.\n\n↳ Next, we instruct Slingshot to generate unit and UI test cases. It adds the required testing dependencies, then generates the tests following our internal standards. We validate the tests, build the app, and run both the unit and UI tests—all of which pass successfully.\n\n↳ Finally, we validate the end-to-end functionality.\n\nThat’s it—we go from screenshots to a fully functional Android country and language switcher for a global mock restaurant app, delivered in under two hours by Devishankar Ramasamy using Slingshot.","post_url":"https://www.linkedin.com/feed/update/urn:li:activity:7315144379076083712","post_urn":"urn:li:activity:7315144379076083712","posted_hours_ago":8760,"posted_time":"2025-06-24","posted_time_raw":"1yr","reaction_count":49,"reaction_types":"LIKE, EMPATHY, PRAISE","source":"activity","video_url":"https://media.licdn.com/dms/image/v2/D4E05AQEem7N1LHe3GA/videocover-low/B4EZYSc3d9GgCM-/0/1744066304095?e=1782932400&v=beta&t=eGszoTvIKWH9ww5gn4-W53DDCS-ASdrxlVoW7vASLpE"},{"article_description":null,"article_title":null,"article_url":null,"author_headline":"Deploying enterprise agents in production / CTO / SWE Leader / GVP @ Publicis Sapient","author_name":"Ravi Evani\n              \n                \n                   \n    \n      \n    \n    \n      \n    \n\n • You","author_profile_image_url":"https://media.licdn.com/dms/image/v2/C4E03AQGNeJRorEd2Nw/profile-displayphoto-shrink_100_100/profile-displayphoto-shrink_100_100/0/1569287114631?e=1784160000&v=beta&t=tJDZC7EXWnlgIIf8kF7fBCajhF-HEgzNXnz_IIkjqW8","author_profile_url":"https://www.linkedin.com/in/ravievani","comment_count":1,"has_image":true,"impression_count":1250,"is_article":false,"is_my_post":true,"is_video":true,"post_image_url":"https://media.licdn.com/dms/image/v2/D4E05AQG0dwsyQTrF0Q/videocover-high/B4EZYLE6NEHcBs-/0/1743942564269?e=1782932400&v=beta&t=NIs8JC6C7OKwzTRZXJcGuhorWQrqYTUWzJtT5u8_oFI","post_text":"🦊🐢 Vibe Mode + Human Mode: Engage both sides of your coding brain!\n\nOne moves fast, driven by intuition, creativity, and prompts.\nThe other moves steady—grounded in structure, design, and experience.\n\nTogether? They ship code that works and lasts.\n\nWhether you’re riding on vibes or refining with intent, the magic happens when both modes get a seat at the table (or a pedal on the bike 🚲).\n\nWhich mode (aka mood) are you in today?","post_url":"https://www.linkedin.com/feed/update/urn:li:activity:7314625291455201281","post_urn":"urn:li:activity:7314625291455201281","posted_hours_ago":8760,"posted_time":"2025-06-24","posted_time_raw":"1yr","reaction_count":14,"reaction_types":"LIKE","source":"activity","video_url":"https://media.licdn.com/dms/image/v2/D4E05AQG0dwsyQTrF0Q/videocover-high/B4EZYLE6NEHcBs-/0/1743942564269?e=1782932400&v=beta&t=NIs8JC6C7OKwzTRZXJcGuhorWQrqYTUWzJtT5u8_oFI"},{"article_description":null,"article_title":null,"article_url":null,"author_headline":"Deploying enterprise agents in production / CTO / SWE Leader / GVP @ Publicis Sapient","author_name":"Ravi Evani\n              \n                \n                   \n    \n      \n    \n    \n      \n    \n\n • You","author_profile_image_url":"https://media.licdn.com/dms/image/v2/C4E03AQGNeJRorEd2Nw/profile-displayphoto-shrink_100_100/profile-displayphoto-shrink_100_100/0/1569287114631?e=1784160000&v=beta&t=tJDZC7EXWnlgIIf8kF7fBCajhF-HEgzNXnz_IIkjqW8","author_profile_url":"https://www.linkedin.com/in/ravievani","comment_count":12,"has_image":true,"impression_count":18351,"is_article":false,"is_my_post":true,"is_video":true,"post_image_url":"https://media.licdn.com/dms/image/v2/D4E05AQH62BwR7KZUuw/videocover-low/B4EZYGScj.HMCM-/0/1743862229766?e=1782932400&v=beta&t=2PH3cZ2D0qfQdjk4MA0srGEL6gLPaqRIlVxbzAeNcL0","post_text":"We’re using Publicis Sapient Slingshot AI SDLC platform to build a goal-setting screen for the customer-facing iOS app of a mock investment bank.\n\nThe idea is simple: let customers set financial goals to support their planning.\n\nThis app is built in SwiftUI, and we’re starting with a Figma design of the screen. First, we upload the Figma file into Slingshot. Then, using Enterprise prompt libraries, context, and architectural patterns, Slingshot auto-generates the code.\n\n↳ Sets up the project structure\n↳ Defines the data model and sample data\n↳ Creates the network layer and repository for backend integration\n↳ Builds the view model\n↳ Generates the SwiftUI view\n↳ Adds mock and unit tests\n↳ And finally, the handling for asset loading for images and icons\n\nOnce the code is generated, we go file by file, do a quick sanity check, fix any major issues, and load it in Xcode.\n\nLive in Xcode, you’ll see:\n↳ The header appear\n↳ Buttons render\n↳ A carousel of suggested goals\n↳ Images load in\n↳ A list of all goals the user can select\n↳ And finally, UI icons and interactions get validated\n\n🎯 All in, we go from Figma to functional SwiftUI screen for a financial app — in just a few minutes.","post_url":"https://www.linkedin.com/feed/update/urn:li:activity:7314288378881978369","post_urn":"urn:li:activity:7314288378881978369","posted_hours_ago":8760,"posted_time":"2025-06-24","posted_time_raw":"1yr","reaction_count":210,"reaction_types":"LIKE, PRAISE, EMPATHY","repost_count":13,"source":"activity","video_url":"https://media.licdn.com/dms/image/v2/D4E05AQH62BwR7KZUuw/videocover-low/B4EZYGScj.HMCM-/0/1743862229766?e=1782932400&v=beta&t=2PH3cZ2D0qfQdjk4MA0srGEL6gLPaqRIlVxbzAeNcL0"},{"article_description":null,"article_title":null,"article_url":null,"author_headline":"Deploying enterprise agents in production / CTO / SWE Leader / GVP @ Publicis Sapient","author_name":"Ravi Evani\n              \n                \n                   \n    \n      \n    \n    \n      \n    \n\n • You","author_profile_image_url":"https://media.licdn.com/dms/image/v2/C4E03AQGNeJRorEd2Nw/profile-displayphoto-shrink_100_100/profile-displayphoto-shrink_100_100/0/1569287114631?e=1784160000&v=beta&t=tJDZC7EXWnlgIIf8kF7fBCajhF-HEgzNXnz_IIkjqW8","author_profile_url":"https://www.linkedin.com/in/ravievani","has_image":true,"impression_count":810,"is_article":false,"is_my_post":true,"is_video":false,"post_image_url":"https://media.licdn.com/dms/image/v2/D4D22AQGnSF09EW3-ag/feedshare-shrink_800/B4DZYBBhNvG4Ag-/0/1743773898311?e=1784160000&v=beta&t=f0Mgg_RP1sFmbcC7dpyaG1verUL5d6ZmlPqX54gmwDE","post_text":"Customer support isn’t where you cut your teeth on agentic AI—it’s where you double down on being human.","post_url":"https://www.linkedin.com/feed/update/urn:li:activity:7313917838958723072","post_urn":"urn:li:activity:7313917838958723072","posted_hours_ago":8760,"posted_time":"2025-06-24","posted_time_raw":"1yr","reaction_count":10,"reaction_types":"LIKE","source":"activity","video_url":null},{"article_description":null,"article_title":null,"article_url":null,"author_headline":"Deploying enterprise agents in production / CTO / SWE Leader / GVP @ Publicis Sapient","author_name":"Ravi Evani\n              \n                \n                   \n    \n      \n    \n    \n      \n    \n\n • You","author_profile_image_url":"https://media.licdn.com/dms/image/v2/C4E03AQGNeJRorEd2Nw/profile-displayphoto-shrink_100_100/profile-displayphoto-shrink_100_100/0/1569287114631?e=1784160000&v=beta&t=tJDZC7EXWnlgIIf8kF7fBCajhF-HEgzNXnz_IIkjqW8","author_profile_url":"https://www.linkedin.com/in/ravievani","comment_count":1,"has_image":true,"impression_count":3355,"is_article":false,"is_my_post":true,"is_video":false,"post_image_url":"https://media.licdn.com/dms/image/v2/D4E22AQHZTh8yL-ewNQ/feedshare-shrink_800/B4EZYAxo8oHYAo-/0/1743769736014?e=1784160000&v=beta&t=5Km7Hk0GcyVZ3VlLuFaMIdT0q8Zad36VcT7b17tLX0A","post_text":"I was debugging a travel planning agent use case that lets users search for stays “next week\". The LLM prompt I used to drive the agent’s logic wasn’t handling the date interpretation correctly, so I asked claude-3.7-sonnet to adjust my system prompt so it would generate more accurate check-in/checkout dates.\n\nclaude-3.7-sonnet moved on to tweak my prompts.\n\ngemini-2.5-pro-exp-03-25, on the other hand, flagged something deeper: relying on the LLM for precise, real-time date interpretation isn’t reliable. Instead of tweaking the prompt, it suggested building a separate date calculator tool—something deterministic, maintainable, and testable.\n\nSmart call, hashtag#Gemini.","post_url":"https://www.linkedin.com/feed/update/urn:li:activity:7313900383599251458","post_urn":"urn:li:activity:7313900383599251458","posted_hours_ago":8760,"posted_time":"2025-06-24","posted_time_raw":"1yr","reaction_count":23,"reaction_types":"LIKE, INTEREST, ENTERTAINMENT","source":"activity","video_url":null},{"article_description":null,"article_title":null,"article_url":null,"author_headline":"Deploying enterprise agents in production / CTO / SWE Leader / GVP @ Publicis Sapient","author_name":"Ravi Evani\n              \n                \n                   \n    \n      \n    \n    \n      \n    \n\n • You","author_profile_image_url":"https://media.licdn.com/dms/image/v2/C4E03AQGNeJRorEd2Nw/profile-displayphoto-shrink_100_100/profile-displayphoto-shrink_100_100/0/1569287114631?e=1784160000&v=beta&t=tJDZC7EXWnlgIIf8kF7fBCajhF-HEgzNXnz_IIkjqW8","author_profile_url":"https://www.linkedin.com/in/ravievani","comment_count":8,"has_image":true,"impression_count":18472,"is_article":false,"is_my_post":true,"is_video":false,"post_image_url":"https://media.licdn.com/dms/image/v2/D4E22AQHj6yHqp5XZpA/feedshare-shrink_800/B4EZX8pdllHMAg-/0/1743700482891?e=1784160000&v=beta&t=ncPunTHnKfjFZnyH2p3bYGYPIASEt8smztuVSR8Jo9Q","post_text":"Started Vibe coding — the AI was on fire, generating feature after feature. I kept rolling, admiring my creation… until I hit a tricky WebSocket bug.\n\nOne giant, messy file later, Claude was spinning its wheels — 20+ attempts, trying the same fixes in circles. Total tizzy (though great for Claude, probably racking up usage fees in the background 😅).\n\nSo I disengaged from \"vibe mode\" and engaged my human brain.\nApplied separation of concerns. Told the AI to break the file into meaningful modules, and into a proper folder structure.\n\nTwo prompts later — bug gone. Just like that.\n\nVibe coding is shifting development from deep-in-the-weeds implementation to architecture and wisdom.\n\nNow more than ever, human judgment, thought structure, domain expertise, and system design matter.\n\nAI writes the code.\nWe steer it.","post_url":"https://www.linkedin.com/feed/update/urn:li:activity:7313609914247991296","post_urn":"urn:li:activity:7313609914247991296","posted_hours_ago":8760,"posted_time":"2025-06-24","posted_time_raw":"1yr","reaction_count":68,"reaction_types":"LIKE, EMPATHY, INTEREST","source":"activity","video_url":null},{"article_description":null,"article_title":null,"article_url":null,"author_headline":"Deploying enterprise agents in production / CTO / SWE Leader / GVP @ Publicis Sapient","author_name":"Ravi Evani\n              \n                \n                   \n    \n      \n    \n    \n      \n    \n\n • You","author_profile_image_url":"https://media.licdn.com/dms/image/v2/C4E03AQGNeJRorEd2Nw/profile-displayphoto-shrink_100_100/profile-displayphoto-shrink_100_100/0/1569287114631?e=1784160000&v=beta&t=tJDZC7EXWnlgIIf8kF7fBCajhF-HEgzNXnz_IIkjqW8","author_profile_url":"https://www.linkedin.com/in/ravievani","comment_count":6,"has_image":true,"impression_count":4659,"is_article":false,"is_my_post":true,"is_video":false,"post_image_url":"https://media.licdn.com/dms/image/v2/D4E22AQGnM9HPnvrVbA/feedshare-shrink_800/B4EZXwk7KZHUAk-/0/1743497967751?e=1784160000&v=beta&t=N_6S41gD-E4tquPJDbFpaeIfkoaWU_k5rZK8VGMKDNk","post_text":"MCPs Are the New APIs—But Don’t Stop at the Wrapper\n\nThe number of MCP servers is growing fast—https://cursor.directory already lists 1,800+.\n\nSoon, having an MCP will be like having an API: expected.\n\nBut here’s the real question: What can your MCP do?\n\nA lot of MCPs today expose only basic functionality—simple wrappers over shallow APIs. If that’s all your service offers, it won’t be very useful to AI agents or developers.\n\nThe Postgres MCP server, for example, exposes two tools: basic query access and table schema information. But it could go far beyond that and provide capabilities such as: query analysis, database metrics, metadata, and monitoring tools.\n\nThe value of an MCP is tightly linked to:\n1. What APIs it wraps\n2. What data powers those APIs\n3. What capabilities those APIs expose\n\nSetting up an MCP is easy. Creating one that’s genuinely useful—that’s the real differentiator.\n\nSo don’t just ship an MCP. Design it like you’d design a developer product. Think: observability, structure, composability, and agent-readiness.\n\nBecause in the AI-native stack, it’s not just that you have an MCP—it’s what it enables that matters.","post_url":"https://www.linkedin.com/feed/update/urn:li:activity:7312760504517611520","post_urn":"urn:li:activity:7312760504517611520","posted_hours_ago":8760,"posted_time":"2025-06-24","posted_time_raw":"1yr","reaction_count":60,"reaction_types":"LIKE, INTEREST, EMPATHY","repost_count":1,"source":"activity","video_url":null},{"article_description":null,"article_title":null,"article_url":null,"author_headline":"Deploying enterprise agents in production / CTO / SWE Leader / GVP @ Publicis Sapient","author_name":"Ravi Evani\n              \n                \n                   \n    \n      \n    \n    \n      \n    \n\n • You","author_profile_image_url":"https://media.licdn.com/dms/image/v2/C4E03AQGNeJRorEd2Nw/profile-displayphoto-shrink_100_100/profile-displayphoto-shrink_100_100/0/1569287114631?e=1784160000&v=beta&t=tJDZC7EXWnlgIIf8kF7fBCajhF-HEgzNXnz_IIkjqW8","author_profile_url":"https://www.linkedin.com/in/ravievani","has_image":true,"impression_count":1838,"is_article":false,"is_my_post":true,"is_video":true,"post_image_url":"https://media.licdn.com/dms/image/v2/D4E05AQGhRqNNbREweQ/videocover-high/B4EZXrlJDaGYBw-/0/1743414147863?e=1782932400&v=beta&t=xuoopLhCVEdMmvHdLnUgVCn8gsTLAx-MfEvVz_0k_EA","post_text":"Ever tried getting a clean transcript from a long YouTube video?\n\nThe default one is hard to download, usually inaccurate, and not worth the hassle.\n\nWith hashtag#Gemini 2.5 Pro's long context capabilities, you get a clean, accurate transcript in one shot—plus, you can customize the output to fit your needs!\n\nHere’s the code. 🔗 https://lnkd.in/eswXvP54","post_url":"https://www.linkedin.com/feed/update/urn:li:activity:7312408954859339776","post_urn":"urn:li:activity:7312408954859339776","posted_hours_ago":8760,"posted_time":"2025-06-24","posted_time_raw":"1yr","reaction_count":18,"reaction_types":"LIKE","source":"activity","video_url":"https://media.licdn.com/dms/image/v2/D4E05AQGhRqNNbREweQ/videocover-high/B4EZXrlJDaGYBw-/0/1743414147863?e=1782932400&v=beta&t=xuoopLhCVEdMmvHdLnUgVCn8gsTLAx-MfEvVz_0k_EA"},{"article_description":null,"article_title":null,"article_url":null,"author_headline":"Deploying enterprise agents in production / CTO / SWE Leader / GVP @ Publicis Sapient","author_name":"Ravi Evani\n              \n                \n                   \n    \n      \n    \n    \n      \n    \n\n • You","author_profile_image_url":"https://media.licdn.com/dms/image/v2/C4E03AQGNeJRorEd2Nw/profile-displayphoto-shrink_100_100/profile-displayphoto-shrink_100_100/0/1569287114631?e=1784160000&v=beta&t=tJDZC7EXWnlgIIf8kF7fBCajhF-HEgzNXnz_IIkjqW8","author_profile_url":"https://www.linkedin.com/in/ravievani","comment_count":8,"has_image":true,"impression_count":4179,"is_article":false,"is_my_post":true,"is_video":true,"post_image_url":"https://media.licdn.com/dms/image/v2/D4E05AQG45UXdHZveGQ/videocover-high/B4EZXjZNi5GgBs-/0/1743276838259?e=1782932400&v=beta&t=q-XXsiOUhqdvVfcl5YNiZE-elxB6xLdkywHfK1CkG0k","post_text":"Here’s a working example of using hashtag#MCP to power a natural language Airbnb property search—no custom API integration, no knowledge of Airbnb’s backend needed.\n\n🔗 Code here:\nhttps://lnkd.in/eEYDVA7T\n\n🎯 Why building MCP servers and services matters for hospitality enterprises:\n\n→ Third-party agents and AI tools can tap into your data—driving reach and conversions\n→ Devs don’t need to learn your API—the LLM handles the interface\n→ You can compose tools (e.g., here I used Excalidraw MCP to generate the flow diagram!)\n→ Apps like this can be built in hours, not weeks\n\n🧠 How this works\n\nA user enters a natural language query like:\n“Find me a beachfront 2-bedroom in Miami under $250/night with a pool.”\n\nClaude interprets the intent. The MCP client passes the structured request to Airbnb’s MCP Server. The results come back as structured listings, which the app formats into user-friendly property cards—with direct booking links.\n\nThe code is mostly a use-case agnostic agentic loop. No hand-coded API calls. No guessing at parameters.\n\nJust a seamless bridge between user intent and real services.\n\n📌 For hospitality companies, the implication is clear:\n\nAI agents are quickly becoming primary interfaces for travel discovery and booking. If your property data isn’t accessible in a way LLMs can consume, it won’t show up.\n\nTraditional APIs and SEO aren’t enough anymore.\n\nYou need to expose inventory, pricing, and availability in a structured, LLM-ready format. That’s exactly what MCP enables—at scale, and with minimal friction.\n\n💡 And it doesn’t stop at travel & hospitality use cases. With MCP, a hospitality company's structured property data can unlock value for B2B consumers in non-travel domains, such as:\n↳ Real Estate Investment: Evaluate rental ROI using pricing and occupancy data.\n↳ Urban Planning & Zoning: Track short-term rental density for zoning enforcement.\n↳ Insurance Risk: Feed usage and location data into underwriting models.\n\nAnd this opens up new ways to monetize their data and content.\n\nMCP is more than dev tooling. It’s AI-first infrastructure.\nIt’s how hospitality brands stay discoverable—and monetizable—in what’s coming next.","post_url":"https://www.linkedin.com/feed/update/urn:li:activity:7311833064135970816","post_urn":"urn:li:activity:7311833064135970816","posted_hours_ago":8760,"posted_time":"2025-06-24","posted_time_raw":"1yr","reaction_count":79,"reaction_types":"LIKE, INTEREST, EMPATHY","repost_count":4,"source":"activity","video_url":"https://media.licdn.com/dms/image/v2/D4E05AQG45UXdHZveGQ/videocover-high/B4EZXjZNi5GgBs-/0/1743276838259?e=1782932400&v=beta&t=q-XXsiOUhqdvVfcl5YNiZE-elxB6xLdkywHfK1CkG0k"},{"article_description":null,"article_title":null,"article_url":null,"author_headline":"Deploying enterprise agents in production / CTO / SWE Leader / GVP @ Publicis Sapient","author_name":"Ravi Evani\n              \n                \n                   \n    \n      \n    \n    \n      \n    \n\n • You","author_profile_image_url":"https://media.licdn.com/dms/image/v2/C4E03AQGNeJRorEd2Nw/profile-displayphoto-shrink_100_100/profile-displayphoto-shrink_100_100/0/1569287114631?e=1784160000&v=beta&t=tJDZC7EXWnlgIIf8kF7fBCajhF-HEgzNXnz_IIkjqW8","author_profile_url":"https://www.linkedin.com/in/ravievani","comment_count":1,"has_image":true,"impression_count":4298,"is_article":false,"is_my_post":true,"is_video":true,"post_image_url":"https://media.licdn.com/dms/image/v2/D4E05AQH5nJ-wXCxO3g/videocover-high/B4EZXUtVy5GgBs-/0/1743030445646?e=1782932400&v=beta&t=AYfnRFd-vFC08O_04tUdqws8kCHCXYX30IBr86vyEmQ","post_text":"🚫 Most AI codebots today are smart—but not necessarily real world enterprise-smart.\n\nThey generate code, but they don’t understand your architecture, your business priorities, or your delivery lifecycle. No memory of your systems. No awareness of your standards. No leverage of your experts.\n\n💡 We’re in the pursuit of filling that gap with Publicis Sapient hashtag#Slingshot AI SDLC assistant —by loading it with our 20+ years of enterprise transformation expertise, deep domain context, and full lifecycle awareness.\n\nPunit and I discuss the limitations of today's codebots how we’re in the pursuit of building hashtag#Slingshot to deliver engineering that works in a real-world large enterprise.","post_url":"https://www.linkedin.com/feed/update/urn:li:activity:7310799652382035968","post_urn":"urn:li:activity:7310799652382035968","posted_hours_ago":8760,"posted_time":"2025-06-24","posted_time_raw":"1yr","reaction_count":67,"reaction_types":"LIKE, EMPATHY, INTEREST","repost_count":2,"source":"activity","video_url":"https://media.licdn.com/dms/image/v2/D4E05AQH5nJ-wXCxO3g/videocover-high/B4EZXUtVy5GgBs-/0/1743030445646?e=1782932400&v=beta&t=AYfnRFd-vFC08O_04tUdqws8kCHCXYX30IBr86vyEmQ"},{"article_description":null,"article_title":null,"article_url":null,"author_headline":"Deploying enterprise agents in production / CTO / SWE Leader / GVP @ Publicis Sapient","author_name":"Ravi Evani\n              \n                \n                   \n    \n      \n    \n    \n      \n    \n\n • You","author_profile_image_url":"https://media.licdn.com/dms/image/v2/C4E03AQGNeJRorEd2Nw/profile-displayphoto-shrink_100_100/profile-displayphoto-shrink_100_100/0/1569287114631?e=1784160000&v=beta&t=tJDZC7EXWnlgIIf8kF7fBCajhF-HEgzNXnz_IIkjqW8","author_profile_url":"https://www.linkedin.com/in/ravievani","comment_count":1,"has_image":true,"impression_count":2418,"is_article":false,"is_my_post":true,"is_video":true,"post_image_url":"https://media.licdn.com/dms/image/v2/D4D05AQGX6j9twbCDoQ/videocover-high/B4DZVmIrYXHIBw-/0/1741175314093?e=1782932400&v=beta&t=oBUuSGsTWTDN9KpYWsuLshGTbtixLJ8TU-0T8l7lc2U","post_text":"Most default AI-generated code isn’t enterprise-ready—because it’s performance blind.\n\nWe ran a simple experiment where we had the same LLM converting a PL/pgSQL data analytics job to PySpark. We generated two versions of the Job in PySpark using slightly different approaches.\n\n① Job v1 codebase(Optimized): Generated with SME-engineered prompts + real enterprise context (record sizes, performance configs, resource limits, execution history).\n② Job v2 codebase(Non-Optimized): Generated with novice prompts (no SME guidance) or workload awareness.\n\nThe result?\n⚡ The SME prompt engineered, context-aware AI generated code (Job v1) ran ~5x faster and was ~3x more efficient—while the default AI-generated job wasted compute, inflated cloud costs, and slowed down execution.\n\n🤔 Now imagine this inefficiency at scale across your engineering teams.\n\nThe takeaway?\nEnterprises can’t rely on generic AI codegen tools alone. Without a system to capture SME expertise and real-world enterprise context, AI-generated code becomes a liability instead of an advantage:\n\n✘ Proliferation of inefficient, low-performing code\n✘ Soaring cloud & infrastructure costs\n✘ Stability and reliability risks at scale\n\nWhat’s needed instead?\n☑ A system to capture and operationalize SME-engineered prompts at scale\n☑ AI that binds code generation to real-world workload parameters\n☑ Built-in performance, maintainability, and cost efficiency\n\nWithout this, AI-powered coding at scale creates more problems than it solves for Enterprises.","post_url":"https://www.linkedin.com/feed/update/urn:li:activity:7303018623424499713","post_urn":"urn:li:activity:7303018623424499713","posted_hours_ago":8760,"posted_time":"2025-06-24","posted_time_raw":"1yr","reaction_count":39,"reaction_types":"LIKE, INTEREST, PRAISE","source":"activity","video_url":"https://media.licdn.com/dms/image/v2/D4D05AQGX6j9twbCDoQ/videocover-high/B4DZVmIrYXHIBw-/0/1741175314093?e=1782932400&v=beta&t=oBUuSGsTWTDN9KpYWsuLshGTbtixLJ8TU-0T8l7lc2U"},{"article_description":null,"article_title":null,"article_url":null,"author_headline":"Deploying enterprise agents in production / CTO / SWE Leader / GVP @ Publicis Sapient","author_name":"Ravi Evani\n              \n                \n                   \n    \n      \n    \n    \n      \n    \n\n • You","author_profile_image_url":"https://media.licdn.com/dms/image/v2/C4E03AQGNeJRorEd2Nw/profile-displayphoto-shrink_100_100/profile-displayphoto-shrink_100_100/0/1569287114631?e=1784160000&v=beta&t=tJDZC7EXWnlgIIf8kF7fBCajhF-HEgzNXnz_IIkjqW8","author_profile_url":"https://www.linkedin.com/in/ravievani","comment_count":4,"has_image":true,"impression_count":4226,"is_article":false,"is_my_post":true,"is_video":true,"post_image_url":"https://media.licdn.com/dms/image/v2/D4E05AQGBjoMkfkAV8Q/feedshare-thumbnail_720_1280/B4EZVb6CONG0A8-/0/1741003696342?e=1782932400&v=beta&t=WHloTuX1IZrwxqoXzTegDcXoBrQSQLDFYcmtXeUMfDM","post_text":"A key challenge in cloud infrastructure provisioning, especially with compute resources, is with getting the sizing right. If we undersize, we risk performance bottlenecks, slowdowns, and system failures. And if we oversize, and we waste resources and drive up unnecessary cloud costs.\n\nHere’s a hashtag#LangGraph agent built by one of our Publicis Sapient engineers Thomas Hari Budihardjo using our hashtag#Slingshot hashtag#AI SDLC platform, to provision hashtag#AWS cloud resources and deploy applications—intelligently.\n\nThis solution eliminates the guesswork in DevOps, making cloud provisioning more efficient, cost-effective, and performance-optimized—creating a feedback loop of continuous improvement that balances operational excellence and cost management.","post_url":"https://www.linkedin.com/feed/update/urn:li:activity:7302299116242436096","post_urn":"urn:li:activity:7302299116242436096","posted_hours_ago":8760,"posted_time":"2025-06-24","posted_time_raw":"1yr","reaction_count":59,"reaction_types":"LIKE, EMPATHY, PRAISE","repost_count":1,"source":"activity","video_url":"https://media.licdn.com/dms/image/v2/D4E05AQGBjoMkfkAV8Q/feedshare-thumbnail_720_1280/B4EZVb6CONG0A8-/0/1741003696342?e=1782932400&v=beta&t=WHloTuX1IZrwxqoXzTegDcXoBrQSQLDFYcmtXeUMfDM"},{"article_description":null,"article_title":null,"article_url":null,"author_headline":"Deploying enterprise agents in production / CTO / SWE Leader / GVP @ Publicis Sapient","author_name":"Ravi Evani\n              \n                \n                   \n    \n      \n    \n    \n      \n    \n\n • You","author_profile_image_url":"https://media.licdn.com/dms/image/v2/C4E03AQGNeJRorEd2Nw/profile-displayphoto-shrink_100_100/profile-displayphoto-shrink_100_100/0/1569287114631?e=1784160000&v=beta&t=tJDZC7EXWnlgIIf8kF7fBCajhF-HEgzNXnz_IIkjqW8","author_profile_url":"https://www.linkedin.com/in/ravievani","has_image":true,"impression_count":1271,"is_article":false,"is_my_post":true,"is_video":true,"post_image_url":"https://media.licdn.com/dms/image/v2/D4E05AQHaYCrKxMqCuw/videocover-high/B4EZU1KRi_G0Bs-/0/1740353647740?e=1782932400&v=beta&t=oyHh4bBqBR5jJs3yEXA_sjc92hUsSBO57rVLNjq_Bc8","post_text":"One of the most impactful, cost-neutral opportunities in enterprise IT is leveraging AI to improve system reliability. This short clip shows how to apply it to one key area underpinning reliability: Testing.\n\n===\nToday, enterprises seem to be focusing their hashtag#ai efforts on flashy, forward-looking projects, but one of the most immediate and impactful use cases is to fortify the quality, stability and reliability of production-critical applications.\n\nThe thing is, AI can significantly help improve system reliability—not necessarily by rewriting code, but by transforming how codebases are validated. Two key areas where AI really shines in testing are it’s ability to simulating real world test cases and test data.\n\nYou can create not just a handful, but hundreds of thousands of unique test scenarios. Simulating real world user behavior on a scale no human team could ever dream of. AI tools can dive into your code, figure out its weak spots, and then bombard it with data. All kinds of data, even those weird edge cases that we human often miss, the ones that usually cause the biggest crashes.\n\nWhile for many, this might seem like an obvious evolution in software testing. But in reality, large enterprises are barely scratching the surface when it comes to capitalizing on this.\n\nThe best part? This can be brought to life in a cost-neutral way—without blowing up budgets or slowing down innovation.","post_url":"https://www.linkedin.com/feed/update/urn:li:activity:7299572294710972416","post_urn":"urn:li:activity:7299572294710972416","posted_hours_ago":8760,"posted_time":"2025-06-24","posted_time_raw":"1yr","reaction_count":10,"reaction_types":"LIKE, EMPATHY","source":"activity","video_url":"https://media.licdn.com/dms/image/v2/D4E05AQHaYCrKxMqCuw/videocover-high/B4EZU1KRi_G0Bs-/0/1740353647740?e=1782932400&v=beta&t=oyHh4bBqBR5jJs3yEXA_sjc92hUsSBO57rVLNjq_Bc8"},{"article_description":null,"article_title":null,"article_url":null,"author_headline":"Deploying enterprise agents in production / CTO / SWE Leader / GVP @ Publicis Sapient","author_name":"Ravi Evani\n              \n                \n                   \n    \n      \n    \n    \n      \n    \n\n • You","author_profile_image_url":"https://media.licdn.com/dms/image/v2/C4E03AQGNeJRorEd2Nw/profile-displayphoto-shrink_100_100/profile-displayphoto-shrink_100_100/0/1569287114631?e=1784160000&v=beta&t=tJDZC7EXWnlgIIf8kF7fBCajhF-HEgzNXnz_IIkjqW8","author_profile_url":"https://www.linkedin.com/in/ravievani","has_image":true,"impression_count":1608,"is_article":false,"is_my_post":true,"is_video":true,"post_image_url":"https://media.licdn.com/dms/image/v2/D4E05AQF96C0ehn7DXw/videocover-low/B4EZUqd4eFHcCM-/0/1740174244576?e=1782932400&v=beta&t=PlKqtq-WZGlvkJokE8F37OHiO37R9MaCghMLSIUpAYk","post_text":"Publicis Sapient EngineeringNext 2024 set the bar high—can’t wait to see what’s in store for hashtag#ai @ EngineeringNext 2025!","post_url":"https://www.linkedin.com/feed/update/urn:li:activity:7298819998544777217","post_urn":"urn:li:activity:7298819998544777217","posted_hours_ago":8760,"posted_time":"2025-06-24","posted_time_raw":"1yr","reaction_count":46,"reaction_types":"LIKE, EMPATHY","repost_count":1,"source":"activity","video_url":"https://media.licdn.com/dms/image/v2/D4E05AQF96C0ehn7DXw/videocover-low/B4EZUqd4eFHcCM-/0/1740174244576?e=1782932400&v=beta&t=PlKqtq-WZGlvkJokE8F37OHiO37R9MaCghMLSIUpAYk"},{"article_description":null,"article_title":null,"article_url":null,"author_headline":"Deploying enterprise agents in production / CTO / SWE Leader / GVP @ Publicis Sapient","author_name":"Ravi Evani\n              \n                \n                   \n    \n      \n    \n    \n      \n    \n\n • You","author_profile_image_url":"https://media.licdn.com/dms/image/v2/C4E03AQGNeJRorEd2Nw/profile-displayphoto-shrink_100_100/profile-displayphoto-shrink_100_100/0/1569287114631?e=1784160000&v=beta&t=tJDZC7EXWnlgIIf8kF7fBCajhF-HEgzNXnz_IIkjqW8","author_profile_url":"https://www.linkedin.com/in/ravievani","comment_count":1,"has_image":true,"impression_count":5348,"is_article":false,"is_my_post":true,"is_video":true,"post_image_url":"https://media.licdn.com/dms/image/v2/D4E05AQEJK6cPIlHnIQ/videocover-high/B4EZUYckeBG0Bs-/0/1739872017279?e=1782932400&v=beta&t=rN3jo7cR4NFITAF9KjT3iEQXhzXcmrmM_OWZ7BNjKic","post_text":"Recently, I had a great check-in @ Publicis Sapient India with our Financial Services Learning cohort— who are deep into an intense up-skilling journey to becoming AI Engineers.\n\nOne thought-provoking question came up: As AI models improve, the cost of each incremental gain is skyrocketing. Does this mean innovation will slow down? Should software engineers wait for the next big breakthrough?\n\nMy take: Regardless of what the future holds—there’s already a massive amount of value to unlock today. Instead of waiting, we should focus on catching up and capitalizing on what's already here. The way we code has already been disrupted—now it’s about leveraging what’s here to drive impact.\n\nAditya Yashwanth Rahul Sachin Vinod Manoj Uday Amzad Shweta Kapil Navneet Shashaank Deepak naman Raghunathan Ravi Pranav Shobhit Chandrasekhar Gaurav Dhruwat Shipra devesh Rahul Mahendra Anuj Chitra Bhupendra Vikram Amandeep Deepansh Nishant Rashmi Sangeeta","post_url":"https://www.linkedin.com/feed/update/urn:li:activity:7297940506385240064","post_urn":"urn:li:activity:
