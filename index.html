            nameSpan.textContent = AUTHOR_NAME;
            handleSpan.textContent = LINKEDIN_USER ? `@${LINKEDIN_USER}` : AUTHOR_HEADLINE;

            if (AUTHOR_AVATAR) {
                avatarImg.src = AUTHOR_AVATAR;
                avatarImg.alt = AUTHOR_NAME;
                avatarImg.classList.remove('hidden');
            } else {
                const initials = AUTHOR_NAME.split(' ').map(n => n[0]).join('').substring(0, 2).toUpperCase();
                initialsDiv.textContent = initials;
                initialsDiv.classList.remove('hidden');
            }

            if (LINKEDIN_USER && avatarLink) {
                avatarLink.href = `https://www.linkedin.com/in/${LINKEDIN_USER}`;
            } else if (avatarLink) {
                avatarLink.removeAttribute('href');
                avatarLink.style.cursor = 'default';
            }
        }

        // Theme Management
        function initTheme() {
            const html = document.documentElement;
            if (state.theme === 'dark') {
                html.classList.add('dark');
            } else {
                html.classList.remove('dark');
            }

            const btn = document.getElementById('theme-toggle-btn');
            btn.addEventListener('click', () => {
                state.theme = state.theme === 'dark' ? 'light' : 'dark';
                localStorage.setItem('portfolio-theme', state.theme);
                if (state.theme === 'dark') {
                    html.classList.add('dark');
                } else {
                    html.classList.remove('dark');
                }
            });
        }

        // Columns Grid Layout Configuration
        function initCols() {
            const colButtons = document.querySelectorAll('[data-cols]');
            
            function setCols(n) {
                state.cols = n;
                localStorage.setItem('portfolio-cols-v2', n);
                
                // Update buttons UI
                colButtons.forEach(btn => {
                    const btnCols = parseInt(btn.getAttribute('data-cols'));
                    if (btnCols === n) {
                        btn.classList.add('bg-white', 'dark:bg-neutral-800', 'shadow-sm', 'text-neutral-900', 'dark:text-white');
                        btn.classList.remove('text-neutral-500', 'dark:text-neutral-400');
                    } else {
                        btn.classList.remove('bg-white', 'dark:bg-neutral-800', 'shadow-sm', 'text-neutral-900', 'dark:text-white');
                        btn.classList.add('text-neutral-500', 'dark:text-neutral-400');
                    }
                });

                // Update Grid classes
                const grid = document.getElementById('posts-grid');
                grid.className = 'grid grid-cols-1 gap-6 transition-all duration-300';
                
                if (n === 1) {
                    grid.classList.add('max-w-3xl', 'mx-auto');
                } else if (n === 2) {
                    grid.classList.add('md:grid-cols-2');
                } else if (n === 3) {
                    grid.classList.add('md:grid-cols-2', 'lg:grid-cols-3');
                }
            }

            colButtons.forEach(btn => {
                btn.addEventListener('click', () => {
                    setCols(parseInt(btn.getAttribute('data-cols')));
                });
            });

            // Initialize correct columns class
            setCols(state.cols);
        }

        // Filters and Sorting Actions
        function initFilters() {
            const search = document.getElementById('search-input');
            const sort = document.getElementById('sort-select');
            const mediaButtons = document.querySelectorAll('[data-media]');

            // Real-time search handler
            let searchTimeout;
            search.addEventListener('input', (e) => {
                clearTimeout(searchTimeout);
                searchTimeout = setTimeout(() => {
                    state.searchQuery = e.target.value.toLowerCase().trim();
                    state.visibleCount = 12;
                    render();
                }, 200);
            });

            // Sort selector handler
            sort.addEventListener('change', (e) => {
                state.sortBy = e.target.value;
                state.visibleCount = 12;
                render();
            });

            // Media type button filter handlers
            mediaButtons.forEach(btn => {
                btn.addEventListener('click', () => {
                    const filter = btn.getAttribute('data-media');
                    state.mediaFilter = filter;
                    state.visibleCount = 12;

                    mediaButtons.forEach(b => {
                        if (b.getAttribute('data-media') === filter) {
                            b.classList.add('bg-white', 'dark:bg-neutral-800', 'shadow-sm', 'text-neutral-900', 'dark:text-white');
                            b.classList.remove('text-neutral-500', 'dark:text-neutral-400');
                        } else {
                            b.classList.remove('bg-white', 'dark:bg-neutral-800', 'shadow-sm', 'text-neutral-900', 'dark:text-white');
                            b.classList.add('text-neutral-500', 'dark:text-neutral-400');
                        }
                    });

                    render();
                });
            });
        }

        // Image Modal Setup
        function initModal() {
            const modal = document.getElementById('image-modal');
            const backdrop = document.getElementById('modal-backdrop');
            const content = document.getElementById('modal-content');
            const closeBtn = document.getElementById('close-modal-btn');
            const img = document.getElementById('modal-img');

            window.openImageModal = function(src) {
                img.src = src;
                modal.classList.remove('hidden');
                setTimeout(() => {
                    content.classList.remove('scale-95', 'opacity-0');
                    content.classList.add('scale-100', 'opacity-100');
                }, 10);
            }

            function closeModal() {
                content.classList.remove('scale-100', 'opacity-100');
                content.classList.add('scale-95', 'opacity-0');
                setTimeout(() => {
                    modal.classList.add('hidden');
                    img.src = '';
                }, 200);
            }

            backdrop.addEventListener('click', closeModal);
            closeBtn.addEventListener('click', closeModal);
            document.addEventListener('keydown', (e) => {
                if (e.key === 'Escape') closeModal();
            });
        }

        // Helper to get Lucide icons for all unique reaction types
        function getReactionIcons(reactionTypesStr) {
            if (!reactionTypesStr) return ['thumbs-up'];
            const types = reactionTypesStr.toUpperCase().split(/[\s,]+/);
            const icons = [];
            for (const type of types) {
                if (type.includes('LIKE')) {
                    icons.push('thumbs-up');
                } else if (type.includes('EMPATHY') || type.includes('LOVE')) {
                    icons.push('heart');
                } else if (type.includes('INTEREST') || type.includes('CURIOSITY') || type.includes('INSIGHTFUL')) {
                    icons.push('lightbulb');
                } else if (type.includes('PRAISE') || type.includes('APPRECIATION') || type.includes('CELEBRATE')) {
                    icons.push('party-popper');
                } else if (type.includes('ENTERTAINMENT') || type.includes('LAUGH') || type.includes('FUNNY')) {
                    icons.push('laugh');
                } else if (type.includes('SUPPORT')) {
                    icons.push('hand-heart');
                }
            }
            const uniqueIcons = [...new Set(icons)];
            return uniqueIcons.length > 0 ? uniqueIcons : ['thumbs-up'];
        }

        // Helper: Clean Headline of Duplications
        function cleanHeadline(text) {
            if (!text) return '';
            const lines = text.split(/[\n\r]+/);
            if (lines.length > 1) {
                const uniqueLines = [...new Set(lines.map(l => l.trim()))].filter(l => l.length > 0);
                if (uniqueLines.length === 1) {
                    return uniqueLines[0];
                }
            }
            if (text.length > 10 && text.length % 2 === 0) {
                const mid = text.length / 2;
                const first = text.substring(0, mid);
                const second = text.substring(mid);
                if (first === second) return first;
            }
            return text;
        }

        // Helper: Format Dates Beautifully
        function formatDate(dateStr) {
            if (!dateStr) return '';
            try {
                const options = { year: 'numeric', month: 'short', day: 'numeric' };
                const date = new Date(dateStr);
                if (isNaN(date.getTime())) return dateStr;
                return date.toLocaleDateString('en-US', options);
            } catch (e) {
                return dateStr;
            }
        }

        // Helper: Convert links and handle breaks
        function formatPostText(text) {
            if (!text) return '';
            let formatted = text
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;')
                .replace(/'/g, '&#039;');

            formatted = formatted.trim();

            const urlRegex = /(https?:\/\/[^\s]+)/gi;
            formatted = formatted.replace(urlRegex, (url) => {
                const cleanUrl = url.replace(/[.,;!?]$/, '');
                const punctuation = url.substring(cleanUrl.length);
                return `<a href="${cleanUrl}" target="_blank" rel="noopener noreferrer" class="text-blue-500 hover:underline inline-flex items-center gap-0.5">${cleanUrl}<i data-lucide="external-link" class="size-3 inline ml-0.5"></i></a>${punctuation}`;
            });

            return formatted.split('\n').map(p => p.trim() ? `<p class="mb-2.5">${p}</p>` : `<div class="h-2.5"></div>`).join('');
        }

        // Helper: Toggling long text see-more
        window.toggleText = function(btn, urn) {
            const container = document.getElementById('text-' + urn.replace(/:/g, '-'));
            const isTruncated = container.classList.contains('line-clamp-3');
            
            if (isTruncated) {
                container.classList.remove('line-clamp-3');
                container.classList.add('line-clamp-none');
                btn.textContent = 'See less';
            } else {
                container.classList.remove('line-clamp-none');
                container.classList.add('line-clamp-3');
                btn.textContent = 'See more';
                btn.closest('.post-card').scrollIntoView({ behavior: 'smooth', block: 'nearest' });
            }
        }

        // Helper: Update scroll fade indicators for overflow text
        window.updateTextScroll = function(el) {
            const isScrollable = el.scrollHeight > el.clientHeight + 4;
            const isAtBottom = el.scrollHeight - el.scrollTop <= el.clientHeight + 4;
            const fade = el.nextElementSibling;
            if (fade) {
                if (isScrollable && !isAtBottom) {
                    fade.classList.remove('opacity-0');
                    fade.classList.add('opacity-100');
                } else {
                    fade.classList.remove('opacity-100');
                    fade.classList.add('opacity-0');
                }
            }
        }

        // Render Cards Loop
        function render() {
            const grid = document.getElementById('posts-grid');
            const emptyState = document.getElementById('empty-state');
            const showingCount = document.getElementById('showing-count');
            const loadMoreContainer = document.getElementById('load-more-container');

            // 1. Filter Posts
            let filtered = POSTS.filter(post => {
                const matchQuery = !state.searchQuery || 
                    (post.post_text && post.post_text.toLowerCase().includes(state.searchQuery)) ||
                    (post.author_name && post.author_name.toLowerCase().includes(state.searchQuery)) ||
                    (post.author_headline && post.author_headline.toLowerCase().includes(state.searchQuery));

                let matchMedia = true;
                if (state.mediaFilter === 'images') {
                    matchMedia = post.has_image === true && !post.is_video;
                } else if (state.mediaFilter === 'videos') {
                    matchMedia = post.is_video === true;
                } else if (state.mediaFilter === 'text') {
                    matchMedia = !post.has_image && !post.is_video;
                }

                return matchQuery && matchMedia;
            });

            // 2. Sort Posts
            filtered.sort((a, b) => {
                if (state.sortBy === 'newest') {
                    return new Date(b.posted_time || 0) - new Date(a.posted_time || 0);
                } else if (state.sortBy === 'oldest') {
                    return new Date(a.posted_time || 0) - new Date(b.posted_time || 0);
                } else if (state.sortBy === 'likes') {
                    return (b.reaction_count || 0) - (a.reaction_count || 0);
                } else if (state.sortBy === 'impressions') {
                    return (b.impression_count || 0) - (a.impression_count || 0);
                }
                return 0;
            });

            showingCount.textContent = `Showing ${Math.min(filtered.length, state.visibleCount)} of ${filtered.length} posts`;

            if (filtered.length === 0) {
                grid.innerHTML = '';
                emptyState.classList.remove('hidden');
                loadMoreContainer.classList.add('hidden');
                return;
            }
            emptyState.classList.add('hidden');

            // Toggle Load More button visibility
            if (filtered.length <= state.visibleCount) {
                loadMoreContainer.classList.add('hidden');
            } else {
                loadMoreContainer.classList.remove('hidden');
            }

            const visiblePosts = filtered.slice(0, state.visibleCount);

            // 3. Generate Cards HTML
            grid.innerHTML = visiblePosts.map(post => {
                const urnSafe = post.post_urn ? post.post_urn.replace(/:/g, '-') : Math.random().toString(36).substring(2, 9);
                const hasLongText = post.post_text && post.post_text.length > 280;
                
                const cleanPostAuthor = (post.author_name || AUTHOR_NAME)
                    .replace(/\s+/g, ' ')
                    .replace(/ • You$/, '')
                    .trim();

                const authorInitials = cleanPostAuthor.split(' ').map(n => n[0]).join('').substring(0, 2).toUpperCase();
                const displayHeadline = cleanHeadline(post.author_headline || AUTHOR_HEADLINE || 'LinkedIn Member').replace(/\s+/g, ' ').trim();
                const profileImg = post.author_profile_image_url || AUTHOR_AVATAR;

                return `
                <article class="post-card bg-neutral-100/40 dark:bg-neutral-900/40 border border-neutral-200 dark:border-neutral-800 rounded-xl p-6 hover:bg-neutral-100/60 dark:hover:bg-neutral-900/60 hover:border-neutral-300 dark:hover:border-neutral-700 transition-all duration-300 group relative flex flex-col h-full shadow-sm dark:shadow-none">
                    
                    <!-- Card Header -->
                    <div class="flex items-start justify-between mb-4">
                        <div class="flex items-center gap-3">
                            <div class="relative flex-shrink-0">
                                ${profileImg ? `<img src="${profileImg}" alt="${cleanPostAuthor}" class="size-10 rounded-full border border-neutral-200 dark:border-neutral-700 object-cover bg-neutral-200" onerror="this.style.display='none'; this.nextElementSibling.style.display='flex';" referrerpolicy="no-referrer" loading="lazy">` : ''}
                                <div class="size-10 rounded-full bg-blue-600 dark:bg-blue-700 text-white font-semibold flex items-center justify-center text-sm" style="${profileImg ? 'display: none;' : ''}">
                                    ${authorInitials}
                                </div>
                                <!-- Platform Icon -->
                                <div class="absolute -bottom-1 -right-1 bg-blue-500 p-0.5 rounded-full border-2 border-neutral-50 dark:border-neutral-900 flex items-center justify-center">
                                    <i data-lucide="linkedin" class="size-2 text-white fill-current"></i>
                                </div>
                            </div>
                            <div>
                                <h3 class="text-sm font-medium text-neutral-800 dark:text-white line-clamp-1 break-all">
                                    <a href="${post.author_profile_url || '#'}" target="_blank" rel="noopener noreferrer" class="hover:text-blue-500 hover:underline">
                                        ${cleanPostAuthor}
                                    </a>
                                </h3>
                                <p class="text-xs text-neutral-500 dark:text-neutral-500 line-clamp-3 break-words">${displayHeadline}</p>
                            </div>
                        </div>

                        <!-- External Post Link -->
                        ${post.post_url ? `<a href="${post.post_url}" target="_blank" rel="noopener noreferrer" class="flex-shrink-0 p-1.5 rounded-lg text-[#0a66c2] dark:text-blue-400 bg-blue-50/50 dark:bg-blue-950/20 border border-blue-100/50 dark:border-blue-900/30 hover:bg-[#0a66c2] dark:hover:bg-[#0a66c2] hover:text-white dark:hover:text-white transition-all duration-300 hover:scale-110 flex items-center justify-center shadow-sm" title="View on LinkedIn"><i data-lucide="external-link" class="size-4"></i></a>` : ''}
                    </div>

                    <!-- Card Body -->
                    ${post.post_text ? (() => {
                        const hasMedia = post.post_image_url || post.has_image || post.is_video || post.is_article || post.article_url;
                        return `
                        <div class="relative mb-4">
                            <div class="post-card-text-part ${!hasMedia ? 'post-card-text-expanded' : ''} pr-1" onscroll="updateTextScroll(this)">
                                <div class="text-sm text-neutral-700 dark:text-neutral-300 leading-relaxed font-light break-words">
                                    ${formatPostText(post.post_text)}
                                </div>
                            </div>
                            <div class="scroll-fade-indicator absolute bottom-0 left-0 right-0 h-8 pointer-events-none transition-opacity duration-300 opacity-0 z-10"></div>
                        </div>
                        `;
                    })() : ''}

                    <!-- Post Media (Images, Videos, or Articles) -->
                    ${(post.is_article || post.article_url) ? `
                    <a href="${post.article_url}" target="_blank" rel="noopener noreferrer" class="block border border-neutral-200 dark:border-neutral-800 rounded-xl overflow-hidden bg-neutral-50 dark:bg-neutral-900/50 hover:bg-neutral-100 dark:hover:bg-neutral-900 transition-colors mb-4 group/article">
                        ${post.post_image_url ? `
                        <div class="h-48 overflow-hidden border-b border-neutral-200 dark:border-neutral-800">
                            <img src="${post.post_image_url}" class="w-full h-full object-cover group-hover/article:scale-105 transition-transform duration-300" loading="lazy" referrerpolicy="no-referrer">
                        </div>
                        ` : ''}
                        <div class="p-4">
                            <div class="flex items-center gap-1.5 text-xs text-neutral-500 dark:text-neutral-500 mb-1">
                                <i data-lucide="link" class="size-3"></i>
                                <span>${post.article_url ? new URL(post.article_url).hostname : 'External Link'}</span>
                            </div>
                            <h4 class="text-sm font-semibold text-neutral-800 dark:text-white line-clamp-2 mb-1 group-hover/article:text-blue-500 transition-colors">
                                ${post.article_title || 'View Article'}
                            </h4>
                            <p class="text-xs text-neutral-500 dark:text-neutral-500 line-clamp-2">
                                ${post.article_description || ''}
                            </p>
                        </div>
                    </a>
                    ` : (post.is_video && (post.video_url || post.post_image_url)) ? (() => {
                        const isVideoSrc = url => url && (url.includes('.mp4') || url.includes('.mov') || url.includes('.webm') || url.includes('/vid/') || url.includes('/playlist/vid/'));
                        const showVideoTag = isVideoSrc(post.post_image_url) || isVideoSrc(post.video_url);
                        const videoSrc = isVideoSrc(post.post_image_url) ? post.post_image_url : post.video_url;
                        return `
                        <div class="post-card-image-part mb-4" data-image-url="${post.video_url || post.post_image_url}" onclick="window.open('${post.post_url || '#'}', '_blank')">
                            ${showVideoTag ? `
                            <video class="w-full h-full object-cover max-h-[360px]" muted playsinline preload="metadata">
                                <source src="${videoSrc}" type="video/mp4">
                            </video>
                            ` : `
                            <img src="${post.post_image_url || ''}" alt="Post Media" loading="lazy" referrerpolicy="no-referrer">
                            `}
                            <div class="video-overlay">
                                <div class="play-button-icon">
                                    <i data-lucide="play" class="size-6 text-white fill-current"></i>
                                </div>
                                <div class="absolute bottom-2 right-2 bg-black/60 backdrop-blur-sm text-white text-[10px] px-1.5 py-0.5 rounded font-medium">VIDEO</div>
                            </div>
                        </div>
                        `;
                    })() : (post.has_image && post.post_image_url) ? `
                    <div class="post-card-image-part mb-4" data-image-url="${post.post_image_url}" onclick="openImageModal('${post.post_image_url}')">
                        <img src="${post.post_image_url}" alt="Post attachment image" class="max-w-full max-h-[360px] object-cover hover:scale-[1.02] transition-transform duration-300" loading="lazy">
                    </div>
                    ` : ''}

                    <!-- Card Footer (Interactions/Engagement metrics) -->
                    <div class="flex items-center justify-between border-t border-neutral-200 dark:border-neutral-800 pt-4 mt-auto">
                        <div class="flex items-center gap-4">
                            <!-- Impressions -->
                            ${post.impression_count > 0 ? `
                            <div class="flex items-center gap-1.5 text-xs text-neutral-500 dark:text-neutral-400" title="${post.impression_count} post impressions">
                                <i data-lucide="eye" class="size-3.5"></i>
                                <span>${post.impression_count.toLocaleString()}</span>
                            </div>
                            ` : ''}

                            <!-- Likes / Reactions -->
                            ${post.reaction_count > 0 ? `
                            <a href="${post.post_url || `https://www.linkedin.com/feed/update/${post.post_urn}`}" target="_blank" rel="noopener noreferrer" class="flex items-center gap-1.5 text-xs text-neutral-500 dark:text-neutral-400 hover:text-blue-500 transition-colors" title="Click here to go to the actual post to like it or express a reaction" onclick="event.stopPropagation();">
                                <div class="flex items-center -space-x-1">
                                    ${getReactionIcons(post.reaction_types).map(icon => `<i data-lucide="${icon}" class="size-3.5 bg-neutral-100 dark:bg-neutral-900 rounded-full p-0.5 box-content border border-white dark:border-neutral-950"></i>`).join('')}
                                </div>
                                <span>${post.reaction_count}</span>
                            </a>
                            ` : ''}
                            
                            <!-- Comments -->
                            ${post.comment_count > 0 ? `
                            <a href="${post.post_url || `https://www.linkedin.com/feed/update/${post.post_urn}`}#comments" target="_blank" rel="noopener noreferrer" class="flex items-center gap-1.5 text-xs text-neutral-500 dark:text-neutral-400 hover:text-blue-500 transition-colors" title="Click here to go to the actual post to view or enter comments" onclick="event.stopPropagation();">
                                <i data-lucide="message-square" class="size-3.5"></i>
                                <span>${post.comment_count}</span>
                            </a>
                            ` : ''}

                            <!-- Reposts -->
                            ${post.repost_count > 0 ? `
                            <div class="flex items-center gap-1.5 text-xs text-neutral-500 dark:text-neutral-400">
                                <i data-lucide="repeat" class="size-3.5"></i>
                                <span>${post.repost_count}</span>
                            </div>
                            ` : ''}
                        </div>
                        
                        <div class="flex items-center gap-3">
                            <span class="text-xs text-neutral-500">${post.posted_time_raw || formatDate(post.posted_time)}</span>
                        </div>
                    </div>

                </article>
                `;
            }).join('');

            lucide.createIcons();

            // Trigger check for overflow text scrollable indicators after rendering
            setTimeout(() => {
                document.querySelectorAll('.post-card-text-part').forEach(el => {
                    updateTextScroll(el);
                });
            }, 100);
        }
    </script>
</body>
</html>
