_text":"Not dumb, just lazy.","post_image_url":"https://media.licdn.com/dms/image/v2/D5622AQEQoscJjA4OmQ/feedshare-shrink_800/B56Z2Qu3onIAAc-/0/1776249699427?e=1784160000&v=beta&t=MDLqhjSgvxOfKM_Eh6oodZsgcfIW23-UFjuF-FsnsOo","is_article":false,"article_url":null,"article_title":null,"article_description":null,"is_video":false,"video_url":null,"has_image":true,"reaction_count":24,"reaction_types":"LIKE, ENTERTAINMENT, PRAISE","impression_count":2317,"source":"activity"},{"is_my_post":true,"post_urn":"urn:li:activity:7449426269034811392","author_name":"Ravi Evani\n              \n                \n                   \n    \n      \n    \n    \n      \n    \n\n • You","author_profile_url":"https://www.linkedin.com/in/ravievani","author_headline":"Deploying enterprise agents in production / CTO / SWE Leader / GVP @ Publicis Sapient","posted_time":"2026-04-27","posted_hours_ago":1440,"posted_time_raw":"2mo","post_url":"https://www.linkedin.com/feed/update/urn:li:activity:7449426269034811392","author_profile_image_url":"https://media.licdn.com/dms/image/v2/C4E03AQGNeJRorEd2Nw/profile-displayphoto-shrink_100_100/profile-displayphoto-shrink_100_100/0/1569287114631?e=1784160000&v=beta&t=tJDZC7EXWnlgIIf8kF7fBCajhF-HEgzNXnz_IIkjqW8","post_text":"Agent personas must go beyond your org chart.\n\nRight now, the standard approach to building multi-agent AI systems is basically skeuomorphic design. We spin up a \"Developer Agent\", a \"QA Agent\", and a \"Product Manager Agent\", and prompt them to talk to each other.\n\nBut why are we digitally recreating corporate silos, communication friction, and department politics?\n\nThe unexplored superpower of AI isn't mimicking individual human roles. It’s creating Cross-Disciplinary Agent Personas—synthetic polymaths that blend entirely different domains together.\n\nIn the real workforce, finding someone with deep, dual-domain expertise is incredibly rare and expensive. But with LLMs, blending disparate knowledge bases into a single entity is a native feature.\n\nWhen an agent holds opposing constraints simultaneously, you eliminate the \"translation penalty\" between departments, drastically shorten feedback loops, and assess complex trade-offs in a single thought process.\n\nHere is what that could look like in practice:\n\nThe Operator-Builder (Operations Manager + Software Engineer)\nEngineers usually build for the \"happy path\" from a quiet desk. This hybrid agent bridges technical capability and physical reality. It doesn't just ask, \"Does this button work?\" It asks, \"Can a server navigate this POS hierarchy with greasy hands while listening to three different conversations during a dinner rush?\"\n\nThe Fiscal-Architect (Solutions Architect + CFO)\nArchitects want perfect, endlessly scalable systems. CFOs want strict budget control. Instead of two separate agents fighting over trade-offs and burning compute to reach a compromise, a hybrid agent internalizes the dialectic. It looks at a proposed cloud architecture and instantly calculates whether the long-term unit economics justify the short-term engineering CapEx.\n\nThe Ethnographic-QA (User Researcher + QA Tester)\nTraditional QA is binary: Did the app crash? This hybrid agent elevates testing to an anthropological study. It tests for cognitive load, ensuring the software molds to the human's actual real-world workflow, rather than forcing the human to change their behavior.\n\nThe first wave of AI agents is about doing standard human jobs faster.\nThe next wave could be about combining perspectives to do jobs that are unrealistic for one person to hold.","post_image_url":"https://media.licdn.com/dms/image/v2/D4E22AQEOjGZFrJ500A/feedshare-image-high-res/B4EZ1.Yvv2GkAU-/0/1775941909831?e=1784160000&v=beta&t=BNV_8_jecTdrGYtBtilUF2iWni8MJV1xY3a1uLQlvjM","is_article":false,"article_url":null,"article_title":null,"article_description":null,"is_video":false,"video_url":null,"has_image":true,"reaction_count":12,"reaction_types":"LIKE","comment_count":1,"impression_count":400,"source":"activity"},{"is_my_post":true,"post_urn":"urn:li:activity:7448941617476104192","author_name":"Ravi Evani\n              \n                \n                   \n    \n      \n    \n    \n      \n    \n\n • You","author_profile_url":"https://www.linkedin.com/in/ravievani","author_headline":"Deploying enterprise agents in production / CTO / SWE Leader / GVP @ Publicis Sapient","posted_time":"2026-04-27","posted_hours_ago":1440,"posted_time_raw":"2mo","post_url":"https://www.linkedin.com/feed/update/urn:li:activity:7448941617476104192","author_profile_image_url":"https://media.licdn.com/dms/image/v2/C4E03AQGNeJRorEd2Nw/profile-displayphoto-shrink_100_100/profile-displayphoto-shrink_100_100/0/1569287114631?e=1784160000&v=beta&t=tJDZC7EXWnlgIIf8kF7fBCajhF-HEgzNXnz_IIkjqW8","post_text":"So from the leak, people are finding that Claude Code is way more deterministic than just a magical Claude LLM.\n\nWe might also end up finding that the Claude LLM itself isn’t purely a transformer, but also an exponentially growing deterministic codebase being derived from large volumes of prior coding interactions.\n\nHeck, that probably could be the case with Codex and others as well.\n\nAnd, with all the moneybags behind it, today’s “LLM” might just end up being a massive deterministic codebase of if-thens and regexes + a massive system prompt + 200 lines of transformer code. 😝","post_image_url":null,"is_article":false,"article_url":null,"article_title":null,"article_description":null,"is_video":false,"video_url":null,"has_image":false,"reaction_count":27,"reaction_types":"LIKE, ENTERTAINMENT","impression_count":3087,"source":"activity"},{"is_my_post":true,"post_urn":"urn:li:activity:7448696153279250433","author_name":"Ravi Evani\n              \n                \n                   \n    \n      \n    \n    \n      \n    \n\n • You","author_profile_url":"https://www.linkedin.com/in/ravievani","author_headline":"Deploying enterprise agents in production / CTO / SWE Leader / GVP @ Publicis Sapient","posted_time":"2026-04-27","posted_hours_ago":1440,"posted_time_raw":"2mo","post_url":"https://www.linkedin.com/feed/update/urn:li:activity:7448696153279250433","author_profile_image_url":"https://media.licdn.com/dms/image/v2/C4E03AQGNeJRorEd2Nw/profile-displayphoto-shrink_100_100/profile-displayphoto-shrink_100_100/0/1569287114631?e=1784160000&v=beta&t=tJDZC7EXWnlgIIf8kF7fBCajhF-HEgzNXnz_IIkjqW8","post_text":"If you apply hyper-drive to a single gear in a rusty machine, you don't go faster. You just strip the gears.","post_image_url":"https://media.licdn.com/dms/image/v2/D4E22AQFdOknbliSz7Q/feedshare-shrink_800/B4EZ18VrhFIgAc-/0/1775907551587?e=1784160000&v=beta&t=5rVdKfBm-ZlqiPF3HNhH20d8ABfAULzfI8DOfLfKfQU","is_article":false,"article_url":null,"article_title":null,"article_description":null,"is_video":false,"video_url":null,"has_image":true,"reaction_count":15,"reaction_types":"LIKE, EMPATHY","comment_count":1,"impression_count":666,"source":"activity"},{"is_my_post":true,"post_urn":"urn:li:activity:7448184447042019328","author_name":"Ravi Evani\n              \n                \n                   \n    \n      \n    \n    \n      \n    \n\n • You","author_profile_url":"https://www.linkedin.com/in/ravievani","author_headline":"Deploying enterprise agents in production / CTO / SWE Leader / GVP @ Publicis Sapient","posted_time":"2026-04-27","posted_hours_ago":1440,"posted_time_raw":"2mo","post_url":"https://www.linkedin.com/feed/update/urn:li:activity:7448184447042019328","author_profile_image_url":"https://media.licdn.com/dms/image/v2/C4E03AQGNeJRorEd2Nw/profile-displayphoto-shrink_100_100/profile-displayphoto-shrink_100_100/0/1569287114631?e=1784160000&v=beta&t=tJDZC7EXWnlgIIf8kF7fBCajhF-HEgzNXnz_IIkjqW8","post_text":"We see a lot of posts about managing “multiple” agents. Most can’t manage 2 yet, and that’s okay. Don’t get FOMO from the hype. There are levels to this, and it will take time.","post_image_url":"https://media.licdn.com/dms/image/v2/D4E22AQEfmP4WsUP5kw/feedshare-image-high-res/B4EZ11ESZeIMAY-/0/1775785551759?e=1784160000&v=beta&t=A3VDcs2Lr5in_d6-ByuYsQckTATqqcinflz_vCAMpFI","is_article":false,"article_url":null,"article_title":null,"article_description":null,"is_video":false,"video_url":null,"has_image":true,"reaction_count":20,"reaction_types":"LIKE, INTEREST, EMPATHY","comment_count":4,"repost_count":1,"impression_count":1161,"source":"activity"},{"is_my_post":true,"post_urn":"urn:li:activity:7447914605101744128","author_name":"Ravi Evani\n              \n                \n                   \n    \n      \n    \n    \n      \n    \n\n • You","author_profile_url":"https://www.linkedin.com/in/ravievani","author_headline":"Deploying enterprise agents in production / CTO / SWE Leader / GVP @ Publicis Sapient","posted_time":"2026-04-27","posted_hours_ago":1440,"posted_time_raw":"2mo","post_url":"https://www.linkedin.com/feed/update/urn:li:activity:7447914605101744128","author_profile_image_url":"https://media.licdn.com/dms/image/v2/C4E03AQGNeJRorEd2Nw/profile-displayphoto-shrink_100_100/profile-displayphoto-shrink_100_100/0/1569287114631?e=1784160000&v=beta&t=tJDZC7EXWnlgIIf8kF7fBCajhF-HEgzNXnz_IIkjqW8","post_text":"Managing agents in parallel might sound heroic, but the reality is intense. Each agent forking into multiple paths means you’re juggling significant complexity, not unlike managing a team that keeps branching into more sub-tasks. If two are on track and three are off, suddenly you’re tracking even more threads. In compressed timeframes (especially when agents generate massive output) the bottleneck shifts. Unless you are able to keep realigning everything toward a coherent goal with quality, you could end up at a level of complexity that few are capable to managing.\n\nIn practice, you won’t have most people managing at this scale anytime soon. It’s more like a niche capability. You might have a few standout individuals or small teams that can orchestrate this level of agent-driven work. For the rest, reaching that level of maturity will take years. The key is not buying into the hype, but progressively aligning your teams toward a model where more autonomy is managed over time.","post_image_url":null,"is_article":false,"article_url":null,"article_title":null,"article_description":null,"is_video":false,"video_url":null,"has_image":false,"reaction_count":12,"reaction_types":"LIKE","comment_count":1,"impression_count":675,"source":"activity"},{"is_my_post":true,"post_urn":"urn:li:activity:7447108391358849024","author_name":"Ravi Evani\n              \n                \n                   \n    \n      \n    \n    \n      \n    \n\n • You","author_profile_url":"https://www.linkedin.com/in/ravievani","author_headline":"Deploying enterprise agents in production / CTO / SWE Leader / GVP @ Publicis Sapient","posted_time":"2026-04-27","posted_hours_ago":1440,"posted_time_raw":"2mo","post_url":"https://www.linkedin.com/feed/update/urn:li:activity:7447108391358849024","author_profile_image_url":"https://media.licdn.com/dms/image/v2/C4E03AQGNeJRorEd2Nw/profile-displayphoto-shrink_100_100/profile-displayphoto-shrink_100_100/0/1569287114631?e=1784160000&v=beta&t=tJDZC7EXWnlgIIf8kF7fBCajhF-HEgzNXnz_IIkjqW8","post_text":"So now that we have AI agents, our meeting scheduling problems will be solved, right? ...\n\nNot so fast.\n\nFor decades, we’ve had tools for scheduling. We’ve had calendars, we've had scheduling software that connects all our calendars together, we've had schedulers that scan across multiple people’s calendars to find open time slots. We continue to have layers and layers of automation. Heck, some of the lucky ones even have secretaries who use this automation to get meetings scheduled!\n\nAnd yet the problem of \"scheduling\" still remains. Why?\n\nBecause the real problem of scheduling was never just finding the time. Yes, AI could make that part faster. But that was always the smaller problem.\n\nThe real scheduling problem is this: will the person actually show up? or worse: will the person actually be \"present\"?\n\nThat has nothing to do with calendar automation. It has to do with human behavior. Are they going to make it? Are they going to be on time? Do they care enough about the meeting? Do they have enough reason to be there? Will they be able to give the meeting their full attention?\n\nNone of that gets solved by an \"AI scheduler\".\n\nSo even in something as simple as scheduling a meeting, AI just ends up exposing the real bottleneck. The main source of friction is never really the tool. The friction is in the human behind it.\n\nBecause, at the end of the day, if meeting really matters to a person, they will make it in body and mind. If it does not, then no amount of AI fixes that.\n\nSo is there some value using AI here? ofc. That smaller part of scheduling gets a little better. But the bigger part, the human part, is still unsolved.\n\nAnd that, can only be solved, by the human.","post_image_url":null,"is_article":false,"article_url":null,"article_title":null,"article_description":null,"is_video":false,"video_url":null,"has_image":false,"reaction_count":17,"reaction_types":"LIKE","comment_count":4,"impression_count":1033,"source":"activity"},{"is_my_post":true,"post_urn":"urn:li:activity:7446746003757494272","author_name":"Ravi Evani\n              \n                \n                   \n    \n      \n    \n    \n      \n    \n\n • You","author_profile_url":"https://www.linkedin.com/in/ravievani","author_headline":"Deploying enterprise agents in production / CTO / SWE Leader / GVP @ Publicis Sapient","posted_time":"2026-04-27","posted_hours_ago":1440,"posted_time_raw":"2mo","post_url":"https://www.linkedin.com/feed/update/urn:li:activity:7446746003757494272","author_profile_image_url":"https://media.licdn.com/dms/image/v2/C4E03AQGNeJRorEd2Nw/profile-displayphoto-shrink_100_100/profile-displayphoto-shrink_100_100/0/1569287114631?e=1784160000&v=beta&t=tJDZC7EXWnlgIIf8kF7fBCajhF-HEgzNXnz_IIkjqW8","post_text":"*indominus rex growls*\n\nMasrani:\"can she see us?\"\nClaire: \"they say it can sense thermal radiations., like snakes\"\nMasrani: \"I thought there were two of them\"\nClaire: \"there was a sibling incase this one didn't survive infancy\"\nMasrani: \"where's the sibling?\"\nClaire: \"she ate it\"","post_image_url":"https://media.licdn.com/dms/image/v2/D4E22AQE4TC0UQqle8A/feedshare-shrink_800/B4EZ1fyBTPG8Ac-/0/1775428441914?e=1784160000&v=beta&t=LWH71v6kJ22o2bSw5PIAE7-8Z5ML_wXX9XSTgUyXiKo","is_article":false,"article_url":null,"article_title":null,"article_description":null,"is_video":false,"video_url":null,"has_image":true,"reaction_count":15,"reaction_types":"LIKE, ENTERTAINMENT","impression_count":1098,"source":"activity"},{"is_my_post":true,"post_urn":"urn:li:activity:7446526282273558528","author_name":"Ravi Evani\n              \n                \n                   \n    \n      \n    \n    \n      \n    \n\n • You","author_profile_url":"https://www.linkedin.com/in/ravievani","author_headline":"Deploying enterprise agents in production / CTO / SWE Leader / GVP @ Publicis Sapient","posted_time":"2026-04-27","posted_hours_ago":1440,"posted_time_raw":"2mo","post_url":"https://www.linkedin.com/feed/update/urn:li:activity:7446526282273558528","author_profile_image_url":"https://media.licdn.com/dms/image/v2/C4E03AQGNeJRorEd2Nw/profile-displayphoto-shrink_100_100/profile-displayphoto-shrink_100_100/0/1569287114631?e=1784160000&v=beta&t=tJDZC7EXWnlgIIf8kF7fBCajhF-HEgzNXnz_IIkjqW8","post_text":"What happened with Claude code is what enterprises are terrified of. Not just that the code was exposed, but what it contained.\n\nWhen it comes to driving fast or driving safe, most will choose the latter. We will now begin to see a very defensive Anthropic, and those who are experienced masters of defensive acceleration will take the lead. And that’s a good thing for the ecosystem.","post_image_url":null,"is_article":false,"article_url":null,"article_title":null,"article_description":null,"is_video":false,"video_url":null,"has_image":false,"reaction_count":20,"reaction_types":"LIKE, INTEREST","impression_count":1365,"source":"activity"},{"is_my_post":true,"post_urn":"urn:li:activity:7446298378520563712","author_name":"Ravi Evani\n              \n                \n                   \n    \n      \n    \n    \n      \n    \n\n • You","author_profile_url":"https://www.linkedin.com/in/ravievani","author_headline":"Deploying enterprise agents in production / CTO / SWE Leader / GVP @ Publicis Sapient","posted_time":"2026-04-27","posted_hours_ago":1440,"posted_time_raw":"2mo","post_url":"https://www.linkedin.com/feed/update/urn:li:activity:7446298378520563712","author_profile_image_url":"https://media.licdn.com/dms/image/v2/C4E03AQGNeJRorEd2Nw/profile-displayphoto-shrink_100_100/profile-displayphoto-shrink_100_100/0/1569287114631?e=1784160000&v=beta&t=tJDZC7EXWnlgIIf8kF7fBCajhF-HEgzNXnz_IIkjqW8","post_text":"If you want to see a masterclass in high-pressure operational orchestration, don't look at a Wall Street trading floor. Look at a QSR's Shift Manager during a Friday rush!\n\nWhile building an agentic systems for QSR managers, I’ve gained a massive appreciation for what it takes to run a high-velocity kitchen. It's a multi-variable micro-manufacturing plant running on a ruthless 120-second clock. ⏱️\n\nHere are a few of the high-pressure realities QSR managers face every single shift:\n\n1/ The Tyranny of the Clock (OEPE & KVS): Today’s managers are fighting a war on two fronts. The physical drive-thru line is one thing, but the \"Invisible Rush\" (a sudden, unpredicted convergence of UberEats couriers, Mobile App orders, and geofenced arrivals) could flood the Kitchen Video System (KVS) in milliseconds.\nWhen the screens turn red, human instinct takes over. The manager abandons their macro-view at the Observation Post and dives onto the line to flip burgers or bag fries!\n\n2/ The Rule of Three (Danger Zones): A bottleneck can cascade into a disaster in minutes. Managers must constantly scan for immediate danger signals:\n3+ cars queued at the Drive-Thru speaker\n3+ customers waiting at the front counter\n3+ pending orders on any Kitchen Video System (KVS) Once a danger zone hits, they have to instantly flex the crew to relieve the pressure.\n\n3/ The \"Runager\" Trap: It’s tempting for a manager to jump on the grill when things get crazy. But if they do, they lose visibility of the whole floor!\n\n4/ \"Aces in Their Places\": Moving a crew member costs valuable time. They want your fastest people at the chokepoints (like the Drive-Thru Window or Expediting). But flexing an employee to help somewhere else is a high-stakes calculation: Will solving this bottleneck just create a new one?\n\nThis is a cognitive overload problem. And restaurant managers don’t need another generic dashboard telling them they are behind: they need a real-time agentic Copilot!","post_image_url":"https://media.licdn.com/dms/image/v2/D4E05AQGMIrR1sAyVBQ/videocover-low/B4EZ1aQ5X7GcBY-/0/1775335873446?e=1783137600&v=beta&t=7-idNXHMlvl5BXARi8K8RwLvO7EnGW7IWxcEOy8aXmQ","is_article":false,"article_url":null,"article_title":null,"article_description":null,"is_video":true,"video_url":"https://media.licdn.com/dms/image/v2/D4E05AQGMIrR1sAyVBQ/videocover-low/B4EZ1aQ5X7GcBY-/0/1775335873446?e=1783137600&v=beta&t=7-idNXHMlvl5BXARi8K8RwLvO7EnGW7IWxcEOy8aXmQ","has_image":true,"reaction_count":27,"reaction_types":"LIKE","impression_count":1118,"source":"activity"},{"is_my_post":true,"post_urn":"urn:li:activity:7445481350360592384","author_name":"Ravi Evani\n              \n                \n                   \n    \n      \n    \n    \n      \n    \n\n • You","author_profile_url":"https://www.linkedin.com/in/ravievani","author_headline":"Deploying enterprise agents in production / CTO / SWE Leader / GVP @ Publicis Sapient","posted_time":"2026-04-27","posted_hours_ago":1440,"posted_time_raw":"2mo","post_url":"https://www.linkedin.com/feed/update/urn:li:activity:7445481350360592384","author_profile_image_url":"https://media.licdn.com/dms/image/v2/C4E03AQGNeJRorEd2Nw/profile-displayphoto-shrink_100_100/profile-displayphoto-shrink_100_100/0/1569287114631?e=1784160000&v=beta&t=tJDZC7EXWnlgIIf8kF7fBCajhF-HEgzNXnz_IIkjqW8","post_text":"Building a winning product is going to get much harder.\n\nAs the barrier to building drops, consumer expectations will skyrocket.\n\nA pixel-perfect UI that works flawlessly today is no longer a competitive advantage. It's just the baseline.\n\nIf your app looks beautiful but takes 15 steps to complete a workflow, your users aren't going to praise your design. They’re going to ask: \"Why didn't this take 2 steps?\"\n\nThe best app for an enterprise workflow might actually be no app -- where the task gets done automatically, behind the scenes, with zero friction.\n\nThe bar is shifting. If you aren't figuring out how to get your user's 15-step process down to zero, your \"quickly built\" product won't be able to retain them or continue to drive value for your business.","post_image_url":"https://media.licdn.com/dms/image/v2/D4E05AQHGyr97yMft7Q/videocover-high/B4EZ1OpwObIEBY-/0/1775141067756?e=1783137600&v=beta&t=vei9a9V2bpB0j7VKejVP1N-kGwthfYJtifiNFex6EM0","is_article":false,"article_url":null,"article_title":null,"article_description":null,"is_video":true,"video_url":"https://media.licdn.com/dms/image/v2/D4E05AQHGyr97yMft7Q/videocover-high/B4EZ1OpwObIEBY-/0/1775141067756?e=1783137600&v=beta&t=vei9a9V2bpB0j7VKejVP1N-kGwthfYJtifiNFex6EM0","has_image":true,"reaction_count":21,"reaction_types":"LIKE","impression_count":1649,"source":"activity"},{"is_my_post":true,"post_urn":"urn:li:activity:7445099143565369345","author_name":"Ravi Evani\n              \n                \n                   \n    \n      \n    \n    \n      \n    \n\n • You","author_profile_url":"https://www.linkedin.com/in/ravievani","author_headline":"Deploying enterprise agents in production / CTO / SWE Leader / GVP @ Publicis Sapient","posted_time":"2026-04-27","posted_hours_ago":1440,"posted_time_raw":"2mo","post_url":"https://www.linkedin.com/feed/update/urn:li:activity:7445099143565369345","author_profile_image_url":"https://media.licdn.com/dms/image/v2/C4E03AQGNeJRorEd2Nw/profile-displayphoto-shrink_100_100/profile-displayphoto-shrink_100_100/0/1569287114631?e=1784160000&v=beta&t=tJDZC7EXWnlgIIf8kF7fBCajhF-HEgzNXnz_IIkjqW8","post_text":"Some might call the Lufthansa 747-400 cabin “old”. I’d call it a reminder of when flying still felt a little more special. Nothing beats the 4-window view from the quiet upper deck. Hope they don’t “modernize” the cabin into cubicles.","post_image_url":"https://media.licdn.com/dms/image/v2/D4E22AQHaaRhuRIAp3A/feedshare-shrink_800/B4EZ1JONCPIUAc-/0/1775049956269?e=1784160000&v=beta&t=MEMJo_lKyPScElfBS99Mujl9n8aKBJbth9__4FCj39U","is_article":false,"article_url":null,"article_title":null,"article_description":null,"is_video":false,"video_url":null,"has_image":true,"reaction_count":29,"reaction_types":"LIKE, EMPATHY","comment_count":2,"impression_count":3887,"source":"activity"},{"is_my_post":true,"post_urn":"urn:li:activity:7445015384459563008","author_name":"Ravi Evani\n              \n                \n                   \n    \n      \n    \n    \n      \n    \n\n • You","author_profile_url":"https://www.linkedin.com/in/ravievani","author_headline":"Deploying enterprise agents in production / CTO / SWE Leader / GVP @ Publicis Sapient","posted_time":"2026-04-27","posted_hours_ago":1440,"posted_time_raw":"2mo","post_url":"https://www.linkedin.com/feed/update/urn:li:activity:7445015384459563008","author_profile_image_url":"https://media.licdn.com/dms/image/v2/C4E03AQGNeJRorEd2Nw/profile-displayphoto-shrink_100_100/profile-displayphoto-shrink_100_100/0/1569287114631?e=1784160000&v=beta&t=tJDZC7EXWnlgIIf8kF7fBCajhF-HEgzNXnz_IIkjqW8","post_text":"Excel is the ultimate \"low floor, infinite ceiling\" tool. Anyone can type numbers into a grid and use =SUM(), which tricks people into thinking they \"know Excel.\" But there is a universe of difference between a beginner making a budget and a master building a dynamic, automated enterprise financial model using Power Query, relational data models, and VBA. An expert knows Excel can do almost anything if you structure the data and logic correctly.\n\nAgentic coding has entered this same territory. The tools are now more than capable. The only gap is your skill. And that now spans way beyond prompting.\n\n- context\n- tools\n- rules\n- skills\n- workflows\n- sub agents\n\nClosing this skill gap can make you 10x more productive vs simply writing prompts.\n\nBut you already knew that. So what’s stopping you?","post_image_url":null,"is_article":false,"article_url":null,"article_title":null,"article_description":null,"is_video":false,"video_url":null,"has_image":false,"reaction_count":7,"reaction_types":"LIKE","repost_count":1,"impression_count":830,"source":"activity"},{"is_my_post":true,"post_urn":"urn:li:activity:7444384924708585472","author_name":"Ravi Evani\n              \n                \n                   \n    \n      \n    \n    \n      \n    \n\n • You","author_profile_url":"https://www.linkedin.com/in/ravievani","author_headline":"Deploying enterprise agents in production / CTO / SWE Leader / GVP @ Publicis Sapient","posted_time":"2026-04-27","posted_hours_ago":1440,"posted_time_raw":"2mo","post_url":"https://www.linkedin.com/feed/update/urn:li:activity:7444384924708585472","author_profile_image_url":"https://media.licdn.com/dms/image/v2/C4E03AQGNeJRorEd2Nw/profile-displayphoto-shrink_100_100/profile-displayphoto-shrink_100_100/0/1569287114631?e=1784160000&v=beta&t=tJDZC7EXWnlgIIf8kF7fBCajhF-HEgzNXnz_IIkjqW8","post_text":"I sat through a well-designed \"estimation review\" presentation recently, where the team sized up the resources, cost and timeline for a project.\n\nIt had clean slides and a thoughtful structure. A lot of effort clearly went into the preparation.\n\nBut the problem was none of it was usable beyond that moment.\n\nThe estimate was presented, discussed, and even agreed upon. But it wasn’t reproducible. It wasn’t codified. And it definitely wasn’t something an agent could pick up and run with.\n\nThat’s the gap most enterprises are still stuck in.\n\nWe continue to optimize for human consumption: PowerPoint decks, visuals, narratives. But we’re not structuring the underlying data / decisioning in a way that supports repeatability, automation, or agent-driven workflows.\n\nAn estimate shouldn’t just be numbers on a slide. It should be the output of clearly defined dimensions, assumptions, and facts that can be captured, reused, and reasoned over. That’s what allows you to scale it. That’s what allows an agent to generate it again, consistently, without starting from scratch.\n\nRight now, we’re putting energy into presentation instead of production.\n\nThe shift is simple, but not easy: It is to separate the two concerns.\n\nOne path for humans: to influence, align, and communicate.\nAnother path for machines: structured, explicit, and reusable.\n\nAnd the two need to stay in sync.\n\nUntil that happens, we’ll keep producing great-looking outputs that don’t actually move the system forward.\n\nThe question is not whether an estimate looks good. It’s whether it can be leveraged again to solve the next problem.","post_image_url":null,"is_article":false,"article_url":null,"article_title":null,"article_description":null,"is_video":false,"video_url":null,"has_image":false,"reaction_count":11,"reaction_types":"LIKE","impression_count":921,"source":"activity"},{"is_my_post":true,"post_urn":"urn:li:activity:7444021540758716416","author_name":"Ravi Evani\n              \n                \n                   \n    \n      \n    \n    \n      \n    \n\n • You","author_profile_url":"https://www.linkedin.com/in/ravievani","author_headline":"Deploying enterprise agents in production / CTO / SWE Leader / GVP @ Publicis Sapient","posted_time":"2026-04-27","posted_hours_ago":1440,"posted_time_raw":"2mo","post_url":"https://www.linkedin.com/feed/update/urn:li:activity:7444021540758716416","author_profile_image_url":"https://media.licdn.com/dms/image/v2/C4E03AQGNeJRorEd2Nw/profile-displayphoto-shrink_100_100/profile-displayphoto-shrink_100_100/0/1569287114631?e=1784160000&v=beta&t=tJDZC7EXWnlgIIf8kF7fBCajhF-HEgzNXnz_IIkjqW8","post_text":"Why \"Vibe Coding\" is the catalyst for a software engineering renaissance\n\nRight now, there is a consensus that vibe coding is inherently bad. The criticism is that it replaces software craftsmanship with \"AI slop\": bloated, buggy, and unmaintainable code generated by users who are merely \"vibing\" rather than engineering.\n\nBut blaming vibe coding for bad software misses the mark entirely. Vibe coding simply exposes and amplifies the truth about how good or bad a person, team, or enterprise actually is at building systems.\n\n1. A reflection of internal reality: Your architecture & context are your \"DNA\"\nIf vibe coding is filling your repositories with brittle slop, it is because the underlying engineering DNA was already sloppy. Agents work within the boundaries and the context window you give them. So if the output is tangled, fragile, and monolithic, it is often reflecting a codebase where those patterns were already accepted. Garbage in, garbage out. In a clean, modular environment, the AI is far more likely to generate better code. The slop is a mirror of the habits, standards, and architectural discipline already present in the person and organization using it.\n\n2. Accountability over blame: The guardrail crisis\nIt has become fashionable for engineering leaders to blame hallucinating AI when bad code causes issues. That is a cop-out. AI can write bad code, just like humans can. If that slop reaches production, the real failure is not the AI. It is the lack of engineering guardrails: weak tests, weak CI/CD, and weak review discipline.\n\n3. Public record of character: Velocity exposes fragility\nBefore AI, bad system design could stay hidden behind the slow pace of manual development. Because humans wrote code slowly, structural rot built up slowly too, buried inside individual IDEs and stretched across long sprint cycles. Vibe coding removes that buffer. When developers can generate thousands of lines in an afternoon, it becomes a stress test that exposes the bottlenecks, weak automation, tight coupling, and other architectural sins that were always there.\n\nThe Path to Acceptance: An Engineering Renaissance\nThe \"AI slop\" era is terrifying for technical leaders, but it is ultimately a required step forward for the industry. Vibe coding should force enterprises to confront the uncomfortable truth about their fragile systems. By amplifying these flaws, AI will eventually push the industry toward a renaissance in systems architecture and platform engineering. Organizations will realize that in the age of AI, writing syntax is cheap, but rigorous system design, automated testing, and clear domain boundaries are priceless. To survive, they will be forced to build foundational platforms where the \"right way\" to write code is the only way the AI can write it.\n\nVibe coding lays bare the underlying competence of the organization. It’s time to stop blaming the magnifying glass and start fixing the system it's reflecting.","post_image_url":null,"is_article":false,"article_url":null,"article_title":null,"article_description":null,"is_video":false,"video_url":null,"has_image":false,"reaction_count":13,"reaction_types":"LIKE","impression_count":686,"source":"activity"},{"is_my_post":true,"post_urn":"urn:li:activity:7443853366549430272","author_name":"Ravi Evani\n              \n                \n                   \n    \n      \n    \n    \n      \n    \n\n • You","author_profile_url":"https://www.linkedin.com/in/ravievani","author_headline":"Deploying enterprise agents in production / CTO / SWE Leader / GVP @ Publicis Sapient","posted_time":"2026-04-27","posted_hours_ago":1440,"posted_time_raw":"2mo","post_url":"https://www.linkedin.com/feed/update/urn:li:activity:7443853366549430272","author_profile_image_url":"https://media.licdn.com/dms/image/v2/C4E03AQGNeJRorEd2Nw/profile-displayphoto-shrink_100_100/profile-displayphoto-shrink_100_100/0/1569287114631?e=1784160000&v=beta&t=tJDZC7EXWnlgIIf8kF7fBCajhF-HEgzNXnz_IIkjqW8","post_text":"Have you ever built an AI assistant...say, a helpful concierge for a restaurant app...only to have it suddenly turn around and ask *you* for a recommendation?\n\nIf so, you’ve experienced *Persona Drifting*, just like I did this weekend.\n\nWhat is it?\n\nPersona Drifting occurs when an AI model loses track of its assigned identity during a conversation and adopts a different role, often mirroring the user or adopting a generic, unhelpful conversational stance.\n\nInstead of remaining the authoritative \"Assistant,\" the AI drifts into becoming a \"Customer,\" a \"Co-worker,\" or simply a confused participant asking the user open-ended questions when it was supposed to be the one giving recommendations.\n\nWhy Does It Happen?\n\nAI models, especially highly capable conversational models, are trained on vast amounts of human-to-human dialogue. In typical human conversation, roles are fluid. If I give you a list of options, it’s natural for me to ask, \"Which of these do you prefer?\"\n\nWhen we use APIs to create multi-turn interactions (like the Gemini Interactions API or Live API), we are often stitching together separate requests. Persona drifting typically happens due to:\n\n1. Inconsistent System Instructions Across Turns:\nIn Turn 1, you might tell the AI: \"You are a specialized Restaurant AI Assistant.\"\nIn Turn 2 (e.g., summarizing tool results), you might simplify the instruction to: \"Summarize these results.\"\n\nBecause the strong persona anchor from Turn 1 is missing in Turn 2, the model relies on the immediate context. It sees a list of food items and defaults to its conversational training, asking, \"What would you like to do with these?\", and leaving you puzzled.\n\n2. Lack of Negative Constraints:\nModels are eager to keep the conversation going. Unless explicitly told *not* to ask follow-up questions, they often will. They view ending a turn with a question as engaging and helpful.\n\n3. Context Window Imbalance:\nAs the conversation grows, the initial system prompt gets further away in the context window, while the immediate back-and-forth dominates the model's attention. The model starts mimicking the user's conversational style.\n\nHow to Fix It?\n\nThe solution requires disciplined prompt engineering and state management, particularly when chaining API calls:\n\n1/ The \"Anchor\" Strategy: Never dilute the system instruction. Every single turn or API call in a flow must reiterate the core persona.\n\n2/ Explicit Negative Constraints: Borrow a technique from Google's own reference projects. Explicitly tell the model: \"Do not ask for additional info or follow-up questions; make your best judgment based on the available data.\"\n\n3/ Role Enforcement: Clearly define the boundary. \"You are the Assistant. The human is the Customer. You provide answers; you do not ask for suggestions.\"\n\nBy managing system instructions consistently across every turn, we can keep our AI concierges behind the counter where they belong: serving answers, not asking us for fries.","post_image_url":"https://media.licdn.com/dms/image/v2/D4E22AQG2raIXwbKOMQ/feedshare-shrink_1280/B4EZ03hMPyIUAM-/0/1774752941322?e=1784160000&v=beta&t=5nFq8xT7_Bkq-etkzpSw4SuMglXyCoSsdzp1k-LS4NY","is_article":false,"article_url":null,"article_title":null,"article_description":null,"is_video":false,"video_url":null,"has_image":true,"reaction_count":11,"reaction_types":"LIKE","impression_count":422,"source":"activity"},{"is_my_post":true,"post_urn":"urn:li:activity:7443631742399299584","author_name":"Ravi Evani\n              \n                \n                   \n    \n      \n    \n    \n      \n    \n\n • You","author_profile_url":"https://www.linkedin.com/in/ravievani","author_headline":"Deploying enterprise agents in production / CTO / SWE Leader / GVP @ Publicis Sapient","posted_time":"2026-04-27","posted_hours_ago":1440,"posted_time_raw":"2mo","post_url":"https://www.linkedin.com/feed/update/urn:li:activity:7443631742399299584","author_profile_image_url":"https://media.licdn.com/dms/image/v2/C4E03AQGNeJRorEd2Nw/profile-displayphoto-shrink_100_100/profile-displayphoto-shrink_100_100/0/1569287114631?e=1784160000&v=beta&t=tJDZC7EXWnlgIIf8kF7fBCajhF-HEgzNXnz_IIkjqW8","post_text":"Enterprise Math\n2016: Once we get on Cloud, we’ll get speed to market.\n2026: Once we get on AI, we’ll get speed to market.\n\nUnfortunately in both cases, the bottleneck just moves somewhere else.","post_image_url":null,"is_article":false,"article_url":null,"article_title":null,"article_description":null,"is_video":false,"video_url":null,"has_image":false,"reaction_count":18,"reaction_types":"LIKE","comment_count":2,"impression_count":1009,"source":"activity"},{"is_my_post":true,"post_urn":"urn:li:activity:7443283818029039616","author_name":"Ravi Evani\n              \n                \n                   \n    \n      \n    \n    \n      \n    \n\n • You","author_profile_url":"https://www.linkedin.com/in/ravievani","author_headline":"Deploying enterprise agents in production / CTO / SWE Leader / GVP @ Publicis Sapient","posted_time":"2026-04-27","posted_hours_ago":1440,"posted_time_raw":"2mo","post_url":"https://www.linkedin.com/feed/update/urn:li:activity:7443283818029039616","author_profile_image_url":"https://media.licdn.com/dms/image/v2/C4E03AQGNeJRorEd2Nw/profile-displayphoto-shrink_100_100/profile-displayphoto-shrink_100_100/0/1569287114631?e=1784160000&v=beta&t=tJDZC7EXWnlgIIf8kF7fBCajhF-HEgzNXnz_IIkjqW8","post_text":"I’m already feeling the impact of Jevon’s paradox. As AI lowers the time, cost, and friction of writing code, I’m demanding more from myself. More small tools. More automation. More things built faster to make my life easier.\n\nIt looks like Jevon’s paradox going to reshape how most developers work in three ways:\n\n1. From writing code to orchestrating work\nWe’ve been trained to work linearly: pick a ticket, solve it, move on.\nNow you’re managing (or will be expected to manage) multiple threads at once: different agents generating, testing, iterating in parallel. The job shifts from “build this” to “run a system that builds many things at once.” If you stay sequential, you’ll just bottleneck yourself.\n\n2. Deciding what actually needs a human\nYou won’t be able to review everything. There will be too much output. So the skill becomes judgment: where do I step in, and where do I trust the system?\nArchitecture decisions, risk-heavy changes, anything with downstream impac might be where you need to focus. Everything else, you let run. Most devs aren’t used to thinking this way yet.\n\n3. Taste becomes your differentiator\nIf code is cheap, experience is not. Anything customer-facing: UI, flows, interactions, can’t just be “correct.” It has to feel right. That requires taste.\nSo now you’re not just an engineer, you’re a filter. You’re deciding what ships based on how it lands with real users, not just whether it works.","post_image_url":"https://media.licdn.com/dms/image/v2/D4E22AQEc2bJvB2HKaA/feedshare-shrink_800/B4EZ0vbMKZJcAc-/0/1774617150505?e=1784160000&v=beta&t=rgHWRvTAN-20Z-qxI3ynY7kJ9u-cxc5hUGFOLLl2ar8","is_article":false,"article_url":null,"article_title":null,"article_description":null,"is_video":false,"video_url":null,"has_image":true,"reaction_count":10,"reaction_types":"LIKE, EMPATHY","comment_count":2,"repost_count":2,"impression_count":837,"source":"activity"},{"is_my_post":true,"post_urn":"urn:li:activity:7442537046658756608","author_name":"Ravi Evani\n              \n                \n                   \n    \n      \n    \n    \n      \n    \n\n • You","author_profile_url":"https://www.linkedin.com/in/ravievani","author_headline":"Deploying enterprise agents in production / CTO / SWE Leader / GVP @ Publicis Sapient","posted_time":"2026-03-27","posted_hours_ago":2160,"posted_time_raw":"3mo","post_url":"https://www.linkedin.com/feed/update/urn:li:activity:7442537046658756608","author_profile_image_url":"https://media.licdn.com/dms/image/v2/C4E03AQGNeJRorEd2Nw/profile-displayphoto-shrink_100_100/profile-displayphoto-shrink_100_100/0/1569287114631?e=1784160000&v=beta&t=tJDZC7EXWnlgIIf8kF7fBCajhF-HEgzNXnz_IIkjqW8","post_text":"Simply asking your AI to \"review this code\" is a weak strategy. Instead, use these 3 prompts for a brutal code review:\n\n1. \"Simulate a hostile Principal Engineer conducting a rigorous code review on this application. Generate every serious objection they would raise regarding security vulnerabilities, race conditions, unhandled edge cases, and performance bottlenecks. Then, step out of character and tell me which of these objections actually have merit (fatal flaws), and which ones are just pedantic nitpicks I can safely ignore or dismantle.\"\n\nWhy it works: It strips away the AI's \"helpful assistant\" persona. It forces the model to run a heuristic analysis, actively hunting for the exact SQL injections, memory leaks, or scaling issues it overlooked when it first generated the code.\n\n2. \"Identify the weakest, most brittle piece of logic or architectural decision in this code and steelman it. Show me what this specific component would look like if it were completely airtight, highly optimized, and enterprise-ready. Then, tell me exactly what edge-case unit tests I'd need to write to prove it won't break under pressure.\"\n\nWhy it works: AI takes the path of least resistance when generating initial drafts. This prompt forces it to allocate its compute entirely toward robust architecture, turning a flimsy prototype into production-ready logic. Asking for the tests creates a validation checklist.\n\n3. \"You are an uncompromising Tech Lead. I have 24 hours before a hard code freeze and this PR needs to be merged. Read these files [@file1, @file2, ..] and tell me the single most impactful architectural change or refactor that would move them from a 'B+' (functional but messy) to an 'A' (elegant, highly scalable, and exceptional). Be brutal.\"\n\nWhy it works: By constraining the AI to the single most important change, you prevent it from generating a laundry list of meaningless nitpicks (like variable renaming). It forces prioritization and will usually highlight a major design flaw, such as tightly coupled functions or a missing design pattern.\n\nYour job as an engineer is no longer just writing code. Your job is architecture, taste, and quality control. Don't let AI be the author of your codebase without making it the auditor first.","post_image_url":null,"is_article":false,"article_url":null,"article_title":null,"article_description":null,"is_video":false,"video_url":null,"has_image":false,"reaction_count":44,"reaction_types":"LIKE, INTEREST","comment_count":2,"impression_count":2422,"source":"activity"},{"is_my_post":true,"post_urn":"urn:li:activity:7442174641067966465","author_name":"Ravi Evani\n              \n                \n                   \n    \n      \n    \n    \n      \n    \n\n • You","author_profile_url":"https://www.linkedin.com/in/ravievani","author_headline":"Deploying enterprise agents in production / CTO / SWE Leader / GVP @ Publicis Sapient","posted_time":"2026-03-27","posted_hours_ago":2160,"posted_time_raw":"3mo","post_url":"https://www.linkedin.com/feed/update/urn:li:activity:7442174641067966465","author_profile_image_url":"https://media.licdn.com/dms/image/v2/C4E03AQGNeJRorEd2Nw/profile-displayphoto-shrink_100_100/profile-displayphoto-shrink_100_100/0/1569287114631?e=1784160000&v=beta&t=tJDZC7EXWnlgIIf8kF7fBCajhF-HEgzNXnz_IIkjqW8","post_text":"NVIDIA wants you to be at Stage 4. VCs want you to be at Stage 3. Your boss wants you to be at Stage 2. Meanwhile you wait in your company at Stage 1 after submitting your token increase request form.","post_image_url":"https://media.licdn.com/dms/image/v2/D4E22AQFl-WdNcys6TA/feedshare-image-high-res/B4EZ0cagUrI4AU-/0/1774298203777?e=1784160000&v=beta&t=w_ItFceazvWRJ-a7gzOH7Ob4WHrFsIV3KnYLo-BnV8w","is_article":false,"article_url":null,"article_title":null,"article_description":null,"is_video":false,"video_url":null,"has_image":true,"reaction_count":55,"reaction_types":"LIKE, INTEREST","comment_count":1,"impression_count":3689,"source":"activity"},{"is_my_post":true,"post_urn":"urn:li:activity:7441823886788321281","author_name":"Ravi Evani\n              \n                \n                   \n    \n      \n    \n    \n      \n    \n\n • You","author_profile_url":"https://www.linkedin.com/in/ravievani","author_headline":"Deploying enterprise agents in production / CTO / SWE Leader / GVP @ Publicis Sapient","posted_time":"2026-03-27","posted_hours_ago":2160,"posted_time_raw":"3mo","post_url":"https://www.linkedin.com/feed/update/urn:li:activity:7441823886788321281","author_profile_image_url":"https://media.licdn.com/dms/image/v2/C4E03AQGNeJRorEd2Nw/profile-displayphoto-shrink_100_100/profile-displayphoto-shrink_100_100/0/1569287114631?e=1784160000&v=beta&t=tJDZC7EXWnlgIIf8kF7fBCajhF-HEgzNXnz_IIkjqW8","post_text":"I’m learning that generating an architecture diagram from code is a more efficient starting point than drawing it in PowerPoint.","post_image_url":"https://media.licdn.com/dms/image/v2/D4E05AQFYEPOv2zIedg/videocover-high/B4EZ0arW4NIUBc-/0/1774269068334?e=1783137600&v=beta&t=FPMpVUvOTKd5SBL1uExrGeTPBvUPwGlE7pSV8oYF9a0","is_article":false,"article_url":null,"article_title":null,"article_description":null,"is_video":true,"video_url":"https://media.licdn.com/dms/image/v2/D4E05AQFYEPOv2zIedg/videocover-high/B4EZ0arW4NIUBc-/0/1774269068334?e=1783137600&v=beta&t=FPMpVUvOTKd5SBL1uExrGeTPBvUPwGlE7pSV8oYF9a0","has_image":true,"reaction_count":14,"reaction_types":"LIKE","impression_count":598,"source":"activity"},{"is_my_post":true,"post_urn":"urn:li:activity:7441449855983566848","author_name":"Ravi Evani\n              \n                \n                   \n    \n      \n    \n    \n      \n    \n\n • You","author_profile_url":"https://www.linkedin.com/in/ravievani","author_headline":"Deploying enterprise agents in production / CTO / SWE Leader / GVP @ Publicis Sapient","posted_time":"2026-03-27","posted_hours_ago":2160,"posted_time_raw":"3mo","post_url":"https://www.linkedin.com/feed/update/urn:li:activity:7441449855983566848","author_profile_image_url":"https://media.licdn.com/dms/image/v2/C4E03AQGNeJRorEd2Nw/profile-displayphoto-shrink_100_100/profile-displayphoto-shrink_100_100/0/1569287114631?e=1784160000&v=beta&t=tJDZC7EXWnlgIIf8kF7fBCajhF-HEgzNXnz_IIkjqW8","post_text":"Right now we are living through the \"Bring Your Own Agent\" (BYOA) era. Individuals are tinkering with personal AI hacks: uploading their own files, writing custom instructions, and automating their personal busywork.\n\nIt feels incredibly productive, but as the Enterprise AI Maturity Curve shows, it’s actually an Illusion of Scale (Stages 1–3).\n\nBut eventually, every team hits \"The Collaboration Wall\".\n\nWhen your personalized agent drafts a proposal based on your local files, and my bespoke agent critiques it based on my distinct instructions, we aren't collaborating. Our bots are just aggressively misaligned. Suddenly, we are forced to become \"manual APIs,\" spending hours untangling conflicting AI outputs. The \"Integration Tax\" eats all our productivity gains.\n\nTo unlock true, collective ROI, organizations must make The Enterprise Leap (Stages 4–8). We have to stop treating AI as a personal assistant and start architecting it as shared organizational infrastructure.\n\nStage 4: Establish a Unified Cognitive Layer. Move from \"local truth\" to \"global truth.\" Everyone's agents must read from the exact same playbook (like a Enterprise Context Graph).\n\nStage 5: Standardize Agent Handoffs. AI shouldn't just talk to humans; specialized agents need uniform data contracts so they can cleanly pass work to other agents. Also the AI must respect Role-Based Access Control.\n\nStages 6 & 7: Shift to Process Engineering. Stop automating stateless, one-off tasks (like summarizing an email). Start orchestrating full, stateful collaborative lifecycles with shared memory (Research ➔ Draft ➔ Format ➔ Review).\n\nStage 8: Bake in Governance. Ensure AI is aligned to collective business outcomes, not individual user quirks.\n\nEnterprises must do the hard, unglamorous work of engineering shared, collective AI workflows, than becoming the ones with the most \"AI power users\" tinkering with local hacks.","post_image_url":"https://media.licdn.com/dms/image/v2/D4E22AQFdoU4cpBifpQ/feedshare-shrink_800/B4EZ0R8rcYI8Ac-/0/1774122612799?e=1784160000&v=beta&t=hqnSGl5FaZoN4IAdcaIa01LvvviaJMfp9a3G_MK6xEg","is_article":false,"article_url":null,"article_title":null,"article_description":null,"is_video":false,"video_url":null,"has_image":true,"reaction_count":32,"reaction_types":"LIKE, EMPATHY, INTEREST","comment_count":2,"repost_count":3,"impression_count":1197,"source":"activity"},{"is_my_post":true,"post_urn":"urn:li:activity:7441151590624899072","author_name":"Ravi Evani\n              \n                \n                   \n    \n      \n    \n    \n      \n    \n\n • You","author_profile_url":"https://www.linkedin.com/in/ravievani","author_headline":"Deploying enterprise agents in production / CTO / SWE Leader / GVP @ Publicis Sapient","posted_time":"2026-03-27","posted_hours_ago":2160,"posted_time_raw":"3mo","post_url":"https://www.linkedin.com/feed/update/urn:li:activity:7441151590624899072","author_profile_image_url":"https://media.licdn.com/dms/image/v2/C4E03AQGNeJRorEd2Nw/profile-displayphoto-shrink_100_100/profile-displayphoto-shrink_100_100/0/1569287114631?e=1784160000&v=beta&t=tJDZC7EXWnlgIIf8kF7fBCajhF-HEgzNXnz_IIkjqW8","post_text":"A team of people (& their DIY agents) moving 50% faster in 10 different directions doesn't create enterprise value; it creates chaos.\n\nWhen people build DIY agents (or \"teams\" of agents), they are optimizing their specific node in the organizational network. But enterprise value isn't created within isolated nodes; it is created in the links: the handoffs, the consensus building, and the collaborative execution.\n\nHere's where \"agentic\" gains break down in real org settings, and what the \"enterprise leap\" actually entails.\n\nThe Friction of Individual Agents\n\n1/ The \"Integration Tax\": If your personal agent drafts a proposal based on your local files, and a colleague's agent critiques it based on a biased set of instructions, you aren't actually collaborating. Your bots are just aggressively misaligned. And you inevitably end up acting as the manual API between incompatible agents, spending more time untangling conflicting outputs than you saved through automation.\n\n2/ Contextual Fragmentation: Personal agents rely on \"local truth\" (e.g., a user's email). Collaborative work requires shared context, and without it, individual agents operate in divergent alternate realities, leading to hallucinated disagreements.\n\n3/ Action Collisions: A personal agent's prime directive is to please its user. However, enterprise collaboration constantly requires trade-offs. If your agent is instructed to fiercely protect your calendar for deep work, and my agent is instructed to aggressively schedule a sync to close a deal, the agents will actively work against each other.\n\nArchitecting the \"Enterprise Leap\"\n\n1/ A Unified Cognitive Layer\nAgents cannot collaborate if they are using different playbooks. The enterprise requires a centralized knowledge architecture (such as an Enterprise Context Graph). When an agent takes action, it must draw from the exact same living system of record as the rest of the org.\n\n2/ Standardized Handoffs\nEnterprise workflows must rely on agents that interact with each other using standardized data contracts. The focus shifts from how fast a task is done to how cleanly the output can be handed off to the next node in the chain.\n\n3/ Process Engineering\nPersonal agents automate stateless tasks (e.g., \"summarize this meeting\"). Shared workflows execute stateful processes (e.g., \"manage the contract from procurement to legal\"). A shared workflow has memory; it knows what happened yesterday, what is required for compliance tomorrow, and who holds the approval authority today.\n\n4/ Built-In Governance and Systemic Alignment\nGovernance and RBAC must be baked into the agents themselves so they respect org boundaries. Their instructions should be aligned to business outcomes (e.g., \"optimize for budget\") rather than individual user quirks.\n\nThe ones who got it right are doing the hard, unglamorous work of org design: mapping collaborative workflows and engineering shared, collective agentic systems to execute them.","post_image_url":null,"is_article":false,"article_url":null,"article_title":null,"article_description":null,"is_video":false,"video_url":null,"has_image":false,"reaction_count":12,"reaction_types":"LIKE","impression_count":605,"source":"activity"},{"is_my_post":true,"post_urn":"urn:li:activity:7438623110905495552","author_name":"Ravi Evani\n              \n                \n                   \n    \n      \n    \n    \n      \n    \n\n • You","author_profile_url":"https://www.linkedin.com/in/ravievani","author_headline":"Deploying enterprise agents in production / CTO / SWE Leader / GVP @ Publicis Sapient","posted_time":"2026-03-27","posted_hours_ago":2160,"posted_time_raw":"3mo","post_url":"https://www.linkedin.com/feed/update/urn:li:activity:7438623110905495552","author_profile_image_url":"https://media.licdn.com/dms/image/v2/C4E03AQGNeJRorEd2Nw/profile-displayphoto-shrink_100_100/profile-displayphoto-shrink_100_100/0/1569287114631?e=1784160000&v=beta&t=tJDZC7EXWnlgIIf8kF7fBCajhF-HEgzNXnz_IIkjqW8","post_text":"Time to rebalance my budget again.","post_image_url":"https://media.licdn.com/dms/image/v2/D4E22AQEslanjIP7edw/feedshare-shrink_800/B4EZztMTVDGUAc-/0/1773505951304?e=1784160000&v=beta&t=bfoiO1NRRAD_wrd5bhryMfDotNwNJYkBo7haH3pAmBM","is_article":false,"article_url":null,"article_title":null,"article_description":null,"is_video":false,"video_url":null,"has_image":true,"reaction_count":18,"reaction_types":"LIKE, ENTERTAINMENT","comment_count":1,"impression_count":1407,"source":"activity"},{"is_my_post":true,"post_urn":"urn:li:activity:7437965311967956992","author_name":"Ravi Evani\n              \n                \n                   \n    \n      \n    \n    \n      \n    \n\n • You","author_profile_url":"https://www.linkedin.com/in/ravievani","author_headline":"Deploying enterprise agents in production / CTO / SWE Leader / GVP @ Publicis Sapient","posted_time":"2026-03-27","posted_hours_ago":2160,"posted_time_raw":"3mo","post_url":"https://www.linkedin.com/feed/update/urn:li:activity:7437965311967956992","author_profile_image_url":"https://media.licdn.com/dms/image/v2/C4E03AQGNeJRorEd2Nw/profile-displayphoto-shrink_100_100/profile-displayphoto-shrink_100_100/0/1569287114631?e=1784160000&v=beta&t=tJDZC7EXWnlgIIf8kF7fBCajhF-HEgzNXnz_IIkjqW8","post_text":"Wrote a lot of code today.","post_image_url":"https://media.licdn.com/dms/image/v2/D4E22AQHWmGigqme6Og/feedshare-shrink_800/B4EZzj2CTzIUAg-/0/1773349119536?e=1784160000&v=beta&t=nOeATRJuUc0S43Wh87gz_DyPPxLTNzQK_Awlyy6_Ojw","is_article":false,"article_url":null,"article_title":null,"article_description":null,"is_video":false,"video_url":null,"has_image":true,"reaction_count":48,"reaction_types":"LIKE, ENTERTAINMENT, EMPATHY","comment_count":1,"repost_count":2,"impression_count":2757,"source":"activity"},{"is_my_post":true,"post_urn":"urn:li:activity:7437092848862343168","author_name":"Ravi Evani\n              \n                \n                   \n    \n      \n    \n    \n      \n    \n\n • You","author_profile_url":"https://www.linkedin.com/in/ravievani","author_headline":"Deploying enterprise agents in production / CTO / SWE Leader / GVP @ Publicis Sapient","posted_time":"2026-03-27","posted_hours_ago":2160,"posted_time_raw":"3mo","post_url":"https://www.linkedin.com/feed/update/urn:li:activity:7437092848862343168","author_profile_image_url":"https://media.licdn.com/dms/image/v2/C4E03AQGNeJRorEd2Nw/profile-displayphoto-shrink_100_100/profile-displayphoto-shrink_100_100/0/1569287114631?e=1784160000&v=beta&t=tJDZC7EXWnlgIIf8kF7fBCajhF-HEgzNXnz_IIkjqW8","post_text":"Inspired by Andrej Karpathy's autoresearch repo, I wanted to take the idea of an \"AI researcher\" and evolve it into a modular, multi-domain framework built on top of Publicis Sapient Bodhi Agentic AI platform.\n\nInstead of just tweaking basic scripts, Autoresearch Buddy unleashes an orchestration agent to autonomously research, rewrite, and optimize algorithms across 4 distinct domains:\n\nRAG: Finding the \"accuracy ceiling\" in retrieval workflows.\nForecasting: Minimizing RMSE in time-series sales/financial data.\nAnomaly Detection: Maximizing F1 scores for network intrusion logs.\nOptimization: Maximizing objective functions in combinatorial math.\n\nHow it works:\nEach domain follows a standardized \"Recursive Research\" loop. You provide an isolated Evaluation Sandbox: the core algorithm (train.py), an immutable evaluator (prepare.py) to give the agent a concrete score to beat, and the rules of the game (program.md).\n\nFrom there, the orchestrator agent takes the wheel. It reads the code, proposes hypotheses, modifies the logic, runs experiments, evaluates the cold, hard metrics, and iteratively improves the model—entirely on its own.\n\nThe \"Glass Box\" Dashboard:\nAgentic AI can sometimes feel like a black box. To solve this, I built a real-time visual dashboard featuring an interactive Three.js component. You can watch the AI formulate its attack plan, view live code diffs, and track performance metrics as it iteratively solves problems.\n\nBuilding this has been a deep-dive into the realities of Agentic AI. We are officially moving past the era of LLMs as mere chatbots and entering the era of LLMs as autonomous scientific collaborators.","post_image_url":"https://media.licdn.com/dms/image/v2/D4E05AQFKIQG2G2D4rg/videocover-low/B4EZzXcf7HHQBY-/0/1773141099956?e=1783137600&v=beta&t=IPP8s00OeQxdBih6r0AKqXMo0FGd4GuENwLkJAh6njI","is_article":false,"article_url":null,"article_title":null,"article_description":null,"is_video":true,"video_url":"https://media.licdn.com/dms/image/v2/D4E05AQFKIQG2G2D4rg/videocover-low/B4EZzXcf7HHQBY-/0/1773141099956?e=1783137600&v=beta&t=IPP8s00OeQxdBih6r0AKqXMo0FGd4GuENwLkJAh6njI","has_image":true,"reaction_count":26,"reaction_types":"LIKE, INTEREST, EMPATHY","comment_count":1,"impression_count":1656,"source":"activity"},{"is_my_post":true,"post_urn":"urn:li:activity:7436738811289784321","author_name":"Ravi Evani\n              \n                \n                   \n    \n      \n    \n    \n      \n    \n\n • You","author_profile_url":"https://www.linkedin.com/in/ravievani","author_headline":"Deploying enterprise agents in production / CTO / SWE Leader / GVP @ Publicis Sapient","posted_time":"2026-03-27","posted_hours_ago":2160,"posted_time_raw":"3mo","post_url":"https://www.linkedin.com/feed/update/urn:li:activity:7436738811289784321","author_profile_image_url":"https://media.licdn.com/dms/image/v2/C4E03AQGNeJRorEd2Nw/profile-displayphoto-shrink_100_100/profile-displayphoto-shrink_100_100/0/1569287114631?e=1784160000&v=beta&t=tJDZC7EXWnlgIIf8kF7fBCajhF-HEgzNXnz_IIkjqW8","post_text":"Look at the leap from 2001 to 2026.\n\nTechnologically this feels like a different universe. But looking past the screens, the more our needs change, the more they stay the same. We are just finding different ways to fulfill them.\n\nThe source of our comforts changed, but the need for a solid foundation hasn't.\n\nThe scale of the playground expanded, but our drive avoid boredom and solve new puzzles is identical.\n\nThe tools that make us valuable have evolved, but the desire to feel irreplaceable remains untouched.\n\nThe medium for our interactions shifted, but our need for a sense of tribe is just as vital.\n\nThe pace of adapting has become frantic, but it still feeds our drive to expand and grow.\n\nThe blast radius of our work has grown, but the desire to build something that actually matters hasn't shifted.\n\nOld wine. New bottle. And life goes on.","post_image_url":"https://media.licdn.com/dms/image/v2/D4D22AQEV6H27d-MQSQ/feedshare-image-high-res/B4DZzJ5C4CKYAU-/0/1772913700659?e=1784160000&v=beta&t=cEpOw-A0MUNeY__iVAIOX9kKUgbnuid7lhLQmmlmvyQ","is_article":false,"article_url":null,"article_title":null,"article_description":null,"is_video":false,"video_url":null,"has_image":true,"reaction_count":33,"reaction_types":"LIKE","impression_count":1919,"source":"activity"},{"is_my_post":true,"post_urn":"urn:li:activity:7436181042232762368","author_name":"Ravi Evani\n              \n                \n                   \n    \n      \n    \n    \n      \n    \n\n • You","author_profile_url":"https://www.linkedin.com/in/ravievani","author_headline":"Deploying enterprise agents in production / CTO / SWE Leader / GVP @ Publicis Sapient","posted_time":"2026-03-27","posted_hours_ago":2160,"posted_time_raw":"3mo","post_url":"https://www.linkedin.com/feed/update/urn:li:activity:7436181042232762368","author_profile_image_url":"https://media.licdn.com/dms/image/v2/C4E03AQGNeJRorEd2Nw/profile-displayphoto-shrink_100_100/profile-displayphoto-shrink_100_100/0/1569287114631?e=1784160000&v=beta&t=tJDZC7EXWnlgIIf8kF7fBCajhF-HEgzNXnz_IIkjqW8","post_text":"Autonomous RAG Tuning: From 0.900 to 0.940: Turning Karpathy's Autoresearch into a RAG tuning Factory.\n\nWhat happens when you take an autonomous hyperparameter tuner and point it at Retrieval-Augmented Generation (RAG)?\n\nI spent a few hours porting Andrej Karpathy's 'autoresearch' https://lnkd.in/dx9ubJCi to Apple Silicon and setting up an autonomous loop to optimize a RAG pipeline for travel data.\n\nHere’s the summary:\n\nStep 0: Porting to the Mac\nThe original autoresearch was built for beefy NVIDIA GPUs. First mission was to bring it home to Apple Silicon. Stripped out CUDA dependencies, replaced Flash Attention with PyTorch’s scaled_dot_product_attention, and pointed everything at the Mac GPU (MPS).\n\nOnce the engine was purring on the Mac, didn't want to just train another small GPT. Wanted to solve RAG instead!\n\nThe Challenge: The Travel Concierge\nGenerated a synthetic \"Travel Knowledge Base\"—a complex web of flight times, hotel prices, and visa rules. To evaluate progress, built a ground-truth dataset of tricky travel questions using Gemini 3.1 Flash Lite.\n\nMetric of success? The val_rag_score: a weighted average of retrieval precision and factual accuracy.\n\nThe 8-Iteration Sprint\nLet the autonomous loop run through 8 distinct RAG architectures. Here’s the play-by-play:\n\n1. The Naive Baseline (Score: 0.900)\nStarted by dumping the entire knowledge base into the prompt. It was accurate but expensive and unscalable. This set our benchmark.\n\n2. The Failure of \"Simple\" Search (Score: 0.870 - 0.895)\nTried keyword matching and sliding context windows. Surprisingly, performance dropped. The \"noisy\" context from adjacent lines confused the model, proving that in RAG, more data isn't always better.\n\n3. The Agentic Breakthrough (Score: 0.925) 🏆\nImplemented an Agentic Filter. Instead of just searching, asked the LLM to act as a librarian: \"Here are 10 candidates, which 3 actually answer the user?\" Precision skyrocketed.\n\n4. The Semantic Detour (Score: 0.910)\nIntegrated Gemini Embeddings for vector search. While conceptually advanced, it actually performed worse than the keyword-based AI filter. It was \"too smart\" for its own good, retrieving concepts that were similar but factually irrelevant.\n\n5. The \"Grand Finale\" Champion (Score: 0.940) 🥇\nThe winning formula (Iteration 7) combined the best retrieval with Chain-of-Thought (CoT) generation. Told the model to \"reason out loud\" before answering. This final layer of thinking caught the last remaining hallucinations.\n\nThe Results: 8 Experiments, 3 Breakthroughs\nVisualized our path using the same \"Running Best\" methodology as in the original Karpathy project.\n\nKey Takeaway\nRetrieval is a reasoning problem, not just a matching problem.\nThe biggest gains didn't come from better embedding models or more complex search algorithms. They came from Agentic Filtering and Chain-of-Thought Reasoning.","post_image_url":"https://media.licdn.com/dms/image/v2/D4D22AQFnjq4bZYOj9g/feedshare-shrink_800/B4DZzKfQD8GkAc-/0/1772923716335?e=1784160000&v=beta&t=HAl5UM_Fx6gMkxx4KU8nss6mOfM-4LRHbBmWZGPU-Ng","is_article":false,"article_url":null,"article_title":null,"article_description":null,"is_video":false,"video_url":null,"has_image":true,"reaction_count":26,"reaction_types":"LIKE, INTEREST","comment_count":1,"repost_count":1,"impression_count":1478,"source":"activity"},{"is_my_post":true,"post_urn":"urn:li:activity:7436061981830197248","author_name":"Ravi Evani\n              \n                \n                   \n    \n      \n    \n    \n      \n    \n\n • You","author_profile_url":"https://www.linkedin.com/in/ravievani","author_headline":"Deploying enterprise agents in production / CTO / SWE Leader / GVP @ Publicis Sapient","posted_time":"2026-03-27","posted_hours_ago":2160,"posted_time_raw":"3mo","post_url":"https://www.linkedin.com/feed/update/urn:li:activity:7436061981830197248","author_profile_image_url":"https://media.licdn.com/dms/image/v2/C4E03AQGNeJRorEd2Nw/profile-displayphoto-shrink_100_100/profile-displayphoto-shrink_100_100/0/1569287114631?e=1784160000&v=beta&t=tJDZC7EXWnlgIIf8kF7fBCajhF-HEgzNXnz_IIkjqW8","post_text":"Don’t Get Locked In: How to Build an Agentic Framework Switcher for your Enterprise\n\nThe AI agent landscape is evolving fast. Committing your entire enterprise to a single agent framework today might mean massive technical debt tomorrow when better, faster, or cheaper alternatives emerge.\n\nTo future-proof your agents, you need to decouple your agents from the underlying AI framework. Here is a robust design pattern that allows you to swap, test, and upgrade dynamically.\n\n1. The Core Abstraction: BaseAgentFrameworkProvider\nAt the heart is an Abstract Base Class (ABC). This interface acts as a strict contract that any underlying framework must fulfill. By programming to this interface, the rest of your application remains completely agnostic to the specific AI framework executing the tasks.\n\nA good interface should standardize agent management (create, get, update, etc), tool and task management (create, map, etc) and Low level LLM access.\n\n2. Concrete Implementations\nInstead of hardcoding external SDKs directly into your application, you build wrapper classes that implement your base interface. For example, your switcher could support multiple implementations:\n\nFramework #1: Your primary, default implementation connecting to your current framework of choice.\nFramework #2: An alternative implementation (perhaps a newer framework you are A/B testing or a lighter-weight alternative for simpler tasks).\n\nEach provider's solely responsible for translating your standardized API calls into the specific payloads required by that particular framework.\n\n3. The Factory: get_agent_provider\nTo make this dynamic, you need a factory mechanism to instantiate the correct provider for each incoming request. In a Python backend (like FastAPI), this can be handled via dependency injection.\n\nThe Resolution Strategy\nThe factory determines which framework to spin up based on a strict priority list:\n\nHTTP Header (X-Agent-Framework): The highest priority. This allows your frontend or API consumers to request a specific framework on a per-request basis—perfect for A/B testing!\n\nEnvironment Variable (AGENT_FRAMEWORK): If no header is present, the system falls back to your global environment configuration.\nDefault Fallback: If neither is set, the system defaults to Agent framework #1.\nPerformance Caching\n\nInstantiating a provider might involve loading complex configurations or establishing connections. To optimize performance, the factory should utilize a module-level dictionary cache.\n\nCache Hit: If an instance for the requested framework exists, return it immediately.\n\nCache Miss: Create a new instance, inject necessary dependencies (like authentication services), store it in the cache, and return it.\n\nBy treating your AI agent frameworks as interchangeable plugins, you maintain total control over your enterprise architecture, reduce vendor lock-in, and give your engineering teams the freedom to experiment safely.","post_image_url":"https://media.licdn.com/dms/image/v2/D4D22AQGQhbSWPq8kOw/feedshare-image-high-res/B4DZzIy9m1G0Ac-/0/1772895329039?e=1784160000&v=beta&t=bo6apx8M6dBNZQqTHTII-6gjmQnnw8LlgLRXytrp25c","is_article":false,"article_url":null,"article_title":null,"article_description":null,"is_video":false,"video_url":null,"has_image":true,"reaction_count":13,"reaction_types":"LIKE, INTEREST","comment_count":5,"repost_count":2,"impression_count":1023,"source":"activity"},{"is_my_post":true,"post_urn":"urn:li:activity:7435256730369855488","author_name":"Ravi Evani\n              \n                \n                   \n    \n      \n    \n    \n      \n    \n\n • You","author_profile_url":"https://www.linkedin.com/in/ravievani","author_headline":"Deploying enterprise agents in production / CTO / SWE Leader / GVP @ Publicis Sapient","posted_time":"2026-03-27","posted_hours_ago":2160,"posted_time_raw":"3mo","post_url":"https://www.linkedin.com/feed/update/urn:li:activity:7435256730369855488","author_profile_image_url":"https://media.licdn.com/dms/image/v2/C4E03AQGNeJRorEd2Nw/profile-displayphoto-shrink_100_100/profile-displayphoto-shrink_100_100/0/1569287114631?e=1784160000&v=beta&t=tJDZC7EXWnlgIIf8kF7fBCajhF-HEgzNXnz_IIkjqW8","post_text":"One of the most frustrating and expensive paradoxes in enterprise software development right now is watching companies step over millions of dollars to pick up pennies.\n\nThe Absurd ROI Disconnect\nIf a large enterprise program burns $5M a month on a delayed transformation program, that means they are setting fire to roughly $160K a day.\n\nIn that context, a procurement team stalling for six months to debate the licensing cost of an end-to-end agentic SDLC platform is mathematical insanity.\n\nIf an agentic system saves a program even a few days a month by removing friction between planning, dev, QA, and ops, it pays for itself instantly. The ROI is obvious. Yet large organizations treat AI as a flat IT expense to minimize instead of what they actually are: a multiplier of human capital across the delivery pipeline.\n\nMisaligned Organizational Silos\nThe people saying “no” are rarely the ones feeling the pain. Product, Engineering, QA, and DevOps deal with disconnected workflows & broken pipelines. Meanwhile Procurement focuses on minimizing spend, ignoring the opportunity cost of moving slowly.\n\nSecurity and Legal prioritize risk reduction, so the default response becomes “let’s review it. The result is software delivery continues to be a crawl.\n\nThe DevEx Crisis\nDevelopers are experiencing the power of AI in their personal lives versus their professional lives. Right now, a developer can go home on the weekend, fire up an agentic IDE, and build a complex application in an afternoon. Then, they log into their enterprise workstation on Monday morning and are essentially handed a plastic spoon to dig a trench.\n\nThe Consequences\n\nTalent Drain\nElite devs will not tolerate working this way. If an enterprise forces them to slog through the SDLC like it’s 2019, they will move to companies where they can orchestrate modern, autonomous delivery workflows.\n\nShadow AI\nTeams under deadline pressure will start pasting proprietary proprietary docs, code, and logs into unauthorized public AI tools just to clear workflow bottlenecks. By delaying secure enterprise platforms, companies create the exact security risks they are trying to avoid.\n\nAdoption Debt\nAdopting agentic tools across the SDLC is a paradigm shift in how software gets built. Moving from siloed handoffs to orchestrating specialized agents across planning, development, testing, and operations takes time and organizational learning. Enterprises wasting time debating aren’t just losing productivity, but are also accumulating Adoption Debt that will compound tomorrow.\n\nHow Does This Break?\n\nThere needs top-down mandate. A CIO must look at the cash burn from delayed software delivery and reset the mtandate for Security and Procurement.\n\nThe conversation must shift from:\n“What is the cost & risk of adopting end-to-end agentic SDLC tools?”\n-to-\n“What is the cost of delay and risk of not adopting them now?”\n\nTechnology is no longer the bottleneck in software delivery.\n\nLegacy corporate bureaucracy is.","post_image_url":"https://media.licdn.com/dms/image/v2/D4D22AQHqJNvQ47XoCw/feedshare-shrink_800/B4DZy9Wl_xGkAg-/0/1772703342840?e=1784160000&v=beta&t=Jrm_TElU9483igy98F-iWNv57Y15zXfnAlybuS0Xzvc","is_article":false,"article_url":null,"article_title":null,"article_description":null,"is_video":false,"video_url":null,"has_image":true,"reaction_count":18,"reaction_types":"LIKE, INTEREST","comment_count":3,"repost_count":2,"impression_count":11538,"source":"activity"},{"is_my_post":true,"post_urn":"urn:li:activity:7434937845305434114","author_name":"Ravi Evani\n              \n                \n                   \n    \n      \n    \n    \n      \n    \n\n • You","author_profile_url":"https://www.linkedin.com/in/ravievani","author_headline":"Deploying enterprise agents in production / CTO / SWE Leader / GVP @ Publicis Sapient","posted_time":"2026-03-27","posted_hours_ago":2160,"posted_time_raw":"3mo","post_url":"https://www.linkedin.com/feed/update/urn:li:activity:7434937845305434114","author_profile_image_url":"https://media.licdn.com/dms/image/v2/C4E03AQGNeJRorEd2Nw/profile-displayphoto-shrink_100_100/profile-displayphoto-shrink_100_100/0/1569287114631?e=1784160000&v=beta&t=tJDZC7EXWnlgIIf8kF7fBCajhF-HEgzNXnz_IIkjqW8","post_text":"Not all \"Deep Research\" agents are alike. How did Publicis Sapient's Bodhi Deep research engine get to #3 on Hugging face leaderboard?\n\nRecursive Multi-Phase Orchestration: The system utilizes a sophisticated four-phase model: Clarification, Planning, Execution, and Final Reporting—where an orchestrator repeatedly delegates complex tasks to specialized research agents in a continuous, multi-step loop.\n\nParallel Autonomous Sub-Flows: High-scale efficiency is achieved through an execution model that runs multiple research agent sub-flows in parallel, each operating with its own independent multi-turn tool loop to gather and analyze data.\n\nSeamless Enterprise Tool Integration: The architecture features a \"plug-and-play\" capability, granting research agents direct access to critical tools such as internal search, web search, and URL extraction to bridge information across diverse data sources.\n\nValidated Synthesis and Citation Accuracy: To ensure high-fidelity outputs, the system merges all intermediate findings and citation mappings from individual agents into a final, comprehensive report that anchors every insight to its original source.\n\nWhat Use cases is Bodhi Deep Research, especially great at?\n1/ Technical Due Diligence\n2/ Policy and Regulatory Tracking\n3/ Legal and Contract Analysis\n4/ Incident and Root-Cause Analysis\n5/ Healthcare and Clinical Guideline Synthesis\n6/ Security and Threat Intelligence\n\nWhat does this mean for enterprises?\n- Faster strategic analysis\n- Deeper competitive intelligence\n- Higher-quality research outputs\n- Reduced blind spots in decision-making\n- Reliable execution of complex instructions","post_image_url":null,"is_article":false,"article_url":null,"article_title":null,"article_description":null,"is_video":false,"video_url":null,"has_image":false,"reaction_count":99,"reaction_types":"LIKE, PRAISE, INTEREST","comment_count":2,"repost_count":4,"impression_count":4345,"source":"activity"},{"is_my_post":true,"post_urn":"urn:li:activity:7434062428092485632","author_name":"Ravi Evani\n              \n                \n                   \n    \n      \n    \n    \n      \n    \n\n • You","author_profile_url":"https://www.linkedin.com/in/ravievani","author_headline":"Deploying enterprise agents in production / CTO / SWE Leader / GVP @ Publicis Sapient","posted_time":"2026-03-27","posted_hours_ago":2160,"posted_time_raw":"3mo","post_url":"https://www.linkedin.com/feed/update/urn:li:activity:7434062428092485632","author_profile_image_url":"https://media.licdn.com/dms/image/v2/C4E03AQGNeJRorEd2Nw/profile-displayphoto-shrink_100_100/profile-displayphoto-shrink_100_100/0/1569287114631?e=1784160000&v=beta&t=tJDZC7EXWnlgIIf8kF7fBCajhF-HEgzNXnz_IIkjqW8","post_text":"Real-Time, high-throughput agentic data pipeline visualization built with Three.js\n\nIn high-throughput hospitality & airline environments, an \"agentic pipeline\" moves beyond static rules and \"if-then\" logic. It introduces autonomous agents that can reason about system state and act to optimize flow, maintain quality, or recover from failures.\n\nHere are five key scenarios where agentic logic could provides your travel & hospitality enterprise a distinct advantage:\n\n1. Autonomous Load Leveling & Pressure Release\nInstead of static partition counts in Kafka, an agentic layer monitors metrics (lag, CPU, memory). If it detects a \"hot shard\" (e.g., a massive price update for a specific property group), the agent can autonomously:\n\nReason: \"The ETL Core is saturated due to property X skew.\"\nAct: Dynamically spin up a dedicated \"heavy lifter\" consumer instance or re-route low-priority traffic to a slower queue to stabilize the main line.\n\n2. Semantic \"Self-Healing\" for Data Quality\nHigh-throughput pipelines often fail due to unexpected field types or schema drift. An agentic pipeline doesn't just drop these records.\n\nScenario: An incoming Avro record has an invalid price_type string.\nAgent Action: The agent uses an LLM to compare the value against the canonical schema and historical data. It reasons, \"This looks like a system-wide renaming of 'PROMO' to 'DISCOUNT'.\" It fixes the record in-flight, logs a \"suggested schema update,\" and keeps the data flowing.\n\n3. Predictive Enrichment & Caching\nFor ETL stages that require external lookups (e.g., fetching property metadata from a remote API), an agentic layer can significantly reduce latency.\n\nScenario: The agent observes a surge in bookings for \"Orlando\" hotels.\nAgent Action: It reasons that more pricing updates for those hotels are likely coming. It autonomously pre-warms the cache by pre-fetching metadata for all Orlando properties before the main stream even hits them.\n\n4. Cost-Aware Elasticity (SLA-Based Reasoning)\nStatic auto-scaling usually triggers on basic CPU metrics. An agentic pipeline understands SLA priorities.\n\nScenario: Kafka lag is increasing, but it's 2:00 AM and the batch contains \"Low Priority\" historical updates.\nAgent Action: The agent reasons, \"We have 4 hours until the morning report. No need to spend $500 on extra compute right now.\" It allows the lag to persist until it becomes critical, optimizing for cost over raw speed.\n\nBy integrating an agentic platform, enterprises can transform their data pipelines from a passive conveyor belt into an intelligent, self
