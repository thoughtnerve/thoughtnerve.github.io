    <script>
        // Injected scraped posts
        const POSTS = [{"is_my_post":true,"post_urn":"urn:li:activity:7475785970005463040","author_name":"Ravi Evani\n              \n                \n                   \n    \n      \n    \n    \n      \n    \n\n • You","author_profile_url":"https://www.linkedin.com/in/ravievani","author_headline":"Deploying enterprise agents in production / CTO / SWE Leader / GVP @ Publicis Sapient","posted_time":"2026-06-25","posted_hours_ago":17,"posted_time_raw":"17h","post_url":"https://www.linkedin.com/feed/update/urn:li:activity:7475785970005463040","author_profile_image_url":"https://media.licdn.com/dms/image/v2/C4E03AQGNeJRorEd2Nw/profile-displayphoto-shrink_100_100/profile-displayphoto-shrink_100_100/0/1569287114631?e=1784160000&v=beta&t=tJDZC7EXWnlgIIf8kF7fBCajhF-HEgzNXnz_IIkjqW8","post_text":"Here's how I keep my website in sync with my LinkedIn posts.\n\nNo infra to maintain. No backend, database. GitHub Pages hosts the site, while the browser performs the extraction.\n\nWorks around API limitations. Rather than requiring privileged LinkedIn API access, the extension reads the pages I already have permission to view within my authenticated session.\n\nAuthentic by design. My website reflects my real LinkedIn activity instead of becoming another profile that needs separate maintenance.\n\nFast deployment. Updating my site is as simple as running the extension and committing the generated data.\n\nExcellent performance. A static GitHub Pages site with a single data payload loads quickly, is inexpensive to host, and is easy for search engines to crawl.\n\nSo basically a browser-driven CMS with a \"one-click publishing workflow.\" .\n\nOne optimization I might do in the future is separating the data from the UI. Instead of regenerating a single index.html, perhaps publish a posts.json (or similar) alongside the static site. The UI stays unchanged while only the data file is updated. That makes future \"redesigns\" much easier and opens the door to making my site agent ready without changing the extraction pipeline.","post_image_url":"https://dms.licdn.com/playlist/vid/v2/D5605AQEo5Sja1GFUxw/mp4-720p-30fp-crf28/B56Z79Tn.cG8CA-/0/1782366260490?e=1783036800&v=beta&t=R5gQZ5RKtTwPCerKqK_JDyD5h7Kl1KaDgL5gjMNqcSo","is_article":false,"article_url":null,"article_title":null,"article_description":null,"is_video":true,"video_url":"https://dms.licdn.com/playlist/vid/v2/D5605AQEo5Sja1GFUxw/mp4-720p-30fp-crf28/B56Z79Tn.cG8CA-/0/1782366260490?e=1783036800&v=beta&t=R5gQZ5RKtTwPCerKqK_JDyD5h7Kl1KaDgL5gjMNqcSo","has_image":true,"reaction_count":8,"reaction_types":"LIKE, INTEREST","comment_count":1,"impression_count":617,"source":"activity"},{"is_my_post":true,"post_urn":"urn:li:activity:7475514669114368000","author_name":"Ravi Evani\n              \n                \n                   \n    \n      \n    \n    \n      \n    \n\n • You","author_profile_url":"https://www.linkedin.com/in/ravievani","author_headline":"Deploying enterprise agents in production / CTO / SWE Leader / GVP @ Publicis Sapient","posted_time":"2026-06-24","posted_hours_ago":24,"posted_time_raw":"1d","post_url":"https://www.linkedin.com/feed/update/urn:li:activity:7475514669114368000","author_profile_image_url":"https://media.licdn.com/dms/image/v2/C4E03AQGNeJRorEd2Nw/profile-displayphoto-shrink_100_100/profile-displayphoto-shrink_100_100/0/1569287114631?e=1784160000&v=beta&t=tJDZC7EXWnlgIIf8kF7fBCajhF-HEgzNXnz_IIkjqW8","post_text":"Deterministic enterprise software generated by ai and not vetted properly is arguably more dangerous than exposing users to an obviously probabilistic chatbot. Would you let customers or colleagues use it?\n\nWhen a probabilistic engine (an LLM) writes deterministic code (like Python, Java, or C++) and it is deployed without rigorous human vetting, you have now hardcoded the probabilistic risk.\n\nWhen users interact with an ai chatbot, their guard is up. They expect variance, look out for hallucinations, and generally apply a \"trust but verify\" mindset. Deterministic software, however, carries an implicit assumption of mathematical certainty. Because it compiles and runs, it gives developers and users a false sense of security.\n\nThink about that before your next PR.","post_image_url":null,"is_article":false,"article_url":null,"article_title":null,"article_description":null,"is_video":false,"video_url":null,"has_image":false,"reaction_count":12,"reaction_types":"LIKE, INTEREST","comment_count":1,"impression_count":844,"source":"activity"},{"is_my_post":true,"post_urn":"urn:li:activity:7474772913414635520","author_name":"Ravi Evani\n              \n                \n                   \n    \n      \n    \n    \n      \n    \n\n • You","author_profile_url":"https://www.linkedin.com/in/ravievani","author_headline":"Deploying enterprise agents in production / CTO / SWE Leader / GVP @ Publicis Sapient","posted_time":"2026-06-22","posted_hours_ago":72,"posted_time_raw":"3d","post_url":"https://www.linkedin.com/feed/update/urn:li:activity:7474772913414635520","author_profile_image_url":"https://media.licdn.com/dms/image/v2/C4E03AQGNeJRorEd2Nw/profile-displayphoto-shrink_100_100/profile-displayphoto-shrink_100_100/0/1569287114631?e=1784160000&v=beta&t=tJDZC7EXWnlgIIf8kF7fBCajhF-HEgzNXnz_IIkjqW8","post_text":"As a forward deployed engineer, you won't move an enterprise exec by talking about how \"clever\" your agents are.\n\nAs an FDE you should expect to be a part of meetings with enterprise execs. Here are a few tips to help you prepare, especially when the discussion involves AI agents.\n\n1. First, get out of your own product vocabulary.\n\nA CEO, SVP, or business leader is usually not looking for a tour of your platform, agent configuration, orchestration layer, workflow designer, or feature set.\n\nThat may matter later. But it is rarely where the conversation should start. You should first start with understanding your audience.\n\nBefore the meeting, study how that leader talks about their business. Look for interviews, earnings commentary, LinkedIn posts, podcasts, conference sessions, or articles. Pay attention to the actual words they use.\n\nWhat do they keep coming back to? Growth? Reliability? Speed? Scale? Execution Certainty? Regulatory pressure? Cost to serve? Operational resilience? Boil it down to the 5-10 phrases that seem to matter most to them.\n\nThen position your AI agent work in those terms. Not in terms of what the agent can technically do, but in terms of the business value they already care about. If you are not speaking on their page, they will not connect the dots for you.\n\n2. Second, do not bring ten features into the room.\n\nPick the one or two places where your solution truly shines. The strongest capability that you can connect to where they see value.\n\nFor example, not “our agent can summarize work orders.”\n\nInstead: “This brings all the context related to work orders in one place, so your field teams can troubleshoot faster and close out work more accurately”.\n\n3. Third, cast the value through their people.\n\nSenior leaders are not doing the day-to-day work themselves. They are thinking about how their teams operate, where decisions slow down, where handoffs break, and where execution quality varies.\n\nSo help them see the future state. What changes for their operators, engineers, service teams, or managers? Where does work get faster? Where does judgment improve? Where does rework reduce?\n\nThat is where the exec conversation starts to land.\n\nDon't try to prove how clever your agent is. Show that you understand the business well enough to apply AI where it can actually improve outcomes.","post_image_url":null,"is_article":false,"article_url":null,"article_title":null,"article_description":null,"is_video":false,"video_url":null,"has_image":false,"reaction_count":27,"reaction_types":"LIKE, INTEREST, EMPATHY","impression_count":1150,"source":"activity"},{"is_my_post":true,"post_urn":"urn:li:activity:7472956658495717377","author_name":"Ravi Evani\n              \n                \n                   \n    \n      \n    \n    \n      \n    \n\n • You","author_profile_url":"https://www.linkedin.com/in/ravievani","author_headline":"Deploying enterprise agents in production / CTO / SWE Leader / GVP @ Publicis Sapient","posted_time":"2026-06-18","posted_hours_ago":168,"posted_time_raw":"1w","post_url":"https://www.linkedin.com/feed/update/urn:li:activity:7472956658495717377","author_profile_image_url":"https://media.licdn.com/dms/image/v2/C4E03AQGNeJRorEd2Nw/profile-displayphoto-shrink_100_100/profile-displayphoto-shrink_100_100/0/1569287114631?e=1784160000&v=beta&t=tJDZC7EXWnlgIIf8kF7fBCajhF-HEgzNXnz_IIkjqW8","post_text":"We may be using the term “human-in-the-loop” too loosely.\n\nA lot of what is being called called Human-in-the-Loop today is really just a traditional application pattern with an LLM added to the interface.\n\nHere’s the common pattern:\n\nYou ask AI to generate a forecast. It produces an answer. You review it, spot an issue, and say, “Adjust the Q3 assumptions to account for X\". It regenerates the output.\n\nThat is useful. But it is not really Human-in-the-Loop. It is closer to Human-Over-the-Loop.\n\nThe human is still driving the workflow. The human holds the context. The human decides what happens next. The system produces an output and waits for the next instruction.\n\nThat is not fundamentally different from the old draft, review, edit model. The LLM may make the interaction more flexible, but the workflow is still human-orchestrated.\n\nTrue Human-in-the-Loop looks different.\n\nIn a true agentic workflow, the agent is executing a task, managing state, and moving through a plan. When it hits a point of uncertainty, missing context, policy constraint, or risk threshold, it does not guess. It pauses at that point and asks the human for the specific input needed to continue.\n\nFor example:\n\n“I’m calculating the forecast, but the European tariff variance is missing. Should I use the historical average, or do you have the updated figure?”\n\nThe human provides the missing context. The agent resumes the workflow.\n\nHuman-Over-the-Loop:\nThe human initiates, reviews, edits, and drives the next step.\n\nHuman-In-the-Loop:\nThe agent drives the workflow and pulls the human in only when judgment, context, approval, or exception handling is required.\n\nThis distinction matters because many teams think they are building agentic systems when they are really building better interfaces for traditional workflows.\n\nThere is nothing wrong with that. For many use cases, it may be exactly the right starting point.\n\nBut if we want to move from copilots to agentic workflows, we need to be clear about where the intelligence, orchestration, and state management actually live.","post_image_url":"https://media.licdn.com/dms/image/v2/D4E22AQEu4oX_cS3tuw/feedshare-shrink_800/B4EZ7VGeymJYAc-/0/1781691706810?e=1784160000&v=beta&t=nQsT3hIoQhAVUzPRfNf9FANU3OHsHJ3OKjrejQvpDos","is_article":false,"article_url":null,"article_title":null,"article_description":null,"is_video":false,"video_url":null,"has_image":true,"reaction_count":11,"reaction_types":"LIKE, INTEREST","impression_count":486,"source":"activity"},{"is_my_post":true,"post_urn":"urn:li:activity:7472839788732203008","author_name":"Ravi Evani\n              \n                \n                   \n    \n      \n    \n    \n      \n    \n\n • You","author_profile_url":"https://www.linkedin.com/in/ravievani","author_headline":"Deploying enterprise agents in production / CTO / SWE Leader / GVP @ Publicis Sapient","posted_time":"2026-06-18","posted_hours_ago":168,"posted_time_raw":"1w","post_url":"https://www.linkedin.com/feed/update/urn:li:activity:7472839788732203008","author_profile_image_url":"https://media.licdn.com/dms/image/v2/C4E03AQGNeJRorEd2Nw/profile-displayphoto-shrink_100_100/profile-displayphoto-shrink_100_100/0/1569287114631?e=1784160000&v=beta&t=tJDZC7EXWnlgIIf8kF7fBCajhF-HEgzNXnz_IIkjqW8","post_text":"ai got the budget. but better deterministic software was what delivered the value.\n\ni was chatting with an ex-client who is now a good friend, and they were really excited about using ai agents to drive operational decision-making.\n\nas we peeled back the layers, it became clear that most of the problems they were trying to solve weren’t actually agent problems. they were information problems.\n\na lot of their challenges could be addressed with better data, more deterministic workflows, and better user experiences for the people running operations. in perhaps 10% of cases, some traditional predictive ml could add value. but in none of the examples we discussed did we actually need agents making decisions on behalf of people.\n\nwhat operators really needed was the right information, presented at the right time, in the right context.\n\nand that is where ai can be very useful.\n\nuse ai for research and discovery. use it to dig through documents, conversations, tickets, policies, logs, and historical decisions. use it to uncover information that was always there, but buried under layers of systems, teams, and process.\n\nbut again, the goal is not always to have ai make the decision. often, the goal is to help people see what they couldn’t see before.\n\nanother interesting part of the discussion was that ai was also being used as part of the narrative to secure investment and executive attention. that’s completely understandable. organizations want to participate in the ai wave, and that often helps unlock funding for long-overdue modernization efforts.\n\nbut just because ai is the reason the investment gets approved doesn’t mean ai is the answer to every problem being solved.\n\nironically, getting to the desired outcome did require building a lot more software. historically, much of that work would have remained stuck in the backlog because teams simply didn’t have the capacity.\n\nthat’s where ai is incredibly valuable.\n\nuse ai to write the software. use ai to accelerate development. use ai to help teams tackle years of accumulated backlog and build experiences that would have been difficult to justify before.\n\nbut when it comes to operational decision-making, the bigger opportunity is often not replacing human judgment with agents. it’s giving people better tools, better context, and better information so they can make better decisions themselves.","post_image_url":null,"is_article":false,"article_url":null,"article_title":null,"article_description":null,"is_video":false,"video_url":null,"has_image":false,"reaction_count":16,"reaction_types":"LIKE","impression_count":1089,"source":"activity"},{"is_my_post":true,"post_urn":"urn:li:activity:7472670955916681216","author_name":"Ravi Evani\n              \n                \n                   \n    \n      \n    \n    \n      \n    \n\n • You","author_profile_url":"https://www.linkedin.com/in/ravievani","author_headline":"Deploying enterprise agents in production / CTO / SWE Leader / GVP @ Publicis Sapient","posted_time":"2026-06-18","posted_hours_ago":168,"posted_time_raw":"1w","post_url":"https://www.linkedin.com/feed/update/urn:li:activity:7472670955916681216","author_profile_image_url":"https://media.licdn.com/dms/image/v2/C4E03AQGNeJRorEd2Nw/profile-displayphoto-shrink_100_100/profile-displayphoto-shrink_100_100/0/1569287114631?e=1784160000&v=beta&t=tJDZC7EXWnlgIIf8kF7fBCajhF-HEgzNXnz_IIkjqW8","post_text":"I think I'm probably late figuring out that I don't need to reach for the delete key anymore while taking notes.","post_image_url":"https://media.licdn.com/dms/image/v2/D5622AQEUmNuzkNzO_Q/feedshare-shrink_800/B56Z7RCopyJQAc-/0/1781623589789?e=1784160000&v=beta&t=6uk4REd48uLrXJoF4z3-c6DT-ABQ-qbipMBG8SMv0iU","is_article":false,"article_url":null,"article_title":null,"article_description":null,"is_video":false,"video_url":null,"has_image":true,"reaction_count":5,"reaction_types":"LIKE, ENTERTAINMENT","impression_count":1062,"source":"activity arch, especially great at?\n1/ Technical Due Diligence\n2/ Policy and Regulatory Tracking\n3/ Legal and Contract Analysis\n4/ Incident and Root-Cause Analysis\n5/ Healthcare and Clinical Guideline Synthesis\n6/ Security and Threat Intelligence\n\nWhat does this mean for enterprises?\n- Faster strategic analysis\n- Deeper competitive intelligence\n- Higher-quality research outputs\n- Reduced blind spots in decision-making\n- Reliable execution of complex instructions","post_image_url":"https://media.licdn.com/dms/image/v2/D4E22AQH-BX_Zw2hvdw/feedshare-shrink_800/B4EZ63LxwMIwAc-/0/1781189780053?e=1784160000&v=beta&t=PseyhimOviYA4Zw2WblnE1Qx5wXqtLMqvT_N06NfnzU","is_article":false,"article_url":null,"article_title":null,"article_description":null,"is_video":false,"video_url":null,"has_image":true,"reaction_count":642,"reaction_types":"LIKE, PRAISE, EMPATHY","comment_count":8,"repost_count":51,"impression_count":0,"source":"activity"},{"is_my_post":true,"post_urn":"urn:li:activity:7472749994953908224","is_repost":true,"author_name":"Ravi Evani\n              \n                \n                   \n    \n      \n    \n    \n      \n    \n\n • You","author_profile_url":"https://www.linkedin.com/in/ravievani","author_headline":"Deploying enterprise agents in production / CTO / SWE Leader / GVP @ Publicis Sapient","posted_time":"2026-06-11","posted_hours_ago":336,"posted_time_raw":"2w","post_url":"https://www.linkedin.com/feed/update/urn:li:activity:7472749994953908224","author_profile_image_url":"https://media.licdn.com/dms/image/v2/C4E03AQGNeJRorEd2Nw/profile-displayphoto-shrink_100_100/profile-displayphoto-shrink_100_100/0/1569287114631?e=1784160000&v=beta&t=tJDZC7EXWnlgIIf8kF7fBCajhF-HEgzNXnz_IIkjqW8","post_text":"How did Publicis Sapient Bodhi Deep research engine beat gemini, openai, grok and perplexity to get to #1 on Hugging Face leaderboard?\n\nRecursive Multi-Phase Orchestration: The system utilizes a sophisticated four-phase model: Clarification, Planning, Execut /in/ravievani","author_headline":"Deploying enterprise agents in production / CTO / SWE Leader / GVP @ Publicis Sapient","posted_time":"2026-06-11","posted_hours_ago":336,"posted_time_raw":"2w","post_url":"https://www.linkedin.com/feed/update/urn:li:activity:7470493130958745602","author_profile_image_url":"https://media.licdn.com/dms/image/v2/C4E03AQGNeJRorEd2Nw/profile-displayphoto-shrink_100_100/profile-displayphoto-shrink_100_100/0/1569287114631?e=1784160000&v=beta&t=tJDZC7EXWnlgIIf8kF7fBCajhF-HEgzNXnz_IIkjqW8","post_text":"The idea of loop engineering expects a lot from the average SWE. While It sounds simple, It’s a drastic shift in skill required.\n\nLoop engineering advocates to move beyond prompting and start designing the feedback loops that help agents reason, act, evaluate, and improve.\n\nBut we've spent years breaking high level work into tiny, code-centric tasks: going from epics → features → stories → tasks → code.\n\nNow, with the concept of loop engineering, there's hype of pushing up the chain into higher-level constructs to steer agents.\n\nIt’s a very different skill.\n\nWhile a few niche teams and superstar developers may adapt to this, expecting enterprises to build this capability broadly across software development is not realistic. This will take years.\n\nAnd I’m not even sure this capability is needed at broad scale. Most enterprises do not need most developers to become loop engineers.\n\nGiven that prompt engineering is still messy, context engineering is still hard, and reliable outputs are still inconsistent. Expecting every enterprise developer to design autonomous loops feels premature.\n\nMost enterprises will need reusable patterns, guardrails, and workflows that deliver business value before they need to think about broad-scale loop engineering.","post_image_url":null,"is_article":false,"article_url":null,"article_title":null,"article_description":null,"is_video":false,"video_url":null,"has_image":false,"reaction_count":13,"reaction_types":"LIKE, APPRECIATION","impression_count":1108,"source":"activity"},{"is_my_post":true,"post_urn":"urn:li:activity:7470212373073559552","author_name":"Ravi Evani\n              \n                \n                   \n    \n      \n    \n    \n      \n    \n\n • You","author_profile_url":"https://www.linkedin.com/in/ravievani","author_headline":"Deploying enterprise agents in production / CTO / SWE Leader / GVP @ Publicis Sapient","posted_time":"2026-06-11","posted_hours_ago":336,"posted_time_raw":"2w","post_url":"https://www.linkedin.com/feed/update/urn:li:activity:7470212373073559552","author_profile_image_url":"https://media.licdn.com/dms/image/v2/C4E03AQGNeJRorEd2Nw/profile-displayphoto-shrink_100_100/profile-displayphoto-shrink_100_100/0/1569287114631?e=1784160000&v=beta&t=tJDZC7EXWnlgIIf8kF7fBCajhF-HEgzNXnz_IIkjqW8","post_text":"Prompt engineering? Still messy. Context engineering? Still hard. Reliable outputs? Still inconsistent. But sure, let’s move on to \"loop\" engineering.\n\nAI discourse has a wonderful habit of skipping directly to the hardest possible problem.\n\nLoop engineering is supposedly where AI not only produces the output, but also decides the inputs, creates the context, invokes other agents, and recursively improves itself.\n\nWhat could possibly go wrong?\n\nIs this the \"solution\" that our enterprises need?\n\nThe bottlenecks that enterprises need to solve are much simpler:\n1/ Can the agent produce the right output?\n2/ Can it use the right context?\n3/ Can the workflow be automated safely?\n4/ Can it create measurable business value?\n\nOnly after that should we get excited about AI determining its own inputs.\n\nWhen humans define the inputs, you can at least reason about the outcome.\n\nWhen AI defines the inputs, you are pretending you can engineer behavior. While that may be a worthy research problem. It is not where most enterprises should start.\n\nThe real opportunity is less glamorous:\nReduce cycle times.\nImprove decision quality.\nModernize legacy processes.\nHelp people get more done.\n\nThe industry keeps ratcheting the conversation upward before the previous level is delivering value.\n\nIgnore the noise.\n\nDeliver business value step by step.","post_image_url":"https://media.licdn.com/dms/image/v2/D4E22AQFZ6UZyqFPVLQ/feedshare-shrink_800/B4EZ6uGkR.IMAc-/0/1781037418110?e=1784160000&v=beta&t=Hu2xTy3gGu-4uf36rT-QCJ5U6H9vCiOshkjEvdeXzx0","is_article":false,"article_url":null,"article_title":null,"article_description":null,"is_video":false,"video_url":null,"has_image":true,"reaction_count":11,"reaction_types":"LIKE, INTEREST, ENTERTAINMENT","repost_count":1,"impression_count":1867,"source":"activity"},{"is_my_post":true,"post_urn":"urn:li:activity:7469374096452165633","author_name":"Ravi Evani\n              \n                \n                   \n    \n      \n    \n    \n      \n    \n\n • You","author_profile_url":"https://www.linkedin.com/in/ravievani","author_headline":"Deploying enterprise agents in production / CTO / SWE Leader / GVP @ Publicis Sapient","posted_time":"2026-06-11","posted_hours_ago":336,"posted_time_raw":"2w","post_url":"https://www.linkedin.com/feed/update/urn:li:activity:7469374096452165633","author_profile_image_url":"https://media.licdn.com/dms/image/v2/C4E03AQGNeJRorEd2Nw/profile-displayphoto-shrink_100_100/profile-displayphoto-shrink_100_100/0/1569287114631?e=1784160000&v=beta&t=tJDZC7EXWnlgIIf8kF7fBCajhF-HEgzNXnz_IIkjqW8","post_text":"My new website in 3 steps:\n1. Built a Chrome extension to export my LinkedIn posts into a clean static HTML page.\n2. Uploaded the HTML file to a GitHub repo and served it using GitHub Pages.\n3. Pointed my domain to the GitHub Pages site.","post_image_url":"https://media.licdn.com/dms/image/v2/D4E22AQHF8WiUa4PjJA/feedshare-shrink_800/B4EZ6iMJ95KMAg-/0/1780837557646?e=1784160000&v=beta&t=7HjJnEsbHUURyXcRq5TBKGVxbcL8F2ke6fK86GyVypQ","is_article":false,"article_url":null,"article_title":null,"article_description":null,"is_video":false,"video_url":null,"has_image":true,"reaction_count":59,"reaction_types":"LIKE, PRAISE","comment_count":1,"impression_count":3441,"source":"activity"},{"is_my_post":true,"post_urn":"urn:li:activity:7469027501563043840","author_name":"Ravi Evani\n              \n                \n                   \n    \n      \n    \n    \n      \n    \n\n • You","author_profile_url":"https://www.linkedin.com/in/ravievani","author_headline":"Deploying enterprise agents in production / CTO / SWE Leader / GVP @ Publicis Sapient","posted_time":"2026-06-11","posted_hours_ago":336,"posted_time_raw":"2w","post_url":"https://www.linkedin.com/feed/update/urn:li:activity:7469027501563043840","author_profile_image_url":"https://media.licdn.com/dms/image/v2/C4E03AQGNeJRorEd2Nw/profile-displayphoto-shrink_100_100/profile-displayphoto-shrink_100_100/0/1569287114631?e=1784160000&v=beta&t=tJDZC7EXWnlgIIf8kF7fBCajhF-HEgzNXnz_IIkjqW8","post_text":"Every developer knows the pain of the Figma handoff: you write the CSS, but the designer calls out a 10px alignment drift, mismatched paddings, or shifted margins.\n\nThis leads to tedious manual visual policing and endless correction loops. To solve this, we can give agents \"eyes\" by building a closed-loop self-healing pipeline: borrowing local Chrome tab sessions via CDP, comparing live-rendered DOM previews against Figma mockup references programmatically, and using Multimodal LLMs to auto-correct stylesheets.\n\nHere is a blueprint (w/ agent skill included!) for automating pixel-perfect visual verification.","post_image_url":"https://media.licdn.com/dms/image/v2/D4E12AQFnuUXyH6huoQ/article-cover_image-shrink_600_2000/B4EZ6dOHOMJ4AU-/0/1780754183506?e=1784160000&v=beta&t=-WyM9tSFF7pyUk238BPbKOtKPLXvT_JXrHwPOrtoaAY","is_article":true,"article_url":"https://www.linkedin.com/pulse/figma-to-code-fidelity-automating-pixel-perfect-visual-ravi-evani-oecge","article_title":"","article_description":"","is_video":false,"video_url":null,"has_image":true,"reaction_count":21,"reaction_types":"LIKE, EMPATHY","repost_count":1,"impression_count":2050,"source":"activity"},{"is_my_post":true,"post_urn":"urn:li:activity:7468292476269826050","author_name":"Ravi Evani\n              \n                \n                   \n    \n      \n    \n    \n      \n    \n\n • You","author_profile_url":"https://www.linkedin.com/in/ravievani","author_headline":"Deploying enterprise agents in production / CTO / SWE Leader / GVP @ Publicis Sapient","posted_time":"2026-06-04","posted_hours_ago":504,"posted_time_raw":"3w","post_url":"https://www.linkedin.com/feed/update/urn:li:activity:7468292476269826050","author_profile_image_url":"https://media.licdn.com/dms/image/v2/C4E03AQGNeJRorEd2Nw/profile-displayphoto-shrink_100_100/profile-displayphoto-shrink_100_100/0/1569287114631?e=1784160000&v=beta&t=tJDZC7EXWnlgIIf8kF7fBCajhF-HEgzNXnz_IIkjqW8","post_text":"AI coding agents are great at writing code. But ask them to troubleshoot a live bug, and they can get you stuck.\n\nWhy? Because standard agents lack runtime context. They don't see the live application state, browser consoles, or active database connections. Without this, they guess; which leads to hallucinated fixes, overwritten database rows, or destructive UI regressions.\n\nTo solve this, we built the Agentic Troubleshooting Pipeline >> a secure, self-healing architecture designed to diagnose and repair bugs autonomously, safely, and with full live context.\n\nHere is the system-design blueprint of how we stop AI from breaking things:\n\n1/ The Template-Instance Pattern (Isolation)\nParallel debugging tasks shouldn't pollute your main workspace. We separate core logic from local execution. Bugs are diagnosed in an isolated sandbox (the \"Instance\") that is hydrated only with the exact telemetry needed to hunt down the issue.\n\n2/ Zero-Copy Telemetry (The Sidecar)\nNo more manually copy-pasting terminal logs or Git diffs into a chat window. A background sidecar automatically captures active system logs, state changes, and DevTools output into a unified telemetry packet the moment a bug triggers.\n\n3/ Live Inspection via MCP Standard\nAgents can't \"see\" the UI. By integrating MCP servers (like chrome-devtools), our sandboxed sub-agent can actually interact with the live DOM, trace API bottlenecks, and verify selectors in real time.\n\n4/ Safe-by-Design Guardrails & Security\nAI needs boundaries. We enforce strict \"Safe Resolution Rules\" (e.g., zero data-loss tolerance). By isolating the source (the UI where the bug appears) from the sink (where the data lives), we ensure an agent fixing a layout bug won't accidentally compromise database schema contracts. Plus, zero file writes are executed without explicit human-in-the-loop permission.\n\n5/ The Skills Registry (Reusable Memory)\nThis is the key. Once a fix is verified, the system saves a local \"Skill\" (a reusable Markdown workflow). If that specific failure signature happens again next month, the codebase bypasses the heavy diagnostic loop and self-heals instantly. This builds systems that actively learn from their errors and compile their own local, self-healing manuals.","post_image_url":"https://media.licdn.com/dms/image/v2/D4E22AQFNmBpqna6XsQ/feedshare-shrink_800/B4EZ6S0bmhJMAo-/0/1780579679294?e=1784160000&v=beta&t=QF_czzi7lU1RY7ZwHH3dKSS6SVcQCFq_kGDo5_pRayA","is_article":false,"article_url":null,"article_title":null,"article_description":null,"is_video":false,"video_url":null,"has_image":true,"reaction_count":32,"reaction_types":"LIKE, EMPATHY","comment_count":1,"repost_count":1,"impression_count":1528,"source":"activity"},{"is_my_post":true,"post_urn":"urn:li:activity:7467561619762520065","author_name":"Ravi Evani\n              \n                \n                   \n    \n      \n    \n    \n      \n    \n\n • You","author_profile_url":"https://www.linkedin.com/in/ravievani","author_headline":"Deploying enterprise agents in production / CTO / SWE Leader / GVP @ Publicis Sapient","posted_time":"2026-06-04","posted_hours_ago":504,"posted_time_raw":"3w","post_url":"https://www.linkedin.com/feed/update/urn:li:activity:7467561619762520065","author_profile_image_url":"https://media.licdn.com/dms/image/v2/C4E03AQGNeJRorEd2Nw/profile-displayphoto-shrink_100_100/profile-displayphoto-shrink_100_100/0/1569287114631?e=1784160000&v=beta&t=tJDZC7EXWnlgIIf8kF7fBCajhF-HEgzNXnz_IIkjqW8","post_text":"A highly practical conversation about AI between McDonald's CEO Chris Kempczinski and Google CEO Sundar Pichai at the McDonald's worldwide convention.\n\nSundar made the point that we are still underestimating AI. A high school student can now create work that would have required a professional movie studio not long ago. That means the challenge for large companies is no longer whether they can find AI use cases. McDonald’s and Google can probably identify hundreds. But the right question is: which ones of those matter most?\n\nThat is where prioritization becomes critical. Sundar talked about Google’s discipline around setting ambitious quarterly objectives. The purpose of the objectives is to separate signal from noise, stay anchored to a true north, and remember that there is always a customer on the other side.\n\nThey also discussed the balance between innovation and consistency. In a business like McDonald’s, change cannot break the customer experience. In a business like Google, certain answers (like medical advice for a child) cannot be wrong. So the answer is not to slow everything down. The answer is to create sandboxes: test in controlled environments, learn quickly, and then scale what works.\n\nAnother important theme was leadership. Future leaders will need resilience, because change is now constant. They will also need to be decisive. Large organizations slow down when too many decisions wait for perfect alignment. A useful leadership question is: what ties did I break today?\n\nChris also emphasized clarity. In the AI era, generating content will be easy. The real skill will be organizing an argument, simplifying complexity, and helping people understand what matters.\n\nWhat stood out to me is the human lens they took throughout the discussion. McDonald’s may be operating at massive global scale, but the conversation kept coming back to people: customers, crew members, and employees. AI when used well can help people serve customers at a higher level, make better decisions, and spend more time on the work that requires human judgment.","post_image_url":"https://media.licdn.com/dms/image/v2/D4E22AQGwTJK3cAg1lQ/feedshare-shrink_800/B4EZ6IbuH_KIAc-/0/1780405429611?e=1784160000&v=beta&t=zHq6gcUtcrItEnjje-5S5lmS3ni6hnXpFe5Rpj5y6uo","is_article":false,"article_url":null,"article_title":null,"article_description":null,"is_video":false,"video_url":null,"has_image":true,"reaction_count":51,"reaction_types":"LIKE, EMPATHY","comment_count":2,"repost_count":1,"impression_count":3791,"source":"activity"},{"is_my_post":true,"post_urn":"urn:li:activity:7466990762052792320","author_name":"Ravi Evani\n              \n                \n                   \n    \n      \n    \n    \n      \n    \n\n • You","author_profile_url":"https://www.linkedin.com/in/ravievani","author_headline":"Deploying enterprise agents in production / CTO / SWE Leader / GVP @ Publicis Sapient","posted_time":"2026-06-04","posted_hours_ago":504,"posted_time_raw":"3w","post_url":"https://www.linkedin.com/feed/update/urn:li:activity:7466990762052792320","author_profile_image_url":"https://media.licdn.com/dms/image/v2/C4E03AQGNeJRorEd2Nw/profile-displayphoto-shrink_100_100/profile-displayphoto-shrink_100_100/0/1569287114631?e=1784160000&v=beta&t=tJDZC7EXWnlgIIf8kF7fBCajhF-HEgzNXnz_IIkjqW8","post_text":"We may be heading toward a time where, just like people are expected to complete their work within a 40-hour week, they might also be expected to stay within a weekly AI token allowance. At least, till token costs fall substantially and engineering techniques get better.\n\nAnything beyond that is no longer productivity. It’s token overtime, and someone might ask who approved it.","post_image_url":"https://media.licdn.com/dms/image/v2/D4E22AQFpz6s6ko1-Wg/feedshare-shrink_800/B4EZ6AUh57HQAc-/0/1780269326249?e=1784160000&v=beta&t=Ewe6HQFv01FfXK7xjb8PhCGFDtsaiDOGuu4ClxJNScs","is_article":false,"article_url":null,"article_title":null,"article_description":null,"is_video":false,"video_url":null,"has_image":true,"reaction_count":37,"reaction_types":"LIKE, ENTERTAINMENT","repost_count":1,"impression_count":3746,"source":"activity"},{"is_my_post":true,"post_urn":"urn:li:activity:7466470383467102208","author_name":"Ravi Evani\n              \n                \n                   \n    \n      \n    \n    \n      \n    \n\n • You","author_profile_url":"https://www.linkedin.com/in/ravievani","author_headline":"Deploying enterprise agents in production / CTO / SWE Leader / GVP @ Publicis Sapient","posted_time":"2026-06-04","posted_hours_ago":504,"posted_time_raw":"3w","post_url":"https://www.linkedin.com/feed/update/urn:li:activity:7466470383467102208","author_profile_image_url":"https://media.licdn.com/dms/image/v2/C4E03AQGNeJRorEd2Nw/profile-displayphoto-shrink_100_100/profile-displayphoto-shrink_100_100/0/1569287114631?e=1784160000&v=beta&t=tJDZC7EXWnlgIIf8kF7fBCajhF-HEgzNXnz_IIkjqW8","post_text":"weekend skill: to use ai recursively to write you better prompts for your agents.\n\nfirst, you need to determine the outcome: what exactly the agent must achieve. if you don’t have that clarity, you prompt ai to help define what a successful outcome looks like.\n\nonce the outcome is clear, you need to clarify the intent, i.e. the exact purpose of the agent’s action. if that’s vague, you prompt ai to refine the intent, i.e. what the agent should focus on.\n\nafter intent, you need guardrails, i.e. the boundaries or constraints. if you lack those, you prompt ai to establish what should or shouldn’t happen.\n\nby prompting in that sequence: outcome, then intent, then guardrails, you create a structured chain leading to a complete, actionable prompt.\n\nnow, if you lack context for the outcome, intent, or guardrails, you first prompt ai to help fill that gap.\n\n---\nbut to even do all that, you may need a broader understanding. so, you prompt ai for deeper research. asking questions to get context.\n\nif you even lack that context, then you start at the foundation: pulling from past conversations, notes, or initial sources to guide your research prompt.\n\nonce you gain that context at each step, you circle back and refine the original (outcome, then intent, then guardrails). In short, if context is missing, you prompt backward until you gather what’s needed, then move forward again.\n\n---\n\nthe skill to hone is orchestrating this type of prompt chain to to get to the prompt you finally give your agent to do your task.","post_image_url":null,"is_article":false,"article_url":null,"article_title":null,"article_description":null,"is_video":false,"video_url":null,"has_image":false,"reaction_count":18,"reaction_types":"LIKE","comment_count":2,"repost_count":2,"impression_count":1590,"source":"activity"},{"is_my_post":true,"post_urn":"urn:li:activity:7465574531605118976","author_name":"Ravi Evani\n              \n                \n                   \n    \n      \n    \n    \n      \n    \n\n • You","author_profile_url":"https://www.linkedin.com/in/ravievani","author_headline":"Deploying enterprise agents in production / CTO / SWE Leader / GVP @ Publicis Sapient","posted_time":"2026-05-28","posted_hours_ago":672,"posted_time_raw":"4w","post_url":"https://www.linkedin.com/feed/update/urn:li:activity:7465574531605118976","author_profile_image_url":"https://media.licdn.com/dms/image/v2/C4E03AQGNeJRorEd2Nw/profile-displayphoto-shrink_100_100/profile-displayphoto-shrink_100_100/0/1569287114631?e=1784160000&v=beta&t=tJDZC7EXWnlgIIf8kF7fBCajhF-HEgzNXnz_IIkjqW8","post_text":"Great answers by Publicis Sapient CEO Nigel Vaz in the panel on TIME 100 AI Summit in New York!\n\nWhen asked \"where do you think we would be with AI in 5 years from now\", this is what he said:\n\n\"I think we have not yet seen the conversation move to what is the Uber and the Airbnb of the AI era in the context of real transformation in business.\n\nWe're still focused today on the productivity gains, on the incremental value that we can create, which is perfectly fine given we're so early in this. But for me, I think the conversation, just like it moved from Cisco and infrastructure and browsers in the late 90s, I think we'll move away from talking about AI in the context of compute and models. Those will be assumptions.\n\nThe question will be, what is the business model shift we are enabling in health care, in retail, in transportation? And what are the definitive companies that exist today that will look for needed solutions that are materially different in the next few years or for new companies?\n\nJust like we saw in that comparison in the fact that the dot-com bubble burst in 1999 and 2000, but Airbnb and Uber hadn't been created. And Facebook was a nascent idea in a dorm room. And all of those shifts came after. And I think we're not yet in that. So I hope five years from now, we'll be talking about businesses like that.\"","post_image_url":"https://media.licdn.com/dms/image/v2/D4E22AQHNE7raQte98g/feedshare-shrink_800/B4EZ5sMeLFG0Ac-/0/1779931670241?e=1784160000&v=beta&t=Fa6-nVvI77w4ifKXcCUeWmJEJRYMLWCZF7Qe7WXt2vE","is_article":false,"article_url":null,"article_title":null,"article_description":null,"is_video":false,"video_url":null,"has_image":true,"reaction_count":140,"reaction_types":"LIKE, EMPATHY, PRAISE","repost_count":2,"impression_count":10130,"source":"activity"},{"is_my_post":true,"post_urn":"urn:li:activity:7465394588208517120","author_name":"Ravi Evani\n              \n                \n                   \n    \n      \n    \n    \n      \n    \n\n • You","author_profile_url":"https://www.linkedin.com/in/ravievani","author_headline":"Deploying enterprise agents in production / CTO / SWE Leader / GVP @ Publicis Sapient","posted_time":"2026-05-28","posted_hours_ago":672,"posted_time_raw":"4w","post_url":"https://www.linkedin.com/feed/update/urn:li:activity:7465394588208517120","author_profile_image_url":"https://media.licdn.com/dms/image/v2/C4E03AQGNeJRorEd2Nw/profile-displayphoto-shrink_100_100/profile-displayphoto-shrink_100_100/0/1569287114631?e=1784160000&v=beta&t=tJDZC7EXWnlgIIf8kF7fBCajhF-HEgzNXnz_IIkjqW8","post_text":"How can your hotel's chat bot be better than ChatGPT?\n\nGuests don’t just want conversation; they want execution. An AI that merely spits out a list of local tours is just a slow answering engine. Your agent must have a transactional mandate.\n\nIt shouldn’t just say: \"We recommend the sunset cruise\". It should say: \"There are exactly two spots left on the 5 PM sunset cruise. The weather is perfect. Shall I book it and charge it to your room?\"\n\nThe benefit, and the underlying work to get there is very different.\nArchitect your systems to prioritize workflow execution: querying live inventory, securing reservations, and finalizing logistics, over mere dialogue.\n\nActivities are one of the most emotional parts of the travel experience. In an agentic ecosystem, the experience layer is up for grabs. So build the infrastructure, deploy the agents, and start becoming the operating system for the trip.","post_image_url":null,"is_article":false,"article_url":null,"article_title":null,"article_description":null,"is_video":false,"video_url":null,"has_image":false,"reaction_count":13,"reaction_types":"LIKE","impression_count":803,"source":"activity"},{"article_description":null,"article_title":null,"article_url":null,"author_headline":"Deploying enterprise agents in production / CTO / SWE Leader / GVP @ Publicis Sapient","author_name":"Ravi Evani\n              \n                \n                   \n    \n      \n    \n    \n      \n    \n\n • You","author_profile_image_url":"https://media.licdn.com/dms/image/v2/C4E03AQGNeJRorEd2Nw/profile-displayphoto-shrink_100_100/profile-displayphoto-shrink_100_100/0/1569287114631?e=1784160000&v=beta&t=tJDZC7EXWnlgIIf8kF7fBCajhF-HEgzNXnz_IIkjqW8","author_profile_url":"https://www.linkedin.com/in/ravievani","has_image":true,"impression_count":683,"is_article":false,"is_my_post":true,"is_video":false,"post_image_url":"https://media.licdn.com/dms/image/v2/D4E22AQF3mT5UicmNNg/feedshare-shrink_800/B4EZ5j3DgmHQAc-/0/1779791837512?e=1784160000&v=beta&t=SjpOEPA9Wso1VV3S5SvSb33-0tcagx5nem_8cuUxwm0","post_text":"Uber might be onto a zero-CAC flywheel for hotel bookings.\n\nUber doesn't need to buy your attention on Google because they already live on your home screen.\n\nThey solved the \"low-frequency\" travel problem by anchoring its app to high-frequency daily habits. You might only book a hotel twice a year, but you use Uber or Uber Eats weekly to get a ride home, commute to work, or order dinner. That daily utility keeps the app permanently installed and top-of-mind.\n\nAnd for \"high-frequency\" travelers .. Uber doesn't have to wait for you to search for a hotel; they already possess high-intent data. If you schedule an Uber Reserve to the airport for next Friday, the app instantly knows you are traveling. It can dynamically serve you a personalized, highly relevant hotel offer precisely at the moment of need and you might bypass answering engines entirely.\n\nAnd because Uber doesn't have to spend $ on a Google click to get you to look at a hotel, they could pass that saved CAC directly to you or to OTAs (like Expedia that they partner with for hotel inventory), or even the hotels. And perhaps to all three!. Plus it might strengthen the customer lock-in with Uber One.\n\nIn a world where customer acquisition costs are squeezing margins across the travel economy, the winner might be a company that never has to buy the click in the first place. And that might be where Uber is heading to. And I wonder what Gooogle would do about this!","post_url":"https://www.linkedin.com/feed/update/urn:li:activity:7464988030542598144","post_urn":"urn:li:activity:7464988030542598144","posted_hours_ago":672,"posted_time":"2026-05-28","posted_time_raw":"4w","reaction_count":15,"reaction_types":"LIKE, INTEREST, EMPATHY","source":"activity","video_url":null},{"article_description":null,"article_title":null,"article_url":null,"author_headline":"Deploying enterprise agents in production / CTO / SWE Leader / GVP @ Publicis Sapient","author_name":"Ravi Evani\n              \n                \n                   \n    \n      \n    \n    \n      \n    \n\n • You","author_profile_image_url":"https://media.licdn.com/dms/image/v2/C4E03AQGNeJRorEd2Nw/profile-displayphoto-shrink_100_100/profile-displayphoto-shrink_100_100/0/1569287114631?e=1784160000&v=beta&t=tJDZC7EXWnlgIIf8kF7fBCajhF-HEgzNXnz_IIkjqW8","author_profile_url":"https://www.linkedin.com/in/ravievani","has_image":true,"impression_count":567,"is_article":false,"is_my_post":true,"is_video":true,"post_image_url":"https://media.licdn.com/dms/image/v2/D4E05AQGRe3JRlTreAA/videocover-high/B4EZ5i.9ewHcBU-/0/1779777134991?e=1783022400&v=beta&t=TWjQ5TBMdF-O6THgx_sTNBke7CmDCxxKysNnudEibzY","post_text":"\"Start change management earlier!\" is the worst advice you can get for deploying AI agents.\n\nThe problem isn't the timeline; it's the entire mental model.\n\nChange management implies your organization already has its sh*t together. It assumes your AI agents will perfectly work in the roles you intended for them. It assumes there a clear playbook just waiting for the people who will work with their agents.\n\nAgentic system development rarely works like that. You shuldn't pretend you have the workflow perfectly mapped out. You are throwing a dynamic agent and a human into the messy real world, and they have to figure out aspects of the new workflow together. In real-time.\n\nA person working with an AI agent might be more like riding a tandem bicycle together. The person and the agent get on the bike and figure out the messy real world together.\n\nThe agent adapts and leans; the person shifts their weight.\nThe person hits a bump; the agent adjusts its pedaling.\n\nYou can't \"manage\" that from the sidelines. The continuous, in-context co-evolution IS the process.\n\nThe work isn't done when the code is pushed. The person and their agent have to find their balance together.","post_url":"https://www.linkedin.com/feed/update/urn:li:activity:7464926399489966081","post_urn":"urn:li:activity:7464926399489966081","posted_hours_ago":672,"posted_time":"2026-05-28","posted_time_raw":"4w","reaction_count":14,"reaction_types":"LIKE","source":"activity","video_url":"https://media.licdn.com/dms/image/v2/D4E05AQGRe3JRlTreAA/videocover-high/B4EZ5i.9ewHcBU-/0/1779777134991?e=1783022400&v=beta&t=TWjQ5TBMdF-O6THgx_sTNBke7CmDCxxKysNnudEibzY"},{"article_description":null,"article_title":null,"article_url":null,"author_headline":"Deploying enterprise agents in production / CTO / SWE Leader / GVP @ Publicis Sapient","author_name":"Ravi Evani\n              \n                \n                   \n    \n      \n    \n    \n      \n    \n\n • You","author_profile_image_url":"https://media.licdn.com/dms/image/v2/C4E03AQGNeJRorEd2Nw/profile-displayphoto-shrink_100_100/profile-displayphoto-shrink_100_100/0/1569287114631?e=1784160000&v=beta&t=tJDZC7EXWnlgIIf8kF7fBCajhF-HEgzNXnz_IIkjqW8","author_profile_url":"https://www.linkedin.com/in/ravievani","has_image":true,"impression_count":1092,"is_article":false,"is_my_post":true,"is_video":false,"post_image_url":"https://media.licdn.com/dms/image/v2/D4E22AQFbKDWuvyWIAA/feedshare-shrink_800/B4EZ5XUWkiKMAc-/0/1779581413923?e=1784160000&v=beta&t=qDAKrnh4Rg5GKsmKW_AfPiXD0IWiD7XUr3Q5D0UKqoA","post_text":"Pragmatic Semantics: Why I have started to prefer maintaining ontologies in Python (over OWL) for agents.\n\nIn multi-agent Systems, agents require a shared semantic understanding of their environment (an ontology) to communicate, negotiate, and coordinate actions. Traditionally, ontologies are maintained in XML-based formats like RDF and OWL. While these work for formal description logic, they introduce significant friction into the live development and execution of agent swarms.\n\nHere is why maintaining ontologies in Python/Pydantic could work better for real-world production systems\n\n1. Unified Agent-Schema contracts: Modern software engineering has moved away from parsing raw schemas at runtime. Instead, we write neutral contracts (like Protobuf/gRPC, OpenAPI/Swagger, or GraphQL schemas) and compile them into native code bindings. Treating OWL as a design contract and translating it into Python Pydantic classes fits this model.\n\n2. Low Latency Swarm Coordination: In complex swarms, agents could dynamically negotiate and resolve conflicts in real time. Running description-logic reasoners on every agent decision could introduce unacceptable latency. Pythonic class execution is measured in milliseconds, preventing agent reasoning loops from stalling.\n\n3. Seamless agent state persistence & DB realities: While semantic graph databases are great for analytics, they are rarely used as the high-throughput, primary transactional databases for live applications. Agents must persist their internal states (goals, intentions, and memory) efficiently. Translating OWL concepts to Python classes makes it simple to map semantic concepts directly to standard SQL tables using ORM tools, keeping database transactions fast and simple while preserving semantic names.\n\nRule of Thumb\nUse OWL/RDF if your primary goal is knowledge integration across enterprise databases (e.g., merging flight data from Delta with airport data from the FAA where schemas differ significantly).\n\nConsider using Python/Pydantic if your primary goal is application logic, agent decision-making, and message contracts where type-safety and execution speed are important.","post_url":"https://www.linkedin.com/feed/update/urn:li:activity:7464231232042627072","post_urn":"urn:li:activity:7464231232042627072","posted_hours_ago":720,"posted_time":"2026-05-25","posted_time_raw":"1mo","reaction_count":21,"reaction_types":"LIKE, INTEREST","source":"activity","video_url":null},{"article_description":null,"article_title":null,"article_url":null,"author_headline":"970,163 followers","author_name":"Publicis Sapient","author_profile_image_url":"https://media.licdn.com/dms/image/v2/D4E0BAQFFzEm8Vg3Lwg/company-logo_100_100/B4EZqics_9KMAU-/0/1763662025177?e=1784160000&v=beta&t=DvHD9GkDC10VqQdBEGlHsMta0g-PoKeRms3Pp4DNOkk","author_profile_url":"https://www.linkedin.com/company/publicissapient/posts","has_image":true,"impression_count":0,"is_article":false,"is_my_post":true,"is_repost":true,"is_video":false,"post_image_url":"https://media.licdn.com/dms/image/v2/D5610AQHuw7Jse06t6g/image-shrink_800/B56Z2XPUAzHgAg-/0/1776358867289?e=1783022400&v=beta&t=BHMzRktQCn6xYvSE9A_F2Bw_MwHaIyY61OyLPIQb0kk","post_text":"Running ops in QSR and hospitality doesn’t leave much room for error.\n\nWe’re hosting an interactive session at Google Cloud Next on how teams are actually using agentic AI in these environments.\n\nWe’ll cover:\n🔴 How AI agents can improve operational performance\n🔴 Where multi-agent systems add speed and resilience\n🔴 Real-world examples in QSR and hospitality\n🔴 How to build secure, scalable enterprise solutions\n\nRegister: https://lnkd.in/gHZB5wBZ\n\nhashtag#GoogleCloudNext hashtag#agenticAI hashtag#PublicisSapient","post_url":"https://www.linkedin.com/feed/update/urn:li:activity:7452961241523834880","post_urn":"urn:li:activity:7452961241523834880","posted_hours_ago":1440,"posted_time":"2026-04-25","posted_time_raw":"2mo","reaction_count":61,"reaction_types":"LIKE, PRAISE, ENTERTAINMENT","repost_count":3,"source":"activity","video_url":null},{"article_description":null,"article_t ":true,"impression_count":708,"is_article":false,"is_my_post":true,"is_video":true,"post_image_url":"https://media.licdn.com/dms/image/v2/D5605AQGG08XHdSRVLg/videocover-high/B56Z2nd6a_GsBY-/0/1776631130918?e=1783008000&v=beta&t=0IcyfkK0joGyZu0Y8NNNeSwoOAptN7f4souR8wMG_Os","post_text":"Could this \"monitoring view\" have just been a log file? Of course. But now that Sapient Slingshot makes design easier, why not indulge a little operational vanity.","post_url":"https://www.linkedin.com/feed/update/urn:li:activity:7451731083257229312","post_urn":"urn:li:activity:7451731083257229312","posted_hours_ago":1440,"posted_time":"2026-04-25","posted_time_raw":"2mo","reaction_count":12,"reaction_types":"LIKE","source":"activity","video_url":"https://media.licdn.com/dms/image/v2/D5605AQGG08XHdSRVLg/videocover-high/B56Z2nd6a_GsBY-/0/1776631130918?e=1783008000&v=beta&t=0IcyfkK0joGyZu0Y8NNNeSwoOAptN7f4souR8wMG_Os"},{"article_description":null,"article_title":null,"article_url":null,"author_headline":"Deploying enterprise agents in production / CTO / SWE Leader / GVP @ Publicis Sapient","author_name":"Ravi Evani\n              \n                \n                   \n    \n      \n    \n    \n      \n    \n\n • You","author_profile_image_url":"https://media.licdn.com/dms/image/v2/C4E03AQGNeJRorEd2Nw/profile-displayphoto-shrink_100_100/profile-displayphoto-shrink_100_100/0/1569287114631?e=1784160000&v=beta&t=tJDZC7EXWnlgIIf8kF7fBCajhF-HEgzNXnz_IIkjqW8","author_profile_url":"https://www.linkedin.com/in/ravievani","comment_count":2,"has_image":false,"impression_count":2342,"is_article":false,"is_my_post":true,"is_video":false,"post_image_url":null,"post_text":"Ever since \"Claude Code\", I've only seen coding work shoot up. Now with \"Claude Design\", the amount of design work will shoot up too. More capability means more things actually get built. So congrats to my fellow designers. Happy building!","post_url":"https://www.linkedin.com/feed/update/urn:li:activity:7451645799979044864","post_urn":"urn:li:activity:7451645799979044864","posted_hours_ago":1440,"posted_time":"2026-04-25","posted_time_raw":"2mo","reaction_count":39,"reaction_types":"LIKE, EMPATHY, INTEREST","source":"activity","video_url":null},{"article_description":null,"article_title":null,"article_url":null,"author_headline":"Deploying enterprise agents in production / CTO / SWE Leader / GVP @ Publicis Sapient","author_name":"Ravi Evani\n              \n                \n                   \n    \n      \n    \n    \n      \n    \n\n • You","author_profile_image_url":"https://media.licdn.com/dms/image/v2/C4E03AQGNeJRorEd2Nw/profile-displayphoto-shrink_100_100/profile-displayphoto-shrink_100_100/0/1569287114631?e=1784160000&v=beta&t=tJDZC7EXWnlgIIf8kF7fBCajhF-HEgzNXnz_IIkjqW8","author_profile_url":"https://www.linkedin.com/in/ravievani","comment_count":3,"has_image":true,"impression_count":1944,"is_article":false,"is_my_post":true,"is_video":false,"post_image_url":"https://media.licdn.com/dms/image/v2/D5622AQHPXCbMcE8HCw/feedshare-shrink_800/B56Z2TUxvWKoAk-/0/1776293190887?e=1784160000&v=beta&t=yRaR_k5yh38mnR3zqe2yxMmIGAij8pGJatRWOKgsRKA","post_text":"Excited to join Rajeev Perera in a fireside chat at Google Cloud Next '26! Join me there. Registration link via Publicis Sapient in first comment.","post_url":"https://www.linkedin.com/feed/update/urn:li:activity:7450548744451756032","post_urn":"urn:li:activity:7450548744451756032","posted_hours_ago":1440,"posted_time":"2026-04-25","posted_time_raw":"2mo","reaction_count":46,"reaction_types":"LIKE, EMPATHY, PRAISE","repost_count":6,"source":"activity","video_url":null},{"article_description":null,"article_title":null,"article_url":null,"author_headline":"Deploying enterprise agents in production / CTO / SWE Leader / GVP @ Publicis Sapient","author_name":"Ravi Evani\n              \n                \n                   \n    \n      \n    \n    \n      \n    \n\n • You","author_profile_image_url":"https://media.licdn.com/dms/image/v2/C4E03AQGNeJRorEd2Nw/profile-displayphoto-shrink_100_100/profile-displayphoto-shrink_100_100/0/1569287114631?e=1784160000&v=beta&t=tJDZC7EXWnlgIIf8kF7fBCajhF-HEgzNXnz_IIkjqW8","author_profile_url":"https://www.linkedin.com/in/ravievani","comment_count":1,"has_image":false,"impression_count":917,"is_article":false,"is_my_post":true,"is_video":false,"post_image_url":null,"post_text":"What I’m finding is that managing coding agents is becoming much more of a systems job than a prompting job. Few months ago, it was easy to think the leverage would come mostly from asking better questions or refining prompts. But in my own day-to-day work, that is not where the center of gravity is ending up nowadays.\n\nWhat has changed for me is that I now spend far less time thinking about single interactions with a model and far more time thinking about orchestration. I try to break work into macro-tasks, run multiple agents across research, planning, implementation, and validation, and shape the operating environment around them so they can perform with more consistency over time.\n\nJust like when a human team member’s work starts to drift, I do not jump in and do it myself. I’m finding the same is true with agents. When they fail, the answer is usually not to take over manually. More often, it points to a weakness in the broader setup around them: the intent was not clear enough, the context was weak, the feedback loop was loose, or the boundaries were not well defined. So I'm changing how I troubleshoot, and now I find myself spending more time improving the system around the agents than reacting to any single output.\n\nToday, the real leverage for me is coming from building a more persistent workflow layer around the models so work can be specialized, coordinated, reused, and integrated into a broader process. That is pulling me further out of the execution loop and is pushing me more toward judgment, architecture, and direction.","post_url":"https://www.linkedin.com/feed/update/urn:li:activity:7445828465905328128","post_urn":"urn:li:activity:7445828465905328128","posted_hours_ago":1440,"posted_time":"2026-04-25","posted_time_raw":"2mo","reaction_count":15,"reaction_types":"LIKE, EMPATHY","source":"activity","video_url":null},{"article_description":null,"article_title":null,"article_url":null,"author_headline":"Deploying enterprise agents in production / CTO / SWE Leader / GVP @ Publicis Sapient","author_name":"Ravi Evani\n              \n                \n                   \n    \n      \n    \n    \n      \n    \n\n • You","author_profile_image_url":"https://media.licdn.com/dms/image/v2/C4E03AQGNeJRorEd2Nw/profile-displayphoto-shrink_100_100/profile-displayphoto-shrink_100_100/0/1569287114631?e=1784160000&v=beta&t=tJDZC7EXWnlgIIf8kF7fBCajhF-HEgzNXnz_IIkjqW8","author_profile_url":"https://www.linkedin.com/in/ravievani","has_image":true,"impression_count":1649,"is_article":false,"is_my_post":true,"is_video":true,"post_image_url":"https://media.licdn.com/dms/image/v2/D4E05AQHGyr97yMft7Q/videocover-high/B4EZ1OpwObIEBY-/0/1775141067756?e=1783008000&v=beta&t=oJMZDFRBr4iA4TW9Pq0eua0O4Ji7PDVFzI4SMMSlyUk","post_text":"Building a winning product is going to get much harder.\n\nAs the barrier to building drops, consumer expectations will skyrocket.\n\nA pixel-perfect UI that works flawlessly today is no longer a competitive advantage. It's just the baseline.\n\nIf your app looks beautiful but takes 15 steps to complete a workflow, your users aren't going to praise your design. They’re going to ask: \"Why didn't this take 2 steps?\"\n\nThe best app for an enterprise workflow might actually be no app -- where the task gets done automatically, behind the scenes, with zero friction.\n\nThe bar is shifting. If you aren't figuring out how to get your user's 15-step process down to zero, your \"quickly built\" product won't be able to retain them or continue to drive value for your business.","post_url":"https://www.linkedin.com/feed/update/urn:li:activity:7445481350360592384","post_urn":"urn:li:activity:7445481350360592384","posted_hours_ago":1440,"posted_time":"2026-04-25","posted_time_raw":"2mo","reaction_count":21,"reaction_types":"LIKE","source":"activity","video_url":"https://media.licdn.com/dms/image/v2/D4E05AQHGyr97yMft7Q/videocover-high/B4EZ1OpwObIEBY-/0/1775141067756?e=1783008000&v=beta&t=oJMZDFRBr4iA4TW9Pq0eua0O4Ji7PDVFzI4SMMSlyUk"},{"article_description":null,"article_title":null,"article_url":null,"author_headline":"Deploying enterprise agents in production / CTO / SWE Leader / GVP @ Publicis Sapient","author_name":"Ravi Evani\n              \n                \n                   \n    \n      \n    \n    \n      \n    \n\n • You","author_profile_image_url":"https://media.licdn.com/dms/image/v2/C4E03AQGNeJRorEd2Nw/profile-displayphoto-shrink_100_100/profile-displayphoto-shrink_100_100/0/1569287114631?e=1784160000&v=beta&t=tJDZC7EXWnlgIIf8kF7fBCajhF-HEgzNXnz_IIkjqW8","author_profile_url":"https://www.linkedin.com/in/ravievani","comment_count":2,"has_image":true,"impression_count":3887,"is_article":false,"is_my_post":true,"is_video":false,"post_image_url":"https://media.licdn.com/dms/image/v2/D4E22AQHaaRhuRIAp3A/feedshare-shrink_800/B4EZ1JONCPIUAc-/0/1775049956269?e=1784160000&v=beta&t=MEMJo_lKyPScElfBS99Mujl9n8aKBJbth9__4FCj39U","post_text":"Some might call the Lufthansa 747-400 cabin “old”. I’d call it a reminder of when flying still felt a little more special. Nothing beats the 4-window view from the quiet upper deck. Hope they don’t “modernize” the cabin into cubicles.","post_url":"https://www.linkedin.com/feed/update/urn:li:activity:7445099143565369345","post_urn":"urn:li:activity:7445099143565369345","posted_hours_ago":1440,"posted_time":"2026-04-25","posted_time_raw":"2mo","reaction_count":29,"reaction_types":"LIKE, EMPATHY","source":"activity","video_url":null},{"article_description":null,"article_title":null,"article_url":null,"author_headline":"Deploying enterprise agents in production / CTO / SWE Leader / GVP @ Publicis Sapient","author_name":"Ravi Evani\n              \n                \n                   \n    \n      \n    \n    \n      \n    \n\n • You","author_profile_image_url":"https://media.licdn.com/dms/image/v2/C4E03AQGNeJRorEd2Nw/profile-displayphoto-shrink_100_100/profile-displayphoto-shrink_100_100/0/1569287114631?e=1784160000&v=beta&t=tJDZC7EXWnlgIIf8kF7fBCajhF-HEgzNXnz_IIkjqW8","author_profile_url":"https://www.linkedin.com/in/ravievani","has_image":false,"impression_count":821,"is_article":false,"is_my_post":true,"is_video":false,"post_image_url":null,"post_text":"Excel is the ultimate \"low floor, infinite ceiling\" tool. Anyone can type numbers into a grid and use =SUM(), which tricks people into thinking they \"know Excel.\" But there is a universe of difference between a beginner making a budget and a master building a dynamic, automated enterprise financial model using Power Query, relational data models, and VBA. An expert knows Excel can do almost anything if you structure the data and logic correctly.\n\nAgentic coding has entered this same territory. The tools are now more than capable. The only gap is your skill. And that now spans way beyond prompting.\n\n- context\n- tools\n- rules\n- skills\n- workflows\n- sub agents\n\nClosing this skill gap can make you 10x more productive vs simply writing prompts.\n\nBut you already knew that. So what’s stopping you?","post_url":"https://www.linkedin.com/feed/update/urn:li:activity:7445015384459563008","post_urn":"urn:li:activity:7445015384459563008","posted_hours_ago":1440,"posted_time":"2026-04-25","posted_time_raw":"2mo","reaction_count":7,"reaction_types":"LIKE","repost_count":1,"source":"activity","video_url":null},{"article_description":null,"article_title":null,"article_url":null,"author_headline":"Deploying enterprise agents in production / CTO / SWE Leader / GVP @ Publicis Sapient","author_name":"Ravi Evani\n              \n                \n                   \n    \n      \n    \n    \n      \n    \n\n • You","author_profile_image_url":"https://media.licdn.com/dms/image/v2/C4E03AQGNeJRorEd2Nw/profile-displayphoto-shrink_100_100/profile-displayphoto-shrink_100_100/0/1569287114631?e=1784160000&v=beta&t=tJDZC7EXWnlgIIf8kF7fBCajhF-HEgzNXnz_IIkjqW8","author_profile_url":"https://www.linkedin.com/in/ravievani","has_image":false,"impression_count":914,"is_article":false,"is_my_post":true,"is_video":false,"post_image_url":null,"post_text":"I sat through a well-designed \"estimation review\" presentation recently, where the team sized up the resources, cost and timeline for a project.\n\nIt had clean slides and a thoughtful structure. A lot of effort clearly went into the preparation.\n\nBut the problem was none of it was usable beyond that moment.\n\nThe estimate was presented, discussed, and even agreed upon. But it wasn’t reproducible. It wasn’t codified. And it definitely wasn’t something an agent could pick up and run with.\n\nThat’s the gap most enterprises are still stuck in.\n\nWe continue to optimize for human consumption: PowerPoint decks, visuals, narratives. But we’re not structuring the underlying data / decisioning in a way that supports repeatability, automation, or agent-driven workflows.\n\nAn estimate shouldn’t just be numbers on a slide. It should be the output of clearly defined dimensions, assumptions, and facts that can be captured, reused, and reasoned over. That’s what allows you to scale it. That’s what allows an agent to generate it again, consistently, without starting from scratch.\n\nRight now, we’re putting energy into presentation instead of production.\n\nThe shift is simple, but not easy: It is to separate the two concerns.\n\nOne path for humans: to influence, align, and communicate.\nAnother path for machines: structured, explicit, and reusable.\n\nAnd the two need to stay in sync.\n\nUntil that happens, we’ll keep producing great-looking outputs that don’t actually move the system forward.\n\nThe question is not whether an estimate looks good. It’s whether it can be leveraged again to solve the next problem.","post_url":"https://www.linkedin.com/feed/update/urn:li:activity:7444384924708585472","post_urn":"urn:li:activity:7444384924708585472","posted_hours_ago":1440,"posted_time":"2026-04-25","posted_time_raw":"2mo","reaction_count":11,"reaction_types":"LIKE","source":"activity","video_url":null},{"article_description":null,"article_title":null,"article_url":null,"author_headline":"Deploying enterprise agents in production / CTO / SWE Leader / GVP @ Publicis Sapient","author_name":"Ravi Evani\n              \n                \n                   \n    \n      \n    \n    \n      \n    \n\n • You","author_profile_image_url":"https://media.licdn.com/dms/image/v2/C4E03AQGNeJRorEd2Nw/profile-displayphoto-shrink_100_100/profile-displayphoto-shrink_100_100/0/1569287114631?e=1784160000&v=beta&t=tJDZC7EXWnlgIIf8kF7fBCajhF-HEgzNXnz_IIkjqW8","author_profile_url":"https://www.linkedin.com/in/ravievani","has_image":false,"impression_count":680,"is_article":false,"is_my_post":true,"is_video":false,"post_image_url":null,"post_text":"Why \"Vibe Coding\" is the catalyst for a software engineering renaissance\n\nRight now, there is a consensus that vibe coding is inherently bad. The criticism is that it replaces software craftsmanship with \"AI slop\": bloated, buggy, and unmaintainable code generated by users who are merely \"vibing\" rather than engineering.\n\nBut blaming vibe coding for bad software misses the mark entirely. Vibe coding simply exposes and amplifies the truth about how good or bad a person, team, or enterprise actually is at building systems.\n\n1. A reflection of internal reality: Your architecture & context are your \"DNA\"\nIf vibe coding is filling your repositories with brittle slop, it is because the underlying engineering DNA was already sloppy. Agents work within the boundaries and the context window you give them. So if the output is tangled, fragile, and monolithic, it is often reflecting a codebase where those patterns were already accepted. Garbage in, garbage out. In a clean, modular environment, the AI is far more likely to generate better code. The slop is a mirror of the habits, standards, and architectural discipline already present in the person and organization using it.\n\n2. Accountability over blame: The guardrail crisis\nIt has become fashionable for engineering leaders to blame hallucinating AI when bad code causes issues. That is a cop-out. AI can write bad code, just like humans can. If that slop reaches production, the real failure is not the AI. It is the lack of engineering guardrails: weak tests, weak CI/CD, and weak review discipline.\n\n3. Public record of character: Velocity exposes fragility\nBefore AI, bad system design could stay hidden behind the slow pace of manual development. Because humans wrote code slowly, structural rot built up slowly too, buried inside individual IDEs and stretched across long sprint cycles. Vibe coding removes that buffer. When developers can generate thousands of lines in an afternoon, it becomes a stress test that exposes the bottlenecks, weak automation, tight coupling, and other architectural sins that were always there.\n\nThe Path to Acceptance: An Engineering Renaissance\nThe \"AI slop\" era is terrifying for technical leaders, but it is ultimately a required step forward for the industry. Vibe coding should force enterprises to confront the uncomfortable truth about their fragile systems. By amplifying these flaws, AI will eventually push the industry toward a renaissance in systems architecture and platform engineering. Organizations will realize that in the age of AI, writing syntax is cheap, but rigorous system design, automated testing, and clear domain boundaries are priceless. To survive, they will be forced to build foundational platforms where the \"right way\" to write code is the only way the AI can write it.\n\nVibe coding lays bare the underlying competence of the organization. It’s time to stop blaming the magnifying glass and start fixing the system it's reflecting.","post_url":"https://www.linkedin.com/feed/update/urn:li:activity:7444021540758716416","post_urn":"urn:li:activity:7444021540758716416","posted_hours_ago":1440,"posted_time":"2026-04-25","posted_time_raw":"2mo","reaction_count":13,"reaction_types":"LIKE","source":"activity","video_url":null},{"article_description":null,"article_title":null,"article_url":null,"author_headline":"Deploying enterprise agents in production / CTO / SWE Leader / GVP @ Publicis Sapient","author_name":"Ravi Evani\n              \n                \n                   \n    \n      \n    \n    \n      \n    \n\n • You","author_profile_image_url":"https://media.licdn.com/dms/image/v2/C4E03AQGNeJRorEd2Nw/profile-displayphoto-shrink_100_100/profile-displayphoto-shrink_100_100/0/1569287114631?e=1784160000&v=beta&t=tJDZC7EXWnlgIIf8kF7fBCajhF-HEgzNXnz_IIkjqW8","author_profile_url":"https://www.linkedin.com/in/ravievani","has_image":true,"impression_count":418,"is_article":false,"is_my_post":true,"is_video":false,"post_image_url":"https://media.licdn.com/dms/image/v2/D4E22AQG2raIXwbKOMQ/feedshare-shrink_1280/B4EZ03hMPyIUAM-/0/1774752941322?e=1784160000&v=beta&t=5nFq8xT7_Bkq-etkzpSw4SuMglXyCoSsdzp1k-LS4NY","post_text":"Have you ever built an AI assistant...say, a helpful concierge for a restaurant app...only to have it suddenly turn around and ask *you* for a recommendation?\n\nIf so, you’ve experienced *Persona Drifting*, just like I did this weekend.\n\nWhat is it?\n\nPersona Drifting occurs when an AI model loses track of its assigned identity during a conversation and adopts a different role, often mirroring the user or adopting a generic, unhelpful conversational stance.\n\nInstead of remaining the authoritative \"Assistant,\" the AI drifts into becoming a \"Customer,\" a \"Co-worker,\" or simply a confused participant asking the user open-ended questions when it was supposed to be the one giving recommendations.\n\nWhy Does It Happen?\n\nAI models, especially highly capable conversational models, are trained on vast amounts of human-to-human dialogue. In typical human conversation, roles are fluid. If I give you a list of options, it’s natural for me to ask, \"Which of these do you prefer?\"\n\nWhen we use APIs to create multi-turn interactions (like the Gemini Interactions API or Live API), we are often stitching together separate requests. Persona drifting typically happens due to:\n\n1. Inconsistent System Instructions Across Turns:\nIn Turn 1, you might tell the AI: \"You are a specialized Restaurant AI Assistant.\"\nIn Turn 2 (e.g., summarizing tool results), you might simplify the instruction to: \"Summarize these results.\"\n\nBecause the strong persona anchor from Turn 1 is missing in Turn 2, the model relies on the immediate context. It sees a list of food items and defaults to its conversational training, asking, \"What would you like to do with these?\", and leaving you puzzled.\n\n2. Lack of Negative Constraints:\nModels are eager to keep the conversation going. Unless explicitly told *not* to ask follow-up questions, they often will. They view ending a turn with a question as engaging and helpful.\n\n3. Context Window Imbalance:\nAs the conversation grows, the initial system prompt gets further away in the context window, while the immediate back-and-forth dominates the model's attention. The model starts mimicking the user's conversational style.\n\nHow to Fix It?\n\nThe solution requires disciplined prompt engineering and state management, particularly when chaining API calls:\n\n1/ The \"Anchor\" Strategy: Never dilute the system instruction. Every single turn or API call in a flow must reiterate the core persona.\n\n2/ Explicit Negative Constraints: Borrow a technique from Google's own reference projects. Explicitly tell the model: \"Do not ask for additional info or follow-up questions; make your best judgment based on the available data.\"\n\n3/ Role Enforcement: Clearly define the boundary. \"You are the Assistant. The human is the Customer. You provide answers; you do not ask for suggestions.\"\n\nBy managing system instructions consistently across every turn, we can keep our AI concierges behind the counter where they belong: serving answers, not asking us for fries.","post_url":"https://www.linkedin.com/feed/update/urn:li:activity:7443853366549430272","post_urn":"urn:li:activity:7443853366549430272","posted_hours_ago":1440,"posted_time":"2026-04-25","posted_time_raw":"2mo","reaction_count":11,"reaction_types":"LIKE","source":"activity","video_url":null},{"article_description":null,"article_title":null,"article_url":null,"author_headline":"Deploying enterprise agents in production / CTO / SWE Leader / GVP @ Publicis Sapient","author_name":"Ravi Evani\n              \n                \n                   \n    \n      \n    \n    \n      \n    \n\n • You","author_profile_image_url":"https://media.licdn.com/dms/image/v2/C4E03AQGNeJRorEd2Nw/profile-displayphoto-shrink_100_100/profile-displayphoto-shrink_100_100/0/1569287114631?e=1784160000&v=beta&t=tJDZC7EXWnlgIIf8kF7fBCajhF-HEgzNXnz_IIkjqW8","author_profile_url":"https://www.linkedin.com/in/ravievani","comment_count":2,"has_image":false,"impression_count":1007,"is_article":false,"is_my_post":true,"is_video":false,"post_image_url":null,"post_text":"Enterprise Math\n2016: Once we get on Cloud, we’ll get speed to market.\n2026: Once we get on AI, we’ll get speed to market.\n\nUnfortunately in both cases, the bottleneck just moves somewhere else.","post_url":"https://www.linkedin.com/feed/update/urn:li:activity:7443631742399299584","post_urn":"urn:li:activity:7443631742399299584","posted_hours_ago":1440,"posted_time":"2026-04-25","posted_time_raw":"2mo","reaction_count":18,"reaction_types":"LIKE","source":"activity","video_url":null},{"article_description":null,"article_title":null,"article_url":null,"author_headline":"Deploying enterprise agents in production / CTO / SWE Leader / GVP @ Publicis Sapient","author_name":"Ravi Evani\n              \n                \n                   \n    \n      \n    \n    \n      \n    \n\n • You","author_profile_image_url":"https://media.licdn.com/dms/image/v2/C4E03AQGNeJRorEd2Nw/profile-displayphoto-shrink_100_100/profile-displayphoto-shrink_100_100/0/1569287114631?e=1784160000&v=beta&t=tJDZC7EXWnlgIIf8kF7fBCajhF-HEgzNXnz_IIkjqW8","author_profile_url":"https://www.linkedin.com/in/ravievani","comment_count":2,"has_image":true,"impression_count":833,"is_article":false,"is_my_post":true,"is_video":false,"post_image_url":"https://media.licdn.com/dms/image/v2/D4E22AQEc2bJvB2HKaA/feedshare-shrink_800/B4EZ0vbMKZJcAc-/0/1774617150505?e=1784160000&v=beta&t=rgHWRvTAN-20Z-qxI3ynY7kJ9u-cxc5hUGFOLLl2ar8","post_text":"I’m already feeling the impact of Jevon’s paradox. As AI lowers the time, cost, and friction of writing code, I’m demanding more from myself. More small tools. More automation. More things built faster to make my life easier.\n\nIt looks like Jevon’s paradox going to reshape how most developers work in three ways:\n\n1. From writing code to orchestrating work\nWe’ve been trained to work linearly: pick a ticket, solve it, move on.\nNow you’re managing (or will be expected to manage) multiple threads at once: different agents generating, testing, iterating in parallel. The job shifts from “build this” to “run a system that builds many things at once.” If you stay sequential, you’ll just bottleneck yourself.\n\n2. Deciding what actually needs a human\nYou won’t be able to review everything. There will be too much output. So the skill becomes judgment: where do I step in, and where do I trust the system?\nArchitecture decisions, risk-heavy changes, anything with downstream impac might be where you need to focus. Everything else, you let run. Most devs aren’t used to thinking this way yet.\n\n3. Taste becomes your differentiator\nIf code is cheap, experience i
