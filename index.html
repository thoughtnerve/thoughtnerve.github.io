al proxies.\n\nThe effect: teams that once supported $20-50 M in project throughput can handle $200 M+ without ballooning headcount, because the drag is engineered out of the system.\n\nSlingshot gives teams the power to own the full stack—not just technically, but operationally and strategically. That’s what it takes to move fast and build right.","post_url":"https://www.linkedin.com/feed/update/urn:li:activity:7342909422035173379","post_urn":"urn:li:activity:7342909422035173379","posted_hours_ago":8760,"posted_time":"2025-06-25","posted_time_raw":"1yr","reaction_count":66,"reaction_types":"LIKE, EMPATHY, PRAISE","source":"activity","video_url":"https://media.licdn.com/dms/image/v2/D4D05AQGuHh2bHU4KDw/videocover-high/B4DZedBGooGsB8-/0/1750686023613?e=1783008000&v=beta&t=Z4ifKCNPFEhixuos55ABXmWCW6sKGLn_WU1UAfDSCXI"},{"article_description":null,"article_title":null,"article_url":null,"author_headline":"Deploying enterprise agents in production / CTO / SWE Leader / GVP @ Publicis Sapient","author_name":"Ravi Evani\n              \n                \n                   \n    \n      \n    \n    \n      \n    \n\n • You","author_profile_image_url":"https://media.licdn.com/dms/image/v2/C4E03AQGNeJRorEd2Nw/profile-displayphoto-shrink_100_100/profile-displayphoto-shrink_100_100/0/1569287114631?e=1784160000&v=beta&t=tJDZC7EXWnlgIIf8kF7fBCajhF-HEgzNXnz_IIkjqW8","author_profile_url":"https://www.linkedin.com/in/ravievani","comment_count":4,"has_image":true,"impression_count":1570,"is_article":false,"is_my_post":true,"is_video":true,"post_image_url":"https://media.licdn.com/dms/image/v2/D4D05AQFnoXBLgepqtQ/videocover-low/B4DZeHKNw8GYB0-/0/1750319297579?e=1783008000&v=beta&t=RFnyqTUfryNgNjM5qnnJ5qBLITPCdACLuf_NZakWf1A","post_text":"Two Quick Tips for Extracting Structured Data from Emails Using AI\n\nIf you're working on extracting structured data from messy, unstructured emails using AI, here are two simple but effective tips. In this example, built using Sapient Slingshot we processed a batch of event accommodation requests sent via email to a hospitality provider, and used an LLM to extract booking details.\n\n1. Choose the Right Model Variant\nIn our case, Gemini Pro and Gemini Flash returned similar outputs, but Flash ran faster. That makes it a good default if you're optimizing for performance and cost. On the other hand, Flash Lite was faster still—but missed key fields, like room count. The takeaway: test a few model variants before locking in, rather than defaulting to the biggest or most popular one.\n\n2. Add Traceability with ContextGem https://lnkd.in/dg49y_MF\nWhen extracting data, it helps to trace each value back to its source. ContextGem, a GitHub project, does exactly that. It tags each extracted value and shows where it came from in the original document. That visibility makes it easier for humans to review, trust, and validate the output.\n\nThese two practices can quickly raise the reliability of your AI-powered data extraction workflows.","post_url":"https://www.linkedin.com/feed/update/urn:li:activity:7341371277212880896","post_urn":"urn:li:activity:7341371277212880896","posted_hours_ago":8760,"posted_time":"2025-06-25","posted_time_raw":"1yr","reaction_count":20,"reaction_types":"LIKE","source":"activity","video_url":"https://media.licdn.com/dms/image/v2/D4D05AQFnoXBLgepqtQ/videocover-low/B4DZeHKNw8GYB0-/0/1750319297579?e=1783008000&v=beta&t=RFnyqTUfryNgNjM5qnnJ5qBLITPCdACLuf_NZakWf1A"},{"article_description":null,"article_title":null,"article_url":null,"author_headline":"Deploying enterprise agents in production / CTO / SWE Leader / GVP @ Publicis Sapient","author_name":"Ravi Evani\n              \n                \n                   \n    \n      \n    \n    \n      \n    \n\n • You","author_profile_image_url":"https://media.licdn.com/dms/image/v2/C4E03AQGNeJRorEd2Nw/profile-displayphoto-shrink_100_100/profile-displayphoto-shrink_100_100/0/1569287114631?e=1784160000&v=beta&t=tJDZC7EXWnlgIIf8kF7fBCajhF-HEgzNXnz_IIkjqW8","author_profile_url":"https://www.linkedin.com/in/ravievani","has_image":false,"impression_count":1456,"is_article":false,"is_my_post":true,"is_video":false,"post_image_url":null,"post_text":"Hospitality Leaders: Here’s how AI can streamline your B2B event booking request data\n\nYour corporate event bookings arrive in countless formats:\n→ Emails with 15-page attachments\n→ Event management platform submissions\n→ Phone calls requesting quick quotes\n→ Direct booking APIs\n→ Third-party aggregator feeds\n→ Excel spreadsheets forwarded multiple times\n\nThe result? Your team spends 60% of their time copying, pasting, and reformatting instead of booking events.\n\nImagine AI handling each request format, delivering clean, structured data within 30 seconds:\n\n★ PDF attachments → Structured booking details\n★ Phone calls → Automatic transcription and data extraction\n★ Email chaos → Clearly organized event requirements\n★ Any format → Standardized data ready for your PMS\n\nThe outcomes:\n• High accuracy in data extraction\n• Significant reduction in manual processing\n• Response times reduced from days to hours\n\nYour revenue team gets actionable data, your sales team responds faster, and your operations run smoother.\n\nHospitality’s future is intelligent systems empowering your team to focus on creating exceptional experiences.\n\nWhat’s your biggest hospitality data challenge?\n\nhashtag#Hospitality hashtag#EventBooking hashtag#AI\n\nP.S. Architecture diagram (Pg 4) generated with the help of Sapient Slingshot","post_url":"https://www.linkedin.com/feed/update/urn:li:activity:7340444039592177667","post_urn":"urn:li:activity:7340444039592177667","posted_hours_ago":8760,"posted_time":"2025-06-25","posted_time_raw":"1yr","reaction_count":22,"reaction_types":"LIKE, INTEREST","source":"activity","video_url":null},{"article_description":null,"article_title":null,"article_url":null,"author_headline":"Deploying enterprise agents in production / CTO / SWE Leader / GVP @ Publicis Sapient","author_name":"Ravi Evani\n              \n                \n                   \n    \n      \n    \n    \n      \n    \n\n • You","author_profile_image_url":"https://media.licdn.com/dms/image/v2/C4E03AQGNeJRorEd2Nw/profile-displayphoto-shrink_100_100/profile-displayphoto-shrink_100_100/0/1569287114631?e=1784160000&v=beta&t=tJDZC7EXWnlgIIf8kF7fBCajhF-HEgzNXnz_IIkjqW8","author_profile_url":"https://www.linkedin.com/in/ravievani","comment_count":4,"has_image":true,"impression_count":5317,"is_article":false,"is_my_post":true,"is_video":true,"post_image_url":"https://media.licdn.com/dms/image/v2/D4E05AQGGcuRchZksNQ/feedshare-thumbnail_720_1280/B4EZdpeW7HHsAs-/0/1749821278139?e=1783008000&v=beta&t=JlgH6qd6iQsQaJ-iTaVz7bKLQ1gV9n4AplRz8Dssfes","post_text":"Great run at hashtag#VivaTech2025, showcasing Sapient Slingshot to numerous clients and sharing practical examples of how to leverage AI to solve the long persistent enterprise delivery challenges.\n\nWhile there are point solutions everywhere, such as AI coding tools to boost individual productivity, they still miss the core problem—which is that at team, project and program levels, the outcomes of speed, quality and value remain hard to achieve.\n\nWe discussed some key strategies with real examples, to address the following challenges:\n\n① Team velocity vs. individual speed\nYour developers get a lift from Copilot-style tools-but how do you translate that into predictable, program-level gains in speed, quality, and value? How do you raise bar for all developers, not just seniors. How would you ensure juniors get better starting points and seniors get leverage?\n\n② Context density\nAI output is only as good as the prompts and enterprise context you feed it. Who owns your prompt library and how does your context graph get built and democratized? How does your prompt library and context graph evolve with each new application functionality, compliance shift, or domain-specific edge case?\n\n③ Consistency at scale\nIf engineers are left to leverage AI SDLC tools in isolation , how do you avoid style drift, architecture misalignment, or “house-of-cards” code that doesn’t hold up during integration?\n\n④ The two-steps-back loop\nWhen AI fixes one issue but breaks two others, do you have the right guardrails, lineage visibility, and policy context to guide the next prompt-or are teams going in circles chasing bugs?\n\nIt was fun to bring clarity to these conversations by showing how Slingshot addresses these with SME-curated prompt libraries, shared enterprise memory and context, and built-in guardrails—so that AI gains compound instead of fragment; and everyone in the enterprise moves faster and safely.","post_url":"https://www.linkedin.com/feed/update/urn:li:activity:7339284422602510336","post_urn":"urn:li:activity:7339284422602510336","posted_hours_ago":8760,"posted_time":"2025-06-25","posted_time_raw":"1yr","reaction_count":110,"reaction_types":"LIKE, PRAISE, EMPATHY","repost_count":2,"source":"activity","video_url":"https://media.licdn.com/dms/image/v2/D4E05AQGGcuRchZksNQ/feedshare-thumbnail_720_1280/B4EZdpeW7HHsAs-/0/1749821278139?e=1783008000&v=beta&t=JlgH6qd6iQsQaJ-iTaVz7bKLQ1gV9n4AplRz8Dssfes"},{"article_description":null,"article_title":null,"article_url":null,"author_headline":"Deploying enterprise agents in production / CTO / SWE Leader / GVP @ Publicis Sapient","author_name":"Ravi Evani\n              \n                \n                   \n    \n      \n    \n    \n      \n    \n\n • You","author_profile_image_url":"https://media.licdn.com/dms/image/v2/C4E03AQGNeJRorEd2Nw/profile-displayphoto-shrink_100_100/profile-displayphoto-shrink_100_100/0/1569287114631?e=1784160000&v=beta&t=tJDZC7EXWnlgIIf8kF7fBCajhF-HEgzNXnz_IIkjqW8","author_profile_url":"https://www.linkedin.com/in/ravievani","comment_count":2,"has_image":true,"impression_count":5170,"is_article":false,"is_my_post":true,"is_video":true,"post_image_url":"https://media.licdn.com/dms/image/v2/D4E05AQF4q88NbEy1YA/feedshare-thumbnail_720_1280/B4EZdiYZz8HsAs-/0/1749702258068?e=1783008000&v=beta&t=UfnZ6CtluAqnHiP8y5zY5X-UMOmsI_Ja2YRj72Ond80","post_text":"Up to 40% of software delays come from misalignment between business goals and delivery realities. AI can help you spot those gaps before they turn into rework.\n\nIt’s clear there’s no shortage of innovation at hashtag#vivatech. AI agents, robotics, ambient computing… the tech is here. But the real challenge for business leaders isn’t spotting cool demos—it’s making this stuff actually work inside their orgs.\n\nAccording to Google’s Gemini Deep research, nearly 40% of software development delays happen because the high-level goals defined by business and product teams don’t match what’s realistically achievable within delivery timelines.\n\nWhen it’s time to build, the friction shows up: missing capabilities, partner dependencies, compliance hurdles, unavailable data. And by that point, shifting direction is painful—delays, budget overruns, and compromised outcomes.\n\nThis is where AI can be practical, not theoretical. With the right agents, you can simulate what it takes to bring a product or strategy to life. The agent can take your value pool, analyze enterprise context, internal architecture, and external constraints—and forecast what’s actually feasible.\n\nThat early clarity allows teams to adjust before timelines and expectations are locked in. You avoid waste. You reduce downstream rework. You move smarter.\n\nUse it not just for automation, but for alignment. That’s where some of the real leverage could be.","post_url":"https://www.linkedin.com/feed/update/urn:li:activity:7338784422382493698","post_urn":"urn:li:activity:7338784422382493698","posted_hours_ago":8760,"posted_time":"2025-06-25","posted_time_raw":"1yr","reaction_count":70,"reaction_types":"LIKE, INTEREST, EMPATHY","repost_count":1,"source":"activity","video_url":"https://media.licdn.com/dms/image/v2/D4E05AQF4q88NbEy1YA/feedshare-thumbnail_720_1280/B4EZdiYZz8HsAs-/0/1749702258068?e=1783008000&v=beta&t=UfnZ6CtluAqnHiP8y5zY5X-UMOmsI_Ja2YRj72Ond80"},{"article_description":null,"article_title":null,"article_url":null,"author_headline":"Deploying enterprise agents in production / CTO / SWE Leader / GVP @ Publicis Sapient","author_name":"Ravi Evani\n              \n                \n                   \n    \n      \n    \n    \n      \n    \n\n • You","author_profile_image_url":"https://media.licdn.com/dms/image/v2/C4E03AQGNeJRorEd2Nw/profile-displayphoto-shrink_100_100/profile-displayphoto-shrink_100_100/0/1569287114631?e=1784160000&v=beta&t=tJDZC7EXWnlgIIf8kF7fBCajhF-HEgzNXnz_IIkjqW8","author_profile_url":"https://www.linkedin.com/in/ravievani","comment_count":1,"has_image":true,"impression_count":871,"is_article":false,"is_my_post":true,"is_video":false,"post_image_url":"https://media.licdn.com/dms/image/v2/D4E22AQHHBtrpZNgN6Q/feedshare-shrink_800/B4EZdT6mm4HQAk-/0/1749459561528?e=1784160000&v=beta&t=Fve3MgH8yZn1TBZBNdW1bSSOEKtgGKu0KxDHiMtVpdE","post_text":"The best managers I know recognize patterns. They spot trends in team dynamics, anticipate needs, and turn successful one-offs into repeatable systems. Here's how I use AI to help me with that through a simple loop: Spot patterns → Use patterns → Create patterns.\n\n1. Spot patterns quickly:\nI feed team data into my favorite AI—even basic stuff works. One-on-one notes in a Word doc, team feedback themes, or meeting transcripts. Instead of generic prompts, I use role-playing. For example, when I want to assess whether people are collaborating inclusively or developing a learning mindset, my prompt is: \"Act as an experienced people manager. Analyze these sprint retrospective transcripts and identify the top 3 barriers to inclusive collaboration and learning mindset.\"\n\nIt sometimes surfaces patterns I hadn't connected with, such as: \"[This] problem areas keep resurfacing\" or \"[These] people dominate team discussions.\"\n\nStart small: Even analyzing something like your last 5 meeting transcripts can reveal surprising patterns about core values like engagement and openness.\n\n2. Use patterns to drive action:\nWhen AI spots recurring patterns such as engagement gaps, I create bite-sized solutions: pair quieter team members with seasoned colleagues who have strong relationships across teams. When patterns show people avoiding difficult conversations, I address it directly with the Managers or bring it up in one-on-ones to understand what's holding people back.\n\nThe key: AI suggests the what, but I decide the how based on my team's personality and needs.\n\n3. Create patterns for scale:\nWhen something works repeatedly, like mentorship pairings that boost confidence in client interactions; I use AI to help document it. I ask: \"Turn this approach into a step-by-step guide for developing client partnership skills in junior managers\".\n\nNow every new team member can benefit from our collective learning about building confidence and collaboration skills, not just the lucky ones who got the full attention.\n\nThis Spot → Use → Create loop is more than a linear process. It produces consistent data that helps spot deeper patterns the next time around.\n\nReality check: This doesn't work for every team dynamic, and AI suggestions sometimes miss cultural context. Crucially, never use confidential team data in public AI models, use your company's enterprise tools. I use Sapient Slingshot.\n\nhashtag#LIPostingDayJune","post_url":"https://www.linkedin.com/feed/update/urn:li:activity:7337810777086590977","post_urn":"urn:li:activity:7337810777086590977","posted_hours_ago":8760,"posted_time":"2025-06-25","posted_time_raw":"1yr","reaction_count":21,"reaction_types":"LIKE, EMPATHY","source":"activity","video_url":null},{"article_description":null,"article_title":null,"article_url":null,"author_headline":"Deploying enterprise agents in production / CTO / SWE Leader / GVP @ Publicis Sapient","author_name":"Ravi Evani\n              \n                \n                   \n    \n      \n    \n    \n      \n    \n\n • You","author_profile_image_url":"https://media.licdn.com/dms/image/v2/C4E03AQGNeJRorEd2Nw/profile-displayphoto-shrink_100_100/profile-displayphoto-shrink_100_100/0/1569287114631?e=1784160000&v=beta&t=tJDZC7EXWnlgIIf8kF7fBCajhF-HEgzNXnz_IIkjqW8","author_profile_url":"https://www.linkedin.com/in/ravievani","comment_count":2,"has_image":true,"impression_count":2490,"is_article":false,"is_my_post":true,"is_video":true,"post_image_url":"https://media.licdn.com/dms/image/v2/D4E05AQHALTAx6gDW8g/feedshare-thumbnail_720_1280/B4EZc6C4IhHgAs-/0/1749025525087?e=1783008000&v=beta&t=4k-EyLLIsxdBcUCcMeN8AIiWNgv9SnQl9ERYiCpMAgk","post_text":"If you’re rolling out AI tools but not seeing meaningful impact across your teams, this might help you understand why. Hint: It's not the tools or skills, it's the environment.\n\nA lot of your people are likely experimenting with AI. Playing with prompts. Automating small things. But they’re not sharing what they’re doing.\n\nWhy?\n\nBecause even a small “win” can backfire. You show something that works, and suddenly people expect it to be repeatable, scalable, and production-ready. And if it’s not? Now you’re under a microscope.\n\nThat kind of pressure makes people go quiet. And that’s a huge missed opportunity. Because when those experiments stay private, people reinvent the wheel, teams miss patterns, and orgs lose valuable context on what’s actually working.\n\nHere’s what I've learned:\n🔹 Make space for the messy stuff. Share experiments in retros or 1:1s—don’t wait for dramatic results.\n🔹 Celebrate process stories, not just outcomes. “Here’s what I tried and where it broke” is incredibly useful.\n🔹 Track AI time like any other project work. If we treat it like an extracurricular, it’ll stay one.\n\nWhen AI adopters share in the open, everyone benefits. Their experiments turn into playbooks. Their failures save others time, and their wins raise the floor for everyone else.\n\n—\nP.S. Snapped this just before a relaxed dinner with a client at Casi Cielo in Atlanta. Sunshine didn’t hurt either.!","post_url":"https://www.linkedin.com/feed/update/urn:li:activity:7335998777519996929","post_urn":"urn:li:activity:7335998777519996929","posted_hours_ago":8760,"posted_time":"2025-06-25","posted_time_raw":"1yr","reaction_count":41,"reaction_types":"LIKE, EMPATHY, PRAISE","source":"activity","video_url":"https://media.licdn.com/dms/image/v2/D4E05AQHALTAx6gDW8g/feedshare-thumbnail_720_1280/B4EZc6C4IhHgAs-/0/1749025525087?e=1783008000&v=beta&t=4k-EyLLIsxdBcUCcMeN8AIiWNgv9SnQl9ERYiCpMAgk"},{"article_description":null,"article_title":null,"article_url":null,"author_headline":"Deploying enterprise agents in production / CTO / SWE Leader / GVP @ Publicis Sapient","author_name":"Ravi Evani\n              \n                \n                   \n    \n      \n    \n    \n      \n    \n\n • You","author_profile_image_url":"https://media.licdn.com/dms/image/v2/C4E03AQGNeJRorEd2Nw/profile-displayphoto-shrink_100_100/profile-displayphoto-shrink_100_100/0/1569287114631?e=1784160000&v=beta&t=tJDZC7EXWnlgIIf8kF7fBCajhF-HEgzNXnz_IIkjqW8","author_profile_url":"https://www.linkedin.com/in/ravievani","comment_count":2,"has_image":true,"impression_count":2395,"is_article":false,"is_my_post":true,"is_video":true,"post_image_url":"https://media.licdn.com/dms/image/v2/D4E05AQEKZ3hNOG1YOA/videocover-high/B4EZcxOm0OHYAA-/0/1748877615910?e=1783008000&v=beta&t=tkATlcEtj4508mxFDUe1Z_gSHS9VZVoFMODAZdeTsdI","post_text":"Yes, vibecoding an enterprise chatbot is *easy* now. But when your AI gives vague or wrong answers, you don’t have a code problem ⇒ you have a product and domain collaboration problem. Here is how to fix it.\n\nIn this example*, I click into a vacation property listing, open the chatbot, and ask:\n\n✅ “Are pets allowed?” — Good answer. It confirms yes and tags me as a pet-friendly traveler.\n❌ “Can I throw a party?” — No answer. The system says party / event rules aren’t specified.\n❌ “Is the beach nearby safe for surfing?” — Vague again. Worse, it incorrectly logs my preference as just “beach nearby.” That’s not what I asked.\n\nThis is the user “experience” gap.\n\nThe problem isn’t building the bot. It’s aligning the bot with real-world expectations.\n\nThe heavy lift here is that with AI, Product teams need to work side by side with people who know the domain — the ones who understand what good answers look like, what data needs to be pulled in, and what nuance matters.\n\n⇒ It’s not enough to classify a user statement. You have to validate the classification is correct—at scale!\n⇒ It’s not enough to answer a question. You have to know what’s missing in the underlying data—at scale!\n\nGetting this right means building with domain experts from the start—continuously validating, refining, and iterating alongside them, not just building for them.\n\n—-\n* built with Sapient Slingshot","post_url":"https://www.linkedin.com/feed/update/urn:li:activity:7335324402823172100","post_urn":"urn:li:activity:7335324402823172100","posted_hours_ago":8760,"posted_time":"2025-06-25","posted_time_raw":"1yr","reaction_count":25,"reaction_types":"LIKE, EMPATHY, INTEREST","repost_count":1,"source":"activity","video_url":"https://media.licdn.com/dms/image/v2/D4E05AQEKZ3hNOG1YOA/videocover-high/B4EZcxOm0OHYAA-/0/1748877615910?e=1783008000&v=beta&t=tkATlcEtj4508mxFDUe1Z_gSHS9VZVoFMODAZdeTsdI"},{"article_description":null,"article_title":null,"article_url":null,"author_headline":"Deploying enterprise agents in production / CTO / SWE Leader / GVP @ Publicis Sapient","author_name":"Ravi Evani\n              \n                \n                   \n    \n      \n    \n    \n      \n    \n\n • You","author_profile_image_url":"https://media.licdn.com/dms/image/v2/C4E03AQGNeJRorEd2Nw/profile-displayphoto-shrink_100_100/profile-displayphoto-shrink_100_100/0/1569287114631?e=1784160000&v=beta&t=tJDZC7EXWnlgIIf8kF7fBCajhF-HEgzNXnz_IIkjqW8","author_profile_url":"https://www.linkedin.com/in/ravievani","comment_count":6,"has_image":true,"impression_count":11463,"is_article":false,"is_my_post":true,"is_video":false,"post_image_url":"https://media.licdn.com/dms/image/v2/D4E22AQGZKPXansQtoQ/feedshare-shrink_800/B4EZbzJQfUHYAk-/0/1747836016717?e=1784160000&v=beta&t=cRnFA0erRiocIjd_fIlJUd3MqrxLxUYV4TENAOI56gs","post_text":"Great meetup with our engineering leads in Toronto, where we unpacked five core mental models for engineers to master when working with AI ⤵\n\n1) Words are your interface to intelligence.\nThe way you phrase a request directly shapes the outcome. Express with clarity, precision, intent, and context. Whether you’re prompting an AI or giving it feedback, your language becomes the control surface for what gets built.\n\n2) Confidence is not the same as correctness.\nLLMs can be confidently wrong, just like eloquent humans. Don’t prompt and hope—critically co-create. Question assumptions, look for what’s missing, and stay engaged in the reasoning. Good outputs come from sharp interrogation and thoughtful back-and-forth.\n\n3) Better context beats bigger models.\nToo much context leads to confusion. Too little leads to hallucination. Be intentional about what you include. The quality of an AI’s output depends on the context density of your input—feed it the most relevant information, using the fewest possible tokens.\n\n4) Decomposition before delegation isn’t optional.\nThe granularity of human tasks doesn’t translate directly to AI. What feels intuitive to us may be vague or overloaded for the model. Modular design is your friend, so plan for what, how much, and in what order you delegate—as if assigning tasks to a junior teammate.\n\n5) Go beyond the dominant signal.\nLLMs follow the average pattern, the most likely continuation. But what’s common isn’t always what matters. Master the margins. Surface exceptions, spot what’s missing or misunderstood, and look for the outliers. That’s where real insight—and your impact—comes from.\n\nThanks to our Publicis Sapient Toronto engineering leaders who spent two days in SEAL (Strategic Engineering Academy for Leaders) training w/ Sapient Slingshot to level up their AI skills and drive impact for our clients and teams. And shoutout to Thanu, Amit, Laura, Joy, and Mohammed for designing and delivering a strong program through thoughtful coaching, organization, and curriculum.\n\nDustin, Pankaj, Debprotim, Amit, Arnab, Mrudul, Mohan, Jithin, Ramya, David, Rajesh, Milind, Gaytri, Jayakar, Maurizio, Sreeman, Vishal, Trivendra, Rajesh, Rohit, Pankaj, Huzefa, Jayesh, Jithin, irshad, Mridul","post_url":"https://www.linkedin.com/feed/update/urn:li:activity:7330955602753384453","post_urn":"urn:li:activity:7330955602753384453","posted_hours_ago":8760,"posted_time":"2025-06-25","posted_time_raw":"1yr","reaction_count":177,"reaction_types":"LIKE, EMPATHY, PRAISE","repost_count":2,"source":"activity","video_url":null},{"article_description":null,"article_title":null,"article_url":null,"author_headline":"Deploying enterprise agents in production / CTO / SWE Leader / GVP @ Publicis Sapient","author_name":"Ravi Evani\n              \n                \n                   \n    \n      \n    \n    \n      \n    \n\n • You","author_profile_image_url":"https://media.licdn.com/dms/image/v2/C4E03AQGNeJRorEd2Nw/profile-displayphoto-shrink_100_100/profile-displayphoto-shrink_100_100/0/1569287114631?e=1784160000&v=beta&t=tJDZC7EXWnlgIIf8kF7fBCajhF-HEgzNXnz_IIkjqW8","author_profile_url":"https://www.linkedin.com/in/ravievani","comment_count":4,"has_image":true,"impression_count":3084,"is_article":false,"is_my_post":true,"is_video":true,"post_image_url":"https://media.licdn.com/dms/image/v2/D4E05AQF-pXSpemyPfQ/videocover-high/B4EZboa78.GcBw-/0/1747656127434?e=1783008000&v=beta&t=0hP8j_tvWe9lRA-mgVXi1DBkFm35vkyAay8QLM5-LMk","post_text":"If you want to become a world-class AI engineer, there are some painful lessons you don’t need to learn the hard way➜I already did.\n\nHere are 7 mistakes I’ve made that I’d avoid at all costs if I were starting again:\n\n1. Waiting to “feel ready”\nAI moves fast. If you’re waiting to be an expert before you contribute, you’ll always be behind. Start before you’re comfortable. Experiment, ship, and learn in public. The best way to level up is by doing.\n\n2. Thinking your value is in code alone\nBeing great at Python or prompt engineering is not enough. The real value lies in connecting AI to business impact➜whether that’s accelerating a workflow, improving UX, or cutting costs. Learn to translate tech into outcomes.\n\n3. Ignoring the system around the model\nA good model in a broken pipeline is still a broken system. AI engineering isn’t just about the model➜it’s also about data quality, APIs, human feedback loops, testing, and deployment. Own the whole lifecycle.\n\n4. Not learning how to collaborate with AI\nTreating AI like a magic box limits its potential. The best engineers treat it like a teammate➜one that needs direction, context, and review. Know what it’s good at, what it’s bad at, and how to manage it like a junior dev.\n\n5. Avoiding ambiguity\nAI often lives in the gray areas: noisy data, unclear specs, messy orgs. If you’re only comfortable with perfect instructions and clean problems, you’ll struggle. The best AI engineers lean into uncertainty and reduce it systematically.\n\n6. Over-engineering for edge cases\nTrying to make AI perfect on Day 1 is a trap. Focus on dominant use cases, ship quickly, then tighten the loop with feedback. Let the real-world data shape your iterations.\n\n7. Not tying your work to results\nIt’s easy to get caught up in models, benchmarks, and novelty. But none of that matters if it doesn’t move a KPI. Be ruthless about measuring the impact of your work. Code is only valuable if it drives value.\n\nThese are the lessons I live by now➜and I keep learning.\nIf you’re serious about mastering AI engineering, don’t just build models. Build systems. Build impact.","post_url":"https://www.linkedin.com/feed/update/urn:li:activity:7330201134457880577","post_urn":"urn:li:activity:7330201134457880577","posted_hours_ago":8760,"posted_time":"2025-06-25","posted_time_raw":"1yr","reaction_count":37,"reaction_types":"LIKE, EMPATHY, INTEREST","source":"activity","video_url":"https://media.licdn.com/dms/image/v2/D4E05AQF-pXSpemyPfQ/videocover-high/B4EZboa78.GcBw-/0/1747656127434?e=1783008000&v=beta&t=0hP8j_tvWe9lRA-mgVXi1DBkFm35vkyAay8QLM5-LMk"},{"article_description":null,"article_title":null,"article_url":null,"author_headline":"Deploying enterprise agents in production / CTO / SWE Leader / GVP @ Publicis Sapient","author_name":"Ravi Evani\n              \n                \n                   \n    \n      \n    \n    \n      \n    \n\n • You","author_profile_image_url":"https://media.licdn.com/dms/image/v2/C4E03AQGNeJRorEd2Nw/profile-displayphoto-shrink_100_100/profile-displayphoto-shrink_100_100/0/1569287114631?e=1784160000&v=beta&t=tJDZC7EXWnlgIIf8kF7fBCajhF-HEgzNXnz_IIkjqW8","author_profile_url":"https://www.linkedin.com/in/ravievani","has_image":true,"impression_count":833,"is_article":false,"is_my_post":true,"is_video":false,"post_image_url":"https://media.licdn.com/dms/image/v2/D4E22AQFfAHVtdC5RHA/feedshare-shrink_800/B4EZbhAbfnHIAk-/0/1747531709413?e=1784160000&v=beta&t=pYMjoffiLiMraoSwspSWUnRKImEHG9qearlEpfq_vNs","post_text":"Dissecting the \"AI\" in the currently trending ai-hedge-fund Github project 📈:\n\nI recently dove into this educational GitHub project https://lnkd.in/eH54Wv_x (kudos to Virattt and contributors!) to find out how AI is being used.\n\nSo, where’s the Logic? Deterministic vs. AI\n\n⚙️ The Deterministic Engine:\n➜Data Collection & Prep: Fetching financial data, market stats – all standard code.\n➜Heuristic Scoring: Initial calculations within analyst agents (e.g., \"Is revenue growth > X%?\") are rule-based.\n➜Workflow Orchestration: The sequence of agent operations is programmatically defined (using LangGraph in this case).\n➜Risk Management (Primarily): Applying rules for position sizing, exposure limits based on inputs.\n\n🤖 The AI (LLMs) at Work:\n➜Analyst Personas (e.g., \"Bill Ackman Agent\"): After deterministic code crunches numbers (financial metrics, heuristic scores), an LLM steps in. Prompted with a specific investor persona and the pre-calculated data, it crafts an investment thesis, generates a signal (bullish/bearish), confidence score, and reasoning – aiming to mimic that investor's style.\n\n➜Portfolio Manager Agent: Given signals from all analyst agents, risk parameters, portfolio state, and trading rules via a detailed prompt, an LLM makes the final call: what to buy/sell/hold for each stock, in what quantity, and why. This synthesizes diverse inputs into actionable decisions.\n\n⚠️ The \"Gotchas\" of Assessing the AI's True Value\nThis architecture allows for sophisticated AI contributions, but how good are they really?\n➜Backtesting is Key: The project includes a backtester. Real-world simulated performance (P&L, Sharpe ratio) is the ultimate first-pass test.\n➜Reasoning Quality: The --show-reasoning flag is crucial. Is the AI's explanation logical, coherent with its persona, and insightful, or just rephrasing inputs? This needs human review.\n➜Prompt Sensitivity & Robustness: Small prompt changes or different LLM models can lead to varied outcomes. The quality of the prompts themselves is paramount.\n\nKey Takeaway for Humans Relying on AI Agents Like This:\n➜The Prompts: Understand exactly what the AI is being asked, what data it's given, what constraints or personas it's meant to adopt, and how its output is structured.\n➜Deterministic Pre-processing: What data is the AI actually seeing? How is it filtered, scored, or structured before the LLM gets it?\n➜Evaluation & Fallback Mechanisms: How is the AI's output being validated? What happens if it fails or gives nonsensical answers?\nBacktesting & Performance Metrics: How is success defined and measured?\n\nThis ai-hedge-fund project is a great educational tool for seeing this hybrid approach in action. It highlights both the potential of AI in complex domains and the continued need for human oversight and critical evaluation.","post_url":"https://www.linkedin.com/feed/update/urn:li:activity:7329679241397088256","post_urn":"urn:li:activity:7329679241397088256","posted_hours_ago":8760,"posted_time":"2025-06-25","posted_time_raw":"1yr","reaction_count":16,"reaction_types":"LIKE, EMPATHY","source":"activity","video_url":null},{"article_description":null,"article_title":null,"article_url":null,"author_headline":"Deploying enterprise agents in production / CTO / SWE Leader / GVP @ Publicis Sapient","author_name":"Ravi Evani\n              \n                \n                   \n    \n      \n    \n    \n      \n    \n\n • You","author_profile_image_url":"https://media.licdn.com/dms/image/v2/C4E03AQGNeJRorEd2Nw/profile-displayphoto-shrink_100_100/profile-displayphoto-shrink_100_100/0/1569287114631?e=1784160000&v=beta&t=tJDZC7EXWnlgIIf8kF7fBCajhF-HEgzNXnz_IIkjqW8","author_profile_url":"https://www.linkedin.com/in/ravievani","comment_count":2,"has_image":true,"impression_count":4216,"is_article":false,"is_my_post":true,"is_video":true,"post_image_url":"https://media.licdn.com/dms/image/v2/D4E05AQFZnmRl8OrFEg/videocover-low/B4EZbRBqXMHABs-/0/1747263686997?e=1783008000&v=beta&t=3XdCkzqNKzvqCywNF2O1YaqXqofsEds14SE6ttSjHyw","post_text":"Real-time object detection on the edge!\n\nJason Steiner and I @ Philadephia's Walnut Street Cafe https://lnkd.in/eGwmfitz testing out the Multimodal llama.cpp on Apple silicon, thanks to https://lnkd.in/eWWJ-4ET personalized using Publicis Sapient hashtag#Slingshot w/the LLM running locally on my macbook pro.\n\nSee the response text on the right panel displaying object detection in real-time.","post_url":"https://www.linkedin.com/feed/update/urn:li:activity:7328555093337731074","post_urn":"urn:li:activity:7328555093337731074","posted_hours_ago":8760,"posted_time":"2025-06-25","posted_time_raw":"1yr","reaction_count":66,"reaction_types":"LIKE, EMPATHY, PRAISE","source":"activity","video_url":"https://media.licdn.com/dms/image/v2/D4E05AQFZnmRl8OrFEg/videocover-low/B4EZbRBqXMHABs-/0/1747263686997?e=1783008000&v=beta&t=3XdCkzqNKzvqCywNF2O1YaqXqofsEds14SE6ttSjHyw"},{"article_description":null,"article_title":null,"article_url":null,"author_headline":"Deploying enterprise agents in production / CTO / SWE Leader / GVP @ Publicis Sapient","author_name":"Ravi Evani\n              \n                \n                   \n    \n      \n    \n    \n      \n    \n\n • You","author_profile_image_url":"https://media.licdn.com/dms/image/v2/C4E03AQGNeJRorEd2Nw/profile-displayphoto-shrink_100_100/profile-displayphoto-shrink_100_100/0/1569287114631?e=1784160000&v=beta&t=tJDZC7EXWnlgIIf8kF7fBCajhF-HEgzNXnz_IIkjqW8","author_profile_url":"https://www.linkedin.com/in/ravievani","comment_count":2,"has_image":true,"impression_count":624,"is_article":false,"is_my_post":true,"is_video":false,"post_image_url":"https://media.licdn.com/dms/image/v2/D4E22AQGilUcQ0YOddw/feedshare-shrink_800/B4EZbNlh8kHcAk-/0/1747205891916?e=1784160000&v=beta&t=jMFRYVTWT1gDAVZPSAFbhEP_UnTyF_4hF9sz9zXjm30","post_text":"If Transformers are built to focus on what matters most (“attention is all you need”), then our job is to get better at what they ignore.\n\nLLMs are optimized for the average pattern, the dominant signal, the most likely continuation.\n\nBut the edges are where perception, judgment, and experience lead.\n\nWe are the ones who bring context, intuition, and the ability to reason through unfamiliar situations.\n\nWe can connect dots across domains, infer intent, and spot when something “feels off” even if we’ve never seen it before.\n\nSo our real leverage is not in racing AI to the center, but in steering it with our mastery of the margins:\n➜ What’s missing?\n➜ What’s misclassified?\n➜ What’s misunderstood?\n\nThat’s where we focus, and hone in our value.","post_url":"https://www.linkedin.com/feed/update/urn:li:activity:7328312666538610689","post_urn":"urn:li:activity:7328312666538610689","posted_hours_ago":8760,"posted_time":"2025-06-25","posted_time_raw":"1yr","reaction_count":9,"reaction_types":"LIKE","source":"activity","video_url":null},{"article_description":null,"article_title":null,"article_url":null,"author_headline":"Deploying enterprise agents in production / CTO / SWE Leader / GVP @ Publicis Sapient","author_name":"Ravi Evani\n              \n                \n                   \n    \n      \n    \n    \n      \n    \n\n • You","author_profile_image_url":"https://media.licdn.com/dms/image/v2/C4E03AQGNeJRorEd2Nw/profile-displayphoto-shrink_100_100/profile-displayphoto-shrink_100_100/0/1569287114631?e=1784160000&v=beta&t=tJDZC7EXWnlgIIf8kF7fBCajhF-HEgzNXnz_IIkjqW8","author_profile_url":"https://www.linkedin.com/in/ravievani","has_image":true,"impression_count":601,"is_article":false,"is_my_post":true,"is_video":true,"post_image_url":"https://media.licdn.com/dms/image/v2/D4E05AQFgvL-fPMrNuQ/videocover-low/B4EZbF0j87HwBw-/0/1747075618962?e=1783008000&v=beta&t=O8suM3EMytiHIu7yNSX_5QY2aOV0Io_opbjeF-MSdtg","post_text":"Demystifying the logic that powers vibecoding in your favorite AI copilot:\n\nThe functionality that enables vibecoding is the “agent mode” built into IDEs like Cursor, Windsurf, Zed, Cline, and others.\n\nThe interesting thing is most of the logic in the agent mode (except the LLM) is deterministic.\n\nHere’s the general idea of what happens under the hood, when you send a message like: “Refactor this function.” into your IDE agent prompt input box. This is based on Zed IDE source code https://lnkd.in/eJXe58UE","post_url":"https://www.linkedin.com/feed/update/urn:li:activity:7327766301366448128","post_urn":"urn:li:activity:7327766301366448128","posted_hours_ago":8760,"posted_time":"2025-06-25","posted_time_raw":"1yr","reaction_count":6,"reaction_types":"LIKE","source":"activity","video_url":"https://media.licdn.com/dms/image/v2/D4E05AQFgvL-fPMrNuQ/videocover-low/B4EZbF0j87HwBw-/0/1747075618962?e=1783008000&v=beta&t=O8suM3EMytiHIu7yNSX_5QY2aOV0Io_opbjeF-MSdtg"},{"article_description":null,"article_title":null,"article_url":null,"author_headline":"Deploying enterprise agents in production / CTO / SWE Leader / GVP @ Publicis Sapient","author_name":"Ravi Evani\n              \n                \n                   \n    \n      \n    \n    \n      \n    \n\n • You","author_profile_image_url":"https://media.licdn.com/dms/image/v2/C4E03AQGNeJRorEd2Nw/profile-displayphoto-shrink_100_100/profile-displayphoto-shrink_100_100/0/1569287114631?e=1784160000&v=beta&t=tJDZC7EXWnlgIIf8kF7fBCajhF-HEgzNXnz_IIkjqW8","author_profile_url":"https://www.linkedin.com/in/ravievani","comment_count":3,"has_image":true,"impression_count":1113,"is_article":false,"is_my_post":true,"is_video":true,"post_image_url":"https://media.licdn.com/dms/image/v2/D4E05AQGRFDAXbDg2Mw/videocover-low/B4EZa.fX2uHwBw-/0/1746952631294?e=1783008000&v=beta&t=VrDBU4qienr8KSkR57SvfHT0OYhaYu7jMwDX5lWhd1A","post_text":"Demystifying the logic that powers vibecoding in your favorite AI copilot:\n\nThe functionality that enables vibecoding is the “agent mode” built into IDEs like Cursor, Windsurf, Zed, Cline, and others.\n\nThe interesting thing is most of the logic in the agent mode (except the LLM) is deterministic.\n\nHere’s the general idea of what happens under the hood, when you send a message like: “Refactor this function.” into your IDE agent prompt input box. This is based on Zed IDE source code https://lnkd.in/eJXe58UE\n\n→ First the IDE system spins up an active thread that creates a message object for the prompt. It calls the context system to fetch anything relevant—files, symbols, previous chats, rules, etc. relevant to the user intent.\n\n→ Next, as part of the context gathering, a Context Picker selects what to include – this can be user driven or auto-selected. A Context Store loads data from available sources and the result is a rich, structured context data sent along with your prompt\n\n→ Then comes the LLM request, where a model selector picks the right LLM for the job. The IDE sends both prompt + context to the LLM for processing.\nAt this point the LLM could determine if a tool call is needed, such as reading a file, accessing the terminal, editing the file and so on.\n\n→ The IDE then invokes the right tool (e.g., EditFileTool). The tool executes and returns results, which are routed back to the LLM to continue reasoning. And this cycle may repeat until the task is complete, in which case the LLM might return a response such as the source code and a text explanation.\n\n→ This response is shown in the IDE. If diffs are involved (like code edits), tools like Code Diff or Terminal Codegen render and apply them.\n\n→ The user reviews the output and decides to continue the thread, edit the prompt, or start fresh.\n\n☆ So that’s it: It’s not just an “AI chatbot”, but rather, a fully orchestrated system with tons of deterministic code that manages context, models, tools, and interaction flow.","post_url":"https://www.linkedin.com/feed/update/urn:li:activity:7327676818818232320","post_urn":"urn:li:activity:7327676818818232320","posted_hours_ago":8760,"posted_time":"2025-06-25","posted_time_raw":"1yr","reaction_count":14,"reaction_types":"LIKE, INTEREST","source":"activity","video_url":"https://media.licdn.com/dms/image/v2/D4E05AQGRFDAXbDg2Mw/videocover-low/B4EZa.fX2uHwBw-/0/1746952631294?e=1783008000&v=beta&t=VrDBU4qienr8KSkR57SvfHT0OYhaYu7jMwDX5lWhd1A"},{"article_description":null,"article_title":null,"article_url":null,"author_headline":"Deploying enterprise agents in production / CTO / SWE Leader / GVP @ Publicis Sapient","author_name":"Ravi Evani\n              \n                \n                   \n    \n      \n    \n    \n      \n    \n\n • You","author_profile_image_url":"https://media.licdn.com/dms/image/v2/C4E03AQGNeJRorEd2Nw/profile-displayphoto-shrink_100_100/profile-displayphoto-shrink_100_100/0/1569287114631?e=1784160000&v=beta&t=tJDZC7EXWnlgIIf8kF7fBCajhF-HEgzNXnz_IIkjqW8","author_profile_url":"https://www.linkedin.com/in/ravievani","has_image":true,"impression_count":851,"is_article":false,"is_my_post":true,"is_video":false,"post_image_url":"https://media.licdn.com/dms/image/v2/D4E22AQFjlPWLXH4ibQ/feedshare-shrink_800/B4EZa55RgYHwAg-/0/1746875522596?e=1784160000&v=beta&t=JtdgEd5JaF8km5nwEA-P6msJutHdCqELKJ0E0-axpJI","post_text":"Figuring out \"who said what\" just got better with NVIDIA NeMo’s recent updates. Adobe Premiere Pro, I love your tools, but your transcription feature needs this, yesterday.\n\nMulti-speaker content is everywhere. Figuring out who said what shouldn’t be messy in a transcript!\n\nHere’s how NeMo handles it: https://lnkd.in/e7cMYCWG\n\n☆ Step 1: Voice Activity Detection (VAD)\n→ Finds only the parts of audio that contain actual speech—skipping silence and noise.\n\n☆ Step 2: Speaker Embedding + Clustering\n→ Breaks speech into segments, generates voice fingerprints, and clusters them into speakers.\n→This is the heart of the \"diarization\"—grouping voices by identity without needing names.\n\n☆ Step 3: Refinement\n→ Applies smoothing (e.g., MSDD) to polish boundaries and speaker shifts.\n→ Output: “who spoke when” in RTTM or similar formats.\n\n☆ Step 4: ASR Integration\n→ Run speech-to-text on each speaker segment.\n→ Final output: timestamped, speaker-tagged transcription.\n\nThis feels production-grade. Time for popular content & collaboration tools to level up!","post_url":"https://www.linkedin.com/feed/update/urn:li:activity:7326926997899603968","post_urn":"urn:li:activity:7326926997899603968","posted_hours_ago":8760,"posted_time":"2025-06-25","posted_time_raw":"1yr","reaction_count":8,"reaction_types":"LIKE, INTEREST, PRAISE","source":"activity","video_url":null},{"article_description":null,"article_title":null,"article_url":null,"author_headline":"Deploying enterprise agents in production / CTO / SWE Leader / GVP @ Publicis Sapient","author_name":"Ravi Evani\n              \n                \n                   \n    \n      \n    \n    \n      \n    \n\n • You","author_profile_image_url":"https://media.licdn.com/dms/image/v2/C4E03AQGNeJRorEd2Nw/profile-displayphoto-shrink_100_100/profile-displayphoto-shrink_100_100/0/1569287114631?e=1784160000&v=beta&t=tJDZC7EXWnlgIIf8kF7fBCajhF-HEgzNXnz_IIkjqW8","author_profile_url":"https://www.linkedin.com/in/ravievani","comment_count":3,"has_image":true,"impression_count":1204,"is_article":false,"is_my_post":true,"is_video":false,"post_image_url":"https://media.licdn.com/dms/image/v2/D4E22AQH3JdRi_KOz_A/feedshare-shrink_800/B4EZa1ISZwHoAs-/0/1746795571956?e=1784160000&v=beta&t=y5eKl4tUHN0WLNXFWKVzZQE3xfgIrJ7-LWWZQf0yP24","post_text":"Here’s how to implement a two-tier RAG setup for integrating with your personal knowledge base. Inspired by Surf Sense, https://lnkd.in/etAbJzCP, the currently trending OSS alternative to NotebookLM.\n\n☆ Overview\nYou’re building a RAG system that:\n↳Leverages hierarchical retrieval (summaries first, then details)\n↳Uses hybrid search (semantic + keyword) with Reciprocal Rank Fusion (RRF)\nIs exposed as a RAG-as-a-Service API\n\n☆ System Flow\n↳User submits query → hits the RAGaaS API\n↳Tier 1: Hybrid Search + RRF on summaries → identify relevant documents\n↳Tier 2: Hybrid Search + RRF on chunks from top documents → fetch detailed context\n↳Augmentation: Combine original query + retrieved chunks → feed to LLM\nLLM generates → final response is returned to the user\n\n☆ Tier 1: Summary-Level Retrieval\nGoal: Narrow down the search space by retrieving high-level document summaries or section overviews.\n\nIndexing: Create a Tier 1 vector index of document-level or section-level summaries.\nSearch: Use both:\n↳Semantic Search (e.g., OpenAI embeddings + FAISS)\n↳Full-Text Search (e.g., Elasticsearch or BM25)\n\nFusion: Combine ranked lists using Reciprocal Rank Fusion (RRF) to balance precision and recall.\nOutput: Top N summaries or document IDs passed to Tier 2.\n\n☆ Tier 2: Detailed Chunk Retrieval\nGoal: Retrieve fine-grained, contextually rich chunks from within the top summaries identified in Tier 1.\n\nIndexing: Break full documents into small semantic chunks (e.g., 100–300 tokens), each tagged with its parent document ID.\nSearch: Again use hybrid search (semantic + BM25).\nFusion: Apply RRF again on the chunk-level results.\nOutput: Return the most relevant chunks for grounding the LLM.\n\n☆ RAG-as-a-Service (API Layer)\nThis backend handles:\n↳Receiving the user’s query\n↳Orchestrating Tier 1 and Tier 2 retrievals\n↳Passing the query + retrieved context into an LLM (e.g., OpenAI, Azure OpenAI, Ollama)\n↳Returning the generated answer\n\n☆Tech Stack (Example)\nSemantic Search➜OpenAI Embeddings + FAISS\nFull-Text Search➜Elasticsearch or Weaviate\nRRF➜Custom Python (or built into some retrieval libraries)\nLLM➜OpenAI, Ollama, or Azure OpenAI\nAPI Layer➜FastAPI or Express.js\nStorage➜Postgres / S3 for source docs + metadata","post_url":"https://www.linkedin.com/feed/update/urn:li:activity:7326591660274892804","post_urn":"urn:li:activity:7326591660274892804","posted_hours_ago":8760,"posted_time":"2025-06-25","posted_time_raw":"1yr","reaction_count":17,"reaction_types":"LIKE, INTEREST","source":"activity","video_url":null},{"article_description":null,"article_title":null,"article_url":null,"author_headline":"Deploying enterprise agents in production / CTO / SWE Leader / GVP @ Publicis Sapient","author_name":"Ravi Evani\n              \n                \n                   \n    \n      \n    \n    \n      \n    \n\n • You","author_profile_image_url":"https://media.licdn.com/dms/image/v2/C4E03AQGNeJRorEd2Nw/profile-displayphoto-shrink_100_100/profile-displayphoto-shrink_100_100/0/1569287114631?e=1784160000&v=beta&t=tJDZC7EXWnlgIIf8kF7fBCajhF-HEgzNXnz_IIkjqW8","author_profile_url":"https://www.linkedin.com/in/ravievani","comment_count":1,"has_image":true,"impression_count":2115,"is_article":false,"is_my_post":true,"is_video":false,"post_image_url":"https://media.licdn.com/dms/image/v2/D4E22AQHL1-2iJ8OfVQ/feedshare-shrink_800/B4EZavvpG2GQAg-/0/1746705224903?e=1784160000&v=beta&t=OA6FYv01c2M0S5MR9l3qrklVR0IKeDUzE8NAzZqU7V0","post_text":"hashtag#AWS Agent Squad https://lnkd.in/e-xpXtDX is trending at #2 on GitHub today. Here’s what happens under the hood when it orchestrates a travel use case like: “Book my flight to Paris”:\n\n↳The user enters their request via a client app (web chat, mobile, etc.).\n↳The request goes to the Agent Squad Orchestrator, which manages conversation flow.\n↳It sends the query + conversation history to a Classifier (e.g., BedrockClassifier).\n↳The classifier identifies the intent as a travel request and routes it to \"TravelAgentLex\".\n↳TravelAgentLex passes the request to Amazon Lex, which handles slot filling—asks for travel dates, destination, number of travelers, etc.\n↳Once all info is collected, Lex calls a fulfillment function (e.g., Lambda or external booking API).\n↳Booking confirmation is passed back through the chain and finally shown to the user as: “Your flight to Paris is booked!”\n\nEach step is modular, API-driven, and cleanly orchestrated by the Agent Squad orchestration pattern.","post_url":"https://www.linkedin.com/feed/update/urn:li:activity:7326212718527397890","post_urn":"urn:li:activity:7326212718527397890","posted_hours_ago":8760,"posted_time":"2025-06-25","posted_time_raw":"1yr","reaction_count":25,"reaction_types":"LIKE","source":"activity","video_url":null},{"article_description":null,"article_title":null,"article_url":null,"author_headline":"Deploying enterprise agents in production / CTO / SWE Leader / GVP @ Publicis Sapient","author_name":"Ravi Evani\n              \n                \n                   \n    \n      \n    \n    \n      \n    \n\n • You","author_profile_image_url":"https://media.licdn.com/dms/image/v2/C4E03AQGNeJRorEd2Nw/profile-displayphoto-shrink_100_100/profile-displayphoto-shrink_100_100/0/1569287114631?e=1784160000&v=beta&t=tJDZC7EXWnlgIIf8kF7fBCajhF-HEgzNXnz_IIkjqW8","author_profile_url":"https://www.linkedin.com/in/ravievani","comment_count":4,"has_image":true,"impression_count":18443,"is_article":false,"is_my_post":true,"is_video":true,"post_image_url":"https://media.licdn.com/dms/image/v2/D4E05AQEOGpJDV_5jBw/videocover-high/B4EZarWUtHHoBc-/0/1746631527725?e=1783008000&v=beta&t=WSPftyFmpNkG0HFFVqdMPwB38EvNVtDbDXpN_lYDAj4","post_text":"Sharing a couple of tips on how to become your AI copilot's manager. Happy coding!","post_url":"https://www.linkedin.com/feed/update/urn:li:activity:7325903699795468288","post_urn":"urn:li:activity:7325903699795468288","posted_hours_ago":8760,"posted_time":"2025-06-25","posted_time_raw":"1yr","reaction_count":121,"reaction_types":"LIKE, EMPATHY, INTEREST","repost_count":1,"source":"activity","video_url":"https://media.licdn.com/dms/image/v2/D4E05AQEOGpJDV_5jBw/videocover-high/B4EZarWUtHHoBc-/0/1746631527725?e=1783008000&v=beta&t=WSPftyFmpNkG0HFFVqdMPwB38EvNVtDbDXpN_lYDAj4"},{"article_description":null,"article_title":null,"article_url":null,"author_headline":"Deploying enterprise agents in production / CTO / SWE Leader / GVP @ Publicis Sapient","author_name":"Ravi Evani\n              \n                \n                   \n    \n      \n    \n    \n      \n    \n\n • You","author_profile_image_url":"https://media.licdn.com/dms/image/v2/C4E03AQGNeJRorEd2Nw/profile-displayphoto-shrink_100_100/profile-displayphoto-shrink_100_100/0/1569287114631?e=1784160000&v=beta&t=tJDZC7EXWnlgIIf8kF7fBCajhF-HEgzNXnz_IIkjqW8","author_profile_url":"https://www.linkedin.com/in/ravievani","comment_count":1,"has_image":false,"impression_count":1674,"is_article":false,"is_my_post":true,"is_video":false,"post_image_url":null,"post_text":"Google Cloud AI powered kubernetes assistant: kubectl-ai https://lnkd.in/ez9xQNTM is trending #1 on GitHub today. How does this ai work?\n\n🔹 You ask:\n“Show me all pods in the default namespace”\n\nHere’s what happens behind the scenes:\n↳The kubectl-ai CLI sends your query to an AI Agent.\n↳The AI Agent uses a large language model (like Gemini) to translate your natural language into a real kubectl command.\n↳It figures out: kubectl get pods -n default\n↳This command is passed to the kubectl tool executor, which runs it against the Kubernetes API server.\n↳The server returns the live pod data.\n↳The AI agent can (optionally) run another LLM pass to explain the output.\n↳You see both the raw result and an explanation—right in your terminal.\n\n🔹 You ask:\n“Create a new deployment for nginx image with 3 replicas”\n\nHere’s how kubectl-ai handles it behind the scenes:\n↳Your input goes through the kubectl-ai CLI and reaches the AI Agent.\n↳The agent builds a prompt using your request and the schema of the kubectl tool.\n↳A large language model (like Gemini) interprets your intent and determines the appropriate command:\n↳kubectl create deployment nginx --image=nginx --replicas=3\n↳The command is parsed, arguments are extracted, and the tool executor runs it against the Kubernetes API.\n↳The API server validates the configuration and applies it.\n↳Once complete, the server returns a status—success or error.\n↳The AI agent formats the output and returns a clear, human-readable summary to your terminal.\n\nNo memorizing commands. Just tell it what you want.","post_url":"https://www.linkedin.com/feed/update/urn:li:activity:7325795048627789824","post_urn":"urn:li:activity:7325795048627789824","posted_hours_ago":8760,"posted_time":"2025-06-25","posted_time_raw":"1yr","reaction_count":13,"reaction_types":"LIKE","source":"activity","video_url":null},{"article_description":null,"article_title":null,"article_url":null,"author_headline":"Deploying enterprise agents in production / CTO / SWE Leader / GVP @ Publicis Sapient","author_name":"Ravi Evani\n              \n                \n                   \n    \n      \n    \n    \n      \n    \n\n • You","author_profile_image_url":"https://media.licdn.com/dms/image/v2/C4E03AQGNeJRorEd2Nw/profile-displayphoto-shrink_100_100/profile-displayphoto-shrink_100_100/0/1569287114631?e=1784160000&v=beta&t=tJDZC7EXWnlgIIf8kF7fBCajhF-HEgzNXnz_IIkjqW8","author_profile_url":"https://www.linkedin.com/in/ravievani","comment_count":2,"has_image":false,"impression_count":2039,"is_article":false,"is_my_post":true,"is_video":false,"post_image_url":null,"post_text":"The moment it clicked was the day I stopped treating AI like a mystery—and started acting like its engineering manager.\n\nThat shift didn’t happen by accident. It came from following a real engineering framework for how to work with AI.\n\nHere’s what that looks like in practice:\n\n⇥ Start with mindset\n\nIt’s a team: you + AI.\nTreat it like a junior dev.\nKnow what AI is good at (and what it’s not).\nYou’re still the architect. Delegate with intent.\n\n⇥ Work in a real SDLC\n\nPlan incrementally. Define one concrete task at a time.\nProvide context before asking for output.\nCo-create, critique, and refine. Don’t just prompt and hope.\n\n⇥ Learn alongside the build\n\nResearch like you would normally.\nLet AI clarify and explain, but don’t outsource your thinking.\n\n⇥ Code like a team\n\nBreak work into stories.\nStart with test cases.\nGive clear instructions and examples.\nReview its code. Fill the gaps. Iterate.\n\n⇥Test. Validate. Review.\n\nTests aren’t a checkbox—they’re checkpoints.\nDebug together.\nDon’t ship until it’s solid.\n\n⇥ Don’t skip quality\n\nUse documented coding rules.\nStick to design patterns.\nLeave the codebase better than you found it.\n\n🧠 And above all—learn to communicate well with AI\n\nGive clean, relevant context.\nTrim the fat. Use new chats.\nAsk it to ask you better questions.\nUse real code examples.\nRefine prompts like you’d refactor code.\n\nThis is what it means to engineer with AI.\nNot one-off prompting. Not wizardry.\nNot magic. Not mystery.\nJust a repeatable, high-leverage way to build—with a new kind of teammate.","post_url":"https://www.linkedin.com/feed/update/urn:li:activity:7324607244648554496","post_urn":"urn:li:activity:7324607244648554496","posted_hours_ago":8760,"posted_time":"2025-06-25","posted_time_raw":"1yr","reaction_count":14,"reaction_types":"LIKE, INTEREST","source":"activity","video_url":null},{"article_description":null,"article_title":null,"article_url":null,"author_headline":"Deploying enterprise agents in production / CTO / SWE Leader / GVP @ Publicis Sapient","author_name":"Ravi Evani\n              \n                \n                   \n    \n      \n    \n    \n      \n    \n\n • You","author_profile_image_url":"https://media.licdn.com/dms/image/v2/C4E03AQGNeJRorEd2Nw/profile-displayphoto-shrink_100_100/profile-displayphoto-shrink_100_100/0/1569287114631?e=1784160000&v=beta&t=tJDZC7EXWnlgIIf8kF7fBCajhF-HEgzNXnz_IIkjqW8","author_profile_url":"https://www.linkedin.com/in/ravievani","comment_count":2,"has_image":true,"impression_count":6338,"is_article":false,"is_my_post":true,"is_video":true,"post_image_url":"https://media.licdn.com/dms/image/v2/D4E05AQGEHEqd3LVXYw/videocover-high/B4EZaLd3ylHkBk-/0/1746096718792?e=1783008000&v=beta&t=XcQ7E-e2CFx5ru2nvPk07G_x-oPLnopAVk-hGe2-Fj8","post_text":"Are you still debating AI while others are using it to outpace you?\n\nAs software engineers, we often overthink. We sit in rooms debating strategy—Should we use AI? Which model? Is it mature enough?\nMeanwhile, the technology moves forward—indifferent to our hesitation.\n\nThat’s always been the case with tech. But now it’s more extreme.\n\nSoftware development has fundamentally changed in the past year.\n\nThe old focal points—latest Java updates, specializing in front-end vs back-end, arguing over testing tools—don’t matter as much anymore.\n\nAI coding agents flipped the script. The new game is rapid adaptation and high-leverage problem solving.\n\nAnd it’s only accelerating.\n\nDevelopers who use AI tools are delivering at a level that traditional workflows can’t match.\nThe more they use them, the better the models get. The better the models get, the bigger the gap between adopters and holdouts.\n\nSo no, it’s not about waiting for the tech to mature. It’s about what you’re doing with it right now.\n\nThe point is: act.\n\nAI isn’t waiting. Neither should you.","post_url":"https://www.linkedin.com/feed/update/urn:li:activity:7323660512192335872","post_urn":"urn:li:activity:7323660512192335872","posted_hours_ago":8760,"posted_time":"2025-06-25","posted_time_raw":"1yr","reaction_count":55,"reaction_types":"LIKE, EMPATHY","source":"activity","video_url":"https://media.licdn.com/dms/image/v2/D4E05AQGEHEqd3LVXYw/videocover-high/B4EZaLd3ylHkBk-/0/1746096718792?e=1783008000&v=beta&t=XcQ7E-e2CFx5ru2nvPk07G_x-oPLnopAVk-hGe2-Fj8"},{"article_description":null,"article_title":null,"article_url":null,"author_headline":"Deploying enterprise agents in production / CTO / SWE Leader / GVP @ Publicis Sapient","author_name":"Ravi Evani\n              \n                \n                   \n    \n      \n    \n    \n      \n    \n\n • You","author_profile_image_url":"https://media.licdn.com/dms/image/v2/C4E03AQGNeJRorEd2Nw/profile-displayphoto-shrink_100_100/profile-displayphoto-shrink_100_100/0/1569287114631?e=1784160000&v=beta&t=tJDZC7EXWnlgIIf8kF7fBCajhF-HEgzNXnz_IIkjqW8","author_profile_url":"https://www.linkedin.com/in/ravievani","has_image":false,"impression_count":1204,"is_article":false,"is_my_post":true,"is_video":false,"post_image_url":null,"post_text":"Deep-Live-Cam https://lnkd.in/eeWKNt2P is trending #1 on GitHub today. Here’s a quick breakdown of how it pulls off real-time face swaps—from capturing your live video to generating the swapped output in milliseconds.\n\nThe application wires up a clean, four-step pipeline: you pick a source face and target stream, capturer.py grabs each frame, then core.py runs face-analyser to pinpoint faces and face-swapper to swap them via an ONNX model. Optional GFPGAN cleanup sharpens details, predicter sends work to CPU or GPU, and ui.py streams the result live (or FFMPEG saves it). All controls live in a simple UI/CLI toggle setup.","post_url":"https://www.linkedin.com/feed/update/urn:li:activity:7323150575473201152","post_urn":"urn:li:activity:7323150575473201152","posted_hours_ago":8760,"posted_time":"2025-06-25","posted_time_raw":"1yr","reaction_count":8,"reaction_types":"LIKE, INTEREST","source":"activity","video_url":null},{"article_description":null,"article_title":null,"article_url":null,"author_headline":"Deploying enterprise agents in production / CTO / SWE Leader / GVP @ Publicis Sapient","author_name":"Ravi Evani\n              \n                \n                   \n    \n      \n    \n    \n      \n    \n\n • You","author_profile_image_url":"https://media.licdn.com/dms/image/v2/C4E03AQGNeJRorEd2Nw/profile-displayphoto-shrink_100_100/profile-displayphoto-shrink_100_100/0/1569287114631?e=1784160000&v=beta&t=tJDZC7EXWnlgIIf8kF7fBCajhF-HEgzNXnz_IIkjqW8","author_profile_url":"https://www.linkedin.com/in/ravievani","has_image":true,"impression_count":1037,"is_article":false,"is_my_post":true,"is_video":true,"post_image_url":"https://media.licdn.com/dms/image/v2/D4E05AQEJ4ymryAR3-Q/feedshare-thumbnail_720_1280/B4EZZ4s1YcHMAs-/0/1745781742174?e=1783008000&v=beta&t=gvacW5GM8kQJ-NH7htMJKfQZZg45m2FOMsYF11Zcavk","post_text":"Gemini 2.5 allows you to shift between speed and power, to match the task at hand.\n\nWe tested Google hashtag#Gemini 2.5 to generate mindmaps from meeting discussions.\n\nWhen we set a thinking budget of 100, Pro (gemini-2.5-pro-preview-03-25) delivered a precise, outcome-focused mindmap in ~20 seconds.\n\nOn the other hand, even with the budget set to 0, Flash (gemini-2.5-flash-preview-04-17) gave us a faster, yet still sold mindmap in just 6 seconds.\n\nHonestly, the results were hard to objectively compare since there is no \"ground truth\" answer here. So quality is very much in the eyes of the beholder :)\n\nBased on my subjective assessment, I would recommend using Flash for fast, live \"whiteboarding\". Shift to Pro when you need depth and focus for deeper, targeted follow-ups afterward.\n\nThe combination of model selection and thinking budget lets you decide—speed or depth, on your terms.","post_url":"https://www.linkedin.com/feed/update/urn:li:activity:7322805996840542208","post_urn":"urn:li:activity:7322805996840542208","posted_hours_ago":8760,"posted_time":"2025-06-25","posted_time_raw":"1yr","reaction_count":8,"reaction_types":"LIKE, EMPATHY","source":"activity","video_url":"https://media.licdn.com/dms/image/v2/D4E05AQEJ4ymryAR3-Q/feedshare-thumbnail_720_1280/B4EZZ4s1YcHMAs-/0/1745781742174?e=1783008000&v=beta&t=gvacW5GM8kQJ-NH7htMJKfQZZg45m2FOMsYF11Zcavk"},{"article_description":null,"article_title":null,"article_url":null,"author_headline":"Deploying enterprise agents in production / CTO / SWE Leader / GVP @ Publicis Sapient","author_name":"Ravi Evani\n              \n                \n                   \n    \n      \n    \n    \n      \n    \n\n • You","author_profile_image_url":"https://media.licdn.com/dms/image/v2/C4E03AQGNeJRorEd2Nw/profile-displayphoto-shrink_100_100/profile-displayphoto-shrink_100_100/0/1569287114631?e=1784160000&v=beta&t=tJDZC7EXWnlgIIf8kF7fBCajhF-HEgzNXnz_IIkjqW8","author_profile_url":"https://www.linkedin.com/in/ravievani","comment_count":2,"has_image":true,"impression_count":2572,"is_article":false,"is_my_post":true,"is_video":false,"post_image_url":"https://media.licdn.com/dms/image/v2/D4E22AQGZKIjgmAJGOQ/feedshare-shrink_800/B4EZZ8uYxUGYAg-/0/1745849258854?e=1784160000&v=beta&t=qH2QIe9sFr9Ge4cla3tIZdb7bqza613m1eXzmtuYInk","post_text":"Here’s my current vibe coding workflow:\n\nI start with GPT-4.1 – because nothing yet beats its instruction-following.\n\nIf it gets it wrong twice, I bring in Gemini 2.5 Pro for a second opinion.\n\nIf they both agree but I’m still not convinced? I call on O3 for a final check or fresh angle.\n\nThen I take the best bits, remix, and feed it back to GPT-4.1.\n\nYes, it’s overkill. Yes, it works.\n\nWhat’s your coding workflow with AI?","post_url":"https://www.linkedin.com/feed/update/urn:li:activity:7322622534271606784","post_urn":"urn:li:activity:7322622534271606784","posted_hours_ago":8760,"posted_time":"2025-06-25","posted_time_raw":"1yr","reaction_count":24,"reaction_types":"LIKE, EMPATHY, INTEREST","repost_count":1,"source":"activity","video_url":null},{"article_description":null,"article_title":null,"article_url":null,"author_headline":"Deploying enterprise agents in production / CTO / SWE Leader / GVP @ Publicis Sapient","author_name":"Ravi Evani\n              \n                \n                   \n    \n      \n    \n    \n      \n    \n\n • You","author_profile_image_url":"https://media.licdn.com/dms/image/v2/C4E03AQGNeJRorEd2Nw/profile-displayphoto-shrink_100_100/profile-displayphoto-shrink_100_100/0/1569287114631?e=1784160000&v=beta&t=tJDZC7EXWnlgIIf8kF7fBCajhF-HEgzNXnz_IIkjqW8","author_profile_url":"https://www.linkedin.com/in/ravievani","comment_count":4,"has_image":true,"impression_count":3467,"is_article":false,"is_my_post":true,"is_video":true,"post_image_url":"https://media.licdn.com/dms/image/v2/D4E05AQHBJy-nWGWwBA/videocover-low/B4EZZyNblmHcCA-/0/1745672853586?e=1783008000&v=beta&t=p4Nb09bwhIIQTitHbBot8LSqFTe5hdA6HY-ZgLVOrJc","post_text":"Had a great fireside chat with David at Publicis Sapient GENE LATAM Fest ✨—shoutout to Laura and the crew for pulling it together!\n\nWe got into a simple idea: turning wasted meeting time into learning time.\n\nBefore committing your time to any meeting, ask yourself:\n\n🤔 What am I getting out of it?\n🤔 What am I giving to it?\n\nIf the answer to both is “not much”, skip it. Use that time to learn something new.\n\nAnd if someone really wants you in the room? Ask them the same two questions.\n\nProtect your time. Swap your wasted meeting time for learning time!","post_url":"https://www.linkedin.com/feed/update/urn:li:activity:7321882682974523392","post_urn":"urn:li:activity:7321882682974523392","posted_hours_ago":8760,"posted_time":"2025-06-25","posted_time_raw":"1yr","reaction_count":70,"reaction_types":"LIKE, PRAISE, EMPATHY","repost_count":4,"source":"activity","video_url":"https://media.licdn.com/dms/image/v2/D4E05AQHBJy-nWGWwBA/videocover-low/B4EZZyNblmHcCA-/0/1745672853586?e=1783008000&v=beta&t=p4Nb09bwhIIQTitHbBot8LSqFTe5hdA6HY-ZgLVOrJc"},{"article_description":null,"article_title":null,"article_url":null,"author_headline":"Deploying enterprise agents in production / CTO / SWE Leader / GVP @ Publicis Sapient","author_name":"Ravi Evani\n              \n                \n                   \n    \n      \n    \n    \n      \n    \n\n • You","author_profile_image_url":"https://media.licdn.com/dms/image/v2/C4E03AQGNeJRorEd2Nw/profile-displayphoto-shrink_100_100/profile-displayphoto-shrink_100_100/0/1569287114631?e=1784160000&v=beta&t=tJDZC7EXWnlgIIf8kF7fBCajhF-HEgzNXnz_IIkjqW8","author_profile_url":"https://www.linkedin.com/in/ravievani","comment_count":5,"has_image":true,"impression_count":4265,"is_article":false,"is_my_post":true,"is_video":true,"post_image_url":"https://media.licdn.com/dms/image/v2/D4E05AQFc1De9XaVMqg/videocover-high/B4EZZgH9KOHEBk-/0/1745369439499?e=1783008000&v=beta&t=N3f180jSoW8T4IlDIVkRtmTIwP6FoRqNIo9pZY_rhjA","post_text":"Yesterday, I was stuck at ATL with a 7-hour flight delay. Time for some vibe coding.\n\nI’ve always wanted to reverse-engineer cool apps—figure out their features and map their use cases.\n\nSo I fired up Publicis Sapient hashtag#Slingshot + Google hashtag#Gemini 2.5 Pro.\n\nWhat I built:\n🔹 A tool that takes a GitHub repo, URL or local filepath\n🔹 Analyzes the codebase\n🔹 Outputs use case diagram of what the app actually does\n\n2 hours of vibe coding, 4 hours of refactoring.\n\nKey learning:\nMake code deterministic wherever possible. Let the LLM focus only on what it must—in this case, extracting use cases. Diagram layout, shape creation, text alignment? Script it. Don’t leave it to chance.\n\nMinimal LLM. Maximum consistency.\n\nHappy vibe coding.","post_url":"https://www.linkedin.com/feed/update/urn:li:activity:7320610058441003008","post_urn":"urn:li:activity:7320610058441003008","posted_hours_ago":8760,"posted_time":"2025-06-25","posted_time_raw":"1yr","reaction_count":66,"reaction_types":"LIKE, PRAISE, EMPATHY","source":"activity","video_url":"https://media.licdn.com/dms/image/v2/D4E05AQFc1De9XaVMqg/videocover-high/B4EZZgH9KOHEBk-/0/1745369439499?e=1783008000&v=beta&t=N3f180jSoW8T4IlDIVkRtmTIwP6FoRqNIo9pZY_rhjA"},{"article_description":null,"article_title":null,"article_url":null,"author_headline":"Deploying enterprise agents in production / CTO / SWE Leader / GVP @ Publicis Sapient","author_name":"Ravi Evani\n              \n                \n                   \n    \n      \n    \n    \n      \n    \n\n • You","author_profile_image_url":"https://media.licdn.com/dms/image/v2/C4E03AQGNeJRorEd2Nw/profile-displayphoto-shrink_100_100/profile-displayphoto-shrink_100_100/0/1569287114631?e=1784160000&v=beta&t=tJDZC7EXWnlgIIf8kF7fBCajhF-HEgzNXnz_IIkjqW8","author_profile_url":"https://www.linkedin.com/in/ravievani","comment_count":3,"has_image":true,"impression_count":2020,"is_article":false,"is_my_post":true,"is_video":false,"post_image_url":"https://media.licdn.com/dms/image/v2/D4E22AQHUywAMnKeiSA/feedshare-shrink_800/B4EZZB94nJGYAg-/0/1744863466961?e=1784160000&v=beta&t=lRjRcb5HlF5VvaTGYj90vkFAnptYidkl6foSByOVBPw","post_text":"when your vibe coding agent does those numerous little extras way beyond the one thing you told it to do, remember that's a \"helpful\" upsell billed by the millisecond...","post_url":"https://www.linkedin.com/feed/update/urn:li:activity:7318487821361577984","post_urn":"urn:li:activity:7318487821361577984","posted_hours_ago":8760,"posted_time":"2025-06-25","posted_time_raw":"1yr","reaction_count":19,"reaction_types":"LIKE, ENTERTAINMENT","source":"activity","video_url":null},{"article_description":null,"article_title":null,"article_url":null,"author_headline":"Deploying enterprise agents in production / CTO / SWE Leader / GVP @ Publicis Sapient","author_name":"Ravi Evani\n              \n                \n                   \n    \n      \n    \n    \n      \n    \n\n • You","author_profile_image_url":"https://media.licdn.com/dms/image/v2/C4E03AQGNeJRorEd2Nw/profile-displayphoto-shrink_100_100/profile-displayphoto-shrink_100_100/0/1569287114631?e=1784160000&v=beta&t=tJDZC7EXWnlgIIf8kF7fBCajhF-HEgzNXnz_IIkjqW8","author_profile_url":"https://www.linkedin.com/in/ravievani","comment_count":1,"has_image":true,"impression_count":274,"is_article":false,"is_my_post":true,"is_video":false,"post_image_url":"https://media.licdn.com/dms/image/v2/D4E22AQFGIPTK2WMU9w/feedshare-shrink_800/feedshare-shrink_800/0/1728518677082?e=1784160000&v=beta&t=poXUOEnKL9vPIsLtMSKuama-5k1RrzbvcZgF_4fKixM","post_text":"I posed this question a few months ago when there were far fewer models in play. Now, with model “upsells” becoming the norm and our increasing reliance on vibe coding, this trade-off is more relevant than ever—especially for large enterprises.","post_url":"https://www.linkedin.com/feed/update/urn:li:activity:7318454409330319360","post_urn":"urn:li:activity:7318454409330319360","posted_hours_ago":8760,"posted_time":"2025-06-25","posted_time_raw":"1yr","reaction_count":2,"reaction_types":"LIKE","source":"activity","video_url":null},{"article_description":null,"article_title":null,"article_url":null,"author_headline":"Deploying enterprise agents in production / CTO / SWE Leader / GVP @ Publicis Sapient","author_name":"Ravi Evani\n              \n                \n                   \n    \n      \n    \n    \n      \n    \n\n • You","author_profile_image_url":"https://media.licdn.com/dms/image/v2/C4E03AQGNeJRorEd2Nw/profile-displayphoto-shrink_100_100/profile-displayphoto-shrink_100_100/0/1569287114631?e=1784160000&v=beta&t=tJDZC7EXWnlgIIf8kF7fBCajhF-HEgzNXnz_IIkjqW8","author_profile_url":"https://www.linkedin.com/in/ravievani","comment_count":1,"has_image":true,"impression_count":2818,"is_article":false,"is_my_post":true,"is_video":false,"post_image_url":"https://media.licdn.com/dms/image/v2/D4E22AQEYcno81K0krQ/feedshare-shrink_800/B4EZYrQGYiGgAk-/0/1744482363447?e=1784160000&v=beta&t=Zj5buWQ8r_HrnguZT_p3-iq4lc_8MSVv3RghvjMlLm0","post_text":"Now that hashtag#Google has launched ADK, I revisited the Airbnb hashtag#MCP use case from my earlier post https://lnkd.in/eisY5VDU, that showed how we used MCP to power a natural language property search.\n\nThis time, I explored what changes when you implement the same flow using ADK’s orchestration model.\n\nDifferent approaches. Same goal. Different trade-offs.\n\nHere’s a breakdown 👇\n\n🎯 Simple MCP Flow\n↳ LLM interprets the user query and chooses the tool\n↳ Script uses the MCP client to call the tool\n↳ Script sends the result back to the LLM for final response\n\n🎯 ADK MCP Flow\n↳ Agent Node (LLM + Toolbox) chooses the tool\n↳ ADK framework handles tool invocation (MCP under the hood)\n↳ Result flows through optional Format Node to final output\n\nMy take on the trade-offs:\n\nThe Simple MCP flow gives you full control. You’re handling the logic, tool orchestration, and logging directly through a Python script. It’s straightforward to prototype, easy to debug, and a great way to deeply understand how MCP sessions and tool calls work under the hood.\n\nBut that control comes at a cost. You’ll end up writing a lot of boilerplate — managing LLM prompts, interpreting responses, invoking tools, and stitching everything together manually. The orchestration logic is tightly coupled with your tool execution, and as workflows get more complex, maintaining that script becomes harder to scale.\n\nBy contrast, the ADK approach is more modular and scalable. The Agent Node combines LLM decision-making with a configured toolbox, while Format Nodes handle the response output. The orchestration is declarative — you connect nodes, and the framework handles the rest. It’s clean, reusable, and avoids the repetitive glue code.\n\nThat said, ADK introduces some abstraction. You don’t have line-by-line control over tool invocation — and the initial learning curve is higher. You’ll need to understand Pipelines, Nodes, and the framework’s mental model. But once you’re up and running, it’s far better suited for building complex, maintainable agentic applications.\n\nBottom line:\nSetting up an MCP integration is easy. Designing one that’s actually useful at scale is where it gets interesting. Start with a simple script to learn the flow. Move to ADK when you want modularity, reuse, and cleaner orchestration.","post_url":"https://www.linkedin.com/feed/update/urn:li:activity:7316889358379155456","post_urn":"urn:li:activity:7316889358379155456","posted_hours_ago":8760,"posted_time":"2025-06-25","posted_time_raw":"1yr","reaction_count":52,"reaction_types":"LIKE, INTEREST, EMPATHY","source":"activity","video_url":null},{"article_description":null,"article_title":null,"article_url":null,"author_headline":"Deploying enterprise agents in production / CTO / SWE Leader / GVP @ Publicis Sapient","author_name":"Ravi Evani\n              \n                \n                   \n    \n      \n    \n    \n      \n    \n\n • You","author_profile_image_url":"https://media.licdn.com/dms/image/v2/C4E03AQGNeJRorEd2Nw/profile-displayphoto-shrink_100_100/profile-displayphoto-shrink_100_100/0/1569287114631?e=1784160000&v=beta&t=tJDZC7EXWnlgIIf8kF7fBCajhF-HEgzNXnz_IIkjqW8","author_profile_url":"https://www.linkedin.com/in/ravievani","comment_count":3,"has_image":true,"impression_count":7560,"is_article":false,"is_my_post":true,"is_video":true,"post_image_url":"https://media.licdn.com/dms/image/v2/D4E05AQHiKvA-diWbnw/videocover-low/B4EZYfmWXnGYCU-/0/1744286926169?e=1783008000&v=beta&t=sa_J1912dN0Fnp51a06rYWOCUDGdZ0DYceF1PDc2f1E","post_text":"Publicis Sapient's Raghu Dubey gearing up for his big talk at Google Cloud Next '25 —spotlighting our Enterprise Agentic AI platform: Bodhi https://lnkd.in/eM--Wu6r.\n\nThe focus: Modernizing marketing with AI.\n\nWhat used to take several months can now be orchestrated and scaled in a fraction of the time—powered by Bodhi's modular and agentic orchestration capabilities.\n\nIn the marketing transformation space, Bodhi accelerates everything from Customer Engagement to Content Pipelines, to Multimodal compliance checks.\n\nNow, with hashtag#MCP and Google's Agentspace in the mix, we’re plugging Bodhi's enterprise agentic layer into a broader ecosystem of agents—unlocking disproportionate value for our customers.","post_url":"https://www.linkedin.com/feed/update/urn:li:activity:7316069692165480450","post_urn":"urn:li:activity:7316069692165480450","posted_hours_ago":8760,"posted_time":"2025-06-25","posted_time_raw":"1yr","reaction_count":182,"reaction_types":"LIKE, PRAISE, EMPATHY","source":"activity","video_url":"https://media.licdn.com/dms/image/v2/D4E05AQHiKvA-diWbnw/videocover-low/B4EZYfmWXnGYCU-/0/1744286926169?e=1783008000&v=beta&t=sa_J1912dN0Fnp51a06rYWOCUDGdZ0DYceF1PDc2f1E"},{"article_description":null,"article_title":null,"article_url":null,"author_headline":"Deploying enterprise agents in production / CTO / SWE Leader / GVP @ Publicis Sapient","author_name":"Ravi Evani\n              \n                \n                   \n    \n      \n    \n    \n      \n    \n\n • You","author_profile_image_url":"https://media.licdn.com/dms/image/v2/C4E03AQGNeJRorEd2Nw/profile-displayphoto-shrink_100_100/profile-displayphoto-shrink_100_100/0/1569287114631?e=1784160000&v=beta&t=tJDZC7EXWnlgIIf8kF7fBCajhF-HEgzNXnz_IIkjqW8","author_profile_url":"https://www.linkedin.com/in/ravievani","has_image":true,"impression_count":2413,"is_article":false,"is_my_post":true,"is_video":true,"post_image_url":"https://media.licdn.com/dms/image/v2/D4E05AQEem7N1LHe3GA/videocover-low/B4EZYSc3d9GgCM-/0/1744066304095?e=1783008000&v=beta&t=P6HeuAsgWPnbn-5m2rSfW-57rIi0lvH4P73sF4F7Ems","post_text":"If your app is going truly global, you will likely need a region and a language switcher to transact in that local region.\n\nHere we use Publicis Sapient hashtag#Slingshot AI SDLC platform to build a region and language switcher for a Mock Global Restaurant Android app.\n\nThe goal is simple: when a customer travels, they should be able to switch to the local region and language to view the correct menu and ordering options.\n\n↳ We start with mockup screens that we want to use to build this functionality. These screenshots are uploaded into Slingshot, along with functional instructions.\n↳ Slingshot interprets the visuals and prompts using our Enterprise Prompt Library, which includes standards for functionality, architecture, and non-functional requirements—like performance, localization, accessibility, security, privacy, and testing.\n↳ Slingshot starts generating code in Kotlin.\n↳ It sets up the project, adds dependencies, creates navigation fragments, and builds out the layouts—including all UI elements like text views, image views, and buttons.\n\nThen it generates:\n↳ A list of regions\n↳ View fragments\n↳ Adapters (like the menu adapter and region adapter)\n↳ Data classes for the region structure\n\n↳ Once that’s done, we verify all imports and dependencies, accept the changes, and save the files.\n\n↳ Next, we instruct Slingshot to generate unit and UI test cases. It adds the required testing dependencies, then generates the tests following our internal standards. We validate the tests, build the app, and run both the unit and UI tests—all of which pass successfully.\n\n↳ Finally, we validate the end-to-end functionality.\n\nThat’s it—we go from screenshots to a fully functional Android country
