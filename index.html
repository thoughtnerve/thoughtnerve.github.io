E76VrVaFktDw/videocover-high/B56Z2q_Nl4HgBY-/0/1776690192613?e=1783065600&v=beta&t=oAMzgDjhdy-s5Ah8tJu5MR6B-8cEbU-X8BC3a12-Rx4","post_text":"Sometimes agentic coding feels like...","post_url":"https://www.linkedin.com/feed/update/urn:li:activity:7451978805952299009","post_urn":"urn:li:activity:7451978805952299009","posted_hours_ago":1440,"posted_time":"2026-04-26","posted_time_raw":"2mo","reaction_count":16,"reaction_types":"LIKE","source":"activity","video_url":"https://media.licdn.com/dms/image/v2/D5605AQE76VrVaFktDw/videocover-high/B56Z2q_Nl4HgBY-/0/1776690192613?e=1783065600&v=beta&t=oAMzgDjhdy-s5Ah8tJu5MR6B-8cEbU-X8BC3a12-Rx4"},{"article_description":null,"article_title":null,"article_url":null,"author_headline":"Deploying enterprise agents in production / CTO / SWE Leader / GVP @ Publicis Sapient","author_name":"Ravi Evani\n              \n                \n                   \n    \n      \n    \n    \n      \n    \n\n • You","author_profile_image_url":"https://media.licdn.com/dms/image/v2/C4E03AQGNeJRorEd2Nw/profile-displayphoto-shrink_100_100/profile-displayphoto-shrink_100_100/0/1569287114631?e=1784160000&v=beta&t=tJDZC7EXWnlgIIf8kF7fBCajhF-HEgzNXnz_IIkjqW8","author_profile_url":"https://www.linkedin.com/in/ravievani","has_image":true,"impression_count":707,"is_article":false,"is_my_post":true,"is_video":true,"post_image_url":"https://media.licdn.com/dms/image/v2/D5605AQGG08XHdSRVLg/videocover-high/B56Z2nd6a_GsBY-/0/1776631130918?e=1783065600&v=beta&t=pjKkYR1b-zRH6aU4_u9GhS3rVER3K32hzYImPzAGD9E","post_text":"Could this \"monitoring view\" have just been a log file? Of course. But now that Sapient Slingshot makes design easier, why not indulge a little operational vanity.","post_url":"https://www.linkedin.com/feed/update/urn:li:activity:7451731083257229312","post_urn":"urn:li:activity:7451731083257229312","posted_hours_ago":1440,"posted_time":"2026-04-26","posted_time_raw":"2mo","reaction_count":12,"reaction_types":"LIKE","source":"activity","video_url":"https://media.licdn.com/dms/image/v2/D5605AQGG08XHdSRVLg/videocover-high/B56Z2nd6a_GsBY-/0/1776631130918?e=1783065600&v=beta&t=pjKkYR1b-zRH6aU4_u9GhS3rVER3K32hzYImPzAGD9E"},{"article_description":null,"article_title":null,"article_url":null,"author_headline":"Deploying enterprise agents in production / CTO / SWE Leader / GVP @ Publicis Sapient","author_name":"Ravi Evani\n              \n                \n                   \n    \n      \n    \n    \n      \n    \n\n • You","author_profile_image_url":"https://media.licdn.com/dms/image/v2/C4E03AQGNeJRorEd2Nw/profile-displayphoto-shrink_100_100/profile-displayphoto-shrink_100_100/0/1569287114631?e=1784160000&v=beta&t=tJDZC7EXWnlgIIf8kF7fBCajhF-HEgzNXnz_IIkjqW8","author_profile_url":"https://www.linkedin.com/in/ravievani","comment_count":2,"has_image":false,"impression_count":2343,"is_article":false,"is_my_post":true,"is_video":false,"post_image_url":null,"post_text":"Ever since \"Claude Code\", I've only seen coding work shoot up. Now with \"Claude Design\", the amount of design work will shoot up too. More capability means more things actually get built. So congrats to my fellow designers. Happy building!","post_url":"https://www.linkedin.com/feed/update/urn:li:activity:7451645799979044864","post_urn":"urn:li:activity:7451645799979044864","posted_hours_ago":1440,"posted_time":"2026-04-26","posted_time_raw":"2mo","reaction_count":39,"reaction_types":"LIKE, EMPATHY, INTEREST","source":"activity","video_url":null},{"article_description":null,"article_title":null,"article_url":null,"author_headline":"Deploying enterprise agents in production / CTO / SWE Leader / GVP @ Publicis Sapient","author_name":"Ravi Evani\n              \n                \n                   \n    \n      \n    \n    \n      \n    \n\n • You","author_profile_image_url":"https://media.licdn.com/dms/image/v2/C4E03AQGNeJRorEd2Nw/profile-displayphoto-shrink_100_100/profile-displayphoto-shrink_100_100/0/1569287114631?e=1784160000&v=beta&t=tJDZC7EXWnlgIIf8kF7fBCajhF-HEgzNXnz_IIkjqW8","author_profile_url":"https://www.linkedin.com/in/ravievani","comment_count":3,"has_image":true,"impression_count":1947,"is_article":false,"is_my_post":true,"is_video":false,"post_image_url":"https://media.licdn.com/dms/image/v2/D5622AQHPXCbMcE8HCw/feedshare-shrink_800/B56Z2TUxvWKoAk-/0/1776293190887?e=1784160000&v=beta&t=yRaR_k5yh38mnR3zqe2yxMmIGAij8pGJatRWOKgsRKA","post_text":"Excited to join Rajeev Perera in a fireside chat at Google Cloud Next '26! Join me there. Registration link via Publicis Sapient in first comment.","post_url":"https://www.linkedin.com/feed/update/urn:li:activity:7450548744451756032","post_urn":"urn:li:activity:7450548744451756032","posted_hours_ago":1440,"posted_time":"2026-04-26","posted_time_raw":"2mo","reaction_count":46,"reaction_types":"LIKE, EMPATHY, PRAISE","repost_count":6,"source":"activity","video_url":null},{"article_description":null,"article_title":null,"article_url":null,"author_headline":"Deploying enterprise agents in production / CTO / SWE Leader / GVP @ Publicis Sapient","author_name":"Ravi Evani\n              \n                \n                   \n    \n      \n    \n    \n      \n    \n\n • You","author_profile_image_url":"https://media.licdn.com/dms/image/v2/C4E03AQGNeJRorEd2Nw/profile-displayphoto-shrink_100_100/profile-displayphoto-shrink_100_100/0/1569287114631?e=1784160000&v=beta&t=tJDZC7EXWnlgIIf8kF7fBCajhF-HEgzNXnz_IIkjqW8","author_profile_url":"https://www.linkedin.com/in/ravievani","comment_count":2,"has_image":false,"impression_count":1049,"is_article":false,"is_my_post":true,"is_video":false,"post_image_url":null,"post_text":"Traditional project management: Greater scope requires more people.\nAI-native project management: Greater scope requires more system orchestration.\n\nThe mistake I continue to see is applying old staffing patterns to AI-native projects. In traditional projects, you ramp a large team fast. That breaks down with agentic coding. If you throw people and agents in together without structure, you get chaos: “vibe coding” with no guardrails.\n\nInstead, regardless of a project's scope, start with the smallest disciplined team that will execute in a way that will lay the foundation for how people and agents will collaborate. They set the operational rhythm and guardrails.\n\nThis will prevent amplification of missteps before they scale. Only once that baseline is solid, you should add people one at a time, ensuring each new addition fits the stable architecture.\n\nPrioritize scaling coherent systems, not headcount. That’s how you avoid exponential misalignment in an agentic world.","post_url":"https://www.linkedin.com/feed/update/urn:li:activity:7450456815047450624","post_urn":"urn:li:activity:7450456815047450624","posted_hours_ago":1440,"posted_time":"2026-04-26","posted_time_raw":"2mo","reaction_count":19,"reaction_types":"LIKE, INTEREST","source":"activity","video_url":null},{"article_description":null,"article_title":null,"article_url":null,"author_headline":"Deploying enterprise agents in production / CTO / SWE Leader / GVP @ Publicis Sapient","author_name":"Ravi Evani\n              \n                \n                   \n    \n      \n    \n    \n      \n    \n\n • You","author_profile_image_url":"https://media.licdn.com/dms/image/v2/C4E03AQGNeJRorEd2Nw/profile-displayphoto-shrink_100_100/profile-displayphoto-shrink_100_100/0/1569287114631?e=1784160000&v=beta&t=tJDZC7EXWnlgIIf8kF7fBCajhF-HEgzNXnz_IIkjqW8","author_profile_url":"https://www.linkedin.com/in/ravievani","comment_count":1,"has_image":true,"impression_count":4388,"is_article":false,"is_my_post":true,"is_video":false,"post_image_url":"https://media.licdn.com/dms/image/v2/D5622AQFtkv7g4-ScEw/feedshare-shrink_800/B56Z2QwNn5GwAc-/0/1776250052062?e=1784160000&v=beta&t=uX63YEfvk9VZjjFpCEpbanwxxu2FcFqHuQ5fJibKYlg","post_text":"Join my session @ Google Cloud Next '26 on how multi-agent systems can support operational technology in high-velocity, high-pressure environments where continuous, reliable operations are critical.\n\nI'll be showcasing practical examples of agentic workflows that help improve speed of service, prevent operational disruptions, and strengthen on-premise guest experience.\n\nThe conversation will center on how agentic AI can help enterprises respond faster, operate more consistently, and make better decisions in moments where execution matters most.\n\nWe’ll cover:\n1/ How AI agents can support operational performance in QSR and hospitality environments\n2/ Where multi-agent systems can help in high-intensity scenarios requiring speed, coordination, and resilience\n3/ Practical examples of applying agentic AI to improve service, reduce operational friction, and protect guest experience\n4/ What it takes to build these capabilities in an enterprise-grade way so they are secure, scalable, and built to last\n\nRegistration link via Publicis Sapient in first comment.","post_url":"https://www.linkedin.com/feed/update/urn:li:activity:7450132703150223360","post_urn":"urn:li:activity:7450132703150223360","posted_hours_ago":1440,"posted_time":"2026-04-26","posted_time_raw":"2mo","reaction_count":119,"reaction_types":"LIKE, PRAISE, EMPATHY","repost_count":5,"source":"activity","video_url":null},{"article_description":null,"article_title":null,"article_url":null,"author_headline":"Deploying enterprise agents in production / CTO / SWE Leader / GVP @ Publicis Sapient","author_name":"Ravi Evani\n              \n                \n                   \n    \n      \n    \n    \n      \n    \n\n • You","author_profile_image_url":"https://media.licdn.com/dms/image/v2/C4E03AQGNeJRorEd2Nw/profile-displayphoto-shrink_100_100/profile-displayphoto-shrink_100_100/0/1569287114631?e=1784160000&v=beta&t=tJDZC7EXWnlgIIf8kF7fBCajhF-HEgzNXnz_IIkjqW8","author_profile_url":"https://www.linkedin.com/in/ravievani","has_image":false,"impression_count":690,"is_article":false,"is_my_post":true,"is_video":false,"post_image_url":null,"post_text":"The \"agentic AI advantage\" goes to hospitality brands who can measure their decisions.\n\nAI is changing how software works. Traditional systems only did what we could spell out as rules (“if guest arrives after 6pm, then…”). The new wave of AI works differently: you give it a clear goal (e.g. shorter queues, higher conversion, fewer complaints) and it tries thousands of options, learning from what works. In simple terms: old software automated what you could specify; this new software automates what you can verify in data. Any task with a clear “right answer” becomes a candidate for deep automation.\n\nSo, hospitality brands that first identify their most “verifiable” decisions will move fastest. Room allocation, dynamic pricing, overbooking, and routine guest queries all have outcomes you can measure: RevPAR, NPS, cost of compensation, first‑contact resolution. Those are the places where AI can keep practicing, get instant feedback from the numbers, and quietly outperform static rules and manual work.\n\nAI agents can help hospitality brands do this at scale. Use your booking, operations, and service data to surface the 50–100 decisions where success is easy to measure. Then use optimization models and LLMs to recommend actions, test them in controlled experiments, and feed the results back into training so the system keeps improving. The early movers who design around “what can we verify?” are likely to build AI copilots for key processes while others are still waiting to see how the technology evolves.","post_url":"https://www.linkedin.com/feed/update/urn:li:activity:7398486867437899776","post_urn":"urn:li:activity:7398486867437899776","posted_hours_ago":5040,"posted_time":"2025-11-26","posted_time_raw":"7mo","reaction_count":10,"reaction_types":"LIKE, EMPATHY, APPRECIATION","source":"activity","video_url":null},{"article_description":null,"article_title":null,"article_url":null,"author_headline":"Deploying enterprise agents in production / CTO / SWE Leader / GVP @ Publicis Sapient","author_name":"Ravi Evani\n              \n                \n                   \n    \n      \n    \n    \n      \n    \n\n • You","author_profile_image_url":"https://media.licdn.com/dms/image/v2/C4E03AQGNeJRorEd2Nw/profile-displayphoto-shrink_100_100/profile-displayphoto-shrink_100_100/0/1569287114631?e=1784160000&v=beta&t=tJDZC7EXWnlgIIf8kF7fBCajhF-HEgzNXnz_IIkjqW8","author_profile_url":"https://www.linkedin.com/in/ravievani","comment_count":2,"has_image":false,"impression_count":1338,"is_article":false,"is_my_post":true,"is_video":false,"post_image_url":null,"post_text":"So Microsoft builds Edge on Chromium, and Google builds Antigravity on VS Code. Only in software do rivals raise each other’s kids.","post_url":"https://www.linkedin.com/feed/update/urn:li:activity:7397629187198558208","post_urn":"urn:li:activity:7397629187198558208","posted_hours_ago":5040,"posted_time":"2025-11-26","posted_time_raw":"7mo","reaction_count":14,"reaction_types":"LIKE, ENTERTAINMENT","source":"activity","video_url":null},{"article_description":null,"article_title":null,"article_url":null,"author_headline":"Deploying enterprise agents in production / CTO / SWE Leader / GVP @ Publicis Sapient","author_name":"Ravi Evani\n              \n                \n                   \n    \n      \n    \n    \n      \n    \n\n • You","author_profile_image_url":"https://media.licdn.com/dms/image/v2/C4E03AQGNeJRorEd2Nw/profile-displayphoto-shrink_100_100/profile-displayphoto-shrink_100_100/0/1569287114631?e=1784160000&v=beta&t=tJDZC7EXWnlgIIf8kF7fBCajhF-HEgzNXnz_IIkjqW8","author_profile_url":"https://www.linkedin.com/in/ravievani","comment_count":5,"has_image":true,"impression_count":3455,"is_article":false,"is_my_post":true,"is_video":false,"post_image_url":"https://media.licdn.com/dms/image/v2/D4E22AQFQHqwXp9LtSw/feedshare-shrink_800/B4EZqCvDzaKYAg-/0/1763129966991?e=1784160000&v=beta&t=6-o96sdmVQ2KQrhbPix-tvGIhTzlqllxPkauJjDc-7I","post_text":"Excited to be sharing the stage at AWS re:Invent with two of AWS Travel & Hospitality Leaders Clare Ward & Tedd Evers. We'll be discussing actionable insights on how Travel & Hospitality brands can differentiate themselves in a world where AI agents and answering engines sit between them and their customers. I look forward to seeing you there!\n\nPublicis Sapient, Amazon Web Services (AWS)","post_url":"https://www.linkedin.com/feed/update/urn:li:activity:7395103076938010625","post_urn":"urn:li:activity:7395103076938010625","posted_hours_ago":5040,"posted_time":"2025-11-26","posted_time_raw":"7mo","reaction_count":84,"reaction_types":"LIKE, EMPATHY, PRAISE","repost_count":3,"source":"activity","video_url":null},{"article_description":null,"article_title":null,"article_url":null,"author_headline":"Deploying enterprise agents in production / CTO / SWE Leader / GVP @ Publicis Sapient","author_name":"Ravi Evani\n              \n                \n                   \n    \n      \n    \n    \n      \n    \n\n • You","author_profile_image_url":"https://media.licdn.com/dms/image/v2/C4E03AQGNeJRorEd2Nw/profile-displayphoto-shrink_100_100/profile-displayphoto-shrink_100_100/0/1569287114631?e=1784160000&v=beta&t=tJDZC7EXWnlgIIf8kF7fBCajhF-HEgzNXnz_IIkjqW8","author_profile_url":"https://www.linkedin.com/in/ravievani","comment_count":1,"has_image":false,"impression_count":1060,"is_article":false,"is_my_post":true,"is_video":false,"post_image_url":null,"post_text":"Travel Brands Are Building on AI. Hackers Are Too.\n\nCyber attackers just tested a new playbook: tricking an AI like Claude into thinking it wasn’t an assistant but a human engineer building a defense system. That “role shift” bypassed guardrails and unlocked system access. They combined this with a tactic called compartmentalization, by splitting instructions across prompts to stay under the radar.\n\nThis exposed how AI agents can be manipulated much like people. For an industry like travel and hospitality that's building towards customer service bots and pricing engines that run on AI agents, this is more than theoretical.\n\nCustomer-facing bots are now a frontline security concern. With a few clever prompts, attackers have gotten airline chatbots to leak coupon codes and book free flights. These bots, if left unprotected, can be manipulated to give out guest data, cancel bookings, or even expose internal credentials. Meanwhile, the pricing models that power room rates, flight fares, and dynamic packages can be quietly reverse-engineered using AI scripts, one prompt at a time. It’s slow, stealthy theft of core IP.\n\nThis is a case for architecture. AI systems in travel should be built for the same threat landscape as human agents: enforce roles, validate actions, and audit behavior. That means using retrieval-based architectures that cite verifiable data, building strong permission layers around bots, and watching for logic-level anomalies, not just technical ones.","post_url":"https://www.linkedin.com/feed/update/urn:li:activity:7394849382820454401","post_urn":"urn:li:activity:7394849382820454401","posted_hours_ago":5040,"posted_time":"2025-11-26","posted_time_raw":"7mo","reaction_count":9,"reaction_types":"INTEREST, LIKE, EMPATHY","source":"activity","video_url":null},{"article_description":null,"article_title":null,"article_url":null,"author_headline":"Deploying enterprise agents in production / CTO / SWE Leader / GVP @ Publicis Sapient","author_name":"Ravi Evani\n              \n                \n                   \n    \n      \n    \n    \n      \n    \n\n • You","author_profile_image_url":"https://media.licdn.com/dms/image/v2/C4E03AQGNeJRorEd2Nw/profile-displayphoto-shrink_100_100/profile-displayphoto-shrink_100_100/0/1569287114631?e=1784160000&v=beta&t=tJDZC7EXWnlgIIf8kF7fBCajhF-HEgzNXnz_IIkjqW8","author_profile_url":"https://www.linkedin.com/in/ravievani","comment_count":3,"has_image":false,"impression_count":2253,"is_article":false,"is_my_post":true,"is_video":false,"post_image_url":null,"post_text":"ChatGPT has changed how travelers ask questions. The average prompt is around 25 words—>four times longer than a traditional Google search. That means travelers aren’t just typing “best hotels in Paris”; they’re asking, “Which Paris hotels have balconies, vegan breakfast, and early check-in near Montmartre?” These are new, hyper-specific questions;many that have never existed in search data before. The long tail that once powered SEO is back, and it’s even longer in chat.\n\nSo, brands that publish direct, conversational answers to niche traveler questions, structured in a way machines can understand have a better chance of showing up in answer engine shortlists.\n\nAI can help travel & hospitality brands do this at scale. Use LLMs to mine customer chats, reviews, and FAQs for the top 200 specific questions guests actually ask. Then use retrieval-augmented generation to draft precise, verified, machine understandable answers that cite your own product data. The early movers here are likely to have an asymmetric advantage compared to those who ‘wait' to see how the tech will evolve.","post_url":"https://www.linkedin.com/feed/update/urn:li:activity:7394098232794198016","post_urn":"urn:li:activity:7394098232794198016","posted_hours_ago":5040,"posted_time":"2025-11-26","posted_time_raw":"7mo","reaction_count":29,"reaction_types":"LIKE, INTEREST","source":"activity","video_url":null},{"article_description":null,"article_title":null,"article_url":null,"author_headline":"Deploying enterprise agents in production / CTO / SWE Leader / GVP @ Publicis Sapient","author_name":"Ravi Evani\n              \n                \n                   \n    \n      \n    \n    \n      \n    \n\n • You","author_profile_image_url":"https://media.licdn.com/dms/image/v2/C4E03AQGNeJRorEd2Nw/profile-displayphoto-shrink_100_100/profile-displayphoto-shrink_100_100/0/1569287114631?e=1784160000&v=beta&t=tJDZC7EXWnlgIIf8kF7fBCajhF-HEgzNXnz_IIkjqW8","author_profile_url":"https://www.linkedin.com/in/ravievani","comment_count":2,"has_image":true,"impression_count":2057,"is_article":false,"is_my_post":true,"is_video":false,"post_image_url":"https://media.licdn.com/dms/image/v2/D4E22AQFKCMn4ntGntw/feedshare-shrink_800/B4EZobla5sIMAg-/0/1761399391025?e=1784160000&v=beta&t=Lb3fm46hEhXMWCmtV2PbpUvnFinDe_qXeyYZeYaccZM","post_text":"The hard part isn’t the stack. It’s the semantics.\n\nClients often ask me something like this: “We already have SharePoint and we want to use AI to better mine knowledge from it — and also to create documents that follow our templates, standards, and business context. What is the tech stack we need?\"\n\nMy answer is usually the same: 'The hard part isn’t the stack. It’s the semantics. Because if it were just the stack, installing Microsoft Copilot would solve it for everyone.\"\n\nFrameworks and plumbing are table stakes. What actually makes or breaks an enterprise Copilot is what happens between the tools — the meaning, the intent, and the interpretation.\n\nWhat’s actually hard\n\n➜ Ontology & vocabulary: Agreeing on what things mean. Defining entities, relationships, and synonyms that everyone shares.\n➜ Context engineering: Deciding what evidence to pull, at what depth, under which permissions, and with what freshness.\n➜ Prompt contracts: Stable, testable prompt structures for each task or persona.\n➜ Meaningful relevance: Ensuring what’s retrieved actually answers the question, not just matches a keyword.\n➜ Evaluations: Building repeatable ways to test grounding, citation accuracy, and output quality.\n➜ Persona fit: Adjusting tone, context depth, and risk to the person asking.\n➜ Governance: Tracking drift, versioning prompts and models, and managing escalation paths.\n\nHow to make it work\n\n➜ Map your domain: With SMEs, codify entities, synonyms, and disambiguation rules.\n➜ Codify retrieval policy: Define evidence types, chunking rules, recency, and security trimming.\n➜ Standardize prompt templates: One per task, with typed variables and unit tests.\n➜ Add quality gates: Automatic checks for grounding, citation, contradiction, and leakage.\n➜ Build an evaluation harness: Gold tasks, rubric scoring for correctness and grounding.\n\nThe real challenge isn’t integrating APIs or spinning up an LLM.\nIt’s making sure the knowledge retrieved carries meaning, the generation reflects context, and the output fits the user asking for it.\n\nThat’s where AI stops being a toy — and starts delivering business value.","post_url":"https://www.linkedin.com/feed/update/urn:li:activity:7387844519582654464","post_urn":"urn:li:activity:7387844519582654464","posted_hours_ago":5760,"posted_time":"2025-10-26","posted_time_raw":"8mo","reaction_count":39,"reaction_types":"LIKE, INTEREST, PRAISE","source":"activity","video_url":null},{"article_description":null,"article_title":null,"article_url":null,"author_headline":"Deploying enterprise agents in production / CTO / SWE Leader / GVP @ Publicis Sapient","author_name":"Ravi Evani\n              \n                \n                   \n    \n      \n    \n    \n      \n    \n\n • You","author_profile_image_url":"https://media.licdn.com/dms/image/v2/C4E03AQGNeJRorEd2Nw/profile-displayphoto-shrink_100_100/profile-displayphoto-shrink_100_100/0/1569287114631?e=1784160000&v=beta&t=tJDZC7EXWnlgIIf8kF7fBCajhF-HEgzNXnz_IIkjqW8","author_profile_url":"https://www.linkedin.com/in/ravievani","comment_count":2,"has_image":true,"impression_count":2264,"is_article":false,"is_my_post":true,"is_video":true,"post_image_url":"https://media.licdn.com/dms/image/v2/D4E05AQHd2pHcxwJiNQ/videocover-low/B4EZoRGTYiHcB8-/0/1761223468973?e=1783065600&v=beta&t=bZU8Z0LJ5S71GbSHDP1_eLxRejvNcoTwt7g67FEgjT4","post_text":"Don’t let ChatGPT decide which data fields to leverage from your travel products! Do it yourself with an intent catalog--a structured map from traveler intents to the exact product bundles, partner packages, and rules you want the AI agent to use.\n\nWhat’s an “intent catalog”?\n\nA machine‑readable list of traveler intents (e.g., Family City Break, Accessible Weekend, Bleisure with Workspace) published by a travel brand or distribution channel in order to differentiate its products to AI agents.\n\nEach each intent points to a set of data fields that a brand can package its travel products. It contains the :\n\n➜ Required attributes (must‑haves)\n➜ Preferred attributes (nice‑to‑haves + weights)\n➜ Disqualifiers (auto‑no)\n➜ Bundles (rooms + add‑ons + partner packages)\n➜ Rules (pricing fences, guarantees, refund windows)\n➜ Deep links (prefilled booking links for the exact setup)\n\nWhen both humans and AI see a single packaged answer, decision friction drops. Scattered “offers vs details vs packages” pages create churn—for people and agents.\n\nWhat this gives AI agents, answering engines and AI browsers:\n\n➜ Clarity: “Family City Break” returns a ready‑to‑book package, not 20 tabs.\n➜ Control: You set the rules and guarantees; the agent isn’t guessing which fields matter.\n➜ Speed: Deep links prefill dates/guests/rate codes; add‑ons are priced SKUs, not special requests.\n➜ Consistency: The same intent works across website, call center, OTA, and AI agent channels.\n\nBottom Line: Build an intent catalog, package your value at the intent level, and publish it as data. You’ll steer what AI agents promote—and make it easier for human advisors to sell the same, in one view.","post_url":"https://www.linkedin.com/feed/update/urn:li:activity:7387106722726703104","post_urn":"urn:li:activity:7387106722726703104","posted_hours_ago":5760,"posted_time":"2025-10-26","posted_time_raw":"8mo","reaction_count":33,"reaction_types":"LIKE","source":"activity","video_url":"https://media.licdn.com/dms/image/v2/D4E05AQHd2pHcxwJiNQ/videocover-low/B4EZoRGTYiHcB8-/0/1761223468973?e=1783065600&v=beta&t=bZU8Z0LJ5S71GbSHDP1_eLxRejvNcoTwt7g67FEgjT4"},{"article_description":null,"article_title":null,"article_url":null,"author_headline":"Deploying enterprise agents in production / CTO / SWE Leader / GVP @ Publicis Sapient","author_name":"Ravi Evani\n              \n                \n                   \n    \n      \n    \n    \n      \n    \n\n • You","author_profile_image_url":"https://media.licdn.com/dms/image/v2/C4E03AQGNeJRorEd2Nw/profile-displayphoto-shrink_100_100/profile-displayphoto-shrink_100_100/0/1569287114631?e=1784160000&v=beta&t=tJDZC7EXWnlgIIf8kF7fBCajhF-HEgzNXnz_IIkjqW8","author_profile_url":"https://www.linkedin.com/in/ravievani","comment_count":1,"has_image":true,"impression_count":1381,"is_article":false,"is_my_post":true,"is_video":true,"post_image_url":"https://media.licdn.com/dms/image/v2/D4E05AQEi8H0oaAh7Jw/videocover-low/B4EZoLwB.VKkCA-/0/1761133748799?e=1783065600&v=beta&t=JZWRiQj-hOAjsmC1iVP1YRP4hsuq_Mmf5Vhf9JU0J14","post_text":"hashtag#ChatGPT Atlas browser collapses the trip funnel into the page. Here’s what changes--and what hashtag#Travel and hashtag#Hospitality brands must do now.\n\nExample Guest Intent: \"Weekend in Lisbon, toddler-friendly hotel, walkable to trams, late checkout, EV charging, under €250/night\"\n\n① On-page answers (sidebar reads your page) → Make facts extractable\nWhat changes: Guests see EV chargers, crib policy, late-checkout—without leaving the hotel page.\nDo now: Encode policies in JSON-LD/OTA fields, not prose; keep one canonical facts block (fees, times, capacities); add a “Request crib / Late checkout” deep link the sidebar can draft to.\n\n② Agent mode for multi-step tasks → Treat your site like an API\nWhat changes: Atlas (agents) will start to open several hotels, check rates, compare inclusions, and start checkout for the guest.\nDo now: Ship deep links that prefill dates/guests/rate codes; make add-ons (crib, EV parking, late checkout) bookable SKUs; support rate holds, idempotent cart actions, and clear cancellation fields.\n\n③ Smarter search + tabbed results in one place → Win the compare view\nWhat changes: Users pivot links/images/news inside ChatGPT; weak pages get skipped.\nDo now: Tight titles/meta; machine-readable FAQs (FAQPage), stable IDs, canonical URLs; publish availability/price/policy via feeds so snippets stay accurate; avoid burying key facts behind PDFs or images.\n\n④ Maps & logistics in context → Publish location signals, not adjectives\nWhat changes: Sidebar summarizes walking times, tram proximity, neighborhood trade-offs.\nDo now: Expose lat/lng, nearest lines/stops, typical walk times, accessibility (stroller/step-free), parking rules, EV plugTypes/maxKW/fees. Keep these fields current in property pages and partner feeds.\n\n⑤ Autofill at checkout → Remove every ounce of friction\nWhat changes: Stored addresses, passkeys, and cards shrink form time.\nDo now: Support passkeys + guest checkout; minimize required fields; show full price early (taxes/fees); instant refunds/voids via API; graceful 3-D Secure; clear add-on pricing and inventory guarantees.\n\n⑥ Memory (opt-in) → Be easy to resume\nWhat changes: Atlas resurfaces last-viewed hotels and suggests next steps.\nDo now: Use stable property/room IDs and “resume quote” deep links; keep content consistent (names/images); expose a lightweight quote-state endpoint so sessions can be restored reliably.","post_url":"https://www.linkedin.com/feed/update/urn:li:activity:7386730355589869568","post_urn":"urn:li:activity:7386730355589869568","posted_hours_ago":5760,"posted_time":"2025-10-26","posted_time_raw":"8mo","reaction_count":11,"reaction_types":"LIKE","source":"activity","video_url":"https://media.licdn.com/dms/image/v2/D4E05AQEi8H0oaAh7Jw/videocover-low/B4EZoLwB.VKkCA-/0/1761133748799?e=1783065600&v=beta&t=JZWRiQj-hOAjsmC1iVP1YRP4hsuq_Mmf5Vhf9JU0J14"},{"article_description":null,"article_title":null,"article_url":null,"author_headline":"Deploying enterprise agents in production / CTO / SWE Leader / GVP @ Publicis Sapient","author_name":"Ravi Evani\n              \n                \n                   \n    \n      \n    \n    \n      \n    \n\n • You","author_profile_image_url":"https://media.licdn.com/dms/image/v2/C4E03AQGNeJRorEd2Nw/profile-displayphoto-shrink_100_100/profile-displayphoto-shrink_100_100/0/1569287114631?e=1784160000&v=beta&t=tJDZC7EXWnlgIIf8kF7fBCajhF-HEgzNXnz_IIkjqW8","author_profile_url":"https://www.linkedin.com/in/ravievani","comment_count":3,"has_image":true,"impression_count":1568,"is_article":false,"is_my_post":true,"is_video":true,"post_image_url":"https://media.licdn.com/dms/image/v2/D4E05AQGikst4crvpkA/videocover-high/B4EZmeKTJOIIB8-/0/1759295138309?e=1783065600&v=beta&t=q367PsyxBC76SvSsPFBOGCvIxWCZnpj16-iHVLXB6nM","post_text":"AI trip planners are becoming the default concierge. Unlike humans, they don’t “browse” your site; they rank machine-readable facts, availability, policies, and proof. If your differentiation isn’t legible to machines, you won’t make the shortlist--no matter how good the brand film is.\n\nHere’s a compact playbook for Travel & Hospitality leaders to win that agent-led demand, from my talk @Destination AI on \"Winning Brand Choice When AI Agents Do the Picking\":\n\n① Make your brand machine-visible\n➜ Publish a consistent “digital twin” of every property/room/amenity. Use structured data (JSON-LD, OTA/Lodging) across pages, feeds, and partner MCPs so agents can parse and reason about you.\n\n② Turn positioning into fields, not adjectives\n➜ “Family-friendly” becomes attributes: connectingRoomsGuaranteed=True, cribsAvailable=True, kidsMenuHours=True.\n➜ “Remote-work ready” becomes wifiMinThroughputMbps=150, inRoomDesk=True, quietHours=\"22:00 to 07:00\".\n\nEncode your promise--don’t just describe it.\n\n③ Build at the intent layer\nMap traveler intents to bundles and rules:\n➜ Family city break → interconnecting rooms + late checkout + stroller access + attraction tickets\n➜ Expose these via MCPs / A2A so agents can assemble itineraries with confidence.\n\n④ Publish verifiable claims to agents\n➜ Real Wi-Fi speeds, check-in wait times, refund SLAs, sustainability and safety certifications. Signed, time-stamped facts reduce perceived risk and lift shortlist share.\n\n⑤ Syndicate reviews and Q&A.\n➜ Answer common questions in machine-readable form. Be active on social (such as reddit, as LLMs feed off those too!) Bundle with partners to power cross-brand, intent-ready offers.\n\nYour goal in an agentic AI world: To make your differentiation legible to machines, verifiable to agents and irresistible to humans.\n\nP.S. Credit goes to the thinkers at Publicis Sapient who came up with these ideas and their execution. I just presented these in a Travel & Hospitality context.","post_url":"https://www.linkedin.com/feed/update/urn:li:activity:7379018737405935616","post_urn":"urn:li:activity:7379018737405935616","posted_hours_ago":5760,"posted_time":"2025-10-26","posted_time_raw":"8mo","reaction_count":29,"reaction_types":"LIKE, EMPATHY, PRAISE","repost_count":1,"source":"activity","video_url":"https://media.licdn.com/dms/image/v2/D4E05AQGikst4crvpkA/videocover-high/B4EZmeKTJOIIB8-/0/1759295138309?e=1783065600&v=beta&t=q367PsyxBC76SvSsPFBOGCvIxWCZnpj16-iHVLXB6nM"},{"article_description":null,"article_title":null,"article_url":null,"author_headline":"Deploying enterprise agents in production / CTO / SWE Leader / GVP @ Publicis Sapient","author_name":"Ravi Evani\n              \n                \n                   \n    \n      \n    \n    \n      \n    \n\n • You","author_profile_image_url":"https://media.licdn.com/dms/image/v2/C4E03AQGNeJRorEd2Nw/profile-displayphoto-shrink_100_100/profile-displayphoto-shrink_100_100/0/1569287114631?e=1784160000&v=beta&t=tJDZC7EXWnlgIIf8kF7fBCajhF-HEgzNXnz_IIkjqW8","author_profile_url":"https://www.linkedin.com/in/ravievani","comment_count":3,"has_image":true,"impression_count":3148,"is_article":false,"is_my_post":true,"is_video":true,"post_image_url":"https://media.licdn.com/dms/image/v2/D4E05AQF-0ue51G5dbg/videocover-high/B4EZmZ.SMPHgB8-/0/1759224873762?e=1783065600&v=beta&t=6ypXd_A-htuP0FIkCESYLDkDWNNv-Yie5e8B_6B9L5E","post_text":"Engineers and PMs: traditional app dev is turning into a commodity. Your value is in building AI agents—not competing with them.\n\nShovel vs. excavator: don’t try to out-dig an excavator; design the excavator. As 2026 approaches, this means learning to design, evaluate, and ship agents that pursue goals, call tools, and improve over time. Be the person who builds the agents—the excavators of our field.\n\nWhy? Because:\n➜ Code is becoming cheap; but outcomes aren’t. Scaffolds, templates, and copilots collapse the cost of “just build the feature.” Business impact still needs brains.\n\n➜ Interfaces are moving up-stack. Agents operate on goals and tools, not screens and endpoints.\n\n➜ Ops are the new product. Reliability, evals, cost/latency budgets—this is where real engineering advantage shows.","post_url":"https://www.linkedin.com/feed/update/urn:li:activity:7378723943953625088","post_urn":"urn:li:activity:7378723943953625088","posted_hours_ago":5760,"posted_time":"2025-10-26","posted_time_raw":"8mo","reaction_count":51,"reaction_types":"LIKE, INTEREST, EMPATHY","repost_count":1,"source":"activity","video_url":"https://media.licdn.com/dms/image/v2/D4E05AQF-0ue51G5dbg/videocover-high/B4EZmZ.SMPHgB8-/0/1759224873762?e=1783065600&v=beta&t=6ypXd_A-htuP0FIkCESYLDkDWNNv-Yie5e8B_6B9L5E"},{"article_description":null,"article_title":null,"article_url":null,"author_headline":"Deploying enterprise agents in production / CTO / SWE Leader / GVP @ Publicis Sapient","author_name":"Ravi Evani\n              \n                \n                   \n    \n      \n    \n    \n      \n    \n\n • You","author_profile_image_url":"https://media.licdn.com/dms/image/v2/C4E03AQGNeJRorEd2Nw/profile-displayphoto-shrink_100_100/profile-displayphoto-shrink_100_100/0/1569287114631?e=1784160000&v=beta&t=tJDZC7EXWnlgIIf8kF7fBCajhF-HEgzNXnz_IIkjqW8","author_profile_url":"https://www.linkedin.com/in/ravievani","comment_count":2,"has_image":true,"impression_count":1187,"is_article":false,"is_my_post":true,"is_video":false,"post_image_url":"https://media.licdn.com/dms/image/v2/D4E22AQF0sl85U7Lpzw/feedshare-shrink_800/B4EZcjOUCtHcAo-/0/1748642645458?e=1784160000&v=beta&t=B3A9FW-JeZxyuTIZC-W0NGvYesySjZyeLSihGdwKzh4","post_text":"Restaurant Technologists: Here’s a real in-restaurant use case where today's AI can drive impact without needing to overhaul your tech stack.\n\n*Problem Statement*\nLunch-rush drive-thru throughput swings by ±25 %. Cars stack, guests bail, and you bleed revenue.\n\nAssume your stores already have:\n⇥ Two security-grade cameras on the lane\n⇥ A kitchen display system (KDS)\n⇥ A dated POS orders feed that drops into an on-prem SQL box every 15 minutes\n\nNone of that is “AI-ready,” yet it’s enough.\n\n*The AI play*\n\n1. Perception layer: A lightweight vision model runs at the edge, counting cars and classifying order size from the existing cameras. The \"Car counter\" could run on-prem/edge, like in this example: https://bit.ly/43zZY7O\n\n2. Prediction layer: A small LLM-plus-tabular model fuses the live car count with POS history to forecast queue time, cooking load, and when a second lane should open; updated every 60 seconds.\n\n3. Action layer: The model pushes three micro-prompts:\n\n⇥ Crew headsets: “Open lane 2 now: projected wait hits 4 min in 90 sec.”\n⇥ KDS: Re-sequence grill tickets so the long-cook items start 45 sec earlier.\n⇥ Digital menu board: Auto-feature quicker items (e.g., nuggets) to shave cook time.\n\nIn a few weeks this AI-driven system could increase cars served per hour by 20% and cut order abandonment in half—without new hardware or major systems changes.\n\nWhy this is realistic:\n\n⇥ No pristine data lake required. Vision + POS delta files are messy but good enough.\n⇥ Keeps people in the loop. Managers still decide; AI just flags the window.\n⇥ Scales fast. One containerized edge package pushes to every store overnight.\n\nAnd all of this can be accomplished today with lightweight open source models on Hugging Face!\n\nThat’s profitable AI—built on the chaos you already have, driving enterprise-level results without a big lift.","post_url":"https://www.linkedin.com/feed/update/urn:li:activity:7334338846244982785","post_urn":"urn:li:activity:7334338846244982785","posted_hours_ago":8760,"posted_time":"2025-06-26","posted_time_raw":"1yr","reaction_count":16,"reaction_types":"LIKE","source":"activity","video_url":null},{"article_description":null,"article_title":null,"article_url":null,"author_headline":"Deploying enterprise agents in production / CTO / SWE Leader / GVP @ Publicis Sapient","author_name":"Ravi Evani\n              \n                \n                   \n    \n      \n    \n    \n      \n    \n\n • You","author_profile_image_url":"https://media.licdn.com/dms/image/v2/C4E03AQGNeJRorEd2Nw/profile-displayphoto-shrink_100_100/profile-displayphoto-shrink_100_100/0/1569287114631?e=1784160000&v=beta&t=tJDZC7EXWnlgIIf8kF7fBCajhF-HEgzNXnz_IIkjqW8","author_profile_url":"https://www.linkedin.com/in/ravievani","comment_count":1,"has_image":true,"impression_count":3871,"is_article":false,"is_my_post":true,"is_video":true,"post_image_url":"https://media.licdn.com/dms/image/v2/D4E05AQGAp3xA37uHqQ/feedshare-thumbnail_720_1280/B4EZccNqa2HIAs-/0/1748525034595?e=1783065600&v=beta&t=93v4iZmQCzh2B7ZzUP6vF12mCxLEIhegNMhIoZDg8bE","post_text":"How to Spot When AI Is Confidently Wrong ⇓\n\nLLMs are fluent. Sometimes dangerously so. They can be confidently wrong, just like smart, eloquent humans.\n\nHere’s what I’ve learned about navigating that risk:\nDon’t prompt and hope. Critically co-create. And that means staying in the loop, asking the right questions, and knowing when to challenge what sounds “about right.”\n\nHere’s what that looks like in practice:\n\n↛ Interrogate confidence.\nWhen an AI (or a person) sounds too smooth, I ask:\nWhat might we be missing?\nWhat’s this assuming?\nWhat would break this logic?\n\n↛ Check alignment, not just output.\nDoes the response answer the right question? Or just the one it was easiest to answer confidently?\n\n↛ Make “pause and probe” a team habit.\nIn a recent AI Engineering training we did, this was a recurring theme. We walked through examples of AI confidently hallucinating details in system designs, and it was the engineer who asked “are we providing it the full context?” who unlocked the real insight.\n\nThis kind of thinking isn’t just nice to have anymore. It’s a new literacy for better outcomes with AI.","post_url":"https://www.linkedin.com/feed/update/urn:li:activity:7333845641040691200","post_urn":"urn:li:activity:7333845641040691200","posted_hours_ago":8760,"posted_time":"2025-06-26","posted_time_raw":"1yr","reaction_count":31,"reaction_types":"LIKE, EMPATHY","source":"activity","video_url":"https://media.licdn.com/dms/image/v2/D4E05AQGAp3xA37uHqQ/feedshare-thumbnail_720_1280/B4EZccNqa2HIAs-/0/1748525034595?e=1783065600&v=beta&t=93v4iZmQCzh2B7ZzUP6vF12mCxLEIhegNMhIoZDg8bE"},{"article_description":null,"article_title":null,"article_url":null,"author_headline":"Deploying enterprise agents in production / CTO / SWE Leader / GVP @ Publicis Sapient","author_name":"Ravi Evani\n              \n                \n                   \n    \n      \n    \n    \n      \n    \n\n • You","author_profile_image_url":"https://media.licdn.com/dms/image/v2/C4E03AQGNeJRorEd2Nw/profile-displayphoto-shrink_100_100/profile-displayphoto-shrink_100_100/0/1569287114631?e=1784160000&v=beta&t=tJDZC7EXWnlgIIf8kF7fBCajhF-HEgzNXnz_IIkjqW8","author_profile_url":"https://www.linkedin.com/in/ravievani","comment_count":1,"has_image":false,"impression_count":1557,"is_article":false,"is_my_post":true,"is_video":false,"post_image_url":null,"post_text":"Most people in large enterprises aren’t motivated by executive statements about “performance gains” or “cost savings” with AI. ⇓\n\nEnterprise leaders might feel they are doing their part by unleashing AI “copilots” to their people. But that's far from enough.\n\nSimply rolling out tools is like bringing excavators to people who’ve always dug with shovels. http://bit.ly/44QHdiN.\n\nThe value isn’t in *having* an AI—it’s in how *persistently* and *effectively* your people are using it, which means that this is a transformation of habits, not just skills.\n\nHere is what I have learned:\n\n👉 1. Leaders must be hands-on practitioners\nTeams take their cue from what leaders *do*, not what they say. If you’re not actively using AI in your own work, whether it’s drafting, reviewing, exploring, or simplifying tasks, it’s hard for your people to see where the real value lies.\n\nFrame the ability to steer AI as a leadership capability, not a tech skill. Build enough firsthand experience to guide others with credibility. Share what you’re learning, and make AI part of how you work—not just how you talk about work. Also, this should be genuine, not polished showcases.\n\n👉 2. Make grass-roots efforts visible, even when it’s messy\nMany are experimenting with AI privately. But people are hesitant to share early wins—worried it’ll lead to more work, added pressure, unrealistic expectations, or scrutiny if results can’t be repeated.\n\nTo surface quiet wins, you need to lower the stakes of sharing. Use familiar forums: sprint retros, town halls, 1:1s—where people can talk about what they’ve tried, not just what worked. Highlight process stories internally so people know that learning counts, even when outcomes aren’t remarkable or consistent.\n\n👉 3. Codify what works. Scale it.\nAI workflows usually start small and scattered, but without structure, those insights don’t spread. Teams might solve the same problems repeatedly, missing chances to build on each other’s progress.\n\nTo scale grassroots wins, capture the essence of what’s working and turn it into easily accessible resources; e.g., build a centralized “prompt library” portal where people can share their prompts. Establish lightweight methods, such as tagging prompts and AI solutions by tech stack, use case, or outcome, so they become discoverable and reusable across teams.\n\n👉 4. Train your people for clarity, not just capability\nThe inherent challenge of AI is that it gives unlimited choices—so the skill that matters now is knowing how to frame the right questions, cut through ambiguity, and converge quickly.\n\nFocus training on clarity: logical thinking, structured reasoning, and precise communication. Use prompts for planning and design, not just to execute. Teach teams to question AI outputs and weigh options before choosing. The goal is to transition from memorization of how to use AI tools to building minds that can direct them with precision.\n\n--\n\nWhat’s helping your people make the shift?\n\nhashtag#LIPostingDayMay","post_url":"https://www.linkedin.com/feed/update/urn:li:activity:7333175184247382016","post_urn":"urn:li:activity:7333175184247382016","posted_hours_ago":8760,"posted_time":"2025-06-26","posted_time_raw":"1yr","reaction_count":28,"reaction_types":"LIKE, EMPATHY, PRAISE","source":"activity","video_url":null},{"article_description":null,"article_title":null,"article_url":null,"author_headline":"Deploying enterprise agents in production / CTO / SWE Leader / GVP @ Publicis Sapient","author_name":"Ravi Evani\n              \n                \n                   \n    \n      \n    \n    \n      \n    \n\n • You","author_profile_image_url":"https://media.licdn.com/dms/image/v2/C4E03AQGNeJRorEd2Nw/profile-displayphoto-shrink_100_100/profile-displayphoto-shrink_100_100/0/1569287114631?e=1784160000&v=beta&t=tJDZC7EXWnlgIIf8kF7fBCajhF-HEgzNXnz_IIkjqW8","author_profile_url":"https://www.linkedin.com/in/ravievani","comment_count":2,"has_image":true,"impression_count":2281,"is_article":false,"is_my_post":true,"is_video":true,"post_image_url":"https://media.licdn.com/dms/image/v2/D4D05AQFgoLDE3-Xj2w/videocover-high/B4DZSSS4QEG4Bw-/0/1737621225668?e=1783069200&v=beta&t=WcfugZtPso34YrITFdOfhQLMKZUCYDL_zg9c6A4CjSs","post_text":"The two core plays for AI agents in marketing operations.","post_url":"https://www.linkedin.com/feed/update/urn:li:activity:7288111712006787072","post_urn":"urn:li:activity:7288111712006787072","posted_hours_ago":8760,"posted_time":"2025-06-26","posted_time_raw":"1yr","reaction_count":29,"reaction_types":"LIKE, INTEREST","source":"activity","video_url":"https://media.licdn.com/dms/image/v2/D4D05AQFgoLDE3-Xj2w/videocover-high/B4DZSSS4QEG4Bw-/0/1737621225668?e=1783069200&v=beta&t=WcfugZtPso34YrITFdOfhQLMKZUCYDL_zg9c6A4CjSs"},{"article_description":null,"article_title":null,"article_url":null,"author_headline":"Deploying enterprise agents in production / CTO / SWE Leader / GVP @ Publicis Sapient","author_name":"Ravi Evani\n              \n                \n                   \n    \n      \n    \n    \n      \n    \n\n • You","author_profile_image_url":"https://media.licdn.com/dms/image/v2/C4E03AQGNeJRorEd2Nw/profile-displayphoto-shrink_100_100/profile-displayphoto-shrink_100_100/0/1569287114631?e=1784160000&v=beta&t=tJDZC7EXWnlgIIf8kF7fBCajhF-HEgzNXnz_IIkjqW8","author_profile_url":"https://www.linkedin.com/in/ravievani","comment_count":2,"has_image":true,"impression_count":2395,"is_article":false,"is_my_post":true,"is_video":true,"post_image_url":"https://media.licdn.com/dms/image/v2/D4E05AQEKZ3hNOG1YOA/videocover-high/B4EZcxOm0OHYAA-/0/1748877615910?e=1783008000&v=beta&t=tkATlcEtj4508mxFDUe1Z_gSHS9VZVoFMODAZdeTsdI","post_text":"Yes, vibecoding an enterprise chatbot is *easy* now. But when your AI gives vague or wrong answers, you don’t have a code problem ⇒ you have a product and domain collaboration problem. Here is how to fix it.\n\nIn this example*, I click into a vacation property listing, open the chatbot, and ask:\n\n✅ “Are pets allowed?” — Good answer. It confirms yes and tags me as a pet-friendly traveler.\n❌ “Can I throw a party?” — No answer. The system says party / event rules aren’t specified.\n❌ “Is the beach nearby safe for surfing?” — Vague again. Worse, it incorrectly logs my preference as just “beach nearby.” That’s not what I asked.\n\nThis is the user “experience” gap.\n\nThe problem isn’t building the bot. It’s aligning the bot with real-world expectations.\n\nThe heavy lift here is that with AI, Product teams need to work side by side with people who know the domain — the ones who understand what good answers look like, what data needs to be pulled in, and what nuance matters.\n\n⇒ It’s not enough to classify a user statement. You have to validate the classification is correct—at scale!\n⇒ It’s not enough to answer a question. You have to know what’s missing in the underlying data—at scale!\n\nGetting this right means building with domain experts from the start—continuously validating, refining, and iterating alongside them, not just building for them.\n\n—-\n* built with Sapient Slingshot","post_url":"https://www.linkedin.com/feed/update/urn:li:activity:7335324402823172100","post_urn":"urn:li:activity:7335324402823172100","posted_hours_ago":8760,"posted_time":"2025-06-25","posted_time_raw":"1yr","reaction_count":25,"reaction_types":"LIKE, EMPATHY, INTEREST","repost_count":1,"source":"activity","video_url":"https://media.licdn.com/dms/image/v2/D4E05AQEKZ3hNOG1YOA/videocover-high/B4EZcxOm0OHYAA-/0/1748877615910?e=1783008000&v=beta&t=tkATlcEtj4508mxFDUe1Z_gSHS9VZVoFMODAZdeTsdI"},{"article_description":null,"article_title":null,"article_url":null,"author_headline":"Deploying enterprise agents in production / CTO / SWE Leader / GVP @ Publicis Sapient","author_name":"Ravi Evani\n              \n                \n                   \n    \n      \n    \n    \n      \n    \n\n • You","author_profile_image_url":"https://media.licdn.com/dms/image/v2/C4E03AQGNeJRorEd2Nw/profile-displayphoto-shrink_100_100/profile-displayphoto-shrink_100_100/0/1569287114631?e=1784160000&v=beta&t=tJDZC7EXWnlgIIf8kF7fBCajhF-HEgzNXnz_IIkjqW8","author_profile_url":"https://www.linkedin.com/in/ravievani","comment_count":6,"has_image":true,"impression_count":11463,"is_article":false,"is_my_post":true,"is_video":false,"post_image_url":"https://media.licdn.com/dms/image/v2/D4E22AQGZKPXansQtoQ/feedshare-shrink_800/B4EZbzJQfUHYAk-/0/1747836016717?e=1784160000&v=beta&t=cRnFA0erRiocIjd_fIlJUd3MqrxLxUYV4TENAOI56gs","post_text":"Great meetup with our engineering leads in Toronto, where we unpacked five core mental models for engineers to master when working with AI ⤵\n\n1) Words are your interface to intelligence.\nThe way you phrase a request directly shapes the outcome. Express with clarity, precision, intent, and context. Whether you’re prompting an AI or giving it feedback, your language becomes the control surface for what gets built.\n\n2) Confidence is not the same as correctness.\nLLMs can be confidently wrong, just like eloquent humans. Don’t prompt and hope—critically co-create. Question assumptions, look for what’s missing, and stay engaged in the reasoning. Good outputs come from sharp interrogation and thoughtful back-and-forth.\n\n3) Better context beats bigger models.\nToo much context leads to confusion. Too little leads to hallucination. Be intentional about what you include. The quality of an AI’s output depends on the context density of your input—feed it the most relevant information, using the fewest possible tokens.\n\n4) Decomposition before delegation isn’t optional.\nThe granularity of human tasks doesn’t translate directly to AI. What feels intuitive to us may be vague or overloaded for the model. Modular design is your friend, so plan for what, how much, and in what order you delegate—as if assigning tasks to a junior teammate.\n\n5) Go beyond the dominant signal.\nLLMs follow the average pattern, the most likely continuation. But what’s common isn’t always what matters. Master the margins. Surface exceptions, spot what’s missing or misunderstood, and look for the outliers. That’s where real insight—and your impact—comes from.\n\nThanks to our Publicis Sapient Toronto engineering leaders who spent two days in SEAL (Strategic Engineering Academy for Leaders) training w/ Sapient Slingshot to level up their AI skills and drive impact for our clients and teams. And shoutout to Thanu, Amit, Laura, Joy, and Mohammed for designing and delivering a strong program through thoughtful coaching, organization, and curriculum.\n\nDustin, Pankaj, Debprotim, Amit, Arnab, Mrudul, Mohan, Jithin, Ramya, David, Rajesh, Milind, Gaytri, Jayakar, Maurizio, Sreeman, Vishal, Trivendra, Rajesh, Rohit, Pankaj, Huzefa, Jayesh, Jithin, irshad, Mridul","post_url":"https://www.linkedin.com/feed/update/urn:li:activity:7330955602753384453","post_urn":"urn:li:activity:7330955602753384453","posted_hours_ago":8760,"posted_time":"2025-06-25","posted_time_raw":"1yr","reaction_count":177,"reaction_types":"LIKE, EMPATHY, PRAISE","repost_count":2,"source":"activity","video_url":null},{"article_description":null,"article_title":null,"article_url":null,"author_headline":"Deploying enterprise agents in production / CTO / SWE Leader / GVP @ Publicis Sapient","author_name":"Ravi Evani\n              \n                \n                   \n    \n      \n    \n    \n      \n    \n\n • You","author_profile_image_url":"https://media.licdn.com/dms/image/v2/C4E03AQGNeJRorEd2Nw/profile-displayphoto-shrink_100_100/profile-displayphoto-shrink_100_100/0/1569287114631?e=1784160000&v=beta&t=tJDZC7EXWnlgIIf8kF7fBCajhF-HEgzNXnz_IIkjqW8","author_profile_url":"https://www.linkedin.com/in/ravievani","comment_count":4,"has_image":true,"impression_count":3084,"is_article":false,"is_my_post":true,"is_video":true,"post_image_url":"https://media.licdn.com/dms/image/v2/D4E05AQF-pXSpemyPfQ/videocover-high/B4EZboa78.GcBw-/0/1747656127434?e=1783008000&v=beta&t=0hP8j_tvWe9lRA-mgVXi1DBkFm35vkyAay8QLM5-LMk","post_text":"If you want to become a world-class AI engineer, there are some painful lessons you don’t need to learn the hard way➜I already did.\n\nHere are 7 mistakes I’ve made that I’d avoid at all costs if I were starting again:\n\n1. Waiting to “feel ready”\nAI moves fast. If you’re waiting to be an expert before you contribute, you’ll always be behind. Start before you’re comfortable. Experiment, ship, and learn in public. The best way to level up is by doing.\n\n2. Thinking your value is in code alone\nBeing great at Python or prompt engineering is not enough. The real value lies in connecting AI to business impact➜whether that’s accelerating a workflow, improving UX, or cutting costs. Learn to translate tech into outcomes.\n\n3. Ignoring the system around the model\nA good model in a broken pipeline is still a broken system. AI engineering isn’t just about the model➜it’s also about data quality, APIs, human feedback loops, testing, and deployment. Own the whole lifecycle.\n\n4. Not learning how to collaborate with AI\nTreating AI like a magic box limits its potential. The best engineers treat it like a teammate➜one that needs direction, context, and review. Know what it’s good at, what it’s bad at, and how to manage it like a junior dev.\n\n5. Avoiding ambiguity\nAI often lives in the gray areas: noisy data, unclear specs, messy orgs. If you’re only comfortable with perfect instructions and clean problems, you’ll struggle. The best AI engineers lean into uncertainty and reduce it systematically.\n\n6. Over-engineering for edge cases\nTrying to make AI perfect on Day 1 is a trap. Focus on dominant use cases, ship quickly, then tighten the loop with feedback. Let the real-world data shape your iterations.\n\n7. Not tying your work to results\nIt’s easy to get caught up in models, benchmarks, and novelty. But none of that matters if it doesn’t move a KPI. Be ruthless about measuring the impact of your work. Code is only valuable if it drives value.\n\nThese are the lessons I live by now➜and I keep learning.\nIf you’re serious about mastering AI engineering, don’t just build models. Build systems. Build impact.","post_url":"https://www.linkedin.com/feed/update/urn:li:activity:7330201134457880577","post_urn":"urn:li:activity:7330201134457880577","posted_hours_ago":8760,"posted_time":"2025-06-25","posted_time_raw":"1yr","reaction_count":37,"reaction_types":"LIKE, EMPATHY, INTEREST","source":"activity","video_url":"https://media.licdn.com/dms/image/v2/D4E05AQF-pXSpemyPfQ/videocover-high/B4EZboa78.GcBw-/0/1747656127434?e=1783008000&v=beta&t=0hP8j_tvWe9lRA-mgVXi1DBkFm35vkyAay8QLM5-LMk"},{"article_description":null,"article_title":null,"article_url":null,"author_headline":"Deploying enterprise agents in production / CTO / SWE Leader / GVP @ Publicis Sapient","author_name":"Ravi Evani\n              \n                \n                   \n    \n      \n    \n    \n      \n    \n\n • You","author_profile_image_url":"https://media.licdn.com/dms/image/v2/C4E03AQGNeJRorEd2Nw/profile-displayphoto-shrink_100_100/profile-displayphoto-shrink_100_100/0/1569287114631?e=1784160000&v=beta&t=tJDZC7EXWnlgIIf8kF7fBCajhF-HEgzNXnz_IIkjqW8","author_profile_url":"https://www.linkedin.com/in/ravievani","has_image":true,"impression_count":833,"is_article":false,"is_my_post":true,"is_video":false,"post_image_url":"https://media.licdn.com/dms/image/v2/D4E22AQFfAHVtdC5RHA/feedshare-shrink_800/B4EZbhAbfnHIAk-/0/1747531709413?e=1784160000&v=beta&t=pYMjoffiLiMraoSwspSWUnRKImEHG9qearlEpfq_vNs","post_text":"Dissecting the \"AI\" in the currently trending ai-hedge-fund Github project 📈:\n\nI recently dove into this educational GitHub project https://lnkd.in/eH54Wv_x (kudos to Virattt and contributors!) to find out how AI is being used.\n\nSo, where’s the Logic? Deterministic vs. AI\n\n⚙️ The Deterministic Engine:\n➜Data Collection & Prep: Fetching financial data, market stats – all standard code.\n➜Heuristic Scoring: Initial calculations within analyst agents (e.g., \"Is revenue growth > X%?\") are rule-based.\n➜Workflow Orchestration: The sequence of agent operations is programmatically defined (using LangGraph in this case).\n➜Risk Management (Primarily): Applying rules for position sizing, exposure limits based on inputs.\n\n🤖 The AI (LLMs) at Work:\n➜Analyst Personas (e.g., \"Bill Ackman Agent\"): After deterministic code crunches numbers (financial metrics, heuristic scores), an LLM steps in. Prompted with a specific investor persona and the pre-calculated data, it crafts an investment thesis, generates a signal (bullish/bearish), confidence score, and reasoning – aiming to mimic that investor's style.\n\n➜Portfolio Manager Agent: Given signals from all analyst agents, risk parameters, portfolio state, and trading rules via a detailed prompt, an LLM makes the final call: what to buy/sell/hold for each stock, in what quantity, and why. This synthesizes diverse inputs into actionable decisions.\n\n⚠️ The \"Gotchas\" of Assessing the AI's True Value\nThis architecture allows for sophisticated AI contributions, but how good are they really?\n➜Backtesting is Key: The project includes a backtester. Real-world simulated performance (P&L, Sharpe ratio) is the ultimate first-pass test.\n➜Reasoning Quality: The --show-reasoning flag is crucial. Is the AI's explanation logical, coherent with its persona, and insightful, or just rephrasing inputs? This needs human review.\n➜Prompt Sensitivity & Robustness: Small prompt changes or different LLM models can lead to varied outcomes. The quality of the prompts themselves is paramount.\n\nKey Takeaway for Humans Relying on AI Agents Like This:\n➜The Prompts: Understand exactly what the AI is being asked, what data it's given, what constraints or personas it's meant to adopt, and how its output is structured.\n➜Deterministic Pre-processing: What data is the AI actually seeing? How is it filtered, scored, or structured before the LLM gets it?\n➜Evaluation & Fallback Mechanisms: How is the AI's output being validated? What happens if it fails or gives nonsensical answers?\nBacktesting & Performance Metrics: How is success defined and measured?\n\nThis ai-hedge-fund project is a great educational tool for seeing this hybrid approach in action. It highlights both the potential of AI in complex domains and the continued need for human oversight and critical evaluation.","post_url":"https://www.linkedin.com/feed/update/urn:li:activity:7329679241397088256","post_urn":"urn:li:activity:7329679241397088256","posted_hours_ago":8760,"posted_time":"2025-06-25","posted_time_raw":"1yr","reaction_count":16,"reaction_types":"LIKE, EMPATHY","source":"activity","video_url":null},{"article_description":null,"article_title":null,"article_url":null,"author_headline":"Deploying enterprise agents in production / CTO / SWE Leader / GVP @ Publicis Sapient","author_name":"Ravi Evani\n              \n                \n                   \n    \n      \n    \n    \n      \n    \n\n • You","author_profile_image_url":"https://media.licdn.com/dms/image/v2/C4E03AQGNeJRorEd2Nw/profile-displayphoto-shrink_100_100/profile-displayphoto-shrink_100_100/0/1569287114631?e=1784160000&v=beta&t=tJDZC7EXWnlgIIf8kF7fBCajhF-HEgzNXnz_IIkjqW8","author_profile_url":"https://www.linkedin.com/in/ravievani","comment_count":2,"has_image":true,"impression_count":4216,"is_article":false,"is_my_post":true,"is_video":true,"post_image_url":"https://media.licdn.com/dms/image/v2/D4E05AQFZnmRl8OrFEg/videocover-low/B4EZbRBqXMHABs-/0/1747263686997?e=1783008000&v=beta&t=3XdCkzqNKzvqCywNF2O1YaqXqofsEds14SE6ttSjHyw","post_text":"Real-time object detection on the edge!\n\nJason Steiner and I @ Philadephia's Walnut Street Cafe https://lnkd.in/eGwmfitz testing out the Multimodal llama.cpp on Apple silicon, thanks to https://lnkd.in/eWWJ-4ET personalized using Publicis Sapient hashtag#Slingshot w/the LLM running locally on my macbook pro.\n\nSee the response text on the right panel displaying object detection in real-time.","post_url":"https://www.linkedin.com/feed/update/urn:li:activity:7328555093337731074","post_urn":"urn:li:activity:7328555093337731074","posted_hours_ago":8760,"posted_time":"2025-06-25","posted_time_raw":"1yr","reaction_count":66,"reaction_types":"LIKE, EMPATHY, PRAISE","source":"activity","video_url":"https://media.licdn.com/dms/image/v2/D4E05AQFZnmRl8OrFEg/videocover-low/B4EZbRBqXMHABs-/0/1747263686997?e=1783008000&v=beta&t=3XdCkzqNKzvqCywNF2O1YaqXqofsEds14SE6ttSjHyw"},{"article_description":null,"article_title":null,"article_url":null,"author_headline":"Deploying enterprise agents in production / CTO / SWE Leader / GVP @ Publicis Sapient","author_name":"Ravi Evani\n              \n                \n                   \n    \n      \n    \n    \n      \n    \n\n • You","author_profile_image_url":"https://media.licdn.com/dms/image/v2/C4E03AQGNeJRorEd2Nw/profile-displayphoto-shrink_100_100/profile-displayphoto-shrink_100_100/0/1569287114631?e=1784160000&v=beta&t=tJDZC7EXWnlgIIf8kF7fBCajhF-HEgzNXnz_IIkjqW8","author_profile_url":"https://www.linkedin.com/in/ravievani","comment_count":2,"has_image":true,"impression_count":624,"is_article":false,"is_my_post":true,"is_video":false,"post_image_url":"https://media.licdn.com/dms/image/v2/D4E22AQGilUcQ0YOddw/feedshare-shrink_800/B4EZbNlh8kHcAk-/0/1747205891916?e=1784160000&v=beta&t=jMFRYVTWT1gDAVZPSAFbhEP_UnTyF_4hF9sz9zXjm30","post_text":"If Transformers are built to focus on what matters most (“attention is all you need”), then our job is to get better at what they ignore.\n\nLLMs are optimized for the average pattern, the dominant signal, the most likely continuation.\n\nBut the edges are where perception, judgment, and experience lead.\n\nWe are the ones who bring context, intuition, and the ability to reason through unfamiliar situations.\n\nWe can connect dots across domains, infer intent, and spot when something “feels off” even if we’ve never seen it before.\n\nSo our real leverage is not in racing AI to the center, but in steering it with our mastery of the margins:\n➜ What’s missing?\n➜ What’s misclassified?\n➜ What’s misunderstood?\n\nThat’s where we focus, and hone in our value.","post_url":"https://www.linkedin.com/feed/update/urn:li:activity:7328312666538610689","post_urn":"urn:li:activity:7328312666538610689","posted_hours_ago":8760,"posted_time":"2025-06-25","posted_time_raw":"1yr","reaction_count":9,"reaction_types":"LIKE","source":"activity","video_url":null},{"article_description":null,"article_title":null,"article_url":null,"author_headline":"Deploying enterprise agents in production / CTO / SWE Leader / GVP @ Publicis Sapient","author_name":"Ravi Evani\n              \n                \n                   \n    \n      \n    \n    \n      \n    \n\n • You","author_profile_image_url":"https://media.licdn.com/dms/image/v2/C4E03AQGNeJRorEd2Nw/profile-displayphoto-shrink_100_100/profile-displayphoto-shrink_100_100/0/1569287114631?e=1784160000&v=beta&t=tJDZC7EXWnlgIIf8kF7fBCajhF-HEgzNXnz_IIkjqW8","author_profile_url":"https://www.linkedin.com/in/ravievani","has_image":true,"impression_count":601,"is_article":false,"is_my_post":true,"is_video":true,"post_image_url":"https://media.licdn.com/dms/image/v2/D4E05AQFgvL-fPMrNuQ/videocover-low/B4EZbF0j87HwBw-/0/1747075618962?e=1783008000&v=beta&t=O8suM3EMytiHIu7yNSX_5QY2aOV0Io_opbjeF-MSdtg","post_text":"Demystifying the logic that powers vibecoding in your favorite AI copilot:\n\nThe functionality that enables vibecoding is the “agent mode” built into IDEs like Cursor, Windsurf, Zed, Cline, and others.\n\nThe interesting thing is most of the logic in the agent mode (except the LLM) is deterministic.\n\nHere’s the general idea of what happens under the hood, when you send a message like: “Refactor this function.” into your IDE agent prompt input box. This is based on Zed IDE source code https://lnkd.in/eJXe58UE","post_url":"https://www.linkedin.com/feed/update/urn:li:activity:7327766301366448128","post_urn":"urn:li:activity:7327766301366448128","posted_hours_ago":8760,"posted_time":"2025-06-25","posted_time_raw":"1yr","reaction_count":6,"reaction_types":"LIKE","source":"activity","video_url":"https://media.licdn.com/dms/image/v2/D4E05AQFgvL-fPMrNuQ/videocover-low/B4EZbF0j87HwBw-/0/1747075618962?e=1783008000&v=beta&t=O8suM3EMytiHIu7yNSX_5QY2aOV0Io_opbjeF-MSdtg"},{"article_description":null,"article_title":null,"article_url":null,"author_headline":"Deploying enterprise agents in production / CTO / SWE Leader / GVP @ Publicis Sapient","author_name":"Ravi Evani\n              \n                \n                   \n    \n      \n    \n    \n      \n    \n\n • You","author_profile_image_url":"https://media.licdn.com/dms/image/v2/C4E03AQGNeJRorEd2Nw/profile-displayphoto-shrink_100_100/profile-displayphoto-shrink_100_100/0/1569287114631?e=1784160000&v=beta&t=tJDZC7EXWnlgIIf8kF7fBCajhF-HEgzNXnz_IIkjqW8","author_profile_url":"https://www.linkedin.com/in/ravievani","comment_count":3,"has_image":true,"impression_count":1113,"is_article":false,"is_my_post":true,"is_video":true,"post_image_url":"https://media.licdn.com/dms/image/v2/D4E05AQGRFDAXbDg2Mw/videocover-low/B4EZa.fX2uHwBw-/0/1746952631294?e=1783008000&v=beta&t=VrDBU4qienr8KSkR57SvfHT0OYhaYu7jMwDX5lWhd1A","post_text":"Demystifying the logic that powers vibecoding in your favorite AI copilot:\n\nThe functionality that enables vibecoding is the “agent mode” built into IDEs like Cursor, Windsurf, Zed, Cline, and others.\n\nThe interesting thing is most of the logic in the agent mode (except the LLM) is deterministic.\n\nHere’s the general idea of what happens under the hood, when you send a message like: “Refactor this function.” into your IDE agent prompt input box. This is based on Zed IDE source code https://lnkd.in/eJXe58UE\n\n→ First the IDE system spins up an active thread that creates a message object for the prompt. It calls the context system to fetch anything relevant—files, symbols, previous chats, rules, etc. relevant to the user intent.\n\n→ Next, as part of the context gathering, a Context Picker selects what to include – this can be user driven or auto-selected. A Context Store loads data from available sources and the result is a rich, structured context data sent along with your prompt\n\n→ Then comes the LLM request, where a model selector picks the right LLM for the job. The IDE sends both prompt + context to the LLM for processing.\nAt this point the LLM could determine if a tool call is needed, such as reading a file, accessing the terminal, editing the file and so on.\n\n→ The IDE then invokes the right tool (e.g., EditFileTool). The tool executes and returns results, which are routed back to the LLM to continue reasoning. And this cycle may repeat until the task is complete, in which case the LLM might return a response such as the source code and a text explanation.\n\n→ This response is shown in the IDE. If diffs are involved (like code edits), tools like Code Diff or Terminal Codegen render and apply them.\n\n→ The user reviews the output and decides to continue the thread, edit the prompt, or start fresh.\n\n☆ So that’s it: It’s not just an “AI chatbot”, but rather, a fully orchestrated system with tons of deterministic code that manages context, models, tools, and interaction flow.","post_url":"https://www.linkedin.com/feed/update/urn:li:activity:7327676818818232320","post_urn":"urn:li:activity:7327676818818232320","posted_hours_ago":8760,"posted_time":"2025-06-25","posted_time_raw":"1yr","reaction_count":14,"reaction_types":"LIKE, INTEREST","source":"activity","video_url":"https://media.licdn.com/dms/image/v2/D4E05AQGRFDAXbDg2Mw/videocover-low/B4EZa.fX2uHwBw-/0/1746952631294?e=1783008000&v=beta&t=VrDBU4qienr8KSkR57SvfHT0OYhaYu7jMwDX5lWhd1A"},{"article_description":null,"article_title":null,"article_url":null,"author_headline":"Deploying enterprise agents in production / CTO / SWE Leader / GVP @ Publicis Sapient","author_name":"Ravi Evani\n              \n                \n                   \n    \n      \n    \n    \n      \n    \n\n • You","author_profile_image_url":"https://media.licdn.com/dms/image/v2/C4E03AQGNeJRorEd2Nw/profile-displayphoto-shrink_100_100/profile-displayphoto-shrink_100_100/0/1569287114631?e=1784160000&v=beta&t=tJDZC7EXWnlgIIf8kF7fBCajhF-HEgzNXnz_IIkjqW8","author_profile_url":"https://www.linkedin.com/in/ravievani","comment_count":1,"has_image":false,"impression_count":1674,"is_article":false,"is_my_post":true,"is_video":false,"post_image_url":null,"post_text":"Google Cloud AI powered kubernetes assistant: kubectl-ai https://lnkd.in/ez9xQNTM is trending #1 on GitHub today. How does this ai work?\n\n🔹 You ask:\n“Show me all pods in the default namespace”\n\nHere’s what happens behind the scenes:\n↳The kubectl-ai CLI sends your query to an AI Agent.\n↳The AI Agent uses a large language model (like Gemini) to translate your natural language into a real kubectl command.\n↳It figures out: kubectl get pods -n default\n↳This command is passed to the kubectl tool executor, which runs it against the Kubernetes API server.\n↳The server returns the live pod data.\n↳The AI agent can (optionally) run another LLM pass to explain the output.\n↳You see both the raw result and an explanation—right in your terminal.\n\n🔹 You ask:\n“Create a new deployment for nginx image with 3 replicas”\n\nHere’s how kubectl-ai handles it behind the scenes:\n↳Your input goes through the kubectl-ai CLI and reaches the AI Agent.\n↳The agent builds a prompt using your request and the schema of the kubectl tool.\n↳A large language model (like Gemini) interprets your intent and determines the appropriate command:\n↳kubectl create deployment nginx --image=nginx --replicas=3\n↳The command is parsed, arguments are extracted, and the tool executor runs it against the Kubernetes API.\n↳The API server validates the configuration and applies it.\n↳Once complete, the server returns a status—success or error.\n↳The AI agent formats the output and returns a clear, human-readable summary to your terminal.\n\nNo memorizing commands. Just tell it what you want.","post_url":"https://www.linkedin.com/feed/update/urn:li:activity:7325795048627789824","post_urn":"urn:li:activity:7325795048627789824","posted_hours_ago":8760,"posted_time":"2025-06-25","posted_time_raw":"1yr","reaction_count":13,"reaction_types":"LIKE","source":"activity","video_url":null},{"article_description":null,"article_title":null,"article_url":null,"author_headline":"Deploying enterprise agents in production / CTO / SWE Leader / GVP @ Publicis Sapient","author_name":"Ravi Evani\n              \n                \n                   \n    \n      \n    \n    \n      \n    \n\n • You","author_profile_image_url":"https://media.licdn.com/dms/image/v2/C4E03AQGNeJRorEd2Nw/profile-displayphoto-shrink_100_100/profile-displayphoto-shrink_100_100/0/1569287114631?e=1784160000&v=beta&t=tJDZC7EXWnlgIIf8kF7fBCajhF-HEgzNXnz_IIkjqW8","author_profile_url":"https://www.linkedin.com/in/ravievani","comment_count":2,"has_image":false,"impression_count":2039,"is_article":false,"is_my_post":true,"is_video":false,"post_image_url":null,"post_text":"The moment it clicked was the day I stopped treating AI like a mystery—and started acting like its engineering manager.\n\nThat shift didn’t happen by accident. It came from following a real engineering framework for how to work with AI.\n\nHere’s what that looks like in practice:\n\n⇥ Start with mindset\n\nIt’s a team: you + AI.\nTreat it like a junior dev.\nKnow what AI is good at (and what it’s not).\nYou’re still the architect. Delegate with intent.\n\n⇥ Work in a real SDLC\n\nPlan incrementally. Define one concrete task at a time.\nProvide context before asking for output.\nCo-create, critique, and refine. Don’t just prompt and hope.\n\n⇥ Learn alongside the build\n\nResearch like you would normally.\nLet AI clarify and explain, but don’t outsource your thinking.\n\n⇥ Code like a team\n\nBreak work into stories.\nStart with test cases.\nGive clear instructions and examples.\nReview its code. Fill the gaps. Iterate.\n\n⇥Test. Validate. Review.\n\nTests aren’t a checkbox—they’re checkpoints.\nDebug together.\nDon’t ship until it’s solid.\n\n⇥ Don’t skip quality\n\nUse documented coding rules.\nStick to design patterns.\nLeave the codebase better than you found it.\n\n🧠 And above all—learn to communicate well with AI\n\nGive clean, relevant context.\nTrim the fat. Use new chats.\nAsk it to ask you better questions.\nUse real code examples.\nRefine prompts like you’d refactor code.\n\nThis is what it means to engineer with AI.\nNot one-off prompting. Not wizardry.\nNot magic. Not mystery.\nJust a repeatable, high-leverage way to build—with a new kind of teammate.","post_url":"https://www.linkedin.com/feed/update/urn:li:activity:7324607244648554496","post_urn":"urn:li:activity:7324607244648554496","posted_hours_ago":8760,"posted_time":"2025-06-25","posted_time_raw":"1yr","reaction_count":14,"reaction_types":"LIKE, INTEREST","source":"activity","video_url":null},{"article_description":null,"article_title":null,"article_url":null,"author_headline":"Deploying enterprise agents in production / CTO / SWE Leader / GVP @ Publicis Sapient","author_name":"Ravi Evani\n              \n                \n                   \n    \n      \n    \n    \n      \n    \n\n • You","author_profile_image_url":"https://media.licdn.com/dms/image/v2/C4E03AQGNeJRorEd2Nw/profile-displayphoto-shrink_100_100/profile-displayphoto-shrink_100_100/0/1569287114631?e=1784160000&v=beta&t=tJDZC7EXWnlgIIf8kF7fBCajhF-HEgzNXnz_IIkjqW8","author_profile_url":"https://www.linkedin.com/in/ravievani","comment_count":2,"has_image":true,"impression_count":6338,"is_article":false,"is_my_post":true,"is_video":true,"post_image_url":"https://media.licdn.com/dms/image/v2/D4E05AQGEHEqd3LVXYw/videocover-high/B4EZaLd3ylHkBk-/0/1746096718792?e=1783008000&v=beta&t=XcQ7E-e2CFx5ru2nvPk07G_x-oPLnopAVk-hGe2-Fj8","post_text":"Are you still debating AI while others are using it to outpace you?\n\nAs software engineers, we often overthink. We sit in rooms debating strategy—Should we use AI? Which model? Is it mature enough?\nMeanwhile, the technology moves forward—indifferent to our hesitation.\n\nThat’s always been the case with tech. But now it’s more extreme.\n\nSoftware development has fundamentally changed in the past year.\n\nThe old focal points—latest Java updates, specializing in front-end vs back-end, arguing over testing tools—don’t matter as much anymore.\n\nAI coding agents flipped the script. The new game is rapid adaptation and high-leverage problem solving.\n\nAnd it’s only accelerating.\n\nDevelopers who use AI tools are delivering at a level that traditional workflows can’t match.\nThe more they use them, the better the models get. The better the models get, the bigger the gap between adopters and holdouts.\n\nSo no, it’s not about waiting for the tech to mature. It’s about what you’re doing with it right now.\n\nThe point is: act.\n\nAI isn’t waiting. Neither should you.","post_url":"https://www.linkedin.com/feed/update/urn:li:activity:7323660512192335872","post_urn":"urn:li:activity:7323660512192335872","posted_hours_ago":8760,"posted_time":"2025-06-25","posted_time_raw":"1yr","reaction_count":55,"reaction_types":"LIKE, EMPATHY","source":"activity","video_url":"https://media.licdn.com/dms/image/v2/D4E05AQGEHEqd3LVXYw/videocover-high/B4EZaLd3ylHkBk-/0/1746096718792?e=1783008000&v=beta&t=XcQ7E-e2CFx5ru2nvPk07G_x-oPLnopAVk-hGe2-Fj8"},{"article_description":null,"article_title":null,"article_url":null,"author_headline":"Deploying enterprise agents in production / CTO / SWE Leader / GVP @ Publicis Sapient","author_name":"Ravi Evani\n              \n                \n                   \n    \n      \n    \n    \n      \n    \n\n • You","author_profile_image_url":"https://media.licdn.com/dms/image/v2/C4E03AQGNeJRorEd2Nw/profile-displayphoto-shrink_100_100/profile-displayphoto-shrink_100_100/0/1569287114631?e=1784160000&v=beta&t=tJDZC7EXWnlgIIf8kF7fBCajhF-HEgzNXnz_IIkjqW8","author_profile_url":"https://www.linkedin.com/in/ravievani","has_image":false,"impression_count":1204,"is_article":false,"is_my_post":true,"is_video":false,"post_image_url":null,"post_text":"Deep-Live-Cam https://lnkd.in/eeWKNt2P is trending #1 on GitHub today. Here’s a quick breakdown of how it pulls off real-time face swaps—from capturing your live video to generating the swapped output in milliseconds.\n\nThe application wires up a clean, four-step pipeline: you pick a source face and target stream, capturer.py grabs each frame, then core.py runs face-analyser to pinpoint faces and face-swapper to swap them via an ONNX model. Optional GFPGAN cleanup sharpens details, predicter sends work to CPU or GPU, and ui.py streams the result live (or FFMPEG saves it). All controls live in a simple UI/CLI toggle setup.","post_url":"https://www.linkedin.com/feed/update/urn:li:activity:7323150575473201152","post_urn":"urn:li:activity:7323150575473201152","posted_hours_ago":8760,"posted_time":"2025-06-25","posted_time_raw":"1yr","reaction_count":8,"reaction_types":"LIKE, INTEREST","source":"activity","video_url":null},{"article_description":null,"article_title":null,"article_url":null,"author_headline":"Deploying enterprise agents in production / CTO / SWE Leader / GVP @ Publicis Sapient","author_name":"Ravi Evani\n              \n                \n                   \n    \n      \n    \n    \n      \n    \n\n • You","author_profile_image_url":"https://media.licdn.com/dms/image/v2/C4E03AQGNeJRorEd2Nw/profile-displayphoto-shrink_100_100/profile-displayphoto-shrink_100_100/0/1569287114631?e=1784160000&v=beta&t=tJDZC7EXWnlgIIf8kF7fBCajhF-HEgzNXnz_IIkjqW8","author_profile_url":"https://www.linkedin.com/in/ravievani","has_image":true,"impression_count":1037,"is_article":false,"is_my_post":true,"is_video":true,"post_image_url":"https://media.licdn.com/dms/image/v2/D4E05AQEJ4ymryAR3-Q/feedshare-thumbnail_720_1280/B4EZZ4s1YcHMAs-/0/1745781742174?e=1783008000&v=beta&t=gvacW5GM8kQJ-NH7htMJKfQZZg45m2FOMsYF11Zcavk","post_text":"Gemini 2.5 allows you to shift between speed and power,
